# ============================================================================
# Scope Configuration
# ============================================================================
# Controls which HTTP records are in scope for scanning.
# Each rule has include and exclude lists. All rules use AND logic:
# a record must pass every rule to be in scope. Exclude takes priority
# over include (if a record matches both, it is excluded).
#
# Pattern types vary by field:
#   host, path, content-type  — glob patterns (case-insensitive)
#   status_code               — exact ("200"), wildcard ("2xx", "2*"), range ("400-499")
#   request_string, response_string — case-insensitive substring match
#
# Defaults: include ["*"] and exclude [] for host, path, status_code,
# and content-types. String rules default to include [] (empty = match all).
#
# Manage at runtime with: vigolium scope / vigolium scope set
scope:
  # When true, scope rules are also enforced during ingestion: out-of-scope
  # requests are rejected before being saved to the database.
  # When false (default), all requests are saved but out-of-scope records
  # are skipped during scanning.
  applied_on_ingest: false

  # CLI origin mode restricts which hosts are in scope based on CLI target origins.
  # This provides automatic host restriction from the -t target URL(s).
  #
  # Modes (example target: http://www.example.com):
  #   "relaxed"  — host must contain the target's keyword (e.g. "example") (default);
  #                matches examplesite.com, test-example.net, etc.
  #   "all"      — no origin restriction
  #   "balanced" — host must share the target's eTLD+1 (e.g. example.com);
  #                matches *.example.com but not examplesite.com
  #   "strict"   — host must exactly match the target host;
  #                only www.example.com passes
  #
  # IP targets always use exact match regardless of mode.
  # Override with CLI flag: --scope-origin <mode>
  # Default: relaxed
  cli_origin_mode: relaxed

  # Maximum request body size in bytes. Bodies exceeding this limit are
  # handled according to body_size_exceeded_action.
  # 0 means unlimited. Default: 1048576 (1 MB)
  max_request_body_size: 1048576

  # Maximum response body size in bytes. Bodies exceeding this limit are
  # handled according to body_size_exceeded_action.
  # 0 means unlimited. Default: 524288000 (500 MB)
  max_response_body_size: 524288000

  # Action when body size exceeds the limit:
  #   "truncate"  — truncate body to the limit, save and scan (default)
  #   "drop"      — discard the item entirely (no save, no scan)
  #   "skip-scan" — save truncated body to DB but skip scanning modules
  body_size_exceeded_action: truncate

  # Automatically skip URLs whose path ends with a known static-asset
  # extension (images, fonts, video, audio, etc.).
  # This reduces noise and improves scan performance out of the box.
  # Default: true
  ignore_static_file: true

  # Categories of static file extensions to ignore when ignore_static_file
  # is enabled. Each key is a category name; values are lists of extensions
  # (case-insensitive, leading dot required). Add or remove entries to
  # customize which file types are skipped.
  ignore_static_content_type:
    fonts: [".ttf", ".otf", ".woff", ".woff2", ".eot", ".pfa", ".pfb", ".fnt", ".bdf", ".psf", ".snf", ".otc", ".ttc", ".afm", ".pfm"]
    images: [".jpg", ".jpeg", ".png", ".gif", ".bmp", ".tif", ".tiff", ".webp", ".avif", ".heic", ".heif", ".ico", ".cur", ".psd", ".raw", ".cr2", ".nef", ".arw", ".dng"]
    vector_images: [".ai", ".eps", ".cdr"]
    video: [".mp4", ".m4v", ".mov", ".avi", ".wmv", ".flv", ".webm", ".mkv", ".3gp", ".3g2", ".mpeg", ".mpg", ".m2ts", ".ogv", ".vob", ".rm", ".rmvb"]
    audio: [".mp3", ".wav", ".ogg", ".aac", ".flac", ".m4a", ".wma", ".mid", ".midi", ".amr", ".aiff"]

  # Host patterns (glob, case-insensitive)
  host:
    include:
      - "*"
    exclude: []
    # Example: scan only example.com and its subdomains, skip staging:
    # include:
    #   - "*.example.com"
    #   - "example.com"
    # exclude:
    #   - "staging.example.com"

  # URL path patterns (glob, case-insensitive)
  path:
    include:
      - "*"
    exclude: []
    # Example: scan only /api paths, skip health checks:
    # include:
    #   - "/api/*"
    # exclude:
    #   - "/api/health"
    #   - "/api/metrics"

  # HTTP status code filters
  # Supports exact ("200"), wildcard ("2xx"), and range ("400-499")
  status_code:
    include:
      - "*"
    exclude: []
    # Example: only scan responses with 2xx and 3xx status codes:
    # include:
    #   - "2xx"
    #   - "3xx"

  # Request Content-Type patterns (glob)
  request_content_type:
    include:
      - "*"
    exclude: []
    # Example: only scan JSON and form requests:
    # include:
    #   - "application/json*"
    #   - "application/x-www-form-urlencoded*"

  # Response Content-Type patterns (glob)
  response_content_type:
    include:
      - "*"
    exclude: []
    # Example: only scan HTML and JSON responses, skip images:
    # include:
    #   - "text/html*"
    #   - "application/json*"
    # exclude:
    #   - "image/*"

  # Request body/header substring match (case-insensitive)
  # Empty include = match all requests
  request_string:
    include: []
    exclude: []
    # Example: skip requests containing a specific auth token:
    # exclude:
    #   - "X-Internal-Service-Key"

  # Response body/header substring match (case-insensitive)
  # Empty include = match all responses
  response_string:
    include: []
    exclude: []
    # Example: skip responses containing "not found" boilerplate:
    # exclude:
    #   - "page not found"
    #   - "404 error"

# ============================================================================
# Source Code Awareness
# ============================================================================
# Configure where cloned source repositories are stored on disk.
# Used by "vigolium source add --git" and "vigolium scan --source <git-url>".
source_aware:
  # Base directory for cloned repositories.
  # Default: ~/.vigolium/source-aware/
  storage_path: ~/.vigolium/source-aware/

  # Git clone depth (--depth flag). Use 1 for shallow clones (faster, less disk).
  # Default: 1
  clone_depth: 1

  # Third-party tool integration
  # Runs external security scanners on source repos when added or rescanned.
  # Tools must be installed and available in $PATH.
  # Use "vigolium source scan <id>" to rescan a repo.
  third_party_integration:
    enabled: true
    timeout: "10m"
    tools:
      semgrep:
        enabled: true
        command: semgrep
        args: ["scan", "--sarif", "--quiet", "--sarif-output={{output}}"]
        output_file: "{{output}}"
      osv-scanner:
        enabled: true
        command: osv-scanner
        args: ["scan", "--format", "sarif", "--output={{output}}"]
        output_file: "{{output}}"
      codeql:
        enabled: true
        command: codeql
        # Language for CodeQL analysis. Set to "auto" to detect from repo file extensions.
        # Supported: javascript, python, java, csharp, cpp, go, ruby, swift, kotlin
        language: auto
        steps:
          - args: ["database", "create", "{{db}}", "--language={{language}}", "--source-root={{repo}}", "--overwrite"]
          - args: ["pack", "download", "codeql/{{language}}-queries"]
          - args: ["database", "analyze", "{{db}}", "codeql/{{language}}-queries", "--format=sarif-latest", "--output={{output}}", "--threads=0"]
            output_file: "{{output}}"

  # ast-grep source code analysis
  # Uses tree-sitter-based structural search to extract routes, parameters,
  # and API endpoints from source code. Binary auto-downloaded if not in PATH.
  ast_grep:
    # Enable ast-grep route extraction.
    # Default: true
    enabled: true

    # Directory containing ast-grep rules and ast-grep-config.yaml.
    # Bootstrapped automatically on first run with built-in rules.
    # Default: ~/.vigolium/sast-rules/astgrep/
    rules_dir: "~/.vigolium/sast-rules/astgrep/"

    # Maximum time for ast-grep analysis per repo.
    # Default: 5m
    timeout: "5m"

  # AI Agent SAST
  # Run AI agent-powered code review after ast-grep and third-party tools finish.
  # The agent reviews source code using prompt templates from the sast/ folder.
  # Requires an agent backend configured in the agent section below.
  agent_sast:
    # Enable agent-powered SAST analysis.
    # Default: false
    enabled: false

    # Prompt template IDs to run sequentially against each source repo.
    # Templates are resolved from ~/.vigolium/prompts/ or built-in presets.
    # Default: [security-code-review]
    prompt_templates:
      - security-code-review

    # Custom inline prompts to run after templates.
    # Each entry is a raw prompt string sent to the agent with the source code.
    # Useful for project-specific instructions without creating a template file.
    # Default: [] (none)
    custom_prompts: []
    # Example:
    # custom_prompts:
    #   - "Review the source code for hardcoded AWS credentials and S3 bucket misconfigurations. Report findings as JSON."
    #   - "Check all database queries for SQL injection. Focus on raw query builders and string concatenation."

    # Agent backend override (empty = use agent.default_agent).
    # Default: "" (use default)
    agent: ""

    # Maximum time per template execution.
    # Default: 15m
    timeout: "15m"

# ============================================================================
# Content Discovery (Deparos)
# ============================================================================
# Configure deparos content discovery, which brute-forces directories and files
# on a target web server before vulnerability scanning begins.
# Managed by scanning_strategy; override with CLI flags: --discover, --discover-max-time
# Speed control (concurrency, max_duration) is configured in scanning_pace.discovery.
discovery:
  # Discovery mode: what types of resources to discover.
  # Options: "files_and_dirs", "files_only", "dirs_only"
  # Default: files_and_dirs
  mode: files_and_dirs

  # Scope mode for discovered URLs.
  # Options:
  #   "subdomain" - same registered domain (eTLD+1)
  #   "exact"     - exact hostname match only
  #   "any"       - no host restriction
  # Default: subdomain
  scope_mode: subdomain

  # Save HTTP response bodies from discovery into the ephemeral DB.
  # When true, response data is available for scanning modules.
  # Default: true
  save_response_body: true

  # Enrich discovery targets with paths from previous phases (spidering, external harvest).
  # When true, discovered paths are used to expand the brute-force target list.
  # When false, only the original seed URLs are used as discovery targets.
  # Default: false
  enrich_targets: false

  # Enable malformed path probing during directory discovery.
  # When true, uses the fuzz wordlist (fuzz_wordlist_path) to test directories
  # with path traversal and malformed path payloads (e.g., ..;/, .%00/, %2e%2e/).
  # Default: false
  enable_malformed_path_probe: false

  # Recursion settings for directory traversal.
  recursion:
    # Enable recursive directory discovery.
    # Default: true
    enabled: true

    # Maximum recursion depth (1-32767).
    # Default: 5
    max_depth: 5

  # Wordlist paths for discovery.
  # Empty path = wordlist disabled. Supports ~ expansion.
  wordlists:
    # short_file_path: ~/.vigolium/wordlists/file-short.txt
    # long_file_path: ~/.vigolium/wordlists/file-long.txt
    # short_dir_path: ~/.vigolium/wordlists/dir-short.txt
    # long_dir_path: ~/.vigolium/wordlists/dir-long.txt
    # fuzz_wordlist_path: ~/.vigolium/wordlists/fuzz.txt

    # Use filenames observed during spidering as wordlist entries.
    # Default: true
    use_observed_names: true

    # Use observed directory paths as wordlist entries.
    # Default: true
    use_observed_paths: true

    # Test full observed filenames (e.g., "app.b5ca88ec.js").
    # Default: true
    use_observed_files: true

    # Enable numeric variant generation (e.g., page1 → page2, page3).
    # Default: false
    enable_numeric_fuzzing: false

  # File extension testing during discovery.
  extensions:
    # Test custom extensions (php, asp, aspx, jsp, etc.).
    # Default: true
    test_custom: true

    # Custom extension list (used when test_custom is true).
    # Default: deparos built-in list (php, asp, aspx, jsp, jspa, do)
    # custom_list:
    #   - php
    #   - asp
    #   - aspx

    # Test extensions observed during spidering.
    # Default: true
    test_observed: true

    # Test backup extensions (.bak, .old, .tmp, etc.).
    # Default: true
    test_backup_extensions: true

    # Custom backup extension list (used when test_backup_extensions is true).
    # Default: deparos built-in list (~1, $$$, bak, old, tmp, backup, etc.)
    # backup_extensions:
    #   - bak
    #   - old
    #   - tmp

    # Test files without extensions.
    # Default: true
    test_no_extension: true

  # Discovery engine settings.
  engine:
    # Case sensitivity mode for filename matching.
    # Options: "auto_detect", "sensitive", "insensitive"
    # Default: auto_detect
    case_sensitivity: auto_detect

    # HTTP request timeout per discovery request.
    # Must be 1s-300s.
    # Default: 10s
    timeout: 10s

    # Custom HTTP headers to include in all discovery requests.
    # custom_headers:
    #   Authorization: "Bearer my-token"
    #   X-Custom-Header: "value"

    # Enable cookie jar for session persistence during discovery.
    # Default: false
    enable_cookie_jar: false

    # Exit after N consecutive network errors (0 = disabled).
    # Default: 0
    max_consecutive_errors: 50

    # Exit after N consecutive WAF/CDN blocks (0 = disabled).
    # Default: 0
    max_consecutive_waf_blocks: 50

    # Max items per observed provider.
    # Default: 4000
    observed_max_items: 4000

    # Disable kingfisher secret scanning during discovery.
    # Default: true
    disable_kingfisher: true

# ============================================================================
# Browser-Based Spidering (Spitolas)
# ============================================================================
# Configure browser-based crawling to discover dynamic content, SPAs,
# and API endpoints that static crawlers miss. Uses headless Chromium
# to interact with pages (click elements, fill forms, trigger JS).
#
# Managed by scanning_strategy; override with CLI flags: --spider, --spider-max-time
# Speed control (max_duration) is configured in scanning_pace.spidering.
spidering:
  # Maximum crawl depth (0 = unlimited).
  # Default: 0
  max_depth: 0

  # Maximum number of unique states to discover (0 = unlimited).
  # Default: 0
  max_states: 0

  # Maximum duration for spidering per target.
  # Format: duration string (e.g., "30m", "1h")
  # Default: 30m
  max_duration: 30m

  # Maximum consecutive action failures before aborting.
  # Default: 100
  max_consecutive_fails: 100

  # Run browser in headless mode (no visible window).
  # Default: true
  headless: true

  # Number of concurrent browser instances.
  # More instances = faster crawling but higher resource usage.
  # Default: 1
  browser_count: 1

  # Crawl strategy for state exploration.
  # Options: "normal", "random", "oldest_first", "shallow_first", "adaptive"
  # Default: adaptive
  strategy: adaptive

  # Include HTTP response bodies in captured traffic.
  # Default: true
  include_response_body: true

  # Browser engine to use.
  # Options: "chromium" (default), "ungoogled" (Linux only)
  # Default: chromium
  browser_engine: chromium

  # Disable CDP (Chrome DevTools Protocol) event listener detection.
  # When false (default), the crawler uses CDP to detect click handlers
  # on elements. Set to true to disable this detection.
  # Default: false
  no_cdp: false

  # Disable automatic form filling during crawling.
  # When false (default), the crawler automatically fills and submits
  # forms it encounters. Set to true to skip form interactions.
  # Default: false
  no_forms: false

# ============================================================================
# Known Issue Scan
# ============================================================================
# Run nuclei templates against in-scope targets using the nuclei Go library.
# KnownIssueScan complements Vigolium's precision scanning with nuclei's broad template
# coverage for misconfigurations, exposures, and known CVEs.
#
# Managed by scanning_strategy; override with CLI flag: --known-issue-scan
# Speed control (concurrency, rate_limit, timeout) is configured in scanning_pace.known_issue_scan.
known_issue_scan:
  # Nuclei template tags to include (empty = all templates).
  # Default: [] (run all templates)
  tags: []
  # Example: run only specific tag categories:
  # tags:
  #   - cve
  #   - misconfig
  #   - exposure

  # Nuclei template tags to exclude.
  # Default: [dos]
  exclude_tags:
    - dos

  # Filter templates by severity (empty = all severities).
  # Options: critical, high, medium, low, info
  # Default: [] (all severities)
  severities: []
  # Example: only run critical and high severity templates:
  # severities:
  #   - critical
  #   - high

  # Custom nuclei templates directory.
  # Leave empty to use the default nuclei-templates location.
  # Supports ~ expansion.
  # Default: "" (uses nuclei default templates)
  templates_dir: ""

  # Enrich known-issue-scan targets with paths discovered in previous phases.
  # When true, nuclei templates are run against individual path prefixes
  # found during discovery/spidering (increases coverage but can slow down scans).
  # When false, only host-level URLs are used as targets.
  # Default: true
  enrich_targets: false

# ============================================================================
# Pre-Scan External Intelligence Harvester
# ============================================================================
# Collects URLs from external intelligence sources before scanning.
# Discovered URLs are fed into the scan pipeline for vulnerability analysis.
# Managed by scanning_strategy; override with CLI flag: --external-harvest
# Timeout is configured in scanning_pace.external_harvester.max_duration.
external_harvester:
  # External sources to query for URLs.
  # Free sources (no API key): wayback, commoncrawl, alienvault
  # Keyed sources (require api_keys): urlscan, virustotal
  # Default: [wayback, commoncrawl, alienvault]
  sources:
    - wayback
    - commoncrawl
    - alienvault

  # API keys for external sources that require authentication.
  # Use ${ENV_VAR} syntax to read from environment variables.
  api_keys:
    urlscan: ${URLSCAN_API_KEY}
    virustotal: ${VIRUSTOTAL_API_KEY}

# ============================================================================
# AI Agent Integration
# ============================================================================
# Configure AI agent backends for automated analysis.
# Agents are invoked via the CLI ("vigolium agent") or the REST API.
# Each agent is an external command that receives a prompt on stdin
# and returns structured results.
#
# Communication protocols: "sdk", "codex-sdk", "opencode-sdk", "pipe" (default).
# See the backends section below for details on each protocol.
#
# Manage agent runs at runtime:
#   POST /api/agent/run/query      — single-shot prompt execution
#   POST /api/agent/run/autopilot  — autonomous scanning session
#   GET  /api/agent/status/list    — list all runs
#   GET  /api/agent/status/:id     — check a specific run
agent:
  # Default agent backend to use when none is specified.
  # Must match a key in the backends map below.
  # Default: claude
  default_agent: claude

  # Stream agent output to stdout in real-time.
  # When true (default), agent message text appears incrementally as it is produced.
  # Set to false to buffer output and display only after the agent completes.
  # Only affects CLI mode; API/server mode is unaffected.
  # Default: true
  stream: true

  # Directory containing prompt template files (.md).
  # Templates are referenced by name (filename without extension)
  # via --prompt-template flag or API prompt_template field.
  # Subdirectories are searched recursively. Built-in templates are
  # organized into sast/ (code review) and analysis/ (scan input generation).
  # Supports ~ expansion.
  # Default: ~/.vigolium/prompts/
  templates_dir: ~/.vigolium/prompts/

  # Directory for agent run session artifacts (output.txt, extensions/, plan.json).
  # Each agent run creates a subdirectory under this path.
  # Supports ~ expansion.
  # Default: ~/.vigolium/agent-sessions/
  sessions_dir: ~/.vigolium/agent-sessions/

  # --------------------------------------------------------------------------
  # LLM Configuration (Direct API)
  # --------------------------------------------------------------------------
  # Settings for direct LLM API calls used by JavaScript extension agent APIs
  # (vigolium.agent.chat / vigolium.agent.analyze). These calls bypass the
  # agent backends above and call the LLM provider API directly.
  llm:
    # LLM provider to use.
    # Options: "anthropic", "openai"
    # Default: anthropic
    provider: anthropic

    # Model identifier.
    # Examples: "claude-sonnet-4-20250514", "gpt-4o"
    # Default: claude-sonnet-4-20250514
    model: claude-sonnet-4-20250514

    # API key (inline). Prefer api_key_env for security.
    # IMPORTANT: Never commit API keys to git!
    # Default: "" (empty, uses api_key_env)
    api_key: ""

    # Environment variable name containing the API key.
    # Default: ANTHROPIC_API_KEY (for anthropic) or OPENAI_API_KEY (for openai)
    api_key_env: ""

    # Custom base URL for OpenAI-compatible providers.
    # Leave empty for default provider endpoints.
    # Default: "" (uses provider default)
    base_url: ""

    # Maximum tokens in the LLM response.
    # Default: 4096
    max_tokens: 4096

    # Sampling temperature (0.0 = deterministic, 1.0 = creative).
    # Default: 0.0
    temperature: 0.0

    # LRU cache size (number of entries). Set to 0 to disable caching.
    # Default: 256
    cache_size: 256

    # Cache entry TTL in seconds.
    # Default: 300 (5 minutes)
    cache_ttl: 300

  # --------------------------------------------------------------------------
  # MCP Server Configuration
  # --------------------------------------------------------------------------
  # Attach Model Context Protocol (MCP) servers to agent sessions.
  # MCP servers provide tools (e.g., Playwright browser, file search, databases)
  # that the agent can invoke during execution.
  #
  # When mcp_enabled is true, the global mcp_servers listed here are attached
  # to all agent sessions (merged with any per-backend mcp_servers).
  # Per-backend servers take precedence on name collision.
  #
  # Can also be enabled per-run with the --mcp-enabled flag in autopilot mode.
  # Default: false
  mcp_enabled: false

  # Global MCP servers available to all agent backends when mcp_enabled is true.
  # Each server uses either stdio transport (command + args) or HTTP transport (url).
  mcp_servers:
    # Example: Playwright browser for DOM testing and screenshot capture
    # - name: playwright
    #   command: npx
    #   args: ["-y", "@anthropic-ai/mcp-server-playwright"]

    # Example: Filesystem search server
    # - name: filesystem
    #   command: npx
    #   args: ["-y", "@anthropic-ai/mcp-server-filesystem", "/path/to/project"]

    # Example: Remote MCP server via HTTP
    # - name: custom-tools
    #   url: http://localhost:8080/mcp

  # --------------------------------------------------------------------------
  # Warm Session Pooling
  # --------------------------------------------------------------------------
  # Keep agent subprocesses alive between runs to avoid cold-start latency.
  # When enabled, after an agent run completes the subprocess stays warm in a
  # pool and is reused for subsequent runs with the same agent backend.
  warm_session:
    # Enable warm session pooling.
    # Default: false
    enable: false

    # Seconds to keep idle sessions alive before terminating.
    # Default: 300 (5 minutes)
    idle_timeout: 300

    # Maximum number of concurrent warm sessions.
    # Default: 2
    max_sessions: 2

  # --------------------------------------------------------------------------
  # Browser Automation (agent-browser)
  # --------------------------------------------------------------------------
  # When enabled, agents gain access to agent-browser CLI for browser-based
  # authentication, login capture, and interaction with JavaScript-heavy SPAs.
  # Requires agent-browser to be installed and in $PATH.
  # Use --browser CLI flag to override per-run.
  browser:
    # Enable agent-browser integration.
    # Default: false
    enable: false

    # Path to agent-browser binary (default: "agent-browser" via $PATH).
    # binary_path: /usr/local/bin/agent-browser

  # --------------------------------------------------------------------------
  # Context Limits (DB Enrichment)
  # --------------------------------------------------------------------------
  # Controls how much data is pulled from the database when enriching agent
  # prompts with existing scan context (findings, endpoints, etc.).
  context_limits:
    # Maximum number of findings to include in agent context.
    # Default: 50
    max_findings: 50

    # Maximum number of endpoints to include.
    # Default: 100
    max_endpoints: 100

    # Maximum number of high-risk items to include.
    # Default: 20
    max_high_risk: 20

    # Minimum risk score threshold for inclusion.
    # Default: 50
    min_risk_score: 50

  # --------------------------------------------------------------------------
  # Autopilot Guardrails (SDK Mode Safety)
  # --------------------------------------------------------------------------
  # Safety and observability controls for autonomous SDK agent mode.
  guardrails:
    # Log all agent tool invocations at INFO level for auditing.
    # Default: false
    log_commands: false

    # Hard ceiling on agent conversation turns (0 = no override).
    # Default: 0
    max_turns: 0

    # Extra tools to block in SDK mode (in addition to built-in blocklist).
    # Default: []
    disallowed_tools: []
    # Example: block file editing and writing in read-only mode:
    # disallowed_tools:
    #   - Edit
    #   - Write

  # --------------------------------------------------------------------------
  # Archon Audit Integration
  # --------------------------------------------------------------------------
  # Source security audit agent. When enabled and --source is provided,
  # swarm launches archon-audit in the background, while autopilot runs
  # archon-audit first and then starts the autonomous operator using the
  # prepared whitebox context.
  archon:
    # Enable archon-audit integration.
    # Default: false
    enable: false

    # Path to archon-audit harness directory.
    # Default: ~/.vigolium/archon-audit/
    # plugin_dir: ~/.vigolium/archon-audit/

    # Audit mode: "deep" (11-phase), "scan" (6-phase), or "lite" (3-phase).
    # Default: lite
    mode: lite

    # Agent CLI platform: "claude", "codex", or "opencode".
    # Default: claude
    platform: claude

    # Seconds between state synchronization with the parent agent.
    # Default: 30
    sync_interval: 30

  # --------------------------------------------------------------------------
  # Agent Backend Definitions
  # --------------------------------------------------------------------------
  # Each entry defines an external command that acts as an AI agent.
  # Set "protocol" to "sdk", "codex-sdk", "opencode-sdk", or "pipe" (default).
  #
  # Protocol comparison:
  #   sdk:          Claude Agent SDK (JSON-lines). Full CLI tools (Read, Grep, Glob,
  #                 Bash, Edit, Write). Best output quality. Requires "claude" CLI.
  #   codex-sdk:    Codex native JSON-RPC v2. Requires "codex" CLI in PATH.
  #   opencode-sdk: OpenCode REST API + SSE streaming. Requires "opencode" CLI.
  #   pipe:         Simple stdin/stdout. Prompt piped to stdin, output from stdout.
  #
  # Model injection per provider (the "model" field works automatically):
  #   Claude (sdk): passed via SDK Options.Model
  #   Gemini:       injected as "-m <model>" CLI arg
  #   OpenCode:     injected via OPENCODE_CONFIG_CONTENT env var
  #   Codex:        injected as "--model <model>" CLI arg
  #   Cursor:       injected as "--model <model>" CLI arg
  #
  # OpenCode uses "provider_config" for thinking, permissions, custom API.
  backends:

    # ── Claude Code (SDK — recommended, default) ────────────────────
    # Uses the Claude Agent SDK (JSON-lines protocol) for full CLI tool access.
    # Provides Read, Grep, Glob, Bash, Edit, Write — all standard Claude Code tools.
    # Requires "claude" CLI in PATH.
    claude:
      command: claude
      description: "Anthropic Claude Code (SDK protocol)"
      protocol: sdk
      model: sonnet                    # "sonnet", "opus", "haiku", or full model ID
      # Per-backend MCP servers (in addition to global mcp_servers when mcp_enabled is true).
      # mcp_servers:
      #   - name: playwright
      #     command: npx
      #     args: ["-y", "@anthropic-ai/mcp-server-playwright"]

    # ── Claude Code (pipe mode) ────────────────────────────────────
    claude-cli:
      command: claude
      args: ["--dangerously-skip-permissions", "-p"]
      description: "Anthropic Claude Code (pipe mode)"

    # ── OpenCode (native SDK — recommended) ─────────────────────────
    # Uses the OpenCode native REST API + SSE streaming protocol.
    # Full tool access. Requires "opencode" CLI in PATH.
    opencode:
      command: opencode
      description: "OpenCode agent (native SDK)"
      protocol: opencode-sdk
      # model: "anthropic/claude-sonnet-4-5"
      provider_config:
        thinking:
          enabled: false               # extended thinking toggle
          budget_tokens: 16000         # token budget when thinking is enabled
        permission:                    # auto-approval for autonomous scanning
          read: allow                  # "allow" = auto-approve, "" = prompt
          edit: allow
          write: allow
          bash: allow
        # api_url: ""                  # custom OpenAI-compatible base URL
        # api_key: "${OPENCODE_API_KEY}"  # API key for custom providers

    # ── OpenCode (pipe mode) ───────────────────────────────────────
    opencode-cli:
      command: opencode
      args: ["run"]
      description: "OpenCode agent (pipe mode)"

    # ── Gemini (pipe mode) ─────────────────────────────────────────
    gemini:
      command: gemini
      args: ["-p"]
      description: "Google Gemini CLI (pipe mode)"

    # ── Codex (native SDK — recommended) ────────────────────────────
    # Uses Codex native JSON-RPC v2 protocol. Requires "codex" CLI in PATH.
    codex:
      command: codex
      description: "OpenAI Codex CLI (native JSON-RPC v2)"
      protocol: codex-sdk
      # model: "o3"

    # ── Cursor (pipe mode) ─────────────────────────────────────────
    # Model injected as: cursor --model <model> -p
    cursor:
      command: cursor
      args: ["-p"]
      description: "Cursor AI editor (pipe mode)"
      # model: "claude-sonnet-4-5"
