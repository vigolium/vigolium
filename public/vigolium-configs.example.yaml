# Vigolium Configuration File
# This is an example configuration file with all available settings.
# Copy this file to ~/.vigolium/vigolium-configs.yaml and customize as needed.
#
# Default location: ~/.vigolium/vigolium-configs.yaml
# Custom location: Use --config flag with any vigolium command

# ============================================================================
# Server Configuration
# ============================================================================
# Settings for the API server mode (vigolium server).
server:
  # API key for authenticating server requests.
  # Auto-generated on first run. Override with VIGOLIUM_API_KEY env var.
  # Clients send this in the Authorization: Bearer <key> header.
  auth_api_key: "auto-generated-on-first-run"

  # Port for the main API service.
  # Default: 9002
  service_port: 9002

  # Port for the transparent HTTP ingestion proxy.
  # Set to 0 (default) to disable. When enabled, HTTP traffic through
  # this proxy is forwarded to the original destination and recorded.
  # HTTPS CONNECT tunneling passes through without recording.
  ingest_proxy_port: 0

  # CORS allowed origins for the API server.
  # Options:
  #   "reflect-origin" — echoes the requesting Origin back (allows credentials)
  #   "*"              — allow all origins (no credentials)
  #   ""               — disable CORS middleware entirely
  #   "https://app.example.com, https://admin.example.com" — comma-separated allowlist
  # Default: reflect-origin
  cors_allowed_origins: reflect-origin

  # Enable Prometheus metrics endpoint at /metrics.
  # Exposes server, queue, scan, module, and database metrics
  # in Prometheus text format for monitoring and alerting.
  # Default: true
  enable_metrics: true

  # Maximum concurrent heavy agent runs (autopilot/swarm) via the API.
  # Limits resource usage from long-running autonomous agent sessions.
  # Default: 5
  agent_heavy_max: 5

  # Maximum concurrent light agent runs (query/chat) via the API.
  # Default: 10
  agent_light_max: 10

  # Maximum time to wait for an agent slot when all slots are busy.
  # Requests that exceed this timeout receive a 429 Too Many Requests response.
  # Format: Go duration string (e.g., "30s", "1m", "5s").
  # Default: 30s
  agent_queue_timeout: 30s

  # Optional license identifier surfaced in /server-info for the UI to display
  # (e.g., "community", "enterprise", or a customer/tenant tag).
  # Leave empty to omit from the response.
  license: "enterprise"

# ============================================================================
# Database Configuration
# ============================================================================
# Vigolium stores HTTP requests, responses, and findings in a database
# for historical analysis, querying, and reporting.
database:
  # Enable or disable database storage
  # Default: true (enabled by default for all scans)
  enabled: true

  # Database driver to use
  # Options: "sqlite" or "postgres"
  # Default: "sqlite"
  driver: sqlite

  # SQLite Configuration (used when driver=sqlite)
  sqlite:
    # Path to SQLite database file
    # Supports ~ expansion for home directory
    # Default: ~/.vigolium/database-vgnm.sqlite
    path: ~/.vigolium/database-vgnm.sqlite

    # Busy timeout in milliseconds
    # How long to wait when database is locked
    # Default: 15000 (15 seconds)
    busy_timeout: 15000

    # Journal mode
    # Options: DELETE, TRUNCATE, PERSIST, MEMORY, WAL, OFF
    # Recommended: WAL (Write-Ahead Logging) for better concurrency
    # Default: WAL
    journal_mode: WAL

    # Synchronous mode
    # Options: OFF, NORMAL, FULL, EXTRA
    # OFF = fastest but unsafe (risk of corruption)
    # NORMAL = balanced (recommended)
    # FULL = safest but slower
    # Default: NORMAL
    synchronous: NORMAL

    # Cache size in KB (or pages if negative)
    # Larger cache = better performance for large datasets
    # Default: 10000 (10MB)
    cache_size: 10000

  # PostgreSQL Configuration (used when driver=postgres)
  postgres:
    # Database host
    # Default: localhost
    host: localhost

    # Database port
    # Default: 5432
    port: 5432

    # Database user
    # Default: vigolium
    user: vigolium

    # Database password
    # Use ${ENV_VAR} syntax to read from environment variable
    # Example: ${VIGOLIUM_DB_PASSWORD}
    # IMPORTANT: Never commit passwords to git!
    # Default: "" (empty)
    password: ""

    # Database name
    # Default: vigolium
    database: vigolium

    # SSL mode
    # Options: disable, require, verify-ca, verify-full
    # Default: disable
    sslmode: disable

    # Maximum number of open connections
    # Default: 25
    max_open_conns: 25

    # Maximum number of idle connections in pool
    # Default: 5
    max_idle_conns: 5

    # Maximum lifetime of a connection
    # Format: duration string (e.g., "5m", "1h", "30s")
    # Default: 5m
    conn_max_lifetime: 5m

# ============================================================================
# Scanning Strategy
# ============================================================================
# Named presets that control which scan phases are enabled.
# Select a strategy via --strategy flag or set the default below.
# Individual phase flags (--discover, --known-issue-scan, --external-harvest) override the strategy.
scanning_strategy:
  default_strategy: 'balanced'

  # Heuristics check level before spidering/external-harvest phases.
  # Probes root page of each CLI target to decide if spidering is worthwhile.
  #   none:     skip heuristics check
  #   basic:    check if root is blank vs content, detect JSON/XML APIs
  #   advanced: basic + SPA detection, link counting
  heuristics_check: 'basic'

  # Scanning profile preset (name from profiles_dir or path to YAML file).
  # A profile bundles strategy + pace + module selection + scope + discovery config
  # into a single file, overriding the main config when selected.
  # Use --scanning-profile flag or set here.
  # When empty, no profile is loaded and default_strategy is used as-is.
  scanning_profile: ""

  # Directory containing scanning profile YAML files.
  # Profile names correspond to filenames without the .yaml extension.
  # List available profiles with: vigolium strategy ls
  profiles_dir: ~/.vigolium/profiles/

  # --------------------------------------------------------------------------
  # Session Strategy
  # --------------------------------------------------------------------------
  # Controls how authentication sessions behave during scanning.
  # Sessions are loaded from --session, --session-file, or --auth-config flags.
  # See docs/running-scan/authenticated-scan.md for the full guide.
  session:
    # Directory where session YAML files are stored.
    # When --session-file receives a bare name (e.g. "myapp"), the scanner
    # resolves it as <session_dir>/myapp.yaml.
    # Supports ~ expansion.
    # Default: ~/.vigolium/sessions/
    session_dir: ~/.vigolium/sessions/

    # Apply primary session headers during discovery and spidering phases.
    # When true, the primary session's credentials (cookies, tokens) are
    # included in all discovery/spidering requests so authenticated content
    # is discovered.
    # When false, discovery and spidering run unauthenticated — useful for
    # mapping the public attack surface before scanning authenticated.
    # Default: true
    use_in_discovery: true

    # Enable cross-session IDOR/BOLA replay with compare sessions.
    # When true and multiple sessions are defined, the authz-compare module
    # replays primary-session requests with each compare session's credentials
    # to detect authorization bypass.
    # When false, compare sessions are ignored even if defined — use this
    # when you only need authenticated scanning without authorization testing.
    # Default: true
    compare_enabled: true

    # Re-execute login flows at this interval to refresh expiring tokens.
    # Useful for long-running scans where tokens expire mid-scan.
    # Format: Go duration string (e.g. "15m", "1h", "30m").
    # Empty or "0" means login once at scan start and never refresh.
    # Default: "" (disabled)
    reauth_interval: ""

    # Trigger reactive re-authentication when the primary session receives
    # one of these HTTP status codes. When triggered, the login flow is
    # re-executed immediately and the failed request is retried.
    # Common values: [401, 403]
    # Default: [] (disabled)
    reauth_on_status: []
    # Example: re-authenticate on 401 Unauthorized and 403 Forbidden:
    # reauth_on_status: [401, 403]

    # URL to GET after login to verify that extracted credentials work.
    # The scanner checks for a 2xx response before proceeding with the scan.
    # Can be a relative path (resolved against the target) or absolute URL.
    # Empty means no validation — credentials are used as-is.
    # Default: "" (disabled)
    validate_url: ""
    # Example: validate against a "who am I" endpoint:
    # validate_url: "/api/me"

  lite:
    external_harvesting: false
    discovery: false
    spidering: false
    known_issue_scan: false
    dynamic-assessment: true

  balanced:
    external_harvesting: false
    discovery: true
    spidering: true
    known_issue_scan: true
    dynamic-assessment: true

  deep:
    external_harvesting: true
    discovery: true
    spidering: true
    known_issue_scan: true
    dynamic-assessment: true

  whitebox:
    external_harvesting: false
    source_aware: true
    discovery: true
    spidering: false
    known_issue_scan: true
    dynamic-assessment: true

# ============================================================================
# Scanning Pace (Speed Control)
# ============================================================================
# Centralized speed control parameters. Common values serve as baseline
# for all phases; per-phase subsections override specific values.
#
# Precedence (highest to lowest):
#   1. CLI flags (-c, --max-per-host, --scanning-max-duration, --discover-max-time)
#   2. scanning_pace per-phase overrides
#   3. scanning_pace common values
#   4. Built-in defaults
scanning_pace:
  ## Common defaults (inherited by all phases unless overridden)
  concurrency: 50        # Worker/thread count
  rate_limit: 100        # Requests/sec (applies to KnownIssueScan currently)
  max_per_host: 20        # Per-host concurrency cap
  max_duration: 1h       # Base duration for all phases (per-phase factors scale this)

  # Per-phase overrides (only set fields override common values)
  # Factors scale the common value (e.g. duration_factor: 2.0 = 2x base max_duration).
  # Explicit values always take priority over factors.
  discovery:
  #   concurrency: 30
  #   concurrency_factor: 0.6     # alternative: 60% of common concurrency
  #   max_duration: 1h
    duration_factor: 0.5          # 0.5x base → 22m30s
  known_issue_scan:
    duration_factor: 1.0          # 1x base → 45m
  spidering:
    duration_factor: 0.1          # 0.1x base → 4m30s
  external_harvester:
    duration_factor: 0.1          # 0.1x base → 4m30s
  dynamic-assessment:
    duration_factor: 1.0          # 1x base → 45m

# ============================================================================
# Notification Configuration
# ============================================================================
# Configure notifications for scan findings.
# Supports Telegram and Discord backends.
# Use ${ENV_VAR} syntax to read secrets from environment variables.
notify:
  # Enable or disable notifications
  # Default: false
  enabled: false

  # Severity levels to notify on
  # Options: critical, high, medium, low, info, all
  # Default: [high, critical, medium]
  severities:
    - high
    - critical
    - medium

  # Telegram notification settings
  telegram:
    # Bot token (or set TELEGRAM_BOT_TOKEN env)
    bot_token: ${TELEGRAM_BOT_TOKEN}
    # Chat ID (or set TELEGRAM_CHAT_ID env)
    chat_id: ${TELEGRAM_CHAT_ID}

  # Discord notification settings
  discord:
    # Webhook URL (or set DISCORD_WEBHOOK_URL env)
    webhook_url: ${DISCORD_WEBHOOK_URL}

# ============================================================================
# Dynamic Assessment Configuration
# ============================================================================
# Settings for the dynamic-assessment scan phase (Phase 4): which scanner
# modules are enabled and JavaScript extension configuration.
dynamic-assessment:
  # Maximum feedback rounds (re-scanning newly discovered URLs).
  # Default: 1
  max_feedback_rounds: 1

  # Maximum findings emitted per module before suppression.
  # Prevents noisy modules from flooding results. Set to 0 for unlimited.
  # Override with CLI flag: --max-findings-per-module
  # Default: 15
  max_findings_per_module: 15

  # --------------------------------------------------------------------------
  # Enabled Modules
  # --------------------------------------------------------------------------
  # Control which scanner modules are loaded when scanning with "-m all" (the default).
  # Use ["all"] to enable every registered module, or list specific module IDs.
  # Explicit CLI selection (e.g. "-m sqli,xss") always overrides this setting.
  #
  # Run "vigolium module ls" to see all available module IDs.
  enabled_modules:
    # Active (fuzzing) modules to load
    # Default: [all]
    active_modules:
      - all
    # Passive (observation) modules to load
    # Default: [all]
    passive_modules:
      - all
    # Example: run only specific active modules while keeping all passive modules:
    # active_modules:
    #   - sqli-error-based
    #   - xss-reflected-brutelogic
    # passive_modules:
    #   - all

  # --------------------------------------------------------------------------
  # JavaScript Extensions
  # --------------------------------------------------------------------------
  # Load JavaScript-based extensions for custom active/passive modules
  # and pre/post hooks. Powered by goja (ES5.1 compatible).
  extensions:
    # Enable or disable JS extensions
    # Default: false
    enabled: false

    # Directory to scan for .js extension files
    # Default: ~/.vigolium/extensions/
    extension_dir: ~/.vigolium/extensions/

    # Explicit script paths (in addition to extension_dir)
    custom_dir: []

    # User-defined variables accessible as vigolium.config.* in scripts
    variables: {}
      # collaborator_domain: "collab.example.com"
      # api_key: "${MY_API_KEY}"

    # Resource limits for script execution
    limits:
      # Maximum execution time per script invocation
      # Default: 30s
      timeout: 30s

      # Maximum memory in MB per VM instance
      # Default: 128
      max_memory_mb: 128

# ============================================================================
# OAST (Out-of-Band Application Security Testing)
# ============================================================================
# Detects blind vulnerabilities (SSRF, XXE, RCE, etc.) by injecting callback
# URLs that phone home when triggered. Uses an interactsh server to receive
# DNS/HTTP/SMTP interactions from the target.
#
# Works out of the box with the public oast.pro server — no setup needed.
# For private/self-hosted interactsh servers, set server_url and token.
oast:
  # Enable OAST callback detection during active scanning.
  # When enabled, modules that support blind testing (e.g. oast-probe, ssrf-detection)
  # will inject callback URLs and listen for out-of-band interactions.
  # Default: true
  enabled: true

  # Interactsh server URL for receiving callbacks.
  # The public "oast.pro" server works without authentication.
  # For private deployments: "your-interactsh.company.com"
  # Supports ${VAR:-default} syntax for environment variable expansion.
  # Default: oast.pro
  server_url: ${VIGOLIUM_OAST_DOMAIN:-oast.pro}

  # Authentication token for private interactsh servers.
  # Not required for the public oast.pro server.
  # Supports ${VAR:-default} syntax for environment variable expansion.
  # Default: "" (no auth)
  token: ${VIGOLIUM_OAST_TOKEN:-}

  # Seconds between polling the interactsh server for new interactions.
  # Lower values detect callbacks faster but generate more traffic.
  # Default: 5
  poll_interval: 5

  # Seconds to keep polling after the scan ends, catching late callbacks.
  # Some blind vulnerabilities trigger delayed interactions (async jobs,
  # queued emails, cron tasks). Increase for targets with known async processing.
  # Default: 10
  grace_period: 10

  # Fixed OAST callback URL. When set, all OAST modules use this URL
  # instead of auto-generating unique URLs via interactsh.
  # Useful for custom callback servers or manual testing.
  # Default: "" (auto-generate via interactsh)
  oast_url: ""

  # Enable blind XSS detection during active scanning.
  # When enabled, modules will inject <script src="..."> payloads
  # using the blind_xss_src URL to detect stored/blind XSS.
  # Default: false
  enabled_blind_xss: false

  # JavaScript payload URL for blind XSS detection.
  # This URL is injected as <script src="..."> in parameters.
  # Use a service like xsshunter or your own callback server.
  # Default: "" (no blind XSS probing)
  blind_xss_src: ""

# ============================================================================
# Mutation Strategy Configuration
# ============================================================================
# Controls how request values are mutated during scanning and what default
# values to use per field type when OpenAPI specs lack examples.
mutation_strategy:
  # Mutation modes to apply for payloads.
  # Each request is scanned once per mode, so more modes = more thorough but slower.
  # Options: "replace", "append", "prepend"
  # Default: ["append"]
  default_modes:
    - append
  # Example: scan with both append and replace strategies:
  # default_modes:
  #   - append
  #   - replace

  # Default example values per field type.
  # Used by the OpenAPI parser when specs lack examples for parameters/fields.
  # The first value in each list is used as the primary example.
  field_type_defaults:
    string:
      - "test"
      - "example"
      - "sample"
    slug:
      - "test-slug"
      - "example-item"
      - "sample-post"
    json:
      - '{"key":"value"}'
      - '{"test":true}'
      - '{"id":123}'
    "null":
      - "null"
      - ""
      - "nil"
    date:
      - "2026-02-16"
      - "2026-01-01"
      - "2025-12-31"
    datetime:
      - "2026-02-16T03:00:00Z"
      - "2026-01-01T00:00:00Z"
      - "2025-12-31T23:59:59Z"
    number:
      - "123"
      - "456.789"
      - "0"
    float:
      - "123.45"
      - "0.001"
      - "999.99"
    integer:
      - "1"
      - "100"
      - "999"
    long:
