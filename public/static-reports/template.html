XSS Light - URL Parameters\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nCharacter-based Reflected XSS detection for URL query parameters. Applies POST-to-GET\\\\nconversion when applicable and tests URL parameters for reflection-based XSS.\\\\n\\\\n## Notes\\\\n- Focuses specifically on URL query string parameters\\\\n- Converts POST parameters to GET for broader coverage when applicable\\\\n\\\\n## References\\\\n- https://portswigger.net/burp/documentation/scanner/xss\\",\\"short_description\\":\\"Detects XSS in URL parameters (POST→GET conversion when applicable)\\",\\"confirmation_criteria\\":\\"Confirmed when URL query parameter values are reflected in the response with exploitable character handling\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"xss-light-path\\",\\"name\\":\\"XSS Light - Path Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nCharacter-based Reflected XSS detection in URL path segments. Tests path components\\\\nfor reflection using recursive, cut, and append injection strategies.\\\\n\\\\n## Notes\\\\n- Targets URL path segments rather than query parameters\\\\n- Uses multiple path manipulation strategies for thorough coverage\\\\n\\\\n## References\\\\n- https://portswigger.net/burp/documentation/scanner/xss\\",\\"short_description\\":\\"Detects XSS via path manipulation (recursive, cut, append)\\",\\"confirmation_criteria\\":\\"Confirmed when injected path segment characters are reflected in the response without sanitization\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"xss-light-param-discovery\\",\\"name\\":\\"XSS Light - Parameter Discovery\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDiscovers and tests hidden parameters that reflect in the response. Brute-forces common\\\\nparameter names and checks if values are echoed back, then tests for XSS.\\\\n\\\\n## Notes\\\\n- Runs per-request to discover parameters not visible in the original request\\\\n- Combines parameter discovery with XSS Light transform analysis\\\\n\\\\n## References\\\\n- https://portswigger.net/burp/documentation/scanner/xss\\",\\"short_description\\":\\"Detects XSS via echo parameter discovery\\",\\"confirmation_criteria\\":\\"Confirmed when a discovered hidden parameter reflects injected characters without proper encoding\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"reflected-ssti\\",\\"name\\":\\"Reflected SSTI\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Server-Side Template Injection vulnerabilities by injecting math expressions\\\\n(e.g., {{7*7}}) and checking if the computed result appears in the response.\\\\n\\\\n## Notes\\\\n- Tests multiple template engine syntaxes (Jinja2, Twig, Freemarker, etc.)\\\\n- Uses unique random values to avoid false positives from cached responses\\\\n- Confirmed by matching computed mathematical results in the response\\\\n\\\\n## References\\\\n- https://portswigger.net/research/server-side-template-injection\\",\\"short_description\\":\\"Detects SSTI via math expression evaluation\\",\\"confirmation_criteria\\":\\"Confirmed when injected math expressions (e.g., {{7*7}}=49) are evaluated and the computed result appears in the response\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"ssti-detection\\",\\"name\\":\\"SSTI Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Server-Side Template Injection via Boolean Error-Based Blind technique.\\\\nSends valid and invalid template expressions and compares response differences.\\\\n\\\\n## Notes\\\\n- Uses differential analysis: valid template syntax vs invalid syntax\\\\n- Detects template engines by error response patterns\\\\n- Complements the Reflected SSTI module with blind detection\\\\n\\\\n## References\\\\n- https://portswigger.net/research/server-side-template-injection\\",\\"short_description\\":\\"Diff-based SSTI detection via error responses\\",\\"confirmation_criteria\\":\\"Confirmed when valid template expressions produce different responses than syntactically invalid ones, indicating server-side evaluation\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"csti-detection\\",\\"name\\":\\"Client-Side Template Injection (CSTI)\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Client-Side Template Injection vulnerabilities by injecting template expressions\\\\n(e.g., {{7*7}}) and checking if the expression is reflected literally (not HTML-encoded)\\\\nin the response body within a client-side template framework scope.\\\\n\\\\n## Notes\\\\n- Different from server-side SSTI: checks for literal reflection, not evaluation\\\\n- Fingerprints AngularJS and Vue.js frameworks per-host (cached)\\\\n- Only scans hosts where a client-side template framework is detected\\\\n- Verifies the expression is not HTML-encoded (which would prevent exploitation)\\\\n- Uses double confirmation with random anchors to reduce false positives\\\\n\\\\n## References\\\\n- https://portswigger.net/research/xss-without-html-client-side-template-injection-with-angularjs\\\\n- https://portswigger.net/web-security/cross-site-scripting/contexts/client-side-template-injection\\",\\"short_description\\":\\"Detects client-side template injection in AngularJS/Vue.js applications\\",\\"confirmation_criteria\\":\\"Confirmed when injected template expressions (e.g., {{7*7}}) are reflected literally in the HTML response within a client-side framework scope\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"angular-template-injection\\",\\"name\\":\\"Angular Template Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Angular template injection vulnerabilities by injecting math expressions inside\\\\nAngular template syntax (e.g., {{7*7}}) and checking if the computed result appears in\\\\nthe response. This indicates the Angular engine is evaluating user-controlled expressions,\\\\nwhich can lead to arbitrary JavaScript execution.\\\\n\\\\n## Notes\\\\n- Tests basic Angular expression evaluation ({{mathA*mathB}})\\\\n- Tests Angular 1.x sandbox bypass via constructor chain\\\\n- Uses double confirmation with random math anchors to reduce false positives\\\\n- Each confirmation attempt uses different random values\\\\n- Checks that computed result appears in response but not in baseline\\\\n\\\\n## References\\\\n- https://portswigger.net/research/xss-without-html-client-side-template-injection-with-angularjs\\\\n- https://github.com/nicedayzhu/angular-sandbox-bypass-collection\\",\\"short_description\\":\\"Detects Angular template injection via expression evaluation\\",\\"confirmation_criteria\\":\\"Confirmed when injected Angular math expressions are evaluated and the computed result appears in the response across multiple attempts\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"lfi-generic\\",\\"name\\":\\"LFI Generic\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Local File Inclusion vulnerabilities by injecting path traversal payloads\\\\nand checking for known file contents (e.g., /etc/passwd, win.ini) in responses.\\\\n\\\\n## Notes\\\\n- Tests each insertion point with multiple traversal depth levels\\\\n- Matches against known OS file content signatures\\\\n- Uses request deduplication to avoid redundant checks\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/11.1-Testing_for_Local_File_Inclusion\\",\\"short_description\\":\\"Detects LFI via path traversal payloads\\",\\"confirmation_criteria\\":\\"Confirmed when path traversal payloads cause known system file contents (e.g., /etc/passwd) to appear in the response\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"lfi-path-traversal\\",\\"name\\":\\"LFI Path Traversal\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Local File Inclusion vulnerabilities using advanced path traversal techniques\\\\nincluding null byte injection, double URL encoding, Unicode bypass characters, and\\\\nmulti-marker confirmation to reduce false positives.\\\\n\\\\n## Notes\\\\n- Complements lfi_generic with deeper traversal payloads and stronger confirmation\\\\n- Requires at least 2 markers to match in fuzzed response (not present in baseline)\\\\n- Body length delta check prevents matching on trivially similar responses\\\\n- Pre-filters insertion points by file-like parameter names and path-like values\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/11.1-Testing_for_Local_File_Inclusion\\\\n- https://github.com/swisskyrepo/PayloadsAllTheThings/tree/master/File%20Inclusion\\",\\"short_description\\":\\"Detects LFI via advanced path traversal, null bytes, encoding bypass, and multi-marker confirmation\\",\\"confirmation_criteria\\":\\"Confirmed when multiple file content markers appear in the response after injecting path traversal payloads and are absent from the baseline response\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sqli-error-based\\",\\"name\\":\\"SQLi Error Based\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects SQL injection vulnerabilities by injecting SQL syntax into parameters and\\\\nanalyzing response bodies for database error messages from MySQL, PostgreSQL, MSSQL,\\\\nOracle, and SQLite.\\\\n\\\\n## Notes\\\\n- Tests each insertion point independently\\\\n- Uses request deduplication to avoid redundant checks\\\\n- Skips hosts that have exceeded the error threshold\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/SQL_Injection\\",\\"short_description\\":\\"Detects SQLi via error messages\\",\\"confirmation_criteria\\":\\"Confirmed when injected SQL syntax triggers a database error pattern in the response body\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sqli-boolean-blind\\",\\"name\\":\\"Blind SQL Injection (Boolean-Based)\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for boolean-based blind SQL injection by sending paired TRUE/FALSE payloads and comparing\\\\nresponse differentials. Uses triple-verification to minimize false positives: TRUE and FALSE\\\\npayloads must produce consistently different responses across multiple requests.\\\\n\\\\n## Notes\\\\n- Sends TRUE and FALSE payload pairs to each injection point\\\\n- Compares responses using status code, body length differential, and content hash\\\\n- Triple-verification: confirms TRUE/FALSE differential is consistent across retries\\\\n- Tests string context, numeric context, and WAF bypass payloads\\\\n- Uses NoRedirects to capture TRUE/FALSE differential before redirect\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/Blind_SQL_Injection\\\\n- https://portswigger.net/web-security/sql-injection/blind\\",\\"short_description\\":\\"Detects boolean-based blind SQL injection vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when TRUE payloads consistently produce different responses from FALSE payloads across multiple verification requests\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sqli-time-blind\\",\\"name\\":\\"Blind SQL Injection (Time-Based)\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for time-based blind SQL injection by sending paired sleep/no-sleep payloads and\\\\nmeasuring response time differentials. Uses triple-verification (sleep, no-sleep, sleep)\\\\nto minimize false positives caused by network jitter or server load.\\\\n\\\\n## Notes\\\\n- Sends sleep and no-sleep payload pairs to each injection point\\\\n- Measures response time using wall-clock timing around each request\\\\n- Triple-verification: confirms sleep causes consistent delay across multiple requests\\\\n- Tests MySQL SLEEP, PostgreSQL pg_sleep, MSSQL WAITFOR DELAY, SQLite RANDOMBLOB, Oracle DBMS_PIPE\\\\n- Tests both string and numeric contexts\\\\n- Uses NoRedirects to capture timing before redirect\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/Blind_SQL_Injection\\\\n- https://portswigger.net/web-security/sql-injection/blind/lab-time-delays\\",\\"short_description\\":\\"Detects time-based blind SQL injection vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when sleep payloads consistently cause measurable time delays compared to no-sleep payloads across triple verification\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nosqli-error-based\\",\\"name\\":\\"NoSQLi Error Based\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects NoSQL injection vulnerabilities by injecting MongoDB/NoSQL operators and\\\\nsyntax into parameters and analyzing response bodies for database error messages.\\\\n\\\\n## Notes\\\\n- Tests each insertion point with NoSQL-specific payloads\\\\n- Detects MongoDB, CouchDB, and Cassandra error patterns\\\\n- Uses request deduplication to avoid redundant checks\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/05.6-Testing_for_NoSQL_Injection\\\\n- https://portswigger.net/web-security/nosql-injection\\",\\"short_description\\":\\"Detects NoSQL injection via error messages and operator injection\\",\\"confirmation_criteria\\":\\"Confirmed when injected NoSQL operators trigger database error patterns in the response body\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nosqli-operator-injection\\",\\"name\\":\\"NoSQL Operator Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for NoSQL injection by injecting MongoDB query operators ($ne, $gt, $regex,\\\\n$where) and detecting authentication bypass, data exfiltration, and behavioral\\\\nchanges. Complements nosqli_error_based by focusing on operator-level injection\\\\nrather than error messages.\\\\n\\\\n## Notes\\\\n- Payload selection adapts to insertion point type (JSON, URL, body)\\\\n- Four detection modes: auth bypass, size increase, boolean differential, time delay\\\\n- Skips when NoSQL error patterns are detected (deferred to nosqli_error_based)\\\\n- Deduplicates by request hash manager\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/05.6-Testing_for_NoSQL_Injection\\\\n- https://github.com/swisskyrepo/PayloadsAllTheThings/tree/master/NoSQL%20Injection\\",\\"short_description\\":\\"Detects MongoDB operator injection ($ne, $gt, $regex, $where) for auth bypass and data exfiltration\\",\\"confirmation_criteria\\":\\"Confirmed when NoSQL operator injection causes authentication bypass, data exfiltration, or measurable behavioral change\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"crlf-injection\\",\\"name\\":\\"CRLF Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects CRLF injection vulnerabilities in HTTP headers by injecting carriage return and\\\\nline feed characters and checking if they appear in response headers.\\\\n\\\\n## Notes\\\\n- Tests URL parameters for header injection via CRLF sequences\\\\n- Can lead to HTTP response splitting and header injection attacks\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/vulnerabilities/CRLF_Injection\\",\\"short_description\\":\\"Detects CRLF injection\\",\\"confirmation_criteria\\":\\"Confirmed when injected CRLF sequences appear in HTTP response headers, indicating header injection\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"code-exec\\",\\"name\\":\\"Code Execution (RCE)\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects OS Command Injection vulnerabilities using time-based blind detection. Injects\\\\nsleep/delay commands and measures response time differences to confirm execution.\\\\n\\\\n## Notes\\\\n- Uses time-based blind technique to avoid false positives\\\\n- Tests multiple shell syntaxes (bash, cmd, PowerShell)\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/Command_Injection\\\\n- https://portswigger.net/bappstore/3123d5b5f25c4128894d97ea1571571c\\",\\"short_description\\":\\"Detects OS command injection via time-based blind\\",\\"confirmation_criteria\\":\\"Confirmed when injected sleep/delay commands cause measurable response time increase matching the specified delay\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"input-behavior-probe\\",\\"name\\":\\"Input Behavior Probe\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nComprehensive behavior probing module that detects anomalous responses by\\\\ncomparing HTML tag structure and status codes against a baseline. Operates\\\\nat both request scope and insertion-point scope.\\\\n\\\\n## Probe Types\\\\n1. **Header probing** (per-request): Injects values into known security-relevant\\\\n   headers (X-Forwarded-Host, X-Original-URL, etc.) and weird header names.\\\\n2. **Path manipulation** (per-request): Applies prefix/postfix path traversal\\\\n   and encoding tricks to each URL path segment.\\\\n3. **Debug parameter injection** (per-request): Appends debug/admin parameters\\\\n   (debug=true, admin=1, etc.) to detect hidden debug modes.\\\\n4. **Polyglot fuzz** (per-insertion-point): Injects a polyglot payload to detect\\\\n   HTML tag structure changes (original behavior).\\\\n5. **Param char fuzzing** (per-insertion-point): Appends special characters to\\\\n   parameter values to detect parser-level behavior differences.\\\\n\\\\n## Notes\\\\n- Compares HTML tag counts and status codes between baseline and probed responses\\\\n- Low confidence; useful as a triage signal for manual investigation\\\\n- Per-request probes are deduped by host+path; per-IP probes are deduped by request hash\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/Fuzzing\\\\n- https://portswigger.net/research/backslash-powered-scanning\\",\\"short_description\\":\\"Detects behavior changes from header, path, debug param, and char probing\\",\\"confirmation_criteria\\":\\"Indicated when probed requests cause structural changes in the response HTML tag tree or notable status code transitions compared to the baseline\\",\\"severity\\":\\"suspect\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\",\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"xxe-generic\\",\\"name\\":\\"XXE Generic\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects XML External Entity (XXE) injection vulnerabilities in endpoints that accept\\\\nXML input by injecting entity declarations and checking for entity expansion.\\\\n\\\\n## Notes\\\\n- Tests XML body parameters for entity expansion\\\\n- Injects external entity declarations targeting known files\\\\n- Checks for entity value reflection in response body\\\\n- Complements the XML SAML Security module for non-SAML XML endpoints\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/vulnerabilities/XML_External_Entity_(XXE)_Processing\\\\n- https://portswigger.net/web-security/xxe\\",\\"short_description\\":\\"Detects XML external entity injection in generic XML endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when injected XML entities are expanded and their values appear in the response body\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"insecure-deserialization\\",\\"name\\":\\"Insecure Deserialization\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects insecure deserialization vulnerabilities by injecting serialized object payloads\\\\nand analyzing responses for deserialization error messages across multiple frameworks.\\\\n\\\\n## Notes\\\\n- Tests for Java, PHP, Python, Ruby, and .NET deserialization patterns\\\\n- Uses error-based detection to identify deserialization endpoints\\\\n- Analyzes response bodies for framework-specific error messages\\\\n- OWASP Top 10 2021: A08\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/16-Testing_for_HTTP_Incoming_Requests\\\\n- https://portswigger.net/web-security/deserialization\\",\\"short_description\\":\\"Detects insecure deserialization via error-based detection\\",\\"confirmation_criteria\\":\\"Confirmed when injected serialized payloads trigger deserialization error messages in the response\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"ssrf-detection\\",\\"name\\":\\"SSRF Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Server-Side Request Forgery (SSRF) vulnerabilities by injecting internal and\\\\nexternal URLs into parameters and analyzing response differences and timing.\\\\n\\\\n## Notes\\\\n- Tests for in-band SSRF using internal IP addresses and cloud metadata endpoints\\\\n- Analyzes response differences between original and injected values\\\\n- Targets parameters with URL-like values\\\\n- OWASP Top 10 2021: A10\\\\n\\\\n## References\\\\n- https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/\\\\n- https://portswigger.net/web-security/ssrf\\",\\"short_description\\":\\"Detects server-side request forgery via out-of-band and in-band techniques\\",\\"confirmation_criteria\\":\\"Confirmed when injected internal URLs or metadata endpoints cause different response content or timing compared to baseline\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"ssrf-blind\\",\\"name\\":\\"Blind SSRF Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects blind Server-Side Request Forgery (SSRF) vulnerabilities by injecting OAST callback\\\\nURLs into URL-like parameters. Unlike in-band SSRF detection, this module detects cases where\\\\nthe server fetches the URL but does not reflect the response content back to the client.\\\\n\\\\n## Notes\\\\n- Requires an interactsh server (configured via oast settings)\\\\n- Targets parameters whose name or value suggests URL input\\\\n- Injects multiple payload formats: direct HTTP/HTTPS, with path, with port, URL-encoded\\\\n- Findings arrive asynchronously via the OAST polling callback\\\\n- Deduplication via RHM and DiskSet to avoid redundant requests\\\\n- OWASP Top 10 2021: A10 (SSRF)\\\\n\\\\n## References\\\\n- https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/\\\\n- https://portswigger.net/web-security/ssrf/blind\\",\\"short_description\\":\\"Detects blind server-side request forgery via OAST callbacks\\",\\"confirmation_criteria\\":\\"Confirmed when target server makes outbound DNS or HTTP request to OAST callback URL injected into a URL-like parameter\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"ssti-blind\\",\\"name\\":\\"Blind Server-Side Template Injection (SSTI)\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects blind Server-Side Template Injection vulnerabilities using a dual approach:\\\\nOAST (Out-of-Band) callbacks via DNS lookups and time-delay payloads as a fallback.\\\\nOAST payloads use nslookup to trigger DNS callbacks, while time-delay payloads use\\\\ncomputationally expensive loops to cause measurable response delays.\\\\n\\\\n## Notes\\\\n- Dual detection: OAST callbacks (Firm confidence) + time-delay fallback (Tentative confidence)\\\\n- OAST payloads target Jinja2, Mako, Freemarker, ERB, EJS, and Pebble engines\\\\n- Time-delay payloads target Jinja2, Twig, Mako, ERB, and Freemarker engines\\\\n- Time-delay uses triple verification (slow, fast, slow) to reduce false positives\\\\n- OAST findings arrive asynchronously via polling callbacks\\\\n\\\\n## References\\\\n- https://portswigger.net/research/server-side-template-injection\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/18-Testing_for_Server-Side_Template_Injection\\",\\"short_description\\":\\"Detects blind SSTI via OAST callbacks and time-delay payloads\\",\\"confirmation_criteria\\":\\"Confirmed via OAST DNS callback from template evaluation or consistent time-delay differential\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"oast-probe\\",\\"name\\":\\"OAST Probe\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nInjects OAST (Out-of-Band Application Security Testing) callback URLs into HTTP headers\\\\nand URL-like parameters to detect blind vulnerabilities such as blind SSRF, blind XXE,\\\\nand blind command injection.\\\\n\\\\n## Notes\\\\n- Requires an interactsh server (configured via oast settings)\\\\n- Injects unique callback URLs into headers: Referer, X-Forwarded-For, X-Forwarded-Host, Origin, X-Original-URL\\\\n- For insertion point scanning, targets parameters with URL-like values\\\\n- Findings arrive asynchronously via the polling callback — this module returns nil results directly\\\\n- DNS-only callbacks are reported as Info; HTTP callbacks are reported as High severity\\\\n- OWASP Top 10 2021: A10 (SSRF)\\\\n\\\\n## References\\\\n- https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/\\\\n- https://portswigger.net/burp/documentation/collaborator\\",\\"short_description\\":\\"Detects blind vulnerabilities via out-of-band callbacks (DNS/HTTP)\\",\\"confirmation_criteria\\":\\"Confirmed when target server makes outbound DNS or HTTP request to OAST callback URL\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\",\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"proxy-pingback\\",\\"name\\":\\"Proxy Pingback\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for open proxy and callback endpoints by injecting OAST callback URLs into common\\\\nproxy-related URL paths. This detects endpoints that forward or fetch user-supplied URLs\\\\n(open proxy / blind SSRF).\\\\n\\\\n## Notes\\\\n- Requires an interactsh server (configured via oast settings)\\\\n- Targets proxy-related paths: /proxy, /httpproxy, /callback, /url, /remote, etc.\\\\n- Appends OAST URLs via query parameters: url, src, proxy, callback, email, etc.\\\\n- Sends 54 probe requests per host covering path and parameter patterns\\\\n- Each host is tested only once (DiskSet dedup)\\\\n- Findings arrive asynchronously via the OAST polling callback\\\\n- OWASP Top 10 2021: A10 (SSRF)\\\\n\\\\n## References\\\\n- https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/\\\\n- https://portswigger.net/burp/documentation/collaborator\\",\\"short_description\\":\\"Detects open proxy/callback endpoints via OAST URL injection into proxy-related paths\\",\\"confirmation_criteria\\":\\"Confirmed when target server makes outbound DNS or HTTP request to OAST callback URL via proxy endpoint\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cors-misconfiguration\\",\\"name\\":\\"CORS Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects CORS (Cross-Origin Resource Sharing) misconfigurations that allow unauthorized\\\\ncross-origin access. Tests for reflected origins, null origin acceptance, wildcard with\\\\ncredentials, and subdomain bypass patterns.\\\\n\\\\n## Notes\\\\n- Runs once per host with internal deduplication\\\\n- Sends 4 probes with different Origin headers per host\\\\n- Low false-positive rate due to strict header matching\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/cors\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/11-Client-side_Testing/07-Testing_Cross_Origin_Resource_Sharing\\",\\"short_description\\":\\"Detects permissive CORS policies allowing unauthorized cross-origin access\\",\\"confirmation_criteria\\":\\"Confirmed when the server reflects a controlled Origin value in the Access-Control-Allow-Origin header, indicating permissive CORS policy\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"spring-actuator-misconfig\\",\\"name\\":\\"Spring Actuator Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects exposed Spring Boot Actuator endpoints that leak sensitive application\\\\ninformation such as environment variables, health status, and configuration.\\\\n\\\\n## Notes\\\\n- Checks common actuator paths (/actuator, /env, /health, /info, /mappings, etc.)\\\\n- Runs per-request to detect misconfigured access controls\\\\n- Exposed actuators can leak secrets, internal URLs, and database credentials\\\\n\\\\n## References\\\\n- https://docs.spring.io/spring-boot/reference/actuator/endpoints.html\\\\n- https://www.veracode.com/blog/research/exploiting-spring-boot-actuators\\",\\"short_description\\":\\"Detects exposed Spring Boot actuator endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when actuator endpoints return valid JSON responses containing application configuration or health data\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"host-header-injection\\",\\"name\\":\\"Host Header Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects host header injection vulnerabilities by manipulating the Host header and\\\\nrelated headers (X-Forwarded-Host, X-Host) to identify routing or content changes.\\\\n\\\\n## Notes\\\\n- Tests host header manipulation with evil domain values\\\\n- Checks for host value reflection in response body and headers\\\\n- Runs per-request to test each endpoint\\\\n- Can lead to password reset poisoning, cache poisoning, and SSRF\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/host-header\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/17-Testing_for_Host_Header_Injection\\",\\"short_description\\":\\"Detects host header injection and routing manipulation\\",\\"confirmation_criteria\\":\\"Confirmed when manipulated Host header value is reflected in response body, Location header, or other response headers\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"web-cache-poisoning\\",\\"name\\":\\"Web Cache Poisoning\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects web cache poisoning vulnerabilities by injecting values via unkeyed headers\\\\n(X-Forwarded-Host, X-Forwarded-Scheme, X-Original-URL) and checking for reflection.\\\\n\\\\n## Notes\\\\n- Tests unkeyed headers that may influence cached responses\\\\n- Checks for header value reflection in response body\\\\n- Analyzes cache-related headers (Age, X-Cache, Cache-Control)\\\\n- Runs per-request to test endpoint-specific caching behavior\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/web-cache-poisoning\\\\n- https://portswigger.net/research/practical-web-cache-poisoning\\",\\"short_description\\":\\"Detects web cache poisoning via unkeyed header injection\\",\\"confirmation_criteria\\":\\"Confirmed when unkeyed header values are reflected in the response body, indicating cache-poisoning potential\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"prototype-pollution\\",\\"name\\":\\"Prototype Pollution\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects server-side prototype pollution vulnerabilities by injecting __proto__ and\\\\nconstructor.prototype properties in JSON parameters and analyzing response changes.\\\\n\\\\n## Notes\\\\n- Tests JSON body parameters for prototype pollution vectors\\\\n- Injects __proto__, constructor.prototype, and __proto__[status] payloads\\\\n- Analyzes response status code and body changes after pollution\\\\n- Targets Node.js/Express applications\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/prototype-pollution\\\\n- https://portswigger.net/research/server-side-prototype-pollution\\",\\"short_description\\":\\"Detects server-side prototype pollution via JSON injection\\",\\"confirmation_criteria\\":\\"Confirmed when __proto__ or constructor.prototype injection causes observable changes in response status, headers, or body\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"client-prototype-pollution\\",\\"name\\":\\"Client-Side Prototype Pollution\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects client-side prototype pollution vulnerabilities by analyzing JavaScript code\\\\non the page for known vulnerable URL parameter parsing patterns (sources) and\\\\nexploitable property access patterns (gadgets).\\\\n\\\\n## Notes\\\\n- Different from server-side prototype pollution: targets browser-side JavaScript, not JSON bodies\\\\n- Analyzes inline scripts and fetches external JS files (skipping CDN libraries)\\\\n- Detects source patterns (jQuery.extend, lodash.merge, custom parsers)\\\\n- Detects gadget patterns (innerHTML, eval, script.src assignments)\\\\n- Sends probe requests to verify URL parameter acceptance\\\\n- Host-level deduplication (scans once per host)\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/prototype-pollution\\\\n- https://portswigger.net/web-security/prototype-pollution/client-side\\\\n- https://portswigger.net/research/widespread-prototype-pollution-gadgets\\",\\"short_description\\":\\"Detects client-side prototype pollution via JavaScript static analysis\\",\\"confirmation_criteria\\":\\"Confirmed when JavaScript static analysis identifies known prototype pollution source patterns in the page's scripts\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"path-normalization\\",\\"name\\":\\"Path Normalization\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for path normalization vulnerabilities by iteratively applying traversal payloads\\\\n(with conditional auto-slashing) and checking response status codes and fingerprints\\\\nagainst expected internal/public patterns.\\\\n\\\\n## Notes\\\\n- Compares response fingerprints between public and internal path variations\\\\n- Uses iterative payload application with auto-slashing heuristics\\\\n- Targets middleware and reverse proxy path normalization inconsistencies\\\\n\\\\n## References\\\\n- https://i.blackhat.com/us-18/Wed-August-8/us-18-Orange-Tsai-Breaking-Parser-Logic-Take-Your-Path-Normalization-Off-And-Pop-0days-Out-2.pdf\\",\\"short_description\\":\\"Detects path normalization vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when traversal payloads produce response fingerprints matching internal resources that differ from public access patterns\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nginx-off-by-slash\\",\\"name\\":\\"Nginx Off-by-Slash\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for Nginx \\\\\\"off-by-slash\\\\\\" alias traversal misconfiguration. When an Nginx location block\\\\nuses an alias directive without a matching trailing slash, attackers can traverse outside the\\\\nintended directory. For example, \\\\\\"location /static { alias /var/www/assets/; }\\\\\\" allows\\\\nrequesting \\\\\\"/static../etc/passwd\\\\\\" to read files outside /var/www/assets/.\\\\n\\\\n## Notes\\\\n- Operates on path segments, testing each first-level directory for alias traversal\\\\n- Compares response body against baseline to confirm the traversal resolved to the same content\\\\n- Skips media/JS URLs, non-GET requests, and very small baseline responses\\\\n\\\\n## References\\\\n- https://i.blackhat.com/us-18/Wed-August-8/us-18-Orange-Tsai-Breaking-Parser-Logic-Take-Your-Path-Normalization-Off-And-Pop-0days-Out-2.pdf\\\\n- https://github.com/bayotop/off-by-slash\\\\n- https://github.com/yandex/gixy\\\\n- https://github.com/hakaioffsec/nginx-alias-traversal\\",\\"short_description\\":\\"Detects Nginx alias traversal via missing trailing slash\\",\\"confirmation_criteria\\":\\"Confirmed when a path-traversal request using the off-by-slash pattern returns status 200 with a body matching a known valid suffix endpoint\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nginx-path-escape\\",\\"name\\":\\"Nginx Path Escape Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Nginx path escape vulnerabilities through differential response analysis,\\\\ntesting alias traversal, URL encoding bypass, and semicolon injection techniques.\\\\n\\\\n## Notes\\\\n- Uses response fingerprint comparison between baseline and test requests\\\\n- Tests per-request with multiple escape techniques\\\\n- Targets Nginx-specific path handling behaviors\\\\n\\\\n## References\\\\n- https://www.acunetix.com/vulnerabilities/web/path-traversal-via-misconfigured-nginx-alias/\\",\\"short_description\\":\\"Diff-based Nginx path escape detection (alias traversal, encoding bypass, semicolon injection)\\",\\"confirmation_criteria\\":\\"Confirmed when path escape payloads produce different response content or status compared to the baseline, indicating path traversal\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"smart-behavior-detection\\",\\"name\\":\\"Smart Behavior Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects injection vulnerabilities through differential response analysis. Sends pairs\\\\nof semantically equivalent and different payloads and compares response behaviors.\\\\n\\\\n## Notes\\\\n- Uses behavioral diffing: true/false payload pairs that should produce identical vs different responses\\\\n- Low confidence; serves as a triage signal for deeper investigation\\\\n\\\\n## References\\\\n- https://portswigger.net/bappstore/3123d5b5f25c4128894d97ea1571571c\\",\\"short_description\\":\\"Diff-based injection detection via behavioral analysis\\",\\"confirmation_criteria\\":\\"Indicated when semantically different payloads produce measurably different response behaviors while equivalent payloads produce identical responses\\",\\"severity\\":\\"suspect\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"suspect-transform\\",\\"name\\":\\"Suspect Transform Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects suspicious input transformations that may indicate vulnerabilities, including\\\\nexpression evaluation, quote consumption, and unicode normalization issues.\\\\n\\\\n## Notes\\\\n- Tests for server-side expression evaluation (math, string operations)\\\\n- Detects quote consumption that may indicate injection contexts\\\\n- Identifies unicode normalization that could bypass security filters\\\\n\\\\n## References\\\\n- https://portswigger.net/bappstore/3123d5b5f25c4128894d97ea1571571c\\",\\"short_description\\":\\"Detects expression evaluation, quote consumption, unicode transformations\\",\\"confirmation_criteria\\":\\"Indicated when injected expressions are evaluated, quotes are consumed, or unicode characters are normalized by the server\\",\\"severity\\":\\"suspect\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"backslash-transformation\\",\\"name\\":\\"Backslash Transformation Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects how servers handle backslash-escaped characters and special characters by injecting\\\\nescape sequences and analyzing transformations in the response.\\\\n\\\\n## Notes\\\\n- Tests each insertion point for backslash consumption, escape interpretation, and unicode handling\\\\n- Useful as a precursor signal for deeper injection testing\\\\n\\\\n## References\\\\n- https://portswigger.net/research/backslash-powered-scanning\\",\\"short_description\\":\\"Detects escape sequence interpretation, backslash consumption, character handling\\",\\"confirmation_criteria\\":\\"Confirmed when injected backslash sequences are transformed differently than literal characters in the response\\",\\"severity\\":\\"suspect\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"race-interference\\",\\"name\\":\\"Race Interference Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects race condition vulnerabilities through parallel request analysis, looking for\\\\ninput storage races, cross-request contamination, and request interference patterns.\\\\n\\\\n## Notes\\\\n- Sends concurrent requests with different payloads and analyzes response variations\\\\n- Tests for TOCTOU and state mutation races\\\\n- Requires careful timing analysis\\\\n\\\\n## References\\\\n- https://portswigger.net/research/smashing-the-state-machine\\",\\"short_description\\":\\"Detects input storage, cross-contamination, and request interference races\\",\\"confirmation_criteria\\":\\"Confirmed when parallel requests with different payloads produce cross-contaminated responses, indicating shared mutable state\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"xml-saml-security\\",\\"name\\":\\"XML SAML Security\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects unsafe XML transformation in SAML processing, including XXE (XML External Entity)\\\\nand DTD (Document Type Definition) injection vulnerabilities.\\\\n\\\\n## Notes\\\\n- Tests XML parameters for entity expansion and external entity loading\\\\n- Targets SAML-specific XML processing endpoints\\\\n\\\\n## References\\\\n- https://portswigger.net/research/saml-roulette-the-hacker-always-wins\\\\n- https://owasp.org/www-community/vulnerabilities/XML_External_Entity_(XXE)_Processing\\",\\"short_description\\":\\"SAML XML security checks (XXE/DTD)\\",\\"confirmation_criteria\\":\\"Confirmed when injected XML entities are processed and expanded, or DTD declarations are loaded by the server\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"jwt-vulnerability\\",\\"name\\":\\"JWT Vulnerability\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects JWT vulnerabilities including algorithm confusion (none algorithm), weak\\\\nsigning keys, and missing signature verification by manipulating JWT tokens.\\\\n\\\\n## Notes\\\\n- Tests for 'none' algorithm acceptance (CVE-2015-9235)\\\\n- Tests for empty signature acceptance\\\\n- Tests for algorithm confusion (RS256 to HS256)\\\\n- Analyzes Authorization headers and cookies for JWT tokens\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/jwt\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/10-Testing_JSON_Web_Tokens\\",\\"short_description\\":\\"Detects JWT algorithm confusion and weak signing vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when JWT tokens with 'none' algorithm or empty signature are accepted by the server with a successful response\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"http-request-smuggling\\",\\"name\\":\\"HTTP Request Smuggling\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects HTTP request smuggling vulnerabilities by sending ambiguous requests with\\\\nconflicting Content-Length and Transfer-Encoding headers to identify desync behavior.\\\\n\\\\n## Notes\\\\n- Tests CL.TE and TE.CL desync patterns\\\\n- Uses differential timing analysis to detect smuggling\\\\n- Runs once per host to avoid disruption\\\\n- Requires careful timeout configuration\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/request-smuggling\\\\n- https://portswigger.net/research/http-desync-attacks\\",\\"short_description\\":\\"Detects HTTP request smuggling via CL.TE and TE.CL desync\\",\\"confirmation_criteria\\":\\"Confirmed when conflicting CL/TE headers cause measurable response timing differences indicating request desync\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"graphql-scan\\",\\"name\\":\\"GraphQL Security Scanner\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDiscovers GraphQL endpoints and tests them for common security misconfigurations including\\\\nenabled introspection, SQL injection through GraphQL arguments, and query batching abuse.\\\\n\\\\n## Notes\\\\n- Probes 8 common GraphQL endpoint paths\\\\n- Tests both POST and GET request methods for endpoint discovery\\\\n- Checks for enabled introspection (information disclosure)\\\\n- Injects SQL payloads into discovered or common field arguments\\\\n- Tests for query batching support (rate limiting bypass)\\\\n- Runs once per host\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/12-API_Testing/01-Testing_GraphQL\\\\n- https://graphql.org/learn/introspection/\\",\\"short_description\\":\\"Tests GraphQL endpoints for introspection, injection, and batching vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when GraphQL endpoint responds to introspection queries, SQL payloads produce database errors, or batch queries execute successfully\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"file-upload-scan\\",\\"name\\":\\"File Upload Scanner\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests file upload endpoints for unrestricted file upload vulnerabilities by attempting\\\\nto upload files with various bypass techniques. If upload succeeds, attempts to verify\\\\nexecution of the uploaded file.\\\\n\\\\n## Notes\\\\n- Only triggers on multipart/form-data requests with a filename parameter\\\\n- Tests 7 probe types: direct extension, double extension, null byte, case variation, magic bytes, SVG XXE, and HTML XSS\\\\n- Each probe uses a unique marker for verification\\\\n- Reconstructs multipart body preserving non-file fields (CSRF tokens, hidden fields)\\\\n- Early abort if first probe returns 400/403/415 (strict validation)\\\\n- Attempts to verify upload by fetching common upload directories\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/vulnerabilities/Unrestricted_File_Upload\\\\n- https://portswigger.net/web-security/file-upload\\",\\"short_description\\":\\"Tests for arbitrary file upload and execution vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when an uploaded file is accessible and contains the unique scan marker, indicating arbitrary file upload and potential code execution\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"default-credentials\\",\\"name\\":\\"Default Credentials\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects login endpoints from observed traffic and tests them with common default credential\\\\npairs. Uses intelligent login form detection, CAPTCHA awareness, and lockout protection.\\\\n\\\\n## Notes\\\\n- Only tests POST requests with form-encoded or JSON bodies\\\\n- Detects login endpoints by matching parameter names and URL paths\\\\n- Sends baseline invalid credentials first to establish failure response\\\\n- Stops on first successful login or lockout detection\\\\n- 500ms delay between credential attempts to avoid rate limiting\\\\n- Preserves CSRF tokens and hidden form fields during testing\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/04-Authentication_Testing/02-Testing_for_Default_Credentials\\",\\"short_description\\":\\"Tests for default or common credential pairs on login endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when a known credential pair produces a response significantly different from the invalid-credential baseline, indicating successful authentication\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"forbidden-bypass\\",\\"name\\":\\"403/401 Forbidden Bypass\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests various techniques to bypass 403 Forbidden and 401 Unauthorized responses, including path manipulation,\\\\nheader injection, HTTP method tampering, method override headers, and URL encoding tricks.\\\\n\\\\n## Notes\\\\n- Only activates when the original response returns 401 or 403 status\\\\n- Tests multiple bypass vectors: path traversal, special headers, HTTP method changes, method override headers\\\\n\\\\n## References\\\\n- https://book.hacktricks.wiki/en/network-services-pentesting/pentesting-web/403-and-401-bypasses.html\\",\\"short_description\\":\\"Detects bypass methods for 403/401 Forbidden responses\\",\\"confirmation_criteria\\":\\"Confirmed when a bypass technique produces a non-403 response with valid content for a previously forbidden resource\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"http-method-tampering\\",\\"name\\":\\"HTTP Method Tampering\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests if dangerous HTTP methods (PUT, DELETE, PATCH) are unexpectedly enabled on endpoints,\\\\nand whether method override headers (X-HTTP-Method-Override, X-HTTP-Method, X-Method-Override)\\\\nallow changing server behavior.\\\\n\\\\n## Notes\\\\n- On 2xx endpoints: tests if PUT/DELETE/PATCH return 2xx with meaningful body\\\\n- Tests method override headers via POST with override header set to DELETE/PUT\\\\n- Complementary to forbidden_bypass which focuses on 401/403 endpoints\\\\n- Rate-limited per host to avoid excessive probing\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/06-Test_HTTP_Methods\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/REST_Security_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects unexpectedly enabled HTTP methods and method override headers\\",\\"confirmation_criteria\\":\\"Confirmed when dangerous HTTP methods return successful responses or method override headers alter server behavior\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"csrf-verify\\",\\"name\\":\\"CSRF Token Verification\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nFor requests that contain a CSRF token, this module verifies whether the server\\\\nactually enforces it. It removes, empties, or randomizes the token value and\\\\nchecks if the server still accepts the request.\\\\n\\\\n## Notes\\\\n- Only targets requests that already have a CSRF token parameter\\\\n- Three probe strategies: token removed, token emptied, token randomized\\\\n- Stops probing early if the server returns 4xx/5xx (properly validated)\\\\n- Deduplicates by method + host + path\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/csrf\\\\n- https://portswigger.net/web-security/csrf/bypassing-token-validation\\",\\"short_description\\":\\"Verifies CSRF token enforcement by removing, emptying, or randomizing tokens\\",\\"confirmation_criteria\\":\\"Confirmed when the server accepts a request with a removed, emptied, or randomized CSRF token\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"idor-detection\\",\\"name\\":\\"IDOR Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nActively tests for Insecure Direct Object Reference (IDOR) and Broken Object Level\\\\nAuthorization (BOLA) vulnerabilities by substituting ID parameters with neighbor values\\\\nand comparing responses.\\\\n\\\\nThe module targets parameters classified as object identifiers by the passive IDOR module\\\\n(sequential integers, structured codes, base64-encoded IDs, UUIDv1, emails). For each\\\\ncandidate, it generates predictable neighbor IDs and sends probe requests to detect\\\\nwhether the server enforces authorization.\\\\n\\\\n## Detection Logic\\\\n1. Classify parameter via authzutil.ClassifyParam — skip if not an object ID or low predictability\\\\n2. Generate neighbor IDs (e.g., user_id=42 → 41, 43) via authzutil.GenerateNeighborIDs\\\\n3. Fetch baseline response for the original request\\\\n4. Send probe requests with neighbor IDs and compare responses:\\\\n   - 401/403/404 or login redirect → authorization enforced (skip)\\\\n   - Soft-denial body strings → authorization enforced (skip)\\\\n   - Content identical → public data, not IDOR (skip)\\\\n   - Structurally different → different resource type (skip)\\\\n   - Structurally similar + different content → potential IDOR finding\\\\n\\\\n## Notes\\\\n- Covers OWASP API1:2023 (Broken Object Level Authorization)\\\\n- Limited to 50 probes per host to avoid excessive traffic\\\\n- Only tests parameters with predictable ID formats (skips UUIDv4, random hex)\\\\n- Confidence promoted to Firm when user-specific fields differ between responses\\\\n\\\\n## References\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa1-broken-object-level-authorization/\\\\n- https://cwe.mitre.org/data/definitions/639.html\\\\n- https://portswigger.net/web-security/access-control/idor\\",\\"short_description\\":\\"Detects missing authorization on object ID parameters (IDOR/BOLA)\\",\\"confirmation_criteria\\":\\"Indicated when a probe request with a neighbor object ID returns a structurally similar response with different content, suggesting missing authorization enforcement\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"authz-compare\\",\\"name\\":\\"Cross-Session Authorization Compare\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Broken Object Level Authorization (BOLA) and Insecure Direct Object Reference\\\\n(IDOR) by replaying the same request with different authenticated sessions and comparing\\\\nresponses.\\\\n\\\\nWhen multiple sessions are configured (via --session or --auth-config), this module\\\\nreplays each request observed by the primary session using the compare sessions. It then\\\\nanalyzes the response differences to detect missing authorization enforcement.\\\\n\\\\n## Detection Logic\\\\nFor each request from the primary session:\\\\n1. Skip static assets, media files, and non-authenticated endpoints\\\\n2. Replay the request with each compare session's credentials\\\\n3. Compare primary vs compare responses:\\\\n   - Primary 200, Compare 401/403 → properly enforced (skip)\\\\n   - Primary 200, Compare 302→login → properly enforced (skip)\\\\n   - Primary 200, Compare 200 (same content) → public data (skip)\\\\n   - Primary 200, Compare 200 (different content) → IDOR/BOLA finding\\\\n   - Primary non-200 → skip (primary can't access either)\\\\n\\\\n## Requirements\\\\n- At least 2 sessions must be configured: one primary and one or more compare sessions\\\\n- Sessions are configured via \`--session\`, \`--auth-config\`, or \`--session-file\` CLI flags\\\\n\\\\n## Notes\\\\n- This module is automatically skipped when no compare sessions are configured\\\\n- Covers OWASP API1:2023 (Broken Object Level Authorization)\\\\n- Complements the idor-detection module which tests neighbor IDs within a single session\\\\n- Uses structural response comparison from authzutil for robust matching\\\\n\\\\n## References\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa1-broken-object-level-authorization/\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa5-broken-function-level-authorization/\\\\n- https://cwe.mitre.org/data/definitions/639.html\\",\\"short_description\\":\\"Compares responses across authenticated sessions to detect IDOR/BOLA\\",\\"confirmation_criteria\\":\\"Indicated when two different authenticated sessions receive structurally similar 200 responses with different content at the same endpoint, suggesting missing authorization enforcement\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"mass-assignment\\",\\"name\\":\\"Mass Assignment\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests JSON API endpoints for mass assignment vulnerabilities by injecting privilege-related\\\\nkeys (role, admin, is_admin, permissions, etc.) into POST/PUT/PATCH JSON request bodies\\\\nand observing server responses.\\\\n\\\\n## Notes\\\\n- Only activates on POST/PUT/PATCH requests with application/json content type\\\\n- Injects one privilege key at a time to isolate findings\\\\n- Reports firm confidence if server echoes back the injected key in response\\\\n- Reports tentative confidence if server accepts the request without error\\\\n- Skips keys already present in the original request body\\\\n\\\\n## References\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Mass_Assignment_Cheat_Sheet.html\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/\\",\\"short_description\\":\\"Detects mass assignment / parameter pollution in JSON APIs\\",\\"confirmation_criteria\\":\\"Confirmed when injected privilege keys are echoed back in server response or accepted without validation error\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sensitive-file-discovery\\",\\"name\\":\\"Sensitive File Discovery\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDiscovers sensitive files and endpoints exposed on the web server using two\\\\nvalidation strategies. High-confidence probes (~25 paths) use content markers\\\\nto confirm findings. Bulk probes (~1,350 paths covering dot files, extensionless\\\\nfiles, and log files) use Content-Type and body differencing against a 404\\\\nfingerprint.\\\\n\\\\n## Notes\\\\n- Runs once per unique host\\\\n- Marker-based probes: ~25 paths with content marker validation (firm confidence)\\\\n- Generic probes: ~1,350 paths with Content-Type and body differencing (tentative confidence)\\\\n- Generic probes are skipped if the 404 page returns text/plain or octet-stream\\\\n- Fingerprints 404 responses to avoid false positives from custom error pages\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/04-Review_Old_Backup_and_Unreferenced_Files_for_Sensitive_Information\\",\\"short_description\\":\\"Probes for exposed sensitive files (.env, .git/config, dot files, log files, and more)\\",\\"confirmation_criteria\\":\\"Marker-based: confirmed when response contains expected content markers. Generic: confirmed when response has text/plain or octet-stream Content-Type and body differs from 404 fingerprint\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"backup-file-discovery\\",\\"name\\":\\"Backup File Discovery\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDiscovers publicly accessible backup files by generating candidate filenames\\\\nfrom the target hostname parts, common backup names, and year variants, then\\\\ncombining them with archive and backup extensions.\\\\n\\\\n## Notes\\\\n- Runs once per unique host\\\\n- Generates ~600-900 candidate paths depending on hostname complexity\\\\n- Validates using 404 fingerprinting, Content-Type, Content-Length, and body differencing\\\\n- SQL/text dumps additionally checked for content markers (CREATE TABLE, INSERT INTO, etc.)\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/04-Review_Old_Backup_and_Unreferenced_Files_for_Sensitive_Information\\",\\"short_description\\":\\"Probes for exposed backup archives derived from hostname, common names, and year variants\\",\\"confirmation_criteria\\":\\"Confirmed when response returns 200 with matching archive Content-Type, body size >1KB, and body differs from 404 fingerprint. SQL dumps additionally validated via content markers.\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"iis-shortname-discovery\\",\\"name\\":\\"IIS Short Filename Discovery\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects and enumerates IIS 8.3 short filenames exposed through the tilde (~)\\\\nvulnerability. When IIS has short filename generation enabled, an attacker can\\\\ndiscover partial file and directory names by observing differential HTTP status\\\\ncodes for wildcard-based requests.\\\\n\\\\nThe module performs three phases:\\\\n1. **Vulnerability detection** - tests HTTP methods and path suffixes to find a\\\\n   working oracle (distinct status codes for existing vs non-existing patterns)\\\\n2. **Character discovery** - identifies which characters appear in short filenames\\\\n   to minimize the enumeration search space\\\\n3. **Recursive enumeration** - brute-forces filenames character-by-character\\\\n   (up to 6 chars for name, 3 for extension per 8.3 convention)\\\\n\\\\n## Notes\\\\n- Only runs on IIS servers (detected via Server, X-Powered-By, or X-AspNet-Version headers)\\\\n- Runs once per unique host\\\\n- Caps total requests at 2000 per host to avoid excessive traffic\\\\n- Reports discovered 8.3 short filenames (does not attempt full-name autocomplete)\\\\n\\\\n## References\\\\n- https://soroush.me/blog/2023/07/thirteen-years-on-advancing-the-understanding-of-iis-short-file-name-sfn-disclosure/\\\\n- https://github.com/bitquark/shortscan\\",\\"short_description\\":\\"Enumerates IIS 8.3 short filenames via tilde-based oracle (per-host)\\",\\"confirmation_criteria\\":\\"Confirmed when the server returns distinct status codes for wildcard patterns matching existing vs non-existing 8.3 short filenames\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"jsonp-callback\\",\\"name\\":\\"JSONP Callback Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects JSONP (JSON with Padding) endpoints that wrap responses in callback\\\\nfunctions, enabling cross-origin data theft. First checks for existing JSONP\\\\npatterns in responses, then actively injects callback parameters.\\\\n\\\\n## Notes\\\\n- Two-phase detection: passive check for existing JSONP, then active callback injection\\\\n- Severity upgraded from Medium to High if response contains sensitive data\\\\n- Tests multiple common callback parameter names\\\\n- Deduplicates by host + path\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/Cross_Site_Script_Inclusion\\\\n- https://www.benhayak.com/2015/06/same-origin-method-execution-some.html\\",\\"short_description\\":\\"Detects JSONP endpoints that allow cross-origin data theft via callback injection\\",\\"confirmation_criteria\\":\\"Confirmed when injecting a callback parameter causes the response to be wrapped in the specified function call\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"open-redirect\\",\\"name\\":\\"Open Redirect\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects open redirect vulnerabilities by injecting external URLs into parameters\\\\nand checking if the server responds with a redirect to the injected location.\\\\n\\\\n## Notes\\\\n- Tests parameters for unvalidated redirect behavior\\\\n- Checks both Location header and meta refresh redirects\\\\n- Uses request deduplication to avoid redundant checks\\\\n\\\\n## References\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects open redirect vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when injected external URL appears in a redirect Location header or meta refresh tag\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"websocket-security\\",\\"name\\":\\"WebSocket Security\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects WebSocket endpoints that accept upgrade requests without proper origin validation.\\\\nTests whether the server enforces origin checks by sending upgrade requests with matching,\\\\nevil, and missing Origin headers.\\\\n\\\\n## Notes\\\\n- Runs once per host+path with internal deduplication\\\\n- Sends up to 3 WebSocket upgrade probes per unique endpoint\\\\n- Low false-positive rate due to strict 101 status code matching\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/11-Client-side_Testing/10-Testing_WebSockets\\\\n- https://portswigger.net/web-security/websockets\\",\\"short_description\\":\\"Detects insecure WebSocket upgrade policies and missing origin validation\\",\\"confirmation_criteria\\":\\"Confirmed when the server accepts a WebSocket upgrade request from an unauthorized or missing origin, indicating missing origin validation\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"ws-injection\\",\\"name\\":\\"WebSocket Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for injection vulnerabilities (XSS, SQLi, command injection, template injection) in HTTP\\\\nparameters that are likely forwarded to WebSocket message processing contexts. The module targets\\\\nparameters with names commonly associated with WebSocket messaging (e.g., message, data, payload,\\\\ncmd) and sends crafted payloads to detect unvalidated input handling.\\\\n\\\\n## Notes\\\\n- Only tests parameters whose names suggest WebSocket message processing involvement.\\\\n- Checks for reflected XSS payloads, SQL error messages, command output patterns, and template\\\\n  expression evaluation in responses.\\\\n- Uses insertion-point-level deduplication to avoid redundant checks.\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/11-Client-side_Testing/10-Testing_WebSockets\\\\n- https://portswigger.net/web-security/websockets\\",\\"short_description\\":\\"Tests for injection vulnerabilities in parameters forwarded to WebSocket message processing\\",\\"confirmation_criteria\\":\\"Confirmed when an injected payload is reflected unencoded, triggers a SQL error, produces command output, or evaluates a template expression in the HTTP response\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"ws-cswsh\\",\\"name\\":\\"WebSocket CSWSH\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for Cross-Site WebSocket Hijacking (CSWSH) by verifying whether WebSocket upgrade\\\\nendpoints properly validate the Origin header. An attacker can hijack a user's authenticated\\\\nWebSocket connection if the server does not enforce origin checks, allowing cross-origin\\\\nWebSocket handshakes to succeed.\\\\n\\\\n## Notes\\\\n- Only tests endpoints that respond with 101 Switching Protocols to a well-formed WS upgrade.\\\\n- Tests four scenarios: evil external origin, null origin, subdomain spoofing, and missing\\\\n  Origin header.\\\\n- Deduplicates by host and path to avoid redundant checks.\\\\n\\\\n## References\\\\n- https://christian-schneider.net/CrossSiteWebSocketHijacking.html\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/11-Client-side_Testing/10-Testing_WebSockets\\\\n- https://portswigger.net/web-security/websockets/cross-site-websocket-hijacking\\",\\"short_description\\":\\"Tests for Cross-Site WebSocket Hijacking via insufficient origin validation\\",\\"confirmation_criteria\\":\\"Confirmed when a WebSocket upgrade succeeds with a malicious, null, subdomain, or missing Origin header\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"api-rate-limit-bypass\\",\\"name\\":\\"API Rate Limit Bypass\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects API rate limiting that can be bypassed using IP spoofing headers such as\\\\nX-Forwarded-For, X-Real-IP, and similar headers. First triggers rate limiting by\\\\nsending rapid requests, then tests whether bypass headers circumvent the limit.\\\\n\\\\n## Notes\\\\n- Runs once per host with internal deduplication\\\\n- Sends up to 10 rapid requests to trigger rate limiting\\\\n- Tests 8 different IP spoofing header variations\\\\n- Only reports when rate limiting is confirmed then bypassed\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/04-Authentication_Testing/04-Testing_for_Bypassing_Authentication_Schema\\\\n- https://portswigger.net/web-security/authentication/password-based\\",\\"short_description\\":\\"Detects rate limiting bypass via IP spoofing headers\\",\\"confirmation_criteria\\":\\"Confirmed when the server enforces rate limiting (429 response) but accepts requests with IP spoofing headers, indicating bypassable rate limiting\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nextjs-data-leakage\\",\\"name\\":\\"Next.js Data Route Leakage\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Next.js data route leakage where authenticated page data can be accessed\\\\nwithout authorization. Next.js Pages Router exposes JSON data at predictable\\\\n/_next/data/<buildId>/<path>.json URLs. When authentication middleware protects\\\\nthe HTML page but not the data route, sensitive page props leak.\\\\n\\\\n## Notes\\\\n- Only activates on 302/401/403 responses from Next.js hosts\\\\n- Requires buildId extraction (from shared cache or response body)\\\\n- Validates JSON response contains pageProps and is not a notFound page\\\\n- Deduplicates by host+path\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/pages/building-your-application/data-fetching\\\\n- https://www.assetnote.io/resources/research/digging-for-ssrf-in-nextjs-apps\\",\\"short_description\\":\\"Detects unauthorized access to Next.js data routes on auth-protected pages\\",\\"confirmation_criteria\\":\\"Confirmed when the data route returns 200 with valid pageProps JSON for an auth-protected page\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nextjs-middleware-bypass\\",\\"name\\":\\"Next.js Middleware Bypass\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for Next.js middleware bypass vulnerabilities including CVE-2025-29927 and\\\\npath normalization issues. Next.js middleware runs before route handlers and is\\\\ncommonly used for authentication. Certain header injections and path manipulations\\\\ncan skip middleware execution entirely.\\\\n\\\\n## Notes\\\\n- Only activates on 401/403 responses from Next.js hosts\\\\n- Tests x-middleware-subrequest header injection (CVE-2025-29927)\\\\n- Tests path normalization bypasses (double slashes, URL encoding, locale prefixes)\\\\n- Deduplicates with per-host limit (max 20 attempts per host)\\\\n- Validates bypass by checking status change from 401/403 to 200\\\\n\\\\n## References\\\\n- https://github.com/advisories/GHSA-f82v-jwr5-mffw\\\\n- https://zhero-web-sec.github.io/research-and-things/nextjs-middleware-bypass\\",\\"short_description\\":\\"Detects Next.js middleware authentication bypass via header injection and path manipulation\\",\\"confirmation_criteria\\":\\"Confirmed when a bypass technique changes the response from 401/403 to 200 with non-error content\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nextjs-image-ssrf\\",\\"name\\":\\"Next.js Image Optimizer SSRF\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests the Next.js image optimization endpoint (/_next/image) for Server-Side Request\\\\nForgery. The image optimizer accepts a URL parameter and fetches the image server-side.\\\\nIf improperly configured, it can be abused to access internal resources or cloud\\\\nmetadata endpoints.\\\\n\\\\n## Notes\\\\n- Runs once per host on Next.js-identified targets\\\\n- First verifies /_next/image endpoint exists\\\\n- Uses OAST for out-of-band confirmation when available\\\\n- Falls back to in-band probes (AWS metadata, localhost)\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://www.assetnote.io/resources/research/digging-for-ssrf-in-nextjs-apps\\\\n- https://nextjs.org/docs/pages/api-reference/components/image\\",\\"short_description\\":\\"Detects SSRF via the Next.js image optimization endpoint\\",\\"confirmation_criteria\\":\\"Confirmed when the image optimizer fetches an attacker-controlled or internal URL\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nextjs-draft-mode-exposure\\",\\"name\\":\\"Next.js Draft Mode Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes common Next.js Draft Mode and Preview Mode API endpoints for missing or weak\\\\nauthentication. Draft Mode allows viewing unpublished CMS content by setting special\\\\ncookies (__prerender_bypass, __next_preview_data). If the enabling endpoint
