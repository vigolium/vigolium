pe\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"async-init-exec-approval-replay\\",\\"description\\":\\"# M16: Exec-approval channel runtime replays pending approvals on reconnect without idempotency guard — double-delivery if handler is not idempotent\\\\n\\\\n**Severity**: MEDIUM\\\\n**Finding ID**: M16\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: Exec-approval channel runtime replays pending approvals on reconnect without idempotency guard — double-delivery if handler is not idempotent\\\\nSeverity-Original: MEDIUM\\\\nPhase: 7\\\\nClass: idempotency\\\\nEntity: exec-approval-channel-runtime.ts — replayPendingApprovals / replayPromise state\\\\nHandler: src/infra/exec-approval-channel-runtime.ts:245-281\\\\nVerdict: VALID\\\\nPoC-Status: theoretical (deferred — MEDIUM severity; static evidence in draft.md sufficient for triage)\\\\nDebate:\\\\nOrigin-Finding: p2-010-race-sandbox-cluster.md Hyp 9\\\\nDeep-Probe-Corroboration: p2-010 Hyp 9 — \\\\\\"Idempotency replay on approval / token-mint / scope-grant — UNRESOLVED\\\\\\"\\\\nReproduction-Type: static-hypothesis\\\\n---\\\\n\\\\n## Summary\\\\n\\\\nWhen the exec-approval channel runtime reconnects to the gateway, `startPendingApprovalReplay` fires a `replayPendingApprovals` coroutine (L271). This coroutine calls `listPendingApprovals` methods on the gateway and calls `handleRequested(request, { ignoreIfInactive: true })` for each pending entry (L259). If a reconnect occurs while a prior `replayPromise` is still in flight (e.g., the first connection dropped while replaying), the new reconnect fires a second `replayPromise` (L281) — the old promise is orphaned but its `handleRequested` callbacks may still be executing.\\\\n\\\\nThe `replayPromise` field is overwritten at L281 without cancelling the in-flight prior promise. Two concurrent `handleRequested` invocations for the same approval ID can race:\\\\n- Both post approval messages to the channel.\\\\n- The first to respond to the operator causes a decision; the second is a duplicate notification.\\\\n- If the approval handler itself has non-idempotent side effects (e.g., native platform message creation with a unique message ID check that has a race window), both notifications may succeed.\\\\n\\\\nAdditionally, `handleRequested` itself invokes `spawn(\\\\\\"error handling approval resolved\\\\\\", ...)` (L241) which is fire-and-forget. If the approval arrives from the gateway before the replay completes, the `plugin.approval.resolved` broadcast handler at L240 and the replay\'s `handleRequested` at L259 both try to process the same approval, potentially double-finalizing.\\\\n\\\\n## Evidence\\\\n\\\\n- Entity schema: `replayPromise: Promise<void> | null` — module-level variable in the closure; no atomicity guarantee on the concurrent `replayPromise = promise` assignment (L281)\\\\n- Code path (read): `src/infra/exec-approval-channel-runtime.ts:285` — `const replay = replayPromise; if (!replay) return; await replay.catch(()=>{})` — check-then-await pattern\\\\n- Code path (write / overwrite): `src/infra/exec-approval-channel-runtime.ts:281` — `replayPromise = promise` — replaces reference without awaiting or cancelling prior\\\\n- Code path (duplicate dispatch): L241 — `spawn(\\\\\\"error handling approval resolved\\\\\\", handleResolved(...))` — fire-and-forget from event handler; L259 — `await handleRequested(request, ...)` — replay path; both paths call into the same approval handler adapter\\\\n- Enclosing transaction: `no — no atomic guard prevents concurrent replay and live-event handling of the same approval ID`\\\\n- Lock primitive: `absent`\\\\n\\\\n## Attack Steps\\\\n\\\\n1. Exec-approval channel connects to gateway; `startPendingApprovalReplay` fires replay coroutine A for 3 pending approvals.\\\\n2. The gateway connection drops mid-replay (after replaying 1 of 3).\\\\n3. Channel reconnects; `startPendingApprovalReplay` fires replay coroutine B. `replayPromise = promiseB` (L281); promiseA is still running (orphaned reference).\\\\n4. Replay coroutine A (orphaned) continues to call `handleRequested` for approval 2.\\\\n5. Replay coroutine B also calls `handleRequested` for approval 2 (both started from the same gateway-side pending list).\\\\n6. Both invocations post an approval notification to the channel. The operator sees two approval messages for the same pending exec command.\\\\n7. If the operator clicks \\\\\\"approve\\\\\\" on both, the first approval resolves the record (`exec.approval.resolve` → `manager.resolve()`); the second gets a \\\\\\"already resolved\\\\\\" response from the gateway. No double-execution in the normal path — but the duplicate notification causes operator confusion and may trigger an unintended second approval attempt.\\\\n\\\\n## Why This Passed SAST\\\\n\\\\nThe `replayPromise` overwrite pattern without cancellation is a subtle async-lifecycle bug invisible to syntactic rules. The interaction between the event-driven `plugin.approval.resolved` handler and the sequential replay loop requires temporal reasoning.\\\\n\\\\n## Recommended Fix\\\\n\\\\nBefore starting a new replay, await or cancel the prior `replayPromise` (use an `AbortController` or a `cancelled` flag checked at each `handleRequested` call). Add dedup keying to `handleRequested`: if the same approval ID has already been dispatched in this runtime session, skip it.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC: theoretical (no executable script; see evidence/ for static analysis)\\\\n\\\\nEvidence files:\\\\n- `evidence/poc-deferred.md` (351 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-theoretical (deferred — medium severity; static evidence in draft.md sufficient for triage)\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"2cb501052a0069cb55f9c1fd86e8a4b5\\",\\"found_at\\":\\"2026-05-06T15:50:43.836983Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":35,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:m15\\",\\"module_name\\":\\"M15: Plugin registry cache is not invalidated on plugin disable/uninstall — stale registry read continues serving disabled plugin capabilities\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"plugin-registry-stale-read-after-disable\\",\\"description\\":\\"# M15: Plugin registry cache is not invalidated on plugin disable/uninstall — stale registry read continues serving disabled plugin capabilities\\\\n\\\\n**Severity**: MEDIUM\\\\n**Finding ID**: M15\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: Plugin registry cache is not invalidated on plugin disable/uninstall — stale registry read continues serving disabled plugin capabilities\\\\nSeverity-Original: MEDIUM\\\\nPhase: 7\\\\nClass: stale-read\\\\nEntity: Plugin registry cache (pluginLoaderCacheState / fullWorkspacePluginLoaderCacheState — in-memory Map keyed by cache key)\\\\nHandler: src/plugins/loader.ts:303 (clearPluginRegistryLoadCache); src/plugins/loader.ts:583 (getPluginRegistryCache)\\\\nVerdict: VALID\\\\nPoC-Status: theoretical (deferred — MEDIUM severity; static evidence in draft.md sufficient for triage)\\\\nDebate:\\\\nOrigin-Finding: KB Architecture Model \\\\\\"plugin registry — mutable trust registry (transitional broad mutable registries)\\\\\\"\\\\nDeep-Probe-Corroboration:\\\\nReproduction-Type: static-hypothesis\\\\n---\\\\n\\\\n## Summary\\\\n\\\\nThe plugin loader caches resolved `PluginRegistry` instances in `pluginLoaderCacheState` keyed by a cache key derived from `onlyPluginIds` and related parameters. `clearPluginRegistryLoadCache()` exists at `src/plugins/loader.ts:303` and clears both caches. However, the question is whether it is called on every path that disables or uninstalls a plugin.\\\\n\\\\nIf a gateway method handler (e.g., `plugin.disable`, `plugin.uninstall`) updates the installed-plugin index but does not also invalidate the plugin registry cache, subsequent requests that call `getPluginRegistry()` or `getActivePluginRegistry()` may return a stale registry that still includes the disabled plugin\'s tools, hooks, channels, HTTP routes, and MCP servers. A stale registry read in the gateway means:\\\\n\\\\n1. A disabled plugin\'s tools remain available to the agent for the remainder of the current registry\'s lifetime.\\\\n2. A disabled channel adapter may continue accepting inbound messages.\\\\n3. HTTP routes registered by the disabled plugin remain live.\\\\n\\\\nThe `PluginRegistrySnapshot` and `setActivePluginRegistry` / `getActivePluginRegistry` pattern (seen in `src/plugins/loader.ts:85,134,158,185,...`) suggests the active registry is a pointer to a mutable cache entry, not a request-scoped immutable snapshot. If `setActivePluginRegistry` is not called after disablement, callers reading `getActivePluginRegistry()?.()` see the old registry.\\\\n\\\\n## Evidence\\\\n\\\\n- Entity schema: `pluginLoaderCacheState` (module-level cache map, `src/plugins/loader.ts:574`); `fullWorkspacePluginLoaderCacheState` (second cache); `PluginRegistrySnapshot` (cached registry object)\\\\n- Code path (write — disable/uninstall): gateway method handlers for plugin management (exact handler not traced; clearing must happen in the method\'s follow-up)\\\\n- Code path (read — stale): `getActivePluginRegistry()` called by tool dispatch, hook runner, channel registry, HTTP route registry — returns the cached registry without re-resolving the installed plugin index\\\\n- Code path (invalidation): `src/plugins/loader.ts:303` — `clearPluginRegistryLoadCache()` — but only effective if called in the disable/uninstall path\\\\n- Enclosing transaction: `no — cache reads and writes are not coordinated; cache key determines staleness but the mapping from \\\\\\"plugin disabled\\\\\\" to \\\\\\"cache key invalidated\\\\\\" is not enforced at the type level`\\\\n- Lock primitive: `absent — no lock guards simultaneous read of stale registry and write of updated installed-plugin index`\\\\n\\\\n## Attack Steps\\\\n\\\\n1. Operator disables a plugin (e.g., via `config.patch` removing it from enabled plugins).\\\\n2. The installed-plugin index is updated, but if `clearPluginRegistryLoadCache()` is not called in the same synchronous flow (or the active registry pointer is not updated), the gateway\'s `getActivePluginRegistry()` still returns the old registry.\\\\n3. A tool call arrives on an agent session. The tool dispatch consults the stale registry and finds the disabled plugin\'s tools still registered.\\\\n4. The tool is dispatched to the (now-disabled) plugin handler, which may execute unauthorized operations.\\\\n5. Alternatively: an HTTP route registered by the disabled plugin continues to be served by the gateway HTTP server until the registry is refreshed.\\\\n\\\\n## Why This Passed SAST\\\\n\\\\nRegistry cache invalidation gaps are invisible to syntactic analysis. The bug class requires tracing the data flow from \\\\\\"plugin disable\\\\\\" event to \\\\\\"registry cache cleared\\\\\\" across multiple asynchronous call sites.\\\\n\\\\n## Recommended Fix\\\\n\\\\nEnsure `clearPluginRegistryLoadCache()` (or an equivalent targeted invalidation) is called atomically in every path that changes the set of enabled/installed plugins, before the response is sent to the caller. Add a contract test that verifies the active registry does not include a plugin\'s tools after `plugin.disable` completes.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC: theoretical (no executable script; see evidence/ for static analysis)\\\\n\\\\nEvidence files:\\\\n- `evidence/poc-deferred.md` (351 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-theoretical (deferred — medium severity; static evidence in draft.md sufficient for triage)\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"df69764409dfe82595825c1172b3e2e7\\",\\"found_at\\":\\"2026-05-06T15:50:43.83698Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":34,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:m14\\",\\"module_name\\":\\"M14: system-event stores client-supplied params.scopes into presence record without sanitization\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"system-event-client-supplied-scopes-presence\\",\\"description\\":\\"# M14: `system-event` stores client-supplied `params.scopes` into presence record without sanitization\\\\n\\\\n**Severity**: MEDIUM\\\\n**Finding ID**: M14\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: `system-event` stores client-supplied `params.scopes` into presence record without sanitization\\\\nSeverity-Original: MEDIUM\\\\nPhase: 6\\\\nClass: mass-assignment\\\\nEndpoint: WS `system-event`\\\\nHandler: src/gateway/server-methods/system.ts:79-82\\\\nVerdict: VALID\\\\nPoC-Status: theoretical (deferred — MEDIUM severity; static evidence in draft.md sufficient for triage)\\\\nDebate-Note: system-event is ADMIN_SCOPE gated; impact is scope-string injection into a shared observability channel rather than current-request privilege escalation.\\\\nPre-FP-Flag: LOW — ADMIN_SCOPE gate limits callers; impact depends on how `scopes` in presence is consumed\\\\nOrigin-Finding: Extension of p2-008 Gap E. Gap E is listed at file:line but no standalone finding was filed. This finding documents the exact intake and downstream consumption concern.\\\\nDeep-Probe-Corroboration: none (Phase 5 not started)\\\\nCross-ref: p2-008 Gap E; p4-009 (params.scopes structural pattern)\\\\n---\\\\n\\\\n## Summary\\\\n\\\\nThe `system-event` WS method (ADMIN_SCOPE) accepts a `params.scopes` array from the client and stores it verbatim into the system presence record via `updateSystemPresence`. The presence record is broadcast to all connected clients via `broadcastPresenceSnapshot` and consulted by automation, monitoring, and potentially plugin-runtime logic that reads presence to determine the current connection\'s capabilities. An admin-scope caller can inject arbitrary scope strings into presence, which may confuse downstream consumers that treat presence scopes as server-verified. In a multi-client deployment, this can cause other connected clients to observe misleading capability information.\\\\n\\\\n## Evidence\\\\n\\\\n- Handler: `src/gateway/server-methods/system.ts:79-82`\\\\n- Relevant code:\\\\n  ```ts\\\\n  const scopes =\\\\n    Array.isArray(params.scopes) && params.scopes.every((t) => typeof t === \\\\\\"string\\\\\\")\\\\n      ? params.scopes\\\\n      : undefined;\\\\n  // ...\\\\n  updateSystemPresence({ ..., scopes, ... }); // verbatim client-supplied scopes\\\\n  ```\\\\n- Guard stack observed: `authorizeGatewayMethod` (ADMIN_SCOPE required) → passes for admin callers; no further scope validation on the stored value.\\\\n- Object-id parameter: none\\\\n- Ownership clause: N/A\\\\n\\\\n## Attack Steps\\\\n\\\\n1. Authenticate with ADMIN_SCOPE.\\\\n2. Send `system-event` WS frame with `params.scopes: [\\\\\\"operator.admin\\\\\\", \\\\\\"operator.write\\\\\\", \\\\\\"operator.read\\\\\\", \\\\\\"operator.approvals\\\\\\", \\\\\\"operator.pairing\\\\\\", \\\\\\"operator.talk_secrets\\\\\\", \\\\\\"custom:malicious\\\\\\"]`.\\\\n3. Presence record stores the injected scope list.\\\\n4. `broadcastPresenceSnapshot` distributes the injected presence to all connected clients.\\\\n5. Downstream consumers that read `presence.scopes` to make authorization or capability decisions observe attacker-supplied values.\\\\n\\\\n## Why This Passed SAST\\\\n\\\\nMass-assignment into a shared state bus is not directly visible to type-level analysis. The code is type-safe (string array accepted and stored) but the semantic contract — \\\\\\"scopes in presence should reflect server-verified values\\\\\\" — is violated.\\\\n\\\\n## Recommended Fix\\\\n\\\\nIntersect `params.scopes` with the caller\'s verified `client.connect.scopes` before storing in presence. Alternatively, ignore `params.scopes` entirely and always derive the presence scopes from the verified connection\'s scope set.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC: theoretical (no executable script; see evidence/ for static analysis)\\\\n\\\\nEvidence files:\\\\n- `evidence/poc-deferred.md` (351 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-theoretical (deferred — medium severity; static evidence in draft.md sufficient for triage)\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"4271b0672bc00c77dc0d7c5bb3d6d881\\",\\"found_at\\":\\"2026-05-06T15:50:43.836977Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":33,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:m13\\",\\"module_name\\":\\"M13: RFC 6455 reserved close code 1013 used for gateway startup state\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"ws-reserved-close-code-1013\\",\\"description\\":\\"# M13: RFC 6455 reserved close code 1013 used for gateway startup state\\\\n\\\\n**Severity**: MEDIUM\\\\n**Finding ID**: M13\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: RFC 6455 reserved close code 1013 used for gateway startup state\\\\nSeverity-Original: MEDIUM\\\\nClass: security\\\\nVerdict: VALID\\\\nPoC-Status: theoretical (deferred — MEDIUM severity; static evidence in draft.md sufficient for triage)\\\\nPre-FP-Flag: no\\\\n---\\\\n\\\\n# p9-004: RFC 6455 reserved close code 1013 used for gateway startup state\\\\n\\\\n## Summary\\\\n\\\\nThe WebSocket message handler sends close code 1013 to clients that connect during gateway startup (sidecar initialization pending). RFC 6455 §7.4.1 explicitly designates 1013 as a reserved code that endpoints MUST NOT use. This is a spec compliance violation with secondary risk of strict-RFC-compliant clients mishandling reconnection and of internal state disclosure via the close reason string.\\\\n\\\\n## Severity: MEDIUM\\\\n\\\\n## RFC Reference\\\\n\\\\nRFC 6455, Section 7.4.1: \\\\\\"Status codes in the range 1000-2999 are reserved for definition by this protocol, its future revisions, and extensions. Status code 1013 is currently reserved; endpoints MUST NOT use it.\\\\\\"\\\\n\\\\nThe appropriate codes for a temporary server unavailability scenario are:\\\\n- 1001: \\\\\\"Going Away\\\\\\" (server shutting down or client should reconnect)\\\\n- 1011: \\\\\\"Internal Server Error\\\\\\" (unexpected server condition)\\\\n- Private-use codes 4000-4999 (e.g., 4503 for \\\\\\"service unavailable retry\\\\\\")\\\\n\\\\n## Code Evidence\\\\n\\\\n**`src/gateway/server/ws-connection/message-handler.ts:469-471`**:\\\\n```typescript\\\\nmarkHandshakeFailure(\\\\\\"startup-sidecars-pending\\\\\\");\\\\nqueueMicrotask(() => close(1013, \\\\\\"gateway starting\\\\\\"));\\\\n```\\\\n\\\\nThis code path is taken when `isStartupSidecarsAvailabilityResult(\\\\\\"pending\\\\\\")` is true during the connection handshake — i.e., when a client connects while the gateway has not yet completed startup initialization.\\\\n\\\\nFor comparison, the same file correctly uses private-use codes elsewhere:\\\\n- Line 854: `close(4001, \\\\\\"gateway auth changed\\\\\\")`\\\\n- Line 1565: `close(4001, \\\\\\"gateway auth changed\\\\\\")`\\\\n\\\\n## Attack Vector\\\\n\\\\n1. **Reconnect storm**: A strict RFC-compliant WebSocket client library (e.g., `ws` with strict close-code validation, or a Java `javax.websocket` client) that treats reserved codes as protocol errors may disconnect permanently or enter an aggressive reconnect loop. An attacker who can repeatedly trigger gateway sidecar delays (e.g., by repeatedly starting/stopping the gateway) causes clients to receive 1013 closures in a tight loop.\\\\n\\\\n2. **Information disclosure**: The close reason string `\\\\\\"gateway starting\\\\\\"` reveals internal server state to connecting clients, confirming that the gateway is in a startup state and timing reconnect attempts accordingly.\\\\n\\\\n## Exploit Conditions\\\\n\\\\n- Client connects during the (typically brief) gateway startup window.\\\\n- Client\'s WebSocket library validates close codes against RFC 6455 and treats reserved codes as errors.\\\\n\\\\n## Impact\\\\n\\\\nRFC compliance violation. Strict clients may mishandle reconnection. Close reason leaks internal startup state. Not directly exploitable for auth bypass or privilege escalation.\\\\n\\\\n## Remediation\\\\n\\\\nReplace `close(1013, \\\\\\"gateway starting\\\\\\")` with a private-use code or a defined code:\\\\n```typescript\\\\n// Option A: private-use code with clear semantics\\\\nclose(4503, \\\\\\"gateway starting; retry shortly\\\\\\");\\\\n\\\\n// Option B: use 1001 (\\\\\\"going away\\\\\\") with retry hint\\\\nclose(1001, \\\\\\"gateway starting\\\\\\");\\\\n```\\\\n\\\\nFor consistency with the existing `4001` usage elsewhere in the file, prefer a private-use `4xxx` code.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC: theoretical (no executable script; see evidence/ for static analysis)\\\\n\\\\nEvidence files:\\\\n- `evidence/poc-deferred.md` (351 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-theoretical (deferred — medium severity; static evidence in draft.md sufficient for triage)\\"],\\"status\\":\\"draft\\",\\"remediation\\":\\"Replace `close(1013, \\\\\\"gateway starting\\\\\\")` with a private-use code or a defined code:\\\\n```typescript\\\\n// Option A: private-use code with clear semantics\\\\nclose(4503, \\\\\\"gateway starting; retry shortly\\\\\\");\\\\n\\\\n// Option B: use 1001 (\\\\\\"going away\\\\\\") with retry hint\\\\nclose(1001, \\\\\\"gateway starting\\\\\\");\\\\n```\\\\n\\\\nFor consistency with the existing `4001` usage elsewhere in the file, prefer a private-use `4xxx` code.\\\\n\\\\n---\\\\n\\\\n##\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"ac3d46f2eb632cd67e30df712773e376\\",\\"found_at\\":\\"2026-05-06T15:50:43.836973Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":32,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:m12\\",\\"module_name\\":\\"M12: MCP batch request — JSON-RPC notification with injected id causes response desync\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"mcp-batch-notification-desync\\",\\"description\\":\\"# M12: MCP batch request — JSON-RPC notification with injected id causes response desync\\\\n\\\\n**Severity**: MEDIUM\\\\n**Finding ID**: M12\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: MCP batch request — JSON-RPC notification with injected id causes response desync\\\\nSeverity-Original: MEDIUM\\\\nClass: security\\\\nVerdict: VALID\\\\nPoC-Status: theoretical (deferred — MEDIUM severity; static evidence in draft.md sufficient for triage)\\\\nPre-FP-Flag: no\\\\n---\\\\n\\\\n# p9-003: MCP batch request — JSON-RPC notification with injected id causes response desync\\\\n\\\\n## Summary\\\\n\\\\nThe MCP loopback server processes JSON-RPC batch requests by iterating all messages and collecting non-null responses. Per JSON-RPC 2.0, a notification (a request without an `id` field) MUST NOT receive a response. However, the code does not validate that a message sent as a \\\\\\"notification method\\\\\\" (e.g., `notifications/initialized`) truly has no `id`. If an attacker or malfunctioning client sends `{ method: \\\\\\"notifications/initialized\\\\\\", id: \\\\\\"req-99\\\\\\" }`, the handler returns `null` (no response), so `req-99` receives no response in the batch reply. A strict MCP client waiting for a response to `req-99` will hang or time out.\\\\n\\\\n## Severity: MEDIUM\\\\n\\\\n## Spec Reference\\\\n\\\\nJSON-RPC 2.0 specification §4 — \\\\\\"A Notification is a Request object without an `id` member. A Request object that is a Notification signifies the Client\'s lack of interest in the corresponding Response object, and as such no Response object needs to be returned to the client. The Server MUST NOT reply to a Notification.\\\\\\"\\\\n\\\\nMCP over JSON-RPC — `notifications/initialized` and `notifications/cancelled` are defined as notifications (no `id`). Sending them with an `id` is a client error, but the server should return a JSON-RPC error for the invalid message rather than silently dropping it.\\\\n\\\\n## Code Evidence\\\\n\\\\n**`src/gateway/mcp-http.handlers.ts:59-61`**:\\\\n```typescript\\\\ncase \\\\\\"notifications/initialized\\\\\\":\\\\ncase \\\\\\"notifications/cancelled\\\\\\":\\\\n  return null;    // ← always returns null regardless of whether id is present\\\\n```\\\\n\\\\n**`src/gateway/mcp-http.ts:140`**:\\\\n```typescript\\\\nif (response !== null) {\\\\n  responses.push(response);\\\\n}\\\\n```\\\\n\\\\nIf a client sends `{ jsonrpc: \\\\\\"2.0\\\\\\", method: \\\\\\"notifications/initialized\\\\\\", id: \\\\\\"req-99\\\\\\" }`, `handleMcpJsonRpc` returns `null`, the response for `req-99` is dropped from the batch response array, and the client receives no response for that `id`. Per JSON-RPC 2.0, the server should respond with an error for any message that cannot be processed as a notification (since it has an `id`).\\\\n\\\\n## Attack Vector\\\\n\\\\nA malformed or adversarial MCP client sends a batch mixing a notification with an injected `id` alongside a legitimate `tools/call` request. The `tools/call` receives a response but the notification with `id` receives none. The client\'s response demultiplexer may hang, time out, or misassign the received response to the wrong pending request.\\\\n\\\\n## Exploit Conditions\\\\n\\\\n- Client must be able to reach the MCP loopback server (localhost only).\\\\n- Client must send a batch containing a notification method with an `id` set.\\\\n\\\\n## Impact\\\\n\\\\nDenial of service via response desynchronization for MCP batch clients. In the worst case, a client framework that strictly expects a response for every message with an `id` will permanently stall that connection slot.\\\\n\\\\n## Remediation\\\\n\\\\nFor messages that match a notification method but carry an `id`, return a JSON-RPC error:\\\\n```typescript\\\\ncase \\\\\\"notifications/initialized\\\\\\":\\\\ncase \\\\\\"notifications/cancelled\\\\\\":\\\\n  if (id !== undefined && id !== null) {\\\\n    return jsonRpcError(id, -32600, \\\\\\"Invalid Request: notification methods must not have an id\\\\\\");\\\\n  }\\\\n  return null;\\\\n```\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC: theoretical (no executable script; see evidence/ for static analysis)\\\\n\\\\nEvidence files:\\\\n- `evidence/poc-deferred.md` (351 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-theoretical (deferred — medium severity; static evidence in draft.md sufficient for triage)\\"],\\"status\\":\\"draft\\",\\"remediation\\":\\"For messages that match a notification method but carry an `id`, return a JSON-RPC error:\\\\n```typescript\\\\ncase \\\\\\"notifications/initialized\\\\\\":\\\\ncase \\\\\\"notifications/cancelled\\\\\\":\\\\n  if (id !== undefined && id !== null) {\\\\n    return jsonRpcError(id, -32600, \\\\\\"Invalid Request: notification methods must not have an id\\\\\\");\\\\n  }\\\\n  return null;\\\\n```\\\\n\\\\n---\\\\n\\\\n##\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"ae0c645e5354a266a64bdd0022269b4d\\",\\"found_at\\":\\"2026-05-06T15:50:43.836971Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":31,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:m11\\",\\"module_name\\":\\"M11: MCP initialize handler silently falls back on unknown protocolVersion\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"mcp-initialize-no-version-reject\\",\\"description\\":\\"# M11: MCP initialize handler silently falls back on unknown protocolVersion\\\\n\\\\n**Severity**: MEDIUM\\\\n**Finding ID**: M11\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: MCP initialize handler silently falls back on unknown protocolVersion\\\\nSeverity-Original: MEDIUM\\\\nClass: security\\\\nVerdict: VALID\\\\nPoC-Status: theoretical (deferred — MEDIUM severity; static evidence in draft.md sufficient for triage)\\\\nPre-FP-Flag: no\\\\n---\\\\n\\\\n# p9-002: MCP initialize handler silently falls back on unknown protocolVersion\\\\n\\\\n## Summary\\\\n\\\\nThe MCP loopback server\'s `initialize` handler accepts any `protocolVersion` string from the client and, when no match is found in the supported versions list, silently responds with `protocolVersion: MCP_LOOPBACK_SUPPORTED_PROTOCOL_VERSIONS[0]` (the newest version) and `{ ok: true }`. The MCP specification requires the server to return a JSON-RPC error when the client\'s requested version is not supported, not silently \\\\\\"negotiate\\\\\\" to an arbitrary version.\\\\n\\\\n## Severity: MEDIUM\\\\n\\\\n## Spec Reference\\\\n\\\\nMCP protocol specification (2024-11-05, 2025-03-26) — `initialize` request/response contract. The server MUST either respond with a `protocolVersion` that it supports AND that is acceptable to the client, or return a JSON-RPC error if no compatible version exists.\\\\n\\\\n## Code Evidence\\\\n\\\\n**`src/gateway/mcp-http.protocol.ts:3`**:\\\\n```typescript\\\\nexport const MCP_LOOPBACK_SUPPORTED_PROTOCOL_VERSIONS = [\\\\\\"2025-03-26\\\\\\", \\\\\\"2024-11-05\\\\\\"] as const;\\\\n```\\\\n\\\\n**`src/gateway/mcp-http.handlers.ts:45-57`**:\\\\n```typescript\\\\ncase \\\\\\"initialize\\\\\\": {\\\\n  const clientVersion = (methodParams?.protocolVersion as string) ?? \\\\\\"\\\\\\";\\\\n  const negotiated =\\\\n    MCP_LOOPBACK_SUPPORTED_PROTOCOL_VERSIONS.find((version) => version === clientVersion) ??\\\\n    MCP_LOOPBACK_SUPPORTED_PROTOCOL_VERSIONS[0];    // ← fallback to newest on no match\\\\n  return jsonRpcResult(id, {\\\\n    protocolVersion: negotiated,   // ← returns server\'s preferred version silently\\\\n    capabilities: { tools: {} },\\\\n    serverInfo: { name: MCP_LOOPBACK_SERVER_NAME, version: MCP_LOOPBACK_SERVER_VERSION },\\\\n  });\\\\n}\\\\n```\\\\n\\\\nWhen `clientVersion` is `\\\\\\"2099-01-01\\\\\\"` (unknown future), the server responds with `protocolVersion: \\\\\\"2025-03-26\\\\\\"` and success. The MCP spec requires a JSON-RPC error (code `-32602`) if the server cannot support the requested version.\\\\n\\\\n## Attack Vector\\\\n\\\\n1. **Rogue MCP server → agent-as-client**: When OpenClaw\'s agent runtime acts as an MCP client connecting to a compromised or attacker-controlled MCP server, the attacker-controlled server can respond to `initialize` with any protocolVersion. If the agent validates the response version against what it requested (standard MCP client behavior), a mismatch would be surfaced. However, the OpenClaw MCP loopback server (which external MCP clients connect to) accepts any version and proceeds — so external MCP clients connecting with an unsupported version silently receive a different version than they expect.\\\\n\\\\n2. **Protocol confusion**: An MCP client that has version-specific behavior (e.g., uses features only available in `2024-11-05`) connects claiming `2024-11-05` but the server falls back to `2025-03-26` on a future update — behavioral mismatch.\\\\n\\\\n3. **Capability set exploitation**: If a future protocol version adds security-relevant capability negotiation (e.g., `sampling`, `roots`, `prompts`), and a client sends an unsupported version expecting to fall back to a capability-minimal server, the server may instead respond with a version that exposes additional capabilities the client did not intend to accept.\\\\n\\\\n## Exploit Conditions\\\\n\\\\n- Attacker can send requests to the MCP loopback server (requires local access or SSRF to localhost).\\\\n- OR the agent connects to an attacker-controlled MCP server that sends version mismatches.\\\\n\\\\n## Impact\\\\n\\\\nProtocol version confusion; capability negotiation spoofing; potential behavioral mismatch in version-sensitive MCP operations. Impact is limited to the MCP loopback channel, which is localhost-only.\\\\n\\\\n## Remediation\\\\n\\\\nWhen `clientVersion` is not in `MCP_LOOPBACK_SUPPORTED_PROTOCOL_VERSIONS`, return a JSON-RPC error:\\\\n```typescript\\\\nif (!MCP_LOOPBACK_SUPPORTED_PROTOCOL_VERSIONS.includes(clientVersion as any)) {\\\\n  return jsonRpcError(id, -32602, `Unsupported protocolVersion: ${clientVersion}`);\\\\n}\\\\n```\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC: theoretical (no executable script; see evidence/ for static analysis)\\\\n\\\\nEvidence files:\\\\n- `evidence/poc-deferred.md` (351 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-theoretical (deferred — medium severity; static evidence in draft.md sufficient for triage)\\"],\\"status\\":\\"draft\\",\\"remediation\\":\\"When `clientVersion` is not in `MCP_LOOPBACK_SUPPORTED_PROTOCOL_VERSIONS`, return a JSON-RPC error:\\\\n```typescript\\\\nif (!MCP_LOOPBACK_SUPPORTED_PROTOCOL_VERSIONS.includes(clientVersion as any)) {\\\\n  return jsonRpcError(id, -32602, `Unsupported protocolVersion: ${clientVersion}`);\\\\n}\\\\n```\\\\n\\\\n---\\\\n\\\\n##\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"2d9ee0af02a947f53c477fddc28c2c34\\",\\"found_at\\":\\"2026-05-06T15:50:43.836968Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":30,\\"project_uuid\\":\\"0000000 ayRequestHandlerOptions[\\\\\\"client\\\\\\"]): boolean {\\\\n  const info = client?.connect?.client;\\\\n  return (\\\\n    info?.id === GATEWAY_CLIENT_NAMES.CLI &&\\\\n    info?.mode === GATEWAY_CLIENT_MODES.CLI &&\\\\n    info?.displayName === \\\\\\"ACP\\\\\\" &&\\\\n    info?.version === \\\\\\"acp\\\\\\"\\\\n  );\\\\n}\\\\n```\\\\n\\\\n`info.displayName` is client-supplied metadata from the connection handshake. Any caller with `operator.write` scope can assert `client = { id: \\\\\\"cli\\\\\\", mode: \\\\\\"cli\\\\\\", displayName: \\\\\\"ACP\\\\\\", version: \\\\\\"acp\\\\\\" }` to satisfy `isAcpBridgeClient`, potentially gaining ACP bridge client access rights.\\\\n\\\\nThe other fields (`id`, `mode`) are enum-based and may be constrained by schema validation at the boundary — the key question is whether `displayName` can be freely set by any WS caller.\\\\n\\\\n## Attacker Control\\\\n- Input: WS handshake `connect.client` object (attacker-controllable with valid auth)\\\\n- Runtime: Gateway chat dispatch\\\\n- Boundary: Authenticated WS caller → ACP bridge dispatch path\\\\n\\\\n## Effect\\\\nAny authenticated gateway caller (operator.write scope) can self-declare as ACP bridge client, potentially accessing system provenance injection or other ACP-gated functionality.\\\\n\\\\n## Enrichment Classification\\\\n**likely security** — mutable client-supplied field used for capability gating; crosses auth boundary\\\\n\\\\n## CodeQL Reachability\\\\nreachable: true (isAcpBridgeClient called in chat.send dispatch path)\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC: theoretical (no executable script; see evidence/ for static analysis)\\\\n\\\\nEvidence files:\\\\n- `evidence/poc-deferred.md` (351 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phas ion-file-path-usage`\\\\n- Tool source: custom semgrep\\\\n\\\\n## Details\\\\n\\\\n```typescript\\\\nexport function resolveSessionFilePath(\\\\n  sessionId: string,\\\\n  entry?: { sessionFile?: string },\\\\n  opts?: SessionFilePathOptions,\\\\n): string {\\\\n  const sessionsDir = resolveSessionsDir(opts);\\\\n  const candidate = entry?.sessionFile?.trim();\\\\n  if (candidate) {\\\\n    try {\\\\n      return resolvePathWithinSessionsDir(sessionsDir, candidate, { agentId: opts?.agentId });\\\\n    } catch {\\\\n      // Keep handlers alive when persisted metadata is stale/corrupt.\\\\n      // Falls through to default path below.\\\\n    }\\\\n  }\\\\n  return resolveSessionTranscriptPathInDir(sessionId, sessionsDir);\\\\n}\\\\n```\\\\n\\\\nWhen `resolvePathWithinSessionsDir` throws (e.g., because `entry.sessionFile` references a path outside the sessions directory), the error is silently swallowed. The function then falls through to the default `resolveSessionTranscriptPathInDir(sessionId, ...)`. The caller receives a valid path and may proceed with operations using the wrong (default) transcript file — potentially reading/writing the wrong session\'s data.\\\\n\\\\nAdditionally, 34 call sites use `resolveSessionFilePath` across `src/agents/`, `src/auto-reply/`, `src/commands/`. If any attacker-controllable `entry.sessionFile` metadata can force a traversal attempt, the fail-open means the path error is silently ignored rather than surfaced.\\\\n\\\\n## Attacker Control\\\\n- Input: Persisted session metadata (sessionFile field in sessions.json)\\\\n- Runtime: Gateway/agent runtime\\\\n- Boundary: Persisted metadata → file system path resolution\\\\n\\\\n## Effect\\\\nSession confusion: reading wrong transcript data; potential disclosure of other session transcripts if attacker can craft a symlink that resolves to a sibling session before the catch swallows the error.\\\\n\\\\n## Enrichment Classification\\\\n**likely security** — attacker-controlled metadata crosses path containment boundary with fail-open swallowing guard failures\\\\n\\\\n## CodeQL Reachability\\\\nreachable: true (34 call sites, all in production code paths)\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC: theoretical (no executable script; see evidence/ for static analysis)\\\\n\\\\nEvidence files:\\\\n- `evidence/poc-deferred.md` (351 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-theoretical (deferred — medium severity; static evidence in draft.md sufficient for triage)\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"85d69bfcbc88878e334e66c953aef3ba\\",\\"found_at\\":\\"2026-05-06T15:50:43.836951Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":24,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:m4\\",\\"module_name\\":\\"M4: Provider extension OAuth and API callers bypass fetchWithSsrFGuard (20 sites)\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"ssrf-unguarded-fetch-extensions\\",\\"description\\":\\"# M4: Provider extension OAuth and API callers bypass fetchWithSsrFGuard (20 sites)\\\\n\\\\n**Severity**: MEDIUM\\\\n**Finding ID**: M4\\\\n**Repository**: openclaw/open
