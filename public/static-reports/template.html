rgz\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"archive-extract-preflight-parity-tar-bz2-vs-zip-targz\\",\\"description\\":\\"# M3: Archive Extract Preflight Parity Tar Bz2 Vs Zip Targz\\\\n\\\\n**Severity**: MEDIUM\\\\n**Finding ID**: M3\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\nPhase: 10\\\\nSequence: 072\\\\nSlug: archive-extract-preflight-parity-tar-bz2-vs-zip-targz\\\\nVerdict: VALID\\\\nRationale: Skills-install extraction routes tar.gz and zip archives through `extractArchiveSafe` while the tar.bz2 path independently runs an explicit symlink-aware preflight loop with hash-stability verification. The asymmetry indicates the unified safe-extractor\'s coverage parity is structurally load-bearing and untested at this boundary; an operator-supplied skill archive whose tar.gz/zip handling diverges from the explicit tar.bz2 checks could escape `targetDir` via a symlink entry.\\\\nSeverity-Original: MEDIUM\\\\nPoC-Status: pending\\\\nPre-FP-Flag: check-3-ambiguous (concrete bypass conditional on `extractArchiveSafe` body audit not performed under read-only chamber constraints)\\\\nDebate: archon/chamber-workspace/chamber-03-persistence/debate.md\\\\nOrigin-Sources: chamber-03 H-75 novel; structural review of `src/agents/skills-install-extract.ts:141-220` and `src/agents/skills-install-download.ts:61-66`\\\\n\\\\n## Summary\\\\n\\\\n`extractArchive` in `src/agents/skills-install-extract.ts` handles three archive types but enforces explicit zip-slip / symlink-entry / hash-stability preflight checks ONLY in the `tar.bz2` branch (lines 178-220). The `zip` branch (lines 155-164) and `tar.gz` branch (lines 166-176) delegate to `extractArchiveSafe(...)` and return `{ok}` without independent preflight enumeration. Either `extractArchiveSafe` already replicates every check (in which case the `tar.bz2` explicit loop is redundant — a maintenance fragility), or it does not (in which case operator-installable tar.gz / zip artefacts are subject to a weaker safety boundary than tar.bz2). Skills install accepts archive URLs supplied by the operator (or by anyone reaching the skills-install path with operator scope). A symlink entry inside a tar.gz that points to `../../../etc/openclaw/auth-profiles.json` (or any operator-home target) escapes `targetDir` if the unified extractor lacks symlink refusal.\\\\n\\\\n## Location\\\\n\\\\n- `src/agents/skills-install-extract.ts:141-220` (`extractArchive` — branch divergence).\\\\n- `src/agents/skills-install-extract.ts:155-164` (zip → `extractArchiveSafe` only).\\\\n- `src/agents/skills-install-extract.ts:166-176` (tar.gz → `extractArchiveSafe` only).\\\\n- `src/agents/skills-install-extract.ts:178-220` (tar.bz2 — full explicit preflight + hash-stability + per-entry `checkTarEntrySafety`).\\\\n- `src/agents/skills-install-download.ts:61-66` (operator-controlled URL → archive type via extension).\\\\n- `extractArchiveSafe` body (audit gap — full body not read in chamber).\\\\n\\\\n## Attacker Control\\\\n\\\\n- Any path that reaches skills-install with attacker-influenced URL/archive content (operator scope; reachable via Chamber-02 / Chamber-03 admin-scope chains, or directly when an operator manually installs from an attacker-supplied URL).\\\\n- Archive contents are wholly attacker-authored.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- Operator-supplied URL → on-disk paths inside `~/.openclaw/skills/` (intended destination).\\\\n- Pivot via symlink-bearing entry → outside `targetDir` (auth-profiles.json, .env, agent dirs are colocation targets that compose with p8-004, p8-005, p8-007).\\\\n\\\\n## Impact\\\\n\\\\n- If the safe-extractor lacks symlink-entry refusal: zip-slip class write-outside-target with high-value targets in `~/.openclaw/`.\\\\n- Composes with: p8-004 (auth-profiles symlink redirect — the same symlink-write primitive at install time), p8-005 (.env NODE_OPTIONS), p8-007 (sibling-agent dir broadcast).\\\\n- Severity is structural / parity; concrete severity escalates if `extractArchiveSafe` audit reveals coverage gap.\\\\n\\\\n## Evidence\\\\n\\\\nRead-only audit:\\\\n1. `src/agents/skills-install-extract.ts:155-176` — `zip` and `tar.gz` cases each do exactly one `await extractArchiveSafe(...)` call and `return {stdout:\\\\\\"\\\\\\", stderr:\\\\\\"\\\\\\", code:0}`. No preflight enumerator runs, no `checkTarEntrySafety` runs, no `verifyArchiveHashStable` runs.\\\\n2. `src/agents/skills-install-extract.ts:178-220` — `tar.bz2` runs `prepareArchiveDestinationDir`, `hashFileSha256` for preflight hash, `readTarPreflight`, builds `createTarEntryPreflightChecker`, iterates every entry, then calls `verifyArchiveHashStable`. This is the dense form.\\\\n3. The asymmetry asserts a parity contract that is not enforced by either compile-time type or by a shared helper.\\\\n4. `extractArchiveSafe` is the unified path; chamber did not read its full body. Whether it covers symlink refusal + post-extract real-path confinement + hash stability is unverified here.\\\\n\\\\nDefense rebuttal:\\\\n- The unified extractor likely covers basic path traversal (`..`-prefix rejection). Symlink-entry handling and post-extract real-path confinement are the higher-order checks the tar.bz2 branch enforces explicitly.\\\\n- Hash-stability (defense against TOCTOU between preflight and extract) is the property hardest to silently drop; the explicit `verifyArchiveHashStable` in tar.bz2 with no analogue in tar.gz/zip is the strongest signal of parity gap.\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Audit `extractArchiveSafe` body (Phase 11/12 task — outside read-only chamber).\\\\n2. If no symlink-entry refusal: craft a tar.gz with a symlink entry whose linkname is `../../../.openclaw/auth-profiles.json`, install via skills-install. Observe write redirect.\\\\n3. If no `verifyArchiveHashStable` analogue: race-mutate the archive on disk between preflight and full-extract.\\\\n\\\\nRemediation: extract the explicit checks into a single helper `safeExtractWithPreflight({kind, archivePath, destDir, stripComponents, timeoutMs})` and route ALL three branches through it. Delete the divergent tar.bz2 inline preflight in favour of the helper. Add a unit test that explicitly exercises symlink-entry refusal for each of `zip`, `tar.gz`, `tar.bz2`.\\\\n\\\\n---\\\\n\\\\n## Debate Transcript (excerpt)\\\\n\\\\n# Review Chamber: chamber-03-persistence\\\\n\\\\nCluster: PERSISTENCE & DATA EXFILTRATION\\\\nDFD Slices: provider-OAuth, auth-profiles store, sibling-agent dir sync, ~/.openclaw/.env respawn, Sparkle macOS update channel, mobile-pair admin reads, SSRF guard adoption, plugin install/extract, prototype-pollution boundaries\\\\nNNN Range: 070-099\\\\nStarted: 2026-05-06T12:10:00Z\\\\nStatus: ACTIVE\\\\nMode: COMPRESSED/SOLO (synthesizer doubles as ideator/tracer/advocate; pre-traced inputs from Teams 04 & 05)\\\\n\\\\n## Chamber Context — Pre-Seeded Inputs\\\\n\\\\n### Probe summaries\\\\n- `archon/probe-workspace/team-04-mobile-mcp/probe-summary.md` — 3 VALIDATED (Sparkle no EdDSA = CRITICAL; zero-scope operator pairing PH-06 = HIGH; Android TOFU hostname-verifier-true = HIGH); 4 NEEDS-DEEPER (incl. PH-12 mobile-pair → admin → reads auth-profiles).\\\\n- `archon/probe-workspace/team-05-provider-oauth/probe-summary.md` — 8 VALIDATED (CRITICAL: PH-03 symlink, PH-11 NODE_OPTIONS, PH-06 catalog shadow); HIGH: sibling-sync, identity-vacuous adoption, TLS preflight permissive; 2 NEEDS-DEEPER (CH-12, library-internal port-1455 race).\\\\n\\\\n### Existing finding drafts already covering this cluster (DO NOT recreate)\\\\n| Draft | Severity | Topic |\\\\n|-------|----------|-------|\\\\n| p4-002 | HIGH | SSRF MiniMax-VLM |\\\\n| p4-003 | MEDIUM | SSRF PDF-Google |\\\\n| p4-005 | MEDIUM | SSRF unguarded fetch in 20 extension provider sites |\\\\n| p4-007 | MEDIUM | session path fail-open |\\\\n| p4-012 | MEDIUM | SSRF APNS relay |\\\\n| p7-002 | HIGH | device-pair non-operator scope bypass |\\\\n| p7-004 | HIGH | channel-webhook no claimable dedupe |\\\\n| p7-005 | MEDIUM | plugin registry stale-read after disable |\\\\n| p8-003 | CRITICAL | provider catalog shadow → refresh-token exfiltration |\\\\n| p8-004 | CRITICAL | auth-profiles symlink redirect |\\\\n| p8-005 | CRITICAL | dotenv NODE_OPTIONS respawn RCE (Chamber-02 already extended) |\\\\n| p8-007 | HIGH | sibling-agent dir broadcast credential copy |\\\\n| p9-001 | HIGH | Sparkle no SUPublicEDKey (spec-gap; CRITICAL when chained) |\\\\n\\\\n### Cross-team chains in scope (don\'t regenerate the primitives)\\\\n- **T05 Chain 1**: symlink + sibling sync ⇒ all provider refresh tokens exfiltrated (p8-004 + p8-007)\\\\n- **T05 Chain 2**: ~/.openclaw/.env NODE_OPTIONS ⇒ in-process credential interception (p8-005)\\\\n- **T05 Chain 3**: provider catalog shadow ⇒ refresh-token leak (p8-003)\\\\n- **T04 Chain 1**: Sparkle unsigned update ⇒ macOS RCE ⇒ gateway operator.admin (p9-001)\\\\n- **T04 Chain 3**: Android TOFU ⇒ session captured/replayed\\\\n- **Phase-8 Chain C**: catalog shadow + .env NODE_OPTIONS combined with Team-01 entry\\\\n\\\\n## Chamber Mandate (NEW HYPOTHESES — cross-mode novelty only)\\\\n\\\\nThe chamber may NOT re-walk symlink redirect, NODE_OPTIONS respawn, catalog shadow, sibling-broadcast, or Sparkle missing EdDSA — all already drafted. Mandate: surface NEW high-impact compositions and cover the Team-04/05 NEEDS-DEEPER items.\\\\n\\\\n1. **H-70**: Sparkle appcast XML feed parsing — XXE / billion-laughs / external-entity expansion. Sparkle 2.x parses appcast XML with Apple\'s XMLParser. Without `SUPublicEDKey` *and* without `SUFeedURL` pinned, the feed URL itself can be MITM\'d, and the XML parser may be configured to resolve external entities.\\\\n2. **H-71**: Cross-team CRITICAL chain — Symlink + Sibling-broadcast composed with Sparkle (Team 04 Chain 1 + Team 05 Chain 1) — macOS RCE places symlink ⇒ next refresh writes are exfiltrated AND attacker has on-device persistence ⇒ permanent compromise across ALL provider tokens, surviving auth rotations.\\\\n3. **H-72**: Mobile-pair admin → reads auth-profiles indirectly — Team 04 PH-12 + Team 05 CH-12 NEEDS-DEEPER chain. Even though `models-auth-status` does not return raw tokens, an operator-admin scope token reaches `config.patch` (mutate `auth.profiles[]`), `plugins.install` (Chamber-02 H-41), and `runtime.dispatchGatewayMethod` — yielding the same token-exfil class without needing on-device access.\\\\n4. **H-73**: Operator session re-auth capture — deleteSession DoS (Chamber-01 p10-001) → operator forced to re-login → attacker positioned as channel intermediary captures fresh OAuth code (PKCE-protected, but the RP-side flow runs through libraries with the port-1455 listener race noted in T05 NEEDS-DEEPER PH-09).\\\\n5. **H-74**: Memory-wiki case-insensitive bypass amplified by symlink + provider context — wiki path resolution may use case-insensitive comparison on darwin/Windows; combined with auth-profiles symlink (p8-004), an attacker plants `Auth-Profiles.json` symlink hitting the same write path on a case-insensitive FS.\\\\n6. **H-75**: Tar/zip-slip in plugin install / archive extraction — `extractArchive` for `tar.bz2` runs full preflight, but `tar.gz` and `zip` paths delegate to `extractArchiveSafe` — chamber must verify this safe-extractor enforces stripComponents/path-confinement consistently for symlink-bearing archives. The strip count is operator-supplied. A zip-slip via symlink entry in a `tar.gz` artefact is a structural risk if the safe-extractor is the only line of defense\\\\n\\\\n*(truncated; see debate.md for full transcript)*\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC: theoretical (no executable script; see evidence/ for static analysis)\\\\n\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"c2ccca043562c32ffed9e4f1eb158258\\",\\"found_at\\":\\"2026-05-06T15:50:43.836945Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":22,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:m2\\",\\"module_name\\":\\"M2: Allowlist Redos And Prompt Render Redos\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"allowlist-redos-and-prompt-render-redos\\",\\"description\\":\\"# M2: Allowlist Redos And Prompt Render Redos\\\\n\\\\n**Severity**: MEDIUM\\\\n**Finding ID**: M2\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nPhase: 10\\\\nSequence: 045\\\\nSlug: allowlist-redos-and-prompt-render-redos\\\\nVerdict: VALID\\\\nRationale: Allowlist matchers and approval-prompt renderers compile patterns via `new RegExp(...)` without timeout / RE2 isolation; pathological inputs cause catastrophic backtracking, yielding either denial-of-approval (DoS) or — if a caller-imposed timeout returns a default — fail-open against the deny.\\\\nSeverity-Original: MEDIUM\\\\nPoC-Status: pending\\\\nPre-FP-Flag: none\\\\nOrigin-Sources:\\\\n  - chamber-novel (regex audit of approval gate code paths)\\\\n  - archon/probe-workspace/team-02-exec-approval/probe-summary.md (allowlist matcher surface)\\\\nDebate: archon/chamber-workspace/chamber-02-execution/debate.md\\\\n\\\\n## Summary\\\\nMultiple regex evaluations on the exec-approval critical path are compiled from JSON-config-supplied (or attacker-influenced) patterns, executed inline, with no timeout. Catastrophic backtracking on pathological inputs (e.g., long runs of repeating chars against `(a+)+$` style patterns) can hang the approval gate\'s event loop for many seconds. Two outcomes:\\\\n\\\\n- **Denial-of-approval**: legitimate operator approvals time out; gateway becomes unresponsive while the regex engine spins.\\\\n- **Fail-open under timeout**: if any wrapper applies a per-evaluation timeout and on timeout returns \\\\\\"no match\\\\\\" (a common but wrong default), a malicious input that *should* be blocked is admitted.\\\\n\\\\nRegexes also appear in approval-prompt rendering (markdown / ANSI strippers) — the same DoS surface there blocks the operator from ever seeing the prompt.\\\\n\\\\n## Location\\\\n- Allowlist pattern compilation: `src/infra/exec-allowlist-config.ts` (raw `new RegExp` on config-supplied patterns)\\\\n- Banner/prompt renderers: `src/infra/exec-approval-channel-runtime.ts` and renderer helpers\\\\n- No `re2` dependency, no `vm`/Worker isolation around regex evaluation\\\\n\\\\n## Attacker Control\\\\n- For allowlist patterns: anyone who can write to the policy config (admin / operator); however, plugin-supplied policy fragments may also reach this surface (need verify).\\\\n- For prompt renderers: any plugin that supplies `description` strings can craft pathological input.\\\\n\\\\n## Trust Boundary Crossed\\\\nUntrusted-or-config-supplied pattern → regex engine → approval-gate decision (DoS or fail-open).\\\\n\\\\n## Impact\\\\nDoS of the approval gate (gateway unresponsive while the matcher loops). If any timeout wrapper defaults to \\\\\\"no match\\\\\\" on timeout, an attacker bypasses the deny by forcing it to time out.\\\\n\\\\n## Evidence\\\\n- No `re2` import in package manifests.\\\\n- No `vm.runInContext` / Worker boundary around the matcher.\\\\n- Patterns reach `new RegExp` with raw strings (Team-02 enumerated allowlist surface includes user-pattern matchers in the policy config).\\\\n\\\\n## Reproduction Steps\\\\n1. Construct a regex pattern with nested quantifiers (`(a+)+$`) in the policy config OR a plugin-supplied fragment.\\\\n2. Submit a command whose argv contains `aaaaaaaaaaaaaa...!` to force backtracking.\\\\n3. Observe gateway approval gate stalls; event loop blocked.\\\\n\\\\n## Recommended Fix\\\\n- Switch regex evaluation to `re2` (linear-time) for any matcher whose patterns or inputs are not statically authored.\\\\n- If `re2` is not viable, run regex evaluations in a Worker with a hard timeout, and treat timeout as DENY (not allow).\\\\n- Validate config patterns at load time with a complexity / suspicious-construct lint.\\\\n\\\\n## Cross-References\\\\nPattern AP-CHAMBER02-06. Composes weakly with p10-042 (DoS of approval prompt path).\\\\n\\\\n---\\\\n\\\\n## Debate Transcript (excerpt)\\\\n\\\\n# Review Chamber: chamber-02-execution\\\\n\\\\nCluster: CODE EXECUTION & APPROVAL BYPASS\\\\nDFD Slices: exec-approval gate, plugin LSP/MCP spawn, allowlist parser, dotenv→respawn, hot-reload gen-state, device-pairing→admin\\\\nNNN Range: 040-069\\\\nStarted: 2026-05-06T11:30:00Z\\\\nStatus: ACTIVE\\\\nMode: COMPRESSED/SOLO (synthesizer doubles as ideator/tracer/advocate; pre-traced inputs)\\\\n\\\\n## Chamber Context — Pre-Seeded Inputs\\\\n\\\\n### Probe summaries\\\\n- `archon/probe-workspace/team-02-exec-approval/probe-summary.md` — 15 VALIDATED, 7 INVALIDATED-fragile, 9 NEEDS-DEEPER. Critical: CH-08/PH-11 (`allowShellFallback:true` hardcoded), CH-21 (plugin→MCP subprocess bypass). High: PH-08 (`shouldBlockRuntimeDotEnvKey` always false → NODE_OPTIONS), Windows env-var denylist drift.\\\\n- `archon/probe-workspace/team-01-plugin-trust/probe-summary.md` — 15 VALIDATED. Chain 2 workspace-loaded shadow plugin composes here as ENTRY POINT for any LSP-based exec.\\\\n\\\\n### Existing finding drafts already covering this cluster (DO NOT recreate)\\\\n| Draft | Severity | Topic |\\\\n|-------|----------|-------|\\\\n| p4-001 | HIGH | TwiML host-header XML injection |\\\\n| p4-006 | HIGH | lobster runner unfiltered process.env |\\\\n| p4-008 | MEDIUM | process.env spread (45 sites) |\\\\n| p7-001 | HIGH | hot-reload gen-state double-write race |\\\\n| p7-003 | HIGH | allow-once approval replay window |\\\\n| p7-006 | HIGH | concurrent device-pairing race (multi-process / scope laundering) |\\\\n| p7-007 | MEDIUM | exec-approval channel-runtime replay (idempotency) |\\\\n| p8-002 | CRITICAL | plugin LSP shell-fallback + MCP subprocess (Chains 1+2) |\\\\n| p8-005 | CRITICAL | dotenv NODE_OPTIONS respawn RCE (Chain 3) |\\\\n| p9-002 | MEDIUM | MCP initialize no version reject |\\\\n| p9-003 | MEDIUM | MCP batch notification desync |\\\\n| p9-004 | LOW | WS reserved close code 1013 |\\\\n\\\\n### Cross-team chains in scope\\\\n- **Chain B (Phase 8)**: Team 01 workspace-shadow plugin → LSP manifest command → `allowShellFallback` shell:true spawn (already in p8-002).\\\\n- **Phase 7→8 chain**: p7-006 device-pair race ⇒ bootstrap-scoped device token ⇒ install plugin via admin scope ⇒ Chain 1 or 2.\\\\n- **AP-CHAMBER01-02**: handler-body-after-invocation-gate (admin-equivalent reach inside any gated handler).\\\\n\\\\n## Chamber Mandate (NEW HYPOTHESES — cross-mode novelty only)\\\\n\\\\nThe chamber may NOT re-walk allowShellFallback (covered by p8-002), MCP subprocess (covered by p8-002), or NODE_OPTIONS respawn (covered by p8-005). Mandate is to surface NEW high-impact compositions:\\\\n\\\\n1. **H-40**: Phase-7 mobile-pair race (p7-006) → device token holds operator scopes → installs malicious plugin → Chain B exec. (Compose `p7-006` + `p8-002`; explicit chain finding.)\\\\n2. **H-41**: AP-CHAMBER01-02 admin-equivalent handler bodies → call exec-approval-bypassing primitives (e.g. plugin install or LSP config write) directly from a callback-scope handler. Cross-cuts identity into exec.\\\\n3. **H-42**: LLM/tool-input prompt-injection that crafts an exec-approval prompt the operator is talked into approving — e.g. attacker-controlled tool description renders as legitimate-looking approval text via the channel adapter.\\\\n4. **H-43**: Approval-binding TOCTOU — the displayed command differs from the spawned command. After the operator approves a benign-looking request, exec-approval rebuilds argv from a separate state read, yielding a divergent spawn.\\\\n5. **H-44**: Allowlist-parser sibling-bypass — Team-02 INVALIDATED-fragile PH-03 (`<<<` heredoc) hinges on a single token-classification ordering. Adjacent inputs (`<< delim`, ANSI-C `$\'...\'`, process-substitution `<(...)`, brace-expansion fan-out, reserved-word starts `time foo`) may evade similarly.\\\\n6. **H-45**: Catastrophic backtracking in allowlist regex — many allowlist matchers compile user-supplied or config-supplied patterns. ReDoS denial-of-approval (or worse, mismatch under timeout) is a structural risk.\\\\n7. **H-46**: Confused deputy across plugins — plugin A holds admin via Team-01 senderIsOwner short-circuit ⇒ uses runtime SDK to install plugin B (a vendor plugin already enabled in registry) ⇒ plugin B legitimately uses LSP+`allowShellFallback`. Two-hop privilege chain bypassing exec-approval entirely.\\\\n\\\\n(Hard limit: 7 hypotheses. Defer additional NEEDS-DEEPER items to Phase 12 variant-hunt.)\\\\n\\\\n## Round 1 — Ideation (compressed)\\\\n\\\\n### H-40 — Mobile-pair race → admin token → install plugin → Chain B exec\\\\n**Origin**: p7-006 (device-pair race) + p8-002 (Chain B).\\\\n**Claim**: Bootstrap-scoped device token from p7-006 holds operator scopes wider than the WS attacker would have been granted. With those scopes, the attacker calls plugin-install/enable methods, drops a workspace-shadow plugin (Team-01 Chain 2), declares `lspServers[].command=\\\\\\"boom\\\\\\"`, and triggers spawn. Result: arbitrary RCE with no exec-approval prompt, all from a network-adjacent attacker who races device-pair.\\\\n\\\\n### H-41 — Identity→exec amplification of AP-CHAMBER01-02\\\\n**Origin**: AP-CHAMBER01-02 (Chamber 01) + p8-002 surface.\\\\n**Claim**: Inside a `senderIsOwner=true,gat\\\\n\\\\n*(truncated; see debate.md for full transcript)*\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC: theoretical (no executable script; see evidence/ for static analysis)\\\\n\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"6c55159fe6b16d54f1f81b4fcb220d14\\",\\"found_at\\":\\"2026-05-06T15:50:43.83694Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":21,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:m1\\",\\"module_name\\":\\"M1: Approval Binding Toctou Display Vs Spawn\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"approval-binding-toctou-display-vs-spawn\\",\\"description\\":\\"# M1: Approval Binding Toctou Display Vs Spawn\\\\n\\\\n**Severity**: MEDIUM\\\\n**Finding ID**: M1\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nPhase: 10\\\\nSequence: 043\\\\nSlug: approval-binding-toctou-display-vs-spawn\\\\nVerdict: VALID\\\\nRationale: Exec-approval is keyed by request-id and consumed via `consumeAllowOnce` without verifying that the spawn argv/env still match the request-time bytes; reload paths (hot-reload, dotenv reload, plugin hot-reload) running during a pending approval can mutate the resolution so that the approved id maps to different bytes at spawn time.\\\\nSeverity-Original: MEDIUM\\\\nPoC-Status: pending\\\\nPre-FP-Flag: none\\\\nOrigin-Sources:\\\\n  - archon/attack-surface/knowledge-base-report.md (H10)\\\\n  - archon/findings-draft/p7-001-hotreload-gen-state-double-write.md (concurrent reload window)\\\\n  - archon/findings-draft/p7-003-allow-once-approval-replay-window.md\\\\n  - archon/findings-draft/p8-005-dotenv-state-file-node-options-respawn-rce.md\\\\nDebate: archon/chamber-workspace/chamber-02-execution/debate.md\\\\n\\\\n## Summary\\\\nExec-approval requests are identified by id; on consume (`consumeAllowOnce`), the gate verifies that the id is approved and not yet consumed, but does not re-verify that the argv/env about to be spawned match the bytes that were approved. Hot-reload (p7-001), dotenv reload (p8-005 family), and plugin hot-reload all run while approvals can be in flight. A reload landing between approval and spawn can change the resolution that produces the spawn argv — the operator approved bytes A, the system spawns bytes B.\\\\n\\\\n## Location\\\\n- Approval consume: `src/infra/exec-approvals.ts` (`consumeAllowOnce`)\\\\n- Reload windows: `src/gateway/server-reload-handlers.ts:518/544`; dotenv reload paths in `src/infra/dotenv.ts`\\\\n- Spawn sites that re-read config at consume time: `src/plugin-sdk/windows-spawn.ts`, `src/agents/pi-bundle-lsp-runtime.ts`\\\\n\\\\n## Attacker Control\\\\nAttacker who can place an approval request and trigger a reload concurrently. In the simplest form: a plugin that calls `exec-approval.request(...)` and, while it is pending, modifies its own manifest (or a workspace file the gateway watches) to alter resolution.\\\\n\\\\n## Trust Boundary Crossed\\\\nOperator decision (bound to display-time bytes) → spawn (bound to fresh-read bytes). The fact that the system uses two independent reads of the resolution state defeats the operator\'s intent.\\\\n\\\\n## Impact\\\\nApproved-action substitution. Severity MEDIUM because the race window is narrow and requires concurrent reload. Upgrades to HIGH if a deterministic trigger is found in Phase 12.\\\\n\\\\n## Evidence\\\\n- p7-001 confirms a real reload window between L518 and L544.\\\\n- p7-003 confirms allow-once consume window has its own race.\\\\n- No code path observed that hashes-bind argv/env at request time and verifies on consume.\\\\n- Plugin manifests are watched and re-resolved on changes; an attacker plugin can self-modify between request and consume.\\\\n\\\\n## Reproduction Steps\\\\n1. Plugin issues exec-approval for argv A.\\\\n2. While operator is reading the prompt, plugin (or an outer attacker) mutates manifest / config so the resolver now produces argv B.\\\\n3. Operator approves.\\\\n4. Spawn re-reads, produces argv B, executes attacker command.\\\\n\\\\n## Recommended Fix\\\\nAt request time, compute `hash(command, args, cwd, env-subset)` and stash with the request. At consume time, recompute and verify. Reject on mismatch. Also resolves part of p10-042 (display-vs-spawn binding).\\\\n\\\\n## Cross-References\\\\nPattern AP-CHAMBER02-04. Closely related: p10-042 (display vs spawn), p7-001 (reload race), p7-003 (allow-once race).\\\\n\\\\n---\\\\n\\\\n## Debate Transcript (excerpt)\\\\n\\\\n# Review Chamber: chamber-02-execution\\\\n\\\\nCluster: CODE EXECUTION & APPROVAL BYPASS\\\\nDFD Slices: exec-approval gate, plugin LSP/MCP spawn, allowlist parser, dotenv→respawn, hot-reload gen-state, device-pairing→admin\\\\nNNN Range: 040-069\\\\nStarted: 2026-05-06T11:30:00Z\\\\nStatus: ACTIVE\\\\nMode: COMPRESSED/SOLO (synthesizer doubles as ideator/tracer/advocate; pre-traced inputs)\\\\n\\\\n## Chamber Context — Pre-Seeded Inputs\\\\n\\\\n### Probe summaries\\\\n- `archon/probe-workspace/team-02-exec-approval/probe-summary.md` — 15 VALIDATED, 7 INVALIDATED-fragile, 9 NEEDS-DEEPER. Critical: CH-08/PH-11 (`allowShellFallback:true` hardcoded), CH-21 (plugin→MCP subprocess bypass). High: PH-08 (`shouldBlockRuntimeDotEnvKey` always false → NODE_OPTIONS), Windows env-var denylist drift.\\\\n- `archon/probe-workspace/team-01-plugin-trust/probe-summary.md` — 15 VALIDATED. Chain 2 workspace-loaded shadow plugin composes here as ENTRY POINT for any LSP-based exec.\\\\n\\\\n### Existing finding drafts already covering this cluster (DO NOT recreate)\\\\n| Draft | Severity | Topic |\\\\n|-------|----------|-------|\\\\n| p4-001 | HIGH | TwiML host-header XML injection |\\\\n| p4-006 | HIGH | lobster runner unfiltered process.env |\\\\n| p4-008 | MEDIUM | process.env spread (45 sites) |\\\\n| p7-001 | HIGH | hot-reload gen-state double-write race |\\\\n| p7-003 | HIGH | allow-once approval replay window |\\\\n| p7-006 | HIGH | concurrent device-pairing race (multi-process / scope laundering) |\\\\n| p7-007 | MEDIUM | exec-approval channel-runtime replay (idempotency) |\\\\n| p8-002 | CRITICAL | plugin LSP shell-fallback + MCP subprocess (Chains 1+2) |\\\\n| p8-005 | CRITICAL | dotenv NODE_OPTIONS respawn RCE (Chain 3) |\\\\n| p9-002 | MEDIUM | MCP initialize no version reject |\\\\n| p9-003 | MEDIUM | MCP batch notification desync |\\\\n| p9-004 | LOW | WS reserved close code 1013 |\\\\n\\\\n### Cross-team chains in scope\\\\n- **Chain B (Phase 8)**: Team 01 workspace-shadow plugin → LSP manifest command → `allowShellFallback` shell:true spawn (already in p8-002).\\\\n- **Phase 7→8 chain**: p7-006 device-pair race ⇒ bootstrap-scoped device token ⇒ install plugin via admin scope ⇒ Chain 1 or 2.\\\\n- **AP-CHAMBER01-02**: handler-body-after-invocation-gate (admin-equivalent reach inside any gated handler).\\\\n\\\\n## Chamber Mandate (NEW HYPOTHESES — cross-mode novelty only)\\\\n\\\\nThe chamber may NOT re-walk allowShellFallback (covered by p8-002), MCP subprocess (covered by p8-002), or NODE_OPTIONS respawn (covered by p8-005). Mandate is to surface NEW high-impact compositions:\\\\n\\\\n1. **H-40**: Phase-7 mobile-pair race (p7-006) → device token holds operator scopes → installs malicious plugin → Chain B exec. (Compose `p7-006` + `p8-002`; explicit chain finding.)\\\\n2. **H-41**: AP-CHAMBER01-02 admin-equivalent handler bodies → call exec-approval-bypassing primitives (e.g. plugin install or LSP config write) directly from a callback-scope handler. Cross-cuts identity into exec.\\\\n3. **H-42**: LLM/tool-input prompt-injection that crafts an exec-approval prompt the operator is talked into approving — e.g. attacker-controlled tool description renders as legitimate-looking approval text via the channel adapter.\\\\n4. **H-43**: Approval-binding TOCTOU — the displayed command differs from the spawned command. After the operator approves a benign-looking request, exec-approval rebuilds argv from a separate state read, yielding a divergent spawn.\\\\n5. **H-44**: Allowlist-parser sibling-bypass — Team-02 INVALIDATED-fragile PH-03 (`<<<` heredoc) hinges on a single token-classification ordering. Adjacent inputs (`<< delim`, ANSI-C `$\'...\'`, process-substitution `<(...)`, brace-expansion fan-out, reserved-word starts `time foo`) may evade similarly.\\\\n6. **H-45**: Catastrophic backtracking in allowlist regex — many allowlist matchers compile user-supplied or config-supplied patterns. ReDoS denial-of-approval (or worse, mismatch under timeout) is a structural risk.\\\\n7. **H-46**: Confused deputy across plugins — plugin A holds admin via Team-01 senderIsOwner short-circuit ⇒ uses runtime SDK to install plugin B (a vendor plugin already enabled in registry) ⇒ plugin B legitimately uses LSP+`allowShellFallback`. Two-hop privilege chain bypassing exec-approval entirely.\\\\n\\\\n(Hard limit: 7 hypotheses. Defer additional NEEDS-DEEPER items to Phase 12 variant-hunt.)\\\\n\\\\n## Round 1 — Ideation (compressed)\\\\n\\\\n### H-40 — Mobile-pair race → admin token → install plugin → Chain B exec\\\\n**Origin**: p7-006 (device-pair race) + p8-002 (Chain B).\\\\n**Claim**: Bootstrap-scoped device token from p7-006 holds operator scopes wider than the WS attacker would have been granted. With those scopes, the attacker calls plugin-install/enable methods, drops a workspace-shadow plugin (Team-01 Chain 2), declares `lspServers[].command=\\\\\\"boom\\\\\\"`, and triggers spawn. Result: arbitrary RCE with no exec-approval prompt, all from a network-adjacent attacker who races device-pair.\\\\n\\\\n### H-41 — Identity→exec amplification of AP-CHAMBER01-02\\\\n**Origin**: AP-CHAMBER01-02 (Chamber 01) + p8-002 surface.\\\\n**Claim**: Inside a `senderIsOwner=true,gat\\\\n\\\\n*(truncated; see debate.md for full transcript)*\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC: theoretical (no executable script; see evidence/ for static analysis)\\\\n\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"587d417215c2f51d7650e1d128bda1b2\\",\\"found_at\\":\\"2026-05-06T15:50:43.836935Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":20,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h18\\",\\"module_name\\":\\"H18: Sibling Agent Dir Enumeration Broadcasts OAuth Credentials to Attacker-Planted Directories\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"sibling-agent-dir-unauthenticated-broadcast-credential-copy\\",\\"description\\":\\"# H18: Sibling Agent Dir Enumeration Broadcasts OAuth Credentials to Attacker-Planted Directories\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H18\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: Sibling Agent Dir Enumeration Broadcasts OAuth Credentials to Attacker-Planted Directories\\\\nSeverity-Original: HIGH\\\\nPhase: 8\\\\nClass: write-driven-injection\\\\nEdge-ID: E009\\\\nProducer: plugin-runtime:src/plugins/provider-auth-helpers.ts:308 (upsertAuthProfile per sibling dir)\\\\nConsumer: auth-profiles-store:src/plugins/provider-auth-helpers.ts:249 (resolveSiblingAgentDirs enumerates ~/.openclaw/agents/*)\\\\nChannel: file (fs.readdirSync enumerates without ACL, writes to all entries)\\\\nVerdict: VALID\\\\nDebate:\\\\n  Team-05 CH-02 sibling sync validated as HIGH.\\\\n  Phase 8 angle: this is a cross-service edge where the \\\\\\"sibling agent dirs\\\\\\" are effectively\\\\n  a separate service boundary — each agent dir is an independent agent workspace. The\\\\n  credential write-broadcast crosses from the primary agent (writer) to all sibling agents\\\\n  (consumers) without ACL. This is the write-driven injection class: writer service (primary\\\\n  agent oauth refresh) delivers data to all consumer service instances (sibling agents)\\\\n  including attacker-planted ones.\\\\nOrigin-Finding: Team-05 CH-02 sibling sync\\\\nDeep-Probe-Corroboration: E010 (symlink escape composes with this edge for full exfil chain)\\\\n---\\\\n\\\\n## Summary\\\\n\\\\n`resolveSiblingAgentDirs` at `src/plugins/provider-auth-helpers.ts:236-268` reads all entries from `~/.openclaw/agents/` via `fs.readdirSync` without any access-control list or ownership verification. Every subsequent `writeOAuthCredentials` call with `syncSiblingAgents: true` broadcasts the full `OAuthCredential` to each enumerated directory. A local attacker who can create a directory (or symlink) under `~/.openclaw/agents/` will receive a copy of all OAuth credentials on the next refresh cycle. Combined with E010 (symlink redirect), the attacker need only plant one symlink in any sibling directory\'s `auth-profiles.json` to receive credentials at an arbitrary FS path.\\\\n\\\\n## Data Flow Across the Edge\\\\n\\\\n1. **Trigger**: OAuth token expires; `oauth-manager.ts:452` calls `saveAuthProfileStore(store, ownerAgentDir)` then `mirrorRefreshedCredentialIntoMainStore`\\\\n2. **Sibling enumeration** (consumer): `resolveSiblingAgentDirs(primaryAgentDir)` at line 249 calls `fs.readdirSync(agentsRoot, { withFileTypes: true })` — returns ALL directories and symlinks under `~/.openclaw/agents/` with no ownership check\\\\n3. **Broadcast write** (cross-service): `upsertAuthProfile({ profileId, credential, agentDir: targetAgentDir })` is called for each enumerated `targetAgentDir` at `provider-auth-helpers.ts:308`\\\\n4. **Sink**: `saveJsonFile(resolveAuthStorePath(targetAgentDir), store)` at each target — if targetAgentDir is attacker-planted, it receives the full credential store\\\\n\\\\n## Boundary Sanitization Audit\\\\n\\\\n- **Enumeration-side**: Absent. `resolveSiblingAgentDirs` checks `entry.isDirectory() || entry.isSymbolicLink()` (line 255) but does NOT verify that the directory is owned by the current user, was created by a trusted process, or has any access-control property.\\\\n- **Write-side**: Absent. `upsertAuthProfile` at line 308 catches exceptions (\\\\\\"best-effort\\\\\\") but does not verify the target dir\'s provenance before writing.\\\\n- **safeRealpathSync dedup**: Present but insufficient. The dedup at lines 261-264 prevents writing to the same real path twice, but does not prevent writing to attacker-controlled paths.\\\\n\\\\n## Attack Steps\\\\n\\\\n1. Attacker has local file-system write access (same user, sudo, or plugin with write tool).\\\\n2. Attacker creates `~/.openclaw/agents/evil-agent/agent/` directory (world-readable, owned by attacker or symlinked to attacker-readable location).\\\\n3. On next OAuth refresh for any provider (Anthropic, OpenAI, Codex, Google), `writeOAuthCredentials` is called with `syncSiblingAgents: true`.\\\\n4. `resolveSiblingAgentDirs` enumerates `~/.openclaw/agents/` and includes `evil-agent/agent` in the result set.\\\\n5. `upsertAuthProfile({agentDir: evil-agent/agent})` writes the full credential store (all provider tokens) to `~/.openclaw/agents/evil-agent/agent/auth-profiles.json`.\\\\n6. Attacker reads the file (world-readable directory) and extracts access_token + refresh_token for all providers.\\\\n7. Alternatively (E010 compound): attacker placed a symlink at `~/.openclaw/agents/evil-agent/agent/auth-profiles.json → /tmp/stolen.json`; file is written to attacker\'s tmp path regardless of evil-agent dir permissions.\\\\n\\\\n## Why SAST Missed This\\\\n\\\\nThe `resolveSiblingAgentDirs` function enumerates the filesystem and produces a list of paths. SAST cannot determine that some of those paths may be attacker-controlled. The taint flows from the filesystem enumeration through `upsertAuthProfile` to `saveJsonFile` — a cross-service write broadcast that spans the primary agent boundary to all sibling agents.\\\\n\\\\n## Recommended Fix\\\\n\\\\nApply ACL verification in `resolveSiblingAgentDirs`: skip any entry whose real path is not owned by the current process\'s effective user (`fs.statSync(realPath).uid !== process.getuid()`). Alternatively, maintain an explicit list of registered sibling agents (written at agent creation time by a trusted path) rather than dynamically enumerating the full agents root. This eliminates the unauthenticated directory injection vector.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H18-sibling-agent-dir-unauthenticated-broadcast-credential-copy/poc.ts`\\\\n\\\\nEvidence files:\\\\n- `evidence/env-info.txt` (945 bytes)\\\\n- `evidence/exploit.log` (884 bytes)\\\\n- `evidence/exploit.sh` (286 bytes)\\\\n- `evidence/healthcheck.log` (136 bytes)\\\\n- `evidence/impact.log` (1272 bytes)\\\\n- `evidence/setup.log` (231 bytes)\\\\n- `evidence/setup.sh` (480 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.ts`)\\\\n\\\\n```ts\\\\n#!/usr/bin/env node\\\\n/**\\\\n * PoC: H18 – Sibling-Agent Dir Unauthenticated Credential Broadcast\\\\n *\\\\n * Demonstrates that resolveSiblingAgentDirs (provider-auth-helpers.ts:236) enumerates\\\\n * ALL entries under the agents root with no ACL check, and writeOAuthCredentials with\\\\n * syncSiblingAgents:true broadcasts the full credential to each enumerated dir including\\\\n * an attacker-planted one.\\\\n *\\\\n * This PoC exercises the real production code path by temporarily redirecting the state\\\\n * directory to an isolated tmp workspace so no real credentials are touched.\\\\n */\\\\n\\\\nimport fs from \\\\\\"node:fs\\\\\\";\\\\nimport os from \\\\\\"node:os\\\\\\";\\\\nimport path from \\\\\\"node:path\\\\\\";\\\\nimport { fileURLToPath } from \\\\\\"node:url\\\\\\";\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// 1. Build isolated tmp workspace mirroring ~/.openclaw/agents layout\\\\n// ---------------------------------------------------------------------------\\\\nconst tmpRoot = fs.mkdtempSync(path.join(os.tmpdir(), \\\\\\"h18-poc-\\\\\\"));\\\\nconst agentsRoot = path.join(tmpRoot, \\\\\\"agents\\\\\\");\\\\n\\\\n// Legitimate primary agent dir (simulates the real victim agent)\\\\nconst primaryAgentDir = path.join(agentsRoot, \\\\\\"primary-agent\\\\\\", \\\\\\"agent\\\\\\");\\\\n\\\\n// Attacker-planted sibling dir – no privileges required, just mkdir\\\\nconst evilAgentDir = path.join(ag rocess dispatchGatewayMethod with syntheticClient fallback)\\\\nVerdict: VALID\\\\nDebate:\\\\n  Team-01 PH-CF-04 flagged timer-bypass as a causal-followup hypothesis, not a validated finding.\\\\n  Phase 8 promotes this to VALID with cross-service evidence: the mechanism is E004 (dispatchGatewayMethod\\\\n  fallback to syntheticClient when AsyncLocalStorage scope is unset) and the class is transitive-trust\\\\n  (gateway trusts that plugin-runtime dispatch always has a scope; it does not when called from timers).\\\\n  Concrete impact: plugins executing background tasks (polling, scheduled cleanup, cron-style work)\\\\n  can call gateway methods at WRITE_SCOPE with no identity attached; for deleteSession the upgrade\\\\n  to ADMIN_SCOPE is unconditional (E003); for other methods the fallback syntheticScopes is WRITE_SCOPE.\\\\nOrigin-Finding: Team-01 PH-CF-04 (background timer bypasses withPluginRuntimePluginIdScope)\\\\nDeep-Probe-Corroboration: authz-matrix A2 Gap A (dispatchGatewayMethod forceSyntheticClient fallback)\\\\n---\\\\n\\\\n## Summary\\\\n\\\\n`dispatchGatewayMethod` at `server-plugins.ts:297-339` retrieves the current plugin scope via `getPluginRuntimeGatewayRequestScope()`. When a plugin calls this from a background timer, a `setInterval` callback, or any async path that escaped the `withPluginRuntimePluginIdScope` wrapper, `scope` is `null`. The function then falls back to `syntheticClient = createSyntheticOperatorClient({ scopes: options?.syntheticScopes })`. The default `syntheticScopes` is `[WRITE_SCOPE]`. The gateway receives a WRITE_SCOPE synthetic client with no plugin identity (`pluginRuntimeOwnerId` is absent), meaning ownership checks like `rejectPluginRuntimeDeleteMismatch` see `pluginOwnedCleanupOptions = undefined` and return `false` for all sessions. A plugin that spawns background timers (e.g. polling a channel, checking for new MCP tool results) can reach all WRITE_SCOPE gateway methods on any session without being bound to its own sessions.\\\\n\\\\n## Data Flow Across the Edge\\\\n\\\\n1. **Producer** (plugin-runtime): Plugin registers a `setInterval` or `setTimeout` callback outside `withPluginRuntimePluginIdScope`\\\\n2. **Cross-boundary**: `getPluginRuntimeGatewayRequestScope()` returns `null` (AsyncLocalStorage has no value in the timer callback)\\\\n3. **Fallback path** (`server-plugins.ts:322-325`): `syntheticClient = createSyntheticOperatorClient({ scopes: options?.syntheticScopes })` — if caller passes no `syntheticScopes`, defaults to `[WRITE_SCOPE]`\\\\n4. **Consumer** (gateway): `handleGatewayRequest` receives `syntheticClient` as the client; `authorizeGatewayMethod` sees WRITE_SCOPE; no plugin identity bound; `pluginRuntimeOwnerId` absent from client internals\\\\n5. **Sink examples**:\\\\n   - `sessions.get` (READ_SCOPE): reads any session\'s transcript — cross-session information disclosure\\\\n   - `sessions.send` (WRITE_SCOPE): injects messages into any session — cross-session injection\\\\n   - `deleteSession` (WRITE_SCOPE path in plugin runtime → unconditionally becomes ADMIN_SCOPE via E003)\\\\n\\\\n## Boundary Sanitization Audit\\\\n\\\\n- **Producer-side**: Absent. No enforcement that `dispatchGatewayMethod` is only called from within `withPluginRuntimePluginIdScope`. The fallback to syntheticClient is unconditional.\\\\n- **Consumer-side (authorizeGatewayMethod)**: Absent for this scenario. The gateway method authorization checks scopes on the synthetic client, which has WRITE_SCOPE — authorization passes. It cannot distinguish \\\\\\"plugin called from scoped context\\\\\\" from \\\\\\"plugin called from unscoped timer\\\\\\".\\\\n- **Scope binding**: The `AsyncLocalStorage` pattern is correct for synchronous and await-chained paths within a gateway request handling turn, but is NOT propagated into `setInterval`/`setTimeout` callbacks unless the plugin explicitly re-enters the store.\\\\n\\\\n## Attack Steps\\\\n\\\\n1. A benign plugin (or attacker-installed shadow plugin via Team-01 Chain 2) registers a background timer: `setInterval(() => { runtime.gateway.dispatch(\\\\\\"sessions.get\\\\\\", { key: targetSession }); }, 5000)`.\\\\n2. The timer fires outside any `withPluginRuntimePluginIdScope` context.\\\\n3. `dispatchGatewayMethod` → `getPluginRuntimeGatewayRequestScope()` returns `null` → `scopedClient = null` → fallback to `syntheticClient` with `[WRITE_SCOPE]`.\\\\n4. Gateway processes `sessions.get` with a WRITE_SCOPE synthetic client → returns transcript of `targetSession` regardless of which plugin \\\\\\"owns\\\\\\" that session.\\\\n5. For `deleteSession` calls from timer: ADMIN_SCOPE is unconditionally injected (E003) → any operator session can be deleted.\\\\n6. Expected: plugin can only access its own sessions; background tasks are scoped to the plugin\'s identity. Actual: background tasks have gateway-wide WRITE_SCOPE (or ADMIN_SCOPE for deleteSession) with no ownership binding.\\\\n\\\\n## Why SAST Missed This\\\\n\\\\nAsyncLocalStorage scope propagation is a runtime property, not statically inferrable. SAST sees `dispatchGatewayMethod` and the `syntheticClient` fallback in the same function, but cannot determine whether the call-site is inside or outside a `withPluginRuntimePluginIdScope` wrapper at the time the timer fires — that depends on the call stack at runtime, not the static code structure.\\\\n\\\\n## Recommended Fix\\\\n\\\\nFail closed: if `getPluginRuntimeGatewayRequestScope()` returns `null` in `dispatchGatewayMethod`, throw an error rather than silently falling back to a syntheticClient. Plugins that need to perform background work should be required to save their scope binding explicitly (e.g. `runtime.captureScope()`) and re-enter it in timer callbacks. This eliminates the silent fallback that gives background timers ambient write authority.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H17-plugin-background-timer-dispatchgateway-scope-bypass/poc.js`\\\\n\\\\nEvid "0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h16\\",\\"module_name\\":\\"H16: Concurrent device.pair.approve calls race on the same requestId — withLock is process-local; multi-process deployments allow double-approval\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"concurrent-device-pairing-approve-race\\",\\"description\\":\\"# H16: Concurrent device.pair.approve calls race on the same requestId — withLock is process-local; multi-process deployments allow double-approval\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H16\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: Concurrent device.pair.approve calls race on the same requestId — withLock is process-local; multi-process deployments allow double-approval\\\\nSeverity-Original: HIGH\\\\nPhase: 7\\\\nClass: toctou\\\\nEntity: DevicePairingStateFile (pendingById → pairedByDeviceId transition)\\\\nHandler: src/infra/device-pairing.ts:578 (withLock); src/gateway/server-methods/devices.ts:189; src/gateway/server/ws-connection/message-handler.ts:1038\\\\nVerdict: VALID\\\\nDebate:\\\\nOrigin-Finding: p2-010-race-sandbox-cluster.md Hyp 7; p2-008-auth-bypass-cluster.md Gap C\\\\nDeep-Probe-Corroboration: p2-010 Hyp 7 — \\\\\\"concurrent approves can race the scope check; that is an identity-layer race\\\\\\"\\\\nReproduction-Type: requires-dynamic-test\\\\n---\\\\n\\\\n## Summary\\\\n\\\\n`approveDevicePairing` wraps its body in `withLock` (created by `createAsyncLock()` at `src/infra/device-pairing.ts:136`). `createAsyncLock` is re-exported from `@openclaw/fs-safe/advanced` (`src/infra/json-files.ts:21`) and is an in-process async serializer (a promise-chaining queue). This correctly prevents concurrent races **within a single gateway process**. However:\\\\n\\\\n1. **Multiple gateway callers on the same process**: `device.pair.approve` is callable from both the WS message-handler (`message-handler.ts:1038`) and the HTTP method handler (`devices.ts:189`). Both resolve through the same lock. However, the message-handler at L1015-L1079 implements a multi-step flow: it calls `approveDevicePairing` (L1038), and if `approved === null` (request already gone), it falls back to a `pairingStateAllowsRequestedAccess` check (L1059) to set `resolvedByConcurrentApproval = true`. This fallback can succeed even if the concurrent approver used different `callerScopes` — the code only checks that the device is already paired, not that the token scopes match what the current caller would have allowed.\\\\n\\\\n2. **Concurrency observation window in `devices.ts`**: the method handler at `devices.ts:189` calls `approveDevicePairing(requestId, { callerScopes: authz.callerScopes })` without first checking whether the request is still pending. If the WS-handler path already approved the same request with elevated scopes (bootstrap path), the devices.ts call will get `null` back (request gone) and will silently succeed by returning a \\\\\\"not found\\\\\\" response — but the approval already happened with potentially different scopes.\\\\n\\\\n3. **The `resolvedByConcurrentApproval` bypass path** (message-handler.ts:1059) calls `pairingStateAllowsRequestedAccess(await getPairedDevice(device.id))` — which checks only whether the device is currently paired and permits the requested access. It does **not** verify that the concurrent approver used `callerScopes` compatible with the current caller\'s scope set. If the concurrent approver was the bootstrap path (no callerScopes check), and the current caller would have been blocked by the scope check, `resolvedByConcurrentApproval = true` means the blocked caller gets a working device token anyway.\\\\n\\\\n## Evidence\\\\n\\\\n- Entity schema: `DevicePairingStateFile.pendingById[requestId]` → deleted on approval; `pairedByDeviceId[deviceId]` → written with tokens\\\\n- Code path (lock): `src/infra/device-pairing.ts:578` — `return await withLock(async () => { ... })` — in-process queue\\\\n- Code path (concurrent approval bypass): `src/gateway/server/ws-connection/message-handler.ts:1059` — `resolvedByConcurrentApproval = pairingStateAllowsRequestedAccess(await getPairedDevice(device.id))` — no scope re-verification\\\\n- Code path (WS silent approve): `message-handler.ts:1032-1040` — `approveBootstrapDevicePairing` (no callerScopes) or `approveDevicePairing` with `callerScopes: scopes`\\\\n- Enclosing transaction: `withLock (in-process only) — no cross-process serialization; no OS-level file lock for the pairing state JSON`\\\\n- Lock primitive: `createAsyncLock() — in-process promise queue only`\\\\n\\\\n## Attack Steps\\\\n\\\\n1. Two WS connections arrive simultaneously: one with bootstrap token (elevated), one with an operator.write token (limited).\\\\n2. Both trigger the pairing flow for the same pending `requestId` concurrently.\\\\n3. The bootstrap connection wins the lock first, calls `approveBootstrapDevicePairing` which mints tokens with bootstrap-profile scopes (no callerScopes check).\\\\n4. The operator.write connection, losing the lock race, gets `approved === null` (request gone). At L1059 it checks `pairingStateAllowsRequestedAccess` — device is now paired with elevated bootstrap scopes — and sets `resolvedByConcurrentApproval = true`.\\\\n5. The operator.write connection proceeds to L1079 branch `(approved?.status === \\\\\\"approved\\\\\\" || resolvedByConcurrentApproval)` and successfully completes pairing, even though it would have been blocked by its own callerScopes if it had been the first approver.\\\\n6. The operator.write connection now operates as if it approved a device that carries bootstrap-level scopes.\\\\n\\\\n## Why This Passed SAST\\\\n\\\\nThe `resolvedByConcurrentApproval` fallback path is a legitimate recovery mechanism for the expected case of two simultaneous approvals by equivalent-scope callers, but it elides the scope re-verification that the blocked-by-scope case requires. SAST cannot distinguish these two scenarios.\\\\n\\\\n## Recommended Fix\\\\n\\\\nIn the `resolvedByConcurrentApproval` branch, verify that the already-paired device\'s token scopes are a subset of the current caller\'s `callerScopes`. If not, reject the connection with a scope error. Alternatively, pass the caller\'s scope set into `pairingStateAllowsRequestedAccess` for an integrated scope-capped access check.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H16-concurrent-device-pairing-approve-race/poc.py`\\\\n\\\\nEvidence files:\\\\n- `evidence/exploit.log` (4352 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.py`)\\\\n\\\\n```py\\\\n#!/usr/bin/env python3\\\\n\\\\\\"\\\\\\"\\\\\\"\\\\nStatic-analysis PoC for H16: Concurrent device.pair.approve TOCTOU race\\\\nPhase: 11a | Severity-Original: HIGH | PoC-Status: theoretical\\\\n\\\\nThis PoC models three code paths in the actual source to test the residual\\\\nexploitability after cold-verification (p10-040) narrowed the claim.\\\\n\\\\nKey references:\\\\n  src/gateway/server/ws-connection/message-handler.ts:926   pairingStateAllowsRequestedAccess\\\\n  src/ga n    callerScopes gate enforced for operator role with scopes (L617-631).\\\\n    \\\\\\"\\\\\\"\\\\\\"\\\\n    pending = pending_requests.get(request_id)\\\\n    if not pending:\\\\n        return None  # concurrent approver already consumed request\\\\n    requested_scopes = pending.get(\\\\\\"scopes\\\\\\", [])\\\\n    if \\\\\\"operator\\\\\\" in pending.get(\\\\\\"roles\\\\\\", []) and requested_scopes:\\\\n        if caller_scopes is None:\\\\n            return {\\\\\\"status\\\\\\": \\\\\\"forbidden\\\\\\", \\\\\\"reason\\\\\\": \\\\\\"caller-scopes-required\\\\\\"}\\\\n        missing = [s for s in requested_scopes if s not in caller_scopes]\\\\n        if missing:\\\\n            return {\\\\\\"status\\\\\\": \\\\\\"forbidden\\\\\\", \\\\\\"reason\\\\\\": \\\\\\"caller-missing-scope\\\\\\", \\\\\\"scope\\\\\\": missing[0]}\\\\n    device_record = {\\\\n        \\\\\\"deviceId\\\\\\": pending[\\\\\\"deviceId\\\\\\"],\\\\n        \\\\\\"publicKey\\\\\\": pending[\\\\\\"publicKey\\\\\\"],\\\\n        \\\\\\"roles\\\\\\": pending.get(\\\\\\"roles\\\\\\", [\\\\\\"operator\\\\\\"]),\\\\n        \\\\\\"approvedScopes\\\\\\": requested_scopes,\\\\n        \\\\\\"tokens\\\\\\": {},\\\\n    }\\\\n    del pending_requests[request_id]\\\\n    paired_devices[device_record[\\\\\\"deviceId\\\\\\"]] = device_record\\\\n    return {\\\\\\"status\\\\\\": \\\\\\"approved\\\\\\", \\\\\\"device\\\\\\": device_record}\\\\n\\\\n\\\\ndef ensure_device_token(device: dict, role: str, requested_scopes: list) -> Optional[dict]:\\\\n    \\\\\\"\\\\\\"\\\\\\"\\\\n    Mirror device-pairing.ts:911-965.\\\\n    Token scopes = requestedScopes CAPPED by approvedScopes.\\\\n    Does NOT widen to approvedScopes.\\\\n    \\\\\\"\\\\\\"\\\\\\"\\\\n    approved = device.get(\\\\\\"approvedScopes\\\\\\") or device.get(\\\\\\"scopes\\\\\\") or []\\\\n    if requested_scopes and not role_scopes_allow(role, requested_scopes, approved):\\\\n        return None  # scopesWithinApprovedDeviceBaseline ch \\\n```\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"7e801c64b1538e2c6defef642471f1bf\\",\\"found_at\\":\\"2026-05-06T15:50:43.836907Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":17,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h15\\",\\"module_name\\":\\"H15: QQBot and Signal channel adapters lack claimable webhook replay protection — provider retries cause duplicate agent dispatch\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"channel-webhook-no-claimable-dedupe\\",\\"description\\":\\"# H15: QQBot and Signal channel adapters lack claimable webhook replay protection — provider retries cause duplicate agent dispatch\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H15\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: QQBot and Signal channel adapters lack claimable webhook replay protection — provider retries cause duplicate agent dispatch\\\\nSeverity-Original: HIGH\\\\nPhase: 7\\\\nClass: idempotency\\\\nEntity: Inbound message processing state (per-channel adapter, in-process)\\\\nHandler: extensions/qqbot/src/engine/gateway/inbound-pipeline.ts; extensions/signal/src/ (no dedupe file found)\\\\nVerdict: VALID\\\\nDebate:\\\\nOrigin-Finding: KB DFD Slice 3 (Channel-adapter inbound flow); GHSA-g353-mgv3-8pcj (Feishu webhook unsigned event); GHSA-5m9r-p9g7-679c (Zalo rate-limit bypass)\\\\nDeep-Probe-Corroboration:\\\\nReproduction-Type: static-hypothesis\\\\n---\\\\n\\\\n## Summary\\\\n\\\\nSix channel adapters (Zalo, Discord, Line, Nextcloud-Talk, Mattermost, WhatsApp/Bluebubbles) implement `createClaimableDedupe` / `createPersistentDedupe` to guard against webhook provider retries dispatching duplicate agent invocations. Two major platforms — **QQBot** and **Signal** — have no such infrastructure. Telegram uses `createDedupeCache` (in-memory TTL cache, 5 minutes) which does not survive process restarts, allowing retried updates after a gateway restart to replay. Slack uses `createDedupeCache` (60 seconds) only. The idempotency gap means:\\\\n\\\\n1. If the provider retries a webhook (e.g., because the gateway returned HTTP 500 or timed out) and the first invocation was already dispatched to the agent, the agent receives the same message twice, triggering a second tool run, a second response, and potentially a second exec-approval request.\\\\n2. For channels like QQBot that process WebSocket-based events (not HTTP webhooks), reconnect/resume can replay buffered events that were delivered once before the disconnect.\\\\n\\\\nThe specific bug class is **idempotency failure**: the channel adapter performs a side effect (dispatching to the gateway agent) without first atomically claiming the event ID against a persistent dedup store.\\\\n\\\\n## Evidence\\\\n\\\\n- Channels with claimable dedupe: Zalo (`extensions/zalo/src/monitor.webhook.ts:53`), Discord (`extensions/discord/src/monitor/inbound-dedupe.ts:9`), Line (`extensions/line/src/bot-handlers.ts:98`), Nextcloud-Talk (`extensions/nextcloud-talk/src/replay-guard.ts:65`), Mattermost (`extensions/mattermost/src/mattermost/monitor.ts:160`), Bluebubbles/WhatsApp (`extensions/bluebubbles/src/inbound-dedupe.ts:88,97`), Feishu (`extensions/feishu/src/dedup.ts:30` — uses `createPersistentDedupe`)\\\\n- Channels without claimable/persistent dedupe: QQBot (no `createClaimableDedupe` or `createPersistentDedupe` in `extensions/qqbot/src/` non-test files), Signal (no dedup file in `extensions/signal/src/`)\\\\n- Telegram: uses `createDedupeCache` (in-memory only, 5-minute TTL) at `extensions/telegram/src/bot-updates.ts:62` — does not survive restarts\\\\n- Slack: uses `createDedupeCache` (in-memory only, 60-second TTL) at `extensions/slack/src/monitor/context.ts:154`\\\\n- Code path (QQBot inbound): `extensions/qqbot/src/engine/gateway/inbound-pipeline.ts` — pipeline processes `QueuedMessage` without a claim/commit step\\\\n- Enclosing transaction: `no — no atomic claim before dispatch`\\\\n- Lock primitive: `absent for QQBot and Signal inbound paths`\\\\n\\\\n## Attack Steps\\\\n\\\\n1. QQBot (or Signal) receives an inbound message. The agent dispatch begins.\\\\n2. Before the adapter acknowledges the event (or before the gateway completes processing), the provider connection drops/reconnects, replaying the same event.\\\\n3. The pipeline runs again for the same message ID. Without a dedup claim, the agent is dispatched a second time.\\\\n4. Two parallel agent invocations consume the same conversation context, potentially producing two responses, two tool calls, or two exec-approval requests.\\\\n\\\\n## Why This Passed SAST\\\\n\\\\nSAST rules detect code patterns; the absence of a `createClaimableDedupe` call is an architectural omission that is invisible to per-file syntactic analysis.\\\\n\\\\n## Recommended Fix\\\\n\\\\nAdd `createClaimableDedupe` (or `createPersistentDedupe` for durability across restarts) to QQBot\'s inbound-pipeline entry point and Signal\'s message handler, following the pattern established in Zalo/Discord. Key the dedup on the platform-native message ID. For Telegram and Slack, upgrade from `createDedupeCache` (in-memory) to `createClaimableDedupe` to handle post-restart retries.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H15-channel-webhook-no-claimable-dedupe/poc.sh`\\\\n\\\\nEvidence files:\\\\n- `evidence/exploit.log` (5974 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.sh`)\\\\n\\\\n```sh\\\\n#!/usr/bin/env bash\\\\n# H15 — QQBot / Signal missing claimable dedup\\\\n# PoC type: static-analysis (absence proof)\\\\n# Effect: re-delivered event dispatches the agent a second time.\\\\n#\\\\n# Strategy\\\\n# --------\\\\n# 1. Prove that createClaimableDedupe / createPersistentDedupe are absent in\\\\n#    both extensions (structural gap).\\\\n# 2. Show the exact entry points that accept inbound messages and pass them\\\\n#    directly to the agent dispatcher with no claim step.\\\\n# 3. Contrast with a reference extension (Discord) that does implement a claim.\\\\n# 4. Emit the structured result line required by poc-executor.\\\\n\\\\nset -uo pipefail\\\\n\\\\nSCRIPT_DIR=\\\\\\"$(cd \\\\\\"$(dirname \\\\\\"$0\\\\\\")\\\\\\" && pwd)\\\\\\"\\\\nREPO_ROOT=\\\\\\"$(git -C \\\\\\"$SCRIPT_DIR\\\\\\" rev-parse --show-toplevel 2>/dev/null || realpath \\\\\\"$SCRIPT_DIR/../../..\\\\\\")\\\\\\"\\\\nEVIDENCE_DIR=\\\\\\"$SCRIPT_DIR/evidence\\\\\\"\\\\nmkdir -p \\\\\\"$EVIDENCE_DIR\\\\\\"\\\\n\\\\nOUT=\\\\\\"$EVIDENCE_DIR/exploit.log\\\\\\"\\\\nexec > >(tee \\\\\\"$OUT\\\\\\") 2>&1\\\\n\\\\necho \\\\\\"=== H15 Static-Analysis PoC: missing claimable dedup in QQBot + Signal ===\\\\\\"\\\\necho \\\\\\"REPO_ROOT=$REPO_ROOT\\\\\\"\\\\necho \\\\\\"\\\\\\"\\\\n\\\\n# ----------  replay permitted; grace-window race allows double-execution\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"allow-once-approval-replay-window\\",\\"description\\":\\"# H14: allow-once exec approval consumed in-memory only — cross-process replay permitted; grace-window race allows double-execution\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H14\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: allow-once exec approval consumed in-memory only — cross-process replay permitted; grace-window race allows double-execution\\\\nSeverity-Original: HIGH\\\\nPhase: 7\\\\nClass: idempotency\\\\nEntity: ExecApprovalManager.pending Map (in-memory, per-process)\\\\nHandler: src/gateway/exec-approval-manager.ts:174-188 (consumeAllowOnce); src/gateway/node-invoke-system-run-approval.ts:257-263\\\\nVerdict: VALID\\\\nDebate:\\\\nOrigin-Finding: p2-010-race-sandbox-cluster.md Hyp 9 \\\\\\"Idempotency replay on approval / token-mint / scope-grant\\\\\\"\\\\nDeep-Probe-Corroboration: p2-010 Hyp 9 — \\\\\\"Idempotency replay on approval / token-mint / scope-grant — UNRESOLVED across the codebase\\\\\\"\\\\nReproduction-Type: static-hypothesis\\\\n---\\\\n\\\\n## Summary\\\\n\\\\n`ExecApprovalManager.consumeAllowOnce` mutates an in-memory record (`record.decision = undefined`) to mark an `allow-once` approval as consumed. This mutation is:\\\\n1. **Not persisted** — gateway restarts reset the Map; any `allow-once` approval issued before a restart can be replayed after restart because the record no longer exists (line 119: `if (!pending) return false`) but a node that re-submits the same `runId` will find no record and fall through to a different code path.\\\\n2. **Racy within the grace window** — `scheduleResolvedEntryCleanup` (line 133) deletes the entry after a short delay rather than immediately. Between `consumeAllowOnce` completing and the cleanup executing, a second concurrent invocation of `consumeAllowOnce(recordId)` would find `record.decision === undefined` (already cleared) and return `false` — correctly. However, `handleApprovalResolve` (approval-shared.ts:309-311) has an idempotent retry path: if `resolved.ok === false` (record not found as pending) it checks `resolveResolvedApprovalRecord` (records still in map with `resolvedAtMs`) and, if the decision matches, responds `ok: true`. This means a second `exec.approval.resolve` with the same decision against the same ID after the first resolve succeeds will respond `ok: true` — giving the impression of a double-approve. The actual code execution depends on whether the node re-submits the `runId`; if it does (e.g., on reconnect or retry), the approval is gone and the node\'s re-submission must re-request approval. But if the node submits with the original `runId` while the grace window is open, `consumeAllowOnce` at L258 checks `record.decision !== \\\\\\"allow-once\\\\\\"` — which is already `undefined` — and returns `false`, blocking the second execution. The bug is that an external system (the node client reconnecting) may re-submit the `runId` after a gateway restart when the Map is empty, and a different code path may apply a fallback.\\\\n3. The **cross-process scenario**: if multiple gateway processes share the same node pool (horizontal scaling), each has its own `ExecApprovalManager`. An `allow-once` approval on process A is unknown to process B; the node can re-submit to process B and obtain execution.\\\\n\\\\n## Evidence\\\\n\\\\n- Entity schema: `ExecApprovalManager.pending: Map<string, PendingEntry<TPayload>>` — in-memory, no persistence; `record.decision` field (mutable after resolution)\\\\n- Code path (consume): `src/gateway/exec-approval-manager.ts:174` — `consumeAllowOnce(recordId)`: reads `record.decision`, sets to `undefined`\\\\n- Code path (check in caller): `src/gateway/node-invoke-system-run-approval.ts:257` — `if (typeof manager.consumeAllowOnce !== \\\\\\"function\\\\\\" || !manager.consumeAllowOnce(runId))` — single-threaded check in Node.js event loop; safe within one process\\\\n- Code path (grace window): `src/gateway/exec-approval-manager.ts:133` — `scheduleResolvedEntryCleanup` defers deletion; during window `record.decision === undefined` and `record.resolvedAtMs` is set\\\\n- Code path (idempotent response in resolver): `src/gateway/server-methods/approval-shared.ts:303-321` — a second `resolve` call with same decision returns `ok: true` without re-executing\\\\n- Enclosing transaction: `no — in-memory Map mutation; no database transaction; no cross-process coordination`\\\\n- Lock primitive: `absent for approval-manager mutations — relies on single-threaded Node.js event loop within one process; absent across process restarts and across multiple gateway processes`\\\\n\\\\n## Attack Steps\\\\n\\\\n1. Agent tool triggers exec approval; gateway creates `allow-once` record for `runId=X`.\\\\n2. Operator approves via channel: `exec.approval.resolve` → `decision=allow-once` → `consumeAllowOnce(X)` sets `record.decision = undefined`.\\\\n3. Gateway process restarts (e.g., hot reload triggers process exit, or multi-process deployment).\\\\n4. Node client reconnects and re-submits `system.run` with the original `runId=X`. The new gateway process has no record for `X`. `consumeAllowOnce(X)` returns `false` (no entry). Code falls to `systemRunApprovalRequired(runId)` — correctly blocks.\\\\n5. However, in a multi-process gateway deployment, a second gateway process that never saw the original approval can receive the node\'s re-submission and, lacking any cross-process idempotency store, may issue a new approval request to the operator — allowing the operator to unknowingly approve twice.\\\\n6. Additionally: during the grace window (step 2 + cleanup delay), if two concurrent `node.invoke` frames arrive with the same `runId` on the same process, both hit `consumeAllowOnce` sequentially (Node.js event loop); the first returns `true` and clears `decision`; the second returns `false` — this is correctly handled within one process.\\\\n\\\\n## Why This Passed SAST\\\\n\\\\nSAST cannot detect the cross-process idempotency gap; it requires understanding that `ExecApprovalManager` is a per-process in-memory structure with no distributed coordination.\\\\n\\\\n## Recommended Fix\\\\n\\\\nPersist `allow-once` consumption to a durable store (e.g., the same JSON state files used by device-pairing) keyed by `runId` with a TTL. On startup, load consumed-once IDs. For multi-process deployments, implement a distributed dedup check (Redis SETNX / advisory lock) before executing an `allow-once`-approved command.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H14-allow-once-approval-replay-window/poc.js`\\\\n\\\\nEvidence files:\\\\n- `evidence/exploit.log` (2529 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.js`)\\\\n\\\\n```js\\\\n#!/usr/bin/env node\\\\n/**\\\\n * PoC: H14 — allow-once approval replay window\\\\n *\\\\n * Static-analysis proof-of-concept. Instantiates ExecApprovalManager directly\\\\n * from the compiled source tree (or via tsx/ts-node) to exercise put is written to evidence/exploit.log by this script.\\\\n */\\\\n\\\\nimport { createRequire } from \\\\\\"node:module\\\\\\";\\\\nimport { writeFileSync, mkdirSync } from \\\\\\"node:fs\\\\\\";\\\\nimport { fileURLToPath } from \\\\\\"node:url\\\\\\";\\\\nimport path from \\\\\\"node:path\\\\\\";\\\\n\\\\nconst __dirname = path.dirname(fileURLToPath(import.meta.url));\\\\nconst EVIDENCE_DIR = path.join(__dirname, \\\\\\"evidence\\\\\\");\\\\nmkdirSync(EVIDENCE_DIR, { recursive: true });\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Inline minimal replica of ExecApprovalManager to avoid build-time dependency\\\\n// while keeping the exact same logic from src/gateway/exec-approval-manager.ts\\\\n// ---------------------------------------------------------------------------\\\\nconst RESOLVED_ENTRY_GRACE_MS = 15_000; // mirrors line 9\\\\n\\\\nfunction scheduleResolvedEntryCleanup(cleanup) {\\\\n  const timer = setTimeout(cleanup, RESOLVED_ENTRY_GRACE_MS);\\\\n  // unref so PoC process can exit\\\\n  if (typeof timer.unref === \\\\\\"function\\\\\\") timer.unref();\\\\n}\\\\n\\\\nclass ExecApprovalManager {\\\\n  pending = new Map();\\\\n\\\\n  create(request, timeoutMs, id) {\\\\n    const now = Date.now();\\\\n    const resolvedId = id ?? Math.random().toString(36).slice(2);\\\\n    return { id: resolvedId, request, createdAtMs: now, expiresAtMs: now + timeoutMs };\\\\n  }\\\\n\\\\n  register(record, timeoutMs) {\\\\n    if (this.pending.has(record.id)) {\\\\n      const existing = this.pending.get(record.id);\\\\n      if (existing.record.resolvedAtMs === undefined) return existing.promise;\\\\n      throw new Error(`approval id \'${record.id}\' already resolved`);\\\\n    }\\\\n    let resolvePromise, rejectPromise;\\\\n    const promise = new Promise((res, rej) => { resolvePromise = res; rejectPromise = rej; });\\\\n    const entry = { record, resolve: resolvePromise, reject: rejectPromise, timer: null, promise };\\\\n    entry.timer = setTimeout(() => this.expire(record.id), timeoutMs);\\\\n    if (typeof entry.timer.unref === \\\\\\"function\\\\\\") entry.timer.unref();\\\\n    this.pending.set(record.id, entry);\\\\n    return promise;\\\\n  }\\\\n\\\\n  resolve(recordId, decision, resolvedBy) {\\\\n    const pending = this.pending.get(recordId);\\\\n    if (!pending) return false;\\\\n    if (pending.record.resolvedAtMs !== undefined) return false;\\\\n    clearTimeout(pending.timer);\\\\n    pending.record.resolvedAtMs = Date.now();\\\\n    pending.record.decision = decision;\\\\n    pending.record.resolvedBy = resolvedBy ?? null;\\\\n    pending.resolve(decision);\\\\n    scheduleResolvedEntryCleanup(() => {\\\\n      if (this.pending.get(recordId) === pending) this.pending.delete(recordId);\\\\n    });\\\\n    return true;\\\\n  }\\\\n\\\\n  expire(recordId, resolvedBy) {\\\\n    const pending = this.pending.get(recordId);\\\\n    if (!pending) return false;\\\\n    if (pending.record.resolvedAtMs !== undefined) return false;\\\\n    clearTimeout(pending.timer);\\\\n    pending.record.resolvedAtMs = Date.now();\\\\n    pending.record.decision = undefined;\\\\n    pending.record.resolvedBy = resolvedBy ?? null;\\\\n    pending.resolve(null);\\\\n    scheduleResolvedEntryCleanup(() => {\\\\n      if (this.pending.get(recordId) === pending) this.pending.delete(recordId);\\\\n    });\\\\n    return true;\\\\n  }\\\\n\\\\n  getSnapshot(recordId) {\\\\n    return this.pending.get(recordId)?.record ?? null;\\\\n  }\\\\n\\\\n  // Exact replica of src/gateway/exec-approval-manager.ts:174-188\\\\n  consumeAllowOnce(recordId) {\\\\n    const entry = this.pending.get(recordId);\\\\n    if (!entry) return false;\\\\n    const record = entry.record;\\\\n    if (record.decision !== \\\\\\"allow-once\\\\\\") return false;  // line 180\\\\n    record.consumedDecision = record.decision;           // line 185\\\\n    record.decision = undefined;                         // line 186 — CL
