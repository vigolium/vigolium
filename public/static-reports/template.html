lacks\\\\nproper secret validation, attackers can access embargoed or sensitive content.\\\\n\\\\n## Notes\\\\n- Runs once per host on Next.js-identified targets\\\\n- Probes common draft/preview API routes with no token and common weak tokens\\\\n- Confirms by detecting __prerender_bypass or __next_preview_data cookies in response\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/app/guides/draft-mode\\\\n- https://nextjs.org/docs/pages/building-your-application/configuring/preview-mode\\",\\"short_description\\":\\"Detects insecure or unprotected Next.js Draft/Preview Mode endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when a draft/preview endpoint sets bypass cookies without a valid secret\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nextjs-version-audit\\",\\"name\\":\\"Next.js Version Audit\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nExtracts the Next.js version from client-side JavaScript bundles and maps it to\\\\nknown security advisories. Checks for critical vulnerabilities including middleware\\\\nauth bypass (CVE-2025-29927), SSRF via Server Actions (CVE-2024-34351), cache\\\\npoisoning (CVE-2024-46982), and Server Actions DoS (CVE-2024-39693).\\\\n\\\\n## Notes\\\\n- Active per-host scanner - sends requests to /_next/static/ paths\\\\n- Extracts version from JS bundle patterns (e.g., \\\\\\"Next.js <version>\\\\\\")\\\\n- Falls back to __NEXT_DATA__ build metadata analysis\\\\n- Maps extracted version against a local CVE advisory database\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://github.com/vercel/next.js/security/advisories\\\\n- https://cve.mitre.org/cgi-bin/cvekey.cgi?keyword=next.js\\",\\"short_description\\":\\"Fingerprints Next.js version and maps to known CVE advisories\\",\\"confirmation_criteria\\":\\"Confirmed when Next.js version is extracted and matches a known vulnerable version range\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"js-devserver-exposure\\",\\"name\\":\\"JS Dev Server Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed JavaScript development server endpoints that should never be\\\\naccessible in production. Development servers expose hot module replacement (HMR)\\\\nendpoints, debug tools, and internal APIs that leak source code, enable code injection,\\\\nor reveal server internals.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Probes: webpack HMR, Vite ping, webpack dev server sockjs, Vue CLI open-in-editor, Nuxt HMR, Remix dev\\\\n- Validates via Content-Type and response body markers\\\\n- Fingerprints 404 to avoid false positives on custom error pages\\\\n\\\\n## References\\\\n- https://webpack.js.org/configuration/dev-server/\\\\n- https://vitejs.dev/config/server-options\\",\\"short_description\\":\\"Detects exposed JavaScript development server endpoints (webpack HMR, Vite, Nuxt)\\",\\"confirmation_criteria\\":\\"Confirmed when a dev server endpoint responds with expected Content-Type or markers\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"wp-misconfig\\",\\"name\\":\\"WordPress Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for WordPress-specific files and endpoints that should not be publicly\\\\naccessible: configuration backups, debug logs, installer/repair endpoints,\\\\ninformational files, directory listings, and the externally triggerable cron.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to avoid false positives from WAF block pages\\\\n- Checks backup variants of wp-config.php (~, .old, .save, .swp, .txt)\\\\n- Detects exposed debug.log with PHP error/warning markers\\\\n- Checks directory listing on /wp-content/uploads/ and /wp-content/plugins/\\\\n\\\\n## References\\\\n- https://developer.wordpress.org/advanced-administration/wordpress/wp-config/\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/\\",\\"short_description\\":\\"Detects exposed WordPress configuration files, debug logs, and dangerous endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when probed WordPress files return 200 with expected content markers (PHP constants, log entries, directory index HTML)\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"wp-xmlrpc\\",\\"name\\":\\"WordPress XML-RPC Abuse\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests whether the WordPress XML-RPC endpoint is enabled and checks for dangerous\\\\nmethods: system.multicall (enables amplified brute-force attacks in a single request)\\\\nand pingback.ping (enables SSRF-like outbound requests and DDoS amplification).\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Sends a benign system.listMethods call to confirm XML-RPC is active\\\\n- Checks for multicall and pingback methods in the response\\\\n- Does not attempt actual brute-force or pingback abuse\\\\n\\\\n## References\\\\n- https://developer.wordpress.org/plugins/security/data-validation/\\\\n- https://www.wordfence.com/threat-intel/vulnerabilities/wordpress-core\\",\\"short_description\\":\\"Detects enabled WordPress XML-RPC with multicall brute-force and pingback abuse potential\\",\\"confirmation_criteria\\":\\"Confirmed when /xmlrpc.php returns a valid methodResponse containing method names\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"wp-user-enum\\",\\"name\\":\\"WordPress User Enumeration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for WordPress user enumeration through two vectors:\\\\n1. Author archive redirects: /?author=N redirects to /author/<username>/\\\\n2. REST API user listing: /wp-json/wp/v2/users returns user objects with slugs\\\\n\\\\nEnumerated usernames can be used for password brute-force attacks.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Tests author IDs 1 through 5\\\\n- Checks REST API with and without per_page parameter\\\\n- Non-destructive: only performs GET requests\\\\n\\\\n## References\\\\n- https://www.wpbeginner.com/plugins/how-to-discourage-brute-force-by-blocking-author-scans-in-wordpress/\\\\n- https://developer.wordpress.org/rest-api/reference/users/\\",\\"short_description\\":\\"Detects WordPress user enumeration via author archives and REST API\\",\\"confirmation_criteria\\":\\"Confirmed when author archive redirects expose usernames or REST API returns user objects\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"wp-ajax-exposure\\",\\"name\\":\\"WordPress AJAX Action Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for commonly vulnerable WordPress AJAX actions registered via\\\\nwp_ajax_nopriv_* that should not be accessible to unauthenticated users.\\\\nThese are among the most frequently exploited WordPress plugin vulnerabilities.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Tests known vulnerable AJAX action names from popular plugins\\\\n- Sends POST requests to /wp-admin/admin-ajax.php with action parameter\\\\n- Validates responses to distinguish real handlers from WordPress default \\\\\\"0\\\\\\" response\\\\n- Does not attempt exploitation, only confirms action handler existence\\\\n\\\\n## References\\\\n- https://developer.wordpress.org/plugins/javascript/ajax/\\\\n- https://www.wordfence.com/threat-intel/vulnerabilities\\",\\"short_description\\":\\"Detects publicly accessible WordPress AJAX actions from plugins with known vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when admin-ajax.php returns a non-default response for a known vulnerable action name\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"drupal-misconfig\\",\\"name\\":\\"Drupal Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Drupal-specific files and endpoints that should not be publicly\\\\naccessible: settings.php source disclosure, services.yml, update.php, install.php,\\\\nauthorize.php, CHANGELOG.txt, config sync directory, Twig debug output, public\\\\nfiles directory listing, and development services.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Covers both Drupal 7 and Drupal 8+ paths\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n\\\\n## References\\\\n- https://www.drupal.org/docs/administering-a-drupal-site/security-in-drupal/securing-your-site\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects exposed Drupal configuration files, update scripts, installer, debug settings, and directory listings\\",\\"confirmation_criteria\\":\\"Confirmed when probed Drupal files return 200 with expected content markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"drupal-user-enum\\",\\"name\\":\\"Drupal User Enumeration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for Drupal user enumeration through two vectors:\\\\n1. User profile paths: /user/1 through /user/5, checking for redirects to /users/<username>\\\\n2. JSON:API user listing: /jsonapi/user/user returns user objects anonymously\\\\n\\\\nEnumerated usernames can be used for password brute-force attacks.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Tests user IDs 1 through 5\\\\n- Checks JSON:API endpoint for anonymous user data access\\\\n- Non-destructive: only performs GET requests\\\\n\\\\n## References\\\\n- https://www.drupal.org/docs/security-in-drupal\\\\n- https://www.drupal.org/docs/core-modules-and-themes/core-modules/jsonapi-module\\",\\"short_description\\":\\"Detects Drupal user enumeration via user profile paths and JSON:API\\",\\"confirmation_criteria\\":\\"Confirmed when user profile paths expose usernames or JSON:API returns user objects\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"joomla-misconfig\\",\\"name\\":\\"Joomla Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Joomla-specific files and endpoints that should not be publicly\\\\naccessible: configuration.php backups, exposed log and temp directories,\\\\nAkeeba backup archives, debug mode artifacts, com_ajax information disclosure,\\\\nand composer metadata files.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n- Checks both frontend and administrator paths\\\\n\\\\n## References\\\\n- https://docs.joomla.org/Security_Checklist\\\\n- https://developer.joomla.org/security-centre.html\\",\\"short_description\\":\\"Detects exposed Joomla configuration backups, log/temp directories, backup archives, and debug settings\\",\\"confirmation_criteria\\":\\"Confirmed when probed Joomla files return 200 with expected content markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"joomla-user-enum\\",\\"name\\":\\"Joomla User Enumeration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for Joomla user enumeration and admin exposure through multiple vectors:\\\\n1. Registration form: accessible /index.php?option=com_users&view=registration\\\\n2. Web Services API (J4+): /api/index.php/v1/users returns user data\\\\n3. Administrator login: /administrator/ publicly accessible without WAF/IP restrictions\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Tests registration form accessibility and API user listing\\\\n- Checks administrator login exposure\\\\n- Non-destructive: only performs GET requests\\\\n\\\\n## References\\\\n- https://docs.joomla.org/Security_Checklist\\\\n- https://developer.joomla.org/security-centre.html\\",\\"short_description\\":\\"Detects Joomla user enumeration via registration form, API endpoints, and admin login exposure\\",\\"confirmation_criteria\\":\\"Confirmed when user registration form is accessible, API exposes user data, or admin login is unprotected\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cms-installer-exposure\\",\\"name\\":\\"CMS Installer Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed CMS installation and setup wizards that should not be\\\\naccessible in production deployments. Covers WordPress, Drupal, and Joomla\\\\ninstaller endpoints. An accessible installer can allow an attacker to\\\\nre-install or reconfigure the CMS.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Checks WordPress /wp-admin/install.php, Drupal /install.php and /core/install.php, Joomla /installation/index.php\\\\n- Validates responses with CMS-specific content markers\\\\n- Fingerprints 404 to avoid false positives\\\\n\\\\n## References\\\\n- https://developer.wordpress.org/advanced-administration/before-install/howto-install/\\\\n- https://www.drupal.org/docs/getting-started/installing-drupal\\\\n- https://docs.joomla.org/Installing_Joomla\\",\\"short_description\\":\\"Detects exposed CMS installation wizards for WordPress, Drupal, and Joomla\\",\\"confirmation_criteria\\":\\"Confirmed when installer endpoints return 200 with installation wizard content markers\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"firebase-misconfig\\",\\"name\\":\\"Firebase Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Firebase-specific files and endpoints that should not be publicly\\\\naccessible: project configuration, security rules, runtime config, service\\\\naccount keys, and mobile config files.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Checks /__/firebase/init.json for project config exposure\\\\n- Probes for security rules files (firestore.rules, storage.rules, database.rules.json)\\\\n- Detects exposed service account keys and runtime configuration\\\\n- Non-destructive: all probes are read-only GET requests\\\\n\\\\n## References\\\\n- https://firebase.google.com/docs/hosting/reserved-urls\\\\n- https://firebase.google.com/docs/rules\\\\n- https://firebase.google.com/docs/admin/setup\\",\\"short_description\\":\\"Detects exposed Firebase configuration, security rules, and credential files\\",\\"confirmation_criteria\\":\\"Confirmed when probed Firebase files return 200 with expected content markers (Firebase config keys, rules syntax, service account fields)\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"firebase-rtdb-exposure\\",\\"name\\":\\"Firebase RTDB Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nExtracts Firebase Realtime Database URLs from crawled responses and probes\\\\nthem for public read access. Tests root-level access and common subpaths\\\\nthat often contain sensitive data.\\\\n\\\\n## Notes\\\\n- Extracts databaseURL from Firebase config in HTML/JS responses\\\\n- Probes root with shallow=true for efficient detection\\\\n- Tests common subpaths: users, config, admin, tokens, etc.\\\\n- Non-destructive: all probes are read-only GET requests\\\\n- Scans leaked data for embedded secrets (JWT, API keys)\\\\n- Deduplicates by database URL to avoid redundant probing\\\\n\\\\n## References\\\\n- https://firebase.google.com/docs/database/rest/start\\\\n- https://firebase.google.com/docs/database/security\\",\\"short_description\\":\\"Detects publicly readable Firebase Realtime Database instances\\",\\"confirmation_criteria\\":\\"Confirmed when Firebase RTDB REST endpoint returns HTTP 200 with JSON data instead of permission denied\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"firebase-storage-exposure\\",\\"name\\":\\"Firebase Storage Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nExtracts Firebase Storage bucket names from crawled responses and probes\\\\nthem for public listing and access via the Firebase Storage REST API\\\\nand Google Cloud Storage endpoints.\\\\n\\\\n## Notes\\\\n- Extracts storageBucket from Firebase config in HTML/JS responses\\\\n- Tests object listing via Firebase Storage REST API\\\\n- Probes common prefixes: users/, uploads/, exports/, backups/\\\\n- Tests Google Cloud Storage endpoint for alternative public access\\\\n- Non-destructive: all probes are read-only GET requests\\\\n- Deduplicates by bucket name to avoid redundant probing\\\\n\\\\n## References\\\\n- https://firebase.google.com/docs/storage/web/start\\\\n- https://firebase.google.com/docs/storage/security\\",\\"short_description\\":\\"Detects publicly accessible Firebase Cloud Storage buckets\\",\\"confirmation_criteria\\":\\"Confirmed when Firebase Storage listing endpoint returns HTTP 200 with items or prefixes in JSON response\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"firebase-auth-misconfig\\",\\"name\\":\\"Firebase Auth Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nExtracts Firebase API keys from crawled responses and probes the Identity\\\\nToolkit API for authentication misconfigurations including anonymous signup,\\\\nemail enumeration, unrestricted API keys, and weak password policies.\\\\n\\\\n## Notes\\\\n- Extracts apiKey from Firebase config in HTML/JS responses\\\\n- Tests anonymous authentication (signUp without email/password)\\\\n- Tests email enumeration via signInWithPassword error differentiation\\\\n- Tests unrestricted API key usage from scanner origin\\\\n- Cleans up any test accounts created during scanning\\\\n- Deduplicates by API key to avoid redundant probing\\\\n\\\\n## References\\\\n- https://firebase.google.com/docs/auth/web/start\\\\n- https://cloud.google.com/identity-platform/docs/reference/rest\\",\\"short_description\\":\\"Detects Firebase Authentication misconfigurations via Identity Toolkit probing\\",\\"confirmation_criteria\\":\\"Confirmed when Identity Toolkit endpoints respond with auth tokens or distinguishable error codes indicating misconfiguration\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"firebase-functions-exposure\\",\\"name\\":\\"Firebase Functions Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nExtracts Cloud Functions URLs from crawled responses and probes them for\\\\nunauthenticated access and verbose error leakage.\\\\n\\\\n## Notes\\\\n- Extracts cloudfunctions.net URLs from HTML/JS responses\\\\n- Parses firebase.json hosting rewrites if available to discover function routes\\\\n- Probes discovered functions without authentication\\\\n- Tests for verbose error/stack trace leakage with malformed input\\\\n- Non-destructive: uses GET and safe POST probes only\\\\n- Deduplicates by function URL to avoid redundant probing\\\\n\\\\n## References\\\\n- https://firebase.google.com/docs/functions/http-events\\\\n- https://firebase.google.com/docs/hosting/cloud-functions\\",\\"short_description\\":\\"Detects unauthenticated Firebase Cloud Functions and verbose error leakage\\",\\"confirmation_criteria\\":\\"Confirmed when Cloud Function endpoints respond with business data without authentication or leak stack traces\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"php-debug-exposure\\",\\"name\\":\\"PHP Debug Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for PHP-specific debug and administration endpoints that should not be\\\\npublicly accessible: phpinfo() pages at common paths, PHP-FPM status/ping\\\\nendpoints, and phpMyAdmin installations.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Complements sensitive_file_discovery with additional PHP-specific paths\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n\\\\n## References\\\\n- https://www.php.net/manual/en/function.phpinfo.php\\\\n- https://www.php.net/manual/en/fpm.status.php\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects exposed phpinfo pages, PHP-FPM status endpoints, and phpMyAdmin instances\\",\\"confirmation_criteria\\":\\"Confirmed when probed PHP debug endpoints return 200 with expected content markers\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"php-source-disclosure\\",\\"name\\":\\"PHP Source Disclosure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for PHP source code disclosure caused by misconfigured web servers: .phps\\\\nhighlight handlers that expose syntax-highlighted source, alternate PHP extensions\\\\n(.phtml, .php5, .php7) that may serve source as plaintext, and PHP files served\\\\nas static content due to handler misconfiguration.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with PHP source code markers\\\\n- Detects both highlighted source and raw PHP code exposure\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n\\\\n## References\\\\n- https://www.php.net/manual/en/security.hiding.php\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects PHP source code disclosure via .phps handlers, misconfigured extensions, and static file serving\\",\\"confirmation_criteria\\":\\"Confirmed when probed endpoints return PHP source code markers in the response body\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"php-composer-exposure\\",\\"name\\":\\"PHP Composer Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Composer dependency management artifacts that should not be publicly\\\\naccessible: composer.json and composer.lock manifests revealing exact dependency\\\\nversions, vendor directory contents, Composer installed metadata, and PHPUnit\\\\ndev endpoint that may allow remote code execution.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n- PHPUnit eval-stdin.php is a known RCE vector in vulnerable versions\\\\n\\\\n## References\\\\n- https://getcomposer.org/doc/\\\\n- https://blog.packagist.com/composer-lock-security/\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects exposed Composer manifests, vendor directory, and PHPUnit dev endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when probed Composer artifacts return 200 with expected content markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"php-framework-debug\\",\\"name\\":\\"PHP Framework Debug Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for debug and development endpoints specific to PHP frameworks beyond\\\\nLaravel and Symfony: Yii debug module and Gii code generator, CodeIgniter\\\\nuser guide and profiler output, CakePHP debug kit, and common PHP framework\\\\ndebug patterns.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Covers Yii, CodeIgniter, CakePHP, and Slim frameworks\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n\\\\n## References\\\\n- https://www.yiiframework.com/doc/guide/2.0/en/tool-debugger\\\\n- https://codeigniter.com/user_guide/\\\\n- https://book.cakephp.org/4/en/debug-kit.html\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects exposed debug endpoints for Yii, CodeIgniter, CakePHP, and other PHP frameworks\\",\\"confirmation_criteria\\":\\"Confirmed when probed framework debug endpoints return 200 with expected content markers\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"php-path-info-misconfig\\",\\"name\\":\\"PHP PATH_INFO Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for PHP-FPM/CGI PATH_INFO routing misconfiguration (cgi.fix_pathinfo=1)\\\\nwhere requests to non-existent PHP scripts with PATH_INFO are routed to a\\\\ndifferent script. This can enable authorization bypass or unintended script\\\\nexecution by appending arbitrary paths to valid PHP endpoints.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Sends requests to deliberately invalid script paths\\\\n- Compares responses to establish if PATH_INFO rewriting is active\\\\n- Low false positive rate due to multi-step validation\\\\n\\\\n## References\\\\n- https://www.nginx.com/resources/wiki/start/topics/tutorials/config_pitfalls/#passing-uncontrolled-requests-to-php\\\\n- https://www.php.net/manual/en/ini.core.php#ini.cgi.fix-pathinfo\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects cgi.fix_pathinfo routing ambiguity allowing script path manipulation\\",\\"confirmation_criteria\\":\\"Confirmed when requests to non-existent PHP scripts with PATH_INFO return valid responses instead of 404\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"laravel-misconfig\\",\\"name\\":\\"Laravel Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Laravel framework-specific misconfigurations: debug mode enabled with\\\\nIgnition/Whoops error pages, exposed debugbar endpoints leaking SQL queries and\\\\nroutes, accessible application logs with stack traces and secrets, and exposed\\\\nTelescope debugging dashboard.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n- Debug mode detection triggers a deliberate error to check for Ignition/Whoops\\\\n\\\\n## References\\\\n- https://laravel.com/docs/configuration\\\\n- https://flareapp.io/docs/ignition-for-laravel/introduction\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects Laravel debug mode, exposed debugbar, application logs, and configuration leaks\\",\\"confirmation_criteria\\":\\"Confirmed when probed Laravel endpoints return 200 with expected framework-specific markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"laravel-ignition-rce\\",\\"name\\":\\"Laravel Ignition RCE\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed Laravel Ignition debug endpoints (/_ignition/health-check,\\\\n/_ignition/execute-solution, /_ignition/scripts/*, /_ignition/styles/*) and\\\\nflags potential CVE-2021-3129 RCE candidates when version evidence indicates\\\\nfacade/ignition < 2.5.2 or Laravel < 8.4.2.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Does NOT attempt exploitation; reports as candidate with prerequisites\\\\n- Validates responses with content markers to reduce false positives\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n\\\\n## References\\\\n- https://nvd.nist.gov/vuln/detail/CVE-2021-3129\\\\n- https://www.ambionics.io/blog/laravel-debug-rce\\\\n- https://flareapp.io/docs/ignition-for-laravel/introduction\\",\\"short_description\\":\\"Detects exposed Ignition endpoints and flags CVE-2021-3129 RCE candidates\\",\\"confirmation_criteria\\":\\"Confirmed when Ignition endpoints are reachable and return expected framework-specific markers\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"laravel-devtool-exposure\\",\\"name\\":\\"Laravel Developer Tool Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed Laravel developer tools that should not be accessible in\\\\nproduction: Web Tinker (interactive PHP console), Clockwork (profiling tool),\\\\nLaravel Pulse (monitoring dashboard), and Log Viewer. These tools can expose\\\\nsensitive data such as SQL queries, routes, timings, logs, and may allow\\\\narbitrary code execution.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n- Web Tinker is critical severity due to potential code execution\\\\n\\\\n## References\\\\n- https://github.com/spatie/laravel-web-tinker\\\\n- https://github.com/itsgoingd/clockwork\\\\n- https://laravel.com/docs/pulse\\\\n- https://github.com/opcodesio/log-viewer\\",\\"short_description\\":\\"Detects exposed Laravel developer tools: Web Tinker, Clockwork, Pulse, and Log Viewer\\",\\"confirmation_criteria\\":\\"Confirmed when developer tool endpoints return 200 with expected framework-specific markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"laravel-sensitive-files\\",\\"name\\":\\"Laravel Sensitive Files\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Laravel-specific sensitive files not covered by generic file discovery\\\\nmodules: PHPUnit configuration (phpunit.xml), exposed SQLite databases, storage\\\\nframework internals (sessions, views, cache), vendor PHPUnit eval-stdin.php\\\\n(CVE-2017-9841), and wrong document root indicators (artisan, server.php,\\\\nroutes/web.php, config/app.php, bootstrap/app.php).\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Complements the generic sensitive_file_discovery and php_composer_exposure modules\\\\n- Validates responses with content markers and anti-markers to reduce false positives\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n- Wrong document root detection is critical severity\\\\n\\\\n## References\\\\n- https://laravel.com/docs/structure\\\\n- https://nvd.nist.gov/vuln/detail/CVE-2017-9841\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects Laravel-specific sensitive files: PHPUnit config, SQLite DB, storage internals, eval-stdin, and wrong document root\\",\\"confirmation_criteria\\":\\"Confirmed when probed Laravel file paths return 200 with expected content markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"laravel-admin-exposure\\",\\"name\\":\\"Laravel Admin Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for unauthenticated access to Laravel admin panels (Nova, Filament,\\\\nBackpack, Voyager), API documentation endpoints (Swagger UI, L5-Swagger,\\\\nScramble, OpenAPI specs), and GraphQL endpoints with introspection enabled.\\\\nThese surfaces increase attack surface and may expose sensitive data or\\\\nadmin functionality.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n- Admin panels reported as high severity; API docs as informational/low\\\\n\\\\n## References\\\\n- https://nova.laravel.com/docs\\\\n- https://filamentphp.com/docs\\\\n- https://lighthouse-php.com/master/security/authentication.html\\",\\"short_description\\":\\"Detects unauthenticated access to Laravel admin panels, API documentation, and GraphQL endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when admin or documentation endpoints return 200 with expected framework-specific markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"symfony-misconfig\\",\\"name\\":\\"Symfony Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Symfony framework-specific misconfigurations: web profiler/debug toolbar\\\\naccessible in production, dev front controller (app_dev.php) exposed, debug logs,\\\\nand exposed configuration files.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Checks for X-Debug-Token and X-Debug-Token-Link response headers\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n\\\\n## References\\\\n- https://symfony.com/doc/current/reference/configuration/framework.html\\\\n- https://symfony.com/doc/current/profiler.html\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects exposed Symfony profiler, debug toolbar, dev front controller, and configuration leaks\\",\\"confirmation_criteria\\":\\"Confirmed when probed Symfony endpoints return 200 with expected framework-specific markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"magento-misconfig\\",\\"name\\":\\"Magento Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Magento-specific files and endpoints that should not be publicly\\\\naccessible: setup wizard, downloader interface, version disclosure files,\\\\nexposed configuration, and admin panel paths.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Covers both Magento 1.x and Magento 2.x paths\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n\\\\n## References\\\\n- https://experienceleague.adobe.com/docs/commerce-operations/configuration-guide/overview.html\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects exposed Magento setup wizard, downloader, version files, and admin panels\\",\\"confirmation_criteria\\":\\"Confirmed when probed Magento endpoints return 200 with expected content markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cloud-storage-listing\\",\\"name\\":\\"Cloud Storage Listing\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests cloud storage endpoints for public listing access. Attempts S3 ListObjectsV2,\\\\nAzure container blob listing, and Azure account container listing requests.\\\\n\\\\n## Notes\\\\n- Only runs on hosts identified as cloud storage endpoints\\\\n- S3: GET /?list-type=2 checking for ListBucketResult\\\\n- Azure: GET /<container>?restype=container&comp=list checking for Blobs\\\\n- Azure: GET /?comp=list checking for Containers\\\\n- Runs once per host with deduplication\\\\n\\\\n## References\\\\n- https://docs.aws.amazon.com/AmazonS3/latest/API/API_ListObjectsV2.html\\\\n- https://learn.microsoft.com/en-us/rest/api/storageservices/list-blobs\\",\\"short_description\\":\\"Detects publicly listable S3 buckets and Azure containers\\",\\"confirmation_criteria\\":\\"Confirmed when storage endpoint returns XML listing response with object/blob entries\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cloud-bucket-takeover\\",\\"name\\":\\"Cloud Bucket Takeover\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests cloud storage endpoints for bucket/container not-found conditions that indicate\\\\npotential subdomain takeover. Checks for S3 NoSuchBucket, GCS bucket-not-found,\\\\nand Azure ContainerNotFound errors.\\\\n\\\\n## Notes\\\\n- Only runs on hosts identified as cloud storage endpoints\\\\n- GET / and check for specific not-found error patterns\\\\n- Takeover risk exists when DNS points to storage but bucket is unclaimed\\\\n- Runs once per host with deduplication\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/10-Test_for_Subdomain_Takeover\\\\n- https://docs.aws.amazon.com/AmazonS3/latest/API/ErrorResponses.html\\",\\"short_description\\":\\"Detects dangling cloud storage buckets vulnerable to takeover\\",\\"confirmation_criteria\\":\\"Confirmed when cloud storage endpoint returns bucket/container not-found error while DNS still resolves\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cloud-origin-bypass\\",\\"name\\":\\"Cloud Origin Bypass\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects when cloud storage origins are directly reachable with weaker security controls\\\\nthan the CDN/WAF layer. Identifies CDN presence from headers, extracts origin storage\\\\nURLs from response body, and compares security headers between CDN and origin.\\\\n\\\\n## Notes\\\\n- Step 1: Detect CDN from CF-Ray, X-Cache, Via, X-Amz-Cf-Id, X-Served-By headers\\\\n- Step 2: Extract origin storage URLs from response body\\\\n- Step 3: Fetch origin directly and compare security headers\\\\n- Flags when origin is reachable with weaker controls (missing CSP, XFO, XCTO, HSTS)\\\\n- Runs once per host with deduplication\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\\\n- https://docs.aws.amazon.com/AmazonCloudFront/latest/DeveloperGuide/private-content-restricting-access-to-s3.html\\",\\"short_description\\":\\"Detects direct access to cloud storage origins bypassing CDN security controls\\",\\"confirmation_criteria\\":\\"Confirmed when cloud storage origin is directly reachable with fewer security headers than the CDN-fronted endpoint\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cloud-public-read\\",\\"name\\":\\"Cloud Public Read\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests cloud storage endpoints for publicly readable sensitive directories and files.\\\\nProbes common paths like /uploads/, /backups/, /data/, /logs/, /config/ and verifies\\\\nreal content is returned (not error pages).\\\\n\\\\n## Notes\\\\n- Only runs on hosts identified as cloud storage endpoints\\\\n- HEAD then GET common sensitive paths\\\\n- Verifies responses contain real content (body length > 50, not error pages)\\\\n- Runs once per host with deduplication\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\\\n- https://docs.aws.amazon.com/AmazonS3/latest/userguide/access-control-overview.html\\",\\"short_description\\":\\"Detects publicly readable sensitive paths on cloud storage endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when cloud storage endpoint returns real content for sensitive paths without authentication\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"aspnet-misconfig\\",\\"name\\":\\"ASP.NET Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed ASP.NET diagnostic and debug endpoints that should not be\\\\naccessible in production. Covers trace.axd, ELMAH, Glimpse, MiniProfiler,\\\\nHangfire dashboard, SignalR endpoints, and Yellow Screen of Death (YSoD)\\\\nverbose error detection.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Probes diagnostic endpoints with content marker validation\\\\n- Tests for verbose error pages by triggering error conditions\\\\n- Fingerprints 404 to avoid false positives\\\\n\\\\n## References\\\\n- https://learn.microsoft.com/en-us/aspnet/core/fundamentals/error-handling\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/01-Test_Network_Infrastructure_Configuration\\",\\"short_description\\":\\"Detects ASP.NET/IIS misconfigurations including exposed diagnostics, debug endpoints, and verbose errors\\",\\"confirmation_criteria\\":\\"Confirmed when diagnostic endpoints return 200 with expected content markers or verbose error information is disclosed\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"aspnet-sensitive-files\\",\\"name\\":\\"ASP.NET Sensitive Files\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDiscovers ASP.NET-specific sensitive files and directories exposed on the web\\\\nserver. Covers web.config and its backups/transforms, appsettings.json files,\\\\nconnection string configs, Global.asax, App_Data/bin directories, NuGet configs,\\\\ncross-domain policy files, and classic ASP include files.\\\\n\\\\n## Notes\\\\n- Runs once per unique host\\\\n- Validates responses with content marker matching\\\\n- Fingerprints 404 responses to avoid false positives from custom error pages\\\\n- Anti-markers prevent false positives from HTML error pages\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/04-Review_Old_Backup_and_Unreferenced_Files_for_Sensitive_Information\\\\n- https://learn.microsoft.com/en-us/aspnet/core/fundamentals/configuration/\\",\\"short_description\\":\\"Probes for exposed ASP.NET configuration files, backups, and sensitive directories\\",\\"confirmation_criteria\\":\\"Confirmed when sensitive file paths return 200 with expected content markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"aspnet-viewstate-scan\\",\\"name\\":\\"ASP.NET ViewState Scan\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nActively tests ASP.NET ViewState security by tampering with ViewState MAC\\\\nvalidation, testing event validation bypass, detecting cookieless session\\\\ntokens in URLs, and checking for verbose error disclosure on ViewState\\\\ntampering.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Finds pages with __VIEWSTATE forms and tests MAC validation\\\\n- Tampers ViewState bytes and POSTs back to detect disabled MAC\\\\n- Submits forged __EVENTTARGET to detect disabled event validation\\\\n- Scans for cookieless session URL patterns (S(...)/)\\\\n- Checks if ViewState errors reveal stack traces\\\\n\\\\n## References\\\\n- https://learn.microsoft.com/en-us/previous-versions/aspnet/bb386448(v=vs.100)\\\\n- https://owasp.org/www-community/attacks/Cross-Site_Request_Forgery_(CSRF)\\",\\"short_description\\":\\"Tests for ASP.NET ViewState MAC disabled, event validation bypass, and cookieless sessions\\",\\"confirmation_criteria\\":\\"Confirmed when ViewState MAC is disabled (tampered ViewState accepted) or event validation can be bypassed\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"aspnet-service-exposure\\",\\"name\\":\\"ASP.NET Service Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed ASP.NET service endpoints. For .asmx URLs in traffic, probes\\\\n?WSDL and ?disco for WSDL disclosure. For .svc URLs, probes ?wsdl and sends\\\\nmalformed SOAP to detect WCF detailed faults. Also probes common paths for\\\\nOData metadata and legacy service endpoints.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Traffic-aware: inspects original request URL for .asmx/.svc extensions\\\\n- Probes OData $metadata and common service paths\\\\n- Tests WCF for verbose fault disclosure (includeExceptionDetailInFaults)\\\\n- Fingerprints 404 to avoid false positives\\\\n\\\\n## References\\\\n- https://learn.microsoft.com/en-us/dotnet/framework/wcf/\\\\n- https://learn.microsoft.com/en-us/aspnet/web-api/overview/odata-support-in-aspnet-web-api/\\",\\"short_description\\":\\"Detects exposed ASP.NET service endpoints including ASMX, WCF, OData, and legacy service paths\\",\\"confirmation_criteria\\":\\"Confirmed when service endpoints return WSDL definitions, OData metadata, or verbose fault details\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"aspnet-blazor-exposure\\",\\"name\\":\\"ASP.NET Blazor Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed Blazor WebAssembly and Blazor Server endpoints. Blazor WASM\\\\nships .NET DLL assemblies to the browser; if the boot manifest is accessible,\\\\nattackers can download and decompile all application assemblies to recover source\\\\ncode, API keys, and business logic. Blazor Server exposes a SignalR hub that\\\\nreveals real-time communication infrastructure.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Probes boot manifest, runtime JS, and SignalR negotiate endpoint\\\\n- If boot manifest found, extracts assembly names as evidence\\\\n- Fingerprints 404 to avoid false positives\\\\n\\\\n## References\\\\n- https://learn.microsoft.com/en-us/aspnet/core/blazor/\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/01-Test_Network_Infrastructure_Configuration\\",\\"short_description\\":\\"Detects exposed Blazor WebAssembly assemblies and Blazor Server endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when Blazor boot manifest or framework DLLs are publicly accessible\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"aspnet-health-exposure\\",\\"name\\":\\"ASP.NET Health Endpoint Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed ASP.NET Core health check and monitoring endpoints that can\\\\nreveal infrastructure details including database connectivity status, external\\\\nservice dependencies, memory and CPU metrics, and deployment configuration.\\\\nCovers standard health check endpoints, Health Checks UI dashboard, Prometheus\\\\nmetrics, and development tooling left enabled in production.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Probes health check, monitoring, and dev-tooling endpoints\\\\n- Validates responses with content markers to reduce false positives\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n\\\\n## References\\\\n- https://learn.microsoft.com/en-us/aspnet/core/host-and-deploy/health-checks\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/01-Test_Network_Infrastructure_Configuration\\",\\"short_description\\":\\"Detects exposed ASP.NET health checks, monitoring dashboards, and metrics endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when health or monitoring endpoints return detailed infrastructure information without authentication\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"aspnet-identity-probe\\",\\"name\\":\\"ASP.NET Identity Probe\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed ASP.NET Identity scaffolded pages, IdentityServer/Duende OIDC\\\\ndiscovery documents, and authentication-related misconfigurations. Exposed OIDC\\\\ndiscovery documents reveal token endpoints, supported scopes, and grant types.\\\\nOpen registration endpoints may allow unauthorized account creation. Scaffolded\\\\nIdentity UI pages confirm the authentication framework in use.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Probes Identity UI, OIDC discovery, and token endpoints\\\\n- Extracts OIDC metadata (scopes, grant types, endpoints) as evidence\\\\n- Fingerprints 404 to avoid false positives\\\\n\\\\n## References\\\\n- https://learn.microsoft.com/en-us/aspnet/core/security/authentication/identity\\\\n- https://learn.microsoft.com/en-us/aspnet/core/security/authentication/identity-api-authorization\\\\n- https://openid.net/specs/openid-connect-discovery-1_0.html\\",\\"short_description\\":\\"Detects exposed ASP.NET Identity endpoints, IdentityServer discovery, and authentication misconfigurations\\",\\"confirmation_criteria\\":\\"Confirmed when Identity endpoints or OIDC discovery documents are publicly accessible\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"spring-h2-console-exposure\\",\\"name\\":\\"Spring H2 Console Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed H2 database web consoles that are commonly enabled during\\\\ndevelopment and accidentally left accessible in production Spring Boot deployments.\\\\nThe H2 console provides direct database access, enabling SQL execution, data\\\\nexfiltration, and potential remote code execution.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Checks common H2 console paths with content markers\\\\n- Fingerprints 404 responses to reduce false positives\\\\n- H2 console exposure in production is critical severity\\\\n\\\\n## References\\\\n- https://www.h2database.com/html/tutorial.html\\\\n- https://docs.spring.io/spring-boot/docs/current/reference/html/data.html#data.sql.h2-web-console\\",\\"short_description\\":\\"Detects exposed H2 database web consoles commonly left enabled in Spring Boot applications\\",\\"confirmation_criteria\\":\\"Confirmed when H2 console login page or interface is accessible without authentication\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"spring-jolokia-exposure\\",\\"name\\":\\"Spring Jolokia Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed Jolokia endpoints that provide HTTP/JSON access to JMX\\\\n(Java Management Extensions). Jolokia can disclose sensitive runtime attributes,\\\\nMBean operations, and in some configurations enable dangerous operations like\\\\nremote code execution through MBean invocation.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Checks multiple Jolokia paths including actuator-prefixed variants\\\\n- Validates responses using Jolokia-specific JSON markers\\\\n- Fingerprints 404 responses to reduce false positives\\\\n\\\\n## References\\\\n- https://jolokia.org/reference/html/index.html\\\\n- https://docs.spring.io/spring-boot/docs/current/reference/html/actuator.html\\",\\"short_description\\":\\"Detects exposed Jolokia JMX endpoints providing HTTP access to Java Management Extensions\\",\\"confirmation_criteria\\":\\"Confirmed when Jolokia endpoints return valid JSON responses with agent information or MBean data\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"spring-debug-exposure\\",\\"name\\":\\"Spring Debug Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Spring Boot debug endpoints and verbose error page configurations.\\\\nDetects Whitelabel error pages with stack traces, Spring Boot DevTools remote\\\\nendpoints, and debug parameter behaviors that reveal internal application details\\\\nincluding package names, class paths, library versions, and configuration.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Checks Whitelabel error page with trace parameter\\\\n- Probes Spring Boot DevTools remote restart endpoint\\\\n- Tests for debug parameter behaviors\\\\n- Fingerprints 404 responses to reduce false positives\\\\n\\\\n## References\\\\n- https://docs.spring.io/spring-boot/docs/current/reference/html/web.html#web.servlet.spring-mvc.error-handling\\\\n- https://docs.spring.io/spring-boot/docs/current/reference/html/using.html#using.devtools\\",\\"short_description\\":\\"Detects Spring Boot debug endpoints, Whitelabel error pages, and verbose stack trace disclosure\\",\\"confirmation_criteria\\":\\"Confirmed when debug endpoints or verbose error pages reveal internal application details\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"spring-cloud-config-exposure\\",\\"name\\":\\"Spring Cloud Config Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed Spring Cloud Config Server endpoints that serve application\\\\nconfiguration for various environments. These endpoints can leak database\\\\ncredentials, API keys, encryption keys, and internal service URLs. Also checks\\\\nfor exposed encrypt/decrypt endpoints that could be abused for cryptographic\\\\noperations.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Checks common config patterns: /{app}/{profile} and /{app}/{profile}/{label}\\\\n- Probes encrypt and decrypt endpoints\\\\n- Validates responses using Spring Cloud Config JSON markers\\\\n\\\\n## References\\\\n- https://docs.spring.io/spring-cloud-config/docs/current/reference/html/\\\\n- https://cloud.spring.io/spring-cloud-config/reference/html/#_security\\",\\"short_description\\":\\"Detects exposed Spring Cloud Config Server endpoints leaking application configuration and secrets\\",\\"confirmation_criteria\\":\\"Confirmed when config server endpoints return application configuration with property sources\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"spring-gateway-exposure\\",\\"name\\":\\"Spring Gateway Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed Spring Cloud Gateway actuator endpoints that reveal routing\\\\nconfiguration, global filters, and route filter definitions. Exposed gateway\\\\nroutes can disclose internal service topology, backend URLs, and rate limiting\\\\nconfiguration. Write-enabled gateway endpoints could allow route manipulation\\\\nfor traffic steering and SSRF-style attacks.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Checks gateway-specific actuator paths\\\\n- Validates responses using gateway JSON markers\\\\n- Read-only probing (does not attempt route modification)\\\\n\\\\n## References\\\\n- https://docs.spring.io/spring-cloud-gateway/docs/current/reference/html/#actuator-api\\\\n- https://cloud.spring.io/spring-cloud-gateway/reference/html/\\",\\"short_description\\":\\"Detects exposed Spring Cloud Gateway actuator endpoints revealing routes and filters\\",\\"confirmation_criteria\\":\\"Confirmed when gateway actuator endpoints return route or filter configuration data\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"spring-data-rest-exposure\\",\\"name\\":\\"Spring Data REST Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Spring Data REST auto-exposed repository endpoints. Spring Data REST\\\\nautomatically creates RESTful endpoints for JPA repositories, which may expose\\\\nentities without proper authorization. The module detects HAL-style API roots\\\\nand ALPS profile endpoints that reveal the full data model.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Checks for HAL/HATEOAS discovery responses\\\\n- Detects ALPS profile metadata endpoints\\\\n- Validates using Spring Data REST JSON markers\\\\n- Fingerprints 404 responses to reduce false positives\\\\n\\\\n## References\\\\n- https://docs.spring.io/spring-data/rest/docs/current/reference/html/\\\\n- https://spring.io/projects/spring-data-rest\\",\\"short_description\\":\\"Detects auto-exposed Spring Data REST repository endpoints with HAL/HATEOAS discovery\\",\\"confirmation_criteria\\":\\"Confirmed when HAL-style API root or ALPS profile endpoint returns Spring Data REST repository links\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"spring-boot-admin-exposure\\",\\"name\\":\\"Spring Boot Admin Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed Spring Boot Admin (SBA) dashboards. SBA aggregates actuator\\\\ndata from multiple registered Spring Boot services, providing a centralized\\\\nview of health, metrics, configuration, and environment details. An exposed\\\\nSBA dashboard can enable broad infrastructure compromise through access to\\\\nmultiple services' actuator endpoints.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Checks common SBA paths: /admin, /boot-admin, /sba, /springbootadmin\\\\n- Validates using SBA-specific UI markers\\\\n- Fingerprints 404 responses to reduce false positives\\\\n\\\\n## References\\\\n- https://codecentric.github.io/spring-boot-admin/current/\\\\n- https://github.com/codecentric/spring-boot-admin\\",\\"short_description\\":\\"Detects exposed Spring Boot Admin dashboards providing centralized access to actuator data\\",\\"confirmation_criteria\\":\\"Confirmed when Spring Boot Admin dashboard UI or API is accessible without authentication\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"java-sensitive-files\\",\\"name\\":\\"Java Sensitive Files\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Java/Spring-specific sensitive files not covered by generic file\\\\ndiscovery modules: application.properties/yml, WEB-INF/web.xml, META-INF\\\\nmanifests, Maven/Gradle build files, and backup configuration files that\\\\nare commonly exposed through misconfigured static file serving.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Checks Java-specific config, deployment, and build artifact paths\\\\n- Validates responses with content markers and anti-markers\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n- Complements the generic sensitive_file_discovery module\\\\n\\\\n## References\\\\n- https://tomcat.apache.org/tomcat-10.1-doc/security-howto.html\\\\n- https://docs.spring.io/spring-boot/docs/current/reference/html/application-properties.html\\",\\"short_description\\":\\"Detects Java-specific sensitive files: application configs, WEB-INF, META-INF, and build artifacts\\",\\"confirmation_criteria\\":\\"Confirmed when Java-specific sensitive files return expected content markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"java-appserver-console\\",\\"name\\":\\"Java App Server Console\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed administration consoles of enterprise Java application servers\\\\nincluding WildFly/JBoss, Oracle WebLogic, and GlassFish/Payara. These admin\\\\nconsoles are high-value targets as they enable application deployment, server\\\\nconfiguration, and often have known CVEs. Default or weak credentials can lead\\\\nto full server compromise.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Checks server-specific admin console paths\\\\n- Detects both accessible consoles and authentication challenges\\\\n- Validates using server-specific HTML and header markers\\\\n- Fingerprints 404 responses to reduce false positives\\\\n\\\\n## References\\\\n- https://docs.wildfly.org/\\\\n- https://docs.oracle.com/en/middleware/standalone/weblogic-server/\\\\n- https://glassfish.org/documentation\\",\\"short_description\\":\\"Detects exposed admin consoles for WildFly/JBoss, WebLogic, and GlassFish/Payara\\",\\"confirmation_criteria\\":\\"Confirmed when app server admin console page or login form is accessible\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"tomcat-manager-exposure\\",\\"name\\":\\"Tomcat Manager Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed Apache Tomcat Manager and Host Manager web interfaces. These\\\\nadministrative interfaces allow deploying WAR files, managing virtual hosts,\\\\nand viewing server status. Default or weak credentials on these interfaces\\\\ncan lead to complete server compromise through malicious WAR deployment.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Checks manager, host-manager, and status pages\\\\n- Detects both login challenges (401 with WWW-Authenticate) and accessible pages\\\\n- Also detects Tomcat default pages and example servlets\\\\n- Fingerprints 404 responses to reduce false positives\\\\n\\\\n## References\\\\n- https://tomcat.apache.org/tomcat-10.1-doc/manager-howto.html\\\\n- https://tomcat.apache.org/tomcat-10.1-doc/security-howto.html\\",\\"short_description\\":\\"Detects exposed Apache Tomcat Manager and Host Manager interfaces\\",\\"confirmation_criteria\\":\\"Confirmed when Tomcat Manager or Host Manager interface is accessible or prompts for authentication\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"struts-ognl-injection\\",\\"name\\":\\"Struts OGNL Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Apache Struts OGNL injection vulnerabilities by injecting OGNL math expressions\\\\ninto the Content-Type header (CVE-2017-5638 style) and into request parameters. Uses safe\\\\narithmetic-based detection to confirm expression evaluation without executing commands.\\\\n\\\\n## Notes\\\\n- Tests Content-Type header injection for CVE-2017-5638 variants\\\\n- Tests parameter-level OGNL expression injection (\${} and %{} syntax)\\\\n- Uses math expressions (multiplication) to confirm evaluation\\\\n- Deduplication via DiskSet (per-request) and RHM (per-insertion-point)\\\\n\\\\n## References\\\\n- https://nvd.nist.gov/vuln/detail/CVE-2017-5638\\\\n- https://cwiki.apache.org/confluence/display/WW/S2-045\\\\n- https://owasp.org/www-community/vulnerabilities/Expression_Language_Injection\\",\\"short_description\\":\\"Detects Apache Struts OGNL injection via Content-Type and parameter payloads\\",\\"confirmation_criteria\\":\\"Confirmed when injected OGNL math expression is evaluated and the computed result appears in the response body or headers\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\",\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"log4shell-probe\\",\\"name\\":\\"Log4Shell Probe\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Log4Shell (CVE-2021-44228) and related Log4j JNDI injection vulnerabilities by\\\\ninjecting JNDI lookup payloads into HTTP headers and request parameters. Uses OAST\\\\n(Out-of-band Application Security Testing) callbacks to confirm exploitation.\\\\n\\\\n## Notes\\\\n- Requires an interactsh server (configured via oast settings)\\\\n- Injects JNDI payloads into common HTTP headers (X-Forwarded-For, User-Agent, etc.)\\\\n- Tests multiple JNDI obfuscation patterns to bypass WAF rules\\\\n- Injects JNDI payloads into request parameters via insertion points\\\\n- Findings arrive asynchronously via the OAST polling callback\\\\n- Deduplication via DiskSet (per-request) and RHM (per-insertion-point)\\\\n\\\\n## References\\\\n- https://nvd.nist.gov/vuln/detail/CVE-2021-44228\\\\n- https://logging.apache.org/log4j/2.x/security.html\\\\n- https://www.lunasec.io/docs/blog/log4j-zero-day/\\",\\"short_description\\":\\"Detects Log4Shell (CVE-2021-44228) via JNDI payload injection with OAST callbacks\\",\\"confirmation_criteria\\":\\"Confirmed when target server performs outbound DNS or LDAP lookup to OAST callback URL injected via JNDI expression\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\",\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"ldap-injection\\",\\"name\\":\\"LDAP Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects LDAP injection vulnerabilities by injecting malformed LDAP filter expressions into\\\\nparameters that are likely used in LDAP queries (e.g., username, search, filter). Uses both\\\\nerror-based detection (checking for LDAP error messages in responses) and boolean-based\\\\ndetection (comparing responses with wildcard vs. baseline).\\\\n\\\\n## Notes\\\\n- Only tests parameters whose name suggests LDAP usage (username, uid, cn, filter, etc.)\\\\n- Checks for LDAP error messages that were not present in the baseline response\\\\n- Performs boolean-based differential analysis with wildcard injection\\\\n- Deduplication via RHM to avoid redundant requests\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/LDAP_Injection\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/LDAP_Injection_Prevention_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects LDAP injection via error-based and boolean-based techniques\\",\\"confirmation_criteria\\":\\"Confirmed when injected LDAP filter syntax triggers error messages or produces differential responses indicating filter manipulation\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"idor-guid\\",\\"name\\":\\"IDOR GUID Predictability\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Insecure Direct Object Reference (IDOR) vulnerabilities arising from predictable GUID/UUID patterns.\\\\nUUIDv1 encodes a timestamp and MAC address, making sequential IDs guessable. This module identifies\\\\nparameters containing UUIDv1 values, extracts their timestamps, generates time-neighbor UUIDs, and\\\\nchecks if the application returns valid responses for those predicted identifiers.\\",\\"short_description\\":\\"Detects predictable GUID patterns like UUIDv1 with extractable timestamps\\",\\"confirmation_criteria\\":\\"Confirmed when a time-neighbor UUID generated from UUIDv1 timestamp extraction returns a valid (non-error) response different from the original\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cache-deception\\",\\"name\\":\\"Web Cache Deception\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Web Cache Deception vulnerabilities where appending static file extensions (e.g., .css, .js, .png)\\\\nto authenticated URLs causes reverse proxies or CDNs to cache sensitive responses. An attacker can trick\\\\na victim into visiting a crafted URL, causing their authenticated response to be cached and subsequently\\\\naccessible to the attacker.\\",\\"short_description\\":\\"Detects web cache deception via path confusion with static file extensions\\",\\"confirmation_criteria\\":\\"Confirmed when a path-confused request returns the same authenticated content as the original and cache indicators (Age, X-Cache, CF-Cache-Status) suggest the response was cached\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"subdomain-takeover\\",\\"name\\":\\"Subdomain Takeover\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects subdomain takeover vulnerabilities caused by dangling DNS records (CNAME or A) pointing to\\\\ndeprovisioned cloud services. When a service is removed but its DNS record remains, an attacker can\\\\nclaim the same service identifier and serve malicious content under the target's domain.\\",\\"short_description\\":\\"Detects dangling DNS records pointing to deprovisioned cloud services\\",\\"confirmation_criteria\\":\\"Confirmed when an HTTP response from the host matches known fingerprints of unclaimed/deprovisioned cloud service pages\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"pdf-generation-injection\\",\\"name\\":\\"PDF Generation Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects injection vulnerabilities in server-side PDF generation endpoints. Applications using tools like\\\\nwkhtmltopdf, Puppeteer, WeasyPrint, or Prince to convert HTML to PDF may be vulnerable to HTML/JavaScript\\\\ninjection. Attackers can inject markup that triggers SSRF (via external resource loading), local file\\\\nreads (via file:// protocol), or information disclosure.\\",\\"short_description\\":\\"Detects HTML/JS injection into server-side PDF generation endpoints for SSRF/file read\\",\\"confirmation_criteria\\":\\"Confirmed when injected HTML/JS payloads produce evidence of server-side rendering in the response (PDF markers, reflected injection artifacts, or OAST callbacks)\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"express-debug-probe\\",\\"name\\":\\"Express Debug Probe\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nActively triggers error responses in Express.js and NestJS applications to detect\\\\nstack trace leakage and debug information exposure. When NODE_ENV is not set to\\\\nproduction, Express and NestJS return detailed error responses including stack traces,\\\\nfile paths, and internal module information.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Probes: malformed JSON body, type-mismatch path parameters, random 404 endpoint\\\\n- Detects NODE_ENV misconfiguration, stack trace leakage, file path disclosure\\\\n- Fingerprints 404 to avoid false positives on custom error pages\\\\n\\\\n## References\\\\n- https://expressjs.com/en/guide/error-handling.html\\\\n- https://docs.nestjs.com/exception-filters\\",\\"short_description\\":\\"Triggers error responses in Express/NestJS apps to detect stack trace and debug info leakage\\",\\"confirmation_criteria\\":\\"Confirmed when an error response contains stack traces, file paths, or debug markers\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"express-trust-proxy-misconfig\\",\\"name\\":\\"Express Trust Proxy Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Express.js trust proxy misconfiguration by sending X-Forwarded-* header variants\\\\nand comparing responses against a baseline to identify behavioral changes.\\\\n\\\\nWhen Express.js has \`trust proxy\` enabled without proper validation, attackers can\\\\nmanipulate X-Forwarded-Proto, X-Forwarded-Host, X-Forwarded-For, and X-Forwarded-Port\\\\nheaders to cause protocol confusion, IP-based access control bypass, and port injection.\\\\n\\\\n## Notes\\\\n- X-Forwarded-Proto can cause redirect loops or strip Secure flags from cookies\\\\n- X-Forwarded-Host can be trusted for URL generation, leading to host-based attacks\\\\n- X-Forwarded-For can bypass IP-based rate limiting or access controls\\\\n- X-Forwarded-Port can inject unexpected ports into generated URLs and redirects\\\\n- Compares each probe response against a baseline to detect behavioral changes\\\\n\\\\n## References\\\\n- https://expressjs.com/en/guide/behind-proxies.html\\\\n- https://expressjs.com/en/api.html#trust.proxy.options.table\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/17-Testing_for_Host_Header_Injection\\",\\"short_description\\":\\"Detects Express trust proxy misconfiguration via X-Forwarded-* header manipulation\\",\\"confirmation_criteria\\":\\"Confirmed when X-Forwarded-* header manipulation causes observable behavioral changes such as redirect differences, cookie Secure flag removal, access control bypass, or port injection in generated URLs\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"express-directory-listing\\",\\"name\\":\\"Express Directory Listing\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for directory listing exposure in Express.js applications using serve-index\\\\nor similar middleware. Directory listings reveal the full file inventory of static\\\\ndirectories, potentially exposing sensitive files, backup archives, configuration\\\\nfiles, and internal assets that should not be publicly accessible.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Probes common static/upload directories: /public/, /uploads/, /static/, /assets/, /files/, /media/, /images/, /dist/\\\\n- Detects serve-index, Nginx autoindex, and Apache autoindex markers\\\\n- Fingerprints 404 to avoid false positives on custom error pages\\\\n\\\\n## References\\\\n- https://expressjs.com/en/resources/middleware/serve-index.html\\\\n- https://www.npmjs.com/package/serve-index\\",\\"short_description\\":\\"Detects directory listing exposure via serve-index or similar middleware\\",\\"confirmation_criteria\\":\\"Confirmed when a directory path responds with directory listing indicators such as serve-index markers, autoindex output, or file listing HTML\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"common-directory-listing\\",\\"name\\":\\"Common Directory Listing\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for directory listing exposure across common web servers including Apache,\\\\nNginx, Microsoft IIS, Jetty, and Python SimpleHTTPServer. Directory listings reveal\\\\nthe full file inventory of served directories, potentially exposing sensitive files,\\\\nbackup archives, configuration files, and internal assets.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Probes common directories: /, /uploads/, /files/, /sites/, /assets/, /static/, /META-INF/, /WEB-INF/, /aspnet_client/, /App_Data/\\\\n- Detects Apache, Nginx, Python, Jetty, and IIS directory listing signatures\\\\n- Fingerprints 404 to avoid false positives on custom error pages\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/04-Review_Old_Backup_and_Unreferenced_Files_for_Sensitive_Information\\\\n- https://httpd.apache.org/docs/2.4/mod/mod_autoindex.html\\",\\"short_description\\":\\"Detects directory listing exposure on common web servers (Apache, Nginx, IIS, Jetty, Python)\\",\\"confirmation_criteria\\":\\"Confirmed when a directory path responds with server-specific directory listing indicators such as Apache Index of, Nginx autoindex, IIS directory browsing, Jetty directory, or Python directory listing markers\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"rails-info-exposure\\",\\"name\\":\\"Rails Info Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Rails development-oriented endpoints that are commonly left exposed in\\\\nproduction deployments. Checks for informational pages (/rails/info),
