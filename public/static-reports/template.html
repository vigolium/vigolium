lers\\\\nthat use dynamic route params or searchParams directly in database queries, authorization\\\\ndecisions, or sensitive operations without runtime validation. Dynamic route segments\\\\n([param]) and searchParams are user-controlled strings that must be validated before\\\\nuse in security-sensitive contexts.\\\\n\\\\n## Notes\\\\n- Passive only - does not send any HTTP requests\\\\n- Detects params.id, params.slug, searchParams.* used directly in DB queries\\\\n- Detects searchParams used in authorization decisions (isAdmin, role, etc.)\\\\n- Flags when no schema validation is applied before use\\\\n- Deduplicates by host+path\\\\n- CWE-20: Improper Input Validation\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/app/building-your-application/routing/dynamic-routes\\\\n- https://nextjs.org/blog/security-nextjs-server-components-actions\\\\n- https://cwe.mitre.org/data/definitions/20.html\\\\n- https://cwe.mitre.org/data/definitions/89.html\\",\\"short_description\\":\\"Detects unsafe usage of dynamic route params without validation\\",\\"confirmation_criteria\\":\\"Confirmed when dynamic params or searchParams are used directly in sensitive operations without validation\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"unsafe-html-sink\\",\\"name\\":\\"Unsafe HTML Sink\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans JavaScript, TypeScript, Vue, and Svelte response bodies for patterns that inject\\\\nraw HTML into the DOM without sanitization. These sinks are common sources of XSS\\\\nvulnerabilities in modern frontend frameworks: React (dangerouslySetInnerHTML),\\\\nVue (v-html), Svelte ({@html}), Angular (bypassSecurityTrust*), and vanilla DOM APIs\\\\n(innerHTML, outerHTML, insertAdjacentHTML, document.write). Also detects dangerous\\\\ncode injection patterns via eval() and new Function().\\\\n\\\\n## Notes\\\\n- Passive only -- does not send any HTTP requests\\\\n- Scans JS/TS/Vue/Svelte files and inline scripts in HTML responses\\\\n- Each detected pattern produces a separate finding\\\\n- Deduplicates by host+path\\\\n- eval() detections are suppressed for test/spec/mock files\\\\n\\\\n## References\\\\n- https://react.dev/reference/react-dom/components/common#dangerously-setting-the-inner-html\\\\n- https://vuejs.org/api/built-in-directives.html#v-html\\\\n- https://svelte.dev/docs/special-tags#html\\\\n- https://angular.io/api/platform-browser/DomSanitizer\\\\n- https://owasp.org/www-community/attacks/DOM_Based_XSS\\\\n- https://cwe.mitre.org/data/definitions/79.html\\",\\"short_description\\":\\"Detects raw HTML injection sinks in JS/TS framework code\\",\\"confirmation_criteria\\":\\"Confirmed when response JavaScript or template code contains known unsafe HTML injection sinks\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"insecure-token-storage\\",\\"name\\":\\"Insecure Token Storage\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans JavaScript response bodies for patterns that store authentication tokens,\\\\nAPI keys, or session identifiers in browser localStorage or sessionStorage.\\\\nStoring sensitive tokens in Web Storage exposes them to XSS attacks -- any\\\\nscript running in the same origin can read these values, making token theft\\\\ntrivial if an XSS vulnerability exists.\\\\n\\\\n## Notes\\\\n- Passive only -- does not send any HTTP requests\\\\n- Detects setItem calls with known auth-related key names\\\\n- Detects bracket notation assignment to known auth key names\\\\n- Flags patterns that read from localStorage for Authorization headers (higher severity)\\\\n- Deduplicates by host+path\\\\n\\\\n## References\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/HTML5_Security_Cheat_Sheet.html#local-storage\\\\n- https://owasp.org/www-community/attacks/xss/\\\\n- https://cwe.mitre.org/data/definitions/922.html\\\\n- https://auth0.com/docs/secure/security-guidance/data-security/token-storage\\",\\"short_description\\":\\"Detects auth tokens stored in localStorage/sessionStorage\\",\\"confirmation_criteria\\":\\"Confirmed when JavaScript code stores auth tokens or secrets in localStorage or sessionStorage\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"env-secret-exposure\\",\\"name\\":\\"Environment Secret Exposure\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans response bodies for secrets accidentally exposed through public environment\\\\nvariable mechanisms in modern JS frameworks. Next.js (NEXT_PUBLIC_), Vite (VITE_),\\\\nand Create React App (REACT_APP_) all expose prefixed environment variables to the\\\\nclient bundle. When developers store secret keys, tokens, or passwords in these\\\\npublic variables, they are shipped to every browser that loads the application.\\\\nAlso detects .env files served directly with embedded secrets.\\\\n\\\\n## Notes\\\\n- Passive only -- does not send any HTTP requests\\\\n- Scans JS, HTML, JSON, and plain text responses\\\\n- Detects NEXT_PUBLIC_, VITE_, REACT_APP_ prefixed secret variables\\\\n- Detects raw .env file content with secret indicators (sk_live_, AKIA, ghp_, etc.)\\\\n- Minimum value length of 8 characters to reduce false positives\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/app/building-your-application/configuring/environment-variables\\\\n- https://vitejs.dev/guide/env-and-mode.html\\\\n- https://create-react-app.dev/docs/adding-custom-environment-variables/\\\\n- https://cwe.mitre.org/data/definitions/200.html\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/05-Enumerate_Infrastructure_and_Application_Admin_Interfaces\\",\\"short_description\\":\\"Detects secrets exposed through public environment variables\\",\\"confirmation_criteria\\":\\"Confirmed when response body contains public environment variables with secret values or .env file content with credential indicators\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"build-misconfig-detect\\",\\"name\\":\\"Build Misconfiguration Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans JavaScript, TypeScript, and JSON response bodies for build and deployment\\\\nmisconfigurations in modern frontend frameworks. Detects production source maps\\\\nenabled (Next.js, Vite, webpack), development mode start scripts in production\\\\npackage.json, dangerous SVG handling in Next.js image optimization, and overly\\\\nbroad image remote patterns. These misconfigurations can leak source code,\\\\nexpose development tooling, or enable SSRF attacks.\\\\n\\\\n## Notes\\\\n- Passive only -- does not send any HTTP requests\\\\n- Scans JS/TS/JSON responses and config file URLs\\\\n- Detects: source maps in prod, dev mode in prod, SVG XSS risk, broad image remotePatterns\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/app/api-reference/next-config-js/productionBrowserSourceMaps\\\\n- https://vitejs.dev/config/build-options.html#build-sourcemap\\\\n- https://webpack.js.org/configuration/devtool/\\\\n- https://cwe.mitre.org/data/definitions/540.html\\\\n- https://cwe.mitre.org/data/definitions/489.html\\",\\"short_description\\":\\"Detects build and deployment misconfigurations in framework config files\\",\\"confirmation_criteria\\":\\"Confirmed when response body contains build or deployment configuration patterns that indicate misconfigurations in production\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"csp-weakness-audit\\",\\"name\\":\\"CSP Weakness Audit\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nParses Content-Security-Policy headers and evaluates individual directives for\\\\nunsafe configurations that reduce CSP effectiveness. Detects unsafe-inline,\\\\nunsafe-eval, wildcard sources, missing frame-ancestors, missing base-uri\\\\nrestriction, overly permissive script-src, and data: or blob: URI schemes\\\\nin sensitive directives.\\\\n\\\\n## Notes\\\\n- Passive only - does not send any HTTP requests\\\\n- Only processes HTML responses (text/html content type)\\\\n- Parses actual CSP header values, not just presence/absence\\\\n- Each weakness emits a separate finding with the problematic directive\\\\n- Deduplicates by host\\\\n- Complements security_headers_missing which only checks for header presence\\\\n\\\\n## References\\\\n- https://cwe.mitre.org/data/definitions/693.html\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP\\\\n- https://csp-evaluator.withgoogle.com/\\",\\"short_description\\":\\"Detects weak or unsafe Content-Security-Policy directives\\",\\"confirmation_criteria\\":\\"Confirmed when CSP header contains directives that significantly weaken its protection\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"hsts-preload-audit\\",\\"name\\":\\"HSTS Preload Audit\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively audits the Strict-Transport-Security (HSTS) header on HTTPS responses\\\\nto verify preload readiness: sufficient max-age, includeSubDomains directive,\\\\nand preload directive.\\\\n\\\\n## Notes\\\\n- Only checks HTTPS HTML responses\\\\n- Requires max-age >= 31536000 (1 year) for preload eligibility\\\\n- Runs per-host to avoid duplicate findings\\\\n\\\\n## References\\\\n- https://hstspreload.org/\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security\\",\\"short_description\\":\\"Audits Strict-Transport-Security header for preload readiness\\",\\"confirmation_criteria\\":\\"Confirmed when HSTS header is missing, incomplete, or not preload-ready\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"referrer-policy-detect\\",\\"name\\":\\"Referrer Policy Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects missing or weak Referrer-Policy headers that may leak\\\\nsensitive URL information to third-party origins.\\\\n\\\\n## Notes\\\\n- Flags missing Referrer-Policy header\\\\n- Flags weak values: unsafe-url, no-referrer-when-downgrade\\\\n- Safe values are not flagged: no-referrer, same-origin, strict-origin, strict-origin-when-cross-origin\\\\n- Runs per-host to avoid duplicate findings\\\\n\\\\n## References\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Referrer-Policy\\\\n- https://owasp.org/www-project-secure-headers/\\",\\"short_description\\":\\"Detects missing or weak Referrer-Policy headers\\",\\"confirmation_criteria\\":\\"Confirmed when Referrer-Policy header is missing or set to a weak value\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"permissions-policy-detect\\",\\"name\\":\\"Permissions Policy Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects missing or overly permissive Permissions-Policy (and legacy\\\\nFeature-Policy) headers that grant sensitive browser APIs to all origins.\\\\n\\\\n## Notes\\\\n- Checks both Permissions-Policy and legacy Feature-Policy headers\\\\n- Flags overly permissive directives: camera=*, microphone=*, geolocation=*, payment=*, usb=*\\\\n- Flags missing header entirely\\\\n- Runs per-host to avoid duplicate findings\\\\n\\\\n## References\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy\\\\n- https://www.w3.org/TR/permissions-policy/\\",\\"short_description\\":\\"Detects missing or overly permissive Permissions-Policy headers\\",\\"confirmation_criteria\\":\\"Confirmed when Permissions-Policy header is missing or contains overly permissive directives\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"subresource-integrity-detect\\",\\"name\\":\\"Subresource Integrity Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects external scripts and stylesheets loaded without Subresource\\\\nIntegrity (SRI) attributes. Missing SRI allows compromised CDNs or third-party\\\\nhosts to inject malicious code.\\\\n\\\\n## Notes\\\\n- Scans HTML response bodies for script and link tags referencing external origins\\\\n- Flags external resources (http://, https://, //) that lack an integrity attribute\\\\n- Skips inline scripts, same-origin resources, and data: URIs\\\\n- Deduplicates by host+path\\\\n\\\\n## References\\\\n- https://developer.mozilla.org/en-US/docs/Web/Security/Subresource_Integrity\\\\n- https://www.w3.org/TR/SRI/\\",\\"short_description\\":\\"Detects external resources loaded without subresource integrity\\",\\"confirmation_criteria\\":\\"Confirmed when external script or stylesheet is loaded without an integrity attribute\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"api-version-detect\\",\\"name\\":\\"API Version Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects API version indicators in HTTP traffic including URL path patterns,\\\\nversion headers, and version fields in JSON response bodies.\\\\n\\\\n## Notes\\\\n- Detects version patterns in URL paths (e.g., /v1/, /api/v2/)\\\\n- Checks for version-related response headers (API-Version, X-API-Version, Accept-Version)\\\\n- Parses JSON response bodies for version fields\\\\n- Useful for API enumeration and identifying deprecated API versions\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/12-API_Testing/\\",\\"short_description\\":\\"Detects API versioning patterns in URLs, headers, and response bodies\\",\\"confirmation_criteria\\":\\"Confirmed when URL path, headers, or response body contain API version indicators\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"grpc-web-detect\\",\\"name\\":\\"gRPC-Web Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects gRPC-Web protocol usage by inspecting request and response\\\\nContent-Type headers and gRPC-specific response headers.\\\\n\\\\n## Notes\\\\n- Detects gRPC-Web content types (application/grpc-web, application/grpc-web+proto, application/grpc-web-text)\\\\n- Checks for grpc-status response header\\\\n- Checks for gRPC content types in requests\\\\n- Useful for identifying gRPC-Web endpoints for further testing\\\\n\\\\n## References\\\\n- https://github.com/grpc/grpc/blob/master/doc/PROTOCOL-WEB.md\\\\n- https://grpc.io/docs/platforms/web/\\",\\"short_description\\":\\"Detects gRPC-Web protocol usage in HTTP traffic\\",\\"confirmation_criteria\\":\\"Confirmed when request or response contains gRPC-Web content types or gRPC-specific headers\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"wasm-module-detect\\",\\"name\\":\\"WebAssembly Module Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects WebAssembly (WASM) module usage by identifying .wasm files,\\\\napplication/wasm content types, WASM magic bytes, and WebAssembly instantiation\\\\ncalls in JavaScript files.\\\\n\\\\n## Notes\\\\n- Detects WASM binary files via magic bytes (\\\\\\\\x00asm)\\\\n- Identifies WebAssembly.instantiate, WebAssembly.compile, and WebAssembly.instantiateStreaming calls in JS\\\\n- WASM modules may contain sensitive logic worth reverse engineering\\\\n- Useful for identifying client-side logic that may bypass server-side controls\\\\n\\\\n## References\\\\n- https://webassembly.org/\\\\n- https://developer.mozilla.org/en-US/docs/WebAssembly\\",\\"short_description\\":\\"Detects WebAssembly modules and WASM instantiation in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when response contains WASM magic bytes, application/wasm content type, or WebAssembly instantiation calls\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"endpoint-classifier\\",\\"name\\":\\"Endpoint Classifier\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nClassifies HTTP endpoints and annotates database records with semantic tags (remarks).\\\\nTags are derived from request/response characteristics such as content type, status code,\\\\npath patterns, and authentication headers.\\\\n\\\\n## Tags Applied\\\\n- json-api, html-page, graphql, api-endpoint\\\\n- file-upload, redirect, error-page, authenticated\\\\n- xml-api, form-endpoint\\\\n\\\\n## Notes\\\\n- Runs as a passive module, no additional requests sent\\\\n- Tags stored in HTTPRecord.Remarks for downstream filtering and prioritization\\",\\"short_description\\":\\"Tags HTTP records with semantic labels based on request/response characteristics\\",\\"confirmation_criteria\\":\\"Endpoint classified based on HTTP request/response characteristics\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"wp-fingerprint\\",\\"name\\":\\"WordPress Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies WordPress installations from HTML responses, extracts core\\\\nversion information, and builds an inventory of installed plugins and themes by\\\\nparsing asset URLs (/wp-content/plugins/<slug>/, /wp-content/themes/<slug>/).\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Detects WordPress via /wp-content/, /wp-includes/, wp-json, X-Pingback header, generator meta tag\\\\n- Extracts version from generator meta tag and RSS feed generator element\\\\n- Enumerates plugin/theme slugs from asset URL paths\\\\n- Deduplicates by host to avoid redundant processing\\\\n\\\\n## References\\\\n- https://developer.wordpress.org/\\\\n- https://codex.wordpress.org/Determining_Plugin_and_Theme_License_Status\\",\\"short_description\\":\\"Identifies WordPress installations and enumerates core version, plugins, and themes\\",\\"confirmation_criteria\\":\\"Confirmed when WordPress-specific paths, headers, or meta tags are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"wp-rest-api-detect\\",\\"name\\":\\"WordPress REST API Exposure\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects WordPress REST API exposure by analyzing responses from\\\\n/wp-json/ endpoints. Identifies non-core plugin namespaces that may have\\\\nweak or missing permission_callback, and flags unauthenticated access to\\\\nsensitive built-in endpoints like wp/v2/users and wp/v2/settings.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Analyzes JSON responses from wp-json endpoints\\\\n- Flags custom plugin namespaces (non-core) as potential attack surface\\\\n- Detects user data exposure in wp/v2/users responses\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://developer.wordpress.org/rest-api/\\\\n- https://developer.wordpress.org/rest-api/using-the-rest-api/authentication/\\",\\"short_description\\":\\"Detects exposed WordPress REST API namespaces and sensitive endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when REST API responses contain namespace listings or user data accessible without authentication\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"drupal-fingerprint\\",\\"name\\":\\"Drupal Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies Drupal installations from HTML responses and HTTP headers.\\\\nDetects core version generation (Drupal 7 vs 8+) via asset path patterns (/misc/ vs /core/),\\\\nX-Drupal-Cache and X-Drupal-Dynamic-Cache headers, generator meta tags, and drupalSettings\\\\nJavaScript objects. Enumerates contributed modules from asset URL paths.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Detects Drupal via X-Drupal-Cache, X-Drupal-Dynamic-Cache headers\\\\n- Distinguishes Drupal 7 (/misc/, /sites/all/modules/) from Drupal 8+ (/core/, /modules/contrib/)\\\\n- Extracts contrib module names from asset URL paths\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://www.drupal.org/docs\\\\n- https://www.drupal.org/security\\",\\"short_description\\":\\"Identifies Drupal installations and detects core version, major generation (7/8/9/10/11), and contributed modules\\",\\"confirmation_criteria\\":\\"Confirmed when Drupal-specific headers, asset paths, or meta tags are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"drupal-api-detect\\",\\"name\\":\\"Drupal API Exposure\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects Drupal JSON:API and REST module exposure by analyzing response\\\\nheaders and bodies. Identifies application/vnd.api+json content types, JSON:API\\\\nresource links, and REST module response patterns that indicate API endpoints\\\\nare accessible anonymously.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Detects application/vnd.api+json content type (JSON:API)\\\\n- Identifies jsonapi resource links in response bodies\\\\n- Flags responses containing Drupal entity data structures\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://www.drupal.org/docs/core-modules-and-themes/core-modules/jsonapi-module\\\\n- https://www.drupal.org/docs/drupal-apis/restful-web-services-api\\",\\"short_description\\":\\"Detects exposed Drupal JSON:API and REST endpoints from response content\\",\\"confirmation_criteria\\":\\"Confirmed when responses contain JSON:API content types or Drupal REST entity data structures\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"joomla-fingerprint\\",\\"name\\":\\"Joomla Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies Joomla installations from HTML responses. Detects Joomla\\\\nvia generator meta tags, /administrator/ links, /media/com_* and /components/com_*\\\\nasset paths, and Joomla-specific JavaScript objects. Enumerates installed\\\\nextensions (components, modules, plugins) from URL patterns. Distinguishes\\\\nJoomla 4+ by /api/index.php references.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Detects Joomla via generator meta tag, /media/system/js/ paths, com_* references\\\\n- Enumerates extensions from /components/com_*, /media/com_*, /modules/mod_* paths\\\\n- Detects Joomla 4+ via /api/index.php references\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://docs.joomla.org/\\\\n- https://developer.joomla.org/security-centre.html\\",\\"short_description\\":\\"Identifies Joomla installations and enumerates components, modules, and plugins from asset paths\\",\\"confirmation_criteria\\":\\"Confirmed when Joomla-specific asset paths, headers, or meta tags are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"joomla-api-detect\\",\\"name\\":\\"Joomla API Exposure\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects Joomla Web Services API (Joomla 4+) exposure by analyzing\\\\nresponse headers and bodies. Identifies application/vnd.api+json content types,\\\\nAPI resource links, and CORS headers on API responses that indicate endpoints\\\\nare accessible anonymously or with overly permissive cross-origin settings.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Detects application/vnd.api+json content type\\\\n- Identifies /api/index.php path patterns\\\\n- Flags overly permissive CORS (Access-Control-Allow-Origin: *) on API endpoints\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://docs.joomla.org/J4.x:Joomla_Core_APIs\\\\n- https://developer.joomla.org/security-centre.html\\",\\"short_description\\":\\"Detects exposed Joomla Web Services API endpoints and CORS misconfigurations\\",\\"confirmation_criteria\\":\\"Confirmed when responses contain Joomla API content types or resource structures\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"firebase-fingerprint\\",\\"name\\":\\"Firebase Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies Firebase usage from HTML/JS responses, extracts project\\\\nconfiguration, and detects leaked Firebase-specific secrets and tokens.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Detects Firebase via SDK references, initializeApp calls, and config objects\\\\n- Extracts projectId, apiKey, databaseURL, storageBucket from config\\\\n- Flags leaked FCM server keys, App Check debug tokens, RTDB auth tokens\\\\n- Flags leaked Firebase Storage download tokens in URLs\\\\n- Detects staging/dev project indicators in projectId\\\\n- Deduplicates by host to avoid redundant processing\\\\n\\\\n## References\\\\n- https://firebase.google.com/docs/web/setup\\\\n- https://firebase.google.com/docs/projects/api-keys\\",\\"short_description\\":\\"Identifies Firebase usage and detects leaked Firebase secrets in responses\\",\\"confirmation_criteria\\":\\"Confirmed when Firebase SDK references, configuration objects, or leaked Firebase secrets are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cloud-storage-fingerprint\\",\\"name\\":\\"Cloud Storage Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects cloud storage services (AWS S3, Google Cloud Storage, Azure Blob Storage)\\\\nfrom HTTP response headers, URL patterns in response bodies, and request host analysis.\\\\n\\\\n## Notes\\\\n- Checks Server, x-amz-request-id, x-ms-request-id, x-goog-* headers\\\\n- Scans response body for cloud storage URL patterns\\\\n- Runs once per host with deduplication\\\\n\\\\n## References\\\\n- https://docs.aws.amazon.com/AmazonS3/latest/userguide/VirtualHosting.html\\\\n- https://cloud.google.com/storage/docs/request-endpoints\\\\n- https://learn.microsoft.com/en-us/azure/storage/blobs/storage-blobs-introduction\\",\\"short_description\\":\\"Detects S3, GCS, and Azure Blob Storage endpoints in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when response headers or body contain cloud storage service identifiers\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cloud-signed-url-leak\\",\\"name\\":\\"Cloud Signed URL Leak\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects leaked AWS presigned URLs, GCS signed URLs, and Azure SAS tokens\\\\nin HTTP response bodies. Parses expiry and permissions to assess risk level.\\\\n\\\\n## Notes\\\\n- Scans response body for X-Amz-Signature, X-Goog-Signature, and Azure SAS parameters\\\\n- Upgrades severity to High if write-capable or long-lived (>24h)\\\\n- Deduplicates by URL and signature hash\\\\n\\\\n## References\\\\n- https://docs.aws.amazon.com/AmazonS3/latest/userguide/ShareObjectPreSignedURL.html\\\\n- https://cloud.google.com/storage/docs/access-control/signed-urls\\\\n- https://learn.microsoft.com/en-us/azure/storage/common/storage-sas-overview\\",\\"short_description\\":\\"Detects leaked cloud storage signed URLs and SAS tokens in responses\\",\\"confirmation_criteria\\":\\"Confirmed when response body contains cloud storage signed URL or SAS token parameters\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cloud-storage-error-info\\",\\"name\\":\\"Cloud Storage Error Info\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively extracts leaked cloud storage identifiers (bucket names, regions, endpoints)\\\\nfrom S3 XML error responses, Azure x-ms-error-code headers, and GCS error JSON.\\\\n\\\\n## Notes\\\\n- Parses S3 XML errors for BucketName, Region, Code elements\\\\n- Checks Azure x-ms-error-code header and XML error bodies\\\\n- Parses GCS JSON error responses for bucket metadata\\\\n- Runs once per host with deduplication\\\\n\\\\n## References\\\\n- https://docs.aws.amazon.com/AmazonS3/latest/API/ErrorResponses.html\\\\n- https://learn.microsoft.com/en-us/rest/api/storageservices/common-rest-api-error-codes\\",\\"short_description\\":\\"Extracts bucket names and regions from cloud storage error responses\\",\\"confirmation_criteria\\":\\"Confirmed when error response reveals cloud storage bucket name, region, or error code\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"laravel-fingerprint\\",\\"name\\":\\"Laravel Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies Laravel installations by analyzing HTTP response headers,\\\\ncookies (laravel_session, XSRF-TOKEN), body patterns (csrf-token meta tag,\\\\nIlluminate error strings), and Sanctum/Passport indicators. Requires 2+\\\\nindependent signals to avoid false positives.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Deduplicates by host to avoid redundant processing\\\\n- Extracts version hints from error pages and headers when available\\\\n- Reports as informational severity\\\\n\\\\n## References\\\\n- https://laravel.com/docs/csrf\\\\n- https://laravel.com/docs/session\\\\n- https://laravel.com/docs/sanctum\\",\\"short_description\\":\\"Identifies Laravel installations from response headers, cookies, and body patterns\\",\\"confirmation_criteria\\":\\"Confirmed when 2+ independent Laravel-specific signals are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"aspnet-fingerprint\\",\\"name\\":\\"ASP.NET Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies ASP.NET and Microsoft IIS installations by analyzing HTTP\\\\nresponse headers (X-AspNet-Version, X-AspNetMvc-Version, X-Powered-By, Server),\\\\ncookies (ASP.NET_SessionId, .ASPXAUTH, .AspNetCore.Cookies), and body patterns\\\\n(__VIEWSTATE, __EVENTVALIDATION, WebResource.axd, ScriptResource.axd).\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Extracts IIS version from Server header, ASP.NET version from X-AspNet-Version\\\\n- Detects classic ASP, ASP.NET Web Forms, ASP.NET MVC, and ASP.NET Core\\\\n- Deduplicates by host to avoid redundant processing\\\\n\\\\n## References\\\\n- https://learn.microsoft.com/en-us/aspnet/\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/01-Information_Gathering/02-Fingerprint_Web_Server\\",\\"short_description\\":\\"Identifies ASP.NET and IIS installations from response headers, cookies, and body patterns\\",\\"confirmation_criteria\\":\\"Confirmed when ASP.NET-specific headers, cookies, or body patterns are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"aspnet-viewstate-detect\\",\\"name\\":\\"ASP.NET ViewState Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively analyzes ASP.NET ViewState in HTML responses for security issues.\\\\nChecks for unencrypted ViewState (plaintext base64), missing EventValidation,\\\\nmissing RequestVerificationToken on postback forms (CSRF risk), and oversized\\\\nViewState payloads that may carry sensitive data.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Parses __VIEWSTATE from HTML form fields\\\\n- Base64-decodes ViewState to check for encryption envelope\\\\n- Flags ViewState > 4KB as potential sensitive data carrier\\\\n- Deduplicates by host to report once per target\\\\n\\\\n## References\\\\n- https://learn.microsoft.com/en-us/dotnet/api/system.web.ui.page.viewstateencryptionmode\\\\n- https://owasp.org/www-community/attacks/Cross-Site_Request_Forgery_(CSRF)\\",\\"short_description\\":\\"Detects ASP.NET ViewState issues including missing encryption, CSRF tokens, and large payloads\\",\\"confirmation_criteria\\":\\"Confirmed when ViewState is present and lacks encryption or associated security tokens\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"spring-fingerprint\\",\\"name\\":\\"Spring Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies Spring Boot and Spring MVC applications by analyzing HTTP\\\\nresponse headers (X-Application-Context, Server), cookies (JSESSIONID pattern),\\\\ndefault error page patterns (Whitelabel), and body content markers.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Detects Spring via Whitelabel Error Page, server headers, session cookies\\\\n- Identifies underlying servlet container (Tomcat, Jetty, Undertow)\\\\n- Recognizes Spring-specific response patterns\\\\n- Deduplicates by host to avoid redundant processing\\\\n\\\\n## References\\\\n- https://docs.spring.io/spring-boot/docs/current/reference/html/\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/01-Information_Gathering/02-Fingerprint_Web_Server\\",\\"short_description\\":\\"Identifies Spring Boot/Spring MVC applications from response headers, cookies, error pages, and body patterns\\",\\"confirmation_criteria\\":\\"Confirmed when Spring-specific headers, cookies, or body patterns are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"jackson-deserialize-detect\\",\\"name\\":\\"Jackson Deserialization Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects indicators of Jackson polymorphic deserialization in HTTP\\\\nresponses. Looks for type discriminator fields (@class, @type, java class\\\\nreferences) in JSON responses and Java deserialization error messages in\\\\nerror responses. Jackson default typing can enable gadget-based RCE.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Checks JSON responses for type discriminator fields\\\\n- Detects Java class references in JSON payloads\\\\n- Identifies deserialization error patterns\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://github.com/FasterXML/jackson-databind/wiki/Deserialization-Features\\\\n- https://cwe.mitre.org/data/definitions/502.html\\",\\"short_description\\":\\"Detects Jackson polymorphic typing indicators and Java deserialization error patterns in responses\\",\\"confirmation_criteria\\":\\"Confirmed when response contains Jackson type discriminator fields or Java deserialization error patterns\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"express-fingerprint\\",\\"name\\":\\"Express/NestJS Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies Express.js and NestJS applications by analyzing HTTP response\\\\nheaders, cookies, and error body patterns. Detects X-Powered-By header set to Express,\\\\nNestJS default error shapes in JSON responses, connect.sid session cookie, and Express\\\\ndefault weak ETag format.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Detects Express via X-Powered-By header\\\\n- Identifies NestJS by its default JSON error shape (statusCode, message, error)\\\\n- Recognizes connect.sid session cookie as Express session middleware\\\\n- Checks ETag header for Express default weak ETag format (W/\\\\\\"...\\\\\\")\\\\n- Deduplicates by host to avoid redundant processing\\\\n\\\\n## References\\\\n- https://expressjs.com/en/api.html\\\\n- https://docs.nestjs.com/exception-filters\\\\n- https://github.com/expressjs/session\\",\\"short_description\\":\\"Identifies Express.js and NestJS applications via response headers and error body patterns\\",\\"confirmation_criteria\\":\\"Confirmed when Express or NestJS-specific headers, cookies, or error body patterns are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"express-session-audit\\",\\"name\\":\\"Express Session Audit\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nAudits Express.js session cookies for security issues beyond basic cookie attribute checks.\\\\nDetects default session names (connect.sid), excessive session expiry windows, and\\\\nsession proliferation on anonymous or static requests.\\\\n\\\\n## Notes\\\\n- Flags connect.sid default session name as a fingerprinting risk enabling framework identification\\\\n- Flags excessive Max-Age (>7 days / 604800 seconds) or very long Expires dates\\\\n- Detects session proliferation when session cookies are set on anonymous/static requests\\\\n\\\\n## References\\\\n- https://expressjs.com/en/resources/middleware/session.html\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html\\\\n- https://owasp.org/www-community/controls/SecureCookieAttribute\\",\\"short_description\\":\\"Audits Express.js session cookies for default naming, excessive expiry, and session proliferation\\",\\"confirmation_criteria\\":\\"Confirmed when Express.js session cookies exhibit default naming, excessive expiry, or unnecessary proliferation\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cors-vary-origin-missing\\",\\"name\\":\\"CORS Vary Origin Missing\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nDetects responses with a dynamic Access-Control-Allow-Origin header that are missing\\\\nthe Vary: Origin header. When a server reflects a specific origin in ACAO without\\\\nincluding Vary: Origin, shared caches may serve the response to requests from different\\\\norigins, enabling cache poisoning attacks.\\\\n\\\\n## Notes\\\\n- Flags responses where ACAO is a specific origin (not wildcard) without Vary: Origin\\\\n- Severity is upgraded to Medium when Access-Control-Allow-Credentials: true is also present\\\\n- Cache poisoning with credentials amplifies the impact significantly\\\\n- Complements CORS header detection with cache-specific misconfiguration checks\\\\n\\\\n## References\\\\n- https://portswigger.net/research/exploiting-cors-misconfigurations-for-bitcoins-and-bounties\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Vary\\\\n- https://www.w3.org/TR/cors/#resource-implementation\\",\\"short_description\\":\\"Detects dynamic CORS responses missing Vary: Origin header enabling cache poisoning\\",\\"confirmation_criteria\\":\\"Confirmed when a dynamic CORS response lacks the Vary: Origin header required for correct cache behavior\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"rails-fingerprint\\",\\"name\\":\\"Rails Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies Ruby on Rails installations by analyzing HTTP response headers\\\\n(X-Request-Id, X-Runtime, Server), cookies (_session suffix), default error page\\\\npatterns, and body content markers (__VIEWSTATE absence with Rails patterns).\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Detects Rails via X-Request-Id + X-Runtime header combination\\\\n- Identifies Puma/Unicorn/Passenger server headers\\\\n- Recognizes default Rails 404/500 error page text\\\\n- Detects Rails session cookies by naming convention\\\\n- Deduplicates by host to avoid redundant processing\\\\n\\\\n## References\\\\n- https://guides.rubyonrails.org/configuring.html\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/01-Information_Gathering/02-Fingerprint_Web_Server\\",\\"short_description\\":\\"Identifies Ruby on Rails installations from response headers, cookies, and body patterns\\",\\"confirmation_criteria\\":\\"Confirmed when Rails-specific headers, cookies, or body patterns are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"rails-debug-detect\\",\\"name\\":\\"Rails Debug Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects Rails development/debug tooling exposed in production responses.\\\\nIdentifies Rails exception pages with stack traces, Better Errors pages, Web Console\\\\npresence, ActiveRecord database errors, and absolute filesystem path disclosure.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Checks for Rails-specific exception class names and debug section markers\\\\n- Detects Better Errors and Web Console development gems\\\\n- Identifies ActiveRecord/database error leakage\\\\n- Flags absolute filesystem path disclosure in responses\\\\n\\\\n## References\\\\n- https://guides.rubyonrails.org/debugging_rails_applications.html\\\\n- https://owasp.org/www-community/Improper_Error_Handling\\",\\"short_description\\":\\"Detects Rails debug exception pages, Better Errors, Web Console, and ActiveRecord errors in responses\\",\\"confirmation_criteria\\":\\"Confirmed when Rails-specific debug patterns or exception details are found in response bodies\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"rails-active-storage-detect\\",\\"name\\":\\"Rails Active Storage Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects Rails Active Storage usage by scanning response bodies for Active\\\\nStorage blob URLs, representation URLs, and direct upload form attributes. Flags\\\\npotentially publicly accessible file attachments.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Scans HTML bodies for /rails/active_storage/ URL patterns\\\\n- Detects data-direct-upload-url attributes in forms\\\\n- Identifies activestorage JavaScript references\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://guides.rubyonrails.org/active_storage_overview.html\\",\\"short_description\\":\\"Passively detects Active Storage URLs and direct upload references in responses\\",\\"confirmation_criteria\\":\\"Confirmed when Active Storage URL patterns or direct upload attributes are found in responses\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"rails-action-cable-detect\\",\\"name\\":\\"Rails Action Cable Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects Rails Action Cable (WebSocket) usage by scanning response bodies for\\\\nAction Cable meta tags, JavaScript configuration, and WebSocket endpoint references.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Detects action-cable-url meta tags in HTML\\\\n- Identifies Action Cable JavaScript references and channel subscriptions\\\\n- Scans for WebSocket endpoint paths (/cable, /websocket, /ws)\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://guides.rubyonrails.org/action_cable_overview.html\\",\\"short_description\\":\\"Passively detects Action Cable WebSocket endpoints and configuration in responses\\",\\"confirmation_criteria\\":\\"Confirmed when Action Cable meta tags, JS references, or WebSocket endpoint patterns are found\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"fastapi-fingerprint\\",\\"name\\":\\"FastAPI Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies FastAPI/Starlette/Uvicorn installations by analyzing HTTP\\\\nresponse headers (Server, x-process-time), body patterns (OpenAPI JSON shape,\\\\ndetail error shape), and well-known documentation endpoints (/docs, /redoc).\\\\nRequires 2+ independent signals to avoid false positives.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Deduplicates by host to avoid redundant processing\\\\n- Detects Uvicorn via Server header\\\\n- Recognizes FastAPI default error shape and OpenAPI spec indicators\\\\n- Identifies /docs (Swagger UI) and /redoc documentation endpoints\\\\n\\\\n## References\\\\n- https://fastapi.tiangolo.com/\\",\\"short_description\\":\\"Identifies FastAPI/Starlette/Uvicorn installations from response headers, body patterns, and endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when 2+ independent FastAPI/Starlette/Uvicorn-specific signals are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"django-fingerprint\\",\\"name\\":\\"Django Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies Django installations by analyzing HTTP response cookies\\\\n(csrftoken, sessionid), body patterns (csrfmiddlewaretoken hidden field,\\\\nDjango-specific error strings), and default header configurations. Requires\\\\n2+ independent signals to avoid false positives.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Deduplicates by host to avoid redundant processing\\\\n- Detects Django default CSRF cookie and session cookie names\\\\n- Recognizes Django error page patterns (ImproperlyConfigured, OperationalError)\\\\n- X-Frame-Options: DENY is a weak signal, only counted with another signal\\\\n\\\\n## References\\\\n- https://www.djangoproject.com/\\",\\"short_description\\":\\"Identifies Django installations from response headers, cookies, and body patterns\\",\\"confirmation_criteria\\":\\"Confirmed when 2+ independent Django-specific signals are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"flask-fingerprint\\",\\"name\\":\\"Flask Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies Flask/Werkzeug installations by analyzing HTTP response\\\\nheaders (Server: Werkzeug), cookies (Flask default signed session cookie),\\\\nand body patterns (Werkzeug Debugger, Jinja2 errors, Flask tracebacks).\\\\nReports with Certain confidence on strong signals, Firm on weak signals only.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Deduplicates by host to avoid redundant processing\\\\n- Strong signals: Werkzeug Debugger in body, Werkzeug in Server header\\\\n- Weak signals: Flask session cookie, Jinja2 errors, Flask tracebacks\\\\n- Requires 1+ strong signal or 2+ weak signals to report\\\\n\\\\n## References\\\\n- https://flask.palletsprojects.com/\\",\\"short_description\\":\\"Identifies Flask/Werkzeug installations from response headers, cookies, and body patterns\\",\\"confirmation_criteria\\":\\"Confirmed when Flask/Werkzeug-specific signals are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"python-debug-detect\\",\\"name\\":\\"Python Debug Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects Python tracebacks, debug information, and path disclosure in\\\\nHTTP responses. Identifies full Python tracebacks, file path disclosure via\\\\nsite-packages paths, Django debug pages, and Werkzeug Debugger exposure. Each\\\\ndetection pattern generates a separate finding with appropriate severity.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Deduplicates by host + detection type to avoid spam\\\\n- Werkzeug Debugger: Critical severity (potential RCE)\\\\n- Full Python traceback: High severity (secrets/paths exposed)\\\\n- Django debug page: High severity\\\\n- File path disclosure: Medium severity\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects Python tracebacks, debug pages, and path disclosure in responses\\",\\"confirmation_criteria\\":\\"Confirmed when Python-specific debug patterns or tracebacks are found in response bodies\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"api-spec-detect\\",\\"name\\":\\"API Spec Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"Passively analyzes HTTP responses for API specification content (OpenAPI, Swagger,\\\\nPostman Collections). When a spec is detected, it is parsed and the extracted endpoints\\\\nare fed back into the scanning pipeline as new work items.\\",\\"short_description\\":\\"Detects API spec responses and ingests endpoints for scanning\\",\\"confirmation_criteria\\":\\"An API specification document was detected in a response body. Extracted endpoints have been ingested into the scanning pipeline.\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sensitive-api-fields-detect\\",\\"name\\":\\"Sensitive API Fields Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively analyzes JSON API responses for field names that indicate sensitive\\\\ndata exposure. Checks for password fields, API keys, access tokens, private\\\\nkeys, SSNs, and credit card numbers. Skips API documentation and JSON Schema\\\\nresponses to reduce false positives.\\\\n\\\\n## Notes\\\\n- Passive only: does not send any HTTP requests\\\\n- Only operates on application/json responses\\\\n- Uses quoted field name matching to avoid false positives in prose\\\\n- Skips OpenAPI/Swagger docs and JSON Schema responses\\\\n- Deduplicates by host to avoid flooding with the same finding\\\\n\\\\n## References\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/\\",\\"short_description\\":\\"Flags JSON API responses containing sensitive field names like passwords, API keys, and PII\\",\\"confirmation_criteria\\":\\"Confirmed when JSON response body contains sensitive field names\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"api-pagination-leak\\",\\"name\\":\\"API Pagination Leak\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects API pagination metadata in JSON responses that reveals total record\\\\ncounts, page counts, or cursor-based navigation details. This information can disclose\\\\nhow many records exist in a collection, which may reveal business-sensitive data such as\\\\nuser counts, order volumes, or internal resource quantities.\\\\n\\\\n## Notes\\\\n- Checks JSON response bodies for common pagination fields (total_count, total, totalItems, etc.)\\\\n- Only triggers on JSON responses to avoid false positives\\\\n- Deduplicates by host+path to avoid redundant findings\\\\n- Reports matched fields and their values as extracted results\\\\n\\\\n## References\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/REST_Security_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects API pagination metadata that reveals total record counts\\",\\"confirmation_criteria\\":\\"Confirmed when JSON response contains pagination metadata fields exposing total record counts or page navigation details\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"verbose-error-stacktrace\\",\\"name\\":\\"Verbose Error Stack Trace\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nDetects verbose stack traces in HTTP responses that expose internal file paths,\\\\nline numbers, and function names. Unlike the generic error-message-detect module,\\\\nthis module specifically targets multi-line stack trace patterns with file system\\\\npaths, providing higher confidence findings for each technology stack.\\\\n\\\\nCovers Go, Java, Python, Ruby, Node.js, .NET/C#, and PHP stack traces.\\\\n\\\\n## Notes\\\\n- Uses multiline-aware regex patterns to detect structured stack traces\\\\n- Each technology stack has its own detection pattern and severity\\\\n- Requires at least one file path with line number to confirm a stack trace\\\\n- Deduplicates by host+path to avoid redundant findings\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/Improper_Error_Handling\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Error_Handling_Cheat_Sheet.html\\\\n- https://cwe.mitre.org/data/definitions/209.html\\",\\"short_description\\":\\"Detects full stack traces with file paths in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when response body contains a structured stack trace with file paths and line numbers from a known technology stack\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"graphql-error-leak\\",\\"name\\":\\"GraphQL Error Leak\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects verbose GraphQL error responses that leak internal implementation details\\\\nsuch as resolver names, field suggestions, type information, database errors, and stack traces.\\\\nThese errors can help attackers enumerate the schema, discover hidden fields, and identify\\\\nbackend technologies without requiring introspection access.\\\\n\\\\n## Notes\\\\n- Checks JSON response bodies for GraphQL error array structure\\\\n- Detects field suggestion leaks (\\\\\\"Did you mean ...?\\\\\\")\\\\n- Detects resolver/type name exposure in error paths\\\\n- Detects database and ORM errors surfaced through GraphQL\\\\n- Deduplicates by host+path to avoid redundant findings\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/12-API_Testing/01-Testing_GraphQL\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/GraphQL_Cheat_Sheet.html\\\\n- https://the-bilal-rizwan.medium.com/graphql-common-vulnerabilities-how-to-exploit-them-464f9fdce696\\",\\"short_description\\":\\"Detects verbose GraphQL errors exposing schema and resolver details\\",\\"confirmation_criteria\\":\\"Confirmed when JSON response contains GraphQL error objects with internal details such as field suggestions, resolver paths, or stack traces\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"metaframework-fingerprint\\",\\"name\\":\\"Meta-Framework Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies newer JavaScript meta-frameworks by analyzing HTML response bodies\\\\nand HTTP headers for framework-specific markers. Complements the existing js-framework-fingerprint\\\\nmodule which covers Next.js, Nuxt, Angular, React, and Gatsby.\\\\n\\\\n## Notes\\\\n- Passive only — does not send any HTTP requests\\\\n- Detects: Remix, Astro, SvelteKit, SolidStart, Qwik\\\\n- Uses strong signals (hydration markers, asset URL patterns, headers) to avoid false positives\\\\n- Deduplicates by host to fingerprint each host only once\\\\n\\\\n## References\\\\n- https://remix.run/docs\\\\n- https://docs.astro.build\\\\n- https://svelte.dev/docs/kit\\\\n- https://start.solidjs.com\\\\n- https://qwik.dev\\",\\"short_description\\":\\"Identifies Remix, Astro, SvelteKit, Solid, and Qwik meta-frameworks\\",\\"confirmation_criteria\\":\\"Confirmed when framework-specific markers (hydration scripts, asset URL patterns, or headers) are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"softwa   <body>
    <div id="root">
      <style>
        @keyframes vg-spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        @keyframes vg-pulse{0%,100%{opacity:.4}50%{opacity:1}}
        .vg-loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:#f6edda;font-family:"IBM Plex Mono",monospace;color:#005661}
        .vg-loader-ring{width:36px;height:36px;border:3px solid #bbc3c4;border-top-color:#e34e1c;border-radius:50%;animation:vg-spin .8s linear infinite}
        .vg-loader-text{margin-top:16px;font-size:13px;letter-spacing:.04em;animation:vg-pulse 1.8s ease-in-out infinite}
        [data-theme="dark"] .vg-loader{background:#1c1b19;color:#fce8c3}
        [data-theme="dark"] .vg-loader-ring{border-color:#383530;border-top-color:#7fd962}
      </style>
      <div class="vg-loader">
        <div class="vg-loader-ring"></div>
        <div class="vg-loader-text">Loading Vigolium Static Report&#8230;</div>
      </div>
    </div>
