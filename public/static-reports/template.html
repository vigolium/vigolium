mailer previews\\\\n(/rails/mailers), Action Mailbox conductor UI, and health endpoints that leak metadata.\\\\n\\\\n## Notes\\\\n- Sends GET requests to known Rails development endpoints\\\\n- Fingerprints 404 responses to avoid false positives from custom error pages\\\\n- Checks for Rails-specific content markers in response bodies\\\\n- Reports exposed endpoints with appropriate severity levels\\\\n\\\\n## References\\\\n- https://guides.rubyonrails.org/configuring.html\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects exposed Rails development and debug endpoints in production\\",\\"confirmation_criteria\\":\\"Confirmed when Rails development endpoints return 200 with framework-specific content markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"rails-sensitive-files\\",\\"name\\":\\"Rails Sensitive Files\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Rails-specific sensitive files that may be exposed due to misconfigured web\\\\nservers or containerized deployments serving the application root as static files.\\\\nChecks for master keys, encrypted credentials, database configs, Gemfiles, logs,\\\\nSQLite databases, and server configurations.\\\\n\\\\n## Notes\\\\n- Sends GET/HEAD requests to known Rails configuration file paths\\\\n- Uses content markers to confirm file type and reduce false positives\\\\n- Fingerprints 404 responses to avoid custom error page false positives\\\\n- Each finding has severity based on the sensitivity of the exposed file\\\\n\\\\n## References\\\\n- https://guides.rubyonrails.org/security.html\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects exposed Rails configuration files, credentials, and artifacts\\",\\"confirmation_criteria\\":\\"Confirmed when Rails configuration files are accessible and contain expected content markers\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"rails-admin-dashboard\\",\\"name\\":\\"Rails Admin Dashboard\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for common Rails ecosystem admin panels and background job dashboards that are\\\\nfrequently mounted at predictable paths. Checks for Sidekiq, GoodJob, Resque, Delayed Job,\\\\nrack-mini-profiler, ActiveAdmin, and RailsAdmin.\\\\n\\\\n## Notes\\\\n- Sends GET requests to known Rails dashboard paths\\\\n- Checks for framework-specific content markers in response bodies\\\\n- Reports both unauthenticated and auth-gated dashboards\\\\n- Fingerprints 404 responses to avoid false positives\\\\n\\\\n## References\\\\n- https://github.com/sidekiq/sidekiq/wiki/Monitoring\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects exposed Rails ecosystem admin panels and dashboard UIs\\",\\"confirmation_criteria\\":\\"Confirmed when Rails dashboard endpoints return responses containing framework-specific UI markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"rails-active-storage-probe\\",\\"name\\":\\"Rails Active Storage Probe\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Rails Active Storage direct upload endpoints that may accept unauthenticated\\\\nuploads, and Action Mailbox ingress endpoints that may accept unauthorized email submissions.\\\\nAlso checks for publicly accessible Active Storage blob routes.\\\\n\\\\n## Notes\\\\n- Uses OPTIONS requests for direct upload endpoint to check allowed methods\\\\n- Probes Action Mailbox ingress paths for multiple email providers\\\\n- Fingerprints 404 responses to avoid false positives\\\\n\\\\n## References\\\\n- https://guides.rubyonrails.org/active_storage_overview.html\\\\n- https://guides.rubyonrails.org/action_mailbox_basics.html\\",\\"short_description\\":\\"Detects exposed Rails Active Storage direct upload and Action Mailbox ingress endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when Active Storage or Action Mailbox endpoints respond with expected behavior\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"rails-action-mailbox-probe\\",\\"name\\":\\"Rails Action Mailbox Probe\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for Rails Action Mailbox ingress endpoints for multiple email service providers.\\\\nThese endpoints receive inbound emails via HTTP and may be accessible without proper\\\\nauthentication or provider signature validation.\\\\n\\\\n## Notes\\\\n- Uses OPTIONS and POST requests to check for accessible ingress endpoints\\\\n- Tests relay, SendGrid, Mailgun, Mandrill, and Postmark ingress paths\\\\n- Checks for WWW-Authenticate headers indicating basic auth protection\\\\n- Fingerprints 404 responses to avoid false positives\\\\n\\\\n## References\\\\n- https://guides.rubyonrails.org/action_mailbox_basics.html\\\\n- https://api.rubyonrails.org/classes/ActionMailbox.html\\",\\"short_description\\":\\"Detects exposed Rails Action Mailbox ingress endpoints that may accept unauthorized submissions\\",\\"confirmation_criteria\\":\\"Confirmed when Action Mailbox ingress endpoints respond to requests without authentication\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"api-spec-ingest\\",\\"name\\":\\"API Spec Ingest\\",\\"type\\":\\"active\\",\\"description\\":\\"Probes common paths for API specification files (OpenAPI, Swagger, Postman Collections),\\\\nparses discovered specs, and feeds the extracted endpoints back into the scanning pipeline\\\\nas new work items. This extends attack surface coverage by automatically discovering and\\\\nauditing API endpoints defined in specification documents.\\",\\"short_description\\":\\"Discovers API specs (OpenAPI/Swagger/Postman) and ingests endpoints for scanning\\",\\"confirmation_criteria\\":\\"An API specification document was found and successfully parsed. Extracted endpoints have been ingested into the scanning pipeline.\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"fastapi-docs-exposure\\",\\"name\\":\\"FastAPI Docs Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed FastAPI interactive API documentation. FastAPI auto-generates\\\\nSwagger UI at /docs, ReDoc at /redoc, and the OpenAPI spec at /openapi.json by\\\\ndefault. These endpoints reveal all API routes, schemas, and parameters, increasing\\\\nthe attack surface for further exploitation.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n- Reported as low severity (information disclosure)\\\\n\\\\n## References\\\\n- https://fastapi.tiangolo.com/tutorial/metadata/\\",\\"short_description\\":\\"Probes for exposed FastAPI interactive API documentation endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when documentation endpoints return 200 with expected FastAPI-specific markers\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"fastapi-auth-inconsistency\\",\\"name\\":\\"FastAPI Auth Inconsistency\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nFetches the FastAPI OpenAPI schema from /openapi.json and analyzes it for\\\\nauthentication inconsistencies. Identifies operations that lack security\\\\nrequirements, either because they explicitly opt out of global security\\\\nor because no security is defined at any level.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Parses /openapi.json for OpenAPI spec\\\\n- Flags operations under /api prefix without security requirements\\\\n- Optionally verifies by calling endpoints without auth\\\\n- FA-02: FastAPI auth inconsistency detection\\\\n\\\\n## References\\\\n- https://fastapi.tiangolo.com/tutorial/security/\\",\\"short_description\\":\\"Fetches OpenAPI schema and finds unprotected operations\\",\\"confirmation_criteria\\":\\"Confirmed when OpenAPI spec reveals operations without security requirements, optionally verified by unauthenticated access\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"django-debug-exposure\\",\\"name\\":\\"Django Debug Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTriggers errors to detect Django applications running with DEBUG=True. When\\\\nenabled, Django displays detailed error pages containing settings, URL\\\\npatterns, stack traces, and environment variables. This module sends requests\\\\ndesigned to trigger 404 and 500 error pages that reveal debug information.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Sends a request to a random non-existent path to trigger a Django debug 404 page\\\\n- Sends a malformed JSON POST to trigger a 500 error with stack trace\\\\n- Validates responses with Django-specific debug page markers\\\\n\\\\n## References\\\\n- https://docs.djangoproject.com/en/stable/ref/settings/#debug\\",\\"short_description\\":\\"Triggers errors to detect Django DEBUG=True information disclosure\\",\\"confirmation_criteria\\":\\"Confirmed when error responses contain Django debug page markers indicating DEBUG=True\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"django-admin-exposure\\",\\"name\\":\\"Django Admin Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed Django admin panel. Django ships with a built-in admin\\\\ninterface at /admin/ that provides full CRUD access to the application's data\\\\nmodels. An exposed admin panel increases attack surface and may allow brute\\\\nforce or credential stuffing attacks against the admin login.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with Django admin-specific markers to reduce false positives\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n- Admin index reported as medium severity; login page confirms admin is installed\\\\n\\\\n## References\\\\n- https://docs.djangoproject.com/en/stable/ref/contrib/admin/\\",\\"short_description\\":\\"Probes for exposed Django admin panel and login page\\",\\"confirmation_criteria\\":\\"Confirmed when admin endpoints return 200 with expected Django admin-specific markers\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"django-debug-toolbar-exposure\\",\\"name\\":\\"Django Debug Toolbar Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for exposed django-debug-toolbar endpoints. When debug toolbar is left\\\\nenabled in production, it exposes internal application state including SQL queries,\\\\ntemplate context, signal handlers, cache operations, and profiling data.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Validates responses with content markers to reduce false positives\\\\n- Fingerprints 404 responses to detect custom error pages\\\\n- DJ-06: django-debug-toolbar detection\\\\n\\\\n## References\\\\n- https://django-debug-toolbar.readthedocs.io/\\",\\"short_description\\":\\"Detects exposed django-debug-toolbar panels and render endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when debug toolbar endpoints return 200 with expected django-debug-toolbar markers\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"django-browsable-api-exposure\\",\\"name\\":\\"Django Browsable API Exposure\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Django REST Framework browsable API exposure by re-requesting endpoints\\\\nwith Accept: text/html. When the browsable API is enabled in production, it\\\\nprovides an interactive HTML interface that reveals API schema, available actions,\\\\nfilter options, and authentication requirements.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Re-requests the original URL with Accept: text/html header\\\\n- Also probes /api/ with Accept: text/html\\\\n- DJ-07: DRF browsable API detection\\\\n\\\\n## References\\\\n- https://www.django-rest-framework.org/topics/browsable-api/\\",\\"short_description\\":\\"Detects DRF browsable API by requesting endpoints with Accept: text/html\\",\\"confirmation_criteria\\":\\"Confirmed when endpoints return HTML containing DRF browsable API markers\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"flask-werkzeug-debugger\\",\\"name\\":\\"Flask Werkzeug Debugger\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects exposed Werkzeug interactive debugger in Flask applications. The\\\\nWerkzeug debugger provides an interactive Python console in the browser when\\\\nan unhandled exception occurs. This allows arbitrary code execution on the\\\\nserver and is a critical vulnerability when exposed in production.\\\\n\\\\n## Notes\\\\n- Runs once per host to avoid redundant probing\\\\n- Sends requests designed to trigger 404 and 500 errors\\\\n- Distinguishes between full interactive debugger (critical/RCE) and stack trace disclosure (high/info disclosure)\\\\n- Interactive debugger confirmed by \\\\\\"Werkzeug Debugger\\\\\\" marker\\\\n\\\\n## References\\\\n- https://flask.palletsprojects.com/en/latest/debugging/\\\\n- https://werkzeug.palletsprojects.com/en/latest/debug/\\",\\"short_description\\":\\"Detects exposed Werkzeug interactive debugger enabling remote code execution\\",\\"confirmation_criteria\\":\\"Confirmed when error responses contain Werkzeug debugger markers indicating interactive console access\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"proxy-header-trust\\",\\"name\\":\\"Proxy Header Trust\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nCross-framework detection of proxy header trust issues. Tests whether the application\\\\nblindly trusts X-Forwarded-Proto, X-Forwarded-Host, and X-Forwarded-For headers,\\\\nwhich can lead to host injection, protocol confusion, and IP-based access control bypass.\\\\n\\\\n## Notes\\\\n- Runs once per host\\\\n- Sends baseline request then compares with header-injected variants\\\\n- X-Forwarded-Host reflected in Location or body indicates host injection (High)\\\\n- X-Forwarded-Proto behavior changes indicate protocol confusion (Medium)\\\\n- X-Forwarded-For bypassing restrictions indicates IP trust issues (High)\\\\n- CF-21, FA-05, FL-06, DJ-08: cross-framework proxy header trust detection\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Cross-framework detection of proxy header trust issues via X-Forwarded-* header manipulation\\",\\"confirmation_criteria\\":\\"Confirmed when X-Forwarded-* header manipulation causes observable behavioral changes such as host reflection, redirect differences, or access control bypass\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"bfla-detection\\",\\"name\\":\\"BFLA Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Broken Function-Level Authorization (BFLA) by testing admin and privileged\\\\nendpoints with missing or downgraded authentication. Strips Authorization and Cookie\\\\nheaders, attempts empty tokens, and tests method switching on admin-like paths.\\\\n\\\\n## Notes\\\\n- Runs once per unique host+path combination via DiskSet dedup\\\\n- Skips non-2xx original responses (only tests endpoints that currently succeed)\\\\n- Compares response status codes and body lengths to reduce false positives\\\\n- Heuristic-based detection targeting known admin/privileged path patterns\\\\n\\\\n## References\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa5-broken-function-level-authorization/\\\\n- https://portswigger.net/web-security/access-control\\",\\"short_description\\":\\"Detects Broken Function-Level Authorization on privileged endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when a privileged endpoint returns a successful response after removing or downgrading authentication credentials\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"oauth-misconfiguration\\",\\"name\\":\\"OAuth/OIDC Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects common OAuth and OpenID Connect misconfigurations that can lead to account\\\\ntakeover or authorization bypass. Tests for redirect_uri manipulation, missing CSRF\\\\nstate parameter, and response_type downgrade to implicit flow.\\\\n\\\\n## Notes\\\\n- Runs once per unique host+path combination via DiskSet dedup\\\\n- Only activates on detected OAuth/OIDC endpoints (path and parameter heuristics)\\\\n- Tests redirect_uri with multiple bypass techniques (direct replacement, subdomain confusion, path traversal)\\\\n- Checks for missing state parameter (CSRF protection)\\\\n- Tests response_type downgrade from code to token (implicit flow)\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/oauth\\\\n- https://datatracker.ietf.org/doc/html/rfc6749#section-10.6\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/05-Authorization_Testing/05-Testing_for_OAuth_Weaknesses\\",\\"short_description\\":\\"Detects common OAuth/OIDC misconfigurations including open redirect and missing state\\",\\"confirmation_criteria\\":\\"Confirmed when an OAuth endpoint accepts a manipulated redirect_uri, is missing CSRF state protection, or accepts implicit flow downgrade\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"api-key-url-exposure\\",\\"name\\":\\"API Key in URL\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects API keys and authentication tokens that continue to work when moved from\\\\nHTTP headers to URL query parameters. API keys in URLs are logged in access logs,\\\\nbrowser history, referrer headers, and proxy logs, significantly increasing the\\\\nrisk of credential exposure.\\\\n\\\\n## Notes\\\\n- Tests once per unique host+path combination\\\\n- Checks common auth headers: Authorization, X-API-Key, X-Auth-Token, etc.\\\\n- Only tests the first matching auth header per request\\\\n- Reports when response with URL parameter matches original 2xx status\\\\n\\\\n## References\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa2-broken-authentication/\\\\n- https://cwe.mitre.org/data/definitions/598.html\\",\\"short_description\\":\\"Detects API keys that work when moved from headers to URL parameters\\",\\"confirmation_criteria\\":\\"Confirmed when the server returns a successful response with the API key passed as a URL query parameter instead of in the authorization header\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"fastify-hono-probe\\",\\"name\\":\\"Fastify/Hono Probe\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for framework-specific documentation, metrics, and debug endpoints exposed\\\\nby Fastify and Hono Node.js frameworks. These frameworks may inadvertently expose\\\\nSwagger documentation, API references, metrics endpoints, and overview pages in\\\\nproduction deployments.\\\\n\\\\n## Notes\\\\n- Runs once per host with internal deduplication\\\\n- Tests 8 framework-specific paths across Fastify and Hono\\\\n- Each probe has tailored response matching to reduce false positives\\\\n\\\\n## References\\\\n- https://fastify.dev/docs/latest/\\\\n- https://hono.dev/docs/\\",\\"short_description\\":\\"Detects exposed Fastify and Hono framework endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when the server responds with framework-specific content at known documentation or debug paths, indicating exposed internal endpoints\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"metaframework-probe\\",\\"name\\":\\"Metaframework Probe\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for framework-specific internal files and debug endpoints exposed by modern\\\\nJavaScript meta-frameworks including Remix, Astro, and SvelteKit. These frameworks\\\\nmay inadvertently expose manifest files, build directories, version information,\\\\nand development endpoints in production deployments.\\\\n\\\\n## Notes\\\\n- Runs once per host with internal deduplication\\\\n- Tests 8 framework-specific paths across Remix, Astro, and SvelteKit\\\\n- Each probe has tailored response matching to reduce false positives\\\\n\\\\n## References\\\\n- https://remix.run/docs/en/main\\\\n- https://docs.astro.build/en/getting-started/\\\\n- https://kit.svelte.dev/docs/introduction\\",\\"short_description\\":\\"Detects exposed Remix, Astro, and SvelteKit internal files and endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when the server responds with framework-specific content at known internal paths, indicating exposed build artifacts or debug endpoints\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"dom-xss-detect\\",\\"name\\":\\"DOM XSS Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects potential DOM-based XSS patterns by analyzing JavaScript code in\\\\nresponses for dangerous source-to-sink data flows.\\\\n\\\\n## Notes\\\\n- Scans response bodies for known DOM XSS source patterns (location.hash, document.referrer, etc.)\\\\n- Identifies dangerous sink patterns (innerHTML, eval, document.write, etc.)\\\\n- Pattern-based detection; manual verification recommended\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/DOM_Based_XSS\\",\\"short_description\\":\\"Detects potential DOM-based XSS patterns in responses\\",\\"confirmation_criteria\\":\\"Indicated when response JavaScript contains known source-to-sink patterns that could enable DOM-based XSS\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"auth-headers-detect\\",\\"name\\":\\"Auth Headers Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects authorization and authentication headers in HTTP requests,\\\\nflagging endpoints that handle sensitive credentials.\\\\n\\\\n## Notes\\\\n- Scans request headers for Authorization, Cookie, X-API-Key, and similar patterns\\\\n- Helps identify authentication boundaries in the application\\\\n\\\\n## References\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Authorization\\",\\"short_description\\":\\"Detects authorization headers in requests\\",\\"confirmation_criteria\\":\\"Confirmed when request contains recognized authentication headers (Authorization, Bearer tokens, API keys)\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"openredirect-params\\",\\"name\\":\\"Open Redirect Params\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects URL parameters with names commonly associated with open redirect\\\\nvulnerabilities (redirect, url, next, return, goto, etc.).\\\\n\\\\n## Notes\\\\n- Pattern-based detection on parameter names only; does not test for actual redirects\\\\n- Low confidence; serves as a triage signal for the active open redirect module\\\\n\\\\n## References\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects URL parameters commonly used for open redirects\\",\\"confirmation_criteria\\":\\"Indicated when URL contains parameters with redirect-associated names (redirect, url, next, return, goto)\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"oauth-facebook-detect\\",\\"name\\":\\"Facebook OAuth Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects Facebook OAuth redirect parameters in requests, flagging potential\\\\nOAuth misconfiguration or open redirect vectors in the authentication flow.\\\\n\\\\n## Notes\\\\n- Scans URL parameters for Facebook OAuth redirect_uri and related parameters\\\\n- Helps identify OAuth flows that may be vulnerable to redirect manipulation\\\\n\\\\n## References\\\\n- https://developers.facebook.com/docs/facebook-login/security/\\",\\"short_description\\":\\"Detects Facebook OAuth redirect parameters for security analysis\\",\\"confirmation_criteria\\":\\"Confirmed when request URL contains Facebook OAuth parameters (client_id, redirect_uri) matching known OAuth flow patterns\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"anomaly-ranking\\",\\"name\\":\\"Anomaly Ranking\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nRanks HTTP responses by statistical anomaly to identify interesting endpoints. Buffers\\\\nresponses per host and applies statistical ranking when thresholds are reached.\\\\n\\\\n## Notes\\\\n- Buffers per-host response attributes and flushes at configurable thresholds\\\\n- Uses statistical analysis to identify outlier responses worth investigating\\\\n- Updates risk_score on database records for prioritization\\\\n\\\\n## References\\\\n- https://en.wikipedia.org/wiki/Anomaly_detection\\",\\"short_description\\":\\"Statistical anomaly detection across per-host response batches\\",\\"confirmation_criteria\\":\\"Indicated when a response's statistical attributes (size, status, headers) deviate significantly from the per-host baseline\\",\\"severity\\":\\"suspect\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"secret-detect\\",\\"name\\":\\"Secret Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively scans HTTP response bodies for leaked secrets, credentials, API keys,\\\\nand connection strings using the Kingfisher secret detection engine.\\\\n\\\\n## Notes\\\\n- Scans response bodies only (no additional HTTP requests sent)\\\\n- Skips binary/media content types\\\\n- Uses lazy-initialized singleton Kingfisher scanner\\\\n- Generates one finding per detected secret\\\\n\\\\n## References\\\\n- https://github.com/mongodb/kingfisher\\",\\"short_description\\":\\"Detects leaked secrets and credentials in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when Kingfisher detects a known secret pattern in the HTTP response body\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sourcemap-detect\\",\\"name\\":\\"Sourcemap Exposure Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects exposed JavaScript sourcemaps by identifying SourceMappingURL\\\\nreferences in JS/CSS responses and validating accessible .map files.\\\\n\\\\n## Notes\\\\n- Detects sourceMappingURL comments in JavaScript and CSS responses\\\\n- Validates .map file responses by parsing sourcemap JSON structure\\\\n- Exposed sourcemaps reveal original source code, file paths, and potentially secrets\\\\n\\\\n## References\\\\n- https://developer.chrome.com/docs/devtools/javascript/source-maps\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects exposed JavaScript sourcemaps in production responses\\",\\"confirmation_criteria\\":\\"Confirmed when response contains a sourceMappingURL reference or a valid sourcemap JSON structure is detected\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"security-headers-missing\\",\\"name\\":\\"Security Headers Missing\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects missing HTTP security headers that protect against common web\\\\nattacks including XSS, clickjacking, MIME sniffing, and protocol downgrade.\\\\n\\\\n## Notes\\\\n- Checks for X-Content-Type-Options, X-Frame-Options, Strict-Transport-Security, Content-Security-Policy, and Permissions-Policy\\\\n- Runs per-host to avoid duplicate findings\\\\n- Only flags HTML responses to reduce noise\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-secure-headers/\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects missing HTTP security headers in responses\\",\\"confirmation_criteria\\":\\"Confirmed when HTTP response lacks one or more recommended security headers\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"info-disclosure-detect\\",\\"name\\":\\"Info Disclosure Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects information disclosure in HTTP responses including server version\\\\nstrings, framework identifiers, internal IP addresses, and stack traces.\\\\n\\\\n## Notes\\\\n- Scans response headers and bodies for disclosure patterns\\\\n- Detects server software versions, internal paths, email addresses, and debug info\\\\n- Runs per-request to catch endpoint-specific disclosures\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/01-Information_Gathering/\\",\\"short_description\\":\\"Detects information disclosure patterns in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when response contains identifiable server versions, internal IPs, stack traces, or debug information\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"directory-listing-detect\\",\\"name\\":\\"Directory Listing Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects directory listing exposure in HTTP responses across common web\\\\nservers including Apache, Nginx, Microsoft IIS, Jetty, and Python SimpleHTTPServer.\\\\n\\\\n## Notes\\\\n- Analyzes existing responses without sending additional requests\\\\n- Detects Apache, Nginx, Python, Jetty, and IIS directory listing signatures\\\\n- Skips binary/media content types\\\\n- Only processes 2xx responses\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/04-Review_Old_Backup_and_Unreferenced_Files_for_Sensitive_Information\\\\n- https://httpd.apache.org/docs/2.4/mod/mod_autoindex.html\\",\\"short_description\\":\\"Passively detects directory listing exposure in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when response contains server-specific directory listing indicators such as Apache Index of, Nginx autoindex, IIS directory browsing, Jetty directory, or Python directory listing markers\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cookie-security-detect\\",\\"name\\":\\"Cookie Security Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects insecure cookie configurations by analyzing Set-Cookie headers\\\\nfor missing Secure, HttpOnly, and SameSite attributes.\\\\n\\\\n## Notes\\\\n- Checks all Set-Cookie headers in responses\\\\n- Flags cookies missing Secure flag on HTTPS responses\\\\n- Flags cookies missing HttpOnly attribute\\\\n- Flags cookies without SameSite attribute\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/controls/SecureCookieAttribute\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects insecure cookie attributes in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when Set-Cookie headers lack Secure, HttpOnly, or SameSite attributes\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"mixed-content-detect\\",\\"name\\":\\"Mixed Content Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects mixed content issues where HTTPS pages load resources over\\\\ninsecure HTTP connections, potentially exposing data to interception.\\\\n\\\\n## Notes\\\\n- Scans HTML response bodies for HTTP URLs in src, href, and action attributes\\\\n- Only checks responses from HTTPS origins\\\\n- Flags both active (scripts, iframes) and passive (images, stylesheets) mixed content\\\\n\\\\n## References\\\\n- https://developer.mozilla.org/en-US/docs/Web/Security/Mixed_content\\\\n- https://owasp.org/www-community/controls/Certificate_and_Public_Key_Pinning\\",\\"short_description\\":\\"Detects mixed HTTP/HTTPS content in responses\\",\\"confirmation_criteria\\":\\"Confirmed when HTTPS page contains references to resources loaded over insecure HTTP\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sensitive-url-params\\",\\"name\\":\\"Sensitive URL Params\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects sensitive information passed via URL query parameters, which may\\\\nbe logged in server logs, browser history, and referrer headers.\\\\n\\\\n## Notes\\\\n- Detects passwords, tokens, API keys, and credentials in URL parameters\\\\n- Pattern-based detection on both parameter names and values\\\\n- Sensitive data in URLs is logged and may leak via Referer headers\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/vulnerabilities/Information_exposure_through_query_strings_in_url\\\\n- https://cwe.mitre.org/data/definitions/598.html\\",\\"short_description\\":\\"Detects sensitive data in URL query parameters\\",\\"confirmation_criteria\\":\\"Indicated when URL query parameters contain names or values matching sensitive data patterns (password, token, key, secret)\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cors-headers-detect\\",\\"name\\":\\"CORS Headers Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects permissive CORS configurations by analyzing Access-Control-Allow-Origin\\\\nand related headers in HTTP responses without sending additional requests.\\\\n\\\\n## Notes\\\\n- Flags wildcard (*) CORS origins\\\\n- Flags CORS with credentials enabled\\\\n- Complements the active CORS misconfiguration module with passive detection\\\\n- Runs per-request for comprehensive coverage\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/cors\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS\\",\\"short_description\\":\\"Passively detects permissive CORS headers in responses\\",\\"confirmation_criteria\\":\\"Confirmed when response contains permissive CORS headers such as wildcard origin or credentials enabled\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"jwt-weak-secret\\",\\"name\\":\\"JWT Weak Secret Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects JWT tokens signed with weak HMAC secrets by performing offline\\\\nbrute-force against an embedded wordlist of ~104K known weak secrets.\\\\n\\\\nWhen an asymmetric-algorithm JWT (RS256, ES256, etc.) is found but no HMAC secret\\\\nmatches, emits a low-severity informational finding noting the potential for\\\\nalgorithm confusion (CVE-2015-9235). Active testing is recommended to confirm.\\\\n\\\\n## Notes\\\\n- Extracts JWTs from Authorization Bearer headers and cookies\\\\n- Tests HMAC-based algorithms (HS256, HS384, HS512)\\\\n- Detects non-cryptographic (plaintext ASCII) signatures indicating trivially forgeable tokens\\\\n- Tests algorithm confusion (CVE-2015-9235): tries HS256/HS384/HS512 brute-force on asymmetric tokens (RS256, ES256, etc.)\\\\n- Emits informational finding for asymmetric JWTs even when no weak secret is found\\\\n- Computes HMAC signatures offline without sending additional requests\\\\n- Uses embedded jwt.secrets.list wordlist\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/jwt\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/10-Testing_JSON_Web_Tokens\\",\\"short_description\\":\\"Detects JWTs with weak HMAC secrets, non-cryptographic signatures, and algorithm confusion\\",\\"confirmation_criteria\\":\\"Confirmed when a JWT HMAC signature matches a known weak secret\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"jwt-claims-detect\\",\\"name\\":\\"JWT Claim Analyzer\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively analyzes JWT tokens found in request headers, cookies, and response bodies\\\\nfor security misconfigurations such as algorithm:none, missing expiration, long-lived\\\\ntokens, and privileged claims.\\\\n\\\\n## Notes\\\\n- Extracts JWTs from Authorization Bearer headers, cookies, and response bodies\\\\n- Decodes header and payload without verifying signatures\\\\n- Checks for alg:none, missing exp/iss/aud, long-lived tokens, and admin claims\\\\n- Does not send additional requests\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/jwt\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/10-Testing_JSON_Web_Tokens\\",\\"short_description\\":\\"Analyzes JWT claims for security misconfigurations\\",\\"confirmation_criteria\\":\\"Confirmed when JWT claims contain security misconfigurations\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"serialized-object-detect\\",\\"name\\":\\"Serialized Object Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects serialized objects in HTTP request parameters by matching known\\\\nserialization format signatures for Java, PHP, .NET, and Python.\\\\n\\\\n## Notes\\\\n- Java: base64 prefix \\\\\\"rO0AB\\\\\\" or hex prefix \\\\\\"aced0005\\\\\\"\\\\n- PHP: pattern matching O:N:\\\\\\"class\\\\\\", a:N:{, etc.\\\\n- .NET: base64 prefix \\\\\\"AAEAAAD\\\\\\" (BinaryFormatter)\\\\n- Python: pickle indicators (\\\\\\"ccopy_reg\\\\\\" prefix or protocol markers)\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/16-Testing_for_HTTP_Incoming_Requests\\\\n- https://portswigger.net/web-security/deserialization\\",\\"short_description\\":\\"Detects serialized Java/PHP/.NET/Python objects in request parameters\\",\\"confirmation_criteria\\":\\"Confirmed when request parameter values contain known serialization format signatures\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sql-syntax-detect\\",\\"name\\":\\"SQL Syntax in Request Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects SQL statements and keywords in HTTP request parameter values,\\\\nwhich may indicate SQL injection attempts or unsafe parameter handling.\\\\n\\\\n## Notes\\\\n- Matches SQL statements: SELECT..FROM, INSERT INTO, UPDATE..SET, DELETE FROM, UNION SELECT, etc.\\\\n- Secondary check for SQL keyword pairs: WHERE/AND/OR with comparison operators\\\\n- URL-decodes parameter values before checking\\\\n- Minimum value length of 8 characters to reduce false positives\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/SQL_Injection\\\\n- https://cwe.mitre.org/data/definitions/89.html\\",\\"short_description\\":\\"Detects SQL syntax in HTTP request parameter values\\",\\"confirmation_criteria\\":\\"Indicated when request parameter values contain SQL statement patterns\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"content-type-mismatch\\",\\"name\\":\\"Content Type Mismatch\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects mismatches between the Content-Type header and actual response body\\\\ncontent, which can lead to MIME confusion attacks and XSS.\\\\n\\\\n## Notes\\\\n- Compares declared Content-Type with detected body content signatures\\\\n- Flags JSON/XML/HTML content served with incorrect Content-Type\\\\n- Missing X-Content-Type-Options makes MIME sniffing exploitable\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-secure-headers/#x-content-type-options\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options\\",\\"short_description\\":\\"Detects mismatches between Content-Type header and response body\\",\\"confirmation_criteria\\":\\"Confirmed when the Content-Type header does not match the actual content of the response body\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"csrf-detect\\",\\"name\\":\\"CSRF Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nDetects state-changing HTTP requests (POST, PUT, DELETE, PATCH) that lack common\\\\nanti-CSRF protections such as CSRF tokens in parameters/headers or SameSite cookie\\\\nattributes.\\\\n\\\\n## Notes\\\\n- Passive only — does not send any HTTP requests\\\\n- Skips JSON API requests with Origin header (CORS-protected)\\\\n- Checks for CSRF tokens in body parameters, custom headers, and SameSite cookies\\\\n- Deduplicates by method + host + path\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/csrf\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Cross-Site_Request_Forgery_Prevention_Cheat_Sheet.html\\",\\"short_description\\":\\"Flags state-changing requests missing anti-CSRF protections\\",\\"confirmation_criteria\\":\\"Indicated when a state-changing request lacks CSRF token parameters, custom anti-CSRF headers, and SameSite cookie attributes\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"idor-params-detect\\",\\"name\\":\\"IDOR Parameter Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies HTTP parameters whose names and values suggest they reference\\\\nobject identifiers, providing triage signals for potential IDOR (Insecure Direct\\\\nObject Reference) and BOLA (Broken Object Level Authorization) vulnerabilities.\\\\n\\\\nThe module classifies parameter names (e.g. user_id, account_id) and values\\\\n(sequential integers, UUIDs, structured codes) to compute a confidence score.\\\\nPath parameters following resource nouns (e.g. /users/123) receive additional weight.\\\\n\\\\nWhen JSON responses are present, the module also flags excessive data exposure by\\\\ndetecting sensitive field names (password_hash, ssn, is_admin, etc.).\\\\n\\\\n## Notes\\\\n- Informational finding: flags endpoints for further active testing (Layer 2+)\\\\n- Covers OWASP API1:2023 (BOLA) and API3:2023 (BOPLA) triage\\\\n- Does not send additional requests — purely passive analysis\\\\n- Deduplicates by host + normalized path pattern + parameter name + type\\\\n\\\\n## References\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa1-broken-object-level-authorization/\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/\\\\n- https://cwe.mitre.org/data/definitions/639.html\\",\\"short_description\\":\\"Detects parameters that may reference object identifiers (IDOR/BOLA triage)\\",\\"confirmation_criteria\\":\\"Indicated when a request parameter has a high-signal identifier name combined with a predictable value format, or when a JSON response exposes sensitive internal fields\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"crypto-weakness-detect\\",\\"name\\":\\"Cryptographic Weakness Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nDetects cryptographic weaknesses in HTTP responses and cookies, including PHP magic hashes,\\\\nweak hash algorithms near sensitive contexts, padding oracle indicators, and encrypted cookies\\\\nwithout integrity protection (MAC).\\\\n\\\\n## Notes\\\\n- Analyzes both request cookies and response headers/body\\\\n- Checks for MD5/SHA1 usage near password, token, or hash keywords\\\\n- Detects padding oracle error messages that may enable ciphertext manipulation\\\\n- Identifies encrypted cookie values that lack HMAC integrity verification\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/09-Testing_for_Weak_Cryptography/\\\\n- https://www.whitehatsec.com/blog/magic-hashes/\\",\\"short_description\\":\\"Detects weak cryptographic patterns in HTTP traffic\\",\\"confirmation_criteria\\":\\"Confirmed when response contains identifiable cryptographic weakness patterns such as magic hashes, weak hash usage, padding oracle errors, or unprotected encrypted cookies\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"error-message-detect\\",\\"name\\":\\"Error Message Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects error messages in HTTP responses that reveal server-side technology,\\\\ndebug information, or database error details. Covers debug pages, Apache, ASP.NET, Java,\\\\nPython, PHP, Ruby, Node.js, SQL database errors, and other common frameworks.\\\\n\\\\n## Notes\\\\n- Categorizes errors by technology (Debug, Apache, ASP, Java, Generic, SQL)\\\\n- Debug page patterns are reported at low severity with certain confidence\\\\n- SQL error patterns are reported at low severity with firm confidence\\\\n- Other error patterns are reported at info severity with firm confidence\\\\n\\\\n## References\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Error_Handling_Cheat_Sheet.html\\\\n- https://raw.githubusercontent.com/PortSwigger/error-message-checks/master/src/main/resources/burp/match-rules.tab\\\\n- https://github.com/1ndianl33t/Gf-Patterns\\",\\"short_description\\":\\"Detects interesting error messages in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when response body contains recognizable error messages or stack traces from known frameworks\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"base64-data-detect\\",\\"name\\":\\"Base64 Data Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects interesting base64 encoded data in HTTP requests and responses.\\\\nMatches known prefixes for JSON (eyJ), PHP serialized objects (YTo, Tzo),\\\\nXML/PHP (PD8/PD9), HTTPS/HTTP URLs (aHR0cHM6L, aHR0cDo), and Java serialized\\\\nobjects (rO0).\\\\n\\\\n## Notes\\\\n- Scans both request and response content\\\\n- Low noise: only flags known interesting base64 prefixes\\\\n- Manual review is recommended to assess the encoded data\\\\n\\\\n## References\\\\n- https://portswigger.net/kb/issues/00700200_base64-encoded-data-in-parameter\\\\n- https://cheatsheetseries.owasp.org/index.html\\\\n- https://github.com/tomnomnom/gf/blob/master/examples/base64.json\\",\\"short_description\\":\\"Identifies interesting base64 encoded data like JSON, PHP Object in requests/responses\\",\\"confirmation_criteria\\":\\"Confirmed when request or response contains base64-encoded data matching known interesting prefixes (JSON, PHP objects, URLs, Java objects)\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"password-autocomplete-detect\\",\\"name\\":\\"Password Autocomplete Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects password input fields in HTML responses that do not have autocomplete\\\\ndisabled, which may allow browsers to store sensitive credentials.\\\\n\\\\n## Notes\\\\n- Checks for autocomplete=\\\\\\"off\\\\\\" or autocomplete=\\\\\\"new-password\\\\\\" on password inputs\\\\n- Also checks enclosing form elements for autocomplete attributes\\\\n- Only fires on text/html responses\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/controls/PasswordAutocomplete\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects password fields without autocomplete disabled\\",\\"confirmation_criteria\\":\\"Confirmed when password input fields lack autocomplete='off' or autocomplete='new-password'\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cacheable-https-detect\\",\\"name\\":\\"Cacheable HTTPS Response Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects HTTPS responses containing sensitive content (Set-Cookie headers or\\\\npassword fields) that lack proper cache-control directives, allowing browsers or proxies\\\\nto cache sensitive data.\\\\n\\\\n## Notes\\\\n- Only fires on HTTPS URLs with sensitive response indicators\\\\n- Checks for Cache-Control: no-store, no-cache, or private\\\\n- Also checks Pragma: no-cache as legacy fallback\\\\n- Missing or permissive cache control on sensitive responses is flagged\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/04-Authentication_Testing/06-Testing_for_Browser_Cache_Weaknesses\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Cache-Control\\",\\"short_description\\":\\"Detects sensitive HTTPS responses without proper cache control\\",\\"confirmation_criteria\\":\\"Confirmed when sensitive HTTPS response lacks Cache-Control: no-store/no-cache/private directives\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"input-reflection-detect\\",\\"name\\":\\"Input Reflection Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects when request parameter values are reflected verbatim in the response body.\\\\nInput reflection is a prerequisite for many injection vulnerabilities including XSS.\\\\n\\\\n## Notes\\\\n- Only checks text/html responses\\\\n- Filters out short values (<4 chars), all-numeric values, and token-like values\\\\n- Reports reflected parameters as informational findings for further investigation\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/01-Testing_for_Reflected_Cross_Site_Scripting\\",\\"short_description\\":\\"Detects request parameter values reflected in responses\\",\\"confirmation_criteria\\":\\"Indicated when a request parameter value appears verbatim in the response body\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"graphql-introspection-detect\\",\\"name\\":\\"GraphQL Introspection Leak Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects GraphQL introspection responses that leak the full API schema,\\\\nincluding types, queries, mutations, and subscriptions.\\\\n\\\\n## Notes\\\\n- Checks JSON response bodies for introspection-specific fields (__schema, __type)\\\\n- Requires confirmation fields (queryType, mutationType, subscriptionType, types) to avoid false positives\\\\n- Runs per-request to catch endpoint-specific disclosures\\\\n\\\\n## References\\\\n- https://graphql.org/learn/introspection/\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/12-API_Testing/01-Testing_GraphQL\\",\\"short_description\\":\\"Detects GraphQL introspection responses that expose the full API schema\\",\\"confirmation_criteria\\":\\"Confirmed when response contains GraphQL introspection fields (__schema/__type) with schema definition markers\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"js-framework-fingerprint\\",\\"name\\":\\"JS Framework Fingerprint\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies the JavaScript framework powering a web application by analyzing\\\\nHTML response bodies and HTTP headers for framework-specific markers. Stores results\\\\nin a shared per-host cache used by other framework-specific modules.\\\\n\\\\n## Notes\\\\n- Passive only — does not send any HTTP requests\\\\n- Detects: Next.js (Pages/App Router), Nuxt.js, Angular, React CRA, Remix, SvelteKit, Gatsby\\\\n- Extracts Next.js buildId for use by active Next.js modules\\\\n- Deduplicates by host to avoid redundant processing\\\\n- Requires strong signals (script tags or headers) to avoid false positives\\\\n\\\\n## References\\\\n- https://nextjs.org/docs\\\\n- https://nuxt.com/docs\\\\n- https://angular.dev\\",\\"short_description\\":\\"Identifies JavaScript frameworks (Next.js, Nuxt, Angular, React, Remix, SvelteKit, Gatsby)\\",\\"confirmation_criteria\\":\\"Confirmed when framework-specific markers (script tags, headers, or asset URL patterns) are detected in the response\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"ssr-data-exposure\\",\\"name\\":\\"SSR Data Exposure\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans server-side rendered (SSR) state blobs embedded in HTML pages for sensitive data\\\\nexposure. Modern JS frameworks serialize application state into the HTML page for hydration,\\\\nwhich may inadvertently include API keys, tokens, admin flags, email addresses,\\\\npassword hashes, or internal URLs.\\\\n\\\\n## Notes\\\\n- Passive only — does not send any HTTP requests\\\\n- Extracts state from: __NEXT_DATA__, __NUXT__, __INITIAL_STATE__, __APOLLO_STATE__\\\\n- Scans extracted JSON for API keys, tokens, admin flags, emails, password hashes, internal IPs\\\\n- Minimum token length of 16 characters to reduce false positives\\\\n- Deduplicates by host+path\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/pages/building-your-application/data-fetching\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/09-Testing_for_Weak_Cryptography/04-Testing_for_Weak_Encryption\\",\\"short_description\\":\\"Detects sensitive data leaked in server-side rendered state blobs\\",\\"confirmation_criteria\\":\\"Confirmed when sensitive patterns (API keys, tokens, admin flags, credentials) are found in SSR state blobs\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cache-auth-misconfiguration\\",\\"name\\":\\"Cache-Auth Misconfiguration\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nDetects responses that are publicly cacheable (Cache-Control: public or s-maxage) but\\\\ncontain user-specific indicators (Set-Cookie, Authorization) without proper Vary headers.\\\\nThis can lead to one user's authenticated response being served from cache to another\\\\nuser, causing data leakage or session confusion.\\\\n\\\\n## Notes\\\\n- Passive only — does not send any HTTP requests\\\\n- Skips static assets (JS, CSS, images, fonts)\\\\n- Checks for Cache-Control: public or s-maxage without no-store/private\\\\n- Reports missing Vary: Cookie when Set-Cookie is present\\\\n- Reports missing Vary: Authorization when Authorization header was in request\\\\n- Deduplicates by host+path\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/web-cache-poisoning\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Vary\\",\\"short_description\\":\\"Detects cacheable responses with user-specific data missing Vary headers\\",\\"confirmation_criteria\\":\\"Confirmed when a cacheable response has user-specific headers but missing corresponding Vary header\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"server-action-auth\\",\\"name\\":\\"Server Action Auth Check\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans JavaScript and TypeScript response bodies for Next.js Server Actions that perform\\\\nstate-changing operations (database mutations, writes) without any authorization checks.\\\\nServer Actions marked with \\\\\\"use server\\\\\\" execute on the server and are directly callable\\\\nfrom the client. If they lack session validation or auth guards, any unauthenticated\\\\nuser can invoke them to modify data.\\\\n\\\\n## Notes\\\\n- Passive only - does not send any HTTP requests\\\\n- Detects \\\\\\"use server\\\\\\" directive combined with mutation patterns (create, update, delete, etc.)\\\\n- Flags when no authorization patterns are found (getSession, auth(), verifyToken, etc.)\\\\n- Deduplicates by host+path\\\\n- CWE-862: Missing Authorization\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/app/building-your-application/data-fetching/server-actions-and-mutations\\\\n- https://cwe.mitre.org/data/definitions/862.html\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/05-Authorization_Testing/02-Testing_for_Bypassing_Authorization_Schema\\",\\"short_description\\":\\"Detects Next.js Server Actions missing authorization checks\\",\\"confirmation_criteria\\":\\"Confirmed when a Server Action contains mutation operations but no authorization checks\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nextauth-config-audit\\",\\"name\\":\\"NextAuth.js Configuration Audit\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nInspects HTTP responses for NextAuth.js (Auth.js) session configuration issues.\\\\nChecks session cookies for missing security flags, decodes JWT session tokens to\\\\ndetect sensitive data exposure, and fingerprints NextAuth API endpoints for\\\\ninformation leakage.\\\\n\\\\n## Notes\\\\n- Detects NextAuth session cookies (next-auth.session-token, __Secure-next-auth.*)\\\\n- Checks cookie flags: Secure, HttpOnly, SameSite\\\\n- Decodes JWT payloads to detect sensitive claims (passwords, secrets, tokens)\\\\n- Fingerprints NextAuth endpoints via response patterns\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://next-auth.js.org/configuration/options\\\\n- https://next-auth.js.org/configuration/options#cookies\\\\n- https://authjs.dev/getting-started/session-management/protecting\\",\\"short_description\\":\\"Detects insecure NextAuth.js session and cookie configurations\\",\\"confirmation_criteria\\":\\"Confirmed when NextAuth session cookies have insecure flags or JWT tokens contain sensitive data\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nextjs-config-audit\\",\\"name\\":\\"Next.js Config Audit\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans response bodies for insecure Next.js configuration patterns that can introduce\\\\nsecurity vulnerabilities. Checks for dangerous SVG allowances (XSS risk), wildcard\\\\nimage domains (SSRF risk), HTTP protocol in image config (cleartext transport),\\\\nexposed production source maps (information disclosure), internal API exposure via\\\\nrewrites/redirects, and missing security headers configuration.\\\\n\\\\n## Notes\\\\n- Passive only - does not send any HTTP requests\\\\n- Detects: dangerouslyAllowSVG, wildcard image hostnames, HTTP protocol, production source maps\\\\n- Also checks for internal API route exposure and missing security headers config\\\\n- Each matched pattern emits a separate finding with matched snippet\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/app/api-reference/next-config-js\\\\n- https://cwe.mitre.org/data/definitions/79.html\\\\n- https://cwe.mitre.org/data/definitions/918.html\\\\n- https://cwe.mitre.org/data/definitions/540.html\\",\\"short_description\\":\\"Detects insecure Next.js configuration patterns\\",\\"confirmation_criteria\\":\\"Confirmed when insecure configuration patterns are found in Next.js config files\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nuxt-config-audit\\",\\"name\\":\\"Nuxt Config Audit\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans response bodies for insecure Nuxt.js configuration patterns and sensitive data leaked\\\\nthrough Nuxt state blobs. Detects exposed __NUXT__ and __NUXT_DATA__ state in HTML, checks\\\\nfor sensitive data patterns (API keys, tokens, internal URLs) within Nuxt state, and identifies\\\\ndangerous configuration options such as enabled devtools, exposed runtime secrets, production\\\\nsource maps, and debug mode.\\\\n\\\\n## Notes\\\\n- Passive only - does not send any HTTP requests\\\\n- Detects: __NUXT__ / __NUXT_DATA__ state blobs in HTML\\\\n- Scans Nuxt state for API keys, tokens, admin flags, internal IPs\\\\n- Checks config patterns: devtools, runtimeConfig secrets, productionSourceMap, debug\\\\n- Also detects /_nuxt/ source map exposure\\\\n- Deduplicates by host\\\\n\\\\n## References\\\\n- https://nuxt.com/docs/guide/directory-structure/nuxt-config\\\\n- https://nuxt.com/docs/api/nuxt-config#runtimeconfig\\\\n- https://cwe.mitre.org/data/definitions/540.html\\\\n- https://cwe.mitre.org/data/definitions/200.html\\",\\"short_description\\":\\"Detects insecure Nuxt configuration patterns and sensitive data in Nuxt state\\",\\"confirmation_criteria\\":\\"Confirmed when insecure configuration patterns or sensitive data are found in Nuxt state or config\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"javascript-uri-sink\\",\\"name\\":\\"JavaScript URI Sink Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nDetects javascript: protocol URIs in HTML attributes that act as XSS sinks.\\\\nWhen user-controlled data flows into href, src, or other URL-based attributes\\\\nwithout protocol validation, an attacker can inject javascript: URIs to achieve\\\\nscript execution on user interaction (e.g., clicking a link).\\\\n\\\\nThis is a distinct vector from general DOM XSS — React's default data binding\\\\ndoes not protect against javascript: URIs in href attributes.\\\\n\\\\n## Notes\\\\n- Scans HTML responses for javascript: URIs in href, src, action, formaction attributes\\\\n- Correlates with request parameters to identify reflection from user input\\\\n- Flags both direct javascript: URIs and obfuscated variants (url-encoded, mixed case)\\\\n- Deduplicates by host+path\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/xss/\\\\n- https://snyk.io/blog/10-react-security-best-practices/\\\\n- https://cwe.mitre.org/data/definitions/79.html\\",\\"short_description\\":\\"Detects javascript: URIs reflected in href/src attributes\\",\\"confirmation_criteria\\":\\"Confirmed when javascript: URI is found in a URL-based HTML attribute, especially when correlated with request input\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"ssr-hydration-xss\\",\\"name\\":\\"SSR Hydration XSS Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nDetects unsafe patterns in server-side rendered (SSR) pages where JSON data is\\\\nembedded in inline script tags for client-side hydration. If the serialized JSON\\\\nis not properly encoded, an attacker can inject a closing <\/script> tag followed\\\\nby arbitrary HTML/JavaScript, leading to XSS on page load.\\\\n\\\\nCommon vulnerable patterns include:\\\\n- __NEXT_DATA__ script tags with unescaped user content\\\\n- window.__PRELOADED_STATE__ assignments with raw JSON.stringify output\\\\n- Hydration scripts that embed user-controlled data without HTML escaping\\\\n\\\\n## Notes\\\\n- Scans HTML responses for inline script tags containing hydration data\\\\n- Detects unescaped <\/script> sequences within JSON hydration blocks\\\\n- Checks for missing HTML entity encoding of < characters in embedded JSON\\\\n- Correlates with request parameters to identify user-controlled data in hydration\\\\n- Deduplicates by host+path\\\\n\\\\n## References\\\\n- https://snyk.io/blog/10-react-security-best-practices/\\\\n- https://owasp.org/www-community/attacks/xss/\\\\n- https://cwe.mitre.org/data/definitions/79.html\\",\\"short_description\\":\\"Detects potential XSS in server-side rendered JSON hydration scripts\\",\\"confirmation_criteria\\":\\"Confirmed when user-controlled data appears unescaped in a JSON hydration script block\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"remix-loader-exposure\\",\\"name\\":\\"Remix Loader Exposure\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans HTML responses for Remix framework-specific patterns that may leak sensitive data.\\\\nDetects exposed Remix context (window.__remixContext), manifest (__remixManifest), Remix\\\\nresponse headers, and loader data embedded in script tags. Extracts Remix state data and\\\\nscans for sensitive patterns including API keys, tokens, admin flags, email addresses,\\\\npassword hashes, internal IPs, database URLs, and AWS keys.\\\\n\\\\n## Notes\\\\n- Passive only - does not send any HTTP requests\\\\n- Detects: window.__remixContext, __remixManifest, X-Remix-Response/X-Remix-Revalidate headers\\\\n- Extracts loader data from script tags and scans for sensitive patterns\\\\n- Minimum token length of 16 characters to reduce false positives\\\\n- Deduplicates by host+path\\\\n\\\\n## References\\\\n- https://remix.run/docs/en/main/route/loader\\\\n- https://remix.run/docs/en/main/guides/streaming\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/09-Testing_for_Weak_Cryptography/04-Testing_for_Weak_Encryption\\",\\"short_description\\":\\"Detects sensitive data leaked through Remix loader data and context\\",\\"confirmation_criteria\\":\\"Confirmed when sensitive data patterns are found in Remix loader data or context\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"client-auth-guard\\",\\"name\\":\\"Client Auth Guard Check\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans JavaScript and TypeScript response bodies for Next.js client components that\\\\nimplement authentication guards purely on the client side using useEffect redirects.\\\\nClient-side auth checks can be trivially bypassed by disabling JavaScript or\\\\nmanipulating the DOM, leaving protected routes accessible without authentication.\\\\n\\\\n## Notes\\\\n- Passive only - does not send any HTTP requests\\\\n- Detects \\\\\\"use client\\\\\\" directive combined with useEffect-based auth redirects\\\\n- Flags when no server-side auth indicators are found alongside client redirects\\\\n- Covers router.push/replace to login/signin/auth and window.location redirects\\\\n- Deduplicates by host+path\\\\n- CWE-862: Missing Authorization\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/app/building-your-application/authentication\\\\n- https://cwe.mitre.org/data/definitions/862.html\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/05-Authorization_Testing/02-Testing_for_Bypassing_Authorization_Schema\\",\\"short_description\\":\\"Detects client-only auth guards without server-side enforcement\\",\\"confirmation_criteria\\":\\"Confirmed when a client component implements auth redirect via useEffect without server-side auth\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cache-data-leak\\",\\"name\\":\\"Cache Data Leak\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans JavaScript and TypeScript response bodies for Next.js caching and static\\\\ngeneration patterns that may inadvertently leak authenticated or user-specific data.\\\\nStatic pages (getStaticProps, force-static) are generated at build time and served\\\\nto all users, so including session-dependent data causes cross-user data leakage.\\\\nSimilarly, unstable_cache without user-scoped keys or server fetches without\\\\ncache: \\\\\\"no-store\\\\\\" may serve stale authenticated responses to different users.\\\\n\\\\n## Notes\\\\n- Passive only - does not send any HTTP requests\\\\n- Detects: getStaticProps with auth, force-static with auth, unstable_cache without user key\\\\n- Also detects server component fetches with auth headers but without no-store/revalidate:0\\\\n- CWE-524: Use of Cache That Contains Sensitive Information\\\\n- Deduplicates by host+path\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/app/building-your-application/caching\\\\n- https://nextjs.org/docs/app/building-your-application/data-fetching\\\\n- https://cwe.mitre.org/data/definitions/524.html\\",\\"short_description\\":\\"Detects cache and static generation patterns that may leak user data\\",\\"confirmation_criteria\\":\\"Confirmed when static generation or caching patterns are used alongside authentication-scoped data fetching\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"server-action-input-audit\\",\\"name\\":\\"Server Action Input Audit\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans JavaScript and TypeScript response bodies for Next.js Server Actions that accept\\\\nuser input (FormData or function arguments) without runtime schema validation. Server\\\\nActions rely on TypeScript types for compile-time safety, but these types are erased at\\\\nruntime. Without runtime validation (zod, yup, joi, valibot, etc.), attackers can submit\\\\narbitrary data types, unexpected fields, or injection payloads.\\\\n\\\\n## Notes\\\\n- Passive only - does not send any HTTP requests\\\\n- Detects \\\\\\"use server\\\\\\" directive combined with FormData/argument usage\\\\n- Flags when no validation library patterns are found (z.parse, z.safeParse, schema.validate, etc.)\\\\n- Complements server_action_auth which checks for missing authorization\\\\n- Deduplicates by host+path\\\\n- CWE-20: Improper Input Validation\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/app/building-your-application/data-fetching/server-actions-and-mutations\\\\n- https://nextjs.org/blog/security-nextjs-server-components-actions\\\\n- https://cwe.mitre.org/data/definitions/20.html\\",\\"short_description\\":\\"Detects Next.js Server Actions missing runtime input validation\\",\\"confirmation_criteria\\":\\"Confirmed when a Server Action processes input without any runtime validation library\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"server-action-bind-audit\\",\\"name\\":\\"Server Action Bind Audit\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans JavaScript and TypeScript response bodies for Next.js Server Actions that use\\\\n.bind() to pass sensitive identifiers (IDs, slugs, resource references) as arguments.\\\\nBound arguments are not encrypted and can be tampered with by the client. If the action\\\\ndoes not re-authorize the resource on the server side, this creates an IDOR vulnerability\\\\nwhere users can modify other users' resources by changing the bound ID.\\\\n\\\\n## Notes\\\\n- Passive only - does not send any HTTP requests\\\\n- Detects .bind(null, <identifier>) patterns in server component code\\\\n- Flags when bound values look like resource identifiers (id, userId, postId, etc.)\\\\n- Cross-references with authorization check patterns inside the action body\\\\n- Deduplicates by host+path\\\\n- CWE-639: Authorization Bypass Through User-Controlled Key\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/app/building-your-application/data-fetching/server-actions-and-mutations#passing-additional-arguments\\\\n- https://nextjs.org/blog/security-nextjs-server-components-actions\\\\n- https://cwe.mitre.org/data/definitions/639.html\\",\\"short_description\\":\\"Detects Server Action .bind() with sensitive identifiers risking IDOR\\",\\"confirmation_criteria\\":\\"Confirmed when .bind() passes identifiers to a Server Action without re-authorization in the action body\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"server-only-boundary-audit\\",\\"name\\":\\"Server-Only Boundary Audit\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans client-side JavaScript bundles for evidence that server-only code has leaked\\\\ninto the browser. Server-side modules (database clients, internal API helpers, crypto\\\\noperations, environment secrets) should use the 'server-only' package to enforce the\\\\nboundary. When this guard is missing, Next.js may accidentally bundle server code into\\\\nthe client, exposing proprietary logic, internal endpoints, and potentially credentials.\\\\n\\\\n## Notes\\\\n- Passive only - does not send any HTTP requests\\\\n- Scans JS response bodies under /_next/static/ paths\\\\n- Detects server-side module identifiers in client bundles (prisma, drizzle, knex, etc.)\\\\n- Detects internal API endpoint patterns (localhost, 127.0.0.1, internal service URLs)\\\\n- Detects server crypto/auth module usage (bcrypt, jsonwebtoken, jose)\\\\n- Deduplicates by host+path\\\\n\\\\n## References\\\\n- https://nextjs.org/docs/app/building-your-application/rendering/composition-patterns#keeping-server-only-code-out-of-the-client-environment\\\\n- https://cwe.mitre.org/data/definitions/200.html\\\\n- https://cwe.mitre.org/data/definitions/540.html\\",\\"short_description\\":\\"Detects server-side modules leaked into client component bundles\\",\\"confirmation_criteria\\":\\"Confirmed when client-side JavaScript bundles contain server-only module identifiers or internal service references\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"tags\\":null,\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nextjs-dynamic-param-audit\\",\\"name\\":\\"Next.js Dynamic Param Audit\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nScans JavaScript and TypeScript response bodies for Next.js pages and route hand
