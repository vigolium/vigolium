abilities by injecting math expressions\\\\n(e.g., {{7*7}}) and checking if the computed result appears in the response.\\\\n\\\\n## Notes\\\\n- Tests multiple template engine syntaxes (Jinja2, Twig, Freemarker, etc.)\\\\n- Uses unique random values to avoid false positives from cached responses\\\\n- Confirmed by matching computed mathematical results in the response\\\\n\\\\n## References\\\\n- https://portswigger.net/research/server-side-template-injection\\",\\"short_description\\":\\"Detects SSTI via math expression evaluation\\",\\"confirmation_criteria\\":\\"Confirmed when injected math expressions (e.g., {{7*7}}=49) are evaluated and the computed result appears in the response\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"ssti-detection\\",\\"name\\":\\"SSTI Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Server-Side Template Injection via Boolean Error-Based Blind technique.\\\\nSends valid and invalid template expressions and compares response differences.\\\\n\\\\n## Notes\\\\n- Uses differential analysis: valid template syntax vs invalid syntax\\\\n- Detects template engines by error response patterns\\\\n- Complements the Reflected SSTI module with blind detection\\\\n\\\\n## References\\\\n- https://portswigger.net/research/server-side-template-injection\\",\\"short_description\\":\\"Diff-based SSTI detection via error responses\\",\\"confirmation_criteria\\":\\"Confirmed when valid template expressions produce different responses than syntactically invalid ones, indicating server-side evaluation\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"csti-detection\\",\\"name\\":\\"Client-Side Template Injection (CSTI)\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Client-Side Template Injection vulnerabilities by injecting template expressions\\\\n(e.g., {{7*7}}) and checking if the expression is reflected literally (not HTML-encoded)\\\\nin the response body within a client-side template framework scope.\\\\n\\\\n## Notes\\\\n- Different from server-side SSTI: checks for literal reflection, not evaluation\\\\n- Fingerprints AngularJS and Vue.js frameworks per-host (cached)\\\\n- Only scans hosts where a client-side template framework is detected\\\\n- Verifies the expression is not HTML-encoded (which would prevent exploitation)\\\\n- Uses double confirmation with random anchors to reduce false positives\\\\n\\\\n## References\\\\n- https://portswigger.net/research/xss-without-html-client-side-template-injection-with-angularjs\\\\n- https://portswigger.net/web-security/cross-site-scripting/contexts/client-side-template-injection\\",\\"short_description\\":\\"Detects client-side template injection in AngularJS/Vue.js applications\\",\\"confirmation_criteria\\":\\"Confirmed when injected template expressions (e.g., {{7*7}}) are reflected literally in the HTML response within a client-side framework scope\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"lfi-generic\\",\\"name\\":\\"LFI Generic\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Local File Inclusion vulnerabilities by injecting path traversal payloads\\\\nand checking for known file contents (e.g., /etc/passwd, win.ini) in responses.\\\\n\\\\n## Notes\\\\n- Tests each insertion point with multiple traversal depth levels\\\\n- Matches against known OS file content signatures\\\\n- Uses request deduplication to avoid redundant checks\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/11.1-Testing_for_Local_File_Inclusion\\",\\"short_description\\":\\"Detects LFI via path traversal payloads\\",\\"confirmation_criteria\\":\\"Confirmed when path traversal payloads cause known system file contents (e.g., /etc/passwd) to appear in the response\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"lfi-path-traversal\\",\\"name\\":\\"LFI Path Traversal\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Local File Inclusion vulnerabilities using advanced path traversal techniques\\\\nincluding null byte injection, double URL encoding, Unicode bypass characters, and\\\\nmulti-marker confirmation to reduce false positives.\\\\n\\\\n## Notes\\\\n- Complements lfi_generic with deeper traversal payloads and stronger confirmation\\\\n- Requires at least 2 markers to match in fuzzed response (not present in baseline)\\\\n- Body length delta check prevents matching on trivially similar responses\\\\n- Pre-filters insertion points by file-like parameter names and path-like values\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/11.1-Testing_for_Local_File_Inclusion\\\\n- https://github.com/swisskyrepo/PayloadsAllTheThings/tree/master/File%20Inclusion\\",\\"short_description\\":\\"Detects LFI via advanced path traversal, null bytes, encoding bypass, and multi-marker confirmation\\",\\"confirmation_criteria\\":\\"Confirmed when multiple file content markers appear in the response after injecting path traversal payloads and are absent from the baseline response\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sqli-error-based\\",\\"name\\":\\"SQLi Error Based\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects SQL injection vulnerabilities by injecting SQL syntax into parameters and\\\\nanalyzing response bodies for database error messages from MySQL, PostgreSQL, MSSQL,\\\\nOracle, and SQLite.\\\\n\\\\n## Notes\\\\n- Tests each insertion point independently\\\\n- Uses request deduplication to avoid redundant checks\\\\n- Skips hosts that have exceeded the error threshold\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/SQL_Injection\\",\\"short_description\\":\\"Detects SQLi via error messages\\",\\"confirmation_criteria\\":\\"Confirmed when injected SQL syntax triggers a database error pattern in the response body\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sqli-boolean-blind\\",\\"name\\":\\"Blind SQL Injection (Boolean-Based)\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for boolean-based blind SQL injection by sending paired TRUE/FALSE payloads and comparing\\\\nresponse differentials. Uses triple-verification to minimize false positives: TRUE and FALSE\\\\npayloads must produce consistently different responses across multiple requests.\\\\n\\\\n## Notes\\\\n- Sends TRUE and FALSE payload pairs to each injection point\\\\n- Compares responses using status code, body length differential, and content hash\\\\n- Triple-verification: confirms TRUE/FALSE differential is consistent across retries\\\\n- Tests string context, numeric context, and WAF bypass payloads\\\\n- Uses NoRedirects to capture TRUE/FALSE differential before redirect\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/Blind_SQL_Injection\\\\n- https://portswigger.net/web-security/sql-injection/blind\\",\\"short_description\\":\\"Detects boolean-based blind SQL injection vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when TRUE payloads consistently produce different responses from FALSE payloads across multiple verification requests\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nosqli-error-based\\",\\"name\\":\\"NoSQLi Error Based\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects NoSQL injection vulnerabilities by injecting MongoDB/NoSQL operators and\\\\nsyntax into parameters and analyzing response bodies for database error messages.\\\\n\\\\n## Notes\\\\n- Tests each insertion point with NoSQL-specific payloads\\\\n- Detects MongoDB, CouchDB, and Cassandra error patterns\\\\n- Uses request deduplication to avoid redundant checks\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/05.6-Testing_for_NoSQL_Injection\\\\n- https://portswigger.net/web-security/nosql-injection\\",\\"short_description\\":\\"Detects NoSQL injection via error messages and operator injection\\",\\"confirmation_criteria\\":\\"Confirmed when injected NoSQL operators trigger database error patterns in the response body\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nosqli-operator-injection\\",\\"name\\":\\"NoSQL Operator Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for NoSQL injection by injecting MongoDB query operators ($ne, $gt, $regex,\\\\n$where) and detecting authentication bypass, data exfiltration, and behavioral\\\\nchanges. Complements nosqli_error_based by focusing on operator-level injection\\\\nrather than error messages.\\\\n\\\\n## Notes\\\\n- Payload selection adapts to insertion point type (JSON, URL, body)\\\\n- Four detection modes: auth bypass, size increase, boolean differential, time delay\\\\n- Skips when NoSQL error patterns are detected (deferred to nosqli_error_based)\\\\n- Deduplicates by request hash manager\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/05.6-Testing_for_NoSQL_Injection\\\\n- https://github.com/swisskyrepo/PayloadsAllTheThings/tree/master/NoSQL%20Injection\\",\\"short_description\\":\\"Detects MongoDB operator injection ($ne, $gt, $regex, $where) for auth bypass and data exfiltration\\",\\"confirmation_criteria\\":\\"Confirmed when NoSQL operator injection causes authentication bypass, data exfiltration, or measurable behavioral change\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"crlf-injection\\",\\"name\\":\\"CRLF Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects CRLF injection vulnerabilities in HTTP headers by injecting carriage return and\\\\nline feed characters and checking if they appear in response headers.\\\\n\\\\n## Notes\\\\n- Tests URL parameters for header injection via CRLF sequences\\\\n- Can lead to HTTP response splitting and header injection attacks\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/vulnerabilities/CRLF_Injection\\",\\"short_description\\":\\"Detects CRLF injection\\",\\"confirmation_criteria\\":\\"Confirmed when injected CRLF sequences appear in HTTP response headers, indicating header injection\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"code-exec\\",\\"name\\":\\"Code Execution (RCE)\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects OS Command Injection vulnerabilities using time-based blind detection. Injects\\\\nsleep/delay commands and measures response time differences to confirm execution.\\\\n\\\\n## Notes\\\\n- Uses time-based blind technique to avoid false positives\\\\n- Tests multiple shell syntaxes (bash, cmd, PowerShell)\\\\n- Based on ActiveScan++ methodology\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/Command_Injection\\\\n- https://portswigger.net/bappstore/3123d5b5f25c4128894d97ea1571571c\\",\\"short_description\\":\\"Detects OS command injection via time-based blind. Source: ActiveScanPlusPlus\\",\\"confirmation_criteria\\":\\"Confirmed when injected sleep/delay commands cause measurable response time increase matching the specified delay\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"input-behavior-probe\\",\\"name\\":\\"Input Behavior Probe\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nComprehensive behavior probing module that detects anomalous responses by\\\\ncomparing HTML tag structure and status codes against a baseline. Operates\\\\nat both request scope and insertion-point scope.\\\\n\\\\n## Probe Types\\\\n1. **Header probing** (per-request): Injects values into known security-relevant\\\\n   headers (X-Forwarded-Host, X-Original-URL, etc.) and weird header names.\\\\n2. **Path manipulation** (per-request): Applies prefix/postfix path traversal\\\\n   and encoding tricks to each URL path segment.\\\\n3. **Debug parameter injection** (per-request): Appends debug/admin parameters\\\\n   (debug=true, admin=1, etc.) to detect hidden debug modes.\\\\n4. **Polyglot fuzz** (per-insertion-point): Injects a polyglot payload to detect\\\\n   HTML tag structure changes (original behavior).\\\\n5. **Param char fuzzing** (per-insertion-point): Appends special characters to\\\\n   parameter values to detect parser-level behavior differences.\\\\n\\\\n## Notes\\\\n- Compares HTML tag counts and status codes between baseline and probed responses\\\\n- Low confidence; useful as a triage signal for manual investigation\\\\n- Per-request probes are deduped by host+path; per-IP probes are deduped by request hash\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/Fuzzing\\\\n- https://portswigger.net/research/backslash-powered-scanning\\",\\"short_description\\":\\"Detects behavior changes from header, path, debug param, and char probing\\",\\"confirmation_criteria\\":\\"Indicated when probed requests cause structural changes in the response HTML tag tree or notable status code transitions compared to the baseline\\",\\"severity\\":\\"suspect\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\",\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"xxe-generic\\",\\"name\\":\\"XXE Generic\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects XML External Entity (XXE) injection vulnerabilities in endpoints that accept\\\\nXML input by injecting entity declarations and checking for entity expansion.\\\\n\\\\n## Notes\\\\n- Tests XML body parameters for entity expansion\\\\n- Injects external entity declarations targeting known files\\\\n- Checks for entity value reflection in response body\\\\n- Complements the XML SAML Security module for non-SAML XML endpoints\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/vulnerabilities/XML_External_Entity_(XXE)_Processing\\\\n- https://portswigger.net/web-security/xxe\\",\\"short_description\\":\\"Detects XML external entity injection in generic XML endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when injected XML entities are expanded and their values appear in the response body\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"insecure-deserialization\\",\\"name\\":\\"Insecure Deserialization\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects insecure deserialization vulnerabilities by injecting serialized object payloads\\\\nand analyzing responses for deserialization error messages across multiple frameworks.\\\\n\\\\n## Notes\\\\n- Tests for Java, PHP, Python, Ruby, and .NET deserialization patterns\\\\n- Uses error-based detection to identify deserialization endpoints\\\\n- Analyzes response bodies for framework-specific error messages\\\\n- OWASP Top 10 2021: A08\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/16-Testing_for_HTTP_Incoming_Requests\\\\n- https://portswigger.net/web-security/deserialization\\",\\"short_description\\":\\"Detects insecure deserialization via error-based detection\\",\\"confirmation_criteria\\":\\"Confirmed when injected serialized payloads trigger deserialization error messages in the response\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"ssrf-detection\\",\\"name\\":\\"SSRF Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Server-Side Request Forgery (SSRF) vulnerabilities by injecting internal and\\\\nexternal URLs into parameters and analyzing response differences and timing.\\\\n\\\\n## Notes\\\\n- Tests for in-band SSRF using internal IP addresses and cloud metadata endpoints\\\\n- Analyzes response differences between original and injected values\\\\n- Targets parameters with URL-like values\\\\n- OWASP Top 10 2021: A10\\\\n\\\\n## References\\\\n- https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/\\\\n- https://portswigger.net/web-security/ssrf\\",\\"short_description\\":\\"Detects server-side request forgery via out-of-band and in-band techniques\\",\\"confirmation_criteria\\":\\"Confirmed when injected internal URLs or metadata endpoints cause different response content or timing compared to baseline\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"oast-probe\\",\\"name\\":\\"OAST Probe\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nInjects OAST (Out-of-Band Application Security Testing) callback URLs into HTTP headers\\\\nand URL-like parameters to detect blind vulnerabilities such as blind SSRF, blind XXE,\\\\nand blind command injection.\\\\n\\\\n## Notes\\\\n- Requires an interactsh server (configured via oast settings)\\\\n- Injects unique callback URLs into headers: Referer, X-Forwarded-For, X-Forwarded-Host, Origin, X-Original-URL\\\\n- For insertion point scanning, targets parameters with URL-like values\\\\n- Findings arrive asynchronously via the polling callback — this module returns nil results directly\\\\n- DNS-only callbacks are reported as Info; HTTP callbacks are reported as High severity\\\\n- OWASP Top 10 2021: A10 (SSRF)\\\\n\\\\n## References\\\\n- https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/\\\\n- https://portswigger.net/burp/documentation/collaborator\\",\\"short_description\\":\\"Detects blind vulnerabilities via out-of-band callbacks (DNS/HTTP)\\",\\"confirmation_criteria\\":\\"Confirmed when target server makes outbound DNS or HTTP request to OAST callback URL\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\",\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"proxy-pingback\\",\\"name\\":\\"Proxy Pingback\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nProbes for open proxy and callback endpoints by injecting OAST callback URLs into common\\\\nproxy-related URL paths. This detects endpoints that forward or fetch user-supplied URLs\\\\n(open proxy / blind SSRF).\\\\n\\\\n## Notes\\\\n- Requires an interactsh server (configured via oast settings)\\\\n- Targets proxy-related paths: /proxy, /httpproxy, /callback, /url, /remote, etc.\\\\n- Appends OAST URLs via query parameters: url, src, proxy, callback, email, etc.\\\\n- Sends 54 probe requests per host covering path and parameter patterns\\\\n- Each host is tested only once (DiskSet dedup)\\\\n- Findings arrive asynchronously via the OAST polling callback\\\\n- OWASP Top 10 2021: A10 (SSRF)\\\\n\\\\n## References\\\\n- https://owasp.org/Top10/A10_2021-Server-Side_Request_Forgery_%28SSRF%29/\\\\n- https://portswigger.net/burp/documentation/collaborator\\",\\"short_description\\":\\"Detects open proxy/callback endpoints via OAST URL injection into proxy-related paths\\",\\"confirmation_criteria\\":\\"Confirmed when target server makes outbound DNS or HTTP request to OAST callback URL via proxy endpoint\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cors-misconfiguration\\",\\"name\\":\\"CORS Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects CORS (Cross-Origin Resource Sharing) misconfigurations that allow unauthorized\\\\ncross-origin access. Tests for reflected origins, null origin acceptance, wildcard with\\\\ncredentials, and subdomain bypass patterns.\\\\n\\\\n## Notes\\\\n- Runs once per host with internal deduplication\\\\n- Sends 4 probes with different Origin headers per host\\\\n- Low false-positive rate due to strict header matching\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/cors\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/11-Client-side_Testing/07-Testing_Cross_Origin_Resource_Sharing\\",\\"short_description\\":\\"Detects permissive CORS policies allowing unauthorized cross-origin access\\",\\"confirmation_criteria\\":\\"Confirmed when the server reflects a controlled Origin value in the Access-Control-Allow-Origin header, indicating permissive CORS policy\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"spring-actuator-misconfig\\",\\"name\\":\\"Spring Actuator Misconfiguration\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects exposed Spring Boot Actuator endpoints that leak sensitive application\\\\ninformation such as environment variables, health status, and configuration.\\\\n\\\\n## Notes\\\\n- Checks common actuator paths (/actuator, /env, /health, /info, /mappings, etc.)\\\\n- Runs per-request to detect misconfigured access controls\\\\n- Exposed actuators can leak secrets, internal URLs, and database credentials\\\\n\\\\n## References\\\\n- https://docs.spring.io/spring-boot/reference/actuator/endpoints.html\\\\n- https://www.veracode.com/blog/research/exploiting-spring-boot-actuators\\",\\"short_description\\":\\"Detects exposed Spring Boot actuator endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when actuator endpoints return valid JSON responses containing application configuration or health data\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"host-header-injection\\",\\"name\\":\\"Host Header Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects host header injection vulnerabilities by manipulating the Host header and\\\\nrelated headers (X-Forwarded-Host, X-Host) to identify routing or content changes.\\\\n\\\\n## Notes\\\\n- Tests host header manipulation with evil domain values\\\\n- Checks for host value reflection in response body and headers\\\\n- Runs per-request to test each endpoint\\\\n- Can lead to password reset poisoning, cache poisoning, and SSRF\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/host-header\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/17-Testing_for_Host_Header_Injection\\",\\"short_description\\":\\"Detects host header injection and routing manipulation\\",\\"confirmation_criteria\\":\\"Confirmed when manipulated Host header value is reflected in response body, Location header, or other response headers\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"web-cache-poisoning\\",\\"name\\":\\"Web Cache Poisoning\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects web cache poisoning vulnerabilities by injecting values via unkeyed headers\\\\n(X-Forwarded-Host, X-Forwarded-Scheme, X-Original-URL) and checking for reflection.\\\\n\\\\n## Notes\\\\n- Tests unkeyed headers that may influence cached responses\\\\n- Checks for header value reflection in response body\\\\n- Analyzes cache-related headers (Age, X-Cache, Cache-Control)\\\\n- Runs per-request to test endpoint-specific caching behavior\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/web-cache-poisoning\\\\n- https://portswigger.net/research/practical-web-cache-poisoning\\",\\"short_description\\":\\"Detects web cache poisoning via unkeyed header injection\\",\\"confirmation_criteria\\":\\"Confirmed when unkeyed header values are reflected in the response body, indicating cache-poisoning potential\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"prototype-pollution\\",\\"name\\":\\"Prototype Pollution\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects server-side prototype pollution vulnerabilities by injecting __proto__ and\\\\nconstructor.prototype properties in JSON parameters and analyzing response changes.\\\\n\\\\n## Notes\\\\n- Tests JSON body parameters for prototype pollution vectors\\\\n- Injects __proto__, constructor.prototype, and __proto__[status] payloads\\\\n- Analyzes response status code and body changes after pollution\\\\n- Targets Node.js/Express applications\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/prototype-pollution\\\\n- https://portswigger.net/research/server-side-prototype-pollution\\",\\"short_description\\":\\"Detects server-side prototype pollution via JSON injection\\",\\"confirmation_criteria\\":\\"Confirmed when __proto__ or constructor.prototype injection causes observable changes in response status, headers, or body\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"client-prototype-pollution\\",\\"name\\":\\"Client-Side Prototype Pollution\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects client-side prototype pollution vulnerabilities by analyzing JavaScript code\\\\non the page for known vulnerable URL parameter parsing patterns (sources) and\\\\nexploitable property access patterns (gadgets).\\\\n\\\\n## Notes\\\\n- Different from server-side prototype pollution: targets browser-side JavaScript, not JSON bodies\\\\n- Analyzes inline scripts and fetches external JS files (skipping CDN libraries)\\\\n- Detects source patterns (jQuery.extend, lodash.merge, custom parsers)\\\\n- Detects gadget patterns (innerHTML, eval, script.src assignments)\\\\n- Sends probe requests to verify URL parameter acceptance\\\\n- Host-level deduplication (scans once per host)\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/prototype-pollution\\\\n- https://portswigger.net/web-security/prototype-pollution/client-side\\\\n- https://portswigger.net/research/widespread-prototype-pollution-gadgets\\",\\"short_description\\":\\"Detects client-side prototype pollution via JavaScript static analysis\\",\\"confirmation_criteria\\":\\"Confirmed when JavaScript static analysis identifies known prototype pollution source patterns in the page's scripts\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"path-normalization\\",\\"name\\":\\"Path Normalization\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for path normalization vulnerabilities by iteratively applying traversal payloads\\\\n(with conditional auto-slashing) and checking response status codes and fingerprints\\\\nagainst expected internal/public patterns.\\\\n\\\\n## Notes\\\\n- Compares response fingerprints between public and internal path variations\\\\n- Uses iterative payload application with auto-slashing heuristics\\\\n- Targets middleware and reverse proxy path normalization inconsistencies\\\\n\\\\n## References\\\\n- https://i.blackhat.com/us-18/Wed-August-8/us-18-Orange-Tsai-Breaking-Parser-Logic-Take-Your-Path-Normalization-Off-And-Pop-0days-Out-2.pdf\\",\\"short_description\\":\\"Detects path normalization vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when traversal payloads produce response fingerprints matching internal resources that differ from public access patterns\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nginx-off-by-slash\\",\\"name\\":\\"Nginx Off-by-Slash\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests for Nginx \\\\\\"off-by-slash\\\\\\" alias traversal misconfiguration. When an Nginx location block\\\\nuses an alias directive without a matching trailing slash, attackers can traverse outside the\\\\nintended directory. For example, \\\\\\"location /static { alias /var/www/assets/; }\\\\\\" allows\\\\nrequesting \\\\\\"/static../etc/passwd\\\\\\" to read files outside /var/www/assets/.\\\\n\\\\n## Notes\\\\n- Operates on path segments, testing each first-level directory for alias traversal\\\\n- Compares response body against baseline to confirm the traversal resolved to the same content\\\\n- Skips media/JS URLs, non-GET requests, and very small baseline responses\\\\n\\\\n## References\\\\n- https://i.blackhat.com/us-18/Wed-August-8/us-18-Orange-Tsai-Breaking-Parser-Logic-Take-Your-Path-Normalization-Off-And-Pop-0days-Out-2.pdf\\\\n- https://github.com/bayotop/off-by-slash\\\\n- https://github.com/yandex/gixy\\\\n- https://github.com/hakaioffsec/nginx-alias-traversal\\",\\"short_description\\":\\"Detects Nginx alias traversal via missing trailing slash\\",\\"confirmation_criteria\\":\\"Confirmed when a path-traversal request using the off-by-slash pattern returns status 200 with a body matching a known valid suffix endpoint\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"nginx-path-escape\\",\\"name\\":\\"Nginx Path Escape Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects Nginx path escape vulnerabilities through differential response analysis,\\\\ntesting alias traversal, URL encoding bypass, and semicolon injection techniques.\\\\n\\\\n## Notes\\\\n- Uses response fingerprint comparison between baseline and test requests\\\\n- Tests per-request with multiple escape techniques\\\\n- Targets Nginx-specific path handling behaviors\\\\n\\\\n## References\\\\n- https://www.acunetix.com/vulnerabilities/web/path-traversal-via-misconfigured-nginx-alias/\\",\\"short_description\\":\\"Diff-based Nginx path escape detection (alias traversal, encoding bypass, semicolon injection)\\",\\"confirmation_criteria\\":\\"Confirmed when path escape payloads produce different response content or status compared to the baseline, indicating path traversal\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"smart-behavior-detection\\",\\"name\\":\\"Smart Behavior Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects injection vulnerabilities through differential response analysis. Sends pairs\\\\nof semantically equivalent and different payloads and compares response behaviors.\\\\n\\\\n## Notes\\\\n- Uses behavioral diffing: true/false payload pairs that should produce identical vs different responses\\\\n- Low confidence; serves as a triage signal for deeper investigation\\\\n- Based on ActiveScan++ differential analysis\\\\n\\\\n## References\\\\n- https://portswigger.net/bappstore/3123d5b5f25c4128894d97ea1571571c\\",\\"short_description\\":\\"Diff-based injection detection via behavioral analysis\\",\\"confirmation_criteria\\":\\"Indicated when semantically different payloads produce measurably different response behaviors while equivalent payloads produce identical responses\\",\\"severity\\":\\"suspect\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"suspect-transform\\",\\"name\\":\\"Suspect Transform Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects suspicious input transformations that may indicate vulnerabilities, including\\\\nexpression evaluation, quote consumption, and unicode normalization issues.\\\\n\\\\n## Notes\\\\n- Tests for server-side expression evaluation (math, string operations)\\\\n- Detects quote consumption that may indicate injection contexts\\\\n- Identifies unicode normalization that could bypass security filters\\\\n\\\\n## References\\\\n- https://portswigger.net/bappstore/3123d5b5f25c4128894d97ea1571571c\\",\\"short_description\\":\\"Detects expression evaluation, quote consumption, unicode transformations\\",\\"confirmation_criteria\\":\\"Indicated when injected expressions are evaluated, quotes are consumed, or unicode characters are normalized by the server\\",\\"severity\\":\\"suspect\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"backslash-transformation\\",\\"name\\":\\"Backslash Transformation Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects how servers handle backslash-escaped characters and special characters by injecting\\\\nescape sequences and analyzing transformations in the response.\\\\n\\\\n## Notes\\\\n- Tests each insertion point for backslash consumption, escape interpretation, and unicode handling\\\\n- Useful as a precursor signal for deeper injection testing\\\\n\\\\n## References\\\\n- https://portswigger.net/research/backslash-powered-scanning\\",\\"short_description\\":\\"Detects escape sequence interpretation, backslash consumption, character handling\\",\\"confirmation_criteria\\":\\"Confirmed when injected backslash sequences are transformed differently than literal characters in the response\\",\\"severity\\":\\"suspect\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"race-interference\\",\\"name\\":\\"Race Interference Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects race condition vulnerabilities through parallel request analysis, looking for\\\\ninput storage races, cross-request contamination, and request interference patterns.\\\\n\\\\n## Notes\\\\n- Sends concurrent requests with different payloads and analyzes response variations\\\\n- Tests for TOCTOU and state mutation races\\\\n- Requires careful timing analysis\\\\n\\\\n## References\\\\n- https://portswigger.net/research/smashing-the-state-machine\\",\\"short_description\\":\\"Detects input storage, cross-contamination, and request interference races\\",\\"confirmation_criteria\\":\\"Confirmed when parallel requests with different payloads produce cross-contaminated responses, indicating shared mutable state\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"xml-saml-security\\",\\"name\\":\\"XML SAML Security\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects unsafe XML transformation in SAML processing, including XXE (XML External Entity)\\\\nand DTD (Document Type Definition) injection vulnerabilities.\\\\n\\\\n## Notes\\\\n- Tests XML parameters for entity expansion and external entity loading\\\\n- Based on ActiveScan++ XMLScan.java methodology\\\\n- Targets SAML-specific XML processing endpoints\\\\n\\\\n## References\\\\n- https://portswigger.net/research/saml-roulette-the-hacker-always-wins\\\\n- https://owasp.org/www-community/vulnerabilities/XML_External_Entity_(XXE)_Processing\\",\\"short_description\\":\\"SAML XML security checks (XXE/DTD)\\",\\"confirmation_criteria\\":\\"Confirmed when injected XML entities are processed and expanded, or DTD declarations are loaded by the server\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"jwt-vulnerability\\",\\"name\\":\\"JWT Vulnerability\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects JWT vulnerabilities including algorithm confusion (none algorithm), weak\\\\nsigning keys, and missing signature verification by manipulating JWT tokens.\\\\n\\\\n## Notes\\\\n- Tests for 'none' algorithm acceptance (CVE-2015-9235)\\\\n- Tests for empty signature acceptance\\\\n- Tests for algorithm confusion (RS256 to HS256)\\\\n- Analyzes Authorization headers and cookies for JWT tokens\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/jwt\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/10-Testing_JSON_Web_Tokens\\",\\"short_description\\":\\"Detects JWT algorithm confusion and weak signing vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when JWT tokens with 'none' algorithm or empty signature are accepted by the server with a successful response\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"http-request-smuggling\\",\\"name\\":\\"HTTP Request Smuggling\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects HTTP request smuggling vulnerabilities by sending ambiguous requests with\\\\nconflicting Content-Length and Transfer-Encoding headers to identify desync behavior.\\\\n\\\\n## Notes\\\\n- Tests CL.TE and TE.CL desync patterns\\\\n- Uses differential timing analysis to detect smuggling\\\\n- Runs once per host to avoid disruption\\\\n- Requires careful timeout configuration\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/request-smuggling\\\\n- https://portswigger.net/research/http-desync-attacks\\",\\"short_description\\":\\"Detects HTTP request smuggling via CL.TE and TE.CL desync\\",\\"confirmation_criteria\\":\\"Confirmed when conflicting CL/TE headers cause measurable response timing differences indicating request desync\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"graphql-scan\\",\\"name\\":\\"GraphQL Security Scanner\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDiscovers GraphQL endpoints and tests them for common security misconfigurations including\\\\nenabled introspection, SQL injection through GraphQL arguments, and query batching abuse.\\\\n\\\\n## Notes\\\\n- Probes 8 common GraphQL endpoint paths\\\\n- Tests both POST and GET request methods for endpoint discovery\\\\n- Checks for enabled introspection (information disclosure)\\\\n- Injects SQL payloads into discovered or common field arguments\\\\n- Tests for query batching support (rate limiting bypass)\\\\n- Runs once per host\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/12-API_Testing/01-Testing_GraphQL\\\\n- https://graphql.org/learn/introspection/\\",\\"short_description\\":\\"Tests GraphQL endpoints for introspection, injection, and batching vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when GraphQL endpoint responds to introspection queries, SQL payloads produce database errors, or batch queries execute successfully\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"file-upload-scan\\",\\"name\\":\\"File Upload Scanner\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests file upload endpoints for unrestricted file upload vulnerabilities by attempting\\\\nto upload files with various bypass techniques. If upload succeeds, attempts to verify\\\\nexecution of the uploaded file.\\\\n\\\\n## Notes\\\\n- Only triggers on multipart/form-data requests with a filename parameter\\\\n- Tests 7 probe types: direct extension, double extension, null byte, case variation, magic bytes, SVG XXE, and HTML XSS\\\\n- Each probe uses a unique marker for verification\\\\n- Reconstructs multipart body preserving non-file fields (CSRF tokens, hidden fields)\\\\n- Early abort if first probe returns 400/403/415 (strict validation)\\\\n- Attempts to verify upload by fetching common upload directories\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/vulnerabilities/Unrestricted_File_Upload\\\\n- https://portswigger.net/web-security/file-upload\\",\\"short_description\\":\\"Tests for arbitrary file upload and execution vulnerabilities\\",\\"confirmation_criteria\\":\\"Confirmed when an uploaded file is accessible and contains the unique scan marker, indicating arbitrary file upload and potential code execution\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"default-credentials\\",\\"name\\":\\"Default Credentials\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects login endpoints from observed traffic and tests them with common default credential\\\\npairs. Uses intelligent login form detection, CAPTCHA awareness, and lockout protection.\\\\n\\\\n## Notes\\\\n- Only tests POST requests with form-encoded or JSON bodies\\\\n- Detects login endpoints by matching parameter names and URL paths\\\\n- Sends baseline invalid credentials first to establish failure response\\\\n- Stops on first successful login or lockout detection\\\\n- 500ms delay between credential attempts to avoid rate limiting\\\\n- Preserves CSRF tokens and hidden form fields during testing\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/04-Authentication_Testing/02-Testing_for_Default_Credentials\\",\\"short_description\\":\\"Tests for default or common credential pairs on login endpoints\\",\\"confirmation_criteria\\":\\"Confirmed when a known credential pair produces a response significantly different from the invalid-credential baseline, indicating successful authentication\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"forbidden-bypass\\",\\"name\\":\\"403/401 Forbidden Bypass\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests various techniques to bypass 403 Forbidden and 401 Unauthorized responses, including path manipulation,\\\\nheader injection, HTTP method tampering, method override headers, and URL encoding tricks.\\\\n\\\\n## Notes\\\\n- Only activates when the original response returns 401 or 403 status\\\\n- Tests multiple bypass vectors: path traversal, special headers, HTTP method changes, method override headers\\\\n\\\\n## References\\\\n- https://book.hacktricks.wiki/en/network-services-pentesting/pentesting-web/403-and-401-bypasses.html\\",\\"short_description\\":\\"Detects bypass methods for 403/401 Forbidden responses\\",\\"confirmation_criteria\\":\\"Confirmed when a bypass technique produces a non-403 response with valid content for a previously forbidden resource\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"http-method-tampering\\",\\"name\\":\\"HTTP Method Tampering\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests if dangerous HTTP methods (PUT, DELETE, PATCH) are unexpectedly enabled on endpoints,\\\\nand whether method override headers (X-HTTP-Method-Override, X-HTTP-Method, X-Method-Override)\\\\nallow changing server behavior.\\\\n\\\\n## Notes\\\\n- On 2xx endpoints: tests if PUT/DELETE/PATCH return 2xx with meaningful body\\\\n- Tests method override headers via POST with override header set to DELETE/PUT\\\\n- Complementary to forbidden_bypass which focuses on 401/403 endpoints\\\\n- Rate-limited per host to avoid excessive probing\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/06-Test_HTTP_Methods\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/REST_Security_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects unexpectedly enabled HTTP methods and method override headers\\",\\"confirmation_criteria\\":\\"Confirmed when dangerous HTTP methods return successful responses or method override headers alter server behavior\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"csrf-verify\\",\\"name\\":\\"CSRF Token Verification\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nFor requests that contain a CSRF token, this module verifies whether the server\\\\nactually enforces it. It removes, empties, or randomizes the token value and\\\\nchecks if the server still accepts the request.\\\\n\\\\n## Notes\\\\n- Only targets requests that already have a CSRF token parameter\\\\n- Three probe strategies: token removed, token emptied, token randomized\\\\n- Stops probing early if the server returns 4xx/5xx (properly validated)\\\\n- Deduplicates by method + host + path\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/csrf\\\\n- https://portswigger.net/web-security/csrf/bypassing-token-validation\\",\\"short_description\\":\\"Verifies CSRF token enforcement by removing, emptying, or randomizing tokens\\",\\"confirmation_criteria\\":\\"Confirmed when the server accepts a request with a removed, emptied, or randomized CSRF token\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"idor-detection\\",\\"name\\":\\"IDOR Detection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nActively tests for Insecure Direct Object Reference (IDOR) and Broken Object Level\\\\nAuthorization (BOLA) vulnerabilities by substituting ID parameters with neighbor values\\\\nand comparing responses.\\\\n\\\\nThe module targets parameters classified as object identifiers by the passive IDOR module\\\\n(sequential integers, structured codes, base64-encoded IDs, UUIDv1, emails). For each\\\\ncandidate, it generates predictable neighbor IDs and sends probe requests to detect\\\\nwhether the server enforces authorization.\\\\n\\\\n## Detection Logic\\\\n1. Classify parameter via authzutil.ClassifyParam — skip if not an object ID or low predictability\\\\n2. Generate neighbor IDs (e.g., user_id=42 → 41, 43) via authzutil.GenerateNeighborIDs\\\\n3. Fetch baseline response for the original request\\\\n4. Send probe requests with neighbor IDs and compare responses:\\\\n   - 401/403/404 or login redirect → authorization enforced (skip)\\\\n   - Soft-denial body strings → authorization enforced (skip)\\\\n   - Content identical → public data, not IDOR (skip)\\\\n   - Structurally different → different resource type (skip)\\\\n   - Structurally similar + different content → potential IDOR finding\\\\n\\\\n## Notes\\\\n- Covers OWASP API1:2023 (Broken Object Level Authorization)\\\\n- Limited to 50 probes per host to avoid excessive traffic\\\\n- Only tests parameters with predictable ID formats (skips UUIDv4, random hex)\\\\n- Confidence promoted to Firm when user-specific fields differ between responses\\\\n\\\\n## References\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa1-broken-object-level-authorization/\\\\n- https://cwe.mitre.org/data/definitions/639.html\\\\n- https://portswigger.net/web-security/access-control/idor\\",\\"short_description\\":\\"Detects missing authorization on object ID parameters (IDOR/BOLA)\\",\\"confirmation_criteria\\":\\"Indicated when a probe request with a neighbor object ID returns a structurally similar response with different content, suggesting missing authorization enforcement\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_INSERTION_POINT\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"mass-assignment\\",\\"name\\":\\"Mass Assignment\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nTests JSON API endpoints for mass assignment vulnerabilities by injecting privilege-related\\\\nkeys (role, admin, is_admin, permissions, etc.) into POST/PUT/PATCH JSON request bodies\\\\nand observing server responses.\\\\n\\\\n## Notes\\\\n- Only activates on POST/PUT/PATCH requests with application/json content type\\\\n- Injects one privilege key at a time to isolate findings\\\\n- Reports firm confidence if server echoes back the injected key in response\\\\n- Reports tentative confidence if server accepts the request without error\\\\n- Skips keys already present in the original request body\\\\n\\\\n## References\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Mass_Assignment_Cheat_Sheet.html\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/\\",\\"short_description\\":\\"Detects mass assignment / parameter pollution in JSON APIs\\",\\"confirmation_criteria\\":\\"Confirmed when injected privilege keys are echoed back in server response or accepted without validation error\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sensitive-file-discovery\\",\\"name\\":\\"Sensitive File Discovery\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDiscovers sensitive files and endpoints exposed on the web server using two\\\\nvalidation strategies. High-confidence probes (~25 paths) use content markers\\\\nto confirm findings. Bulk probes (~1,350 paths covering dot files, extensionless\\\\nfiles, and log files) use Content-Type and body differencing against a 404\\\\nfingerprint.\\\\n\\\\n## Notes\\\\n- Runs once per unique host\\\\n- Marker-based probes: ~25 paths with content marker validation (firm confidence)\\\\n- Generic probes: ~1,350 paths with Content-Type and body differencing (tentative confidence)\\\\n- Generic probes are skipped if the 404 page returns text/plain or octet-stream\\\\n- Fingerprints 404 responses to avoid false positives from custom error pages\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/02-Configuration_and_Deployment_Management_Testing/04-Review_Old_Backup_and_Unreferenced_Files_for_Sensitive_Information\\",\\"short_description\\":\\"Probes for exposed sensitive files (.env, .git/config, dot files, log files, and more)\\",\\"confirmation_criteria\\":\\"Marker-based: confirmed when response contains expected content markers. Generic: confirmed when response has text/plain or octet-stream Content-Type and body differs from 404 fingerprint\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"jsonp-callback\\",\\"name\\":\\"JSONP Callback Injection\\",\\"type\\":\\"active\\",\\"description\\":\\"## Description\\\\nDetects JSONP (JSON with Padding) endpoints that wrap responses in callback\\\\nfunctions, enabling cross-origin data theft. First checks for existing JSONP\\\\npatterns in responses, then actively injects callback parameters.\\\\n\\\\n## Notes\\\\n- Two-phase detection: passive check for existing JSONP, then active callback injection\\\\n- Severity upgraded from Medium to High if response contains sensitive data\\\\n- Tests multiple common callback parameter names\\\\n- Deduplicates by host + path\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/Cross_Site_Script_Inclusion\\\\n- https://www.benhayak.com/2015/06/same-origin-method-execution-some.html\\",\\"short_description\\":\\"Detects JSONP endpoints that allow cross-origin data theft via callback injection\\",\\"confirmation_criteria\\":\\"Confirmed when injecting a callback parameter causes the response to be wrapped in the specified function call\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"dom-xss-detect\\",\\"name\\":\\"DOM XSS Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects potential DOM-based XSS patterns by analyzing JavaScript code in\\\\nresponses for dangerous source-to-sink data flows.\\\\n\\\\n## Notes\\\\n- Scans response bodies for known DOM XSS source patterns (location.hash, document.referrer, etc.)\\\\n- Identifies dangerous sink patterns (innerHTML, eval, document.write, etc.)\\\\n- Pattern-based detection; manual verification recommended\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/DOM_Based_XSS\\",\\"short_description\\":\\"Detects potential DOM-based XSS patterns in responses\\",\\"confirmation_criteria\\":\\"Indicated when response JavaScript contains known source-to-sink patterns that could enable DOM-based XSS\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"auth-headers-detect\\",\\"name\\":\\"Auth Headers Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects authorization and authentication headers in HTTP requests,\\\\nflagging endpoints that handle sensitive credentials.\\\\n\\\\n## Notes\\\\n- Scans request headers for Authorization, Cookie, X-API-Key, and similar patterns\\\\n- Helps identify authentication boundaries in the application\\\\n\\\\n## References\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Authorization\\",\\"short_description\\":\\"Detects authorization headers in requests\\",\\"confirmation_criteria\\":\\"Confirmed when request contains recognized authentication headers (Authorization, Bearer tokens, API keys)\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"openredirect-params\\",\\"name\\":\\"Open Redirect Params\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects URL parameters with names commonly associated with open redirect\\\\nvulnerabilities (redirect, url, next, return, goto, etc.).\\\\n\\\\n## Notes\\\\n- Pattern-based detection on parameter names only; does not test for actual redirects\\\\n- Low confidence; serves as a triage signal for the active open redirect module\\\\n\\\\n## References\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects URL parameters commonly used for open redirects\\",\\"confirmation_criteria\\":\\"Indicated when URL contains parameters with redirect-associated names (redirect, url, next, return, goto)\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"oauth-facebook-detect\\",\\"name\\":\\"Facebook OAuth Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects Facebook OAuth redirect parameters in requests, flagging potential\\\\nOAuth misconfiguration or open redirect vectors in the authentication flow.\\\\n\\\\n## Notes\\\\n- Scans URL parameters for Facebook OAuth redirect_uri and related parameters\\\\n- Helps identify OAuth flows that may be vulnerable to redirect manipulation\\\\n\\\\n## References\\\\n- https://developers.facebook.com/docs/facebook-login/security/\\",\\"short_description\\":\\"Detects Facebook OAuth redirect parameters for security analysis\\",\\"confirmation_criteria\\":\\"Confirmed when request URL contains Facebook OAuth parameters (client_id, redirect_uri) matching known OAuth flow patterns\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"anomaly-ranking\\",\\"name\\":\\"Anomaly Ranking\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nRanks HTTP responses by statistical anomaly to identify interesting endpoints. Buffers\\\\nresponses per host and applies statistical ranking when thresholds are reached.\\\\n\\\\n## Notes\\\\n- Buffers per-host response attributes and flushes at configurable thresholds\\\\n- Uses statistical analysis to identify outlier responses worth investigating\\\\n- Updates risk_score on database records for prioritization\\\\n\\\\n## References\\\\n- https://en.wikipedia.org/wiki/Anomaly_detection\\",\\"short_description\\":\\"Statistical anomaly detection across per-host response batches\\",\\"confirmation_criteria\\":\\"Indicated when a response's statistical attributes (size, status, headers) deviate significantly from the per-host baseline\\",\\"severity\\":\\"suspect\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"secret-detect\\",\\"name\\":\\"Secret Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively scans HTTP response bodies for leaked secrets, credentials, API keys,\\\\nand connection strings using the Kingfisher secret detection engine.\\\\n\\\\n## Notes\\\\n- Scans response bodies only (no additional HTTP requests sent)\\\\n- Skips binary/media content types\\\\n- Uses lazy-initialized singleton Kingfisher scanner\\\\n- Generates one finding per detected secret\\\\n\\\\n## References\\\\n- https://github.com/mongodb/kingfisher\\",\\"short_description\\":\\"Detects leaked secrets and credentials in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when Kingfisher detects a known secret pattern in the HTTP response body\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sourcemap-detect\\",\\"name\\":\\"Sourcemap Exposure Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects exposed JavaScript sourcemaps by identifying SourceMappingURL\\\\nreferences in JS/CSS responses and validating accessible .map files.\\\\n\\\\n## Notes\\\\n- Detects sourceMappingURL comments in JavaScript and CSS responses\\\\n- Validates .map file responses by parsing sourcemap JSON structure\\\\n- Exposed sourcemaps reveal original source code, file paths, and potentially secrets\\\\n\\\\n## References\\\\n- https://developer.chrome.com/docs/devtools/javascript/source-maps\\\\n- https://owasp.org/www-project-web-security-testing-guide/\\",\\"short_description\\":\\"Detects exposed JavaScript sourcemaps in production responses\\",\\"confirmation_criteria\\":\\"Confirmed when response contains a sourceMappingURL reference or a valid sourcemap JSON structure is detected\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"security-headers-missing\\",\\"name\\":\\"Security Headers Missing\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects missing HTTP security headers that protect against common web\\\\nattacks including XSS, clickjacking, MIME sniffing, and protocol downgrade.\\\\n\\\\n## Notes\\\\n- Checks for X-Content-Type-Options, X-Frame-Options, Strict-Transport-Security, Content-Security-Policy, and Permissions-Policy\\\\n- Runs per-host to avoid duplicate findings\\\\n- Only flags HTML responses to reduce noise\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-secure-headers/\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/HTTP_Headers_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects missing HTTP security headers in responses\\",\\"confirmation_criteria\\":\\"Confirmed when HTTP response lacks one or more recommended security headers\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_HOST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"info-disclosure-detect\\",\\"name\\":\\"Info Disclosure Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects information disclosure in HTTP responses including server version\\\\nstrings, framework identifiers, internal IP addresses, and stack traces.\\\\n\\\\n## Notes\\\\n- Scans response headers and bodies for disclosure patterns\\\\n- Detects server software versions, internal paths, email addresses, and debug info\\\\n- Runs per-request to catch endpoint-specific disclosures\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/01-Information_Gathering/\\",\\"short_description\\":\\"Detects information disclosure patterns in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when response contains identifiable server versions, internal IPs, stack traces, or debug information\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cookie-security-detect\\",\\"name\\":\\"Cookie Security Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects insecure cookie configurations by analyzing Set-Cookie headers\\\\nfor missing Secure, HttpOnly, and SameSite attributes.\\\\n\\\\n## Notes\\\\n- Checks all Set-Cookie headers in responses\\\\n- Flags cookies missing Secure flag on HTTPS responses\\\\n- Flags cookies missing HttpOnly attribute\\\\n- Flags cookies without SameSite attribute\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/controls/SecureCookieAttribute\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Session_Management_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects insecure cookie attributes in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when Set-Cookie headers lack Secure, HttpOnly, or SameSite attributes\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"mixed-content-detect\\",\\"name\\":\\"Mixed Content Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects mixed content issues where HTTPS pages load resources over\\\\ninsecure HTTP connections, potentially exposing data to interception.\\\\n\\\\n## Notes\\\\n- Scans HTML response bodies for HTTP URLs in src, href, and action attributes\\\\n- Only checks responses from HTTPS origins\\\\n- Flags both active (scripts, iframes) and passive (images, stylesheets) mixed content\\\\n\\\\n## References\\\\n- https://developer.mozilla.org/en-US/docs/Web/Security/Mixed_content\\\\n- https://owasp.org/www-community/controls/Certificate_and_Public_Key_Pinning\\",\\"short_description\\":\\"Detects mixed HTTP/HTTPS content in responses\\",\\"confirmation_criteria\\":\\"Confirmed when HTTPS page contains references to resources loaded over insecure HTTP\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sensitive-url-params\\",\\"name\\":\\"Sensitive URL Params\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects sensitive information passed via URL query parameters, which may\\\\nbe logged in server logs, browser history, and referrer headers.\\\\n\\\\n## Notes\\\\n- Detects passwords, tokens, API keys, and credentials in URL parameters\\\\n- Pattern-based detection on both parameter names and values\\\\n- Sensitive data in URLs is logged and may leak via Referer headers\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/vulnerabilities/Information_exposure_through_query_strings_in_url\\\\n- https://cwe.mitre.org/data/definitions/598.html\\",\\"short_description\\":\\"Detects sensitive data in URL query parameters\\",\\"confirmation_criteria\\":\\"Indicated when URL query parameters contain names or values matching sensitive data patterns (password, token, key, secret)\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cors-headers-detect\\",\\"name\\":\\"CORS Headers Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects permissive CORS configurations by analyzing Access-Control-Allow-Origin\\\\nand related headers in HTTP responses without sending additional requests.\\\\n\\\\n## Notes\\\\n- Flags wildcard (*) CORS origins\\\\n- Flags CORS with credentials enabled\\\\n- Complements the active CORS misconfiguration module with passive detection\\\\n- Runs per-request for comprehensive coverage\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/cors\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/CORS\\",\\"short_description\\":\\"Passively detects permissive CORS headers in responses\\",\\"confirmation_criteria\\":\\"Confirmed when response contains permissive CORS headers such as wildcard origin or credentials enabled\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"jwt-weak-secret\\",\\"name\\":\\"JWT Weak Secret Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects JWT tokens signed with weak HMAC secrets by performing offline\\\\nbrute-force against an embedded wordlist of ~104K known weak secrets.\\\\n\\\\n## Notes\\\\n- Extracts JWTs from Authorization Bearer headers and cookies\\\\n- Only tests HMAC-based algorithms (HS256, HS384, HS512)\\\\n- Computes HMAC signatures offline without sending additional requests\\\\n- Uses embedded jwt.secrets.list wordlist\\\\n\\\\n## References\\\\n- https://portswigger.net/web-security/jwt\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/06-Session_Management_Testing/10-Testing_JSON_Web_Tokens\\",\\"short_description\\":\\"Detects JWTs signed with weak HMAC secrets via offline brute-force\\",\\"confirmation_criteria\\":\\"Confirmed when a JWT HMAC signature matches a known weak secret\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"serialized-object-detect\\",\\"name\\":\\"Serialized Object Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects serialized objects in HTTP request parameters by matching known\\\\nserialization format signatures for Java, PHP, .NET, and Python.\\\\n\\\\n## Notes\\\\n- Java: base64 prefix \\\\\\"rO0AB\\\\\\" or hex prefix \\\\\\"aced0005\\\\\\"\\\\n- PHP: pattern matching O:N:\\\\\\"class\\\\\\", a:N:{, etc.\\\\n- .NET: base64 prefix \\\\\\"AAEAAAD\\\\\\" (BinaryFormatter)\\\\n- Python: pickle indicators (\\\\\\"ccopy_reg\\\\\\" prefix or protocol markers)\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/16-Testing_for_HTTP_Incoming_Requests\\\\n- https://portswigger.net/web-security/deserialization\\",\\"short_description\\":\\"Detects serialized Java/PHP/.NET/Python objects in request parameters\\",\\"confirmation_criteria\\":\\"Confirmed when request parameter values contain known serialization format signatures\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"sql-syntax-detect\\",\\"name\\":\\"SQL Syntax in Request Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects SQL statements and keywords in HTTP request parameter values,\\\\nwhich may indicate SQL injection attempts or unsafe parameter handling.\\\\n\\\\n## Notes\\\\n- Matches SQL statements: SELECT..FROM, INSERT INTO, UPDATE..SET, DELETE FROM, UNION SELECT, etc.\\\\n- Secondary check for SQL keyword pairs: WHERE/AND/OR with comparison operators\\\\n- URL-decodes parameter values before checking\\\\n- Minimum value length of 8 characters to reduce false positives\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/SQL_Injection\\\\n- https://cwe.mitre.org/data/definitions/89.html\\",\\"short_description\\":\\"Detects SQL syntax in HTTP request parameter values\\",\\"confirmation_criteria\\":\\"Indicated when request parameter values contain SQL statement patterns\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"content-type-mismatch\\",\\"name\\":\\"Content Type Mismatch\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects mismatches between the Content-Type header and actual response body\\\\ncontent, which can lead to MIME confusion attacks and XSS.\\\\n\\\\n## Notes\\\\n- Compares declared Content-Type with detected body content signatures\\\\n- Flags JSON/XML/HTML content served with incorrect Content-Type\\\\n- Missing X-Content-Type-Options makes MIME sniffing exploitable\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-secure-headers/#x-content-type-options\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options\\",\\"short_description\\":\\"Detects mismatches between Content-Type header and response body\\",\\"confirmation_criteria\\":\\"Confirmed when the Content-Type header does not match the actual content of the response body\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"csrf-detect\\",\\"name\\":\\"CSRF Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nDetects state-changing HTTP requests (POST, PUT, DELETE, PATCH) that lack common\\\\nanti-CSRF protections such as CSRF tokens in parameters/headers or SameSite cookie\\\\nattributes.\\\\n\\\\n## Notes\\\\n- Passive only — does not send any HTTP requests\\\\n- Skips JSON API requests with Origin header (CORS-protected)\\\\n- Checks for CSRF tokens in body parameters, custom headers, and SameSite cookies\\\\n- Deduplicates by method + host + path\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/attacks/csrf\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Cross-Site_Request_Forgery_Prevention_Cheat_Sheet.html\\",\\"short_description\\":\\"Flags state-changing requests missing anti-CSRF protections\\",\\"confirmation_criteria\\":\\"Indicated when a state-changing request lacks CSRF token parameters, custom anti-CSRF headers, and SameSite cookie attributes\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"idor-params-detect\\",\\"name\\":\\"IDOR Parameter Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively identifies HTTP parameters whose names and values suggest they reference\\\\nobject identifiers, providing triage signals for potential IDOR (Insecure Direct\\\\nObject Reference) and BOLA (Broken Object Level Authorization) vulnerabilities.\\\\n\\\\nThe module classifies parameter names (e.g. user_id, account_id) and values\\\\n(sequential integers, UUIDs, structured codes) to compute a confidence score.\\\\nPath parameters following resource nouns (e.g. /users/123) receive additional weight.\\\\n\\\\nWhen JSON responses are present, the module also flags excessive data exposure by\\\\ndetecting sensitive field names (password_hash, ssn, is_admin, etc.).\\\\n\\\\n## Notes\\\\n- Informational finding: flags endpoints for further active testing (Layer 2+)\\\\n- Covers OWASP API1:2023 (BOLA) and API3:2023 (BOPLA) triage\\\\n- Does not send additional requests — purely passive analysis\\\\n- Deduplicates by host + normalized path pattern + parameter name + type\\\\n\\\\n## References\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa1-broken-object-level-authorization/\\\\n- https://owasp.org/API-Security/editions/2023/en/0xa3-broken-object-property-level-authorization/\\\\n- https://cwe.mitre.org/data/definitions/639.html\\",\\"short_description\\":\\"Detects parameters that may reference object identifiers (IDOR/BOLA triage)\\",\\"confirmation_criteria\\":\\"Indicated when a request parameter has a high-signal identifier name combined with a predictable value format, or when a JSON response exposes sensitive internal fields\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"crypto-weakness-detect\\",\\"name\\":\\"Cryptographic Weakness Detection\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nDetects cryptographic weaknesses in HTTP responses and cookies, including PHP magic hashes,\\\\nweak hash algorithms near sensitive contexts, padding oracle indicators, and encrypted cookies\\\\nwithout integrity protection (MAC).\\\\n\\\\n## Notes\\\\n- Analyzes both request cookies and response headers/body\\\\n- Checks for MD5/SHA1 usage near password, token, or hash keywords\\\\n- Detects padding oracle error messages that may enable ciphertext manipulation\\\\n- Identifies encrypted cookie values that lack HMAC integrity verification\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/09-Testing_for_Weak_Cryptography/\\\\n- https://www.whitehatsec.com/blog/magic-hashes/\\",\\"short_description\\":\\"Detects weak cryptographic patterns in HTTP traffic\\",\\"confirmation_criteria\\":\\"Confirmed when response contains identifiable cryptographic weakness patterns such as magic hashes, weak hash usage, padding oracle errors, or unprotected encrypted cookies\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"error-message-detect\\",\\"name\\":\\"Error Message Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects error messages in HTTP responses that reveal server-side technology,\\\\ndebug information, or database error details. Covers debug pages, Apache, ASP.NET, Java,\\\\nPython, PHP, Ruby, Node.js, SQL database errors, and other common frameworks.\\\\n\\\\n## Notes\\\\n- Categorizes errors by technology (Debug, Apache, ASP, Java, Generic, SQL)\\\\n- Debug page patterns are reported at low severity with certain confidence\\\\n- SQL error patterns are reported at low severity with firm confidence\\\\n- Other error patterns are reported at info severity with firm confidence\\\\n\\\\n## References\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Error_Handling_Cheat_Sheet.html\\\\n- https://raw.githubusercontent.com/PortSwigger/error-message-checks/master/src/main/resources/burp/match-rules.tab\\\\n- https://github.com/1ndianl33t/Gf-Patterns\\",\\"short_description\\":\\"Detects interesting error messages in HTTP responses\\",\\"confirmation_criteria\\":\\"Confirmed when response body contains recognizable error messages or stack traces from known frameworks\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"base64-data-detect\\",\\"name\\":\\"Base64 Data Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects interesting base64 encoded data in HTTP requests and responses.\\\\nMatches known prefixes for JSON (eyJ), PHP serialized objects (YTo, Tzo),\\\\nXML/PHP (PD8/PD9), HTTPS/HTTP URLs (aHR0cHM6L, aHR0cDo), and Java serialized\\\\nobjects (rO0).\\\\n\\\\n## Notes\\\\n- Scans both request and response content\\\\n- Low noise: only flags known interesting base64 prefixes\\\\n- Manual review is recommended to assess the encoded data\\\\n\\\\n## References\\\\n- https://portswigger.net/kb/issues/00700200_base64-encoded-data-in-parameter\\\\n- https://cheatsheetseries.owasp.org/index.html\\\\n- https://github.com/tomnomnom/gf/blob/master/examples/base64.json\\",\\"short_description\\":\\"Identifies interesting base64 encoded data like JSON, PHP Object in requests/responses\\",\\"confirmation_criteria\\":\\"Confirmed when request or response contains base64-encoded data matching known interesting prefixes (JSON, PHP objects, URLs, Java objects)\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"tentative\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"password-autocomplete-detect\\",\\"name\\":\\"Password Autocomplete Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects password input fields in HTML responses that do not have autocomplete\\\\ndisabled, which may allow browsers to store sensitive credentials.\\\\n\\\\n## Notes\\\\n- Checks for autocomplete=\\\\\\"off\\\\\\" or autocomplete=\\\\\\"new-password\\\\\\" on password inputs\\\\n- Also checks enclosing form elements for autocomplete attributes\\\\n- Only fires on text/html responses\\\\n\\\\n## References\\\\n- https://owasp.org/www-community/controls/PasswordAutocomplete\\\\n- https://cheatsheetseries.owasp.org/cheatsheets/Authentication_Cheat_Sheet.html\\",\\"short_description\\":\\"Detects password fields without autocomplete disabled\\",\\"confirmation_criteria\\":\\"Confirmed when password input fields lack autocomplete='off' or autocomplete='new-password'\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"certain\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"cacheable-https-detect\\",\\"name\\":\\"Cacheable HTTPS Response Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects HTTPS responses containing sensitive content (Set-Cookie headers or\\\\npassword fields) that lack proper cache-control directives, allowing browsers or proxies\\\\nto cache sensitive data.\\\\n\\\\n## Notes\\\\n- Only fires on HTTPS URLs with sensitive response indicators\\\\n- Checks for Cache-Control: no-store, no-cache, or private\\\\n- Also checks Pragma: no-cache as legacy fallback\\\\n- Missing or permissive cache control on sensitive responses is flagged\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/04-Authentication_Testing/06-Testing_for_Browser_Cache_Weaknesses\\\\n- https://developer.mozilla.org/en-US/docs/Web/HTTP/Reference/Headers/Cache-Control\\",\\"short_description\\":\\"Detects sensitive HTTPS responses without proper cache control\\",\\"confirmation_criteria\\":\\"Confirmed when sensitive HTTPS response lacks Cache-Control: no-store/no-cache/private directives\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"firm\\",\\"scan_scope\\":[\\"PER_REQUEST\\"],\\"enabled\\":true}}","{\\"type\\":\\"module\\",\\"data\\":{\\"id\\":\\"input-reflection-detect\\",\\"name\\":\\"Input Reflection Detect\\",\\"type\\":\\"passive\\",\\"description\\":\\"## Description\\\\nPassively detects when request parameter values are reflected verbatim in the response body.\\\\nInput reflection is a prerequisite for many injection vulnerabilities including XSS.\\\\n\\\\n## Notes\\\\n- Only checks text/html responses\\\\n- Filters out short values (<4 chars), all-numeric values, and token-like values\\\\n- Reports reflected parameters as informational findings for further investigation\\\\n\\\\n## References\\\\n- https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/01-Testing_for_Reflected_Cross_Site_Scripting\\",\\"short_description\\":\\"Detects
