# description: Full scan — deep discovery, spidering, enriched SPA targets, thorough dynamic assessment (slow)
scanning_strategy:
  default_strategy: deep

scanning_pace:
  concurrency: 30
  rate_limit: 50
  max_per_host: 5
  discovery:
    concurrency: 30
    max_duration: 2h
  spidering:
    max_duration: 1h
  spa:
    max_duration: 3h
    duration_factor: 3.0
  dynamic_assessment:
    concurrency: 30

discovery:
  mode: files_and_dirs
  scope_mode: subdomain
  save_response_body: true
  enable_malformed_path_probe: true
  recursion:
    enabled: true
    max_depth: 10
  extensions:
    test_custom: true
    test_observed: true
    test_variants: true
    test_no_extension: true
  engine:
    case_sensitivity: auto_detect
    timeout: 15s

spidering:
  max_depth: 0
  max_states: 0
  max_duration: 1h
  max_consecutive_fails: 200
  headless: true
  browser_count: 2
  strategy: adaptive
  browser_engine: chromium

spa:
  enrich_targets: true
  exclude_tags:
    - dos

dynamic_assessment:
  enabled_modules:
    active_modules:
      - all
    passive_modules:
      - all

mutation_strategy:
  default_modes:
    - append
    - replace
