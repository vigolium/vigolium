format: toml
agent_name_prefix: "archon:"
defaults:
  model: "gpt5.2"
  sandbox_mode: "workspace-write"

overrides:
  static-analyzer:
    sandbox_mode: "danger-full-access"

# Agents present in the full 23-agent roster but absent from codex (17 toml files).
# Codex has: advisory-hunter, attack-ideator, backward-reasoner, chamber-synthesizer,
#   code-tracer, devils-advocate, enrichment-filter, evidence-harvester,
#   knowledge-base-builder, patch-bypass-checker, poc-builder, probe-strategist,
#   report-assembler, spec-gap-analyst, static-analyzer, variant-hunter, variant-scout
exclude:
  - code-anatomist
  - cold-verifier
  - commit-archaeologist
  - contradiction-reasoner
  - causal-verifier
  - deep-auditor
