# =============================================================================
# Vigolium Deployment Configuration
# =============================================================================

# --- Domain & TLS ----
vigolium_domain: "scan.example.com"
cloudflare_api_token: "{{ vault_cloudflare_api_token }}"

# --- System ----
vigolium_user: vigolium
vigolium_group: vigolium
vigolium_home: /opt/vigolium
vigolium_data_dir: /opt/vigolium/.vigolium

# --- Scanner Server ----
vigolium_server_port: 9002
vigolium_server_host: "127.0.0.1"
vigolium_api_key: "{{ vault_vigolium_api_key }}"

# Pre-built binary (relative to playbook or absolute path on control node)
vigolium_binary_src: "../../build/dist/vigolium_linux_amd64_v1/vigolium"
# Or for ARM64:
# vigolium_binary_src: "../../build/dist/vigolium_linux_arm64_v8.0/vigolium"

# --- Console (Next.js) ----
vigolium_console_port: 5002
vigolium_console_src: "../../platform/vigolium-console"
vigolium_console_dir: /opt/vigolium/console
vigolium_console_env_file: "files/console.env"   # Your .env with WorkOS/GitHub secrets
bun_version: "latest"

# --- Dependencies ----
install_chromium: true
install_semgrep: true
install_codeql: true
install_claude_code: true
install_nuclei_templates: true

codeql_version: "2.21.3"

# --- SQLite ----
vigolium_db_path: "{{ vigolium_data_dir }}/database-vgnm.sqlite"

# --- Scanning defaults ----
vigolium_concurrency: 50
vigolium_rate_limit: 100
vigolium_max_per_host: 10
vigolium_max_duration: "1h"
