---
# =============================================================================
# Vigolium Console: Bun, Next.js build, systemd
# =============================================================================

# --- Install Bun ---
- name: Install Bun
  ansible.builtin.shell: |
    curl -fsSL https://bun.sh/install | bash
  args:
    creates: "{{ vigolium_home }}/.bun/bin/bun"
  become_user: "{{ vigolium_user }}"

- name: Add Bun to PATH in bashrc
  ansible.builtin.lineinfile:
    path: "{{ vigolium_home }}/.bashrc"
    line: 'export PATH="{{ vigolium_home }}/.bun/bin:$PATH"'
    create: true
    owner: "{{ vigolium_user }}"
    group: "{{ vigolium_group }}"

# --- Sync Console Source ---
- name: Sync console source to server
  ansible.posix.synchronize:
    src: "{{ vigolium_console_src }}/"
    dest: "{{ vigolium_console_dir }}/"
    delete: true
    rsync_opts:
      - "--exclude=node_modules"
      - "--exclude=.next"
      - "--exclude=.next-workbench"
      - "--exclude=dist-workbench"
      - "--exclude=dist-console"
      - "--exclude=.env"
      - "--exclude=.env.local"
  notify: Restart vigolium-console

- name: Set console directory ownership
  ansible.builtin.file:
    path: "{{ vigolium_console_dir }}"
    state: directory
    owner: "{{ vigolium_user }}"
    group: "{{ vigolium_group }}"
    recurse: true

# --- Deploy .env ---
- name: Deploy console .env.local
  ansible.builtin.copy:
    src: "{{ vigolium_console_env_file }}"
    dest: "{{ vigolium_console_dir }}/.env.local"
    owner: "{{ vigolium_user }}"
    group: "{{ vigolium_group }}"
    mode: "0600"
  notify: Restart vigolium-console

- name: Ensure scan server URL in .env.local
  ansible.builtin.lineinfile:
    path: "{{ vigolium_console_dir }}/.env.local"
    regexp: "^VIGOLIUM_SCAN_SERVER="
    line: "VIGOLIUM_SCAN_SERVER=http://{{ vigolium_server_host }}:{{ vigolium_server_port }}"
  notify: Restart vigolium-console

- name: Ensure API key in .env.local
  ansible.builtin.lineinfile:
    path: "{{ vigolium_console_dir }}/.env.local"
    regexp: "^VIGOLIUM_AUTH_API_KEY="
    line: "VIGOLIUM_AUTH_API_KEY={{ vigolium_api_key }}"
  notify: Restart vigolium-console

# --- Install Dependencies & Build ---
- name: Install console dependencies
  ansible.builtin.command:
    cmd: "{{ vigolium_home }}/.bun/bin/bun install --frozen-lockfile"
    chdir: "{{ vigolium_console_dir }}"
  become_user: "{{ vigolium_user }}"
  changed_when: true

- name: Build console (cloud mode)
  ansible.builtin.command:
    cmd: "{{ vigolium_home }}/.bun/bin/bun run build"
    chdir: "{{ vigolium_console_dir }}"
  become_user: "{{ vigolium_user }}"
  environment:
    PATH: "{{ vigolium_home }}/.bun/bin:/usr/local/bin:/usr/bin:/bin"
    NODE_ENV: production
  changed_when: true
  notify: Restart vigolium-console

# --- Systemd Service ---
- name: Deploy console systemd service
  ansible.builtin.template:
    src: vigolium-console.service.j2
    dest: /etc/systemd/system/vigolium-console.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart vigolium-console

- name: Enable and start console
  ansible.builtin.systemd:
    name: vigolium-console
    enabled: true
    state: started
    daemon_reload: true
