---
# =============================================================================
# Vigolium Scanner Server: binary, config, systemd
# =============================================================================

- name: Copy vigolium binary
  ansible.builtin.copy:
    src: "{{ vigolium_binary_src }}"
    dest: /usr/local/bin/vigolium
    owner: root
    group: root
    mode: "0755"
  notify: Restart vigolium

- name: Deploy vigolium config
  ansible.builtin.template:
    src: vigolium-configs.yaml.j2
    dest: "{{ vigolium_data_dir }}/vigolium-configs.yaml"
    owner: "{{ vigolium_user }}"
    group: "{{ vigolium_group }}"
    mode: "0600"
  notify: Restart vigolium

- name: Deploy vigolium systemd service
  ansible.builtin.template:
    src: vigolium.service.j2
    dest: /etc/systemd/system/vigolium.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart vigolium

- name: Enable and start vigolium
  ansible.builtin.systemd:
    name: vigolium
    enabled: true
    state: started
    daemon_reload: true
