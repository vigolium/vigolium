s job params as plaintext for the duration of any active scan job. This pattern is structurally identical to AP-026 (plaintext credentials in job queue).\\\\n\\\\n## Location\\\\n\\\\n- `src/controller/scan/base_controller.go:944` -- `rJSON, err := param.Registration.ToJSON()` serializes full Registration\\\\n- `src/controller/scan/base_controller.go:967` -- `params[sca.JobParamRegistration] = rJSON` stores JSON including `access_credential` in Redis\\\\n- `src/pkg/scan/dao/scanner/model.go:51` -- `AccessCredential string json:\\\\\\"access_credential,omitempty\\\\\\"` -- included in JSON serialization\\\\n\\\\n## Attacker Control\\\\n\\\\n- Any actor with Redis read access (no authentication required in default Harbor deployments)\\\\n- Credentials present for all active and queued scan jobs\\\\n- Container compromise on Docker network provides Redis access\\\\n- Scan jobs run on every artifact push if auto-scan is enabled, keeping the credential perpetually present\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-4: Core/Controller to Redis (no authentication by default)\\\\n- Scanner adapter credentials cross from DB storage to plaintext JSON in Redis\\\\n\\\\n## Impact\\\\n\\\\n- Exfiltration of scanner adapter credentials (API keys, Basic auth passwords) from Redis\\\\n- Credentials valid for direct access to vulnerability scanner adapters (Trivy, Clair, etc.)\\\\n- If auto-scan is enabled, credential is continuously present in Redis for any queued scan\\\\n- Unlike p8-026 (replication), scanner credentials are NOT encrypted at rest in DB, making this the primary exposure path\\\\n\\\\n## Evidence\\\\n\\\\n- `base_controller.go:944`: `rJSON, err := param.Registration.ToJSON()` -- calls `json.Marshal(r)` which includes all exported fields\\\\n- `base_controller.go:967`: `params[sca.JobParamRegistration] = rJSON` -- stored directly as Redis job param\\\\n- `job.go:170`: `printJSONParameter(JobParamRegistration, removeRegistrationAuthInfo(r), myLogger)` -- note: log printing DOES redact, but Redis storage (line 967) does not\\\\n- `job.go:428`: `AccessCredential: \\\\\\"[HIDDEN]\\\\\\"` in `removeRegistrationAuthInfo` confirms developer awareness but does not protect Redis storage path\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure a scanner registration with credentials (e.g., Basic auth)\\\\n2. Enable auto-scan or manually trigger a scan via `POST /api/v2.0/projects/{name}/repositories/{repo}/artifacts/{digest}/scan`\\\\n3. Connect to Redis: `redis-cli -h <harbor-redis>`\\\\n4. List job keys: `KEYS *` or `SMEMBERS known_job_types`\\\\n5. Read scan job parameters containing the `registration` key\\\\n6. Extract plaintext `access_credential` from the JSON value\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/controller/scan/base_controller.go:944\\",\\"matched_at\\":[\\"src/controller/scan/base_controller.go:944\\",\\"src/controller/scan/base_controller.go:967\\",\\"src/pkg/scan/dao/scanner/model.go:51\\"],\\"finding_hash\\":\\"747a033b7b04f8f0cb789150ea5d1926\\",\\"found_at\\":\\"2026-03-30T18:45:41.016128Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":16,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-080\\",\\"module_name\\":\\"The `SearchUsers` API endpoint (`GET /api/v2.0/users/search`) checks only `RequireAuthenticated` with no RBAC scoping. The DAO\'s `SearchByName` function at `src/pkg/user/dao/dao.go:136` constructs a L\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"searchusers-enum-like\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `SearchUsers` API endpoint (`GET /api/v2.0/users/search`) checks only `RequireAuthenticated` with no RBAC scoping. The DAO\'s `SearchByName` function at `src/pkg/user/dao/dao.go:136` constructs a LIKE pattern via `\\\\\\"%\\\\\\" + name + \\\\\\"%\\\\\\"` without calling `orm.Escape`, identical to the confirmed usergroup enumeration bug (p8-040). Any authenticated user can enumerate all Harbor usernames, email addresses, and user IDs system-wide by supplying a single `%` character as the `username` query parameter.\\\\n\\\\n## Location\\\\n\\\\n- **Handler**: `src/server/v2.0/handler/user.go:265-288` -- `SearchUsers`, only `RequireAuthenticated` check\\\\n- **Manager**: `src/pkg/user/manager.go:250-251` -- delegates to DAO\\\\n- **DAO**: `src/pkg/user/dao/dao.go:128-147` -- `SearchByName`, `likePattern := \\\\\\"%\\\\\\" + name + \\\\\\"%\\\\\\"` (no `orm.Escape`)\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: `username` query parameter in `GET /api/v2.0/users/search?username=%`\\\\n- **Control level**: Full -- attacker supplies the LIKE pattern character\\\\n- **Auth requirement**: Any valid authentication (basic auth, session, token, robot account)\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nAny authenticated user (including guests and robot accounts scoped to a single project) gains access to the complete Harbor user directory -- names, emails, and user IDs -- with no project or role scoping. This crosses the project isolation boundary (TB-3).\\\\n\\\\n## Impact\\\\n\\\\n- Full enumeration of all Harbor usernames and email addresses\\\\n- Internal user IDs are returned, enabling correlation with member lists and audit logs\\\\n- In enterprise deployments, leaks the organizational directory structure\\\\n- Facilitates targeted account takeover or social engineering attacks\\\\n- Combined with p8-040 (group enumeration): attacker can map users to LDAP/OIDC groups\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/server/v2.0/handler/user.go:265-288\\\\nfunc (u *usersAPI) SearchUsers(ctx context.Context, params operation.SearchUsersParams) middleware.Responder {\\\\n    if err := u.RequireAuthenticated(ctx); err != nil {  // ONLY auth check -- no RBAC\\\\n        return u.SendError(ctx, err)\\\\n    }\\\\n    // ...\\\\n    l, err := u.ctl.SearchByName(ctx, params.Username, int(*params.PageSize))\\\\n    // ...\\\\n}\\\\n\\\\n// src/pkg/user/dao/dao.go:128-147\\\\nfunc (d *dao) SearchByName(ctx context.Context, name string, limitSize int) ([]*commonmodels.User, error) {\\\\n    // ...\\\\n    sql := \\\\\\"select * from harbor_user where username like ? and deleted = false order by length(username), username asc limit ?\\\\\\"\\\\n    likePattern := \\\\\\"%\\\\\\" + name + \\\\\\"%\\\\\\"  // NO orm.Escape -- wildcard injection\\\\n    _, err = o.Raw(sql, likePattern, limitSize).QueryRows(&users)\\\\n    // ...\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as any Harbor user (including a guest or robot with minimal permissions)\\\\n2. Send: `GET /api/v2.0/users/search?username=%25&page_size=100`\\\\n   - Note: `%25` is URL-encoded `%` which becomes the LIKE wildcard `%`\\\\n3. Response returns all non-deleted users system-wide with username, email, and user_id fields\\\\n4. Iterate with `page` parameter to enumerate all users if count exceeds page_size\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/v2.0/handler/user.go:265-288\\",\\"matched_at\\":[\\"src/server/v2.0/handler/user.go:265-288\\",\\"src/pkg/user/manager.go:250-251\\",\\"src/pkg/user/dao/dao.go:128-147\\"],\\"finding_hash\\":\\"5eb17d76911e4545734233ee2c5789b4\\",\\"found_at\\":\\"2026-03-30T18:45:41.016129Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":17,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-081\\",\\"module_name\\":\\"`SlackJob.init()` at `src/jobservice/job/impl/notification/slack_job.go:114-119` reads `skip_cert_verify` from the job parameter map and switches the HTTP client to `httpHelper.clients[insecure]` (`In\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"slack-job-insecure-tls\\",\\"description\\":\\"## Summary\\\\n\\\\n`SlackJob.init()` at `src/jobservice/job/impl/notification/slack_job.go:114-119` reads `skip_cert_verify` from the job parameter map and switches the HTTP client to `httpHelper.clients[insecure]` (`InsecureSkipVerify: true`) when the flag is set. This is the identical code pattern as the confirmed `WebhookJob` finding (p7-005). A project-admin can create a Slack notification policy with `skip_cert_verify: true`, causing Slack webhook deliveries to bypass TLS certificate verification and become vulnerable to MitM interception.\\\\n\\\\n## Location\\\\n\\\\n- **SlackJob init**: `src/jobservice/job/impl/notification/slack_job.go:114-119` -- insecure branch enabled by user parameter\\\\n- **Handler origin**: Slack policy created via `POST /api/v2.0/projects/{id}/webhook/policies` with type `slack`\\\\n- **Parameter flow**: `SkipCertVerify` field in `src/pkg/notification/policy/model/model.go:97` → persisted to DB → deserialized into job params at `src/pkg/notifier/handler/notification/slack_handler.go:124`\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: `skip_cert_verify: true` in Slack notification policy creation\\\\n- **Control level**: Project-admin or above can set this flag\\\\n- **Auth requirement**: Project-admin role\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nJob Service to external Slack/webhook endpoints (TB-8). When `skip_cert_verify=true` is set, a network-adjacent attacker can present any TLS certificate and intercept or modify the Slack notification payload in transit.\\\\n\\\\n## Impact\\\\n\\\\n- MitM interception of Slack webhook payloads (may contain artifact names, digests, event metadata)\\\\n- Same impact as p7-005 but affecting the Slack notification transport path\\\\n- No logging or auditing when insecure transport is used\\\\n- Persists indefinitely until the policy is updated\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/jobservice/job/impl/notification/slack_job.go:108-121\\\\nfunc (sj *SlackJob) init(ctx job.Context, params map[string]any) error {\\\\n    sj.logger = ctx.GetLogger()\\\\n\\\\n    // default use secure transport\\\\n    sj.client = httpHelper.clients[secure]\\\\n    if v, ok := params[\\\\\\"skip_cert_verify\\\\\\"]; ok {\\\\n        if skipCertVerify, ok := v.(bool); ok && skipCertVerify {\\\\n            // if skip cert verify is true, it means not verify remote cert, use insecure client\\\\n            sj.client = httpHelper.clients[insecure]  // InsecureSkipVerify: true\\\\n        }\\\\n    }\\\\n    return nil\\\\n}\\\\n\\\\n// src/pkg/notifier/handler/notification/slack_handler.go:124\\\\n\\\\\\"skip_cert_verify\\\\\\": event.Target.SkipCertVerify,  // user-controlled field flows into job params\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as project-admin\\\\n2. Create a Slack notification policy:\\\\n   ```\\\\n   POST /api/v2.0/projects/{id}/webhook/policies\\\\n   {\\\\n     \\\\\\"name\\\\\\": \\\\\\"slack-alert\\\\\\",\\\\n     \\\\\\"event_types\\\\\\": [\\\\\\"ARTIFACT_PUSHED\\\\\\"],\\\\n     \\\\\\"targets\\\\\\": [{\\\\\\"type\\\\\\": \\\\\\"slack\\\\\\", \\\\\\"address\\\\\\": \\\\\\"https://hooks.slack.com/...\\\\\\", \\\\\\"skip_cert_verify\\\\\\": true}]\\\\n   }\\\\n   ```\\\\n3. Push an artifact to trigger the Slack notification\\\\n4. A network-adjacent attacker can MitM the HTTPS connection to the Slack endpoint\\\\n5. Webhook payload is intercepted with no TLS error because certificate validation is disabled\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/jobservice/job/impl/notification/slack_job.go:114-119\\",\\"matched_at\\":[\\"src/jobservice/job/impl/notification/slack_job.go:114-119\\"],\\"finding_hash\\":\\"4704e4ea4967ad5f7bf062da91b54e0e\\",\\"found_at\\":\\"2026-03-30T18:45:41.01613Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":18,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-082\\",\\"module_name\\":\\"The `developer` project role includes `{Resource: rbac.ResourceExportCVE, Action: rbac.ActionCreate}`. The `ExportScanData` handler at `src/server/v2.0/handler/scanexport.go:65` has no rate limiting o\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"developer-scan-export-nolimit\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `developer` project role includes `{Resource: rbac.ResourceExportCVE, Action: rbac.ActionCreate}`. The `ExportScanData` handler at `src/server/v2.0/handler/scanexport.go:65` has no rate limiting or per-user/per-project job count check -- it unconditionally creates a new `ScanDataExport` job on every request. While `ScanDataExport.MaxCurrency()` returns 1 (one active job per Redis instance), this limit applies globally across the entire system, not per user. A developer-role user can submit many export requests for different project/criteria combinations simultaneously. Each consumes a shared job worker slot, starving other critical jobs (replication, GC, scanning). Additionally, `ShouldRetry()` returns `true` with `MaxFails=1`, meaning failed export jobs are retried, compounding queue pressure.\\\\n\\\\n## Location\\\\n\\\\n- **Handler**: `src/server/v2.0/handler/scanexport.go:65-106` -- `ExportScanData`, no job count or rate limit check\\\\n- **Role policy**: `src/common/rbac/project/rbac_role.go:243-245` -- developer has `ResourceExportCVE ActionCreate`\\\\n- **Job limits**: `src/jobservice/job/impl/scandataexport/scan_data_export.go:51-70` -- `MaxFails=1`, `MaxCurrency=1` (global, not per-user), `ShouldRetry=true`\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: HTTP requests to `POST /api/v2.0/export/cve` with varying criteria (project IDs, CVE IDs, tags, labels)\\\\n- **Control level**: Developer can submit unlimited export jobs with distinct criteria combinations\\\\n- **Auth requirement**: Developer role in any project\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nA developer role in a single project can generate sustained job queue pressure system-wide, affecting replication, GC, and scanning jobs for all projects across all tenants.\\\\n\\\\n## Impact\\\\n\\\\n- Job worker pool pressure: each pending export job occupies a slot\\\\n- Cross-tenant starvation: replication, GC, and scan jobs delayed or timed out for all projects\\\\n- No per-user rate limit prevents a single compromised developer from submitting hundreds of export jobs\\\\n- Recovery requires manual job cancellation or worker restart\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/server/v2.0/handler/scanexport.go:65-106\\\\nfunc (se *scanDataExportAPI) ExportScanData(ctx context.Context, params operation.ExportScanDataParams) middleware.Responder {\\\\n    // ... validates params ...\\\\n    for _, pid := range params.Criteria.Projects {\\\\n        if err := se.RequireProjectAccess(ctx, pid, rbac.ActionCreate, rbac.ResourceExportCVE); err != nil {\\\\n            return se.SendError(ctx, err)\\\\n        }\\\\n    }\\\\n    // NO job count check, NO rate limit\\\\n    jobID, err := se.scanDataExportCtl.Start(userContext, ...)\\\\n    // ...\\\\n}\\\\n\\\\n// src/common/rbac/project/rbac_role.go:243-245 (developer role)\\\\n{Resource: rbac.ResourceExportCVE, Action: rbac.ActionCreate},\\\\n{Resource: rbac.ResourceExportCVE, Action: rbac.ActionRead},\\\\n{Resource: rbac.ResourceExportCVE, Action: rbac.ActionList},\\\\n\\\\n// src/jobservice/job/impl/scandataexport/scan_data_export.go:51-70\\\\nfunc (sde *ScanDataExport) MaxFails() uint  { return 1 }\\\\nfunc (sde *ScanDataExport) MaxCurrency() uint { return 1 }  // global, not per-user\\\\nfunc (sde *ScanDataExport) ShouldRetry() bool { return true }\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as a developer in any project\\\\n2. Rapidly submit multiple scan export jobs with distinct criteria:\\\\n   ```\\\\n   POST /api/v2.0/export/cve\\\\n   {\\\\\\"criteria\\\\\\": {\\\\\\"projects\\\\\\": [<pid>], \\\\\\"cveIds\\\\\\": \\\\\\"CVE-2024-XXXX\\\\\\", ...}}\\\\n   ```\\\\n3. Repeat with different project IDs or CVE filter combinations (each is a distinct job instance)\\\\n4. Observe job service queue filling with export jobs\\\\n5. Monitor replication and scanning jobs from other projects being delayed\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/v2.0/handler/scanexport.go:65-106\\",\\"matched_at\\":[\\"src/server/v2.0/handler/scanexport.go:65-106\\",\\"src/common/rbac/project/rbac_role.go:243-245\\",\\"src/jobservice/job/impl/scandataexport/scan_data_export.go:51-70\\"],\\"finding_hash\\":\\"a20556b87c157756edd342bfdd3e834f\\",\\"found_at\\":\\"2026-03-30T18:45:41.016131Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":19,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p7-001\\",\\"module_name\\":\\"Open Redirect via Unvalidated postURI in Auth-Proxy Controller\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"open-redirect-authproxy\\",\\"description\\":\\"# Phase 7 Enriched Finding: P7-001\\\\n\\\\n## Finding Details\\\\n\\\\n| Field | Value |\\\\n|-------|-------|\\\\n| **Finding ID** | P7-001 |\\\\n| **Source SAST ID** | SAST-001 |\\\\n| **Tool** | CodeQL (go/unvalidated-url-redirection) |\\\\n| **Title** | Open Redirect via Unvalidated postURI in Auth-Proxy Controller |\\\\n| **Severity** | HIGH |\\\\n| **Confidence** | HIGH |\\\\n| **CWE** | CWE-601 (URL Redirection to Untrusted Site) |\\\\n\\\\n## Vulnerability Classification\\\\n\\\\n**Type**: Security (exploitable vulnerability)\\\\n\\\\n## PoC Status\\\\n\\\\nPoC-Status: theoretical\\\\nPoC-Block-Reason: Full Harbor auth-proxy deployment not available. Redirect behavior confirmed via static source analysis showing unvalidated postURI parameter passed directly to Ctx.Redirect() at authproxy_redirect.go:77 with no IsLocalPath() check, unlike the OIDC controller.\\\\n\\\\n## Reachability Assessment\\\\n\\\\n**Status**: CONFIRMED REACHABLE\\\\n\\\\n**Evidence**:\\\\n- CodeQL: `go/unvalidated-url-redirection` rule confirmed at `authproxy_redirect.go:77`\\\\n- Call Graph Slice: `CFD-1` in `call-graph-slices.json` maps HTTP GET parameter to redirect sink\\\\n- Trust Boundary: TB-1 (Internet -> Nginx -> Core API)\\\\n\\\\n## Attacker-Controlled Input Path\\\\n\\\\n**Entry Point**: HTTP GET query parameter\\\\n```\\\\nGET /c/authproxy/redirect?token=<valid-token>&postURI=<attacker-url>\\\\n```\\\\n\\\\n**Attack Flow**:\\\\n1. Attacker crafts URL with malicious `postURI` parameter\\\\n2. User (authenticated via auth-proxy) clicks link\\\\n3. Token is verified (line 61: `helper.VerifyToken()`)\\\\n4. User is authenticated (line 67: `helper.PostAuthenticate()`)\\\\n5. postURI parameter is read without validation (line 73)\\\\n6. Unvalidated URI passed to redirect (line 77)\\\\n7. Victim redirected to attacker-controlled URL\\\\n\\\\n## Code Location & Snippet\\\\n\\\\n**File**: `src/core/controllers/authproxy_redirect.go`\\\\n**Lines**: 73-77\\\\n**Function**: `AuthProxyController.HandleRedirect()`\\\\n\\\\n```go\\\\n// Line 73: Read postURI query parameter\\\\nuri := apc.Ctx.Request.URL.Query().Get(postURIKey)\\\\nif uri == \\\\\\"\\\\\\" {\\\\n    uri = \\\\\\"/\\\\\\"\\\\n}\\\\n// Line 77: Redirect without validation\\\\napc.Ctx.Redirect(http.StatusMovedPermanently, uri)\\\\n```\\\\n\\\\n## Vulnerability Analysis\\\\n\\\\n### Trust Boundary Crossing\\\\n\\\\n- **Boundary**: TB-1 (External internet traffic -> Core API)\\\\n- **Effect**: Cross-user (victim user redirected to attacker URL)\\\\n- **Authentication Context**: User is authenticated but redirect target is unvalidated\\\\n\\\\n### Comparison with Secure Pattern\\\\n\\\\nThe OIDC controller (`src/core/controllers/oidc.go`) implements the correct pattern:\\\\n```go\\\\n// Secure pattern: validation before redirect\\\\nif !utils.IsLocalPath(redirectURL) {\\\\n    // reject external URLs\\\\n}\\\\n```\\\\n\\\\nThe auth-proxy handler omits this validation entirely.\\\\n\\\\n### Attack Scenarios\\\\n\\\\n1. **Phishing**: Attacker sends link like `https://harbor.example.com/c/authproxy/redirect?token=...&postURI=https://attacker.com/fake-login`. User clicks, authenticates with Harbor, then is silently redirected to fake login page that looks identical. User re-enters credentials thinking session expired.\\\\n\\\\n2. **Credential Harvesting**: Combined with social engineering (e-mail appears to come from Harbor team asking user to re-authenticate).\\\\n\\\\n3. **Malware Distribution**: Redirect to malware-hosting site with drive-by download.\\\\n\\\\n## Data Flow\\\\n\\\\n```\\\\nInternet User (authenticated)\\\\n    |\\\\nGET /c/authproxy/redirect?token=X&postURI=evil.com\\\\n    |\\\\nAuthProxyController.HandleRedirect()\\\\n    |\\\\napc.Ctx.Request.URL.Query().Get(\\\\\\"postURI\\\\\\")  [TAINT: attacker-controlled]\\\\n    |\\\\nuri := \\\\\\"evil.com\\\\\\"  [NO VALIDATION]\\\\n    |\\\\napc.Ctx.Redirect(301, uri)  [SINK: unvalidated open redirect]\\\\n```\\\\n\\\\n## Recommended Fix\\\\n\\\\nApply the same validation used in OIDC controller:\\\\n\\\\n```go\\\\nuri := apc.Ctx.Request.URL.Query().Get(postURIKey)\\\\nif uri == \\\\\\"\\\\\\" {\\\\n    uri = \\\\\\"/\\\\\\"\\\\n}\\\\n// Add validation before redirect\\\\nif !utils.IsLocalPath(uri) {\\\\n    log.Errorf(\\\\\\"Rejecting external redirect URL: %s\\\\\\", uri)\\\\n    apc.Ctx.Redirect(http.StatusMovedPermanently, \\\\\\"/\\\\\\")\\\\n    return\\\\n}\\\\napc.Ctx.Redirect(http.StatusMovedPermanently, uri)\\\\n```\\\\n\\\\n## Phase 8 Chamber Assignment\\\\n\\\\n**Chamber**: **Authentication & Trust Boundary (AUTH-001)**\\\\n\\\\n**Rationale**:\\\\n- Crosses explicit trust boundary (TB-1)\\\\n- Exploitable after authentication\\\\n- Similar to 2022 CVE clusters involving auth-proxy bypass\\\\n- Affects confidentiality (phishing) and integrity (malware vectors)\\\\n\\\\n## References\\\\n\\\\n- **OWASP**: [Unvalidated Redirects and Forwards](https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html)\\\\n- **CWE-601**: [URL Redirection to Untrusted Site (\'Open Redirect\')](https://cwe.mitre.org/data/definitions/601.html)\\\\n- **KB Report**: TB-1 (Internet <-> Nginx) trust boundary\\\\n- **Commit Reference**: `b6c083d73` mentioned in SAST results (prior incomplete fix)\\\\n\\\\n## Notes for Reviewers\\\\n\\\\n1. **Severity Justification**: HIGH because it crosses explicit trust boundary and enables social engineering attacks\\\\n2. **Exploitability**: Requires user interaction but no elevated privileges\\\\n3. **Impact**: Phishing attacks, credential harvesting, malware distribution\\\\n4. **False Positive Risk**: VERY LOW - CodeQL confirmed, pattern identical to secure OIDC handler\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"tags\\":[\\"archon\\",\\"phase-7\\",\\"poc-theoretical\\",\\"CWE-601\\"],\\"status\\":\\"open\\",\\"cwe_id\\":\\"CWE-601\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/core/controllers/authproxy_redirect.go\\",\\"matched_at\\":[\\"src/core/controllers/authproxy_redirect.go\\"],\\"finding_hash\\":\\"b6703a6dfa7fd31bf37957564c3eae0f\\",\\"found_at\\":\\"2026-03-30T18:45:41.016131Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":20,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p7-002\\",\\"module_name\\":\\"SSRF via User-Controlled Webhook and Slack Job Address Parameters\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"ssrf-webhook-jobservice\\",\\"description\\":\\"# Phase 7 Enriched Finding: P7-002\\\\n\\\\n## Finding Details\\\\n\\\\n| Field | Value |\\\\n|-------|-------|\\\\n| **Finding ID** | P7-002 |\\\\n| **Source SAST IDs** | SAST-002 |\\\\n| **Tool** | Semgrep (harbor-ssrf-job-http-client) + manual analysis |\\\\n| **Title** | SSRF via User-Controlled Webhook and Slack Job Address Parameters |\\\\n| **Severity** | HIGH |\\\\n| **Confidence** | HIGH |\\\\n| **CWE** | CWE-918 (Server-Side Request Forgery) |\\\\n\\\\nPoC-Status: theoretical\\\\n\\\\n## Vulnerability Classification\\\\n\\\\n**Type**: Security (exploitable vulnerability with privilege escalation)\\\\n\\\\n## Reachability Assessment\\\\n\\\\n**Status**: CONFIRMED REACHABLE\\\\n\\\\n**Evidence**:\\\\n- CodeQL: Data flow slice `DFD-2` in `call-graph-slices.json` confirms end-to-end path\\\\n- Semgrep: Custom rule `harbor-ssrf-job-http-client` confirms SSRF pattern\\\\n- Trust Boundaries: TB-5 (Core API <-> Job Service) and TB-8 (Job Service -> External)\\\\n- Sinks File: `sinks.json` lists both webhook and slack job at `http.Client.Do()` calls\\\\n\\\\n## Attacker-Controlled Input Path\\\\n\\\\n**Entry Point 1 (Webhook)**: HTTP POST API\\\\n```\\\\nPOST /api/v2.0/projects/{id}/webhook/policies\\\\nContent-Type: application/json\\\\n\\\\n{\\\\n  \\\\\\"name\\\\\\": \\\\\\"my-webhook\\\\\\",\\\\n  \\\\\\"event_types\\\\\\": [\\\\\\"ARTIFACT_PUSHED\\\\\\"],\\\\n  \\\\\\"address\\\\\\": \\\\\\"http://169.254.169.254/latest/meta-data/\\\\\\",  // <- ATTACKER CONTROLLED\\\\n  \\\\\\"skip_cert_verify\\\\\\": true\\\\n}\\\\n```\\\\n\\\\n**Entry Point 2 (Slack via Preheat)**: HTTP POST API\\\\n```\\\\nPOST /api/v2.0/projects/{id}/preheat/policies\\\\nContent-Type: application/json\\\\n\\\\n{\\\\n  \\\\\\"provider_name\\\\\\": \\\\\\"slack\\\\\\",\\\\n  \\\\\\"name\\\\\\": \\\\\\"preheat-to-internal\\\\\\",\\\\n  \\\\\\"dest_registry\\\\\\": \\\\\\"http://internal-registry:5000\\\\\\",  // <- ATTACKER CONTROLLED\\\\n  \\\\\\"address\\\\\\": \\\\\\"http://192.168.1.100:8080/internal-admin\\\\\\"  // <- SSRF TARGET\\\\n}\\\\n```\\\\n\\\\n**Attack Flow**:\\\\n1. Attacker with project-admin role creates webhook/preheat policy with internal URL\\\\n2. Policy stored in database (`notification_policy` or `p2p_preheat_policy` table)\\\\n3. Event trigger (artifact pushed, preheat scheduled) -> job queued to Redis\\\\n4. JobService dequeues job -> `WebhookJob.execute()` or `SlackJob.execute()` invoked\\\\n5. Job parameters extracted: `address` field (line 103 webhook_job.go, line 120 slack_job.go)\\\\n6. HTTP request constructed to attacker-specified URL: `http.NewRequest(POST, address, ...)`\\\\n7. HTTP client executes request: `wj.client.Do(req)` (line 120 webhook_job.go)\\\\n8. **No validation** of URL scheme, destination IP range, or DNS target\\\\n\\\\n## Code Locations & Snippets\\\\n\\\\n### Webhook Job (Primary SSRF Point)\\\\n\\\\n**File**: `src/jobservice/job/impl/notification/webhook_job.go`\\\\n**Lines**: 103-120\\\\n**Function**: `WebhookJob.execute()`\\\\n\\\\n```go\\\\n// Line 103: Address read from params (user-controlled)\\\\naddress := params[\\\\\\"address\\\\\\"].(string)\\\\n\\\\n// Line 105: HTTP request constructed with user-controlled URL\\\\nreq, err := http.NewRequest(http.MethodPost, address, bytes.NewReader([]byte(payload)))\\\\n\\\\n// Lines 91-96: skip_cert_verify also user-controlled\\\\nif v, ok := params[\\\\\\"skip_cert_verify\\\\\\"]; ok {\\\\n    if skipCertVerify, ok := v.(bool); ok && skipCertVerify {\\\\n        // TLS verification disabled for this request\\\\n        wj.client = httpHelper.clients[insecure]\\\\n    }\\\\n}\\\\n\\\\n// Line 120: SINK - HTTP client executes the request\\\\nresp, err := wj.client.Do(req)\\\\n```\\\\n\\\\n### Slack Job (Secondary SSRF Point)\\\\n\\\\n**File**: `src/jobservice/job/impl/notification/slack_job.go`\\\\n**Lines**: 120-136\\\\n**Function**: `SlackJob.execute()`\\\\n\\\\n```go\\\\n// Similar pattern: address from params, no validation, request sent to user-controlled URL\\\\naddress := params[\\\\\\"address\\\\\\"].(string)\\\\nreq, err := http.NewRequest(http.MethodPost, address, bytes.NewReader([]byte(payload)))\\\\nresp, err := sj.client.Do(req)\\\\n```\\\\n\\\\n## Vulnerability Analysis\\\\n\\\\n### Trust Boundary Crossing\\\\n\\\\n- **Primary Boundary**: TB-5 (Core API <-> Job Service via Redis queue)\\\\n  - Cross-service communication, shared secret auth protects Core-to-JobService\\\\n  - But Job Service runs with different privilege context (system-level outbound access)\\\\n\\\\n- **Secondary Boundary**: TB-8 (Job Service -> External/Internal endpoints)\\\\n  - Job Service makes HTTP requests to arbitrary targets\\\\n  - **NO URL validation**, no allowlist, no denylist\\\\n\\\\n### Attack Scenarios\\\\n\\\\n#### Scenario 1: Cloud Metadata Service Exfiltration\\\\n```\\\\n1. Attacker (project-admin) creates webhook with address=\\\\\\"http://169.254.169.254/latest/meta-data/\\\\\\"\\\\n2. Artifact push event triggers webhook\\\\n3. JobService makes HTTP POST to 169.254.169.254:80 (AWS/GCP/Azure metadata service)\\\\n4. Response contains credentials, instance metadata, role ARNs, secrets\\\\n5. Response logged in Job Service or returned to webhook callback\\\\n6. Attacker reads logs -> cloud credentials compromised\\\\n```\\\\n\\\\n#### Scenario 2: Internal Service Port Scanning & Exploitation\\\\n```\\\\n1. Attacker enumerates internal IPs: 10.0.0.0/8\\\\n2. Creates webhooks with addresses like \\\\\\"http://10.0.0.50:8080/admin\\\\\\", \\\\\\"http://10.0.0.50:6379\\\\\\"\\\\n3. JobService probes internal network topology\\\\n4. Discovers Redis (6379), Postgres (5432), internal admin panels\\\\n5. Sends crafted HTTP payloads to exploit internal services\\\\n```\\\\n\\\\n#### Scenario 3: Denial of Service on Internal Services\\\\n```\\\\n1. Attacker creates 1000 webhooks pointing to http://postgres-db:5432\\\\n2. Each webhook event sends HTTP request to Postgres\\\\n3. Internal service overwhelmed with HTTP connection attempts\\\\n4. Database connection pool exhausted -> service degradation\\\\n```\\\\n\\\\n#### Scenario 4: Combined with skip_cert_verify for MitM\\\\n```\\\\n1. Attacker is network-adjacent (same VPC, compromised host)\\\\n2. Creates webhook with skip_cert_verify=true\\\\n3. Targets internal TLS service (e.g., internal-api:443)\\\\n4. MitM attack on webhook delivery: attacker intercepts & modifies webhook payload\\\\n5. Internal system receives attacker-modified data\\\\n```\\\\n\\\\n### No Defensive Measures\\\\n\\\\nCurrent code has **ZERO** URL validation:\\\\n\\\\n| Validation | Present? | Details |\\\\n|-----------|----------|---------|\\\\n| Private IP filtering | NO | 10.x, 172.16-31.x, 192.168.x all allowed |\\\\n| Link-local filtering | NO | 169.254.x.x (AWS metadata) not blocked |\\\\n| Localhost filtering | NO | 127.0.0.1, ::1 allowed |\\\\n| Scheme allowlist | NO | ftp://, file://, gopher://, etc. all allowed |\\\\n| DNS pinning | NO | DNS resolution not pinned, rebinding possible |\\\\n| Timeout enforcement | IMPLICIT ONLY | Relies on HTTP client defaults |\\\\n| Port filtering | NO | All ports allowed |\\\\n\\\\n## Data Flow\\\\n\\\\n```\\\\nProject Admin User (authenticated)\\\\n    |\\\\nPOST /api/v2.0/projects/{id}/webhook/policies\\\\n    |\\\\ngo-swagger param binding -> notificationAPI.CreateWebhookPolicyOfProject()\\\\n    |\\\\nRequireProjectAccess() CHECK [PRESENT - authorization gate]\\\\n    |\\\\nnotificationController.CreatePolicy(ctx, policy)\\\\n    |\\\\npolicy.EventType = \\\\\\"ARTIFACT_PUSHED\\\\\\"\\\\npolicy.Address = \\\\\\"http://169.254.169.254/latest/meta-data/\\\\\\"  [TAINT: user-controlled]\\\\n    |\\\\npersistPolicy(ctx, policy)  [DATABASE STORE]\\\\n    |\\\\n[TIME PASSES: Artifact pushed to repository]\\\\n    |\\\\nEvent triggered -> Redis job queue\\\\n    |\\\\nJobService dequeue -> WebhookJob.Run()\\\\n    |\\\\nparams[\\\\\\"address\\\\\\"] = \\\\\\"http://169.254.169.254/latest/meta-data/\\\\\\"  [TAINT from DB]\\\\n    |\\\\nhttp.NewRequest(POST, address, payload)  [NO VALIDATION]\\\\n    |\\\\nwj.client.Do(req)  [SINK: SSRF executed]\\\\n    |\\\\nResponse from 169.254.169.254 [INFORMATION DISCLOSURE]\\\\n```\\\\n\\\\n## Recommended Fix\\\\n\\\\nImplement URL validation layer in `webhook_job.go` and `slack_job.go`:\\\\n\\\\n```go\\\\nfunc validateWebhookAddress(address string) error {\\\\n    u, err := url.Parse(address)\\\\n    if err != nil {\\\\n        return fmt.Errorf(\\\\\\"invalid URL: %w\\\\\\", err)\\\\n    }\\\\n\\\\n    // Reject non-HTTP(S) schemes\\\\n    if u.Scheme != \\\\\\"http\\\\\\" && u.Scheme != \\\\\\"https\\\\\\" {\\\\n        return fmt.Errorf(\\\\\\"only http and https schemes allowed, got: %s\\\\\\", u.Scheme)\\\\n    }\\\\n\\\\n    // Resolve hostname to IP\\\\n    host := u.Hostname()\\\\n    ips, err := net.LookupIP(host)\\\\n    if err != nil {\\\\n        return fmt.Errorf(\\\\\\"hostname resolution failed: %w\\\\\\", err)\\\\n    }\\\\n\\\\n    // Check each resolved IP\\\\n    for _, ip := range ips {\\\\n        // Reject RFC1918 private ranges\\\\n        if ip.IsPrivate() {\\\\n            return fmt.Errorf(\\\\\\"private IP range not allowed: %s\\\\\\", ip)\\\\n        }\\\\n\\\\n        // Reject link-local/metadata service\\\\n        if ip.IsLinkLocalUnicast() || ip.String() == \\\\\\"169.254.169.254\\\\\\" {\\\\n            return fmt.Errorf(\\\\\\"metadata service/link-local not allowed: %s\\\\\\", ip)\\\\n        }\\\\n\\\\n        // Reject loopback\\\\n        if ip.IsLoopback() {\\\\n            return fmt.Errorf(\\\\\\"loopback address not allowed: %s\\\\\\", ip)\\\\n        }\\\\n    }\\\\n\\\\n    return nil\\\\n}\\\\n```\\\\n\\\\nThen call in `execute()` before making request:\\\\n\\\\n```go\\\\nfunc (wj *WebhookJob) execute(_ job.Context, params map[string]any) error {\\\\n    address := params[\\\\\\"address\\\\\\"].(string)\\\\n\\\\n    // ADD THIS VALIDATION\\\\n    if err := validateWebhookAddress(address); err != nil {\\\\n        return fmt.Errorf(\\\\\\"webhook address validation failed: %w\\\\\\", err)\\\\n    }\\\\n\\\\n    // ... rest of existing code\\\\n}\\\\n```\\\\n\\\\n## Phase 8 Chamber Assignment\\\\n\\\\n**Chamber**: **Server-Side Request Forgery (SSRF-001)**\\\\n\\\\n**Rationale**:\\\\n- Exploitable by project-admin role (privilege escalation from user role)\\\\n- Reaches internal/external endpoints via job service\\\\n- Can access cloud metadata services (AWS/GCP/Azure credentials)\\\\n- Can probe/attack internal network topology\\\\n- High impact: credential disclosure, internal network reconnaissance, DoS\\\\n\\\\n## References\\\\n\\\\n- **CWE-918**: [Server-Side Request Forgery (SSRF)](https://cwe.mitre.org/data/definitions/918.html)\\\\n- **OWASP**: [Server-Side Request Forgery](https://owasp.org/www-community/attacks/Server-Side_Request_Forgery)\\\\n- **KB Report**:\\\\n  - TB-5: Core API <-> Job Service\\\\n  - TB-8: Job Service <-> External Endpoints (no URL allowlist/denylist)\\\\n  - Attack Surface: \\\\\\"Webhook endpoint URL\\\\\\" (line 183), \\\\\\"P2P preheat endpoint\\\\\\" (line 185)\\\\n- **Exploit Status**: Known vulnerability class; similar patterns in other registries (Harbor advisory 2020)\\\\n\\\\n## Notes for Reviewers\\\\n\\\\n1. **Severity Justification**: HIGH because:\\\\n   - Reaches internal services (metadata, databases, admin panels)\\\\n   - Can disclose cloud credentials\\\\n   - Available to project-admin role (relatively common privilege level)\\\\n   - No detection/logging of SSRF attempts\\\\n\\\\n2. **Exploitability**: VERY HIGH\\\\n   - No user interaction required (automatic on event trigger)\\\\n   - Can be triggered repeatedly\\\\n   - Works from any network location if project-admin role obtained\\\\n\\\\n3. **Impact**: CRITICAL\\\\n   - Credential exfiltration (cloud credentials, internal secrets)\\\\n   - Internal network reconnaissance\\\\n   - Denial of service on internal services\\\\n   - Combined with skip_cert_verify: MitM attacks on internal HTTPS\\\\n\\\\n4. **Related Findings**: SAST-012 (skip_cert_verify) compounds this vulnerability\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"firm\\",\\"tags\\":[\\"archon\\",\\"phase-7\\",\\"poc-theoretical\\",\\"CWE-918\\"],\\"status\\":\\"open\\",\\"cwe_id\\":\\"CWE-918\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/jobservice/job/impl/notification/webhook_job.go\\",\\"matched_at\\":[\\"src/jobservice/job/impl/notification/webhook_job.go\\",\\"src/jobservice/job/impl/notification/slack_job.go\\"],\\"finding_hash\\":\\"81129a3ac1b981b89cb19de19315a371\\",\\"found_at\\":\\"2026-03-30T18:45:41.016132Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":21,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p7-003\\",\\"module_name\\":\\"SQL Injection via fmt.Sprintf in Multiple DAOs (44 Confirmed Flows)\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"sql-injection-fmt-sprintf\\",\\"description\\":\\"# Phase 7 Enriched Finding: P7-003\\\\n\\\\n## Finding Details\\\\n\\\\n| Field | Value |\\\\n|-------|-------|\\\\n| **Finding ID** | P7-003 |\\\\n| **Source SAST ID** | SAST-003 |\\\\n| **Tool** | CodeQL (harbor/raw-sql-fmt-sprintf) |\\\\n| **Title** | SQL Injection via fmt.Sprintf in Multiple DAOs (44 Confirmed Flows) |\\\\n| **Severity** | HIGH |\\\\n| **Confidence** | MEDIUM |\\\\n| **CWE** | CWE-89 (SQL Injection) |\\\\n\\\\n## PoC Status\\\\n\\\\n```\\\\nPoC-Status: theoretical\\\\nPoC-Block-Reason: All 44 fmt.Sprintf -> Raw() flows currently use internal sources (time.Time, hardcoded filterMap keys, job status constants). No user-controlled input reaches the interpolation points at the current commit. Structural vulnerability is confirmed and pattern matches 3 prior Harbor CVEs.\\\\n```\\\\n\\\\n## Vulnerability Classification\\\\n\\\\n**Type**: Security (latent vulnerability - structurally exploitable, currently not directly user-controlled)\\\\n\\\\n**Status**: Dangerous pattern; not immediately exploitable at current commit but high risk for regression\\\\n\\\\n## Reachability Assessment\\\\n\\\\n**Status**: CONFIRMED BUT NOT CURRENTLY EXPLOITABLE\\\\n\\\\n**Evidence**:\\\\n- CodeQL: 44 flows confirmed by custom query `RawSqlFmtSprintf.ql`\\\\n- Sink Type: `Raw()` and `FilterRaw()` database sink methods\\\\n- Trust Boundary: TB-3 (Core API <-> PostgreSQL Database)\\\\n- Current Source: Internal time values, internal allowlist keys\\\\n- Risk: **If source changes or new code copies pattern, becomes exploitable**\\\\n\\\\n## Attacker-Controlled Input Path\\\\n\\\\n**Current Status**: None (all 44 flows use internal sources)\\\\n\\\\n**Hypothetical Attack Scenario** (if pattern regresses with user input):\\\\n```\\\\nGET /api/v2.0/artifacts?q=field~value\\\\n    |\\\\ngo-swagger param binding -> params.Q (*string)\\\\n    |\\\\nhandler.BuildQuery() -> lib/q/query.go:Build()  [COULD TAINT HERE]\\\\n    |\\\\nlib/orm/query.go:QuerySetter.FilterFunc()\\\\n    |\\\\npkg/securityhub/dao/security.go:exactMatchFilter()\\\\n    |\\\\nfmt.Sprintf(\\\\\\" and %v = ?\\\\\\", col)  [col from filterMap, if map grows]\\\\n    |\\\\normer.Raw(sql).QueryRows()  [SINK]\\\\n    |\\\\nPostgreSQL: SQL Injection\\\\n```\\\\n\\\\n## Code Locations & Snippets\\\\n\\\\n### Critical Pattern 1: Time Value Interpolation (artifactrash/dao)\\\\n\\\\n**File**: `src/pkg/artifactrash/dao/dao.go`\\\\n**Lines**: 89, 106\\\\n**Function**: `Filter()`, `Flush()`\\\\n\\\\n```go\\\\n// Line 89 - VULNERABLE PATTERN (but time value is internal)\\\\nsql := fmt.Sprintf(\\\\n    `SELECT aft.* FROM artifact_trash AS aft\\\\n     LEFT JOIN artifact af ON (aft.repository_name=af.repository_name AND aft.digest=af.digest)\\\\n     WHERE (af.digest IS NULL AND af.repository_name IS NULL) AND aft.creation_time <= TO_TIMESTAMP(\'%f\')`,\\\\n    float64(cutOff.UnixNano())/float64((time.Second))\\\\n)\\\\n_, err = ormer.Raw(sql).QueryRows(&deletedAfs)\\\\n\\\\n// Line 106 - SAME PATTERN\\\\nsql := fmt.Sprintf(\\\\n    `DELETE FROM artifact_trash where creation_time <= TO_TIMESTAMP(\'%f\')`,\\\\n    float64(cutOff.UnixNano())/float64((time.Second))\\\\n)\\\\n_, err = ormer.Raw(sql).Exec()\\\\n```\\\\n\\\\n**Problem**: Timestamp is interpolated as string, not parameterized\\\\n\\\\n**Why it\'s not exploitable now**: `cutOff` is `time.Time` value controlled by internal garbage collection scheduler. However, if this method ever receives user-controlled time input, it becomes SQL injection.\\\\n\\\\n### Critical Pattern 2: Column Name from Map (securityhub/dao)\\\\n\\\\n**File**: `src/pkg/securityhub/dao/security.go`\\\\n**Lines**: 135, 148, 267, 302\\\\n**Function**: `exactMatchFilter()`, `rangeFilter()`\\\\n\\\\n```go\\\\n// Line 135 - VULNERABLE PATTERN (map key is from internal allowlist)\\\\nsqlStr = fmt.Sprintf(\\\\\\" and %v = ?\\\\\\", col)\\\\n\\\\n// Line 148 - SAME PATTERN with range operator\\\\nsqlStr = fmt.Sprintf(\\\\\\" and %v >= ? and %v <= ?\\\\\\", col, col)\\\\n```\\\\n\\\\n**Problem**: Column name `col` is interpolated directly into SQL. While currently sourced from internal `filterMap` allowlist, this is fragile.\\\\n\\\\n**Why it\'s risky**: If `filterMap` is extended with new keys (perhaps from config or external source) without validation, injection occurs.\\\\n\\\\n### Pattern 3: Multiple Additional Locations\\\\n\\\\n**All 44 flows use one of these two patterns:**\\\\n\\\\n| Location | Pattern | Current Source | Risk |\\\\n|----------|---------|-----------------|------|\\\\n| artifactrash/dao:89 | Time interpolation | Internal cutOff | LOW if time source immutable |\\\\n| artifactrash/dao:106 | Time interpolation | Internal cutOff | LOW if time source immutable |\\\\n| securityhub/dao:135 | Column name from map | Internal filterMap | MEDIUM - allowlist could grow |\\\\n| securityhub/dao:148 | Column name from map | Internal filterMap | MEDIUM - allowlist could grow |\\\\n| securityhub/dao:267 | Column name from map | Internal filterMap | MEDIUM |\\\\n| securityhub/dao:302 | Column name from map | Internal filterMap | MEDIUM |\\\\n| quota/dao:68 | Numeric interpolation | Internal count? | VARIES |\\\\n| quota/dao:237 | Numeric interpolation | Internal count? | VARIES |\\\\n| task/dao/execution:321 | Unknown pattern | Need audit | VARIES |\\\\n| task/dao/execution:341 | Unknown pattern | Need audit | VARIES |\\\\n| project/dao:223 | Unknown pattern | Need audit | VARIES |\\\\n| member/dao:248 | Unknown pattern | Need audit | VARIES |\\\\n| usergroup/dao:85-177 | Unknown pattern | Need audit | VARIES |\\\\n| blob/dao:203 | Unknown pattern | Need audit | VARIES |\\\\n\\\\n## Vulnerability Analysis\\\\n\\\\n### Structural vs. Practical Exploitability\\\\n\\\\n| Aspect | Status | Reasoning |\\\\n|--------|--------|-----------|\\\\n| **Structural vulnerability** | YES | fmt.Sprintf + Raw() is textbook SQL injection pattern |\\\\n| **Currently exploitable** | NO | Sources are internal (time, column allowlist) |\\\\n| **Regression risk** | VERY HIGH | Same pattern caused CVE-2019-19029, CVE-2019-19026, CVE-2024-22261 |\\\\n| **Code review required** | YES | Each of 44 flows needs source trace to confirm |\\\\n\\\\n### Historical Context: CVE Pattern\\\\n\\\\nHarbor has had multiple SQL injection CVEs using similar patterns:\\\\n\\\\n- **CVE-2019-19029**: \\\\\\"Improper Neutralization of Special Elements used in an SQL Command\\\\\\"\\\\n- **CVE-2019-19026**: Same pattern in different DAO\\\\n- **CVE-2024-22261**: Recent regression with fmt.Sprintf\\\\n\\\\nThis finding shows the **same anti-pattern is still present** in multiple places.\\\\n\\\\n### Worst-Case Attack Scenario\\\\n\\\\nIf a future code change makes `FilterFunc` or `FilterMap` user-controllable:\\\\n\\\\n```sql\\\\n-- Attacker supplies: q=creation_time\'; DROP TABLE artifact_trash; --\\\\n-- Becomes:\\\\nSELECT * FROM artifact_trash\\\\n  WHERE ... AND creation_time\'; DROP TABLE artifact_trash; -- = ?\\\\n\\\\n-- Result: Table dropped, massive data loss\\\\n```\\\\n\\\\nOr information disclosure:\\\\n```sql\\\\n-- Attacker supplies: q=replication_policy_id UNION SELECT password FROM harbor_user; --\\\\n-- Result: User passwords leaked\\\\n```\\\\n\\\\n## Data Flow (Hypothetical Exploitable Scenario)\\\\n\\\\n```\\\\nExternal API Client\\\\n    |\\\\nGET /api/v2.0/artifacts?q=malicious_sql_injection\\\\n    |\\\\ngo-swagger param binding -> handler receives params.Q\\\\n    |\\\\nlib/q/query.go:Build(q)  [IF q becomes tainted here]\\\\n    |\\\\nlib/orm/query.go:QuerySetter.FilterFunc(col, op, value)  [IF value interpolated]\\\\n    |\\\\nfmt.Sprintf(\\\\\\" and %s = ?\\\\\\", value)  [NO VALIDATION OF value]\\\\n    |\\\\normer.Raw(sql).QueryRows()  [SINK: SQL executed]\\\\n    |\\\\nPostgreSQL: Attacker\'s SQL payload executed\\\\n```\\\\n\\\\n## Recommended Fix\\\\n\\\\nReplace all 44 instances with parameterized queries:\\\\n\\\\n### Fix for Time Interpolation (artifactrash)\\\\n\\\\n**Before**:\\\\n```go\\\\nsql := fmt.Sprintf(\\\\n    `SELECT aft.* FROM artifact_trash ... WHERE aft.creation_time <= TO_TIMESTAMP(\'%f\')`,\\\\n    float64(cutOff.UnixNano())/float64((time.Second))\\\\n)\\\\n_, err = ormer.Raw(sql).QueryRows(&deletedAfs)\\\\n```\\\\n\\\\n**After**:\\\\n```go\\\\n// Use parameterized query\\\\nsql := `SELECT aft.* FROM artifact_trash ...\\\\n        LEFT JOIN artifact af ON (aft.repository_name=af.repository_name AND aft.digest=af.digest)\\\\n        WHERE (af.digest IS NULL AND af.repository_name IS NULL) AND aft.creation_time <= ?`\\\\n_, err = ormer.Raw(sql, cutOff).QueryRows(&deletedAfs)\\\\n```\\\\n\\\\n### Fix for Column Name Interpolation (securityhub)\\\\n\\\\n**Before**:\\\\n```go\\\\nsqlStr = fmt.Sprintf(\\\\\\" and %v = ?\\\\\\", col)\\\\n```\\\\n\\\\n**After**:\\\\n```go\\\\n// Validate col is in allowlist\\\\nif _, ok := allowedColumns[col]; !ok {\\\\n    return fmt.Errorf(\\\\\\"invalid column: %s\\\\\\", col)\\\\n}\\\\n// Use parameterized query (column names can\'t be parameterized, but allowlist validates)\\\\nsqlStr = fmt.Sprintf(\\\\\\" and \\\\\\\\\\\\\\"%s\\\\\\\\\\\\\\" = ?\\\\\\", col)  // Use quoted identifier for safety\\\\n```\\\\n\\\\n## Phase 8 Chamber Assignment\\\\n\\\\n**Chamber**: **Database Security (SQL-001)**\\\\n\\\\n**Rationale**:\\\\n- Crosses trust boundary TB-3 (API <-> Database)\\\\n- Uses known-dangerous pattern from prior CVEs\\\\n- Affects confidentiality (data exfiltration) and integrity (data modification)\\\\n- High regression risk requires monitoring\\\\n\\\\n## References\\\\n\\\\n- **CWE-89**: [Improper Neutralization of Special Elements used in an SQL Command (\'SQL Injection\')](https://cwe.mitre.org/data/definitions/89.html)\\\\n- **OWASP**: [SQL Injection](https://owasp.org/www-community/attacks/SQL_Injection)\\\\n- **KB Report**: TB-3 (Core API <-> Database) - \\\\\\"CRITICAL: Several raw fmt.Sprintf SQL patterns exist\\\\\\"\\\\n- **Prior CVEs**:\\\\n  - CVE-2019-19029 - SQL injection in similar pattern\\\\n  - CVE-2019-19026 - SQL injection in different DAO\\\\n  - CVE-2024-22261 - Recent regression with fmt.Sprintf\\\\n- **Beego ORM**: Uses parameterized queries by default; Raw() requires manual parameterization\\\\n\\\\n## Notes for Reviewers\\\\n\\\\n1. **Why HIGH Severity Despite Internal Source**:\\\\n   - Code smell indicates latent vulnerability\\\\n   - Same pattern has caused 3+ prior CVEs\\\\n   - Risk of regression if developers copy pattern with user input\\\\n   - One careless refactor could make this exploitable\\\\n\\\\n2. **Confidence is MEDIUM because**:\\\\n   - Current sources are not user-controlled\\\\n   - But structural vulnerability is confirmed\\\\n   - Need manual code review to trace each of 44 flows\\\\n\\\\n3. **Recommended Action for Phase 8**:\\\\n   - Refactor to parameterized queries (best practice, required for PCI-DSS)\\\\n   - Audit each DAO to confirm current source is truly immutable\\\\n   - Add linting rule to prevent future fmt.Sprintf + Raw() combinations\\\\n   - Consider one-time code audit of all fmt.Sprintf SQL patterns\\\\n\\\\n4. **Immediate Risk**: LOW\\\\n5. **Long-term Risk**: MEDIUM-HIGH (regression without code discipline)\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-7\\",\\"poc-theoretical\\",\\"CWE-89\\"],\\"status\\":\\"open\\",\\"cwe_id\\":\\"CWE-89\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/pkg/artifactrash/dao/dao.go\\",\\"matched_at\\":[\\"src/pkg/artifactrash/dao/dao.go\\",\\"src/pkg/securityhub/dao/security.go\\"],\\"finding_hash\\":\\"dadb65650553e86e3150a546baa5101f\\",\\"found_at\\":\\"2026-03-30T18:45:41.016133Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":22,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p7-004\\",\\"module_name\\":\\"Decompression Bomb via Unbounded io.Copy from tar.Reader\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"decompression-bomb\\",\\"description\\":\\"# Phase 7 Enriched Finding: P7-004\\\\n\\\\n## Finding Details\\\\n\\\\n| Field | Value |\\\\n|-------|-------|\\\\n| **Finding ID** | P7-004 |\\\\n| **Source SAST ID** | SAST-004 |\\\\n| **Tool** | Semgrep (go.lang.security.decompression_bomb + harbor-decompression-bomb-tar) |\\\\n| **Title** | Decompression Bomb via Unbounded io.Copy from tar.Reader |\\\\n| **Severity** | MEDIUM |\\\\n| **Confidence** | HIGH |\\\\n| **CWE** | CWE-400 (Uncontrolled Resource Consumption) |\\\\n\\\\n## Vulnerability Classification\\\\n\\\\n**Type**: Security (exploitable denial of service via resource exhaustion)\\\\n\\\\n## Reachability Assessment\\\\n\\\\n**Status**: CONFIRMED REACHABLE\\\\n\\\\n**Evidence**:\\\\n- Code inspection: `io.Copy()` called without `io.LimitReader` wrapper\\\\n- Call flow: Artifact push → parser → tar extraction → unbounded buffer\\\\n- Trust Boundary: TB-6 (Registry ↔ Core artifact processor)\\\\n- Sink type: `io.Copy()` from `tar.Reader` at 2 locations\\\\n\\\\n## Attacker-Controlled Input Path\\\\n\\\\n**Entry Point**: OCI Registry V2 blob upload API\\\\n\\\\n```\\\\nPUT /v2/{repository}/blobs/uploads/{uuid}?digest=sha256:...\\\\nContent-Type: application/octet-stream\\\\n\\\\n[ATTACKER-CONTROLLED TAR ARCHIVE CONTENT]\\\\n```\\\\n\\\\n**Attack Flow**:\\\\n1. Attacker with push access uploads artifact layer\\\\n2. Layer contains tar.gz compressed archive\\\\n3. Core API processes artifact (display, catalog, analysis)\\\\n4. `controller/artifact/processor/cnai/parser/util.go:untar()` called\\\\n5. tar.Reader iterates entries\\\\n6. `io.Copy(&buf, tr)` streams entire entry content to bytes.Buffer\\\\n7. No maximum size enforcement\\\\n8. Attacker crafts tar archive:\\\\n   - Single entry file: `/model.tar.gz`\\\\n   - Original size: 100 MB\\\\n   - Compressed: 1 MB\\\\n   - After extraction: **100 GB** (1000x expansion)\\\\n9. Core container memory exhausted → OOM kill or service hung\\\\n\\\\n## Code Locations & Snippets\\\\n\\\\n### Location 1: CNAI Model Parser\\\\n\\\\n**File**: `src/controller/artifact/processor/cnai/parser/util.go`\\\\n**Line**: 45\\\\n**Function**: `untar()`\\\\n\\\\n```go\\\\nfunc untar(reader io.Reader) ([]byte, error) {\\\\n    tr := tar.NewReader(reader)\\\\n    var buf bytes.Buffer  // [NO SIZE LIMIT - PROBLEM!]\\\\n    for {\\\\n        header, err := tr.Next()\\\\n        if err == io.EOF {\\\\n            break\\\\n        }\\\\n\\\\n        if err != nil {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to read tar header: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        // skip the directory.\\\\n        if header.Typeflag == tar.TypeDir {\\\\n            continue\\\\n        }\\\\n\\\\n        // [VULNERABLE SINK: io.Copy with no limit]\\\\n        if _, err := io.Copy(&buf, tr); err != nil {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to copy content to buffer: %w\\\\\\", err)\\\\n        }\\\\n    }\\\\n\\\\n    return buf.Bytes(), nil\\\\n}\\\\n```\\\\n\\\\n**Problem**:\\\\n- `io.Copy` streams all data from tar reader to buffer\\\\n- No maximum size enforcement\\\\n- bytes.Buffer grows unbounded in memory\\\\n- If tar entry is 100 GB, entire 100 GB loaded into RAM\\\\n\\\\n### Location 2: Digest Calculator (Scan Export)\\\\n\\\\n**File**: `src/pkg/scan/export/digest_calculator.go`\\\\n**Line**: 40\\\\n**Function**: (Similar untar pattern)\\\\n\\\\n```go\\\\n// Same untar() function or similar pattern\\\\nif _, err := io.Copy(&buf, tr); err != nil {\\\\n    return nil, fmt.Errorf(\\\\\\"failed to copy content to buffer: %w\\\\\\", err)\\\\n}\\\\n```\\\\n\\\\n## Vulnerability Analysis\\\\n\\\\n### Attack Prerequisites\\\\n\\\\n| Requirement | Status | Notes |\\\\n|-------------|--------|-------|\\\\n| **Repository access** | Required | Push role on any repository |\\\\n| **Ability to craft artifacts** | Required | Trivial with tar/gzip tools |\\\\n| **Exploit triggering** | Automatic | Happens when Core processes artifact |\\\\n| **Privilege level needed** | User | Any authenticated user with push role |\\\\n\\\\n### Resource Exhaustion Mechanism\\\\n\\\\n**Compression Bomb Example**:\\\\n\\\\n```bash\\\\n# Create 100 GB zero-filled file\\\\ndd if=/dev/zero bs=1M count=100K | tar czf bomb.tar.gz -\\\\n\\\\n# Result:\\\\n# - Compressed size: ~1-10 MB (excellent compression ratio for zeros)\\\\n# - Extracted size: 100 GB\\\\n# - Expansion ratio: 10,000x - 100,000x\\\\n```\\\\n\\\\n**Harbor Processing**:\\\\n1. Registry receives 10 MB blob upload\\\\n2. Core retrieves blob: 10 MB on disk\\\\n3. Core processes artifact (CNAI parser)\\\\n4. tar extraction begins: untar() called\\\\n5. io.Copy() decompresses and loads into bytes.Buffer\\\\n6. 10 MB becomes 100 GB in RAM\\\\n7. Core process memory limit exceeded\\\\n8. OOM killer terminates Core pod\\\\n9. Service unavailable until restart\\\\n\\\\n### Memory Exhaustion Impact\\\\n\\\\n| Aspect | Impact |\\\\n|--------|--------|\\\\n| **Core container memory usage** | Grows from ~50 MB to 100+ GB |\\\\n| **Container memory limit** | Typically 2-4 GB → immediate OOM |\\\\n| **Service availability** | Down for 30+ seconds (pod restart) |\\\\n| **Cascading failures** | Dependent services (Portal, Registry Proxy) can\'t reach Core |\\\\n| **Operator experience** | Appears as random service outages, hard to debug |\\\\n\\\\n### Denial of Service Scenarios\\\\n\\\\n**Scenario 1: Targeted Service Disruption**\\\\n```\\\\n1. Attacker creates webhook that monitors artifact pushes\\\\n2. Pushes decompression bomb\\\\n3. Core OOM kills → service down\\\\n4. Repeated every minute\\\\n5. Effectively DoS attack for duration of exploit\\\\n```\\\\n\\\\n**Scenario 2: Resource Starvation**\\\\n```\\\\n1. Attacker uploads multiple artifacts with different decompression ratios\\\\n2. Each one consumed during catalog operations\\\\n3. Cluster-wide memory pressure\\\\n4. Performance degradation across all services\\\\n```\\\\n\\\\n**Scenario 3: Backup/Export Triggers**\\\\n```\\\\n1. Decompression bomb uploaded\\\\n2. Operator initiates export/backup job\\\\n3. Export process scans artifacts and parses them\\\\n4. Export job OOM kills during decompression\\\\n5. Backup corrupted, restore capability lost\\\\n```\\\\n\\\\n## Recommended Fix\\\\n\\\\n### Fix Strategy 1: io.LimitReader (Recommended)\\\\n\\\\n```go\\\\nconst maxArtifactSize = 50 * 1024 * 1024  // 50 MB for metadata\\\\n\\\\nfunc untar(reader io.Reader) ([]byte, error) {\\\\n    tr := tar.NewReader(reader)\\\\n    var buf bytes.Buffer\\\\n    for {\\\\n        header, err := tr.Next()\\\\n        if err == io.EOF {\\\\n            break\\\\n        }\\\\n\\\\n        if err != nil {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to read tar header: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        // skip the directory.\\\\n        if header.Typeflag == tar.TypeDir {\\\\n            continue\\\\n        }\\\\n\\\\n        // [FIX: Wrap tar reader with size limit]\\\\n        limitedReader := io.LimitReader(tr, maxArtifactSize)\\\\n        n, err := io.Copy(&buf, limitedReader)\\\\n        if err != nil && err != io.EOF {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to copy content to buffer: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        // Verify we didn\'t hit the limit\\\\n        if n >= maxArtifactSize {\\\\n            return nil, fmt.Errorf(\\\\\\"artifact exceeds maximum size: %d bytes\\\\\\", maxArtifactSize)\\\\n        }\\\\n    }\\\\n\\\\n    return buf.Bytes(), nil\\\\n}\\\\n```\\\\n\\\\n### Fix Strategy 2: Total Size Tracking\\\\n\\\\n```go\\\\nfunc untar(reader io.Reader) ([]byte, error) {\\\\n    const maxTotalSize = 100 * 1024 * 1024  // 100 MB total\\\\n    tr := tar.NewReader(reader)\\\\n    var buf bytes.Buffer\\\\n    totalSize := int64(0)\\\\n\\\\n    for {\\\\n        header, err := tr.Next()\\\\n        if err == io.EOF {\\\\n            break\\\\n        }\\\\n\\\\n        if err != nil {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to read tar header: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        if header.Typeflag == tar.TypeDir {\\\\n            continue\\\\n        }\\\\n\\\\n        // Check total size before copying\\\\n        if totalSize+header.Size > maxTotalSize {\\\\n            return nil, fmt.Errorf(\\\\\\"total archive size exceeds limit\\\\\\")\\\\n        }\\\\n\\\\n        if _, err := io.Copy(&buf, tr); err != nil {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to copy content to buffer: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        totalSize += header.Size\\\\n    }\\\\n\\\\n    return buf.Bytes(), nil\\\\n}\\\\n```\\\\n\\\\n### Fix Strategy 3: Per-Entry Limit + Total Limit (Most Robust)\\\\n\\\\n```go\\\\nconst (\\\\n    maxPerEntry   = 10 * 1024 * 1024   // 10 MB per file\\\\n    maxTotalSize  = 50 * 1024 * 1024   // 50 MB total\\\\n)\\\\n\\\\nfunc untar(reader io.Reader) ([]byte, error) {\\\\n    tr := tar.NewReader(reader)\\\\n    var buf bytes.Buffer\\\\n    totalSize := int64(0)\\\\n\\\\n    for {\\\\n        header, err := tr.Next()\\\\n        if err == io.EOF {\\\\n            break\\\\n        }\\\\n\\\\n        if err != nil {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to read tar header: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        if header.Typeflag == tar.TypeDir {\\\\n            continue\\\\n        }\\\\n\\\\n        // Per-entry limit\\\\n        if header.Size > maxPerEntry {\\\\n            return nil, fmt.Errorf(\\\\\\"entry %s exceeds max size: %d > %d\\\\\\",\\\\n                header.Name, header.Size, maxPerEntry)\\\\n        }\\\\n\\\\n        // Total size check\\\\n        if totalSize+header.Size > maxTotalSize {\\\\n            return nil, fmt.Errorf(\\\\\\"total archive size would exceed limit\\\\\\")\\\\n        }\\\\n\\\\n        // Limit this entry\'s copy\\\\n        limitedReader := io.LimitReader(tr, header.Size)\\\\n        if _, err := io.Copy(&buf, limitedReader); err != nil {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to copy content to buffer: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        totalSize += header.Size\\\\n    }\\\\n\\\\n    return buf.Bytes(), nil\\\\n}\\\\n```\\\\n\\\\n## Phase 8 Chamber Assignment\\\\n\\\\n**Chamber**: **Resource Exhaustion (DoS-001)**\\\\n\\\\n**Rationale**:\\\\n- Exploitable by any authenticated user with push role\\\\n- Causes denial of service via memory exhaustion\\\\n- Affects system availability\\\\n- Easy to trigger (just push crafted artifact)\\\\n- Impacts all services dependent on Core API\\\\n\\\\n## References\\\\n\\\\n- **CWE-400**: [Uncontrolled Resource Consumption](https://cwe.mitre.org/data/definitions/400.html)\\\\n- **OWASP**: [Zip Slip and Compression Bomb](https://owasp.org/www-community/attacks/Zip_Slip)\\\\n- **Bzip2 Compression Bomb**: `bomb.zip` - classic 915 KB file that expands to 4.5 TB\\\\n- **KB Report**: TB-6 (Registry ↔ Core artifact processor)\\\\n- **Related**: Tar bomb vulnerabilities in Docker, Kubernetes, container runtimes\\\\n\\\\n## Notes for Reviewers\\\\n\\\\n1. **Severity**: MEDIUM not HIGH because:\\\\n   - Requires authentication (push role)\\\\n   - Causes DoS, not data breach\\\\n   - Container restart recovers from attack\\\\n   - But: repeated attacks could cause continuous outages\\\\n\\\\n2. **Exploitability**: HIGH\\\\n   - No special tools needed (standard tar/gzip)\\\\n   - Automatic triggering on artifact processing\\\\n   - Simple one-liner to create bomb\\\\n\\\\n3. **Impact**: Medium (availability only, not confidentiality/integrity)\\\\n\\\\n4. **Recommended Maximum Sizes**:\\\\n   - CNAI model metadata: 50 MB (reasonable for model config JSON)\\\\n   - Scan export: 100 MB (may need tuning based on real usage)\\\\n   - Per-entry limit: 10 MB (prevents individual large files)\\\\n\\\\n5. **Testing**:\\\\n   - Create test tar.gz bomb\\\\n   - Push to Harbor repository\\\\n   - Monitor Core container memory\\\\n   - Verify it exceeds limits without fix\\\\n   - Verify fix prevents OOM\\\\n\\\\n6. **Related Findings**:\\\\n   - SAST-004 addresses both CNAI parser and digest calculator\\\\n   - Both should be fixed with same size constants\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"tags\\":[\\"archon\\",\\"phase-7\\",\\"CWE-400\\"],\\"status\\":\\"open\\",\\"cwe_id\\":\\"CWE-400\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/controller/artifact/processor/cnai/parser/util.go\\",\\"matched_at\\":[\\"src/controller/artifact/processor/cnai/parser/util.go\\",\\"src/pkg/scan/export/digest_calculator.go\\"],\\"finding_hash\\":\\"35ff7dde550c2fbfb986fc2df3bee39f\\",\\"found_at\\":\\"2026-03-30T18:45:41.016134Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":23,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p7-005\\",\\"module_name\\":\\"Insecure Webhook HTTP Transport with User-Controllable skip_cert_verify Flag\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"webhook-insecure-tls\\",\\"description\\":\\"# Phase 7 Enriched Finding: P7-005\\\\n\\\\n## Finding Details\\\\n\\\\n| Field | Value |\\\\n|-------|-------|\\\\n| **Finding ID** | P7-005 |\\\\n| **Source SAST ID** | SAST-012 |\\\\n| **Tool** | Manual code review |\\\\n| **Title** | Insecure Webhook HTTP Transport with User-Controllable skip_cert_verify Flag |\\\\n| **Severity** | MEDIUM |\\\\n| **Confidence** | HIGH |\\\\n| **CWE** | CWE-295 (Improper Certificate Validation) |\\\\n\\\\n## Vulnerability Classification\\\\n\\\\n**Type**: Security (Man-in-the-middle attack vector via misconfiguration)\\\\n\\\\n## Reachability Assessment\\\\n\\\\n**Status**: CONFIRMED REACHABLE\\\\n\\\\n**Evidence**:\\\\n- User-controlled parameter: `skip_cert_verify` in webhook policy\\\\n- Code path: Parameter flows from REST API → database → job service\\\\n- Sink: HTTP client configured with `InsecureSkipVerify: true`\\\\n- Trust Boundary: TB-8 (Job Service ↔ External webhook targets)\\\\n\\\\n## Attacker-Controlled Input Path\\\\n\\\\n**Entry Point**: HTTP POST API for webhook policy creation\\\\n\\\\n```\\\\nPOST /api/v2.0/projects/{projectId}/webhook/policies\\\\nAuthorization: Bearer <token>\\\\nContent-Type: application/json\\\\n\\\\n{\\\\n  \\\\\\"name\\\\\\": \\\\\\"my-webhook\\\\\\",\\\\n  \\\\\\"event_types\\\\\\": [\\\\\\"ARTIFACT_PUSHED\\\\\\"],\\\\n  \\\\\\"address\\\\\\": \\\\\\"https://internal-service:8443/webhook\\\\\\",\\\\n  \\\\\\"skip_cert_verify\\\\\\": true  // <- ATTACKER CONTROLLED\\\\n}\\\\n```\\\\n\\\\n**Attack Flow**:\\\\n1. Project admin (or malicious admin) creates webhook policy with `skip_cert_verify=true`\\\\n2. Policy persisted to database\\\\n3. Event triggers webhook job\\\\n4. JobService retrieves job parameters from Redis queue\\\\n5. WebhookJob.init() reads skip_cert_verify parameter (line 91-96)\\\\n6. If true, HTTP client switched to insecure transport\\\\n7. HTTP request sent to webhook target\\\\n8. Network attacker can MitM the webhook delivery\\\\n\\\\n## Code Location & Snippet\\\\n\\\\n**File**: `src/jobservice/job/impl/notification/webhook_job.go`\\\\n**Lines**: 91-96\\\\n**Function**: `WebhookJob.init()`\\\\n\\\\n```go\\\\nfunc (wj *WebhookJob) init(ctx job.Context, params map[string]any) error {\\\\n    wj.logger = ctx.GetLogger()\\\\n    wj.ctx = ctx\\\\n\\\\n    // default use secure transport\\\\n    wj.client = httpHelper.clients[secure]\\\\n\\\\n    // [VULNERABLE: skip_cert_verify is user-controlled]\\\\n    if v, ok := params[\\\\\\"skip_cert_verify\\\\\\"]; ok {\\\\n        if skipCertVerify, ok := v.(bool); ok && skipCertVerify {\\\\n            // if skip cert verify is true, it means not verify remote cert, use insecure client\\\\n            // [PROBLEM: Allows user to disable TLS verification]\\\\n            wj.client = httpHelper.clients[insecure]\\\\n        }\\\\n    }\\\\n    return nil\\\\n}\\\\n```\\\\n\\\\n**Consequence**:\\\\n- HTTP client configured with `InsecureSkipVerify: true`\\\\n- TLS certificate validation completely disabled\\\\n- Network attacker can present any certificate\\\\n- Webhook payload intercepted and modified in flight\\\\n\\\\n## Vulnerability Analysis\\\\n\\\\n### Attack Scenarios\\\\n\\\\n#### Scenario 1: Webhook Response Interception\\\\n\\\\n```\\\\n1. Project admin creates webhook for CI/CD system:\\\\n   POST /api/v2.0/projects/1/webhook/policies\\\\n   {\\\\n     \\\\\\"address\\\\\\": \\\\\\"https://ci-system.internal:8443/trigger\\\\\\",\\\\n     \\\\\\"skip_cert_verify\\\\\\": true\\\\n   }\\\\n\\\\n2. Attacker on network (same VPC, compromised host):\\\\n   - Performs DNS spoofing or ARP poisoning\\\\n   - Intercepts webhook HTTPS connection\\\\n   - Presents attacker certificate (rejected by proper clients)\\\\n   - With skip_cert_verify=true, Harbor accepts ANY cert\\\\n\\\\n3. Attacker receives webhook JSON payload:\\\\n   {\\\\n     \\\\\\"repository\\\\\\": \\\\\\"company/secret-app\\\\\\",\\\\n     \\\\\\"artifact\\\\\\": \\\\\\"sha256:...\\\\\\",\\\\n     \\\\\\"webhook_event\\\\\\": \\\\\\"ARTIFACT_PUSHED\\\\\\"\\\\n   }\\\\n\\\\n4. Attacker modifies response:\\\\n   - Injects command to CI system: \\\\\\"Deploy this artifact to production WITHOUT approval\\\\\\"\\\\n   - Returns modified payload to CI system\\\\n   - CI system processes attacker\'s instruction\\\\n\\\\n5. Result: Unauthorized deployment, integrity violation\\\\n```\\\\n\\\\n#### Scenario 2: Webhook Payload Modification\\\\n\\\\n```\\\\n1. Organization uses webhooks for security scanning:\\\\n   POST /api/v2.0/projects/2/webhook/policies\\\\n   {\\\\n     \\\\\\"address\\\\\\": \\\\\\"https://security-scanner.internal:443/scan\\\\\\",\\\\n     \\\\\\"skip_cert_verify\\\\\\": true\\\\n   }\\\\n\\\\n2. Artifact pushed triggers webhook delivery\\\\n\\\\n3. Attacker MitM intercepts:\\\\n   - Original: { \\\\\\"repository\\\\\\": \\\\\\"app\\\\\\", \\\\\\"digest\\\\\\": \\\\\\"sha256:abc...\\\\\\", \\\\\\"severity\\\\\\": \\\\\\"CRITICAL\\\\\\" }\\\\n   - Attacker modifies: { \\\\\\"repository\\\\\\": \\\\\\"app\\\\\\", \\\\\\"digest\\\\\\": \\\\\\"sha256:def...\\\\\\", \\\\\\"severity\\\\\\": \\\\\\"LOW\\\\\\" }\\\\n   - Security scanner marks malicious artifact as \\\\\\"LOW\\\\\\" severity\\\\n   - Artifact allowed to proceed to production\\\\n```\\\\n\\\\n#### Scenario 3: Credential Harvesting\\\\n\\\\n```\\\\n1. Webhook includes Bearer token in Authorization header\\\\n\\\\n2. Attacker MitM intercepts:\\\\n   - Captures: Authorization: Bearer eyJhbGciOiJIUzI1NiIs...\\\\n   - Token is API token for internal service\\\\n   - Attacker uses token for unauthorized access\\\\n```\\\\n\\\\n#### Scenario 4: Combined with SSRF (SAST-002)\\\\n\\\\n```\\\\n1. Attacker creates webhook with:\\\\n   - address: \\\\\\"http://internal-database:5432\\\\\\"  (SSRF)\\\\n   - skip_cert_verify: true  (allows raw TCP without cert)\\\\n\\\\n2. JobService connects to internal Postgres\\\\n3. Attacker MitM: intercepts database responses\\\\n4. Modifies database responses before webhook delivery\\\\n5. Compromise of data consistency\\\\n```\\\\n\\\\n### Risk Assessment\\\\n\\\\n| Factor | Assessment | Notes |\\\\n|--------|-----------|-------|\\\\n| **Who can enable?** | Project admin (or system admin) | Relatively common role |\\\\n| **Detectability** | Low | No alerts when skip_cert_verify enabled |\\\\n| **Attack Requirements** | Network position + admin role | Privilege escalation or compromised admin |\\\\n| **Data at Risk** | Webhook payloads | Potentially sensitive (artifact info, deployment data) |\\\\n| **Exploitability** | MEDIUM | Requires network position + misconfiguration |\\\\n| **Impact** | MEDIUM | Integrity (MitM modification), confidentiality (interception) |\\\\n\\\\n### Why This Is a Design Issue\\\\n\\\\n**The Fundamental Problem**:\\\\n- TLS certificate verification is a **security control** (prevents MitM attacks)\\\\n- Disabling it should be:\\\\n  1. Not user-controllable (requires code deployment)\\\\n  2. Only enabled with explicit admin approval\\\\n  3. Logged/audited\\\\n  4. Time-limited or scoped\\\\n\\\\n**Current Implementation**:\\\\n- Any project admin can disable cert verification\\\\n- No logging/audit trail\\\\n- No time limit\\\\n- Enables indefinite MitM attacks\\\\n\\\\n## Recommended Fix\\\\n\\\\n### Fix Option 1: Restrict to System Admins Only\\\\n\\\\n```go\\\\nfunc (wj *WebhookJob) init(ctx job.Context, params map[string]any) error {\\\\n    wj.logger = ctx.GetLogger()\\\\n    wj.ctx = ctx\\\\n\\\\n    // default use secure transport\\\\n    wj.client = httpHelper.clients[secure]\\\\n\\\\n    if v, ok := params[\\\\\\"skip_cert_verify\\\\\\"]; ok {\\\\n        if skipCertVerify, ok := v.(bool); ok && skipCertVerify {\\\\n            // RESTRICT: Only allow if user is system admin\\\\n            if !wj.isSystemAdmin(ctx) {\\\\n                wj.logger.Warningf(\\\\\\"skip_cert_verify requested by non-admin user\\\\\\")\\\\n                // Ignore the flag, use secure client anyway\\\\n                return nil\\\\n            }\\\\n\\\\n            // Log security event\\\\n            wj.logger.Warnf(\\\\\\"Using insecure transport (skip_cert_verify=true) for webhook\\\\\\")\\\\n            wj.client = httpHelper.clients[insecure]\\\\n        }\\\\n    }\\\\n    return nil\\\\n}\\\\n\\\\nfunc (wj *WebhookJob) isSystemAdmin(ctx job.Context) bool {\\\\n    // Check if user is system admin in security context\\\\n    secCtx := libsec.FromContext(ctx)\\\\n    return secCtx.IsSysAdmin()\\\\n}\\\\n```\\\\n\\\\n### Fix Option 2: Require Explicit Allow-List in Config\\\\n\\\\n```go\\\\n// In Harbor config (environment variable or config file)\\\\nINSECURE_WEBHOOKS_ALLOWED=false\\\\n\\\\nfunc (wj *WebhookJob) init(ctx job.Context, params map[string]any) error {\\\\n    wj.client = httpHelper.clients[secure]\\\\n\\\\n    if v, ok := params[\\\\\\"skip_cert_verify\\\\\\"]; ok {\\\\n        if skipCertVerify, ok := v.(bool); ok && skipCertVerify {\\\\n            // REQUIRE: Explicit config to allow insecure webhooks\\\\n            insecureAllowed := config.GetBool(\\\\\\"INSECURE_WEBHOOKS_ALLOWED\\\\\\", false)\\\\n            if !insecureAllowed {\\\\n                wj.logger.Warnf(\\\\\\"skip_cert_verify requested but INSECURE_WEBHOOKS_ALLOWED=false\\\\\\")\\\\n                return nil\\\\n            }\\\\n\\\\n            wj.logger.Errorf(\\\\\\"SECURITY WARNING: Webhook will use insecure transport (cert verification disabled)\\\\\\")\\\\n            wj.client = httpHelper.clients[insecure]\\\\n        }\\\\n    }\\\\n    return nil\\\\n}\\\\n```\\\\n\\\\n### Fix Option 3: Comprehensive Audit + Restrict\\\\n\\\\n```go\\\\nfunc (wj *WebhookJob) init(ctx job.Context, params map[string]any) error {\\\\n    wj.client = httpHelper.clients[secure]\\\\n\\\\n    if v, ok := params[\\\\\\"skip_cert_verify\\\\\\"]; ok {\\\\n        if skipCertVerify, ok := v.(bool); ok && skipCertVerify {\\\\n            // LOG SECURITY EVENT\\\\n            auditLog.Log(ctx, \\\\\\"WEBHOOK_INSECURE_TLS_REQUESTED\\\\\\", map[string]interface{}{\\\\n                \\\\\\"address\\\\\\": params[\\\\\\"address\\\\\\"],\\\\n                \\\\\\"user\\\\\\": getUsername(ctx),\\\\n                \\\\\\"timestamp\\\\\\": time.Now(),\\\\n            })\\\\n\\\\n            // RESTRICT: System admin only\\\\n            if !wj.isSystemAdmin(ctx) {\\\\n                wj.logger.Warnf(\\\\\\"skip_cert_verify requested by non-admin\\\\\\")\\\\n                return fmt.Errorf(\\\\\\"insecure webhooks restricted to system administrators\\\\\\")\\\\n            }\\\\n\\\\n            wj.client = httpHelper.clients[insecure]\\\\n        }\\\\n    }\\\\n    return nil\\\\n}\\\\n```\\\\n\\\\n## Phase 8 Chamber Assignment\\\\n\\\\n**Chamber**: **Man-in-the-Middle Attacks (MitM-001)**\\\\n\\\\n**Rationale**:\\\\n- Allows TLS certificate verification bypass\\\\n- Creates MitM attack vector on webhook delivery\\\\n- Exploitable by network-adjacent attacker + admin misconfiguration\\\\n- Compounded by SAST-002 (SSRF) which can target internal services\\\\n- Affects integrity of webhook data in flight\\\\n\\\\n## References\\\\n\\\\n- **CWE-295**: [Improper Certificate Validation](https://cwe.mitre.org/data/definitions/295.html)\\\\n- **CWE-476**: [Null Pointer Dereference](https://cwe.mitre.org/data/definitions/476.html)\\\\n- **OWASP**: [Man-in-the-middle attack](https://owasp.org/www-community/attacks/Manipulator-in-the-middle_attack)\\\\n- **Go Security**: [net/http - InsecureSkipVerify](https://golang.org/doc/effective_go#concurrency)\\\\n- **KB Report**:\\\\n  - TB-8: Job Service ↔ External Endpoints (no SSL/TLS enforcement)\\\\n  - Attack Surface: \\\\\\"Webhook endpoint URL\\\\\\" with user-control over parameters\\\\n\\\\n## Notes for Reviewers\\\\n\\\\n1. **Severity**: MEDIUM (not HIGH) because:\\\\n   - Requires network position (not trivial)\\\\n   - Requires admin misconfiguration\\\\n   - Doesn\'t directly breach data (but enables MitM)\\\\n\\\\n2. **Exploitability**: MEDIUM\\\\n   - Requires network position (same VPC, compromised host, DNS spoofing, ARP poisoning)\\\\n   - Easy to exploit once position obtained\\\\n   - Can be leveraged for data modification or credential harvesting\\\\n\\\\n3. **Relationship to SAST-002**:\\\\n   - SAST-002 (SSRF) enables reaching internal services\\\\n   - SAST-012 (insecure TLS) enables MitM on those internal services\\\\n   - Combined: Attacker can reach AND intercept internal HTTPS services\\\\n\\\\n4. **User Education**:\\\\n   - Document that skip_cert_verify disables security control\\\\n   - Warn in UI: \\\\\\"Warning: TLS certificate verification disabled. This endpoint will accept self-signed or forged certificates.\\\\\\"\\\\n   - Recommend: Use proper certificates, not skip verification\\\\n\\\\n5. **Testing Recommendations**:\\\\n   - Create webhook with skip_cert_verify=true\\\\n   - Set up MitM proxy (mitmproxy, Burp Suite)\\\\n   - Verify webhook payload can be intercepted and modified\\\\n   - Confirm without fix, modifications are not detected\\\\n\\\\n6. **Recommended Priority**:\\\\n   - Fix Option 1 (System admin only) = Immediate\\\\n   - Fix Option 3 (Audit + restrict) = Better long-term\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"tags\\":[\\"archon\\",\\"phase-7\\",\\"CWE-295\\"],\\"status\\":\\"open\\",\\"cwe_id\\":\\"CWE-295\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/jobservice/job/impl/notification/webhook_job.go\\",\\"matched_at\\":[\\"src/jobservice/job/impl/notification/webhook_job.go\\"],\\"finding_hash\\":\\"609c3bc92b27b66a72b035ec7e1ed4ef\\",\\"found_at\\":\\"2026-03-30T18:45:41.016134Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":24,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-001\\",\\"module_name\\":\\"Harbor\'s admin account (userID=1) always authenticates via DB credentials regardless of the configured authentication mode (OIDC, LDAP, etc.). The `IsSuperUser` check at `authenticator.go:142` uncondi\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"admin-db-auth-brute-force\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s admin account (userID=1) always authenticates via DB credentials regardless of the configured authentication mode (OIDC, LDAP, etc.). The `IsSuperUser` check at `authenticator.go:142` unconditionally overrides the auth mode to `common.DBAuth` for the admin user. Combined with an in-memory-only lockout mechanism (`UserLock` in `lock.go`) that has no cross-pod synchronization, this enables unlimited brute force attacks against the admin account in multi-instance (HA) deployments.\\\\n\\\\n## Location\\\\n\\\\n- `src/core/auth/authenticator.go:142` -- `IsSuperUser` override forces DB auth\\\\n- `src/core/auth/lock.go:22-51` -- `UserLock` uses in-memory `map[string]time.Time`\\\\n- `src/server/middleware/security/basic_auth.go` -- entry point via HTTP Basic Auth\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls the HTTP Basic Auth header with the admin username (default: \\\\\\"admin\\\\\\") and password guess. This is fully controllable from the external network via any API endpoint that processes Basic Auth.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nExternal network -> Harbor Core admin authentication. The IsSuperUser bypass means OIDC/LDAP mode configuration is irrelevant -- the admin account is always DB-authenticated.\\\\n\\\\n## Impact\\\\n\\\\n- Full system admin access via brute-forced DB password\\\\n- In multi-instance deployments: attacker distributes requests across N pods, getting N * 5 attempts per 5-minute lockout window per pod\\\\n- Organizations that configure OIDC-only mode are not protected -- admin remains brute-forceable\\\\n- 1.5s sleep per failed attempt on a single pod limits single-pod rate to ~40 attempts/minute, but across pods this multiplies\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/core/auth/authenticator.go:142\\\\nif authMode == \\\\\\"\\\\\\" || IsSuperUser(ctx, m.Principal) {\\\\n    authMode = common.DBAuth\\\\n}\\\\n\\\\n// src/core/auth/lock.go:23-30\\\\ntype UserLock struct {\\\\n    d        time.Duration\\\\n    failures map[string]time.Time  // in-memory, no Redis sync\\\\n    lock     sync.RWMutex\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Deploy Harbor in HA mode with 3+ core pods and OIDC auth mode configured\\\\n2. Send HTTP Basic Auth requests with `admin:<guess>` to different core pods (via load balancer)\\\\n3. Observe that each pod maintains independent lockout -- 5 failures on pod A do not affect pod B\\\\n4. After 5 failures on pod A, route to pod
