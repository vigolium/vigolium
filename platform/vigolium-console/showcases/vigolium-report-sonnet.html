s from **name-scope wrapping only**. It does NOT prevent dunder methods from being defined or functioning. A `__getstate__` on Module would work normally for pickle; it simply would not be wrapped with automatic TF name-scope entry. The draft overstates this as an \"architectural prevention.\"\n\n3. **Pickle is a tested interface (CONFIRMED):** `pickle_test.py:34` explicitly tests `pickle.loads(pickle.dumps(m1))` on all golden modules.\n\n4. **No RestrictedUnpickler (CONFIRMED):** No custom Unpickler subclass exists in the codebase.\n\n### Why DISPROVED\n\nThe finding is DISPROVED as a CRITICAL vulnerability because:\n\n- **No Sonnet-specific attack surface:** Sonnet is a library, not a service. It exposes no `load_model()`, `deserialize()`, or any API that accepts untrusted pickle data. There is no code path in Sonnet that calls `pickle.loads()` on external input.\n\n- **PoC does not use Sonnet:** The finding's own reproduction steps (lines 66-84) create a standalone `MaliciousModule` class that does not inherit from `snt.Module` or use any Sonnet code. This demonstrates generic Python pickle unsafety, not a Sonnet-specific flaw.\n\n- **Misattribution of pickle's inherent unsafety:** Python's pickle documentation explicitly warns: \"Warning: The pickle module is not secure. Only unpickle data you trust.\" This applies to every Python object that supports pickling. Labeling every such library as CRITICAL RCE would be absurd.\n\n- **V1 guard was functional, not security:** The v1 `__getstate__` raising `NotSupportedError(\"Sonnet AbstractModule instances cannot be serialized\")` was because graph-mode modules could not be correctly serialized, not because of security concerns. The v2 removal reflects that eager-mode modules can be correctly pickled.\n\n- **At best, this is a hardening recommendation:** Adding a `__getstate__` guard or documenting pickle risks could be a LOW-severity hardening suggestion, but the absence of such a guard in a library that intentionally supports pickle is not a vulnerability.\n\n### Review artifact\nFull review: `archon/adversarial-reviews/pickle-rce-no-guard-review.md`\n","severity":"critical","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-pending"],"status":"open","cvss_score":0,"source_file":"sonnet/src/base.py:368","repo_name":"https://github.com/deepmind/sonnet","matched_at":["sonnet/src/base.py:368","sonnet/src/base.py:73","sonnet/src/conformance/pickle_test.py:34","base.py:73","pickle_test.py:34"],"finding_hash":"2997b5cea555a731ad3c30c2a37b95dd","found_at":"2026-04-18T18:34:06.134281Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":3,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p10-040","module_name":"of Variant Hunt","module_type":"whitebox","finding_source":"archon","module_short":"variants","description":"## Search Strategy Executed\n\n### 1. Registry-Driven Search (AP-040 detection_signature)\n- grep pattern `exec(.*line.*,.*[{}])` across all `.py` files\n- grep pattern `eval\\s*\\(` across all `.py` files\n- grep pattern `compile\\s*\\(` across all `.py` files (excluding `re.compile`)\n- grep pattern `exec\\s*\\(` across all `.py` files\n\n### 2. File-Content-to-Code-Execution Flow Search\n- grep `open\\s*\\(` across all `.py` files for file-read sources\n- grep `subprocess\\.(run|call|Popen|check_output)` for subprocess sinks\n- grep `os\\.(system|popen|execv)` for shell-execution sinks\n- grep `__import__`, `importlib.import_module` for dynamic import sinks\n\n### 3. Build/CI Script Search\n- All `setup.py`, `setup.cfg`, `*.toml`, `*.bzl`, `BUILD`, `WORKSPACE`, `*.sh`, `*.yml` files\n- Notebooks: `examples/*.ipynb` for dangerous patterns\n\n### 4. Phase 8 Addendum / Chamber Variant Candidates\n- Read `archon/chamber-workspace/chamber-3-supply-chain/debate.md` (supply chain chamber)\n- Chamber summary table shows: \"Variant candidates: 0\" — no pre-identified exec/eval variants\n- Chamber H-03 (requirements VCS injection) was adjudicated FALSE POSITIVE (same trust boundary)\n\n### 5. SAST/CodeQL Artifact Cross-Check\n- Reviewed `archon/codeql-artifacts/sinks.json`: only one `code-exec` sink listed — `setup.py:12`\n- Reviewed `archon/sast-candidates.json`: all exec/eval tool detections resolve to `setup.py:12`\n\n---\n\n## Search Results — All Candidate Locations\n\n| Location | Pattern | Code | Disposition |\n|----------|---------|------|-------------|\n| `setup.py:12` | `exec(line, g)` | File-content exec with startswith filter | ORIGINAL FINDING (p8-040) |\n| `setup.py:17-19` | `fp.read().splitlines()` | Raw requirements file passed to pip | Evaluated below (CANDIDATE-A) |\n| `setup.py:37` | `open('README.md').read()` | README content in long_description | Evaluated below (NOT VALID) |\n| `docs/conf.py` | `import sonnet as snt` | Module import at doc-build time | Not exec/eval pattern |\n| `docs/ext/link_tf_api.py:36` | `__version__ = \"0.1\"` | Literal assignment, not file-read | Not vulnerable |\n| `sonnet/src/conformance/api_test.py:32` | `importlib.reload(mysnt)` | Test-only, no file content ingestion | Not vulnerable |\n| `sonnet/src/utils.py:98-100` | `re.compile(...)` | Regex compile on string literal, not file content | Not vulnerable |\n| Notebooks | `!pip install dm-sonnet` | Shell magic, not file-content exec | Not applicable |\n\n---\n\n## CANDIDATE-A: `_parse_requirements` — Raw File Lines to pip Directives\n\n### Description\n\n`setup.py:17-19` defines `_parse_requirements()` which reads a requirements file and returns its\nlines verbatim, with no filtering of pip CLI option directives:\n\n```python\ndef _parse_requirements(requirements_txt_path):\n  with open(requirements_txt_path) as fp:\n    return fp.read().splitlines()\n```\n\nThe result is passed to `install_requires` and `tests_require` in the `setup()` call:\n\n```python\ninstall_requires=_parse_requirements('requirements.txt'),   # line 42\ntests_require=_parse_requirements('requirements-test.txt'), # line 44\n```\n\npip processes certain option directives when they appear in requirements files, including\n`--extra-index-url`, `--index-url`, `-f / --find-links`, and VCS URLs using the\n`package @ https://...` syntax (PEP 440/508).\n\n### Validation Against Variant Criteria\n\n**1. Same root cause?**\nThe root cause of AP-040 is: file content is ingested without sufficient filtering and passed\ndirectly to a Python code-execution or command-execution interface. Here, the file content is\npassed to pip's requirement resolution engine, which interprets option directives. The\nstructurally analogous root cause is present: file-content-to-interpreter with no sanitization.\n\nHowever, the interface is different: `exec()` is explicit Python code execution; pip requirement\nparsing is an indirect form of directive injection. The CWE mapping shifts from CWE-94\n(Code Injection) to CWE-829 (Inclusion of Functionality from Untrusted Control Sphere).\n\n**2. Attacker-controlled input reaches the variant location?**\nYES — a supply-chain attacker with write access to `requirements.txt` or `requirements-test.txt`\ncan inject pip option directives. The file content is passed verbatim via `splitlines()`.\n\n**3. No blocking protection absent in original?**\nThe chamber debate (H-03, synthesis at line 253-263 of debate.md) found this is the SAME trust\nboundary as the original finding: modifying `requirements.txt` requires write access to\n`sonnet/__init__.py`. The chamber Synthesizer ruled this FALSE POSITIVE — same-origin-redundant.\n\n**4. Does this cross a trust boundary not present in the original?**\nNO — the trust boundary is identical. An attacker with source-tree write access can:\n- Modify `sonnet/__init__.py` for exec() RCE (original p8-040)\n- Modify `requirements.txt` for pip directive injection (this candidate)\n\nBoth require the same precondition. The pip injection does not expand the attack surface beyond\nwhat the original exec() already provides. It is a parallel vector, not an amplified one.\n\n**5. Is there additional downstream impact?**\npip directive injection via `--extra-index-url` can redirect dependency resolution for ALL\ndownstream users who install from the compromised source. This is a distinct impact channel\nfrom exec() (which only affects the immediate installer). However, the precondition is identical,\nand the chamber already considered and dismissed this as same-trust-boundary.\n\n### Verdict: NOT A VALID INDEPENDENT VARIANT\n\nThe `_parse_requirements` pattern shares the identical trust boundary as p8-040. Per the\nchamber's adjudication (H-03 = FALSE POSITIVE), this does not constitute an independent variant.\nIt is a parallel attack vector within the same access scope, not a structural variant with a\ndifferent entry point or trust boundary crossing. Retained as an annotation to AP-040 but not\nfiled as a separate finding.\n\n---\n\n## CANDIDATE-B: `long_description=open('README.md').read()` — File Read at Build Time\n\n### Description\n\n`setup.py:37` reads `README.md` at build time and passes it to `long_description`:\n\n```python\nlong_description=open('README.md').read(),\nlong_description_content_type='text/markdown',\n```\n\n### Validation\n\nThis is not a code-execution sink. `long_description` is a metadata field; its content is\nrendered by PyPI's markdown renderer on the package page. It does not pass through `exec()`,\n`eval()`, or any subprocess call. The supply-chain probe summary (ND-01) flagged this as\nneeding deeper investigation into PyPI's rendering pipeline, but no code-injection path exists\nwithin the Sonnet codebase itself. The renderer is external infrastructure; attacker-controlled\nREADME content would need to exploit a separate vulnerability in PyPI's renderer.\n\n### Verdict: NOT VALID — No code-execution sink in the Sonnet codebase.\n\n---\n\n## Structural Variant Search — Alternate Transports and Surfaces\n\n### Test Files\nNo `exec()` or `eval()` calls found in any test file (`*_test.py`). All SAST exec detections\nresolve to `setup.py:12` only.\n\n### Notebooks (`examples/*.ipynb`)\nAll four notebooks were analyzed. Post-fix (commit `ae34a78`), the vqvae notebook uses\n`tensorflow_datasets` (TFDS) instead of the previously removed `tarfile.extractall()` and\n`cPickle.load()` patterns. No exec/eval/subprocess patterns in current notebook versions.\n\n### Documentation Build (`docs/conf.py`, `docs/ext/link_tf_api.py`)\n- `docs/conf.py` imports `sonnet` at doc-build time, which triggers `setup.py` module evaluation.\n  This is a secondary execution path for the original exec() finding (doc build triggers the same\n  `_get_sonnet_version()` call), not an independent variant. No new exec/eval call site.\n- `docs/ext/link_tf_api.py` uses only `getattr()` traversal on the `tf` module; no file reading\n  or code execution.\n\n### Build System (`BUILD`, `WORKSPACE`, `build_defs.bzl`)\n- `WORKSPACE` is a single-line stub with no rule loading.\n- `build_defs.bzl` defines two proxy functions wrapping `native.py_library` and `native.py_test`.\n  No file reading, no exec/eval, no shell commands.\n- `BUILD` files define test and library targets only; no `genrule` with `cmd` string injection.\n\n### Shell Scripts (`test.sh`)\n- `test.sh:33` calls `python3 setup.py install` — this is the same trigger path for the original\n  exec() finding, not an independent variant.\n- No shell string-formatting from file content or other code-execution patterns.\n\n### GitHub Actions (`.github/workflows/ci.yml`)\n- Line 31: `pip install .` — triggers `setup.py` exec() (original finding's trigger path).\n- No YAML expression injection, no `${{ }}` interpolation from untrusted sources.\n- Actions security is covered by p8-042 (unpinned CI actions); not a CWE-94 variant.\n\n---\n\n## Summary of Variant Hunt\n\nAll four search strategies were exhausted:\n\n1. **Registry-driven grep/semgrep/codeql**: Only one `exec()` call in the entire Python\n   codebase — `setup.py:12` (the original finding). Zero `eval()` calls. `compile()` calls\n   are limited to `re.compile()` on string literals (not file content).\n\n2. **AST-level structural search**: No other file-read-to-code-execution patterns found.\n   `_parse_requirements` is a same-trust-boundary parallel vector (chamber-dismissed).\n\n3. **Flow shape search**: The flow `FileRead -\u003e weak_filter -\u003e exec()` exists only once.\n   Alternate transports (notebooks, docs, CI scripts, Bazel files) do not contain the pattern.\n\n4. **Phase 8 addendum / chamber variant candidates**: Chamber 3 explicitly recorded\n   \"Variant candidates: 0\" for the supply-chain cluster. The chamber dismissed the only\n   structural relative (H-03 requirements injection) as same-trust-boundary FALSE POSITIVE.\n\n**Confirmed variants meeting MEDIUM or higher severity: 0**\n\nThe exec/eval attack pattern (AP-040) is isolated to a single call site in this codebase.\nNo structurally equivalent code-injection path exists at a different location or through a\ndifferent entry point with a distinct trust boundary.\n\n---\n\n## Registry Update Note\n\nAP-040 `confirmed_instances` remains at 1 (setup.py:12). No new instances to append.\nThe `untested_candidates` list remains empty — all candidates were evaluated and found\neither same-trust-boundary (CANDIDATE-A) or non-exec sinks (CANDIDATE-B).\n\n---\n\n## Completion Statement\n\nVariant analysis complete for exec-setup-filter-bypass. Variants found: 0.\n\nAll structurally analogous code locations evaluated:\n- `_parse_requirements` (setup.py:17-19): same trust boundary as original; chamber-dismissed\n- `long_description` (setup.py:37): no code-execution sink\n- All notebooks: clean post-fix (ae34a78)\n- All build/CI scripts: no exec/eval patterns\n- SAST artifacts confirm single exec() call site in entire codebase\n","severity":"info","confidence":"tentative","tags":["archon","phase-10"],"status":"open","cvss_score":0,"source_file":"setup.py:12","repo_name":"https://github.com/deepmind/sonnet","matched_at":["setup.py:12"],"finding_hash":"e8ff9ed3ad6163fc6a7d7a8454aa5877","found_at":"2026-04-18T18:34:06.13428Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":2,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p10-023","module_name":"`_cudnn_unrolled_lstm` (recurrent.py:1070-1096) is the GPU/CuDNN specialization of","module_type":"whitebox","finding_source":"archon","module_short":"variants","description":"## Variant Search Summary\n\nAttack pattern: Specialized code path (CPU/GPU) that bypasses zero-input validation\npresent in the fallback path, then either accesses `[-1]` on an empty tensor produced\nby a TF raw op, or passes a zero-dimension input to a raw op that asserts at the\nC++ kernel level.\n\nSearch strategies executed:\n1. Full read of recurrent.py (1734 lines) — all specialized paths, raw op calls,\n   and `[-1]`/`[0]` tensor indexing on user-controlled dimensions\n2. Cross-reference against attack-pattern-registry.json AP-023 confirmed_instances\n3. Cross-reference against existing p8-025-cudnn-zero-crash.md\n4. Grep for all `[-1]` indexing in sonnet/src/*.py against tensor-shape context\n5. Grep for all `tf.raw_ops.*` call sites in recurrent.py\n6. CodeQL entry-points.json and sinks.json reviewed for recurrent.py sink coverage\n\nTotal variants confirmed: 2\n\n---\n\n## Variant 1 — `_cudnn_unrolled_lstm`: GPU path has identical `[-1]` crash\n\n```\nPhase: 10\nSequence: 023-V1\nSlug: cudnn-unrolled-lstm-zero-step-index\nVerdict: VALID\nRationale: _cudnn_unrolled_lstm passes zero-step input directly to CudnnRNNV3 and\n  then accesses all_hidden[-1] and all_cell[-1] on potentially empty tensors —\n  structurally identical to p8-023 but on the GPU/CuDNN execution path; no\n  zero-check exists, _unstack_input_sequence is never called.\nSeverity-Original: MEDIUM\nPoC-Status: pending (GPU required; crash also captured at kernel level in p8-025)\nOrigin-Finding: archon/findings-draft/p8-023-blocklstm-zero-crash.md\nOrigin-Pattern: AP-023\n```\n\n### Summary\n\n`_cudnn_unrolled_lstm` (recurrent.py:1070-1096) is the GPU/CuDNN specialization of\n`UnrolledLSTM`. It follows the identical structural pattern as the CPU variant\n`_block_unrolled_lstm` (p8-023):\n\n1. Derives `max_sequence_length` directly from user-controlled input shape dimension 0\n2. Passes it to a raw op (`CudnnRNNV3`) with no zero-check\n3. Accesses `all_hidden[-1]` and `all_cell[-1]` on the result\n\nWhen `input_sequence` has shape `[0, B, F]`, `max_sequence_length` is 0.\n`sequence_lengths = tf.broadcast_to(0, batch_dim)` broadcasts zero to all batch\npositions. `CudnnRNNV3` receives a zero-step input. If the kernel returns an empty\ntensor, line 1096 crashes with `InvalidArgumentError` on `all_hidden[-1]`. If the\nkernel asserts internally first, it is still a DoS.\n\nThe fallback path (`_fallback_unrolled_lstm` → `dynamic_unroll` →\n`_unstack_input_sequence`) validates at line 411:\n`if num_steps == 0: raise ValueError(\"input_sequence must have at least a single time step\")`\nThis guard is never reached on the GPU path.\n\n### Location\n\n- `sonnet/src/recurrent.py:1070` — `_cudnn_unrolled_lstm()` function definition\n- `sonnet/src/recurrent.py:1072` — `max_sequence_length = tf.shape(input_sequence)[0]`\n  (evaluates to 0 when time dimension is 0)\n- `sonnet/src/recurrent.py:1077` — `sequence_lengths = tf.broadcast_to(max_sequence_length, batch_dim)`\n  (broadcasts zero to all batch positions)\n- `sonnet/src/recurrent.py:1081-1095` — `tf.raw_ops.CudnnRNNV3(...)` with zero-step input\n- `sonnet/src/recurrent.py:1096` — `LSTMState(all_hidden[-1], all_cell[-1])` — crash site;\n  `[-1]` on empty tensor → `InvalidArgumentError: slice index -1 of dimension 0 out of bounds`\n- Validation gap: `_unstack_input_sequence` (line 411) validates but is NOT called from this path\n- Device routing: `_unrolled_lstm_impls[\"GPU\"] = _cudnn_unrolled_lstm` (line 1100)\n\n### Attacker Control\n\nAPI caller supplies `input_sequence` to `UnrolledLSTM.__call__`. On a GPU host,\n`_cudnn_unrolled_lstm` is selected automatically via the device specialization\ndispatch in `_specialize_per_device`. A zero-step input `[0, B, F]` directly\ntriggers the crash.\n\n### Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied tensor shape flows through GPU-specialized\npath to `tf.raw_ops.CudnnRNNV3` and then to Python `[-1]` indexing without\nany validation. Same boundary as p8-023.\n\n### Impact\n\nDoS (process crash) in GPU-serving environments. `InvalidArgumentError` from\n`all_hidden[-1]` on empty tensor is unrecoverable. Identical impact to p8-023\nbut affects GPU deployments rather than CPU deployments.\n\n### Evidence\n\n```python\n# recurrent.py:1070-1096\ndef _cudnn_unrolled_lstm(input_sequence, initial_state, w_i, w_h, b):\n    \"\"\"GPU/CuDNN-RNN specialization of UnrolledLSTM.\"\"\"\n    max_sequence_length = tf.shape(input_sequence)[0]           # 0 if empty\n    batch_dim = tf.expand_dims(tf.shape(input_sequence)[1], axis=0)\n    sequence_lengths = tf.broadcast_to(max_sequence_length, batch_dim)  # [0,0,...,0]\n\n    output_sequence, all_hidden, all_cell, _, _ = tf.raw_ops.CudnnRNNV3(\n        input=input_sequence,\n        input_h=tf.expand_dims(initial_state.hidden, axis=0),\n        input_c=tf.expand_dims(initial_state.cell, axis=0),\n        sequence_lengths=sequence_lengths,   # zero-filled\n        params=tf.concat([...], axis=0),\n        rnn_mode=\"lstm\")\n    return output_sequence, LSTMState(all_hidden[-1], all_cell[-1])  # CRASH: [-1] on empty\n```\n\nStructural comparison to p8-023 (CPU path):\n```python\n# recurrent.py:1052-1067 (original finding)\ndef _block_unrolled_lstm(input_sequence, initial_state, w_i, w_h, b):\n    _, all_cell, _, _, _, _, all_hidden = tf.raw_ops.BlockLSTMV2(\n        seq_len_max=tf.cast(tf.shape(input_sequence)[0], tf.int64),  # 0 if empty\n        x=input_sequence, ...)\n    return all_hidden, LSTMState(all_hidden[-1], all_cell[-1])  # same crash\n```\n\nDispatch table confirming GPU routing:\n```python\n# recurrent.py:1099-1102\n_unrolled_lstm_impls = {\n    \"GPU\": _cudnn_unrolled_lstm,   # this variant\n    \"TPU\": _fallback_unrolled_lstm,  # safe: goes through _unstack_input_sequence\n}\n```\n\n### Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\n\n# Requires a host with GPU and CuDNN\n\nlstm = snt.UnrolledLSTM(hidden_size=64)\nempty_seq = tf.zeros([0, 2, 32])   # Zero time steps\nstate = snt.LSTMState(\n    hidden=tf.zeros([2, 64]),\n    cell=tf.zeros([2, 64]))\n\n# On GPU, dispatches to _cudnn_unrolled_lstm\n# Crash: InvalidArgumentError at all_hidden[-1] (line 1096)\n# or CuDNN kernel assertion at CudnnRNNV3 call (line 1081)\nwith tf.device('/GPU:0'):\n    lstm(empty_seq, state)\n```\n\n---\n\n## Variant 2 — `CuDNNGRU.__call__`: GRU GPU path, zero-step input to CudnnRNNV3\n\n```\nPhase: 10\nSequence: 023-V2\nSlug: cudnngru-zero-step-raw-op-crash\nVerdict: VALID\nRationale: CuDNNGRU.__call__ derives sequence_lengths from user-controlled input\n  dimension 0 without zero validation and passes it to CudnnRNNV3, which crashes\n  at the CuDNN kernel level with zero-step input; the fallback GRU path\n  (standard GRU.__call__) uses step-by-step execution and never hits this path.\nSeverity-Original: MEDIUM\nPoC-Status: pending (GPU required; crash captured in p8-025 as PH-26)\nOrigin-Finding: archon/findings-draft/p8-023-blocklstm-zero-crash.md\nOrigin-Pattern: AP-023\n```\n\n### Summary\n\n`CuDNNGRU.__call__` (recurrent.py:1657-1703) is a CuDNN-specialized GRU core that\noperates on full sequences at once (shape `[T, B, F]`). It follows the same\nvalidation-bypass pattern as p8-023:\n\n1. Extracts `max_sequence_length = tf.shape(inputs)[0]` — zero if time steps = 0\n2. Broadcasts it to `sequence_lengths` with no zero-check\n3. Passes the zero-step sequence directly to `tf.raw_ops.CudnnRNNV3`\n\nUnlike `_cudnn_unrolled_lstm`, there is no subsequent `[-1]` Python indexing;\nthe crash occurs at the C++ kernel level when CuDNN receives a zero-step sequence.\nThe standard `GRU.__call__` (line 1568) is step-by-step and never calls a raw op\nwith the full sequence — users of `CuDNNGRU` that pass zero-step inputs receive\nno Python-level error before the kernel crash.\n\n`CuDNNGRU._initialize` (line 1718-1727) validates rank (`assert_rank(inputs, 3)`)\nand checks `inputs.shape[2]` (feature dimension) but does not validate\n`inputs.shape[0]` (time steps). This is the same validation gap as p8-023.\n\n### Location\n\n- `sonnet/src/recurrent.py:1657` — `CuDNNGRU.__call__()` entry\n- `sonnet/src/recurrent.py:1671` — `max_sequence_length = tf.shape(inputs)[0]`\n  (0 when inputs has zero time steps)\n- `sonnet/src/recurrent.py:1672` — `batch_dim = tf.expand_dims(tf.shape(inputs)[1], axis=0)`\n- `sonnet/src/recurrent.py:1676` — `sequence_lengths = tf.broadcast_to(max_sequence_length, batch_dim)`\n  (all zeros when time steps = 0)\n- `sonnet/src/recurrent.py:1678-1701` — `tf.raw_ops.CudnnRNNV3(...)` crash site\n- `sonnet/src/recurrent.py:1719` — `_initialize`: validates rank but NOT time dimension\n\n### Attacker Control\n\nAPI caller supplies the `inputs` tensor directly to `CuDNNGRU.__call__`.\nA zero-step input (`[0, B, F]`) directly sets `max_sequence_length=0` and\n`sequence_lengths=[0,0,...,0]`, which is passed unmodified to the CuDNN kernel.\nNo intermediate validation exists.\n\n### Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied tensor shape flows to `tf.raw_ops.CudnnRNNV3`\nwithout bounds checking. Same boundary as p8-023. `CuDNNGRU` is a documented,\nexported class intended for caller use in GPU serving contexts.\n\n### Impact\n\nDoS (GPU kernel crash) on CUDA-enabled serving deployments. `CuDNNGRU` is only\nactive on GPU hosts, so CPU-only deployments are unaffected. The crash occurs at\nthe C++ kernel level and is unrecoverable within the process. In multi-tenant GPU\nserving, this crashes the serving process for all concurrent requests.\n\nSlightly lower practical exploitability than Variant 1 because:\n- `CuDNNGRU` is marked with a TODO noting potential removal (`# TODO(slebedev): remove or document and export`)\n- No `[-1]` Python-level crash — crash occurs deeper in C++ kernel\n\n### Evidence\n\n```python\n# recurrent.py:1657-1703\ndef __call__(self, inputs, prev_state):\n    self._initialize(inputs)   # rank check only, no time-step check\n    ...\n    max_sequence_length = tf.shape(inputs)[0]          # 0 for zero-step input\n    batch_dim = tf.expand_dims(tf.shape(inputs)[1], axis=0)\n    sequence_lengths = tf.broadcast_to(max_sequence_length, batch_dim)  # [0,0,...,0]\n\n    outputs, next_hidden, _, _, _ = tf.raw_ops.CudnnRNNV3(\n        input=inputs,                        # shape [0, B, F]\n        input_h=tf.expand_dims(prev_state, axis=0),\n        input_c=0,\n        params=tf.concat([...], axis=0),\n        rnn_mode=\"gru\",\n        sequence_lengths=sequence_lengths)   # all-zero → CuDNN kernel crash\n\n    return outputs, next_hidden\n```\n\nMissing validation comparison (standard GRU path is step-by-step and never\nhits this raw op):\n```python\n# GRU.__call__ (line 1568) — standard path, safe\ndef __call__(self, inputs, prev_state):\n    self._initialize(inputs)\n    gates_x = tf.matmul(inputs, self._w_i)  # operates on single [B, F] step\n    ...\n```\n\n### Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\n\n# Requires GPU with CuDNN\ngru = snt.CuDNNGRU(hidden_size=64)\nzero_step = tf.zeros([0, 2, 32])   # Zero time steps, batch=2, features=32\nprev_state = tf.zeros([2, 64])\n\n# Triggers CuDNNGRU.__call__ which crashes at CudnnRNNV3 with zero-step input\nwith tf.device('/GPU:0'):\n    gru(zero_step, prev_state)\n```\n\n---\n\n## Non-Variant: `CuDNNGRU` zero-BATCH path\n\nA zero-batch input (`[T, 0, F]`) also reaches `CudnnRNNV3` but:\n- `batch_dim = tf.expand_dims(0, axis=0)` → scalar 0 inside a 1-D tensor\n- `tf.broadcast_to(max_sequence_length, [0])` → empty `sequence_lengths` tensor\n- This triggers a different crash (empty sequence_lengths) covered in p8-025\n\nThis is the same crash reported in p8-025 as the zero-batch LSTM crash and is\nnot a new variant of the `[-1]` indexing pattern.\n\n---\n\n## Exhausted Search Targets\n\nThe following were checked and determined NOT to be variants:\n\n| Target | Reason Not a Variant |\n|--------|---------------------|\n| `static_unroll` (recurrent.py:198) | Calls `_unstack_input_sequence` — protected |\n| `dynamic_unroll` (recurrent.py:295) | Calls `_unstack_input_sequence` — protected |\n| `_fallback_unrolled_lstm` (recurrent.py:1045) | Calls `dynamic_unroll` — protected |\n| `GRU.__call__` (recurrent.py:1568) | Step-by-step, no raw op, not zero-input vulnerable |\n| `_lstm_fn` (recurrent.py:882) | Single-step, called from `dynamic_unroll` — protected |\n| `_ConvNDLSTM.__call__` (recurrent.py:1314) | Step-by-step via `RNNCore`, no raw op |\n| `[-1]` in group_norm.py (lines 200, 222, 226, 230) | Static shape indexing, not tensor indexing |\n| `[-1]` in initializers.py (lines 189, 234, 387) | Static shape indexing on known shapes |\n\n","severity":"info","confidence":"tentative","tags":["archon","phase-10"],"status":"open","cvss_score":0,"repo_name":"https://github.com/deepmind/sonnet","finding_hash":"1c67cc79a370bd7c19106406bff21ccd","found_at":"2026-04-18T18:34:06.134279Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":1,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p10-021","module_name":"`static_unroll` at `recurrent.py:198` is a separate public API entry point that accepts the same `sequence_length` parameter without any bounds validation. It calls `_rnn_step` in a Python `for` loop,","module_type":"whitebox","finding_source":"archon","module_short":"variants","description":"## Variant 1: static_unroll — Separate Entry Point, Same Unchecked sequence_length Path\n\nPhase: 10\nSequence: 021\nSlug: static-unroll-sequence-length-bounds\nVerdict: VALID\nRationale: static_unroll accepts sequence_length without bounds validation and passes it identically to _rnn_step where t \u003e= sequence_length is evaluated; negative values freeze outputs and oversize values disable masking, identical to the dynamic_unroll confirmed finding.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-021-sequence-length-bounds.md\nOrigin-Pattern: AP-021\n\n### Summary\n\n`static_unroll` at `recurrent.py:198` is a separate public API entry point that accepts the same `sequence_length` parameter without any bounds validation. It calls `_rnn_step` in a Python `for` loop, passing `sequence_length` directly to the same unchecked comparison `t \u003e= sequence_length` at line 450. The original confirmed finding's `confirmed_instances` registers only the `_rnn_step` sink (line 450), but `static_unroll` constitutes a distinct, independently reachable entry point with the same root cause.\n\nThe original finding's Location section mentions `static_unroll`, but the chamber debate focused on `dynamic_unroll` as the primary surface. This variant confirms that `static_unroll` exposes the identical vulnerability through its own separate call path.\n\n### Location\n\n- `sonnet/src/recurrent.py:198` — `static_unroll()` public API entry point\n- `sonnet/src/recurrent.py:202` — `sequence_length: Optional[types.IntegerLike] = None` parameter (no validation)\n- `sonnet/src/recurrent.py:261–266` — passes `sequence_length` directly to `_rnn_step` in every loop iteration\n- `sonnet/src/recurrent.py:450` — `maybe_propagate = functools.partial(_safe_where, t \u003e= sequence_length)` (shared sink)\n\n### Attacker Control\n\nAPI caller supplies `sequence_length` to `snt.static_unroll`. In serving systems that use `static_unroll` for fixed-length sequence models (preferred because AutoGraph loop unrolling improves performance on TPU), `sequence_length` may be derived from user-supplied token count or sequence metadata.\n\n### Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied integer tensor flows from `static_unroll` entry point through to `_rnn_step` comparison with no intermediate validation. The static_unroll path is a separate code path from dynamic_unroll — the for-loop is a Python range loop (line 260: `for t in range(num_steps):`), distinct from the `tf.range` / `tf.while_loop` path in `dynamic_unroll`.\n\n### Impact\n\nIdentical to p8-021:\n1. Negative `sequence_length`: `t \u003e= negative` is always True for `t` in `[0, num_steps)`, freezing all outputs at initial state (zeros). Model ignores all input features.\n2. Oversize `sequence_length` (\u003e num_steps): `t \u003e= sequence_length` is always False, disabling masking entirely. Adversarial content in padding positions is processed by the RNN.\n\n### Evidence\n\n```python\n# recurrent.py:198-276 (static_unroll)\ndef static_unroll(\n    core: RNNCore,\n    input_sequence: types.TensorNest,\n    initial_state: types.TensorNest,\n    sequence_length: Optional[types.IntegerLike] = None  # No bounds check\n) -\u003e Tuple[types.TensorNest, types.TensorNest]:\n    ...\n    num_steps, input_tas = _unstack_input_sequence(input_sequence)\n    ...\n    for t in range(num_steps):\n        outputs, state = _rnn_step(\n            core,\n            input_tas,\n            sequence_length,   # passed through with no validation\n            t,\n            ...\n        )\n\n# recurrent.py:437-454 (_rnn_step -- shared sink)\ndef _rnn_step(core, input_tas, sequence_length, t, prev_outputs, prev_state):\n    ...\n    if sequence_length is not None:\n        maybe_propagate = functools.partial(_safe_where, t \u003e= sequence_length)  # :450 -- no bounds check\n        outputs = tree.map_structure(maybe_propagate, prev_outputs, outputs)\n        state = tree.map_structure(maybe_propagate, prev_state, state)\n```\n\nNo validation exists at any point in the `static_unroll` call chain. The `_unstack_input_sequence` call on line 252 validates the sequence has at least 1 step, but performs no validation of `sequence_length`.\n\n### Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\n\ncore = snt.LSTM(hidden_size=64)\nseq = tf.random.normal([10, 2, 32])  # 10 steps, batch=2, features=32\nstate = core.initial_state(batch_size=2)\n\n# Attack via static_unroll (separate entry point from dynamic_unroll)\n# Attack 1: Negative sequence_length -- freezes all outputs\noutputs_neg, _ = snt.static_unroll(\n    core, seq, state, sequence_length=tf.constant([-1, -1]))\n# All outputs are zero regardless of input\n\n# Attack 2: Oversize sequence_length -- disables masking\noutputs_big, _ = snt.static_unroll(\n    core, seq, state, sequence_length=tf.constant([999999, 999999]))\n# Masking disabled for all 10 timesteps\n```\n\n---\n\n## Variant 2: parallel_iterations in dynamic_unroll — Unchecked Integer to tf.while_loop\n\nPhase: 10\nSequence: 022\nSlug: dynamic-unroll-parallel-iterations-unchecked\nVerdict: VALID\nRationale: The parallel_iterations parameter to dynamic_unroll is an integer that flows directly to tf.autograph.experimental.set_loop_options without any bounds validation; zero or negative values are invalid per TF while_loop contract and produce undefined behavior or errors that may crash the serving process.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-021-sequence-length-bounds.md\nOrigin-Pattern: AP-021\n\n### Summary\n\n`dynamic_unroll` at `recurrent.py:295` accepts a `parallel_iterations` integer parameter that controls the TensorFlow `while_loop` parallelism. The parameter is stored and used directly at line 369 via `tf.autograph.experimental.set_loop_options(parallel_iterations=parallel_iterations, ...)`. There is no validation that `parallel_iterations \u003e= 1`, which is the requirement documented in TensorFlow's `tf.while_loop` API. This is the same root cause as the confirmed finding: an integer parameter that controls loop/data-flow behavior without bounds validation.\n\nThe attack pattern is structurally identical to the original: an unchecked integer parameter used in a control-flow operation (loop configuration) that gates computational behavior.\n\n### Location\n\n- `sonnet/src/recurrent.py:300` — `parallel_iterations=1` parameter (no validation)\n- `sonnet/src/recurrent.py:368–371` — `tf.autograph.experimental.set_loop_options(parallel_iterations=parallel_iterations, ...)` without any prior bounds check\n- The `set_loop_options` call maps directly to `tf.while_loop(parallel_iterations=...)` in TF graph construction\n\n### Attacker Control\n\nAPI caller supplies `parallel_iterations` to `snt.dynamic_unroll`. In serving system configurations where the RNN unroll parameters are configurable from request metadata or configuration payloads, an attacker controlling this integer can cause undefined behavior in loop scheduling. The parameter is a Python `int` (not a tensor), so it affects graph construction rather than eager execution, making it particularly impactful in `@tf.function` contexts.\n\n### Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied integer flows to `tf.while_loop` parallel_iterations without bounds validation. Per TensorFlow documentation, `parallel_iterations` must be a positive integer (`\u003e= 1`). Values of 0 or negative are undefined behavior.\n\n### Impact\n\n- `parallel_iterations=0`: Passed directly to `tf.while_loop`. TF internal behavior with `parallel_iterations=0` is undefined; in eager mode this may trigger an assertion error in TF C++ kernel. In graph mode (`tf.function`), the graph is compiled with this invalid parameter, potentially causing silent incorrect scheduling or a crash when the function is first called.\n- `parallel_iterations \u003c 0`: Negative values are also undefined. Some TF versions may treat negative `parallel_iterations` as \"unlimited,\" causing excessive memory allocation (OOM DoS).\n- Impact is conditional on deployment: affects `@tf.function`-wrapped serving code more severely than eager-mode usage.\n\n### Evidence\n\n```python\n# recurrent.py:295-384 (dynamic_unroll)\n@utils.smart_autograph\ndef dynamic_unroll(\n    core,\n    input_sequence,\n    initial_state,\n    sequence_length=None,\n    parallel_iterations=1,    # :300 -- no validation that \u003e= 1\n    swap_memory=False):\n    ...\n    for t in tf.range(1, num_steps):\n        tf.autograph.experimental.set_loop_options(\n            parallel_iterations=parallel_iterations,   # :369 -- unchecked\n            swap_memory=swap_memory,\n            maximum_iterations=num_steps - 1)\n```\n\nNo guard exists between the parameter and `set_loop_options`. The only guard in the function is within `_unstack_input_sequence` which validates input_sequence dimensions, not the loop control parameters.\n\n### Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\n\ncore = snt.LSTM(hidden_size=64)\nseq = tf.random.normal([10, 2, 32])\nstate = core.initial_state(batch_size=2)\n\n# Attack: zero parallel_iterations -- invalid for tf.while_loop\n@tf.function\ndef run_with_bad_parallel():\n    return snt.dynamic_unroll(\n        core, seq, state, parallel_iterations=0)\n\nrun_with_bad_parallel()  # Undefined behavior; may crash or silently misbehave\n\n# Attack: negative parallel_iterations\n@tf.function\ndef run_with_negative_parallel():\n    return snt.dynamic_unroll(\n        core, seq, state, parallel_iterations=-1)\n\nrun_with_negative_parallel()  # May cause unlimited parallelism -\u003e OOM\n```\n\n---\n\n## Variant 3: BatchApply.num_dims — Unchecked Integer Controls merge_leading_dims Shape\n\nPhase: 10\nSequence: 023\nSlug: batch-apply-num-dims-unchecked\nVerdict: VALID\nRationale: BatchApply stores num_dims without bounds validation beyond the implicit rank check in merge_leading_dims; a value of 0 causes tf.reduce_prod over an empty slice returning 1, silently producing a tensor with a spurious leading dimension of 1 instead of the correctly merged batch dimension, corrupting all downstream computation.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-021-sequence-length-bounds.md\nOrigin-Pattern: AP-021\n\n### Summary\n\n`BatchApply` at `sonnet/src/batch_apply.py:25` accepts a `num_dims: int` constructor parameter that controls how many leading dimensions are merged when applying a module to a time-major sequence. The parameter is stored as `self.num_dims` without validation and is used directly in `merge_leading_dims` and `split_leading_dim` on every `__call__`. \n\nThe only check in `merge_leading_dims` is `if num_dims \u003e x.shape.rank: return x` (line 176), which protects against over-large values but does not protect against `num_dims = 0` or `num_dims \u003c 0`. When `num_dims = 0`, `tensor_shape[:0]` is an empty slice, `tf.reduce_prod([])` returns the scalar `1` (the identity element), and the resulting reshape prepends a spurious leading dimension of 1 — silently corrupting tensor shapes for all subsequent computation. This matches the root cause pattern: an unchecked integer parameter that controls data flow without bounds validation.\n\nThis sink is flagged in `archon/codeql-artifacts/sinks.json` as `np-prod-shape sink at sonnet/src/batch_apply.py:130`, confirming CodeQL identified this as a risky shape computation.\n\n### Location\n\n- `sonnet/src/batch_apply.py:47` — `num_dims: int = 2` constructor parameter (no validation)\n- `sonnet/src/batch_apply.py:51` — `self.num_dims = num_dims` (stored without bounds check)\n- `sonnet/src/batch_apply.py:58–60` — used directly in `merge_leading_dims` and `split_leading_dim`\n- `sonnet/src/batch_apply.py:176` — only check is `if num_dims \u003e x.shape.rank` (misses 0 and negative)\n- `sonnet/src/batch_apply.py:185` — `tf.reduce_prod(tensor_shape[:num_dims], ...)` (sink; also flagged at :130 for static path via `maybe_prod`)\n\n### Attacker Control\n\nAPI caller supplies `num_dims` to `BatchApply(module, num_dims=...)`. In configurable ML serving systems where pipeline stages are constructed from configuration (e.g., Gin, YAML, or protocol buffer configs), the `num_dims` parameter may be user-controlled. Even in non-adversarial contexts, a misconfiguration of `num_dims=0` produces silent output corruption with no error raised.\n\n### Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied integer `num_dims` is stored and used without validation in every `__call__`. Unlike the original sequence_length finding (which gates masking), this parameter controls the reshape operation that merges batch and time dimensions — incorrect values produce silently wrong tensor shapes flowing into the inner module, corrupting all outputs.\n\n### Impact\n\n- `num_dims = 0`: `x.shape[:0]` is empty, `maybe_prod([]) = np.prod([]) = 1.0` (static path); `tf.reduce_prod(tensor_shape[:0]) = 1` (dynamic path). The merged shape is `[1] + remaining_dims` instead of the correct `[T*B] + remaining_dims`. The inner module receives a tensor with a spurious leading dimension of 1, producing incorrect outputs without any error.\n\n- `num_dims \u003c 0` (e.g., -1): Python slice `x.shape[:-1]` drops the last dimension. `tf.reduce_prod` of the resulting shape computes a product excluding the final dim. The reshape silently produces wrong dimensions.\n\n- `num_dims \u003e rank` (very large): The check at line 176 correctly returns `x` unchanged, but then `split_leading_dim` will receive a tensor that was never merged, causing a shape mismatch in `tf.reshape` at line 119 or 124, raising an error. This is a DoS path.\n\nIn all three cases, the corruption is silent (no exception raised) for the 0 and negative cases, meaning model outputs are incorrect without alerting the operator.\n\n### Evidence\n\n```python\n# batch_apply.py:45-73 (BatchApply.__init__ and __call__)\nclass BatchApply(base.Module):\n    def __init__(self,\n                 module: Callable[..., tf.Tensor],\n                 num_dims: int = 2,   # :47 -- no validation\n                 name: Optional[str] = None):\n        super().__init__(name=name)\n        self.module = module\n        self.num_dims = num_dims   # :51 -- stored without bounds check\n\n    def __call__(self, *args, **kwargs):\n        num_dims = self.num_dims\n        merge = lambda x: merge_leading_dims(x, num_dims=num_dims)  # :59 -- used directly\n        ...\n\n# batch_apply.py:166-192 (merge_leading_dims)\ndef merge_leading_dims(x, num_dims):\n    ...\n    if num_dims \u003e x.shape.rank:   # :176 -- only guard; misses num_dims=0 and num_dims\u003c0\n        return x\n\n    static_shape = [maybe_prod(x.shape[:num_dims])] + x.shape[num_dims:]  # :179\n    # When num_dims=0: maybe_prod([]) = np.prod([]) = 1.0 -\u003e [1] + full_shape\n    # Silent corruption: prepends spurious dim of 1\n\n    ...\n    leading_dim = tf.reduce_prod(tensor_shape[:num_dims], keepdims=True)  # :185\n    # When num_dims=0: tf.reduce_prod([]) = 1 (empty product identity)\n    # Silent corruption: leading_dim=1, not T*B\n```\n\nThe `np-prod-shape` sink at `batch_apply.py:130` is explicitly listed in `archon/codeql-artifacts/sinks.json`, confirming CodeQL identified this shape computation as a risk point.\n\n### Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\nimport numpy as np\n\nlinear = snt.Linear(8)\n\n# Attack: num_dims=0 -- silently corrupts tensor shape\nba = snt.BatchApply(linear, num_dims=0)\nx = tf.random.normal([5, 3, 16])  # [T=5, B=3, F=16]\n\nresult = ba(x)\n# Expected: linear applied
