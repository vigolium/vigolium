 or more outbound HTTP requests to the attacker-controlled URL. The error response differentiates between connection refused, timeout, and parse error, providing an internal-network port scanning oracle. The same flow applies to `CreateRegistry` and `UpdateRegistry` which also call `c.validate()` → `IsHealthy`.\\\\n\\\\nUnlike `PingScanner` (p8-029), the registry ping can authenticate to the target endpoint using user-supplied credentials (`access_key`, `access_secret`), amplifying the impact to authenticated internal SSRF.\\\\n\\\\n## Location\\\\n\\\\n- `src/server/v2.0/handler/registry.go:225-292` — `PingRegistry` accepts URL, calls `ValidateHTTPURL` then `IsHealthy`\\\\n- `src/server/v2.0/handler/registry.go:46-77` — `CreateRegistry` calls `r.ctl.Create` which validates then probes\\\\n- `src/controller/registry/controller.go:88-110` — `validate()` calls `ValidateHTTPURL` (scheme-only) then `IsHealthy`\\\\n- `src/controller/registry/controller.go:172-182` — `IsHealthy` creates adapter and calls `HealthCheck()`\\\\n- `src/pkg/reg/adapter/native/adapter.go:118-131` — `HealthCheck` calls `Ping()` making HTTP GET to registry URL\\\\n- `src/lib/endpoint.go:27-45` — `ValidateHTTPURL` validates scheme only, no IP filtering\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin controls registry URL via `POST /api/v2.0/registries/ping` with body `{\\\\\\"url\\\\\\": \\\\\\"http://169.254.169.254/\\\\\\", \\\\\\"type\\\\\\": \\\\\\"harbor\\\\\\"}`\\\\n- URL passes `ValidateHTTPURL` (http/https scheme accepted, no IP filtering)\\\\n- Credentials `access_key`/`access_secret` passed as BasicAuth to the target — enables authenticated internal SSRF\\\\n- `insecure: true` bypasses TLS certificate verification\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-8: Core API container to any HTTP-reachable host on the internal network\\\\n- System admin privilege escalates to internal network HTTP reconnaissance with credential injection\\\\n\\\\n## Impact\\\\n\\\\n- Internal service discovery via error-based oracle (connection refused vs. timeout)\\\\n- Cloud metadata credential theft (`http://169.254.169.254/latest/meta-data/`)\\\\n- Authenticated SSRF: user-supplied credentials forwarded as BasicAuth to internal endpoints\\\\n- TLS bypass via `insecure: true` enables targeting self-signed internal HTTPS services\\\\n\\\\n## Evidence\\\\n\\\\n- `registry.go:243`: `lib.ValidateHTTPURL(*params.Registry.URL)` — scheme-only validation\\\\n- `controller.go:95`: `lib.ValidateHTTPURL(registry.URL)` — same scheme-only check in validate()\\\\n- `controller.go:101`: `c.IsHealthy(ctx, registry)` — makes outbound HTTP request\\\\n- `endpoint_test.go:32-33`: `http://127.0.0.1` and `http://169.254.169.254` pass ValidateHTTPURL\\\\n- Pattern matches AP-022: ValidateHTTPURL as sole URL validation before HTTP request\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Send: `POST /api/v2.0/registries/ping` with body:\\\\n   `{\\\\\\"url\\\\\\": \\\\\\"http://169.254.169.254/latest/meta-data/\\\\\\", \\\\\\"type\\\\\\": \\\\\\"harbor\\\\\\", \\\\\\"insecure\\\\\\": true}`\\\\n3. Observe error response: timeout (host unreachable), connection refused (port closed), or registry error (port open)\\\\n4. Iterate across internal IPs/ports to map internal network\\\\n5. For authenticated SSRF: include `credential_type`, `access_key`, `access_secret` in body\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"finding_hash\\":\\"7acf6bbb9d4b016fe6fd05abc78a9a97\\",\\"found_at\\":\\"2026-03-30T18:45:41.016111Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":2,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-002\\",\\"module_name\\":\\"The `PingOIDC` handler at `POST /api/v2.0/system/oidc/ping` accepts a user-supplied OIDC endpoint URL and calls `oidcpkg.TestEndpoint(conn)` → `gooidc.NewProvider(ctx, conn.URL)`. The go-oidc librar\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-ping-ssrf\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `PingOIDC` handler at `POST /api/v2.0/system/oidc/ping` accepts a user-supplied OIDC endpoint URL and calls `oidcpkg.TestEndpoint(conn)` → `gooidc.NewProvider(ctx, conn.URL)`. The go-oidc library immediately issues an outbound HTTP GET to `{url}/.well-known/openid-configuration` to fetch the OIDC discovery document. There is no IP filtering, no `ValidateHTTPURL` call, and no allowlist check applied to the URL before the outbound request. The `verify_cert: false` option additionally enables TLS bypass.\\\\n\\\\nUnlike scanner and registry ping endpoints, PingOIDC appends a fixed path suffix (`/.well-known/openid-configuration`), limiting the attacker to error-based oracle (similar to PingScanner\'s fixed `/api/v1/metadata` suffix). However, the fixed suffix is predictable and any server responding to that path will trigger further requests.\\\\n\\\\n## Location\\\\n\\\\n- `src/server/v2.0/handler/oidc.go:37-51` — `PingOIDC` accepts URL, passes to `TestEndpoint`\\\\n- `src/pkg/oidc/helper.go:505-512` — `TestEndpoint` calls `gooidc.NewProvider(ctx, conn.URL)`\\\\n- `src/pkg/oidc/helper.go:86-104` — `providerHelper.create()` uses same pattern for stored OIDC config\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin controls the `url` field via `POST /api/v2.0/system/oidc/ping`\\\\n- URL is passed directly to `gooidc.NewProvider` with no IP filtering\\\\n- `verify_cert: false` disables TLS certificate verification\\\\n- Fixed path suffix `/.well-known/openid-configuration` appended — error-based oracle only\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-8: Core API container to any HTTP-reachable host on the internal network\\\\n- System admin privilege escalates to internal network HTTP probing\\\\n\\\\n## Impact\\\\n\\\\n- Internal service discovery via error-based oracle\\\\n- Cloud metadata probing via `http://169.254.169.254/.well-known/openid-configuration`\\\\n- TLS bypass via `verify_cert: false` enables targeting internal HTTPS services\\\\n- If a metadata service or internal HTTP server happens to serve the discovery path, full SSRF response disclosure\\\\n\\\\n## Evidence\\\\n\\\\n- `oidc.go:41-43`: `oidcpkg.TestEndpoint(oidcpkg.Conn{URL: params.Endpoint.URL, VerifyCert: params.Endpoint.VerifyCert})` — no URL sanitization before call\\\\n- `helper.go:509-511`: `gooidc.NewProvider(ctx, conn.URL)` — HTTP request made immediately\\\\n- No `ValidateHTTPURL` call in the PingOIDC code path (unlike PingRegistry and PingScanner which at least call scheme validation)\\\\n- Pattern matches AP-022: user-controlled URL as sole input to HTTP client call\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Send: `POST /api/v2.0/system/oidc/ping` with body:\\\\n   `{\\\\\\"url\\\\\\": \\\\\\"http://169.254.169.254\\\\\\", \\\\\\"verify_cert\\\\\\": false}`\\\\n3. Observe: go-oidc attempts GET to `http://169.254.169.254/.well-known/openid-configuration`\\\\n4. Response timing/error message reveals open vs. closed vs. filtered port status\\\\n5. Iterate across internal IPs to discover services responding on port 80/443\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"finding_hash\\":\\"6e815ede4793b6e90b3d9698255a0c8e\\",\\"found_at\\":\\"2026-03-30T18:45:41.016112Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":3,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-003\\",\\"module_name\\":\\"The preheat finding (p8-024) documented SSRF through `GetHealth` for Dragonfly and Kraken providers. A structural variant exists in the `Preheat()` and `CheckProgress()` methods of both providers: the\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"kraken-preheat-no-url-revalidation\\",\\"description\\":\\"## Summary\\\\n\\\\nThe preheat finding (p8-024) documented SSRF through `GetHealth` for Dragonfly and Kraken providers. A structural variant exists in the `Preheat()` and `CheckProgress()` methods of both providers: these execution paths use `kd.instance.Endpoint` directly to construct URLs and make HTTP requests without calling `ValidateHTTPURL` at all, even for the scheme check. The Kraken `GetHealth` calls `ValidateHTTPURL` at line 63, but `Preheat()` at line 89 constructs the URL from the same endpoint without validation before calling `client.GetHTTPClient(...).Post(url, ...)`. Dragonfly `Preheat()` at line 268 and `CheckProgress()` at line 297 also skip URL re-validation.\\\\n\\\\nSince the endpoint originates from the stored preheat instance (user-controlled, confirmed in p8-024), the Preheat execution path represents an independent SSRF trigger that fires during artifact push events — increasing the attack surface and triggering frequency compared to the health-check-only path.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/p2p/preheat/provider/kraken.go:89-108` — `Preheat()` constructs URL from `kd.instance.Endpoint`, no `ValidateHTTPURL`, HTTP POST made\\\\n- `src/pkg/p2p/preheat/provider/dragonfly.go:268-269` — `Preheat()` constructs URL from `dd.instance.Endpoint`, no `ValidateHTTPURL`, HTTP POST\\\\n- `src/pkg/p2p/preheat/provider/dragonfly.go:297-298` — `CheckProgress()` constructs URL, no `ValidateHTTPURL`, HTTP GET\\\\n- `src/controller/p2p/preheat/controller.go:195` — `CreateInstance` stores endpoint without validation (confirmed p8-024)\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin creates preheat instance with malicious endpoint via `POST /api/v2.0/p2p/preheat/instances`\\\\n- Endpoint stored in DB as confirmed in p8-024\\\\n- `Preheat()` triggered automatically on artifact push matching preheat policy — no further admin action needed\\\\n- `kd.instance.Insecure = true` disables TLS verification\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-8: Job Service / Core container to internal network\\\\n- Automatic trigger on artifact push eliminates the need for manual health-check initiation\\\\n\\\\n## Impact\\\\n\\\\n- Same as p8-024: cloud metadata credential theft, internal service discovery\\\\n- Additional trigger vector: Preheat fires on every artifact push matching the policy, enabling high-frequency probing\\\\n- No scheme validation in Preheat path — technically allows non-http schemes if instance endpoint was stored with ftp:// or other scheme (CreateInstance only warns health check, doesn\'t validate endpoint format rigorously)\\\\n\\\\n## Evidence\\\\n\\\\n- `kraken.go:63`: `url, err := lib.ValidateHTTPURL(url)` present in `GetHealth()` only\\\\n- `kraken.go:89`: `url := fmt.Sprintf(\\\\\\"%s%s\\\\\\", strings.TrimSuffix(kd.instance.Endpoint, \\\\\\"/\\\\\\"), krakenPreheatPath)` — no ValidateHTTPURL before HTTP call\\\\n- `dragonfly.go:268`: same pattern in `Preheat()` — no revalidation\\\\n- `dragonfly.go:297`: same in `CheckProgress()`\\\\n- Instance endpoint user-controlled per p8-024 evidence\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Create preheat instance: `POST /api/v2.0/p2p/preheat/instances` with `{\\\\\\"endpoint\\\\\\": \\\\\\"http://169.254.169.254/\\\\\\", \\\\\\"vendor\\\\\\": \\\\\\"kraken\\\\\\", \\\\\\"name\\\\\\": \\\\\\"test\\\\\\", \\\\\\"insecure\\\\\\": true}`\\\\n3. Create preheat policy for a project targeting this instance\\\\n4. Push any artifact matching the policy filter\\\\n5. `KrakenDriver.Preheat()` executes HTTP POST to `http://169.254.169.254/registry/notifications` — bypasses even scheme check in execution path\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"finding_hash\\":\\"b8a2815977c082234f33a47c89b042c1\\",\\"found_at\\":\\"2026-03-30T18:45:41.016113Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":4,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-020\\",\\"module_name\\":\\"Harbor\'s OIDC CLI secret authentication path (`oidc_cli.go:72`) calls `oidc.VerifySecret` which performs a plaintext secret comparison with no rate limiting, no lockout, and no delay on failure. This \\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-cli-secret-no-brute-force\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s OIDC CLI secret authentication path (`oidc_cli.go:72`) calls `oidc.VerifySecret` which performs a plaintext secret comparison with no rate limiting, no lockout, and no delay on failure. This is structurally identical to the confirmed robot account brute-force gap (p8-009): the human account path via `basicAuth.Generate` -> `auth.Login` has `lock.IsLocked` + `lock.Lock` + `time.Sleep(1.5s)`, but the OIDC CLI path bypasses all of these. OIDC CLI secrets are randomly generated via `utils.GenerateRandomString()` providing good entropy, but the complete absence of throttling removes defense-in-depth and leaves the endpoint unprotected against automated attacks.\\\\n\\\\n## Location\\\\n\\\\n- `src/server/middleware/security/oidc_cli.go:72` -- `oidc.VerifySecret(ctx, username, secret)` called with no preceding lock check\\\\n- `src/pkg/oidc/secret.go:86-139` -- `VerifySecret` does a string comparison with no sleep, no lock\\\\n- `src/core/auth/authenticator.go:151-160` -- human account path has lock and 1.5s sleep (absent in OIDC CLI path)\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls HTTP Basic Auth credentials with a valid OIDC username and guessed CLI secret. The username can be harvested through the Harbor UI (project members, users endpoint). CLI secrets are managed by users via the Harbor UI profile page and are used in CI/CD Docker login commands.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nExternal network -> OIDC CLI secret authentication. CLI secrets are used by CI/CD pipelines for artifact registry operations. A compromised CLI secret allows the attacker to push/pull artifacts or trigger replication, potentially enabling supply-chain attacks.\\\\n\\\\n## Impact\\\\n\\\\n- Unlimited online guessing against OIDC user CLI secrets\\\\n- No sleep, no lockout, no counter: requests processed at full server throughput\\\\n- OIDC CLI secrets are used for container registry operations (docker login) -- compromise enables supply-chain attacks equivalent to robot account compromise\\\\n- Contrast: human web login has per-process lockout (5 attempts per 1.5s window), robot accounts have no limit (p8-009), OIDC CLI secrets also have no limit\\\\n- The `oidc_cli.valid()` filter restricts paths (only `/v2`, `/service/token`, etc.), but these are exactly the paths used for automated tooling\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/server/middleware/security/oidc_cli.go:48-82\\\\nfunc (o *oidcCli) Generate(req *http.Request) security.Context {\\\\n    username, secret, ok := req.BasicAuth()\\\\n    // ... no lock.IsLocked check ...\\\\n    info, err := oidc.VerifySecret(ctx, username, secret)\\\\n    if err != nil {\\\\n        // NO lock.Lock(), NO time.Sleep()\\\\n        return nil\\\\n    }\\\\n    // ...\\\\n}\\\\n\\\\n// src/core/auth/authenticator.go:151-160 (human account path -- has protection)\\\\nif lock.IsLocked(m.Principal) {\\\\n    return nil, nil\\\\n}\\\\n// ... on failure:\\\\nlock.Lock(m.Principal)\\\\ntime.Sleep(frozenTime)  // 1.5s sleep absent in OIDC CLI path\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Identify an OIDC user account (via Harbor UI or `/api/v2.0/users`)\\\\n2. Have that user generate a CLI secret via the Harbor UI profile page\\\\n3. Send rapid sequential Basic Auth requests to `/v2/` with `username:<guess>` at full speed\\\\n4. Observe no rate limiting, no lockout, no per-attempt delay\\\\n5. Compare with human account login: observe 1.5s sleep on each failure and lockout\\\\n6. Recommended fix: Apply the same `UserLock` mechanism used for basic auth to the OIDC CLI secret path\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/middleware/security/oidc_cli.go:72\\",\\"matched_at\\":[\\"src/server/middleware/security/oidc_cli.go:72\\",\\"src/pkg/oidc/secret.go:86-139\\",\\"src/core/auth/authenticator.go:151-160\\"],\\"finding_hash\\":\\"e740e9ac22da2bc2749c9cac2ee6dc26\\",\\"found_at\\":\\"2026-03-30T18:45:41.016114Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":5,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-021\\",\\"module_name\\":\\"Harbor\'s HTTP AuthProxy integration assigns system admin privileges based on raw group membership from the k8s TokenReview response without any group filter. The `UserFromReviewStatus` function at `ht\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"authproxy-admin-group-no-filter\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s HTTP AuthProxy integration assigns system admin privileges based on raw group membership from the k8s TokenReview response without any group filter. The `UserFromReviewStatus` function at `http.go:122-133` checks if any of the user\'s raw groups from `status.User.Groups` matches any configured `AdminGroups` value. Unlike the OIDC path which has a `GroupFilter` regex (albeit misapplied per p8-002), the authproxy path has no group filter concept at all. A compromised k8s token review endpoint or a misconfigured cluster can grant any user Harbor system admin by including the `admin_groups` string in the TokenReview groups claim. The authproxy `AdminGroups` and `AdminUsernames` configuration values are stored as plain `StringType` (not filtered or validated), and all groups from the TokenReview are directly populated into the Harbor DB and used for admin role assignment in a single operation.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/authproxy/http.go:99-136` -- `UserFromReviewStatus` applies `adminGroups` check against raw `status.User.Groups` with no filter\\\\n- `src/pkg/authproxy/http.go:114-116` -- all groups from token review are populated to DB without filtering\\\\n- `src/server/middleware/security/auth_proxy.go:84` -- caller passes raw `httpAuthProxyConf.AdminGroups` from config\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls the k8s TokenReview response groups field. This requires either: (a) a compromised k8s API server or token review endpoint, (b) a misconfigured `HTTPAuthProxyTokenReviewEndpoint` pointing at an attacker-controlled server (facilitated by the StringType URL validation gap in p8-027), or (c) a rogue k8s cluster configured as Harbor\'s auth proxy. The `AdminGroups` value is a Harbor configuration string, discoverable from Harbor configuration API.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nHTTP AuthProxy token review response -> Harbor admin role assignment. The token review endpoint is an external system and its groups claim is trusted without any filter constraint, providing no operator control over which groups can influence the admin role.\\\\n\\\\n## Impact\\\\n\\\\n- System admin privileges granted to any authproxy-authenticated user whose groups claim includes the configured `AdminGroups` value\\\\n- Unlike OIDC which has a partial filter (albeit broken for admin), authproxy has zero group filtering\\\\n- All groups from the token review are also inserted into Harbor\'s `user_group` table (line 116), expanding the attack surface to project-level RBAC via group membership\\\\n- Admin role is assigned on every authenticated request via `user.AdminRoleInAuth = u2.AdminRoleInAuth` in `auth_proxy.go:90`\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/pkg/authproxy/http.go:114-133\\\\nif len(status.User.Groups) > 0 {\\\\n    userGroups := model.UserGroupsFromName(status.User.Groups, common.HTTPGroupType)\\\\n    groupIDList, err := usergroup.Mgr.Populate(orm.Context(), userGroups)  // ALL groups inserted, no filter\\\\n    // ...\\\\n    if len(adminGroups) > 0 && !user.AdminRoleInAuth {\\\\n        agm := make(map[string]struct{})\\\\n        for _, ag := range adminGroups {\\\\n            agm[ag] = struct{}{}\\\\n        }\\\\n        for _, ug := range status.User.Groups {  // raw groups, no filter\\\\n            if _, ok := agm[ug]; ok {\\\\n                user.AdminRoleInAuth = true  // admin granted from unfiltered claim\\\\n                break\\\\n            }\\\\n        }\\\\n    }\\\\n}\\\\n\\\\n// Compare: OIDC path has GroupFilter (misapplied per p8-002), AuthProxy has NO filter at all\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure Harbor with HTTP AuthProxy mode, set `admin_groups` to \\\\\\"harbor-admins\\\\\\"\\\\n2. Configure a malicious token review endpoint that returns `status.User.Groups = [\\\\\\"harbor-admins\\\\\\"]`\\\\n3. Send a Docker login request to Harbor with a token that the malicious endpoint validates\\\\n4. Observe Harbor grants system admin role via `AdminRoleInAuth = true`\\\\n5. Verify the user can perform admin operations\\\\n6. Recommended fix: Add a `GroupFilter` equivalent to the authproxy configuration and apply it before admin group membership check, analogous to OIDC\'s `GroupFilter` (and fix its application order per p8-002)\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/pkg/authproxy/http.go:99-136\\",\\"matched_at\\":[\\"src/pkg/authproxy/http.go:99-136\\",\\"src/pkg/authproxy/http.go:114-116\\",\\"src/server/middleware/security/auth_proxy.go:84\\"],\\"finding_hash\\":\\"70f8bf6f26fa62a8e82f45bfa49e8018\\",\\"found_at\\":\\"2026-03-30T18:45:41.016115Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":6,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-022\\",\\"module_name\\":\\"Harbor\'s replication registry manager (`pkg/reg/manager.go:191`) decrypts registry `access_secret` credentials using `utils.ReversibleDecrypt`, the same function confirmed in p8-011 to fall back to ba\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"registry-credential-base64-fallback\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s replication registry manager (`pkg/reg/manager.go:191`) decrypts registry `access_secret` credentials using `utils.ReversibleDecrypt`, the same function confirmed in p8-011 to fall back to base64 decoding when the stored value lacks the `<enc-v1>` AES prefix. In Harbor instances upgraded from pre-AES-encryption versions, the `registry` table\'s `access_secret` column may contain legacy base64-encoded registry passwords. These can be decoded without the AES key by anyone with database read access, exposing replication credentials (passwords, API tokens) for all configured external registries (Docker Hub, ECR, GCR, Harbor, etc.). The `lib/encrypt/encrypt.go` wrapper also inherits this fallback, affecting any config `PasswordType` field loaded from the DB via `pkg/config/db/db.go:52`.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/reg/manager.go:191` -- `utils.ReversibleDecrypt(secret, secretKey)` with base64 fallback\\\\n- `src/pkg/reg/dao/model.go:34` -- `access_secret` column in `registry` table\\\\n- `src/common/utils/encrypt.go:82-89` -- shared `ReversibleDecrypt` base64 fallback (root cause)\\\\n- `src/lib/encrypt/encrypt.go:81` -- `Instance().Decrypt()` calls same function, affects PasswordType config fields\\\\n- `src/pkg/config/db/db.go:52` -- PasswordType config items decrypted via same path\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker needs read access to the PostgreSQL database\'s `registry` table (or `config` table for PasswordType fields). This is the same elevated precondition as p8-011. Reachable via SQL injection, backup exposure, or compromised DB credentials.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nDatabase read access -> Plaintext replication credentials. Registry `access_secret` values encrypted before the AES migration are recoverable as base64 without the AES key, exposing credentials for all external registries configured for replication.\\\\n\\\\n## Impact\\\\n\\\\n- Registry credentials (passwords, API tokens) for all legacy replication targets exposed in plaintext (base64 only)\\\\n- Compromised credentials enable: unauthorized image push/pull at target registries, lateral movement to connected registries (ECR, GCR, Docker Hub accounts), and supply-chain attacks via image tampering at replicated registries\\\\n- Also affects PasswordType config fields (LDAP bind password via `lib/encrypt` wrapper) stored before AES migration\\\\n- Registry credentials are long-lived service account credentials -- no automatic rotation\\\\n- Compared to p8-011 (OIDC tokens): registry credentials are static passwords rather than time-limited tokens, potentially worse long-term exposure\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/pkg/reg/manager.go:182-196\\\\nfunc decrypt(secret string) (string, error) {\\\\n    if len(secret) == 0 {\\\\n        return \\\\\\"\\\\\\", nil\\\\n    }\\\\n    secretKey, err := config.SecretKey()\\\\n    // ...\\\\n    decrypted, err := utils.ReversibleDecrypt(secret, secretKey)  // base64 fallback applies\\\\n    // ...\\\\n}\\\\n\\\\n// src/common/utils/encrypt.go:82-89 (root cause, same as p8-011)\\\\nfunc ReversibleDecrypt(str, key string) (string, error) {\\\\n    if strings.HasPrefix(str, EncryptHeaderV1) {\\\\n        return decryptAES(strings.TrimPrefix(str, EncryptHeaderV1), key)\\\\n    }\\\\n    return decodeB64(str)  // no AES key needed for legacy records\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Identify a Harbor instance upgraded from a pre-AES-encryption version\\\\n2. Query the `registry` table: `SELECT name, access_key, access_secret FROM registry WHERE access_secret NOT LIKE \'<enc-v1>%\' AND access_secret != \'\'`\\\\n3. For any returned records, base64-decode: `echo \\\\\\"<access_secret_value>\\\\\\" | base64 -d`\\\\n4. Observe plaintext registry password or API token\\\\n5. Use recovered credentials to authenticate to the external registry\\\\n6. Also query `config` table for PasswordType fields: compare `src/lib/config/metadata/metadatalist.go` for `PasswordType` items (e.g., `OIDCClientSecret`, LDAP bind DN password)\\\\n7. Recommended fix: Add a one-time migration script that re-encrypts all legacy base64-encoded records in the `registry` and `config` tables with AES-CFB encryption before next startup\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/pkg/reg/manager.go:191\\",\\"matched_at\\":[\\"src/pkg/reg/manager.go:191\\",\\"src/pkg/reg/dao/model.go:34\\",\\"src/common/utils/encrypt.go:82-89\\",\\"src/lib/encrypt/encrypt.go:81\\",\\"src/pkg/config/db/db.go:52\\"],\\"finding_hash\\":\\"8f44e381a39ef196dd0d3e02b4fc7c0b\\",\\"found_at\\":\\"2026-03-30T18:45:41.016116Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":7,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-040\\",\\"module_name\\":\\"In `src/core/controllers/oidc.go:203`, both the `username` and the `redirect_url` parameters are interpolated without URL encoding into the onboard redirect URL:\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-onboard-redirect-url-unencoded\\",\\"description\\":\\"## Summary\\\\n\\\\nIn `src/core/controllers/oidc.go:203`, both the `username` and the `redirect_url` parameters are interpolated without URL encoding into the onboard redirect URL:\\\\n\\\\n```go\\\\noc.Controller.Redirect(\\\\n    fmt.Sprintf(\\\\\\"/oidc-onboard?username=%s&redirect_url=%s\\\\\\", username, redirectURLStr),\\\\n    http.StatusFound,\\\\n)\\\\n```\\\\n\\\\nThe confirmed finding p8-008 documents the `username` injection vector. This variant documents the separate `redirect_url=%s` injection: `redirectURLStr` is the session-stored redirect URL (validated only by `IsLocalPath`, which allows `/path?key=val` and `/path#fragment`). A redirect URL containing `?` or `#` injects extra query parameters or a fragment into the onboard URL that the Angular SPA receives. An attacker who can influence the initial `redirect_url` query parameter to `IsLocalPath`-valid values containing metacharacters can manipulate the onboarding page\'s behavior.\\\\n\\\\n## Location\\\\n\\\\n- `src/core/controllers/oidc.go:203` -- `redirectURLStr` interpolated without `url.QueryEscape`\\\\n- `src/core/controllers/oidc.go:81-87` -- `redirectURL` accepted from query param, validated only by `IsLocalPath`\\\\n- `src/core/controllers/oidc.go:87` -- stored raw (not normalized) into session\\\\n\\\\n## Attacker Control\\\\n\\\\n1. Attacker crafts OIDC login link: `https://harbor.example.com/c/oidc/login?redirect_url=/dashboard%3Fevil%3Dinjected`\\\\n2. `IsLocalPath` passes (`/dashboard?evil=injected` starts with `/` and not `//`)\\\\n3. Value stored raw in session: `/dashboard?evil=injected`\\\\n4. New user completes OIDC auth, auto-onboard is disabled\\\\n5. Redirect issued to: `/oidc-onboard?username=newuser&redirect_url=/dashboard?evil=injected`\\\\n6. Angular SPA receives two `redirect_url` parameters, or a `redirect_url` with an injected query string fragment that alters onboarding page state\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- OIDC provider to Harbor onboarding Angular SPA\\\\n- Attacker-controlled URL metacharacters break parameter boundary in frontend redirect\\\\n\\\\n## Impact\\\\n\\\\n- Query parameter injection into Angular SPA onboarding page URL\\\\n- May override legitimate Angular route parameters depending on SPA routing logic\\\\n- Potential for open redirect if the SPA trusts the first `redirect_url` occurrence over the second\\\\n- Distinct from p8-008 (username injection): targets the redirect_url parameter rather than username\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/core/controllers/oidc.go:203\\\\noc.Controller.Redirect(\\\\n    fmt.Sprintf(\\\\\\"/oidc-onboard?username=%s&redirect_url=%s\\\\\\", username, redirectURLStr),\\\\n    http.StatusFound,\\\\n)\\\\n// redirectURLStr: retrieved from session at oidc.go:166:\\\\n//   redirectURLStr, _ = oc.GetSession(redirectURLKey).(string)\\\\n// IsLocalPath(\\\\\\"/dashboard?evil=injected\\\\\\") == true (starts with /, not //)\\\\n// url.QueryEscape NOT applied to redirectURLStr\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure Harbor with OIDC auth mode, auto-onboard disabled\\\\n2. Craft URL: `https://harbor.example.com/c/oidc/login?redirect_url=/dashboard%3Fevil%3Dinjected%26second%3Dparam`\\\\n3. Have a first-time OIDC user authenticate via this link\\\\n4. Observe the onboard redirect: `/oidc-onboard?username=user&redirect_url=/dashboard?evil=injected&second=param`\\\\n5. The Angular SPA router receives `redirect_url=/dashboard` with extra injected params\\\\n6. Recommended fix: apply `url.QueryEscape(redirectURLStr)` in the fmt.Sprintf call\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/core/controllers/oidc.go:203\\",\\"matched_at\\":[\\"src/core/controllers/oidc.go:203\\",\\"src/core/controllers/oidc.go:81-87\\",\\"src/core/controllers/oidc.go:87\\"],\\"finding_hash\\":\\"98ad76af00ecb942fb4c89055c44b3eb\\",\\"found_at\\":\\"2026-03-30T18:45:41.016116Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":8,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-041\\",\\"module_name\\":\\"`FilterByNames` in `src/pkg/project/models/project.go:256-266` builds a SQL subquery by wrapping each project name string in literal single-quote characters and concatenating them via `strings.Join`. \\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"sql-injection-project-filterbynames\\",\\"description\\":\\"## Summary\\\\n\\\\n`FilterByNames` in `src/pkg/project/models/project.go:256-266` builds a SQL subquery by wrapping each project name string in literal single-quote characters and concatenating them via `strings.Join`. There is no parameterization and no use of `orm.QuoteLiteral`. The pattern is structurally identical to p7-003\'s `fmt.Sprintf + FilterRaw()` anti-pattern. Although project names are currently restricted to `[a-z0-9._-]+` by `validProjectName` regex (preventing single-quote injection today), the query construction is unsafe-by-design and would become exploitable if:\\\\n\\\\n- The regex validation is relaxed or bypassed\\\\n- Names arrive through a code path that skips `validProjectName` (e.g., migration, direct DB insert, replication from a remote Harbor with different validation)\\\\n- A future developer copies this pattern with a less-restricted string type\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/project/models/project.go:256-266` -- `FilterByNames` function\\\\n- `src/server/v2.0/handler/repository.go:144` -- robot token namespace -> `NamesQuery`\\\\n- `src/server/v2.0/handler/project.go:484` -- robot token namespace -> `NamesQuery`\\\\n\\\\n## Attacker Control\\\\n\\\\nCurrent: INDIRECT. Project names used in `NamesQuery.Names` originate from robot token permission namespaces (stored in DB, resolved via `proMgr.Get`). Project names are validated at creation time by `validProjectName` regex. However, a replication scenario copying projects from a remote registry with weaker validation could introduce names containing SQL metacharacters.\\\\n\\\\nHypothetical direct path: If `validProjectName` were widened to allow `\'` (single quote), a project named `x\' UNION SELECT password FROM harbor_user; --` would cause SQL injection in any `ListRepositories` or `ListProjects` call by a robot with that project permission.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-3 (Core API to PostgreSQL) -- same boundary as p7-003\\\\n\\\\n## Impact\\\\n\\\\n- Same as p7-003: confidentiality (data exfiltration via UNION), integrity (data modification)\\\\n- Robot account project enumeration affected -- ListRepositories and ListProjects handlers both trigger FilterByNames\\\\n- Regression risk: pattern is structurally dangerous and will become exploitable if name validation weakens\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/pkg/project/models/project.go:256-266\\\\nvar names []string\\\\nfor _, v := range query.Names {\\\\n    names = append(names, `\'`+v+`\'`)   // single-quote wrapping, NO parameterization\\\\n}\\\\nsubQuery := fmt.Sprintf(\\\\\\"SELECT project_id FROM project where name IN (%s)\\\\\\", strings.Join(names, \\\\\\",\\\\\\"))\\\\n// ...\\\\nreturn qs.FilterRaw(\\\\\\"project_id\\\\\\", fmt.Sprintf(\\\\\\"IN (%s)\\\\\\", subQuery))\\\\n\\\\n// Compare: project.go:214 (uses orm.QuoteLiteral -- the safe pattern)\\\\nreturn qs.FilterRaw(\\\\\\"owner_id\\\\\\", fmt.Sprintf(\\\\\\"IN (SELECT user_id FROM harbor_user WHERE username = %s)\\\\\\", orm.QuoteLiteral(username)))\\\\n```\\\\n\\\\nNote: `FilterByOwner` at line 214 correctly uses `orm.QuoteLiteral(username)` for the same type of string interpolation. `FilterByNames` does not.\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. (Currently blocked by name regex) Create a project with name containing SQL metacharacter\\\\n2. Create a robot account scoped to that project\\\\n3. Authenticate with robot account JWT\\\\n4. Call `GET /api/v2.0/repositories` or `GET /api/v2.0/projects`\\\\n5. `FilterByNames` would execute injected SQL payload\\\\n6. Recommended fix: replace `\'`+v+`\'` concatenation with `orm.QuoteLiteral(v)` or use `orm.ParamPlaceholderForIn` with parameterized query\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/pkg/project/models/project.go:256-266\\",\\"matched_at\\":[\\"src/pkg/project/models/project.go:256-266\\",\\"src/server/v2.0/handler/repository.go:144\\",\\"src/server/v2.0/handler/project.go:484\\"],\\"finding_hash\\":\\"25b4ffd2c1275a697d774493b7730b14\\",\\"found_at\\":\\"2026-03-30T18:45:41.016118Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":9,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-042\\",\\"module_name\\":\\"`FilterByArtifactDigest` and `FilterByArtifactDigests` in `src/pkg/blob/models/blob.go:131` and `146` build SQL subqueries by wrapping string values in literal single-quotes without using parameterize\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"sql-injection-blob-filterbyartifactdigest\\",\\"description\\":\\"## Summary\\\\n\\\\n`FilterByArtifactDigest` and `FilterByArtifactDigests` in `src/pkg/blob/models/blob.go:131` and `146` build SQL subqueries by wrapping string values in literal single-quotes without using parameterized queries or `orm.QuoteLiteral`:\\\\n\\\\n```go\\\\nsql := fmt.Sprintf(\\\\\\"IN (SELECT digest_blob FROM artifact_blob WHERE digest_af IN (%s))\\\\\\", `\'`+v+`\'`)\\\\n```\\\\n\\\\nThis is the same anti-pattern documented in p7-003. Digest strings (`sha256:...`) are currently gated by `opencontainers/go-digest.Parse()` which enforces `algorithm:hex` format. However, the SQL construction is structurally unsafe. Any future code path that passes a non-validated string to the `artifactDigest` keyword (bypassing digest format validation) would produce exploitable SQL injection.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/blob/models/blob.go:131` -- `FilterByArtifactDigest`\\\\n- `src/pkg/blob/models/blob.go:143-146` -- `FilterByArtifactDigests`\\\\n\\\\n## Attacker Control\\\\n\\\\nCurrent: INDIRECT. Digest values are content-addressed SHA256 hashes validated by `go-digest.Parse()` before reaching these functions. The `algorithm:hex` format constraint blocks SQL metacharacters.\\\\n\\\\nRisk: If `artifactDigest` keyword is used with an unvalidated string (e.g., from a new code path, config file, or replication adapter that skips digest validation), the single-quote concatenation becomes exploitable.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-3 (Core API to PostgreSQL)\\\\n\\\\n## Impact\\\\n\\\\n- Confidentiality: UNION-based extraction from arbitrary DB tables\\\\n- Integrity: modification of blob/artifact association records\\\\n- Regression risk: mirrors the pattern that caused CVE-2024-22261 in Harbor\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/pkg/blob/models/blob.go:131\\\\nfunc (b *Blob) FilterByArtifactDigest(..., value any) orm.QuerySeter {\\\\n    v, ok := value.(string)\\\\n    // ...\\\\n    sql := fmt.Sprintf(\\\\\\"IN (SELECT digest_blob FROM artifact_blob WHERE digest_af IN (%s))\\\\\\", `\'`+v+`\'`)\\\\n    return qs.FilterRaw(\\\\\\"digest\\\\\\", sql)   // SINK: FilterRaw with user-controlled string\\\\n}\\\\n\\\\n// src/pkg/blob/models/blob.go:143-146\\\\nfunc (b *Blob) FilterByArtifactDigests(..., value any) orm.QuerySeter {\\\\n    // ...\\\\n    for _, v := range artifactDigests {\\\\n        afs = append(afs, `\'`+v+`\'`)    // single-quote wrapping, no parameterization\\\\n    }\\\\n    sql := fmt.Sprintf(\\\\\\"IN (SELECT digest_blob FROM artifact_blob WHERE digest_af IN (%s))\\\\\\", strings.Join(afs, \\\\\\",\\\\\\"))\\\\n    return qs.FilterRaw(\\\\\\"digest\\\\\\", sql)\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. (Currently blocked by go-digest format validation) Supply a digest string containing SQL metacharacters\\\\n2. Trigger a blob list operation that uses `artifactDigest` or `artifactDigests` keyword\\\\n3. `FilterByArtifactDigest(s)` would execute injected SQL payload\\\\n4. Recommended fix: use `orm.QuoteLiteral(v)` or `orm.ParamPlaceholderForIn` with actual query parameters instead of single-quote string concatenation\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/pkg/blob/models/blob.go:131\\",\\"matched_at\\":[\\"src/pkg/blob/models/blob.go:131\\",\\"src/pkg/blob/models/blob.go:143-146\\"],\\"finding_hash\\":\\"81f04c8481c264523cebd16ec58af0cd\\",\\"found_at\\":\\"2026-03-30T18:45:41.016119Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":10,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-043\\",\\"module_name\\":\\"`NonEmptyStringType.validate` at `src/lib/config/metadata/type.go:54-58` uses `strings.TrimSpace` as its sole emptiness guard:\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"unicode-bypass-nonemptystringtype-config\\",\\"description\\":\\"## Summary\\\\n\\\\n`NonEmptyStringType.validate` at `src/lib/config/metadata/type.go:54-58` uses `strings.TrimSpace` as its sole emptiness guard:\\\\n\\\\n```go\\\\nfunc (t *NonEmptyStringType) validate(str string) error {\\\\n    if len(strings.TrimSpace(str)) == 0 {\\\\n        return ErrStringValueIsEmpty\\\\n    }\\\\n    return nil\\\\n}\\\\n```\\\\n\\\\nGo\'s `strings.TrimSpace` only strips characters matched by `unicode.IsSpace()`. Unicode zero-width characters (U+200B zero-width space, U+200C zero-width non-joiner, U+200D zero-width joiner, U+00AD soft hyphen) are NOT stripped. A configuration value consisting entirely of such characters passes `NonEmptyStringType` validation but is semantically empty, causing downstream consumers to receive garbage values for required configuration fields.\\\\n\\\\n`NonEmptyStringType` is used for LDAP Base DN (`LDAP_BASE_DN`), LDAP UID attribute (`LDAP_UID`), and LDAP URL (`LDAP_URL`) in `metadatalist.go`.\\\\n\\\\n## Location\\\\n\\\\n- `src/lib/config/metadata/type.go:54-58` -- `NonEmptyStringType.validate`\\\\n- `src/lib/config/metadata/metadatalist.go:84` -- LDAP Base DN uses `NonEmptyStringType`\\\\n- `src/lib/config/metadata/metadatalist.go:95` -- LDAP UID uses `NonEmptyStringType`\\\\n- `src/lib/config/metadata/metadatalist.go:96` -- LDAP URL uses `NonEmptyStringType`\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: LDAP/OID rimFunc(str, func(r rune) bool { return unicode.IsSpace(r) || !unicode.IsPrint(r) || unicode.Is(unicode.Cf, r) })` instead of `strings.TrimSpace`\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/lib/config/metadata/type.go:54-58\\",\\"matched_at\\":[\\"src/lib/config/metadata/type.go:54-58\\",\\"src/lib/config/metadata/metadatalist.go:84\\",\\"src/lib/config/metadata/metadatalist.go:95\\",\\"src/lib/config/metadata/metadatalist.go:96\\"],\\"finding_hash\\":\\"ba7f690fe24d3685b52d5304a83be20a\\",\\"found_at\\":\\"2026-03-30T18:45:41.016123Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":11,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-044\\",\\"module_name\\":\\"`Auth.fillInModel` at `src/core/auth/authproxy/auth.go:207-218` gates new user creation on a non-empty username check via `strings.TrimSpace`:\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"unicode-bypass-authproxy-username-empty-check\\",\\"description\\":\\"## Summary\\\\n\\\\n`Auth.fillInModel` at `src/core/auth/authproxy/auth.go:207-218` gates new user creation on a non-empty username check via `strings.TrimSpace`:\\\\n\\\\n```go\\\\nfunc (a *Auth) fillInModel(u *models.User) error {\\\\n    if strings.TrimSpace(u.Username) == \\\\\\"\\\\\\" {\\\\n        return fmt.Errorf(\\\\\\"username cannot be empty\\\\\\")\\\\n    }\\\\n    // ...\\\\n}\\\\n```\\\\n\\\\nGo\'s `strings.TrimSpace` does not strip Unicode zero-width characters (U+200B, U+200C, U+200D, U+00AD). An HTTP auth-proxy that returns a username containing only zero-width characters (e.g., a misconfigured or malicious proxy) would pass this guard. The resulting Harbor user record has a username that appears blank in the UI and API but is not the empty string, creating undefined behavior in downstream username-based queries.\\\\n\\\\n## Location\\\\n\\\\n- `src/core/auth/authproxy/auth.go:207-218` -- `fillInModel` function\\\\n- `src/core/auth/authproxy/auth.go:144-155` -- `PostAuthenticate` calls `fillInModel` during user onboarding\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: Username field from HTTP auth-proxy token review response (`UserFromReviewStatus`)\\\\n- **Threat**: A misconfigured or attacker-controlled auth-proxy endpoint (SSRF pivot via p8-027 Config URL No Validation) can return arbitrary username strings\\\\n- **Auth requirement**: Depends on auth-proxy access; combined with p8-027 an admin can pivot auth-proxy URL to attacker-controlled server\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-2: External auth-proxy to Harbor Core (trust boundary for external identity provider)\\\\n- Auth-proxy username claim treated as trusted after token review; zero-width username bypasses empty guard\\\\n\\\\n## Impact\\\\n\\\\n- Creation of Harbor user account with semantically-empty username\\\\n- Username consisting of zero-width chars would appear empty in audit logs and UI\\\\n- Potential for duplicate user creation (two separate zero-width-username users with different Unicode compositions)\\\\n- `GetByName` lookups for the zero-width username may return unexpected results depending on PostgreSQL collation settings\\\\n- Amplified by p8-027: admin can redirect auth-proxy endpoint to attacker server to inject arbitrary usernames\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/core/auth/authproxy/auth.go:208\\\\nif strings.TrimSpace(u.Username) == \\\\\\"\\\\\\" {     // U+200B passes this check\\\\n    return fmt.Errorf(\\\\\\"username cannot be empty\\\\\\")\\\\n}\\\\n\\\\n// strings.TrimSpace(\\\\\\"\\\\\\\\u200b\\\\\\") returns \\\\\\"\\\\\\\\u200b\\\\\\" (non-empty) -- guard bypassed\\\\n// Compare with p8-043 (allowlist validator) -- same TrimSpace bypass pattern\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure Harbor with HTTP auth-proxy mode\\\\n2. Control or simulate the auth-proxy to return a username of `\\\\\\\\u200b` (zero-width space) in the token review response\\\\n3. Authenticate via Harbor using the zero-width username credentials\\\\n4. `PostAuthenticate` calls `fillInModel`: `strings.TrimSpace(\\\\\\"\\\\\\\\u200b\\\\\\") == \\\\\\"\\\\\\"` evaluates to false\\\\n5. `OnBoardUser` creates a Harbor user with username `\\\\\\\\u200b`\\\\n6. User appears in harbor_user table but with invisible username in all UI/audit contexts\\\\n7. Recommended fix: apply Unicode-aware empty check: `strings.TrimFunc(u.Username, ...)` stripping invisible/format characters\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/core/auth/authproxy/auth.go:207-218\\",\\"matched_at\\":[\\"src/core/auth/authproxy/auth.go:207-218\\",\\"src/core/auth/authproxy/auth.go:144-155\\"],\\"finding_hash\\":\\"4f17c3089f1735cd31b1ee97cb5bd2cc\\",\\"found_at\\":\\"2026-03-30T18:45:41.016124Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":12,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-060\\",\\"module_name\\":\\"The `disabled_audit_log_event_types` configuration field (`AuditLogEventsDisabled` constant) allows a system administrator to selectively silence audit logging for specific operation types. By supplyi\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"audit-event-type-suppression\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `disabled_audit_log_event_types` configuration field (`AuditLogEventsDisabled` constant) allows a system administrator to selectively silence audit logging for specific operation types. By supplying a comma-separated list of `<operation>_<resource_type>` strings (e.g., `delete_user,create_artifact,push_artifact`), an attacker with system admin access can suppress audit records for the most forensically relevant operations. The suppression itself is not audited because the configuration update handler does not special-case this field. This is a more surgical audit-evasion path than p8-020, enabling targeted suppression without disabling the entire audit database trail (which is more detectable).\\\\n\\\\n## Location\\\\n\\\\n- `src/lib/config/metadata/metadatalist.go:195` -- `AuditLogEventsDisabled` defined as `UserScope`, `StringType`, no validation of allowable values\\\\n- `src/lib/config/userconfig.go:266-279` -- `AuditLogEventEnabled` does simple string comparison against comma-split list\\\\n- `src/controller/event/handler/auditlog/auditlog.go:65` -- `config.AuditLogEventEnabled(ctx, ...)` gate applied before every non-pull audit write\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin can set `disabled_audit_log_event_types` to any comma-separated string via `PUT /api/v2.0/configurations`\\\\n- No validation of allowed event type names\\\\n- Value is evaluated at event handler time; changes take effect immediately for all subsequent events\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- Admin API configuration -> audit event processing pipeline\\\\n- System admin privilege allows targeted suppression of specific forensic event categories\\\\n\\\\n## Impact\\\\n\\\\n- Targeted suppression of specific high-value audit categories (e.g., user deletion, robot creation, artifact push) without disabling full audit trail\\\\n- More difficult to detect than full `skip_audit_log_database=true` because other audit records continue to appear\\\\n- Combined with p8-020 pattern, an attacker can suppress specific operation traces before performing sensitive actions\\\\n- No current restriction on which event types can be disabled (including `delete_artifact`, `delete_project`, `create_user`)\\\\n\\\\n## Evidence\\\\n\\\\n- `metadatalist.go:195`: `ItemType: &StringType{}`, `Editable: false` (but still settable by admin via PUT)\\\\n- `userconfig.go:271-277`: No whitelist validation; any string matching `<op>_<resource>` disables the corresponding audit record\\\\n- `auditlog.go:65`: Gate runs for all CommonEvents and standard events before DB write\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Send: `PUT /api/v2.0/configurations` with body `{\\\\\\"disabled_audit_log_event_types\\\\\\": \\\\\\"delete_artifact,create_user,delete_user\\\\\\"}`\\\\n3. Perform user deletion and artifact deletion operations\\\\n4. Verify `audit_log_ext` table has no entries for these operations\\\\n5. Verify that the configuration change itself has no corresponding audit record for the `disabled_audit_log_event_types` field change\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/lib/config/metadata/metadatalist.go:195\\",\\"matched_at\\":[\\"src/lib/config/metadata/metadatalist.go:195\\",\\"src/lib/config/userconfig.go:266-279\\",\\"src/controller/event/handler/auditlog/auditlog.go:65\\"],\\"finding_hash\\":\\"3fd107a0b46d4724ad6a5955fa3af33c\\",\\"found_at\\":\\"2026-03-30T18:45:41.016125Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":13,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-061\\",\\"module_name\\":\\"The `pull_audit_log_disable` configuration flag (`PullAuditLogDisable`) is a separate boolean control that suppresses audit records for all artifact pull (download) events. A system administrator can \\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"pull-audit-log-disable-bypass\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `pull_audit_log_disable` configuration flag (`PullAuditLogDisable`) is a separate boolean control that suppresses audit records for all artifact pull (download) events. A system administrator can enable this flag via `PUT /api/v2.0/configurations` before conducting unauthorized mass artifact pulls. Because pull events represent the primary data exfiltration vector in a container registry, disabling their audit trail is particularly high-impact. Like p8-020, the flag change itself is not reliably audited, and the change takes effect immediately.\\\\n\\\\n## Location\\\\n\\\\n- `src/lib/config/metadata/metadatalist.go:184` -- `PullAuditLogDisable` defined as `UserScope`, `BoolType`, `Editable: false`\\\\n- `src/lib/config/userconfig.go:242-243` -- `PullAuditLogDisable(ctx)` getter\\\\n- `src/controller/event/handler/auditlog/auditlog.go:52-53` -- `PullArtifactEvent` gate: `addAuditLog = !config.PullAuditLogDisable(ctx)`\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin sets `pull_audit_log_disable: true` via `PUT /api/v2.0/configurations`\\\\n- All subsequent `PullArtifactEvent` audit records are silently dropped at the handler\\\\n- Only pull events are affected; no user-visible side effects\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- Admin API configuration -> audit event pipeline for pull events\\\\n\\\\n## Impact\\\\n\\\\n- Complete suppression of artifact pull audit records (primary exfiltration vector)\\\\n- Attacker can pull all container images/artifacts without any audit trail\\\\n- Combined with skip_audit_log_database or disabled_audit_log_event_types, attacker achieves complete audit blackout\\\\n- Enables stealth data exfiltration from the registry\\\\n\\\\n## Evidence\\\\n\\\\n- `metadatalist.go:184`: `{Name: common.PullAuditLogDisable, ... ItemType: &BoolType{}, Editable: false}`\\\\n- `auditlog.go:52-53`: `case *event.PullArtifactEvent: addAuditLog = !config.PullAuditLogDisable(ctx)` -- when true, `addAuditLog` is false, so no DB write occurs\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Send: `PUT /api/v2.0/configurations` with body `{\\\\\\"pull_audit_log_disable\\\\\\": true}`\\\\n3. Pull several artifacts: `docker pull harbor.example.com/library/ubuntu:latest`\\\\n4. Query `audit_log_ext` table: `SELECT * FROM audit_log_ext WHERE operation=\'pull\'`\\\\n5. Verify zero pull audit entries exist despite successful pulls\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/lib/config/metadata/metadatalist.go:184\\",\\"matched_at\\":[\\"src/lib/config/metadata/metadatalist.go:184\\",\\"src/lib/config/userconfig.go:242-243\\",\\"src/controller/event/handler/auditlog/auditlog.go:52-53\\"],\\"finding_hash\\":\\"4bc5c9591c346194d9939607a4e2d8ea\\",\\"found_at\\":\\"2026-03-30T18:45:41.016126Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":14,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-062\\",\\"module_name\\":\\"The `scanner_registration.access_credential` field stores the scanner adapter\'s authentication credential (Basic auth password, Bearer token, or X-ScannerAdapter-API-Key) in the database. The `ToSwagg\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"scanner-credential-api-exposure\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `scanner_registration.access_credential` field stores the scanner adapter\'s authentication credential (Basic auth password, Bearer token, or X-ScannerAdapter-API-Key) in the database. The `ToSwagger` conversion in `src/server/v2.0/handler/model/scanner.go:44` includes `AccessCredential: s.AccessCredential` directly in the API response without redaction. Any system administrator calling `GET /api/v2.0/scanners/{id}` or `GET /api/v2.0/scanners` (list) receives the credential in plaintext. This is structurally identical to p8-032 (UAAClientSecret not redacted): a credential field is never annotated as requiring redaction, so it passes through to the API response.\\\\n\\\\n## Location\\\\n\\\\n- `src/server/v2.0/handler/model/scanner.go:44` -- `AccessCredential: s.AccessCredential` included verbatim in ToSwagger output\\\\n- `src/server/v2.0/handler/scanner.go:108` -- `GetScanner` returns `model.NewScannerRegistration(r).ToSwagger(ctx)` with no scrubbing\\\\n- `src/pkg/scan/dao/scanner/model.go:51` -- `AccessCredential` field with `json:\\\\\\"access_credential,omitempty\\\\\\"` tag\\\\n\\\\n## Attacker Control\\\\n\\\\n- Any system administrator calls `GET /api/v2.0/scanners/{id}` or `GET /api/v2.0/scanners`\\\\n- No special authentication beyond system admin role required\\\\n- Scanner registrations are often created with real credentials for production Trivy/Clair instances\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- Scanner adapter credential (external system secret) exposed to any system admin reading the configuration API\\\\n\\\\n## Impact\\\\n\\\\n- Plaintext exposure of scanner adapter credentials (API keys, Basic auth passwords, Bearer tokens) to any system admin\\\\n- Can be used to directly access the vulnerability scanner adapter, bypassing Harbor\'s RBAC\\\\n- If scanner is shared across multiple Harbor instances or used externally, credential compromise affects all uses\\\\n- Structurally identical root cause to p8-032: no redaction mechanism applied to this credential type\\\\n\\\\n## Evidence\\\\n\\\\n- `scanner.go:44`: `AccessCredential: s.AccessCredential` - no masking\\\\n- Contrast: scan job logging in `job.go:428` explicitly sets `AccessCredential: \\\\\\"[HIDDEN]\\\\\\"` before logging, showing the developer was aware credentials are sensitive - but the API response path is not protected\\\\n- `scanner.go:94-108`: `GetScanner` calls `ToSwagger` on raw registration with no pre-processing\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Create a scanner with credentials: `POST /api/v2.0/scanners` with `{\\\\\\"auth\\\\\\": \\\\\\"Basic\\\\\\", \\\\\\"access_credential\\\\\\": \\\\\\"username:password\\\\\\", \\\\\\"url\\\\\\": \\\\\\"http://trivy-adapter:8080\\\\\\", \\\\\\"name\\\\\\": \\\\\\"test-scanner\\\\\\"}`\\\\n3. Retrieve the scanner: `GET /api/v2.0/scanners/{uuid}`\\\\n4. Observe `access_credential` field in response contains plaintext `username:password`\\\\n5. Contrast: confirm that `oidc_client_secret` is redacted in `GET /api/v2.0/configurations`\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/v2.0/handler/model/scanner.go:44\\",\\"matched_at\\":[\\"src/server/v2.0/handler/model/scanner.go:44\\",\\"src/server/v2.0/handler/scanner.go:108\\",\\"src/pkg/scan/dao/scanner/model.go:51\\"],\\"finding_hash\\":\\"a589941cf62c5c7dc50a6d5e76c627c3\\",\\"found_at\\":\\"2026-03-30T18:45:41.016127Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":15,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-063\\",\\"module_name\\":\\"During scan job creation in `src/controller/scan/base_controller.go:944`, `param.Registration.ToJSON()` serializes the complete `scanner.Registration` struct — including the `AccessCredential` field\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"scanner-credential-in-scan-job-queue\\",\\"description\\":\\"## Summary\\\\n\\\\nDuring scan job creation in `src/controller/scan/base_controller.go:944`, `param.Registration.ToJSON()` serializes the complete `scanner.Registration` struct — including the `AccessCredential` field — as a JSON string and stores it in the `registration` job parameter in Redis. Unlike the replication credential case (p8-026), there is no decryption step because scanner credentials are not encrypted at rest in the database (they are stored as-is in `scanner_registration.access_cred`). The credential appears in Redis job params as plaintext for the duration of any active scan job. This pattern is structurally identical to AP-026 (plaintext credentials in job queue).\\\\n\\\\n## Location\\\\n\\\\n- `src/controller/scan/base_controller.go:944` -- `rJSON, err := param.Registration.ToJSON()` serializes full Registration\\\\n- `src/controller/scan/base_controller.go:967` -- `params[sca.JobParamRegistration] = rJSON` stores JSON including `access_credential` in Redis\\\\n- `src/pkg/scan/dao/scanner/model.go:51` -- `AccessCredential string json:\\\\\\"access_credential,omitempty\\\\\\"` -- included in JSON serialization\\\\n\\\\n## Attacker Control\\\\n\\\\n- Any actor with Redis read access (no authentication required in default Harbor deployments)\\\\n- Credentials present for all active and queued scan jobs\\\\n- Container compromise on Docker network provides Redis access\\\\n- Scan jobs run on every artifact push if auto-scan is enabled, keeping the credential perpetually present\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-4: Core/Controller to Redis (no authentication by default)\\\\n- Scanner adapter credentials cross from DB storage to plaintext JSON in Redis\\\\n\\\\n## Impact\\\\n\\\\n- Exfiltration of scanner adapter credentials (API keys, Basic auth passwords) from Redis\\\\n- Credentials valid for direct access to vulnerability scanner adapters (Trivy, Clair, etc.)\\\\n- If auto-scan is enabled, credential is continuously present in Redis for any queued scan\\\\n- Unlike p8-026 (replication), scanner credentials are NOT encrypted at rest in DB, making this the primary exposure path\\\\n\\\\n## Evidence\\\\n\\\\n- `base_controller.go:944`: `rJSON, err := param.Registration.ToJSON()` -- calls `json.Marshal(r)` which includes all exported fields\\\\n- `base_controller.go:967`: `params[sca.JobParamRegistration] = rJSON` -- stored directly as Redis job param\\\\n- `job.go:170`: `printJSONParameter(JobParamRegistration, removeRegistrationAuthInfo(r), myLogger)` -- note: log printing DOES redact, but Redis storage (line 967) does not\\\\n- `job.go:428`: `AccessCredential: \\\\\\"[HIDDEN]\\\\\\"` in `removeRegistrationAuthInfo` confirms developer awareness but does not protect Redis storage path\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure a scanner registration with credentials (e.g., Basic auth)\\\\n2. Enable auto-scan or manually trigger a scan via `POST /api/v2.0/projects/{name}/repositories/{repo}/artifacts/{digest}/scan`\\\\n3. Connect to Redis: `redis-cli -h <harbor-redis>`\\\\n4. List job keys: `KEYS *` or `SMEMBERS known_job_types`\\\\n5. Read scan job parameters containing the `registration` key\\\\n6. Extract plaintext `access_credential` from the JSON value\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/controller/scan/base_controller.go:944\\",\\"matched_at\\":[\\"src/controller/scan/base_controller.go:944\\",\\"src/controller/scan/base_controller.go:967\\",\\"src/pkg/scan/dao/scanner/model.go:51\\"],\\"finding_hash\\":\\"747a033b7b04f8f0cb789150ea5d1926\\",\\"found_at\\":\\"2026-03-30T18:45:41.016128Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":16,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-080\\",\\"module_name\\":\\"The `SearchUsers` API endpoint (`GET /api/v2.0/users/search`) checks only `RequireAuthenticated` with no RBAC scoping. The DAO\'s `SearchByName` function at `src/pkg/user/dao/dao.go:136` constructs a L\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"searchusers-enum-like\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `SearchUsers` API endpoint (`GET /api/v2.0/users/search`) checks only `RequireAuthenticated` with no RBAC scoping. The DAO\'s `SearchByName` function at `src/pkg/user/dao/dao.go:136` constructs a LIKE pattern via `\\\\\\"%\\\\\\" + name + \\\\\\"%\\\\\\"` without calling `orm.Escape`, identical to the confirmed usergroup enumeration bug (p8-040). Any authenticated user can enumerate all Harbor usernames, email addresses, and user IDs system-wide by supplying a single `%` character as the `username` query parameter.\\\\n\\\\n## Location\\\\n\\\\n- **Handler**: `src/server/v2.0/handler/user.go:265-288` -- `SearchUsers`, only `RequireAuthenticated` check\\\\n- **Manager**: `src/pkg/user/manager.go:250-251` -- delegates to DAO\\\\n- **DAO**: `src/pkg/user/dao/dao.go:128-147` -- `SearchByName`, `likePattern := \\\\\\"%\\\\\\" + name + \\\\\\"%\\\\\\"` (no `orm.Escape`)\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: `username` query parameter in `GET /api/v2.0/users/search?username=%`\\\\n- **Control level**: Full -- attacker supplies the LIKE pattern character\\\\n- **Auth requirement**: Any valid authentication (basic auth, session, token, robot account)\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nAny authenticated user (including guests and robot accounts scoped to a single project) gains access to the complete Harbor user directory -- names, emails, and user IDs -- with no project or role scoping. This crosses the project isolation boundary (TB-3).\\\\n\\\\n## Impact\\\\n\\\\n- Full enumeration of all Harbor usernames and email addresses\\\\n- Internal user IDs are returned, enabling correlation with member lists and audit logs\\\\n- In enterprise deployments, leaks the organizational directory structure\\\\n- Facilitates targeted account takeover or social engineering attacks\\\\n- Combined with p8-040 (group enumeration): attacker can map users to LDAP/OIDC groups\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/server/v2.0/handler/user.go:265-288\\\\nfunc (u *usersAPI) SearchUsers(ctx context.Context, params operation.SearchUsersParams) middleware.Responder {\\\\n    if err := u.RequireAuthenticated(ctx); err != nil {  // ONLY auth check -- no RBAC\\\\n        return u.SendError(ctx, err)\\\\n    }\\\\n    // ...\\\\n    l, err := u.ctl.SearchByName(ctx, params.Username, int(*params.PageSize))\\\\n    // ...\\\\n}\\\\n\\\\n// src/pkg/user/dao/dao.go:128-147\\\\nfunc (d *dao) SearchByName(ctx context.Context, name string, limitSize int) ([]*commonmodels.User, error) {\\\\n    // ...\\\\n    sql := \\\\\\"select * from harbor_user where username like ? and deleted = false order by length(username), username asc limit ?\\\\\\"\\\\n    likePattern := \\\\\\"%\\\\\\" + name + \\\\\\"%\\\\\\"  // NO orm.Escape -- wildcard injection\\\\n    _, err = o.Raw(sql, likePattern, limitSize).QueryRows(&users)\\\\n    // ...\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as any Harbor user (including a guest or robot with minimal permissions)\\\\n2. Send: `GET /api/v2.0/users/search?username=%25&page_size=100`\\\\n   - Note: `%25` is URL-encoded `%` which becomes the LIKE wildcard `%`\\\\n3. Response returns all non-deleted users system-wide with username, email, and user_id fields\\\\n4. Iterate with `page` parameter to enumerate all users if count exceeds page_size\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/v2.0/handler/user.go:265-288\\",\\"matched_at\\":[\\"src/server/v2.0/handler/user.go:265-288\\",\\"src/pkg/user/manager.go:250-251\\",\\"src/pkg/user/dao/dao.go:128-147\\"],\\"finding_hash\\":\\"5eb17d76911e4545734233ee2c5789b4\\",\\"found_at\\":\\"2026-03-30T18:45:41.016129Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":17,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-081\\",\\"module_name\\":\\"`SlackJob.init()` at `src/jobservice/job/impl/notification/slack_job.go:114-119` reads `skip_cert_verify` from the job parameter map and switches the HTTP client to `httpHelper.clients[insecure]` (`In\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"slack-job-insecure-tls\\",\\"description\\":\\"## Summary\\\\n\\\\n`SlackJob.init()` at `src/jobservice/job/impl/notification/slack_job.go:114-119` reads `skip_cert_verify` from the job parameter map and switches the HTTP client to `httpHelper.clients[insecure]` (`InsecureSkipVerify: true`) when the flag is set. This is the identical code pattern as the confirmed `WebhookJob` finding (p7-005). A project-admin can create a Slack notification policy with `skip_cert_verify: true`, causing Slack webhook deliveries to bypass TLS certificate verification and become vulnerable to MitM interception.\\\\n\\\\n## Location\\\\n\\\\n- **SlackJob init**: `src/jobservice/job/impl/notification/slack_job.go:114-119` -- insecure branch enabled by user parameter\\\\n- **Handler origin**: Slack policy created via `POST /api/v2.0/projects/{id}/webhook/policies` with type `slack`\\\\n- **Parameter flow**: `SkipCertVerify` field in `src/pkg/notification/policy/model/model.go:97` → persisted to DB → deserialized into job params at `src/pkg/notifier/handler/notification/slack_handler.go:124`\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: `skip_cert_verify: true` in Slack notification policy creation\\\\n- **Control level**: Project-admin or above can set this flag\\\\n- **Auth requirement**: Project-admin role\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nJob Service to external Slack/webhook endpoints (TB-8). When `skip_cert_verify=true` is set, a network-adjacent attacker can present any TLS certificate and intercept or modify the Slack notification payload in transit.\\\\n\\\\n## Impact\\\\n\\\\n- MitM interception of Slack webhook payloads (may contain artifact names, digests, event metadata)\\\\n- Same impact as p7-005 but affecting the Slack notification transport path\\\\n- No logging or auditing when insecure transport is used\\\\n- Persists indefinitely until the policy is updated\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/jobservice/job/impl/notification/slack_job.go:108-121\\\\nfunc (sj *SlackJob) init(ctx job.Context, params map[string]any) error {\\\\n    sj.logger = ctx.GetLogger()\\\\n\\\\n    // default use secure transport\\\\n    sj.client = httpHelper.clients[secure]\\\\n    if v, ok := params[\\\\\\"skip_cert_verify\\\\\\"]; ok {\\\\n        if skipCertVerify, ok := v.(bool); ok && skipCertVerify {\\\\n            // if skip cert verify is true, it means not verify remote cert, use insecure client\\\\n            sj.client = httpHelper.clients[insecure]  // InsecureSkipVerify: true\\\\n        }\\\\n    }\\\\n    return nil\\\\n}\\\\n\\\\n// src/pkg/notifier/handler/notification/slack_handler.go:124\\\\n\\\\\\"skip_cert_verify\\\\\\": event.Target.SkipCertVerify,  // user-controlled field flows into job params\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as project-admin\\\\n2. Create a Slack notification policy:\\\\n   ```\\\\n   POST /api/v2.0/projects/{id}/webhook/policies\\\\n   {\\\\n     \\\\\\"name\\\\\\": \\\\\\"slack-alert\\\\\\",\\\\n     \\\\\\"event_types\\\\\\": [\\\\\\"ARTIFACT_PUSHED\\\\\\"],\\\\n     \\\\\\"targets\\\\\\": [{\\\\\\"type\\\\\\": \\\\\\"slack\\\\\\", \\\\\\"address\\\\\\": \\\\\\"https://hooks.slack.com/...\\\\\\", \\\\\\"skip_cert_verify\\\\\\": true}]\\\\n   }\\\\n   ```\\\\n3. Push an artifact to trigger the Slack notification\\\\n4. A network-adjacent attacker can MitM the HTTPS connection to the Slack endpoint\\\\n5. Webhook payload is intercepted with no TLS error because certificate validation is disabled\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/jobservice/job/impl/notification/slack_job.go:114-119\\",\\"matched_at\\":[\\"src/jobservice/job/impl/notification/slack_job.go:114-119\\"],\\"finding_hash\\":\\"4704e4ea4967ad5f7bf062da91b54e0e\\",\\"found_at\\":\\"2026-03-30T18:45:41.01613Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":18,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-082\\",\\"module_name\\":\\"The `developer` project role includes `{Resource: rbac.ResourceExportCVE, Action: rbac.ActionCreate}`. The `ExportScanData` handler at `src/server/v2.0/handler/scanexport.go:65` has no rate limiting o\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"developer-scan-export-nolimit\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `developer` project role includes `{Resource: rbac.ResourceExportCVE, Action: rbac.ActionCreate}`. The `ExportScanData` handler at `src/server/v2.0/handler/scanexport.go:65` has no rate limiting or per-user/per-project job count check -- it unconditionally creates a new `ScanDataExport` job on every request. While `ScanDataExport.MaxCurrency()` returns 1 (one active job per Redis instance), this limit applies globally across the entire system, not per user. A developer-role user can submit many export requests for different project/criteria combinations simultaneously. Each consumes a shared job worker slot, starving other critical jobs (replication, GC, scanning). Additionally, `ShouldRetry()` returns `true` with `MaxFails=1`, meaning failed export jobs are retried, compounding queue pressure.\\\\n\\\\n## Location\\\\n\\\\n- **Handler**: `src/server/v2.0/handler/scanexport.go:65-106` -- `ExportScanData`, no job count or rate limit check\\\\n- **Role policy**: `src/common/rbac/project/rbac_role.go:243-245` -- developer has `ResourceExportCVE ActionCreate`\\\\n- **Job limits**: `src/jobservice/job/impl/scandataexport/scan_data_export.go:51-70` -- `MaxFails=1`, `MaxCurrency=1` (global, not per-user), `ShouldRetry=true`\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: HTTP requests to `POST /api/v2.0/export/cve` with varying criteria (project IDs, CVE IDs, tags, labels)\\\\n- **Control level**: Developer can submit unlimited export jobs with distinct criteria combinations\\\\n- **Auth requirement**: Developer role in any project\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nA developer role in a single project can generate sustained job queue pressure system-wide, affecting replication, GC, and scanning jobs for all projects across all tenants.\\\\n\\\\n## Impact\\\\n\\\\n- Job worker pool pressure: each pending export job occupies a slot\\\\n- Cross-tenant starvation: replication, GC, and scan jobs delayed or timed out for all projects\\\\n- No per-user rate limit prevents a single compromised developer from submitting hundreds of export jobs\\\\n- Recovery requires manual job cancellation or worker restart\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/server/v2.0/handler/scanexport.go:65-106\\\\nfunc (se *scanDataExportAPI) ExportScanData(ctx context.Context, params operation.ExportScanDataParams) middleware.Responder {\\\\n    // ... validates params ...\\\\n    for _, pid := range params.Criteria.Projects {\\\\n        if err := se.RequireProjectAccess(ctx, pid, rbac.ActionCreate, rbac.ResourceExportCVE); err != nil {\\\\n            return se.SendError(ctx, err)\\\\n        }\\\\n    }\\\\n    // NO job count check, NO rate limit\\\\n    jobID, err := se.scanDataExportCtl.Start(userContext, ...)\\\\n    // ...\\\\n}\\\\n\\\\n// src/common/rbac/project/rbac_role.go:243-245 (developer role)\\\\n{Resource: rbac.ResourceExportCVE, Action: rbac.ActionCreate},\\\\n{Resource: rbac.ResourceExportCVE, Action: rbac.ActionRead},\\\\n{Resource: rbac.ResourceExportCVE, Action: rbac.ActionList},\\\\n\\\\n// src/jobservice/job/impl/scandataexport/scan_data_export.go:51-70\\\\nfunc (sde *ScanDataExport) MaxFails() uint  { return 1 }\\\\nfunc (sde *ScanDataExport) MaxCurrency() uint { return 1 }  // global, not per-user\\\\nfunc (sde *ScanDataExport) ShouldRetry() bool { return true }\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as a developer in any project\\\\n2. Rapidly submit multiple scan export jobs with distinct criteria:\\\\n   ```\\\\n   POST /api/v2.0/export/cve\\\\n   {\\\\\\"criteria\\\\\\": {\\\\\\"projects\\\\\\": [<pid>], \\\\\\"cveIds\\\\\\": \\\\\\"CVE-2024-XXXX\\\\\\", ...}}\\\\n   ```\\\\n3. Repeat with different project IDs or CVE filter combinations (each is a distinct job instance)\\\\n4. Observe job service queue filling with export jobs\\\\n5. Monitor replication and scanning jobs from other projects being delayed\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/v2.0/handler/scanexport.go:65-106\\",\\"matched_at\\":[\\"src/server/v2.0/handler/scanexport.go:65-106\\",\\"src/common/rbac/project/rbac_role.go:243-245\\",\\"src/jobservice/job/impl/scandataexport/scan
