nue\\\\n        }\\\\n\\\\n        // [FIX: Wrap tar reader with size limit]\\\\n        limitedReader := io.LimitReader(tr, maxArtifactSize)\\\\n        n, err := io.Copy(&buf, limitedReader)\\\\n        if err != nil && err != io.EOF {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to copy content to buffer: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        // Verify we didn\'t hit the limit\\\\n        if n >= maxArtifactSize {\\\\n            return nil, fmt.Errorf(\\\\\\"artifact exceeds maximum size: %d bytes\\\\\\", maxArtifactSize)\\\\n        }\\\\n    }\\\\n\\\\n    return buf.Bytes(), nil\\\\n}\\\\n```\\\\n\\\\n### Fix Strategy 2: Total Size Tracking\\\\n\\\\n```go\\\\nfunc untar(reader io.Reader) ([]byte, error) {\\\\n    const maxTotalSize = 100 * 1024 * 1024  // 100 MB total\\\\n    tr := tar.NewReader(reader)\\\\n    var buf bytes.Buffer\\\\n    totalSize := int64(0)\\\\n\\\\n    for {\\\\n        header, err := tr.Next()\\\\n        if err == io.EOF {\\\\n            break\\\\n        }\\\\n\\\\n        if err != nil {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to read tar header: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        if header.Typeflag == tar.TypeDir {\\\\n            continue\\\\n        }\\\\n\\\\n        // Check total size before copying\\\\n        if totalSize+header.Size > maxTotalSize {\\\\n            return nil, fmt.Errorf(\\\\\\"total archive size exceeds limit\\\\\\")\\\\n        }\\\\n\\\\n        if _, err := io.Copy(&buf, tr); err != nil {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to copy content to buffer: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        totalSize += header.Size\\\\n    }\\\\n\\\\n    return buf.Bytes(), nil\\\\n}\\\\n```\\\\n\\\\n### Fix Strategy 3: Per-Entry Limit + Total Limit (Most Robust)\\\\n\\\\n```go\\\\nconst (\\\\n    maxPerEntry   = 10 * 1024 * 1024   // 10 MB per file\\\\n    maxTotalSize  = 50 * 1024 * 1024   // 50 MB total\\\\n)\\\\n\\\\nfunc untar(reader io.Reader) ([]byte, error) {\\\\n    tr := tar.NewReader(reader)\\\\n    var buf bytes.Buffer\\\\n    totalSize := int64(0)\\\\n\\\\n    for {\\\\n        header, err := tr.Next()\\\\n        if err == io.EOF {\\\\n            break\\\\n        }\\\\n\\\\n        if err != nil {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to read tar header: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        if header.Typeflag == tar.TypeDir {\\\\n            continue\\\\n        }\\\\n\\\\n        // Per-entry limit\\\\n        if header.Size > maxPerEntry {\\\\n            return nil, fmt.Errorf(\\\\\\"entry %s exceeds max size: %d > %d\\\\\\",\\\\n                header.Name, header.Size, maxPerEntry)\\\\n        }\\\\n\\\\n        // Total size check\\\\n        if totalSize+header.Size > maxTotalSize {\\\\n            return nil, fmt.Errorf(\\\\\\"total archive size would exceed limit\\\\\\")\\\\n        }\\\\n\\\\n        // Limit this entry\'s copy\\\\n        limitedReader := io.LimitReader(tr, header.Size)\\\\n        if _, err := io.Copy(&buf, limitedReader); err != nil {\\\\n            return nil, fmt.Errorf(\\\\\\"failed to copy content to buffer: %w\\\\\\", err)\\\\n        }\\\\n\\\\n        totalSize += header.Size\\\\n    }\\\\n\\\\n    return buf.Bytes(), nil\\\\n}\\\\n```\\\\n\\\\n## Phase 8 Chamber Assignment\\\\n\\\\n**Chamber**: **Resource Exhaustion (DoS-001)**\\\\n\\\\n**Rationale**:\\\\n- Exploitable by any authenticated user with push role\\\\n- Causes denial of service via memory exhaustion\\\\n- Affects system availability\\\\n- Easy to trigger (just push crafted artifact)\\\\n- Impacts all services dependent on Core API\\\\n\\\\n## References\\\\n\\\\n- **CWE-400**: [Uncontrolled Resource Consumption](https://cwe.mitre.org/data/definitions/400.html)\\\\n- **OWASP**: [Zip Slip and Compression Bomb](https://owasp.org/www-community/attacks/Zip_Slip)\\\\n- **Bzip2 Compression Bomb**: `bomb.zip` - classic 915 KB file that expands to 4.5 TB\\\\n- **KB Report**: TB-6 (Registry ↔ Core artifact processor)\\\\n- **Related**: Tar bomb vulnerabilities in Docker, Kubernetes, container runtimes\\\\n\\\\n## Notes for Reviewers\\\\n\\\\n1. **Severity**: MEDIUM not HIGH because:\\\\n   - Requires authentication (push role)\\\\n   - Causes DoS, not data breach\\\\n   - Container restart recovers from attack\\\\n   - But: repeated attacks could cause continuous outages\\\\n\\\\n2. **Exploitability**: HIGH\\\\n   - No special tools needed (standard tar/gzip)\\\\n   - Automatic triggering on artifact processing\\\\n   - Simple one-liner to create bomb\\\\n\\\\n3. **Impact**: Medium (availability only, not confidentiality/integrity)\\\\n\\\\n4. **Recommended Maximum Sizes**:\\\\n   - CNAI model metadata: 50 MB (reasonable for model config JSON)\\\\n   - Scan export: 100 MB (may need tuning based on real usage)\\\\n   - Per-entry limit: 10 MB (prevents individual large files)\\\\n\\\\n5. **Testing**:\\\\n   - Create test tar.gz bomb\\\\n   - Push to Harbor repository\\\\n   - Monitor Core container memory\\\\n   - Verify it exceeds limits without fix\\\\n   - Verify fix prevents OOM\\\\n\\\\n6. **Related Findings**:\\\\n   - SAST-004 addresses both CNAI parser and digest calculator\\\\n   - Both should be fixed with same size constants\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"tags\\":[\\"archon\\",\\"phase-7\\",\\"CWE-400\\"],\\"status\\":\\"open\\",\\"cwe_id\\":\\"CWE-400\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/controller/artifact/processor/cnai/parser/util.go\\",\\"matched_at\\":[\\"src/controller/artifact/processor/cnai/parser/util.go\\",\\"src/pkg/scan/export/digest_calculator.go\\"],\\"finding_hash\\":\\"35ff7dde550c2fbfb986fc2df3bee39f\\",\\"found_at\\":\\"2026-03-30T18:45:41.016134Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":23,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p7-005\\",\\"module_name\\":\\"Insecure Webhook HTTP Transport with User-Controllable skip_cert_verify Flag\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"webhook-insecure-tls\\",\\"description\\":\\"# Phase 7 Enriched Finding: P7-005\\\\n\\\\n## Finding Details\\\\n\\\\n| Field | Value |\\\\n|-------|-------|\\\\n| **Finding ID** | P7-005 |\\\\n| **Source SAST ID** | SAST-012 |\\\\n| **Tool** | Manual code review |\\\\n| **Title** | Insecure Webhook HTTP Transport with User-Controllable skip_cert_verify Flag |\\\\n| **Severity** | MEDIUM |\\\\n| **Confidence** | HIGH |\\\\n| **CWE** | CWE-295 (Improper Certificate Validation) |\\\\n\\\\n## Vulnerability Classification\\\\n\\\\n**Type**: Security (Man-in-the-middle attack vector via misconfiguration)\\\\n\\\\n## Reachability Assessment\\\\n\\\\n**Status**: CONFIRMED REACHABLE\\\\n\\\\n**Evidence**:\\\\n- User-controlled parameter: `skip_cert_verify` in webhook policy\\\\n- Code path: Parameter flows from REST API → database → job service\\\\n- Sink: HTTP client configured with `InsecureSkipVerify: true`\\\\n- Trust Boundary: TB-8 (Job Service ↔ External webhook targets)\\\\n\\\\n## Attacker-Controlled Input Path\\\\n\\\\n**Entry Point**: HTTP POST API for webhook policy creation\\\\n\\\\n```\\\\nPOST /api/v2.0/projects/{projectId}/webhook/policies\\\\nAuthorization: Bearer <token>\\\\nContent-Type: application/json\\\\n\\\\n{\\\\n  \\\\\\"name\\\\\\": \\\\\\"my-webhook\\\\\\",\\\\n  \\\\\\"event_types\\\\\\": [\\\\\\"ARTIFACT_PUSHED\\\\\\"],\\\\n  \\\\\\"address\\\\\\": \\\\\\"https://internal-service:8443/webhook\\\\\\",\\\\n  \\\\\\"skip_cert_verify\\\\\\": true  // <- ATTACKER CONTROLLED\\\\n}\\\\n```\\\\n\\\\n**Attack Flow**:\\\\n1. Project admin (or malicious admin) creates webhook policy with `skip_cert_verify=true`\\\\n2. Policy persisted to database\\\\n3. Event triggers webhook job\\\\n4. JobService retrieves job parameters from Redis queue\\\\n5. WebhookJob.init() reads skip_cert_verify parameter (line 91-96)\\\\n6. If true, HTTP client switched to insecure transport\\\\n7. HTTP request sent to webhook target\\\\n8. Network attacker can MitM the webhook delivery\\\\n\\\\n## Code Location & Snippet\\\\n\\\\n**File**: `src/jobservice/job/impl/notification/webhook_job.go`\\\\n**Lines**: 91-96\\\\n**Function**: `WebhookJob.init()`\\\\n\\\\n```go\\\\nfunc (wj *WebhookJob) init(ctx job.Context, params map[string]any) error {\\\\n    wj.logger = ctx.GetLogger()\\\\n    wj.ctx = ctx\\\\n\\\\n    // default use secure transport\\\\n    wj.client = httpHelper.clients[secure]\\\\n\\\\n    // [VULNERABLE: skip_cert_verify is user-controlled]\\\\n    if v, ok := params[\\\\\\"skip_cert_verify\\\\\\"]; ok {\\\\n        if skipCertVerify, ok := v.(bool); ok && skipCertVerify {\\\\n            // if skip cert verify is true, it means not verify remote cert, use insecure client\\\\n            // [PROBLEM: Allows user to disable TLS verification]\\\\n            wj.client = httpHelper.clients[insecure]\\\\n        }\\\\n    }\\\\n    return nil\\\\n}\\\\n```\\\\n\\\\n**Consequence**:\\\\n- HTTP client configured with `InsecureSkipVerify: true`\\\\n- TLS certificate validation completely disabled\\\\n- Network attacker can present any certificate\\\\n- Webhook payload intercepted and modified in flight\\\\n\\\\n## Vulnerability Analysis\\\\n\\\\n### Attack Scenarios\\\\n\\\\n#### Scenario 1: Webhook Response Interception\\\\n\\\\n```\\\\n1. Project admin creates webhook for CI/CD system:\\\\n   POST /api/v2.0/projects/1/webhook/policies\\\\n   {\\\\n     \\\\\\"address\\\\\\": \\\\\\"https://ci-system.internal:8443/trigger\\\\\\",\\\\n     \\\\\\"skip_cert_verify\\\\\\": true\\\\n   }\\\\n\\\\n2. Attacker on network (same VPC, compromised host):\\\\n   - Performs DNS spoofing or ARP poisoning\\\\n   - Intercepts webhook HTTPS connection\\\\n   - Presents attacker certificate (rejected by proper clients)\\\\n   - With skip_cert_verify=true, Harbor accepts ANY cert\\\\n\\\\n3. Attacker receives webhook JSON payload:\\\\n   {\\\\n     \\\\\\"repository\\\\\\": \\\\\\"company/secret-app\\\\\\",\\\\n     \\\\\\"artifact\\\\\\": \\\\\\"sha256:...\\\\\\",\\\\n     \\\\\\"webhook_event\\\\\\": \\\\\\"ARTIFACT_PUSHED\\\\\\"\\\\n   }\\\\n\\\\n4. Attacker modifies response:\\\\n   - Injects command to CI system: \\\\\\"Deploy this artifact to production WITHOUT approval\\\\\\"\\\\n   - Returns modified payload to CI system\\\\n   - CI system processes attacker\'s instruction\\\\n\\\\n5. Result: Unauthorized deployment, integrity violation\\\\n```\\\\n\\\\n#### Scenario 2: Webhook Payload Modification\\\\n\\\\n```\\\\n1. Organization uses webhooks for security scanning:\\\\n   POST /api/v2.0/projects/2/webhook/policies\\\\n   {\\\\n     \\\\\\"address\\\\\\": \\\\\\"https://security-scanner.internal:443/scan\\\\\\",\\\\n     \\\\\\"skip_cert_verify\\\\\\": true\\\\n   }\\\\n\\\\n2. Artifact pushed triggers webhook delivery\\\\n\\\\n3. Attacker MitM intercepts:\\\\n   - Original: { \\\\\\"repository\\\\\\": \\\\\\"app\\\\\\", \\\\\\"digest\\\\\\": \\\\\\"sha256:abc...\\\\\\", \\\\\\"severity\\\\\\": \\\\\\"CRITICAL\\\\\\" }\\\\n   - Attacker modifies: { \\\\\\"repository\\\\\\": \\\\\\"app\\\\\\", \\\\\\"digest\\\\\\": \\\\\\"sha256:def...\\\\\\", \\\\\\"severity\\\\\\": \\\\\\"LOW\\\\\\" }\\\\n   - Security scanner marks malicious artifact as \\\\\\"LOW\\\\\\" severity\\\\n   - Artifact allowed to proceed to production\\\\n```\\\\n\\\\n#### Scenario 3: Credential Harvesting\\\\n\\\\n```\\\\n1. Webhook includes Bearer token in Authorization header\\\\n\\\\n2. Attacker MitM intercepts:\\\\n   - Captures: Authorization: Bearer eyJhbGciOiJIUzI1NiIs...\\\\n   - Token is API token for internal service\\\\n   - Attacker uses token for unauthorized access\\\\n```\\\\n\\\\n#### Scenario 4: Combined with SSRF (SAST-002)\\\\n\\\\n```\\\\n1. Attacker creates webhook with:\\\\n   - address: \\\\\\"http://internal-database:5432\\\\\\"  (SSRF)\\\\n   - skip_cert_verify: true  (allows raw TCP without cert)\\\\n\\\\n2. JobService connects to internal Postgres\\\\n3. Attacker MitM: intercepts database responses\\\\n4. Modifies database responses before webhook delivery\\\\n5. Compromise of data consistency\\\\n```\\\\n\\\\n### Risk Assessment\\\\n\\\\n| Factor | Assessment | Notes |\\\\n|--------|-----------|-------|\\\\n| **Who can enable?** | Project admin (or system admin) | Relatively common role |\\\\n| **Detectability** | Low | No alerts when skip_cert_verify enabled |\\\\n| **Attack Requirements** | Network position + admin role | Privilege escalation or compromised admin |\\\\n| **Data at Risk** | Webhook payloads | Potentially sensitive (artifact info, deployment data) |\\\\n| **Exploitability** | MEDIUM | Requires network position + misconfiguration |\\\\n| **Impact** | MEDIUM | Integrity (MitM modification), confidentiality (interception) |\\\\n\\\\n### Why This Is a Design Issue\\\\n\\\\n**The Fundamental Problem**:\\\\n- TLS certificate verification is a **security control** (prevents MitM attacks)\\\\n- Disabling it should be:\\\\n  1. Not user-controllable (requires code deployment)\\\\n  2. Only enabled with explicit admin approval\\\\n  3. Logged/audited\\\\n  4. Time-limited or scoped\\\\n\\\\n**Current Implementation**:\\\\n- Any project admin can disable cert verification\\\\n- No logging/audit trail\\\\n- No time limit\\\\n- Enables indefinite MitM attacks\\\\n\\\\n## Recommended Fix\\\\n\\\\n### Fix Option 1: Restrict to System Admins Only\\\\n\\\\n```go\\\\nfunc (wj *WebhookJob) init(ctx job.Context, params map[string]any) error {\\\\n    wj.logger = ctx.GetLogger()\\\\n    wj.ctx = ctx\\\\n\\\\n    // default use secure transport\\\\n    wj.client = httpHelper.clients[secure]\\\\n\\\\n    if v, ok := params[\\\\\\"skip_cert_verify\\\\\\"]; ok {\\\\n        if skipCertVerify, ok := v.(bool); ok && skipCertVerify {\\\\n            // RESTRICT: Only allow if user is system admin\\\\n            if !wj.isSystemAdmin(ctx) {\\\\n                wj.logger.Warningf(\\\\\\"skip_cert_verify requested by non-admin user\\\\\\")\\\\n                // Ignore the flag, use secure client anyway\\\\n                return nil\\\\n            }\\\\n\\\\n            // Log security event\\\\n            wj.logger.Warnf(\\\\\\"Using insecure transport (skip_cert_verify=true) for webhook\\\\\\")\\\\n            wj.client = httpHelper.clients[insecure]\\\\n        }\\\\n    }\\\\n    return nil\\\\n}\\\\n\\\\nfunc (wj *WebhookJob) isSystemAdmin(ctx job.Context) bool {\\\\n    // Check if user is system admin in security context\\\\n    secCtx := libsec.FromContext(ctx)\\\\n    return secCtx.IsSysAdmin()\\\\n}\\\\n```\\\\n\\\\n### Fix Option 2: Require Explicit Allow-List in Config\\\\n\\\\n```go\\\\n// In Harbor config (environment variable or config file)\\\\nINSECURE_WEBHOOKS_ALLOWED=false\\\\n\\\\nfunc (wj *WebhookJob) init(ctx job.Context, params map[string]any) error {\\\\n    wj.client = httpHelper.clients[secure]\\\\n\\\\n    if v, ok := params[\\\\\\"skip_cert_verify\\\\\\"]; ok {\\\\n        if skipCertVerify, ok := v.(bool); ok && skipCertVerify {\\\\n            // REQUIRE: Explicit config to allow insecure webhooks\\\\n            insecureAllowed := config.GetBool(\\\\\\"INSECURE_WEBHOOKS_ALLOWED\\\\\\", false)\\\\n            if !insecureAllowed {\\\\n                wj.logger.Warnf(\\\\\\"skip_cert_verify requested but INSECURE_WEBHOOKS_ALLOWED=false\\\\\\")\\\\n                return nil\\\\n            }\\\\n\\\\n            wj.logger.Errorf(\\\\\\"SECURITY WARNING: Webhook will use insecure transport (cert verification disabled)\\\\\\")\\\\n            wj.client = httpHelper.clients[insecure]\\\\n        }\\\\n    }\\\\n    return nil\\\\n}\\\\n```\\\\n\\\\n### Fix Option 3: Comprehensive Audit + Restrict\\\\n\\\\n```go\\\\nfunc (wj *WebhookJob) init(ctx job.Context, params map[string]any) error {\\\\n    wj.client = httpHelper.clients[secure]\\\\n\\\\n    if v, ok := params[\\\\\\"skip_cert_verify\\\\\\"]; ok {\\\\n        if skipCertVerify, ok := v.(bool); ok && skipCertVerify {\\\\n            // LOG SECURITY EVENT\\\\n            auditLog.Log(ctx, \\\\\\"WEBHOOK_INSECURE_TLS_REQUESTED\\\\\\", map[string]interface{}{\\\\n                \\\\\\"address\\\\\\": params[\\\\\\"address\\\\\\"],\\\\n                \\\\\\"user\\\\\\": getUsername(ctx),\\\\n                \\\\\\"timestamp\\\\\\": time.Now(),\\\\n            })\\\\n\\\\n            // RESTRICT: System admin only\\\\n            if !wj.isSystemAdmin(ctx) {\\\\n                wj.logger.Warnf(\\\\\\"skip_cert_verify requested by non-admin\\\\\\")\\\\n                return fmt.Errorf(\\\\\\"insecure webhooks restricted to system administrators\\\\\\")\\\\n            }\\\\n\\\\n            wj.client = httpHelper.clients[insecure]\\\\n        }\\\\n    }\\\\n    return nil\\\\n}\\\\n```\\\\n\\\\n## Phase 8 Chamber Assignment\\\\n\\\\n**Chamber**: **Man-in-the-Middle Attacks (MitM-001)**\\\\n\\\\n**Rationale**:\\\\n- Allows TLS certificate verification bypass\\\\n- Creates MitM attack vector on webhook delivery\\\\n- Exploitable by network-adjacent attacker + admin misconfiguration\\\\n- Compounded by SAST-002 (SSRF) which can target internal services\\\\n- Affects integrity of webhook data in flight\\\\n\\\\n## References\\\\n\\\\n- **CWE-295**: [Improper Certificate Validation](https://cwe.mitre.org/data/definitions/295.html)\\\\n- **CWE-476**: [Null Pointer Dereference](https://cwe.mitre.org/data/definitions/476.html)\\\\n- **OWASP**: [Man-in-the-middle attack](https://owasp.org/www-community/attacks/Manipulator-in-the-middle_attack)\\\\n- **Go Security**: [net/http - InsecureSkipVerify](https://golang.org/doc/effective_go#concurrency)\\\\n- **KB Report**:\\\\n  - TB-8: Job Service ↔ External Endpoints (no SSL/TLS enforcement)\\\\n  - Attack Surface: \\\\\\"Webhook endpoint URL\\\\\\" with user-control over parameters\\\\n\\\\n## Notes for Reviewers\\\\n\\\\n1. **Severity**: MEDIUM (not HIGH) because:\\\\n   - Requires network position (not trivial)\\\\n   - Requires admin misconfiguration\\\\n   - Doesn\'t directly breach data (but enables MitM)\\\\n\\\\n2. **Exploitability**: MEDIUM\\\\n   - Requires network position (same VPC, compromised host, DNS spoofing, ARP poisoning)\\\\n   - Easy to exploit once position obtained\\\\n   - Can be leveraged for data modification or credential harvesting\\\\n\\\\n3. **Relationship to SAST-002**:\\\\n   - SAST-002 (SSRF) enables reaching internal services\\\\n   - SAST-012 (insecure TLS) enables MitM on those internal services\\\\n   - Combined: Attacker can reach AND intercept internal HTTPS services\\\\n\\\\n4. **User Education**:\\\\n   - Document that skip_cert_verify disables security control\\\\n   - Warn in UI: \\\\\\"Warning: TLS certificate verification disabled. This endpoint will accept self-signed or forged certificates.\\\\\\"\\\\n   - Recommend: Use proper certificates, not skip verification\\\\n\\\\n5. **Testing Recommendations**:\\\\n   - Create webhook with skip_cert_verify=true\\\\n   - Set up MitM proxy (mitmproxy, Burp Suite)\\\\n   - Verify webhook payload can be intercepted and modified\\\\n   - Confirm without fix, modifications are not detected\\\\n\\\\n6. **Recommended Priority**:\\\\n   - Fix Option 1 (System admin only) = Immediate\\\\n   - Fix Option 3 (Audit + restrict) = Better long-term\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"firm\\",\\"tags\\":[\\"archon\\",\\"phase-7\\",\\"CWE-295\\"],\\"status\\":\\"open\\",\\"cwe_id\\":\\"CWE-295\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/jobservice/job/impl/notification/webhook_job.go\\",\\"matched_at\\":[\\"src/jobservice/job/impl/notification/webhook_job.go\\"],\\"finding_hash\\":\\"609c3bc92b27b66a72b035ec7e1ed4ef\\",\\"found_at\\":\\"2026-03-30T18:45:41.016134Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":24,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-001\\",\\"module_name\\":\\"Harbor\'s admin account (userID=1) always authenticates via DB credentials regardless of the configured authentication mode (OIDC, LDAP, etc.). The `IsSuperUser` check at `authenticator.go:142` uncondi\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"admin-db-auth-brute-force\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s admin account (userID=1) always authenticates via DB credentials regardless of the configured authentication mode (OIDC, LDAP, etc.). The `IsSuperUser` check at `authenticator.go:142` unconditionally overrides the auth mode to `common.DBAuth` for the admin user. Combined with an in-memory-only lockout mechanism (`UserLock` in `lock.go`) that has no cross-pod synchronization, this enables unlimited brute force attacks against the admin account in multi-instance (HA) deployments.\\\\n\\\\n## Location\\\\n\\\\n- `src/core/auth/authenticator.go:142` -- `IsSuperUser` override forces DB auth\\\\n- `src/core/auth/lock.go:22-51` -- `UserLock` uses in-memory `map[string]time.Time`\\\\n- `src/server/middleware/security/basic_auth.go` -- entry point via HTTP Basic Auth\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls the HTTP Basic Auth header with the admin username (default: \\\\\\"admin\\\\\\") and password guess. This is fully controllable from the external network via any API endpoint that processes Basic Auth.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nExternal network -> Harbor Core admin authentication. The IsSuperUser bypass means OIDC/LDAP mode configuration is irrelevant -- the admin account is always DB-authenticated.\\\\n\\\\n## Impact\\\\n\\\\n- Full system admin access via brute-forced DB password\\\\n- In multi-instance deployments: attacker distributes requests across N pods, getting N * 5 attempts per 5-minute lockout window per pod\\\\n- Organizations that configure OIDC-only mode are not protected -- admin remains brute-forceable\\\\n- 1.5s sleep per failed attempt on a single pod limits single-pod rate to ~40 attempts/minute, but across pods this multiplies\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/core/auth/authenticator.go:142\\\\nif authMode == \\\\\\"\\\\\\" || IsSuperUser(ctx, m.Principal) {\\\\n    authMode = common.DBAuth\\\\n}\\\\n\\\\n// src/core/auth/lock.go:23-30\\\\ntype UserLock struct {\\\\n    d        time.Duration\\\\n    failures map[string]time.Time  // in-memory, no Redis sync\\\\n    lock     sync.RWMutex\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Deploy Harbor in HA mode with 3+ core pods and OIDC auth mode configured\\\\n2. Send HTTP Basic Auth requests with `admin:<guess>` to different core pods (via load balancer)\\\\n3. Observe that each pod maintains independent lockout -- 5 failures on pod A do not affect pod B\\\\n4. After 5 failures on pod A, route to pod B for 5 more attempts, etc.\\\\n5. With 3 pods: 15 attempts per 5-minute window instead of 5\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/core/auth/authenticator.go:142\\",\\"matched_at\\":[\\"src/core/auth/authenticator.go:142\\",\\"src/core/auth/lock.go:22-51\\"],\\"finding_hash\\":\\"3e09ef620e8f66ca640092a6ca80350c\\",\\"found_at\\":\\"2026-03-30T18:45:41.016135Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":25,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-002\\",\\"module_name\\":\\"Harbor\'s OIDC integration checks admin group membership against raw, unfiltered groups from the OIDC provider\'s claims. The `GroupFilter` regex, intended to restrict which groups are recognized, is on\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-admin-group-filter-bypass\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s OIDC integration checks admin group membership against raw, unfiltered groups from the OIDC provider\'s claims. The `GroupFilter` regex, intended to restrict which groups are recognized, is only applied in `populateGroupsDB` for database group population -- not before the admin group check at `helper.go:396`. A compromised or malicious OIDC provider can grant system admin to any user by including the configured `AdminGroup` value in the groups claim, bypassing any GroupFilter restrictions.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/oidc/helper.go:394-399` -- admin group check on unfiltered groups\\\\n- `src/pkg/oidc/helper.go:455` -- `filterGroup` only called in `populateGroupsDB`\\\\n- `src/pkg/oidc/helper.go:458-467` -- `filterGroup` function definition\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls the OIDC provider\'s groups claim. This requires either: (a) a compromised OIDC provider that is already configured in Harbor, or (b) a malicious OIDC provider configured by a deceptive admin. The AdminGroup value must be known (it is a Harbor configuration setting).\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nOIDC provider -> Harbor admin role assignment. The GroupFilter was designed as a trust boundary control to limit which groups the OIDC provider can influence, but it fails for the most critical check (admin role).\\\\n\\\\n## Impact\\\\n\\\\n- System admin privileges granted to any OIDC-authenticated user\\\\n- Admin role refreshed on every OIDC CLI request via `InjectGroupsToUser`\\\\n- Affects all users authenticating through the compromised OIDC provider\\\\n- GroupFilter provides false sense of security to operators\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/pkg/oidc/helper.go:394-399\\\\nres.Groups, res.hasGroupClaim = groupsFromClaims(c, setting.GroupsClaim)\\\\n// ^^^ raw unfiltered groups\\\\nif len(setting.AdminGroup) > 0 {\\\\n    if slices.Contains(res.Groups, setting.AdminGroup) {\\\\n        // ^^^ admin check on UNFILTERED groups\\\\n        res.AdminGroupMember = true\\\\n    }\\\\n}\\\\n\\\\n// src/pkg/oidc/helper.go:454-455 (filterGroup only used here)\\\\nfunc populateGroupsDB(groupNames []string) ([]int, error) {\\\\n    // ...\\\\n    return usergroup.Mgr.Populate(..., model.UserGroupsFromName(filterGroup(groupNames, cfg.GroupFilter), ...))\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure Harbor with OIDC auth mode, set AdminGroup to \\\\\\"harbor-admins\\\\\\", set GroupFilter to \\\\\\"^allowed-.*\\\\\\"\\\\n2. At the OIDC provider, add \\\\\\"harbor-admins\\\\\\" to a test user\'s groups claim\\\\n3. Note: \\\\\\"harbor-admins\\\\\\" does not match GroupFilter regex \\\\\\"^allowed-.*\\\\\\"\\\\n4. Authenticate as the test user via OIDC CLI\\\\n5. Observe that the user is granted system admin despite GroupFilter not matching \\\\\\"harbor-admins\\\\\\"\\\\n\\\\n\\\\n---\\\\n## Cold Verification\\\\n\\\\n## Verdict\\\\n\\\\n```\\\\nAdversarial-Verdict: CONFIRMED\\\\nAdversarial-Rationale: filterGroup is provably only called in populateGroupsDB (helper.go:455), never before the admin group check at helper.go:396 which operates on raw unfiltered OIDC groups claims.\\\\nSeverity-Final: MEDIUM\\\\nPoC-Status: theoretical\\\\n```\\\\n\\\\n## Sub-claim Validation\\\\n\\\\n| Sub-claim | Result | Evidence |\\\\n|-----------|--------|----------|\\\\n| A: Attacker controls OIDC groups claim | VALID | Requires compromised OIDC provider -- recognized threat model for GroupFilter |\\\\n| B: Admin check uses unfiltered groups | VALID | helper.go:394-396 -- groupsFromClaims() output fed directly to slices.Contains() |\\\\n| C: filterGroup only in populateGroupsDB | VALID | grep confirms single call site at helper.go:455 |\\\\n| D: AdminGroupMember grants sysadmin | VALID | helper.go:496 -> context.go:78 -- AdminRoleInAuth enables IsSysAdmin() |\\\\n\\\\n## Code Path Trace (Independent)\\\\n\\\\n1. `helper.go:394` -- `groupsFromClaims(c, setting.GroupsClaim)` returns raw groups\\\\n2. `helper.go:396` -- `slices.Contains(res.Groups, setting.AdminGroup)` on raw groups\\\\n3. `helper.go:397` -- `res.AdminGroupMember = true`\\\\n4. `helper.go:496` -- `user.AdminRoleInAuth = info.AdminGroupMember`\\\\n5. `context.go:78` -- `IsSysAdmin()` returns true via `AdminRoleInAuth`\\\\n\\\\nNo validation, sanitization, or filtering exists between steps 1 and 2.\\\\n\\\\n## Protection Search Result\\\\n\\\\nNo protection blocks the attack. The `filterGroup` function (helper.go:459-476) is only invoked inside `populateGroupsDB` (helper.go:455) for database group population. It is never applied before the admin check.\\\\n\\\\n## Reproduction\\\\n\\\\nBlocked by infrastructure requirements (needs OIDC provider + Harbor instance). The code analysis is definitive -- the gap is structural and unambiguous.\\\\n\\\\n## Severity Rationale\\\\n\\\\nDowngraded from HIGH to MEDIUM due to:\\\\n- Significant precondition: requires compromised OIDC provider\\\\n- Requires both AdminGroup and GroupFilter to be configured\\\\n- Theoretical only (no live reproduction)\\\\n\\\\nThe impact (full sysadmin) is severe, but the precondition prevents escalation beyond MEDIUM.\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/pkg/oidc/helper.go:394-399\\",\\"matched_at\\":[\\"src/pkg/oidc/helper.go:394-399\\",\\"src/pkg/oidc/helper.go:455\\",\\"src/pkg/oidc/helper.go:458-467\\"],\\"finding_hash\\":\\"e2f09b8e591db24658f2086cd3c5877d\\",\\"found_at\\":\\"2026-03-30T18:45:41.01614Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":26,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-003\\",\\"module_name\\":\\"Harbor stores full OIDC tokens (including refresh tokens) unencrypted in Redis sessions. The default deployment uses unauthenticated Redis. An attacker with internal network access to Redis can: (1) r\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"redis-session-token-theft-admin-creation\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor stores full OIDC tokens (including refresh tokens) unencrypted in Redis sessions. The default deployment uses unauthenticated Redis. An attacker with internal network access to Redis can: (1) read any OIDC user\'s session to extract refresh tokens for persistent session hijacking, and (2) write crafted session data with `AdminGroupMember: true` then call the OIDC onboard endpoint to create arbitrary system admin accounts. The Onboard handler deserializes session data without re-verifying the OIDC token or checking data integrity.\\\\n\\\\n## Location\\\\n\\\\n- `src/core/controllers/oidc.go:161-168` -- full token stored in Redis session\\\\n- `src/core/controllers/oidc.go:376-395` -- Onboard handler trusts session data\\\\n- `src/core/session/codec.go:34` -- gobCodec provides no encryption\\\\n- Default Redis deployment: unauthenticated on internal Docker network\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls: (1) Redis read access to extract OIDC tokens from any session, (2) Redis write access to inject crafted `oidc_user_info` JSON with admin privileges, (3) the POST request to `/c/oidc/onboard` with the session cookie matching the poisoned session.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nInternal network (Redis) -> OIDC user session tokens AND Harbor admin account creation. A single network position enables both attacks.\\\\n\\\\n## Impact\\\\n\\\\n- **Token theft**: Extract refresh tokens for all OIDC users. Refresh tokens enable silent token renewal until explicit revocation at the OIDC provider.\\\\n- **Admin creation**: Create arbitrary Harbor system admin accounts without knowing any credentials. The crafted session contains `AdminGroupMember: true` which propagates through `InjectGroupsToUser`.\\\\n- **Persistence**: Refresh tokens provide long-lived access. Admin accounts persist until manually removed.\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// Token stored unencrypted -- oidc.go:161-168\\\\ntokenBytes, err := json.Marshal(token)  // includes RefreshToken\\\\noc.SetSession(tokenKey, tokenBytes)     // stored in Redis via gob encoding (no encryption)\\\\n\\\\n// Onboard trusts session data -- oidc.go:376-395\\\\nuserInfoStr, ok := oc.GetSession(userInfoKey).(string)  // from Redis\\\\nd := &oidc.UserInfo{}\\\\njson.Unmarshal([]byte(userInfoStr), &d)  // no integrity check\\\\nuserOnboard(ctx, oc, d, username, tb)    // creates user with d.AdminGroupMember\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Deploy Harbor with OIDC auth mode (default Redis config, no auth)\\\\n2. Have a legitimate user authenticate via OIDC\\\\n3. From internal network, connect to Redis (default port 6379, no auth)\\\\n4. **Token theft**: Read session keys, decode gob values, extract `oidc_token` containing RefreshToken\\\\n5. **Admin creation**: Write a new session with `oidc_user_info` = `{\\\\\\"admin_group_member\\\\\\":true,\\\\\\"subject\\\\\\":\\\\\\"attacker\\\\\\",\\\\\\"issuer\\\\\\":\\\\\\"https://idp.example.com\\\\\\",\\\\\\"username\\\\\\":\\\\\\"attacker\\\\\\"}` and `oidc_token` = valid JSON token bytes\\\\n6. Using the session cookie, POST to `/c/oidc/onboard` with `{\\\\\\"username\\\\\\":\\\\\\"attacker\\\\\\"}`\\\\n7. Verify admin account created with system admin privileges\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/core/controllers/oidc.go:161-168\\",\\"matched_at\\":[\\"src/core/controllers/oidc.go:161-168\\",\\"src/core/controllers/oidc.go:376-395\\",\\"src/core/session/codec.go:34\\"],\\"finding_hash\\":\\"01a97210e19ff31c129a7c29d3331c35\\",\\"found_at\\":\\"2026-03-30T18:45:41.016141Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":27,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-004\\",\\"module_name\\":\\"Harbor\'s Nginx reverse proxy does not strip the `Authorization` header from external requests. The Harbor-Secret authentication mechanism (priority 1 in the auth chain) extracts shared secrets from th\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"nginx-harbor-secret-header-passthrough\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s Nginx reverse proxy does not strip the `Authorization` header from external requests. The Harbor-Secret authentication mechanism (priority 1 in the auth chain) extracts shared secrets from the `Authorization: Harbor-Secret <value>` header. If an external attacker obtains the shared secret (via environment variable leak, configuration exposure, or future CVE), they can send requests with the secret header from the external network to gain full internal service trust context, bypassing all other authentication.\\\\n\\\\n## Location\\\\n\\\\n- `make/photon/prepare/templates/nginx/nginx.http.conf.jinja` -- all location blocks lack `proxy_set_header Authorization \\\\\\"\\\\\\"`\\\\n- `make/photon/prepare/templates/nginx/nginx.https.conf.jinja` -- same gap\\\\n- `src/common/secret/request.go:29-37` -- `FromRequest` extracts Harbor-Secret from Authorization header\\\\n- `src/server/middleware/security/secret.go:29-37` -- secret.Generate is priority 1 in auth chain\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls the HTTP `Authorization` header value. Exploitation is conditional on knowing the shared secret value (32 hex chars from crypto/rand, 128 bits entropy).\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nExternal network -> Internal service trust context (conditional on secret knowledge). The secret auth mechanism is designed for internal inter-service communication only.\\\\n\\\\n## Impact\\\\n\\\\n- Full internal service trust context (equivalent to JobService privileges)\\\\n- Bypasses all other authentication mechanisms (secret is priority 1 in auth chain)\\\\n- Any future secret leak immediately enables external exploitation with no Nginx-level barrier\\\\n- Defense-in-depth failure: the secret value is the sole protection layer\\\\n\\\\n## Evidence\\\\n\\\\n```\\\\n# Nginx config -- no Authorization header stripping\\\\nlocation /api/ {\\\\n    proxy_set_header Host $host;\\\\n    proxy_set_header X-Real-IP $remote_addr;\\\\n    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;\\\\n    proxy_set_header X-Forwarded-Proto $x_forwarded_proto;\\\\n    # MISSING: proxy_set_header Authorization \\\\\\"\\\\\\";\\\\n}\\\\n```\\\\n\\\\n```go\\\\n// src/common/secret/request.go:25-37\\\\nconst HeaderPrefix = \\\\\\"Harbor-Secret \\\\\\"\\\\nfunc FromRequest(req *http.Request) string {\\\\n    auth := req.Header.Get(\\\\\\"Authorization\\\\\\")\\\\n    if after, ok := strings.CutPrefix(auth, HeaderPrefix); ok {\\\\n        return after\\\\n    }\\\\n    return \\\\\\"\\\\\\"\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Examine Nginx config templates -- confirm no `proxy_set_header Authorization \\\\\\"\\\\\\"` in any location block\\\\n2. If secret is known: send `curl -H \\\\\\"Authorization: Harbor-Secret <secret_value>\\\\\\" https://harbor.example.com/api/v2.0/users`\\\\n3. Observe full system-level access without any user credentials\\\\n4. Recommended fix: Add `proxy_set_header Authorization \\\\\\"\\\\\\"` to all external-facing Nginx location blocks, or use a separate header name for internal secret auth\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/common/secret/request.go:29-37\\",\\"matched_at\\":[\\"src/common/secret/request.go:29-37\\",\\"src/server/middleware/security/secret.go:29-37\\"],\\"finding_hash\\":\\"f4bec77efc8e6856d2bd2a62ca2c6a00\\",\\"found_at\\":\\"2026-03-30T18:45:41.016141Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":28,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-005\\",\\"module_name\\":\\"Harbor\'s LDAP authentication path does not check for empty passwords before performing an LDAP bind operation. When a user submits a login request with a valid username and an empty password, Harbor p\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"ldap-null-bind-auth-bypass\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s LDAP authentication path does not check for empty passwords before performing an LDAP bind operation. When a user submits a login request with a valid username and an empty password, Harbor passes the empty password directly to the LDAP server via `ldapSession.Bind(dn, \\\\\\"\\\\\\")`. Per RFC 4511 Section 4.2, an empty-password bind is an \\\\\\"unauthenticated\\\\\\" (anonymous) bind, not authentication of the named DN. Many LDAP servers (OpenLDAP default config, some Active Directory configurations) accept null binds, causing Harbor to treat the bind as a successful authentication.\\\\n\\\\n## Location\\\\n\\\\n- `src/core/auth/ldap/ldap.go:87` -- `ldapSession.Bind(dn, m.Password)` with no empty check\\\\n- `src/core/auth/ldap/ldap.go:57` -- username empty check exists (password check absent)\\\\n- `src/pkg/ldap/ldap.go:190-192` -- `Session.Bind` passes empty password to go-ldap\\\\n- `src/pkg/ldap/ldap.go:39` -- `ErrEmptyPassword` declared but unused in auth path\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls the password field in the login request. Setting it to an empty string triggers the null bind. The username must be a valid LDAP user (enumerable via login error timing or other means).\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nExternal network -> Authenticated Harbor session as any LDAP user. The empty password bypasses the intended credential verification.\\\\n\\\\n## Impact\\\\n\\\\n- Authentication bypass for any LDAP user account\\\\n- Includes system admin accounts if LDAP admin group is configured\\\\n- Affects all Harbor instances configured with LDAP auth mode where the LDAP server accepts null binds\\\\n- The `ErrEmptyPassword` sentinel error exists but is unused, suggesting the developer was aware of the need\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/core/auth/ldap/ldap.go:55-90\\\\nfunc (l *Auth) Authenticate(ctx context.Context, m models.AuthModel) (*models.User, error) {\\\\n    p := m.Principal\\\\n    if len(strings.TrimSpace(p)) == 0 {   // username check EXISTS\\\\n        return nil, auth.NewErrAuth(\\\\\\"Empty user id\\\\\\")\\\\n    }\\\\n    // ... search user by username ...\\\\n    dn := ldapUsers[0].DN\\\\n    if err = ldapSession.Bind(dn, m.Password); err != nil {  // NO empty password check\\\\n        return nil, auth.NewErrAuth(err.Error())\\\\n    }\\\\n    // ... user authenticated ...\\\\n}\\\\n\\\\n// src/pkg/ldap/ldap.go:39 -- sentinel exists but unused\\\\nvar ErrEmptyPassword = errors.New(\\\\\\"empty password\\\\\\")\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure Harbor with LDAP auth mode pointing to an OpenLDAP server with default config (null binds permitted)\\\\n2. Identify a valid LDAP username (e.g., via user search or login error message differences)\\\\n3. Send login request: `curl -X POST https://harbor.example.com/c/login -d \'{\\\\\\"principal\\\\\\":\\\\\\"validuser\\\\\\",\\\\\\"password\\\\\\":\\\\\\"\\\\\\"}\'`\\\\n4. Observe successful authentication -- Harbor session cookie returned\\\\n5. Verify access to Harbor resources as the LDAP user\\\\n6. Recommended fix: Add `if len(strings.TrimSpace(m.Password)) == 0 { return nil, auth.NewErrAuth(\\\\\\"empty password\\\\\\") }` before the Bind call\\\\n\\",\\"severity\\":\\"info\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"false positive (adversarial)\\",\\"poc-blocked\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/core/auth/ldap/ldap.go:87\\",\\"matched_at\\":[\\"src/core/auth/ldap/ldap.go:87\\",\\"src/core/auth/ldap/ldap.go:57\\",\\"src/pkg/ldap/ldap.go:190-192\\",\\"src/pkg/ldap/ldap.go:39\\"],\\"finding_hash\\":\\"98f4cf1889993cbd9a5025ad5d7b4b02\\",\\"found_at\\":\\"2026-03-30T18:45:41.016142Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":29,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-006\\",\\"module_name\\":\\"Harbor\'s OIDC authentication flow does not generate, store, or validate a `nonce` parameter as required by OIDC Core 1.0 Section 3.1.2.1 and Section 3.1.3.7 Step 11. The `RedirectLogin` function gener\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-nonce-not-bound\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s OIDC authentication flow does not generate, store, or validate a `nonce` parameter as required by OIDC Core 1.0 Section 3.1.2.1 and Section 3.1.3.7 Step 11. The `RedirectLogin` function generates state and PKCE but no nonce. The `AuthCodeURL` call adds no nonce option. The `VerifyToken` call provides no nonce to the go-oidc verifier, causing nonce validation to be silently skipped. This is a spec compliance gap that theoretically enables ID token replay attacks, though the authorization code flow significantly limits practical exploitability.\\\\n\\\\n## Location\\\\n\\\\n- `src/core/controllers/oidc.go:68-104` -- `RedirectLogin` generates state and PKCE, no nonce\\\\n- `src/pkg/oidc/helper.go:164-188` -- `AuthCodeURL` adds state/PKCE options, no nonce\\\\n- `src/core/controllers/oidc.go:146` -- `oidc.VerifyToken` called with no nonce to check\\\\n- `src/pkg/oidc/helper.go:220-241` -- `verifyTokenWithConfig` creates config without Nonce field\\\\n\\\\n## Attacker Control\\\\n\\\\nExploitation requires obtaining a valid ID token for a target user AND the ability to inject it into a callback response. In authorization code flow, the ID token is obtained server-to-server, making injection very difficult without MITM to the OIDC provider.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nOIDC provider token endpoint -> Harbor ID token validation. The missing nonce means Harbor cannot distinguish fresh tokens from replayed ones, though the authorization code flow provides compensating protection.\\\\n\\\\n## Impact\\\\n\\\\n- OIDC Core 1.0 spec non-compliance\\\\n- Theoretical ID token replay enabling session fixation/account takeover\\\\n- Practical exploitation requires elevated position (MITM to OIDC provider in auth code flow)\\\\n- State parameter provides partial compensating protection against CSRF\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/core/controllers/oidc.go:68-97\\\\nfunc (oc *OIDCController) RedirectLogin() {\\\\n    state := utils.GenerateRandomString()   // state generated\\\\n    pkceCode, err := pkce.Generate()        // PKCE generated\\\\n    // NO nonce generated or stored\\\\n    url, err := oidc.AuthCodeURL(oc.Context(), state, pkceCode)\\\\n    oc.SetSession(pkceCodeKey, string(pkceCode))\\\\n    oc.SetSession(stateKey, state)           // state stored, nonce NOT stored\\\\n}\\\\n\\\\n// src/core/controllers/oidc.go:146\\\\n_, err = oidc.VerifyToken(ctx, token.RawIDToken)\\\\n// VerifyToken calls go-oidc verifier with no Nonce option -- nonce check silently skipped\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Confirm Harbor OIDC configuration\\\\n2. Inspect `RedirectLogin` -- verify no nonce generation\\\\n3. Inspect `AuthCodeURL` -- verify no nonce in auth URL options\\\\n4. Inspect `VerifyToken` -> `verifyTokenWithConfig` -- verify Config has no Nonce field\\\\n5. Recommended fix: Generate nonce in RedirectLogin, store in session, add as AuthCodeURL option, and set in verifier Config.Nonce for validation\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/core/controllers/oidc.go:68-104\\",\\"matched_at\\":[\\"src/core/controllers/oidc.go:68-104\\",\\"src/pkg/oidc/helper.go:164-188\\",\\"src/core/controllers/oidc.go:146\\",\\"src/pkg/oidc/helper.go:220-241\\"],\\"finding_hash\\":\\"927bdc857959de1f4564d0088078068f\\",\\"found_at\\":\\"2026-03-30T18:45:41.016143Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":30,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-007\\",\\"module_name\\":\\"Harbor\'s `parseIDToken` function at `helper.go:214` uses `SkipExpiryCheck: true` when parsing ID tokens for claim extraction. This function is called by `UserInfoFromIDToken` (used in the OIDC CLI aut\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-id-token-expiry-skipped\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s `parseIDToken` function at `helper.go:214` uses `SkipExpiryCheck: true` when parsing ID tokens for claim extraction. This function is called by `UserInfoFromIDToken` (used in the OIDC CLI auth path) to extract groups, admin status, and other claims from stored ID tokens. While the actual authentication relies on the OIDC provider\'s refresh token validation, the expired ID token\'s claims (potentially stale group memberships or admin status) are accepted without expiry checking, violating OIDC Core 1.0 Section 3.1.3.7 Step 9 and RFC 7519 Section 4.1.4.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/oidc/helper.go:214-217` -- `parseIDToken` with `SkipExpiryCheck: true`\\\\n- `src/pkg/oidc/helper.go:362-371` -- `UserInfoFromIDToken` calls `parseIDToken`\\\\n- `src/pkg/oidc/helper.go:282-313` -- `UserInfoFromToken` uses `UserInfoFromIDToken` for claim extraction\\\\n\\\\n## Attacker Control\\\\n\\\\nLimited. The attacker needs a previously valid (signature-valid) ID token. The token\'s claims are from the original legitimate issuance, not attacker-crafted. The risk is stale claims (e.g., group membership revoked at the OIDC provider but still present in the stored ID token).\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nExpired OIDC credentials -> Valid claim extraction. Token lifetime controls are bypassed for claim extraction.\\\\n\\\\n## Impact\\\\n\\\\n- Stale group memberships and admin status from expired ID tokens used in authorization decisions\\\\n- Token lifetime controls defined by the OIDC provider are not respected\\\\n- If a user\'s admin group membership is revoked at the OIDC provider, Harbor may continue granting admin access based on the stale ID token until the stored token is replaced\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/pkg/oidc/helper.go:214-217\\\\nfunc parseIDToken(ctx context.Context, rawIDToken string) (*gooidc.IDToken, error) {\\\\n    conf := &gooidc.Config{SkipClientIDCheck: true, SkipExpiryCheck: true}\\\\n    return verifyTokenWithConfig(ctx, rawIDToken, conf)\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate via OIDC CLI to store a token in Harbor\'s DB\\\\n2. Wait for the ID token to expire (typically 5-60 minutes)\\\\n3. At the OIDC provider, revoke the user\'s admin group membership\\\\n4. Re-authenticate via OIDC CLI (triggers token refresh + claim extraction from stored ID token)\\\\n5. Observe that if the refreshed token does not include a new ID token, the stale claims from the expired ID token are used\\\\n6. Recommended fix: Remove `SkipExpiryCheck: true` or re-extract claims from a freshly issued ID token after refresh\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/pkg/oidc/helper.go:214-217\\",\\"matched_at\\":[\\"src/pkg/oidc/helper.go:214-217\\",\\"src/pkg/oidc/helper.go:362-371\\",\\"src/pkg/oidc/helper.go:282-313\\"],\\"finding_hash\\":\\"3abb711c0a7c7703a0d2574c2e89f327\\",\\"found_at\\":\\"2026-03-30T18:45:41.016144Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":31,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-008\\",\\"module_name\\":\\"In the OIDC callback handler, when a new user requires onboarding (auto-onboard disabled), the OIDC-provider-supplied username is interpolated into a redirect URL without URL encoding. At `oidc.go:203\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-onboard-url-injection\\",\\"description\\":\\"## Summary\\\\n\\\\nIn the OIDC callback handler, when a new user requires onboarding (auto-onboard disabled), the OIDC-provider-supplied username is interpolated into a redirect URL without URL encoding. At `oidc.go:203`, `fmt.Sprintf(\\\\\\"/oidc-onboard?username=%s&redirect_url=%s\\\\\\", username, redirectURLStr)` allows a username containing characters like `&`, `=`, `?`, or `#` to inject additional query parameters or override the `redirect_url` parameter. This enables an open redirect after the onboarding step.\\\\n\\\\n## Location\\\\n\\\\n- `src/core/controllers/oidc.go:203` -- unencoded username interpolation in redirect URL\\\\n- `src/core/controllers/oidc.go:176` -- only spaces replaced (`strings.Replace(username, \\\\\\" \\\\\\", \\\\\\"_\\\\\\", -1)`)\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls the OIDC provider\'s username claim. A malicious provider or a provider where usernames are user-controlled can supply a username containing URL metacharacters (e.g., `user&redirect_url=https://evil.com`).\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nOIDC provider username claim -> Harbor onboard redirect URL. The injected parameters affect the Angular SPA\'s onboarding page behavior.\\\\n\\\\n## Impact\\\\n\\\\n- Open redirect after onboarding to attacker-controlled URL\\\\n- Potential session theft if the Angular SPA processes the redirect without validation\\\\n- Parameter injection may override other query parameters used by the onboarding page\\\\n- Limited to first-time OIDC users with auto-onboard disabled\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/core/controllers/oidc.go:175-203\\\\nusername := info.Username\\\\nusername = strings.Replace(username, \\\\\\" \\\\\\", \\\\\\"_\\\\\\", -1)  // only spaces replaced\\\\n// ...\\\\noc.Controller.Redirect(\\\\n    fmt.Sprintf(\\\\\\"/oidc-onboard?username=%s&redirect_url=%s\\\\\\", username, redirectURLStr),\\\\n    http.StatusFound,\\\\n)\\\\n// username is NOT url.QueryEscape()\'d\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure Harbor with OIDC auth mode, auto-onboard disabled\\\\n2. At the OIDC provider, create a user with username: `testuser&redirect_url=https://evil.com`\\\\n3. Have this user authenticate via Harbor OIDC login for the first time\\\\n4. Observe the redirect URL: `/oidc-onboard?username=testuser&redirect_url=https://evil.com&redirect_url=<legitimate>`\\\\n5. The first `redirect_url` parameter (attacker-controlled) may override the second in the Angular SPA\\\\n6. Recommended fix: Use `url.QueryEscape(username)` and `url.QueryEscape(redirectURLStr)` in the Sprintf call\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/core/controllers/oidc.go:203\\",\\"matched_at\\":[\\"src/core/controllers/oidc.go:203\\",\\"src/core/controllers/oidc.go:176\\"],\\"finding_hash\\":\\"fe7c8a8aa3f8223be3174a41bdb8c792\\",\\"found_at\\":\\"2026-03-30T18:45:41.016145Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":32,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-009\\",\\"module_name\\":\\"Harbor\'s robot account authentication path (`robot.Generate` at `security/robot.go:33-73`) performs no rate limiting, no lockout, and no sleep on authentication failure. This contrasts with the human \\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"robot-account-no-brute-force-protection\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s robot account authentication path (`robot.Generate` at `security/robot.go:33-73`) performs no rate limiting, no lockout, and no sleep on authentication failure. This contrasts with the human account path (`basicAuth.Generate` -> `auth.Login`) which has `lock.Lock(username)` and 1.5s sleep on failure. Robot account names follow a predictable `robot$project+name` pattern. Password comparison uses single SHA256 with salt (not bcrypt/argon2). While robot secrets are randomly generated with sufficient entropy, the complete absence of defense-in-depth allows automated attacks without any throttling.\\\\n\\\\n## Location\\\\n\\\\n- `src/server/middleware/security/robot.go:33-73` -- no lockout, no sleep, no rate limiting\\\\n- `src/server/middleware/security/robot.go:57` -- `utils.Encrypt(secret, robot.Salt, utils.SHA256)` single SHA256\\\\n- `src/core/auth/authenticator.go:151-160` -- human account has `lock.IsLocked` + `lock.Lock` + `time.Sleep`\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls HTTP Basic Auth credentials with a `robot$` prefix username and guessed secret. Robot names are predictable and can be enumerated. Requests can be automated at arbitrary rate.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nExternal network -> Robot account authentication. Robot accounts are used in CI/CD pipelines for container image operations.\\\\n\\\\n## Impact\\\\n\\\\n- Unlimited online password guessing against robot accounts\\\\n- Robot accounts are used in CI/CD pipelines -- compromise enables supply chain attacks\\\\n- Single SHA256 hash is fast to compute, no adaptive cost function\\\\n- No logging of failed robot auth attempts (log at Errorf level but no security event)\\\\n- Contrast with human accounts: human accounts get 5 attempts per 5 minutes with 1.5s sleep; robot accounts have no limit\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/server/middleware/security/robot.go:33-73 -- NO rate limiting\\\\nfunc (r *robot) Generate(req *http.Request) security.Context {\\\\n    name, secret, ok := req.BasicAuth()\\\\n    // ... lookup robot by name ...\\\\n    if utils.Encrypt(secret, robot.Salt, utils.SHA256) != robot.Secret {\\\\n        log.Errorf(\\\\\\"failed to authenticate robot account: %s\\\\\\", name)\\\\n        return nil  // NO lock.Lock(), NO time.Sleep()\\\\n    }\\\\n    // ...\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Identify a robot account name (e.g., `robot$myproject+scanner`)\\\\n2. Send rapid sequential Basic Auth requests with guessed secrets\\\\n3. Observe no rate limiting, no lockout, no delay between failures\\\\n4. Compare with human account login: observe 1.5s sleep on each failure and lockout after 5 attempts\\\\n5. Recommended fix: Add robot accounts to the existing `UserLock` mechanism or implement per-name rate limiting\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/middleware/security/robot.go:33-73\\",\\"matched_at\\":[\\"src/server/middleware/security/robot.go:33-73\\",\\"src/server/middleware/security/robot.go:57\\",\\"src/core/auth/authenticator.go:151-160\\"],\\"finding_hash\\":\\"95045a42191e1dfd4f9a7cc50730284c\\",\\"found_at\\":\\"2026-03-30T18:45:41.016145Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":33,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-010\\",\\"module_name\\":\\"When the PKCE code verifier stored in the Redis session is absent or corrupted (due to session expiry, sticky-session failure, or Redis key deletion), Harbor\'s OIDC callback silently proceeds without \\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-pkce-silent-downgrade\\",\\"description\\":\\"## Summary\\\\n\\\\nWhen the PKCE code verifier stored in the Redis session is absent or corrupted (due to session expiry, sticky-session failure, or Redis key deletion), Harbor\'s OIDC callback silently proceeds without PKCE verification. At `oidc.go:133`, the Go type assertion `pkceCode, _ := oc.GetSession(pkceCodeKey).(string)` produces an empty string on failure (no error checked). At `helper.go:203-206`, `len(pkceCode) == 0` causes the PKCE verifier to be omitted from the token exchange. The authorization code is exchanged without `code_verifier`, downgrading PKCE protection silently.\\\\n\\\\n## Location\\\\n\\\\n- `src/core/controllers/oidc.go:133` -- `pkceCode, _ := oc.GetSession(pkceCodeKey).(string)` silent type assertion\\\\n- `src/pkg/oidc/helper.go:203-206` -- PKCE verifier skipped when length is zero\\\\n- `src/core/controllers/oidc.go:92-96` -- PKCE code stored in session during RedirectLogin\\\\n\\\\n## Attacker Control\\\\n\\\\nNatural: Session expiry between RedirectLogin and Callback causes PKCE key absence. Adversarial: Redis write access (see p8-003) to delete the `oidc_pkce_code` session key.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nAuthorization code -> Token exchange without PKCE binding. The code can be exchanged by any party who intercepts it (assuming the OIDC provider does not enforce PKCE server-side).\\\\n\\\\n## Impact\\\\n\\\\n- PKCE protection silently disabled without user or operator awareness\\\\n- Authorization code interception attacks become viable against permissive OIDC providers\\\\n- State parameter still provides CSRF protection but cannot bind the code to the client (PKCE\'s role)\\\\n- Many OIDC providers enforce PKCE server-side, making this a login failure rather than security bypass for those providers\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/core/controllers/oidc.go:133\\\\npkceCode, _ := oc.GetSession(pkceCodeKey).(string)\\\\n// Go type assertion failure -> pkceCode = \\\\\\"\\\\\\" (zero value), no error\\\\n\\\\n// src/pkg/oidc/helper.go:203-206\\\\nif len(pkceCode) > 0 {\\\\n    opts = append(opts, pkceCode.Verifier())\\\\n}\\\\n// len(\\\\\\"\\\\\\") == 0 -> verifier NOT added -> exchange without code_verifier\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure Harbor with OIDC auth\\\\n2. Start OIDC login flow (RedirectLogin stores PKCE code in Redis session)\\\\n3. Delete the `oidc_pkce_code` key from the Redis session (or wait for session expiry)\\\\n4. Complete the OIDC callback\\\\n5. Observe that the token exchange request does not include `code_verifier` parameter\\\\n6. If OIDC provider is permissive, authentication succeeds without PKCE verification\\\\n7. Recommended fix: Change to `pkceCode, ok := ...; if !ok { return error }` to make PKCE mandatory\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/core/controllers/oidc.go:133\\",\\"matched_at\\":[\\"src/core/controllers/oidc.go:133\\",\\"src/pkg/oidc/helper.go:203-206\\",\\"src/core/controllers/oidc.go:92-96\\"],\\"finding_hash\\":\\"8c035d8ee6682d6a91d9c207ce3545d6\\",\\"found_at\\":\\"2026-03-30T18:45:41.016146Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":34,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-011\\",\\"module_name\\":\\"Harbor\'s `ReversibleDecrypt` function at `encrypt.go:82-89` falls back to base64 decoding when the stored value lacks the `<enc-v1>` AES encryption prefix. In Harbor instances upgraded from older vers\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"legacy-oidc-token-base64-storage\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s `ReversibleDecrypt` function at `encrypt.go:82-89` falls back to base64 decoding when the stored value lacks the `<enc-v1>` AES encryption prefix. In Harbor instances upgraded from older versions (pre-AES-encryption), OIDC user records in the `oidc_user.token` and `oidc_user.secret` columns may still contain legacy base64-encoded values. These records can be decoded without the AES key, exposing OIDC tokens (including refresh tokens) and CLI secrets to anyone with database read access.\\\\n\\\\n## Location\\\\n\\\\n- `src/common/utils/encrypt.go:82-89` -- `ReversibleDecrypt` base64 fallback\\\\n- `src/pkg/oidc/dao/` -- `oidc_user` table DAO\\\\n- Database: `oidc_user.token` and `oidc_user.secret` columns\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker needs read access to the PostgreSQL database\'s `oidc_user` table. This is an elevated position but is reachable via SQL injection (if any exist), database backup exposure, or compromised database credentials.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nDatabase read access -> Plaintext OIDC tokens. The encryption at rest intended to protect these values is absent for legacy records.\\\\n\\\\n## Impact\\\\n\\\\n- OIDC refresh tokens for legacy accounts recoverable without AES key\\\\n- CLI secrets for legacy accounts exposed in plaintext (base64 encoding only)\\\\n- Affects only Harbor instances upgraded from pre-encryption versions with unmigrated records\\\\n- New records created after the encryption migration use AES and are protected\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/common/utils/encrypt.go:82-89\\\\nfunc ReversibleDecrypt(str, key string) (string, error) {\\\\n    if strings.HasPrefix(str, encryptHeaderV1) {\\\\n        // AES decryption path (new records)\\\\n        return decryptAES(strings.TrimPrefix(str, encryptHeaderV1), key)\\\\n    }\\\\n    // Base64 fallback path (legacy records) -- NO AES key needed\\\\n    return decodeB64(str)\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Identify a Harbor instance that was upgraded from a pre-AES-encryption version\\\\n2. Query the `oidc_user` table: `SELECT token, secret FROM oidc_user WHERE token NOT LIKE \'<enc-v1>%\'`\\\\n3. For any returned records, base64-decode the `token` column: `echo \\\\\\"<value>\\\\\\" | base64 -d`\\\\n4. Observe the plaintext OIDC token JSON (containing refresh_token, access_token, etc.)\\\\n5. Recommended fix: Add a one-time migration that re-encrypts all legacy base64 records with AES, or reject base64 fallback in production mode\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/common/utils/encrypt.go:82-89\\",\\"matched_at\\":[\\"src/common/utils/encrypt.go:82-89\\"],\\"finding_hash\\":\\"fc577bff8ba3095621cd5476511013bc\\",\\"found_at\\":\\"2026-03-30T18:45:41.016147Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":35,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-020\\",\\"module_name\\":\\"A system administrator can simultaneously set `audit_log_forward_endpoint` to an attacker-controlled syslog server and `skip_audit_log_database=true` via a single `PUT /api/v2.0/configurations` reques\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"audit-evidence-destruction\\",\\"description\\":\\"## Summary\\\\n\\\\nA system administrator can simultaneously set `audit_log_forward_endpoint` to an attacker-controlled syslog server and `skip_audit_log_database=true` via a single `PUT /api/v2.0/configurations` request. This redirects all subsequent audit events exclusively to the attacker\'s server while silencing Harbor\'s database audit trail. Critically, the configuration change that enables this is itself not recorded in Harbor\'s audit log because the forward endpoint is already redirected when the audit hook fires.\\\\n\\\\n## Location\\\\n\\\\n- `src/lib/config/metadata/metadatalist.go:192-193` -- `audit_log_forward_endpoint` (StringType, UserScope) and `skip_audit_log_database` (BoolType, UserScope)\\\\n- `src/controller/config/controller.go:149-169` -- `verifySkipAuditLogCfg` validates only that endpoint is non-empty\\\\n- `src/pkg/audit/forward.go:38-52` -- `LoggerManager.Init` configures syslog forwarding\\\\n- `src/pkg/auditext/manager.go:80-88` -- `Create` checks skip flag before DB write\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin fully controls both config values via `PUT /api/v2.0/configurations`\\\\n- No URL validation on `audit_log_forward_endpoint` -- accepts any `host:port` string\\\\n- `verifySkipAuditLogCfg` only validates that endpoint is non-empty when skip is true\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-5: Core API to external syslog endpoint (attacker-controlled)\\\\n- System admin privilege escalates to audit system compromise\\\\n\\\\n## Impact\\\\n\\\\n1. **Evidence Destruction**: Harbor\'s audit_log_ext table receives no new entries. All forensic evidence eliminated.\\\\n2. **Audit Exfiltration**: All audit events (operator, resource, operation, timestamps) forwarded to attacker\'s syslog server permanently.\\\\n3. **Self-Concealing**: The configuration change that enables this attack is itself not recorded in Harbor\'s audit trail.\\\\n4. **Enables Stealth Attacks**: With audit silenced, subsequent SSRF, credential theft, or data exfiltration leaves no trace.\\\\n\\\\n## Evidence\\\\n\\\\n- Deep Probe PH-12/PH-C06: Validated via backward, TRIZ contradiction, and causal reasoning models\\\\n- `verifySkipAuditLogCfg` at controller.go:149-169 only checks endpoint non-empty, not legitimacy\\\\n- Audit hook fires after handler returns -- new config already active when change is audited\\\\n- No re-validation of endpoint on each audit event emission\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Send: `PUT /api/v2.0/configurations` with body `{\\\\\\"audit_log_forward_endpoint\\\\\\": \\\\\\"<attacker-syslog>:514\\\\\\", \\\\\\"skip_audit_log_database\\\\\\": true}`\\\\n3. Verify Harbor\'s `audit_log_ext` table stops receiving new entries\\\\n4. Verify attacker\'s syslog server receives all subsequent Harbor audit events\\\\n5. Verify the config change itself is NOT recorded in Harbor\'s audit log\\\\n\\\\n\\\\n---\\\\n## Cold Verification\\\\n\\\\n## Verdict: CONFIRMED (severity downgraded from CRITICAL to MEDIUM)\\\\n\\\\n## Reasoning\\\\n\\\\n### Technical Claims -- All Verified\\\\n\\\\n1. **Config API allows setting both values in one call**: Verified at `src/server/v2.0/handler/config.go:75-91`. The `PUT /api/v2.0/configurations` endpoint accepts a JSON body with both `audit_log_forward_endpoint` and `skip_audit_log_database` fields. Both are UserScope, editable config items (`metadatalist.go:192-193`).\\\\n\\\\n2. **Minimal endpoint validation**: Verified at `src/controller/config/controller.go:149-169`. `verifySkipAuditLogCfg` only checks that the endpoint is non-empty when skip is true. The `updateLogEndpoint` function at lines 100-113 calls `CheckEndpointActive` which does a TCP syslog dial -- this confirms the endpoint is reachable but does not validate trustworthiness.\\\\n\\\\n3. **Database audit trail silenced**: Verified at `src/pkg/auditext/manager.go:85-86`. When `config.SkipAuditLogDatabase(ctx)` returns true, the function returns `(0, nil)` without calling `m.dao.Create`.\\\\n\\\\n4. **Self-concealing via async processing**: This is the most significant finding. The audit event processing chain is:\\\\n   - `log.Middleware` (`src/server/middleware/log/log.go:69`) calls `next.ServeHTTP` (handler updates config synchronously)\\\\n   - After handler returns, event is queued via `notification.AddEvent` (line 81)\\\\n   - `notification.Middleware` fires `event.BuildAndPublish` (line 34 of notification.go)\\\\n   - `BuildAndPublish` at `src/pkg/notifier/event/event.go:101-113` runs in a **goroutine** (`go func()`)\\\\n   - The goroutine eventually calls `auditext.Mgr.Create` which reads the **already-updated** config\\\\n   - Result: the config change\'s own audit event is dropped\\\\n\\\\n### Severity Downgrade Rationale\\\\n\\\\nThe finding is technically accurate but CRITICAL severity is not warranted because:\\\\n\\\\n- **Requires system admin privileges**: The `RequireSystemAccess` check at `config.go:76` restricts this to the highest privilege level. This is an insider threat scenario, not an external attack.\\\\n- **Designed feature being used as intended**: Audit log forwarding with database skip is a deliberate Harbor feature for SIEM integration. The \\\\\\"vulnerability\\\\\\" is a design gap (no immutable audit of config changes), not a code defect.\\\\n- **Significant precondition**: Compromised or malicious system admin is a substantial precondition that prevents HIGH/CRITICAL classification per the severity challenge framework.\\\\n- **External mitigations possible**: Network segmentation and egress filtering can prevent connection to arbitrary syslog endpoints.\\\\n\\\\n### What Makes This a Real Issue (MEDIUM, not FALSE POSITIVE)\\\\n\\\\nThe self-concealing aspect is a genuine design weakness. Even for a trusted admin, security best practice requires that audit configuration changes themselves be recorded in an immutable, separate audit trail. The fact that the skip flag can suppress the audit record for its own activation is a real gap that should be addressed with:\\\\n- A separate, immutable log for audit configuration changes\\\\n- Or recording the config change BEFORE applying the new config values\\\\n\\\\n## Files\\\\n\\\\n- Finding draft: `/Users/tuan.v.tran/AuditSource/harbor/security/findings-draft/p8-020-audit-evidence-destruction.md`\\\\n- Full review: `/Users/tuan.v.tran/AuditSource/harbor/security/adversarial-reviews/audit-evidence-destruction-review.md`\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/lib/config/metadata/metadatalist.go:192-193\\",\\"matched_at\\":[\\"src/lib/config/metadata/metadatalist.go:192-193\\",\\"src/controller/config/controller.go:149-169\\",\\"src/pkg/audit/forward.go:38-52\\",\\"src/pkg/auditext/manager.go:80-88\\"],\\"finding_hash\\":\\"4a2c8b844b13095c2996316193a10809\\",\\"found_at\\":\\"2026-03-30T18:45:41.016147Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":36,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-021\\",\\"module_name\\":\\"The `GET /api/v2.0/configurations` endpoint has a solution-user code path that returns all configuration values including PasswordType fields (LDAP bind password, OIDC client secret, PostgreSQL passwo\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"solution-user-credential-leak\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `GET /api/v2.0/configurations` endpoint has a solution-user code path that returns all configuration values including PasswordType fields (LDAP bind password, OIDC client secret, PostgreSQL password, admin initial password) without redaction. The solution-user path calls `AllConfigs()` directly instead of `UserConfigs()` which applies `ConvertForGet()` to strip sensitive fields.\\\\n\\\\n## Location\\\\n\\\\n- `src/server/v2.0/handler/config.go:41-59` -- Solution-user branch calls `c.controller.AllConfigs(ctx)` bypassing password redaction\\\\n- `src/controller/config/controller.go:224-253` -- `ConvertForGet` strips PasswordType fields but is NOT called for solution-user path\\\\n- `src/lib/config/metadata/metadatalist.go:70,93,106,141` -- PasswordType fields that should be redacted\\\\n\\\\n## Attacker Control\\\\n\\\\n- Attacker needs the solution-user shared secret (Harbor-Secret header)\\\\n- Secret is stored in container environment variables and Kubernetes secrets\\\\n- Container escape, Kubernetes RBAC misconfiguration, or env var leakage provides access\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- Internal service authentication (solution-user) to full credential exfiltration\\\\n- TB-5: Core API internal interface exposed to broader attack surface\\\\n\\\\n## Impact\\\\n\\\\n- Single API call leaks: `ldap_search_password`, `oidc_client_secret`, `postgresql_password`, `admin_initial_password`, `email_password`, `trace_jaeger_password`\\\\n- Enables lateral movement to LDAP server, OIDC provider, PostgreSQL database\\\\n- Full system compromise from a single credential theft\\\\n\\\\n## Evidence\\\\n\\\\n- Deep Probe PH-05/PH-C07: Validated end-to-end\\\\n- config.go:43-44: `sec.IsSolutionUser()` true -> `AllConfigs()` (no stripping)\\\\n- config.go:64: Normal admin path -> `UserConfigs()` -> `ConvertForGet()` (strips passwords)\\\\n- Bypass analysis bypass-85e756486 confirms this pattern\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Obtain the solution-user shared secret (from container env, Kubernetes secret, or config file)\\\\n2. Send: `GET /api/v2.0/configurations` with header `Authorization: Harbor-Secret <secret>`\\\\n3. Verify response contains plaintext values for all PasswordType fields\\\\n4. Contrast with system-admin GET which correctly redacts these fields\\\\n\\\\n\\\\n---\\\\n## Cold Verification\\\\n\\\\n## Verdict: DISPROVED\\\\n\\\\n**Adversarial-Verdict**: DISPROVED\\\\n**Adversarial-Rationale**: ConfigurationsResponse swagger model (api/v2.0/swagger.yaml:8981-9161) contains no password fields; json.Unmarshal into the generated typed struct silently drops all PasswordType config values before they reach the API response.\\\\n**Severity-Final**: N/A\\\\n**PoC-Status**: blocked\\\\n\\\\n## Key Finding\\\\n\\\\nThe finding\'s core claim -- that password values leak through `GET /api/v2.0/configurations` when called as a solution user -- is false due to an implicit allowlist filter in the response serialization path.\\\\n\\\\n### The Defense\\\\n\\\\nIn `src/server/v2.0/handler/config.go:41-59`, the solution-user code path does call `AllConfigs()` which returns a `map[string]any` containing all configuration values including passwords. However, lines 48-54 perform:\\\\n\\\\n```go\\\\nresult, err = json.Marshal(cfg)          // map -> JSON bytes (passwords present)\\\\nvar cfgResp models.ConfigurationsResponse\\\\nerr = json.Unmarshal(result, &cfgResp)   // JSON bytes -> typed struct (passwords DROPPED)\\\\n```\\\\n\\\\nThe `models.ConfigurationsResponse` type is generated by go-swagger from `api/v2.0/swagger.yaml` lines 8981-9161. This swagger definition:\\\\n\\\\n1. Has only fixed `properties` (auth_mode, ldap_base_dn, oidc_name, etc.)\\\\n2. Does NOT include any PasswordType fields (no ldap_search_password, oidc_client_secret, postgresql_password, admin_initial_password, email_password, trace_jaeger_password)\\\\n3. Does NOT have `additionalProperties` (unlike `InternalConfigurationsResponse` which does)\\\\n\\\\nGo\'s standard `json.Unmarshal` silently drops JSON keys that have no corresponding struct field. Therefore, all password values are stripped before the response is sent to the client.\\\\n\\\\n### Contrast with InternalConfigurationsResponse\\\\n\\\\nThe `InternalConfigurationsResponse` model (swagger line 8967-8970) uses `additionalProperties` and IS a map type that preserves all keys. However, this is used by the separate `GetInternalconfig` endpoint (config.go:107-126), not `GetConfigurations`. Furthermore, that endpoint explicitly calls `ConvertForGet(ctx, cfg, true)` with `internal=true`, which is the intentional design for inter-service configuration sharing.\\\\n\\\\n### What the Finding Got Wrong\\\\n\\\\nThe finding correctly identified that `AllConfigs()` bypasses `ConvertForGet()` and that the raw map contains passwords. But it failed to trace the full response path through the JSON serialization into the typed `ConfigurationsResponse` struct, which acts as a second line of defense that strips all password fields.\\\\n\\\\n## Files Examined\\\\n\\\\n- `/Users/tuan.v.tran/AuditSource/harbor/src/server/v2.0/handler/config.go` -- The handler
