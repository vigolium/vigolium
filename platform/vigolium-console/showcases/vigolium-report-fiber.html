internal HTTPS service and auth_header to service token\\\\n\\\\n## Cold Verification Notes\\\\n\\\\n- Full code path traced independently from API entry to HTTP execution\\\\n- No IP filtering found at any layer: ParseEndpoint, validateTargets, HTTP transport, net.Dialer\\\\n- HTTP transport uses vanilla net.Dialer with no Control function (transport.go:62-76)\\\\n- Developers acknowledged SSRF risk (comment referencing #3755) but only fixed userinfo injection, not IP-based SSRF\\\\n- Reproduction blocked by deployment complexity (full Harbor stack required), not by any defensive mechanism\\\\n- Full adversarial review at: security/adversarial-reviews/webhook-ssrf-no-ip-filter-review.md\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/v2.0/handler/webhook.go:409-415\\",\\"matched_at\\":[\\"src/server/v2.0/handler/webhook.go:409-415\\",\\"src/common/utils/utils.go:36-53\\",\\"src/jobservice/job/impl/notification/webhook_job.go:103-120\\",\\"src/jobservice/job/impl/notification/webhook_job.go:91-96\\",\\"src/pkg/notifier/handler/notification/http_handler.go:78-79\\"],\\"finding_hash\\":\\"3417d7abd543fd6ad7b01c58036f79dd\\",\\"found_at\\":\\"2026-03-30T18:45:41.016149Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":38,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-023\\",\\"module_name\\":\\"The `CheckEndpointActive` function in `src/pkg/audit/forward.go` performs a TCP connection via `syslog.Dial(\\\\\\"tcp\\\\\\", address)` to validate the audit log forwarding endpoint. The address is a raw `host:p\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"audit-endpoint-tcp-portscan\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `CheckEndpointActive` function in `src/pkg/audit/forward.go` performs a TCP connection via `syslog.Dial(\\\\\\"tcp\\\\\\", address)` to validate the audit log forwarding endpoint. The address is a raw `host:port` string with no IP or hostname validation. The function is called during `PUT /api/v2.0/configurations` when `audit_log_forward_endpoint` is updated. Distinct error messages (connection refused, timeout, syslog protocol error) create a TCP port scan oracle that a system administrator can use to map the internal network.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/audit/forward.go:64-76` -- `CheckEndpointActive` performs `syslog.Dial(\\\\\\"tcp\\\\\\", address)`\\\\n- `src/controller/config/controller.go:100-113` -- `updateLogEndpoint` calls `CheckEndpointActive`\\\\n- `src/controller/config/controller.go:115-147` -- `validateCfg` calls `updateLogEndpoint`\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin controls `audit_log_forward_endpoint` value via PUT /configurations\\\\n- Raw `host:port` string accepted with no IP filtering or hostname validation\\\\n- Can iterate any internal IP and port combination\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- Core API container to any TCP-reachable host on the internal network\\\\n- System admin privilege escalates to network reconnaissance capability\\\\n\\\\n## Impact\\\\n\\\\n- Full internal network topology mapping via TCP SYN probes\\\\n- Port status oracle: connection refused (closed), timeout (filtered), syslog error (open)\\\\n- Informs subsequent SSRF attacks (H-00c, H-00f, H-00g) with discovered targets\\\\n- Can probe cloud metadata, Redis, PostgreSQL, Kubernetes API ports\\\\n\\\\n## Evidence\\\\n\\\\n- Deep Probe PH-03/PH-C03/PH-11: Validated via abductive, TRIZ contradiction, and causal reasoning\\\\n- `syslog.Dial` performs actual TCP connection -- the \\\\\\"validation\\\\\\" IS the SSRF probe\\\\n- No IP filtering: accepts `10.0.0.5:5432`, `169.254.169.254:80`, `127.0.0.1:6379`\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Send: `PUT /api/v2.0/configurations` with `{\\\\\\"audit_log_forward_endpoint\\\\\\": \\\\\\"10.0.0.5:5432\\\\\\"}`\\\\n3. Observe response: connection refused (port closed), timeout (filtered), or syslog protocol error (port open)\\\\n4. Iterate across IP/port combinations to map internal network\\\\n5. Compare response times and error messages to distinguish port states\\\\n\\\\n\\\\n---\\\\n## Cold Verification\\\\n\\\\n## Summary\\\\n\\\\nThe `CheckEndpointActive` function in `src/pkg/audit/forward.go` performs a TCP connection via `syslog.Dial(\\\\\\"tcp\\\\\\", address)` to validate the audit log forwarding endpoint. The address is a raw `host:port` string with no IP or hostname validation. The function is called during `PUT /api/v2.0/configurations` when `audit_log_forward_endpoint` is updated. Distinct error messages (connection refused, timeout, syslog protocol error) create a TCP port scan oracle that a system administrator can use to map the internal network.\\\\n\\\\n## Location\\\\n\\\\n- `src/pkg/audit/forward.go:64-76` -- `CheckEndpointActive` performs `syslog.Dial(\\\\\\"tcp\\\\\\", address)`\\\\n- `src/controller/config/controller.go:100-113` -- `updateLogEndpoint` calls `CheckEndpointActive`\\\\n- `src/controller/config/controller.go:115-147` -- `validateCfg` calls `updateLogEndpoint`\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin controls `audit_log_forward_endpoint` value via PUT /configurations\\\\n- Raw `host:port` string accepted with no IP filtering or hostname validation\\\\n- Can iterate any internal IP and port combination\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- Core API container to any TCP-reachable host on the internal network\\\\n- System admin privilege escalates to network reconnaissance capability\\\\n\\\\n## Impact\\\\n\\\\n- Full internal network topology mapping via TCP SYN probes\\\\n- Port status oracle: connection refused (closed), timeout (filtered), syslog error (open)\\\\n- Informs subsequent SSRF attacks (H-00c, H-00f, H-00g) with discovered targets\\\\n- Can probe cloud metadata, Redis, PostgreSQL, Kubernetes API ports\\\\n\\\\n## Evidence\\\\n\\\\n- Deep Probe PH-03/PH-C03/PH-11: Validated via abductive, TRIZ contradiction, and causal reasoning\\\\n- `syslog.Dial` performs actual TCP connection -- the \\\\\\"validation\\\\\\" IS the SSRF probe\\\\n- No IP filtering: accepts `10.0.0.5:5432`, `169.254.169.254:80`, `127.0.0.1:6379`\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Send: `PUT /api/v2.0/configurations` with `{\\\\\\"audit_log_forward_endpoint\\\\\\": \\\\\\"10.0.0.5:5432\\\\\\"}`\\\\n3. Observe response: connection refused (port closed), timeout (filtered), or syslog protocol error (port open)\\\\n4. Iterate across IP/port combinations to map internal network\\\\n5. Compare response times and error messages to distinguish port states\\\\n\\\\n## Adversarial Review Notes\\\\n\\\\n### Corrections to Original Finding\\\\n\\\\n1. **Error message oracle overstated**: The API response does NOT contain distinct error messages for different TCP failure modes. `CheckEndpointActive` returns only a `bool`, and the error returned to the HTTP caller is always `\\\\\\"could not connect to the audit endpoint: <endpoint>\\\\\\"`. The specific TCP error (connection refused, timeout, etc.) is only logged server-side via `log.Errorf`. The actual oracle is **timing-based** (fast return for refused, slow for filtered, medium for success with 200 OK).\\\\n\\\\n2. **Call graph inaccuracy**: The draft states `validateCfg` calls `updateLogEndpoint` (line 19). This is incorrect. Both `validateCfg` and `updateLogEndpoint` are called sequentially from `UpdateUserConfigs` (controller.go:88,97). `validateCfg` does not invoke `updateLogEndpoint`.\\\\n\\\\n### Severity Downgrade Justification (HIGH -> MEDIUM)\\\\n\\\\n- Requires system administrator privileges, the highest privilege level in Harbor\\\\n- System admins typically have infrastructure access that would allow direct network scanning\\\\n- Timing oracle is less reliable and slower than claimed error-message oracle\\\\n- Scanning rate is limited by HTTP request overhead and TCP timeout durations\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/pkg/audit/forward.go:64-76\\",\\"matched_at\\":[\\"src/pkg/audit/forward.go:64-76\\",\\"src/controller/config/controller.go:100-113\\",\\"src/controller/config/controller.go:115-147\\"],\\"finding_hash\\":\\"6d9a16d1a9dbdb6f89dd5dd36f352dc2\\",\\"found_at\\":\\"2026-03-30T18:45:41.01615Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":39,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-024\\",\\"module_name\\":\\"Harbor\'s P2P preheat flow accepts arbitrary URLs for provider endpoints with only scheme validation (http/https). The `ValidateHTTPURL` function at `src/lib/endpoint.go:27-45` performs no IP address f\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"preheat-ssrf\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s P2P preheat flow accepts arbitrary URLs for provider endpoints with only scheme validation (http/https). The `ValidateHTTPURL` function at `src/lib/endpoint.go:27-45` performs no IP address filtering, allowing SSRF to cloud metadata (169.254.169.254), loopback, and RFC1918 addresses. IP encoding bypasses (hex: `0x7f000001`, decimal: `2130706433`, IPv6-mapped: `::ffff:127.0.0.1`) further evade any string-based IP checks. The preheat instance creation path (`CreateInstance`) explicitly skips validation with a code comment `// !WARN: We don\'t check the health of the instance here`, creating a wider TOCTOU window for DNS rebinding than other SSRF entry points.\\\\n\\\\n## Location\\\\n\\\\n- `src/lib/endpoint.go:27-45` -- `ValidateHTTPURL` checks scheme only, no IP filtering\\\\n- `src/pkg/p2p/preheat/provider/dragonfly.go:199-213` -- `GetHealth` calls ValidateHTTPURL then HTTP GET\\\\n- `src/controller/p2p/preheat/controller.go:195` -- `CreateInstance` stores endpoint without validation\\\\n- `src/server/v2.0/handler/preheat.go:547` -- `convertParamInstanceToModelInstance` copies endpoint as-is\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin (for instance creation) or project admin (for policy) controls the endpoint URL\\\\n- All IP forms accepted: decimal, hex, octal, IPv6-mapped, IPv6 zone-ID\\\\n- No DNS pinning -- rebinding possible between store and enforcement\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-8: Job Service to external/internal endpoints\\\\n- Core API trust to internal network access\\\\n\\\\n## Impact\\\\n\\\\n- Cloud metadata credential theft via preheat job HTTP requests\\\\n- Internal service probing and exploitation\\\\n- DNS rebinding bypass of future IP denylists\\\\n\\\\n## Evidence\\\\n\\\\n- Deep Probe PH-04/PH-C05: Validated end-to-end\\\\n- endpoint_test.go:32-33 confirms `http://127.0.0.1` passes validation\\\\n- Controller.go:195 comment: `// !WARN: We don\'t check the health of the instance here`\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system admin\\\\n2. Create preheat instance: `POST /api/v2.0/p2p/preheat/instances` with `{\\\\\\"endpoint\\\\\\": \\\\\\"http://169.254.169.254/\\\\\\", \\\\\\"vendor\\\\\\": \\\\\\"dragonfly\\\\\\", \\\\\\"name\\\\\\": \\\\\\"test\\\\\\"}`\\\\n3. Create preheat policy targeting the instance\\\\n4. Trigger preheat enforcement (artifact push matching policy filter)\\\\n5. Observe outbound HTTP request from job service to metadata endpoint\\\\n\\\\n\\\\n---\\\\n## Cold Verification\\\\n\\\\n## Summary\\\\n\\\\nHarbor\'s P2P preheat flow accepts arbitrary URLs for provider endpoints with only scheme validation (http/https). The `ValidateHTTPURL` function at `src/lib/endpoint.go:27-45` performs no IP address filtering, allowing SSRF to cloud metadata (169.254.169.254), loopback, and RFC1918 addresses. IP encoding bypasses (hex: `0x7f000001`, decimal: `2130706433`, IPv6-mapped: `::ffff:127.0.0.1`) further evade any string-based IP checks. The preheat instance creation path (`CreateInstance`) explicitly skips validation with a code comment `// !WARN: We don\'t check the health of the instance here`, creating a wider TOCTOU window for DNS rebinding than other SSRF entry points.\\\\n\\\\n## Location\\\\n\\\\n- `src/lib/endpoint.go:27-45` -- `ValidateHTTPURL` checks scheme only, no IP filtering\\\\n- `src/pkg/p2p/preheat/provider/dragonfly.go:199-213` -- `GetHealth` calls ValidateHTTPURL then HTTP GET\\\\n- `src/controller/p2p/preheat/controller.go:195` -- `CreateInstance` stores endpoint without validation\\\\n- `src/server/v2.0/handler/preheat.go:547` -- `convertParamInstanceToModelInstance` copies endpoint as-is\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin (for instance creation) or project admin (for policy) controls the endpoint URL\\\\n- All IP forms accepted: decimal, hex, octal, IPv6-mapped, IPv6 zone-ID\\\\n- No DNS pinning -- rebinding possible between store and enforcement\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-8: Job Service to external/internal endpoints\\\\n- Core API trust to internal network access\\\\n\\\\n## Impact\\\\n\\\\n- Cloud metadata credential theft via preheat job HTTP requests\\\\n- Internal service probing and exploitation\\\\n- DNS rebinding bypass of future IP denylists\\\\n\\\\n## Evidence\\\\n\\\\n- Deep Probe PH-04/PH-C05: Validated end-to-end\\\\n- endpoint_test.go:32-33 confirms `http://127.0.0.1` passes validation\\\\n- Controller.go:195 comment: `// !WARN: We don\'t check the health of the instance here`\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system admin\\\\n2. Create preheat instance: `POST /api/v2.0/p2p/preheat/instances` with `{\\\\\\"endpoint\\\\\\": \\\\\\"http://169.254.169.254/\\\\\\", \\\\\\"vendor\\\\\\": \\\\\\"dragonfly\\\\\\", \\\\\\"name\\\\\\": \\\\\\"test\\\\\\"}`\\\\n3. Create preheat policy targeting the instance\\\\n4. Trigger preheat enforcement (artifact push matching policy filter)\\\\n5. Observe outbound HTTP request from job service to metadata endpoint\\\\n\\\\n## Cold Verification Notes\\\\n\\\\n- Severity downgraded from HIGH to MEDIUM: system admin privilege is a significant precondition that narrows the attacker profile\\\\n- The Preheat code path (dragonfly.go:268, kraken.go:89) does not even call ValidateHTTPURL, making the situation worse than described in the original finding\\\\n- Reproduction blocked by infrastructure requirements (multi-service Harbor deployment needed); verdict based on code analysis\\\\n- Full adversarial review at: security/adversarial-reviews/preheat-ssrf-review.md\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/lib/endpoint.go:27-45\\",\\"matched_at\\":[\\"src/lib/endpoint.go:27-45\\",\\"src/pkg/p2p/preheat/provider/dragonfly.go:199-213\\",\\"src/controller/p2p/preheat/controller.go:195\\",\\"src/server/v2.0/handler/preheat.go:547\\"],\\"finding_hash\\":\\"10e512f66550dbeb8ce0bb835ae1240c\\",\\"found_at\\":\\"2026-03-30T18:45:41.01615Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":40,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-025\\",\\"module_name\\":\\"When a system administrator creates or updates a registry record with an attacker-controlled URL, Harbor\'s health check mechanism sends the stored registry credentials (access_key and access_secret) t\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"registry-credential-theft\\",\\"description\\":\\"## Summary\\\\n\\\\nWhen a system administrator creates or updates a registry record with an attacker-controlled URL, Harbor\'s health check mechanism sends the stored registry credentials (access_key and access_secret) to the attacker\'s server via HTTP Basic authentication. The credentials are encrypted at rest in PostgreSQL but decrypted in memory for the health check HTTP request. The URL is validated only for scheme (http/https) via `ValidateHTTPURL`, with no IP filtering.\\\\n\\\\n## Location\\\\n\\\\n- `src/server/v2.0/handler/registry.go:46-76` -- `CreateRegistry` stores URL + credentials\\\\n- `src/server/v2.0/handler/registry.go:179` -- `GetRegistryInfo` triggers health check\\\\n- `src/pkg/reg/adapter/native/adapter.go:66-78` -- `NewAdapter` creates HTTP client with credentials\\\\n- `src/pkg/reg/adapter/native/adapter.go:118` -- `HealthCheck` sends GET {url}/v2/ with Basic auth\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin controls registry URL and can point it at any HTTP/HTTPS endpoint\\\\n- Credentials are user-supplied and stored encrypted, but decrypted for transmission\\\\n- Health check triggered immediately via `GetRegistryInfo` or automatically on schedule\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-8: Core/Job Service to attacker-controlled endpoint\\\\n- Stored credentials cross from encrypted DB storage to plaintext transmission to untrusted target\\\\n\\\\n## Impact\\\\n\\\\n- Exfiltration of all stored registry credentials for the targeted registry record\\\\n- Credentials can be used to access the legitimate remote registry\\\\n- Combined with H-00e port scan, attacker can discover internal registries and target credentials\\\\n\\\\n## Evidence\\\\n\\\\n- Deep Probe PH-13/PH-C04: Validated end-to-end\\\\n- native/adapter.go:66-78: `registry.NewClientWithCACert(reg.URL, username, password)` uses decrypted credentials\\\\n- URL validation via ValidateHTTPURL (scheme-only, no IP filtering)\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Create registry: `POST /api/v2.0/registries` with `{\\\\\\"url\\\\\\": \\\\\\"http://attacker.example.com\\\\\\", \\\\\\"credential\\\\\\": {\\\\\\"type\\\\\\": \\\\\\"basic\\\\\\", \\\\\\"access_key\\\\\\": \\\\\\"user\\\\\\", \\\\\\"access_secret\\\\\\": \\\\\\"pass\\\\\\"}}`\\\\n3. Trigger health check: `GET /api/v2.0/registries/{id}/info`\\\\n4. On attacker server, observe incoming GET /v2/ with `Authorization: Basic <base64(user:pass)>`\\\\n\\\\n\\\\n---\\\\n## Cold Verification\\\\n\\\\n## Adversarial Verdict\\\\n\\\\n```\\\\nAdversarial-Verdict: CONFIRMED\\\\nAdversarial-Rationale: Code path mechanically verified end-to-end from admin-controlled URL through auth discovery to Basic auth credential transmission with no IP filtering; reproduction blocked due to deployment complexity but code analysis is conclusive.\\\\nSeverity-Final: MEDIUM\\\\nPoC-Status: theoretical\\\\n```\\\\n\\\\n## Summary of Verification\\\\n\\\\nThe finding claims that a system administrator can register an external registry with an attacker-controlled URL, and Harbor will send stored credentials to that URL via Basic auth during health checks.\\\\n\\\\n**Code path confirmed:**\\\\n\\\\n1. `CreateRegistry` (registry.go:46) stores admin-supplied URL and credentials after `ValidateHTTPURL` check (scheme-only, no IP filtering).\\\\n2. `GetRegistryInfo` (registry.go:179) triggers adapter creation via `NewAdapter` (native/adapter.go:66), which passes decrypted credentials to `registry.NewClientWithCACert`.\\\\n3. `HealthCheck` calls `Ping()` (native/adapter.go:124), which calls `c.do(req)` (client.go:175), invoking `c.authorizer.Modify(req)` (client.go:669).\\\\n4. The authorizer\'s `initialize` (auth/authorizer.go:87) sends an unauthenticated probe to the attacker URL. If the attacker responds with `WWW-Authenticate: Basic`, credentials are sent via `req.SetBasicAuth(username, password)` (basic/authorizer.go:38).\\\\n\\\\n**Key nuance not in finding draft:** Credentials are only sent if the attacker\'s server responds with a `WWW-Authenticate: Basic` (or `Bearer`) challenge. A trivial requirement for an attacker, but a precondition nonetheless.\\\\n\\\\n## Severity Downgrade Rationale (HIGH to MEDIUM)\\\\n\\\\n- **Requires system admin privileges** -- the highest privilege level in Harbor. Both `CreateRegistry` and `GetRegistryInfo` enforce `RequireSystemAccess`.\\\\n- **Admin-supplies-credentials paradox** -- the admin who creates the registry already knows the credentials they provide. The meaningful attack scenario requires a multi-admin environment where admin A exfiltrates credentials stored by admin B (by updating the URL of an existing registry).\\\\n- **Not remotely exploitable by unauthenticated users** -- this cannot be triggered without authenticated system admin access.\\\\n- **Real SSRF/credential-forwarding design weakness** -- despite the precondition, this represents a genuine gap in URL validation that could enable credential theft in multi-admin environments.\\\\n\\\\n## Files Referenced\\\\n\\\\n- `/Users/tuan.v.tran/AuditSource/harbor/src/server/v2.0/handler/registry.go` (lines 46-77, 179-184)\\\\n- `/Users/tuan.v.tran/AuditSource/harbor/src/pkg/reg/adapter/native/adapter.go` (lines 66-78, 118-131)\\\\n- `/Users/tuan.v.tran/AuditSource/harbor/src/pkg/registry/client.go` (lines 139-141, 170-181, 662-674)\\\\n- `/Users/tuan.v.tran/AuditSource/harbor/src/pkg/registry/auth/authorizer.go` (lines 67-138)\\\\n- `/Users/tuan.v.tran/AuditSource/harbor/src/pkg/registry/auth/basic/authorizer.go` (lines 36-41)\\\\n- `/Users/tuan.v.tran/AuditSource/harbor/src/lib/endpoint.go` (lines 27-44)\\\\n- `/Users/tuan.v.tran/AuditSource/harbor/src/controller/registry/controller.go` (line 95)\\\\n\\\\n## Full Review\\\\n\\\\nSee: `/Users/tuan.v.tran/AuditSource/harbor/security/adversarial-reviews/registry-credential-theft-review.md`\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/v2.0/handler/registry.go:46-76\\",\\"matched_at\\":[\\"src/server/v2.0/handler/registry.go:46-76\\",\\"src/server/v2.0/handler/registry.go:179\\",\\"src/pkg/reg/adapter/native/adapter.go:66-78\\",\\"src/pkg/reg/adapter/native/adapter.go:118\\"],\\"finding_hash\\":\\"ea413255a412763e76dcd59c77d0d0c6\\",\\"found_at\\":\\"2026-03-30T18:45:41.016151Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":41,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-026\\",\\"module_name\\":\\"During replication job creation, Harbor decrypts registry credentials (AccessSecret) from the database using `ReversibleEncrypt` and serializes the entire resource model (including plaintext credentia\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"redis-plaintext-credentials\\",\\"description\\":\\"## Summary\\\\n\\\\nDuring replication job creation, Harbor decrypts registry credentials (AccessSecret) from the database using `ReversibleEncrypt` and serializes the entire resource model (including plaintext credentials) as JSON into Redis job parameters. The credentials remain in plaintext in Redis for the duration of the job\'s lifecycle. Given that Redis often has no authentication in default Harbor deployments and is accessible from the internal Docker network, any container compromise or network-adjacent attacker can extract all registry credentials for pending and active replication jobs.\\\\n\\\\n## Location\\\\n\\\\n- `src/controller/replication/flow/copy.go:125-144` -- Job parameter serialization with plaintext credentials\\\\n- `src/pkg/reg/manager.go:218-249` -- `fromDaoModel` decrypts AccessSecret from DB\\\\n- Redis job queue: `src_resource` parameter contains full JSON including `Credential.AccessSecret`\\\\n\\\\n## Attacker Control\\\\n\\\\n- Any actor with Redis read access (no authentication required in default deployments)\\\\n- Credentials are present for all active/pending replication jobs\\\\n- Container compromise on the same Docker network provides Redis access\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-4: Core API to Redis (no authentication by default)\\\\n- Encrypted credentials in PostgreSQL cross to plaintext in Redis\\\\n\\\\n## Impact\\\\n\\\\n- Exfiltration of all registry credentials for active replication targets\\\\n- Credentials stored as long as replication jobs remain in queue (potentially hours/days)\\\\n- Enables unauthorized access to all configured remote registries\\\\n\\\\n## Evidence\\\\n\\\\n- Deep Probe PH-C08: Validated via causal reasoning\\\\n- copy.go:125-144: `json.Marshal(srcResource)` includes decrypted AccessSecret\\\\n- manager.go:218-249: `fromDaoModel` decrypts credentials before job serialization\\\\n- Redis default config: no `requirepass` in many Harbor deployments\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure a replication policy with registry credentials\\\\n2. Trigger a replication job (manual or automatic)\\\\n3. Connect to Redis (default: `redis-cli -h <harbor-redis>`)\\\\n4. Read job parameters: `HGETALL` on replication job keys\\\\n5. Extract plaintext credentials from `src_resource` JSON parameter\\\\n\\\\n\\\\n---\\\\n## Cold Verification\\\\n\\\\n## Summary\\\\n\\\\nDuring replication job creation, Harbor decrypts registry credentials (AccessSecret) from the database using `ReversibleEncrypt` and serializes the entire resource model (including plaintext credentials) as JSON into Redis job parameters. The credentials remain in plaintext in Redis for the duration of the job\'s lifecycle. Given that Redis often has no authentication in default Harbor deployments and is accessible from the internal Docker network, any container compromise or network-adjacent attacker can extract all registry credentials for pending and active replication jobs.\\\\n\\\\n## Location\\\\n\\\\n- `src/controller/replication/flow/copy.go:125-144` -- Job parameter serialization with plaintext credentials\\\\n- `src/pkg/reg/manager.go:218-249` -- `fromDaoModel` decrypts AccessSecret from DB\\\\n- Redis job queue: `src_resource` parameter contains full JSON including `Credential.AccessSecret`\\\\n\\\\n## Attacker Control\\\\n\\\\n- Any actor with Redis read access (no authentication required in default deployments)\\\\n- Credentials are present for all active/pending replication jobs\\\\n- Container compromise on the same Docker network provides Redis access\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-4: Core API to Redis (no authentication by default)\\\\n- Encrypted credentials in PostgreSQL cross to plaintext in Redis\\\\n\\\\n## Impact\\\\n\\\\n- Exfiltration of all registry credentials for active replication targets\\\\n- Credentials stored as long as replication jobs remain in queue (potentially hours/days)\\\\n- Enables unauthorized access to all configured remote registries\\\\n\\\\n## Evidence\\\\n\\\\n- Deep Probe PH-C08: Validated via causal reasoning\\\\n- copy.go:125-144: `json.Marshal(srcResource)` includes decrypted AccessSecret\\\\n- manager.go:218-249: `fromDaoModel` decrypts credentials before job serialization\\\\n- Redis default config: no `requirepass` in many Harbor deployments\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure a replication policy with registry credentials\\\\n2. Trigger a replication job (manual or automatic)\\\\n3. Connect to Redis (default: `redis-cli -h <harbor-redis>`)\\\\n4. Read job parameters: `HGETALL` on replication job keys\\\\n5. Extract plaintext credentials from `src_resource` JSON parameter\\\\n\\\\n## Adversarial Review Notes\\\\n\\\\n- **Severity downgraded from HIGH to MEDIUM**: Exploitation requires internal Docker network access (container compromise or misconfigured network). Redis is not exposed externally by default.\\\\n- **Code path fully confirmed**: The decryption-to-serialization path is unconditional with zero sanitization.\\\\n- **Both src and dst credentials exposed**: Both `src_resource` and `dst_resource` job parameters contain full registry credentials.\\\\n- **Full review**: security/adversarial-reviews/redis-plaintext-credentials-review.md\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/controller/replication/flow/copy.go:125-144\\",\\"matched_at\\":[\\"src/controller/replication/flow/copy.go:125-144\\",\\"src/pkg/reg/manager.go:218-249\\"],\\"finding_hash\\":\\"a6f1d42ce436567f622e541bbbf88af2\\",\\"found_at\\":\\"2026-03-30T18:45:41.016152Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":42,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-027\\",\\"module_name\\":\\"Harbor\'s configuration system stores several URL-type fields as plain `StringType` or `NonEmptyStringType` with no URL validation whatsoever. A system administrator can set LDAP URL, OIDC endpoint, au\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"config-url-no-validation\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s configuration system stores several URL-type fields as plain `StringType` or `NonEmptyStringType` with no URL validation whatsoever. A system administrator can set LDAP URL, OIDC endpoint, authproxy endpoint, authproxy token review endpoint, or UAA endpoint to arbitrary internal or attacker-controlled URLs. When the corresponding authentication mode is activated, Harbor makes outbound HTTP/LDAP requests to these attacker-controlled endpoints, enabling IdP pivot (redirecting all authentication to attacker server) or SSRF (targeting internal services on every authentication attempt).\\\\n\\\\n## Location\\\\n\\\\n- `src/lib/config/metadata/metadatalist.go:96` -- `LDAPURL` as `NonEmptyStringType`\\\\n- `src/lib/config/metadata/metadatalist.go:139` -- `OIDCEndpoint` as `StringType`\\\\n- `src/lib/config/metadata/metadatalist.go:130` -- `HTTPAuthProxyEndpoint` as `StringType`\\\\n- `src/lib/config/metadata/metadatalist.go:131` -- `HTTPAuthProxyTokenReviewEndpoint` as `StringType`\\\\n- `src/lib/config/metadata/metadatalist.go:127` -- `UAAEndpoint` as `StringType`\\\\n- `src/controller/config/controller.go:115-147` -- `validateCfg` performs no URL validation on any of these fields\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin sets config values via `PUT /api/v2.0/configurations`\\\\n- No URL validation: accepts `http://169.254.169.254/`, `ftp://`, `file:///`, or any string\\\\n- Outbound requests triggered on every authentication attempt when corresponding auth mode is active\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-7: Core API to external auth providers (attacker-controlled)\\\\n- Authentication trust chain redirected to attacker infrastructure\\\\n\\\\n## Impact\\\\n\\\\n- **IdP Pivot**: Attacker LDAP server accepts any credentials -> mass account takeover\\\\n- **Token Forge**: Attacker OIDC provider issues tokens with arbitrary claims -> impersonate any user\\\\n- **SSRF Oracle**: Authproxy endpoint triggers HTTP request on every login -> high-frequency internal service probing\\\\n- **Credential Harvest**: LDAP bind operations send user credentials to attacker LDAP server\\\\n\\\\n## Evidence\\\\n\\\\n- Deep Probe PH-18: Validated via game theory reasoning\\\\n- metadatalist.go: All URL fields use StringType, not a URL-validating type\\\\n- validateCfg (controller.go:115-147): Validates auth mode, value length, skip-audit -- NOT URLs\\\\n- Contrast with webhook/scanner URLs that at least check scheme via ValidateHTTPURL\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Set LDAP URL: `PUT /api/v2.0/configurations` with `{\\\\\\"auth_mode\\\\\\": \\\\\\"ldap_auth\\\\\\", \\\\\\"ldap_url\\\\\\": \\\\\\"ldap://attacker.example.com\\\\\\"}`\\\\n3. Any user attempts LDAP login -> credentials sent to attacker\'s LDAP server\\\\n4. For OIDC: set `oidc_endpoint` to attacker\'s server, observe `GET /.well-known/openid-configuration`\\\\n5. For authproxy: set `http_authproxy_endpoint` to internal IP, observe SSRF on every login\\\\n\\\\n\\\\n---\\\\n## Cold Verification\\\\n\\\\n## Verdict\\\\n\\\\n```\\\\nAdversarial-Verdict: DISPROVED\\\\nAdversarial-Rationale: Admin-only config fields for auth endpoints are intended functionality; URL validation cannot prevent a malicious admin from setting syntactically-valid but attacker-controlled endpoints; LDAP has scheme validation contradicting \\\\\\"zero validation\\\\\\" claim.\\\\nSeverity-Final: LOW\\\\nPoC-Status: blocked\\\\n```\\\\n\\\\n## Reasoning Summary\\\\n\\\\nThis finding describes intended administrator functionality -- configuring authentication provider endpoints -- as a vulnerability. The attack requires system administrator credentials, which is the highest privilege level in Harbor. Three decisive factors lead to DISPROVED:\\\\n\\\\n1. **Admin-does-admin-things**: Only a system admin (verified via `RequireSystemAccess` at `src/server/v2.0/handler/config.go:76`) can modify these settings. A malicious admin already controls the entire Harbor instance and has far more direct attack paths (modifying users, disabling security, etc.). URL validation cannot prevent an admin from setting a syntactically-valid but malicious endpoint like `https://evil-but-legit-looking.example.com`.\\\\n\\\\n2. **LDAP scheme validation exists**: The finding claims \\\\\\"zero URL validation\\\\\\" but `formatURL()` at `src/pkg/ldap/ldap.go:77-115` validates that LDAP URLs use only `ldap://` or `ldaps://` schemes (line 87: `if !((protocol == \\\\\\"ldap\\\\\\") || (protocol == \\\\\\"ldaps\\\\\\"))`). The claim that `http://169.254.169.254/`, `ftp://`, or `file:///` would work for LDAP is factually incorrect.\\\\n\\\\n3. **Project explicitly accepts admin-config risk**: Harbor\'s `SECURITY.md` (line 79) states: \\\\\\"we do not currently consider the default settings for Harbor to be secure-by-default. It is necessary for operators to explicitly configure settings.\\\\\\" This confirms admin configuration is outside their security threat model.\\\\n\\\\n## Code Evidence\\\\n\\\\n- `src/lib/config/metadata/type.go:41-43` -- `StringType.validate()` returns nil (confirmed, no URL validation at type level)\\\\n- `src/controller/config/controller.go:115-147` -- `validateCfg()` has no URL validation (confirmed)\\\\n- `src/pkg/ldap/ldap.go:77-115` -- `formatURL()` DOES validate LDAP URL scheme (contradicts finding)\\\\n- `src/pkg/oidc/helper.go:93` -- OIDC endpoint used directly in `gooidc.NewProvider()` (confirmed, no validation)\\\\n- `src/server/v2.0/handler/config.go:76` -- Requires system admin access (confirmed)\\\\n- `src/lib/endpoint.go:27` -- `ValidateHTTPURL()` exists but is not applied here (confirmed, defense-in-depth gap)\\\\n\\\\n## Full Review\\\\n\\\\nSee: `/Users/tuan.v.tran/AuditSource/harbor/security/adversarial-reviews/config-url-no-validation-review.md`\\\\n\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"false positive (adversarial)\\",\\"poc-blocked\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/lib/config/metadata/metadatalist.go:96\\",\\"matched_at\\":[\\"src/lib/config/metadata/metadatalist.go:96\\",\\"src/lib/config/metadata/metadatalist.go:139\\",\\"src/lib/config/metadata/metadatalist.go:130\\",\\"src/lib/config/metadata/metadatalist.go:131\\",\\"src/lib/config/metadata/metadatalist.go:127\\",\\"src/controller/config/controller.go:115-147\\"],\\"finding_hash\\":\\"edf81e0a829995d089305115a0023b20\\",\\"found_at\\":\\"2026-03-30T18:45:41.016153Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":43,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-028\\",\\"module_name\\":\\"Harbor\'s webhook system has no per-project limit on the number of webhook policies that can be created. Each Harbor event (artifact push, pull, delete) generates one job per matching policy. The Webho\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"webhook-queue-exhaustion\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s webhook system has no per-project limit on the number of webhook policies that can be created. Each Harbor event (artifact push, pull, delete) generates one job per matching policy. The WebhookJob declares `MaxCurrency() = 0` (unlimited per-type concurrency in gocraft/work) and `ShouldRetry() = true` with `MaxFails = 3`. A project-admin can create hundreds of policies, causing each event to generate hundreds of jobs competing for the shared worker pool (default 10 workers), starving critical jobs like replication, scanning, and garbage collection.\\\\n\\\\n## Location\\\\n\\\\n- `src/controller/webhook/controller.go:84-86` -- `CreatePolicy` with no policy count limit\\\\n- `src/jobservice/job/impl/notification/webhook_job.go:53-55` -- `MaxCurrency() = 0`\\\\n- `src/jobservice/job/impl/notification/webhook_job.go:38-50` -- `ShouldRetry() = true`, `MaxFails = 3`\\\\n- `src/jobservice/worker/cworker/c_worker.go:431-443` -- `MaxConcurrency: 0` means unlimited in gocraft/work\\\\n\\\\n## Attacker Control\\\\n\\\\n- Project-admin creates unlimited webhook policies (no count cap)\\\\n- Policies subscribed to all event types multiply job generation\\\\n- Slow/non-responsive endpoint targets maximize worker hold time (up to HTTP timeout)\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- Project-admin privilege escalates to cross-tenant denial of service\\\\n- Single project\'s webhooks starve all other projects\' job processing\\\\n\\\\n## Impact\\\\n\\\\n- Job queue flooding: hundreds of webhook jobs per event\\\\n- Worker pool starvation: replication, scanning, GC blocked\\\\n- Cross-tenant DoS: one project affects all others\\\\n- Recovery requires manual policy deletion\\\\n\\\\n## Evidence\\\\n\\\\n- Tracer confirmed: no policy count check in controller.go:84-86\\\\n- MaxCurrency=0 at webhook_job.go:53-55 confirmed (contrast: SlackJob MaxCurrency=1)\\\\n- Worker pool bounded at WORKER_POOL_SIZE (default 10) provides natural throttle but enables starvation\\\\n- Deep Probe PH-17: NEEDS-DEEPER, now resolved\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as project-admin\\\\n2. Create 100 webhook policies: `POST /api/v2.0/projects/{id}/webhook/policies` each subscribed to all event types\\\\n3. Push an artifact to the project\\\\n4. Observe job service queue: 100+ webhook jobs queued per event\\\\n5. Monitor other projects\' replication/scanning jobs being delayed or timed out\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/controller/webhook/controller.go:84-86\\",\\"matched_at\\":[\\"src/controller/webhook/controller.go:84-86\\",\\"src/jobservice/job/impl/notification/webhook_job.go:53-55\\",\\"src/jobservice/job/impl/notification/webhook_job.go:38-50\\",\\"src/jobservice/worker/cworker/c_worker.go:431-443\\"],\\"finding_hash\\":\\"f3f6dce2f9100410ec17499eec7ec8a1\\",\\"found_at\\":\\"2026-03-30T18:45:41.016154Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":44,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-029\\",\\"module_name\\":\\"The `PingScanner` endpoint at `POST /api/v2.0/scanners/ping` accepts a user-supplied URL that passes through `ValidateHTTPURL` (scheme-only validation) and triggers an outbound HTTP GET to `{url}/api/\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"scanner-ssrf\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `PingScanner` endpoint at `POST /api/v2.0/scanners/ping` accepts a user-supplied URL that passes through `ValidateHTTPURL` (scheme-only validation) and triggers an outbound HTTP GET to `{url}/api/v1/metadata`. While the fixed path suffix limits the attacker\'s control over the request path, the error-based oracle (connection refused vs. timeout vs. parse error) enables internal service discovery. The same pattern applies to `CreateScanner` and `UpdateScanner` endpoints.\\\\n\\\\n## Location\\\\n\\\\n- `src/server/v2.0/handler/scanner.go:169-190` -- `PingScanner` handler\\\\n- `src/pkg/scan/dao/scanner/model.go:100-127` -- `Registration.Validate()` calls ValidateHTTPURL\\\\n- `src/controller/scanner/base_controller.go:306-333` -- `Ping()` calls `getScannerAdapterMetadata`\\\\n- `src/pkg/scan/rest/v1/client.go:110-129` -- `GetMetadata()` makes HTTP GET\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin controls scanner URL via POST /api/v2.0/scanners/ping\\\\n- URL passes ValidateHTTPURL (scheme-only, no IP filtering)\\\\n- Fixed path suffix `/api/v1/metadata` appended -- limits to error-based oracle\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- Core API to internal network via scanner client HTTP request\\\\n\\\\n## Impact\\\\n\\\\n- Internal service discovery via error-based oracle\\\\n- Port/service status mapping across internal network\\\\n- Limited by fixed path suffix -- cannot read arbitrary content\\\\n\\\\n## Evidence\\\\n\\\\n- Tracer confirmed end-to-end code path\\\\n- endpoint.go:27-45: ValidateHTTPURL scheme-only, no IP filtering\\\\n- endpoint_test.go:32-33: `http://127.0.0.1` and `http://169.254.169.254` pass validation\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Send: `POST /api/v2.0/scanners/ping` with body `{\\\\\\"url\\\\\\": \\\\\\"http://169.254.169.254/latest/meta-data/\\\\\\"}`\\\\n3. Observe error response: timeout (host unreachable), connection refused (port closed), or parse error (port open but not scanner)\\\\n4. Iterate across internal IPs to discover services\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/v2.0/handler/scanner.go:169-190\\",\\"matched_at\\":[\\"src/server/v2.0/handler/scanner.go:169-190\\",\\"src/pkg/scan/dao/scanner/model.go:100-127\\",\\"src/controller/scanner/base_controller.go:306-333\\",\\"src/pkg/scan/rest/v1/client.go:110-129\\"],\\"finding_hash\\":\\"c5cf07152761eb5ff478f14a6c1bbd43\\",\\"found_at\\":\\"2026-03-30T18:45:41.016154Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":45,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-030\\",\\"module_name\\":\\"Harbor\'s OIDC login flow validates redirect URLs via `IsLocalPath()` which checks that the path starts with `/` but not `//`. The value `/\\\\\\\\evil.com` passes both checks but modern browsers (per WHATWG \\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"oidc-open-redirect-backslash\\",\\"description\\":\\"## Summary\\\\n\\\\nHarbor\'s OIDC login flow validates redirect URLs via `IsLocalPath()` which checks that the path starts with `/` but not `//`. The value `/\\\\\\\\evil.com` passes both checks but modern browsers (per WHATWG URL spec) normalize `\\\\\\\\` to `/` in the Location header, making `/\\\\\\\\evil.com` equivalent to `//evil.com` -- a protocol-relative redirect to `evil.com`. The redirect URL is stored in the session at login time and NOT re-validated when used in the OIDC callback redirect, creating a TOCTOU gap.\\\\n\\\\n## Location\\\\n\\\\n- `src/common/utils/utils.go:308-311` -- `IsLocalPath` checks `HasPrefix(\\\\\\"/\\\\\\") && !HasPrefix(\\\\\\"//\\\\\\")` only\\\\n- `src/core/controllers/oidc.go:81-86` -- `RedirectLogin` validates and stores redirect URL in session\\\\n- `src/core/controllers/oidc.go:230-233` -- Callback retrieves redirect URL from session, uses directly in `Redirect()` without re-validation\\\\n\\\\n## Attacker Control\\\\n\\\\n- Unauthenticated attacker crafts OIDC login URL with `redirect_url=/\\\\\\\\evil.com`\\\\n- Redirect URL passes IsLocalPath validation and is stored in session\\\\n- After OIDC authentication, victim is redirected to attacker-controlled site\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-1: Internet to Core API (Harbor auth flow) to attacker site\\\\n- User\'s post-authentication redirect hijacked to external attacker domain\\\\n\\\\n## Impact\\\\n\\\\n- Post-authentication phishing: user redirected to fake Harbor login page\\\\n- Credential harvesting: user re-enters credentials thinking session expired\\\\n- Session token theft: attacker site can harvest session cookies if SameSite is not strict\\\\n- Distinct from P7-001 (authproxy open redirect): different flow, different bypass technique\\\\n\\\\n## Evidence\\\\n\\\\n- Tracer confirmed PARTIAL: IsLocalPath bypass confirmed, browser behavior per WHATWG spec\\\\n- utils.go:308-311: `/\\\\\\\\evil.com` passes both prefix checks\\\\n- oidc.go:230-233: no re-validation on callback redirect\\\\n- WHATWG URL spec: backslash treated as forward slash in path component\\\\n- Bypass analysis bypass-b6c083d73: IsLocalPath backslash bypass identified\\\\n- PoC executed: test_redirect.go confirms IsLocalPath bypass and Location header behavior\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Craft URL: `https://harbor.example.com/c/oidc/login?redirect_url=/\\\\\\\\evil.com`\\\\n2. User clicks link, is redirected to OIDC provider for authentication\\\\n3. After successful OIDC auth, callback redirects to `/\\\\\\\\evil.com`\\\\n4. Browser normalizes to `//evil.com` (protocol-relative), redirecting to `evil.com`\\\\n5. Attacker site presents fake Harbor login page for credential harvesting\\\\n\\\\n\\\\n---\\\\n## Cold Verification\\\\n\\\\n## Summary\\\\n\\\\nHarbor\'s OIDC login flow validates redirect URLs via `IsLocalPath()` which checks that the path starts with `/` but not `//`. The value `/\\\\\\\\evil.com` passes both checks but modern browsers (per WHATWG URL spec) normalize `\\\\\\\\` to `/` in the Location header, making `/\\\\\\\\evil.com` equivalent to `//evil.com` -- a protocol-relative redirect to `evil.com`. The redirect URL is stored in the session at login time and NOT re-validated when used in the OIDC callback redirect, creating a TOCTOU gap.\\\\n\\\\n## Location\\\\n\\\\n- `src/common/utils/utils.go:308-311` -- `IsLocalPath` checks `HasPrefix(\\\\\\"/\\\\\\") && !HasPrefix(\\\\\\"//\\\\\\")` only\\\\n- `src/core/controllers/oidc.go:81-86` -- `RedirectLogin` validates and stores redirect URL in session\\\\n- `src/core/controllers/oidc.go:230-233` -- Callback retrieves redirect URL from session, uses directly in `Redirect()` without re-validation\\\\n\\\\n## Attacker Control\\\\n\\\\n- Unauthenticated attacker crafts OIDC login URL with `redirect_url=/\\\\\\\\evil.com`\\\\n- Redirect URL passes IsLocalPath validation and is stored in session\\\\n- After OIDC authentication, victim is redirected to attacker-controlled site\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-1: Internet to Core API (Harbor auth flow) to attacker site\\\\n- User\'s post-authentication redirect hijacked to external attacker domain\\\\n\\\\n## Impact\\\\n\\\\n- Post-authentication phishing: user redirected to fake Harbor login page\\\\n- Credential harvesting: user re-enters credentials thinking session expired\\\\n- Session token theft: attacker site can harvest session cookies if SameSite is not strict\\\\n- Distinct from P7-001 (authproxy open redirect): different flow, different bypass technique\\\\n\\\\n## Evidence\\\\n\\\\n- Tracer confirmed PARTIAL: IsLocalPath bypass confirmed, browser behavior per WHATWG spec\\\\n- utils.go:308-311: `/\\\\\\\\evil.com` passes both prefix checks\\\\n- oidc.go:230-233: no re-validation on callback redirect\\\\n- WHATWG URL spec: backslash treated as forward slash in path component\\\\n- Bypass analysis bypass-b6c083d73: IsLocalPath backslash bypass identified\\\\n\\\\n## Cold Verification Evidence\\\\n\\\\n- `IsLocalPath(\\\\\\"/\\\\\\\\\\\\\\\\evil.com\\\\\\")` returns `true` -- confirmed via standalone Go test\\\\n- `http.Redirect` produces `Location: /\\\\\\\\evil.com` header -- confirmed via httptest\\\\n- Go\'s `hexEscapeNonASCII` does NOT encode backslash (ASCII 0x5C) -- confirmed via Go stdlib source\\\\n- Go\'s `path.Clean` does NOT normalize backslash -- confirmed via test\\\\n- No `proxy_redirect` directive in nginx config -- verified\\\\n- No re-validation between session retrieval (oidc.go:124) and redirect (oidc.go:233) -- verified\\\\n- Evidence files: `security/real-env-evidence/oidc-open-redirect-backslash/`\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Craft URL: `https://harbor.example.com/c/oidc/login?redirect_url=/\\\\\\\\evil.com`\\\\n2. User clicks link, is redirected to OIDC provider for authentication\\\\n3. After successful OIDC auth, callback redirects to `/\\\\\\\\evil.com`\\\\n4. Browser normalizes to `//evil.com` (protocol-relative), redirecting to `evil.com`\\\\n5. Attacker site presents fake Harbor login page for credential harvesting\\\\n\\",\\"severity\\":\\"high\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/common/utils/utils.go:308-311\\",\\"matched_at\\":[\\"src/common/utils/utils.go:308-311\\",\\"src/core/controllers/oidc.go:81-86\\",\\"src/core/controllers/oidc.go:230-233\\"],\\"finding_hash\\":\\"e33228a50d4d696d2dd083137458ad6b\\",\\"found_at\\":\\"2026-03-30T18:45:41.016155Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":46,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-031\\",\\"module_name\\":\\"When Harbor\'s preheat enforcer executes a preheat task, it generates a Bearer token via `credMaker` (robot-account pull token) and places it in `PreheatImage.Headers[\\\\\\"Authorization\\\\\\"]`. This header map\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"preheat-token-theft\\",\\"description\\":\\"## Summary\\\\n\\\\nWhen Harbor\'s preheat enforcer executes a preheat task, it generates a Bearer token via `credMaker` (robot-account pull token) and places it in `PreheatImage.Headers[\\\\\\"Authorization\\\\\\"]`. This header map is forwarded verbatim to the configured Dragonfly or Kraken P2P instance endpoint via `headerToMapString(preheatingImage.Headers)`. A system administrator who registers a rogue preheat instance (attacker-controlled endpoint) receives valid Harbor pull tokens that can be replayed against Harbor\'s registry API to exfiltrate container images.\\\\n\\\\n## Location\\\\n\\\\n- `src/controller/p2p/preheat/enforcer.go:436-446` -- Token generated by `credMaker`, placed in `PreheatImage.Headers`\\\\n- `src/pkg/p2p/preheat/provider/dragonfly.go:249-250` -- `headerToMapString(preheatingImage.Headers)` forwarded to Dragonfly\\\\n- `src/pkg/p2p/preheat/provider/kraken.go:100` -- Same pattern for Kraken driver\\\\n\\\\n## Attacker Control\\\\n\\\\n- System admin controls preheat instance endpoint URL\\\\n- Token generated by Harbor\'s token service with pull scope\\\\n- Headers forwarded verbatim with no filtering or token scoping\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- TB-8: Job Service to external preheat endpoint (attacker-controlled)\\\\n- Harbor-internal authentication token crosses to untrusted external system\\\\n\\\\n## Impact\\\\n\\\\n- Token theft: valid Harbor Bearer token with image pull scope\\\\n- Image exfiltration: replay token to pull container images including embedded secrets, proprietary code, ML models\\\\n- Token lifetime typically 30 minutes (Harbor token service default)\\\\n- All images matching preheat policy filter are exposed\\\\n\\\\n## Evidence\\\\n\\\\n- Deep Probe PH-08: NEEDS-DEEPER, now resolved\\\\n- enforcer.go:436-446: `cred` from `credMaker` placed directly into Headers map\\\\n- dragonfly.go:250: `headerToMapString` forwards all headers to external endpoint\\\\n- No header filtering or token rotation between preheat requests\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as system administrator\\\\n2. Register preheat instance: `POST /api/v2.0/p2p/preheat/instances` with attacker-controlled endpoint\\\\n3. Create preheat policy matching target images\\\\n4. Push an artifact matching the policy filter\\\\n5. On attacker server, capture the Dragonfly job request containing `Authorization: Bearer <token>`\\\\n6. Replay token: `GET /v2/<repo>/manifests/<tag>` with captured Bearer token\\\\n\\\\n\\\\n---\\\\n## Cold Verification\\\\n\\\\n## Verdict\\\\n\\\\n```\\\\nAdversarial-Verdict: DISPROVED\\\\nAdversarial-Rationale: Attack requires system admin who already has unrestricted image pull access; capturing a scoped pull token provides zero privilege escalation; preheat token forwarding is by-design behavior.\\\\nSeverity-Final: LOW\\\\nPoC-Status: theoretical\\\\n```\\\\n\\\\n## Key Findings\\\\n\\\\n### Code Path Verified (Dragonfly only)\\\\n\\\\nThe token forwarding code path exists and is correctly described for the Dragonfly provider:\\\\n\\\\n1. `enforcer.go:159-175` -- `credMaker` generates Bearer JWT via `token.MakeToken` with pull scope\\\\n2. `enforcer.go:444-445` -- Token placed in `PreheatImage.Headers[\\\\\\"Authorization\\\\\\"]`\\\\n3. `dragonfly.go:250` -- `headerToMapString(preheatingImage.Headers)` copies token into JSON body\\\\n4. `dragonfly.go:268-269` -- JSON body POST-ed to configured Dragonfly endpoint\\\\n\\\\n### Factual Error in Finding\\\\n\\\\nThe finding claims `kraken.go:100` exhibits the \\\\\\"Same pattern for Kraken driver.\\\\\\" This is **incorrect**. The Kraken driver at `kraken.go:80-111` constructs a `notification.Notification` payload containing only image metadata (digest, repository, URL, tag). It does NOT include `preheatingImage.Headers`. The Kraken path does not leak the authorization token.\\\\n\\\\n### Decisive Defense: Admin-Only Access\\\\n\\\\nAll preheat instance operations require `RequireSystemAccess` (`preheat.go:73`). A Harbor system administrator already has:\\\\n\\\\n- Full access to all projects and repositories\\\\n- Ability to pull any image directly\\\\n- Control over all Harbor configuration\\\\n\\\\nCapturing a pull-scoped, 30-minute-TTL token for a single repository provides zero additional capability to a system admin.\\\\n\\\\n### By-Design Behavior\\\\n\\\\nThe preheat feature is explicitly designed to provide credentials to external P2P distribution systems (Dragonfly, Kraken) so they can pull images from Harbor for pre-caching. Sending the authorization header to the configured endpoint IS the intended mechanism. The admin who registers the preheat instance is the one who decides to trust that endpoint.\\\\n\\\\n## Conclusion\\\\n\\\\nDISPROVED as a security vulnerability. The token forwarding is by-design behavior in a feature that requires the highest privilege level to configure. No trust boundary is meaningfully crossed because the system admin already controls both sides of the interaction. Downgraded from HIGH to LOW (informational design concern at best).\\\\n\\\\n## Review File\\\\n\\\\nFull review: `security/adversarial-reviews/preheat-token-theft-review.md`\\\\n\\",\\"severity\\":\\"low\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"false positive (adversarial)\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/controller/p2p/preheat/enforcer.go:436-446\\",\\"matched_at\\":[\\"src/controller/p2p/preheat/enforcer.go:436-446\\",\\"src/pkg/p2p/preheat/provider/dragonfly.go:249-250\\",\\"src/pkg/p2p/preheat/provider/kraken.go:100\\"],\\"finding_hash\\":\\"945c7d2d645c7b3e3e1e177a29030c5b\\",\\"found_at\\":\\"2026-03-30T18:45:41.016156Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":47,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-032\\",\\"module_name\\":\\"The `UAAClientSecret` configuration field is incorrectly defined with `ItemType: &StringType{}` at `metadatalist.go:126`, while all other secret fields (LDAP password, OIDC client secret, PostgreSQL p\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"uaa-secret-not-redacted\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `UAAClientSecret` configuration field is incorrectly defined with `ItemType: &StringType{}` at `metadatalist.go:126`, while all other secret fields (LDAP password, OIDC client secret, PostgreSQL password, etc.) are correctly defined as `&PasswordType{}`. The `ConvertForGet` method in `controller.go:236-240` only strips fields typed as `*metadata.PasswordType`, so the UAA client secret survives the redaction pass and appears in plaintext in the API response for any system administrator.\\\\n\\\\n## Location\\\\n\\\\n- `src/lib/config/metadata/metadatalist.go:126` -- `UAAClientSecret` with `ItemType: &StringType{}` (should be `&PasswordType{}`)\\\\n- `src/controller/config/controller.go:236-240` -- `ConvertForGet` type-switch only matches `*metadata.PasswordType`\\\\n\\\\n## Attacker Control\\\\n\\\\n- Any system admin calls `GET /api/v2.0/configurations`\\\\n- UAA client secret returned in plaintext in response body\\\\n- No special authentication beyond system admin role required\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- Admin API to credential exposure -- admin should see config but NOT secrets\\\\n\\\\n## Impact\\\\n\\\\n- UAA client secret exposed to any system administrator\\\\n- Can be used to impersonate Harbor against UAA identity provider\\\\n- Enables token minting via UAA with Harbor\'s client identity\\\\n- Different root cause from H-00b (type annotation error vs. auth bypass)\\\\n\\\\n## Evidence\\\\n\\\\n- metadatalist.go:126: `ItemType: &StringType{}` (contrast line 141: OIDCClientSecret uses `&PasswordType{}`)\\\\n- controller.go:236-240: type switch only deletes PasswordType\\\\n- Bypass analysis bypass-85e756486: wrong LDAP redaction key identified similar pattern\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Configure Harbor with UAA authentication mode and set a UAA client secret\\\\n2. Authenticate as system administrator (not solution-user)\\\\n3. Send: `GET /api/v2.0/configurations`\\\\n4. Verify `uaa_client_secret` field contains plaintext secret value\\\\n5. Contrast: `oidc_client_secret` field should be redacted (PasswordType)\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/lib/config/metadata/metadatalist.go:126\\",\\"matched_at\\":[\\"src/lib/config/metadata/metadatalist.go:126\\",\\"src/controller/config/controller.go:236-240\\"],\\"finding_hash\\":\\"ab826e042506415b0053d9fb988d1b98\\",\\"found_at\\":\\"2026-03-30T18:45:41.016157Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":48,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-040\\",\\"module_name\\":\\"The `SearchUserGroups` API endpoint (`GET /api/v2.0/usergroups/search`) only requires basic authentication (`RequireAuthenticated`) with no RBAC authorization check. Any authenticated user -- regardle\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"usergroup-enum-like\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `SearchUserGroups` API endpoint (`GET /api/v2.0/usergroups/search`) only requires basic authentication (`RequireAuthenticated`) with no RBAC authorization check. Any authenticated user -- regardless of role or project membership -- can enumerate all LDAP, HTTP, and OIDC group names, IDs, types, and LDAP DNs system-wide by supplying a wildcard groupname parameter. The DAO layer\'s `SearchByName` function constructs a LIKE pattern using string concatenation (`\\\\\\"%\\\\\\" + name + \\\\\\"%\\\\\\"`) without calling `orm.Escape`, allowing the `%` wildcard character to match all groups.\\\\n\\\\n## Location\\\\n\\\\n- **Handler**: `src/server/v2.0/handler/usergroup.go:186-209` -- `SearchUserGroups`\\\\n- **DAO**: `src/pkg/usergroup/dao/dao.go:168-182` -- `SearchByName`\\\\n- **Missing escape pattern**: Compare with `src/pkg/member/dao/dao.go` which properly uses `orm.Escape`\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: `groupname` query parameter in `GET /api/v2.0/usergroups/search?groupname=%`\\\\n- **Control level**: Full -- attacker supplies the LIKE pattern\\\\n- **Auth requirement**: Any valid authentication (basic auth, session, token, robot account)\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- **TB-3 boundary**: Authenticated user -> system-wide group data (no project scoping)\\\\n- **Expected boundary**: Group enumeration should require system admin or at minimum project-scoped access\\\\n- **Actual boundary**: Any authenticated user has unrestricted access\\\\n\\\\n## Impact\\\\n\\\\n- Full enumeration of all LDAP/HTTP/OIDC group names and internal IDs\\\\n- In enterprise LDAP deployments: leaks Active Directory group structure, organizational hierarchy, privileged group names\\\\n- LDAP DNs are returned, revealing directory tree structure\\\\n- Group IDs enable cross-referencing with project member lists\\\\n- Enables reconnaissance for LDAP group claim injection attacks (see OIDC admin group injection finding)\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/server/v2.0/handler/usergroup.go:186-209\\\\nfunc (u *userGroupAPI) SearchUserGroups(ctx context.Context, params operation.SearchUserGroupsParams) middleware.Responder {\\\\n    if err := u.RequireAuthenticated(ctx); err != nil {  // ONLY auth check -- no RBAC\\\\n        return u.SendError(ctx, err)\\\\n    }\\\\n    // ... builds query ...\\\\n    ug, err := u.ctl.SearchByName(ctx, params.Groupname, int(*params.PageSize))\\\\n    // ...\\\\n}\\\\n\\\\n// src/pkg/usergroup/dao/dao.go:168-182\\\\nfunc (d *dao) SearchByName(ctx context.Context, name string, limitSize int) ([]*model.UserGroup, error) {\\\\n    // ...\\\\n    sql := \\\\\\"select id, group_name, group_type, ldap_group_dn, ... where group_name like ? ...\\\\\\"\\\\n    likePattern := \\\\\\"%\\\\\\" + name + \\\\\\"%\\\\\\"  // NO orm.Escape -- wildcard injection\\\\n    _, err = o.Raw(sql, likePattern, limitSize).QueryRows(&usergroups)\\\\n    // ...\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as any Harbor user (including low-privilege guest accounts)\\\\n2. Send: `GET /api/v2.0/usergroups/search?groupname=%25&page_size=100`\\\\n   - Note: `%25` is URL-encoded `%` which becomes the LIKE wildcard `%`\\\\n3. Response returns all groups system-wide with names, IDs, types, and LDAP DNs\\\\n4. Iterate with `page` parameter to enumerate all groups if count exceeds page_size\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/server/v2.0/handler/usergroup.go:186-209\\",\\"matched_at\\":[\\"src/server/v2.0/handler/usergroup.go:186-209\\",\\"src/pkg/usergroup/dao/dao.go:168-182\\"],\\"finding_hash\\":\\"2f3ba734d8b3338e2a87e84eb3c5355b\\",\\"found_at\\":\\"2026-03-30T18:45:41.016159Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":49,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-041\\",\\"module_name\\":\\"The `GetPermissionProvider()` function in `src/common/rbac/const.go:99-101` is hardcoded to return `NolimitProvider` instead of the intended `BaseProvider`. The `NolimitProvider` grants `ResourceRobot\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"robot-shadow-nolimit\\",\\"description\\":\\"## Summary\\\\n\\\\nThe `GetPermissionProvider()` function in `src/common/rbac/const.go:99-101` is hardcoded to return `NolimitProvider` instead of the intended `BaseProvider`. The `NolimitProvider` grants `ResourceRobot:ActionCreate` at project scope, meaning any robot account with project-level permissions can create new peer robot accounts. These shadow robots survive credential rotation of the original robot, creating a persistent backdoor. The `BaseProvider` intentionally omits `ResourceRobot:ActionCreate`, confirming this is an overpermission.\\\\n\\\\n## Location\\\\n\\\\n- **Permission provider**: `src/common/rbac/const.go:99-101` -- `GetPermissionProvider()` returns `&NolimitProvider{}`\\\\n- **NolimitProvider permissions**: `src/common/rbac/const.go:144-158` -- includes `ResourceRobot:ActionCreate` at project scope\\\\n- **BaseProvider comparison**: `src/common/rbac/const.go:108-111` -- `BaseProvider.GetPermissions` uses `PoliciesMap` which omits robot creation\\\\n- **TODO comment**: Line 100: `// TODO will determine by the ui configuration`\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: Leaked robot account credentials (commonly stored in CI/CD pipelines, build systems, automation)\\\\n- **Control level**: Full -- attacker can create new robot accounts with equivalent permissions\\\\n- **Auth requirement**: Valid robot account credentials for the target project\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- **Credential rotation boundary**: New robot accounts are peers, not children. Rotating the original robot\'s credentials does not affect shadow robots.\\\\n- **Expected boundary**: Credential rotation should revoke all access from a compromised robot\\\\n- **Actual boundary**: Shadow robots persist indefinitely after rotation\\\\n\\\\n## Impact\\\\n\\\\n- Persistent access after credential compromise detection and rotation\\\\n- No parent-child tracking of robot creation -- no mass revocation by parent\\\\n- All project robot accounts are peers with equivalent permissions\\\\n- Shadow robots can themselves create more shadow robots (recursive persistence)\\\\n- Undermines incident response procedures that rely on credential rotation\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/common/rbac/const.go:98-101\\\\n// GetPermissionProvider gives the robot permission provider\\\\nfunc GetPermissionProvider() RobotPermissionProvider {\\\\n    // TODO will determine by the ui configuration\\\\n    return &NolimitProvider{}  // SHOULD be BaseProvider\\\\n}\\\\n\\\\n// src/common/rbac/const.go:144-158 -- NolimitProvider at project scope\\\\nif s == ScopeProject {\\\\n    return append(n.BaseProvider.GetPermissions(ScopeProject),\\\\n        &types.Policy{Resource: ResourceRobot, Action: ActionCreate},  // overpermission\\\\n        &types.Policy{Resource: ResourceRobot, Action: ActionRead},\\\\n        &types.Policy{Resource: ResourceRobot, Action: ActionList},\\\\n        &types.Policy{Resource: ResourceRobot, Action: ActionDelete},\\\\n        // ... also grants Member CRUD ...\\\\n    )\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Obtain valid robot account credentials for a project (e.g., from CI/CD configuration)\\\\n2. Authenticate as the robot: `curl -u \'robot$name:secret\' ...`\\\\n3. Create a new robot account:\\\\n   ```\\\\n   POST /api/v2.0/robots\\\\n   {\\\\n     \\\\\\"name\\\\\\": \\\\\\"shadow-bot\\\\\\",\\\\n     \\\\\\"level\\\\\\": \\\\\\"project\\\\\\",\\\\n     \\\\\\"permissions\\\\\\": [{\\\\\\"namespace\\\\\\": \\\\\\"project-name\\\\\\", \\\\\\"access\\\\\\": [...]}]\\\\n   }\\\\n   ```\\\\n4. Rotate the original robot\'s credentials\\\\n5. Verify the shadow robot still has access: `curl -u \'robot$shadow-bot:new-secret\' ...`\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/common/rbac/const.go:99-101\\",\\"matched_at\\":[\\"src/common/rbac/const.go:99-101\\",\\"src/common/rbac/const.go:144-158\\",\\"src/common/rbac/const.go:108-111\\"],\\"finding_hash\\":\\"b4933c88db3390b7625cd4d130ed6a18\\",\\"found_at\\":\\"2026-03-30T18:45:41.01616Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":50,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-042\\",\\"module_name\\":\\"The Harbor developer project role has full CRUD plus Operate permissions on `ResourceTagRetention`, identical to the projectAdmin and maintainer roles. This allows a developer (or compromised develope\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"developer-retention-destroy\\",\\"description\\":\\"## Summary\\\\n\\\\nThe Harbor developer project role has full CRUD plus Operate permissions on `ResourceTagRetention`, identical to the projectAdmin and maintainer roles. This allows a developer (or compromised developer account) to create a retention policy with aggressive rules (e.g., \\\\\\"retain most recent 0 artifacts\\\\\\"), trigger its execution, and permanently delete all non-matching artifacts in the project. There is no undo mechanism. The guest role does NOT have these permissions, confirming the developer role is elevated beyond expected privilege.\\\\n\\\\n## Location\\\\n\\\\n- **Developer role policy**: `src/common/rbac/project/rbac_role.go:213-218` -- TagRetention CRUD + Operate\\\\n- **ProjectAdmin comparison**: `src/common/rbac/project/rbac_role.go:59-64` -- identical permissions\\\\n- **Guest role**: `src/common/rbac/project/rbac_role.go:248+` -- NO TagRetention permissions\\\\n- **Retention handler**: `src/server/v2.0/handler/retention.go` -- RBAC enforcement uses these permissions\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: Retention policy rules (number of artifacts to retain, tag patterns, execution trigger)\\\\n- **Control level**: Full CRUD + ability to trigger immediate execution\\\\n- **Auth requirement**: Developer role in a project\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- **Privilege boundary**: Developer role crosses into administrative data lifecycle management\\\\n- **Expected boundary**: Developers should create/push artifacts but not control retention policy that can delete them\\\\n- **Actual boundary**: Developer has full artifact destruction capability\\\\n\\\\n## Impact\\\\n\\\\n- Permanent deletion of all artifacts in a project (irreversible)\\\\n- Data integrity violation in multi-tenant environments\\\\n- Compromised developer account can cause project-wide supply chain disruption\\\\n- No approval workflow for destructive retention operations\\\\n- Same permissions as project admin for this resource type\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/common/rbac/project/rbac_role.go:195-218 (developer role)\\\\n\\\\\\"developer\\\\\\": {\\\\n    // ...\\\\n    {Resource: rbac.ResourceTagRetention, Action: rbac.ActionCreate},\\\\n    {Resource: rbac.ResourceTagRetention, Action: rbac.ActionRead},\\\\n    {Resource: rbac.ResourceTagRetention, Action: rbac.ActionUpdate},\\\\n    {Resource: rbac.ResourceTagRetention, Action: rbac.ActionDelete},\\\\n    {Resource: rbac.ResourceTagRetention, Action: rbac.ActionList},\\\\n    {Resource: rbac.ResourceTagRetention, Action: rbac.ActionOperate},  // trigger execution\\\\n    // ...\\\\n}\\\\n```\\\\n\\\\n## Reproduction Steps\\\\n\\\\n1. Authenticate as a developer-level project member\\\\n2. Verify no existing retention policy: `GET /api/v2.0/retentions?scope=project&project_id=<pid>`\\\\n3. Create a destructive retention policy:\\\\n   ```\\\\n   POST /api/v2.0/retentions\\\\n   {\\\\n     \\\\\\"rules\\\\\\": [{\\\\\\"template\\\\\\": \\\\\\"latestPushedK\\\\\\", \\\\\\"params\\\\\\": {\\\\\\"latestPushedK\\\\\\": 0}, \\\\\\"tag_selectors\\\\\\": [{\\\\\\"kind\\\\\\": \\\\\\"doublestar\\\\\\", \\\\\\"decoration\\\\\\": \\\\\\"matches\\\\\\", \\\\\\"pattern\\\\\\": \\\\\\"**\\\\\\"}]}],\\\\n     \\\\\\"scope\\\\\\": {\\\\\\"level\\\\\\": \\\\\\"project\\\\\\", \\\\\\"ref\\\\\\": <project_id>}\\\\n   }\\\\n   ```\\\\n4. Trigger execution: `POST /api/v2.0/retentions/<id>/executions`\\\\n5. All artifacts in the project are deleted by the retention execution\\\\n\\",\\"severity\\":\\"medium\\",\\"confidence\\":\\"tentative\\",\\"tags\\":[\\"archon\\",\\"phase-8\\",\\"valid\\",\\"poc-theoretical\\"],\\"status\\":\\"open\\",\\"cvss_score\\":0,\\"source_file\\":\\"src/common/rbac/project/rbac_role.go:213-218\\",\\"matched_at\\":[\\"src/common/rbac/project/rbac_role.go:213-218\\",\\"src/common/rbac/project/rbac_role.go:59-64\\"],\\"finding_hash\\":\\"d674e6ece4991ecdca8192a9dae26c8d\\",\\"found_at\\":\\"2026-03-30T18:45:41.01616Z\\",\\"created_at\\":\\"2026-03-30T18:45:41Z\\"}}","{\\"type\\":\\"finding\\",\\"data\\":{\\"id\\":51,\\"project_uuid\\":\\"00000000-0000-0000-0000-000000000001\\",\\"http_record_uuids\\":[],\\"agent_run_uuid\\":\\"59ad48a0-3a26-43d3-b425-70ed9fbdf240\\",\\"module_id\\":\\"archon:p8-043\\",\\"module_name\\":\\"The CVE allowlist validator in `src/pkg/allowlist/validator.go` uses `strings.TrimSpace` to detect empty CVE IDs, but Go\'s `TrimSpace` only strips characters matched by `unicode.IsSpace()`. Several vi\\",\\"module_type\\":\\"whitebox\\",\\"finding_source\\":\\"archon\\",\\"module_short\\":\\"cve-allowlist-unicode-bypass\\",\\"description\\":\\"## Summary\\\\n\\\\nThe CVE allowlist validator in `src/pkg/allowlist/validator.go` uses `strings.TrimSpace` to detect empty CVE IDs, but Go\'s `TrimSpace` only strips characters matched by `unicode.IsSpace()`. Several visually invisible Unicode characters (U+200B zero-width space, U+200C zero-width non-joiner, U+200D zero-width joiner, U+00AD soft hyphen) survive `TrimSpace` and pass the empty-check guard.\\\\n\\\\nThis creates two distinct bypass vectors:\\\\n1. A CVE entry like `\\\\\\"CVE-2021-44228\\\\\\\\u200B\\\\\\"` is visually identical to `\\\\\\"CVE-2021-44228\\\\\\"` in all UI/audit contexts but fails to match the scanner-reported CVE ID (exact string comparison in `CVESet.Contains`), creating a silent gap in vulnerability enforcement.\\\\n2. The dedup map uses the raw untrimmed `it.CVEID` while the empty check uses the trimmed `cveID`, allowing whitespace-padded duplicates.\\\\n\\\\n## Location\\\\n\\\\n- **Validator**: `src/pkg/allowlist/validator.go:46-62` -- `Validate()` function\\\\n- **Empty check**: Line 49: `cveID := strings.TrimSpace(it.CVEID)` -- only trims ASCII whitespace equivalents\\\\n- **Dedup map**: Line 56: `m[it.CVEID]` -- uses raw untrimmed value\\\\n- **Matching**: `src/pkg/allowlist/models/cve_allowlist.go:68-72` -- `CVESet.Contains` uses exact string match\\\\n\\\\n## Attacker Control\\\\n\\\\n- **Input**: CVE ID strings in allowlist items via `PUT /api/v2.0/system/CVEAllowlist` (system admin) or `PUT /api/v2.0/projects/{id}` with `cve_allowlist` field (project admin)\\\\n- **Control level**: Full control over CVE ID string content including Unicode characters\\\\n- **Auth requirement**: System admin (system allowlist) or project admin (project allowlist)\\\\n\\\\n## Trust Boundary Crossed\\\\n\\\\n- **Validation bypass boundary**: Patch intended to ensure CVE IDs are valid; invisible characters bypass the guard\\\\n- **Audit/compliance boundary**: Allowlist entries appear correct to human reviewers but are semantically different\\\\n- **Scanning enforcement boundary**: Vulnerability gate makes decisions based on exact string matching that the injected entries will never satisfy\\\\n\\\\n## Impact\\\\n\\\\n- Visually deceptive CVE allowlist entries that pass validation but never match scanner output\\\\n- Vulnerability scanning enforcement can be silently undermined or manipulated\\\\n- Audit/compliance deception: reviewers see a CVE as allowlisted but the gate behaves differently\\\\n- Bypass of a security patch (incomplete fix for CVE allowlist validator)\\\\n\\\\n## Evidence\\\\n\\\\n```go\\\\n// src/pkg/allowlist/validator.go:46-62\\\\nfunc Validate(wl models2.CVEAllowlist) error {\\\\n    m := map[string]struct{}{}\\\\n    for _, it := range wl.Items {\\\\n        cveID := strings.TrimSpace(it.CVEID)    // trimmed - used for empty check\\\\n        if cveID == \\\\\\"\\\\\\" {\\\\n            return &invalidErr{...}\\\\n        }\\\\n        if _, ok := m[it.CVEID]
