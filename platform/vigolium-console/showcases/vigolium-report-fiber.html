kspace/chamber-2/debate.md\n\n## Summary\n\nThe `Handler.DeleteToken()` method at `csrf.go:311-324` reads the CSRF cookie from the request, deletes the corresponding token from storage, and expires the cookie. It performs no origin, referer, or CSRF token validation before doing so.\n\nIf an application exposes an endpoint that calls `DeleteToken` without CSRF middleware protection on that endpoint, an attacker can send cross-site requests to invalidate the victim's CSRF token, causing the victim to receive 403 Forbidden errors on subsequent state-changing requests until they issue a new GET request to regenerate the token.\n\n## Location\n\n- `middleware/csrf/csrf.go:311-324` -- DeleteToken method\n- `middleware/csrf/csrf.go:317-319` -- Token deletion from storage without authorization\n\n## Attacker Control\n\nThe attacker sends a cross-site request (e.g., `\u003cimg src=\"http://target/logout\"\u003e` if the endpoint responds to GET, or a form POST) targeting the endpoint that calls DeleteToken. The victim's browser includes the CSRF cookie automatically.\n\n## Trust Boundary Crossed\n\nCross-site to same-origin: the attacker triggers token deletion from a different origin.\n\n## Impact\n\nTargeted denial-of-service: the victim receives 403 Forbidden errors on all subsequent POST/PUT/DELETE/PATCH requests until they visit a page that issues a GET request through the CSRF middleware to regenerate the token. This can disrupt user workflows and force re-authentication in some application designs.\n\n## Evidence\n\n```go\n// csrf.go:311-324\nfunc (handler *Handler) DeleteToken(c fiber.Ctx) error {\n    // Extract token from the client request cookie\n    cookieToken := c.Cookies(handler.config.CookieName)\n    if cookieToken == \"\" {\n        return handler.config.ErrorHandler(c, ErrTokenNotFound)\n    }\n    // Remove the token from storage -- NO AUTHORIZATION CHECK\n    if err := deleteTokenFromStorage(c, cookieToken, \u0026handler.config, handler.sessionManager, handler.storageManager); err != nil {\n        return handler.config.ErrorHandler(c, err)\n    }\n    // Expire the cookie\n    expireCSRFCookie(c, \u0026handler.config)\n    return nil\n}\n```\n\n## Reproduction Steps\n\n1. Create a Fiber application with CSRF middleware and an endpoint that calls `handler.DeleteToken(c)` (e.g., a logout endpoint) without CSRF middleware protection.\n2. From an attacker page, submit a form POST to the logout endpoint: `\u003cform method=\"POST\" action=\"http://target/logout\"\u003e\u003cinput type=\"submit\"\u003e\u003c/form\u003e`.\n3. The victim's browser sends the CSRF cookie with the request.\n4. DeleteToken reads the cookie, deletes the token from storage, and expires the cookie.\n5. The victim's next POST/PUT/DELETE/PATCH request fails with 403 because the token no longer exists in storage.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"0e81cd7486e3106690ec77ec06bde1e0","found_at":"2026-04-12T09:28:43.962284Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":268,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:m9","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"session-csrf-insecure-cookie-defaults","description":"Phase: 8\nSequence: 025\nSlug: session-csrf-insecure-cookie-defaults\nVerdict: VALID\nRationale: Security-focused middleware (CSRF, session) defaults to insecure cookie attributes (Secure: false, HttpOnly: false), violating secure-by-default principle for security enforcement components.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-2/debate.md\n\n## Summary\n\nBoth the CSRF and session middleware default to `CookieSecure: false` and `CookieHTTPOnly: false`. For security-focused middleware whose primary purpose is protecting against cross-site attacks and session hijacking, these defaults violate the principle of secure-by-default.\n\n- **CookieSecure: false**: Cookies are sent over plaintext HTTP connections, enabling network-level interception.\n- **CookieHTTPOnly: false**: Cookies are readable by JavaScript, enabling XSS-based token theft.\n- **Session AbsoluteTimeout: 0**: Sessions never expire absolutely, only via idle timeout.\n\n## Location\n\n- `middleware/csrf/config.go:131-138` -- CSRF ConfigDefault (CookieSecure: false, CookieHTTPOnly: false)\n- `middleware/session/config.go:93-98` -- Session ConfigDefault (CookieSecure: false, CookieHTTPOnly: false, AbsoluteTimeout: 0)\n\n## Attacker Control\n\n- Network attacker can intercept session/CSRF cookies sent over HTTP (Secure: false).\n- XSS attacker can read session/CSRF cookies via document.cookie (HttpOnly: false).\n\n## Trust Boundary Crossed\n\nNetwork boundary (plaintext interception) and script boundary (XSS reads cookies).\n\n## Impact\n\nSession hijacking and CSRF token theft are facilitated by the insecure defaults. Applications using default configuration are vulnerable to:\n1. Cookie interception on HTTP (or mixed HTTP/HTTPS) connections.\n2. Cookie theft via XSS attacks.\n3. Indefinite session token validity (no absolute timeout).\n\n## Evidence\n\n```go\n// csrf/config.go:131-138\nvar ConfigDefault = Config{\n    CookieName:     \"csrf_\",\n    CookieSameSite: \"Lax\",\n    // CookieSecure:   false (zero value)\n    // CookieHTTPOnly: false (zero value)\n}\n```\n\n```go\n// session/config.go:93-98\nvar ConfigDefault = Config{\n    IdleTimeout:    30 * time.Minute,\n    KeyGenerator:   utils.SecureToken,\n    Extractor:      extractors.FromCookie(\"session_id\"),\n    CookieSameSite: \"Lax\",\n    // CookieSecure:      false (zero value)\n    // CookieHTTPOnly:    false (zero value)\n    // AbsoluteTimeout:   0 (disabled)\n}\n```\n\n## Reproduction Steps\n\n1. Deploy Fiber with session and CSRF middleware using default configuration.\n2. Verify cookies are set without `Secure` or `HttpOnly` flags by inspecting response headers.\n3. On an HTTP connection, observe that cookies are transmitted in plaintext (interceptable by network attacker).\n4. Inject JavaScript (`document.cookie`) and observe that both session and CSRF cookies are readable.\n5. For absolute timeout: create a session and verify it remains valid indefinitely as long as activity occurs within 30-minute idle windows.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"1a2a4d7b82da154129bd8d40e193fd35","found_at":"2026-04-12T09:28:43.962284Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":266,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:m7","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"csrf-referer-path-mismatch","description":"Phase: 8\nSequence: 023\nSlug: csrf-referer-path-mismatch\nVerdict: VALID\nRationale: The referer matching function incorrectly includes the URL path in comparisons against TrustedOrigins, causing false rejections that may lead developers to weaken CSRF protection.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-2/debate.md\n\n## Summary\n\nThe CSRF middleware's referer validation function at `csrf.go:390` uses `refererURL.String()` which reconstructs the full URL including path, query, and fragment. TrustedOrigins are stored as scheme+host only (e.g., `\"https://sub.example.com\"`). The comparison at lines 392-399 fails when the Referer header includes a path component (e.g., `\"https://sub.example.com/page\"`), because neither `slices.Contains` nor `subdomain.match` will find a match.\n\nThis causes legitimate HTTPS requests from trusted origins/subdomains to be incorrectly rejected with 403 when the Referer includes a path.\n\n## Location\n\n- `middleware/csrf/csrf.go:390` -- `referer = refererURL.String()` includes path\n- `middleware/csrf/csrf.go:392-393` -- `slices.Contains(trustedOrigins, referer)` fails\n- `middleware/csrf/csrf.go:396-399` -- `trustedSubOrigin.match(referer)` fails (suffix check broken by path)\n- `middleware/csrf/helpers.go:107-136` -- `subdomain.match` uses `strings.HasSuffix`\n\n## Attacker Control\n\nThis is not an attacker-exploitable vulnerability in the traditional sense. It is a correctness bug that causes false rejections. However, the indirect security impact is significant: developers encountering unexpected 403 errors from their trusted subdomains may remove TrustedOrigins configuration as a workaround, thereby weakening CSRF protection.\n\n## Trust Boundary Crossed\n\nN/A (correctness bug, not a bypass).\n\n## Impact\n\nLegitimate cross-subdomain requests are rejected. Developers may weaken CSRF protection by removing TrustedOrigins. This particularly affects microservice architectures where different services on subdomains need to make authenticated requests to each other.\n\n## Evidence\n\n```go\n// csrf.go:388-399 -- referer includes path, comparison fails\nreferer = refererURL.String()  // \"https://sub.example.com/page\"\n\nif slices.Contains(trustedOrigins, referer) {\n    // trustedOrigins = [\"https://sub.example.com\"]\n    // \"https://sub.example.com/page\" != \"https://sub.example.com\" --\u003e false\n    return nil\n}\n\nfor _, trustedSubOrigin := range trustedSubOrigins {\n    if trustedSubOrigin.match(referer) {\n        // trustedSubOrigin.suffix = \"example.com\"\n        // strings.HasSuffix(\"https://sub.example.com/page\", \"example.com\") --\u003e false\n        // because \"/page\" is after \"example.com\"\n        return nil\n    }\n}\n```\n\n**Fix**: Replace `referer = refererURL.String()` with `referer = refererURL.Scheme + \"://\" + refererURL.Host` to strip the path before comparison. This matches how `originMatchesHost` handles the Origin header (which never includes a path per the spec).\n\n## Reproduction Steps\n\n1. Configure CSRF middleware with `TrustedOrigins: []string{\"https://sub.example.com\"}`.\n2. Send a POST request from `https://sub.example.com/page` to the protected endpoint.\n3. Ensure the request has no Origin header but has `Referer: https://sub.example.com/page`.\n4. Observe 403 Forbidden response despite the origin being in TrustedOrigins.\n5. Verify that removing the path from the Referer (sending `Referer: https://sub.example.com`) results in 200 OK.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"92617e1850166284e37e651b831cf50b","found_at":"2026-04-12T09:28:43.962283Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":265,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:m6","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"csrf-cookie-httponly-default","description":"Phase: 8\nSequence: 022\nSlug: csrf-cookie-httponly-default\nVerdict: VALID\nRationale: The default CookieHTTPOnly: false is an insecure default that amplifies XSS into CSRF bypass on HTTP deployments; downgraded from HIGH to MEDIUM because it requires an XSS precondition.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: check-3-ambiguous\nDebate: archon/chamber-workspace/chamber-2/debate.md\n\n## Summary\n\nThe CSRF middleware defaults to `CookieHTTPOnly: false`, making the CSRF token cookie readable by JavaScript via `document.cookie`. On HTTP deployments (where origin/referer checks are bypassed per p8-020), any XSS vulnerability on the application allows an attacker to read the CSRF token and forge authenticated state-changing requests.\n\nThis converts the CSRF protection from a defense-in-depth layer (that should survive XSS) into a protection that is completely defeated by XSS -- negating the purpose of CSRF tokens.\n\n## Location\n\n- `middleware/csrf/config.go:131-138` -- ConfigDefault has no CookieHTTPOnly: true\n- `middleware/csrf/config.go:110-112` -- CookieHTTPOnly field documentation\n- `middleware/csrf/csrf.go:299` -- Cookie set with CookieHTTPOnly from config\n\n## Attacker Control\n\nRequires XSS on the application. The attacker injects JavaScript that reads `document.cookie` to extract the CSRF token value.\n\n## Trust Boundary Crossed\n\nSame-origin (XSS is already inside the origin). The CSRF bypass is a secondary consequence of the XSS, amplified by the insecure default.\n\n## Impact\n\nFull CSRF bypass when combined with XSS on HTTP deployments. State-changing requests can be forged with the stolen CSRF token. The insecure default means most applications using CSRF middleware with default config are affected.\n\n## Evidence\n\n```go\n// config.go:131-138 -- ConfigDefault\nvar ConfigDefault = Config{\n    CookieName:            \"csrf_\",\n    CookieSameSite:        \"Lax\",\n    IdleTimeout:           30 * time.Minute,\n    KeyGenerator:          utils.SecureToken,\n    ErrorHandler:          defaultErrorHandler,\n    Extractor:             extractors.FromHeader(HeaderName),\n    DisableValueRedaction: false,\n    // CookieHTTPOnly: false (zero value -- NOT set to true)\n    // CookieSecure: false (zero value -- NOT set to true)\n}\n```\n\n## Reproduction Steps\n\n1. Deploy Fiber with CSRF middleware using default configuration on HTTP (behind TLS proxy).\n2. Assume application has an XSS vulnerability (e.g., reflected XSS in error message).\n3. Attacker injects: `\u003cscript\u003efetch('/api/action', {method:'POST', headers:{'X-Csrf-Token': document.cookie.match(/csrf_=([^;]+)/)[1]}, credentials:'same-origin'})\u003c/script\u003e`\n4. The CSRF token is read from the cookie (readable because CookieHTTPOnly is false).\n5. The POST request passes CSRF validation: origin check bypassed (HTTP), double-submit matches, storage lookup passes.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"e87362097ec99004cb3c8d0cee132d79","found_at":"2026-04-12T09:28:43.962282Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":263,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:m4","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"schema-negative-index","description":"Phase: 8\nSequence: 005\nSlug: schema-negative-index\nVerdict: VALID\nRationale: Negative indices bypass the maxParserIndex validation check and are defended only by panic recovery. While the defense works, this is an undisclosed incomplete fix for CVE-2025-48075/CVE-2025-54801 with a fragile defense pattern.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: check-2-ambiguous (framework protection via defer/recover is functioning but fragile)\nDebate: archon/chamber-workspace/chamber-1/debate.md\n\n## Summary\n\nThe schema decoder's `parsePath` function applies only an upper-bound check on parsed form indices (`index64 \u003e maxParserIndex`) but NOT a lower-bound check for negative values. A form field like `field[-1]=x` passes `ParseInt` successfully (returns `-1`), passes the `\u003e maxParserIndex` check (since `-1 \u003c 1000`), and reaches `reflect.MakeSlice`/`v.Index(-1)` which panics. The panic is caught by the `defer/recover` block in `Decoder.Decode()`, returning an error.\n\nThis is an undisclosed validation gap in the CVE-2025-48075 / CVE-2025-54801 fix. The root cause (accepting negative indices) was not addressed; only the symptom (panic) is caught.\n\n## Location\n\n- `gofiber/schema@v1.7.0/cache.go:90-99` -- `parsePath` function with missing negative index check\n- `gofiber/schema@v1.7.0/decoder.go:102-110` -- `defer/recover` block (sole defense)\n- `binder/form.go:parseParamSquareBrackets` -- converts bracket notation to dot notation (entry point)\n\n## Attacker Control\n\nFull. Any unauthenticated client can send form POST body or query string parameters with negative array indices (e.g., `field[-1]=x` or `?field[-1]=x`).\n\n## Trust Boundary Crossed\n\nInternet -\u003e schema decoder -\u003e reflect operations. The negative index flows through validation unchecked and reaches reflect operations that panic.\n\n## Impact\n\n- Per-request 500 error (panic recovered, not a process crash)\n- The negative index path is defended only by panic recovery, not by input validation\n- Any future code change that removes, moves, or modifies the `defer/recover` block silently re-exposes a crash-level DoS\n- The gap is undisclosed -- not tracked as a separate CVE despite being a distinct validation failure from the patched CVEs\n\n## Evidence\n\n```\nPOST /endpoint with body: field[-1]=x\n\n-\u003e binder/form.go: parseParamSquareBrackets(\"field[-1]\") = \"field.-1\"\n-\u003e schema.Decoder.Decode: parsePath(\"field.-1\")\n-\u003e ParseInt(\"-1\") = -1\n-\u003e check: -1 \u003e maxParserIndex(1000)? NO -\u003e passes\n-\u003e decode(): reflect.MakeSlice(t, -1+1, -1+1) = MakeSlice(t, 0, 0)\n-\u003e v.Index(-1) -\u003e PANIC\n-\u003e defer/recover -\u003e error returned -\u003e HTTP 500\n```\n\n## Reproduction Steps\n\n1. Send a form POST with negative index:\n   ```\n   curl -X POST http://target/endpoint \\\n     -H \"Content-Type: application/x-www-form-urlencoded\" \\\n     -d \"items[-1]=test\"\n   ```\n2. Observe HTTP 500 response (panic recovered)\n3. Verify server continues operating (no process crash)\n4. Note: the negative index reaches reflect operations before being caught by recover\n\n**Fix recommendation**: Add explicit lower-bound check in `parsePath`:\n```go\nif index64 \u003c 0 || index64 \u003e maxParserIndex {\n    return nil, errInvalidPath\n}\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"ed2ba6bb188c70fcf666862f54e7f0e7","found_at":"2026-04-12T09:28:43.962277Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":264,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:m5","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"trustproxy-ip-spoofing","description":"Phase: 8\nSequence: 006\nSlug: trustproxy-ip-spoofing\nVerdict: VALID\nRationale: When TrustProxy is enabled without subnet filter, c.IP() returns attacker-controlled X-Forwarded-For value, bypassing all per-IP protections. Documented mitigation exists but the insecure path is too easy to reach.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-1/debate.md\n\n## Summary\n\nWhen `TrustProxy: true` is set without configuring `TrustProxyConfig` subnet ranges, `c.IP()` returns the raw `X-Forwarded-For` header value. An attacker can set any arbitrary IP address, bypassing all per-IP protections including rate limiting, IP-based access control, and abuse detection. This is a common misconfiguration pattern: many developers set `TrustProxy: true` based on examples without configuring subnet filtering.\n\nThis finding serves as a severity amplifier for other DoS findings (p8-001 decompression bomb, p8-002 flash cookie DoS) by removing rate-limit protections.\n\n## Location\n\n- `req.go:512-516` -- `DefaultReq.IP()` reads `X-Forwarded-For` when TrustProxy enabled\n- `req.go:514` -- `r.extractIPFromHeader(app.config.ProxyHeader)` returns raw header value\n- `middleware/limiter/config.go:93` -- default `KeyGenerator: c.IP()` uses spoofable IP\n\n## Attacker Control\n\nFull. The `X-Forwarded-For` header is entirely attacker-controlled. When TrustProxy is enabled without subnet filtering, the attacker's header value is returned directly by `c.IP()`.\n\n## Trust Boundary Crossed\n\nInternet -\u003e server identity system. The attacker spoofs their IP identity as seen by all framework and middleware components that use `c.IP()`.\n\n## Impact\n\n- **Rate limit bypass**: Rate limiter's default `KeyGenerator: c.IP()` uses the spoofed IP as the rate-limit key. Rotating IPs gives each request a fresh bucket, enabling unlimited request rate from a single attacker.\n- **IP-based access control bypass**: Any middleware or handler checking `c.IP()` for access control is defeated.\n- **Amplifies other DoS**: Combined with decompression bomb (p8-001), enables unlimited bomb requests. Combined with flash cookie DoS (p8-002), enables sustained pre-auth allocation.\n- **Upstream IP spoofing**: When used with proxy middleware's BalancerForward, the spoofed IP is injected as X-Real-IP to upstream services.\n\n## Evidence\n\n```go\n// req.go:512-516\nfunc (r *DefaultReq) IP() string {\n    app := r.c.app\n    if r.IsProxyTrusted() \u0026\u0026 app.config.ProxyHeader != \"\" {\n        return r.extractIPFromHeader(app.config.ProxyHeader)  // returns raw header value\n    }\n    // ...\n}\n```\n\n## Reproduction Steps\n\n1. Configure Fiber app with `TrustProxy: true` and no `TrustProxyConfig`:\n   ```go\n   app := fiber.New(fiber.Config{TrustProxy: true})\n   ```\n2. Add rate-limiting middleware with default config\n3. Send requests with rotating X-Forwarded-For:\n   ```bash\n   for i in $(seq 1 1000); do\n     curl -H \"X-Forwarded-For: 10.0.0.$i\" http://target/endpoint\n   done\n   ```\n4. Observe that rate limiter gives each request a fresh bucket (no throttling)\n\n**Fix recommendation**: When `TrustProxy: true` is set without `TrustProxyConfig` subnet ranges, log a warning at startup or default to trusting only RFC 1918 private ranges. Consider making `TrustProxyConfig` required when `TrustProxy` is enabled.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"6fc2569da333ac5a0100fe6dd4320b7f","found_at":"2026-04-12T09:28:43.962277Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":261,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:m2","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"routepatternmatch-oob","description":"Phase: 8\nSequence: 003\nSlug: routepatternmatch-oob\nVerdict: VALID\nRationale: Incomplete CVE-2026-25882 fix leaves public API RoutePatternMatch unprotected against \u003e30 params. Go bounds checking prevents memory corruption but allows panic DoS. Attacker control is conditional on application design.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: check-1-ambiguous (attacker control conditional on application passing user-influenced patterns)\nDebate: archon/chamber-workspace/chamber-1/debate.md\n\n## Summary\n\nThe CVE-2026-25882 fix added a `maxParams` check in the standalone `parseRoute` function (`path.go:250-253`). However, the public API `RoutePatternMatch` (path.go:155) calls the method form `parser.parseRoute()` at line 192, which does NOT contain this check. A pattern with 31+ named parameters triggers an out-of-bounds array access at `params[paramsIterator]` (path.go:529), causing a Go runtime panic.\n\nIn Go, this results in a bounds-check panic (not memory corruption as in C), which `middleware/recover` will catch if configured.\n\n## Location\n\n- `path.go:155-209` -- `RoutePatternMatch` function (public API)\n- `path.go:192` -- calls `parser.parseRoute(patternStr)` (method form, NO maxParams check)\n- `path.go:202` -- calls `parser.getMatch(path, path, \u0026ctxParams, false)`\n- `path.go:529` -- `params[paramsIterator] = v` (OOB write if paramsIterator \u003e= 30)\n- `path.go:250-253` -- standalone `parseRoute` function (HAS maxParams check -- CVE fix location)\n\n## Attacker Control\n\nConditional. The `pattern` argument to `RoutePatternMatch` is typically developer-controlled (static route definitions). The `path` argument is attacker-controlled but does not trigger the OOB -- the OOB requires the pattern to have 31+ named parameters. Exploitation requires the application to pass user-influenced patterns to `RoutePatternMatch` (e.g., routing configuration UIs, plugin systems, dynamic route matching, testing frameworks).\n\n## Trust Boundary Crossed\n\nWhen pattern is user-influenced: Internet -\u003e `RoutePatternMatch` -\u003e fixed-size array panic (process-level DoS). When pattern is always static: no trust boundary crossed at the attacker-control level.\n\n## Impact\n\n- Go runtime panic: \"index out of range [30] with length 30\"\n- Without recover middleware: goroutine crash, fasthttp logs the panic, process continues but goroutine is lost\n- With recover middleware: 500 response returned\n- The vulnerability is the same class as CVE-2026-25882, demonstrating an incomplete fix\n\n## Evidence\n\n```go\n// path.go:155 -- public API, no maxParams check on pattern\nfunc RoutePatternMatch(path, pattern string, cfg ...Config) bool {\n    var ctxParams [maxParams]string  // stack-allocated, maxParams=30\n    // ...\n    parser.parseRoute(patternStr)   // method form at line 192 -- NO maxParams check\n    // ...\n    if match := parser.getMatch(path, path, \u0026ctxParams, false); match {\n        return true  // getMatch writes params[paramsIterator] at line 529, OOB if \u003e= 30\n    }\n}\n```\n\n```go\n// path.go:250-253 -- standalone function form HAS the check (CVE fix)\nfunc parseRoute(pattern string, cfg ...Config) routeParser {\n    // ...\n    if len(parser.params) \u003e maxParams {\n        panic(fmt.Sprintf(\"too many parameters (limit %d)\", maxParams))\n    }\n}\n```\n\n## Reproduction Steps\n\n1. Call `RoutePatternMatch` with a pattern containing 31+ named params:\n   ```go\n   pattern := \"/:p1/:p2/:p3/:p4/:p5/:p6/:p7/:p8/:p9/:p10/:p11/:p12/:p13/:p14/:p15/:p16/:p17/:p18/:p19/:p20/:p21/:p22/:p23/:p24/:p25/:p26/:p27/:p28/:p29/:p30/:p31\"\n   fiber.RoutePatternMatch(\"/a/b/c/d/e/f/g/h/i/j/k/l/m/n/o/p/q/r/s/t/u/v/w/x/y/z/aa/bb/cc/dd/ee\", pattern)\n   ```\n2. Observe Go runtime panic: `runtime error: index out of range [30] with length 30`\n3. Without recover middleware, the goroutine crashes\n\n**Fix recommendation**: Move the maxParams check into the `parseRoute` method (`path.go:221`) so all callers are protected, and add bounds checking in `getMatch` at line 529 as defense-in-depth.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"d61f3ead6a846aa58289830d87aed729","found_at":"2026-04-12T09:28:43.962276Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":262,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:m3","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"regex-constraint-panic","description":"Phase: 8\nSequence: 004\nSlug: regex-constraint-panic\nVerdict: VALID\nRationale: regexp.MustCompile on unvalidated pattern constraint data allows panic DoS via RoutePatternMatch. Same conditional attacker control as p8-003.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: check-1-ambiguous (attacker control conditional on application passing user-influenced patterns)\nDebate: archon/chamber-workspace/chamber-1/debate.md\n\n## Summary\n\nThe `analyseParameterPart` function in `path.go` calls `regexp.MustCompile` on a regex constraint string extracted from the route pattern without validating the regex syntax first. An invalid regex (e.g., `[` with no closing bracket) triggers a panic from `MustCompile`. This is reachable via the public API `RoutePatternMatch` when user-controlled patterns are passed.\n\nUnlike H-03 (which requires 31+ params), this only requires a single parameter with an invalid regex constraint, making it easier to trigger.\n\n## Location\n\n- `path.go:421` -- `regexp.MustCompile(constraint.Data[0])` in `analyseParameterPart`\n- `path.go:155` -- `RoutePatternMatch` (public API entry point)\n- `path.go:192` -- `parser.parseRoute(patternStr)` -\u003e `analyseParameterPart`\n\n## Attacker Control\n\nConditional. Same as p8-003: requires the application to pass user-influenced patterns to `RoutePatternMatch`. At route registration time (app startup), the pattern is developer-controlled and a panic at startup is caught during development.\n\n## Trust Boundary Crossed\n\nWhen pattern is user-influenced at request time: Internet -\u003e `regexp.MustCompile` -\u003e panic (process-level DoS).\n\n## Impact\n\n- Go runtime panic: `error parsing regexp: missing closing ]: [...]`\n- Single-parameter pattern sufficient (easier to trigger than p8-003's 31-param requirement)\n- Without recover middleware: goroutine crash\n- At startup (route registration): application fails to start (caught during development)\n- Via `RoutePatternMatch` at request time: runtime DoS\n\n## Evidence\n\n```go\n// path.go:419-421\nif constraint.ID == regexConstraint {\n    constraint.Data = []string{c[start+1 : end]}\n    constraint.RegexCompiler = regexp.MustCompile(constraint.Data[0])  // PANIC if invalid regex\n}\n```\n\n## Reproduction Steps\n\n1. Call `RoutePatternMatch` with an invalid regex constraint:\n   ```go\n   fiber.RoutePatternMatch(\"/test\", \"/:id\u003cregex([)\u003e\")\n   ```\n2. Observe Go runtime panic: `error parsing regexp: missing closing ]: [...]`\n3. Without recover middleware, the goroutine crashes\n\n**Fix recommendation**: Replace `regexp.MustCompile` with `regexp.Compile` and return an error on invalid regex patterns:\n```go\ncompiled, err := regexp.Compile(constraint.Data[0])\nif err != nil {\n    // Return error or skip the constraint\n    return\n}\nconstraint.RegexCompiler = compiled\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"4155e252f9817f9c0a8b813d5aa8f3f7","found_at":"2026-04-12T09:28:43.962276Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":259,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:h6","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"cors-private-network-credentials-no-guard","description":"Phase: 10\nSequence: v005\nSlug: cors-private-network-credentials-no-guard\nVerdict: VALID\nRationale: CORS middleware guards AllowCredentials+wildcard with a startup panic but has no equivalent guard for AllowPrivateNetwork+AllowCredentials, allowing credentialed cross-origin requests to private network resources from internet-origin pages — the exact threat the Private Network Access specification is designed to prevent.\nSeverity-Original: HIGH\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-021-cors-null-origin-credentials.md\nOrigin-Pattern: AP-002\n\n## Summary\n\nThe CORS middleware prevents `AllowCredentials: true` + wildcard `AllowOrigins: [\"*\"]` via a startup panic (`cors.go:92-94`). However, the equally dangerous combination of `AllowPrivateNetwork: true` + `AllowCredentials: true` has no guard whatsoever.\n\nThe W3C Private Network Access (PNA) specification was introduced specifically to prevent internet-facing pages from making credentialed requests to private network resources (RFC 1918 addresses, localhost). The `Access-Control-Allow-Private-Network: true` header is a server-side opt-in to this access.\n\nWhen both `AllowPrivateNetwork: true` and `AllowCredentials: true` are set in fiber's CORS middleware, the server:\n1. Responds to preflight with `Access-Control-Allow-Private-Network: true`\n2. Responds with `Access-Control-Allow-Credentials: true`\n\nThis combination allows an internet-hosted malicious page to make credentialed (cookie-bearing) cross-origin requests to the private-network server. This is the highest-risk CORS misconfiguration for internal services.\n\nNo panic, no log warning, and no documentation warning exists for this combination.\n\n## Location\n\n- `middleware/cors/cors.go:92-94` -- Existing guard (wildcard + credentials):\n  ```go\n  if cfg.AllowCredentials \u0026\u0026 allowAllOrigins {\n      panic(\"[CORS] Configuration error: When 'AllowCredentials' is set to true, 'AllowOrigins' cannot contain a wildcard origin...\")\n  }\n  ```\n- `middleware/cors/cors.go:188-191` -- AllowPrivateNetwork handling (no guard for credentials):\n  ```go\n  if cfg.AllowPrivateNetwork \u0026\u0026 c.Get(fiber.HeaderAccessControlRequestPrivateNetwork) == \"true\" {\n      c.Vary(fiber.HeaderAccessControlRequestPrivateNetwork)\n      c.Set(fiber.HeaderAccessControlAllowPrivateNetwork, \"true\")\n  }\n  ```\n- `middleware/cors/config.go:85` -- `AllowPrivateNetwork bool` -- default false (opt-in), but no validation when set with AllowCredentials\n\n## Attacker Control\n\nAn attacker hosts a page at `https://evil.com` (internet origin). A victim user visits this page while also having a session cookie for `http://192.168.1.100` (a fiber application on the local network with CORS misconfigured as `AllowPrivateNetwork: true, AllowCredentials: true, AllowOriginsFunc: func(o string) bool { return true }`).\n\nThe browser enforces PNA preflight. The evil page triggers:\n```\nOPTIONS http://192.168.1.100/api/admin\nAccess-Control-Request-Private-Network: true\nOrigin: https://evil.com\n```\n\nFiber responds: `Access-Control-Allow-Private-Network: true`, `Access-Control-Allow-Credentials: true`. Browser proceeds with the credentialed request, attaching the victim's session cookies.\n\n## Trust Boundary Crossed\n\nInternet-to-private-network boundary: an internet-hosted page gains credentialed access to a private-network resource. This crosses both the CORS same-origin boundary and the internet/intranet network boundary.\n\n## Impact\n\n- **Credentialed CSRF on private network services**: Attackers can forge state-changing requests to intranet services while carrying the victim's authentication cookies.\n- **Private service data exfiltration**: With `AllowCredentials: true`, responses to credentialed requests are readable by the attacking page (unlike wildcard CORS where credentials cannot be sent).\n- **Authentication bypass**: Any service relying on network location (private IP range) as a security boundary is compromised.\n\nSeverity is HIGH because: (1) no prerequisite beyond victim visiting attacker's page, (2) crosses internet/private-network trust boundary, (3) credentials are included (session hijacking possible).\n\n## Evidence\n\n```go\n// cors.go:92-94 -- Guard exists for wildcard + credentials\nif cfg.AllowCredentials \u0026\u0026 allowAllOrigins {\n    panic(\"[CORS] Configuration error: When 'AllowCredentials' is set to true, ...\")\n}\n\n// cors.go:188-191 -- NO guard for private network + credentials\nif cfg.AllowPrivateNetwork \u0026\u0026 c.Get(fiber.HeaderAccessControlRequestPrivateNetwork) == \"true\" {\n    c.Vary(fiber.HeaderAccessControlRequestPrivateNetwork)\n    c.Set(fiber.HeaderAccessControlAllowPrivateNetwork, \"true\")\n    // AllowCredentials may also be true -- no validation performed\n}\n\n// setSimpleHeaders (cors.go:220-228) -- credentials emitted alongside PNA approval\nif cfg.AllowCredentials {\n    if allowOrigin != \"\" {\n        c.Set(fiber.HeaderAccessControlAllowOrigin, allowOrigin)\n        c.Set(fiber.HeaderAccessControlAllowCredentials, \"true\")  // Emitted with PNA: true\n    }\n}\n```\n\n## Reproduction Steps\n\n1. Deploy a fiber app on a private IP (e.g., 192.168.1.100) with:\n   ```go\n   app.Use(cors.New(cors.Config{\n       AllowOriginsFunc:    func(o string) bool { return true },\n       AllowCredentials:    true,\n       AllowPrivateNetwork: true,\n   }))\n   ```\n2. From an internet-hosted page (`https://evil.com`), send a PNA preflight:\n   ```js\n   fetch(\"http://192.168.1.100/api/admin\", {\n       method: \"POST\",\n       credentials: \"include\",\n   })\n   ```\n3. Browser sends PNA preflight with `Access-Control-Request-Private-Network: true`.\n4. Server responds with both `Access-Control-Allow-Private-Network: true` and `Access-Control-Allow-Credentials: true`.\n5. Browser sends actual credentialed request; response body is readable by evil.com.\n6. Compare: setting `AllowCredentials: true, AllowOrigins: [\"*\"]` causes startup panic -- no equivalent panic for PNA + credentials.\n\n\n---\n\nID: H6\nTitle: CORS middleware allows AllowPrivateNetwork + AllowCredentials without startup guard\nSeverity: HIGH\nComponent: middleware/cors\nPoC-Status: executed\nPoC-File: archon/findings/H6-cors-private-network-credentials-no-guard/poc_test.go\n\n## Summary\n\nFiber's CORS middleware enforces a startup-time panic when\n`AllowCredentials: true` is combined with a wildcard `AllowOrigins: [\"*\"]`\n(`cors.go:92-94`). No equivalent guard exists for the equally dangerous\ncombination of `AllowPrivateNetwork: true` + `AllowCredentials: true`. A\nserver carrying this configuration responds to any browser-issued Private\nNetwork Access (PNA) preflight with both `Access-Control-Allow-Private-Network:\ntrue` and `Access-Control-Allow-Credentials: true`, satisfying the browser's\nchecks and allowing an internet-hosted page to make credentialed\ncross-origin requests to a private-network resource.\n\n## Vulnerability\n\n### Code Path\n\n```\ncors.go:92-94   — guard EXISTS for AllowCredentials + wildcard:\n    if cfg.AllowCredentials \u0026\u0026 allowAllOrigins {\n        panic(\"[CORS] Configuration error: ...\")\n    }\n\ncors.go:188-191 — PNA response set with NO guard for AllowCredentials:\n    if cfg.AllowPrivateNetwork \u0026\u0026\n        c.Get(fiber.HeaderAccessControlRequestPrivateNetwork) == \"true\" {\n        c.Vary(fiber.HeaderAccessControlRequestPrivateNetwork)\n        c.Set(fiber.HeaderAccessControlAllowPrivateNetwork, \"true\")\n    }\n    // AllowCredentials may be true — never checked\n\ncors.go:225-227 — credentials emitted immediately after PNA approval:\n    c.Set(fiber.HeaderAccessControlAllowOrigin, allowOrigin)\n    c.Set(fiber.HeaderAccessControlAllowCredentials, \"true\")\n```\n\n### Root Cause\n\nThe developer who added the wildcard+credentials guard did not apply the same\nreasoning to PNA+credentials. The W3C Private Network Access specification\nexplicitly warns that `Access-Control-Allow-Private-Network: true` combined\nwith `Access-Control-Allow-Credentials: true` is the highest-risk CORS\nconfiguration for private-network services: it allows an internet-hosted\nattacker page to read authenticated responses from any internal service the\nvictim's browser can reach.\n\n### Attacker Prerequisites\n\n- Victim visits an attacker-controlled internet page (`https://evil.com`).\n- Target fiber application is reachable from the victim's browser on a private\n  address (RFC 1918 or loopback).\n- Target fiber application is configured with `AllowPrivateNetwork: true` and\n  `AllowCredentials: true` — a plausible misconfiguration for internal\n  dashboards or API gateways that opt into PNA without reading the spec.\n\n## Proof of Concept\n\nThe PoC is a Go test exercising Fiber's own request stack via `fasthttp.RequestCtx`\nwith no external infrastructure required.\n\n### Test: `TestPNA_PrivateNetworkPlusCredentials_NoGuard`\n\nSubtest 1 — control path: creates `AllowCredentials: true` + wildcard config\nand confirms the existing panic fires.\n\nSubtest 2 — vulnerable path:\n\n```go\napp.Use(cors.New(cors.Config{\n    AllowOriginsFunc:    func(origin string) bool { return true },\n    AllowCredentials:    true,\n    AllowPrivateNetwork: true,\n}))\n```\n\nPreflight sent:\n\n```\nOPTIONS /api/admin HTTP/1.1\nOrigin: https://evil.com\nAccess-Control-Request-Method: POST\nAccess-Control-Request-Private-Network: true\n```\n\nResponse received (HTTP 204):\n\n```\nAccess-Control-Allow-Origin:          https://evil.com\nAccess-Control-Allow-Private-Network: true\nAccess-Control-Allow-Credentials:     true\n```\n\nBoth headers present — the browser proceeds with the actual credentialed\nrequest and makes the response body available to `evil.com`.\n\n### Test: `TestPNA_NoGuardAtStartup_Compared`\n\nConfirms no panic occurs at middleware initialization for the\n`AllowPrivateNetwork + AllowCredentials` combination.\n\n### Execution\n\n```\n$ go test ./archon/findings/H6-cors-private-network-credentials-no-guard/ \\\n    -v -run TestPNA\n\n--- PASS: TestPNA_NoGuardAtStartup_Compared (0.00s)\n--- PASS: TestPNA_PrivateNetworkPlusCredentials_NoGuard (0.00s)\n    --- PASS: .../control:_wildcard+credentials_panics_at_startup (0.00s)\n    --- PASS: .../vulnerable:_AllowPrivateNetwork+AllowCredentials_no_panic (0.00s)\nPASS\nok  github.com/gofiber/fiber/v3/archon/findings/H6-... 0.005s\n```\n\nFull output: `evidence/exploit.log`\n\n## Impact\n\n| Threat | Detail |\n|---|---|\n| Credentialed CSRF | Attacker page issues state-changing requests (POST/PUT/DELETE) to private-network endpoints; victim session cookie is attached by the browser |\n| Response exfiltration | Because the origin is reflected (not `*`) and credentials are allowed, the browser exposes the response body to the attacker JavaScript — internal JSON APIs, tokens, dashboards fully readable |\n| Auth bypass | Services relying on network location as a security boundary are fully compromised |\n| Zero user interaction | Victim only needs to load the attacker page; no additional clicks required |\n\nSeverity is HIGH: no prerequisite beyond victim browsing, crosses both the\nCORS same-origin boundary and the internet/intranet network boundary, and\ncredentials are included in the compromised responses.\n\n## Recommended Fix\n\nAdd a startup panic (or at minimum a logged error) mirroring the existing\nwildcard+credentials check:\n\n```go\n// cors.go — add immediately after the existing AllowCredentials guard\nif cfg.AllowCredentials \u0026\u0026 cfg.AllowPrivateNetwork {\n    panic(\"[CORS] Configuration error: 'AllowCredentials' and \" +\n        \"'AllowPrivateNetwork' must not both be true. This combination \" +\n        \"allows internet pages to make credentialed requests to private \" +\n        \"network resources. See W3C Private Network Access specification.\")\n}\n```\n\nDocument the restriction in `config.go` on both `AllowCredentials` and\n`AllowPrivateNetwork` fields.\n\n## References\n\n- W3C Private Network Access: https://wicg.github.io/private-network-access/\n- Existing guard: `middleware/cors/cors.go:92-94`\n- PNA handling: `middleware/cors/cors.go:188-191`\n- Credentials emission: `middleware/cors/cors.go:220-228`\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"19436dd34ff7632c360a5fc6d669524e","found_at":"2026-04-12T09:28:43.962275Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":260,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:m1","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"flash-cookie-preauth-dos","description":"Phase: 8\nSequence: 002\nSlug: flash-cookie-preauth-dos\nVerdict: VALID\nRationale: Pre-auth allocation without explicit size check before UnmarshalMsg; structural issue of pre-middleware execution. Default ReadBufferSize limits practical impact to ~1KB, but config change silently widens attack window.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-1/debate.md\n\n## Summary\n\nThe `parseAndClearFlashMessages` function in `redirect.go` hex-decodes the `fiber_flash` cookie and passes the result directly to `redirectionMsgs.UnmarshalMsg` without any explicit size check. This function is invoked from `router.go:330-331` BEFORE the middleware chain starts (`app.next(d)` at line 333), meaning it runs before any rate-limiting, authentication, or CSRF middleware.\n\nAt the default `ReadBufferSize=4096`, the practical impact is limited (~1KB allocation per request). However, elevating `ReadBufferSize` (common for large JWT deployments) silently widens the attack window to ~500KB per request.\n\n## Location\n\n- `redirect.go:393-411` -- `parseAndClearFlashMessages` function\n- `redirect.go:395` -- `hex.DecodeString(r.c.Cookies(FlashCookieName))` -- no size check\n- `redirect.go:400` -- `r.c.flashMessages.UnmarshalMsg(cookieValue)` -- msgp deserialization\n- `router.go:330-331` -- pre-middleware invocation point\n- `router.go:342-343` -- same for custom context path\n\n## Attacker Control\n\nFull. The `fiber_flash` cookie is a standard HTTP cookie sent by any unauthenticated client. No pre-authentication is required. The flash cookie parse runs on every request that carries the cookie.\n\n## Trust Boundary Crossed\n\nInternet -\u003e server-side memory allocation, pre-auth. The flash cookie deserialization occurs before all middleware (including rate-limiting and authentication), so the attacker bypasses all application-level request filtering.\n\n## Impact\n\n- **Default config** (`ReadBufferSize=4096`): ~1KB allocation per request. Not sufficient for meaningful DoS.\n- **Elevated ReadBufferSize** (e.g., 65536 for large JWT): ~32KB allocation per request. Noticeable under sustained attack.\n- **Large ReadBufferSize** (e.g., 1MB, documented as valid): ~500KB allocation per request. Significant memory pressure under concurrent connections.\n- The 256-element msgp array limit prevents extreme amplification but does not cap per-string sizes.\n- Combined with IP spoofing (p8-006), the attacker can bypass rate limiting for sustained pre-auth allocation.\n\n## Evidence\n\n```go\n// redirect.go:393-411\nfunc (r *Redirect) parseAndClearFlashMessages() {\n    cookieValue, err := hex.DecodeString(r.c.Cookies(FlashCookieName))\n    if err != nil {\n        return\n    }\n    // NO size check before deserialization\n    _, err = r.c.flashMessages.UnmarshalMsg(cookieValue)\n    // ...\n}\n```\n\n```go\n// router.go:330-333 -- flash parse runs BEFORE middleware chain\nif hasFlashCookie(\u0026d.Request().Header) {\n    d.Redirect().parseAndClearFlashMessages()  // \u003c-- pre-auth, pre-middleware\n}\n_, err = app.next(d)  // \u003c-- middleware chain starts HERE\n```\n\n## Reproduction Steps\n\n1. Craft a `fiber_flash` cookie with maximum payload: 256 msgp elements with large string values, hex-encoded\n2. Send to any endpoint: `curl -b \"fiber_flash=\u003chex-payload\u003e\" http://target/any-path`\n3. At default ReadBufferSize, observe ~1KB allocation (negligible)\n4. With elevated ReadBufferSize (set `ReadBufferSize: 65536` in app config), observe ~32KB allocation per request\n5. Sustained concurrent requests demonstrate pre-auth memory pressure\n\n**Fix recommendation**: Add explicit size check before `UnmarshalMsg`:\n```go\nif len(cookieValue) \u003e maxFlashCookieSize { // e.g., 4096\n    r.c.Cookie(\u0026Cookie{Name: FlashCookieName, Value: \"\", Path: \"/\", MaxAge: -1})\n    return\n}\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"f178a002b952912fdf595e26c2eeeca5","found_at":"2026-04-12T09:28:43.962275Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":258,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:h5","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"balancer-raw-uri-path-traversal","description":"Phase: 10\nSequence: v004\nSlug: balancer-raw-uri-path-traversal\nVerdict: VALID\nRationale: The Balancer middleware handler at proxy.go:84-88 forwards the raw RequestURI (fasthttp.Request.Header.RequestURI()) to upstream HostClients that are hardcoded with DisablePathNormalizing:true, creating the same parser-differential path traversal as the parent finding through a structurally distinct entry point not covered by the original.\nSeverity-Original: HIGH\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-040-proxy-ssrf-path-traversal.md\nOrigin-Pattern: AP-040\n\n## Summary\n\nThe `Balancer` middleware function (proxy.go:62–110) is a distinct entry point from `DomainForward` and `BalancerForward` covered in the parent finding. It creates `fasthttp.HostClient` instances with `DisablePathNormalizing: true` (proxy.go:43) and forwards the raw request URI to them. At lines 84–88, the code calls `req.SetRequestURIBytes(req.RequestURI())` or `req.SetRequestURI(utils.UnsafeString(req.RequestURI()))` — this preserves the raw, unnormalized URI from `fasthttp.Request.Header.RequestURI()` (equivalent to `c.OriginalURL()`). The subsequent `lbc.Do(req, res)` call sends this raw path to the upstream server whose HostClient has `DisablePathNormalizing: true`, preserving percent-encoded dot segments (`%2e%2e`) to the upstream. The root cause is identical to the parent finding: raw request URI + DisablePathNormalizing → parser-differential traversal.\n\n## Location\n\n- `middleware/proxy/proxy.go:19–110` — `Balancer()` function; the primary load-balancing middleware entry point\n- `middleware/proxy/proxy.go:41–52` — HostClient creation with `DisablePathNormalizing: true` hardcoded\n- `middleware/proxy/proxy.go:84–88` — raw `req.RequestURI()` (= `fasthttp.Request.Header.RequestURI()`) re-set on request object before `lbc.Do(req, res)`\n- `middleware/proxy/proxy.go:91` — `lbc.Do(req, res)` sends request with raw path to upstream\n\n## Attacker Control\n\nThe attacker controls the full request URI. By supplying a percent-encoded path like `/public/%2e%2e/admin/secret`, Fiber's router matches `/public/*` (passing any auth middleware), while the upstream server decodes `%2e%2e` to `..` and resolves the path to `/admin/secret`. The `Balancer` function re-sets the raw `RequestURI()` before forwarding, ensuring no normalization occurs between route matching and upstream delivery.\n\n## Trust Boundary Crossed\n\nExternal HTTP client → Fiber `Balancer` middleware (route-matched path) → upstream HostClient (decoded/resolved path). Auth and ACL middleware bound to Fiber routes sees the encoded path; the upstream server sees the decoded, traversed path.\n\n## Impact\n\n- **Path Traversal / SSRF**: Same impact as parent finding — attacker reaches upstream endpoints not intended to be proxied.\n- **Authentication Bypass**: Auth middleware relying on Fiber's route matching is bypassed when the upstream resolves the traversed path to a different endpoint.\n- **Distinct scope**: `Balancer` (the load-balancing middleware) is a different usage pattern from `DomainForward`/`BalancerForward` (the helper functions). Applications using `app.Use(proxy.Balancer(...))` are affected through this code path.\n\n## Evidence\n\n1. `proxy.go:41–52`: HostClient created with `DisablePathNormalizing: true` — not user-configurable, hardcoded\n2. `proxy.go:84–88`:\n   ```go\n   if c.App().Config().Immutable {\n       req.SetRequestURIBytes(req.RequestURI())\n   } else {\n       req.SetRequestURI(utils.UnsafeString(req.RequestURI()))\n   }\n   ```\n   `req.RequestURI()` returns `fasthttp.Request.Header.RequestURI()` — identical to `c.OriginalURL()` — the raw, unnormalized request URI\n3. `proxy.go:91`: `lbc.Do(req, res)` — forwards the raw URI to an upstream HostClient with `DisablePathNormalizing: true`\n4. `ctx.go:290` / `req.go:731`: Both `c.OriginalURL()` and `req.RequestURI()` return `fasthttp.Request.Header.RequestURI()` — confirmed identical source\n5. No path sanitization between the raw URI and the upstream request; `ModifyRequest` callback defaults to `nil` (config.go:21)\n6. The original finding covers `DomainForward` (proxy.go:243) and `BalancerForward` (proxy.go:283) which call `Do()`/`doAction()` using the global `client` (line 114, also `DisablePathNormalizing: true`). The `Balancer` function uses `lbc` (LBClient with HostClients at line 43) — a structurally separate forwarding path\n\n## Reproduction Steps\n\n1. Set up a Fiber app using `proxy.Balancer(proxy.Config{Servers: []string{\"http://upstream:8080\"}})` on a route like `/public/*`\n2. Run an upstream server at `http://upstream:8080` that has a handler for `/admin/secret` returning sensitive data\n3. Send:\n   ```\n   curl --path-as-is 'http://fiber-app/public/%2e%2e/admin/secret'\n   ```\n4. Observe: Fiber routes to `/public/*` (matches the Balancer middleware), the raw URI is forwarded with `DisablePathNormalizing: true`\n5. Observe: upstream receives `/public/%2e%2e/admin/secret`, decodes `%2e%2e` to `..`, resolves to `/admin/secret`\n6. Sensitive upstream response returned to attacker\n\n\n---\n\nID: H5\nTitle: Balancer Middleware Forwards Raw URI Enabling Path Traversal Authentication Bypass\nSeverity: HIGH\nComponent: middleware/proxy — Balancer()\nPoC-Status: executed\nVariant-Of: H3 (proxy-ssrf-path-traversal / AP-040)\n\n---\n\n## Executive Summary\n\nThe `proxy.Balancer` middleware unconditionally forwards the raw, unnormalized\nrequest URI to upstream servers whose `fasthttp.HostClient` is hardcoded with\n`DisablePathNormalizing: true`. An attacker who sends a request with\npercent-encoded dot segments (`%2e%2e`) passes Fiber's route-matching and any\npath-based auth middleware (which sees `/public/*`), while the upstream HTTP\nserver decodes `%2e%2e` to `..`, resolves the path, and serves a protected\nresource (`/admin/secret`). The exploit was confirmed with a live Go test\nreturning `SECRET ADMIN DATA` through the traversal.\n\n---\n\n## Vulnerability Details\n\n### Root Cause\n\nTwo decisions in `middleware/proxy/proxy.go` interact to create the traversal:\n\n**1. `DisablePathNormalizing: true` hardcoded on every HostClient (line 43)**\n\n```go\nclient := \u0026fasthttp.HostClient{\n    NoDefaultUserAgentHeader: true,\n    DisablePathNormalizing:   true,   // \u003c-- hardcoded, not user-configurable\n    Addr:                     u.Host,\n    ...\n}\n```\n\nThis flag prevents fasthttp from cleaning percent-encoded dot segments before\nplacing them on the wire.\n\n**2. Raw `RequestURI()` re-set on the outgoing request (lines 84–88)**\n\n```go\nif c.App().Config().Immutable {\n    req.SetRequestURIBytes(req.RequestURI())\n} else {\n    req.SetRequestURI(utils.UnsafeString(req.RequestURI()))\n}\n```\n\n`req.RequestURI()` is `fasthttp.Request.Header.RequestURI()`, which returns\nthe raw bytes from the incoming HTTP request line — byte-for-byte identical to\n`c.OriginalURL()`. The explicit `SetRequestURI` call ensures the raw form is\npreserved on the `*fasthttp.Request` that is immediately passed to `lbc.Do`.\n\n### Traversal Chain\n\n```\nClient (curl --path-as-is)\n  GET /public/%2e%2e/admin/secret HTTP/1.1\n\nFiber router\n  matches /public/*  -\u003e  Balancer fires\n  c.Path() = \"/public/../admin/secret\"   (starts with /public/  -\u003e auth PASSES)\n\nfasthttp LBClient (DisablePathNormalizing:true)\n  sends: GET /public/%2e%2e/admin/secret HTTP/1.1\n\nUpstream net/http server\n  r.RequestURI = \"/public/%2e%2e/admin/secret\"\n  r.URL.Path   = \"/admin/secret\"          (stdlib decodes and cleans)\n  -\u003e serves protected resource\n```\n\n### Affected Code Path\n\n| File | Lines | Role |\n|------|-------|------|\n| `middleware/proxy/proxy.go` | 41–52 | HostClient created with `DisablePathNormalizing:true` |\n| `middleware/proxy/proxy.go` | 84–88 | Raw `RequestURI()` re-applied to outgoing request |\n| `middleware/proxy/proxy.go` | 91    | `lbc.Do(req, res)` — raw URI sent to upstream |\n\n### Distinction from Parent Finding (H3)\n\nThe parent finding (H3 / AP-040) covers `DomainForward` (proxy.go:243) and\n`BalancerForward` (proxy.go:283), which both call `doAction()` using the\n**global** `*fasthttp.Client` (line 114). `Balancer` uses a per-call\n`*fasthttp.LBClient` populated with `*fasthttp.HostClient` instances (lines\n24–55). These are structurally distinct code paths — a fix to one does not\nautomatically fix the other.\n\n---\n\n## Proof of Concept\n\n**Test file:** `middleware/proxy/poc_h5_balancer_traversal_test.go`\n\n**Run:**\n```bash\ngo test -v -run TestH5_Balancer_RawURI_PathTraversal ./middleware/proxy/\n```\n\n**Equivalent curl (against a running Fiber server):**\n```bash\ncurl --path-as-is 'http://localhost:3000/public/%2e%2e/admin/secret'\n```\n\n### Execution Output (captured 2026-04-11)\n\n```\n=== RUN   TestH5_Balancer_RawURI_PathTraversal\n    Upstream received URI : \"/admin/secret\"\n    Fiber response (first 400 bytes):\n        HTTP/1.1 200 OK\n        Content-Type: text/plain\n        Content-Length: 18\n        Connection: close\n\n        SECRET ADMIN DATA\n    NOTE: upstream URI \"/admin/secret\" does not retain %2e%2e encoding\n    EXPLOIT SUCCEEDED:\n      Fiber auth middleware saw /public/* -\u003e ALLOWED\n      Upstream resolved \"/admin/secret\" -\u003e /admin/secret -\u003e returned SECRET ADMIN DATA\n      Root cause: proxy.go:43 DisablePathNormalizing:true + proxy.go:84-88 raw RequestURI forwarded\n    Contrast /public/index.html -\u003e status 404, body \"404 page not found\\n\"\n--- PASS: TestH5_Balancer_RawURI_PathTraversal (0.00s)\nPASS\nok  github.com/gofiber/fiber/v3/middleware/proxy  0.009s\n```\n\nThe NOTE about `%2e%2e` not being retained in the upstream URI is expected:\nnet/http's `http.Server` on the upstream decodes and resolves percent-encoded\ndot segments in `r.URL.Path` automatically, so by the time the handler fires\n`r.URL.Path` is already `/admin/secret` — but the raw `r.RequestURI` still\narrived as `/public/%2e%2e/admin/secret`. The critical point is that fasthttp\nforwarded the traversal path intact, and the upstream resolved it to the\nprotected endpoint.\n\n---\n\n## Impact\n\n**Authentication Bypass / Path Traversal**\n\nAny Fiber application that:\n- uses `proxy.Balancer()` as middleware, AND\n- relies on Fiber route matching for access control (e.g., only mounting\n  Balancer on `/public/*` while protecting `/admin/*`)\n\nis vulnerable. An attacker with no credentials can reach arbitrary upstream\nendpoints by encoding traversal sequences in the request URI.\n\n**Severity factors:**\n- No authentication required; network access to Fiber is sufficient\n- Affected code path is the primary, most-documented load-balancing API\n- `DisablePathNormalizing` is hardcoded with no opt-out\n- `ModifyRequest` callback exists but defaults to `nil` and requires the\n  developer to know they need to sanitize\n\n---\n\n## Remediation\n\n**Preferred:** Normalize the URI before forwarding in `Balancer`:\n\n```go\n// Replace lines 84-88 in proxy.go\nparsedURI := fasthttp.AcquireURI()\ndefer fasthttp.ReleaseURI(parsedURI)\nif err := parsedURI.Parse(nil, req.RequestURI()); err == nil {\n    parsedURI.SetPath(string(parsedURI.Path())) // triggers normalization\n    req.SetRequestURIBytes(parsedURI.FullURI())\n}\n```\n\n**Alternative:** Remove `DisablePathNormalizing: true` from HostClient\ncreation, allowing fasthttp to normalize percent-encoded sequences before\nplacing them on the wire (consistent with RFC 3986 §6.2.2).\n\n**Defense-in-depth:** Document that `ModifyRequest` must be used to sanitize\nthe URI if callers need to restrict upstream path access.\n\n---\n\n## Evidence Files\n\n- `evidence/exploit.log` — full `go test -v` output\n- `evidence/impact.log` — annotated traversal chain and key values\n- `evidence/env-info.txt` — environment details\n- `evidence/setup.sh` — environment provisioning script\n- `evidence/exploit.sh` — exploit execution script\n- `middleware/proxy/poc_h5_balancer_traversal_test.go` — PoC test (package proxy)\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"0efee5c9d7cdf5aca44776cd357b2a38","found_at":"2026-04-12T09:28:43.962274Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":256,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:h3","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"proxy-ssrf-path-traversal","description":"Phase: 8\nSequence: 040\nSlug: proxy-ssrf-path-traversal\nVerdict: VALID\nRationale: Confirmed code path from attacker-controlled request URI through DomainForward/BalancerForward to upstream with zero sanitization and hardcoded DisablePathNormalizing; Advocate found no blocking protection at any of 5 layers.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-3/debate.md\n\n## Summary\n\nThe proxy middleware (`DomainForward` and `BalancerForward`) forwards the raw, unnormalized request URI (`c.OriginalURL()`) to upstream servers with `DisablePathNormalizing: true` hardcoded on the fasthttp client. This creates a parser-differential vulnerability: Fiber's router matches on the parsed path (`c.path`, which preserves percent-encoding by default), while upstream servers decode percent-encoding per HTTP spec (RFC 3986). An attacker can craft paths like `/public/%2e%2e/admin/secret` that Fiber routes as a public path but upstream resolves to a protected endpoint.\n\n## Location\n\n- `middleware/proxy/proxy.go:243` -- `DomainForward` concatenates `addr + c.OriginalURL()`\n- `middleware/proxy/proxy.go:283` -- `BalancerForward` concatenates `server + c.OriginalURL()`\n- `middleware/proxy/proxy.go:43` -- `DisablePathNormalizing: true` on per-server HostClient\n- `middleware/proxy/proxy.go:114` -- `DisablePathNormalizing: true` on global Client\n- `ctx.go:290` -- `OriginalURL()` returns raw `fasthttp.Request.Header.RequestURI()`\n\n## Attacker Control\n\nThe attacker controls the full request URI, including path and query string. By using percent-encoded dot segments (`%2e%2e`), the attacker can construct paths that are interpreted literally by Fiber's router but resolved as traversals by the upstream server. No authentication or special privileges are required.\n\n## Trust Boundary Crossed\n\nExternal HTTP client -\u003e Fiber proxy middleware -\u003e Internal upstream service. The attacker bypasses Fiber-level route-based access controls (authentication middleware, path-based ACLs) to reach protected endpoints on the upstream server.\n\n## Impact\n\n- **SSRF / Path Traversal**: Attacker can access internal endpoints on the upstream server not intended to be exposed through the proxy.\n- **Authentication Bypass**: Auth middleware bound to specific Fiber routes is bypassed because the router sees a different path than what the upstream receives.\n- **ACL Bypass**: Path-based access control relying on Fiber's route matching is defeated by the parser differential.\n\n## Evidence\n\n1. `DomainForward` at proxy.go:243: `Do(c, addr+c.OriginalURL(), clients...)` -- raw URI\n2. `OriginalURL()` at ctx.go:290: returns `fasthttp.Request.Header.RequestURI()` with zero normalization\n3. `DisablePathNormalizing: true` hardcoded at proxy.go:43 and proxy.go:114 -- not user-configurable\n4. No sanitization between `c.OriginalURL()` and upstream request (`doAction` at proxy.go:194-198)\n5. `ModifyRequest` callback defaults to nil (config.go:21)\n6. Confirmed by both Tracer (REACHABLE) and Advocate (NO blocking protection)\n\n## Reproduction Steps\n\n1. Set up a Fiber app with DomainForward or BalancerForward proxying to an upstream HTTP server\n2. Configure a public route like `/public/*` that forwards through the proxy\n3. Upstream has a protected endpoint at `/admin/secret`\n4. Send request: `curl --path-as-is 'http://fiber-app/public/%2e%2e/admin/secret'`\n5. Observe: Fiber routes the request to the `/public/*` handler (proxy middleware)\n6. Observe: The upstream server receives the raw path, decodes `%2e%2e` to `..`, and resolves `/admin/secret`\n7. The response from the protected upstream endpoint is returned to the attacker\n\nNote: `curl --path-as-is` prevents curl from normalizing the path. Most programmatic HTTP clients (Python requests, Go net/http) preserve percent-encoding by default.\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Reproduction succeeded -- percent-encoded path traversal sequences (%2e%2e) in the request URI pass through Fiber's proxy middleware unsanitized due to hardcoded DisablePathNormalizing:true, and are resolved by upstream fasthttp servers to reach unintended endpoints (/admin/secret instead of /public/*).\nSeverity-Final: HIGH\nPoC-Status: executed\n\n### Reproduction Summary\n\nEnvironment: Linux 6.1.0-43-cloud-amd64, Go 1.26.1, Fiber v3 at commit fe757ead (main branch).\n\nA Fiber app was configured with `DomainForward` proxying `/public/*` to an upstream fasthttp server. The upstream had a handler matching `ctx.Path() == \"/admin/secret\"`. A request to `/public/%2e%2e/admin/secret` was routed by Fiber to the `/public/*` handler (proxy), which forwarded the raw URI to the upstream. The upstream fasthttp server decoded `%2e%2e` to `..` and resolved the path to `/admin/secret`, successfully reaching the protected endpoint.\n\nBoth `DomainForward` and `BalancerForward` are affected. The attack works against fasthttp-based upstreams (default path normalization). Go's `net/http.ServeMux` was NOT susceptible in testing (it matched the `/public/` prefix handler instead), demonstrating upstream-dependency.\n\n### Protection Surface\n\nNo protection was found at any layer that blocks this attack:\n- No path sanitization between `c.OriginalURL()` and upstream request\n- `DisablePathNormalizing: true` is hardcoded and not user-configurable\n- `ModifyRequest` callback defaults to nil\n- No documentation warns about this behavior\n\n### Evidence\n\nTest output stored in `archon/real-env-evidence/proxy-ssrf-path-traversal/`.\nFull review at `archon/adversarial-reviews/proxy-ssrf-path-traversal-review.md`.\n\n\n---\n\n# H3: Proxy Path-Traversal via Percent-Encoded Dot-Segments\n\n**ID**: H3\n**Severity**: HIGH\n**Status**: Confirmed — PoC executed\n**Component**: `middleware/proxy` — `DomainForward`, `BalancerForward`\n**CWE**: CWE-22 (Improper Limitation of a Pathname to a Restricted Directory)\n\n---\n\n## Summary\n\nFiber's proxy middleware forwards the raw, unnormalized request URI\n(`c.OriginalURL()`) to upstream servers with `DisablePathNormalizing: true`\nhardcoded on the fasthttp client. An attacker can send a path like\n`/public/%2e%2e/admin/secret` that Fiber's router accepts as a `/public/*`\nrequest — invoking no admin-level auth middleware — while the upstream server\ndecodes `%2e%2e` to `..` and resolves the path to `/admin/secret`, returning\nprotected content to the unauthenticated caller. The attack requires zero\nprivileges and works against any fasthttp-based upstream.\n\n---\n\n## Vulnerability Details\n\n### Root Cause\n\nThree independent decisions combine to create the parser differential:\n\n| Location | Decision |\n|---|---|\n| `proxy.go:43` | `DisablePathNormalizing: true` on each per-server `HostClient` |\n| `proxy.go:114` | `DisablePathNormalizing: true` on the global `fasthttp.Client` |\n| `proxy.go:243` | `Do(c, addr+c.OriginalURL(), clients...)` — raw URI forwarded verbatim |\n| `ctx.go:290` | `OriginalURL()` returns `fasthttp.Request.Header.RequestURI()` with no normalization |\n\n`DisablePathNormalizing` suppresses the fasthttp client's own dot-segment\nresolution on the outbound request, so the bytes the attacker sent arrive at\nthe upstream unchanged. The upstream fasthttp server then performs its own\nnormalization — decoding `%2e` to `.` and collapsing `../` — before path\nmatching, resolving `/public/%2e%2e/admin/secret` to `/admin/secret`.\n\n### Code Path (attacker request flows)\n\n```\nattacker HTTP request\n  -\u003e fasthttp server (Fiber)\n       -\u003e Fiber router: path = /public/%2e%2e/admin/secret  (encoded literal)\n            -\u003e matches /public/* wildcard route\n            -\u003e admin middleware NOT invoked\n            -\u003e proxy.DomainForward handler\n                 -\u003e proxy.Do(c, addr+c.OriginalURL())   proxy.go:243\n                      -\u003e proxy.doAction                  proxy.go:177\n                           req.SetRequestURI(addr+originalURL)\n                           cli.Do(req, res)              [DisablePathNormalizing:true]\n  -\u003e upstream fasthttp server\n       -\u003e ctx.Path() = /admin/secret   (decoded + normalised by upstream)\n            -\u003e returns 200 \"ADMIN SECRET\"\n  -\u003e attacker receives 200 \"ADMIN SECRET\"\n```\n\n---\n\n## PoC\n\n### Test: `archon/findings/H3-proxy-ssrf-path-traversal/evidence/poc_test.go`\n\nRun:\n\n```\ngo test -v -run 'TestProxySSRFPathTraversal|TestProxySSRFBalancerForward' \\\n    ./archon/findings/H3-proxy-ssrf-path-traversal/evidence/\n```\n\nThe test sets up:\n- A **fasthttp upstream** with `/public/*` (public) and `/admin/secret` (protected).\n- A **Fiber proxy** exposing `/public/*` via `DomainForward`, with an auth guard\n  registered on `/admin`.\n\nThree sub-tests run in sequence:\n\n| Sub-test | Path sent | Expected | Result |\n|---|---|---|---|\n| `baseline_public` | `/public/index.html` | 200 PUBLIC | PASS |\n| `baseline_admin_blocked` | `/admin/secret` | 403 forbidden | PASS (guard fires) |\n| `attack_encoded_traversal` | `/public/%2e%2e/admin/secret` | **200 ADMIN SECRET** | **PASS (guard bypassed)** |\n\n### Executed Output (key lines from `evidence/exploit.log`)\n\n```\n=== RUN   TestProxySSRFPathTraversal/attack_encoded_traversal\n    poc_test.go:198: attacker sent path  : /public/%2e%2e/admin/secret\n    poc_test.go:199: proxy response      : status=200 body=\"ADMIN SECRET\"\n    poc_test.go:201: upstream saw path   : /admin/secret\n    poc_test.go:221: CONFIRMED VULNERABLE:\n    poc_test.go:222:   Fiber router matched : /public/*  (admin guard bypassed)\n    poc_test.go:223:   Upstream decoded to  : /admin/secret\n    poc_test.go:224:   Admin content leaked : \"ADMIN SECRET\"\n--- PASS: TestProxySSRFPathTraversal (0.13s)\n...\n--- PASS: TestProxySSRFBalancerForward (0.13s)\nPASS\nok  github.com/gofiber/fiber/v3/archon/findings/H3-proxy-ssrf-path-traversal/evidence  0.270s\n```\n\n### Environment\n\n```\nOS      : Linux 6.1.0-43-cloud-amd64 x86_64\nGo      : go1.26.1 linux/amd64\nCommit  : fe757ead4950df9a4f4082a0bca3f5e8a899d998\nfasthttp: github.com/valyala/fasthttp v1.70.0\n```\n\n---\n\n## Impact\n\n| Impact | Consequence |\n|---|---|\n| Authentication bypass | Auth middleware bound to `/admin` routes on the Fiber proxy is never invoked |\n| ACL bypass | Path-based access control relying on Fiber's route matching is defeated |\n| Internal endpoint exposure | Upstream endpoints not intended to be exposed are reachable |\n| SSRF assist | Combined with wildcard proxy routes, expands the attacker-reachable surface on any internal upstream |\n\nNo special privileges are required. The payload is a single HTTP request and\nworks from any unauthenticated client. The only dependency is a fasthttp-based\nupstream (the default when using Fiber as the upstream server).\n\n---\n\n## Affected APIs\n\nBoth proxy entry points are affected identically:\n\n- **`DomainForward`** (`proxy.go:243`): `Do(c, addr+c.OriginalURL())`\n- **`BalancerForward`** (`proxy.go:283`): `Do(c, server+c.OriginalURL())`\n\nThe lower-level `Forward` / `Do` functions are also affected when callers pass\nraw `c.OriginalURL()` as the address suffix.\n\n---\n\n## Remediation\n\n**Recommended fix**: normalize the path component of `c.OriginalURL()` before\nforwarding, collapsing percent-encoded dot-segments. A minimal, targeted patch:\n\n```go\n// In doAction (proxy.go), before req.SetRequestURI:\nimport \"path\"\n\nfunc sanitizeProxyURI(rawURI string) string {\n    u, err := url.ParseRequestURI(rawURI)\n    if err != nil {\n        return rawURI\n    }\n    // Decode, clean, then re-encode only the path.\n    decoded, err := url.PathUnescape(u.Path)\n    if err != nil {\n        return rawURI\n    }\n    u.Path = path.Clean(decoded)\n    return u.RequestURI()\n}\n```\n\nAlternatively, set `DisablePathNormalizing: false` on the fasthttp clients used\nfor proxying and document the behaviour clearly, so operators understand that\nupstream path matching will see normalized paths.\n\n**Additional hardening**: expose `ModifyRequest` as a first-class sanitization\nhook and document the parser-differential risk in the proxy middleware README.\n\n---\n\n## References\n\n- `middleware/proxy/proxy.go` lines 43, 114, 177-210, 239-247, 272-285\n- `ctx.go` line 290\n- RFC 3986 §6.2.2.3 — Path Segment Normalization\n- fasthttp `DisablePathNormalizing` option\n\n---\n\n## Evidence Files\n\n| File | Description |\n|---|---|\n| `evidence/poc_test.go` | Self-contained Go test; runs against real Fiber + fasthttp stack |\n| `evidence/exploit.log` | Full `go test -v` output confirming PASS on all three sub-tests |\n| `evidence/impact.log` | Attack-vs-baseline comparison, root cause pin-points |\n| `evidence/env-info.txt` | OS, Go version, module versions at time of execution |\n\nPoC-Status: executed\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite"],"status":"open","cvss_score":0,"repo_name":"gofiber/fiber","finding_hash":"053dc119144038c1ba4c0846c3ca1a3a","found_at":"2026-04-12T09:28:43.962271Z","created_at":"2026-04-12T09:28:43Z"}},{"type":"finding","data":{"id":257,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"1256fcee-8935-40c0-8158-354465bd27d1","module_id":"archon:h4","module_name":"","module_type":"whitebox","finding_source":"archon","module_short":"cache-query-param-blind","description":"Phase: 8\nSequence: 042\nSlug: cache-query-param-blind\nVerdict: VALID\nRationale: Default cache KeyGenerator uses c.Path() only, excluding query parameters in violation of RFC 9111; Advocate confirmed no blocking defense and no workaround via Vary headers since query params are not HTTP headers.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-3/debate.md\n\n## Summary\n\nThe cache middleware's default `KeyGenerator` uses `c.Path()` only, which excludes query parameters from the cache key. This means requests to `/api/user?id=alice` and `/api/user?id=bob` share the same cache key (`/api/user_GET`), causing the first user's response to be served to the second user. This violates RFC 9111 Section 2 which defines cache keys as including the effective request URI (including query string), and creates cross-user data disclosure for any API that differentiates responses by query parameters.\n\n## Location\n\n- `middleware/cache/config.go:90-92` -- Default `KeyGenerator: func(c fiber.Ctx) string { return utils.CopyString(c.Path()) }`\n- `middleware/cache/cache.go:249` -- Cache key construction: `baseKey = cfg.KeyGenerator(c) + \"_\" + requestMethod`\n\n## Attacker Control\n\nNo special attacker control needed. Any two users requesting the same path with different query parameters will collide in the cache. The first response is served to all subsequent requesters.\n\n## Trust Boundary Crossed\n\nUser A's private API response is served to User B via cache collision. The cache middleware crosses the user-to-user trust boundary.\n\n## Impact\n\n- **Cross-user data disclosure**: User A's API response (potentially containing PII, tokens, account data) is served to User B\n- **RFC 9111 violation**: Cache key semantics differ from HTTP specification expectations\n- **Silent failure**: No warning or error -- developers may not realize query params are excluded from cache keys\n\n## Evidence\n\n1. Default KeyGenerator at config.go:90: `c.Path()` -- excludes query string\n2. Cache key at cache.go:249: `cfg.KeyGenerator(c) + \"_\" + requestMethod` -- no query component\n3. Vary header mechanism (cache.go:1257-1313) cannot compensate -- query params are not request headers\n4. No documentation warning about this behavior\n5. RFC 9111 Section 2 requires query string in cache key\n\n## Reproduction Steps\n\n1. Add cache middleware with default config to a Fiber app\n2. Create a handler: `app.Get(\"/api/user\", func(c fiber.Ctx) error { return c.JSON(map[string]string{\"user\": c.Query(\"id\")}) })`\n3. Request 1: `curl http://app/api/user?id=alice` -- returns `{\"user\":\"alice\"}`, cached\n4. Request 2: `curl http://app/api/user?id=bob` -- returns `{\"user\":\"alice\"}` (Alice's cached response!)\n5. Verify: X-Cache header shows \"hit\" on the second request\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Reproduction succeeded -- default KeyGenerator uses c.Path() excluding query params, confirmed by both independent test and project's own test suite at cache_test.go:614-621, causing cross-user data disclosure; however severity is reduced to MEDIUM as this is a documented, intentional default with explicit override mechanism.\nSeverity-Final: MEDIUM\nPoC-Status: executed\n\n### Independent Code Trace\n\n1. `config.go:90-92`: Default `KeyGenerator` returns `utils.CopyString(c.Path())`.\n2. `ctx.go:297-308`: `c.Path()` returns only the path portion of the URL, explicitly excluding query string.\n3. `cache.go:249`: Cache key = `KeyGenerator(c) + \"_\" + requestMethod` -- no query parameter component.\n4. Vary mechanism (`cache.go:1278-1313`) operates on request headers only; cannot differentiate by query params.\n\n### Reproduction Result\n\nTest at `archon/real-env-evidence/cache-query-param-blind/reproduce_test.go` passed:\n- GET `/api/user?id=alice` -\u003e body \"user:alice\", X-Cache: miss\n- GET `/api/user?id=bob` -\u003e body \"user:alice\", X-Cache: hit (cross-user disclosure confirmed)\n\n### Severity Adjustment\n\nOriginal severity HIGH downgraded to MEDIUM because:\n- The cache middleware is opt-in (developer must explicitly add it)\n- The `KeyGenerator` config option provides an explicit override mechanism\n- The config comment documents that `c.Path()` is the default key\n- The project's own test suite (`cache_test.go:614-621`) asserts this behavior as expected/correct\n- This is a common design pattern in cache middleware libraries (simple default, developer customization expected)\n\nThe finding remains CONFIRMED because the default creates a genuine cross-user data disclosure risk that most developers would not anticipate, and there is no explicit security warning about this behavior.\n\nFull review: `archon/adversarial-reviews/cache-query-param-blind-review.md`\n\n\n---\n\n# H4 — Cache Query Parameter Blindness\n\n| Field          | Value                                                      |\n|----------------|------------------------------------------------------------|\n| ID             | H4                                                         |\n| Severity       | HIGH (original) / MEDIUM (post-review)                     |\n| Status         | Confirmed                                                  |\n| PoC-Status     | executed                                                   |\n| Component      | `middleware/cache`                                         |\n| Affected lines | `config.go:90-92`, `cache.go:249`                          |\n| CVSS3 vector   | AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:N/A:N (7.5)                |\n\n## Description\
