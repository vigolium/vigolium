        vigoliumVersion: "v0.0.1-alpha",
        results: [{"type":"finding","data":{"id":911,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-084","module_name":"ArgoCD deep links are configured in the `argocd-cm` ConfigMap and evaluated server-side using Go `text/template` with Sprig functions. The template evaluation context includes the full Application obj","module_type":"whitebox","finding_source":"archon","module_short":"xss-deep-links-template","description":"## Summary\n\nArgoCD deep links are configured in the `argocd-cm` ConfigMap and evaluated server-side using Go `text/template` with Sprig functions. The template evaluation context includes the full Application object (metadata, annotations, labels, spec, status). The evaluated URL is sent to the UI without any protocol validation.\n\nThe UI component `deep-links.tsx` checks if the URL starts with `http` -- if it does, it renders an external `\u003ca href\u003e`. If it does NOT start with `http` (e.g., `javascript:`), it renders a React Router `\u003cLink to\u003e` component. React Router's `\u003cLink to=\"javascript:...\"\u003e` renders as `\u003ca href=\"javascript:...\"\u003e`, which is executable on click.\n\n**Privilege escalation**: While the deep link template itself is admin-configured, the template DATA is populated from the Application object. If an admin configures a template like `url: \"{{.application.metadata.annotations.custom-link}}\"`, any user with `applications:update` permission can set the `custom-link` annotation to `javascript:alert(document.cookie)`, achieving stored XSS without admin access.\n\n## Location\n\n- **Template evaluation**: `server/deeplinks/deeplinks.go:115-129` -- `text/template` with Sprig funcs, no URL validation on output\n- **Template context construction**: `server/deeplinks/deeplinks.go:65-92` -- `CreateDeepLinksObject()` includes full `app.Object` with `metadata.annotations`\n- **UI sink**: `ui/src/app/shared/components/deep-links.tsx:17` -- `\u003cLink to={link.url}\u003e` for non-http URLs\n- **Ineffective guard**: `deep-links.tsx:11` -- `link.url.startsWith('http')` routes `javascript:` to `\u003cLink\u003e` path\n\n## Attacker Control\n\n**Base case (MEDIUM)**: Admin writes malicious deep link URL directly in `argocd-cm`:\n```yaml\ndata:\n  application.links: |\n    - url: \"javascript:alert(document.cookie)\"\n      title: \"Malicious Link\"\n```\n\n**Escalated case (HIGH)**: Admin configures a template referencing app annotations:\n```yaml\ndata:\n  application.links: |\n    - url: \"{{.application.metadata.annotations.dashboard-url}}\"\n      title: \"Dashboard\"\n```\nThen any user with `applications:update` sets annotation:\n```\nkubectl annotate app my-app dashboard-url=\"javascript:alert(document.cookie)\" --overwrite\n```\n\n## Trust Boundary Crossed\n\n- Base case: Admin -\u003e all users viewing deep links (admin already has full control, MEDIUM)\n- Escalated case: Developer with applications:update -\u003e all users viewing the application's deep links (HIGH)\n\n## Impact\n\n- **Session hijacking**: JavaScript executes in ArgoCD UI context\n- **Scope**: Affects all users who view the application page where deep links are rendered\n- **Persistence**: Malicious annotation persists, re-triggering XSS on every page view\n- **Privilege escalation**: Drops required privilege from admin to developer-level applications:update\n\n## Evidence\n\n```go\n// deeplinks.go:65-92 -- Template context includes full app metadata\nfunc CreateDeepLinksObject(resourceObj *unstructured.Unstructured, app *unstructured.Unstructured, ...) map[string]any {\n    deeplinkObj := map[string]any{}\n    if app != nil {\n        deeplinkObj[AppDeepLinkKey] = app.Object      // FULL Application object\n        deeplinkObj[AppDeepLinkShortKey] = app.Object  // including metadata.annotations\n    }\n    // ...\n}\n```\n\n```go\n// deeplinks.go:115-129 -- Template evaluation, NO URL validation on output\nt, err := template.New(\"deep-link\").Funcs(sprigFuncMap).Parse(link.URL)\n// ...\nerr = t.Execute(\u0026finalURL, obj)\n// ...\nfinalLinks = append(finalLinks, \u0026application.LinkInfo{\n    Title: new(link.Title),\n    Url:   new(finalURL.String()),  // Unvalidated URL sent to UI\n})\n```\n\n```typescript\n// deep-links.tsx:11-21 -- startsWith('http') guard is INEFFECTIVE\n{link.url.startsWith('http') ? (\n    \u003ca href={link.url} target='_blank' rel='noopener' ...\u003e\n        ...\n    \u003c/a\u003e\n) : (\n    \u003cLink to={link.url} ...\u003e  {/* javascript: URLs land here */}\n        ...                    {/* React Router renders \u003ca href=\"javascript:...\"\u003e */}\n    \u003c/Link\u003e\n)}\n```\n\n## Reproduction Steps\n\n**Base case (admin)**:\n1. Edit `argocd-cm`:\n   ```yaml\n   data:\n     application.links: |\n       - url: \"javascript:alert(document.cookie)\"\n         title: \"Click Me\"\n   ```\n2. View any application page -- deep link appears\n3. Click \"Click Me\" -- JavaScript executes\n\n**Escalated case (developer)**:\n1. Admin configures annotation-referencing deep link in `argocd-cm`:\n   ```yaml\n   data:\n     application.links: |\n       - url: \"{{.application.metadata.annotations.team-dashboard}}\"\n         title: \"Team Dashboard\"\n   ```\n2. Developer annotates their application:\n   ```\n   kubectl annotate app my-app team-dashboard=\"javascript:alert(document.cookie)\" --overwrite\n   ```\n3. Any user viewing the application sees \"Team Dashboard\" deep link\n4. Clicking executes the JavaScript payload\n","severity":"low","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"server/deeplinks/deeplinks.go:115-129","repo_name":"github.com/argoproj/argo-cd","matched_at":["server/deeplinks/deeplinks.go:115-129","server/deeplinks/deeplinks.go:65-92","ui/src/app/shared/components/deep-links.tsx:17","deep-links.tsx:11"],"finding_hash":"1a32c1fdec2ca7c95676b9df67e5c7b5","found_at":"2026-04-09T18:07:34.412801Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":909,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-082","module_name":"The Helm chart `home` field from `Chart.yaml` is transmitted from the repo-server to the UI without any URL validation. The UI renders it via `window.open(m.home)` in click handlers at two locations. ","module_type":"whitebox","finding_source":"archon","module_short":"xss-helm-chart-home","description":"## Summary\n\nThe Helm chart `home` field from `Chart.yaml` is transmitted from the repo-server to the UI without any URL validation. The UI renders it via `window.open(m.home)` in click handlers at two locations. A malicious Helm chart author (or compromised chart in a public registry) can set `home: \"javascript:alert(document.cookie)\"` to execute JavaScript in the browser of any ArgoCD user who clicks the chart home link icon.\n\nThis is a confirmed bypass of CVE-2022-31035, which fixed `javascript:` URI injection in `networkInfo.externalURLs` but did not address the `Chart.yaml home` field path.\n\n## Location\n\n- **Server-side source**: `reposerver/repository/chart.go:29` -- `Home: chart.Home` (no validation)\n- **Sink 1**: `ui/src/app/applications/components/application-deployment-history/revision-metadata-rows.tsx:50` -- `window.open(m.home)`\n- **Sink 2**: `ui/src/app/applications/components/application-details/application-details.tsx:445` -- `window.open(m.home)`\n\n## Attacker Control\n\nThe attacker controls the `home` field in a Helm chart's `Chart.yaml`. This is a standard metadata field with no validation in the Helm specification, in the ArgoCD repo-server, or in the ArgoCD UI.\n\nAttack vectors:\n1. **Supply chain**: Publish a malicious chart to a public Helm registry (ArtifactHub, etc.)\n2. **Compromised chart**: Modify the `home` field of an existing chart in a private registry\n3. **Direct**: Any user who can push Helm charts to a configured chart repository\n\n## Trust Boundary Crossed\n\nHelm chart author (external, untrusted) -\u003e ArgoCD repo-server (aggregation, no validation) -\u003e ArgoCD UI (all users viewing app details or deployment history)\n\n## Impact\n\n- **Supply chain attack**: A single malicious chart can XSS every ArgoCD instance that references it\n- **Session hijacking**: JavaScript executes in ArgoCD UI context with access to session tokens\n- **Scope**: Affects all users viewing application details or deployment history for apps using the compromised chart\n\n## Evidence\n\n```go\n// reposerver/repository/chart.go:29 (no validation)\nHome: chart.Home\n```\n\n```typescript\n// revision-metadata-rows.tsx:48-51 (VULNERABLE)\n{m.home \u0026\u0026 (\n    \u003ca\n        title={m.home}\n        onClick={e =\u003e {\n            e.stopPropagation();\n            window.open(m.home);\n        }}\u003e\n        \u003ci className='fa fa-external-link-alt' /\u003e\n    \u003c/a\u003e\n)}\n```\n\n```typescript\n// application-details.tsx:440-449 (VULNERABLE -- same pattern)\n{m.home \u0026\u0026 (\n    \u003ca\n        title={m.home}\n        onClick={e =\u003e {\n            e.stopPropagation();\n            window.open(m.home);\n        }}\u003e\n        \u003ci className='fa fa-external-link-alt' /\u003e\n    \u003c/a\u003e\n)}\n```\n\n## Reproduction Steps\n\n1. Create a Helm chart with `Chart.yaml`:\n   ```yaml\n   apiVersion: v2\n   name: malicious-chart\n   version: 0.1.0\n   home: \"javascript:alert(document.cookie)\"\n   ```\n2. Push the chart to a Helm repository configured in ArgoCD\n3. Create an ArgoCD Application using this chart\n4. Navigate to the application details or deployment history page\n5. Click the external link icon next to the Helm chart name\n6. JavaScript executes in the ArgoCD UI context\n","severity":"high","confidence":"tentative","tags":["archon","phase-8","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"reposerver/repository/chart.go:29","repo_name":"github.com/argoproj/argo-cd","matched_at":["reposerver/repository/chart.go:29","ui/src/app/applications/components/application-deployment-history/revision-metadata-rows.tsx:50","ui/src/app/applications/components/application-details/application-details.tsx:445"],"finding_hash":"7dc7997e1cfd95a9940ff8c54bd7a661","found_at":"2026-04-09T18:07:34.4128Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":910,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-083","module_name":"The Application `spec.source.repoURL` field is rendered directly into `\u003ca href\u003e` and `window.open()` calls in the sync panel and application details views without URL protocol validation. An attacker ","module_type":"whitebox","finding_source":"archon","module_short":"xss-repo-url","description":"## Summary\n\nThe Application `spec.source.repoURL` field is rendered directly into `\u003ca href\u003e` and `window.open()` calls in the sync panel and application details views without URL protocol validation. An attacker who can create or modify Application resources (via ArgoCD API with wildcard `sourceRepos` configuration or via direct Kubernetes API write) can inject a `javascript:` URI that executes when any user views the sync panel or application details.\n\nThis is a confirmed bypass of CVE-2025-47933, which fixed XSS via repoURL on the repositories page but did not address the sync panel (`application-sync-panel.tsx`) or application details (`application-details.tsx`) views.\n\n## Location\n\n- **Sink 1**: `ui/src/app/applications/components/application-sync-panel/application-sync-panel.tsx:252` -- `\u003ca href={source.repoURL}\u003e`\n- **Sink 2**: `ui/src/app/applications/components/application-details/application-details.tsx:388` -- `window.open(aSource.repoURL)` (Helm chart source)\n- **Sink 3**: `ui/src/app/applications/components/application-details/application-details.tsx:480` -- `window.open(aSource.repoURL)` (multi-source)\n\n## Attacker Control\n\nThe attacker controls `spec.source.repoURL` on an Application resource. Two paths:\n\n1. **Via ArgoCD API**: Requires the project to have `sourceRepos: [\"*\"]` (wildcard). This is a common configuration in permissive environments. The API validates repoURL against the sourceRepos allowlist but performs no protocol validation.\n\n2. **Via direct Kubernetes API**: Users with `kubectl` access to the ArgoCD namespace can write Application CRDs directly, bypassing all ArgoCD API validation including the sourceRepos allowlist.\n\n## Trust Boundary Crossed\n\nApplication creator (with wildcard sourceRepos or k8s access) -\u003e all ArgoCD UI users viewing the application's sync panel or details\n\n## Impact\n\n- **Session hijacking**: JavaScript executes in ArgoCD UI context\n- **Scope**: Affects all users who open the sync panel or view application details for the compromised application\n- **Persistence**: Malicious repoURL persists in the Application spec\n\n## Evidence\n\n```typescript\n// application-sync-panel.tsx:251-253 (VULNERABLE)\n\u003ch6\u003e\n    Synchronizing application manifests from \u003ca href={source.repoURL}\u003e{source.repoURL}\u003c/a\u003e\n\u003c/h6\u003e\n```\n\n```typescript\n// application-details.tsx:386-391 (VULNERABLE)\n\u003ca\n    title={sources[indx].chart}\n    onClick={e =\u003e {\n        e.stopPropagation();\n        window.open(aSource.repoURL);\n    }}\u003e\n    \u003ci className='fa fa-external-link-alt' /\u003e\n\u003c/a\u003e\n```\n\n## Reproduction Steps\n\n1. Ensure the target ArgoCD project has `sourceRepos: [\"*\"]` (or use direct k8s write)\n2. Create an Application with:\n   ```yaml\n   spec:\n     source:\n       repoURL: \"javascript:alert(document.cookie)\"\n       path: \".\"\n   ```\n3. Navigate to the application in the ArgoCD UI\n4. Open the Sync panel -- observe the `\u003ca href=\"javascript:...\"\u003e` link\n5. Click the link or view application details where `window.open(repoURL)` is called\n6. JavaScript executes in the ArgoCD UI context\n\nAlternative (direct k8s write -- bypasses sourceRepos):\n```\nkubectl apply -f - \u003c\u003cEOF\napiVersion: argoproj.io/v1alpha1\nkind: Application\nmetadata:\n  name: xss-test\n  namespace: argocd\nspec:\n  project: default\n  source:\n    repoURL: \"javascript:alert(document.cookie)\"\n    path: \".\"\n  destination:\n    server: https://kubernetes.default.svc\n    namespace: default\nEOF\n```\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"ui/src/app/applications/components/application-sync-panel/application-sync-panel.tsx:252","repo_name":"github.com/argoproj/argo-cd","matched_at":["ui/src/app/applications/components/application-sync-panel/application-sync-panel.tsx:252","ui/src/app/applications/components/application-details/application-details.tsx:388","ui/src/app/applications/components/application-details/application-details.tsx:480"],"finding_hash":"76640e91efafcbce8005bf2a58b98c77","found_at":"2026-04-09T18:07:34.4128Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":908,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-081","module_name":"The UI banner component renders the `uiBannerURL` setting from the `argocd-cm` ConfigMap directly into an `\u003ca href\u003e` attribute without URL validation. In contrast, the `chatUrl` setting in the same co","module_type":"whitebox","finding_source":"archon","module_short":"xss-ui-banner-url","description":"## Summary\n\nThe UI banner component renders the `uiBannerURL` setting from the `argocd-cm` ConfigMap directly into an `\u003ca href\u003e` attribute without URL validation. In contrast, the `chatUrl` setting in the same component IS validated via the `ExternalLink` constructor which calls `isValidURL()`. This inconsistency confirms an oversight rather than a deliberate design decision.\n\nWhile exploitation requires admin-level write access to the `argocd-cm` ConfigMap, the banner is displayed to ALL authenticated ArgoCD users, creating a stored XSS vector that enables credential persistence (surviving password rotation) and lateral movement across admin accounts.\n\n## Location\n\n- **Sink**: `ui/src/app/ui-banner/ui-banner.tsx:26` -- `\u003ca href={props.url}\u003e` with no validation\n- **Source**: `argocd-cm` ConfigMap, key `ui.bannerurl`\n- **Protected parallel path**: `chatUrl` in same component uses `ExternalLink` which validates via `isValidURL()`\n\n## Attacker Control\n\nThe attacker must have write access to the `argocd-cm` ConfigMap in the ArgoCD namespace. This requires either:\n- ArgoCD admin RBAC\n- Kubernetes RBAC granting ConfigMap write in the ArgoCD namespace\n\nThe attacker sets `ui.bannerurl: \"javascript:alert(document.cookie)\"` with any `ui.bannercontent` value. The banner is then rendered to ALL users.\n\n## Trust Boundary Crossed\n\nAdmin with ConfigMap write -\u003e ALL authenticated ArgoCD users (including other admins)\n\n## Impact\n\n- **Credential persistence**: Stored XSS survives admin password rotation -- the malicious banner persists in the ConfigMap\n- **Lateral movement**: One compromised admin account can steal session tokens of all other admins\n- **Universal visibility**: Banner is displayed on every page of the ArgoCD UI\n\n## Evidence\n\n```typescript\n// ui-banner.tsx:25-27 (VULNERABLE)\n{props.url !== undefined ? (\n    \u003ca href={props.url} target='_blank' rel='noopener noreferrer'\u003e\n        {props.content}\n    \u003c/a\u003e\n) : (\n    \u003cReact.Fragment\u003e{props.content}\u003c/React.Fragment\u003e\n)}\n```\n\n## Reproduction Steps\n\n1. As an ArgoCD admin, edit the `argocd-cm` ConfigMap:\n   ```\n   kubectl edit configmap argocd-cm -n argocd\n   ```\n2. Add:\n   ```yaml\n   data:\n     ui.bannercontent: \"Important Notice\"\n     ui.bannerurl: \"javascript:alert(document.cookie)\"\n   ```\n3. Any user navigating to the ArgoCD UI sees the banner\n4. Clicking \"Important Notice\" executes the JavaScript payload\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"ui/src/app/ui-banner/ui-banner.tsx:26","repo_name":"github.com/argoproj/argo-cd","matched_at":["ui/src/app/ui-banner/ui-banner.tsx:26"],"finding_hash":"0e54586464279445f9b91f3bd324236b","found_at":"2026-04-09T18:07:34.412799Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":906,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-065","module_name":"ArgoCD cache key generation in `generateFullKey()` uses the format `\u003ckey\u003e|\u003ccacheVersion\u003e` with no instance identifier, namespace, or tenant prefix. When multiple ArgoCD instances share the same Redis ","module_type":"whitebox","finding_source":"archon","module_short":"redis-key-namespace-collision","description":"## Summary\n\nArgoCD cache key generation in `generateFullKey()` uses the format `\u003ckey\u003e|\u003ccacheVersion\u003e` with no instance identifier, namespace, or tenant prefix. When multiple ArgoCD instances share the same Redis instance (a documented cost-optimization pattern), cache keys collide if applications have the same name and instances use the same build version. This enables cross-instance cache poisoning: one instance's data overwrites another's, and pub/sub channels (which use the same key format) trigger callbacks across all instances indiscriminately. Combined with the auto-sync cache poisoning attack (p8-060), this creates a cross-tenant attack path.\n\n## Location\n\n- `util/cache/cache.go:335-339` -- `generateFullKey()`: `fmt.Sprintf(\"%s|%s\", key, common.CacheVersion)` with no instance prefix\n- `util/cache/redis.go:151` -- `OnUpdated`: subscribes to Redis pub/sub channels with no instance prefix\n- `util/cache/twolevelclient.go:48` -- `twoLevelClient.Get()`: serves cached data without instance verification\n\n## Attacker Control\n\nIn a shared Redis deployment, Tenant A can:\n1. Write cache entries that collide with Tenant B's application keys\n2. Publish to pub/sub channels that trigger callbacks in Tenant B's controllers\n3. Read Tenant B's cached application state (information leakage)\n\n## Trust Boundary Crossed\n\nCross-tenant isolation boundary via shared Redis instance. One ArgoCD instance's data and control channels are not isolated from another's.\n\n## Impact\n\n- Cross-tenant information leakage (application state, sync status, managed resources)\n- Cross-tenant cache poisoning leading to unauthorized auto-sync (via p8-060 chain)\n- Cross-tenant pub/sub manipulation forcing cache invalidation and re-reads\n- Non-deterministic behavior: one tenant's cache writes affect another tenant's reconciliation\n\n## Evidence\n\n```\n# No instance identifier in key generation:\nutil/cache/cache.go:335  func (c *Cache) generateFullKey(key string) string {\nutil/cache/cache.go:339      return fmt.Sprintf(\"%s|%s\", key, common.CacheVersion)\n                             # No instance ID, no namespace prefix, no tenant isolation\n\n# Pub/sub channels also lack instance isolation:\nutil/cache/redis.go:151  # OnUpdated subscribes to channels using the same key format\n```\n\n## Reproduction Steps\n\n1. Deploy two ArgoCD instances (Instance A and Instance B) sharing the same Redis instance.\n2. Ensure both instances use the same ArgoCD build version (same `common.CacheVersion`).\n3. Create an application named `test-app` in both instances.\n4. In Instance A, write a cache entry for `app|managed-resources|test-app|\u003ccacheVersion\u003e`.\n5. Observe Instance B's controller reading Instance A's data from the cache.\n6. Publish to the shared pub/sub channel to force Instance B to re-read the poisoned cache entry.\n7. If Instance B has auto-sync enabled, it may sync to data planted by Instance A.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/cache/cache.go:335-339","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/cache/cache.go:335-339","util/cache/redis.go:151","util/cache/twolevelclient.go:48"],"finding_hash":"aa2cde0a83fa0a7099f38ad90b2c433f","found_at":"2026-04-09T18:07:34.412798Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":907,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-080","module_name":"The application summary view in the ArgoCD UI renders external URLs from `app.status.summary.externalURLs` directly into `\u003ca href\u003e` attributes without URL validation or protocol filtering. These URLs ","module_type":"whitebox","finding_source":"archon","module_short":"xss-external-urls","description":"## Summary\n\nThe application summary view in the ArgoCD UI renders external URLs from `app.status.summary.externalURLs` directly into `\u003ca href\u003e` attributes without URL validation or protocol filtering. These URLs are populated by the application controller from annotations on ANY resource in a managed Kubernetes cluster (annotation prefix: `link.argocd.argoproj.io/`). An attacker who can annotate a resource (Service, Deployment, Pod, etc.) in a managed cluster can inject a `javascript:` URI that executes in the browser of any ArgoCD user viewing the application summary.\n\nThis is a regression of CVE-2024-28175. The original fix applied `isValidURL()` validation in the `ExternalLink` constructor used by the `ApplicationURLs` component, but the `application-summary.tsx` view has a separate rendering path that bypasses this validation entirely.\n\nThe default Content Security Policy (`frame-ancestors 'self';`) provides no `script-src` directive, so there is no browser-level XSS mitigation.\n\n## Location\n\n- **Sink (primary)**: `ui/src/app/applications/components/application-summary/application-summary.tsx:277` -- `\u003ca href={parts[1]}\u003e` where `parts` from `item.split('|')`\n- **Source**: `controller/cache/info.go:41-47` -- annotation values with prefix `link.argocd.argoproj.io/` appended to `res.NetworkingInfo.ExternalURLs` without validation\n- **Protected parallel path (for contrast)**: `ui/src/app/applications/components/application-urls.tsx:26` -- `ExternalLink` constructor calls `isValidURL()` which blocks `javascript:`, `data:`, `vbscript:`\n- **CSP**: `cmd/argocd-server/commands/argocd_server.go:324` -- default `frame-ancestors 'self';` (no script-src)\n\n## Attacker Control\n\nThe attacker controls the annotation VALUE on any Kubernetes resource in a managed cluster. The annotation key must have prefix `link.argocd.argoproj.io/`. The value is pipe-delimited: `\"Display Text|javascript:alert(document.cookie)\"`. The controller reads annotations verbatim and stores them in `app.status.summary.externalURLs`. The UI splits by `|` and renders `parts[1]` directly into `\u003ca href\u003e`.\n\nRequired privilege: write access to ANY resource (Service, Deployment, Pod, ConfigMap, etc.) in a namespace managed by ArgoCD. This is a common developer-level privilege.\n\n## Trust Boundary Crossed\n\nManaged cluster resource annotation (developer-level write) -\u003e ArgoCD application controller (aggregation, no validation) -\u003e ArgoCD API server (no validation) -\u003e ArgoCD UI (rendered in browser of ALL users viewing the application)\n\nThe trust boundary crossed is: managed cluster developer -\u003e all ArgoCD UI users (including admins).\n\n## Impact\n\n- **Session hijacking**: Attacker JavaScript executes in the context of the ArgoCD UI origin, with access to session tokens/cookies\n- **RBAC bypass**: Stolen admin session enables full ArgoCD administrative access\n- **Persistence**: The malicious annotation persists in the cluster, re-triggering XSS on every page view\n- **Lateral movement**: Affects ALL users who view the compromised application's summary page\n- **Supply chain**: A compromised workload in any managed cluster can XSS the ArgoCD control plane\n\n## Evidence\n\n```typescript\n// application-summary.tsx:267-281 (VULNERABLE -- no isValidURL() call)\nconst urls = app.status.summary.externalURLs || [];\nif (urls.length \u003e 0) {\n    attributes.push({\n        title: 'URLs',\n        view: (\n            \u003cdiv className='application-summary__links-rows'\u003e\n                {urls\n                    .map(item =\u003e item.split('|'))\n                    .map((parts, i) =\u003e (\n                        \u003cdiv className='application-summary__links-row'\u003e\n                            \u003ca key={i} href={parts.length \u003e 1 ? parts[1] : parts[0]} target='_blank'\u003e\n                                {parts[0]} \u0026nbsp;\n                            \u003c/a\u003e\n                        \u003c/div\u003e\n                    ))}\n            \u003c/div\u003e\n        )\n    });\n}\n```\n\n```go\n// controller/cache/info.go:41-47 (SOURCE -- no validation)\nfor k, v := range un.GetAnnotations() {\n    if strings.HasPrefix(k, common.AnnotationKeyLinkPrefix) {\n        if res.NetworkingInfo == nil {\n            res.NetworkingInfo = \u0026v1alpha1.ResourceNetworkingInfo{}\n        }\n        res.NetworkingInfo.ExternalURLs = append(res.NetworkingInfo.ExternalURLs, v)\n    }\n}\n```\n\n```typescript\n// application-urls.tsx:26 (PROTECTED parallel path -- for contrast)\nif (!isValidURL(this.ref)) {\n    throw new InvalidExternalLinkError('Invalid URL');\n}\n```\n\n## Reproduction Steps\n\n1. Deploy an application via ArgoCD that manages a Kubernetes namespace\n2. In the managed namespace, annotate any resource:\n   ```\n   kubectl annotate deployment my-app link.argocd.argoproj.io/xss=\"Click Here|javascript:alert(document.cookie)\"\n   ```\n3. Wait for ArgoCD controller to reconcile (or trigger manual refresh)\n4. Navigate to the application summary page in the ArgoCD UI\n5. Observe the \"URLs\" section contains a link labeled \"Click Here\"\n6. Click the link -- JavaScript executes in the ArgoCD UI context\n\nNote: The `ApplicationURLs` component (used in the resource tree view) IS protected by `isValidURL()`. Only the application summary detail view at `application-summary.tsx` is vulnerable.\n","severity":"high","confidence":"tentative","tags":["archon","phase-8","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"ui/src/app/applications/components/application-summary/application-summary.tsx:277","repo_name":"github.com/argoproj/argo-cd","matched_at":["ui/src/app/applications/components/application-summary/application-summary.tsx:277","controller/cache/info.go:41-47","ui/src/app/applications/components/application-urls.tsx:26","cmd/argocd-server/commands/argocd_server.go:324"],"finding_hash":"416567be2bd5fd2b907b247ee775d032","found_at":"2026-04-09T18:07:34.412798Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":905,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-064","module_name":"ArgoCD stores JWT token revocation status in Redis using keys prefixed with `revokedTokenPrefix`. The `userStateStorage` component performs a full resync from Redis every 15 seconds via `loadRevokedTo","module_type":"whitebox","finding_source":"archon","module_short":"redis-revocation-bypass","description":"## Summary\n\nArgoCD stores JWT token revocation status in Redis using keys prefixed with `revokedTokenPrefix`. The `userStateStorage` component performs a full resync from Redis every 15 seconds via `loadRevokedTokens()`, which completely replaces the in-memory revocation map with the current Redis state. An attacker with Redis write access can delete revocation keys, causing previously-revoked tokens to become valid again within 15 seconds. This effectively allows an attacker to \"un-fire\" terminated users, re-enable compromised accounts, or bypass token revocation as a security control.\n\n## Location\n\n- `util/session/state.go:85-111` -- `loadRevokedTokens()`: full resync from Redis, replaces in-memory map\n- `util/session/state.go:104` -- `storage.revokedTokens = redisRevokedTokens`: complete map replacement\n- `util/session/state.go:36` -- `resyncDuration: time.Second * 15`: 15-second resync interval\n- `util/session/state.go:122-131` -- `RevokeToken()`: writes revocation to Redis key\n- `util/session/state.go:133-137` -- `IsTokenRevoked()`: reads from in-memory map\n- `util/session/sessionmanager.go:293-294` -- token validation checks revocation status\n\n## Attacker Control\n\nThe attacker controls Redis key deletion:\n1. `DEL revokedTokenPrefix+\u003ctokenId\u003e` removes a specific revocation entry\n2. `DEL revokedTokenPrefix+*` (via SCAN + DEL) removes all revocation entries\n3. Within 15 seconds, `loadRevokedTokens()` resyncs and loses all deleted revocations\n\n## Trust Boundary Crossed\n\nRedis (network-accessible cache service) to authentication/session management. The token revocation system trusts Redis as the authoritative revocation store without integrity verification.\n\n## Impact\n\n- Previously-revoked JWT tokens become valid again (session un-revocation)\n- Terminated user accounts regain access within 15 seconds of Redis manipulation\n- Compromised tokens that were explicitly revoked become usable again\n- Combined with Redis cache poisoning (p8-060): same attacker position enables both cluster compromise and authentication bypass\n\n## Evidence\n\n```\n# Full resync replaces in-memory revocation map:\nutil/session/state.go:85   func (storage *userStateStorage) loadRevokedTokens() error {\nutil/session/state.go:86       redisRevokedTokens := map[string]bool{}\nutil/session/state.go:87       iterator := storage.redis.Scan(context.Background(), 0, revokedTokenPrefix+\"*\", 10000).Iterator()\nutil/session/state.go:104      storage.revokedTokens = redisRevokedTokens  # COMPLETE REPLACEMENT\n\n# 15-second resync interval:\nutil/session/state.go:36   resyncDuration: time.Second * 15\n\n# Token validation relies on in-memory map:\nutil/session/state.go:133  func (storage *userStateStorage) IsTokenRevoked(id string) bool {\nutil/session/state.go:136      return storage.revokedTokens[id]\n\n# Session manager rejects revoked tokens:\nutil/session/sessionmanager.go:293  if mgr.storage.IsTokenRevoked(id) {\nutil/session/sessionmanager.go:294      return nil, \"\", errors.New(\"token is revoked, please re-login\")\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with default Redis configuration (no TLS, no AUTH).\n2. Create a user session and note the JWT token.\n3. Revoke the token via the ArgoCD API (`argocd account delete-token` or API call).\n4. Verify the token is rejected: API calls with the revoked token return \"token is revoked, please re-login\".\n5. From a pod in the same namespace, connect to Redis and delete the revocation key: `DEL \"revokedTokenPrefix|\u003ctokenId\u003e\"`.\n6. Wait up to 15 seconds for the next resync cycle.\n7. Retry the API call with the previously-revoked token: it now succeeds.\n","severity":"low","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-blocked"],"status":"open","cvss_score":0,"source_file":"util/session/state.go:85-111","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/session/state.go:85-111","util/session/state.go:104","util/session/state.go:36","util/session/state.go:122-131","util/session/state.go:133-137","util/session/sessionmanager.go:293-294"],"finding_hash":"76378a3268f78d673a062121a0a9d194","found_at":"2026-04-09T18:07:34.412796Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":904,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-063","module_name":"The ArgoCD repo-server uses a GIT_ASKPASS IPC mechanism to inject Git credentials into git subprocess invocations. The askpass gRPC server listens on a Unix socket at `/tmp/reposerver-ask-pass.sock` w","module_type":"whitebox","finding_source":"archon","module_short":"askpass-socket-credential-theft","description":"## Summary\n\nThe ArgoCD repo-server uses a GIT_ASKPASS IPC mechanism to inject Git credentials into git subprocess invocations. The askpass gRPC server listens on a Unix socket at `/tmp/reposerver-ask-pass.sock` with no socket-level authentication. A UUID nonce is the sole access control, but the nonce is not consumed on first use and remains valid for the entire duration of the git operation (which can last minutes for large repositories). The nonce is stored in the git subprocess environment (`ASKPASS_NONCE`) and is readable from `/proc/\u003cpid\u003e/environ` by co-located processes with shared PID namespace or same UID. The `/tmp` directory is an emptyDir volume shared with CMP sidecar containers.\n\n## Location\n\n- `util/askpass/server.go:64-67` -- `lc.Listen(\"unix\", path)`: creates socket with no chmod\n- `util/askpass/server.go:53-61` -- `GetCredentials(q.Nonce)`: returns credentials with nonce-only auth\n- `util/askpass/server.go:86-93` -- `Add()`: stores credentials with UUID nonce\n- `util/askpass/server.go:96-100` -- `Remove(id)`: called AFTER git completes, not on first use\n- `util/askpass/common.go:7` -- socket path: `/tmp/reposerver-ask-pass.sock`\n\n## Attacker Control\n\nThe attacker needs:\n1. Access to the `/tmp` volume (shared emptyDir in default deployment)\n2. The UUID nonce (obtainable from `/proc/\u003cgit-pid\u003e/environ` if PID namespace shared, or by monitoring the socket for incoming connections)\n\nWith the nonce, the attacker calls `GetCredentials(nonce)` on the askpass gRPC server to receive plaintext Git credentials.\n\n## Trust Boundary Crossed\n\nShared filesystem volume (`/tmp` emptyDir) to Git credential store. The askpass server trusts any process that can present a valid nonce, regardless of process identity.\n\n## Impact\n\n- Plaintext Git repository credentials (username + password/token) for any repository being actively cloned or fetched\n- Credentials can be used to access the Git repository directly, potentially modifying source code\n- Window of opportunity scales with git operation duration (minutes for large repos)\n- Nonce is reusable: can be called multiple times during the window\n\n## Evidence\n\n```\n# Socket created with no authentication:\nutil/askpass/server.go:64  func (s *server) Start(path string) (utilio.Closer, error) {\nutil/askpass/server.go:65      _ = os.Remove(path)\nutil/askpass/server.go:66      lc := \u0026net.ListenConfig{}\nutil/askpass/server.go:67      listener, err := lc.Listen(context.Background(), \"unix\", path)\n                               # No os.Chmod -- socket is world-accessible\n\n# Nonce is the only auth, not consumed on use:\nutil/askpass/server.go:53  func (s *server) GetCredentials(_ context.Context, q *CredentialsRequest) (*CredentialsResponse, error) {\nutil/askpass/server.go:57      creds, ok := s.getCreds(q.Nonce)\nutil/askpass/server.go:61      return \u0026CredentialsResponse{Username: creds.Username, Password: creds.Password}, nil\n                               # Nonce NOT deleted after returning credentials\n\n# Remove only called by external caller after git completes:\nutil/askpass/server.go:96  func (s *server) Remove(id string) {\nutil/askpass/server.go:100     delete(s.creds, id)\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with a CMP sidecar that mounts the `/tmp` volume.\n2. Trigger a git clone operation for a repository with credentials configured.\n3. From the sidecar container, list processes or read `/proc/*/environ` (requires `shareProcessNamespace: true`).\n4. Extract `ASKPASS_NONCE` from the git subprocess environment.\n5. Connect to `/tmp/reposerver-ask-pass.sock` and call `GetCredentials(nonce)`.\n6. Receive plaintext Git credentials (username + password/token).\n7. Note: even without `shareProcessNamespace`, the socket itself at `/tmp/reposerver-ask-pass.sock` is accessible. The nonce is the remaining barrier, which can be obtained if PID namespace is shared or through other information leakage paths.\n","severity":"low","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-blocked"],"status":"open","cvss_score":0,"source_file":"util/askpass/server.go:64-67","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/askpass/server.go:64-67","util/askpass/server.go:53-61","util/askpass/server.go:86-93","util/askpass/server.go:96-100","util/askpass/common.go:7"],"finding_hash":"ee184a24bcbd94f11f998afb6be53349","found_at":"2026-04-09T18:07:34.412795Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":902,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-061","module_name":"The ArgoCD repo-server discovers Config Management Plugins (CMP) by scanning a shared directory for Unix socket files. Any `.sock` file found in `/home/argocd/cmp-server/plugins/` is treated as a legi","module_type":"whitebox","finding_source":"archon","module_short":"cmp-socket-impersonation","description":"## Summary\n\nThe ArgoCD repo-server discovers Config Management Plugins (CMP) by scanning a shared directory for Unix socket files. Any `.sock` file found in `/home/argocd/cmp-server/plugins/` is treated as a legitimate plugin endpoint and connected to using unauthenticated gRPC (`insecure.NewCredentials()`). A malicious process with write access to this shared `emptyDir` volume can create a fake socket implementing the CMP gRPC service, intercept application manifest generation, return arbitrary Kubernetes manifests, and -- by claiming `ProvideGitCreds=true` -- receive full Git repository credentials and source code. The scan is always active even when no CMP plugins are configured.\n\n## Location\n\n- `util/app/discovery/discovery.go:113` -- `os.ReadDir(pluginSockFilePath)`: scans all socket files\n- `util/app/discovery/discovery.go:118-119` -- connects to any `os.ModeSocket` file with `insecure.NewCredentials()`\n- `reposerver/repository/repository.go:2301` -- `CheckPluginConfiguration`: trusts plugin response unconditionally\n- `reposerver/repository/repository.go:2306-2308` -- sends Git credentials when `ProvideGitCreds=true`\n- `common/common.go:108` -- `DefaultPluginSockFilePath = \"/home/argocd/cmp-server/plugins\"`\n- `manifests/base/repo-server/argocd-repo-server-deployment.yaml:370-371` -- `emptyDir: {}` volume `plugins`\n\n## Attacker Control\n\nThe attacker controls the fake CMP gRPC server responses:\n- `MatchRepository` returns `true` to intercept specific application types\n- `CheckPluginConfiguration` returns `ProvideGitCreds: true` to request credentials\n- `GenerateManifest` returns arbitrary Kubernetes manifests\n- Receives full application source code via tar stream and Git credential environment variables\n\n## Trust Boundary Crossed\n\nShared filesystem volume (emptyDir between containers in the same pod) to manifest generation pipeline and Git credential store. The repo-server trusts any socket in the plugin directory as a legitimate CMP endpoint.\n\n## Impact\n\n- Arbitrary Kubernetes manifest injection into ArgoCD-managed applications\n- Git repository credential theft (username, password/token) for all repositories processed by the intercepted plugin\n- Full application source code exfiltration via the tar stream sent to the plugin\n- Persistent: fake plugin remains active until the socket is removed\n\n## Evidence\n\n```\n# Socket discovery with no authentication:\nutil/app/discovery/discovery.go:113  fileList, err := os.ReadDir(pluginSockFilePath)\nutil/app/discovery/discovery.go:118  if file.Type() == os.ModeSocket {\nutil/app/discovery/discovery.go:119      conn, cmpClient, connFound, lastErr = cmpSupports(...)\n                                         # Uses insecure.NewCredentials() -- no auth\n\n# Git credential delivery to fake plugin:\nreposerver/repository/repository.go:2306  if pluginConfigResponse.ProvideGitCreds {\nreposerver/repository/repository.go:2308      env = append(env, environ...)  # Git creds in env\n\n# Default Helm chart creates writable volume:\nmanifests/base/repo-server/argocd-repo-server-deployment.yaml:370  - emptyDir: {}\nmanifests/base/repo-server/argocd-repo-server-deployment.yaml:371    name: plugins\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with default Helm chart. Note the `plugins` emptyDir volume is always present.\n2. Add a CMP sidecar container to the repo-server pod that mounts the `plugins` volume.\n3. In the sidecar, create a gRPC server implementing `ConfigManagementPluginService` and listen on `/home/argocd/cmp-server/plugins/evil.sock`.\n4. Implement `MatchRepository` to return `true` for target applications.\n5. Implement `CheckPluginConfiguration` to return `ProvideGitCreds: true`.\n6. Observe: repo-server discovers the socket, routes applications to the fake plugin, and delivers Git credentials and source code via tar stream.\n7. Note: even without CMP sidecars, the scan path is active. A container breakout or compromised init container with volume access would suffice.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"util/app/discovery/discovery.go:113","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/app/discovery/discovery.go:113","util/app/discovery/discovery.go:118-119","reposerver/repository/repository.go:2301","reposerver/repository/repository.go:2306-2308","common/common.go:108","manifests/base/repo-server/argocd-repo-server-deployment.yaml:370-371"],"finding_hash":"4282a7228062a0a6d3ac5f92dae7d811","found_at":"2026-04-09T18:07:34.412794Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":903,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-062","module_name":"The ArgoCD Lua scripting sandbox can be disabled per-resource-type via the `resource.customizations.useOpenLibs.\u003cGVK\u003e: \"true\"` key in the `argocd-cm` ConfigMap. When `useOpenLibs` is set to `true`, th","module_type":"whitebox","finding_source":"archon","module_short":"lua-openlibs-sandbox-escape","description":"## Summary\n\nThe ArgoCD Lua scripting sandbox can be disabled per-resource-type via the `resource.customizations.useOpenLibs.\u003cGVK\u003e: \"true\"` key in the `argocd-cm` ConfigMap. When `useOpenLibs` is set to `true`, the gopher-lua VM is created with `SkipOpenLibs=false`, which loads all standard libraries including `io` (file I/O) and the full `os` library. While the code manually loads a \"safe\" OS library that only exposes `os.time()` and `os.date()`, the `io` library is not overwritten, leaving `io.open()` and `io.popen()` fully available. This enables reading the Kubernetes service account token, `REDIS_PASSWORD`, and other sensitive data from the process environment and filesystem. Combined with Redis cache poisoning (p8-060), this creates a chain from admin ConfigMap access to full cluster takeover.\n\n## Location\n\n- `util/lua/lua.go:76-77` -- `lua.NewState(lua.Options{SkipOpenLibs: !vm.UseOpenLibs})`: sandbox toggle\n- `util/lua/lua.go:85-89` -- manually loads safe OS library, but `io` library not overridden\n- `util/lua/oslib_safe.go:28-31` -- safe OS only exposes `os.time` and `os.date`\n- `util/settings/settings.go:1114` -- `case \"useOpenLibs\"`: parses from ConfigMap\n- `util/lua/lua.go:102` -- 1-second context timeout (insufficient to prevent fast reads)\n\n## Attacker Control\n\nThe attacker controls:\n1. The ConfigMap key `resource.customizations.useOpenLibs.\u003cGVK\u003e: \"true\"` (requires admin RBAC or GitOps push access)\n2. The Lua script content in `resource.customizations.health.\u003cGVK\u003e` or `resource.customizations.actions.\u003cGVK\u003e`\n3. The Lua script executes with full `io` library access in the controller/repo-server process context\n\n## Trust Boundary Crossed\n\nKubernetes ConfigMap (admin-writable configuration) to process-level code execution with filesystem and environment access. In GitOps-managed ArgoCD deployments, the boundary is from Git repository (developer-writable) to process execution.\n\n## Impact\n\n- Read Kubernetes service account token: `io.open(\"/var/run/secrets/kubernetes.io/serviceaccount/token\"):read(\"*a\")`\n- Read `REDIS_PASSWORD` from environment (enables p8-060 chain even with Redis AUTH)\n- Read any file accessible to the controller/repo-server process\n- Execute commands via `io.popen()` (subject to 1-second timeout)\n- Chain to full cluster takeover via Redis cache poisoning (p8-060)\n\n## Evidence\n\n```\n# Sandbox disabled when UseOpenLibs=true:\nutil/lua/lua.go:76  l := lua.NewState(lua.Options{\nutil/lua/lua.go:77      SkipOpenLibs: !vm.UseOpenLibs,  # false when UseOpenLibs=true\n                    })\n\n# Safe OS library only covers os.time and os.date:\nutil/lua/oslib_safe.go:28  var osFuncs = map[string]lua.LGFunction{\nutil/lua/oslib_safe.go:29      \"time\": osTime,\nutil/lua/oslib_safe.go:30      \"date\": osDate,\n                           }\n# io library is NOT overwritten -- io.open, io.popen remain available\n\n# ConfigMap parsing:\nutil/settings/settings.go:1114  case \"useOpenLibs\":\nutil/settings/settings.go:1115      useOpenLibs, err := strconv.ParseBool(v)\nutil/settings/settings.go:1119      overrideVal.UseOpenLibs = useOpenLibs\n```\n\n## Reproduction Steps\n\n1. As admin, edit `argocd-cm` ConfigMap:\n   ```yaml\n   resource.customizations.health.apps_Deployment: |\n     local f = io.open(\"/var/run/secrets/kubernetes.io/serviceaccount/token\")\n     if f then\n       hs = {}\n       hs.status = \"Healthy\"\n       hs.message = f:read(\"*a\")\n       f:close()\n       return hs\n     end\n   resource.customizations.useOpenLibs.apps_Deployment: \"true\"\n   ```\n2. Create or refresh a Deployment resource managed by ArgoCD.\n3. Observe the health check Lua script executing with full `io` library access.\n4. The service account token appears in the health status message (visible in ArgoCD UI or API).\n5. In GitOps-managed scenarios, the ConfigMap change can be introduced via a Git commit to the ArgoCD config repository, requiring only developer push access.\n","severity":"low","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-executed"],"status":"open","cvss_score":0,"source_file":"util/lua/lua.go:76-77","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/lua/lua.go:76-77","util/lua/lua.go:85-89","util/lua/oslib_safe.go:28-31","util/settings/settings.go:1114","util/lua/lua.go:102"],"finding_hash":"969f1e2725c43212b81fd1790547545c","found_at":"2026-04-09T18:07:34.412794Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":901,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-060","module_name":"The ArgoCD application controller reads sync status and managed resource data from Redis cache without any integrity verification (no HMAC, no digital signature, no checksum). An attacker with network","module_type":"whitebox","finding_source":"archon","module_short":"redis-cache-poisoning-autosync","description":"## Summary\n\nThe ArgoCD application controller reads sync status and managed resource data from Redis cache without any integrity verification (no HMAC, no digital signature, no checksum). An attacker with network access to the Redis instance -- which by default uses neither TLS nor authentication -- can inject forged sync status entries that cause the controller to auto-sync applications to attacker-controlled Git revisions. The two-level cache (in-memory + Redis) extends the poison window to 10 minutes per injection. Redis pub/sub channels can be used to force cache invalidation and re-poisoning indefinitely.\n\n## Location\n\n- `util/cache/redis.go:91` -- `unmarshal()`: JSON deserialization with no integrity check\n- `util/cache/redis.go:135` -- `Get()`: reads from Redis and calls unmarshal\n- `util/cache/twolevelclient.go:48` -- `twoLevelClient.Get()`: 10-minute in-memory cache TTL\n- `controller/appcontroller.go:1766` -- `GetAppManagedResources()`: reads cached managed resources\n- `controller/appcontroller.go:2204` -- `autoSync()`: checks sync status from cache\n- `controller/appcontroller.go:2233` -- `op.Sync.Revision = syncStatus.Revision`: uses attacker-controlled revision\n- `util/cache/cache.go:261` -- TLS is opt-in only\n- `util/cache/cache.go:166` -- AUTH password from env var, empty by default\n\n## Attacker Control\n\nThe attacker controls the full JSON payload written to Redis cache keys matching `app|managed-resources|\u003cappName\u003e|\u003ccacheVersion\u003e`. By setting `syncStatus.Status` to `\"OutOfSync\"` and `syncStatus.Revision` to an attacker-controlled Git commit hash, the attacker dictates which revision the controller syncs to. Redis pub/sub (`PUBLISH` command) allows the attacker to trigger cache invalidation and re-read, providing precise timing control.\n\n## Trust Boundary Crossed\n\nRedis (network-accessible service within the Kubernetes namespace) to application controller sync operation. The controller treats cached data as authoritative without verification against the actual Git repository state.\n\n## Impact\n\n- Arbitrary Kubernetes resource deployment to all clusters managed by auto-sync-enabled applications\n- Cluster-admin equivalent impact: the controller has full permissions on managed clusters\n- Persistent compromise: pub/sub re-poisoning maintains the attack across cache TTL boundaries\n- Lateral movement: deployed resources can include privileged pods, RBAC bindings, or network policies\n\n## Evidence\n\n```\n# Redis cache read path (no integrity check):\nutil/cache/redis.go:91  func (r *redisCache) unmarshal(data []byte, obj any) error {\nutil/cache/redis.go:101     if err := json.NewDecoder(reader).Decode(obj); err != nil {\n                            # No HMAC verification, no signature check\n\n# Controller uses cached sync status:\ncontroller/appcontroller.go:2204  if syncStatus.Status != appv1.SyncStatusCodeOutOfSync {\ncontroller/appcontroller.go:2233  Revision: syncStatus.Revision,  # Attacker-controlled\n\n# TLS off by default:\nutil/cache/cache.go:261  if redisUseTLS {  # Only if flag is explicitly set\n\n# Two-level cache extends window:\n# cmd/argocd-application-controller/commands/argocd_application_controller.go:171\n# NewTwoLevelClient(..., 10*time.Minute)\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with default Helm chart (no Redis TLS, no Redis AUTH).\n2. Create an application with `spec.syncPolicy.automated` enabled.\n3. From a pod in the same namespace, connect to Redis at `argocd-redis:6379`.\n4. Write a poisoned cache entry: `SET \"app|managed-resources|\u003cappName\u003e|\u003ccacheVersion\u003e\" \"\u003cgzip-compressed JSON with Status:OutOfSync, Revision:\u003cattacker-hash\u003e\u003e\"`.\n5. Optionally publish to force re-read: `PUBLISH \"app|managed-resources|\u003cappName\u003e|\u003ccacheVersion\u003e\" \"\"`.\n6. Observe the controller initiating a sync operation to the attacker-controlled revision.\n7. Note: even with Redis AUTH enabled, no cache integrity check exists. An attacker who obtains the password (e.g., via Lua injection p8-062) can still poison the cache.\n","severity":"n/a","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-blocked"],"status":"open","cvss_score":0,"source_file":"util/cache/redis.go:91","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/cache/redis.go:91","util/cache/redis.go:135","util/cache/twolevelclient.go:48","controller/appcontroller.go:1766","controller/appcontroller.go:2204","controller/appcontroller.go:2233","util/cache/cache.go:261","util/cache/cache.go:166"],"finding_hash":"d9d5d7e3ef0a753649d5e6345e69a4dc","found_at":"2026-04-09T18:07:34.412793Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":900,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-050","module_name":"The ArgoCD webhook handler at `util/webhook/webhook.go` has no replay protection: no timestamp validation, no nonce tracking, no idempotency keys. Any captured webhook payload can be replayed arbitrar","module_type":"whitebox","finding_source":"archon","module_short":"webhook-replay-no-protection","description":"## Summary\n\nThe ArgoCD webhook handler at `util/webhook/webhook.go` has no replay protection: no timestamp validation, no nonce tracking, no idempotency keys. Any captured webhook payload can be replayed arbitrarily. Combined with the HMAC fail-open (p8-041), an unauthenticated attacker can replay any historical webhook payload. The primary impact is mass application refresh triggering (DoS on repo-server re-rendering) and amplification of the cache key manipulation attack (p8-043).\n\n## Location\n\n- `util/webhook/webhook.go:637-705` -- `Handler` function: no timestamp check, no nonce, no idempotency key\n- `util/webhook/webhook.go:155-306` -- `affectedRevisionInfo`: extracts revision/webURL from replayed payload for cache operations\n- `util/webhook/webhook.go:400` -- `argo.RefreshApp(...)` triggered by replayed payload\n\n## Attacker Control\n\n- Any captured webhook payload (from network capture, leaked logs, or intercepted request)\n- Replay timing: unlimited, no TTL on payloads\n- Frequency: unlimited replays per payload\n\n## Trust Boundary Crossed\n\nCaptured historical webhook payload -\u003e application refresh triggering -\u003e repo-server re-render load\n\n## Impact\n\n1. **DoS via Mass Refresh**: Replaying webhook for a repo tracked by many applications triggers concurrent re-render of all those applications; repo-server resource exhaustion\n2. **Cache Attack Amplification**: Replay of a payload with specific SHAs extends cache key manipulation window from p8-043 — replaying with the same forged SHA multiple times keeps stale cache entries alive beyond TTL\n3. **Chaining with HMAC Fail-Open**: If no webhook secret configured (default), any unauthenticated attacker can replay any webhook payload\n\nNote: \"Ghost deployment\" of deleted branch content was NOT confirmed. ArgoCD fetches current git HEAD when refreshed, not the SHA from the webhook payload.\n\n## Evidence\n\n```go\n// util/webhook/webhook.go:637-705\n// Handler function - no replay protection anywhere:\nfunc (a *ArgoCDWebhookHandler) Handler(w http.ResponseWriter, r *http.Request) {\n    // MaxBytesReader bounds size\n    r.Body = http.MaxBytesReader(w, r.Body, a.maxWebhookPayloadSizeB)\n    // ... but NO timestamp check, NO nonce, NO idempotency key\n    \n    // Payload is parsed and processed without any uniqueness validation\n    payload, err := a.parsePayload(r)\n    // ...\n    a.invalidateCache(payload)  // Triggers cache operations with payload SHAs\n}\n```\n\n## Reproduction Steps\n\n1. Capture a valid webhook payload (from logs, network traffic, or leaked request)\n2. Without webhook secret configured (or with fail-open), replay the payload to `/api/webhook`\n3. Observe applications being re-queued for refresh\n4. Repeat at high frequency to sustain repo-server overload\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/webhook/webhook.go:637-705","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/webhook/webhook.go:637-705","util/webhook/webhook.go:155-306","util/webhook/webhook.go:400"],"finding_hash":"bd6c79af85d63e1163070e064dacb761","found_at":"2026-04-09T18:07:34.412792Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":899,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-049","module_name":"The ApplicationSet PR generator passes pull request metadata (title, author, branch name) verbatim into template parameters without sanitization. When an ApplicationSet template uses these parameters ","module_type":"whitebox","finding_source":"archon","module_short":"pr-generator-metadata-injection","description":"## Summary\n\nThe ApplicationSet PR generator passes pull request metadata (title, author, branch name) verbatim into template parameters without sanitization. When an ApplicationSet template uses these parameters in security-sensitive fields like `spec.project`, an attacker who can open a pull request (on public repos, this requires no authorization) can inject arbitrary project names. The post-rendering validation only checks that the named project exists — not that the ApplicationSet is authorized to create Applications in that project. The `default` project always exists, enabling a reliable injection.\n\n## Location\n\n- `applicationset/generators/pull_request.go:103-114` -- PR metadata populated verbatim: `\"title\": pull.Title`, `\"author\": pull.Author`\n- `applicationset/generators/pull_request.go:121` -- `appendTemplatedValues` expands operator-defined Values entries referencing `.title` or `.author`\n- `applicationset/utils/utils.go` -- `RenderTemplateParams` substitutes attacker-controlled strings into Application template including `spec.project`\n- `applicationset/controllers/applicationset_controller.go:610` -- `validateGeneratedApplications` checks project EXISTS via `r.Get(...)` but NOT authorization\n- `applicationset/controllers/applicationset_controller.go:311-313` -- Applications passing validation are created directly via Kubernetes API (bypasses argocd-server RBAC)\n\n## Attacker Control\n\n- PR title: contributor-controlled on any public repository\n- PR author: GitHub username (fixed per attacker's account)\n- Target field: any Application spec field templated from `.title` or `.author`\n- Reliable injection value: `\"default\"` (standard ArgoCD project, always present)\n\n## Trust Boundary Crossed\n\nExternal PR metadata (contributor-controlled) -\u003e Application spec.project -\u003e ApplicationSet controller bypasses argocd-server RBAC for Application creation\n\n## Impact\n\n1. **Project Scope Bypass**: Applications created in injected project instead of intended project; injected project's destination allowlist and source restrictions apply\n2. **RBAC Bypass for Application Creation**: ApplicationSet controller creates Application CRs directly via K8s API, bypassing argocd-server RBAC enforcement\n3. **Namespace Targeting**: If `spec.destination.namespace` is also templated from PR metadata, attacker can target any namespace allowed in the injected project\n4. **Affects Public Repos**: Any contributor who can open a PR can trigger this on public repositories\n\n## Evidence\n\n```go\n// applicationset/generators/pull_request.go:103-114\nparamMap := map[string]interface{}{\n    \"number\":         strconv.Itoa(pull.Number),\n    \"branch\":         pull.Branch,\n    \"branch_slug\":    slug.Make(pull.Branch),\n    \"target_branch\":  pull.TargetBranch,\n    \"head_sha\":       pull.HeadSHA,\n    \"head_short_sha\": pull.HeadSHA[0:8],\n    \"title\":          pull.Title,   // Attacker-controlled\n    \"author\":         pull.Author,  // Attacker-controlled\n    \"labels\":         labelsValue,\n}\n\n// applicationset/controllers/applicationset_controller.go:610\n// Post-rendering validation -- existence check only, no authorization check:\nif err := r.Get(ctx, types.NamespacedName{Name: app.Spec.Project, ...}, appProject); err != nil {\n    // Only checks if project exists\n}\n```\n\nVulnerable ApplicationSet template:\n```yaml\ntemplate:\n  spec:\n    project: \"{{ .author }}\"  # Attacker sets GitHub username = \"default\"\n    # OR\n    project: \"myprefix-{{ .title }}\"  # Attacker sets PR title = \"default\"\n```\n\n## Reproduction Steps\n\n1. Find a public repo with an ApplicationSet using PR generator with `.author` or `.title` in `spec.project`\n2. Open a PR with username or title equal to an existing ArgoCD project (e.g., `default`)\n3. ApplicationSet controller creates Application with `spec.project: \"default\"`\n4. Application is created in default project, inheriting its destination and source policies\n5. If default project allows broader destinations, attacker gains expanded deployment scope\n","severity":"low","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-blocked"],"status":"open","cvss_score":0,"source_file":"applicationset/generators/pull_request.go:103-114","repo_name":"github.com/argoproj/argo-cd","matched_at":["applicationset/generators/pull_request.go:103-114","applicationset/generators/pull_request.go:121","applicationset/controllers/applicationset_controller.go:610","applicationset/controllers/applicationset_controller.go:311-313"],"finding_hash":"8b017cb48024684931938682cf20d91a","found_at":"2026-04-09T18:07:34.41279Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":898,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-048","module_name":"The ApplicationSet Matrix generator performs unbounded cartesian product expansion with no limit on the number of generated parameter sets. Nested Matrix generators with large List sub-generators can ","module_type":"whitebox","finding_source":"archon","module_short":"matrix-generator-oom","description":"## Summary\n\nThe ApplicationSet Matrix generator performs unbounded cartesian product expansion with no limit on the number of generated parameter sets. Nested Matrix generators with large List sub-generators can produce millions of parameter combinations, exhausting the ApplicationSet controller's memory and causing an OOM kill. This disrupts reconciliation for all ApplicationSets managed by that controller instance.\n\n## Location\n\n- `applicationset/generators/matrix.go:48` -- `res := []map[string]any{}` unbounded accumulation\n- `applicationset/generators/matrix.go:40-45` -- validates exactly 2 children but no nesting depth limit\n- `applicationset/generators/matrix.go:82-109` -- `getParams` accepts `ApplicationSetNestedGenerator` including nested `Matrix` field\n\n## Attacker Control\n\n- Requires: AppSet create/update RBAC permission\n- Attack input: Nested Matrix generator with large List sub-generators\n\n## Trust Boundary Crossed\n\nApplicationSet spec (user-controlled with RBAC) -\u003e unbounded memory allocation in ApplicationSet controller\n\n## Impact\n\n1. **ApplicationSet Controller OOM**: Controller process killed; no ApplicationSet reconciliation until restart\n2. **Availability Impact**: All ApplicationSets managed by the instance stop reconciling during downtime\n3. **Indirect K8s Impact**: Applications that depend on ApplicationSet-driven sync lose their reconciliation loop\n\n## Evidence\n\n```go\n// applicationset/generators/matrix.go:48\nres := []map[string]any{}  // No size cap\nfor _, a := range g0 {\n    for _, b := range g1 {\n        res = append(res, utils.CombineStringMaps(a, b))  // Unbounded growth\n    }\n}\n\n// Nested Matrix structure is allowed:\n// applicationset/generators/matrix.go:82-109\n// ApplicationSetNestedGenerator includes Matrix field -\u003e enables recursive expansion\n```\n\nAttack payload (YAML):\n```yaml\n# Outer Matrix: 100 x inner-matrix\n# Inner Matrix: List(100) x List(100) = 10,000 combos per outer\n# Total: 100 * 10,000 = 1,000,000 parameter sets\nspec:\n  generators:\n  - matrix:\n      generators:\n      - list:\n          elements: [1..100]  # 100 outer elements\n      - matrix:\n          generators:\n          - list:\n              elements: [1..100]  # 100 inner\n          - list:\n              elements: [1..100]  # 100 inner\n```\n\n## Reproduction Steps\n\n1. Obtain AppSet create/update RBAC permission\n2. Create ApplicationSet with nested Matrix generators producing 1M+ combinations\n3. ApplicationSet controller allocates unbounded memory during reconciliation\n4. OOM kill terminates the controller process\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"applicationset/generators/matrix.go:48","repo_name":"github.com/argoproj/argo-cd","matched_at":["applicationset/generators/matrix.go:48","applicationset/generators/matrix.go:40-45","applicationset/generators/matrix.go:82-109"],"finding_hash":"9bde19256305f85cbe3cc4cd38ca8d01","found_at":"2026-04-09T18:07:34.412788Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":897,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-047","module_name":"When ApplicationSet SCM providers are enabled with an empty `allowedSCMProviders` list (the default), any URL is accepted without validation. An attacker who can control an SCM API response (via SSRF ","module_type":"whitebox","finding_source":"archon","module_short":"scm-url-injection-supply-chain","description":"## Summary\n\nWhen ApplicationSet SCM providers are enabled with an empty `allowedSCMProviders` list (the default), any URL is accepted without validation. An attacker who can control an SCM API response (via SSRF or by hosting a malicious SCM endpoint) can inject arbitrary repository URLs into Application specs. The application controller then clones attacker-controlled repositories and deploys their manifests to the cluster.\n\n## Location\n\n- `applicationset/generators/scm_provider.go:105` -- empty allowlist bypasses all URL validation\n- `applicationset/generators/scm_provider.go:254` -- SCM API response URL flows into ApplicationSet template parameters\n- `applicationset/utils/utils.go` -- `RenderTemplateParams` substitutes `.url` into Application template including `spec.source.repoURL`\n\n## Attacker Control\n\n- SCM API response `url` field flows to Application `spec.source.repoURL`\n- Requires: SCM providers enabled (`enableSCMProviders=true`) AND empty `allowedSCMProviders` list (default)\n- Attacker vector: control SCM API response via SSRF, DNS spoofing, or compromised SCM provider\n\n## Trust Boundary Crossed\n\nSCM API response (external/attacker-controlled) -\u003e Application source repository URL -\u003e repo-server clones attacker's repository\n\n## Impact\n\n1. **Arbitrary Manifest Deployment**: Attacker's repository manifests are deployed to the cluster\n2. **Supply Chain Attack**: Malicious Kubernetes resources deployed with cluster-admin privileges via application controller\n3. **Credential Amplification**: When chained with SSRF (p8-040), the ApplicationSet controller fetches from attacker's SCM server, which returns attacker's repo URL; ArgoCD auto-deploys attacker's content\n4. **No User Interaction Required**: ApplicationSet reconciliation is automatic\n\n## Evidence\n\n```go\n// applicationset/generators/scm_provider.go:105\n// When allowedSCMProviders is empty, ALL URLs pass without validation:\nif url == \"\" || len(allowedScmProviders) == 0 {\n    return nil  // nil error = validation PASSED\n}\n\n// applicationset/generators/scm_provider.go:254\n// URL from SCM response flows directly into template params:\nparamMap[\"url\"] = repo.URL  // repo.URL from SCM API response\n```\n\n## Reproduction Steps\n\n1. Enable SCM providers in ArgoCD settings (no allowedSCMProviders configured)\n2. Create ApplicationSet with SCM generator using `{{ .url }}` in `spec.source.repoURL`\n3. Control the SCM API response (e.g., via SSRF using Bitbucket webhook attack p8-040)\n4. Return attacker-controlled URL from SCM API\n5. ApplicationSet controller creates Application pointing to attacker's repo\n6. ArgoCD auto-sync deploys attacker's manifests\n","severity":"low","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-blocked"],"status":"open","cvss_score":0,"source_file":"applicationset/generators/scm_provider.go:105","repo_name":"github.com/argoproj/argo-cd","matched_at":["applicationset/generators/scm_provider.go:105","applicationset/generators/scm_provider.go:254"],"finding_hash":"d12b963087e127657675cf84ca0b84e8","found_at":"2026-04-09T18:07:34.412787Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":896,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-046","module_name":"The commit server's git client passes user-controlled branch names directly to git commands without a `--` separator to end option parsing. In `CheckoutOrOrphan`, `CheckoutOrNew`, and `CommitAndPush`,","module_type":"whitebox","finding_source":"archon","module_short":"git-option-injection-branch","description":"## Summary\n\nThe commit server's git client passes user-controlled branch names directly to git commands without a `--` separator to end option parsing. In `CheckoutOrOrphan`, `CheckoutOrNew`, and `CommitAndPush`, branch names from the gRPC request are placed after git flags without the standard `--` end-of-options marker. Branch names starting with `-` could be interpreted as git options, potentially modifying git behavior.\n\n## Location\n\n- `util/git/client.go:1042` -- `m.runCmd(ctx, \"switch\", \"--orphan\", branch)` -- no `--` before branch\n- `util/git/client.go:1077` -- `m.runCmd(context.Background(), \"checkout\", \"-b\", branch)` -- no `--` before branch\n- `util/git/client.go:1119` -- `m.runCredentialedCmd(ctx, \"push\", \"origin\", branch)` -- no `--` before branch\n\n## Attacker Control\n\n- Branch name via `r.SyncBranch` and `r.TargetBranch` in commit server gRPC request\n- Requires network access to unauthenticated commit server (p8-045)\n\n## Trust Boundary Crossed\n\nCommit server gRPC request -\u003e git subprocess option parsing\n\n## Impact\n\n1. **Defense-in-Depth Failure**: Missing `--` separator is a well-known git security anti-pattern\n2. **Behavioral Modification**: Branch names starting with `-` could trigger unexpected git flags (e.g., `--force` on push)\n3. **Future Risk**: New git versions may add flags that enable code execution from these positions\n4. **Note**: Current git versions' `switch`, `checkout -b`, and `push origin` commands do not support `--upload-pack` or other known RCE-enabling flags from the branch position\n\n## Evidence\n\n```go\n// util/git/client.go:1042 -- Missing -- before branch\nout, err = m.runCmd(ctx, \"switch\", \"--orphan\", branch)\n\n// Correct pattern would be:\n// out, err = m.runCmd(ctx, \"switch\", \"--orphan\", \"--\", branch)\n```\n\nNote: `util/git/client.go:1090` correctly uses `--` separator for `git rm`:\n```go\nargs := append([]string{\"rm\", \"-r\", \"--ignore-unmatch\", \"--\"}, paths...)\n```\n\n## Reproduction Steps\n\n1. Access commit server gRPC endpoint (requires p8-045)\n2. Send `CommitHydratedManifests` with `syncBranch = \"--force\"` or `syncBranch = \"-f\"`\n3. Observe git command execution with branch name interpreted as option\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/git/client.go:1042","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/git/client.go:1042","util/git/client.go:1077","util/git/client.go:1119"],"finding_hash":"ae260417634e19cc295181aaa4ed6d31","found_at":"2026-04-09T18:07:34.412786Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":894,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-044","module_name":"The ApplicationSet webhook handler at `applicationset/webhook/webhook.go:161` does not apply `http.MaxBytesReader` to limit request body size before passing the request to the `go-playground/webhooks`","module_type":"whitebox","finding_source":"archon","module_short":"appset-webhook-oom","description":"## Summary\n\nThe ApplicationSet webhook handler at `applicationset/webhook/webhook.go:161` does not apply `http.MaxBytesReader` to limit request body size before passing the request to the `go-playground/webhooks` library for parsing. The library reads the entire request body into memory. A single large HTTP POST can exhaust the ApplicationSet controller's memory, causing an OOM kill that disrupts reconciliation of ALL ApplicationSets. This is in contrast to the main ArgoCD webhook handler which applies `MaxBytesReader` at `util/webhook/webhook.go:641`.\n\n## Location\n\n- `applicationset/webhook/webhook.go:161-194` -- `Handler` function with no MaxBytesReader\n- `util/webhook/webhook.go:641` -- Main handler WITH MaxBytesReader (for contrast)\n\n## Attacker Control\n\n- Arbitrary payload size via HTTP POST to ApplicationSet webhook endpoint\n- Unauthenticated (same HMAC fail-open pattern as main webhooks)\n\n## Trust Boundary Crossed\n\nInternet (if AppSet webhook exposed) -\u003e ApplicationSet controller process memory\n\n## Impact\n\n1. **ApplicationSet Controller OOM**: Single large payload kills the controller pod\n2. **Service Disruption**: All ApplicationSet reconciliation stops during restart\n3. **Repeated Attack**: Attacker can repeatedly send large payloads to keep the controller down\n\n## Evidence\n\nApplicationSet webhook Handler (NO MaxBytesReader):\n```go\n// applicationset/webhook/webhook.go:161\nfunc (h *WebhookHandler) Handler(w http.ResponseWriter, r *http.Request) {\n    var payload any\n    var err error\n    // No MaxBytesReader applied here\n    switch {\n    case r.Header.Get(\"X-GitHub-Event\") != \"\":\n        payload, err = h.github.Parse(r, ...)\n```\n\nMain webhook Handler (WITH MaxBytesReader):\n```go\n// util/webhook/webhook.go:637,641\nfunc (a *ArgoCDWebhookHandler) Handler(w http.ResponseWriter, r *http.Request) {\n    r.Body = http.MaxBytesReader(w, r.Body, a.maxWebhookPayloadSizeB)\n```\n\n## Reproduction Steps\n\n1. Identify the ApplicationSet webhook endpoint (typically routed alongside main webhook)\n2. Send a POST with `X-GitHub-Event: push` header and a multi-gigabyte body\n3. Observe ApplicationSet controller OOM kill\n4. Verify that all ApplicationSet reconciliation is disrupted\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"applicationset/webhook/webhook.go:161-194","repo_name":"github.com/argoproj/argo-cd","matched_at":["applicationset/webhook/webhook.go:161-194","util/webhook/webhook.go:641"],"finding_hash":"750fa1883daaa8aa7a2234f536b6bf3a","found_at":"2026-04-09T18:07:34.412785Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":895,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-045","module_name":"The ArgoCD commit server (v3 hydrator feature) creates a gRPC server with no authentication interceptors.
