Any pod with network access to the commit server port can invoke `CommitHydratedManifests` wit","module_type":"whitebox","finding_source":"archon","module_short":"commit-server-no-auth","description":"## Summary\n\nThe ArgoCD commit server (v3 hydrator feature) creates a gRPC server with no authentication interceptors. Any pod with network access to the commit server port can invoke `CommitHydratedManifests` with arbitrary repository URLs, credentials, branch names, and manifest content. The commit server acts as a fully unauthenticated Git write proxy, cloning repositories with caller-supplied credentials and pushing arbitrary commits.\n\n## Location\n\n- `commitserver/server.go:27-28` -- `grpc.NewServer(grpc.MaxRecvMsgSize(...))` with no auth interceptors\n- `commitserver/commit/commit.go:86-124` -- `CommitHydratedManifests` accepts `r.Repo` with URL and credentials from request\n- `commitserver/commit/commit.go:145` -- `s.initGitClient(logCtx, r)` uses caller-supplied repo credentials\n- `commitserver/commit/commit.go:159-165` -- Checkout and write operations using caller-supplied branch names\n\n## Attacker Control\n\n- Full control of: repository URL, credentials (username, password, SSH key, GitHub App key), branch names, manifest content, commit message\n- Any pod in the same network namespace can make gRPC calls\n\n## Trust Boundary Crossed\n\nInternal pod network -\u003e Git write to any repository with any credentials supplied by caller\n\n## Impact\n\n1. **Unauthorized Git Writes**: Any compromised pod can write arbitrary commits to any Git repository\n2. **Credential Proxy**: The commit server acts as a credential amplifier -- attacker supplies credentials in the request, server uses them to authenticate to Git\n3. **Supply Chain Attack**: Malicious manifests pushed to hydrated branches are deployed by ArgoCD auto-sync\n4. **Lateral Movement**: Amplifies the impact of any initial pod compromise in the ArgoCD namespace\n5. **No Audit Trail**: No authentication means no caller identity is logged\n\n## Evidence\n\n```go\n// commitserver/server.go:27-28\nfunc (a *ArgoCDCommitServer) CreateGRPC() *grpc.Server {\n    server := grpc.NewServer(grpc.MaxRecvMsgSize(apiclient.MaxGRPCMessageSize))\n    // No UnaryInterceptor or ChainUnaryInterceptor for auth\n```\n\nCompare with argocd-server which has auth interceptors:\n```go\n// server/server.go (approximate)\ngrpc.NewServer(\n    grpc.ChainUnaryInterceptor(\n        grpc_auth.UnaryServerInterceptor(server.Authenticate),\n        ...\n    ),\n)\n```\n\n## Reproduction Steps\n\n1. Enable hydrator feature (`ARGOCD_HYDRATOR_ENABLED=true`)\n2. From any pod in the ArgoCD namespace, make a gRPC call to the commit server:\n   - `CommitHydratedManifests` with `repo.Repo = \"https://github.com/target/repo\"`, `repo.Password = \"\u003cstolen-token\u003e\"`, `targetBranch = \"env/hydrated\"`, manifests containing malicious K8s resources\n3. Observe that the commit server clones the repo, writes manifests, and pushes without any authentication check\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","false positive (adversarial)","poc-blocked"],"status":"open","cvss_score":0,"source_file":"commitserver/server.go:27-28","repo_name":"github.com/argoproj/argo-cd","matched_at":["commitserver/server.go:27-28","commitserver/commit/commit.go:86-124","commitserver/commit/commit.go:145","commitserver/commit/commit.go:159-165"],"finding_hash":"3b5c1d5ad5ef356f7ceac6167ce66852","found_at":"2026-04-09T18:07:34.412785Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":893,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-043","module_name":"When a webhook push event is received with `shaBefore` and `shaAfter` values, and `AppFilesHaveChanged` returns false (the changed files don't match the app's refresh paths), ArgoCD copies cached mani","module_type":"whitebox","finding_source":"archon","module_short":"webhook-cache-key-manipulation","description":"## Summary\n\nWhen a webhook push event is received with `shaBefore` and `shaAfter` values, and `AppFilesHaveChanged` returns false (the changed files don't match the app's refresh paths), ArgoCD copies cached manifests from the `shaBefore` key to the `shaAfter` key in Redis via `storePreviouslyCachedManifests`. An attacker who sends a forged webhook (enabled by p8-041 HMAC fail-open) with crafted SHA values can cause ArgoCD to serve stale cached manifests for a new commit revision, bypassing intended manifest updates.\n\n## Location\n\n- `util/webhook/webhook.go:404-408` -- Condition triggering cache key copy\n- `util/webhook/webhook.go:460-491` -- `storePreviouslyCachedManifests` implementation\n- `util/webhook/webhook.go:486` -- `a.repoCache.SetNewRevisionManifests(change.shaAfter, change.shaBefore, ...)`\n\n## Attacker Control\n\n- `shaBefore` and `shaAfter` values from webhook payload (GitHub, GitLab, Gogs, etc.)\n- `changedFiles` list controls whether AppFilesHaveChanged returns false (triggering the cache path)\n\n## Trust Boundary Crossed\n\nInternet (unauthenticated webhook) -\u003e Redis manifest cache state modification\n\n## Impact\n\n1. **Stale Manifest Deployment**: ArgoCD serves cached manifests from an old revision when fetching for a new commit, bypassing security patches or configuration changes in the new commit\n2. **Time-Bounded**: Cache entries expire based on TTL, limiting the attack window\n\n## Evidence\n\n```go\n// util/webhook/webhook.go:404-408\n} else if change.shaBefore != \"\" \u0026\u0026 change.shaAfter != \"\" {\n    if err := a.storePreviouslyCachedManifests(\u0026app, change, trackingMethod, appInstanceLabelKey, installationID, source); err != nil {\n        log.Errorf(\"Failed to store cached manifests of previous revision for app '%s': %v\", app.Name, err)\n    }\n}\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with an application that has `manifest-generate-paths` configured and cached manifests\n2. Send a forged GitHub push event with `shaBefore=\u003cexisting-cached-sha\u003e` and `shaAfter=\u003ctarget-sha\u003e`\n3. Include a `changedFiles` list that does NOT match the app's refresh paths (so AppFilesHaveChanged returns false)\n4. Observe that the cached manifests for `shaBefore` are now also available under `shaAfter` key\n5. When the real push with `shaAfter` is processed, stale cached manifests are served\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/webhook/webhook.go:404-408","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/webhook/webhook.go:404-408","util/webhook/webhook.go:460-491","util/webhook/webhook.go:486"],"finding_hash":"b0b46bb8ac249fe099094e729ddd60e2","found_at":"2026-04-09T18:07:34.412784Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":891,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-041","module_name":"ArgoCD webhook handler initializes all 6 SCM provider webhook parsers (GitHub, GitLab, Bitbucket Cloud, Bitbucket Server, Azure DevOps, Gogs) with secrets read from `argocd-secret`. When no webhook se","module_type":"whitebox","finding_source":"archon","module_short":"webhook-hmac-fail-open","description":"## Summary\n\nArgoCD webhook handler initializes all 6 SCM provider webhook parsers (GitHub, GitLab, Bitbucket Cloud, Bitbucket Server, Azure DevOps, Gogs) with secrets read from `argocd-secret`. When no webhook secret is configured (the default), the `go-playground/webhooks/v6` library skips HMAC/token/UUID verification entirely, accepting any payload without authentication. This enables unauthenticated forged webhook payloads that trigger application refreshes, cache manipulation, and other downstream effects.\n\n## Location\n\n- `util/webhook/webhook.go:82-105` -- Webhook initialization with secrets from settings\n- `util/webhook/webhook.go:641-705` -- Handler function processing payloads\n- `applicationset/webhook/webhook.go:75-106` -- AppSet webhook initialization (same pattern)\n\n## Attacker Control\n\n- Full control of webhook payload body and headers when no secret is configured\n- Unauthenticated HTTP POST to `/api/webhook`\n\n## Trust Boundary Crossed\n\nInternet (unauthenticated) -\u003e ArgoCD server internal processing (app refresh, cache operations)\n\n## Impact\n\n1. **Forged Application Refresh**: Attacker triggers refresh of any application by crafting a push event with matching repository URL\n2. **Cache Key Manipulation**: Forged `shaBefore`/`shaAfter` values enable cache key renaming (see p8-043)\n3. **Global Refresh DoS**: Empty changedFiles triggers refresh of ALL matching applications (see p8-042)\n4. **Chain Enabler**: This fail-open is the prerequisite for multiple other attacks (H-00c, H-00d, H-03)\n\n## Evidence\n\n1. `webhook.go:82` -- `github.New(github.Options.Secret(set.GetWebhookGitHubSecret()))` -- when secret is empty string, go-playground/webhooks skips HMAC\n2. Same pattern for all 6 providers (lines 82-105)\n3. Default ArgoCD installation does not configure webhook secrets in `argocd-secret`\n4. No enforcement mechanism requires secrets to be configured\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with default configuration (no webhook secrets in `argocd-secret`)\n2. Create an application tracking a GitHub repository\n3. Send a forged GitHub push event POST to `/api/webhook` with `X-GitHub-Event: push` header and a payload containing the repository's HTML URL\n4. Observe that the application is refreshed without any HMAC verification\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/webhook/webhook.go:82-105","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/webhook/webhook.go:82-105","util/webhook/webhook.go:641-705","applicationset/webhook/webhook.go:75-106","webhook.go:82"],"finding_hash":"24ee3c41cb08280ab7b64be3784b33ea","found_at":"2026-04-09T18:07:34.412783Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":892,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-042","module_name":"When a webhook push event is received from Azure DevOps, Bitbucket Server, or Bitbucket Cloud (without UUID configured), the `changedFiles` list is empty because these providers do not include changed","module_type":"whitebox","finding_source":"archon","module_short":"webhook-global-app-refresh","description":"## Summary\n\nWhen a webhook push event is received from Azure DevOps, Bitbucket Server, or Bitbucket Cloud (without UUID configured), the `changedFiles` list is empty because these providers do not include changed file information in their payloads. The `AppFilesHaveChanged` function returns `true` when `changedFiles` is empty, causing ALL applications matching the repository URL to be refreshed regardless of whether their paths were affected. Combined with the HMAC fail-open (p8-041), this enables unauthenticated global application refresh DoS.\n\n## Location\n\n- `util/app/path/path.go:153-157` -- `AppFilesHaveChanged` returns true on empty changedFiles\n- `util/webhook/webhook.go:384` -- Calls `AppFilesHaveChanged(refreshPaths, changedFiles)`\n- `util/webhook/webhook.go:165` -- Azure DevOps: never provides changedFiles\n- `util/webhook/webhook.go:289-290` -- Bitbucket Server: never provides changedFiles\n\n## Attacker Control\n\n- Crafted push event payload for Azure DevOps, Bitbucket Server, or Bitbucket Cloud providers\n- Repository URL matching is the only condition for triggering refresh\n\n## Trust Boundary Crossed\n\nInternet (unauthenticated webhook with H-00b) -\u003e mass application refresh consuming repo-server resources\n\n## Impact\n\n1. **Resource Exhaustion DoS**: All applications matching the forged repo URL are refreshed simultaneously, consuming repo-server CPU and memory for manifest rendering\n2. **Amplification**: A single webhook payload triggers refresh of potentially hundreds of applications\n\n## Evidence\n\n```go\n// util/app/path/path.go:153-157\nfunc AppFilesHaveChanged(refreshPaths []string, changedFiles []string) bool {\n    if len(changedFiles) == 0 {\n        return true  // assumes refresh required when no file list provided\n    }\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with default configuration and multiple applications tracking the same repository\n2. Send a forged Azure DevOps push event to `/api/webhook` with `X-Vss-Activityid` header\n3. Observe that ALL applications matching the repo URL are refreshed, regardless of their `manifest-generate-paths` settings\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/app/path/path.go:153-157","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/app/path/path.go:153-157","util/webhook/webhook.go:384","util/webhook/webhook.go:165","util/webhook/webhook.go:289-290"],"finding_hash":"55d9e4ac67a37c4756ab91cd3e7fa34f","found_at":"2026-04-09T18:07:34.412783Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":890,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-040","module_name":"Bitbucket Cloud webhook handler constructs the Bitbucket API base URL from the attacker-controlled `payload.Repository.Links.Self.Href` field. When a Bitbucket Cloud webhook with valid UUID is receive","module_type":"whitebox","finding_source":"archon","module_short":"bitbucket-ssrf-credential-exfil","description":"## Summary\n\nBitbucket Cloud webhook handler constructs the Bitbucket API base URL from the attacker-controlled `payload.Repository.Links.Self.Href` field. When a Bitbucket Cloud webhook with valid UUID is received, ArgoCD creates a Bitbucket API client using this attacker-controlled URL and sends authenticated API requests (including stored OAuth tokens or basic auth credentials) to the attacker's server. This is a Server-Side Request Forgery (SSRF) that results in credential exfiltration.\n\n## Location\n\n- `util/webhook/webhook.go:234` -- `apiBaseURL` constructed from `payload.Repository.Links.Self.Href`\n- `util/webhook/webhook.go:235` -- `newBitbucketClient(ctx, argoRepo, apiBaseURL)` creates client with attacker URL\n- `util/webhook/webhook.go:560-592` -- `newBitbucketClient` calls `bbClient.SetApiBaseURL(*repoBaseURL)` with no URL validation\n- `util/webhook/webhook.go:247` -- `fetchDiffStatFromBitbucket` sends authenticated request to attacker URL\n- `util/webhook/webhook.go:252` -- `isHeadTouched` sends second authenticated request to attacker URL\n\n## Attacker Control\n\n- Full control of `Links.Self.Href` in Bitbucket Cloud webhook payload body\n- Webhook payload is an unauthenticated HTTP POST to `/api/webhook`\n- Bitbucket UUID validation (line 220) is the only gate, but UUIDs are public repository identifiers visible to anyone with access to the repo\n\n## Trust Boundary Crossed\n\nInternet (unauthenticated webhook) -\u003e ArgoCD server -\u003e External SSRF with stored repository credentials (OAuth token, basic auth, or bearer token)\n\n## Impact\n\n1. **Credential Exfiltration**: Stored Bitbucket repository credentials (OAuth tokens, passwords, bearer tokens) are sent to attacker-controlled server via HTTP Authorization headers\n2. **Supply Chain Attack**: Stolen credentials can be used to push malicious manifests to the legitimate repository. If auto-sync is enabled, ArgoCD deploys the malicious manifests to managed clusters\n3. **Targeted Refresh Manipulation**: The SSRF also allows the attacker to control the DiffStat response (changedFiles) and isHeadTouched response, enabling targeted manipulation of which applications get refreshed\n\n## Evidence\n\nCode path (confirmed by manual trace):\n1. `webhook.go:637` -- Handler receives POST with `X-Hook-UUID` header\n2. `webhook.go:666` -- `a.bitbucket.Parse(r, bitbucket.RepoPushEvent)` parses payload\n3. `webhook.go:220` -- Guard: `a.settings.GetWebhookBitbucketUUID() != \"\"` -- SSRF only fires when UUID is configured\n4. `webhook.go:234` -- `apiBaseURL := strings.ReplaceAll(payload.Repository.Links.Self.Href, \"/repositories/\"+payload.Repository.FullName, \"\")` -- attacker controls Links.Self.Href\n5. `webhook.go:235` -- `newBitbucketClient(ctx, argoRepo, apiBaseURL)` -- creates client with attacker URL\n6. `webhook.go:560-592` -- `newBitbucketClient` calls `bbClient.SetApiBaseURL(*repoBaseURL)` -- no URL validation\n7. `webhook.go:247` -- `fetchDiffStatFromBitbucket` sends HTTP request with credentials to attacker URL\n\nPoC execution confirmed (2026-03-23):\n- Test: `util/webhook/h4_ssrf_poc_test.go::TestH4_BitbucketSSRF_CredentialExfil`\n- Result: PASS — attacker server received 2 authenticated requests from ArgoCD\n- Captured: `Authorization: Bearer SUPER_SECRET_OAUTH_TOKEN_12345` on both callbacks\n- Evidence: `security/findings/H4-bitbucket-ssrf-credential-exfil/evidence/exploit.log`\n\n## Reproduction Steps\n\n1. Configure ArgoCD with a Bitbucket Cloud repository and set the webhook UUID in `argocd-secret`\n2. Send a crafted Bitbucket Cloud webhook POST to `/api/webhook` with:\n   - Header: `X-Hook-UUID: \u003cvalid-uuid\u003e`\n   - Body: Bitbucket RepoPushEvent payload with `repository.links.self.href` pointing to `https://attacker.com/repositories/\u003corg\u003e/\u003crepo\u003e`\n3. ArgoCD creates a Bitbucket client with `https://attacker.com` as the API base URL\n4. ArgoCD sends authenticated DiffStat and repository details requests to `attacker.com`\n5. Observe credentials in HTTP Authorization headers on attacker server\n","severity":"high","confidence":"tentative","tags":["archon","phase-8","valid","poc-executed"],"status":"open","cvss_score":0,"source_file":"util/webhook/webhook.go:234","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/webhook/webhook.go:234","util/webhook/webhook.go:235","util/webhook/webhook.go:560-592","util/webhook/webhook.go:247","util/webhook/webhook.go:252","webhook.go:637","webhook.go:666","webhook.go:220","webhook.go:234","webhook.go:235","webhook.go:560-592","webhook.go:247"],"finding_hash":"5ddcc6bed47d7eae8d050709203d45cf","found_at":"2026-04-09T18:07:34.412782Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":889,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-027","module_name":"The `checkOutOfBoundsSymlinks` function caches its validation result using a key that includes the symbolic Git revision (e.g., `main`) rather than the resolved commit SHA. When an attacker force-push","module_type":"whitebox","finding_source":"archon","module_short":"symlink-cache-bypass","description":"## Summary\n\nThe `checkOutOfBoundsSymlinks` function caches its validation result using a key that includes the symbolic Git revision (e.g., `main`) rather than the resolved commit SHA. When an attacker force-pushes a branch to replace a clean commit with one containing out-of-bounds symlinks, the cache key remains the same and the stale \"OK\" result is returned for up to 12 hours (the default cache TTL). This allows symlinks that point outside the repository root to bypass the validation during the cache window.\n\n## Location\n\n- Primary: `reposerver/repository/repository.go:599-612` -- `checkOutOfBoundsSymlinks` cache implementation\n- Cache key: `rootPath + \"/\" + version + \"/\" + strings.Join(skipPaths, \",\")`\n- Cache TTL: `gocache.DefaultExpiration` (12 hours)\n- Chain target: `GetGitFiles` at line 3150 (does not call `checkOutOfBoundsSymlinks` at all)\n\n## Attacker Control\n\nThe attacker has push access to a Git repository monitored by ArgoCD and can force-push to a branch referenced in an Application spec. The Application must use a mutable branch reference (e.g., `main`, `develop`) rather than an immutable commit SHA or tag.\n\n## Trust Boundary Crossed\n\nGit repository content (force-pushed symlinks) -\u003e repo-server pod filesystem (stale cache allows bypass of symlink validation). This extends the trust boundary crossing from p8-021 by providing a mechanism to evade the symlink scan that protects the manifest generation path.\n\n## Impact\n\n- **Confidentiality**: MEDIUM -- Out-of-bounds file reads from repo-server pod during the 12-hour cache window. Impact amplified when chained with p8-021 (GetGitFiles has no symlink check at all, making this cache bypass relevant only for the manifest generation path).\n\n## Evidence\n\n1. Line 600: Cache key = `rootPath + \"/\" + version + \"/\" + strings.Join(skipPaths, \",\")` -- `version` is the symbolic ref (e.g., `main`).\n2. Line 611: `s.symlinksState.Set(key, checker, gocache.DefaultExpiration)` -- default expiration is 12 hours.\n3. Force-pushing `main` changes the commit SHA but NOT the symbolic ref, so the cache key is unchanged.\n4. The stale cache entry returns the `OnceValue` result from the previous (clean) commit.\n5. `noCache: true` in the request bypasses the cache but is not the default behavior.\n\n## Reproduction Steps\n\n1. Create a Git repository with no symlinks. Configure an ArgoCD Application using `targetRevision: main`.\n2. Trigger a sync to populate the symlink validation cache with an \"OK\" result for `main`.\n3. Force-push `main` to a new commit containing a symlink: `ln -s /etc/passwd secret`.\n4. Within 12 hours, trigger another sync or manifest generation.\n5. The symlink validation returns the cached \"OK\" result, and the symlink is followed during manifest rendering.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"reposerver/repository/repository.go:599-612","repo_name":"github.com/argoproj/argo-cd","matched_at":["reposerver/repository/repository.go:599-612"],"finding_hash":"03f2b3be8fcacc0012dafb5f8a37a05b","found_at":"2026-04-09T18:07:34.412781Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":888,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-026","module_name":"The CMP (Config Management Plugin) tar extraction path in repo-server uses `math.MaxInt64` as the maximum size parameter for `files.Untgz`, effectively imposing no size limit on decompressed content. ","module_type":"whitebox","finding_source":"archon","module_short":"cmp-decompression-bomb","description":"## Summary\n\nThe CMP (Config Management Plugin) tar extraction path in repo-server uses `math.MaxInt64` as the maximum size parameter for `files.Untgz`, effectively imposing no size limit on decompressed content. An attacker who controls the source repository for a CMP-based application can craft a compressed archive (gzip bomb) that decompresses to an arbitrarily large size, exhausting the repo-server's disk space and causing denial of service for all manifest generation operations.\n\n## Location\n\n- Primary: `util/cmp/stream.go:52` -- `files.Untgz(destDir, tgzFile, math.MaxInt64, preserveFileMode)`\n- Context: Other extraction paths in ArgoCD have configurable size limits; the CMP path does not.\n\n## Attacker Control\n\nThe attacker controls the content of a Git repository configured as a CMP-type application. The repository content is tarred and streamed to the CMP server. A highly compressible archive (e.g., repeated zero bytes) can have a very high compression ratio.\n\n## Trust Boundary Crossed\n\nGit repository content (attacker-controlled) -\u003e repo-server pod filesystem (disk exhaustion). The attacker crosses from the Git content trust boundary into the repo-server's local storage.\n\n## Impact\n\n- **Availability**: MEDIUM -- Disk exhaustion on repo-server pod prevents all manifest generation for all applications, not just the attacker's. Recovery requires pod restart and potentially manual disk cleanup.\n\n## Evidence\n\n1. `stream.go:52`: `files.Untgz(destDir, tgzFile, math.MaxInt64, preserveFileMode)` -- `math.MaxInt64 = 9223372036854775807 bytes`, effectively unlimited.\n2. Other extraction paths in ArgoCD (e.g., Helm chart extraction) use configurable limits.\n3. The `files.Untgz` function at `util/io/files/tar.go` does support size limiting -- the CMP path simply does not use it meaningfully.\n\n## Reproduction Steps\n\n1. Create a gzip bomb: a file that is small compressed but decompresses to many GB (e.g., `dd if=/dev/zero bs=1G count=10 | gzip \u003e bomb.tar.gz`).\n2. Configure an ArgoCD Application using a CMP plugin pointing to a repo containing this bomb.\n3. Trigger manifest generation.\n4. The repo-server extracts the archive to disk without size limit, consuming all available disk space.\n5. All subsequent manifest generation operations fail due to no disk space.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/cmp/stream.go:52","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/cmp/stream.go:52"],"finding_hash":"9fdef92522f8bde7ed957c133ec029c7","found_at":"2026-04-09T18:07:34.41278Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":887,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-025","module_name":"ArgoCD's Config Management Plugin (CMP) discovery mechanism reads all `.sock` files from the plugin socket directory and connects to each without authentication (`insecure.NewCredentials()`). An attac","module_type":"whitebox","finding_source":"archon","module_short":"cmp-socket-impersonation","description":"## Summary\n\nArgoCD's Config Management Plugin (CMP) discovery mechanism reads all `.sock` files from the plugin socket directory and connects to each without authentication (`insecure.NewCredentials()`). An attacker with write access to the CMP socket directory (shared volume in sidecar architecture) can place a fake Unix socket that impersonates a CMP plugin. The fake plugin can: (1) claim to match any repository via `MatchRepository=true`, (2) request Git credentials via `ProvideGitCreds=true`, (3) receive the full application source code via tar stream, and (4) return arbitrary manifests that are applied to the Kubernetes cluster.\n\n## Location\n\n- Discovery: `util/app/discovery/discovery.go:113` -- `os.ReadDir(pluginSockFilePath)` enumerates all `.sock` files\n- Connection: `grpc.NewClient(sock, grpc.WithTransportCredentials(insecure.NewCredentials()))` -- no auth\n- Credential forwarding: `reposerver/repository/repository.go:2306-2308` -- `CheckPluginConfiguration` response with `ProvideGitCreds=true` causes credential env vars to be sent\n- Manifest injection: `generateManifestsCMP` sends source + env to plugin, receives arbitrary manifests\n\n## Attacker Control\n\nThe attacker must have write access to the CMP plugin socket directory (`/home/argocd/cmp-server/plugins/`). In standard CMP sidecar deployments, this directory is a shared volume between the repo-server container and CMP sidecar containers. A compromised sidecar container can write to this directory. The attacker also controls all gRPC responses from the fake plugin server.\n\n## Trust Boundary Crossed\n\nCMP sidecar container -\u003e repo-server internal trust boundary -\u003e Git credential store -\u003e Kubernetes cluster state. The sidecar is semi-trusted for its specific plugin function but gains full credential access and manifest injection capability via this vulnerability.\n\n## Impact\n\n- **Confidentiality**: CRITICAL -- Full Git repository credentials for all repos serviced by the fake plugin. Full application source code exfiltrated via tar stream.\n- **Integrity**: CRITICAL -- Arbitrary Kubernetes manifests injected into cluster via auto-sync. Attacker can create cluster-admin roles, deploy backdoors, or modify any cluster resource.\n- **Availability**: HIGH -- Fake plugin can disrupt all manifest generation by claiming to match all repositories.\n\n## Evidence\n\n1. `discovery.go:113`: `os.ReadDir(pluginSockFilePath)` returns all `.sock` files without filtering or validation.\n2. Connection uses `insecure.NewCredentials()` -- no mutual TLS, no token, no plugin identity check.\n3. `CheckPluginConfiguration` response at `repository.go:2301` is trusted unconditionally.\n4. When `ProvideGitCreds=true`, `creds.Environ()` at line 2308 adds Git credential env vars to the plugin environment.\n5. `generateManifestsCMP` at line 2318 streams the full source directory as a tar archive to the plugin.\n6. Plugin response (manifest YAML) is returned to the caller without signature verification.\n\n## Reproduction Steps\n\n1. In a CMP sidecar deployment, gain shell access to any sidecar container sharing the plugin socket volume.\n2. Create a gRPC server implementing `ConfigManagementPluginService` that returns `MatchRepository=true` and `ProvideGitCreds=true`.\n3. Place the server's Unix socket as `evil.sock` in `/home/argocd/cmp-server/plugins/`.\n4. When ArgoCD processes an application, the fake plugin receives: (a) Git credential environment variables, (b) full source code tar stream.\n5. Return arbitrary YAML manifests from the fake plugin -- these are rendered and applied to the cluster.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"util/app/discovery/discovery.go:113","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/app/discovery/discovery.go:113","reposerver/repository/repository.go:2306-2308"],"finding_hash":"5b667a79c5494987dd0c8fae8af84951","found_at":"2026-04-09T18:07:34.412779Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":886,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-024","module_name":"When an ArgoCD Application has `spec.source.helm.passCredentials: true`, the repo-server passes `--pass-credentials` to `helm repo add`. This causes the Helm CLI to forward the main chart registry's c","module_type":"whitebox","finding_source":"archon","module_short":"pass-credentials-forwarding","description":"## Summary\n\nWhen an ArgoCD Application has `spec.source.helm.passCredentials: true`, the repo-server passes `--pass-credentials` to `helm repo add`. This causes the Helm CLI to forward the main chart registry's credentials to ALL dependency registries contacted during `helm dependency build`, including attacker-controlled registries specified in `Chart.yaml`. Operators setting `passCredentials: true` may not realize this forwards credentials to untrusted third-party registries.\n\n## Location\n\n- Primary: `reposerver/repository/repository.go:1311` -- `passCredentials = appHelm.PassCredentials`\n- Flag propagation: `util/helm/cmd.go:203` -- `--pass-credentials` flag added to `helm repo add`\n- Helm behavior: `helm repo add --pass-credentials` causes credential forwarding to all contacted registries\n\n## Attacker Control\n\nThe attacker controls dependency URLs in `Chart.yaml` within the Git repository. The attacker operates a registry server that captures forwarded credentials. The `passCredentials: true` flag must be set by the operator on the Application spec.\n\n## Trust Boundary Crossed\n\nMain chart registry credentials (trusted, operator-configured) -\u003e attacker-controlled dependency registry. The trust model assumes credentials are scoped to the main registry, but `--pass-credentials` extends them to all dependency contacts.\n\n## Impact\n\n- **Confidentiality**: MEDIUM -- Main registry credentials exfiltrated to attacker's dependency registry.\n- **Integrity**: MEDIUM -- Stolen credentials enable push to the legitimate registry if the credentials have write access.\n\n## Evidence\n\n1. Line 1311: `passCredentials = appHelm.PassCredentials` reads from Application spec.\n2. `helm.NewHelmApp` receives `passCredentials` parameter.\n3. `util/helm/cmd.go:203`: `--pass-credentials` flag appended to `helm repo add` command.\n4. Helm official documentation confirms `--pass-credentials` forwards credentials to all registry contacts during dependency resolution.\n\n## Reproduction Steps\n\n1. Configure an ArgoCD Application with `spec.source.helm.passCredentials: true`.\n2. Create a Helm chart with a dependency pointing to an attacker-controlled registry.\n3. Set up the attacker registry to log incoming authentication headers.\n4. Trigger manifest generation.\n5. Observe main registry credentials forwarded to the attacker registry during `helm dependency build`.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"reposerver/repository/repository.go:1311","repo_name":"github.com/argoproj/argo-cd","matched_at":["reposerver/repository/repository.go:1311","util/helm/cmd.go:203"],"finding_hash":"5c6fab72a1b6f11307ae5b78e8346a44","found_at":"2026-04-09T18:07:34.412777Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":885,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-023","module_name":"The `isSourcePermitted` check that enforces Project SourceRepos allowlist for Helm chart dependencies is only invoked when `runHelmBuild` returns an error containing the strings \"cannot be reached\" or","module_type":"whitebox","finding_source":"archon","module_short":"helm-source-permitted-bypass","description":"## Summary\n\nThe `isSourcePermitted` check that enforces Project SourceRepos allowlist for Helm chart dependencies is only invoked when `runHelmBuild` returns an error containing the strings \"cannot be reached\" or \"could not download\". If an attacker's Helm registry is reachable and serves a valid chart, the download succeeds, `runHelmBuild` returns nil, and `isSourcePermitted` is never called. This allows Helm chart dependencies from non-permitted external registries to be downloaded, rendered, and applied to the cluster.\n\n## Location\n\n- Primary: `reposerver/repository/repository.go:1349-1369` -- `runHelmBuild` call and conditional `isSourcePermitted` check\n- Check function: `isSourcePermitted(repo.Repo, q.ProjectSourceRepos)` at line 1360\n- Trigger condition: Only when `err != nil` AND error message contains \"cannot be reached\" or \"could not download\"\n\n## Attacker Control\n\nThe attacker specifies dependency URLs in `Chart.yaml` within an attacker-controlled Git repository. The attacker operates a Helm chart registry that serves valid (but malicious) chart packages.\n\n## Trust Boundary Crossed\n\nProject SourceRepos allowlist (security policy boundary) -\u003e non-permitted external Helm registry. The AppProject's SourceRepos configuration is intended to restrict which repositories can contribute to manifest generation, but this check is bypassed for reachable registries.\n\n## Impact\n\n- **Integrity**: HIGH -- Arbitrary Helm chart content from non-permitted registries rendered and applied to cluster. Supply chain injection.\n- **Confidentiality**: MEDIUM -- Chart templates can include hooks that exfiltrate cluster data.\n\n## Evidence\n\n1. Line 1343-1347: `h.Template()` fails with `IsMissingDependencyErr` -\u003e proceeds to `runHelmBuild`.\n2. Line 1349: `runHelmBuild(appPath, h)` executes `helm dependency build` which downloads from all dependency URLs.\n3. Lines 1350-1363: `isSourcePermitted` only checked inside `if err != nil` block, and only for specific error message patterns.\n4. Line 1372 (implicit): On success, `h.Template()` is called again with no allowlist check -- the downloaded chart is rendered.\n5. The check placement is a logic error: security validation should occur BEFORE the network download, not after a failed download.\n\n## Reproduction Steps\n\n1. Create an ArgoCD Project with `sourceRepos: [\"https://allowed-repo.example.com\"]`.\n2. Create a Helm chart in the allowed repo with `Chart.yaml` containing a dependency from `https://attacker-registry.example.com/charts`.\n3. Set up `attacker-registry.example.com` to serve a valid Helm chart package containing malicious templates.\n4. Create an Application in the project pointing to the Helm chart.\n5. On sync, `helm dependency build` downloads from the attacker registry (succeeds), `isSourcePermitted` is never called, and the malicious templates are rendered and applied.\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"reposerver/repository/repository.go:1349-1369","repo_name":"github.com/argoproj/argo-cd","matched_at":["reposerver/repository/repository.go:1349-1369"],"finding_hash":"78cf26fdbddc7604d3e36d7ffcc22ff3","found_at":"2026-04-09T18:07:34.412773Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":884,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-022","module_name":"The OCI credential matching logic in `getHelmRepos` uses `strings.HasPrefix` without domain boundary enforcement. An attacker who controls a Helm chart's `Chart.yaml` dependencies can specify a regist","module_type":"whitebox","finding_source":"archon","module_short":"oci-credential-prefix-match","description":"## Summary\n\nThe OCI credential matching logic in `getHelmRepos` uses `strings.HasPrefix` without domain boundary enforcement. An attacker who controls a Helm chart's `Chart.yaml` dependencies can specify a registry URL like `oci://myregistry.io.attacker.com` which matches stored credentials for `myregistry.io` via the prefix check. The matching is bidirectional (`HasPrefix(dep.Repo, cred.Repo) || HasPrefix(cred.Repo, dep.Repo)`), meaning very short dependency URLs can match multiple credential entries. The matched credentials are sent to the attacker's registry via `helm registry login` before any `isSourcePermitted` check.\n\n## Location\n\n- Primary: `reposerver/repository/repository.go:1118` -- bidirectional `strings.HasPrefix` credential matching\n- Credential use: Lines 1119-1122 -- username, password, and Azure WI flag copied from matched credential\n- Consumer: `helm registry login` subprocess with stolen credentials\n\n## Attacker Control\n\nThe attacker controls `dep.Repo` via the `repository` field in `Chart.yaml` dependencies within an attacker-controlled Git repository. The attacker also controls the destination registry server that receives the credentials.\n\n## Trust Boundary Crossed\n\nArgoCD credential store (private OCI registry credentials configured by operator) -\u003e attacker-controlled OCI registry server. Credentials cross from the trusted ArgoCD configuration into an untrusted external service.\n\n## Impact\n\n- **Confidentiality**: HIGH -- Private OCI registry credentials (username + password/token) exfiltrated to attacker.\n- **Integrity**: HIGH -- With stolen credentials, attacker can push poisoned charts to the legitimate registry, enabling supply chain attacks.\n\n## Evidence\n\n1. Line 1118: `strings.HasPrefix(dep.Repo, cred.Repo) || strings.HasPrefix(cred.Repo, dep.Repo)` -- no domain boundary check (no `/` or `:` separator requirement).\n2. Example: `dep.Repo = \"myregistry.io.attacker.com\"` matches `cred.Repo = \"myregistry.io\"` because `HasPrefix(\"myregistry.io.attacker.com\", \"myregistry.io\") = true`.\n3. Bidirectional: `dep.Repo = \"oci\"` matches ANY credential where `cred.Repo` starts with `\"oci\"`.\n4. Lines 1119-1120: Username and password copied directly from matched credential to repo struct.\n5. The code comment references issue #12436, indicating this prefix matching was intentional but the domain boundary issue was not considered.\n\n## Reproduction Steps\n\n1. Configure ArgoCD with OCI registry credentials for `myregistry.io` (username + password).\n2. Create a Helm chart with `Chart.yaml` dependency: `repository: oci://myregistry.io.attacker.com/charts`.\n3. Set up a listener on `myregistry.io.attacker.com` to capture `helm registry login` requests.\n4. Create an ArgoCD Application pointing to the chart.\n5. On manifest generation, observe `helm registry login myregistry.io.attacker.com --username \u003cvictim\u003e --password \u003cvictim\u003e` executed with the victim's credentials.\n","severity":"high","confidence":"tentative","tags":["archon","phase-8","valid","poc-executed"],"status":"open","cvss_score":0,"source_file":"reposerver/repository/repository.go:1118","repo_name":"github.com/argoproj/argo-cd","matched_at":["reposerver/repository/repository.go:1118"],"finding_hash":"13d3a2538244f02956f81e962a806cdf","found_at":"2026-04-09T18:07:34.412769Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":883,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-021","module_name":"The `GetGitFiles` RPC endpoint in repo-server reads files from a Git checkout using `os.ReadFile(filepath.Join(root, filePath))` where `filePath` comes from `git ls-files`. When a repository contains ","module_type":"whitebox","finding_source":"archon","module_short":"getgitfiles-symlink-traversal","description":"## Summary\n\nThe `GetGitFiles` RPC endpoint in repo-server reads files from a Git checkout using `os.ReadFile(filepath.Join(root, filePath))` where `filePath` comes from `git ls-files`. When a repository contains committed symlinks pointing to files outside the repository root, `os.ReadFile` follows the symlink and reads the target file. The `checkOutOfBoundsSymlinks` validation that protects the manifest generation path is NOT called in the `GetGitFiles` code path. This affects the default configuration where `enableNewGitFileGlobbing=false`.\n\n## Location\n\n- Primary: `reposerver/repository/repository.go:3150` -- `os.ReadFile(filepath.Join(gitClient.Root(), filePath))`\n- Missing check: `checkOutOfBoundsSymlinks` (line 599) not called in `GetGitFiles`\n- Safe alternative: new globbing path (when `enableNewGitFileGlobbing=true`) uses `filepath.EvalSymlinks` + boundary check\n\n## Attacker Control\n\nThe attacker commits symlinks to a Git repository monitored by ArgoCD. For example, `data -\u003e /var/run/secrets/kubernetes.io/serviceaccount/token`. The symlink name is returned by `git ls-files` and the target is followed by `os.ReadFile`.\n\n## Trust Boundary Crossed\n\nGit repository content (attacker-authored symlinks) -\u003e repo-server pod filesystem. File contents returned via gRPC to argocd-server and used by ApplicationSet generators for template rendering and cluster selection.\n\n## Impact\n\n- **Confidentiality**: HIGH -- Arbitrary file read from repo-server pod (SA token, SSH keys, env files).\n- **Integrity**: MEDIUM -- File contents used as ApplicationSet template parameters could influence Application spec generation.\n\n## Evidence\n\n1. `GetGitFiles` at line 3130 calls `gitClient.LsFiles(gitPath, enableNewGitFileGlobbing)`.\n2. When `enableNewGitFileGlobbing=false` (default, controlled by `ARGOCD_ENABLE_NEW_GIT_FILE_GLOBBING` env var), `git ls-files` returns symlink names.\n3. Line 3150: `os.ReadFile(filepath.Join(gitClient.Root(), filePath))` follows symlinks without any boundary validation.\n4. No call to `checkOutOfBoundsSymlinks` in the `GetGitFiles` function.\n5. The new globbing path has proper protection but is not the default.\n6. PoC test `security/findings/H2-getgitfiles-symlink-traversal/poc_test.go` executed and confirmed traversal: out-of-bounds file content returned by the `os.ReadFile` call; safe path filters it correctly.\n\n## Reproduction Steps\n\n1. Create a Git repository with a symlink: `ln -s /var/run/secrets/kubernetes.io/serviceaccount/token sensitive-data`\n2. Commit and push the symlink.\n3. Configure an ApplicationSet with a Git file generator pointing to this repo.\n4. The `GetGitFiles` call returns the content of the symlink target as file content.\n5. Verify `ARGOCD_ENABLE_NEW_GIT_FILE_GLOBBING` is not set (default: false).\n","severity":"high","confidence":"tentative","tags":["archon","phase-8","valid","poc-executed"],"status":"open","cvss_score":0,"source_file":"reposerver/repository/repository.go:3150","repo_name":"github.com/argoproj/argo-cd","matched_at":["reposerver/repository/repository.go:3150"],"finding_hash":"1daaa98d33e1a4a16b24854f4e7278d0","found_at":"2026-04-09T18:07:34.412768Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":882,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-020","module_name":"The go-jsonnet `FileImporter` used by ArgoCD's repo-server does not restrict absolute path imports. An attacker who can commit a `.jsonnet` file to a monitored Git repository can use `importstr \"/var/","module_type":"whitebox","finding_source":"archon","module_short":"jsonnet-absolute-import-file-read","description":"## Summary\n\nThe go-jsonnet `FileImporter` used by ArgoCD's repo-server does not restrict absolute path imports. An attacker who can commit a `.jsonnet` file to a monitored Git repository can use `importstr \"/var/run/secrets/kubernetes.io/serviceaccount/token\"` to read the Kubernetes service account token from the repo-server pod. The token content is embedded in the rendered manifest output, returned via gRPC to argocd-server, and persisted in Redis cache for up to 24 hours. The K8s SA token typically grants cluster-level API access. Additionally, `/proc/self/environ` can be read to exfiltrate environment variables including `REDIS_PASSWORD` and Git credential-related variables.\n\n## Location\n\n- Primary: `reposerver/repository/repository.go:2232` -- `makeJsonnetVM` creates FileImporter without path restrictions\n- Upstream: `github.com/google/go-jsonnet@v0.21.0/imports.go:234` -- `FileImporter.tryPath` short-circuits JPath search for absolute paths\n- Call chain: `GenerateManifest` -\u003e `runRepoOperation` -\u003e `generateManifests` -\u003e `findManifests` -\u003e `makeJsonnetVM` -\u003e `vm.EvaluateFile`\n\n## Attacker Control\n\nThe attacker controls the `.jsonnet` file content in a Git repository that ArgoCD is configured to monitor. The `importstr` or `import` directive with an absolute path is fully attacker-controlled. No sanitization or validation of import paths occurs before evaluation.\n\n## Trust Boundary Crossed\n\nInternet (Git repository content authored by attacker) -\u003e repo-server pod filesystem (Kubernetes service account token, process environment variables, SSH keys, askpass socket paths). The repo-server is a trusted internal component with access to credentials for all configured repositories and a Kubernetes service account.\n\n## Impact\n\n- **Confidentiality**: CRITICAL -- Kubernetes service account token theft enables direct cluster API access. Environment variable exfiltration reveals REDIS_PASSWORD (enabling cache poisoning chain), Git credentials, and internal configuration.\n- **Integrity**: HIGH -- With the K8s SA token, attacker can modify cluster resources. With REDIS_PASSWORD, attacker can poison manifest cache to trigger unauthorized auto-sync.\n- **Availability**: MEDIUM -- Cache poisoning can disrupt reconciliation.\n\n## Adversarial Review Notes\n\n- **automountServiceAccountToken: false** is set in the default repo-server deployment manifest (line 19 of `manifests/base/repo-server/argocd-repo-server-deployment.yaml`). This blocks the SA token theft claim in default configurations. The SA token vector is only viable when operators override this setting.\n- **REDIS_PASSWORD exfiltration via /proc/self/environ** remains viable in default configurations (env var set at deployment manifest lines 27-31).\n- **TLS private keys** at `/app/config/reposerver/tls/tls.key` are readable if the optional TLS secret is provisioned.\n- Severity downgraded from CRITICAL to HIGH because the headline SA token claim is blocked by default, and exploiting REDIS_PASSWORD requires additional cluster network access.\n\n## Evidence\n\n1. `makeJsonnetVM` at repository.go:2232 creates `jsonnet.FileImporter{JPaths: jpaths}` without any import path restriction beyond JPath ordering.\n2. go-jsonnet `FileImporter.Import` at imports.go:234: when `filepath.IsAbs(importedPath)` is true, `tryPath` directly sets `absPath = importedPath`, bypassing the JPath directory search entirely.\n3. `os.ReadFile(absPath)` at imports.go reads the file content with no boundary check.\n4. The rendered manifest containing the file content is returned to the caller and stored in Redis via `s.cache.SetManifests` with a default 24-hour TTL.\n5. Historical precedent: ArgoCD has 9 prior path traversal/symlink advisories in repo-server (CVE-2022-24730, CVE-2022-24731, CVE-2022-24348, etc.), indicating this attack surface is structurally recurrent.\n6. **PoC executed**: `go run ./security/findings/H1-jsonnet-absolute-import-file-read/poc.go` confirmed REDIS_PASSWORD and SA token content appear verbatim in rendered manifest JSON output using the real go-jsonnet@v0.21.0 library.\n\n## Reproduction Steps\n\n1. Create a Git repository with a `.jsonnet` file:\n   ```jsonnet\n   local token = importstr \"/var/run/secrets/kubernetes.io/serviceaccount/token\";\n   local environ = importstr \"/proc/self/environ\";\n   { token: token, environ: environ }\n   ```\n2. Configure an ArgoCD Application pointing to this repository with source type `directory` (Jsonnet auto-detected from `.jsonnet` extension).\n3. Trigger manifest generation (automatic on sync or refresh).\n4. Observe the rendered manifest contains the K8s SA token and process environment variables as literal string values.\n5. The manifest is also stored in Redis cache and visible in the ArgoCD UI application details.\n\n**Defense search results**: No ArgoCD-level protection blocks this path. JPaths restriction only affects search order, not absolute path resolution. `ResolveFileOrDirectoryPath` is applied to JPath entries but not to import paths within `.jsonnet` files. The `checkOutOfBoundsSymlinks` function is irrelevant as no symlinks are involved -- this is a direct absolute path read.\n","severity":"high","confidence":"tentative","tags":["archon","phase-8","valid","poc-executed"],"status":"open","cvss_score":0,"source_file":"reposerver/repository/repository.go:2232","repo_name":"github.com/argoproj/argo-cd","matched_at":["reposerver/repository/repository.go:2232","github.com/google/go-jsonnet@v0.21.0/imports.go:234"],"finding_hash":"8c09e4e9a74cb4735535b43af0dd9f22","found_at":"2026-04-09T18:07:34.412767Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":880,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-012","module_name":"ArgoCD's OAuth2/OIDC authorization code flow does not enforce PKCE (Proof Key for Code Exchange, RFC 7636) by default. The `oauth2.pkce` configuration setting must be explicitly enabled. Without PKCE,","module_type":"whitebox","finding_source":"archon","module_short":"pkce-not-enforced-by-default","description":"## Summary\n\nArgoCD's OAuth2/OIDC authorization code flow does not enforce PKCE (Proof Key for Code Exchange, RFC 7636) by default. The `oauth2.pkce` configuration setting must be explicitly enabled. Without PKCE, authorization codes intercepted via open redirects, referrer headers, or browser history can be exchanged by an attacker for valid tokens.\n\n## Location\n\n- `util/oidc/oidc.go:440-443` -- PKCE verifier generation gated by `a.usePKCE`\n- `util/oidc/oidc.go:550-552` -- PKCE verifier used in exchange only when enabled\n\n## Attacker Control\n\n- Attacker intercepts the authorization code from the OAuth2 callback\n- Without PKCE, the code can be exchanged for a token by anyone who possesses it\n\n## Trust Boundary Crossed\n\nOAuth2 code exchange boundary -- authorization code is not bound to the initiating client session.\n\n## Impact\n\n- Authorization code interception enables account takeover\n- Attacker exchanges intercepted code for victim's session token\n- Historical precedent: CVE-2022-31034 for insecure OAuth2/PKCE parameters\n\n## Evidence\n\n```go\n// oidc.go:440-443\nif a.usePKCE {  // defaults to false\n    verifier = oauth2.GenerateVerifier()\n    opts = append(opts, oauth2.S256ChallengeOption(verifier))\n}\n\n// oidc.go:550-552\nif a.usePKCE {  // only included in exchange when enabled\n    opts = append(opts, oauth2.VerifierOption(pkceVerifier))\n}\n```\n\n## Reproduction Steps\n\n1. Configure ArgoCD with OIDC without `oauth2.pkce` setting\n2. Initiate the login flow and capture the authorization URL\n3. Complete the OIDC flow and capture the authorization code from the callback\n4. Exchange the code from a different client/session (without PKCE verifier)\n5. Observe the code exchange succeeds and a valid token is returned\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/oidc/oidc.go:440-443","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/oidc/oidc.go:440-443","util/oidc/oidc.go:550-552"],"finding_hash":"144c269829f3f0997b0ab3588b5b6226","found_at":"2026-04-09T18:07:34.412766Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":881,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-013","module_name":"The `GetUserIdentifier()` function in `util/jwt/jwt.go` checks `federated_claims.user_id` FIRST, before falling back to the standard OIDC `sub` claim. In Dex-mediated deployments, `federated_claims` c","module_type":"whitebox","finding_source":"archon","module_short":"federated-claims-subject-injection","description":"## Summary\n\nThe `GetUserIdentifier()` function in `util/jwt/jwt.go` checks `federated_claims.user_id` FIRST, before falling back to the standard OIDC `sub` claim. In Dex-mediated deployments, `federated_claims` contains attributes from the upstream IdP. If the upstream IdP allows users to influence attributes that map to `user_id` (e.g., SAML NameID with user-controllable fields), an attacker can inject a different user's identifier and inherit their RBAC permissions.\n\n## Location\n\n- `util/jwt/jwt.go:143-166` -- GetUserIdentifier() claim priority order\n\n## Attacker Control\n\n- Attacker influences `federated_claims.user_id` via upstream IdP attribute mapping\n- The injected user_id becomes the RBAC subject for Casbin enforcement\n\n## Trust Boundary Crossed\n\nIdentity trust boundary -- the RBAC subject identity is derived from a less-trustworthy claim source (`federated_claims.user_id`) that takes precedence over the standard OIDC `sub` claim.\n\n## Impact\n\n- RBAC privilege escalation: attacker assumes the identity of any user for authorization purposes\n- All RBAC policies matching the impersonated user's identifier apply to the attacker\n- The standard `sub` claim (which is typically IdP-controlled and immutable) is overridden\n\n## Evidence\n\n```go\n// util/jwt/jwt.go:143-166\nfunc GetUserIdentifier(c jwtgo.MapClaims) string {\n    if c == nil {\n        return \"\"\n    }\n    fallback := StringField(c, \"sub\")  // Standard OIDC subject\n\n    f := c[\"federated_claims\"]\n    if f == nil {\n        return fallback\n    }\n    federatedClaims, ok := f.(map[string]any)\n    if !ok {\n        return fallback\n    }\n    userId, ok := federatedClaims[\"user_id\"].(string)\n    if !ok || userId == \"\" {\n        return fallback\n    }\n    return userId  // federated_claims.user_id takes precedence over sub\n}\n```\n\n## Reproduction Steps\n\n1. Configure ArgoCD with Dex connected to an upstream SAML IdP\n2. At the IdP, configure a SAML attribute that maps to Dex's `user_id` in federated_claims\n3. As a low-privilege user, modify the controllable attribute to match an admin's identifier\n4. Log in to ArgoCD via Dex SSO\n5. Observe the user has the admin's RBAC permissions because GetUserIdentifier() returns the injected user_id\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/jwt/jwt.go:143-166","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/jwt/jwt.go:143-166"],"finding_hash":"1556371333e6724da0eaebb501ca53d9","found_at":"2026-04-09T18:07:34.412766Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":879,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-011","module_name":"The token revocation system relies on Redis for cross-replica propagation. When Redis becomes unavailable, the `watchRevokedTokens` goroutine's pub/sub channel closes and the goroutine exits. The `loa","module_type":"whitebox","finding_source":"archon","module_short":"redis-revocation-fail-open","description":"## Summary\n\nThe token revocation system relies on Redis for cross-replica propagation. When Redis becomes unavailable, the `watchRevokedTokens` goroutine's pub/sub channel closes and the goroutine exits. The `loadRevokedTokensSafe` function retries with 1-minute sleeps on error. During this window, token revocations performed on other replicas are not propagated to the affected instance.\n\n## Location\n\n- `util/session/state.go:58-73` -- watchRevokedTokens pub/sub goroutine\n- `util/session/state.go:76-83` -- loadRevokedTokensSafe retry loop\n\n## Attacker Control\n\n- Attacker who can cause Redis unavailability (OOM, network partition) creates a revocation gap\n- Revoked tokens may be accepted by replicas with stale revocation state\n\n## Trust Boundary Crossed\n\nSession revocation boundary -- fail-open design accepts potentially revoked tokens during Redis outage.\n\n## Impact\n\n- Window where revoked tokens are accepted during Redis connectivity issues\n- In HA deployments, cross-replica revocation propagation stops during outage\n- recentRevokedTokens buffer preserves locally-performed revocations (partial mitigation)\n\n## Evidence\n\n```go\n// state.go:58-73\nfunc (storage *userStateStorage) watchRevokedTokens(ctx context.Context) {\n    pubsub := storage.redis.Subscribe(ctx, newRevokedTokenKey)\n    defer utilio.Close(pubsub)\n    ch := pubsub.Channel()\n    for {\n        select {\n        case \u003c-ctx.Done():\n            return\n        case val := \u003c-ch:  // channel closes on Redis disconnect\n            storage.lock.Lock()\n            storage.revokedTokens[val.Payload] = true\n            storage.recentRevokedTokens[val.Payload] = true\n            storage.lock.Unlock()\n        }\n    }\n}\n\n// state.go:76-83\nfunc (storage *userStateStorage) loadRevokedTokensSafe() {\n    err := storage.loadRevokedTokens()\n    for err != nil {\n        log.Warnf(\"Failed to resync revoked tokens. retrying again in 1 minute: %v\", err)\n        time.Sleep(time.Minute)  // 1-minute gap\n        err = storage.loadRevokedTokens()\n    }\n}\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD in HA mode with multiple replicas\n2. Authenticate and obtain a valid token\n3. Cause Redis unavailability (e.g., kill the Redis pod)\n4. Revoke the token on one replica\n5. Attempt to use the token on a different replica during the Redis outage\n6. Observe the token is accepted because the revocation has not propagated\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/session/state.go:58-73","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/session/state.go:58-73","util/session/state.go:76-83"],"finding_hash":"6e646615d4358ec373fde5536347e4cc","found_at":"2026-04-09T18:07:34.412765Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":878,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-010","module_name":"The gRPC `StreamServerInterceptor` calls `server.Authenticate` once when a streaming RPC is opened. For the lifetime of the stream, no further authentication checks occur. If a user's token is revoked","module_type":"whitebox","finding_source":"archon","module_short":"grpc-stream-no-reauth","description":"## Summary\n\nThe gRPC `StreamServerInterceptor` calls `server.Authenticate` once when a streaming RPC is opened. For the lifetime of the stream, no further authentication checks occur. If a user's token is revoked after a stream is established, the stream continues delivering data (application state, pod logs) until the connection is closed.\n\n## Location\n\n- `server/server.go:958` -- grpc_auth.StreamServerInterceptor(server.Authenticate)\n\n## Attacker Control\n\n- Attacker maintains an open gRPC streaming subscription\n- Token revocation does not terminate the stream\n\n## Trust Boundary Crossed\n\nSession lifecycle boundary -- token revocation cannot terminate active streaming subscriptions.\n\n## Impact\n\n- Revoked users continue receiving application state changes via WatchApplications\n- Revoked users continue receiving pod logs via PodLogs streaming\n- Information disclosure continues until connection-level timeout (TCP keepalive)\n\n## Evidence\n\n```go\n// server.go:958\ngrpc_auth.StreamServerInterceptor(server.Authenticate)\n// Authenticate called once at stream open, not per message\n```\n\n## Reproduction Steps\n\n1. Establish a streaming subscription (e.g., WatchApplications or PodLogs)\n2. Revoke the user's token\n3. Observe the stream continues delivering data\n4. New stream attempts are correctly denied\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"server/server.go:958","repo_name":"github.com/argoproj/argo-cd","matched_at":["server/server.go:958"],"finding_hash":"20f856ea4f0a09b0167a8507a6452d98","found_at":"2026-04-09T18:07:34.412764Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":876,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-008","module_name":"The Dex TLS configuration defaults to `InsecureSkipVerify: true` when `--dex-server-strict-tls` is not enabled (it defaults to false). This means all TLS connections from argocd-server to the Dex OIDC","module_type":"whitebox","finding_source":"archon","module_short":"dex-tls-insecure-skip-verify","description":"## Summary\n\nThe Dex TLS configuration defaults to `InsecureSkipVerify: true` when `--dex-server-strict-tls` is not enabled (it defaults to false). This means all TLS connections from argocd-server to the Dex OIDC provider skip certificate verification, enabling man-in-the-middle attacks by any entity with network access between the two pods.\n\n## Location\n\n- `util/dex/dex.go:29-36` -- TLSConfig() returns InsecureSkipVerify:true by default\n\n## Attacker Control\n\n- Attacker with cluster network access can intercept and modify TLS connections between argocd-server and Dex\n- MITM enables forging OIDC tokens with arbitrary claims (groups, sub, email)\n\n## Trust Boundary Crossed\n\nInternal service communication boundary -- argocd-server trusts Dex responses without verifying the server's identity.\n\n## Impact\n\n- OIDC token forgery via MITM on the Dex connection\n- Combined with p8-007 (groups trust): forge tokens with `groups: [\"argocd-admins\"]` for full admin access\n- Any compromised pod in the cluster can perform this attack\n\n## Evidence\n\n```go\n// util/dex/dex.go:29-36\nfunc TLSConfig(tlsConfig *DexTLSConfig) *tls.Config {\n    if tlsConfig == nil || tlsConfig.DisableTLS {\n        return nil\n    }\n    if !tlsConfig.StrictValidation {  // defaults to false\n        return \u0026tls.Config{\n            InsecureSkipVerify: true,  // ALL certificates accepted\n        }\n    }\n    // ... strict validation path (opt-in)\n}\n```\n\n## Reproduction Steps\n\n1. Deploy ArgoCD with default Dex configuration (no `--dex-server-strict-tls`)\n2. From a compromised pod in the same namespace, intercept traffic to the Dex server port\n3. Present a self-signed certificate -- argocd-server accepts it\n4. Forge OIDC token responses with elevated group claims\n5. Verify admin access is granted with the forged token\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/dex/dex.go:29-36","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/dex/dex.go:29-36"],"finding_hash":"7aae619d7bbb9ce29edd62f2f8e4e5bc","found_at":"2026-04-09T18:07:34.412763Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":877,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-009","module_name":"`VerifyToken()` uses `jwt.ParseUnverified()` to extract the `iss` claim from the token BEFORE any signature verification. The extracted `iss` value determines which verification path runs: `iss==\"argo","module_type":"whitebox","finding_source":"archon","module_short":"iss-routing-hmac-bypass","description":"## Summary\n\n`VerifyToken()` uses `jwt.ParseUnverified()` to extract the `iss` claim from the token BEFORE any signature verification. The extracted `iss` value determines which verification path runs: `iss==\"argocd\"` routes to HMAC-SHA256 verification, anything else routes to OIDC provider verification. This means the HMAC authentication path is permanently active in all deployments, including OIDC-only configurations, creating a parallel authentication channel that bypasses SSO policies, MFA, and conditional access.\n\n## Location\n\n- `util/session/sessionmanager.go:559-570` -- VerifyToken() with ParseUnverified dispatch\n\n## Attacker Control\n\n- Attacker controls the `iss` claim in the JWT (pre-verification)\n- With knowledge of `server.secretkey`, can forge HMAC tokens bypassing OIDC entirely\n\n## Trust Boundary Crossed\n\nSSO policy boundary -- organizational OIDC controls (MFA, conditional access, session policies) are bypassed by the parallel HMAC path.\n\n## Impact\n\n- Defense-in-depth failure: OIDC-only deployments still have an active HMAC authentication channel\n- If server.secretkey is compromised (e.g., via K8s RBAC misconfiguration, backup exposure), attacker forges arbitrary admin tokens without touching the OIDC provider\n- Bypasses MFA, conditional access, and other SSO policies enforced by the OIDC provider\n\n## Evidence\n\n```go\n// sessionmanager.go:559-570\nparser := jwt.NewParser(jwt.WithoutClaimsValidation())\nclaims := jwt.MapClaims{}\n_, _, err := parser.ParseUnverified(tokenString, \u0026claims)\nissuer, _ := claims[\"iss\"].(string)\nswitch issuer {\ncase SessionManagerClaimsIssuer:  // \"argocd\"\n    return mgr.Parse(tokenString)  // HMAC path -- always active\ndefault:\n    prov, err := mgr.provider()\n    // ... OIDC path\n}\n```\n\n## Reproduction Steps\n\n1. Configure ArgoCD with OIDC-only authentication (no local accounts)\n2. Extract `server.secretkey` from the `argocd-secret` K8s Secret\n3. Forge a JWT with `iss: \"argocd\"`, `sub: \"admin\"`, signed with HMAC-SHA256 using the server key\n4. Use the forged token to access ArgoCD API\n5. Observe access is granted without any OIDC interaction\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/session/sessionmanager.go:559-570","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/session/sessionmanager.go:559-570"],"finding_hash":"bcdf17f4c5ec0fc51472a935ae754e1b","found_at":"2026-04-09T18:07:34.412763Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":875,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-007","module_name":"ArgoCD trusts the `groups` claim from OIDC JWTs for RBAC evaluation without re-validating against the IdP's userinfo endpoint. The `SetGroupsFromUserInfo()` function only overrides JWT groups when BOT","module_type":"whitebox","finding_source":"archon","module_short":"oidc-groups-trusted-without-revalidation","description":"## Summary\n\nArgoCD trusts the `groups` claim from OIDC JWTs for RBAC evaluation without re-validating against the IdP's userinfo endpoint. The `SetGroupsFromUserInfo()` function only overrides JWT groups when BOTH `EnableUserInfoGroups=true` AND `UserInfoPath!=\"\"` are configured -- neither is true by default. In deployments where the IdP allows users to influence their own group memberships, this enables RBAC privilege escalation.\n\n## Location\n\n- `util/oidc/oidc.go:900-914` -- SetGroupsFromUserInfo() triple condition\n\n## Attacker Control\n\n- Attacker who can influence their own OIDC group claims at the IdP level\n- Groups flow through to ArgoCD RBAC without server-side re-validation\n\n## Trust Boundary Crossed\n\nIdP trust boundary -- ArgoCD trusts group claims from the JWT without independent verification. The IdP's group management is the sole control point.\n\n## Impact\n\n- RBAC privilege escalation via group injection (e.g., adding `argocd-admins` group)\n- Chains with PH-16 (Dex TLS MITM): attacker who can MITM the Dex connection can forge tokens with arbitrary groups\n- Default configuration does not re-validate groups\n\n## Evidence\n\n```go\n// oidc.go:900 (approximate)\nfunc SetGroupsFromUserInfo(claims jwt.MapClaims, ...) {\n    if !UserInfoGroupsEnabled() || UserInfoPath() == \"\" {\n        return  // Default: groups from JWT trusted as-is\n    }\n    // Only reaches userinfo re-validation if BOTH settings configured\n}\n```\n\n## Reproduction Steps\n\n1. Configure ArgoCD with OIDC (default EnableUserInfoGroups=false)\n2. At the IdP, modify the user's group attribute to include the ArgoCD admin group\n3. Log in to ArgoCD via SSO\n4. Observe the user has admin permissions based on the JWT groups claim\n5. Verify by enabling `EnableUserInfoGroups=true` and `UserInfoPath` -- groups are now re-validated\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/oidc/oidc.go:900-914","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/oidc/oidc.go:900-914"],"finding_hash":"38f3ef9c2dfb3084c5956e2b587191c3","found_at":"2026-04-09T18:07:34.412762Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":874,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-006","module_name":"When the RBAC enforcer attempts to load a project-specific policy and `newEnforcerSafe` fails to parse it, the code silently falls back to the global enforcer without the project's policy. This means ","module_type":"whitebox","finding_source":"archon","module_short":"project-policy-silent-fallback","description":"## Summary\n\nWhen the RBAC enforcer attempts to load a project-specific policy and `newEnforcerSafe` fails to parse it, the code silently falls back to the global enforcer without the project's policy. This means project-level deny rules are silently dropped, and only the global policy applies. The fallback is logged at error level but does not cause an authorization denial.\n\n## Location\n\n- `util/rbac/rbac.go:187-195` -- project policy fallback on parse failure\n\n## Attacker Control\n\n- Attacker who can craft a project policy that passes `ValidatePolicy()` validation but fails Casbin runtime parsing can trigger the fallback\n- The fallback drops all project-level deny rules\n\n## Trust Boundary Crossed\n\nProject isolation boundary -- project-specific access controls are silently dropped.\n\n## Impact\n\n- Project-level deny rules become ineffective, granting broader access than intended\n- Defense-in-depth failure: errors in policy parsing result in more permissive access, not denial\n\n## Evidence\n\n```go\n// rbac.go:187-195\nif policy != \"\" {\n    if enforcer, err = newEnforcerSafe(matchFunc, e.model, newAdapter(e.adapter.builtinPolicy, e.adapter.userDefinedPolicy, policy)); err != nil {\n        log.Errorf(\"Failed to load project '%s' policy\", project)\n        enforcer, err = newEnforcerSafe(matchFunc, e.model, e.adapter)  // fallback to global\n    }\n} else {\n    enforcer, err = newEnforcerSafe(matchFunc, e.model, e.adapter)\n}\n```\n\n## Reproduction Steps\n\n1. Create a project with a policy that passes ValidatePolicy() but causes Casbin parsing to fail at runtime\n2. Attempt to access a resource that should be denied by the project policy\n3. Observe the access is granted because the global policy (without project deny rules) is used\n4. Check server logs for `\"Failed to load project '\u003cname\u003e' policy\"` error message\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/rbac/rbac.go:187-195","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/rbac/rbac.go:187-195"],"finding_hash":"271c1cfb520fcf57441146e63dd3b7e8","found_at":"2026-04-09T18:07:34.412761Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":873,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-005","module_name":"The RBAC `enforce()` function checks the `defaultRole` before inspecting the subject's identity. When `AnonymousUserEnabled=true` and `policy.default` is set to any role, unauthenticated callers recei","module_type":"whitebox","finding_source":"archon","module_short":"anonymous-rbac-default-role","description":"## Summary\n\nThe RBAC `enforce()` function checks the `defaultRole` before inspecting the subject's identity. When `AnonymousUserEnabled=true` and `policy.default` is set to any role, unauthenticated callers receive the full permissions of that default role without any identity check. The default `role:readonly` excludes exec, but custom configurations with more permissive defaults expose write operations or sensitive data to anonymous users.\n\n## Location\n\n- `util/rbac/rbac.go:381-386` -- enforce() checks defaultRole before subject\n- `server/server.go:1552-1556` -- Anonymous user sets claims=\"\" in context\n\n## Attacker Control\n\n- Attacker sends unauthenticated requests to ArgoCD API\n- No credentials required when anonymous mode is enabled with a permissive default role\n\n## Trust Boundary Crossed\n\nAuthentication boundary -- unauthenticated external requests bypass identity verification when anonymous mode and default role are configured.\n\n## Impact\n\n- Unauthenticated access to all operations permitted by the default role\n- With `role:readonly`: application listing, cluster info, logs, account info exposed\n- With custom permissive role: write operations, sync, potentially exec\n\n## Evidence\n\n```go\n// rbac.go:381-386\nfunc enforce(enf CasbinEnforcer, defaultRole string, claimsEnforcerFunc ClaimsEnforcerFunc, rvals ...any) bool {\n    if defaultRole != \"\" \u0026\u0026 len(rvals) \u003e= 2 {\n        if ok, err := enf.Enforce(append([]any{defaultRole}, rvals[1:]...)...); ok \u0026\u0026 err == nil {\n            return true  // Returns true before any subject identity check\n        }\n    }\n    // Subject check happens AFTER defaultRole\n```\n\n## Reproduction Steps\n\n1. Enable anonymous access: set `users.anonymous.enabled: \"true\"` in `argocd-cm`\n2. Set `policy.default: role:readonly` in `argocd-rbac-cm`\n3. Send unauthenticated request to `GET /api/v1/applications`\n4. Observe applications are listed without any authentication\n5. Verify with more permissive role to confirm escalation potential\n","severity":"medium","confidence":"tentative","tags":["archon","phase-8","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"util/rbac/rbac.go:381-386","repo_name":"github.com/argoproj/argo-cd","matched_at":["util/rbac/rbac.go:381-386","server/server.go:1552-1556"],"finding_hash":"4e3623a4b0a748d899851ad0e0dc75b4","found_at":"2026-04-09T18:07:34.41276Z","created_at":"2026-04-09T18:07:34Z"}},{"type":"finding","data":{"id":872,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"209f5608-d2c4-4328-84b2-7f2e92a251fb","module_id":"archon:p8-004","module_name":"The `terminalSession` struct stores a `ctx` field that is set once during WebSocket connection setup via `newTerminalSession()`. This context contains the user's claims (identity, groups, roles) at th","module_type":"whitebox","finding_source":"archon","module_short":"websocket-stale-claims-context","description":"## Summary\n\nThe `terminalSession` struct stores a `ctx` field that is set once during WebSocket connection setup via `newTerminalSession()`. This context contains the user's claims (identity, groups, roles) at the time of connection. The `validatePermissions()` function reads claims from `t.ctx.Value(\"claims\")` on every call, but since `t.ctx` is never updated, permission changes (role downgrade, group removal, exec access revocation) made after connection establishment are invisible to active sessions.\n\n## Location\n\n- `server/application/websocket.go:37` -- `ctx context.Context` field in terminalSession struct\n- `server/application/websocket.go:66-67` -- `ctx: ctx` set once at construction\n- `server/application/websocket.go:140,148` -- `t.ctx.Value(\"claims\")` read in validatePermissions()\n\n## Attacker Control\n\n- Attacker maintains an open exec session\n- Even after admin revokes exec permissions, the attacker's session continues with original permissions\n- The stale context is never refreshed\n\n## Trust Boundary Crossed\n\nAuthorization lifecycle boundary -- dynamic RBAC permission changes cannot be enforced on active sessions.\n\n## Impact\n\n- Permission revocation (role downgrade, group removal from RBAC) is ineffective for active exec sessions\n- User retains the permissions they had at connection time for the entire session lifetime\n- Combined with p8-003 (revocation bypass), exec sessions are effectively permanent and irrevocable\n- Historical precedent: CVE-2023-40025 (GHSA-c8xw-vjgf-94hr)\n\n## Evidence\n\n```go\n// websocket.go:56-77\nfunc newTerminalSession(ctx context.Context, ...) (*terminalSession, error) {\n    // ...\n    session := \u0026terminalSession{\n        ctx: ctx,  // set once, never updated\n        // ...\n    }\n    return session, nil\n}\n\n// websocket.go:135-156\nfunc (t *terminalSession) validatePermissions(p []byte) (int, error) {\n    // Always reads original connection-time claims\n    if err := t.terminalOpts.Enf.EnforceErr(t.ctx.Value(\"claims\"), ...); err !
