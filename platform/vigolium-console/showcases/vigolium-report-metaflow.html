_module\ndef _handle_subclasscheck(self, target, class_name, otherclass_name, reverse=False):\n    ...\n    sub_module, sub_name = otherclass_name.rsplit(\".\", 1)\n    __import__(sub_module, None, None, \"*\")  # sub_module: ANY string from IPC\n```\n\n```python\n# server.py:424-430 -- unvalidated name on instances\ndef _handle_getattr(self, target, name):\n    override_mapping = self._getattr_overrides.get(type(target))\n    if override_mapping:\n        override_func = override_mapping.get(name)\n        if override_func:\n            return override_func(target, name)\n    return getattr(target, name)  # name: ANY string from IPC\n```\n\n## Reproduction Steps\n\n1. Connect to the env_escape Unix socket (see p8-002 for socket discovery)\n2. Send `CONTROL_GETEXPORTS` to enumerate available class names\n3. For globals exfiltration:\n   - Send `OP_GETCLASSATTR` with `class_name=\u003cexported_class\u003e`, `attr_name=\"__init__\"`\n   - Receive reference to the `__init__` method\n   - Send `OP_GETATTR` with `target=\u003cinit_ref\u003e`, `name=\"__globals__\"`\n   - Receive the module's global namespace dict\n4. For module import:\n   - Send `OP_SUBCLASSCHECK` with `otherclass_name=\"subprocess.Popen\"`\n   - Server calls `__import__(\"subprocess\", None, None, \"*\")`\n   - `subprocess` is now in `sys.modules` on the server\n5. Verify by combining: import a module, then use the getattr chain to access its functions\n\n## Cold Verification\n\n### Adversarial Review Summary\n\n**Verdict: CONFIRMED** with severity downgrade from HIGH to MEDIUM.\n\n**What was confirmed by independent reproduction:**\n\n1. **Unrestricted `getattr` on exported classes** (server.py:547): `OP_GETCLASSATTR` with `attr_name=\"__init__\"` successfully returned a function reference. `attr_name=\"__module__\"` returned the string `\"test_lib\"`. `attr_name=\"__qualname__\"` returned `\"TestClass1.__init__\"` when chained via `OP_GETATTR` on the returned reference. No attribute name validation exists.\n\n2. **Unrestricted `__import__`** (server.py:531): `OP_SUBCLASSCHECK` with `otherclass_name=\"subprocess.Popen\"` caused the server to execute `__import__(\"subprocess\", ...)`. Also confirmed with `ctypes.CDLL` and `json.JSONDecoder`. All imports succeeded (response type MSG_REPLY with False).\n\n3. **Chained attribute access** via `OP_GETATTR` on proxied references: After getting `__init__` as a proxied function reference, `OP_GETATTR` with `name=\"__qualname__\"` successfully accessed the attribute on the server-stored object.\n\n**What was NOT confirmed / limited:**\n\n1. **`__globals__` exfiltration**: The `getattr(init_func, \"__globals__\")` call succeeds at the Python level, but the `DataTransferer.dump()` cannot serialize the resulting dict because it contains module objects and other non-basic types. The server returns `MSG_INTERNAL_ERROR` instead of the data. Individual string-typed globals could potentially be accessed with additional chaining, but bulk exfiltration is blocked.\n\n2. **Direct code execution**: While `subprocess`, `ctypes`, and other modules can be imported into the server process, no mechanism was demonstrated to obtain a reference to the imported module's namespace (e.g., `sys.modules`) through the available handlers. The `__import__` side-effect (executing `__init__.py`) provides a constrained execution primitive only.\n\n**Severity downgrade rationale (HIGH -\u003e MEDIUM):**\n- Local access only (Unix socket)\n- Single-client model limits exploitation window to a race condition\n- Serialization barriers prevent full `__globals__` exfiltration\n- No direct code execution chain demonstrated end-to-end\n- Specialized component with limited deployment scope\n\n**Evidence files:** `archon/real-env-evidence/getattr-import-unrestricted-ipc/test_exploit_v4.py`\n**Full review:** `archon/adversarial-reviews/getattr-import-unrestricted-ipc-review.md`\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite","valid","poc-executed"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/env_escape/server.py:547","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/env_escape/server.py:547","metaflow/plugins/env_escape/server.py:430","metaflow/plugins/env_escape/server.py:531","metaflow/plugins/env_escape/server.py:250-269"],"finding_hash":"eef2341c134f28cc11a4df23465a48ae","found_at":"2026-04-18T18:34:03.348048Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":7,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m1","module_name":"The Metaflow env_escape IPC server listens on a Unix domain socket at a predictable path (`/tmp/{config}_{pid}`) with no peer authentication. Any local process can connect and send crafted messages. I","module_type":"whitebox","finding_source":"archon","module_short":"env-escape-pickle-ipc","description":"Phase: 8\nSequence: 002\nSlug: env-escape-pickle-ipc-rce\nVerdict: VALID\nRationale: Unauthenticated Unix socket with predictable path accepts connections and deserializes via pickle.loads; no SO_PEERCRED or shared secret; isinstance check confirmed ineffective (fires post-deserialization); 1-second client polling interval widens race window for socket hijacking.\nSeverity-Original: CRITICAL\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-01/debate.md\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: pickle.loads over unauthenticated Unix socket with predictable path and no peer auth is confirmed in code; severity downgraded because env_escape is dormant (generate_trampolines commented out) requiring explicit opt-in via extensions\nSeverity-Final: MEDIUM\nPoC-Status: theoretical\n\n## Summary\n\nThe Metaflow env_escape IPC server listens on a Unix domain socket at a predictable path (`/tmp/{config}_{pid}`) with no peer authentication. Any local process can connect and send crafted messages. Incoming data is deserialized via `pickle.loads(base64.b64decode(json_obj))` at two sites in data_transferer.py. The `isinstance` type check at line 117-118 executes AFTER `pickle.loads()` completes, providing zero protection against `__reduce__`-based payloads that execute during deserialization. The server accepts only one connection (`listen(0)` + single `accept()`), but the client polls for the socket with a 1-second `time.sleep(1)` loop, creating a wide race window. A rogue server variant (attacker pre-binds or plants symlink) can also attack the CLIENT process, as the client equally deserializes server responses via `pickle.loads`. This achieves sandbox escape: code executes in the outer Python environment, outside the conda sandbox.\n\n## Cold Verification\n\n**Verdict: CONFIRMED (severity DOWNGRADE from CRITICAL to MEDIUM)**\n\n### Verification of specific claims:\n\n1. **Does pickle.loads exist at the claimed locations in data_transferer.py?**\n   YES. Confirmed at line 116 (`pickle.loads(base64.b64decode(json_obj), encoding=\"utf-8\")`) in `_load_simple()` and at line 241 (`pickle.loads(base64.b64decode(json_obj[FIELD_INLINE_VALUE]), encoding=\"utf-8\")`) in `DataTransferer.load()` for type `-1` objects.\n\n2. **Is the Unix socket truly unauthenticated?**\n   YES. No SO_PEERCRED, no `os.chmod()`, no shared secret, no challenge-response protocol anywhere in the env_escape directory. The server at `server.py:279-293` does `sock.listen(0); sock.accept()` with no peer validation.\n\n3. **Is the socket path predictable?**\n   YES. `client.py:80`: `self._socket_path = \"/tmp/%s_%d\" % (server_config, self._active_pid)`. The config directory basename and PID are observable.\n\n4. **Is the env_escape system actually active/used, or is it commented out/dormant?**\n   DORMANT. The only production call site (`conda_decorator.py:169-170`) is commented out:\n   ```python\n   # from ..env_escape import generate_trampolines\n   # generate_trampolines(self.metaflow_dir.name)\n   ```\n   No bootstrap script or other active code path invokes it. It can only be activated through external Metaflow extensions providing `plugins.env_escape` configurations, or manual setup.\n\n### Severity downgrade rationale:\nThe code-level vulnerability is genuine and technically sound. However, it requires explicit opt-in activation (through extensions or manual configuration) since `generate_trampolines()` is commented out in the only production call site. It also requires local access and winning a race condition. This reduces severity from CRITICAL to MEDIUM.\n\n## Location\n\n- **Pickle sink 1**: `metaflow/plugins/env_escape/data_transferer.py:116` -- `pickle.loads(base64.b64decode(json_obj))`\n- **Pickle sink 2**: `metaflow/plugins/env_escape/data_transferer.py:241` -- `pickle.loads(base64.b64decode(json_obj[FIELD_INLINE_VALUE]))`\n- **Auth gap**: `metaflow/plugins/env_escape/server.py:291-293` -- `sock.listen(0); sock.accept()` with no peer auth\n- **Socket path**: `metaflow/plugins/env_escape/client.py:80` -- `/tmp/%s_%d\" % (server_config, self._active_pid)`\n- **Race window**: `metaflow/plugins/env_escape/client.py:170-177` -- `time.sleep(1)` polling loop\n- **Ineffective check**: `metaflow/plugins/env_escape/data_transferer.py:117-118` -- isinstance after pickle.loads\n\n## Attacker Control\n\nAny local process on the same host can:\n1. Discover the socket path via `/tmp` enumeration (pattern: `/tmp/*_\u003cPID\u003e`)\n2. Connect to the socket before the legitimate client (race the 1-second polling window)\n3. Send a JSON message with `FIELD_TYPE: -1` and `FIELD_INLINE_VALUE` containing a base64-encoded malicious pickle payload\n4. The server calls `pickle.loads(base64.b64decode(...))`, executing the `__reduce__` gadget\n\nAlternative (rogue server): Attacker pre-binds or plants a symlink at the predicted socket path. The legitimate client connects to the attacker. Attacker sends malicious pickle in responses.\n\n## Trust Boundary Crossed\n\nLocal process (any local user) -\u003e env_escape server process (outer/host Python environment, outside conda sandbox). This is a sandbox escape: the conda environment isolation boundary is completely defeated.\n\n## Impact\n\n- Arbitrary code execution in the outer Python environment (host process)\n- Escape from conda sandbox -- attacker in sandboxed environment gains host-level access\n- Access to host environment credentials, IAM roles, and file system\n- In shared compute environments (CI runners, multi-user Kubernetes nodes): cross-user code execution\n\n## Evidence\n\n```python\n# server.py:279-293 -- no authentication\nsock = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)\n__try_op__(\"bind\", sock.bind, BIND_RETRY, path)\nsock.listen(0)\nself._active = True\nconnection, remote = sock.accept()  # accepts ANY local process\n# No SO_PEERCRED check\n# No os.chmod on socket path\n# No shared secret / challenge-response\n```\n\n```python\n# data_transferer.py:114-118 -- isinstance is post-deserialization\n@_register_loader(_simple_types)\ndef _load_simple(obj_type, transferer, json_annotation, json_obj):\n    new_obj = pickle.loads(base64.b64decode(json_obj), encoding=\"utf-8\")\n    # __reduce__ has ALREADY executed by this point\n    if not isinstance(new_obj, obj_type):\n        raise RuntimeError(\"Pickle didn't create an object of the proper type\")\n    return new_obj\n```\n\n```python\n# client.py:170-179 -- 1-second race window\nwhile not os.path.exists(self._socket_path):\n    returncode = self._server_process.poll()\n    if returncode is not None:\n        raise RuntimeError(...)\n    time.sleep(1)  # 1-second window per iteration\nself._channel = Channel(SocketByteStream.unixconnect(self._socket_path))\n```\n\n- SO_PEERCRED: 0 matches in env_escape directory (grep confirmed)\n- chmod on socket: 0 matches in env_escape directory (grep confirmed)\n\n## Reproduction Steps\n\n1. Start a Metaflow flow that uses `@conda` or `@pypi` with escape hatch enabled\n2. Monitor `/tmp` for sockets matching the pattern `*_\u003cPID\u003e`\n3. Connect to the socket before the legitimate client:\n   ```python\n   import socket, pickle, base64, json, os\n   sock = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)\n   sock.connect(\"/tmp/\u003cconfig\u003e_\u003cpid\u003e\")\n   # Craft malicious pickle\n   class Payload:\n       def __reduce__(self):\n           return (os.system, (\"id \u003e /tmp/pwned\",))\n   payload = base64.b64encode(pickle.dumps(Payload())).decode()\n   # Send as IPC message with inline pickle\n   msg = json.dumps({\n       \"msg_type\": 1,  # MSG_OP\n       \"op_type\": 8,   # OP_PICKLE or other op that triggers decode\n       \"args\": {\"type\": -1, \"inline_value\": payload}\n   })\n   sock.sendall(msg.encode())\n   ```\n4. Verify `/tmp/pwned` exists with `id` output, confirming code execution in the server (outer env)\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/env_escape/data_transferer.py:116","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/env_escape/data_transferer.py:116","metaflow/plugins/env_escape/data_transferer.py:241","metaflow/plugins/env_escape/server.py:291-293","metaflow/plugins/env_escape/client.py:80","metaflow/plugins/env_escape/client.py:170-177","metaflow/plugins/env_escape/data_transferer.py:117-118"],"finding_hash":"924cb73fd9c970a39e4e1d022f38377f","found_at":"2026-04-18T18:34:03.348047Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":6,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:h6","module_name":"`MetaflowEnvironment.get_package_commands()` in `metaflow/metaflow_environment.py` calls `MetaflowPackage.get_extract_commands()` which delegates to `TarPackagingBackend.get_extract_commands()`, produ","module_type":"whitebox","finding_source":"archon","module_short":"shell-tar-container-bootstrap","description":"Phase: 10\nSequence: 003\nSlug: shell-tar-container-bootstrap-no-filter\nVerdict: VALID\nRationale: get_package_commands() generates a shell tar -xzf command with no path safety flags that is executed in every remote container (AWS Batch, Kubernetes, Argo) to extract the S3-sourced code package; a crafted tar with ../ member names or symlinks writes outside the extraction directory; distinct execution path from p8-026 which covers the Python tarfile.extractall() path.\nSeverity-Original: HIGH\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-026-tar-backend-raw-extractall.md\nOrigin-Pattern: AP-026\n\n## Summary\n\n`MetaflowEnvironment.get_package_commands()` in `metaflow/metaflow_environment.py` calls `MetaflowPackage.get_extract_commands()` which delegates to `TarPackagingBackend.get_extract_commands()`, producing the shell command:\n\n```\nTAR_OPTIONS='--warning=no-timestamp' tar -xzf job.tar -C .\n```\n\nThis command is injected into the container bootstrap script and executed via bash (not via Python subprocess) in every remote compute environment -- AWS Batch, Kubernetes pods, and Argo Workflow steps. The `job.tar` file is the code package downloaded from S3. The GNU tar invocation uses `--warning=no-timestamp` to suppress timestamp warnings but applies no path safety flags: no `--no-overwrite-dir`, no `--strip-components`, no `--anchored`. GNU tar does strip leading `/` from absolute paths but does NOT block relative `../` path traversal sequences by default. A crafted `job.tar` archive (sourced from a tampered S3 code package blob -- same threat model as p8-026) with members containing `../` sequences will write files outside the `metaflow/` container working directory. Symlink members are also extracted without restriction.\n\n## Location\n\n- `metaflow/packaging_sys/tar_backend.py:13-16` -- `get_extract_commands()` returning shell string with no safety flags\n- `metaflow/package/__init__.py:211-238` -- `MetaflowPackage.get_extract_commands()` dispatcher\n- `metaflow/metaflow_environment.py:240-242` -- `get_package_commands()` inserting the shell command into bootstrap script\n- `metaflow/plugins/aws/batch/batch.py:79` -- consumer: AWS Batch\n- `metaflow/plugins/kubernetes/kubernetes.py:107` -- consumer: Kubernetes\n- `metaflow/plugins/argo/argo_workflows.py:2121,3043,3162,3642` -- consumer: Argo Workflows\n\n## Attacker Control\n\nAttacker who can write to the S3 code package path supplies a crafted `job.tar` with:\n- Path traversal members (`../../../etc/profile.d/evil.sh`) to write outside `metaflow/` working directory\n- Symlink members to redirect subsequent writes to arbitrary paths\n\nS3 write access precondition: same as p8-026 (misconfigured IAM, compromised credentials, multi-tenant shared bucket).\n\n## Trust Boundary Crossed\n\nS3 code package blob (attacker-writable) -\u003e container bash bootstrap -\u003e shell `tar -xzf` without path filtering -\u003e arbitrary file write on container filesystem relative to the container's working directory.\n\n## Impact\n\n- **Arbitrary file write in container**: `../` sequences in member paths write to any container filesystem path writable by the bootstrap process (running as container user, often root)\n- **Persistent code execution**: writing to `/etc/profile.d/`, `/etc/cron.d/`, Python site-packages directories, or bootstrap scripts achieves persistent code execution within the container lifecycle\n- **Compound impact**: since this is the bootstrap phase of all remote compute (Batch/K8s/Argo), exploitation during bootstrap executes before user step code and with higher filesystem access than during step execution\n- **Scope**: every Metaflow-managed container that downloads a code package from S3 is affected (not just client-side as in p8-026)\n\nSeverity is HIGH because: remote threat model (S3 as attack surface), no preconditions beyond S3 write access (same as p8-026), affects all remote compute backends simultaneously, executes at container bootstrap with potential root privileges.\n\n## Evidence\n\n```python\n# tar_backend.py:13-16 -- no path safety flags\n@classmethod\ndef get_extract_commands(cls, archive_name: str, dest_dir: str) -\u003e List[str]:\n    return [\n        f\"TAR_OPTIONS='--warning=no-timestamp' tar -xzf {archive_name} -C {dest_dir}\"\n        # BUG: no --anchored, --no-overwrite-dir, --strip-components, or --exclude-vcs-ignores\n        # GNU tar permits ../ path traversal sequences in member names by default\n    ]\n\n# metaflow_environment.py:240-242 -- injected into container bootstrap\n+ MetaflowPackage.get_extract_commands(\n    code_package_metadata, \"job.tar\", dest_dir=\".\"\n)\n```\n\nThe command `tar -xzf job.tar -C .` (executed in `metaflow/` working directory) will:\n- Extract member `\"../../etc/profile.d/evil.sh\"` to `/etc/profile.d/evil.sh` (path traversal)\n- Extract member `\"symlink_name\"` (type=SYMTYPE, linkname=`\"/etc\"`) creating `metaflow/symlink_name -\u003e /etc`, then subsequent member `\"symlink_name/crontab\"` writes through the symlink to `/etc/crontab`\n\nDistinct from p8-026: p8-026 covers `TarPackagingBackend.cls_extract_members()` via Python `tarfile.extractall()` called from `task.code.extract()` (client API) or container bootstrap's Python path. This finding covers the shell `tar -xzf` path in `get_extract_commands()` which executes in a bash context injected into all remote container bootstrap scripts.\n\n## Reproduction Steps\n\n1. Create a crafted tar.gz (job.tar) with a path traversal member: `tar -czf job.tar --transform='s|evil.sh|../../tmp/p10_003_pwned.sh|' evil.sh` where `evil.sh` contains marker content\n2. Upload the crafted tar as the S3 code package for a target flow\n3. Trigger a remote run (AWS Batch or Kubernetes) for the flow\n4. During container bootstrap, the command `tar -xzf job.tar -C .` executes\n5. Verify that `/tmp/p10_003_pwned.sh` is created in the container filesystem\n6. Recommended fix: replace the shell `tar` command with `tar --anchored --no-overwrite-dir -xzf {archive_name} -C {dest_dir}` to block `../` traversal; alternatively, pre-validate the archive's member paths using Python tarfile before invoking shell tar; or switch to Python-side extraction with `tar_safe_extract` (after fixing p8-024/p8-025)\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending","variant-of:H4"],"status":"open","cvss_score":0,"source_file":"metaflow/packaging_sys/tar_backend.py:13-16","repo_name":"Netflix/metaflow","matched_at":["metaflow/packaging_sys/tar_backend.py:13-16","metaflow/package/__init__.py:211-238","metaflow/metaflow_environment.py:240-242","metaflow/plugins/aws/batch/batch.py:79","metaflow/plugins/kubernetes/kubernetes.py:107"],"finding_hash":"f0fea7d661f311fd57a39dae1fa13cc1","found_at":"2026-04-18T18:34:03.348046Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":5,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:h5","module_name":"The Metaflow Python client API exposes `DataArtifact.data` and `Task.data` as the primary developer-facing interface for reading flow outputs. Accessing any artifact property triggers `FileCache.get_a","module_type":"whitebox","finding_source":"archon","module_short":"pickle-loads-client-api-rce","description":"Phase: 10\nSequence: 001\nSlug: pickle-loads-client-api-rce\nVerdict: VALID\nRationale: The Metaflow client-side DataArtifact.data property reaches the same bare pickle.loads(blob) sink as the confirmed p8-001 finding, but executes on the developer workstation rather than a cloud worker, crossing a different trust boundary with broader IAM access and no sandboxing.\nSeverity-Original: HIGH\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-001-pickle-loads-s3-artifact-rce.md\nOrigin-Pattern: AP-001\n\n## Summary\n\nThe Metaflow Python client API exposes `DataArtifact.data` and `Task.data` as the primary developer-facing interface for reading flow outputs. Accessing any artifact property triggers `FileCache.get_artifact()` -\u003e `TaskDataStore.load_artifacts()` -\u003e `pickle.loads(blob)` at `task_datastore.py:442` — the identical bare deserialization sink confirmed in p8-001. The execution context is a developer workstation, CI/CD runner, or notebook environment, not a sandboxed cloud worker. An attacker with S3 write access can substitute a crafted pickle blob for any artifact and achieve RCE on every machine that subsequently accesses that artifact through the client API.\n\n## Location\n\n- **Primary sink**: `metaflow/datastore/task_datastore.py:442` — `pickle.loads(blob)` (identical to p8-001)\n- **Client entry point**: `metaflow/client/core.py:1028-1032` — `DataArtifact.data` property\n- **Intermediate path**:\n  - `metaflow/client/filecache.py:210-222` — `FileCache.get_artifact()` calls `get_artifacts()`\n  - `metaflow/client/filecache.py:253-256` — `TaskDataStore.load_artifacts(names)` called\n  - `metaflow/datastore/task_datastore.py:436-442` — `pickle.loads(blob)` executed\n- **No RestrictedUnpickler**: 0 matches across entire codebase (confirmed)\n\n## Attacker Control\n\nAttack flow is identical to p8-001 — any principal with `s3:PutObject` (or equivalent Azure/GCS write) on the artifact bucket can:\n1. Upload a crafted pickle payload to the content-addressed store at the SHA1-keyed path\n2. Update task metadata (`data.json`) to map an artifact name to the malicious blob's SHA1\n3. Any developer, analyst, or CI/CD pipeline that accesses `task.data.artifact_name` or `DataArtifact('Flow/run/step/task/artifact').data` will execute the payload\n\nThe developer client path is particularly impactful because:\n- Developer workstations typically hold long-lived AWS credentials (`~/.aws/credentials`) with broad IAM access\n- CI/CD runners often have production-level IAM roles for artifact inspection\n- Notebook environments may have access to multiple flows and namespaces\n- There is no namespace or permission barrier between artifact producers and consumers in the client API\n\n## Trust Boundary Crossed\n\nCloud object storage (potentially attacker-writable) -\u003e developer workstation / CI/CD runner / notebook (trusted local environment with long-lived high-privilege cloud credentials and access to developer secrets, keys, and other flows).\n\nThis is a **different trust boundary** than p8-001 (which crosses into a cloud worker with scoped execution-time IAM role). The developer workstation boundary is higher-value for lateral movement and credential harvesting.\n\n## Impact\n\n- Arbitrary code execution on developer workstations, CI/CD runners, and Jupyter notebook servers\n- Access to long-lived cloud credentials stored in `~/.aws/credentials` or similar (higher privilege than ephemeral worker IAM roles)\n- Access to developer SSH keys, code signing keys, and other secrets on the workstation\n- Pivot to other Metaflow flows, namespaces, and datastores accessible from the developer environment\n- In notebook/analysis environments: silent exfiltration of all data accessed during the session\n- Supply chain risk: a poisoned artifact in a shared ML platform can target every team member who inspects results\n\n## Evidence\n\n```python\n# metaflow/client/core.py:994-1036 -- DataArtifact.data property\n@property\ndef data(self) -\u003e Any:\n    \"\"\"Unpickled representation of the data contained in this artifact.\"\"\"\n    global filecache\n    ds_type = self._object[\"ds_type\"]\n    location = self._object[\"location\"]\n    ...\n    if location.startswith(\":root:\"):\n        obj = filecache.get_artifact(ds_type, location[6:], meta, *components)\n    else:\n        obj = filecache.get_artifact_by_location(ds_type, location, meta, *components)\n    return obj  # obj is the result of pickle.loads(blob) from cloud storage\n```\n\n```python\n# metaflow/client/filecache.py:199-222 -- FileCache.get_artifact()\ndef get_artifact(self, ds_type, ds_root, data_metadata, flow_name, run_id,\n                 step_name, task_id, name):\n    _, obj = next(\n        self.get_artifacts(  # -\u003e TaskDataStore.load_artifacts() -\u003e pickle.loads(blob)\n            ds_type, ds_root, data_metadata, flow_name, run_id,\n            step_name, task_id, [name],\n        )\n    )\n    return obj\n```\n\n```python\n# metaflow/client/filecache.py:237-256 -- FileCache.get_artifacts()\ndef get_artifacts(self, ds_type, ds_root, data_metadata, flow_name, run_id,\n                  step_name, task_id, names):\n    ds = self._get_flow_datastore(ds_type, ds_root, flow_name)\n    task_ds = ds.get_task_datastore(run_id, step_name, task_id,\n                                    data_metadata=data_metadata)\n    # note that load_artifacts uses flow_datastore.castore\n    return task_ds.load_artifacts(names)  # -\u003e pickle.loads(blob) at task_datastore.py:442\n```\n\n```python\n# metaflow/datastore/task_datastore.py:436-442 -- identical sink as p8-001\nfor key, blob in self._ca_store.load_blobs(to_load.keys()):\n    names = to_load[key]\n    for name in names:\n        yield name, pickle.loads(blob)  # bare pickle.loads on cloud-sourced blob\n```\n\nCommon developer usage patterns that trigger this path:\n```python\n# Pattern 1: Direct DataArtifact access\nfrom metaflow import Task\ntask = Task('MyFlow/1234/train/5678')\nmodel = task.data.trained_model  # -\u003e pickle.loads(blob from S3)\n\n# Pattern 2: Run iteration\nfrom metaflow import Flow\nfor task in Flow('MyFlow').latest_run['train']:\n    result = task.data.accuracy  # -\u003e pickle.loads(blob from S3)\n\n# Pattern 3: Explicit DataArtifact\nfrom metaflow import DataArtifact\nart = DataArtifact('MyFlow/1234/train/5678/trained_model')\nval = art.data  # -\u003e pickle.loads(blob from S3)\n```\n\n- RestrictedUnpickler: 0 matches in codebase (grep confirmed)\n- find_class override: 0 matches in codebase (grep confirmed)\n- HMAC/signature on blobs: absent from all load paths\n\n## Reproduction Steps\n\n1. Set up a Metaflow flow with a step that produces a Python artifact (any object)\n2. Run the flow to produce legitimate artifacts in S3\n3. Identify the artifact's SHA1 key from the task metadata (`data.json` in the S3 prefix)\n4. Craft a malicious pickle payload:\n   ```python\n   import pickle, os, subprocess\n   class Payload:\n       def __reduce__(self):\n           return (subprocess.check_output, ([\"id\"],))\n   malicious_blob = pickle.dumps(Payload())\n   ```\n5. Compress with gzip (matching the `_pack_v1` format) and upload to the content-addressed store path:\n   `s3://\u003cbucket\u003e/\u003cdatastore_root\u003e/\u003cflow_name\u003e/data/\u003csha[:2]\u003e/\u003csha\u003e`\n6. Update the task's `data.json` metadata to map the artifact name to the malicious blob's SHA1\n7. On the developer machine (or in CI/CD), run:\n   ```python\n   from metaflow import Task\n   task = Task('\u003cpathspec\u003e')\n   result = task.data.\u003cartifact_name\u003e  # payload executes here\n   ```\n8. Observe code execution on the developer machine\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending","variant-of:H1"],"status":"open","cvss_score":0,"repo_name":"Netflix/metaflow","finding_hash":"424f9d384bdda58b3856d9cdae2bc2ce","found_at":"2026-04-18T18:34:03.348045Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":4,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:h4","module_name":"The `TarPackagingBackend.cls_extract_members()` method in `metaflow/packaging_sys/tar_backend.py` calls `archive.extractall(path=dest_dir, members=members)` with no path validation, no type validation","module_type":"whitebox","finding_source":"archon","module_short":"tar-backend-raw-extractall","description":"Phase: 8\nSequence: 026\nSlug: tar-backend-raw-extractall\nVerdict: VALID\nRationale: tar_backend.py:89 calls archive.extractall() with zero safety checks, completely bypassing tar_safe_extract; reachable from public client API and container bootstrap; consolidates p4-003 and p6-003 with additional compound impact analysis.\nSeverity-Original: HIGH\nPoC-Status: executed\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nThe `TarPackagingBackend.cls_extract_members()` method in `metaflow/packaging_sys/tar_backend.py` calls `archive.extractall(path=dest_dir, members=members)` with no path validation, no type validation, and no use of `tar_safe_extract`. This is a separate extraction surface from the metadata tar path (H-05/H-06) and affects code package extraction -- a higher-value target. The `include_members` filter is content-type based, not security-relevant. Compound impact includes manifest poisoning (H-13), cross-run persistence (H-16), and extension name injection (H-17).\n\n## Location\n\n- `metaflow/packaging_sys/tar_backend.py:89` -- `archive.extractall(path=dest_dir, members=members)` -- NO safety wrapper\n- `metaflow/package/__init__.py:365` -- `backend.cls_extract_members(opened_archive, include_members, dest_dir)` -- caller\n- `metaflow/client/core.py:928` -- `task.code.extract()` -- public client API entry point\n\n## Attacker Control\n\nAttacker who can write to the S3 code package path (misconfigured IAM, compromised credentials, multi-tenant shared bucket) supplies a crafted code package tar.gz with path traversal members, symlink members, or poisoned manifest entries.\n\n## Trust Boundary Crossed\n\nS3 code package blob -\u003e raw extractall -\u003e arbitrary file write on client or container filesystem.\n\n## Impact\n\n- **Direct**: Arbitrary file write relative to dest_dir via path traversal (`../` sequences) or symlink members\n- **Manifest poisoning (compound)**: Crafted tar includes poisoned `conda.manifest` (MAGIC_FILE) redirecting package downloads to attacker-controlled S3 paths, with `--safety-checks=disabled` explicitly disabling micromamba's own package validation\n- **Cross-run persistence (compound)**: Trojanized bootstrap.py in extracted code can modify future code packages, creating a self-propagating worm\n- **Extension name injection (compound)**: Poisoned INFO file with shell metacharacters in extension names achieves command injection via uv bootstrap\n\n## Evidence\n\n```python\n# tar_backend.py:82-89\n@classmethod\ndef cls_extract_members(\n    cls,\n    archive: tarfile.TarFile,\n    members: Optional[List[Any]] = None,\n    dest_dir: str = \".\",\n) -\u003e None:\n    archive.extractall(path=dest_dir, members=members)\n    # NO path check, NO type check, NO tar_safe_extract\n```\n\n```python\n# package/__init__.py:365 -- caller\nbackend.cls_extract_members(opened_archive, include_members, dest_dir)\n# include_members is a content-type filter, NOT a security control\n```\n\n## Reproduction Steps\n\n1. Create a code package tar.gz with a path traversal member (e.g., `\"../../etc/cron.d/malicious\"`)\n2. Upload to the S3 code package path for a target flow/run\n3. Trigger `Run(...).code.extract()` via the client API or container bootstrap\n4. Verify the file is written outside the extraction directory\n5. For manifest poisoning variant: include a poisoned `conda.manifest` with attacker-controlled S3 paths\n6. Recommended fix: use `tar_safe_extract` (after fixing H-05/H-06) or Python 3.12+ `tarfile.data_filter`; validate tar member paths and types before extraction\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Real-environment reproduction confirmed raw extractall allows absolute path escape; tar_safe_extract exists in codebase but is not used in this path.\nSeverity-Final: HIGH\nPoC-Status: executed\n\nReal-environment PoC executed successfully on Python 3.9.6. An absolute path member `/tmp/test_026_escape_abs/payload.txt` was written directly to that absolute path despite extracting to a temp directory. `TarPackagingBackend.cls_extract_members` calls raw `archive.extractall()` with zero safety checks, while `tar_safe_extract` exists in the codebase but is not used here. PoC saved at `archon/real-env-evidence/tar-backend-raw-extractall/poc.py`. Full review: `archon/adversarial-reviews/tar-backend-raw-extractall-review.md`.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-executed"],"status":"open","cvss_score":0,"source_file":"metaflow/packaging_sys/tar_backend.py:89","repo_name":"Netflix/metaflow","matched_at":["metaflow/packaging_sys/tar_backend.py:89","metaflow/package/__init__.py:365","metaflow/client/core.py:928"],"finding_hash":"859cf03c5b7b2f9032b7edc4ef32ac70","found_at":"2026-04-18T18:34:03.348044Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":3,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:h3","module_name":"The `tar_safe_extract` function in `metaflow/util.py` validates only `member.name` for path containment but never checks `member.type`, `member.issym()`, `member.islnk()`, or `member.linkname`. This a","module_type":"whitebox","finding_source":"archon","module_short":"tar-safe-extract-symlink","description":"Phase: 8\nSequence: 025\nSlug: tar-safe-extract-symlink\nVerdict: VALID\nRationale: tar_safe_extract checks only member.name and never inspects member type, enabling the canonical symlink-then-write attack that Python 3.12 data filter was specifically designed to prevent; no blocking protection found.\nSeverity-Original: HIGH\nPoC-Status: executed\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nThe `tar_safe_extract` function in `metaflow/util.py` validates only `member.name` for path containment but never checks `member.type`, `member.issym()`, `member.islnk()`, or `member.linkname`. This allows a two-stage symlink-then-write attack: (1) a SYMTYPE member with an innocuous name creates a symlink to an attacker-chosen target directory, (2) a subsequent regular file member writes through the symlink to arbitrary filesystem locations. Both members pass the name-based path check.\n\n## Location\n\n- `metaflow/util.py:549-561` -- `tar_safe_extract` function\n- `metaflow/util.py:555-558` -- validation loop checking only `member.name`\n- `metaflow/metadata_provider/util.py:47` -- caller\n\n## Attacker Control\n\nAttacker who can write to the S3 metadata artifact bucket supplies a crafted tar with symlink and regular file members. Same threat model as H-05/p8-024.\n\n## Trust Boundary Crossed\n\nS3 metadata datastore -\u003e tar extraction -\u003e symlink traversal -\u003e arbitrary filesystem write.\n\n## Impact\n\nArbitrary file write to any filesystem path accessible by the container process. If the symlink targets a Python package directory, cron script location, SSH authorized_keys, or other sensitive path, this escalates to persistent code execution. In containers, the impact is bounded by container filesystem isolation.\n\n## Evidence\n\n```python\n# util.py:555-558 -- NO type check\nabs_directory = os.path.abspath(path)\nif any(\n    not is_within_directory(abs_directory, os.path.join(path, member.name))\n    for member in tar.getmembers()\n):\n    raise Exception(\"Attempted path traversal in TAR file\")\n\ntar.extractall(path, members, numeric_owner=numeric_owner)\n# member.issym(), member.islnk(), member.linkname, member.type -- NEVER checked\n```\n\nAttack tar contents:\n1. Member A: type=SYMTYPE, name=\"subdir\", linkname=\"/etc\" -- passes name check (within directory)\n2. Member B: type=REGTYPE, name=\"subdir/crontab\", data=attacker_payload -- passes name check\n3. Extraction: Member A creates symlink `path/subdir -\u003e /etc`, Member B writes `path/subdir/crontab` which resolves to `/etc/crontab`\n\n## Reproduction Steps\n\n1. Create a tar archive with:\n   - A symlink member named `\"subdir\"` with linkname pointing to a writable sensitive directory (e.g., `/tmp/test_target`)\n   - A regular file member named `\"subdir/marker.txt\"` with distinctive content\n2. Call `tar_safe_extract(tar, \"/tmp/safe\")` with this archive\n3. Verify that `/tmp/test_target/marker.txt` is created with the attacker content\n4. Verify that `tar_safe_extract` did NOT raise an exception\n5. Recommended fix: add `member.issym()` and `member.islnk()` checks; reject or sanitize symlink/hardlink members; migrate to Python 3.12+ `tarfile.data_filter`\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Real-environment reproduction confirmed symlink-then-write attack bypasses tar_safe_extract, writing files to arbitrary locations through symlinks.\nSeverity-Final: HIGH\nPoC-Status: executed\n\nReal-environment PoC executed successfully on Python 3.9.6. A SYMTYPE member `subdir` with linkname `/tmp/test_symlink_target_025` was created, then a REGTYPE member `subdir/marker.txt` wrote `PWNED_BY_SYMLINK` to `/tmp/test_symlink_target_025/marker.txt` through the symlink. `tar_safe_extract` did NOT raise an exception. PoC saved at `archon/real-env-evidence/tar-safe-extract-symlink/poc.py`. Full review: `archon/adversarial-reviews/tar-safe-extract-symlink-review.md`.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-executed"],"status":"open","cvss_score":0,"source_file":"metaflow/util.py:549-561","repo_name":"Netflix/metaflow","matched_at":["metaflow/util.py:549-561","metaflow/util.py:555-558","metaflow/metadata_provider/util.py:47"],"finding_hash":"cf22af78efd248520e6ba0b580754057","found_at":"2026-04-18T18:34:03.348041Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":2,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:h2","module_name":"The `tar_safe_extract` function in `metaflow/util.py` uses `os.path.commonprefix()` for path containment checking. This function performs character-level string comparison, not path-component comparis","module_type":"whitebox","finding_source":"archon","module_short":"tar-safe-extract-commonprefix","description":"Phase: 8\nSequence: 024\nSlug: tar-safe-extract-commonprefix\nVerdict: VALID\nRationale: os.path.commonprefix performs character-level comparison enabling mathematically proven path boundary bypass; no blocking protection found; the function was specifically written as a CVE-2007-4559 mitigation and fails at its purpose.\nSeverity-Original: HIGH\nPoC-Status: executed\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nThe `tar_safe_extract` function in `metaflow/util.py` uses `os.path.commonprefix()` for path containment checking. This function performs character-level string comparison, not path-component comparison. A tar member whose absolute path shares a string prefix with the extraction directory (e.g., extraction dir `/tmp/safe`, member resolving to `/tmp/safe_evil/payload`) will bypass the check and write files outside the intended extraction directory. This is a mathematically confirmed bypass of the CVE-2007-4559 mitigation.\n\n## Location\n\n- `metaflow/util.py:549-561` -- `tar_safe_extract` function\n- `metaflow/util.py:550-552` -- `is_within_directory` using `os.path.commonprefix`\n- `metaflow/metadata_provider/util.py:47` -- caller: `util.tar_safe_extract(tar, td)`\n\n## Attacker Control\n\nAttacker who can write to the S3 metadata artifact bucket can supply a crafted tar archive consumed by `metadata_provider/util.py:47`. Same S3 write threat model as all S3-based attacks (misconfigured IAM, compromised credentials, multi-tenant shared bucket).\n\n## Trust Boundary Crossed\n\nS3 metadata datastore (attacker-writable) -\u003e tar extraction on local/container filesystem.\n\n## Impact\n\nArbitrary file write to sibling directories outside the intended extraction target. Depending on the writable paths, this can overwrite Python source files, configuration files, cron jobs, or scripts that are subsequently executed -- leading to code execution.\n\n## Evidence\n\n```python\n# util.py:549-561\ndef tar_safe_extract(tar, path=\".\", members=None, *, numeric_owner=False):\n    def is_within_directory(abs_directory, target):\n        prefix = os.path.commonprefix([abs_directory, os.path.abspath(target)])\n        return prefix == abs_directory  # BUG: character-level, not path-level\n\n    abs_directory = os.path.abspath(path)\n    if any(\n        not is_within_directory(abs_directory, os.path.join(path, member.name))\n        for member in tar.getmembers()\n    ):\n        raise Exception(\"Attempted path traversal in TAR file\")\n\n    tar.extractall(path, members, numeric_owner=numeric_owner)\n```\n\nProof of bypass:\n- `abs_directory = \"/tmp/safe\"`\n- `member.name = \"../safe_evil/payload\"` -\u003e `os.path.abspath(\"/tmp/safe/../safe_evil/payload\")` = `/tmp/safe_evil/payload`\n- `os.path.commonprefix([\"/tmp/safe\", \"/tmp/safe_evil/payload\"])` = `\"/tmp/safe\"` (character match)\n- `\"/tmp/safe\" == \"/tmp/safe\"` -\u003e `True` -- check passes, file written OUTSIDE `/tmp/safe`\n\n## Reproduction Steps\n\n1. Create a tar archive with a member named `\"../safe_evil/payload\"` containing marker content\n2. Set up a metadata datastore with this crafted tar at the expected metadata sync path\n3. Trigger metadata sync that calls `tar_safe_extract`\n4. Verify the file is written to the sibling directory `/tmp/safe_evil/payload`\n5. Recommended fix: replace `os.path.commonprefix` with `os.path.commonpath` or check `os.path.abspath(target).startswith(abs_directory + os.sep)`; alternatively, migrate to Python 3.12+ `tarfile.data_filter`\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Real-environment reproduction confirmed os.path.commonprefix bypass allows file writes outside extraction directory, defeating the CVE-2007-4559 mitigation.\nSeverity-Final: HIGH\nPoC-Status: executed\n\nReal-environment PoC executed successfully on Python 3.9.6. A tar member `../safe_evil/payload.txt` was written to `/tmp/safe_evil/payload.txt` when extracting to `/tmp/safe`, bypassing `tar_safe_extract` without raising an exception. The `os.path.commonprefix` character-level comparison is the root cause. PoC saved at `archon/real-env-evidence/tar-safe-extract-commonprefix/poc.py`. Full review: `archon/adversarial-reviews/tar-safe-extract-commonprefix-review.md`.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-executed"],"status":"open","cvss_score":0,"source_file":"metaflow/util.py:549-561","repo_name":"Netflix/metaflow","matched_at":["metaflow/util.py:549-561","metaflow/util.py:550-552","metaflow/metadata_provider/util.py:47"],"finding_hash":"bf6c5aa38ba6574bebfb75e748222e73","found_at":"2026-04-18T18:34:03.348039Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":1,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:h1","module_name":"The Metaflow task datastore deserializes flow artifacts using bare `pickle.loads()` on blobs retrieved from cloud object storage (S3, Azure Blob, GCS). No `RestrictedUnpickler`, HMAC signature, or typ","module_type":"whitebox","finding_source":"archon","module_short":"pickle-loads-s3-artifact-rce","description":"Phase: 8\nSequence: 001\nSlug: pickle-loads-s3-artifact-rce\nVerdict: VALID\nRationale: Bare pickle.loads on cloud-sourced artifact blobs with zero integrity verification enables RCE for any attacker with S3 write access; Advocate confirmed no blocking protection at any defense layer; transfer_artifacts enables cross-datastore propagation.\nSeverity-Original: CRITICAL\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-01/debate.md\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Independent code trace confirms bare pickle.loads(blob) at task_datastore.py:442 on cloud-sourced data with zero protections (no RestrictedUnpickler, no HMAC, no find_class override anywhere in codebase); severity downgraded from CRITICAL to HIGH due to cloud storage write access precondition.\nSeverity-Final: HIGH\nPoC-Status: theoretical\n\n## Summary\n\nThe Metaflow task datastore deserializes flow artifacts using bare `pickle.loads()` on blobs retrieved from cloud object storage (S3, Azure Blob, GCS). No `RestrictedUnpickler`, HMAC signature, or type allowlist is applied before deserialization. An attacker with write access to the artifact storage bucket can replace any artifact blob with a crafted pickle payload containing a `__reduce__` gadget, achieving arbitrary code execution in any downstream step that loads the poisoned artifact. The content-addressed store's SHA1 key is self-referential (computed from the blob content itself), providing deduplication but not integrity verification. The `transfer_artifacts()` method further enables cross-datastore propagation of poisoned blobs without integrity checks.\n\n## Location\n\n- **Primary sink**: `metaflow/datastore/task_datastore.py:442` -- `pickle.loads(blob)`\n- **Blob source**: `metaflow/datastore/content_addressed_store.py:122-203` -- `load_blobs()`\n- **Propagation**: `metaflow/datastore/task_datastore.py:262-325` -- `transfer_artifacts()`\n- **No RestrictedUnpickler**: Confirmed 0 matches in entire codebase\n\n## Attacker Control\n\nAny principal with `s3:PutObject` (or equivalent Azure/GCS write permission) on the artifact bucket can:\n1. Upload a crafted pickle blob to the content-addressed store at the path matching its SHA1 hash (`{prefix}/{hash[:2]}/{hash}`)\n2. Modify the task metadata (`data.json`) to point an artifact name to the malicious blob's SHA1 key\n3. The blob will be loaded and deserialized by any downstream step accessing the poisoned artifact\n\nAttacker position is realistic in: multi-tenant deployments with shared S3 buckets, misconfigured IAM policies, compromised AWS credentials, or cross-account access.\n\n## Trust Boundary Crossed\n\nCloud object storage (external, attacker-writable with appropriate IAM) -\u003e Task worker process (trusted execution environment with elevated IAM role, cloud credentials, and access to other flow data).\n\n## Impact\n\n- Arbitrary code execution in the step worker process (AWS Batch container, Kubernetes pod, or local subprocess)\n- Access to the worker's IAM role credentials, environment variables, and cloud API access\n- Lateral movement to other steps/flows sharing the same datastore\n- Cross-datastore propagation via `transfer_artifacts()` (used by `spin` feature)\n- In multi-tenant deployments: cross-user, cross-team artifact poisoning\n\n## Evidence\n\n```python\n# metaflow/datastore/task_datastore.py:436-442\nfor key, blob in self._ca_store.load_blobs(to_load.keys()):\n    names = to_load[key]\n    for name in names:\n        yield name, pickle.loads(blob)  # CRITICAL: bare pickle.loads on cloud data\n```\n\n```python\n# metaflow/datastore/content_addressed_store.py:163-203\n# load_blobs reads from storage with NO integrity check:\nwith self._storage_impl.load_bytes([p for _, p in load_paths]) as loaded:\n    for path_key, file_path, meta in loaded:\n        # ... decompresses via _unpack_v1 ...\n        # NO HMAC verification, NO signature check\n        yield key, blob  # blob passed directly to pickle.loads\n```\n\n```python\n# metaflow/datastore/task_datastore.py:320-325 -- cross-datastore propagation\ntransfer_blobs = other_datastore._ca_store.load_blobs(missing_shas, is_transfer=True)\nself._ca_store.save_blobs(transfer_blobs, is_transfer=True)  # NO integrity check\n```\n\n- RestrictedUnpickler: 0 matches in codebase (grep confirmed)\n- find_class override: 0 matches in codebase (grep confirmed)\n- HMAC/signature on blobs: absent from all load paths\n\n## Reproduction Steps\n\n1. Set up a Metaflow flow with two steps where step B reads an artifact from step A\n2. Run step A to produce a legitimate artifact (stored in S3)\n3. Identify the artifact's SHA1 key from the task metadata\n4. Craft a malicious pickle payload using `__reduce__`:\n   ```python\n   import pickle, os\n   class Payload:\n       def __reduce__(self):\n           return (os.system, (\"id \u003e /tmp/pwned\",))\n   malicious_blob = pickle.dumps(Payload())\n   ```\n5. Upload the malicious blob to the S3 artifact bucket at the content-addressed path\n6. Update the task's `data.json` metadata to map the artifact name to the malicious blob's SHA1\n7. Run step B -- `pickle.loads(blob)` executes the payload\n8. Verify `/tmp/pwned` contains the output of `id`\n\n## Cold Verification\n\n**Verdict: CONFIRMED**\n**Severity: HIGH (downgraded from CRITICAL)**\n\n### Independent Code Trace\n\nTraced the complete data flow independently from source code, not from the finding's snippets:\n\n1. `task_datastore.py:load_artifacts()` (line 386) is the standard entry point for artifact retrieval, called by every Metaflow step accessing prior step data.\n2. Lines 416-431: artifact names are mapped to SHA keys from `self._objects`. No validation on SHA keys.\n3. Line 436: `self._ca_store.load_blobs(to_load.keys())` fetches raw bytes from cloud storage.\n4. `content_addressed_store.py:122-203`: `load_blobs()` reads from `self._storage_impl.load_bytes()`, decompresses via `_unpack_v1` (gzip only). Zero HMAC, zero signature, zero integrity verification.\n5. **Line 442**: `pickle.loads(blob)` -- bare deserialization. No `RestrictedUnpickler`, no `find_class` override.\n\nThe SHA1 key at `content_addressed_store.py:98` is `sha1(blob).hexdigest()` -- content-derived, not a MAC. An attacker who controls blob content also controls the key.\n\n### Protection Surface Search\n\nExhaustive search found zero code-level protections:\n- No `RestrictedUnpickler` anywhere in the codebase\n- No `find_class` override anywhere in the codebase\n- No HMAC/signature verification in the datastore module\n- No type allowlist before or after deserialization at this call site\n- `SECURITY.md` contains only a generic disclosure policy with no mention of pickle as accepted risk\n\n### Reproduction\n\nPoC-Status: **theoretical** -- full reproduction requires cloud storage infrastructure not available in the verification environment. However:\n- The code path is confirmed to exist exactly as described\n- `pickle.loads` with `__reduce__` payloads is a well-established exploitation technique (verified locally)\n- The absence of any protection is confirmed by exhaustive codebase search\n\n### Severity Assessment\n\nDowngraded from CRITICAL to **HIGH**:\n- The vulnerability enables arbitrary code execution (critical impact)\n- However, exploitation requires cloud storage write access (`s3:PutObject` or equivalent), which is a significant precondition\n- This is a post-compromise escalation vector, not an unauthenticated initial access vector\n- In well-configured single-tenant deployments, only the Metaflow service account has bucket write access\n- In multi-tenant or misconfigured deployments, the risk is substantially higher\n\n### Decisive Evidence\n\nThe bare `pickle.loads(blob)` call at `task_datastore.py:442` processes cloud-sourced data with zero protections. This is an architectural vulnerability inherent in the deserialization path, not dependent on any specific deployment configuration. The only barrier to exploitation is cloud IAM controls, which are deployment-dependent and not enforced by the codebase.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"metaflow/datastore/task_datastore.py:442","repo_name":"Netflix/metaflow","matched_at":["metaflow/datastore/task_datastore.py:442","metaflow/datastore/content_addressed_store.py:122-203","metaflow/datastore/task_datastore.py:262-325"],"finding_hash":"bcb3b8795740a853f818a2521741d968","found_at":"2026-04-18T18:34:03.348032Z","created_at":"2026-04-18T18:34:03Z"}}],
