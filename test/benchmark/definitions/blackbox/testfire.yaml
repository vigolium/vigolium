app:
  name: testfire
  type: external
  base_url: "http://demo.testfire.net"
  rate_limit: 2

test_cases:
  # === Active Module Tests ===

  # SQLi - Login page
  - id: "testfire-sqli-login"
    endpoint: "/login.jsp?uid=test&passw=test"
    method: GET
    modules: ["active-sqli-error-based"]
    vuln_types: ["sqli-error-based"]
    assertion: soft
    min_findings: 1
    scan_mode: active
    description: "SQL injection in login parameters"

  # XSS - Search
  - id: "testfire-xss-search"
    endpoint: "/search.jsp?query=test"
    method: GET
    modules: ["active-xss-light-url-params"]
    vuln_types: ["xss-reflected"]
    assertion: soft
    min_findings: 1
    scan_mode: active
    description: "Reflected XSS in search"

  # Swagger Disclosure
  - id: "testfire-swagger"
    endpoint: "/swagger/index.html"
    method: GET
    modules: ["active-swagger-disclose"]
    vuln_types: ["swagger-disclosure"]
    assertion: soft
    min_findings: 1
    scan_mode: active
    description: "Swagger documentation exposed"

  # CORS Misconfiguration
  - id: "testfire-cors"
    endpoint: "/"
    method: GET
    modules: ["active-cors-misconfiguration"]
    vuln_types: ["cors-misconfiguration"]
    assertion: soft
    min_findings: 1
    scan_mode: active
    description: "CORS misconfiguration check"

  # === Passive Module Tests ===

  # Security Headers
  - id: "testfire-security-headers"
    endpoint: "/"
    method: GET
    modules: ["passive-security-headers-missing"]
    assertion: soft
    min_findings: 1
    scan_mode: passive
    description: "Missing security headers"

  # Cookie Security
  - id: "testfire-cookie-security"
    endpoint: "/"
    method: GET
    modules: ["passive-cookie-security-detect"]
    assertion: soft
    min_findings: 1
    scan_mode: passive
    description: "Cookie security flags"

  # Info Disclosure
  - id: "testfire-info-disclosure"
    endpoint: "/"
    method: GET
    modules: ["passive-info-disclosure-detect"]
    assertion: soft
    min_findings: 1
    scan_mode: passive
    description: "Server information disclosure"
