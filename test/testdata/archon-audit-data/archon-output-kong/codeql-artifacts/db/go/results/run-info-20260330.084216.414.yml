  pack: codeql/go-queries#0
  relativeQueryPath: InconsistentCode/ConstantLengthComparison.ql
  relativeBqrsPath: codeql/go-queries/InconsistentCode/ConstantLengthComparison.bqrs
  metadata:
    name: Constant length comparison
    description: |-
      Comparing the length of an array to a constant before indexing it using a
                    loop variable may indicate a logic error.
    kind: problem
    problem.severity: warning
    id: go/constant-length-comparison
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-129
    precision: high
  queryHelp: "# Constant length comparison\nIndexing operations on arrays, slices,\
    \ or strings should use an index at most one less than the length. If the operation\
    \ uses a variable index but checks the length against a constant, this may indicate\
    \ a logic error which could lead to an out-of-bounds access.\n\n\n## Recommendation\n\
    Inspect the code closely to determine whether the length should be compared to\
    \ the index variable instead. For loops that iterate over every element, using\
    \ a `range` loop is better than explicit index manipulation.\n\n\n## Example\n\
    The following example shows a method which checks whether slice `xs` is a prefix\
    \ of slice `ys`:\n\n\n```go\npackage main\n\nfunc isPrefixOf(xs, ys []int) bool\
    \ {\n\tfor i := 0; i < len(xs); i++ {\n\t\tif len(ys) == 0 || xs[i] != ys[i] {\n\
    \t\t\treturn false\n\t\t}\n\t}\n\treturn true\n}\n\n```\nA loop using an index\
    \ variable `i` is used to iterate over the elements of `xs` and compare them to\
    \ the corresponding elements of `ys`. However, the check to ensure that `i` is\
    \ a valid index into `ys` is incorrectly specified as `len(ys) == 0`. Instead,\
    \ the check should ensure that `len(ys)` is greater than `i`:\n\n\n```go\npackage\
    \ main\n\nfunc isPrefixOfGood(xs, ys []int) bool {\n\tfor i := 0; i < len(xs);\
    \ i++ {\n\t\tif len(ys) <= i || xs[i] != ys[i] {\n\t\t\treturn false\n\t\t}\n\t\
    }\n\treturn true\n}\n\n```\n\n## References\n* The Go Programming Language Specification:\
    \ [For statements](https://golang.org/ref/spec#For_statements).\n* The Go Programming\
    \ Language Specification: [Index expressions](https://golang.org/ref/spec#Index_expressions).\n\
    * Common Weakness Enumeration: [CWE-129](https://cwe.mitre.org/data/definitions/129.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: InconsistentCode/InconsistentLoopOrientation.ql
  relativeBqrsPath: codeql/go-queries/InconsistentCode/InconsistentLoopOrientation.bqrs
  metadata:
    name: Inconsistent direction of for loop
    description: |-
      A 'for' loop that increments its loop variable but checks it
                    against a lower bound, or decrements its loop variable but
                    checks it against an upper bound, will either stop iterating
                    immediately or keep iterating indefinitely, and is usually
                    indicative of a typo.
    kind: problem
    problem.severity: error
    id: go/inconsistent-loop-direction
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-835
    precision: very-high
  queryHelp: "# Inconsistent direction of for loop\nMost `for` loops either increment\
    \ a variable until an upper bound is reached, or decrement a variable until a\
    \ lower bound is reached. If, instead, the variable is incremented but checked\
    \ against a lower bound, or decremented but checked against an upper bound, then\
    \ the loop will usually either terminate immediately and never execute its body,\
    \ or it will keep iterating indefinitely. Neither is likely to be intentional,\
    \ and is most likely the result of a typo.\n\nThe only exception to this are loops\
    \ whose loop variable is an unsigned integer. In this case, initializing the variable\
    \ with an upper bound and then decrementing it while checking against the same\
    \ upper bound is unproblematic: the variable is counted down from the upper bound\
    \ to zero, and then wraps around to a large positive value, causing the loop to\
    \ terminate. This is usually intentional, and hence is not flagged by the query.\n\
    \n\n## Recommendation\nExamine the loop carefully to check whether its test expression\
    \ or update statement are erroneous.\n\n\n## Example\nIn the following example,\
    \ two loops are used to set all elements of a slice `a` outside a range `lower`..`upper`\
    \ to zero. However, the second loop contains a typo: the loop variable `i` is\
    \ decremented instead of incremented, so `i` is counted downwards from `upper+1`\
    \ to `0`, `-1`, `-2` and so on.\n\n\n```go\npackage main\n\nfunc zeroOutExcept(a\
    \ []int, lower int, upper int) {\n\t// zero out everything below index `lower`\n\
    \tfor i := lower - 1; i >= 0; i-- {\n\t\ta[i] = 0\n\t}\n\n\t// zero out everything\
    \ above index `upper`\n\tfor i := upper + 1; i < len(a); i-- {\n\t\ta[i] = 0\n\
    \t}\n}\n\n```\nTo correct this issue, change the second loop to increment its\
    \ loop variable instead:\n\n\n```go\npackage main\n\nfunc zeroOutExcept(a []int,\
    \ lower int, upper int) {\n\t// zero out everything below index `lower`\n\tfor\
    \ i := lower - 1; i >= 0; i-- {\n\t\ta[i] = 0\n\t}\n\n\t// zero out everything\
    \ above index `upper`\n\tfor i := upper + 1; i < len(a); i++ {\n\t\ta[i] = 0\n\
    \t}\n}\n\n```\n\n## References\n* The Go Programming Language Specification: [For\
    \ statements](https://golang.org/ref/spec#For_statements).\n* Common Weakness\
    \ Enumeration: [CWE-835](https://cwe.mitre.org/data/definitions/835.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: InconsistentCode/LengthComparisonOffByOne.ql
  relativeBqrsPath: codeql/go-queries/InconsistentCode/LengthComparisonOffByOne.bqrs
  metadata:
    name: Off-by-one comparison against length
    description: |-
      An array index is compared with the length of the array,
                    and then used in an indexing operation that could be out of bounds.
    kind: problem
    problem.severity: error
    id: go/index-out-of-bounds
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-193
    precision: high
  queryHelp: "# Off-by-one comparison against length\nIndexing operations on arrays,\
    \ slices or strings should use an index at most one less than the length. If the\
    \ index to be accessed is checked for being less than or equal to the length (`<=`),\
    \ instead of less than the length (`<`), the index could be out of bounds.\n\n\
    \n## Recommendation\nUse less than (`<`) rather than less than or equals (`<=`)\
    \ when comparing a potential index against a length. For loops that iterate over\
    \ every element, a better solution is to use a `range` loop instead of looping\
    \ over explicit indexes.\n\n\n## Example\nThe following example shows a method\
    \ which checks whether a value appears in a comma-separated list of values:\n\n\
    \n```go\npackage main\n\nimport \"strings\"\n\nfunc containsBad(searchName string,\
    \ names string) bool {\n\tvalues := strings.Split(names, \",\")\n\t// BAD: index\
    \ could be equal to length\n\tfor i := 0; i <= len(values); i++ {\n\t\t// When\
    \ i = length, this access will be out of bounds\n\t\tif values[i] == searchName\
    \ {\n\t\t\treturn true\n\t\t}\n\t}\n\treturn false\n}\n\n```\nA loop using an\
    \ index variable `i` is used to iterate over the elements in the comma-separated\
    \ list. However, the terminating condition of the loop is incorrectly specified\
    \ as `i <= len(values)`. This condition holds when `i` is equal to `len(values)`,\
    \ but the access `values[i]` in the body of the loop will be out of bounds in\
    \ this case.\n\nOne potential solution would be to replace `i <= len(values)`\
    \ with `i < len(values)`. A better solution is to use a `range` loop instead,\
    \ which avoids the need for explicitly manipulating the index variable:\n\n\n\
    ```go\npackage main\n\nimport \"strings\"\n\nfunc containsGood(searchName string,\
    \ names string) bool {\n\tvalues := strings.Split(names, \",\")\n\t// GOOD: Avoid\
    \ using indexes, use range loop instead\n\tfor _, name := range values {\n\t\t\
    if name == searchName {\n\t\t\treturn true\n\t\t}\n\t}\n\treturn true\n}\n\n```\n\
    \n## References\n* The Go Programming Language Specification: [For statements](https://golang.org/ref/spec#For_statements).\n\
    * The Go Programming Language Specification: [Index expressions](https://golang.org/ref/spec#Index_expressions).\n\
    * Common Weakness Enumeration: [CWE-193](https://cwe.mitre.org/data/definitions/193.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: InconsistentCode/MissingErrorCheck.ql
  relativeBqrsPath: codeql/go-queries/InconsistentCode/MissingErrorCheck.bqrs
  metadata:
    name: Missing error check
    description: |-
      When a function returns a pointer alongside an error value, one should normally
                    assume that the pointer may be nil until either the pointer or error has been checked.
    kind: problem
    problem.severity: warning
    id: go/missing-error-check
    tags: |-
      quality
             reliability
             error-handling
             external/cwe/cwe-252
    precision: high
  queryHelp: "# Missing error check\nWhen a function call returns two values, a pointer\
    \ and a (subtype of) error, it is conventional to assume that the pointer might\
    \ be nil until either the pointer or error value has been checked.\n\nIf the pointer\
    \ is dereferenced without a check, an unexpected nil pointer dereference panic\
    \ may occur.\n\n\n## Recommendation\nEnsure that the returned pointer is either\
    \ directly checked against nil, or the error value is checked before using the\
    \ returned pointer.\n\n\n## Example\nIn the example below, `user` dereferences\
    \ `ptr` without checking either `ptr` or `err`. This might lead to a panic.\n\n\
    \n```go\npackage main\n\nimport (\n\t\"fmt\"\n\t\"os\"\n)\n\nfunc user(input string)\
    \ {\n\n\tptr, err := os.Open(input)\n\t// BAD: ptr is dereferenced before either\
    \ it or `err` has been checked.\n\tfmt.Printf(\"Opened %v\\n\", *ptr)\n\tif err\
    \ != nil {\n\t\tfmt.Printf(\"Bad input: %s\\n\", input)\n\t}\n\n}\n\n```\nThe\
    \ corrected version of `user` checks `err` before using `ptr`.\n\n\n```go\npackage\
    \ main\n\nimport (\n\t\"fmt\"\n\t\"os\"\n)\n\nfunc user(input string) {\n\n\t\
    ptr, err := os.Open(input)\n\tif err != nil {\n\t\tfmt.Printf(\"Bad input: %s\\\
    n\", input)\n\t\treturn\n\t}\n\t// GOOD: `err` has been checked before `ptr` is\
    \ used\n\tfmt.Printf(\"Result was %v\\n\", *ptr)\n\n}\n\n```\n\n## References\n\
    * The Go Blog: [Error handling and Go](https://blog.golang.org/error-handling-and-go).\n\
    * Common Weakness Enumeration: [CWE-252](https://cwe.mitre.org/data/definitions/252.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: InconsistentCode/MistypedExponentiation.ql
  relativeBqrsPath: codeql/go-queries/InconsistentCode/MistypedExponentiation.bqrs
  metadata:
    name: Bitwise exclusive-or used like exponentiation
    description: "Using ^ as exponentiation is a mistake, as it is the bitwise exclusive-or\
      \ operator."
    kind: problem
    problem.severity: warning
    id: go/mistyped-exponentiation
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-480
    precision: high
  queryHelp: "# Bitwise exclusive-or used like exponentiation\nThe caret symbol (`^`)\
    \ is sometimes used to represent exponentiation but in Go, as in many C-like languages,\
    \ it represents the bitwise exclusive-or operation. The expression as `2^32` thus\
    \ evaluates the number 34, not 2<sup>32</sup>, and it is likely that patterns\
    \ such as this are mistakes.\n\n\n## Recommendation\nTo compute 2<sup><code>EXP</code></sup>,\
    \ `1 << EXP` can be used. For constant exponents, `1eEXP` can be used to find\
    \ 10<sup><code>EXP</code></sup>. In other cases, there is `math.Pow` in the Go\
    \ standard library which provides this functionality.\n\n\n## Example\nThe example\
    \ below prints 34 and not 2<sup>32</sup> (4294967296).\n\n\n```go\npackage main\n\
    \nimport \"fmt\"\n\nfunc main() {\n\tfmt.Println(2 ^ 32) // should be 1 << 32\n\
    }\n\n```\n\n## References\n* GCC Bugzilla: [GCC should warn about 2^16 and 2^32\
    \ and 2^64](https://gcc.gnu.org/bugzilla/show_bug.cgi?id=90885)\n* Common Weakness\
    \ Enumeration: [CWE-480](https://cwe.mitre.org/data/definitions/480.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: InconsistentCode/UnhandledCloseWritableHandle.ql
  relativeBqrsPath: codeql/go-queries/InconsistentCode/UnhandledCloseWritableHandle.bqrs
  metadata:
    name: Writable file handle closed without error handling
    description: |-
      Errors which occur when closing a writable file handle may result in data loss
                    if the data could not be successfully flushed. Such errors should be handled
                    explicitly.
    kind: path-problem
    problem.severity: warning
    precision: high
    id: go/unhandled-writable-file-close
    tags: |-
      quality
             reliability
             error-handling
             external/cwe/cwe-252
  queryHelp: "# Writable file handle closed without error handling\nData written to\
    \ a file handle may not immediately be flushed to the underlying storage medium\
    \ by the operating system. Often, the data may be cached in memory until the handle\
    \ is closed, or until a later point after that. Only calling `os.File.Sync` gives\
    \ a reasonable guarantee that the data is flushed. Therefore, write errors may\
    \ not occur until `os.File.Close` or `os.File.Sync` are called. If either is called\
    \ and any errors returned by them are discarded, then the program may be unaware\
    \ that data loss occurred.\n\n\n## Recommendation\nAlways check whether `os.File.Close`\
    \ returned an error and handle it appropriately.\n\n\n## Example\nIn this first\
    \ example, two calls to `os.File.Close` are made with the intention of closing\
    \ the file after all work on it has been done or if writing to it fails. However,\
    \ while errors that may arise during the call to `os.File.WriteString` are handled,\
    \ any errors arising from the calls to `os.File.Close` are discarded silently:\n\
    \n\n```go\npackage main\n\nimport (\n\t\"os\"\n)\n\nfunc example() error {\n\t\
    f, err := os.OpenFile(\"file.txt\", os.O_WRONLY|os.O_CREATE, 0666)\n\n\tif err\
    \ != nil {\n\t\treturn err\n\t}\n\n\tif _, err := f.WriteString(\"Hello\"); err\
    \ != nil {\n\t\tf.Close()\n\t\treturn err\n\t}\n\n\tf.Close()\n\n\treturn nil\n\
    }\n\n```\nIn the second example, a call to `os.File.Close` is deferred in order\
    \ to accomplish the same behaviour as in the first example. However, while errors\
    \ that may arise during the call to `os.File.WriteString` are handled, any errors\
    \ arising from `os.File.Close` are again discarded silently:\n\n\n```go\npackage\
    \ main\n\nimport (\n\t\"os\"\n)\n\nfunc example() error {\n\tf, err := os.OpenFile(\"\
    file.txt\", os.O_WRONLY|os.O_CREATE, 0666)\n\n\tif err != nil {\n\t\treturn err\n\
    \t}\n\n\tdefer f.Close()\n\n\tif _, err := f.WriteString(\"Hello\"); err != nil\
    \ {\n\t\treturn err\n\t}\n\n\treturn nil\n}\n\n```\nTo correct this issue, handle\
    \ errors arising from calls to `os.File.Close` explicitly:\n\n\n```go\npackage\
    \ main\n\nimport (\n\t\"os\"\n)\n\nfunc example() (exampleError error) {\n\tf,\
    \ err := os.OpenFile(\"file.txt\", os.O_WRONLY|os.O_CREATE, 0666)\n\n\tif err\
    \ != nil {\n\t\treturn err\n\t}\n\n\tdefer func() {\n\t\t// try to close the file;\
    \ if an error occurs, set the error returned by `example`\n\t\t// to that error,\
    \ but only if `WriteString` didn't already set it to something first\n\t\tif err\
    \ := f.Close(); exampleError == nil && err != nil {\n\t\t\texampleError = err\n\
    \t\t}\n\t}()\n\n\tif _, err := f.WriteString(\"Hello\"); err != nil {\n\t\texampleError\
    \ = err\n\t}\n\n\treturn\n}\n\n```\n\n## References\n* The Go Programming Language\
    \ Specification: [Defer statements](https://go.dev/ref/spec#Defer_statements).\n\
    * The Go Programming Language Specification: [Errors](https://go.dev/ref/spec#Errors).\n\
    * Common Weakness Enumeration: [CWE-252](https://cwe.mitre.org/data/definitions/252.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: InconsistentCode/WhitespaceContradictsPrecedence.ql
  relativeBqrsPath: codeql/go-queries/InconsistentCode/WhitespaceContradictsPrecedence.bqrs
  metadata:
    name: Whitespace contradicts operator precedence
    description: |-
      Nested expressions where the formatting contradicts the grouping enforced by operator precedence
                    are difficult to read and may indicate a bug.
    kind: problem
    problem.severity: warning
    id: go/whitespace-contradicts-precedence
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-783
    precision: very-high
  queryHelp: "# Whitespace contradicts operator precedence\nNested expressions where\
    \ the spacing around operators suggests a different grouping than that imposed\
    \ by the Go operator precedence rules are problematic: they could indicate a bug\
    \ where the author of the code misunderstood the precedence rules. Even if there\
    \ is no a bug, the spacing could be confusing to people who read the code.\n\n\
    \n## Recommendation\nMake sure that the spacing around operators reflects operator\
    \ precedence, or use parentheses to clarify grouping.\n\n\n## Example\nConsider\
    \ the following function intended for checking whether the bit at position \\\
    `pos\\` of the variable \\`x\\` is set:\n\n\n```go\npackage main\n\nfunc isBitSetBad(x\
    \ int, pos uint) bool {\n\treturn x&1<<pos != 0\n}\n\n```\nHere, the spacing around\
    \ `&` and `<<` suggests the grouping `x & (1<<pos)`. However, in Go `&` and `<<`\
    \ have the same precedence and hence are evaluated left to right, so the expression\
    \ is actually equivalent to `(x & 1) << pos`.\n\nTo fix this issue and give the\
    \ expression its intended semantics, parentheses should be used like this:\n\n\
    \n```go\npackage main\n\nfunc isBitSetGood(x int, pos uint) bool {\n\treturn x&(1<<pos)\
    \ != 0\n}\n\n```\n\n## References\n* The Go Programming Language Specification:\
    \ [Operator precedence](https://golang.org/ref/spec#Operator_precedence).\n* Common\
    \ Weakness Enumeration: [CWE-783](https://cwe.mitre.org/data/definitions/783.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: InconsistentCode/WrappedErrorAlwaysNil.ql
  relativeBqrsPath: codeql/go-queries/InconsistentCode/WrappedErrorAlwaysNil.bqrs
  metadata:
    name: Wrapped error is always nil
    description: Finds calls to `Wrap` from `pkg/errors` where the error argument
      is always nil.
    kind: problem
    problem.severity: warning
    id: go/unexpected-nil-value
    tags: |-
      quality
             reliability
             error-handling
    precision: high
  queryHelp: "# Wrapped error is always nil\nThe `pkg.errors` package provides the\
    \ `errors.Wrap` function for annotating an error with a stack trace. When passed\
    \ `nil`, this function returns `nil`. When the first parameter to `errors.Wrap`\
    \ is *always* `nil`, the function call has no effect and likely indicates a programming\
    \ mistake. A common example of this is when an `errors.Wrap(err, \"message\")`\
    \ call is copied from an earlier error-handling block in the same function and\
    \ used in a subsequent error-handling block that does not check `err` in its guard.\
    \ In this case the return of a `nil` value to the caller indicates by convention\
    \ that the operation succeeded, and so the failure is masked.\n\n\n## Recommendation\n\
    Usually an `err` value is being referenced outside its intended scope. The problem\
    \ can be fixed by removing that reference, for example by changing a call of the\
    \ form `errors.Wrap(err, \"message\")` to `errors.New(\"message\")`.\n\n\n## Example\n\
    The example below shows an example where the `err` value returned from the call\
    \ to `f1` is reused in a later call, when it is known to be `nil`:\n\n\n```go\n\
    package main\n\nimport (\n\t\"github.com/pkg/errors\"\n)\n\nfunc f1(input string)\
    \ error {\n\tif input == \"1\" {\n\t\treturn errors.Errorf(\"error in f1\")\n\t\
    }\n\treturn nil\n}\n\nfunc f2(input string) (bool, error) {\n\tif input == \"\
    2\" {\n\t\treturn false, errors.Errorf(\"error in f2\")\n\t}\n\treturn true, nil\n\
    }\n\nfunc test1(input string) error {\n\terr := f1(input)\n\tif err != nil {\n\
    \t\treturn errors.Wrap(err, \"input is the first non-negative integer\")\n\t}\n\
    \tif ok2, _ := f2(input); !ok2 {\n\t\treturn errors.Wrap(err, \"input is the second\
    \ non-negative integer\")\n\t}\n\treturn nil\n}\n\n```\nOne way of fixing this\
    \ is to create a new error value with `errors.New`:\n\n\n```go\npackage main\n\
    \nimport (\n\t\"github.com/pkg/errors\"\n)\n\nfunc f1(input string) error {\n\t\
    if input == \"1\" {\n\t\treturn errors.Errorf(\"error in f1\")\n\t}\n\treturn\
    \ nil\n}\n\nfunc f2(input string) (bool, error) {\n\tif input == \"2\" {\n\t\t\
    return false, errors.Errorf(\"error in f2\")\n\t}\n\treturn true, nil\n}\n\nfunc\
    \ test1(input string) error {\n\terr := f1(input)\n\tif err != nil {\n\t\treturn\
    \ errors.Wrap(err, \"input is the first non-negative integer\")\n\t}\n\tif ok2,\
    \ _ := f2(input); !ok2 {\n\t\treturn errors.New(\"input is the second non-negative\
    \ integer\")\n\t}\n\treturn nil\n}\n\n```\n\n## References\n* Go errors, github.com/pkg/errors:\
    \ [errors.Wrap](https://pkg.go.dev/github.com/pkg/errors#Wrap)\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/CompareIdenticalValues.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/CompareIdenticalValues.bqrs
  metadata:
    name: Comparison of identical values
    description: |-
      If the same expression occurs on both sides of a comparison
                    operator, the operator is redundant, and probably indicates a mistake.
    kind: problem
    problem.severity: warning
    id: go/comparison-of-identical-expressions
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-570
             external/cwe/cwe-571
    precision: very-high
  queryHelp: "# Comparison of identical values\nComparing two identical expressions\
    \ typically indicates a mistake such as a missing qualifier or a misspelled variable\
    \ name.\n\n\n## Recommendation\nCarefully inspect the comparison to determine\
    \ whether it is a symptom of a bug.\n\n\n## Example\nIn the example below, the\
    \ method `Rectangle.contains` is intended to check whether a point `(x, y)` lies\
    \ inside a rectangle `r` given by its origin `(r.x, r.y)`, its width `r.width`,\
    \ and its height `r.height`.\n\n\n```go\npackage main\n\ntype Rectangle struct\
    \ {\n\tx, y, width, height float64\n}\n\nfunc (r *Rectangle) containsBad(x, y\
    \ float64) bool {\n\treturn r.x <= x &&\n\t\ty <= y &&\n\t\tx <= r.x+r.width &&\n\
    \t\ty <= r.y+r.height\n}\n\n```\nNote, however, that on line 9 the programmer\
    \ forgot to qualify `r.y`, thus ending up comparing the argument `y` against itself.\
    \ The comparison should be fixed accordingly:\n\n\n```go\npackage main\n\nfunc\
    \ (r *Rectangle) containsGood(x, y float64) bool {\n\treturn r.x <= x &&\n\t\t\
    r.y <= y &&\n\t\tx <= r.x+r.width &&\n\t\ty <= r.y+r.height\n}\n\n```\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/DeadStoreOfField.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/DeadStoreOfField.bqrs
  metadata:
    name: Useless assignment to field
    description: An assignment to a field that is not used later on has no effect.
    kind: problem
    problem.severity: warning
    id: go/useless-assignment-to-field
    tags: |-
      quality
             maintainability
             useless-code
             external/cwe/cwe-563
    precision: very-high
  queryHelp: "# Useless assignment to field\nA value is assigned to a field, but its\
    \ value is never read. This means that the assignment has no effect, and could\
    \ indicate a logic error or incomplete code.\n\n\n## Recommendation\nExamine the\
    \ assignment closely to determine whether it is redundant, or whether it is perhaps\
    \ a symptom of another bug.\n\n\n## Example\nThe following example shows a simple\
    \ `struct` type wrapping an integer counter with a method `reset` that sets the\
    \ counter to zero.\n\n\n```go\npackage main\n\ntype counter struct {\n\tval int\n\
    }\n\nfunc (c counter) reset() {\n\tc.val = 0\n}\n\n```\nHowever, the receiver\
    \ variable of `reset` is declared to be of type `counter`, not `*counter`, so\
    \ the receiver value is passed into the method by value, not by reference. Consequently,\
    \ the method does not actually mutate its receiver as intended.\n\nTo fix this,\
    \ change the type of the receiver variable to `*counter`:\n\n\n```go\npackage\
    \ main\n\nfunc (c *counter) resetGood() {\n\tc.val = 0\n}\n\n```\n\n## References\n\
    * Go Frequently Asked Questions: [Should I define methods on values or pointers?](https://golang.org/doc/faq#methods_on_values_or_pointers)\n\
    * The Go Programming Language Specification: [Method declarations](https://golang.org/ref/spec#Method_declarations).\n\
    * Common Weakness Enumeration: [CWE-563](https://cwe.mitre.org/data/definitions/563.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/DeadStoreOfLocal.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/DeadStoreOfLocal.bqrs
  metadata:
    name: Useless assignment to local variable
    description: |-
      An assignment to a local variable that is not used later on, or whose value is always
                    overwritten, has no effect.
    kind: problem
    problem.severity: warning
    id: go/useless-assignment-to-local
    tags: |-
      quality
             maintainability
             useless-code
             external/cwe/cwe-563
    precision: very-high
  queryHelp: "# Useless assignment to local variable\nA value is assigned to a variable,\
    \ but either it is never read, or its value is always overwritten before being\
    \ read. This means that the original assignment has no effect, and could indicate\
    \ a logic error or incomplete code.\n\n\n## Recommendation\nRemove assignments\
    \ to variables that are immediately overwritten, or use the blank identifier `_`\
    \ as a placeholder for return values that are never used.\n\n\n## Example\nIn\
    \ the following example, a value is assigned to `a`, but then immediately overwritten,\
    \ a value is assigned to `b` and never used, and finally, the results of a call\
    \ to `fmt.Println` are assigned to two temporary variables, which are then immediately\
    \ overwritten by a call to `function`.\n\n\n```go\npackage main\n\nimport \"fmt\"\
    \n\nfunc main() {\n\ta := calculateValue()\n\ta = 2\n\n\tb := calculateValue()\n\
    \n\tignore, ignore1 := fmt.Println(a)\n\n\tignore, ignore1, err := function()\n\
    \tif err != nil {\n\t\tpanic(err)\n\t}\n\n\tfmt.Println(a)\n}\n\n```\nThe result\
    \ of `calculateValue` is never used, and if `calculateValue` is a side-effect\
    \ free function, those assignments can be removed. To ignore all the return values\
    \ of `fmt.Println`, you can simply not assign it to any variables. To ignore only\
    \ certain return values, use `_`.\n\n\n```go\npackage main\n\nimport \"fmt\"\n\
    \nfunc main() {\n\ta := 2\n\n\tfmt.Println(a)\n\n\t_, _, err := function()\n\t\
    if err != nil {\n\t\tpanic(err)\n\t}\n\n\tfmt.Println(a)\n}\n\n```\n\n## References\n\
    * Wikipedia: [Dead store](http://en.wikipedia.org/wiki/Dead_store).\n* The Go\
    \ Programming Language Specification: [Blank identifier](https://golang.org/ref/spec#Blank_identifier).\n\
    * Common Weakness Enumeration: [CWE-563](https://cwe.mitre.org/data/definitions/563.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/DuplicateBranches.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/DuplicateBranches.bqrs
  metadata:
    name: Duplicate 'if' branches
    description: |-
      If the 'then' and 'else' branches of an 'if' statement are identical, the
                    conditional may be superfluous, or it may indicate a mistake.
    kind: problem
    problem.severity: warning
    precision: very-high
    id: go/duplicate-branches
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-561
  queryHelp: "# Duplicate 'if' branches\nIf the 'then' and 'else' branches of an 'if'\
    \ statement are identical, this suggests a copy-paste error where the first branch\
    \ was copied and then not properly adjusted.\n\n\n## Recommendation\nExamine the\
    \ two branches to find out what operations were meant to perform. If both the\
    \ branches and the conditions that they check are identical, then the second branch\
    \ is duplicate code that can be deleted. If the branches are really meant to perform\
    \ the same operations, it may be clearer to just have a single branch that checks\
    \ the disjunction of both conditions.\n\n\n## Example\nThe example below shows\
    \ a buggy implementation of the absolute-value function which checks the sign\
    \ of its argument, but then returns the same value regardless of the outcome of\
    \ the check:\n\n\n```go\npackage main\n\nfunc abs(x int) int {\n\tif x >= 0 {\n\
    \t\treturn x\n\t} else {\n\t\treturn x\n\t}\n}\n\n```\nClearly, the 'else' branch\
    \ should return `-x` instead:\n\n\n```go\npackage main\n\nfunc absGood(x int)\
    \ int {\n\tif x >= 0 {\n\t\treturn x\n\t} else {\n\t\treturn -x\n\t}\n}\n\n```\n\
    \n## References\n* The Go Programming Language Specification: [If statements](https://golang.org/ref/spec#If_statements).\n\
    * Common Weakness Enumeration: [CWE-561](https://cwe.mitre.org/data/definitions/561.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/DuplicateCondition.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/DuplicateCondition.bqrs
  metadata:
    name: Duplicate 'if' condition
    description: |-
      If two conditions in an 'if'-'else if' chain are identical, the
                    second condition will never hold.
    kind: problem
    problem.severity: error
    id: go/duplicate-condition
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-561
    precision: very-high
  queryHelp: "# Duplicate 'if' condition\nIf two conditions in an 'if'-'else if' chain\
    \ are identical, the second condition will never hold. This most likely indicates\
    \ a copy-paste error where the first condition was copied and then not properly\
    \ adjusted.\n\n\n## Recommendation\nExamine the two conditions to find out what\
    \ they were meant to check. If both the conditions and the branches that depend\
    \ on them are identical, then the second branch is duplicate code that can be\
    \ deleted. Otherwise, the second condition needs to be adjusted.\n\n\n## Example\n\
    In the example below, the function `controller` checks its parameter `msg` to\
    \ determine what operation it is meant to perform. However, the comparison in\
    \ the 'else if' is identical to the comparison in the 'if', so this branch will\
    \ never be taken.\n\n\n```go\npackage main\n\nfunc controller(msg string) {\n\t\
    if msg == \"start\" {\n\t\tstart()\n\t} else if msg == \"start\" {\n\t\tstop()\n\
    \t} else {\n\t\tpanic(\"Message not understood.\")\n\t}\n}\n\n```\nMost likely,\
    \ the 'else if' branch should compare `msg` to `\"stop\"`:\n\n\n```go\npackage\
    \ main\n\nfunc controllerGood(msg string) {\n\tif msg == \"start\" {\n\t\tstart()\n\
    \t} else if msg == \"stop\" {\n\t\tstop()\n\t} else {\n\t\tpanic(\"Message not\
    \ understood.\")\n\t}\n}\n\n```\n\n## References\n* The Go Programming Language\
    \ Specification: [If statements](https://golang.org/ref/spec#If_statements).\n\
    * Common Weakness Enumeration: [CWE-561](https://cwe.mitre.org/data/definitions/561.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/DuplicateSwitchCase.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/DuplicateSwitchCase.bqrs
  metadata:
    name: Duplicate switch case
    description: |-
      If two cases in a switch statement have the same label, the second case
                    will never be executed.
    kind: problem
    problem.severity: error
    id: go/duplicate-switch-case
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-561
    precision: very-high
  queryHelp: "# Duplicate switch case\nIf two cases in a 'switch' statement are identical,\
    \ the second case will never be executed. This most likely indicates a copy-paste\
    \ error where the first case was copied and then not properly adjusted.\n\n\n\
    ## Recommendation\nExamine the two cases to find out what they were meant to check.\
    \ If both the conditions and the bodies are identical, then the second case is\
    \ duplicate code that can be deleted. Otherwise, the second case needs to be adjusted.\n\
    \n\n## Example\nIn the example below, the function `controller` checks its parameter\
    \ `msg` to determine what operation it is meant to perform. However, the condition\
    \ of the second case is identical to that of the first, so this case will never\
    \ be executed.\n\n\n```go\npackage main\n\nfunc controller(msg string) {\n\tswitch\
    \ {\n\tcase msg == \"start\":\n\t\tstart()\n\tcase msg == \"start\":\n\t\tstop()\n\
    \tdefault:\n\t\tpanic(\"Message not understood.\")\n\t}\n}\n\n```\nMost likely,\
    \ the second case should compare `msg` to `\"stop\"`:\n\n\n```go\npackage main\n\
    \nfunc controllerGood(msg string) {\n\tswitch {\n\tcase msg == \"start\":\n\t\t\
    start()\n\tcase msg == \"stop\":\n\t\tstop()\n\tdefault:\n\t\tpanic(\"Message\
    \ not understood.\")\n\t}\n}\n\n```\n\n## References\n* The Go Programming Language\
    \ Specification: [Switch statements](https://golang.org/ref/spec#Switch_statements).\n\
    * Common Weakness Enumeration: [CWE-561](https://cwe.mitre.org/data/definitions/561.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/ExprHasNoEffect.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/ExprHasNoEffect.bqrs
  metadata:
    name: Expression has no effect
    description: |-
      An expression that has no effect and is used in a void context is most
                    likely redundant and may indicate a bug.
    kind: problem
    problem.severity: warning
    id: go/useless-expression
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-480
             external/cwe/cwe-561
    precision: very-high
  queryHelp: "# Expression has no effect\nAn expression that has no effects (such\
    \ as changing variable values or producing output) and occurs in a context where\
    \ its value is ignored possibly indicates missing code or a latent bug.\n\n\n\
    ## Recommendation\nCarefully inspect the expression to ensure it is not a symptom\
    \ of a bug.\n\n\n## Example\nThe following example shows a named type `Timestamp`\
    \ that is an alias for `int`, representing time stamps expressed as the number\
    \ of seconds elapsed since some epoch. The `addDays` method returns a time stamp\
    \ that is a given number of days after another time stamp, without modifying that\
    \ time stamp.\n\nHowever, when `addDays` is used in function `test`, its result\
    \ is discarded, perhaps because the programmer mistakenly assumed that `addDays`\
    \ updates the time stamp in place.\n\n\n```go\npackage main\n\nimport \"fmt\"\n\
    \ntype Timestamp int\n\nfunc (t Timestamp) addDays(d int) Timestamp {\n\treturn\
    \ Timestamp(int(t) + d*24*3600)\n}\n\nfunc test(t Timestamp) {\n\tfmt.Printf(\"\
    Before: %s\\n\", t)\n\tt.addDays(7)\n\tfmt.Printf(\"After: %s\\n\", t)\n}\n\n\
    ```\nInstead, the result of `addDays` should be assigned back into `t`:\n\n\n\
    ```go\npackage main\n\nimport \"fmt\"\n\nfunc testGood(t Timestamp) {\n\tfmt.Printf(\"\
    Before: %s\\n\", t)\n\tt = t.addDays(7)\n\tfmt.Printf(\"After: %s\\n\", t)\n}\n\
    \n```\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/ImpossibleInterfaceNilCheck.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/ImpossibleInterfaceNilCheck.bqrs
  metadata:
    name: Impossible interface nil check
    description: Comparing a non-nil interface value to nil may indicate a logic error.
    kind: problem
    problem.severity: warning
    id: go/impossible-interface-nil-check
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-570
    precision: high
  queryHelp: "# Impossible interface nil check\nInterface values in Go are type tagged,\
    \ that is, they are essentially pairs of the form `(value, type)`, where `value`\
    \ is a non-interface value with the given `type`. Such a pair is never `nil`,\
    \ even if `value` is `nil`.\n\nIn particular, if a non-interface value `v` is\
    \ assigned to a variable `x` whose type is an interface, then `x` will never be\
    \ `nil`, regardless of `v`. Comparing `x` to `nil` is pointless, and may indicate\
    \ a misunderstanding of Go interface values or some other underlying bug.\n\n\n\
    ## Recommendation\nCarefully inspect the comparison to ensure it is not a symptom\
    \ of a bug.\n\n\n## Example\nThe following example shows a declaration of a function\
    \ `fetch` which fetches the contents of a URL, returning either the contents or\
    \ an error value, which is a pointer to a custom error type `RequestError` (not\
    \ shown). The function `niceFetch` wraps this function, printing out either the\
    \ URL contents or an error message.\n\n\n```go\npackage main\n\nimport \"fmt\"\
    \n\nfunc fetch(url string) (string, *RequestError)\n\nfunc niceFetch(url string)\
    \ {\n\tvar s string\n\tvar e error\n\ts, e = fetch(url)\n\tif e != nil {\n\t\t\
    fmt.Printf(\"Unable to fetch URL: %v\\n\", e)\n\t} else {\n\t\tfmt.Printf(\"URL\
    \ contents: %s\\n\", s)\n\t}\n}\n\n```\nHowever, because `e` is declared to be\
    \ of type `error`, which is an interface, the `nil` check will never succeed,\
    \ since `e` can never be `nil`.\n\nIn this case, the problem can be solved by\
    \ using a short variable declaration using operator `:=`, which will automatically\
    \ infer the more precise non-interface type `*ResourceError` for `e`, making the\
    \ `nil` check behave as expected.\n\n\n```go\npackage main\n\nimport \"fmt\"\n\
    \nfunc niceFetchGood(url string) {\n\ts, e := fetch(url)\n\tif e != nil {\n\t\t\
    fmt.Printf(\"Unable to fetch URL: %v\\n\", e)\n\t} else {\n\t\tfmt.Printf(\"URL\
    \ contents: %s\\n\", s)\n\t}\n}\n\n```\n\n## References\n* Jordan Orelli: [How\
    \ to use interfaces in Go](https://jordanorelli.com/post/32665860244/how-to-use-interfaces-in-go).\n\
    * Go Frequently Asked Questions: [Why is my nil error value not equal to nil?](https://golang.org/doc/faq#nil_error).\n\
    * Common Weakness Enumeration: [CWE-570](https://cwe.mitre.org/data/definitions/570.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/NegativeLengthCheck.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/NegativeLengthCheck.bqrs
  metadata:
    name: Redundant check for negative value
    description: |-
      Checking whether the result of 'len' or 'cap' is negative is pointless,
                    since these functions always returns a non-negative number. It is also
                    pointless checking if an unsigned integer is negative, as it can only
                    hold non-negative values.
    kind: problem
    problem.severity: warning
    precision: very-high
    id: go/negative-length-check
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-571
  queryHelp: "# Redundant check for negative value\nThe built-in `len` function returns\
    \ the length of an array, slice or similar, which is never less than zero. Hence,\
    \ checking whether the result of a call to `len` is negative is either redundant\
    \ or indicates a logic mistake.\n\nThe same applies to the built-in function `cap`,\
    \ and to unsigned integer values.\n\n\n## Recommendation\nExamine the length check\
    \ to see whether it is redundant and can be removed, or a mistake that should\
    \ be fixed.\n\n\n## Example\nThe example below shows a function that returns the\
    \ first element of an array, triggering a panic if the array is empty:\n\n\n```go\n\
    package main\n\nfunc getFirst(xs []int) int {\n\tif len(xs) < 0 {\n\t\tpanic(\"\
    No elements provided\")\n\t}\n\treturn xs[0]\n}\n\n```\nHowever, the emptiness\
    \ check is ineffective: since `len(xs)` is never less than zero, the condition\
    \ will never hold and no panic will be triggered. Instead, the index expression\
    \ `xs[0]` will cause a panic.\n\nThe check should be rewritten like this:\n\n\n\
    ```go\npackage main\n\nfunc getFirstGood(xs []int) int {\n\tif len(xs) == 0 {\n\
    \t\tpanic(\"No elements provided\")\n\t}\n\treturn xs[0]\n}\n\n```\n\n## References\n\
    * Package builtin: [func cap](https://golang.org/pkg/builtin/#cap).\n* Package\
    \ builtin: [func len](https://golang.org/pkg/builtin/#len).\n* Common Weakness\
    \ Enumeration: [CWE-571](https://cwe.mitre.org/data/definitions/571.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/RedundantExpr.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/RedundantExpr.bqrs
  metadata:
    name: Identical operands
    description: |-
      Passing identical, or seemingly identical, operands to an
                    operator such as subtraction or conjunction may indicate a typo;
                    even if it is intentional, it makes the code hard to read.
    kind: problem
    problem.severity: warning
    id: go/redundant-operation
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-480
             external/cwe/cwe-561
    precision: very-high
  queryHelp: "# Identical operands\nMany arithmetic or logical operators yield a trivial\
    \ result when applied to identical operands: for instance, `x-x` is zero if `x`\
    \ is a number, and `NaN` otherwise; `x&x` is always equal to `x`. Code like this\
    \ is often the result of a typo, such as misspelling a variable name.\n\n\n##\
    \ Recommendation\nCarefully inspect the expression to ensure it is not a symptom\
    \ of a bug.\n\n\n## Example\nIn the example below, the function `avg` is intended\
    \ to compute the average of two numbers `x` and `y`. However, the programmer accidentally\
    \ used `x` twice, so the function just returns `x`:\n\n\n```go\npackage main\n\
    \nfunc avg(x, y float64) float64 {\n\treturn (x + x) / 2\n}\n\n```\nThis problem\
    \ can be fixed by correcting the typo:\n\n\n```go\npackage main\n\nfunc avgGood(x,\
    \ y float64) float64 {\n\treturn (x + y) / 2\n}\n\n```\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/RedundantRecover.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/RedundantRecover.bqrs
  metadata:
    name: Redundant call to recover
    description: |-
      Calling 'recover' in a function which isn't called using a defer
                    statement has no effect. Also, putting 'recover' directly in a
                    defer statement has no effect.
    kind: problem
    problem.severity: warning
    id: go/redundant-recover
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-248
    precision: high
  queryHelp: "# Redundant call to recover\nThe built-in `recover` function is only\
    \ useful inside deferred functions. Calling it in a function that is never deferred\
    \ means that it will always return `nil` and it will never regain control of a\
    \ panicking goroutine. The same is true of calling `recover` directly in a defer\
    \ statement.\n\n\n## Recommendation\nCarefully inspect the code to determine whether\
    \ it is a mistake that should be fixed.\n\n\n## Example\nIn the example below,\
    \ the function `fun1` is intended to recover from the panic. However, the function\
    \ that is deferred calls another function, which then calls `recover`:\n\n\n```go\n\
    package main\n\nimport \"fmt\"\n\nfunc callRecover1() {\n\tif recover() != nil\
    \ {\n\t\tfmt.Printf(\"recovered\")\n\t}\n}\n\nfunc fun1() {\n\tdefer func() {\n\
    \t\tcallRecover1()\n\t}()\n\tpanic(\"1\")\n}\n\n```\nThis problem can be fixed\
    \ by deferring the call to the function which calls `recover`:\n\n\n```go\npackage\
    \ main\n\nimport \"fmt\"\n\nfunc callRecover1Good() {\n\tif recover() != nil {\n\
    \t\tfmt.Printf(\"recovered\")\n\t}\n}\n\nfunc fun1Good() {\n\tdefer callRecover1Good()\n\
    \tpanic(\"1\")\n}\n\n```\nIn the following example, `recover` is called directly\
    \ in a defer statement, which has no effect, so the panic is not caught.\n\n\n\
    ```go\npackage main\n\nfunc fun2() {\n\tdefer recover()\n\tpanic(\"2\")\n}\n\n\
    ```\nWe can fix this by instead deferring an anonymous function which calls `recover`.\n\
    \n\n```go\npackage main\n\nfunc fun2Good() {\n\tdefer func() { recover() }()\n\
    \tpanic(\"2\")\n}\n\n```\n\n## References\n* [Defer, Panic, and Recover - The\
    \ Go Blog](https://blog.golang.org/defer-panic-and-recover).\n* Common Weakness\
    \ Enumeration: [CWE-248](https://cwe.mitre.org/data/definitions/248.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/SelfAssignment.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/SelfAssignment.bqrs
  metadata:
    name: Self assignment
    description: Assigning a variable to itself has no effect.
    kind: problem
    problem.severity: warning
    id: go/redundant-assignment
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-480
             external/cwe/cwe-561
    precision: high
  queryHelp: "# Self assignment\nAssigning a variable to itself typically indicates\
    \ a mistake such as a missing qualifier or a misspelled variable name.\n\n\n##\
    \ Recommendation\nCarefully inspect the assignment to check for misspellings or\
    \ missing qualifiers.\n\n\n## Example\nIn the example below, the struct type `Rect`\
    \ has two setter methods `setWidth` and `setHeight` that are meant to be used\
    \ to update the `width` and `height` fields, respectively:\n\n\n```go\npackage\
    \ main\n\ntype Rect struct {\n\tx, y, width, height int\n}\n\nfunc (r *Rect) setWidth(width\
    \ int) {\n\tr.width = width\n}\n\nfunc (r *Rect) setHeight(height int) {\n\theight\
    \ = height\n}\n\n```\nNote, however, that in `setHeight` the programmer forgot\
    \ to qualify the left-hand side of the assignment with the receiver variable `r`,\
    \ so the method performs a useless assignment of the `width` parameter to itself\
    \ and leaves the `width` field unchanged.\n\nTo fix this issue, insert a qualifier:\n\
    \n\n```go\npackage main\n\nfunc (r *Rect) setHeightGood(height int) {\n\tr.height\
    \ = height\n}\n\n```\n\n## References\n* The Go Programming Language Specification:\
    \ [Assignments](https://golang.org/ref/spec#Assignments).\n* Common Weakness Enumeration:\
    \ [CWE-480](https://cwe.mitre.org/data/definitions/480.html).\n* Common Weakness\
    \ Enumeration: [CWE-561](https://cwe.mitre.org/data/definitions/561.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/ShiftOutOfRange.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/ShiftOutOfRange.bqrs
  metadata:
    name: Shift out of range
    description: |-
      Shifting by more than the number of bits in the type of the left-hand
                    side always yields 0 or -1.
    kind: problem
    problem.severity: warning
    id: go/shift-out-of-range
    precision: very-high
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-197
  queryHelp: "# Shift out of range\nShifting an integer value by more than the number\
    \ of bits in its type always results in -1 for right-shifts of negative values\
    \ and 0 for other shifts. Hence, such a shift expression is either redundant or\
    \ indicates a logic mistake.\n\n\n## Recommendation\nExamine the length check\
    \ to see whether it is redundant and can be removed, or a mistake that should\
    \ be fixed.\n\n\n## Example\nThe following code snippet attempts to compute the\
    \ value 2<sup>40</sup> (1099511627776). However, since the left operand `base`\
    \ is of type `int32` (32 bits), the shift operation overflows, yielding zero.\n\
    \n\n```go\npackage main\n\nfunc shift(base int32) int32 {\n\treturn base << 40\n\
    }\n\nvar x1 = shift(1)\n\n```\nTo prevent this, the type of `base` should be changed\
    \ to `int64`:\n\n\n```go\npackage main\n\nfunc shiftGood(base int64) int64 {\n\
    \treturn base << 40\n}\n\nvar x2 = shiftGood(1)\n\n```\n\n## References\n* The\
    \ Go Programming Language Specification: [Arithmetic operators](https://golang.org/ref/spec#Arithmetic_operators).\n\
    * Common Weakness Enumeration: [CWE-197](https://cwe.mitre.org/data/definitions/197.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: RedundantCode/UnreachableStatement.ql
  relativeBqrsPath: codeql/go-queries/RedundantCode/UnreachableStatement.bqrs
  metadata:
    name: Unreachable statement
    description: |-
      Unreachable statements are often indicative of missing code or latent bugs
                    and should be avoided.
    kind: problem
    problem.severity: warning
    id: go/unreachable-statement
    tags: |-
      quality
             reliability
             correctness
             external/cwe/cwe-561
    precision: very-high
  queryHelp: "# Unreachable statement\nAn unreachable statement often indicates missing\
    \ code or a latent bug and should be examined carefully.\n\n\n## Recommendation\n\
    Examine the surrounding code to determine why the statement has become unreachable.\
    \ If it is no longer needed, remove the statement.\n\n\n## Example\nIn the following\
    \ example, the body of the `for` statement cannot terminate normally, so the update\
    \ statement `i++` becomes unreachable:\n\n\n```go\npackage main\n\nfunc mul(xs\
    \ []int) int {\n\tres := 1\n\tfor i := 0; i < len(xs); i++ {\n\t\tx := xs[i]\n\
    \t\tres *= x\n\t\tif res == 0 {\n\t\t}\n\t\treturn 0\n\t}\n\treturn res\n}\n\n\
    ```\nMost likely, the `return` statement should be moved inside the `if` statement:\n\
    \n\n```go\npackage main\n\nfunc mulGood(xs []int) int {\n\tres := 1\n\tfor i :=\
    \ 0; i < len(xs); i++ {\n\t\tx := xs[i]\n\t\tres *= x\n\t\tif res == 0 {\n\t\t\
    \treturn 0\n\t\t}\n\t}\n\treturn res\n}\n\n```\n\n## References\n* Wikipedia:\
    \ [Unreachable code](http://en.wikipedia.org/wiki/Unreachable_code).\n* Common\
    \ Weakness Enumeration: [CWE-561](https://cwe.mitre.org/data/definitions/561.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-020/IncompleteHostnameRegexp.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-020/IncompleteHostnameRegexp.bqrs
  metadata:
    name: Incomplete regular expression for hostnames
    description: |-
      Matching a URL or hostname against a regular expression that contains an unescaped
                    dot as part of the hostname might match more hostnames than expected.
    kind: path-problem
    problem.severity: warning
    security-severity: 7.8
    precision: high
    id: go/incomplete-hostname-regexp
    tags: |-
      correctness
             security
             external/cwe/cwe-020
  queryHelp: "# Incomplete regular expression for hostnames\nSanitizing untrusted\
    \ URLs is an important technique for preventing attacks such as request forgeries\
    \ and malicious redirections. Often, this is done by checking that the host of\
    \ a URL is in a set of allowed hosts.\n\nIf a regular expression implements such\
    \ a check, it is easy to accidentally make the check too permissive by not escaping\
    \ regular-expression meta-characters such as `.`.\n\nEven if the check is not\
    \ used in a security-critical context, the incomplete check may still cause undesirable\
    \ behavior when it accidentally succeeds.\n\n\n## Recommendation\nEscape all meta-characters\
    \ appropriately when constructing regular expressions for security checks, paying\
    \ special attention to the `.` meta-character.\n\n\n## Example\nThe following\
    \ example code checks that a URL redirection will reach the `example.com` domain,\
    \ or one of its subdomains.\n\n\n```go\npackage main\n\nimport (\n\t\"errors\"\
    \n\t\"net/http\"\n\t\"regexp\"\n)\n\nfunc checkRedirect(req *http.Request, via\
    \ []*http.Request) error {\n\t// BAD: the host of `req.URL` may be controlled\
    \ by an attacker\n\tre := \"^((www|beta).)?example.com/\"\n\tif matched, _ :=\
    \ regexp.MatchString(re, req.URL.Host); matched {\n\t\treturn nil\n\t}\n\treturn\
    \ errors.New(\"Invalid redirect\")\n}\n\n```\nThe check is however easy to bypass\
    \ because the unescaped `.` allows for any character before `example.com`, effectively\
    \ allowing the redirect to go to an attacker-controlled domain such as `wwwXexample.com`.\n\
    \nAddress this vulnerability by escaping `.` appropriately:\n\n\n```go\npackage\
    \ main\n\nimport (\n\t\"errors\"\n\t\"net/http\"\n\t\"regexp\"\n)\n\nfunc checkRedirectGood(req\
    \ *http.Request, via []*http.Request) error {\n\t// GOOD: the host of `req.URL`\
    \ must be `example.com`, `www.example.com` or `beta.example.com`\n\tre := \"^((www|beta)\\\
    \\.)?example\\\\.com/\"\n\tif matched, _ := regexp.MatchString(re, req.URL.Host);\
    \ matched {\n\t\treturn nil\n\t}\n\treturn errors.New(\"Invalid redirect\")\n\
    }\n\n```\nYou may also want to consider using raw string literals to avoid having\
    \ to escape backslashes:\n\n\n```go\npackage main\n\nimport (\n\t\"errors\"\n\t\
    \"net/http\"\n\t\"regexp\"\n)\n\nfunc checkRedirectGood2(req *http.Request, via\
    \ []*http.Request) error {\n\t// GOOD: the host of `req.URL` must be `example.com`,\
    \ `www.example.com` or `beta.example.com`\n\tre := `^((www|beta)\\.)?example\\\
    .com/`\n\tif matched, _ := regexp.MatchString(re, req.URL.Host); matched {\n\t\
    \treturn nil\n\t}\n\treturn errors.New(\"Invalid redirect\")\n}\n\n```\n\n## References\n\
    * OWASP: [SSRF](https://www.owasp.org/index.php/Server_Side_Request_Forgery)\n\
    * OWASP: [Unvalidated Redirects and Forwards Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html).\n\
    * Common Weakness Enumeration: [CWE-20](https://cwe.mitre.org/data/definitions/20.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-020/IncompleteUrlSchemeCheck.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-020/IncompleteUrlSchemeCheck.bqrs
  metadata:
    name: Incomplete URL scheme check
    description: |-
      Checking for the "javascript:" URL scheme without also checking for "vbscript:"
                    and "data:" suggests a logic error or even a security vulnerability.
    kind: problem
    problem.severity: warning
    security-severity: 7.8
    precision: high
    id: go/incomplete-url-scheme-check
    tags: |-
      security
             correctness
             external/cwe/cwe-020
  queryHelp: "# Incomplete URL scheme check\nURLs with the special scheme `javascript`\
    \ can be used to encode JavaScript code to be executed when the URL is visited.\
    \ While this is a powerful mechanism for creating feature-rich and responsive\
    \ web applications, it is also a potential security risk: if the URL comes from\
    \ an untrusted source, it might contain harmful JavaScript code. For this reason,\
    \ many frameworks and libraries first check the URL scheme of any untrusted URL,\
    \ and reject URLs with the `javascript` scheme.\n\nHowever, the `data` and `vbscript`\
    \ schemes can be used to represent executable code in a very similar way, so any\
    \ validation logic that checks against `javascript`, but not against `data` and\
    \ `vbscript`, is likely to be insufficient.\n\n\n## Recommendation\nAdd checks\
    \ covering both `data:` and `vbscript:`.\n\n\n## Example\nThe following function\
    \ validates a (presumably untrusted) URL `urlstr`. If its scheme is `javascript`,\
    \ the harmless placeholder URL `about:blank` is returned to prevent code injection;\
    \ otherwise `urlstr` itself is returned.\n\n\n```go\npackage main\n\nimport \"\
    net/url\"\n\nfunc sanitizeUrl(urlstr string) string {\n\tu, err := url.Parse(urlstr)\n\
    \tif err != nil || u.Scheme == \"javascript\" {\n\t\treturn \"about:blank\"\n\t\
    }\n\treturn urlstr\n}\n\n```\nWhile this check provides partial projection, it\
    \ should be extended to cover `data` and `vbscript` as well:\n\n\n```go\npackage\
    \ main\n\nimport \"net/url\"\n\nfunc sanitizeUrlGod(urlstr string) string {\n\t\
    u, err := url.Parse(urlstr)\n\tif err != nil || u.Scheme == \"javascript\" ||\
    \ u.Scheme == \"data\" || u.Scheme == \"vbscript\" {\n\t\treturn \"about:blank\"\
    \n\t}\n\treturn urlstr\n}\n\n```\n\n## References\n* WHATWG: [URL schemes](https://wiki.whatwg.org/wiki/URL_schemes).\n\
    * Common Weakness Enumeration: [CWE-20](https://cwe.mitre.org/data/definitions/20.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-020/MissingRegexpAnchor.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-020/MissingRegexpAnchor.bqrs
  metadata:
    name: Missing regular expression anchor
    description: Regular expressions without anchors can be vulnerable to bypassing.
    kind: problem
    problem.severity: warning
    security-severity: 7.8
    precision: high
    id: go/regex/missing-regexp-anchor
    tags: |-
      correctness
             security
             external/cwe/cwe-020
  queryHelp: "# Missing regular expression anchor\nSanitizing untrusted input with\
    \ regular expressions is a common technique. However, it is error-prone to match\
    \ untrusted input against regular expressions without anchors such as `^` or `$`.\
    \ Malicious input can bypass such security checks by embedding one of the allowed\
    \ patterns in an unexpected location.\n\nEven if the matching is not done in a\
    \ security-critical context, it may still cause undesirable behavior when the\
    \ regular expression accidentally matches.\n\n\n## Recommendation\nUse anchors\
    \ to ensure that regular expressions match at the expected locations.\n\n\n##\
    \ Example\nThe following example code checks that a URL redirection will reach\
    \ the `example.com` domain, or one of its subdomains, and not some malicious site.\n\
    \n\n```go\npackage main\n\nimport (\n\t\"errors\"\n\t\"net/http\"\n\t\"regexp\"\
    \n)\n\nfunc checkRedirect2(req *http.Request, via []*http.Request) error {\n\t\
    // BAD: the host of `req.URL` may be controlled by an attacker\n\tre := \"https?://www\\\
    \\.example\\\\.com/\"\n\tif matched, _ := regexp.MatchString(re, req.URL.String());\
    \ matched {\n\t\treturn nil\n\t}\n\treturn errors.New(\"Invalid redirect\")\n\
    }\n\n```\nThe check with the regular expression match is, however, easy to bypass.\
    \ For example, the string `http://example.com/` can be embedded in the query string\
    \ component: `http://evil-example.net/?x=http://example.com/`.\n\nAddress these\
    \ shortcomings by using anchors in the regular expression instead:\n\n\n```go\n\
    package main\n\nimport (\n\t\"errors\"\n\t\"net/http\"\n\t\"regexp\"\n)\n\nfunc\
    \ checkRedirect2Good(req *http.Request, via []*http.Request) error {\n\t// GOOD:\
    \ the host of `req.URL` cannot be controlled by an attacker\n\tre := \"^https?://www\\\
    \\.example\\\\.com/\"\n\tif matched, _ := regexp.MatchString(re, req.URL.String());\
    \ matched {\n\t\treturn nil\n\t}\n\treturn errors.New(\"Invalid redirect\")\n\
    }\n\n```\nA related mistake is to write a regular expression with multiple alternatives,\
    \ but to only anchor one of the alternatives. As an example, the regular expression\
    \ `^www\\.example\\.com|beta\\.example\\.com` will match the host `evil.beta.example.com`\
    \ because the regular expression is parsed as `(^www\\.example\\.com)|(beta\\\
    .example\\.com)/`, so the second alternative `beta\\.example\\.com` is not anchored\
    \ at the beginning of the string.\n\nWhen checking for a domain name that may\
    \ have subdomains, it is important to anchor the regular expression or ensure\
    \ that the domain name is prefixed with a dot.\n\n\n```go\npackage main\n\nimport\
    \ (\n\t\"regexp\"\n)\n\nfunc checkSubdomain(domain String) {\n\t// Checking strictly\
    \ that the domain is `example.com`.\n\tre := \"^example\\\\.com$\"\n\tif matched,\
    \ _ := regexp.MatchString(re, domain); matched {\n\t\t// domain is good.\n\t}\n\
    \n\t// GOOD: Alternatively, check the domain is `example.com` or a subdomain of\
    \ `example.com`.\n\tre2 := \"(^|\\\\.)example\\\\.com$\"\n\n\tif matched, _ :=\
    \ regexp.MatchString(re2, domain); matched {\n\t\t// domain is good.\n\t}\n}\n\
    \n```\n\n## References\n* OWASP: [SSRF](https://www.owasp.org/index.php/Server_Side_Request_Forgery)\n\
    * OWASP: [Unvalidated Redirects and Forwards Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html).\n\
    * Common Weakness Enumeration: [CWE-20](https://cwe.mitre.org/data/definitions/20.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-020/SuspiciousCharacterInRegexp.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-020/SuspiciousCharacterInRegexp.bqrs
  metadata:
    name: Suspicious characters in a regular expression
    description: "If a literal bell character or backspace appears in a regular expression,\
      \ the start of text or word boundary may have been intended."
    kind: path-problem
    problem.severity: warning
    security-severity: 7.8
    precision: high
    id: go/suspicious-character-in-regex
    tags: |-
      correctness
             security
             external/cwe/cwe-020
  queryHelp: "# Suspicious characters in a regular expression\nWhen a character in\
    \ a string literal or regular expression literal is preceded by a backslash, it\
    \ is interpreted as part of an escape sequence. For example, the escape sequence\
    \ `\\n` in a string literal corresponds to a single `newline` character, and not\
    \ the `\\` and `n` characters. There are two Go escape sequences that could produce\
    \ surprising results. First, `regexp.Compile(\"\\a\")` matches the bell character,\
    \ whereas `regexp.Compile(\"\\\\A\")` matches the start of text and `regexp.Compile(\"\
    \\\\a\")` is a Vim (but not Go) regular expression matching any alphabetic character.\
    \ Second, `regexp.Compile(\"\\b\")` matches a backspace, whereas `regexp.Compile(\"\
    \\\\b\")` matches the start of a word. Confusing one for the other could lead\
    \ to a regular expression passing or failing much more often than expected, with\
    \ potential security consequences. Note this is less of a problem than in some\
    \ other languages because in Go, only valid escape sequences are accepted, both\
    \ in an ordinary string (for example, `s := \"\\k\"` will not compile as there\
    \ is no such escape sequence) and in regular expressions (for example, `regexp.MustCompile(\"\
    \\\\k\")` will panic as `\\k` does not refer to a character class or other special\
    \ token according to Go's regular expression grammar).\n\n\n## Recommendation\n\
    Ensure that the right number of backslashes is used when escaping characters in\
    \ strings and regular expressions.\n\n\n## Example\nThe following example code\
    \ fails to check for a forbidden word in an input string:\n\n\n```go\npackage\
    \ main\n\nimport \"regexp\"\n\nfunc broken(hostNames []byte) string {\n\tvar hostRe\
    \ = regexp.MustCompile(\"\\bforbidden.host.org\")\n\tif hostRe.Match(hostNames)\
    \ {\n\t\treturn \"Must not target forbidden.host.org\"\n\t} else {\n\t\t// This\
    \ will be reached even if hostNames is exactly \"forbidden.host.org\",\n\t\t//\
    \ because the literal backspace is not matched\n\t\treturn \"\"\n\t}\n}\n\n```\n\
    The check does not work, but can be fixed by escaping the backslash:\n\n\n```go\n\
    package main\n\nimport \"regexp\"\n\nfunc fixed(hostNames []byte) string {\n\t\
    var hostRe = regexp.MustCompile(`\\bforbidden.host.org`)\n\tif hostRe.Match(hostNames)\
    \ {\n\t\treturn \"Must not target forbidden.host.org\"\n\t} else {\n\t\t// hostNames\
    \ definitely doesn't contain a word \"forbidden.host.org\", as \"\\\\b\"\n\t\t\
    // is the start-of-word anchor, not a literal backspace.\n\t\treturn \"\"\n\t\
    }\n}\n\n```\nAlternatively, you can use backtick-delimited raw string literals.\
    \ For example, the `\\b` in ``` regexp.Compile(`hello\\bworld`) ``` matches a\
    \ word boundary, not a backspace character, as within backticks `\\b` is not an\
    \ escape sequence.\n\n\n## References\n* golang.org: [Overview of the Regexp package](https://golang.org/pkg/regexp/).\n\
    * Google: [Syntax of regular expressions accepted by RE2](https://github.com/google/re2/wiki/Syntax).\n\
    * Common Weakness Enumeration: [CWE-20](https://cwe.mitre.org/data/definitions/20.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-022/TaintedPath.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-022/TaintedPath.bqrs
  metadata:
    name: Uncontrolled data used in path expression
    description: |-
      Accessing paths influenced by users can allow an attacker to access
                    unexpected resources.
    kind: path-problem
    problem.severity: error
    security-severity: 7.5
    precision: high
    id: go/path-injection
    tags: |-
      security
             external/cwe/cwe-022
             external/cwe/cwe-023
             external/cwe/cwe-036
             external/cwe/cwe-073
             external/cwe/cwe-099
  queryHelp: "# Uncontrolled data used in path expression\nAccessing files using paths\
    \ constructed from user-controlled data can allow an attacker to access unexpected\
    \ resources. This can result in sensitive information being revealed or deleted,\
    \ or an attacker being able to influence behavior by modifying unexpected files.\n\
    \nPaths that are naively constructed from data controlled by a user may be absolute\
    \ paths, or may contain unexpected special characters such as \"..\". Such a path\
    \ could point anywhere on the file system.\n\n\n## Recommendation\nValidate user\
    \ input before using it to construct a file path.\n\nCommon validation methods\
    \ include checking that the normalized path is relative and does not contain any\
    \ \"..\" components, or checking that the path is contained within a safe folder.\
    \ The method you should use depends on how the path is used in the application,\
    \ and whether the path should be a single path component.\n\nIf the path should\
    \ be a single path component (such as a file name), you can check for the existence\
    \ of any path separators (\"/\" or \"\\\\\"), or \"..\" sequences in the input,\
    \ and reject the input if any are found.\n\nNote that removing \"../\" sequences\
    \ is *not* sufficient, since the input could still contain a path separator followed\
    \ by \"..\". For example, the input \".../...//\" would still result in the string\
    \ \"../\" if only \"../\" sequences are removed.\n\nFinally, the simplest (but\
    \ most restrictive) option is to use an allow list of safe patterns and make sure\
    \ that the user input matches one of these patterns.\n\n\n## Example\nIn the first\
    \ example, a file name is read from an HTTP request and then used to access a\
    \ file. However, a malicious user could enter a file name which is an absolute\
    \ path, such as \"/etc/passwd\".\n\nIn the second example, it appears that the\
    \ user is restricted to opening a file within the `\"user\"` home directory. However,\
    \ a malicious user could enter a file name containing special characters. For\
    \ example, the string `\"../../etc/passwd\"` will result in the code reading the\
    \ file located at \"/home/user/../../etc/passwd\", which is the system's password\
    \ file. This file would then be sent back to the user, giving them access to password\
    \ information.\n\n\n```go\npackage main\n\nimport (\n\t\"io/ioutil\"\n\t\"net/http\"\
    \n\t\"path/filepath\"\n)\n\nfunc handler(w http.ResponseWriter, r *http.Request)\
    \ {\n\tpath := r.URL.Query()[\"path\"][0]\n\n\t// BAD: This could read any file\
    \ on the file system\n\tdata, _ := ioutil.ReadFile(path)\n\tw.Write(data)\n\n\t\
    // BAD: This could still read any file on the file system\n\tdata, _ = ioutil.ReadFile(filepath.Join(\"\
    /home/user/\", path))\n\tw.Write(data)\n}\n\n```\nIf the input should only be\
    \ a file name, you can check that it doesn't contain any path separators or \"\
    ..\" sequences.\n\n\n```go\npackage main\n\nimport (\n\t\"io/ioutil\"\n\t\"net/http\"\
    \n\t\"path/filepath\"\n\t\"strings\"\n)\n\nfunc handler(w http.ResponseWriter,\
    \ r *http.Request) {\n\tpath := r.URL.Query()[\"path\"][0]\n\n\t// GOOD: ensure\
    \ that the filename has no path separators or parent directory references\n\t\
    // (Note that this is only suitable if `path` is expected to have a single component!)\n\
    \tif strings.Contains(path, \"/\") || strings.Contains(path, \"\\\\\") || strings.Contains(path,\
    \ \"..\") {\n\t\thttp.Error(w, \"Invalid file name\", http.StatusBadRequest)\n\
    \t\treturn\n\t}\n\tdata, _ := ioutil.ReadFile(filepath.Join(\"/home/user/\", path))\n\
    \tw.Write(data)\n}\n\n```\nNote that this approach is only suitable if the input\
    \ is expected to be a single file name.\n\nIf the input can be a path with multiple\
    \ components, you can make it safe by verifying that the path is within a specific\
    \ directory that is considered safe. You can do this by resolving the input with\
    \ respect to that directory, and then checking that the resulting path is still\
    \ within it.\n\n\n```go\npackage main\n\nimport (\n\t\"io/ioutil\"\n\t\"net/http\"\
    \n\t\"path/filepath\"\n\t\"strings\"\n)\n\nconst safeDir = \"/home/user/\"\n\n\
    func handler(w http.ResponseWriter, r *http.Request) {\n\tpath := r.URL.Query()[\"\
    path\"][0]\n\n\t// GOOD: ensure that the resolved path is within the safe directory\n\
    \tabsPath, err := filepath.Abs(filepath.Join(safeDir, path))\n\tif err != nil\
    \ || !strings.HasPrefix(absPath, safeDir) {\n\t\thttp.Error(w, \"Invalid file\
    \ name\", http.StatusBadRequest)\n\t\treturn\n\t}\n\tdata, _ := ioutil.ReadFile(absPath)\n\
    \tw.Write(data)\n}\n\n```\nNote that `/home/user` is just an example, you should\
    \ replace it with the actual safe directory in your application. Also, while in\
    \ this example the path of the safe directory is absolute, this may not always\
    \ be the case, and you may need to resolve it first before checking the input.\n\
    \n\n## References\n* OWASP: [Path Traversal](https://owasp.org/www-community/attacks/Path_Traversal).\n\
    * Common Weakness Enumeration: [CWE-22](https://cwe.mitre.org/data/definitions/22.html).\n\
    * Common Weakness Enumeration: [CWE-23](https://cwe.mitre.org/data/definitions/23.html).\n\
    * Common Weakness Enumeration: [CWE-36](https://cwe.mitre.org/data/definitions/36.html).\n\
    * Common Weakness Enumeration: [CWE-73](https://cwe.mitre.org/data/definitions/73.html).\n\
    * Common Weakness Enumeration: [CWE-99](https://cwe.mitre.org/data/definitions/99.html).\n"
