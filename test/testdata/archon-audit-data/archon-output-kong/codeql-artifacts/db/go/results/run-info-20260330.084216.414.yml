  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-022/UnsafeUnzipSymlink.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-022/UnsafeUnzipSymlink.bqrs
  metadata:
    name: Arbitrary file write extracting an archive containing symbolic links
    description: |-
      Extracting files from a malicious zip archive without validating that the
                    destination file path is within the destination directory can cause files outside
                    the destination directory to be overwritten. Extracting symbolic links in particular
                    requires resolving previously extracted links to ensure the destination directory
                    is not escaped.
    kind: path-problem
    id: go/unsafe-unzip-symlink
    problem.severity: error
    security-severity: 7.5
    precision: high
    tags: |-
      security
             external/cwe/cwe-022
  queryHelp: "# Arbitrary file write extracting an archive containing symbolic links\n\
    Extracting symbolic links from a malicious zip archive, without validating that\
    \ the destination file path is within the destination directory, can cause files\
    \ outside the destination directory to be overwritten. This can happen if there\
    \ are previously-extracted symbolic links or directory traversal elements and\
    \ links (`..`) in archive paths.\n\nThis problem is related to the ZipSlip vulnerability\
    \ which is detected by the `go/zipslip` query; please see that query's help for\
    \ more general information about malicious archive file vulnerabilities. This\
    \ query considers the specific case where symbolic links are extracted from an\
    \ archive, in which case the extraction code must be aware of existing symbolic\
    \ links when checking whether it is about to extract a link pointing to a location\
    \ outside the target extraction directory.\n\n\n## Recommendation\nEnsure that\
    \ output paths constructed from zip archive entries are validated. This includes\
    \ resolving any previously extracted symbolic links, for example using `path/filepath.EvalSymlinks`,\
    \ to prevent writing files or links to unexpected locations.\n\n\n## Example\n\
    In this example, links are extracted from an archive using the syntactic `filepath.Rel`\
    \ function to check whether the link and its target fall within the destination\
    \ directory. However, the extraction code doesn't resolve previously-extracted\
    \ links, so a pair of links like `subdir/parent -> ..` followed by `escape ->\
    \ subdir/parent/.. -> subdir/../..` leaves a link pointing to the parent of the\
    \ archive root. The syntactic `Rel` is ineffective because it equates `subdir/parent/..`\
    \ with `subdir/`, but this is not the case when `subdir/parent` is a symbolic\
    \ link.\n\n\n```go\npackage main\n\nimport (\n\t\"archive/tar\"\n\t\"io\"\n\t\"\
    os\"\n\t\"path/filepath\"\n\t\"strings\"\n)\n\nfunc isRel(candidate, target string)\
    \ bool {\n\t// BAD: purely syntactic means are used to check\n\t// that `candidate`\
    \ does not escape from `target`\n\tif filepath.IsAbs(candidate) {\n\t\treturn\
    \ false\n\t}\n\trelpath, err := filepath.Rel(target, filepath.Join(target, candidate))\n\
    \treturn err == nil && !strings.HasPrefix(filepath.Clean(relpath), \"..\")\n}\n\
    \nfunc unzipSymlink(f io.Reader, target string) {\n\tr := tar.NewReader(f)\n\t\
    for {\n\t\theader, err := r.Next()\n\t\tif err != nil {\n\t\t\tbreak\n\t\t}\n\t\
    \tif isRel(header.Linkname, target) && isRel(header.Name, target) {\n\t\t\tos.Symlink(header.Linkname,\
    \ header.Name)\n\t\t}\n\t}\n}\n\n```\nTo fix this vulnerability, resolve pre-existing\
    \ symbolic links before checking that the link's target is acceptable:\n\n\n```go\n\
    package main\n\nfunc isRel(candidate, target string) bool {\n\t// GOOD: resolves\
    \ all symbolic links before checking\n\t// that `candidate` does not escape from\
    \ `target`\n\tif filepath.IsAbs(candidate) {\n\t\treturn false\n\t}\n\trealpath,\
    \ err := filepath.EvalSymlinks(filepath.Join(target, candidate))\n\tif err !=\
    \ nil {\n\t\treturn false\n\t}\n\trelpath, err := filepath.Rel(target, realpath)\n\
    \treturn err == nil && !strings.HasPrefix(filepath.Clean(relpath), \"..\")\n}\n\
    \n```\n\n## References\n* Snyk: [Zip Slip Vulnerability](https://snyk.io/research/zip-slip-vulnerability).\n\
    * OWASP: [Path Traversal](https://owasp.org/www-community/attacks/Path_Traversal).\n\
    * Common Weakness Enumeration: [CWE-22](https://cwe.mitre.org/data/definitions/22.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-022/ZipSlip.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-022/ZipSlip.bqrs
  metadata:
    name: Arbitrary file access during archive extraction ("Zip Slip")
    description: |-
      Extracting files from a malicious ZIP file, or similar type of archive, without
                    validating that the destination file path is within the destination directory
                    can allow an attacker to unexpectedly gain access to resources.
    kind: path-problem
    id: go/zipslip
    problem.severity: error
    security-severity: 7.5
    precision: high
    tags: |-
      security
             external/cwe/cwe-022
  queryHelp: "# Arbitrary file access during archive extraction (\"Zip Slip\")\nExtracting\
    \ files from a malicious zip file, or similar type of archive, is at risk of directory\
    \ traversal attacks if filenames from the archive are not properly validated.\
    \ archive paths.\n\nZip archives contain archive entries representing each file\
    \ in the archive. These entries include a file path for the entry, but these file\
    \ paths are not restricted and may contain unexpected special elements such as\
    \ the directory traversal element (`..`). If these file paths are used to create\
    \ a filesystem path, then a file operation may happen in an unexpected location.\
    \ This can result in sensitive information being revealed or deleted, or an attacker\
    \ being able to influence behavior by modifying unexpected files.\n\nFor example,\
    \ if a zip file contains a file entry `..\\sneaky-file`, and the zip file is extracted\
    \ to the directory `c:\\output`, then naively combining the paths would result\
    \ in an output file path of `c:\\output\\..\\sneaky-file`, which would cause the\
    \ file to be written to `c:\\sneaky-file`.\n\n\n## Recommendation\nEnsure that\
    \ output paths constructed from zip archive entries are validated to prevent writing\
    \ files to unexpected locations.\n\nThe recommended way of writing an output file\
    \ from a zip archive entry is to check that \"`..`\" does not occur in the path.\n\
    \n\n## Example\nIn this example an archive is extracted without validating file\
    \ paths. If `archive.zip` contained relative paths (for instance, if it were created\
    \ by something like `zip archive.zip ../file.txt`) then executing this code could\
    \ write to locations outside the destination directory.\n\n\n```go\npackage main\n\
    \nimport (\n\t\"archive/zip\"\n\t\"io/ioutil\"\n\t\"path/filepath\"\n)\n\nfunc\
    \ unzip(f string) {\n\tr, _ := zip.OpenReader(f)\n\tfor _, f := range r.File {\n\
    \t\tp, _ := filepath.Abs(f.Name)\n\t\t// BAD: This could overwrite any file on\
    \ the file system\n\t\tioutil.WriteFile(p, []byte(\"present\"), 0666)\n\t}\n}\n\
    \n```\nTo fix this vulnerability, we need to check that the path does not contain\
    \ any \"`..`\" elements in it.\n\n\n```go\npackage main\n\nimport (\n\t\"archive/zip\"\
    \n\t\"io/ioutil\"\n\t\"path/filepath\"\n\t\"strings\"\n)\n\nfunc unzipGood(f string)\
    \ {\n\tr, _ := zip.OpenReader(f)\n\tfor _, f := range r.File {\n\t\tp, _ := filepath.Abs(f.Name)\n\
    \t\t// GOOD: Check that path does not contain \"..\" before using it\n\t\tif !strings.Contains(f.Name,\
    \ \"..\") {\n\t\t\tioutil.WriteFile(p, []byte(\"present\"), 0666)\n\t\t}\n\t}\n\
    }\n\n```\n\n## References\n* Snyk: [Zip Slip Vulnerability](https://snyk.io/research/zip-slip-vulnerability).\n\
    * OWASP: [Path Traversal](https://owasp.org/www-community/attacks/Path_Traversal).\n\
    * Common Weakness Enumeration: [CWE-22](https://cwe.mitre.org/data/definitions/22.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-078/CommandInjection.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-078/CommandInjection.bqrs
  metadata:
    name: Command built from user-controlled sources
    description: |-
      Building a system command from user-controlled sources is vulnerable to insertion of
                    malicious code by the user.
    kind: path-problem
    problem.severity: error
    security-severity: 9.8
    precision: high
    id: go/command-injection
    tags: |-
      security
             external/cwe/cwe-078
  queryHelp: "# Command built from user-controlled sources\nIf a system command invocation\
    \ is built from user-provided data without sufficient sanitization, a malicious\
    \ user may be able to run commands to exfiltrate data or compromise the system.\n\
    \n\n## Recommendation\nWhenever possible, use hard-coded string literals for commands\
    \ and avoid shell string interpreters like `sh -c`.\n\nIf given arguments as a\
    \ single string, avoid simply splitting the string on whitespace. Arguments may\
    \ contain quoted whitespace, causing them to split into multiple arguments.\n\n\
    If this is not possible, sanitize user input to avoid characters like spaces and\
    \ various kinds of quotes that can alter the meaning of the command.\n\n\n## Example\n\
    In the following example, assume the function `handler` is an HTTP request handler\
    \ in a web application, whose parameter `req` contains the request object:\n\n\
    \n```go\npackage main\n\nimport (\n\t\"net/http\"\n\t\"os/exec\"\n)\n\nfunc handler(req\
    \ *http.Request) {\n\timageName := req.URL.Query()[\"imageName\"][0]\n\toutputPath\
    \ := \"/tmp/output.svg\"\n\tcmd := exec.Command(\"sh\", \"-c\", fmt.Sprintf(\"\
    imagetool %s > %s\", imageName, outputPath))\n\tcmd.Run()\n\t// ...\n}\n\n```\n\
    The handler extracts the image file name from the request and uses the image name\
    \ to construct a shell command that is executed using ``` `sh -c` ```, which can\
    \ lead to command injection.\n\nIt's better to avoid shell commands by using the\
    \ `exec.Command` function directly, as shown in the following example:\n\n\n```go\n\
    package main\n\nimport (\n\t\"log\"\n\t\"net/http\"\n\t\"os\"\n\t\"os/exec\"\n\
    )\n\nfunc handler(req *http.Request) {\n\timageName := req.URL.Query()[\"imageName\"\
    ][0]\n\toutputPath := \"/tmp/output.svg\"\n\n\t// Create the output file\n\toutfile,\
    \ err := os.Create(outputPath)\n\tif err != nil {\n\t\tlog.Fatal(err)\n\t}\n\t\
    defer outfile.Close()\n\n\t// Prepare the command\n\tcmd := exec.Command(\"imagetool\"\
    , imageName)\n\n\t// Set the output to our file\n\tcmd.Stdout = outfile\n\n\t\
    cmd.Run()\n}\n\n```\nAlternatively, a regular expression can be used to ensure\
    \ that the image name is safe to use in a shell command:\n\n\n```go\npackage main\n\
    \nimport (\n\t\"log\"\n\t\"net/http\"\n\t\"os/exec\"\n\t\"regexp\"\n)\n\nfunc\
    \ handler(req *http.Request) {\n\timageName := req.URL.Query()[\"imageName\"][0]\n\
    \toutputPath := \"/tmp/output.svg\"\n\n\t// Validate the imageName with a regular\
    \ expression\n\tvalidImageName := regexp.MustCompile(`^[a-zA-Z0-9_\\-\\.]+$`)\n\
    \tif !validImageName.MatchString(imageName) {\n\t\tlog.Fatal(\"Invalid image name\"\
    )\n\t\treturn\n\t}\n\n\tcmd := exec.Command(\"sh\", \"-c\", fmt.Sprintf(\"imagetool\
    \ %s > %s\", imageName, outputPath))\n\tcmd.Run()\n}\n\n```\nSome commands, like\
    \ `git`, can indirectly execute commands if an attacker specifies the flags given\
    \ to the command.\n\nTo mitigate this risk, either add a `--` argument to ensure\
    \ subsequent arguments are not interpreted as flags, or verify that the argument\
    \ does not start with `\"--\"`.\n\n\n```go\npackage main\n\nimport (\n\t\"log\"\
    \n\t\"net/http\"\n\t\"os/exec\"\n\t\"strings\"\n)\n\nfunc handler(req *http.Request)\
    \ {\n\trepoURL := req.URL.Query()[\"repoURL\"][0]\n\toutputPath := \"/tmp/repo\"\
    \n\n\t// Sanitize the repoURL to ensure it does not start with \"--\"\n\tif strings.HasPrefix(repoURL,\
    \ \"--\") {\n\t\tlog.Fatal(\"Invalid repository URL\")\n\t} else {\n\t\tcmd :=\
    \ exec.Command(\"git\", \"clone\", repoURL, outputPath)\n\t\terr := cmd.Run()\n\
    \t\tif err != nil {\n\t\t\tlog.Fatal(err)\n\t\t}\n\t}\n\n\t// Or: add \"--\" to\
    \ ensure that the repoURL is not interpreted as a flag\n\tcmd := exec.Command(\"\
    git\", \"clone\", \"--\", repoURL, outputPath)\n\terr := cmd.Run()\n\tif err !=\
    \ nil {\n\t\tlog.Fatal(err)\n\t}\n}\n\n```\n\n## References\n* OWASP: [Command\
    \ Injection](https://www.owasp.org/index.php/Command_Injection).\n* Common Weakness\
    \ Enumeration: [CWE-78](https://cwe.mitre.org/data/definitions/78.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-079/HtmlTemplateEscapingBypassXss.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-079/HtmlTemplateEscapingBypassXss.bqrs
  metadata:
    name: Cross-site scripting via HTML template escaping bypass
    description: |-
      Converting user input to a special type that avoids escaping
                    when fed into an HTML template allows for a cross-site
                    scripting vulnerability.
    kind: path-problem
    problem.severity: error
    security-severity: 6.1
    precision: high
    id: go/html-template-escaping-bypass-xss
    tags: |-
      security
             external/cwe/cwe-079
             external/cwe/cwe-116
  queryHelp: "# Cross-site scripting via HTML template escaping bypass\nIn Go, the\
    \ `html/template` package has a few special types (`HTML`, `HTMLAttr`, `JS`, `JSStr`,\
    \ `CSS`, `Srcset`, and `URL`) that allow values to be rendered as-is in the template,\
    \ avoiding the escaping that all the other strings go through.\n\nUsing them on\
    \ user-provided values allows for a cross-site scripting vulnerability.\n\n\n\
    ## Recommendation\nMake sure to never use those types on untrusted content.\n\n\
    \n## Example\nIn the first example you can see the special types and how they\
    \ are used in a template:\n\n\n```go\npackage main\n\nimport (\n\t\"html/template\"\
    \n\t\"net/http\"\n)\n\nfunc bad(w http.ResponseWriter, r *http.Request) {\n\t\
    r.ParseForm()\n\tusername := r.Form.Get(\"username\")\n\ttmpl, _ := template.New(\"\
    test\").Parse(`<b>Hi {{.}}</b>`)\n\ttmpl.Execute(w, template.HTML(username))\n\
    }\n\n```\nTo avoid XSS, all user input should be a normal string type.\n\n\n```go\n\
    package main\n\nimport (\n\t\"html/template\"\n\t\"net/http\"\n)\n\nfunc good(w\
    \ http.ResponseWriter, r *http.Request) {\n\tr.ParseForm()\n\tusername := r.Form.Get(\"\
    username\")\n\ttmpl, _ := template.New(\"test\").Parse(`<b>Hi {{.}}</b>`)\n\t\
    tmpl.Execute(w, username)\n}\n\n```\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-079/ReflectedXss.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-079/ReflectedXss.bqrs
  metadata:
    name: Reflected cross-site scripting
    description: |-
      Writing user input directly to an HTTP response allows for
                    a cross-site scripting vulnerability.
    kind: path-problem
    problem.severity: error
    security-severity: 6.1
    precision: high
    id: go/reflected-xss
    tags: |-
      security
             external/cwe/cwe-079
             external/cwe/cwe-116
  queryHelp: "# Reflected cross-site scripting\nDirectly writing user input (for example,\
    \ an HTTP request parameter) to an HTTP response without properly sanitizing the\
    \ input first, allows for a cross-site scripting vulnerability.\n\nThis kind of\
    \ vulnerability is also called *reflected* cross-site scripting, to distinguish\
    \ it from other types of cross-site scripting.\n\n\n## Recommendation\nTo guard\
    \ against cross-site scripting, consider using contextual output encoding/escaping\
    \ before writing user input to the response, or one of the other solutions that\
    \ are mentioned in the references.\n\n\n## Example\nThe following example code\
    \ writes part of an HTTP request (which is controlled by the user) directly to\
    \ the response. This leaves the website vulnerable to cross-site scripting.\n\n\
    \n```go\npackage main\n\nimport (\n\t\"fmt\"\n\t\"net/http\"\n)\n\nfunc serve()\
    \ {\n\thttp.HandleFunc(\"/user\", func(w http.ResponseWriter, r *http.Request)\
    \ {\n\t\tr.ParseForm()\n\t\tusername := r.Form.Get(\"username\")\n\t\tif !isValidUsername(username)\
    \ {\n\t\t\t// BAD: a request parameter is incorporated without validation into\
    \ the response\n\t\t\tfmt.Fprintf(w, \"%q is an unknown user\", username)\n\t\t\
    } else {\n\t\t\t// TODO: Handle successful login\n\t\t}\n\t})\n\thttp.ListenAndServe(\"\
    :80\", nil)\n}\n\n```\nSanitizing the user-controlled data prevents the vulnerability:\n\
    \n\n```go\npackage main\n\nimport (\n\t\"fmt\"\n\t\"html\"\n\t\"net/http\"\n)\n\
    \nfunc serve1() {\n\thttp.HandleFunc(\"/user\", func(w http.ResponseWriter, r\
    \ *http.Request) {\n\t\tr.ParseForm()\n\t\tusername := r.Form.Get(\"username\"\
    )\n\t\tif !isValidUsername(username) {\n\t\t\t// GOOD: a request parameter is\
    \ escaped before being put into the response\n\t\t\tfmt.Fprintf(w, \"%q is an\
    \ unknown user\", html.EscapeString(username))\n\t\t} else {\n\t\t\t// TODO: do\
    \ something exciting\n\t\t}\n\t})\n\thttp.ListenAndServe(\":80\", nil)\n}\n\n\
    ```\n\n## References\n* OWASP: [XSS (Cross Site Scripting) Prevention Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Cross_Site_Scripting_Prevention_Cheat_Sheet.html).\n\
    * OWASP [Types of Cross-Site Scripting](https://www.owasp.org/index.php/Types_of_Cross-Site_Scripting).\n\
    * Wikipedia: [Cross-site scripting](http://en.wikipedia.org/wiki/Cross-site_scripting).\n\
    * Common Weakness Enumeration: [CWE-79](https://cwe.mitre.org/data/definitions/79.html).\n\
    * Common Weakness Enumeration: [CWE-116](https://cwe.mitre.org/data/definitions/116.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-089/SqlInjection.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-089/SqlInjection.bqrs
  metadata:
    name: Database query built from user-controlled sources
    description: |-
      Building a database query from user-controlled sources is vulnerable to insertion of
                    malicious code by the user.
    kind: path-problem
    problem.severity: error
    security-severity: 8.8
    precision: high
    id: go/sql-injection
    tags: |-
      security
             external/cwe/cwe-089
  queryHelp: "# Database query built from user-controlled sources\nIf a database query\
    \ (such as an SQL or NoSQL query) is built from user-provided data without sufficient\
    \ sanitization, a malicious user may be able to run commands that exfiltrate,\
    \ tamper with, or destroy data stored in the database.\n\n\n## Recommendation\n\
    Most database connector libraries offer a way of safely embedding untrusted data\
    \ into a query by means of query parameters or prepared statements. Use these\
    \ features rather than building queries by string concatenation.\n\n\n## Example\n\
    In the following example, assume the function `handler` is an HTTP request handler\
    \ in a web application, whose parameter `req` contains the request object:\n\n\
    \n```go\npackage main\n\nimport (\n\t\"database/sql\"\n\t\"fmt\"\n\t\"net/http\"\
    \n)\n\nfunc handler(db *sql.DB, req *http.Request) {\n\tq := fmt.Sprintf(\"SELECT\
    \ ITEM,PRICE FROM PRODUCT WHERE ITEM_CATEGORY='%s' ORDER BY PRICE\",\n\t\treq.URL.Query()[\"\
    category\"])\n\tdb.Query(q)\n}\n\n```\nThe handler constructs an SQL query involving\
    \ user input taken from the request object unsafely using `fmt.Sprintf` to embed\
    \ a request parameter directly into the query string `q`. The parameter may include\
    \ quote characters, allowing a malicious user to terminate the string literal\
    \ into which the parameter is embedded and add arbitrary SQL code after it.\n\n\
    Instead, the untrusted query parameter should be safely embedded using placeholder\
    \ parameters:\n\n\n```go\npackage main\n\nimport (\n\t\"database/sql\"\n\t\"net/http\"\
    \n)\n\nfunc handlerGood(db *sql.DB, req *http.Request) {\n\tq := \"SELECT ITEM,PRICE\
    \ FROM PRODUCT WHERE ITEM_CATEGORY='?' ORDER BY PRICE\"\n\tdb.Query(q, req.URL.Query()[\"\
    category\"])\n}\n\n```\n\n## References\n* Wikipedia: [SQL injection](https://en.wikipedia.org/wiki/SQL_injection).\n\
    * Common Weakness Enumeration: [CWE-89](https://cwe.mitre.org/data/definitions/89.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-089/StringBreak.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-089/StringBreak.bqrs
  metadata:
    name: Potentially unsafe quoting
    description: |-
      If a quoted string literal is constructed from data that may itself contain quotes,
                    the embedded data could (accidentally or intentionally) change the structure of
                    the overall string.
    kind: path-problem
    problem.severity: warning
    security-severity: 9.3
    precision: high
    id: go/unsafe-quoting
    tags: |-
      correctness
             security
             external/cwe/cwe-078
             external/cwe/cwe-089
             external/cwe/cwe-094
  queryHelp: "# Potentially unsafe quoting\nCode that constructs a quoted string literal\
    \ containing user-provided data needs to ensure that this data does not itself\
    \ contain a quote. Otherwise the embedded data could (accidentally or intentionally)\
    \ terminate the string literal early and thereby change the structure of the overall\
    \ string, with potentially severe consequences. If, for example, the string is\
    \ later used as part of an operating-system command or database query, an attacker\
    \ may be able to craft input data that injects a malicious command.\n\n\n## Recommendation\n\
    Sanitize the embedded data appropriately to ensure quotes are escaped, or use\
    \ an API that does not rely on manually constructing quoted substrings. Make sure\
    \ to use the appropriate escaping mechanism, for example, double quoting for SQL\
    \ strings or backslash escaping for shell commands. When using backslash escaping,\
    \ the backslash character itself must also be escaped.\n\n\n## Example\nIn the\
    \ following example, assume that `version` is an object from an untrusted source.\
    \ The code snippet first uses `json.Marshal` to serialize this object into a string,\
    \ and then embeds it into a SQL query built using the Squirrel library.\n\n\n\
    ```go\npackage main\n\nimport (\n\t\"encoding/json\"\n\t\"fmt\"\n\tsq \"github.com/Masterminds/squirrel\"\
    \n)\n\nfunc save(id string, version interface{}) {\n\tversionJSON, _ := json.Marshal(version)\n\
    \tsq.StatementBuilder.\n\t\tInsert(\"resources\").\n\t\tColumns(\"resource_id\"\
    , \"version_md5\").\n\t\tValues(id, sq.Expr(fmt.Sprintf(\"md5('%s')\", versionJSON))).\n\
    \t\tExec()\n}\n\n```\nNote that JSON encoding does not escape single quotes in\
    \ any way, so this code is vulnerable: any single-quote character in `version`\
    \ will prematurely close the surrounding string literal, changing the structure\
    \ of the SQL expression being constructed. This could be exploited to mount a\
    \ SQL injection attack.\n\nTo fix this vulnerability, use the placeholder syntax\
    \ from Squirrel's structured API for building queries, which avoids the need to\
    \ explicitly construct a quoted string.\n\n\n```go\npackage main\n\nimport (\n\
    \t\"encoding/json\"\n\tsq \"github.com/Masterminds/squirrel\"\n)\n\nfunc saveGood(id\
    \ string, version interface{}) {\n\tversionJSON, _ := json.Marshal(version)\n\t\
    sq.StatementBuilder.\n\t\tInsert(\"resources\").\n\t\tColumns(\"resource_id\"\
    , \"version_md5\").\n\t\tValues(id, sq.Expr(\"md5(?)\", versionJSON)).\n\t\tExec()\n\
    }\n\n```\nIn situations where a structured API is not available, make sure that\
    \ you escape quotes before embedding user-provided data into a quoted string.\
    \ For example, this is how you can backslash-escape single quotes using `strings.ReplaceAll`:\n\
    \n```go\n\n  quoted := strings.ReplaceAll(raw, `\\`, `\\\\`)\n  quoted = strings.ReplaceAll(quoted,\
    \ \"'\", \"\\\\'\")\n\n```\nNote that any existing backslash characters in the\
    \ string must be escaped first, so that they do not interfere with the escaping\
    \ of single quotes.\n\nIn some cases, `strconv.Quote` is a convenient option for\
    \ backslash escaping, but note that it has two limitations:\n\n1. It only supports\
    \ double quotes, not single quotes (as in the example).\n1. It puts quotes around\
    \ the entire string, so it can only be used to construct complete string literals,\
    \ not parts of larger string literals.\n\n## References\n* Wikipedia: [SQL injection](https://en.wikipedia.org/wiki/SQL_injection).\n\
    * OWASP: [Command Injection](https://www.owasp.org/index.php/Command_Injection).\n\
    * Common Weakness Enumeration: [CWE-78](https://cwe.mitre.org/data/definitions/78.html).\n\
    * Common Weakness Enumeration: [CWE-89](https://cwe.mitre.org/data/definitions/89.html).\n\
    * Common Weakness Enumeration: [CWE-94](https://cwe.mitre.org/data/definitions/94.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-1004/CookieWithoutHttpOnly.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-1004/CookieWithoutHttpOnly.bqrs
  metadata:
    name: Cookie 'HttpOnly' attribute is not set to true
    description: |-
      Sensitive cookies without the `HttpOnly` property set are accessible by client-side scripts such as JavaScript.
                    This makes them more vulnerable to being stolen by an XSS attack.
    kind: path-problem
    problem.severity: warning
    precision: high
    security-severity: 5.0
    id: go/cookie-httponly-not-set
    tags: |-
      security
             external/cwe/cwe-1004
  queryHelp: "# Cookie 'HttpOnly' attribute is not set to true\nCookies without the\
    \ `HttpOnly` flag set are accessible to client-side scripts such as JavaScript\
    \ running in the same origin. In case of a Cross-Site Scripting (XSS) vulnerability,\
    \ the cookie can be stolen by a malicious script. If a sensitive cookie does not\
    \ need to be accessed directly by client-side JS, the `HttpOnly` flag should be\
    \ set.\n\n\n## Recommendation\nSet the `HttpOnly` flag to `true` for authentication\
    \ cookies to ensure they are not accessible to client-side scripts.\n\n\n## Example\n\
    In the following example, in the case marked BAD, the `HttpOnly` flag is not set,\
    \ so the default value of `false` is used. In the case marked GOOD, the `HttpOnly`\
    \ flag is set to `true`.\n\n\n```go\npackage main\n\nimport (\n\t\"net/http\"\n\
    )\n\nfunc handlerBad(w http.ResponseWriter, r *http.Request) {\n\tc := http.Cookie{\n\
    \t\tName:  \"session\",\n\t\tValue: \"secret\",\n\t}\n\thttp.SetCookie(w, &c)\
    \ // BAD: The HttpOnly flag is set to false by default.\n}\n\nfunc handlerGood(w\
    \ http.ResponseWriter, r *http.Request) {\n\tc := http.Cookie{\n\t\tName:    \
    \ \"session\",\n\t\tValue:    \"secret\",\n\t\tHttpOnly: true,\n\t}\n\thttp.SetCookie(w,\
    \ &c) // GOOD: The HttpOnly flag is set to true.\n}\n\n```\n\n## References\n\
    * MDN: [Set-Cookie](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Set-Cookie)\
    \ Header.\n* PortSwigger: [Cookie without HttpOnly flag set](https://portswigger.net/kb/issues/00500600_cookie-without-httponly-flag-set)\n\
    * Common Weakness Enumeration: [CWE-1004](https://cwe.mitre.org/data/definitions/1004.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-117/LogInjection.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-117/LogInjection.bqrs
  metadata:
    name: Log entries created from user input
    description: |-
      Building log entries from user-controlled sources is vulnerable to
                    insertion of forged log entries by a malicious user.
    kind: path-problem
    problem.severity: error
    security-severity: 7.8
    precision: medium
    id: go/log-injection
    tags: |-
      security
             external/cwe/cwe-117
  queryHelp: "# Log entries created from user input\nIf unsanitized user input is\
    \ written to a log entry, a malicious user may be able to forge new log entries.\n\
    \nForgery can occur if a user provides some input with characters that are interpreted\
    \ when the log output is displayed. If the log is displayed as a plain text file,\
    \ then new line characters can be used by a malicious user. If the log is displayed\
    \ as HTML, then arbitrary HTML may be included to spoof log entries.\n\n\n## Recommendation\n\
    User input should be suitably encoded before it is logged.\n\nIf the log entries\
    \ are plain text then line breaks should be removed from user input, using `strings.Replace`\
    \ or similar. Care should also be taken that user input is clearly marked in log\
    \ entries, and that a malicious user cannot cause confusion in other ways.\n\n\
    For log entries that will be displayed in HTML, user input should be HTML encoded\
    \ using `html.EscapeString` or similar before being logged, to prevent forgery\
    \ and other forms of HTML injection.\n\n\n## Example\nIn the following example,\
    \ a user name, provided by the user, is logged using a logging framework without\
    \ any sanitization.\n\n\n```go\npackage main\n\nimport (\n\t\"log\"\n\t\"net/http\"\
    \n)\n\n// BAD: A user-provided value is written directly to a log.\nfunc handler(req\
    \ *http.Request) {\n\tusername := req.URL.Query()[\"username\"][0]\n\tlog.Printf(\"\
    user %s logged in.\\n\", username)\n}\n\n```\nIn the next example, `strings.Replace`\
    \ is used to ensure no line endings are present in the user input.\n\n\n```go\n\
    package main\n\nimport (\n\t\"log\"\n\t\"net/http\"\n\t\"strings\"\n)\n\n// GOOD:\
    \ The user-provided value is escaped before being written to the log.\nfunc handlerGood(req\
    \ *http.Request) {\n\tusername := req.URL.Query()[\"username\"][0]\n\tescapedUsername\
    \ := strings.ReplaceAll(username, \"\\n\", \"\")\n\tescapedUsername = strings.ReplaceAll(escapedUsername,\
    \ \"\\r\", \"\")\n\tlog.Printf(\"user %s logged in.\\n\", escapedUsername)\n}\n\
    \n```\n\n## References\n* OWASP: [Log Injection](https://www.owasp.org/index.php/Log_Injection).\n\
    * Common Weakness Enumeration: [CWE-117](https://cwe.mitre.org/data/definitions/117.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-190/AllocationSizeOverflow.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-190/AllocationSizeOverflow.bqrs
  metadata:
    name: Size computation for allocation may overflow
    description: |-
      When computing the size of an allocation based on the size of a large object,
                    the result may overflow and cause a runtime panic.
    kind: path-problem
    problem.severity: warning
    security-severity: 8.1
    precision: high
    id: go/allocation-size-overflow
    tags: |-
      security
             external/cwe/cwe-190
  queryHelp: "# Size computation for allocation may overflow\nPerforming calculations\
    \ involving the size of potentially large strings or slices can result in an overflow\
    \ (for signed integer types) or a wraparound (for unsigned types). An overflow\
    \ causes the result of the calculation to become negative, while a wraparound\
    \ results in a small (positive) number.\n\nThis can cause further issues. If,\
    \ for example, the result is then used in an allocation, it will cause a runtime\
    \ panic if it is negative, and allocate an unexpectedly small buffer otherwise.\n\
    \n\n## Recommendation\nAlways guard against overflow in arithmetic operations\
    \ involving potentially large numbers by doing one of the following:\n\n* Validate\
    \ the size of the data from which the numbers are computed.\n* Define a guard\
    \ on the arithmetic expression, so that the operation is performed only if the\
    \ result can be known to be less than, or equal to, the maximum value for the\
    \ type.\n* Use a wider type (such as `uint64` instead of `int`), so that larger\
    \ input values do not cause overflow.\n\n## Example\nIn the following example,\
    \ assume that there is a function `encryptBuffer` that encrypts byte slices whose\
    \ length must be padded to be a multiple of 16. The function `encryptValue` provides\
    \ a convenience wrapper around this function: when passed an arbitrary value,\
    \ it first encodes that value as JSON, pads the resulting byte slice, and then\
    \ passes it to `encryptBuffer`.\n\n\n```go\npackage main\n\nimport \"encoding/json\"\
    \n\nfunc encryptValue(v interface{}) ([]byte, error) {\n\tjsonData, err := json.Marshal(v)\n\
    \tif err != nil {\n\t\treturn nil, err\n\t}\n\tsize := len(jsonData) + (len(jsonData)\
    \ % 16)\n\tbuffer := make([]byte, size)\n\tcopy(buffer, jsonData)\n\treturn encryptBuffer(buffer)\n\
    }\n\n```\nWhen passed a value whose JSON encoding is close to the maximum value\
    \ of type `int` in length, the computation of `size` will overflow, producing\
    \ a negative value. When that negative value is passed to `make`, a runtime panic\
    \ will occur.\n\nTo guard against this, the function should be improved to check\
    \ the length of the JSON-encoded value. For example, here is a version of `encryptValue`\
    \ that ensures the value is no larger than 64 MB, which fits comfortably within\
    \ an `int` and avoids the overflow:\n\n\n```go\npackage main\n\nimport (\n\t\"\
    encoding/json\"\n\t\"errors\"\n)\n\nfunc encryptValueGood(v interface{}) ([]byte,\
    \ error) {\n\tjsonData, err := json.Marshal(v)\n\tif err != nil {\n\t\treturn\
    \ nil, err\n\t}\n\tif len(jsonData) > 64*1024*1024 {\n\t\treturn nil, errors.New(\"\
    value too large\")\n\t}\n\tsize := len(jsonData) + (len(jsonData) % 16)\n\tbuffer\
    \ := make([]byte, size)\n\tcopy(buffer, jsonData)\n\treturn encryptBuffer(buffer)\n\
    }\n\n```\n\n## References\n* The Go Programming Language Specification: [Integer\
    \ overflow](https://golang.org/ref/spec#Integer_overflow).\n* The Go Programming\
    \ Language Specification: [Making slices, maps and channels](https://golang.org/ref/spec#Making_slices_maps_and_channels).\n\
    * Common Weakness Enumeration: [CWE-190](https://cwe.mitre.org/data/definitions/190.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-209/StackTraceExposure.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-209/StackTraceExposure.bqrs
  metadata:
    name: Information exposure through a stack trace
    description: |-
      Information from a stack trace propagates to an external user.
                    Stack traces can unintentionally reveal implementation details
                    that are useful to an attacker for developing a subsequent exploit.
    kind: path-problem
    problem.severity: error
    security-severity: 5.4
    precision: high
    id: go/stack-trace-exposure
    tags: |-
      security
             external/cwe/cwe-209
             external/cwe/cwe-497
  queryHelp: "# Information exposure through a stack trace\nSoftware developers often\
    \ add stack traces to error messages, as a debugging aid. Whenever that error\
    \ message occurs for an end user, the developer can use the stack trace to help\
    \ identify how to fix the problem. In particular, stack traces can tell the developer\
    \ more about the sequence of events that led to a failure, as opposed to merely\
    \ the final state of the software when the error occurred.\n\nUnfortunately, the\
    \ same information can be useful to an attacker. The sequence of class names in\
    \ a stack trace can reveal the structure of the application as well as any internal\
    \ components it relies on.\n\n\n## Recommendation\nSend the user a more generic\
    \ error message that reveals less information. Either suppress the stack trace\
    \ entirely, or log it only on the server.\n\n\n## Example\nIn the following example,\
    \ a panic is handled in two different ways. In the first version, labeled BAD,\
    \ a detailed stack trace is written to a user-facing HTTP response object, which\
    \ may disclose sensitive information. In the second version, the error message\
    \ is logged only on the server. That way, the developers can still access and\
    \ use the error log, but remote users will not see the information.\n\n\n```go\n\
    package example\n\nimport (\n\t\"log\"\n\t\"net/http\"\n\t\"runtime\"\n)\n\nfunc\
    \ handlePanic(w http.ResponseWriter, r *http.Request) {\n\tbuf := make([]byte,\
    \ 2<<16)\n\tbuf = buf[:runtime.Stack(buf, true)]\n\t// BAD: printing a stack trace\
    \ back to the response\n\tw.Write(buf)\n\t// GOOD: logging the response to the\
    \ server and sending\n\t// a more generic message.\n\tlog.Printf(\"Panic: %s\"\
    , buf)\n\tw.Write([]byte(\"An unexpected runtime error occurred\"))\n}\n\n```\n\
    \n## References\n* OWASP: [Improper Error Handling](https://owasp.org/www-community/Improper_Error_Handling).\n\
    * Common Weakness Enumeration: [CWE-209](https://cwe.mitre.org/data/definitions/209.html).\n\
    * Common Weakness Enumeration: [CWE-497](https://cwe.mitre.org/data/definitions/497.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-295/DisabledCertificateCheck.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-295/DisabledCertificateCheck.bqrs
  metadata:
    name: Disabled TLS certificate check
    description: |-
      If an application disables TLS certificate checking, it may be vulnerable to
                    man-in-the-middle attacks.
    kind: problem
    problem.severity: warning
    security-severity: 7.5
    precision: high
    id: go/disabled-certificate-check
    tags: |-
      security
             external/cwe/cwe-295
  queryHelp: "# Disabled TLS certificate check\nThe field `InsecureSkipVerify` controls\
    \ whether a TLS client verifies the server's certificate chain and host name.\
    \ If set to `true`, the client will accept any certificate and any host name in\
    \ that certificate, making it susceptible to man-in-the-middle attacks.\n\n\n\
    ## Recommendation\nDo not set `InsecureSkipVerify` to `true` except in tests.\n\
    \n\n## Example\nThe following code snippet shows a function that performs an HTTP\
    \ request over TLS with certificate verification disabled:\n\n\n```go\npackage\
    \ main\n\nimport (\n\t\"crypto/tls\"\n\t\"net/http\"\n)\n\nfunc doAuthReq(authReq\
    \ *http.Request) *http.Response {\n\ttr := &http.Transport{\n\t\tTLSClientConfig:\
    \ &tls.Config{InsecureSkipVerify: true},\n\t}\n\tclient := &http.Client{Transport:\
    \ tr}\n\tres, _ := client.Do(authReq)\n\treturn res\n}\n\n```\nWhile this is acceptable\
    \ in a test, it should not be used in production code. Instead, certificates should\
    \ be configured such that verification can be performed.\n\n\n## References\n\
    * Package tls: [Config](https://golang.org/pkg/crypto/tls/#Config).\n* SSL.com:\
    \ [Browsers and Certificate Validation](https://www.ssl.com/article/browsers-and-certificate-validation/).\n\
    * Common Weakness Enumeration: [CWE-295](https://cwe.mitre.org/data/definitions/295.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-312/CleartextLogging.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-312/CleartextLogging.bqrs
  metadata:
    name: Clear-text logging of sensitive information
    description: |-
      Logging sensitive information without encryption or hashing can
                    expose it to an attacker.
    kind: path-problem
    problem.severity: error
    security-severity: 7.5
    precision: high
    id: go/clear-text-logging
    tags: |-
      security
             external/cwe/cwe-312
             external/cwe/cwe-315
             external/cwe/cwe-359
  queryHelp: "# Clear-text logging of sensitive information\nSensitive information\
    \ that is logged unencrypted is accessible to an attacker who gains access to\
    \ the logs.\n\n\n## Recommendation\nEnsure that sensitive information is always\
    \ encrypted or obfuscated before being logged.\n\nIn general, decrypt sensitive\
    \ information only at the point where it is necessary for it to be used in cleartext.\n\
    \nBe aware that external processes often store the standard out and standard error\
    \ streams of the application, causing logged sensitive information to be stored.\n\
    \n\n## Example\nThe following example code logs user credentials (in this case,\
    \ their password) in plain text:\n\n\n```go\npackage main\n\nimport (\n\t\"log\"\
    \n\t\"net/http\"\n)\n\nfunc serve() {\n\thttp.HandleFunc(\"/register\", func(w\
    \ http.ResponseWriter, r *http.Request) {\n\t\tr.ParseForm()\n\t\tuser := r.Form.Get(\"\
    user\")\n\t\tpw := r.Form.Get(\"password\")\n\n\t\tlog.Printf(\"Registering new\
    \ user %s with password %s.\\n\", user, pw)\n\t})\n\thttp.ListenAndServe(\":80\"\
    , nil)\n}\n\n```\nInstead, the credentials should be encrypted, obfuscated, or\
    \ omitted entirely:\n\n\n```go\npackage main\n\nimport (\n\t\"log\"\n\t\"net/http\"\
    \n)\n\nfunc serve1() {\n\thttp.HandleFunc(\"/register\", func(w http.ResponseWriter,\
    \ r *http.Request) {\n\t\tr.ParseForm()\n\t\tuser := r.Form.Get(\"user\")\n\t\t\
    pw := r.Form.Get(\"password\")\n\n\t\tlog.Printf(\"Registering new user %s.\\\
    n\", user)\n\n\t\t// ...\n\t\tuse(pw)\n\t})\n\thttp.ListenAndServe(\":80\", nil)\n\
    }\n\n```\n\n## References\n* M. Dowd, J. McDonald and J. Schuhm, *The Art of Software\
    \ Security Assessment*, 1st Edition, Chapter 2 - 'Common Vulnerabilities of Encryption',\
    \ p. 43. Addison Wesley, 2006.\n* M. Howard and D. LeBlanc, *Writing Secure Code*,\
    \ 2nd Edition, Chapter 9 - 'Protecting Secret Data', p. 299. Microsoft, 2002.\n\
    * OWASP: [Password Plaintext Storage](https://www.owasp.org/index.php/Password_Plaintext_Storage).\n\
    * Common Weakness Enumeration: [CWE-312](https://cwe.mitre.org/data/definitions/312.html).\n\
    * Common Weakness Enumeration: [CWE-315](https://cwe.mitre.org/data/definitions/315.html).\n\
    * Common Weakness Enumeration: [CWE-359](https://cwe.mitre.org/data/definitions/359.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-322/InsecureHostKeyCallback.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-322/InsecureHostKeyCallback.bqrs
  metadata:
    name: Use of insecure HostKeyCallback implementation
    description: Detects insecure SSL client configurations with an implementation
      of the `HostKeyCallback` that accepts all host keys.
    kind: path-problem
    problem.severity: warning
    security-severity: 8.2
    precision: high
    id: go/insecure-hostkeycallback
    tags: |-
      security
             external/cwe/cwe-322
  queryHelp: "# Use of insecure HostKeyCallback implementation\nThe `ClientConfig`\
    \ specifying the configuration for establishing a SSH connection has a field `HostKeyCallback`\
    \ that must be initialized with a function that validates the host key returned\
    \ by the server.\n\nNot properly verifying the host key returned by a server provides\
    \ attackers with an opportunity to perform a Machine-in-the-Middle (MitM) attack.\
    \ A successful attack can compromise the confidentiality and integrity of the\
    \ information communicated with the server.\n\nThe `ssh` package provides the\
    \ predefined callback `InsecureIgnoreHostKey` that can be used during development\
    \ and testing. It accepts any provided host key. This callback, or a semantically\
    \ similar callback, should not be used in production code.\n\n\n## Recommendation\n\
    The `HostKeyCallback` field of `ClientConfig` should be initialized with a function\
    \ that validates a host key against an allow list. If a key is not on a predefined\
    \ allow list, the connection must be terminated and the failed security operation\
    \ should be logged.\n\nWhen the allow list contains only a single host key then\
    \ the function `FixedHostKey` can be used.\n\n\n## Example\nThe following example\
    \ shows the use of `InsecureIgnoreHostKey` and an insecure host key callback implementation\
    \ commonly used in non-production code.\n\n\n```go\npackage main\n\nimport (\n\
    \t\"golang.org/x/crypto/ssh\"\n\t\"net\"\n)\n\nfunc main() {}\n\nfunc insecureIgnoreHostKey()\
    \ {\n\t_ = &ssh.ClientConfig{\n\t\tUser:            \"username\",\n\t\tAuth: \
    \           []ssh.AuthMethod{nil},\n\t\tHostKeyCallback: ssh.InsecureIgnoreHostKey(),\n\
    \t}\n}\n\nfunc insecureHostKeyCallback() {\n\t_ = &ssh.ClientConfig{\n\t\tUser:\
    \ \"username\",\n\t\tAuth: []ssh.AuthMethod{nil},\n\t\tHostKeyCallback: ssh.HostKeyCallback(\n\
    \t\t\tfunc(hostname string, remote net.Addr, key ssh.PublicKey) error {\n\t\t\t\
    \treturn nil\n\t\t\t}),\n\t}\n}\n\n```\nThe next example shows a secure implementation\
    \ using the `FixedHostKey` that implements an allow-list.\n\n\n```go\npackage\
    \ main\n\nimport (\n\t\"golang.org/x/crypto/ssh\"\n\t\"io/ioutil\"\n)\n\nfunc\
    \ main() {}\n\nfunc secureHostKeyCallback() {\n\tpublicKeyBytes, _ := ioutil.ReadFile(\"\
    allowed_hostkey.pub\")\n\tpublicKey, _ := ssh.ParsePublicKey(publicKeyBytes)\n\
    \n\t_ = &ssh.ClientConfig{\n\t\tUser:            \"username\",\n\t\tAuth:    \
    \        []ssh.AuthMethod{nil},\n\t\tHostKeyCallback: ssh.FixedHostKey(publicKey),\n\
    \t}\n}\n\n```\n\n## References\n* Go Dev: [package ssh](https://pkg.go.dev/golang.org/x/crypto/ssh?tab=doc).\n\
    * Common Weakness Enumeration: [CWE-322](https://cwe.mitre.org/data/definitions/322.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-326/InsufficientKeySize.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-326/InsufficientKeySize.bqrs
  metadata:
    name: Use of a weak cryptographic key
    description: Using a weak cryptographic key can allow an attacker to compromise
      security.
    kind: path-problem
    problem.severity: error
    security-severity: 7.5
    precision: high
    id: go/weak-crypto-key
    tags: |-
      security
             external/cwe/cwe-326
  queryHelp: "# Use of a weak cryptographic key\nIncorrect uses of encryption algorithms\
    \ may result in sensitive data exposure, key leakage, broken authentication, insecure\
    \ session, and spoofing attacks.\n\n\n## Recommendation\nEnsure that you use a\
    \ strong key with a recommended bit size. For RSA encryption the minimum size\
    \ is 2048 bits.\n\n\n## Example\nThe following code uses RSA encryption with insufficient\
    \ key size.\n\n\n```go\npackage main\n\nimport (\n\t\"crypto/rand\"\n\t\"crypto/rsa\"\
    \n\t\"fmt\"\n)\n\nfunc main() {\n\t//Generate Private Key\n\tpvk, err := rsa.GenerateKey(rand.Reader,\
    \ 1024)\n\tif err != nil {\n\t\tfmt.Println(err)\n\t}\n\tfmt.Println(pvk)\n}\n\
    \n```\nIn the example below, the key size is set to 2048 bits.\n\n\n```go\npackage\
    \ main\n\nimport (\n\t\"crypto/rand\"\n\t\"crypto/rsa\"\n\t\"fmt\"\n)\n\nfunc\
    \ main() {\n\t//Generate Private Key\n\tpvk, err := rsa.GenerateKey(rand.Reader,\
    \ 2048)\n\tif err != nil {\n\t\tfmt.Println(err)\n\t}\n\tfmt.Println(pvk)\n}\n\
    \n```\n\n## References\n* OWASP: [Cryptographic Storage Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html).\n\
    * Wikipedia: [Cryptographically Strong Algorithms](https://en.wikipedia.org/wiki/Strong_cryptography#Cryptographically_strong_algorithms).\n\
    * Wikipedia: [Strong Cryptography Examples](https://en.wikipedia.org/wiki/Strong_cryptography#Examples).\n\
    * NIST, FIPS 140 Annex a: [ Approved Security Functions](http://csrc.nist.gov/publications/fips/fips140-2/fips1402annexa.pdf).\n\
    * NIST, SP 800-131A: [ Transitions: Recommendation for Transitioning the Use of\
    \ Cryptographic Algorithms and Key Lengths](http://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-131Ar1.pdf).\n\
    * Common Weakness Enumeration: [CWE-326](https://cwe.mitre.org/data/definitions/326.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-327/BrokenCryptoAlgorithm.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-327/BrokenCryptoAlgorithm.bqrs
  metadata:
    name: Use of a broken or weak cryptographic algorithm
    description: Using broken or weak cryptographic algorithms can compromise security.
    kind: problem
    problem.severity: warning
    security-severity: 7.5
    precision: high
    id: go/weak-cryptographic-algorithm
    tags: |-
      security
             external/cwe/cwe-327
             external/cwe/cwe-328
  queryHelp: "# Use of a broken or weak cryptographic algorithm\nUsing weak cryptographic\
    \ algorithms can leave data vulnerable to being decrypted or forged by an attacker.\n\
    \nMany cryptographic algorithms provided by cryptography libraries are known to\
    \ be weak. Using such an algorithm means that encrypted or hashed data is less\
    \ secure than it appears to be.\n\n\n## Recommendation\nEnsure that you use a\
    \ strong, modern cryptographic algorithm. Use at least AES-128 or RSA-2048 for\
    \ encryption, and SHA-2 or SHA-3 for secure hashing.\n\n\n## Example\nThe following\
    \ code uses the different packages to encrypt some secret data. The first example\
    \ uses DES, which is an older algorithm that is now considered weak. The following\
    \ example uses AES, which is a stronger, more modern algorithm.\n\n\n```go\npackage\
    \ main\n\nimport (\n\t\"crypto/aes\"\n\t\"crypto/des\"\n)\n\nfunc EncryptMessageWeak(key\
    \ []byte, message []byte) (dst []byte) {\n\t// BAD, DES is a weak crypto algorithm\n\
    \tblock, _ := des.NewCipher(key)\n\tblock.Encrypt(dst, message)\n\treturn\n}\n\
    \nfunc EncryptMessageStrong(key []byte, message []byte) (dst []byte) {\n\t// GOOD,\
    \ AES is a strong crypto algorithm\n\tblock, _ := aes.NewCipher(key)\n\tblock.Encrypt(dst,\
    \ message)\n\treturn\n}\n\n```\n\n## References\n* OWASP: [Cryptographic Storage\
    \ Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html).\n\
    * Wikipedia: [Cryptographically Strong Algorithms](https://en.wikipedia.org/wiki/Strong_cryptography#Cryptographically_strong_algorithms).\n\
    * Wikipedia: [Strong Cryptography Examples](https://en.wikipedia.org/wiki/Strong_cryptography#Examples).\n\
    * NIST, FIPS 140 Annex a: [ Approved Security Functions](http://csrc.nist.gov/publications/fips/fips140-2/fips1402annexa.pdf).\n\
    * NIST, SP 800-131A: [ Transitions: Recommendation for Transitioning the Use of\
    \ Cryptographic Algorithms and Key Lengths](http://nvlpubs.nist.gov/nistpubs/SpecialPublications/NIST.SP.800-131Ar1.pdf).\n\
    * Common Weakness Enumeration: [CWE-327](https://cwe.mitre.org/data/definitions/327.html).\n\
    * Common Weakness Enumeration: [CWE-328](https://cwe.mitre.org/data/definitions/328.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-327/InsecureTLS.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-327/InsecureTLS.bqrs
  metadata:
    name: Insecure TLS configuration
    description: |-
      If an application supports insecure TLS versions or ciphers, it may be vulnerable to
                    machine-in-the-middle and other attacks.
    kind: path-problem
    problem.severity: warning
    security-severity: 7.5
    precision: very-high
    id: go/insecure-tls
    tags: |-
      security
             external/cwe/cwe-327
  queryHelp: "# Insecure TLS configuration\nThe TLS (Transport Layer Security) protocol\
    \ secures communications over the Internet. The protocol allows client/server\
    \ applications to communicate in a way that is designed to prevent eavesdropping,\
    \ tampering, or message forgery.\n\nThe current latest version is 1.3 (with the\
    \ 1.2 version still being considered secure). Older versions are not deemed to\
    \ be secure anymore because of various security vulnerabilities, and tht makes\
    \ them unfit for use in securing your applications.\n\nUnfortunately, many applications\
    \ and websites still support deprecated SSL/TLS versions and cipher suites.\n\n\
    \n## Recommendation\nOnly use secure TLS versions (1.3 and 1.2) and avoid using\
    \ insecure cipher suites (you can see a list here: https://golang.org/src/crypto/tls/cipher_suites.go\\\
    #L81)\n\n\n## Example\nThe following example shows a few ways how an insecure\
    \ TLS configuration can be created:\n\n\n```go\npackage main\n\nimport (\n\t\"\
    crypto/tls\"\n)\n\nfunc main() {}\n\nfunc insecureMinMaxTlsVersion() {\n\t{\n\t\
    \tconfig := &tls.Config{}\n\t\tconfig.MinVersion = 0 // BAD: Setting the MinVersion\
    \ to 0 equals to choosing the lowest supported version (i.e. SSL3.0)\n\t}\n\t\
    {\n\t\tconfig := &tls.Config{}\n\t\tconfig.MinVersion = tls.VersionSSL30 // BAD:\
    \ SSL 3.0 is a non-secure version of the protocol; it's not safe to use it as\
    \ MinVersion.\n\t}\n\t{\n\t\tconfig := &tls.Config{}\n\t\tconfig.MaxVersion =\
    \ tls.VersionSSL30 // BAD: SSL 3.0 is a non-secure version of the protocol; it's\
    \ not safe to use it as MaxVersion.\n\t}\n}\n\nfunc insecureCipherSuites() {\n\
    \tconfig := &tls.Config{\n\t\tCipherSuites: []uint16{\n\t\t\ttls.TLS_RSA_WITH_RC4_128_SHA,\
    \ // BAD: TLS_RSA_WITH_RC4_128_SHA is one of the non-secure cipher suites; it's\
    \ not safe to be used.\n\t\t},\n\t}\n\t_ = config\n}\n\n```\nThe following example\
    \ shows how to create a safer TLS configuration:\n\n\n```go\npackage main\n\n\
    import \"crypto/tls\"\n\nfunc saferTLSConfig() {\n\tconfig := &tls.Config{}\n\t\
    config.MinVersion = tls.VersionTLS12\n\tconfig.MaxVersion = tls.VersionTLS13\n\
    \t// OR\n\tconfig.MaxVersion = 0 // GOOD: Setting MaxVersion to 0 means that the\
    \ highest version available in the package will be used.\n}\n\n```\n\n## References\n\
    * Wikipedia: [Transport Layer Security](https://en.wikipedia.org/wiki/Transport_Layer_Security)\n\
    * Mozilla: [Security/Server Side TLS](https://wiki.mozilla.org/Security/Server_Side_TLS)\n\
    * OWASP: [Transport Layer Protection Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Transport_Layer_Protection_Cheat_Sheet.html)\n\
    * Common Weakness Enumeration: [CWE-327](https://cwe.mitre.org/data/definitions/327.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-327/WeakSensitiveDataHashing.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-327/WeakSensitiveDataHashing.bqrs
  metadata:
    name: Use of a broken or weak cryptographic hashing algorithm on sensitive data
    description: Using broken or weak cryptographic hashing algorithms can compromise
      security.
    kind: path-problem
    problem.severity: warning
    security-severity: 7.5
    precision: high
    id: go/weak-sensitive-data-hashing
    tags: |-
      security
             external/cwe/cwe-327
             external/cwe/cwe-328
             external/cwe/cwe-916
  queryHelp: "# Use of a broken or weak cryptographic hashing algorithm on sensitive\
    \ data\nUsing a broken or weak cryptographic hash function can leave data vulnerable,\
    \ and should not be used in security related code.\n\nA strong cryptographic hash\
    \ function should be resistant to:\n\n* pre-image attacks: if you know a hash\
    \ value `h(x)`, you should not be able to easily find the input `x`.\n* collision\
    \ attacks: if you know a hash value `h(x)`, you should not be able to easily find\
    \ a different input `y` with the same hash value `h(x) = h(y)`.\nIn cases with\
    \ a limited input space, such as for passwords, the hash function also needs to\
    \ be computationally expensive to be resistant to brute-force attacks. Passwords\
    \ should also have an unique salt applied before hashing, but that is not considered\
    \ by this query.\n\nAs an example, both MD5 and SHA-1 are known to be vulnerable\
    \ to collision attacks.\n\nSince it's OK to use a weak cryptographic hash function\
    \ in a non-security context, this query only alerts when these are used to hash\
    \ sensitive data (such as passwords, certificates, usernames).\n\nUse of broken\
    \ or weak cryptographic algorithms that are not hashing algorithms, is handled\
    \ by the `rb/weak-cryptographic-algorithm` query.\n\n\n## Recommendation\nEnsure\
    \ that you use a strong, modern cryptographic hash function:\n\n* such as Argon2,\
    \ scrypt, bcrypt, or PBKDF2 for passwords and other data with limited input space.\n\
    * such as SHA-2, or SHA-3 in other cases.\n\n## Example\nThe following example\
    \ shows two functions for checking whether the hash of a secret matches a known\
    \ value. The first function uses SHA-1 that is known to be vulnerable to collision\
    \ attacks. The second function uses SHA-256 that is a strong cryptographic hashing\
    \ function.\n\n\n```go\npackage main\n\nimport (\n\t\"crypto/sha1\"\n\t\"crypto/sha256\"\
    \n\t\"slices\"\n)\n\nfunc SecretMatchesKnownHashBad(secret []byte, known_hash\
    \ []byte) bool {\n\t// BAD, SHA1 is a weak crypto algorithm and secret is sensitive\
    \ data\n\th := sha1.New()\n\treturn slices.Equal(h.Sum(secret), known_hash)\n\
    }\n\nfunc SecretMatchesKnownHashGood(secret []byte, known_hash []byte) bool {\n\
    \t// GOOD, SHA256 is a strong hashing algorithm\n\th := sha256.New()\n\treturn\
    \ slices.Equal(h.Sum(secret), known_hash)\n}\n\n```\n\n## Example\nThe following\
    \ example shows two functions for hashing passwords. The first example uses SHA-256\
    \ to hash passwords. Although SHA-256 is a strong cryptographic hash function,\
    \ it is not suitable for password hashing since it is not computationally expensive.\
    \ The second function uses PBKDF2, which is a strong password hashing algorithm.\n\
    \n\n```go\npackage main\n\nimport (\n\t\"crypto/pbkdf2\"\n\t\"crypto/rand\"\n\t\
    \"crypto/sha256\"\n\t\"crypto/sha512\"\n)\n\nfunc GetPasswordHashBad(password\
    \ string) [32]byte {\n\t// BAD, SHA256 is a strong hashing algorithm but it is\
    \ not computationally expensive\n\treturn sha256.Sum256([]byte(password))\n}\n\
    \nfunc GetPasswordHashGood(password string) []byte {\n\t// GOOD, PBKDF2 is a strong\
    \ hashing algorithm and it is computationally expensive\n\tsalt := make([]byte,\
    \ 16)\n\trand.Read(salt)\n\tkey, _ := pbkdf2.Key(sha512.New, password, salt, 4096,\
    \ 32)\n\treturn key\n}\n\n```\n\n## References\n* OWASP: [Password Storage Cheat\
    \ Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Password_Storage_Cheat_Sheet.html)\n\
    * Common Weakness Enumeration: [CWE-327](https://cwe.mitre.org/data/definitions/327.html).\n\
    * Common Weakness Enumeration: [CWE-328](https://cwe.mitre.org/data/definitions/328.html).\n\
    * Common Weakness Enumeration: [CWE-916](https://cwe.mitre.org/data/definitions/916.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-338/InsecureRandomness.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-338/InsecureRandomness.bqrs
  metadata:
    name: Use of insufficient randomness as the key of a cryptographic algorithm
    description: Using insufficient randomness as the key of a cryptographic algorithm
      can allow an attacker to compromise security.
    kind: path-problem
    problem.severity: error
    security-severity: 7.8
    precision: high
    id: go/insecure-randomness
    tags: |-
      security
             external/cwe/cwe-338
  queryHelp: "# Use of insufficient randomness as the key of a cryptographic algorithm\n\
    Using a cryptographically weak pseudo-random number generator to generate a security-sensitive\
    \ value, such as a password, makes it easier for an attacker to predict the value.\n\
    \nPseudo-random number generators generate a sequence of numbers that only approximates\
    \ the properties of random numbers. The sequence is not truly random because it\
    \ is completely determined by a relatively small set of initial values, the seed.\
    \ If the random number generator is cryptographically weak, then this sequence\
    \ may be easily predictable through outside observations.\n\n\n## Recommendation\n\
    Use a cryptographically secure pseudo-random number generator if the output is\
    \ to be used in a security sensitive context. As a rule of thumb, a value should\
    \ be considered \"security sensitive\" if predicting it would allow the attacker\
    \ to perform an action that they would otherwise be unable to perform. For example,\
    \ if an attacker could predict the random password generated for a new user, they\
    \ would be able to log in as that new user.\n\nFor Go, `crypto/rand` provides\
    \ a cryptographically secure pseudo-random number generator. `math/rand` is not\
    \ cryptographically secure, and should be avoided in security contexts. For contexts\
    \ which are not security sensitive, `math/rand` may be preferable as it has a\
    \ more convenient interface, and is likely to be faster.\n\n\n## Example\nThe\
    \ example below uses the `math/rand` package instead of `crypto/rand` to generate\
    \ a password:\n\n\n```go\npackage main\n\nimport (\n\t\"math/rand\"\n)\n\nvar\
    \ charset = []rune(\"abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789\"\
    )\n\nfunc generatePassword() string {\n\ts := make([]rune, 20)\n\tfor i := range\
    \ s {\n\t\ts[i] = charset[rand.Intn(len(charset))]\n\t}\n\treturn string(s)\n\
    }\n\n```\nInstead, use `crypto/rand`:\n\n\n```go\npackage main\n\nimport (\n\t\
    \"crypto/rand\"\n\t\"math/big\"\n)\n\nfunc generatePasswordGood() string {\n\t\
    s := make([]rune, 20)\n\tfor i := range s {\n\t\tidx, err := rand.Int(rand.Reader,\
    \ big.NewInt(int64(len(charset))))\n\t\tif err != nil {\n\t\t\t// handle err\n\
    \t\t}\n\t\ts[i] = charset[idx.Int64()]\n\t}\n\treturn string(s)\n}\n\n```\n\n\
    ## References\n* Wikipedia. [Pseudo-random number generator](http://en.wikipedia.org/wiki/Pseudorandom_number_generator).\n\
    * OWASP: [Insecure Randomness](https://owasp.org/www-community/vulnerabilities/Insecure_Randomness).\n\
    * OWASP: [Secure Random Number Generation](https://cheatsheetseries.owasp.org/cheatsheets/Cryptographic_Storage_Cheat_Sheet.html#secure-random-number-generation).\n\
    * Common Weakness Enumeration: [CWE-338](https://cwe.mitre.org/data/definitions/338.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-347/MissingJwtSignatureCheck.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-347/MissingJwtSignatureCheck.bqrs
  metadata:
    name: Missing JWT signature check
    description: Failing to check the JSON Web Token (JWT) signature may allow an
      attacker to forge their own tokens.
    kind: path-problem
    problem.severity: error
    security-severity: 7.8
    precision: high
    id: go/missing-jwt-signature-check
    tags: |-
      security
             external/cwe/cwe-347
  queryHelp: "# Missing JWT signature check\nApplications decoding a JSON Web Token\
    \ (JWT) may be vulnerable when the signature is not correctly verified.\n\n\n\
    ## Recommendation\nAlways verify the signature by using the appropriate methods\
    \ provided by the JWT library, or use a library that verifies it by default.\n\
    \n\n## Example\nThe following (bad) example shows a case where a JWT is parsed\
    \ without verifying the signature.\n\n\n```go\npackage main\n\nimport (\n\t\"\
    fmt\"\n\t\"log\"\n\n\t\"github.com/golang-jwt/jwt/v5\"\n)\n\ntype User struct{}\n\
    \nfunc decodeJwt(token string) {\n\t// BAD: JWT is only decoded without signature\
    \ verification\n\tfmt.Println(\"only decoding JWT\")\n\tDecodedToken, _, err :=\
    \ jwt.NewParser().ParseUnverified(token, &User{})\n\tif claims, ok := DecodedToken.Claims.(*User);\
    \ ok {\n\t\tfmt.Printf(\"DecodedToken:%v\\n\", claims)\n\t} else {\n\t\tlog.Fatal(\"\
    error\", err)\n\t}\n}\n\n```\nThe following (good) example uses the appropriate\
    \ function for parsing a JWT and verifying its signature.\n\n\n```go\npackage\
    \ main\n\nimport (\n\t\"fmt\"\n\t\"log\"\n\n\t\"github.com/golang-jwt/jwt/v5\"\
    \n)\n\ntype User struct{}\n\nfunc parseJwt(token string, jwtKey []byte) {\n\t\
    // GOOD: JWT is parsed with signature verification using jwtKey\n\tDecodedToken,\
    \ err := jwt.ParseWithClaims(token, &User{}, func(token *jwt.Token) (interface{},\
    \ error) {\n\t\treturn jwtKey, nil\n\t})\n\tif claims, ok := DecodedToken.Claims.(*User);\
    \ ok && DecodedToken.Valid && !err {\n\t\tfmt.Printf(\"DecodedToken:%v\\n\", claims)\n\
    \t} else {\n\t\tlog.Fatal(err)\n\t}\n}\n\n```\n\n## References\n* JWT IO: [Introduction\
    \ to JSON Web Tokens](https://jwt.io/introduction).\n* jwt-go: [Documentation](https://pkg.go.dev/github.com/golang-jwt/jwt/v5).\n\
    * Go JOSE: [Documentation](https://pkg.go.dev/github.com/go-jose/go-jose/v3).\n\
    * Common Weakness Enumeration: [CWE-347](https://cwe.mitre.org/data/definitions/347.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-352/ConstantOauth2State.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-352/ConstantOauth2State.bqrs
  metadata:
    name: Use of constant `state` value in OAuth 2.0 URL
    description: |-
      Using a constant value for the `state` in the OAuth 2.0 URL makes the application
                    susceptible to CSRF attacks.
    kind: path-problem
    problem.severity: error
    security-severity: 8.8
    precision: high
    id: go/constant-oauth2-state
    tags: |-
      security
             external/cwe/cwe-352
  queryHelp: "# Use of constant `state` value in OAuth 2.0 URL\nOAuth 2.0 clients\
    \ must implement CSRF protection for the redirection URI, which is typically accomplished\
    \ by including a \"state\" value that binds the request to the user's authenticated\
    \ state. The Go OAuth 2.0 library allows you to specify a \"state\" value which\
    \ is then included in the auth code URL. That state is then provided back by the\
    \ remote authentication server in the redirect callback, from where it must be\
    \ validated. Failure to do so makes the client susceptible to an CSRF attack.\n\
    \n\n## Recommendation\nAlways include a unique, non-guessable `state` value (provided\
    \ to the call to `AuthCodeURL` function) that is also bound to the user's authenticated\
    \ state with each authentication request, and then validated in the redirect callback.\n\
    \n\n## Example\nThe first example shows you the use of a constant state (bad).\n\
    \n\n```go\npackage main\n\nimport (\n\t\"golang.org/x/oauth2\"\n)\n\nfunc main()\
    \ {}\n\nvar stateStringVar = \"state\"\n\nfunc badWithStringLiteralState() {\n\
    \tconf := &oauth2.Config{\n\t\tClientID:     \"YOUR_CLIENT_ID\",\n\t\tClientSecret:\
    \ \"YOUR_CLIENT_SECRET\",\n\t\tScopes:       []string{\"SCOPE1\", \"SCOPE2\"},\n\
    \t\tEndpoint: oauth2.Endpoint{\n\t\t\tAuthURL:  \"https://provider.com/o/oauth2/auth\"\
    ,\n\t\t\tTokenURL: \"https://provider.com/o/oauth2/token\",\n\t\t},\n\t}\n\n\t\
    url := conf.AuthCodeURL(stateStringVar)\n\t// ...\n}\n\n```\nThe second example\
    \ shows a better implementation idea.\n\n\n```go\npackage main\n\nimport (\n\t\
    \"crypto/rand\"\n\t\"encoding/base64\"\n\t\"net/http\"\n\n\t\"golang.org/x/oauth2\"\
    \n)\n\nfunc betterWithVariableStateReturned(w http.ResponseWriter) {\n\tconf :=\
    \ &oauth2.Config{\n\t\tClientID:     \"YOUR_CLIENT_ID\",\n\t\tClientSecret: \"\
    YOUR_CLIENT_SECRET\",\n\t\tScopes:       []string{\"SCOPE1\", \"SCOPE2\"},\n\t\
    \tEndpoint: oauth2.Endpoint{\n\t\t\tAuthURL:  \"https://provider.com/o/oauth2/auth\"\
    ,\n\t\t\tTokenURL: \"https://provider.com/o/oauth2/token\",\n\t\t},\n\t}\n\n\t\
    state := generateStateOauthCookie(w)\n\turl := conf.AuthCodeURL(state)\n\t_ =\
    \ url\n\t// ...\n}\nfunc generateStateOauthCookie(w http.ResponseWriter) string\
    \ {\n\tb := make([]byte, 128)\n\trand.Read(b)\n\t// TODO: save the state string\
    \ to cookies or HTML storage,\n\t// and bind it to the authenticated status of\
    \ the user.\n\tstate := base64.URLEncoding.EncodeToString(b)\n\n\treturn state\n\
    }\n\n```\n\n## References\n* IETF: [The OAuth 2.0 Authorization Framework](https://tools.ietf.org/html/rfc6749#section-10.12)\n\
    * IETF: [OAuth 2.0 Security Best Current Practice](https://tools.ietf.org/html/draft-ietf-oauth-security-topics-15#section-2.1)\n\
    * Common Weakness Enumeration: [CWE-352](https://cwe.mitre.org/data/definitions/352.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-601/BadRedirectCheck.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-601/BadRedirectCheck.bqrs
  metadata:
    name: Bad redirect check
    description: |-
      A redirect check that checks for a leading slash but not two
                    leading slashes or a leading slash followed by a backslash is
                    incomplete.
    kind: path-problem
    problem.severity: error
    security-severity: 6.1
    id: go/bad-redirect-check
    tags: |-
      security
             external/cwe/cwe-601
    precision: high
  queryHelp: "# Bad redirect check\nRedirect URLs should be checked to ensure that\
    \ user input cannot cause a site to redirect to arbitrary domains. This is often\
    \ done with a check that the redirect URL begins with a slash, which most of the\
    \ time is an absolute redirect on the same host. However, browsers interpret URLs\
    \ beginning with `//` or `/\\` as absolute URLs. For example, a redirect to `//example.com`\
    \ will redirect to `https://example.com`. Thus, redirect checks must also check\
    \ the second character of redirect URLs.\n\n\n## Recommendation\nAlso disallow\
    \ redirect URLs starting with `//` or `/\\`.\n\n\n## Example\nThe following function\
    \ validates a (presumably untrusted) redirect URL `redir`. If it does not begin\
    \ with `/`, the harmless placeholder redirect URL `/` is returned to prevent an\
    \ open redirect; otherwise `redir` itself is returned.\n\n\n```go\npackage main\n\
    \nfunc sanitizeUrl(redir string) string {\n\tif len(redir) > 0 && redir[0] ==\
    \ '/' {\n\t\treturn redir\n\t}\n\treturn \"/\"\n}\n\n```\nWhile this check provides\
    \ partial protection, it should be extended to cover `//` and `/\\` as well:\n\
    \n\n```go\npackage main\n\nfunc sanitizeUrl1(redir string) string {\n\tif len(redir)\
    \ > 1 && redir[0] == '/' && redir[1] != '/' && redir[1] != '\\\\' {\n\t\treturn\
    \ redir\n\t}\n\treturn \"/\"\n}\n\n```\n\n## References\n* OWASP: [ XSS Unvalidated\
    \ Redirects and Forwards Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html#validating-urls).\n\
    * Common Weakness Enumeration: [CWE-601](https://cwe.mitre.org/data/definitions/601.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-601/OpenUrlRedirect.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-601/OpenUrlRedirect.bqrs
  metadata:
    name: Open URL redirect
    description: |-
      Open URL redirection based on unvalidated user input
                    may cause redirection to malicious web sites.
    kind: path-problem
    problem.severity: warning
    security-severity: 6.1
    id: go/unvalidated-url-redirection
    tags: |-
      security
             external/cwe/cwe-601
    precision: high
  queryHelp: "# Open URL redirect\nDirectly incorporating user input into a URL redirect\
    \ request without validating the input can facilitate phishing attacks. In these\
    \ attacks, unsuspecting users can be redirected to a malicious site that looks\
    \ very similar to the real site they intend to visit, but is controlled by the\
    \ attacker.\n\n\n## Recommendation\nTo guard against untrusted URL redirection,\
    \ it is advisable to avoid putting user input directly into a redirect URL. Instead,\
    \ maintain a list of authorized redirects on the server; then choose from that\
    \ list based on the user input provided.\n\nIf this is not possible, then the\
    \ user input should be validated in some other way, for example, by verifying\
    \ that the target URL is local and does not redirect to a different host.\n\n\n\
    ## Example\nThe following example shows an HTTP request parameter being used directly\
    \ in a URL redirect without validating the input, which facilitates phishing attacks:\n\
    \n\n```go\npackage main\n\nimport (\n\t\"net/http\"\n)\n\nfunc serve() {\n\thttp.HandleFunc(\"\
    /redir\", func(w http.ResponseWriter, r *http.Request) {\n\t\tr.ParseForm()\n\t\
    \thttp.Redirect(w, r, r.Form.Get(\"target\"), 302)\n\t})\n}\n\n```\nOne way to\
    \ remedy the problem is to parse the target URL and check that its hostname is\
    \ empty, which means that it is a relative URL:\n\n\n```go\npackage main\n\nimport\
    \ (\n\t\"net/http\"\n\t\"net/url\"\n\t\"strings\"\n)\n\nfunc serve1() {\n\thttp.HandleFunc(\"\
    /redir\", func(w http.ResponseWriter, r *http.Request) {\n\t\tr.ParseForm()\n\t\
    \ttargetUrl := r.Form.Get(\"target\")\n\t\t// replace all backslashes with forward\
    \ slashes before parsing the URL\n\t\ttargetUrl = strings.ReplaceAll(targetUrl,\
    \ \"\\\\\", \"/\")\n\n\t\ttarget, err := url.Parse(targetUrl)\n\t\tif err != nil\
    \ {\n\t\t\t// ...\n\t\t}\n\n\t\tif target.Hostname() == \"\" {\n\t\t\t// GOOD:\
    \ check that it is a local redirect\n\t\t\thttp.Redirect(w, r, target.String(),\
    \ 302)\n\t\t} else {\n\t\t\tw.WriteHeader(400)\n\t\t}\n\t})\n}\n\n```\nNote that\
    \ some browsers treat backslashes in URLs as forward slashes. To account for this,\
    \ we replace all backslashes with forward slashes before parsing the URL and checking\
    \ its hostname.\n\n\n## References\n* OWASP: [ XSS Unvalidated Redirects and Forwards\
    \ Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Unvalidated_Redirects_and_Forwards_Cheat_Sheet.html).\n\
    * Common Weakness Enumeration: [CWE-601](https://cwe.mitre.org/data/definitions/601.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-614/CookieWithoutSecure.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-614/CookieWithoutSecure.bqrs
  metadata:
    name: Cookie 'Secure' attribute is not set to true
    description: |-
      Cookies without the `Secure` flag may be sent in cleartext.
                    This makes them vulnerable to be intercepted by an attacker.
    kind: problem
    problem.severity: warning
    precision: high
    security-severity: 4.0
    id: go/cookie-secure-not-set
    tags: |-
      security
             external/cwe/cwe-614
  queryHelp: "# Cookie 'Secure' attribute is not set to true\nCookies without the\
    \ `Secure` flag set may be transmitted using HTTP instead of HTTPS. This leaves\
    \ them vulnerable to being read by a third party attacker. If a sensitive cookie\
    \ such as a session key is intercepted this way, it would allow the attacker to\
    \ perform actions on a user's behalf.\n\n\n## Recommendation\nSet the `Secure`\
    \ flag to `true` to ensure cookies are only transmitted over secure HTTPS connections.\n\
    \n\n## Example\nIn the following example, in the case marked BAD, the `Secure`\
    \ flag is set to `false` by default. In the case marked GOOD, the `Secure` flag\
    \ is set to `true`.\n\n\n```go\npackage main\n\nimport (\n\t\"net/http\"\n)\n\n\
    func handlerBad(w http.ResponseWriter, r *http.Request) {\n\tc := http.Cookie{\n\
    \t\tName:  \"session\",\n\t\tValue: \"secret\",\n\t}\n\thttp.SetCookie(w, &c)\
    \ // BAD: The Secure flag is set to false by default.\n}\n\nfunc handlerGood(w\
    \ http.ResponseWriter, r *http.Request) {\n\tc := http.Cookie{\n\t\tName:   \"\
    session\",\n\t\tValue:  \"secret\",\n\t\tSecure: true,\n\t}\n\thttp.SetCookie(w,\
    \ &c) // GOOD: The Secure flag is set to true.\n}\n\n```\n\n## References\n* MDN:\
    \ [Set-Cookie](https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Set-Cookie)\
    \ Header.\n* Detectify: [Cookie lack Secure flag](https://support.detectify.com/support/solutions/articles/48001048982-cookie-lack-secure-flag).\n\
    * PortSwigger: [TLS cookie without secure flag set](https://portswigger.net/kb/issues/00500200_tls-cookie-without-secure-flag-set).\n\
    * Common Weakness Enumeration: [CWE-614](https://cwe.mitre.org/data/definitions/614.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-640/EmailInjection.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-640/EmailInjection.bqrs
  metadata:
    name: Email content injection
    description: |-
      Incorporating untrusted input directly into an email message can enable
                    content spoofing, which in turn may lead to information leaks and other
                    security issues.
    id: go/email-injection
    kind: path-problem
    problem.severity: error
    security-severity: 9.8
    tags: |-
      security
             external/cwe/cwe-640
    precision: high
  queryHelp: "# Email content injection\nUsing untrusted input to construct an email\
    \ can cause multiple security vulnerabilities. For instance, inclusion of an untrusted\
    \ input in an email body may allow an attacker to conduct cross-site scripting\
    \ (XSS) attacks, while inclusion of an HTTP header may allow a full account compromise\
    \ as shown in the example below.\n\n\n## Recommendation\nAny data which is passed\
    \ to an email subject or body must be sanitized before use.\n\n\n## Example\n\
    In the following example snippet, the `host` field is user controlled.\n\nA malicious\
    \ user can send an HTTP request to the targeted website, but with a Host header\
    \ that refers to their own website. This means the emails will be sent out to\
    \ potential victims, originating from a server they trust, but with links leading\
    \ to a malicious website.\n\nIf the email contains a password reset link, and\
    \ the victim clicks the link, the secret reset token will be leaked to the attacker.\
    \ Using the leaked token, the attacker can then construct the real reset link\
    \ and use it to change the victim's password.\n\n\n```go\npackage main\n\nimport\
    \ (\n\t\"net/http\"\n\t\"net/smtp\"\n)\n\nfunc mail(w http.ResponseWriter, r *http.Request)\
    \ {\n\thost := r.Header.Get(\"Host\")\n\ttoken := backend.getUserSecretResetToken(email)\n\
    \tbody := \"Click to reset password: \" + host + \"/\" + token\n\tsmtp.SendMail(\"\
    test.test\", nil, \"from@from.com\", nil, []byte(body))\n}\n\n```\nOne way to\
    \ prevent this is to load the host name from a trusted configuration file instead.\n\
    \n\n```go\npackage main\n\nimport (\n\t\"net/http\"\n\t\"net/smtp\"\n)\n\nfunc\
    \ mailGood(w http.ResponseWriter, r *http.Request) {\n\thost := config.Get(\"\
    Host\")\n\ttoken := backend.getUserSecretResetToken(email)\n\tbody := \"Click\
    \ to reset password: \" + host + \"/\" + token\n\tsmtp.SendMail(\"test.test\"\
    , nil, \"from@from.com\", nil, []byte(body))\n}\n\n```\n\n## References\n* OWASP:\
    \ [Content Spoofing](https://owasp.org/www-community/attacks/Content_Spoofing)\
    \ .\n* Common Weakness Enumeration: [CWE-640](https://cwe.mitre.org/data/definitions/640.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-643/XPathInjection.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-643/XPathInjection.bqrs
  metadata:
    name: XPath injection
    description: |-
      Building an XPath expression from user-controlled sources is vulnerable to insertion of
                    malicious code by the user.
    kind: path-problem
    problem.severity: error
    security-severity: 9.8
    precision: high
    id: go/xml/xpath-injection
    tags: |-
      security
             external/cwe/cwe-643
  queryHelp: "# XPath injection\nIf an XPath expression is built using string concatenation,\
    \ and the components of the concatenation include user input, a user is likely\
    \ to be able to create a malicious XPath expression.\n\n\n## Recommendation\n\
    If user input must be included in an XPath expression, pre-compile the query and\
    \ use variable references to include the user input.\n\nFor example, when using\
    \ the `github.com/ChrisTrenkamp/goxpath` API, you can do this by creating a function\
    \ that takes an `*goxpath.Opts` structure. In this structure you can then set\
    \ the values of the variable references. This function can then be specified when\
    \ calling `Exec()`, `Exec{Bool|Num|Node}()`, `ParseExec()`, or `MustExec()`.\n\
    \n\n## Example\nIn the first example, the code accepts a username specified by\
    \ the user, and uses this unvalidated and unsanitized value in an XPath expression.\
    \ This is vulnerable to the user providing special characters or string sequences\
    \ that change the meaning of the XPath expression to search for different values.\n\
    \nIn the second example, the XPath expression is a hard-coded string that specifies\
    \ some variables, which are safely resolved at runtime using the `goxpath.Opts`\
    \ structure.\n\n\n```go\npackage main\n\nimport (\n\t\"fmt\"\n\t\"net/http\"\n\
    \n\t\"github.com/ChrisTrenkamp/goxpath\"\n\t\"github.com/ChrisTrenkamp/goxpath/tree\"\
    \n)\n\nfunc main() {}\n\nfunc processRequest(r *http.Request, doc tree.Node) {\n\
    \tr.ParseForm()\n\tusername := r.Form.Get(\"username\")\n\n\t// BAD: User input\
    \ used directly in an XPath expression\n\txPath := goxpath.MustParse(\"//users/user[login/text()='\"\
    \ + username + \"']/home_dir/text()\")\n\tunsafeRes, _ := xPath.ExecBool(doc)\n\
    \tfmt.Println(unsafeRes)\n\n\t// GOOD: Value of parameters is defined here instead\
    \ of directly in the query\n\topt := func(o *goxpath.Opts) {\n\t\to.Vars[\"username\"\
    ] = tree.String(username)\n\t}\n\t// GOOD: Uses parameters to avoid including\
    \ user input directly in XPath expression\n\txPath = goxpath.MustParse(\"//users/user[login/text()=$username]/home_dir/text()\"\
    )\n\tsafeRes, _ := xPath.ExecBool(doc, opt)\n\tfmt.Println(safeRes)\n}\n\n```\n\
    \n## References\n* OWASP: [Testing for XPath Injection](https://owasp.org/www-project-web-security-testing-guide/latest/4-Web_Application_Security_Testing/07-Input_Validation_Testing/09-Testing_for_XPath_Injection).\n\
    * OWASP: [XPath Injection](https://www.owasp.org/index.php/XPATH_Injection).\n\
    * Common Weakness Enumeration: [CWE-643](https://cwe.mitre.org/data/definitions/643.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-681/IncorrectIntegerConversionQuery.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-681/IncorrectIntegerConversionQuery.bqrs
  metadata:
    name: Incorrect conversion between integer types
    description: |-
      Converting the result of `strconv.Atoi`, `strconv.ParseInt`,
                    and `strconv.ParseUint` to integer types of smaller bit size
                    can produce unexpected values.
    kind: path-problem
    problem.severity: warning
    security-severity: 8.1
    id: go/incorrect-integer-conversion
    tags: |-
      security
             external/cwe/cwe-190
             external/cwe/cwe-681
    precision: high
  queryHelp: "# Incorrect conversion between integer types\nIf a string is parsed\
    \ into an int using `strconv.Atoi`, and subsequently that int is converted into\
    \ another integer type of a smaller size, the result can produce unexpected values.\n\
    \nThis also applies to the results of `strconv.ParseInt` and `strconv.ParseUint`\
    \ when the specified size is larger than the size of the type that number is converted\
    \ to.\n\n\n## Recommendation\nIf you need to parse integer values with specific\
    \ bit sizes, avoid `strconv.Atoi`, and instead use `strconv.ParseInt` or `strconv.ParseUint`,\
    \ which also allow specifying the bit size.\n\nWhen using those functions, be\
    \ careful to not convert the result to another type with a smaller bit size than\
    \ the bit size you specified when parsing the number.\n\nIf this is not possible,\
    \ then add upper (and lower) bound checks specific to each type and bit size (you\
    \ can find the minimum and maximum value for each type in the `math` package).\n\
    \nNote that CodeQL is only able to identify bounds checks that compare against\
    \ a constant value. When a variable is used in the comparison, CodeQL is unable\
    \ to determine the value of the variable at runtime and will not recognize the\
    \ bounds check.\n\n\n## Example\nIn the first example, assume that an input string\
    \ is passed to `parseAllocateBad1` function, parsed by `strconv.Atoi`, and then\
    \ converted into an `int32` type:\n\n\n```go\npackage main\n\nimport (\n\t\"strconv\"\
    \n)\n\nfunc parseAllocateBad1(wanted string) int32 {\n\tparsed, err := strconv.Atoi(wanted)\n\
    \tif err != nil {\n\t\tpanic(err)\n\t}\n\treturn int32(parsed)\n}\nfunc parseAllocateBad2(wanted\
    \ string) int32 {\n\tparsed, err := strconv.ParseInt(wanted, 10, 64)\n\tif err\
    \ != nil {\n\t\tpanic(err)\n\t}\n\treturn int32(parsed)\n}\n\n```\nThe bounds\
    \ are not checked, so this means that if the provided number is greater than the\
    \ maximum value of type `int32`, the resulting value from the conversion will\
    \ be different from the actual provided value.\n\nTo avoid unexpected values,\
    \ you should either use the other functions provided by the `strconv` package\
    \ to parse the specific types and bit sizes as shown in the `parseAllocateGood2`\
    \ function; or check bounds as in the `parseAllocateGood1` function.\n\n\n```go\n\
    package main\n\nimport (\n\t\"math\"\n\t\"strconv\"\n)\n\nfunc main() {\n\n}\n\
    \nconst DefaultAllocate int32 = 256\n\nfunc parseAllocateGood1(desired string)\
    \ int32 {\n\tparsed, err := strconv.Atoi(desired)\n\tif err != nil {\n\t\treturn\
    \ DefaultAllocate\n\t}\n\t// GOOD: check for lower and upper bounds\n\tif parsed\
    \ > 0 && parsed <= math.MaxInt32 {\n\t\treturn int32(parsed)\n\t}\n\treturn DefaultAllocate\n\
    }\nfunc parseAllocateGood2(desired string) int32 {\n\t// GOOD: parse specifying\
    \ the bit size\n\tparsed, err := strconv.ParseInt(desired, 10, 32)\n\tif err !=\
    \ nil {\n\t\treturn DefaultAllocate\n\t}\n\treturn int32(parsed)\n}\n\nfunc parseAllocateGood3(wanted\
    \ string) int32 {\n\tparsed, err := strconv.ParseInt(wanted, 10, 32)\n\tif err\
    \ != nil {\n\t\tpanic(err)\n\t}\n\treturn int32(parsed)\n}\nfunc parseAllocateGood4(wanted\
    \ string) int32 {\n\tparsed, err := strconv.ParseInt(wanted, 10, 64)\n\tif err\
    \ != nil {\n\t\tpanic(err)\n\t}\n\t// GOOD: check for lower and uppper bounds\n\
    \tif parsed > 0 && parsed <= math.MaxInt32 {\n\t\treturn int32(parsed)\n\t}\n\t\
    return DefaultAllocate\n}\n\n```\n\n## Example\nIn the second example, assume\
    \ that an input string is passed to `parseAllocateBad2` function, parsed by `strconv.ParseInt`\
    \ with a bit size set to 64, and then converted into an `int32` type:\n\n\n```go\n\
    package main\n\nimport (\n\t\"strconv\"\n)\n\nfunc parseAllocateBad1(wanted string)\
    \ int32 {\n\tparsed, err := strconv.Atoi(wanted)\n\tif err != nil {\n\t\tpanic(err)\n\
    \t}\n\treturn int32(parsed)\n}\nfunc parseAllocateBad2(wanted string) int32 {\n\
    \tparsed, err := strconv.ParseInt(wanted, 10, 64)\n\tif err != nil {\n\t\tpanic(err)\n\
    \t}\n\treturn int32(parsed)\n}\n\n```\nIf the provided number is greater than\
    \ the maximum value of type `int32`, the resulting value from the conversion will\
    \ be different from the actual provided value.\n\nTo avoid unexpected values,\
    \ you should specify the correct bit size as in `parseAllocateGood3`; or check\
    \ bounds before making the conversion as in `parseAllocateGood4`.\n\n\n```go\n\
    package main\n\nimport (\n\t\"math\"\n\t\"strconv\"\n)\n\nfunc main() {\n\n}\n\
    \nconst DefaultAllocate int32 = 256\n\nfunc parseAllocateGood1(desired string)\
    \ int32 {\n\tparsed, err := strconv.Atoi(desired)\n\tif err != nil {\n\t\treturn\
    \ DefaultAllocate\n\t}\n\t// GOOD: check for lower and upper bounds\n\tif parsed\
    \ > 0 && parsed <= math.MaxInt32 {\n\t\treturn int32(parsed)\n\t}\n\treturn DefaultAllocate\n\
    }\nfunc parseAllocateGood2(desired string) int32 {\n\t// GOOD: parse specifying\
    \ the bit size\n\tparsed, err := strconv.ParseInt(desired, 10, 32)\n\tif err !=\
    \ nil {\n\t\treturn DefaultAllocate\n\t}\n\treturn int32(parsed)\n}\n\nfunc parseAllocateGood3(wanted\
    \ string) int32 {\n\tparsed, err := strconv.ParseInt(wanted, 10, 32)\n\tif err\
    \ != nil {\n\t\tpanic(err)\n\t}\n\treturn int32(parsed)\n}\nfunc parseAllocateGood4(wanted\
    \ string) int32 {\n\tparsed, err := strconv.ParseInt(wanted, 10, 64)\n\tif err\
    \ != nil {\n\t\tpanic(err)\n\t}\n\t// GOOD: check for lower and uppper bounds\n\
    \tif parsed > 0 && parsed <= math.MaxInt32 {\n\t\treturn int32(parsed)\n\t}\n\t\
    return DefaultAllocate\n}\n\n```\n\n## References\n* Wikipedia [Integer overflow](https://en.wikipedia.org/wiki/Integer_overflow).\n\
    * Go language specification [Integer overflow](https://golang.org/ref/spec#Integer_overflow).\n\
    * Documentation for [strconv.Atoi](https://golang.org/pkg/strconv/#Atoi).\n* Documentation\
    \ for [strconv.ParseInt](https://golang.org/pkg/strconv/#ParseInt).\n* Documentation\
    \ for [strconv.ParseUint](https://golang.org/pkg/strconv/#ParseUint).\n* Common\
    \ Weakness Enumeration: [CWE-190](https://cwe.mitre.org/data/definitions/190.html).\n\
    * Common Weakness Enumeration: [CWE-681](https://cwe.mitre.org/data/definitions/681.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-770/UncontrolledAllocationSize.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-770/UncontrolledAllocationSize.bqrs
  metadata:
    name: Slice memory allocation with excessive size value
    description: Allocating memory for slices with the built-in make function from
      user-controlled sources can lead to a denial of service.
    kind: path-problem
    problem.severity: error
    security-severity: 7.5
    precision: high
    id: go/uncontrolled-allocation-size
    tags: |-
      security
             external/cwe/cwe-770
  queryHelp: "# Slice memory allocation with excessive size value\nUsing untrusted\
    \ input to allocate slices with the built-in `make` function could lead to excessive\
    \ memory allocation and potentially cause the program to crash due to running\
    \ out of memory. This vulnerability could be exploited to perform a denial-of-service\
    \ attack by consuming all available server resources.\n\n\n## Recommendation\n\
    Implement a maximum allowed value for size allocations with the built-in `make`\
    \ function to prevent excessively large allocations.\n\n\n## Example\nIn the following\
    \ example snippet, the `n` parameter is user-controlled.\n\nIf the external user\
    \ provides an excessively large value, the application allocates a slice of size\
    \ `n` without further verification, potentially exhausting all the available memory.\n\
    \n\n```go\npackage main\n\nimport (\n\t\"encoding/json\"\n\t\"fmt\"\n\t\"net/http\"\
    \n\t\"strconv\"\n)\n\nfunc OutOfMemoryBad(w http.ResponseWriter, r *http.Request)\
    \ {\n\tquery := r.URL.Query()\n\n\tqueryStr := query.Get(\"n\")\n\tcollectionSize,\
    \ err := strconv.Atoi(queryStr)\n\tif err != nil {\n\t\thttp.Error(w, err.Error(),\
    \ http.StatusBadRequest)\n\t\treturn\n\t}\n\n\tresult := make([]string, collectionSize)\n\
    \tfor i := 0; i < collectionSize; i++ {\n\t\tresult[i] = fmt.Sprintf(\"Item %d\"\
    , i+1)\n\t}\n\n\tw.Header().Set(\"Content-Type\", \"application/json\")\n\tjson.NewEncoder(w).Encode(result)\n\
    }\n\n```\nOne way to prevent this vulnerability is by implementing a maximum allowed\
    \ value for the user-controlled input, as seen in the following example:\n\n\n\
    ```go\npackage main\n\nimport (\n\t\"encoding/json\"\n\t\"fmt\"\n\t\"net/http\"\
    \n\t\"strconv\"\n)\n\nfunc OutOfMemoryGood(w http.ResponseWriter, r *http.Request)\
    \ {\n\tquery := r.URL.Query()\n\tMaxValue := 6\n\tqueryStr := query.Get(\"n\"\
    )\n\tcollectionSize, err := strconv.Atoi(queryStr)\n\tif err != nil {\n\t\thttp.Error(w,\
    \ err.Error(), http.StatusBadRequest)\n\t\treturn\n\t}\n\tif collectionSize <\
    \ 0 || collectionSize > MaxValue {\n\t\thttp.Error(w, \"Bad request\", http.StatusBadRequest)\n\
    \t\treturn\n\t}\n\tresult := make([]string, collectionSize)\n\tfor i := 0; i <\
    \ collectionSize; i++ {\n\t\tresult[i] = fmt.Sprintf(\"Item %d\", i+1)\n\t}\n\n\
    \tw.Header().Set(\"Content-Type\", \"application/json\")\n\tjson.NewEncoder(w).Encode(result)\n\
    }\n\n```\n\n## References\n* OWASP: [Denial of Service Cheat Sheet](https://cheatsheetseries.owasp.org/cheatsheets/Denial_of_Service_Cheat_Sheet.html)\n\
    * Common Weakness Enumeration: [CWE-770](https://cwe.mitre.org/data/definitions/770.html).\n"
 -
  pack: codeql/go-queries#0
  relativeQueryPath: Security/CWE-918/RequestForgery.ql
  relativeBqrsPath: codeql/go-queries/Security/CWE-918/RequestForgery.bqrs
  metadata:
    name: Uncontrolled data used in network request
    description: Sending network requests with user-controlled data allows for request
      forgery attacks.
    kind: path-problem
    problem.severity: error
    security-severity: 9.1
    precision: high
    id: go/request-forgery
    tags: |-
      security
             external/cwe/cwe-918
  queryHelp: "# Uncontrolled data used in network request\nDirectly incorporating\
    \ user input into an HTTP request without validating the input can facilitate\
    \ different kinds of request forgery attacks, where the attacker essentially controls\
    \ the request. If the vulnerable request is in server-side code, then security\
    \ mechanisms, such as external firewalls, can be bypassed. If the vulnerable request\
    \ is in client-side code, then unsuspecting users can send malicious requests\
    \ to other servers, potentially resulting in a DDOS attack.\n\n\n## Recommendation\n\
    To guard against request forgery, it is advisable to avoid putting user input\
    \ directly into a network request. If a flexible network request mechanism is\
    \ required, it is recommended to maintain a list of authorized request targets\
    \ and choose from that list based on the user input provided.\n\n\n## Example\n\
    The following example shows an HTTP request parameter being used directly in a\
    \ URL request without validating the input, which facilitates an SSRF attack.\
    \ The request `http.Get(...)` is vulnerable since attackers can choose the value\
    \ of `target` to be anything they want. For instance, the attacker can choose\
    \ `\"internal.example.com/#\"` as the target, causing the URL used in the request\
    \ to be `\"https://internal.example.com/#.example.com/data\"`.\n\nA request to\
    \ `https://internal.example.com` may be problematic if that server is not meant\
    \ to be directly accessible from the attacker's machine.\n\n\n```go\npackage main\n\
    \nimport (\n\t\"net/http\"\n)\n\nfunc handler(w http.ResponseWriter, req *http.Request)\
    \ {\n\ttarget := req.FormValue(\"target\")\n\n\t// BAD: `target` is controlled\
    \ by the attacker\n\tresp, err := http.Get(\"https://\" + target + \".example.com/data/\"\
    )\n\tif err != nil {\n\t\t// error handling\n\t}\n\n\t// process request response\n\
    \tuse(resp)\n}\n\n```\nOne way to remedy the problem is to use the user input\
    \ to select a known fixed string before performing the request:\n\n\n```go\npackage\
    \ main\n\nimport (\n\t\"net/http\"\n)\n\nfunc handler1(w http.ResponseWriter,\
    \ req *http.Request) {\n\ttarget := req.FormValue(\"target\")\n\n\tvar subdomain\
    \ string\n\tif target == \"EU\" {\n\t\tsubdomain = \"europe\"\n\t} else {\n\t\t\
    subdomain = \"world\"\n\t}\n\n\t// GOOD: `subdomain` is controlled by the server\n\
