rules:
  - id: kong-lua-host-header-routing
    message: "Host header used in routing decision; ensure allowlist validation."
    severity: WARNING
    languages: [lua]
    pattern-either:
      - pattern: ngx.var.host
      - pattern: ngx.var.http_host
    paths:
      include:
        - "**/kong/router/**"
        - "**/kong/pdk/**"
        - "**/kong/runloop/**"
