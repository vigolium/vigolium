rules:
  - id: grafana-cloudmigration-cancelsnapshot-no-orgid
    severity: ERROR
    languages: [go]
    message: >
      CancelSnapshot service interface (cloudmigration.go) does not accept an
      orgID parameter. The implementation calls UpdateSnapshot with only
      session_uid and snapshot_uid, resulting in a SQL UPDATE without an org_id
      constraint in the WHERE clause. An admin in org-B can cancel an in-progress
      snapshot belonging to org-A if they can obtain the session_uid and snapshot_uid
      values (e.g., via log scraping or timing side-channels). This mirrors the
      cross-org pattern from CVE-2024-9476.
    metadata:
      cwe: CWE-284
      attack_vector: authenticated-admin-any-org
      dfd_slice: DFD-5
      cve: CVE-2024-9476
      confidence: HIGH
    patterns:
      - pattern: |
          CancelSnapshot(ctx context.Context, sessionUid string, snapshotUid string) error
    paths:
      include:
        - "pkg/services/cloudmigration/cloudmigration.go"

  - id: grafana-cloudmigration-update-snapshot-no-orgid-where
    severity: ERROR
    languages: [go]
    message: >
      UpdateSnapshot SQL UPDATE statement uses WHERE session_uid=? AND uid=? without
      an org_id constraint. Since session_uid values are UUIDs (not org-scoped),
      an attacker who obtains a session_uid can update or cancel snapshots in other
      organizations. The WHERE clause must include org_id to enforce tenant isolation.
    metadata:
      cwe: CWE-284
      attack_vector: authenticated-admin-any-org
      dfd_slice: DFD-5
      confidence: HIGH
    patterns:
      - pattern: |
          "UPDATE cloud_migration_snapshot SET ... WHERE session_uid=? AND uid=?"
    paths:
      include:
        - "pkg/services/cloudmigration/cloudmigrationimpl/xorm_store.go"
