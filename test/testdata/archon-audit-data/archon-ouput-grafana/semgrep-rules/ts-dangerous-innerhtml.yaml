rules:
  - id: grafana-dangerouslySetInnerHTML-unsanitized
    languages: [typescript, javascript]
    message: >
      dangerouslySetInnerHTML used without calling DOMPurify.sanitize() or
      sanitizeTextPanelContent() on the HTML content. If the content is derived
      from user input, plugin output, markdown rendered from untrusted sources,
      or dashboard JSON, this is a stored/reflected XSS vector.
      In Grafana's context, renderMarkdown() does sanitize via sanitizeTextPanelContent()
      by default, but the noSanitize option can bypass this. Several components pass
      rendered markdown directly; verify the source is always sanitized.
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-79
      dfd-slice: DFD-4
      confidence: MEDIUM
    patterns:
      - pattern: |
          dangerouslySetInnerHTML={{ __html: $HTML }}
      - pattern-not: |
          dangerouslySetInnerHTML={{ __html: sanitizeTextPanelContent($HTML) }}
      - pattern-not: |
          dangerouslySetInnerHTML={{ __html: DOMPurify.sanitize($HTML) }}
      - pattern-not: |
          dangerouslySetInnerHTML={{ __html: renderMarkdown($HTML) }}
      - pattern-not: |
          dangerouslySetInnerHTML={{ __html: renderMarkdown($HTML, ...) }}
    paths:
      include:
        - "public/app/**/*.tsx"
        - "public/app/**/*.ts"
        - "packages/**/*.tsx"
        - "packages/**/*.ts"
      exclude:
        - "**/*.test.tsx"
        - "**/*.test.ts"
        - "**/*.spec.tsx"
        - "**/*.spec.ts"
        - "**/mocks/**"

  - id: grafana-renderMarkdown-noSanitize-true
    languages: [typescript, javascript]
    message: >
      renderMarkdown() called with noSanitize:true, bypassing sanitizeTextPanelContent().
      This is equivalent to trusting the markdown source completely. The result should
      not be passed to dangerouslySetInnerHTML unless the markdown source is guaranteed
      to be from a trusted, server-validated source (not user-editable). In
      MarkdownCell.tsx, disableSanitizeHtml is a field-level configuration option
      that could be set by datasource response data.
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-79
      dfd-slice: DFD-4
      confidence: HIGH
    pattern: |
      renderMarkdown($HTML, { ..., noSanitize: true, ... })
    paths:
      include:
        - "public/app/**/*.tsx"
        - "public/app/**/*.ts"
        - "packages/**/*.tsx"
        - "packages/**/*.ts"
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"
        - "**/mocks/**"

  - id: grafana-renderMarkdown-disableSanitizeHtml-variable
    languages: [typescript, javascript]
    message: >
      renderMarkdown() called with a variable for noSanitize (e.g., { noSanitize: disableSanitizeHtml }).
      If this variable can be influenced by datasource response data or panel configuration
      (not just server-side admin configuration), it creates an XSS bypass. In
      MarkdownCell.tsx, the disableSanitizeHtml prop propagates from field display
      config, which may be set by a datasource returning specially crafted data.
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-79
      dfd-slice: DFD-4
      confidence: MEDIUM
    pattern: |
      renderMarkdown($HTML, { ..., noSanitize: $VAR, ... })
    paths:
      include:
        - "packages/grafana-ui/**/*.tsx"
        - "public/app/**/*.tsx"
      exclude:
        - "**/*.test.*"
        - "**/*.spec.*"
