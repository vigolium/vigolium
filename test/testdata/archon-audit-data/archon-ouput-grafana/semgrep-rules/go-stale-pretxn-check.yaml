rules:
  - id: grafana-readwrite-check-outside-transaction
    languages: [go]
    message: >
      Permission or safety check (ReadOnly, IsReadOnly, isReadOnly) performed outside
      a database transaction context. In DFD-5 (Datasource TOCTOU), the ReadOnly flag
      is checked in the API handler before the deletion transaction begins. A concurrent
      update to the datasource between the pre-transaction check and the in-transaction
      delete can allow deletion of a newly-recreated datasource that was not authorized.
      Pattern: getRawDataSourceByUID(...) -> check ReadOnly -> DeleteDataSource (separate txn).
    severity: ERROR
    metadata:
      category: security
      cwe: CWE-362
      cve-context: CVE-2026-21725 (TOCTOU datasource deletion)
      dfd-slice: DFD-5
      confidence: HIGH
    patterns:
      - pattern: |
          $DS, $ERR = $SVC.GetDataSource(...)
          ...
          if $DS.ReadOnly { ... }
          ...
          $SVC.DeleteDataSource(...)
      - pattern: |
          $DS, $ERR := $SVC.GetDataSource(...)
          ...
          if $DS.ReadOnly { ... }
          ...
          $SVC.DeleteDataSource(...)
    paths:
      include:
        - "pkg/**/*.go"
      exclude:
        - "**/*_test.go"
        - "pkg/tests/**"

  - id: grafana-fetch-then-act-outside-txn
    languages: [go]
    message: >
      Record is fetched outside a transaction and then used to gate a write operation
      (delete/update). This is a TOCTOU race: between the read and the write, another
      goroutine may change the record. The write should re-fetch the record inside the
      transaction and use SELECT ... FOR UPDATE where supported, or at minimum the
      inner fetch result should be used for the authorization check instead of the
      outer one.
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-362
      dfd-slice: DFD-5
      confidence: MEDIUM
    pattern-either:
      - pattern: |
          $DS, $ERR := $SVC.GetDataSource($CTX, $Q)
          if $ERR != nil { ... }
          if $DS.$FIELD { ... return $ERR2 ... }
          ...
          $SVC.DeleteDataSource($CTX2, ...)
      - pattern: |
          $DS, $ERR = $SVC.GetDataSource($CTX, $Q)
          if $ERR != nil { ... }
          if $DS.$FIELD { ... return $ERR2 ... }
          ...
          $SVC.DeleteDataSource($CTX2, ...)
    paths:
      include:
        - "pkg/**/*.go"
      exclude:
        - "**/*_test.go"
        - "pkg/tests/**"
