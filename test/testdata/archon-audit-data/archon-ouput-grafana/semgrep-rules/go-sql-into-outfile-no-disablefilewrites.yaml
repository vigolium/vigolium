rules:
  - id: grafana-sql-into-outfile-allowlist
    severity: ERROR
    languages: [go]
    message: >
      SQL expression engine allows *sqlparser.Into node type in the AST allowlist
      (parser_allow.go). This permits SELECT ... INTO OUTFILE / INTO DUMPFILE
      statements to pass the allowlist check. Combined with the absence of
      mysql.WithDisableFileWrites(true) on the mysql context, an authenticated
      user with the sqlExpressions feature flag enabled can write arbitrary files
      to the filesystem.
    metadata:
      cwe: CWE-73
      attack_vector: authenticated-viewer
      dfd_slice: DFD-6
      cve: CVE-2024-9264
      confidence: HIGH
    patterns:
      - pattern: |
          case *sqlparser.Into:
              return
    paths:
      include:
        - "pkg/expr/sql/parser_allow.go"

  - id: grafana-sql-context-missing-disablefilewrites
    severity: ERROR
    languages: [go]
    message: >
      go-mysql-server context is created without mysql.WithDisableFileWrites(true).
      The IsReadOnly flag on the engine does NOT prevent INTO OUTFILE because
      plan.Into.IsReadOnly() delegates to the child SELECT node which returns true.
      The DisableFileWrites session variable is the correct mitigation.
    metadata:
      cwe: CWE-73
      attack_vector: authenticated-viewer
      dfd_slice: DFD-6
      cve: CVE-2024-9264
      confidence: HIGH
    patterns:
      - pattern: |
          mysql.NewContext($CTX, mysql.WithSession($SESSION), ...)
      - pattern-not: |
          mysql.NewContext($CTX, ..., mysql.WithDisableFileWrites(true), ...)
    paths:
      include:
        - "pkg/expr/sql/"

  - id: grafana-sqle-isreadonly-not-sufficient
    severity: WARNING
    languages: [go]
    message: >
      sqle.New() is called with IsReadOnly:true but this does not prevent INTO OUTFILE
      execution because plan.Into.IsReadOnly() returns the child SELECT's IsReadOnly
      value (true), bypassing the read-only check. Add WithDisableFileWrites(true)
      to the mysql context to block file writes.
    metadata:
      cwe: CWE-73
      attack_vector: authenticated-viewer
      dfd_slice: DFD-6
      confidence: HIGH
    pattern: |
      sqle.New($ANALYZER, &sqle.Config{IsReadOnly: true})
    paths:
      include:
        - "pkg/expr/sql/"
