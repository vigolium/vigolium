rules:
  - id: grafana-gosec-suppressed-os-create
    languages: [go]
    message: >
      os.Create() or os.Open() call with gosec suppression comment (nolint:gosec or #nosec).
      In DFD-2 (Image Renderer), os.Create is suppressed in writeResponseToFile at
      pkg/services/rendering/http_mode.go:191. The file path comes from getNewFilePath()
      which uses a random 20-char string — but no defense-in-depth confinement check
      (e.g., filepath.Rel or strings.HasPrefix against ImagesDir) is performed before
      the file is created and subsequently served via http.ServeFile.
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-22
      dfd-slice: DFD-2
      confidence: MEDIUM
    patterns:
      - pattern: |
          //nolint:gosec
          $X, $ERR = os.Create($PATH)
      - pattern: |
          // nolint:gosec
          $X, $ERR = os.Create($PATH)
      - pattern: |
          //nolint:gosec
          $X, $ERR := os.Create($PATH)
      - pattern: |
          // nolint:gosec
          $X, $ERR := os.Create($PATH)
    paths:
      include:
        - "pkg/**/*.go"
      exclude:
        - "**/*_test.go"
        - "pkg/tests/**"

  - id: grafana-gosec-suppressed-os-open
    languages: [go]
    message: >
      os.Open() or os.OpenFile() call with gosec suppression. Verify that the file path
      is confined to an expected directory. An unsuppressed gosec check would catch
      path traversal risks here.
    severity: WARNING
    metadata:
      category: security
      cwe: CWE-22
      dfd-slice: DFD-2
      confidence: MEDIUM
    patterns:
      - pattern: |
          //nolint:gosec
          $X, $ERR = os.OpenFile($PATH, ...)
      - pattern: |
          // nolint:gosec
          $X, $ERR = os.OpenFile($PATH, ...)
      - pattern: |
          //nolint:gosec
          $X, $ERR := os.OpenFile($PATH, ...)
      - pattern: |
          // nolint:gosec
          $X, $ERR := os.OpenFile($PATH, ...)
    paths:
      include:
        - "pkg/**/*.go"
      exclude:
        - "**/*_test.go"
        - "pkg/tests/**"

  - id: grafana-os-readfile-suppressed
    languages: [go]
    message: >
      os.ReadFile() with gosec suppression. Confirm that the path cannot be influenced
      by user-controlled input. Plugin storage uses several suppressed ReadFile calls
      that rely on config-controlled paths (pluginsDir).
    severity: INFO
    metadata:
      category: security
      cwe: CWE-22
      dfd-slice: DFD-4
      confidence: LOW
    patterns:
      - pattern: |
          //nolint:gosec
          $X, $ERR = os.ReadFile($PATH)
      - pattern: |
          // nolint:gosec
          $X, $ERR = os.ReadFile($PATH)
      - pattern: |
          //nolint:gosec
          $X, $ERR := os.ReadFile($PATH)
      - pattern: |
          // nolint:gosec
          $X, $ERR := os.ReadFile($PATH)
    paths:
      include:
        - "pkg/**/*.go"
      exclude:
        - "**/*_test.go"
        - "pkg/tests/**"
