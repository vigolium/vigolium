rules:
  - id: grafana-avatar-reqsignedin-anon-bypass
    severity: ERROR
    languages: [go]
    message: >
      The /avatar/:hash route uses reqSignedIn middleware. When [auth.anonymous]
      enabled = true, reqSignedIn allows anonymous requests because AllowAnonymous
      is set to true on the context, causing requireLogin to evaluate as false
      (auth.go:216). The correct middleware for this endpoint is reqSignedInNoAnonymous
      which sets ReqNoAnonymous=true, forcing authentication even when anonymous
      auth is globally enabled. This allows unauthenticated clients to trigger
      outbound HTTP requests to Gravatar for arbitrary hash values, enabling DoS.
    metadata:
      cwe: CWE-306
      attack_vector: unauthenticated
      dfd_slice: DFD-8
      cve: CVE-2026-21720
      confidence: HIGH
    patterns:
      - pattern: |
          r.Get("/avatar/:hash", ..., reqSignedIn, ...)
    paths:
      include:
        - "pkg/api/api.go"

  - id: grafana-reqsignedin-allows-anonymous
    severity: WARNING
    languages: [go]
    message: >
      reqSignedIn middleware allows anonymous requests when AllowAnonymous=true
      (from [auth.anonymous] enabled=true). If a route should block anonymous
      users specifically, use reqSignedInNoAnonymous (ReqNoAnonymous=true) instead.
      Check each reqSignedIn-guarded route to determine if anonymous access is
      appropriate.
    metadata:
      cwe: CWE-306
      attack_vector: unauthenticated
      dfd_slice: DFD-8
      confidence: MEDIUM
    pattern: |
      requireLogin := !c.AllowAnonymous || $FORCE_LOGIN || $OPTIONS.ReqNoAnonynmous
    paths:
      include:
        - "pkg/middleware/auth.go"
