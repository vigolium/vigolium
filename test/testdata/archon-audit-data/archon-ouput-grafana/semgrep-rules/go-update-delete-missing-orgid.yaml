rules:
  - id: grafana-sql-update-delete-missing-orgid
    severity: WARNING
    languages: [go]
    message: >
      SQL UPDATE or DELETE statement in a service layer does not include org_id
      in the WHERE clause. In Grafana's multi-tenant architecture, all mutable
      operations on org-scoped resources must filter by org_id to prevent
      cross-organization data modification. Missing org_id in UPDATE/DELETE can
      allow users in one organization to affect resources belonging to another.
    metadata:
      cwe: CWE-284
      attack_vector: authenticated-cross-org
      confidence: MEDIUM
    patterns:
      - pattern: |
          "UPDATE $TABLE SET ... WHERE ... uid=? ..."
      - pattern-not: |
          "UPDATE $TABLE SET ... WHERE ... org_id=? ..."
    paths:
      include:
        - "pkg/services/"

  - id: grafana-sql-delete-missing-orgid-where
    severity: WARNING
    languages: [go]
    message: >
      SQL DELETE statement does not include org_id in the WHERE clause.
      For org-scoped resources this can allow cross-org deletion.
    metadata:
      cwe: CWE-284
      attack_vector: authenticated-cross-org
      confidence: MEDIUM
    patterns:
      - pattern: |
          "DELETE FROM $TABLE WHERE ... uid=? ..."
      - pattern-not: |
          "DELETE FROM $TABLE WHERE ... org_id=? ..."
    paths:
      include:
        - "pkg/services/"
