rules:
  - id: redash-webhook-requests-url-config
    message: Webhook/destination URL used in requests without allowlist
    severity: WARNING
    languages: [python]
    mode: taint
    pattern-sources:
      - pattern: $OPTIONS.get("url")
      - pattern: $OPTIONS["url"]
      - pattern: $DEST.get("url")
      - pattern: $DEST["url"]
    pattern-sinks:
      - pattern: requests.post($URL, ...)
      - pattern: requests.request(..., url=$URL, ...)
    pattern-sanitizers:
      - pattern: validate_url(...)
      - pattern: allowlist_url(...)
    paths:
      include:
        - "**/redash/destinations/**/*.py"
        - "**/redash/tasks/**/*.py"
    metadata:
      category: security
      focus: webhook-ssrf
