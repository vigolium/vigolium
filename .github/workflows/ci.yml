name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # The rod browser-automation package is vendored and excluded from vet/test
  # the same way the Makefile does it.
  GOFLAGS: -mod=readonly

jobs:
  build-and-test:
    name: Lint, vet & unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # jsscan is compiled with bun and embedded via //go:embed
      # (internal/resources/deparos/jsscan/jsscan-linux-amd64). That file is
      # generated, not committed, so the tree won't build until it exists.
      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build embedded jsscan binaries
        run: make ensure-jsscan

      - name: Verify generated/managed sources (gofmt + go.mod tidy)
        run: make verify-generated

      # Filter mirrors GOLIST_EXCLUDE in the Makefile: drop vendored rod browser
      # tests and external tooling under platform/ (incl. node_modules trees that
      # can hold stray buildable Go packages).
      - name: go vet
        run: go vet $(go list ./... | grep -Ev '/pkg/spitolas/rod|/platform/|/node_modules/')

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0

      - name: Unit tests
        run: go test -short $(go list ./... | grep -Ev '/pkg/spitolas/rod|/platform/|/node_modules/')

  govulncheck:
    name: Vulnerability scan
    runs-on: ubuntu-latest
    # Informational: advisories can appear without any code change, so a finding
    # here should prompt a triage rather than hard-fail every unrelated PR.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build embedded jsscan binaries
        run: make ensure-jsscan

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck $(go list ./... | grep -Ev '/pkg/spitolas/rod|/platform/|/node_modules/')
