version: 2
updates:
  # Go module dependencies — group patch/minor bumps to keep PR volume sane.
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used by CI current.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
